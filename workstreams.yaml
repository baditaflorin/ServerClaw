- id: ws-0364-service-api-agent-tools
  adr: '0364'
  title: 'Service API agent tools: Outline, Netbox, Dify + generic auth helper (ADR
    0362 follow-up)'
  status: planned
  branch: main
  worktree_path: .claude/worktrees/service-api-agent-tools
  owner: unassigned
  priority: medium
  description: "ADR 0362 (Agent Service API Gateway) is implemented for Plane (ADR\
    \ 0363) but three\ngaps remain before the pattern is fully reusable:\n\n1. Generic\
    \ _resolve_service_auth(service_name) helper is missing \u2014 only Plane-specific\n\
    \   _resolve_plane_auth() exists. Must be built before other services can be added\
    \ without\n   copy-pasting credential discovery logic.\n\n2. Outline tools (wiki.example.com)\
    \ \u2014 existing REST client at scripts/outline_client.py,\n   no governed tool\
    \ surface yet.\n\n3. Netbox tools \u2014 network source of truth, agents can't\
    \ query IP allocations.\n\n4. Dify tools \u2014 agents can't trigger workflows\
    \ programmatically.\n\nPlane task creation was attempted but Plane API returned\
    \ 502 at time of writing.\nRun sync_plane_agent_issues.py once Plane recovers\
    \ to register this workstream.\n"
  tasks:
  - id: task-1
    title: Implement generic _resolve_service_auth(service_name) helper
    priority: medium
    description: "Add _resolve_service_auth(service_name: str) -> dict to scripts/agent_tool_registry.py.\n\
      Precedence: env LV3_{SERVICE}_AUTH_FILE \u2192 .local/{service}/admin-auth.json\
      \ \u2192 .local/{service}/api-token.txt\nRefactor _resolve_plane_auth() to delegate\
      \ to this helper.\nFile: scripts/agent_tool_registry.py ~line 720\nADR: docs/adr/0362-agent-service-api-gateway-pattern.md\n"
  - id: task-2
    title: Build Outline agent tools (list/search/get/create)
    priority: medium
    description: "Tools: list-outline-collections, search-outline-documents, get-outline-document,\n\
      \       create-outline-document (approval_required: true)\nExisting client:\
      \ scripts/outline_client.py\nAuth: .local/outline/admin-auth.json (base_url,\
      \ api_token)\nRegistry: config/agent-tool-registry.json\nWrite ADR 0364 for\
      \ Outline agent tools.\nPrior art: Plane handlers in scripts/agent_tool_registry.py\
      \ lines ~720-895\n"
  - id: task-3
    title: Build Netbox agent tools (list-devices, get-device, list-prefixes)
    priority: low
    description: "Tools: list-netbox-devices, get-netbox-device, list-netbox-prefixes,\n\
      \       create-netbox-ip-address (approval_required: true)\nAuth: .local/netbox/admin-auth.json\
      \ (base_url, api_token)\nNetbox REST API v3: /api/dcim/devices/, /api/ipam/prefixes/\n"
  - id: task-4
    title: Build Dify agent tools (list-apps, get-app, trigger-workflow)
    priority: low
    description: "Tools: list-dify-apps, get-dify-app, trigger-dify-workflow (approval_required:\
      \ true)\nIMPORTANT: use internal URL http://10.10.10.20:8094 \u2014 agents.example.com\
      \ is behind oauth2-proxy\nAuth: .local/dify/admin-auth.json (base_url, api_token\
      \ = Dify API key)\n"
