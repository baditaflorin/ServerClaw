---
# Purpose: Verify that the converged Harbor runtime is healthy and that the public registry path answers correctly.
# Dependencies: ADR 0201, ADR 0165, ADR 0371.
- name: Verify the Harbor runtime health
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: harbor
    common_verify_port: "{{ harbor_http_port }}"
    common_verify_health_url: "http://127.0.0.1:{{ harbor_http_port }}/api/v2.0/ping"

- name: Verify Harbor core containers are running
  ansible.builtin.shell: |
    set -euo pipefail
    unhealthy=0
    for container in {{ harbor_runtime_container_names | join(' ') }}; do
      state="$(docker inspect "${container}" --format '{{ "{{ .State.Status }}" }} {{ "{{ if .State.Health }}" }}{{ "{{ .State.Health.Status }}" }}{{ "{{ else }}" }}none{{ "{{ end }}" }}' 2>/dev/null || echo missing missing)"
      echo "${container} ${state}"
      case "${state}" in
        running\ healthy) ;;
        running\ none) ;;
        running\ starting) ;;
        *)
          unhealthy=1
          ;;
      esac
    done
    test "${unhealthy}" -eq 0
  args:
    executable: /bin/bash
    chdir: "{{ harbor_installer_dir }}"
  register: harbor_verify_services
  changed_when: false

- name: Assert Harbor runtime services include the expected core components
  ansible.builtin.assert:
    that:
      - harbor_verify_services.rc == 0
      - "'harbor-core running ' in harbor_verify_services.stdout"
      - "'harbor-portal running ' in harbor_verify_services.stdout"
      - "'registry running ' in harbor_verify_services.stdout"
      - "'trivy-adapter running ' in harbor_verify_services.stdout"
      - "'nginx running ' in harbor_verify_services.stdout"
    fail_msg: "Harbor answered the ping endpoint but one or more core services are not running."
