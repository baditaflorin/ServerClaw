---
# Purpose: Converge the monitoring VM tracing, Loki, Prometheus, Tempo, and OTLP runtime components, including the shared MinIO chunk backend.
# Use case: Included from monitoring_vm/tasks/main.yml when the observability stack and its tracing/logging surfaces need reconciliation.
#
# Inputs (required):
#   - monitoring_* defaults, health probe catalog inputs, and controller-local Loki MinIO secret material.
#
# Inputs (optional):
#   - Retention, canary, and Tempo/OpenTelemetry overrides declared through the monitoring_* role variables.
#
# Outputs:
#   - Rendered Loki, Prometheus, blackbox, Tempo, and OTLP config plus started systemd services on monitoring.
#
# Idempotency: Partially idempotent
#              Reruns reconcile the same config, services, and Loki storage backend contract.
#
# Dependencies:
#   - ADR 0041, ADR 0165, ADR 0250, and ADR 0274.
- name: Download Tempo Debian package
  ansible.builtin.get_url:
    url: "{{ monitoring_tempo_deb_url }}"
    dest: "{{ monitoring_tempo_deb_file }}"
    checksum: "{{ monitoring_tempo_deb_checksum }}"
    mode: "0644"

- name: Install Tempo from pinned Debian package
  ansible.builtin.apt:
    deb: "{{ monitoring_tempo_deb_file }}"

- name: Download OpenTelemetry Collector Debian package
  ansible.builtin.get_url:
    url: "{{ monitoring_otelcol_deb_url }}"
    dest: "{{ monitoring_otelcol_deb_file }}"
    checksum: "{{ monitoring_otelcol_deb_checksum }}"
    mode: "0644"

- name: Install OpenTelemetry Collector from pinned Debian package
  ansible.builtin.apt:
    deb: "{{ monitoring_otelcol_deb_file }}"

- name: Discover the installed Loki primary group
  ansible.builtin.command:
    argv:
      - id
      - -gn
      - loki
  register: monitoring_loki_primary_group
  changed_when: false

- name: Record the installed Loki primary group
  ansible.builtin.set_fact:
    monitoring_loki_group_name: "{{ monitoring_loki_primary_group.stdout | trim }}"

- name: Ensure Tempo storage directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: tempo
    group: "{{ monitoring_tempo_group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ monitoring_tempo_data_dir }}"
      mode: "0755"
    - path: "{{ monitoring_tempo_data_dir }}/wal"
      mode: "0750"
    - path: "{{ monitoring_tempo_data_dir }}/blocks"
      mode: "0750"
    - path: "{{ monitoring_tempo_data_dir }}/generator"
      mode: "0750"
    - path: "{{ monitoring_tempo_data_dir }}/generator/wal"
      mode: "0750"
    - path: "{{ monitoring_tempo_data_dir }}/generator/traces"
      mode: "0750"

- name: Ensure Loki storage directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: loki
    group: "{{ monitoring_loki_group_name }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ monitoring_loki_data_dir }}"
      mode: "0755"
    - path: "{{ monitoring_loki_data_dir }}/index"
      mode: "0750"
    - path: "{{ monitoring_loki_data_dir }}/index_cache"
      mode: "0750"
    - path: "{{ monitoring_loki_data_dir }}/chunks"
      mode: "0750"
    - path: "{{ monitoring_loki_data_dir }}/retention"
      mode: "0750"

- name: Ensure Prometheus data directory exists
  ansible.builtin.file:
    path: "{{ monitoring_prometheus_data_dir }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: "0755"

- name: Ensure Prometheus rules directory exists
  ansible.builtin.file:
    path: "{{ monitoring_prometheus_rules_dir }}"
    state: directory
    owner: root
    group: prometheus
    mode: "0755"

- name: Load the health probe catalog for blackbox scrape generation
  ansible.builtin.set_fact:
    monitoring_health_probe_catalog: "{{ lookup('ansible.builtin.file', monitoring_health_probe_catalog_path) | from_json }}"

- name: Render blackbox exporter configuration
  ansible.builtin.template:
    src: blackbox.yml.j2
    dest: "{{ monitoring_blackbox_exporter_config_file }}"
    owner: root
    group: prometheus
    mode: "0640"
  notify: Restart Blackbox Exporter

- name: Render Loki configuration
  ansible.builtin.template:
    src: loki-config.yml.j2
    dest: "{{ monitoring_loki_config_file }}"
    owner: root
    group: "{{ monitoring_loki_group_name }}"
    mode: "0640"
  notify: Restart Loki

- name: Render Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ monitoring_prometheus_config_file }}"
    owner: root
    group: prometheus
    mode: "0640"
  notify: Restart Prometheus

- name: Render managed Prometheus service unit
  ansible.builtin.template:
    src: prometheus.service.j2
    dest: "{{ monitoring_prometheus_service_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Prometheus

- name: Disable Debian Prometheus service in favor of the managed unit
  ansible.builtin.systemd:
    name: prometheus
    enabled: false
    state: stopped

- name: Render Tempo configuration
  ansible.builtin.template:
    src: tempo.yml.j2
    dest: "{{ monitoring_tempo_config_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Tempo

- name: Render OpenTelemetry Collector configuration
  ansible.builtin.template:
    src: otelcol-contrib-config.yaml.j2
    dest: "{{ monitoring_otelcol_config_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart OpenTelemetry Collector

- name: Enable and start Prometheus
  ansible.builtin.systemd:
    name: "{{ monitoring_prometheus_service_name }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Enable and start the blackbox exporter
  ansible.builtin.systemd:
    name: "{{ monitoring_blackbox_exporter_service_name }}"
    enabled: true
    state: started

- name: Enable and start Loki
  ansible.builtin.systemd:
    name: loki
    enabled: true
    state: started

- name: Enable and start Tempo
  ansible.builtin.systemd:
    name: tempo
    enabled: true
    state: started

- name: Enable and start OpenTelemetry Collector
  ansible.builtin.systemd:
    name: otelcol-contrib
    enabled: true
    state: started

- name: Flush monitoring infrastructure handlers
  ansible.builtin.meta: flush_handlers

- name: Wait for Prometheus readiness
  ansible.builtin.uri:
    url: "{{ monitoring_prometheus_url }}/-/ready"
    method: GET
    status_code: 200
  register: monitoring_prometheus_ready
  retries: 20
  delay: 3
  until: monitoring_prometheus_ready.status == 200

- name: Wait for blackbox exporter readiness
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ monitoring_blackbox_exporter_port }}/-/healthy"
    method: GET
    status_code: 200
  register: monitoring_blackbox_exporter_ready
  retries: 20
  delay: 3
  until: monitoring_blackbox_exporter_ready.status == 200

- name: Wait for Loki readiness
  ansible.builtin.uri:
    url: "{{ monitoring_loki_http_url }}/ready"
    method: GET
    status_code: 200
  register: monitoring_loki_ready
  retries: 20
  delay: 3
  until: monitoring_loki_ready.status == 200

- name: Wait for Tempo readiness
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ monitoring_tempo_http_port }}/ready"
    method: GET
    status_code: 200
  register: monitoring_tempo_ready
  retries: 20
  delay: 3
  until: monitoring_tempo_ready.status == 200

- name: Wait for OpenTelemetry Collector health
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ monitoring_otelcol_health_port }}"
    method: GET
    status_code: 200
  register: monitoring_otelcol_health
  retries: 20
  delay: 3
  until: monitoring_otelcol_health.status == 200
