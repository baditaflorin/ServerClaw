- name: Check current Grafana admin password hash marker
  ansible.builtin.stat:
    path: "{{ monitoring_grafana_admin_password_hash_file }}"
  register: monitoring_grafana_admin_password_hash_stat

- name: Read Grafana admin password hash marker
  ansible.builtin.slurp:
    src: "{{ monitoring_grafana_admin_password_hash_file }}"
  register: monitoring_grafana_admin_password_hash_raw
  when: monitoring_grafana_admin_password_hash_stat.stat.exists
  no_log: true

- name: Reset Grafana admin password when the managed secret changes
  ansible.builtin.command:
    argv:
      - grafana-cli
      - --homepath
      - /usr/share/grafana
      - admin
      - reset-admin-password
      - "{{ monitoring_grafana_admin_password }}"
  when: >
    not monitoring_grafana_admin_password_hash_stat.stat.exists
    or (monitoring_grafana_admin_password_hash_raw.content | b64decode | trim)
      != (monitoring_grafana_admin_password | hash('sha256'))
  changed_when: true
  no_log: true

- name: Persist Grafana admin password hash marker
  ansible.builtin.copy:
    dest: "{{ monitoring_grafana_admin_password_hash_file }}"
    content: "{{ monitoring_grafana_admin_password | hash('sha256') }}\n"
    owner: grafana
    group: grafana
    mode: "0600"
  no_log: true

