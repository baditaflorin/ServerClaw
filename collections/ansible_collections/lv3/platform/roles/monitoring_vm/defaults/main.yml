---
# Purpose: Declare the shared defaults for converging the monitoring VM and its Grafana, Loki, Prometheus, Tempo, and InfluxDB surfaces.
# Use case: Used whenever the monitoring_vm role renders monitoring configuration, dashboards, and managed tokens.
#
# Inputs (required):
#   - repo root and host facts (generated, required): Supply source paths, hostnames, and topology-derived URLs.
#
# Inputs (optional):
#   - monitoring_stack_packages (list[str], optional): Monitoring packages installed on monitoring-lv3.
#   - monitoring_prometheus_retention_time (str, optional, default=15d): Prometheus retention budget.
#
# Outputs:
#   - Default variable values consumed by the monitoring_vm role.
#
# Idempotency: Fully idempotent
#              This file only declares role defaults.
#
# Dependencies:
#   - ADR 0041: Defines the monitoring stack baseline.
#   - ADR 0196: Adds the realtime Netdata publication surface to monitoring-stack composition.
#   - Role: monitoring_vm — converges the monitoring guest and bundled observability services.
#
# Related ADRs: 0041, 0165, 0196
# Related Runbooks: docs/runbooks/deploy-uptime-kuma.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-28
monitoring_grafana_repo_key_url: https://apt.grafana.com/gpg-full.key
monitoring_grafana_repo_keyring: /etc/apt/keyrings/grafana.asc
monitoring_grafana_repo_file: /etc/apt/sources.list.d/grafana.list
monitoring_stack_packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gpg
  - grafana
  - influxdb2
  - influxdb2-cli
  - loki
  - loki-canary
  - prometheus
  - prometheus-blackbox-exporter
monitoring_stack_dir: /etc/lv3/monitoring
monitoring_repo_root: "{{ inventory_dir | dirname }}"
monitoring_grafana_admin_user: admin
monitoring_grafana_admin_password_file: /etc/lv3/monitoring/grafana-admin-password
monitoring_grafana_admin_password_hash_file: /var/lib/grafana/.lv3-admin-password.sha256
monitoring_grafana_datasource_name: InfluxDB Proxmox
monitoring_grafana_datasource_token_file: /etc/lv3/monitoring/grafana-reader.token
monitoring_grafana_provisioning_file: /etc/grafana/provisioning/datasources/influxdb-proxmox.yml
monitoring_grafana_loki_datasource_name: Loki Logs
monitoring_grafana_loki_provisioning_file: /etc/grafana/provisioning/datasources/loki-logs.yml
monitoring_grafana_prometheus_datasource_name: Prometheus Service Graphs
monitoring_grafana_prometheus_datasource_uid: lv3-prometheus
monitoring_grafana_prometheus_provisioning_file: /etc/grafana/provisioning/datasources/prometheus-service-graphs.yml
monitoring_grafana_tempo_datasource_name: Tempo
monitoring_grafana_tempo_datasource_uid: lv3-tempo
monitoring_grafana_tempo_provisioning_file: /etc/grafana/provisioning/datasources/tempo-traces.yml
monitoring_grafana_folder_uid: lv3
monitoring_grafana_folder_title: LV3
monitoring_grafana_dashboard_dir: /var/lib/grafana/dashboards/lv3
monitoring_grafana_dashboard_file: /var/lib/grafana/dashboards/lv3/lv3-platform-overview.json
monitoring_grafana_dashboard_uid: lv3-platform-overview
monitoring_grafana_dashboard_title: LV3 Platform Overview
monitoring_grafana_public_url: "https://{{ hostvars[groups['proxmox_hosts'][0]].lv3_service_topology.grafana.public_hostname }}"
monitoring_grafana_vm_dashboard_dir: /var/lib/grafana/dashboards/lv3/vms
monitoring_grafana_mail_dashboard_file: /var/lib/grafana/dashboards/lv3/lv3-mail-platform.json
monitoring_grafana_mail_dashboard_uid: lv3-mail-platform
monitoring_grafana_mail_dashboard_title: LV3 Mail Platform
monitoring_grafana_slo_dashboard_file: /var/lib/grafana/dashboards/lv3/lv3-slo-overview.json
monitoring_grafana_slo_dashboard_uid: lv3-slo-overview
monitoring_grafana_slo_dashboard_title: LV3 SLO Overview
monitoring_grafana_slo_dashboard_source_file: "{{ monitoring_repo_root }}/config/grafana/dashboards/slo-overview.json"
monitoring_grafana_capacity_dashboard_file: /var/lib/grafana/dashboards/lv3/lv3-capacity-overview.json
monitoring_grafana_capacity_dashboard_uid: lv3-capacity-overview
monitoring_grafana_capacity_dashboard_title: Capacity Overview
monitoring_grafana_capacity_dashboard_source_file: "{{ monitoring_repo_root }}/config/grafana/dashboards/capacity-overview.json"
monitoring_grafana_log_canary_dashboard_file: /var/lib/grafana/dashboards/lv3/lv3-log-canary-overview.json
monitoring_grafana_log_canary_dashboard_uid: lv3-log-canary-overview
monitoring_grafana_log_canary_dashboard_title: LV3 Log Canary
monitoring_grafana_log_canary_dashboard_source_file: "{{ monitoring_repo_root }}/config/grafana/dashboards/log-canary-overview.json"
monitoring_influxdb_admin_user: lv3-monitoring-admin
monitoring_influxdb_admin_password_file: /etc/lv3/monitoring/influxdb-admin-password
monitoring_influxdb_operator_token_file: /etc/lv3/monitoring/influxdb-operator.token
monitoring_influxdb_proxmox_writer_token_file: /etc/lv3/monitoring/influxdb-proxmox-writer.token
monitoring_influxdb_proxmox_writer_description: lv3-proxmox-writer
monitoring_influxdb_guest_writer_token_file: /etc/lv3/monitoring/influxdb-guest-writer.token
monitoring_influxdb_guest_writer_description: lv3-guest-writer
monitoring_influxdb_grafana_reader_description: lv3-grafana-reader
monitoring_loki_config_file: /etc/loki/config.yml
monitoring_loki_data_dir: /var/lib/loki
monitoring_loki_http_url: http://127.0.0.1:3100
monitoring_loki_port: "{{ hostvars[groups['proxmox_hosts'][0]].platform_port_assignments.monitoring_loki_port }}"
monitoring_loki_filesystem_schema_start_date: "2026-03-22"
monitoring_loki_minio_schema_cutover_date: "2026-03-30"
monitoring_loki_minio_access_key_id: lokichunks
monitoring_loki_minio_secret_key_local_file: "{{ repo_shared_local_root }}/monitoring/loki-minio-secret-key.txt"
monitoring_loki_minio_bucket_name: loki-chunks
monitoring_loki_minio_region: us-east-1
monitoring_loki_minio_endpoint: >-
  {{ hostvars[groups['proxmox_hosts'][0]].lv3_service_topology.minio.private_ip }}:{{
    hostvars[groups['proxmox_hosts'][0]].platform_port_assignments.minio_api_port
  }}
monitoring_loki_retention_default: 720h
monitoring_loki_retention_edge_access: 720h
monitoring_loki_retention_control_plane: 720h
monitoring_loki_canary_service_name: loki-canary
monitoring_loki_canary_service_file: /etc/systemd/system/loki-canary.service
monitoring_loki_canary_metrics_port: 3500
monitoring_loki_canary_interval: 15s
monitoring_loki_canary_wait: 3m
monitoring_loki_canary_max_wait: 5m
monitoring_loki_canary_query_timeout: 30s
monitoring_loki_canary_metric_test_interval: 2m
monitoring_loki_canary_metric_test_range: 15m
monitoring_loki_canary_spot_check_interval: 2m
monitoring_loki_canary_spot_check_max: 30m
monitoring_loki_canary_spot_check_query_rate: 1m
monitoring_loki_canary_line_size: 256
monitoring_loki_canary_log_selector: >-
  {name="loki-canary",stream="stdout"}
monitoring_grafana_annotation_retention: 2160h
monitoring_prometheus_service_name: lv3-prometheus
monitoring_prometheus_service_file: /etc/systemd/system/lv3-prometheus.service
monitoring_prometheus_config_file: /etc/prometheus/prometheus.yml
monitoring_prometheus_data_dir: /var/lib/prometheus
monitoring_prometheus_rules_dir: /etc/prometheus/rules
monitoring_prometheus_file_sd_dir: /etc/prometheus/file_sd
monitoring_prometheus_slo_rules_file: /etc/prometheus/rules/slo-rules.yml
monitoring_prometheus_slo_rules_source_file: "{{ monitoring_repo_root }}/config/prometheus/rules/slo_rules.yml"
monitoring_prometheus_slo_alerts_file: /etc/prometheus/rules/slo-alerts.yml
monitoring_prometheus_slo_alerts_source_file: "{{ monitoring_repo_root }}/config/prometheus/rules/slo_alerts.yml"
monitoring_prometheus_slo_targets_file: /etc/prometheus/file_sd/slo-targets.yml
monitoring_prometheus_slo_targets_source_file: "{{ monitoring_repo_root }}/config/prometheus/file_sd/slo_targets.yml"
monitoring_prometheus_https_tls_alerts_file: /etc/prometheus/rules/https-tls-alerts.yml
monitoring_prometheus_https_tls_alerts_source_file: "{{ monitoring_repo_root }}/config/prometheus/rules/https_tls_alerts.yml"
monitoring_prometheus_https_tls_targets_file: /etc/prometheus/file_sd/https-tls-targets.yml
monitoring_prometheus_https_tls_targets_source_file: "{{ monitoring_repo_root }}/config/prometheus/file_sd/https_tls_targets.yml"
monitoring_prometheus_retention_time: 15d
monitoring_prometheus_enable_features:
  - exemplar-storage
  - native-histograms
monitoring_prometheus_listen_address: 0.0.0.0:9090
monitoring_prometheus_remote_write_url: >-
  http://{{ hostvars[groups['proxmox_hosts'][0]].lv3_service_topology.grafana.private_ip }}:9090/api/v1/write
monitoring_prometheus_url: http://127.0.0.1:9090
monitoring_blackbox_exporter_service_name: prometheus-blackbox-exporter
monitoring_blackbox_exporter_env_file: /etc/default/prometheus-blackbox-exporter
monitoring_blackbox_exporter_config_file: /etc/prometheus/blackbox.yml
monitoring_blackbox_exporter_source_file: "{{ monitoring_repo_root }}/config/blackbox/blackbox.yml"
monitoring_blackbox_exporter_port: "{{ hostvars[groups['proxmox_hosts'][0]].platform_port_assignments.monitoring_blackbox_exporter_port }}"
monitoring_prometheus_rule_files:
  - /etc/prometheus/rules/*.yml
monitoring_prometheus_alertmanager_targets:
  - 127.0.0.1:9093
monitoring_postgres_audit_metrics_job_name: postgres-audit-alloy
monitoring_postgres_audit_metrics_port: 12345
monitoring_postgres_audit_metrics_target: >-
  {{
    hostvars[groups['proxmox_hosts'][0]].platform_guest_catalog.by_name[
      'postgres-staging-lv3' if inventory_hostname == 'monitoring-staging-lv3' else 'postgres-lv3'
    ].ipv4
  }}:{{ monitoring_postgres_audit_metrics_port }}
monitoring_netdata_parent_port: "{{ hostvars[groups['proxmox_hosts'][0]].platform_port_assignments.netdata_port }}"
monitoring_netdata_parent_metrics_url: >-
  http://127.0.0.1:{{ monitoring_netdata_parent_port }}/api/v1/allmetrics?format=prometheus_all_hosts&source=as-collected
monitoring_health_probe_catalog_path: "{{ inventory_dir | dirname }}/config/health-probe-catalog.json"
monitoring_tempo_version: 2.10.3
monitoring_tempo_deb_url: https://github.com/grafana/tempo/releases/download/v2.10.3/tempo_2.10.3_linux_amd64.deb
monitoring_tempo_deb_checksum: sha256:574b4c4b0a30d01eca01c4f37dcee8b5161b459b770623468bbb391a375ed841
monitoring_tempo_deb_file: /tmp/tempo_2.10.3_linux_amd64.deb
monitoring_tempo_config_file: /etc/tempo/config.yml
monitoring_tempo_data_dir: /var/lib/tempo
monitoring_tempo_trace_retention: 336h
monitoring_tempo_http_port: "{{ hostvars[groups['proxmox_hosts'][0]].platform_port_assignments.monitoring_tempo_http_port }}"
monitoring_tempo_grpc_port: 3201
monitoring_tempo_otlp_grpc_port: 14317
monitoring_tempo_otlp_http_port: 14318
monitoring_tempo_group: nogroup
monitoring_otelcol_version: 0.148.0
monitoring_otelcol_deb_url: https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v0.148.0/otelcol-contrib_0.148.0_linux_amd64.deb
monitoring_otelcol_deb_checksum: sha256:ad521e8f121283048822463403295fd4ad0d97b50d12ac6bf5ca2cc656f061ba
monitoring_otelcol_deb_file: /tmp/otelcol-contrib_0.148.0_linux_amd64.deb
monitoring_otelcol_config_file: /etc/otelcol-contrib/config.yaml
monitoring_otelcol_grpc_port: "{{ hostvars[groups['proxmox_hosts'][0]].platform_port_assignments.monitoring_otlp_grpc_port }}"
monitoring_otelcol_http_port: "{{ hostvars[groups['proxmox_hosts'][0]].platform_port_assignments.monitoring_otlp_http_port }}"
monitoring_otelcol_health_port: 13133
monitoring_otelcol_metrics_port: 8888
monitoring_otel_resource_environment: lv3
monitoring_otel_resource_cluster: lv3
