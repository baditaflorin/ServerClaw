---
# Dependencies: ADR 0371.
- name: Verify the Ollama runtime health
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: ollama
    common_verify_port: "{{ ollama_runtime_port }}"
    common_verify_health_url: "{{ ollama_runtime_base_url }}/api/version"
    common_verify_health_retries: 12
    common_verify_health_delay: 5

- name: Verify the default Ollama model is available
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ ollama_runtime_container_name }}"
      - ollama
      - show
      - "{{ ollama_runtime_default_model }}"
  register: ollama_runtime_verify_model
  changed_when: false
