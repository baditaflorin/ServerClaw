---
argument_specs:
  main:
    short_description: Provision the PostgreSQL role and database required by Lago.
    options:
      lago_database_name:
        type: str
        required: true
      lago_database_user:
        type: str
        required: true
      lago_postgres_secret_dir:
        type: path
        required: true
      lago_postgres_password_file:
        type: path
        required: true
      lago_local_artifact_dir:
        type: path
        required: true
      lago_database_password_local_file:
        type: path
        required: true
