---
# Purpose: Provision the lago PostgreSQL database using the shared postgres_client role (ADR 0359).
# Use case: Called during lago deployment to ensure the database, role, extensions, and credentials exist.
# Inputs: lago_* variables from defaults/main.yml; resolves registry entry from platform_postgres_clients.
# Outputs: lago PostgreSQL role, database, extensions, and credential files converged on postgres.
# Idempotency: Yes; postgres_client role handles all idempotency.
# Dependencies: ADR 0359 postgres_client role, platform_postgres_clients registry.
- name: Provision the lago database via the shared postgres_client role
  ansible.builtin.include_role:
    name: lv3.platform.postgres_client
  vars:
    postgres_client_service: "{{ lago_database_name }}"
    postgres_client_database: "{{ lago_database_name }}"
    postgres_client_user: "{{ lago_database_user }}"
    postgres_client_password_local_file: "{{ lago_database_password_local_file }}"
    postgres_client_password_remote_dir: "{{ lago_postgres_secret_dir }}"
    postgres_client_password_remote_file: "{{ lago_postgres_password_file }}"
    postgres_client_role_options: "CREATEDB"
    postgres_client_extensions: "{{ lago_postgres_required_extensions }}"
    postgres_client_extension_packages: "{{ lago_postgres_extension_packages }}"
