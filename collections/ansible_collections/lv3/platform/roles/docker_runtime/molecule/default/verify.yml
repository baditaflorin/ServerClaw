---
- name: Verify docker_runtime on the ephemeral fixture
  hosts: all
  gather_facts: false
  tasks:
    - name: Verify docker is active
      ansible.builtin.command: systemctl is-active docker
      register: docker_service_state
      changed_when: false

    - name: Verify docker CLI responds
      ansible.builtin.command: docker info
      changed_when: false

    - name: Assert docker is active
      ansible.builtin.assert:
        that:
          - docker_service_state.stdout == "active"
