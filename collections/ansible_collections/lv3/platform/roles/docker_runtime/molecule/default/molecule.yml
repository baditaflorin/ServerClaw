---
dependency:
  name: galaxy
driver:
  name: delegated
platforms:
  - name: docker-runtime-fixture
provisioner:
  name: ansible
  env:
    MOLECULE_FIXTURE_NAME: docker-host
    MOLECULE_FIXTURE_SKIP_VERIFY: "1"
  inventory:
    links:
      hosts: "{{ lookup('env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/inventory.json"
  playbooks:
    create: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/molecule/drivers/proxmox-fixture/create.yml"
    destroy: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/molecule/drivers/proxmox-fixture/destroy.yml"
verifier:
  name: ansible
scenario:
  test_sequence:
    - create
    - converge
    - verify
    - destroy
