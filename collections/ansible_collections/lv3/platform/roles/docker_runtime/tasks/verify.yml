---
# Purpose: Verify that Docker is active, usable, and equipped with the publication assurance helper after convergence.
# Use case: Run from the docker_runtime role verification path and from service playbooks that depend on the shared Docker host.
#
# Inputs (required):
#   - docker_runtime_publication_assurance_script_path
#
# Inputs (optional):
#   - None beyond the docker_runtime role defaults and inventory overrides.
#
# Outputs:
#   - Verification evidence that Docker is active, responds on the control socket, and has the publication helper installed.
#
# Idempotency: Fully idempotent
#              These tasks perform read-only verification commands.
#
# Dependencies:
#   - ADR 0023: Docker runtime VM baseline.
#   - ADR 0270: Docker publication self-healing and port-programming assertions.
#   - Role: lv3.platform.docker_runtime - owns the managed Docker runtime state.
- name: Verify Docker service is active (systemd hosts only)
  ansible.builtin.command: systemctl is-active docker
  register: docker_runtime_service_status
  retries: 12
  delay: 5
  until: docker_runtime_service_status.stdout | trim == "active"
  changed_when: false
  failed_when: >-
    docker_runtime_service_status.rc not in [0, 3]
    or docker_runtime_service_status.stdout | trim not in ["active", "activating"]
  when: ansible_service_mgr == 'systemd'

- name: Verify Docker Engine responds on the local control socket
  ansible.builtin.command:
    argv:
      - docker
      - info
      - --format
      - "{{ '{{' }}.ServerVersion{{ '}}' }}"
  register: docker_runtime_info
  changed_when: false
  failed_when: docker_runtime_info.stdout | trim == ""
  when: ansible_service_mgr == 'systemd'

- name: Verify the Docker publication assurance helper is installed
  ansible.builtin.command:
    argv:
      - test
      - -x
      - "{{ docker_runtime_publication_assurance_script_path }}"
  changed_when: false
