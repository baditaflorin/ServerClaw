---
# Purpose: Install and configure Docker Engine, its network prerequisites, and the publication assurance helper on managed Debian guests.
# Use case: Run from the docker_runtime role during converge of the shared Docker hosts.
#
# Inputs (required):
#   - docker_runtime_prereq_packages, docker_runtime_conflicting_packages, docker_runtime_engine_packages
#   - docker_runtime_admin_users, docker_runtime_apt_key_url, docker_runtime_apt_keyring_path
#   - docker_runtime_apt_repo_file, docker_runtime_apt_repo_uri
#
# Inputs (optional):
#   - docker_runtime_* overrides for daemon config, public-edge aliases, bridge-chain checks, and helper install path.
#
# Outputs:
#   - Docker Engine installed, configured, and prepared for bridge/NAT recovery and service publication verification.
#
# Idempotency: Fully idempotent
#              Package, file, and service tasks reconcile managed state and only change the host when drift exists.
#
# Dependencies:
#   - ADR 0023: Docker runtime VM baseline.
#   - ADR 0270: Docker publication self-healing and port-programming assertions.
#   - Role: lv3.platform.common - shared assertion, directory, and bridge-chain helpers.
- name: Validate Docker runtime inputs
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: assert_vars
  vars:
    common_assert_vars_required:
      - docker_runtime_prereq_packages
      - docker_runtime_conflicting_packages
      - docker_runtime_engine_packages
      - docker_runtime_admin_users
      - docker_runtime_apt_key_url
      - docker_runtime_apt_keyring_path
      - docker_runtime_apt_repo_file
      - docker_runtime_apt_repo_uri
    common_assert_vars_fail_msg: "docker_runtime requires package, repository, and admin user inputs."

- name: Install Docker repository prerequisites
  ansible.builtin.apt:
    name: "{{ docker_runtime_prereq_packages }}"
    state: present
    update_cache: true
    lock_timeout: "{{ docker_runtime_apt_lock_timeout }}"
    force_apt_get: true

- name: Ensure Docker-managed directories exist
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: directory_tree
  vars:
    common_directory_tree_paths:
      - /etc/apt/keyrings
      - /etc/docker

- name: Download Docker apt key
  ansible.builtin.get_url:
    url: "{{ docker_runtime_apt_key_url }}"
    dest: "{{ docker_runtime_apt_keyring_path }}"
    mode: "0644"

- name: Configure Docker apt repository
  ansible.builtin.template:
    src: docker.sources.j2
    dest: "{{ docker_runtime_apt_repo_file }}"
    mode: "0644"

- name: Remove conflicting Docker packages
  ansible.builtin.apt:
    name: "{{ docker_runtime_conflicting_packages }}"
    state: absent
    lock_timeout: "{{ docker_runtime_apt_lock_timeout }}"

- name: Install Docker runtime packages
  ansible.builtin.apt:
    name: "{{ docker_runtime_engine_packages }}"
    state: present
    update_cache: true
    lock_timeout: "{{ docker_runtime_apt_lock_timeout }}"
    force_apt_get: true

- name: Ensure docker admin group exists
  ansible.builtin.group:
    name: docker
    state: present

- name: Grant operator access to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_runtime_admin_users }}"

- name: Pin public edge hostnames to the internal edge for Docker guests
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^\s*\d+\.\d+\.\d+\.\d+\s+{{ item | regex_escape() }}(?:\s|$)'
    line: "{{ docker_runtime_public_edge_ipv4 }} {{ item }}"
    state: present
  loop: "{{ docker_runtime_public_edge_host_aliases | default([]) }}"
  when:
    - docker_runtime_public_edge_ipv4 | default('') | length > 0
    - item | length > 0

- name: Check whether the current Docker daemon config exists
  ansible.builtin.stat:
    path: /etc/docker/daemon.json
  register: docker_runtime_daemon_config_stat

- name: Read the current Docker daemon config
  ansible.builtin.slurp:
    src: /etc/docker/daemon.json
  register: docker_runtime_daemon_config_raw
  when: docker_runtime_daemon_config_stat.stat.exists

- name: Record whether Docker currently has live-restore enabled
  ansible.builtin.set_fact:
    docker_runtime_previous_live_restore_enabled: >-
      {{
        (
          (
            (docker_runtime_daemon_config_raw.content | default('e30='))
            | b64decode
            | from_json
          ).get('live-restore', false)
        ) | bool
      }}

- name: Render Docker daemon configuration
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    mode: "0644"
  register: docker_runtime_daemon_config_render
  notify: Restart Docker

- name: Install the Docker publication assurance helper
  ansible.builtin.copy:
    content: "{{ lookup('ansible.builtin.file', docker_runtime_publication_assurance_script_src) }}"
    dest: "{{ docker_runtime_publication_assurance_script_path }}"
    owner: root
    group: root
    mode: "0755"

- name: Check whether nftables config exists
  ansible.builtin.stat:
    path: "{{ docker_runtime_nftables_config_file }}"
  register: docker_runtime_nftables_config_stat
  when: docker_runtime_container_forward_compat_enabled | bool

- name: Read the existing nftables config
  ansible.builtin.slurp:
    src: "{{ docker_runtime_nftables_config_file }}"
  register: docker_runtime_nftables_config_raw
  when:
    - docker_runtime_container_forward_compat_enabled | bool
    - docker_runtime_nftables_config_stat.stat.exists

- name: Build the Docker bridge forward-compat rule block
  ansible.builtin.set_fact:
    docker_runtime_container_forward_rule_lines: "{{ docker_runtime_container_forward_source_cidrs | map('regex_replace', '^(.*)$', 'ip saddr \\1 accept') | list }}"
    docker_runtime_container_forward_rule_block: "{{ docker_runtime_container_forward_source_cidrs | map('regex_replace', '^(.*)$', 'ip saddr \\1 accept') | join('\n') }}"
    docker_runtime_nftables_config_current: "{{ docker_runtime_nftables_config_raw.content | b64decode }}"
  when:
    - docker_runtime_container_forward_compat_enabled | bool
    - docker_runtime_nftables_config_stat.stat.exists

- name: Patch nftables forward policy for Docker bridge egress
  ansible.builtin.lineinfile:
    path: "{{ docker_runtime_nftables_config_file }}"
    line: "    ip saddr {{ item }} accept"
    insertafter: '^\s*ct state (established,related|related,established) accept$'
  loop: "{{ docker_runtime_container_forward_source_cidrs | reverse | list }}"
  when:
    - docker_runtime_container_forward_compat_enabled | bool
    - docker_runtime_nftables_config_stat.stat.exists
    - ("ip saddr " ~ item ~ " accept") not in docker_runtime_nftables_config_current
  register: docker_runtime_nftables_forward_patch

- name: Read the nftables config after forward compatibility patch
  ansible.builtin.slurp:
    src: "{{ docker_runtime_nftables_config_file }}"
  register: docker_runtime_nftables_config_after
  when:
    - docker_runtime_container_forward_compat_enabled | bool
    - docker_runtime_nftables_config_stat.stat.exists

- name: Assert the Docker bridge forward-compat rule is present
  ansible.builtin.assert:
    that:
      - ("ip saddr " ~ item ~ " accept") in (docker_runtime_nftables_config_after.content | b64decode)
    fail_msg: >-
      Existing nftables config did not accept the Docker bridge forward-compat rule for {{ item }};
      update {{ docker_runtime_nftables_config_file }} before rerunning the Docker runtime converge.
  loop: "{{ docker_runtime_container_forward_source_cidrs }}"
  when:
    - docker_runtime_container_forward_compat_enabled | bool
    - docker_runtime_nftables_config_stat.stat.exists

- name: Read the live nftables forward chain
  ansible.builtin.command: nft list chain inet filter forward
  register: docker_runtime_nftables_forward_chain_live
  changed_when: false
  failed_when: false
  when:
    - docker_runtime_container_forward_compat_enabled | bool
    - docker_runtime_nftables_config_stat.stat.exists

- name: Apply Docker bridge forward-compat rules live without reloading nftables
  ansible.builtin.command:
    argv:
      - nft
      - add
      - rule
      - inet
      - filter
      - forward
      - ip
      - saddr
      - "{{ item }}"
      - accept
  loop: "{{ docker_runtime_container_forward_source_cidrs }}"
  register: docker_runtime_nftables_forward_live_patch
  changed_when: true
  when:
    - docker_runtime_container_forward_compat_enabled | bool
    - docker_runtime_nftables_config_stat.stat.exists
    - ("ip saddr " ~ item ~ " accept") not in (docker_runtime_nftables_forward_chain_live.stdout | default(''))

- name: Read the live nftables forward chain after incremental patch
  ansible.builtin.command: nft list chain inet filter forward
  register: docker_runtime_nftables_forward_chain_after
  changed_when: false
  when:
    - docker_runtime_container_forward_compat_enabled | bool
    - docker_runtime_nftables_config_stat.stat.exists

- name: Assert the live Docker bridge forward-compat rules are present
  ansible.builtin.assert:
    that:
      - ("ip saddr " ~ item ~ " accept") in docker_runtime_nftables_forward_chain_after.stdout
    fail_msg: >-
      The live nftables forward chain is missing the Docker bridge forward-compat rule for {{ item }};
      apply the rule set manually before rerunning the Docker runtime converge.
  loop: "{{ docker_runtime_container_forward_source_cidrs }}"
  when:
    - docker_runtime_container_forward_compat_enabled | bool
    - docker_runtime_nftables_config_stat.stat.exists

- name: Ensure Docker service is enabled and running
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: systemd_unit
  vars:
    common_systemd_unit_name: docker

- name: Record container ids that are running before Docker restarts
  ansible.builtin.command:
    argv:
      - docker
      - ps
      - -q
      - --no-trunc
  register: docker_runtime_pre_restart_container_ids
  changed_when: false

- name: Inspect running containers before Docker restarts
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json
        import subprocess
        import sys

        container_ids = json.load(sys.stdin)
        inspected = []

        for container_id in container_ids:
            result = subprocess.run(
                ["docker", "inspect", container_id],
                text=True,
                capture_output=True,
            )
            if result.returncode == 0:
                inspected.extend(json.loads(result.stdout or "[]"))
                continue

            stderr = (result.stderr or "").lower()
            if "no such object" in stderr:
                continue

            raise subprocess.CalledProcessError(
                result.returncode,
                result.args,
                output=result.stdout,
                stderr=result.stderr,
            )

        print(json.dumps(inspected))
    stdin: "{{ docker_runtime_pre_restart_container_ids.stdout_lines | to_json }}"
  register: docker_runtime_pre_restart_container_inspect
  changed_when: false
  when: docker_runtime_pre_restart_container_ids.stdout_lines | length > 0

- name: Record containers that were running before Docker restarts
  ansible.builtin.set_fact:
    docker_runtime_pre_restart_container_details: >-
      {{
        (docker_runtime_pre_restart_container_inspect.stdout | default('[]')) | from_json
      }}
    docker_runtime_pre_restart_container_names: >-
      {{
        (
          (docker_runtime_pre_restart_container_inspect.stdout | default('[]')) | from_json
        )
        | map(attribute='Name')
        | map('regex_replace', '^/', '')
        | list
      }}

- name: Flush Docker handlers before chain health checks
  ansible.builtin.meta: flush_handlers

- name: Reset Docker failed state before nat-chain recovery restart
  ansible.builtin.command: systemctl reset-failed docker.service
  changed_when: false
  when: docker_runtime_require_nat_chain | bool

- name: Ensure Docker bridge networking chains are present
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: docker_bridge_chains
  vars:
    common_docker_bridge_chains_service_name: docker
    common_docker_bridge_chains_require_nat_chain: "{{ docker_runtime_require_nat_chain }}"
    common_docker_bridge_chains_retries: "{{ docker_runtime_chain_recheck_retries }}"
    common_docker_bridge_chains_delay: "{{ docker_runtime_chain_recheck_delay_seconds }}"

- name: Re-inspect pre-restart containers after Docker restarts
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json
        import subprocess
        import sys

        container_names = json.load(sys.stdin)
        statuses = []

        for container_name in container_names:
            result = subprocess.run(
                ["docker", "inspect", container_name],
                text=True,
                capture_output=True,
            )
            if result.returncode == 0:
                payload = json.loads(result.stdout or "[]")
                container = payload[0] if payload else {}
                statuses.append(
                    {
                        "requested_name": container_name,
                        "full_name": container.get("Name") or f"/{container_name}",
                        "exists": True,
                        "running": bool(container.get("State", {}).get("Running")),
                    }
                )
                continue

            stderr = (result.stderr or "").lower()
            if "no such object" in stderr:
                statuses.append(
                    {
                        "requested_name": container_name,
                        "full_name": f"/{container_name}",
                        "exists": False,
                        "running": False,
                    }
                )
                continue

            raise subprocess.CalledProcessError(
                result.returncode,
                result.args,
                output=result.stdout,
                stderr=result.stderr,
            )

        print(json.dumps(statuses))
    stdin: "{{ docker_runtime_pre_restart_container_names | default([]) | to_json }}"
  register: docker_runtime_post_restart_container_status
  changed_when: false
  when: docker_runtime_pre_restart_container_names | default([]) | length > 0

- name: Record pre-restart containers that remained stopped after Docker restarts
  ansible.builtin.set_fact:
    docker_runtime_stopped_pre_restart_container_details: >-
      {{
        (
          docker_runtime_pre_restart_container_details | default([])
        )
        | rejectattr(
            'Name',
            'in',
            (
              (
                docker_runtime_post_restart_container_status.stdout | default('[]')
              )
              | from_json
              | selectattr('exists')
              | selectattr('running')
              | map(attribute='full_name')
              | list
            )
          )
        | list
      }}
    docker_runtime_stopped_pre_restart_container_names: >-
      {{
        (
          (
            docker_runtime_pre_restart_container_details | default([])
          )
          | rejectattr(
              'Name',
              'in',
              (
                (
                  docker_runtime_post_restart_container_status.stdout | default('[]')
                )
                | from_json
                | selectattr('exists')
                | selectattr('running')
                | map(attribute='full_name')
                | list
              )
            )
          | list
        )
        | map(attribute='Name')
        | map('regex_replace', '^/', '')
        | list
      }}

- name: Record whether stopped containers require the local OpenBao runtime
  ansible.builtin.set_fact:
    docker_runtime_stopped_pre_restart_requires_local_openbao: >-
      {{
        '"openbao-agent"' in (
          (docker_runtime_stopped_pre_restart_container_details | default([])) | to_json
        )
      }}
  when: docker_runtime_stopped_pre_restart_container_names | default([]) | length > 0

- name: Recover the local OpenBao runtime before restarting OpenBao-backed containers
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: ensure_local_openbao_runtime
  vars:
    common_local_openbao_runtime_consumer_name: docker-runtime stopped container recovery
  when:
    - docker_runtime_stopped_pre_restart_container_names | default([]) | length > 0
    - docker_runtime_stopped_pre_restart_requires_local_openbao | default(false) | bool

- name: Record whether Docker recovery needs the local OpenBao API unsealed
  ansible.builtin.set_fact:
    docker_runtime_recovery_requires_openbao_unseal: false

- name: Flag OpenBao-backed compose services before Docker container recovery
  ansible.builtin.set_fact:
    docker_runtime_recovery_requires_openbao_unseal: true
  loop: "{{ docker_runtime_stopped_pre_restart_container_details | default([]) }}"
  when:
    - item.Config is defined
    - item.Config.Labels is defined
    - (item.Config.Labels['com.docker.compose.service'] | default('')) == 'openbao-agent'

- name: Load the OpenBao init payload before Docker container recovery touches OpenBao-backed services
  ansible.builtin.set_fact:
    docker_runtime_openbao_init_payload: "{{ lookup('ansible.builtin.file', openbao_init_local_file) | from_json }}"
  no_log: true
  when: docker_runtime_recovery_requires_openbao_unseal | bool

- name: Ensure the local OpenBao API is unsealed before Docker container recovery touches OpenBao-backed services
  ansible.builtin.include_role:
    name: lv3.platform.openbao_runtime
    tasks_from: ensure_unsealed
  vars:
    openbao_unseal_context: Docker container recovery after Docker restarts
    openbao_unseal_init_payload: "{{ docker_runtime_openbao_init_payload }}"
  no_log: true
  when: docker_runtime_recovery_requires_openbao_unseal | bool

- name: Recover pre-restart containers that remained stopped after Docker restarts
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json
        import subprocess
        import sys
        import time
        import urllib.error
        import urllib.request

        TRANSIENT_DOCKER_NETWORK_ERRORS = (
            "No chain/target/match by that name",
            "driver failed programming external connectivity",
        )
        STALE_COMPOSE_ENDPOINT_ERRORS = (
            "failed to create endpoint",
            "does not exist",
        )
        OPENBAO_HEALTH_URL = "http://127.0.0.1:8201/v1/sys/health"
        OPENBAO_SEAL_STATUS_URL = "http://127.0.0.1:8201/v1/sys/seal-status"
        OPENBAO_UNSEAL_URL = "http://127.0.0.1:8201/v1/sys/unseal"
        OPENBAO_READY_STATUS_CODES = {200, 429, 472, 473, 501, 503}
        OPENBAO_UNSEAL_KEYS = {{
            (
              (
                lookup('ansible.builtin.file', openbao_init_local_file, errors='ignore')
                | default('{}', true)
              )
              | from_json
            ).keys_base64 | default([], true) | to_json
        }}
        OPENBAO_RECOVERY_TIMEOUT_SECONDS = {{ docker_runtime_openbao_recovery_timeout_seconds | int }}
        OPENBAO_RECOVERY_DELAY_SECONDS = {{ docker_runtime_openbao_recovery_delay_seconds | int }}


        def combined_output(stdout, stderr):
            parts = []
            if stderr:
                parts.append(stderr)
            if stdout:
                parts.append(stdout)
            return "\n".join(part for part in parts if part)


        def exception_output(exc):
            return combined_output(getattr(exc, "output", ""), getattr(exc, "stderr", ""))


        def run_with_retry(command, cwd=None, attempts=3, delay_seconds=3, retry_on_any_error=False):
            for attempt in range(1, attempts + 1):
                result = subprocess.run(command, cwd=cwd, text=True, capture_output=True)
                if result.returncode == 0:
                    return

                output = combined_output(result.stdout or "", result.stderr or "")
                retryable = retry_on_any_error or any(
                    marker in output for marker in TRANSIENT_DOCKER_NETWORK_ERRORS
                )
                if (
                    attempt == attempts
                    or not retryable
                ):
                    raise subprocess.CalledProcessError(
                        result.returncode,
                        command,
                        output=result.stdout,
                        stderr=output,
                    )

                time.sleep(delay_seconds)

        def read_openbao_json(url):
            request = urllib.request.Request(url, method="GET")
            try:
                with urllib.request.urlopen(request, timeout=5) as response:
                    payload = response.read().decode()
                    return response.status, json.loads(payload or "{}")
            except urllib.error.HTTPError as exc:
                payload = exc.read().decode()
                return exc.code, json.loads(payload or "{}")

        def submit_local_openbao_unseal_key(key):
            request = urllib.request.Request(
                OPENBAO_UNSEAL_URL,
                data=json.dumps({"key": key}).encode(),
                headers={"Content-Type": "application/json"},
                method="POST",
            )
            with urllib.request.urlopen(request, timeout=5) as response:
                payload = response.read().decode()
                return response.status, json.loads(payload or "{}")


        def ensure_local_openbao_unsealed():
            if not OPENBAO_UNSEAL_KEYS:
                raise RuntimeError(
                    "local OpenBao is sealed after a Docker restart, but no recovery keys are available"
                )

            seal_status, seal_payload = read_openbao_json(OPENBAO_SEAL_STATUS_URL)
            if seal_status == 200 and not seal_payload.get("sealed", True):
                return False

            if seal_status not in {200, 503}:
                raise RuntimeError(
                    f"unexpected OpenBao seal-status response before recovery: HTTP {seal_status}"
                )

            for unseal_key in OPENBAO_UNSEAL_KEYS:
                unseal_status, unseal_payload = submit_local_openbao_unseal_key(unseal_key)
                if unseal_status != 200:
                    raise RuntimeError(
                        f"OpenBao unseal request failed with HTTP {unseal_status}"
                    )
                if not unseal_payload.get("sealed", True):
                    return True

            seal_status, seal_payload = read_openbao_json(OPENBAO_SEAL_STATUS_URL)
            if seal_status == 200 and not seal_payload.get("sealed", True):
                return True

            raise RuntimeError("local OpenBao remained sealed after submitting recovery keys")


        def wait_for_local_openbao(
            *,
            timeout_seconds=OPENBAO_RECOVERY_TIMEOUT_SECONDS,
            delay_seconds=OPENBAO_RECOVERY_DELAY_SECONDS,
        ):
            deadline = time.monotonic() + timeout_seconds
            last_error = ""
            while time.monotonic() < deadline:
                try:
                    seal_status, seal_payload = read_openbao_json(OPENBAO_SEAL_STATUS_URL)
                    if seal_status == 200 and seal_payload.get("sealed", False):
                        ensure_local_openbao_unsealed()

                    with urllib.request.urlopen(OPENBAO_HEALTH_URL, timeout=5) as response:
                        if response.status in OPENBAO_READY_STATUS_CODES:
                            return
                        last_error = f"unexpected HTTP {response.status}"
                except urllib.error.HTTPError as exc:
                    if exc.code in OPENBAO_READY_STATUS_CODES:
                        return
                    last_error = f"HTTP {exc.code}"
                except OSError as exc:
                    last_error = str(exc)
                time.sleep(delay_seconds)

            raise RuntimeError(
                f"local OpenBao did not become ready at {OPENBAO_HEALTH_URL}: {last_error or 'timed out'}"
            )

        def services_need_local_openbao(services):
            return any(
                service == "openbao-agent" or service.endswith("-openbao-agent")
                for service in services
            )


        def services_provide_local_openbao(services):
            return any(service == "openbao" for service in services)

        def compose_group_sort_key(item):
            (working_dir, config_files), compose_group = item
            services = compose_group["services"]
            if services_provide_local_openbao(services):
                priority = 0
            elif services_need_local_openbao(services):
                priority = 2
            else:
                priority = 1
            return (priority, working_dir, config_files)

        containers = json.load(sys.stdin)

        direct_start = []
        openbao_direct_start = []
        compose_groups = {}

        for container in containers:
            name = (container.get("Name") or "").lstrip("/")
            labels = container.get("Config", {}).get("Labels") or {}
            working_dir = labels.get("com.docker.compose.project.working_dir") or ""
            config_files = labels.get("com.docker.compose.project.config_files") or ""
            service = labels.get("com.docker.compose.service") or ""

            if working_dir and service:
                compose_group = compose_groups.setdefault(
                    (working_dir, config_files),
                    {"services": set(), "container_names": set()},
                )
                compose_group["services"].add(service)
                if name:
                    compose_group["container_names"].add(name)
                continue

            if name:
                if "openbao-agent" in name:
                    openbao_direct_start.append(name)
                else:
                    direct_start.append(name)

        actions = []

        if direct_start:
            run_with_retry(["docker", "start", *direct_start])
            actions.append({"type": "docker_start", "containers": direct_start})

        def is_local_openbao_group(working_dir, config_files, services, container_names):
            normalized_working_dir = (working_dir or "").rstrip("/")
            config_file_list = [value for value in config_files.split(",") if value]
            return (
                normalized_working_dir == "/opt/openbao"
                or any(
                    config_file.rstrip("/") == "/opt/openbao/docker-compose.yml"
                    for config_file in config_file_list
                )
                or "openbao" in services
                or "lv3-openbao" in container_names
            )

        def compose_group_recovery_sort_key(item):
            (working_dir, config_files), compose_group = item
            if is_local_openbao_group(
                working_dir,
                config_files,
                compose_group["services"],
                compose_group["container_names"],
            ):
                return (0, working_dir, config_files)
            return compose_group_sort_key(item)

        for (working_dir, config_files), compose_group in sorted(
            compose_groups.items(),
            key=compose_group_recovery_sort_key,
        ):
            command = ["docker", "compose"]
            config_file_list = [value for value in config_files.split(",") if value]
            for config_file in config_file_list:
                command.extend(["--file", config_file])
            services = sorted(compose_group["services"])
            container_names = sorted(compose_group["container_names"])
            local_openbao_group = is_local_openbao_group(
                working_dir,
                config_files,
                services,
                container_names,
            )
            if services_need_local_openbao(services) and not local_openbao_group:
                wait_for_local_openbao()
            command.extend(["up", "-d", "--force-recreate", *services])

            try:
                run_with_retry(
                    command,
                    cwd=working_dir or None,
                    attempts=5,
                    delay_seconds=5,
                    retry_on_any_error=True,
                )
                actions.append(
                    {
                        "type": "docker_compose_up",
                        "working_dir": working_dir,
                        "config_files": config_file_list,
                        "services": services,
                    }
                )
            except subprocess.CalledProcessError as exc:
                stderr = exception_output(exc)
                if not (
                    container_names
                    and all(marker in stderr for marker in STALE_COMPOSE_ENDPOINT_ERRORS)
                ):
                    raise

                remove_command = ["docker", "rm", "-f", *container_names]
                remove_result = subprocess.run(remove_command, text=True, capture_output=True)
                if remove_result.returncode != 0 and "No such container" not in (remove_result.stderr or ""):
                    raise subprocess.CalledProcessError(
                        remove_result.returncode,
                        remove_command,
                        output=remove_result.stdout,
                        stderr=remove_result.stderr,
                    ) from exc
                actions.append(
                    {
                        "type": "docker_rm_stale_compose_containers",
                        "working_dir": working_dir,
                        "config_files": config_file_list,
                        "containers": container_names,
                    }
                )

                recovery_command = ["docker", "compose"]
                for config_file in config_file_list:
                    recovery_command.extend(["--file", config_file])
                if services_need_local_openbao(services) and not local_openbao_group:
                    wait_for_local_openbao()
                recovery_command.extend(["up", "-d", "--force-recreate", *services])
                try:
                    run_with_retry(
                        recovery_command,
                        cwd=working_dir or None,
                        attempts=5,
                        delay_seconds=5,
                        retry_on_any_error=True,
                    )
                    actions.append(
                        {
                            "type": "docker_compose_up_force_recreate",
                            "working_dir": working_dir,
                            "config_files": config_file_list,
                            "services": services,
                        }
                    )
                    continue
                except subprocess.CalledProcessError as recovery_exc:
                    recovery_stderr = exception_output(recovery_exc)
                    if not all(marker in recovery_stderr for marker in STALE_COMPOSE_ENDPOINT_ERRORS):
                        raise

                down_command = ["docker", "compose"]
                for config_file in config_file_list:
                    down_command.extend(["--file", config_file])
                down_command.extend(["down", "--remove-orphans"])
                run_with_retry(down_command, cwd=working_dir or None)
                actions.append(
                    {
                        "type": "docker_compose_down_remove_orphans",
                        "working_dir": working_dir,
                        "config_files": config_file_list,
                        "services": services,
                    }
                )

                final_up_command = ["docker", "compose"]
                for config_file in config_file_list:
                    final_up_command.extend(["--file", config_file])
                if services_need_local_openbao(services) and not local_openbao_group:
                    wait_for_local_openbao()
                final_up_command.extend(["up", "-d", *services])
                run_with_retry(
                    final_up_command,
                    cwd=working_dir or None,
                    attempts=5,
                    delay_seconds=5,
                    retry_on_any_error=True,
                )
                actions.append(
                    {
                        "type": "docker_compose_up_after_down",
                        "working_dir": working_dir,
                        "config_files": config_file_list,
                        "services": services,
                    }
                )

        if openbao_direct_start:
            wait_for_local_openbao()
            run_with_retry(["docker", "start", *openbao_direct_start])
            actions.append(
                {
                    "type": "docker_start_openbao_agents",
                    "containers": openbao_direct_start,
                }
            )
    stdin: >-
      {{
        (docker_runtime_stopped_pre_restart_container_details | default([])) | to_json
      }}
  register: docker_runtime_recover_stopped_containers
  changed_when: docker_runtime_stopped_pre_restart_container_names | length > 0
  when: docker_runtime_stopped_pre_restart_container_names | default([]) | length > 0

- name: Confirm pre-restart containers recovered after Docker restarts
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json
        import subprocess
        import sys

        NONPERSISTENT_RESTART_POLICIES = set({{ docker_runtime_nonpersistent_restart_policies | to_json }})
        SUCCESSFUL_EXIT_RESTART_POLICIES = NONPERSISTENT_RESTART_POLICIES | {"on-failure"}

        containers = json.load(sys.stdin)
        statuses = []
        all_running = True

        for container in containers:
            container_name = (container.get("Name") or "").lstrip("/")
            restart_policy = (container.get("HostConfig") or {}).get("RestartPolicy") or {}
            restart_policy_name = str(restart_policy.get("Name") or "").strip().lower()
            require_running = restart_policy_name not in SUCCESSFUL_EXIT_RESTART_POLICIES
            result = subprocess.run(
                ["docker", "inspect", container_name],
                text=True,
                capture_output=True,
            )
            if result.returncode == 0:
                payload = json.loads(result.stdout or "[]")
                live_container = payload[0] if payload else {}
                state = live_container.get("State", {})
                running = bool(state.get("Running"))
                status = str(state.get("Status") or "")
                exit_code = state.get("ExitCode")
                healthy = running or (
                    restart_policy_name in SUCCESSFUL_EXIT_RESTART_POLICIES
                    and status == "exited"
                    and exit_code == 0
                )
                statuses.append(
                    {
                        "requested_name": container_name,
                        "full_name": live_container.get("Name") or f"/{container_name}",
                        "exists": True,
                        "restart_policy_name": restart_policy_name,
                        "require_running": require_running,
                        "running": running,
                        "status": status,
                        "exit_code": exit_code,
                        "healthy": healthy,
                    }
                )
                all_running = all_running and healthy
                continue

            stderr = (result.stderr or "").lower()
            if "no such object" in stderr:
                statuses.append(
                    {
                        "requested_name": container_name,
                        "full_name": f"/{container_name}",
                        "exists": False,
                        "restart_policy_name": restart_policy_name,
                        "require_running": require_running,
                        "running": False,
                        "status": "missing",
                        "exit_code": None,
                        "healthy": False,
                    }
                )
                all_running = False
                continue

            raise subprocess.CalledProcessError(
                result.returncode,
                result.args,
                output=result.stdout,
                stderr=result.stderr,
            )

        print(json.dumps(statuses))
        sys.exit(0 if all_running else 1)
    stdin: "{{ docker_runtime_pre_restart_container_details | default([]) | to_json }}"
  register: docker_runtime_recovered_container_inspect
  changed_when: false
  retries: "{{ docker_runtime_container_recovery_retries }}"
  delay: "{{ docker_runtime_container_recovery_delay_seconds }}"
  until: docker_runtime_recovered_container_inspect.rc == 0
  when: docker_runtime_pre_restart_container_details | default([]) | length > 0

- name: Verify Docker runtime health probes
  ansible.builtin.import_tasks: verify.yml
