---
- name: Validate Docker runtime inputs
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: assert_vars
  vars:
    common_assert_vars_required:
      - docker_runtime_prereq_packages
      - docker_runtime_conflicting_packages
      - docker_runtime_engine_packages
      - docker_runtime_admin_users
      - docker_runtime_apt_key_url
      - docker_runtime_apt_keyring_path
      - docker_runtime_apt_repo_file
      - docker_runtime_apt_repo_uri
    common_assert_vars_fail_msg: "docker_runtime requires package, repository, and admin user inputs."

- name: Install Docker repository prerequisites
  ansible.builtin.apt:
    name: "{{ docker_runtime_prereq_packages }}"
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure Docker-managed directories exist
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: directory_tree
  vars:
    common_directory_tree_paths:
      - /etc/apt/keyrings
      - /etc/docker

- name: Download Docker apt key
  ansible.builtin.get_url:
    url: "{{ docker_runtime_apt_key_url }}"
    dest: "{{ docker_runtime_apt_keyring_path }}"
    mode: "0644"

- name: Configure Docker apt repository
  ansible.builtin.template:
    src: docker.sources.j2
    dest: "{{ docker_runtime_apt_repo_file }}"
    mode: "0644"

- name: Remove conflicting Docker packages
  ansible.builtin.apt:
    name: "{{ docker_runtime_conflicting_packages }}"
    state: absent

- name: Install Docker runtime packages
  ansible.builtin.apt:
    name: "{{ docker_runtime_engine_packages }}"
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure docker admin group exists
  ansible.builtin.group:
    name: docker
    state: present

- name: Grant operator access to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_runtime_admin_users }}"

- name: Pin public edge hostnames to the internal edge for Docker guests
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^\s*\d+\.\d+\.\d+\.\d+\s+{{ item | regex_escape() }}(?:\s|$)'
    line: "{{ docker_runtime_public_edge_ipv4 }} {{ item }}"
    state: present
  loop: "{{ docker_runtime_public_edge_host_aliases | default([]) }}"
  when:
    - docker_runtime_public_edge_ipv4 | default('') | length > 0
    - item | length > 0

- name: Render Docker daemon configuration
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    mode: "0644"
  notify: Restart Docker

- name: Install the Docker publication assurance helper
  ansible.builtin.copy:
    content: "{{ lookup('ansible.builtin.file', (inventory_dir | dirname) ~ '/scripts/docker_publication_assurance.py') }}"
    dest: "{{ docker_runtime_publication_assurance_script_path }}"
    owner: root
    group: root
    mode: "0755"

- name: Check whether nftables config exists
  ansible.builtin.stat:
    path: "{{ docker_runtime_nftables_config_file }}"
  register: docker_runtime_nftables_config_stat
  when: docker_runtime_container_forward_compat_enabled | bool

- name: Read the existing nftables config
  ansible.builtin.slurp:
    src: "{{ docker_runtime_nftables_config_file }}"
  register: docker_runtime_nftables_config_raw
  when:
    - docker_runtime_container_forward_compat_enabled | bool
    - docker_runtime_nftables_config_stat.stat.exists

- name: Build the Docker bridge forward-compat rule block
  ansible.builtin.set_fact:
    docker_runtime_container_forward_rule_lines: "{{ docker_runtime_container_forward_source_cidrs | map('regex_replace', '^(.*)$', 'ip saddr \\1 accept') | list }}"
    docker_runtime_container_forward_rule_block: "{{ docker_runtime_container_forward_source_cidrs | map('regex_replace', '^(.*)$', 'ip saddr \\1 accept') | join('\n') }}"
    docker_runtime_nftables_config_current: "{{ docker_runtime_nftables_config_raw.content | b64decode }}"
  when:
    - docker_runtime_container_forward_compat_enabled | bool
    - docker_runtime_nftables_config_stat.stat.exists

- name: Patch nftables forward policy for Docker bridge egress
  ansible.builtin.lineinfile:
    path: "{{ docker_runtime_nftables_config_file }}"
    line: "    {{ docker_runtime_container_forward_rule_block }}"
    insertafter: '^\s*ct state established,related accept$'
  when:
    - docker_runtime_container_forward_compat_enabled | bool
    - docker_runtime_nftables_config_stat.stat.exists
    - docker_runtime_container_forward_rule_block | trim not in docker_runtime_nftables_config_current
  register: docker_runtime_nftables_forward_patch

- name: Read the nftables config after forward compatibility patch
  ansible.builtin.slurp:
    src: "{{ docker_runtime_nftables_config_file }}"
  register: docker_runtime_nftables_config_after
  when:
    - docker_runtime_container_forward_compat_enabled | bool
    - docker_runtime_nftables_config_stat.stat.exists

- name: Assert the Docker bridge forward-compat rule is present
  ansible.builtin.assert:
    that:
      - docker_runtime_container_forward_rule_block | trim in (docker_runtime_nftables_config_after.content | b64decode)
    fail_msg: >-
      Existing nftables config did not accept the Docker bridge forward-compat patch; update
      {{ docker_runtime_nftables_config_file }} before rerunning the Docker runtime converge.
  when:
    - docker_runtime_container_forward_compat_enabled | bool
    - docker_runtime_nftables_config_stat.stat.exists

- name: Read the live nftables forward chain
  ansible.builtin.command: nft list chain inet filter forward
  register: docker_runtime_nftables_forward_chain_live
  changed_when: false
  failed_when: false
  when:
    - docker_runtime_container_forward_compat_enabled | bool
    - docker_runtime_nftables_config_stat.stat.exists

- name: Apply Docker bridge forward-compat rules live without reloading nftables
  ansible.builtin.command:
    argv:
      - nft
      - add
      - rule
      - inet
      - filter
      - forward
      - ip
      - saddr
      - "{{ item }}"
      - accept
  loop: "{{ docker_runtime_container_forward_source_cidrs }}"
  register: docker_runtime_nftables_forward_live_patch
  changed_when: true
  when:
    - docker_runtime_container_forward_compat_enabled | bool
    - docker_runtime_nftables_config_stat.stat.exists
    - ("ip saddr " ~ item ~ " accept") not in (docker_runtime_nftables_forward_chain_live.stdout | default(''))

- name: Read the live nftables forward chain after incremental patch
  ansible.builtin.command: nft list chain inet filter forward
  register: docker_runtime_nftables_forward_chain_after
  changed_when: false
  when:
    - docker_runtime_container_forward_compat_enabled | bool
    - docker_runtime_nftables_config_stat.stat.exists

- name: Assert the live Docker bridge forward-compat rules are present
  ansible.builtin.assert:
    that:
      - ("ip saddr " ~ item ~ " accept") in docker_runtime_nftables_forward_chain_after.stdout
    fail_msg: >-
      The live nftables forward chain is missing the Docker bridge forward-compat rule for {{ item }};
      apply the rule set manually before rerunning the Docker runtime converge.
  loop: "{{ docker_runtime_container_forward_source_cidrs }}"
  when:
    - docker_runtime_container_forward_compat_enabled | bool
    - docker_runtime_nftables_config_stat.stat.exists

- name: Ensure Docker service is enabled and running
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: systemd_unit
  vars:
    common_systemd_unit_name: docker

- name: Flush Docker handlers before chain health checks
  ansible.builtin.meta: flush_handlers

- name: Warm the Docker control socket before chain health checks
  ansible.builtin.command:
    argv:
      - docker
      - info
      - --format
      - "{{ '{{.ServerVersion}}' }}"
  register: docker_runtime_info_ready
  changed_when: false
  retries: "{{ docker_runtime_chain_recheck_retries }}"
  delay: "{{ docker_runtime_chain_recheck_delay_seconds }}"
  until: docker_runtime_info_ready.rc == 0

- name: Check whether Docker nat chain exists
  ansible.builtin.command: iptables -t nat -S DOCKER
  register: docker_runtime_nat_chain_check
  changed_when: false
  failed_when: docker_runtime_nat_chain_check.rc not in [0, 1]
  when: docker_runtime_require_nat_chain | bool

- name: Check whether Docker forward chain exists
  ansible.builtin.command: iptables -t filter -S DOCKER-FORWARD
  register: docker_runtime_forward_chain_check
  changed_when: false
  failed_when: docker_runtime_forward_chain_check.rc not in [0, 1]
  when: docker_runtime_require_nat_chain | bool

- name: Wait briefly for Docker chains to recover after daemon activation
  ansible.builtin.shell: |
    set -euo pipefail
    for _ in $(seq 1 {{ docker_runtime_chain_recheck_retries }}); do
      if iptables -t nat -S DOCKER >/dev/null 2>&1 && iptables -t filter -S DOCKER-FORWARD >/dev/null 2>&1; then
        exit 0
      fi
      sleep {{ docker_runtime_chain_recheck_delay_seconds }}
    done
    exit 1
  args:
    executable: /bin/bash
  register: docker_runtime_chain_warmup
  changed_when: false
  failed_when: false
  when:
    - docker_runtime_require_nat_chain | bool
    - docker_runtime_nat_chain_check.rc == 1 or docker_runtime_forward_chain_check.rc == 1

- name: Restart Docker when required chains are missing
  ansible.builtin.systemd:
    name: docker
    state: restarted
  when:
    - docker_runtime_require_nat_chain | bool
    - docker_runtime_nat_chain_check.rc == 1 or docker_runtime_forward_chain_check.rc == 1
    - docker_runtime_chain_warmup is not defined or docker_runtime_chain_warmup.rc != 0

- name: Recheck Docker nat chain after restart
  ansible.builtin.command: iptables -t nat -S DOCKER
  register: docker_runtime_nat_chain_recheck
  changed_when: false
  failed_when: docker_runtime_nat_chain_recheck.rc not in [0, 1]
  retries: "{{ docker_runtime_chain_recheck_retries }}"
  delay: "{{ docker_runtime_chain_recheck_delay_seconds }}"
  until: docker_runtime_nat_chain_recheck.rc == 0
  when: docker_runtime_require_nat_chain | bool

- name: Recheck Docker forward chain after restart
  ansible.builtin.command: iptables -t filter -S DOCKER-FORWARD
  register: docker_runtime_forward_chain_recheck
  changed_when: false
  failed_when: docker_runtime_forward_chain_recheck.rc not in [0, 1]
  retries: "{{ docker_runtime_chain_recheck_retries }}"
  delay: "{{ docker_runtime_chain_recheck_delay_seconds }}"
  until: docker_runtime_forward_chain_recheck.rc == 0
  when: docker_runtime_require_nat_chain | bool

- name: Assert Docker nat chain is present
  ansible.builtin.command: iptables -t nat -S DOCKER
  register: docker_runtime_nat_chain_assert
  changed_when: false
  failed_when: docker_runtime_nat_chain_assert.rc != 0
  retries: 3
  delay: 1
  until: docker_runtime_nat_chain_assert.rc == 0
  when: docker_runtime_require_nat_chain | bool

- name: Assert Docker filter forward chain is present
  ansible.builtin.command: iptables -t filter -S DOCKER-FORWARD
  register: docker_runtime_forward_chain_assert
  changed_when: false
  failed_when: docker_runtime_forward_chain_assert.rc != 0
  retries: 3
  delay: 1
  until: docker_runtime_forward_chain_assert.rc == 0
  when: docker_runtime_require_nat_chain | bool

- name: Verify Docker runtime health probes
  ansible.builtin.import_tasks: verify.yml
