---
- name: Validate Plane PostgreSQL inputs
  ansible.builtin.assert:
    that:
      - plane_database_name | length > 0
      - plane_database_user | length > 0
      - plane_database_support_role | length > 0
      - plane_postgres_secret_dir | length > 0
      - plane_postgres_password_file | length > 0
      - plane_database_password_local_file | length > 0
    fail_msg: "plane_postgres requires database names and password paths."

- name: Ensure the Plane PostgreSQL secret directory exists
  ansible.builtin.file:
    path: "{{ plane_postgres_secret_dir }}"
    state: directory
    owner: root
    group: postgres
    mode: "0750"

- name: Ensure the local Plane artifact directory exists
  ansible.builtin.file:
    path: "{{ plane_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate the Plane database password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ plane_database_password_local_file }}" ]; then
      umask 077
      openssl rand -base64 24 | tr -d '\n' > "{{ plane_database_password_local_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: plane_postgres_password_generation
  changed_when: "'changed' in plane_postgres_password_generation.stdout"
  no_log: true

- name: Read the Plane database password
  ansible.builtin.slurp:
    src: "{{ plane_database_password_local_file }}"
  delegate_to: localhost
  become: false
  register: plane_postgres_password_raw
  no_log: true

- name: Record the Plane database password
  ansible.builtin.set_fact:
    plane_database_password: "{{ plane_postgres_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Mirror the Plane database password to the control machine
  ansible.builtin.copy:
    dest: "{{ plane_database_password_local_file }}"
    content: "{{ plane_database_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Persist the Plane database password on the current guest
  ansible.builtin.copy:
    dest: "{{ plane_postgres_password_file }}"
    content: "{{ plane_database_password }}\n"
    owner: root
    group: postgres
    mode: "0640"
  no_log: true

- name: Check whether the local PostgreSQL member is writable
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT CASE WHEN pg_is_in_recovery() THEN 0 ELSE 1 END"
  register: plane_postgres_writable_check
  changed_when: false

- name: Check whether the Plane support role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ plane_database_support_role }}'"
  register: plane_postgres_support_role_check
  changed_when: false
  when: plane_postgres_writable_check.stdout | trim == "1"

- name: Create the Plane support role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE ROLE {{ plane_database_support_role }}"
  changed_when: true
  when:
    - plane_postgres_writable_check.stdout | trim == "1"
    - plane_postgres_support_role_check.stdout != "1"

- name: Check whether the Plane admin role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ plane_database_user }}'"
  register: plane_postgres_admin_role_check
  changed_when: false
  when: plane_postgres_writable_check.stdout | trim == "1"

- name: Create the Plane admin role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - >-
        CREATE ROLE {{ plane_database_user }} LOGIN
        PASSWORD '{{ plane_database_password }}' IN ROLE {{ plane_database_support_role }}
  changed_when: true
  no_log: true
  when:
    - plane_postgres_writable_check.stdout | trim == "1"
    - plane_postgres_admin_role_check.stdout != "1"

- name: Ensure the Plane admin role password matches the managed secret
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER ROLE {{ plane_database_user }} PASSWORD '{{ plane_database_password }}'"
  changed_when: false
  no_log: true
  when: plane_postgres_writable_check.stdout | trim == "1"

- name: Grant the Plane support role to the admin role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "GRANT {{ plane_database_support_role }} TO {{ plane_database_user }}"
  changed_when: false
  when: plane_postgres_writable_check.stdout | trim == "1"

- name: Check whether the Plane PostgreSQL database already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_database WHERE datname = '{{ plane_database_name }}'"
  register: plane_postgres_database_check
  changed_when: false
  when: plane_postgres_writable_check.stdout | trim == "1"

- name: Create the Plane PostgreSQL database
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE DATABASE {{ plane_database_name }} OWNER {{ plane_database_user }}"
  when:
    - plane_postgres_writable_check.stdout | trim == "1"
    - plane_postgres_database_check.stdout != "1"
  changed_when: true

- name: Ensure the Plane database owner is correct
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER DATABASE {{ plane_database_name }} OWNER TO {{ plane_database_user }}"
  changed_when: false
  when: plane_postgres_writable_check.stdout | trim == "1"
