---
# Purpose: Provision the plane PostgreSQL database using the shared postgres_client role (ADR 0359).
# Use case: Called during plane deployment to ensure the database, role, and credentials exist.
# Inputs: plane_* variables from defaults/main.yml; resolves registry entry from platform_postgres_clients.
# Outputs: plane PostgreSQL role, database, and credential files converged on postgres-lv3.
# Idempotency: Yes; postgres_client role handles all idempotency.
# Dependencies: ADR 0359 postgres_client role, platform_postgres_clients registry.
- name: Provision the plane database via the shared postgres_client role
  ansible.builtin.include_role:
    name: lv3.platform.postgres_client
  vars:
    postgres_client_service: "{{ plane_database_name }}"
    postgres_client_database: "{{ plane_database_name }}"
    postgres_client_user: "{{ plane_database_user }}"
    postgres_client_password_local_file: "{{ plane_database_password_local_file }}"
    postgres_client_password_remote_dir: "{{ plane_postgres_secret_dir }}"
    postgres_client_password_remote_file: "{{ plane_postgres_password_file }}"
    postgres_client_support_role: "{{ plane_database_support_role }}"
