# Purpose: Declare the supported input contract for the Temporal runtime role.
# Use case: Loaded by Ansible to validate Temporal runtime variables before execution.
# Inputs: Role variables covering image pins, database wiring, runtime secret injection, and namespace defaults.
# Outputs: Provides argument specifications used by Ansible role validation.
# Idempotency: Fully idempotent because this file only documents the role interface.
# Dependencies: ADR 0165 and ADR 0293.
---
argument_specs:
  main:
    short_description: Deploy the private Temporal runtime and bootstrap its repo-managed namespace.
    options:
      temporal_server_image:
        type: str
        required: true
        description:
          - Digest-pinned Temporal server image reference taken from the image catalog.
      temporal_admin_tools_image:
        type: str
        required: true
        description:
          - Digest-pinned Temporal admin-tools image reference used for bootstrap and verification commands.
      temporal_ui_image:
        type: str
        required: true
        description:
          - Digest-pinned Temporal UI image reference used for diagnostic access.
      temporal_site_dir:
        type: path
        required: true
        description:
          - Guest-local directory containing the compose project.
      temporal_config_dir:
        type: path
        required: true
        description:
          - Guest-local directory containing the rendered Temporal config templates.
      temporal_compose_file:
        type: path
        required: true
        description:
          - Guest-local docker compose file for Temporal.
      temporal_env_file:
        type: path
        required: true
        description:
          - Guest-local runtime env file rendered through the OpenBao sidecar.
      temporal_openbao_agent_dir:
        type: path
        required: true
        description:
          - Guest-local OpenBao agent directory for runtime secret injection.
      temporal_database_name:
        type: str
        required: true
        description:
          - PostgreSQL database name used by Temporal for workflow history.
      temporal_visibility_database_name:
        type: str
        required: true
        description:
          - PostgreSQL database name used by Temporal for visibility records.
      temporal_database_user:
        type: str
        required: true
        description:
          - PostgreSQL login role used by Temporal.
      temporal_database_host:
        type: str
        required: true
        description:
          - PostgreSQL host used by Temporal.
      temporal_database_password_local_file:
        type: path
        required: true
        description:
          - Controller-local database password generated by the postgres role.
      temporal_frontend_grpc_port:
        type: int
        required: true
        description:
          - Guest-local loopback port published for the Temporal gRPC frontend.
      temporal_frontend_http_port:
        type: int
        required: true
        description:
          - Guest-local loopback port published for the Temporal HTTP frontend.
      temporal_ui_port:
        type: int
        required: true
        description:
          - Guest-local loopback port published for the Temporal UI.
      temporal_default_namespace:
        type: str
        required: true
        description:
          - Namespace that is bootstrapped automatically after the Temporal stack starts.
      temporal_default_namespace_retention:
        type: str
        required: true
        description:
          - Retention window applied to the repo-managed default Temporal namespace.
