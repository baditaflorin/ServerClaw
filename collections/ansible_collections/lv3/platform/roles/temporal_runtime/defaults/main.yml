# Purpose: Define default runtime paths, secret locations, and controller settings for the private Temporal service.
# Use case: Loaded whenever the Temporal runtime role converges or validates the durable workflow engine.
# Inputs: Image catalog entries, compose secret roots, OpenBao defaults, and Temporal service settings.
# Outputs: Supplies stable defaults consumed by the Temporal runtime tasks and templates.
# Idempotency: Fully idempotent because this file only declares role defaults.
# Dependencies: ADR 0165 and ADR 0293.
---
# NOTE: Conventional variables (site_dir, image, compose_file, env_file,
# openbao_*, container_name, internal_port, local_artifact_dir) are derived
# from platform_service_registry — ADR 0373.
temporal_database_name: temporal
temporal_visibility_database_name: temporal_visibility
temporal_database_user: temporal
temporal_database_host: "{{ hostvars[hostvars[platform_topology_host].postgres_ha.initial_primary].ansible_host }}"
temporal_database_password_local_file: "{{ temporal_local_artifact_dir }}/database-password.txt"
temporal_schema_bootstrap_report_local_file: "{{ temporal_local_artifact_dir }}/schema-bootstrap-report.json"
temporal_namespace_report_local_file: "{{ temporal_local_artifact_dir }}/namespace-report.json"
temporal_default_store_max_conns: 5
temporal_default_store_max_idle_conns: 5
temporal_visibility_store_max_conns: 3
temporal_visibility_store_max_idle_conns: 3
temporal_frontend_bind_host: 127.0.0.1
temporal_frontend_grpc_port: 7233
temporal_frontend_http_port: 7243
temporal_frontend_membership_port: 6933
temporal_history_grpc_port: 7234
temporal_history_membership_port: 6934
temporal_matching_grpc_port: 7235
temporal_matching_membership_port: 6935
temporal_worker_grpc_port: 7239
temporal_worker_membership_port: 6939
temporal_ui_bind_host: 127.0.0.1
temporal_ui_port: 8099
temporal_ui_container_port: 8080
temporal_num_history_shards: 4
temporal_cluster_name: active
temporal_default_namespace: lv3
temporal_default_namespace_retention: 168h
temporal_namespace_owner_email: ops@{{ platform_domain }}
temporal_public_frontend_address: temporal-frontend:7233
temporal_public_frontend_http_address: temporal-frontend:7243
temporal_server_components:
  - role: frontend
    service_name: temporal-frontend
    membership_port: "{{ temporal_frontend_membership_port }}"
    config_template_file: "{{ temporal_config_dir }}/frontend.yml.tpl"
  - role: history
    service_name: temporal-history
    membership_port: "{{ temporal_history_membership_port }}"
    config_template_file: "{{ temporal_config_dir }}/history.yml.tpl"
  - role: matching
    service_name: temporal-matching
    membership_port: "{{ temporal_matching_membership_port }}"
    config_template_file: "{{ temporal_config_dir }}/matching.yml.tpl"
  - role: worker
    service_name: temporal-worker
    membership_port: "{{ temporal_worker_membership_port }}"
    config_template_file: "{{ temporal_config_dir }}/worker.yml.tpl"
