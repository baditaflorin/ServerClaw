---
argument_specs:
  main:
    short_description: Converge the LiteLLM Proxy runtime.
    options:
      litellm_site_dir:
        type: path
        required: true
        description:
          - Base directory for the LiteLLM compose stack.
      litellm_secret_dir:
        type: path
        required: true
        description:
          - Guest-local directory that stores secret material.
      litellm_compose_file:
        type: path
        required: true
        description:
          - Compose file path for the LiteLLM runtime.
      litellm_config_file:
        type: path
        required: true
        description:
          - LiteLLM YAML config file path on the guest.
      litellm_env_file:
        type: path
        required: true
        description:
          - Runtime env file rendered for the LiteLLM container.
      litellm_image:
        type: str
        required: true
        description:
          - Container image reference for LiteLLM.
      litellm_container_name:
        type: str
        required: true
        description:
          - Docker container name for LiteLLM.
      litellm_internal_port:
        type: int
        required: true
        description:
          - Host port exposed by the LiteLLM runtime.
      litellm_container_port:
        type: int
        required: true
        description:
          - Container port exposed by the LiteLLM image.
      litellm_healthcheck_path:
        type: str
        required: true
        description:
          - HTTP path used by the health check.
      litellm_master_key_remote_file:
        type: path
        required: true
        description:
          - Guest-local file that stores the LiteLLM master key.
      litellm_master_key_local_file:
        type: path
        required: true
        description:
          - Controller-local mirror path for the master key.
