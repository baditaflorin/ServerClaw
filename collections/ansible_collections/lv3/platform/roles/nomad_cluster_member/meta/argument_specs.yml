---
argument_specs:
  main:
    short_description: Install and configure one Nomad server or client agent.
    options:
      nomad_cluster_version:
        type: str
        required: true
      nomad_cluster_download_url:
        type: str
        required: true
      nomad_cluster_packages:
        type: list
        elements: str
        required: true
      nomad_cluster_config_dir:
        type: path
        required: true
      nomad_cluster_tls_dir:
        type: path
        required: true
      nomad_cluster_data_dir:
        type: path
        required: true
      nomad_cluster_service_name:
        type: str
        required: true
      nomad_cluster_service_file:
        type: path
        required: true
      nomad_cluster_http_port:
        type: int
        required: true
      nomad_cluster_rpc_port:
        type: int
        required: true
      nomad_cluster_serf_port:
        type: int
        required: true
      nomad_cluster_server:
        type: bool
        required: true
      nomad_cluster_client:
        type: bool
        required: true
      nomad_cluster_server_rpc_addresses:
        type: list
        elements: str
        required: true
      nomad_cluster_local_ca_cert_file:
        type: path
        required: true
      nomad_cluster_local_server_cert_file:
        type: path
        required: true
      nomad_cluster_local_server_key_file:
        type: path
        required: true
      nomad_cluster_local_client_cert_file:
        type: path
        required: true
      nomad_cluster_local_client_key_file:
        type: path
        required: true
      nomad_cluster_bootstrap_token_remote_file:
        type: path
        required: true
