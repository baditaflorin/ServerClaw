---
# Purpose: Verify the private Typesense runtime responds after convergence.
# Use case: Included after Typesense deployment or recovery to confirm the internal health contract is live.
# Inputs: typesense_internal_base_url and the repo-managed verification timing settings.
# Outputs: Pass/fail verification results for the Typesense health endpoint.
# Idempotency: Fully idempotent; verification only reads runtime state.
# Dependencies: ADR 0165, ADR 0277, and a converged Typesense runtime.
- name: Verify the Typesense health endpoint responds
  ansible.builtin.uri:
    url: "{{ typesense_internal_base_url }}/health"
    method: GET
    status_code: 200
  register: typesense_verify_health
  retries: 12
  delay: 5
  until: typesense_verify_health.status == 200
  changed_when: false
