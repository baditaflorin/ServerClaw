        required: true
      typesense_image:
        type: str
        required: true
      typesense_container_name:
        type: str
        required: true
      typesense_internal_base_url:
        type: str
        required: true
      typesense_controller_url:
        type: str
        required: true
      typesense_collection_name:
        type: str
        required: true
