# Purpose: Define default paths, topology inputs, and image wiring for the repo-managed Typesense runtime.
# Use case: Loaded whenever the Typesense role converges ADR 0277 on docker-runtime.
# Inputs: Inventory-derived topology, image catalog entries, OpenBao defaults, and controller-local artifact roots.
# Outputs: Supplies stable defaults consumed by the Typesense runtime tasks and templates.
# Idempotency: Fully idempotent because this file only declares role defaults.
# Dependencies: ADR 0077, ADR 0165, and ADR 0277.
---
# NOTE: Conventional variables (site_dir, image, compose_file, env_file,
# openbao_*, container_name, internal_port, local_artifact_dir) are derived
# from platform_service_registry — ADR 0373.
typesense_port: "{{ platform_service_topology | platform_service_port('typesense', 'internal') }}"
typesense_host_proxy_port: "{{ platform_service_topology | platform_service_port('typesense', 'controller') }}"
typesense_internal_base_url: "{{ platform_service_topology | platform_service_url('typesense', 'internal') }}"
typesense_controller_url: "{{ platform_service_topology | platform_service_url('typesense', 'controller') }}"
typesense_collection_name: platform-services
typesense_shared_local_root: >-
  {{
    (
      lookup(
        'ansible.builtin.pipe',
        'git -C ' ~ ((inventory_dir | dirname) | quote) ~ ' rev-parse --path-format=absolute --git-common-dir'
      )
      | dirname
    )
    ~ '/.local'
  }}
typesense_api_key_local_file: "{{ typesense_local_artifact_dir }}/api-key.txt"
