---
# Purpose: Verify the Excalidraw frontend patch, the collaboration room listener, and the local runtime contract.
# Inputs: Running Excalidraw containers and the configured local listener ports.
# Outputs: Probe results for frontend readiness, collaboration-room health, and patched asset origin checks.
# Idempotency: Fully idempotent; these are read-only verification steps.
# Dependencies: ADR 0202, ADR 0165; requires the excalidraw_runtime compose stack to be running.
- name: Verify the Excalidraw frontend responds locally
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ excalidraw_runtime_app_port }}/"
    method: GET
    status_code:
      - 200
    validate_certs: false
    return_content: false
    timeout: 30
  register: excalidraw_runtime_frontend_probe
  retries: 12
  delay: 2
  until: excalidraw_runtime_frontend_probe.status == 200
  changed_when: false

- name: Verify the Excalidraw collaboration room responds locally
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ excalidraw_runtime_room_port }}/"
    method: GET
    status_code:
      - 200
    validate_certs: false
    return_content: true
    timeout: 30
  register: excalidraw_runtime_room_probe
  retries: 12
  delay: 2
  until:
    - excalidraw_runtime_room_probe.status == 200
    - "'collaboration server is up' in excalidraw_runtime_room_probe.content"
  changed_when: false

- name: Verify the Excalidraw frontend asset patch points to the shared collaboration origin
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ excalidraw_runtime_app_container_name }}"
      - sh
      - -lc
      - >-
        grep -R -n -F '{{ excalidraw_runtime_collab_origin }}'
        /usr/share/nginx/html/assets
  register: excalidraw_runtime_asset_patch
  changed_when: false
