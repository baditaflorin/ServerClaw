---
# Purpose: Verify the Excalidraw frontend patch, the collaboration room listener, and the local runtime contract.
# Dependencies: ADR 0202, ADR 0165, ADR 0371; requires the excalidraw_runtime compose stack to be running.
- name: Verify the Excalidraw runtime health
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: excalidraw
    common_verify_port: "{{ excalidraw_runtime_app_port }}"
    common_verify_health_url: "http://127.0.0.1:{{ excalidraw_runtime_app_port }}/"
    common_verify_health_retries: 12
    common_verify_health_delay: 2
    common_verify_extra_endpoints:
      - url: "http://127.0.0.1:{{ excalidraw_runtime_room_port }}/"
        retries: 12
        delay: 2
        assertions:
          - "'collaboration server is up' in common_verify_extra_response.content"
        assertion_msg: "Excalidraw collaboration room did not report 'collaboration server is up'."

- name: Verify the Excalidraw frontend asset patch points to the shared collaboration origin
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ excalidraw_runtime_app_container_name }}"
      - sh
      - -lc
      - >-
        grep -R -n -F '{{ excalidraw_runtime_collab_origin }}'
        /usr/share/nginx/html/assets
  register: excalidraw_runtime_asset_patch
  changed_when: false
