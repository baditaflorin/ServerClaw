---
# Purpose: Define the reusable runtime-pool substrate defaults for Traefik routing and Dapr invocation on dedicated runtime guests.
# Use case: Load when a runtime pool needs an internal API-first router plus a documented Dapr invocation bridge without per-service custom glue.
# Inputs: Platform port assignments and optional role overrides for image refs, ports, and route prefixes.
# Outputs: Default variables consumed by the runtime_pool_substrate role tasks and templates.
# Idempotency: Fully idempotent; defaults describe the desired runtime-pool substrate only.
# Dependencies: ADR 0319, ADR 0320, and the runtime_pool_substrate role templates.
runtime_pool_substrate_root_dir: /opt/runtime-pool-substrate
runtime_pool_substrate_compose_file: "{{ runtime_pool_substrate_root_dir }}/docker-compose.yml"
runtime_pool_substrate_dynamic_config_dir: "{{ runtime_pool_substrate_root_dir }}/dynamic"
runtime_pool_substrate_router_config_file: "{{ runtime_pool_substrate_dynamic_config_dir }}/runtime-ai-router.yml"
runtime_pool_substrate_traefik_image: traefik:v3.6
runtime_pool_substrate_traefik_container_name: runtime-ai-traefik
runtime_pool_substrate_traefik_port: 9080
runtime_pool_substrate_traefik_ping_path: /ping
runtime_pool_substrate_dapr_image: daprio/daprd:1.16.0
runtime_pool_substrate_dapr_container_name: runtime-ai-dapr-router
runtime_pool_substrate_dapr_app_id: runtime-ai-router
runtime_pool_substrate_dapr_http_port: 3500
runtime_pool_substrate_dapr_grpc_port: 50001
runtime_pool_substrate_tika_prefix: /tika
runtime_pool_substrate_gotenberg_prefix: /gotenberg
runtime_pool_substrate_tesseract_prefix: /tesseract-ocr
runtime_pool_substrate_tika_upstream: "http://127.0.0.1:{{ platform_port_assignments.tika_port }}"
runtime_pool_substrate_gotenberg_upstream: "http://127.0.0.1:{{ platform_port_assignments.gotenberg_port }}"
runtime_pool_substrate_tesseract_upstream: "http://127.0.0.1:{{ platform_port_assignments.tesseract_ocr_port }}"
