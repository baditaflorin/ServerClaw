---
# Purpose: Verify that the converged Woodpecker runtime is healthy on docker-runtime-lv3 before the controller bootstrap path runs.
# Use case: Included after Woodpecker convergence to prove the server, agent, and local health endpoints are serving traffic.
#
# Inputs (required):
#   - woodpecker_compose_file (path, required): Managed compose file path.
#   - woodpecker_http_port (int, required): Internal Woodpecker listener port.
#   - woodpecker_healthcheck_path (str, required): Local liveness endpoint path.
#   - woodpecker_version_path (str, required): Local version endpoint path.
#
# Outputs:
#   - Read-only verification results for local listener health, version, and the expected server plus agent containers.
#
# Idempotency: Fully idempotent
#              This task file performs read-only checks and does not mutate runtime state.
#
# Dependencies:
#   - ADR 0287: Requires guest-local Woodpecker verification after deployment.
#   - Requires: woodpecker_runtime main tasks have rendered and started the stack.
#
# Related ADRs: 0165, 0287, 0371
# Related Runbooks: docs/runbooks/configure-woodpecker.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-30
- name: Verify the Woodpecker containers are running
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ woodpecker_compose_file }}"
      - ps
      - --services
      - --filter
      - status=running
  args:
    chdir: "{{ woodpecker_site_dir }}"
  register: woodpecker_verify_running
  changed_when: false

- name: Assert the Woodpecker server and agent are running
  ansible.builtin.assert:
    that:
      - "'woodpecker-server' in woodpecker_verify_running.stdout_lines"
      - "'woodpecker-agent' in woodpecker_verify_running.stdout_lines"
    fail_msg: "Woodpecker server or agent is not running."

- name: Verify the Woodpecker runtime health
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: woodpecker
    common_verify_port: "{{ woodpecker_http_port }}"
    common_verify_health_url: "http://127.0.0.1:{{ woodpecker_http_port }}{{ woodpecker_healthcheck_path }}"
    common_verify_health_retries: 30
    common_verify_health_delay: 5
    common_verify_health_status_code: 204
    common_verify_extra_endpoints:
      - url: "http://127.0.0.1:{{ woodpecker_http_port }}{{ woodpecker_version_path }}"
        retries: 30
        delay: 5
