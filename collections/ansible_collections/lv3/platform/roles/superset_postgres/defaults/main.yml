# Purpose: Define the default PostgreSQL inputs for the Superset metadata schema and read-only datasource role.
# Use case: Loaded whenever the Superset PostgreSQL role prepares the metadata plane and controller-local access artefacts.
# Inputs: PostgreSQL schema names, managed role names, and controller-local artefact paths.
# Outputs: Supplies stable defaults consumed by the superset_postgres role tasks.
# Idempotency: Fully idempotent because this file only declares desired defaults.
# Dependencies: ADR 0165, ADR 0042, and ADR 0292.
---
superset_database_name: postgres
superset_database_schema: superset
superset_database_user: superset
superset_reader_user: superset_reader
superset_postgres_password_file: "{{ superset_postgres_secret_dir }}/database-password.txt"
superset_reader_password_file: "{{ superset_postgres_secret_dir }}/reader-password.txt"
superset_postgres_database_catalog_remote_file: "{{ superset_postgres_secret_dir }}/postgres-databases.json"
superset_database_password_local_file: "{{ superset_local_artifact_dir }}/database-password.txt"
superset_reader_password_local_file: "{{ superset_local_artifact_dir }}/reader-password.txt"
superset_postgres_database_catalog_local_file: "{{ superset_local_artifact_dir }}/postgres-databases.json"
