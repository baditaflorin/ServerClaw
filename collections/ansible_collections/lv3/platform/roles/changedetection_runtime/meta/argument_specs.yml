---
argument_specs:
  main:
    short_description: Converge the private Changedetection.io runtime and its repo-managed watch catalogue.
    options:
      changedetection_runtime_site_dir:
        type: path
        required: true
      changedetection_runtime_secret_dir:
        type: path
        required: true
      changedetection_runtime_compose_file:
        type: path
        required: true
      changedetection_runtime_watch_catalog_file:
        type: path
        required: true
      changedetection_runtime_sync_report_file:
        type: path
        required: true
      changedetection_runtime_api_token_file:
        type: path
        required: true
      changedetection_runtime_api_token_local_file:
        type: path
        required: true
      changedetection_runtime_sync_script:
        type: path
        required: true
      changedetection_runtime_image:
        type: str
        required: true
      changedetection_runtime_container_name:
        type: str
        required: true
      changedetection_runtime_port:
        type: int
        required: true
      changedetection_runtime_base_url:
        type: str
        required: true
      changedetection_runtime_recheck_minimum_seconds:
        type: int
        required: true
      changedetection_runtime_volume_name:
        type: str
        required: true
      changedetection_runtime_ntfy_password_local_file:
        type: path
        required: true
      changedetection_runtime_ntfy_username:
        type: str
        required: true
      changedetection_runtime_ntfy_topic:
        type: str
        required: true
      changedetection_runtime_ntfy_host:
        type: str
        required: true
      changedetection_runtime_ntfy_port:
        type: int
        required: true
      changedetection_runtime_mattermost_webhooks_remote_file:
        type: path
        required: true
      changedetection_runtime_notification_channels:
        type: dict
        required: true
      changedetection_runtime_watch_groups:
        type: list
        elements: dict
        required: true
      changedetection_runtime_watches:
        type: list
        elements: dict
        required: true
