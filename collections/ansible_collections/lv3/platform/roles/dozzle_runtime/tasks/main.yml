---
- name: Derive Dozzle conventional defaults from the service registry
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: derive_service_defaults
  vars:
    common_derive_service_name: dozzle


- name: Validate Dozzle runtime inputs
  ansible.builtin.assert:
    that:
      - dozzle_runtime_site_dir | length > 0
      - dozzle_runtime_compose_file | length > 0
      - dozzle_runtime_image | length > 0
      - dozzle_runtime_hub_container_name | length > 0
      - dozzle_runtime_agent_container_name | length > 0
      - dozzle_runtime_hub_port | int > 0
      - dozzle_runtime_agent_port | int > 0
      - dozzle_runtime_hub_inventory_host | length > 0
      - dozzle_runtime_agent_inventory_hosts | length > 0
    fail_msg: "dozzle_runtime requires the runtime paths, image reference, and hub or agent host settings."

- name: Ensure the Dozzle runtime directory exists
  ansible.builtin.file:
    path: "{{ dozzle_runtime_site_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Initialize the Dozzle remote agent list
  ansible.builtin.set_fact:
    dozzle_runtime_remote_agents: "{{ ['127.0.0.1:' ~ (dozzle_runtime_agent_port | string)] if dozzle_runtime_is_hub else [] }}"

- name: Add remote Dozzle agents for non-hub inventory hosts
  ansible.builtin.set_fact:
    dozzle_runtime_remote_agents: >-
      {{
        dozzle_runtime_remote_agents
        + [hostvars[item].ansible_host ~ ':' ~ (dozzle_runtime_agent_port | string)]
      }}
  loop: "{{ dozzle_runtime_agent_inventory_hosts }}"
  when:
    - dozzle_runtime_is_hub
    - item != inventory_hostname

- name: Render the Dozzle compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ dozzle_runtime_compose_file }}"
    owner: root
    group: root
    mode: "0644"
  register: dozzle_runtime_compose_template

- name: Converge the Dozzle runtime stack
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: docker_compose_converge
  vars:
    common_docker_compose_converge_compose_file: "{{ dozzle_runtime_compose_file }}"
    common_docker_compose_converge_site_dir: "{{ dozzle_runtime_site_dir }}"
    common_docker_compose_converge_service_name: dozzle
    common_docker_compose_converge_template_results:
      - "{{ dozzle_runtime_compose_template }}"
    common_docker_compose_converge_force_recreate_entire_stack: true

- name: Wait for the Dozzle agent listener
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ dozzle_runtime_agent_port }}"
    delay: 0
    timeout: 180

- name: Wait for the Dozzle hub listener on the hub node
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ dozzle_runtime_hub_port }}"
    delay: 0
    timeout: 180
  when: dozzle_runtime_is_hub

- name: Verify the Dozzle runtime
  ansible.builtin.import_tasks: verify.yml
