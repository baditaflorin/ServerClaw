---
argument_specs:
  main:
    short_description: Converge the Dozzle hub and agent runtime for real-time container logs.
    options:
      dozzle_runtime_site_dir:
        type: path
        required: true
      dozzle_runtime_compose_file:
        type: path
        required: true
      dozzle_runtime_image:
        type: str
        required: true
      dozzle_runtime_hub_container_name:
        type: str
        required: true
      dozzle_runtime_agent_container_name:
        type: str
        required: true
      dozzle_runtime_hub_port:
        type: int
        required: true
      dozzle_runtime_agent_port:
        type: int
        required: true
      dozzle_runtime_hub_inventory_host:
        type: str
        required: true
      dozzle_runtime_agent_inventory_hosts:
        type: list
        elements: str
        required: true
      dozzle_runtime_is_hub:
        type: bool
        required: true
      dozzle_runtime_release_check_mode:
        type: str
        required: true
      dozzle_runtime_disable_analytics:
        type: bool
        required: true
