---
- name: Validate Semaphore PostgreSQL inputs
  ansible.builtin.assert:
    that:
      - semaphore_database_name | length > 0
      - semaphore_database_user | length > 0
      - semaphore_database_support_role | length > 0
      - semaphore_postgres_secret_dir | length > 0
      - semaphore_postgres_password_file | length > 0
      - semaphore_database_password_local_file | length > 0
    fail_msg: "semaphore_postgres requires database names and password paths."

- name: Ensure the Semaphore PostgreSQL secret directory exists
  ansible.builtin.file:
    path: "{{ semaphore_postgres_secret_dir }}"
    state: directory
    owner: root
    group: postgres
    mode: "0750"

- name: Ensure the local Semaphore artifact directory exists
  ansible.builtin.file:
    path: "{{ semaphore_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate the Semaphore database password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ semaphore_database_password_local_file }}" ]; then
      umask 077
      openssl rand -base64 24 | tr -d '\n' > "{{ semaphore_database_password_local_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: semaphore_postgres_password_generation
  changed_when: "'changed' in semaphore_postgres_password_generation.stdout"
  no_log: true

- name: Read the Semaphore database password
  ansible.builtin.slurp:
    src: "{{ semaphore_database_password_local_file }}"
  delegate_to: localhost
  become: false
  register: semaphore_postgres_password_raw
  no_log: true

- name: Record the Semaphore database password
  ansible.builtin.set_fact:
    semaphore_database_password: "{{ semaphore_postgres_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Mirror the Semaphore database password to the control machine
  ansible.builtin.copy:
    dest: "{{ semaphore_database_password_local_file }}"
    content: "{{ semaphore_database_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Persist the Semaphore database password on the current guest
  ansible.builtin.copy:
    dest: "{{ semaphore_postgres_password_file }}"
    content: "{{ semaphore_database_password }}\n"
    owner: root
    group: postgres
    mode: "0640"
  no_log: true

- name: Check whether the local PostgreSQL member is writable
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT CASE WHEN pg_is_in_recovery() THEN 0 ELSE 1 END"
  register: semaphore_postgres_writable_check
  changed_when: false

- name: Check whether the Semaphore support role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ semaphore_database_support_role }}'"
  register: semaphore_postgres_support_role_check
  changed_when: false
  when: semaphore_postgres_writable_check.stdout | trim == "1"

- name: Create the Semaphore support role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE ROLE {{ semaphore_database_support_role }}"
  changed_when: true
  when:
    - semaphore_postgres_writable_check.stdout | trim == "1"
    - semaphore_postgres_support_role_check.stdout != "1"

- name: Check whether the Semaphore admin role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ semaphore_database_user }}'"
  register: semaphore_postgres_admin_role_check
  changed_when: false
  when: semaphore_postgres_writable_check.stdout | trim == "1"

- name: Create the Semaphore admin role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - >-
        CREATE ROLE {{ semaphore_database_user }} LOGIN
        PASSWORD '{{ semaphore_database_password }}' IN ROLE {{ semaphore_database_support_role }}
  changed_when: true
  no_log: true
  when:
    - semaphore_postgres_writable_check.stdout | trim == "1"
    - semaphore_postgres_admin_role_check.stdout != "1"

- name: Ensure the Semaphore admin role password matches the managed secret
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER ROLE {{ semaphore_database_user }} PASSWORD '{{ semaphore_database_password }}'"
  changed_when: false
  no_log: true
  when: semaphore_postgres_writable_check.stdout | trim == "1"

- name: Grant the Semaphore support role to the admin role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "GRANT {{ semaphore_database_support_role }} TO {{ semaphore_database_user }}"
  changed_when: false
  when: semaphore_postgres_writable_check.stdout | trim == "1"

- name: Check whether the Semaphore PostgreSQL database already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_database WHERE datname = '{{ semaphore_database_name }}'"
  register: semaphore_postgres_database_check
  changed_when: false
  when: semaphore_postgres_writable_check.stdout | trim == "1"

- name: Create the Semaphore PostgreSQL database
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE DATABASE {{ semaphore_database_name }} OWNER {{ semaphore_database_user }}"
  when:
    - semaphore_postgres_writable_check.stdout | trim == "1"
    - semaphore_postgres_database_check.stdout != "1"
  changed_when: true

- name: Ensure the Semaphore database owner is correct
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER DATABASE {{ semaphore_database_name }} OWNER TO {{ semaphore_database_user }}"
  changed_when: false
  when: semaphore_postgres_writable_check.stdout | trim == "1"
