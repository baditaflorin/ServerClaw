---
# Purpose: Provision the semaphore PostgreSQL database using the shared postgres_client role (ADR 0359).
# Use case: Called during semaphore deployment to ensure the database, role, and credentials exist.
# Inputs: semaphore_* variables from defaults/main.yml; resolves registry entry from platform_postgres_clients.
# Outputs: semaphore PostgreSQL role, database, and credential files converged on postgres.
# Idempotency: Yes; postgres_client role handles all idempotency.
# Dependencies: ADR 0359 postgres_client role, platform_postgres_clients registry.
- name: Provision the semaphore database via the shared postgres_client role
  ansible.builtin.include_role:
    name: lv3.platform.postgres_client
  vars:
    postgres_client_service: "{{ semaphore_database_name }}"
    postgres_client_database: "{{ semaphore_database_name }}"
    postgres_client_user: "{{ semaphore_database_user }}"
    postgres_client_password_local_file: "{{ semaphore_database_password_local_file }}"
    postgres_client_password_remote_dir: "{{ semaphore_postgres_secret_dir }}"
    postgres_client_password_remote_file: "{{ semaphore_postgres_password_file }}"
    postgres_client_support_role: "{{ semaphore_database_support_role }}"
