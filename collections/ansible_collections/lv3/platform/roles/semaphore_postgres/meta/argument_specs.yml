---
argument_specs:
  main:
    short_description: Converge the PostgreSQL role, database, and password for Semaphore.
    options:
      semaphore_database_name:
        type: str
        required: true
      semaphore_database_user:
        type: str
        required: true
      semaphore_database_support_role:
        type: str
        required: true
      semaphore_postgres_secret_dir:
        type: path
        required: true
      semaphore_postgres_password_file:
        type: path
        required: true
      semaphore_database_password_local_file:
        type: path
        required: true
