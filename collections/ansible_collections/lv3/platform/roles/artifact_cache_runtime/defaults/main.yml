---
# NOTE: Conventional variables (site_dir, image, compose_file, env_file,
# openbao_*, container_name, internal_port, local_artifact_dir) are derived
# from platform_service_registry — ADR 0373.
# Purpose: Define the filesystem layout, upstream registry mappings, and seed-plan inputs for the shared artifact cache runtime.
artifact_cache_state: present
artifact_cache_data_root: "{{ artifact_cache_site_dir }}/data"
artifact_cache_seed_plan_file: "{{ artifact_cache_site_dir }}/seed-plan.json"
artifact_cache_bind_host: "{{ ansible_host }}"
artifact_cache_network_mode: host
artifact_cache_seed_enabled: true
artifact_cache_repo_root: "{{ lookup('ansible.builtin.env', 'PWD') }}"
artifact_cache_seed_script: "{{ artifact_cache_repo_root }}/scripts/artifact_cache_seed.py"
artifact_cache_seed_catalogs:
  - "{{ artifact_cache_repo_root }}/config/image-catalog.json"
  - "{{ artifact_cache_repo_root }}/config/check-runner-manifest.json"
  - "{{ artifact_cache_repo_root }}/config/validation-gate.json"
artifact_cache_registry_mirrors:
  docker_io:
    registry_host: docker.io
    service_name: docker-hub
    container_name: artifact-cache-docker-hub
    bind_port: 5001
    upstream_registry: https://registry-1.docker.io
    mirror_registry: "{{ artifact_cache_bind_host }}:5001"
    storage_path: "{{ artifact_cache_data_root }}/docker-hub"
  ghcr_io:
    registry_host: ghcr.io
    service_name: ghcr
    container_name: artifact-cache-ghcr
    bind_port: 5002
    upstream_registry: https://ghcr.io
    mirror_registry: "{{ artifact_cache_bind_host }}:5002"
    storage_path: "{{ artifact_cache_data_root }}/ghcr"
  artifacts_plane_so:
    registry_host: artifacts.plane.so
    service_name: plane-artifacts
    container_name: artifact-cache-plane
    bind_port: 5003
    upstream_registry: https://artifacts.plane.so
    mirror_registry: "{{ artifact_cache_bind_host }}:5003"
    storage_path: "{{ artifact_cache_data_root }}/plane"
  docker_n8n_io:
    registry_host: docker.n8n.io
    service_name: n8n
    container_name: artifact-cache-n8n
    bind_port: 5004
    upstream_registry: https://docker.n8n.io
    mirror_registry: "{{ artifact_cache_bind_host }}:5004"
    storage_path: "{{ artifact_cache_data_root }}/n8n"
