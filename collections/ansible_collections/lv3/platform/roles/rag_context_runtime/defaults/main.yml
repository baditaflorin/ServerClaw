---
platform_context_site_dir: /opt/platform-context
platform_context_service_dir: "{{ platform_context_site_dir }}/service"
platform_context_corpus_dir: "{{ platform_context_site_dir }}/corpus"
platform_context_data_dir: "{{ platform_context_site_dir }}/qdrant"
platform_context_secret_dir: /etc/lv3/platform-context
platform_context_compose_file: "{{ platform_context_site_dir }}/docker-compose.yml"
platform_context_env_file: "{{ compose_runtime_secret_root }}/platform-context/runtime.env"
platform_context_legacy_env_file: "{{ platform_context_site_dir }}/platform-context.env"
platform_context_openbao_agent_dir: "{{ platform_context_site_dir }}/openbao"
platform_context_openbao_agent_image: "{{ openbao_agent_image }}"
platform_context_openbao_agent_container_name: platform-context-openbao-agent
platform_context_openbao_secret_path: services/platform-context/runtime-env
platform_context_openbao_policy_name: lv3-service-platform-context-runtime
platform_context_openbao_approle_name: platform-context-runtime
platform_context_api_token_remote_file: "{{ platform_context_secret_dir }}/api-token.txt"
platform_context_local_artifact_dir: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/platform-context
platform_context_api_token_local_file: "{{ platform_context_local_artifact_dir }}/api-token.txt"
platform_context_internal_port: 8010
platform_context_host_proxy_port: 8010
platform_context_controller_url: "http://{{ hostvars['proxmox_florin'].management_tailscale_ipv4 }}:{{ platform_context_host_proxy_port }}"
platform_context_private_url: "http://{{ ansible_host }}:{{ platform_context_internal_port }}"
platform_context_qdrant_image: qdrant/qdrant:v1.15.1
platform_context_api_image_name: lv3-platform-context-api
platform_context_qdrant_collection: platform_context
platform_context_embedding_backend: ollama
platform_context_embedding_model: nomic-embed-text
platform_context_embedding_dimension: 0
platform_context_ollama_url: "http://{{ ansible_host }}:{{ ollama_api_port | default(11434) }}"
platform_context_repo_root: "{{ playbook_dir | dirname }}"
platform_context_corpus_sources:
  - src: "{{ platform_context_repo_root }}/docs/adr"
    dest: docs/adr
  - src: "{{ platform_context_repo_root }}/docs/runbooks"
    dest: docs/runbooks
  - src: "{{ platform_context_repo_root }}/receipts/live-applies"
    dest: receipts/live-applies
  - src: "{{ platform_context_repo_root }}/versions/stack.yaml"
    dest: versions/stack.yaml
  - src: "{{ platform_context_repo_root }}/config/dependency-graph.json"
    dest: config/dependency-graph.json
  - src: "{{ platform_context_repo_root }}/config/workflow-catalog.json"
    dest: config/workflow-catalog.json
  - src: "{{ platform_context_repo_root }}/config/command-catalog.json"
    dest: config/command-catalog.json
  - src: "{{ platform_context_repo_root }}/config/agent-tool-registry.json"
    dest: config/agent-tool-registry.json
  - src: "{{ platform_context_repo_root }}/config/error-codes.yaml"
    dest: config/error-codes.yaml
  - src: "{{ platform_context_repo_root }}/config/service-capability-catalog.json"
    dest: config/service-capability-catalog.json
  - src: "{{ platform_context_repo_root }}/config/slo-catalog.json"
    dest: config/slo-catalog.json
  - src: "{{ platform_context_repo_root }}/changelog.md"
    dest: changelog.md
  - src: "{{ platform_context_repo_root }}/VERSION"
    dest: VERSION
platform_context_service_sources:
  - src: "{{ platform_context_repo_root }}/scripts/canonical_errors.py"
    dest: canonical_errors.py
  - src: "{{ platform_context_repo_root }}/scripts/platform_context_corpus.py"
    dest: platform_context_corpus.py
  - src: "{{ platform_context_repo_root }}/scripts/platform_context_service.py"
    dest: platform_context_service.py
  - src: "{{ platform_context_repo_root }}/scripts/dependency_graph.py"
    dest: scripts/dependency_graph.py
  - src: "{{ platform_context_repo_root }}/scripts/slo_tracking.py"
    dest: scripts/slo_tracking.py
  - src: "{{ platform_context_repo_root }}/scripts/controller_automation_toolkit.py"
    dest: scripts/controller_automation_toolkit.py
  - src: "{{ platform_context_repo_root }}/requirements/platform-context-api.txt"
    dest: requirements.txt
platform_context_local_rebuild_script: "{{ platform_context_repo_root }}/scripts/index_platform_knowledge.py"
