---
# NOTE: Conventional variables (site_dir, image, compose_file, env_file, openbao_*,
# container_name, internal_port, local_artifact_dir) are derived from
# platform_service_registry — ADR 0373.
# Purpose: Declare the shared defaults for converging the private platform-context RAG runtime, mirrored corpus, and controller token artifacts.
# Use case: Used whenever the rag_context_runtime role renders the compose stack, mirrored corpus inputs, and verification endpoints.
#
# Inputs (required):
#   - ansible host facts and repo paths (generated, required): Supply URLs, ports, and mirrored source locations.
#
# Inputs (optional):
#   - platform_context_verify_rebuild_local (bool, optional, default=false): Whether verification should rebuild the full local index inline.
#   - platform_context_seed_when_degraded (bool, optional, default=true): Whether verification can perform a bounded seed repair.
#
# Outputs:
#   - Default variable values consumed by the rag_context_runtime role.
#
# Idempotency: Fully idempotent
#              This file only declares role defaults.
#
# Dependencies:
#   - ADR 0198: Defines the semantic RAG runtime and verification model.
#   - Role: rag_context_runtime — converges the live platform-context service.
#
# Related ADRs: 0165, 0198
# Related Runbooks: docs/runbooks/rag-platform-context.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-28
platform_context_service_dir: "{{ platform_context_site_dir }}/service"
platform_context_corpus_dir: "{{ platform_context_site_dir }}/corpus"
platform_context_memory_index_dir: "{{ platform_context_site_dir }}/memory-search-index"
platform_context_memory_index_path: "{{ platform_context_memory_index_dir }}/documents.json"
platform_context_openbao_policy_name: lv3-service-platform-context-runtime
platform_context_openbao_approle_name: platform-context-runtime
platform_context_api_token_remote_file: "{{ platform_context_secret_dir }}/api-token.txt"
platform_context_api_token_local_file: "{{ platform_context_local_artifact_dir }}/api-token.txt"
platform_context_minio_secret_key_local_file: "{{ platform_context_local_artifact_dir }}/minio-secret-key.txt"
platform_context_minio_access_key_id: ragstaging
platform_context_minio_bucket_name: rag-staging
platform_context_minio_region: us-east-1
platform_context_minio_endpoint: "{{ hostvars[platform_topology_host].platform_service_topology | platform_service_url('minio', 'internal') }}"
platform_context_host_proxy_port: 8010
platform_context_controller_url: "http://{{ hostvars[platform_topology_host].management_tailscale_ipv4 }}:{{ platform_context_host_proxy_port }}"
platform_context_private_url: "http://127.0.0.1:{{ platform_context_internal_port }}"
platform_context_qdrant_host_port: 6333
platform_context_api_image_name: lv3-platform-context-api
platform_context_qdrant_collection: platform_context
platform_context_memory_collection: serverclaw_memory
platform_context_embedding_backend: ollama
platform_context_embedding_model: nomic-embed-text
platform_context_embedding_dimension: 0
platform_context_verify_rebuild_local: false
platform_context_seed_when_degraded: true
platform_context_verify_request_retries: 12
platform_context_verify_request_delay_seconds: 5
platform_context_verification_question: what retrieval backend is active for platform context
platform_context_memory_verification_scope_kind: workspace
platform_context_memory_verification_scope_id: adr-0263-smoke
platform_context_memory_verification_object_type: note
platform_context_memory_verification_title: ADR 0263 smoke memory substrate
platform_context_memory_verification_content: >-
  ServerClaw memory substrate smoke entry proving PostgreSQL structured state,
  Qdrant semantic recall, and local keyword recall on the live private
  retrieval runtime.
platform_context_memory_verification_query: serverclaw memory substrate smoke qdrant local search
platform_context_seed_sources:
  - docs/adr/0070-rag-context-for-platform-queries.md
  - docs/adr/0145-ollama-for-local-llm-inference.md
  - docs/adr/0198-qdrant-vector-search-semantic-rag.md
  - docs/runbooks/rag-platform-context.md
platform_context_ollama_url: "http://{{ ansible_host }}:{{ ollama_api_port | default(11434) }}"
platform_context_repo_root: "{{ playbook_dir | dirname }}"
platform_context_shared_local_root: >-
  {{
    (
      lookup(
        'ansible.builtin.pipe',
        'git -C ' ~ (platform_context_repo_root | quote) ~ ' rev-parse --path-format=absolute --git-common-dir'
      )
      | dirname
    )
    ~ '/.local'
  }}
platform_context_database_name: windmill
platform_context_database_user: windmill_admin
platform_context_database_inventory_host: >-
  {{ 'postgres-staging-lv3' if (env | default('production')) == 'staging' else 'postgres-lv3' }}
platform_context_database_host: "{{ hostvars[platform_context_database_inventory_host].ansible_host }}"
platform_context_database_port: 5432
platform_context_database_password_local_file: "{{ platform_context_shared_local_root }}/windmill/database-password.txt"
platform_context_memory_dsn: >-
  postgres://{{ platform_context_database_user }}:{{
    (
      lookup('ansible.builtin.file', platform_context_database_password_local_file, errors='ignore')
      | default('', true)
      | trim
    )
    | urlencode
    | replace('/', '%2F')
  }}@{{ platform_context_database_host }}:{{ platform_context_database_port }}/{{ platform_context_database_name }}?sslmode=disable
platform_context_search_fabric_source_dir: "{{ platform_context_repo_root }}/scripts/search_fabric"
platform_context_corpus_sources:
  - src: "{{ platform_context_repo_root }}/docs/adr"
    dest: docs/adr
  - src: "{{ platform_context_repo_root }}/docs/runbooks"
    dest: docs/runbooks
  - src: "{{ platform_context_repo_root }}/receipts/live-applies"
    dest: receipts/live-applies
  - src: "{{ platform_context_repo_root }}/versions/stack.yaml"
    dest: versions/stack.yaml
  - src: "{{ platform_context_repo_root }}/config/dependency-graph.json"
    dest: config/dependency-graph.json
  - src: "{{ platform_context_repo_root }}/config/workflow-catalog.json"
    dest: config/workflow-catalog.json
  - src: "{{ platform_context_repo_root }}/config/command-catalog.json"
    dest: config/command-catalog.json
  - src: "{{ platform_context_repo_root }}/config/agent-tool-registry.json"
    dest: config/agent-tool-registry.json
  - src: "{{ platform_context_repo_root }}/config/error-codes.yaml"
    dest: config/error-codes.yaml
  - src: "{{ platform_context_repo_root }}/config/service-capability-catalog.json"
    dest: config/service-capability-catalog.json
  - src: "{{ platform_context_repo_root }}/config/slo-catalog.json"
    dest: config/slo-catalog.json
  - src: "{{ platform_context_repo_root }}/changelog.md"
    dest: changelog.md
  - src: "{{ platform_context_repo_root }}/VERSION"
    dest: VERSION
platform_context_service_sources:
  - src: "{{ platform_context_repo_root }}/scripts/canonical_errors.py"
    dest: canonical_errors.py
  - src: "{{ platform_context_repo_root }}/scripts/platform_context_corpus.py"
    dest: platform_context_corpus.py
  - src: "{{ platform_context_repo_root }}/scripts/platform_context_service.py"
    dest: platform_context_service.py
  - src: "{{ platform_context_repo_root }}/scripts/script_bootstrap.py"
    dest: script_bootstrap.py
  - src: "{{ platform_context_repo_root }}/scripts/dependency_graph.py"
    dest: scripts/dependency_graph.py
  - src: "{{ platform_context_repo_root }}/scripts/slo_tracking.py"
    dest: scripts/slo_tracking.py
  - src: "{{ platform_context_repo_root }}/scripts/controller_automation_toolkit.py"
    dest: scripts/controller_automation_toolkit.py
  - src: "{{ platform_context_repo_root }}/requirements/platform-context-api.txt"
    dest: requirements.txt
platform_context_local_rebuild_script: "{{ platform_context_repo_root }}/scripts/index_platform_knowledge.py"
