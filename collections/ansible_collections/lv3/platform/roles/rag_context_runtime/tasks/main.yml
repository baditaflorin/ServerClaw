# Purpose: Converge the platform context runtime, vector backend wiring, and repo-corpus sync workflow.
# Use case: Run during platform-context deploys, updates, and recovery replays.
# Inputs: Runtime paths, service tokens, corpus sources, container images, and vector backend settings.
# Outputs: Brings the platform context service and its supporting runtime assets to the repo-managed state.
# Idempotency: Partially idempotent because bootstrap, corpus sync, and runtime restarts may refresh live state.
# Dependencies: ADR 0165, ADR 0198, and the platform-context service catalogs.
---
- name: Validate platform context runtime inputs
  ansible.builtin.assert:
    that:
      - platform_context_site_dir | length > 0
      - platform_context_service_dir | length > 0
      - platform_context_corpus_dir | length > 0
      - platform_context_data_dir | length > 0
      - platform_context_secret_dir | length > 0
      - platform_context_compose_file | length > 0
      - platform_context_env_file | length > 0
      - platform_context_local_artifact_dir | length > 0
      - platform_context_api_token_local_file | length > 0
      - platform_context_internal_port | int > 0
      - platform_context_qdrant_image | length > 0
      - platform_context_service_sources | length > 0
      - platform_context_corpus_sources | length > 0
    fail_msg: "rag_context_runtime requires compose paths, repo source paths, image settings, and token paths."

- name: Ensure the platform context runtime packages are present
  ansible.builtin.apt:
    name:
      - openssl
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure the platform context directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ platform_context_site_dir }}"
      mode: "0755"
    - path: "{{ platform_context_service_dir }}"
      mode: "0755"
    - path: "{{ platform_context_corpus_dir }}"
      mode: "0755"
    - path: "{{ platform_context_data_dir }}"
      mode: "0755"
    - path: "{{ platform_context_memory_index_dir }}"
      mode: "0755"
    - path: "{{ platform_context_secret_dir }}"
      mode: "0700"

- name: Generate the platform context API token
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ platform_context_api_token_remote_file }}" ]; then
      umask 077
      openssl rand -hex 32 > "{{ platform_context_api_token_remote_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: platform_context_token_generation
  changed_when: "'changed' in platform_context_token_generation.stdout"
  no_log: true

- name: Read the platform context API token
  ansible.builtin.slurp:
    src: "{{ platform_context_api_token_remote_file }}"
  register: platform_context_api_token_raw
  no_log: true

- name: Record the platform context API token
  ansible.builtin.set_fact:
    platform_context_api_token: "{{ platform_context_api_token_raw.content | b64decode | trim }}"
    platform_context_runtime_secret_payload:
      PLATFORM_CONTEXT_API_TOKEN: "{{ platform_context_api_token_raw.content | b64decode | trim }}"
  no_log: true

- name: Ensure the local platform context artifact directory exists
  ansible.builtin.file:
    path: "{{ platform_context_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Mirror the platform context API token to the control machine
  ansible.builtin.copy:
    dest: "{{ platform_context_api_token_local_file }}"
    content: "{{ platform_context_api_token }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Prepare OpenBao agent runtime secret injection for the platform context API
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: openbao_compose_env
  vars:
    common_openbao_compose_env_service_name: platform-context
    common_openbao_compose_env_agent_dir: "{{ platform_context_openbao_agent_dir }}"
    common_openbao_compose_env_runtime_dir: "{{ platform_context_env_file | dirname }}"
    common_openbao_compose_env_env_file: "{{ platform_context_env_file }}"
    common_openbao_compose_env_secret_path: "{{ platform_context_openbao_secret_path }}"
    common_openbao_compose_env_secret_payload: "{{ platform_context_runtime_secret_payload }}"
    common_openbao_compose_env_policy_name: "{{ platform_context_openbao_policy_name }}"
    common_openbao_compose_env_policy_rules: |
      path "sys/health" {
        capabilities = ["read"]
      }

      path "kv/data/{{ platform_context_openbao_secret_path }}" {
        capabilities = ["read"]
      }

      path "kv/metadata/{{ platform_context_openbao_secret_path }}" {
        capabilities = ["read", "list"]
      }
    common_openbao_compose_env_approle_name: "{{ platform_context_openbao_approle_name }}"
    common_openbao_compose_env_agent_config_file: "{{ platform_context_openbao_agent_dir }}/agent.hcl"
    common_openbao_compose_env_agent_template_file: "{{ platform_context_openbao_agent_dir }}/runtime.env.ctmpl"
    common_openbao_compose_env_agent_template_src: platform-context.env.ctmpl.j2
    common_openbao_compose_env_role_id_file: "{{ platform_context_openbao_agent_dir }}/role_id"
    common_openbao_compose_env_secret_id_file: "{{ platform_context_openbao_agent_dir }}/secret_id"
    common_openbao_compose_env_image: "{{ platform_context_openbao_agent_image }}"
    common_openbao_compose_env_legacy_env_files:
      - "{{ platform_context_legacy_env_file }}"
  no_log: true

- name: Render the platform context environment file
  ansible.builtin.template:
    src: platform-context.env.j2
    dest: "{{ platform_context_env_file }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Render the platform context compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ platform_context_compose_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Render the platform context API Dockerfile
  ansible.builtin.copy:
    dest: "{{ platform_context_service_dir }}/Dockerfile"
    content: |
      FROM python:3.12-slim
      WORKDIR /app
      ENV PYTHONPATH=/app/scripts:/app
      COPY requirements.txt ./requirements.txt
      # Only install the heavier sentence-transformers stack when that backend is selected.
      {% if platform_context_embedding_backend == "sentence-transformers" %}
      RUN pip install --no-cache-dir -r requirements.txt sentence-transformers==5.1.0
      {% else %}
      RUN pip install --no-cache-dir -r requirements.txt
      {% endif %}
      COPY canonical_errors.py ./canonical_errors.py
      COPY platform ./platform
      COPY scripts ./scripts
      COPY search_fabric ./search_fabric
      COPY platform_context_corpus.py ./platform_context_corpus.py
      COPY script_bootstrap.py ./script_bootstrap.py
      COPY platform_context_service.py ./platform_context_service.py
      EXPOSE 8010
      CMD ["uvicorn", "platform_context_service:app", "--host", "0.0.0.0", "--port", "8010"]
    owner: root
    group: root
    mode: "0644"

- name: Ensure platform context service source parent directories exist
  ansible.builtin.file:
    path: "{{ platform_context_service_dir }}/{{ item.dest | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ platform_context_service_sources }}"
  loop_control:
    label: "{{ item.dest }}"

- name: Sync the platform context service sources
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ platform_context_service_dir }}/{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ platform_context_service_sources }}"

- name: Create a controller-local archive path for the shared platform package
  ansible.builtin.tempfile:
    state: file
    suffix: .tar.gz
  register: platform_context_platform_package_archive
  delegate_to: localhost
  become: false

- name: Archive the shared platform package for platform-context runtime helpers
  ansible.builtin.command:
    argv:
      - tar
      - -C
      - "{{ platform_context_repo_root }}"
      - -czf
      - "{{ platform_context_platform_package_archive.path }}"
      - platform
  delegate_to: localhost
  become: false
  changed_when: true

- name: Remove the existing shared platform package before unpacking the refreshed archive
  ansible.builtin.file:
    path: "{{ platform_context_service_dir }}/platform"
    state: absent

- name: Copy the shared platform package archive to the runtime host
  ansible.builtin.copy:
    src: "{{ platform_context_platform_package_archive.path }}"
    dest: "{{ platform_context_service_dir }}/platform.tar.gz"
    owner: root
    group: root
    mode: "0644"

- name: Unpack the shared platform package for platform-context runtime helpers
  ansible.builtin.unarchive:
    src: "{{ platform_context_service_dir }}/platform.tar.gz"
    dest: "{{ platform_context_service_dir }}"
    remote_src: true
    owner: root
    group: root

- name: Remove the copied shared platform package archive from the runtime host
  ansible.builtin.file:
    path: "{{ platform_context_service_dir }}/platform.tar.gz"
    state: absent

- name: Remove the controller-local shared platform package archive
  ansible.builtin.file:
    path: "{{ platform_context_platform_package_archive.path }}"
    state: absent
  delegate_to: localhost
  become: false

- name: Sync the shared search fabric package for ServerClaw keyword recall
  ansible.builtin.copy:
    src: "{{ platform_context_search_fabric_source_dir }}/"
    dest: "{{ platform_context_service_dir }}/search_fabric/"
    owner: root
    group: root
    mode: "0644"
    directory_mode: "0755"

- name: Create a controller-local archive path for the platform context corpus bundle
  ansible.builtin.tempfile:
    state: file
    suffix: .tar.gz
  register: platform_context_corpus_archive
  delegate_to: localhost
  become: false

- name: Archive the platform context corpus bundle from the repository workspace
  ansible.builtin.command:
    argv: >-
      {{
        ['tar', '-C', platform_context_repo_root, '-czf', platform_context_corpus_archive.path]
        + (platform_context_corpus_sources | map(attribute='dest') | list)
      }}
  delegate_to: localhost
  become: false
  changed_when: true

- name: Remove the existing platform context corpus bundle paths before unpacking the refreshed archive
  ansible.builtin.file:
    path: "{{ platform_context_corpus_dir }}/{{ item.dest }}"
    state: absent
  loop: "{{ platform_context_corpus_sources }}"
  loop_control:
    label: "{{ item.dest }}"

- name: Copy the platform context corpus bundle archive to the runtime host
  ansible.builtin.copy:
    src: "{{ platform_context_corpus_archive.path }}"
    dest: "{{ platform_context_site_dir }}/corpus.tar.gz"
    owner: root
    group: root
    mode: "0644"

- name: Unpack the platform context corpus bundle on the runtime host
  ansible.builtin.unarchive:
    src: "{{ platform_context_site_dir }}/corpus.tar.gz"
    dest: "{{ platform_context_corpus_dir }}"
    remote_src: true
    owner: root
    group: root

- name: Remove the copied platform context corpus bundle archive from the runtime host
  ansible.builtin.file:
    path: "{{ platform_context_site_dir }}/corpus.tar.gz"
    state: absent

- name: Remove the controller-local platform context corpus bundle archive
  ansible.builtin.file:
    path: "{{ platform_context_corpus_archive.path }}"
    state: absent
  delegate_to: localhost
  become: false

- name: Create a temporary path for the ADR 0263 ServerClaw memory migration
  delegate_to: "{{ platform_context_database_inventory_host }}"
  become: true
  become_user: postgres
  ansible.builtin.tempfile:
    state: file
    suffix: .sql
  register: platform_context_memory_migration_tmp

- name: Copy the ADR 0263 ServerClaw memory migration to the database host
  delegate_to: "{{ platform_context_database_inventory_host }}"
  become: true
  become_user: postgres
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../migrations/0017_serverclaw_memory_schema.sql"
    dest: "{{ platform_context_memory_migration_tmp.path }}"
    mode: "0600"

- name: Apply the ADR 0263 ServerClaw memory migration in the shared platform database
  delegate_to: "{{ platform_context_database_inventory_host }}"
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -d
      - "{{ platform_context_database_name }}"
      - -v
      - ON_ERROR_STOP=1
      - -f
      - "{{ platform_context_memory_migration_tmp.path }}"
  changed_when: false

- name: Remove the temporary ADR 0263 ServerClaw memory migration file
  delegate_to: "{{ platform_context_database_inventory_host }}"
  become: true
  become_user: postgres
  ansible.builtin.file:
    path: "{{ platform_context_memory_migration_tmp.path }}"
    state: absent

- name: Assert the ADR 0263 ServerClaw memory schema exists in the shared platform database
  delegate_to: "{{ platform_context_database_inventory_host }}"
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -d
      - "{{ platform_context_database_name }}"
      - -Atqc
      - "SELECT to_regclass('memory.entries')"
  register: platform_context_memory_schema_check
  changed_when: false

- name: Fail when the ADR 0263 ServerClaw memory schema is missing
  ansible.builtin.assert:
    that:
      - platform_context_memory_schema_check.stdout | trim == 'memory.entries'
    fail_msg: "ADR 0263 live schema apply did not create memory.entries in the shared platform database."

- name: Ensure the ADR 0263 ServerClaw memory schema is owned by the runtime database role
  delegate_to: "{{ platform_context_database_inventory_host }}"
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -d
      - "{{ platform_context_database_name }}"
      - -v
      - ON_ERROR_STOP=1
      - -c
      - >-
        ALTER SCHEMA memory OWNER TO {{ platform_context_database_user }};
        ALTER TABLE memory.entries OWNER TO {{ platform_context_database_user }};
  changed_when: false

- name: Ensure the ADR 0263 ServerClaw memory schema grants runtime access to the database role
  delegate_to: "{{ platform_context_database_inventory_host }}"
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -d
      - "{{ platform_context_database_name }}"
      - -v
      - ON_ERROR_STOP=1
      - -c
      - >-
        GRANT USAGE ON SCHEMA memory TO {{ platform_context_database_user }};
        GRANT ALL ON ALL TABLES IN SCHEMA memory TO {{ platform_context_database_user }};
  changed_when: false

- name: Pull the platform context images
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ platform_context_compose_file }}"
      - pull
      - qdrant
  args:
    chdir: "{{ platform_context_site_dir }}"
  register: platform_context_pull
  changed_when: >-
    'Pulling' in platform_context_pull.stdout
    or 'Downloaded newer image' in platform_context_pull.stdout
    or 'Pull complete' in platform_context_pull.stdout

- name: Wait for Ollama when semantic embeddings use the local Ollama backend
  ansible.builtin.uri:
    url: "{{ platform_context_ollama_url }}/api/version"
    method: GET
    status_code: 200
  register: platform_context_ollama_version
  retries: 24
  delay: 5
  until: platform_context_ollama_version.status == 200
  changed_when: false
  when: platform_context_embedding_backend == "ollama"

- name: Discover currently available Ollama models for semantic retrieval
  ansible.builtin.uri:
    url: "{{ platform_context_ollama_url }}/api/tags"
    method: GET
    status_code: 200
    return_content: true
  register: platform_context_ollama_tags
  changed_when: false
  when: platform_context_embedding_backend == "ollama"

- name: Derive whether the semantic embedding model is already present
  ansible.builtin.set_fact:
    platform_context_embedding_model_present: >-
      {{
        (
          platform_context_ollama_tags.json.models | default([])
          | map(attribute='name')
          | select('match', '^' ~ platform_context_embedding_model ~ '(:|$)')
          | list
          | length
        ) > 0
      }}
  when: platform_context_embedding_backend == "ollama"

- name: Pull the semantic embedding model into Ollama when missing
  ansible.builtin.uri:
    url: "{{ platform_context_ollama_url }}/api/pull"
    method: POST
    body_format: json
    body:
      model: "{{ platform_context_embedding_model }}"
      stream: false
    status_code: 200
    timeout: 3600
    return_content: true
  register: platform_context_embedding_model_pull
  changed_when: true
  when:
    - platform_context_embedding_backend == "ollama"
    - not (platform_context_embedding_model_present | default(false))

- name: Check whether the Docker nat chain exists before recreating published ports
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - nat
      - -S
      - DOCKER
  register: platform_context_docker_nat_chain
  changed_when: false
  failed_when: false

- name: Restore Docker networking when the nat chain is missing
  ansible.builtin.service:
    name: docker
    state: restarted
  when: platform_context_docker_nat_chain.rc != 0

- name: Recheck the Docker nat chain before platform-context startup
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - nat
      - -S
      - DOCKER
  register: platform_context_docker_nat_chain_recheck
  changed_when: false
  failed_when: platform_context_docker_nat_chain_recheck.rc not in [0, 1]
  when: platform_context_docker_nat_chain.rc != 0

- name: Wait for the Docker daemon to answer after networking recovery
  ansible.builtin.command:
    argv:
      - docker
      - info
      - --format
      - '{{ "{{.ServerVersion}}" }}'
  register: platform_context_docker_info
  changed_when: false
  retries: 10
  delay: 2
  until: platform_context_docker_info.rc == 0
  when: platform_context_docker_nat_chain.rc != 0

- name: Build and start the platform context stack and recover stale compose networks
  block:
    - name: Build the platform context API image with host networking
      ansible.builtin.command:
        argv:
          - docker
          - build
          - --network
          - host
          - -t
          - "{{ platform_context_api_image_name }}:latest"
          - "{{ platform_context_service_dir }}"
      args:
        chdir: "{{ platform_context_site_dir }}"
      environment:
        DOCKER_BUILDKIT: "0"
        COMPOSE_DOCKER_CLI_BUILD: "0"
      register: platform_context_build
      changed_when: >-
        'Successfully built' in (platform_context_build.stdout | default(''))
        or 'Successfully tagged' in (platform_context_build.stdout | default(''))
        or 'writing image sha256:' in (platform_context_build.stdout | default(''))

    - name: Start the platform context stack
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ platform_context_compose_file }}"
          - up
          - -d
          - --no-build
          - --remove-orphans
      args:
        chdir: "{{ platform_context_site_dir }}"
      environment:
        DOCKER_BUILDKIT: "0"
        COMPOSE_DOCKER_CLI_BUILD: "0"
      register: platform_context_up
      changed_when: >-
        'Creating' in platform_context_up.stdout
        or 'Recreating' in platform_context_up.stdout
        or 'Starting' in platform_context_up.stdout
        or 'Building' in platform_context_up.stdout
  rescue:
    - name: Flag stale platform context compose-network failures during startup
      ansible.builtin.set_fact:
        platform_context_docker_network_missing: >-
          {{
            'failed to create endpoint' in (ansible_failed_result.stderr | default(''))
            and 'does not exist' in (ansible_failed_result.stderr | default(''))
          }}

    - name: Surface unexpected platform context startup failures
      ansible.builtin.fail:
        msg: >-
          {{
            ansible_failed_result.stderr
            | default(ansible_failed_result.msg | default('platform-context compose up failed'))
          }}
      when: not platform_context_docker_network_missing

    - name: Reset stale platform context compose resources before retrying startup
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ platform_context_compose_file }}"
          - down
          - --remove-orphans
      args:
        chdir: "{{ platform_context_site_dir }}"
      register: platform_context_down
      changed_when: >-
        'Stopping' in (platform_context_down.stdout | default(''))
        or 'Removing' in (platform_context_down.stdout | default(''))
        or 'Removing' in (platform_context_down.stderr | default(''))
      failed_when: false
      when: platform_context_docker_network_missing

    - name: Retry platform context stack startup after compose-network recovery
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ platform_context_compose_file }}"
          - up
          - -d
          - --no-build
          - --force-recreate
          - --remove-orphans
      args:
        chdir: "{{ platform_context_site_dir }}"
      environment:
        DOCKER_BUILDKIT: "0"
        COMPOSE_DOCKER_CLI_BUILD: "0"
      register: platform_context_up
      changed_when: true
      when: platform_context_docker_network_missing

- name: Verify the platform context runtime
  ansible.builtin.import_tasks: verify.yml
