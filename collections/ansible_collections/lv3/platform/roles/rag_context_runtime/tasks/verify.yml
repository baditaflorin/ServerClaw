---
- name: Wait for the platform context API to listen locally
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ platform_context_internal_port }}"
    delay: 0
    timeout: 300

- name: Wait for the platform context health endpoint
  ansible.builtin.uri:
    url: "{{ platform_context_private_url }}/healthz"
    method: GET
    status_code: 200
  register: platform_context_health
  retries: 24
  delay: 5
  until: platform_context_health.status == 200
  changed_when: false

- name: Verify the platform context API rejects anonymous protected requests with the canonical envelope
  ansible.builtin.uri:
    url: "{{ platform_context_private_url }}/v1/platform-summary"
    method: GET
    status_code: 401
    return_content: true
  register: platform_context_auth_check
  changed_when: false

- name: Assert the platform context auth rejection uses the canonical error envelope
  ansible.builtin.assert:
    that:
      - platform_context_auth_check.json.error.code == "AUTH_TOKEN_MISSING"
      - (platform_context_auth_check.json.error.trace_id | default('')) | length > 0
    fail_msg: "Platform context auth rejection did not return the canonical error envelope."

- name: Rebuild the platform context index from the remote mirrored corpus
  ansible.builtin.uri:
    url: "{{ platform_context_private_url }}/v1/admin/rebuild-local"
    method: POST
    timeout: 900
    headers:
      Authorization: "Bearer {{ platform_context_api_token }}"
    body_format: json
    body: {}
    status_code: 200
    return_content: true
  register: platform_context_rebuild
  changed_when: false
  no_log: true
  when: platform_context_verify_rebuild_local | bool

- name: Note when live apply skips the inline local corpus rebuild
  ansible.builtin.debug:
    msg: >-
      Skipping inline local corpus rebuild during live apply; production rebuilds run as an
      explicit maintenance action because the expanded semantic corpus exceeds the safe
      synchronous rebuild budget on docker-runtime-lv3.
  when: not (platform_context_verify_rebuild_local | bool)

- name: Verify the platform context query endpoint
  ansible.builtin.uri:
    url: "{{ platform_context_private_url }}/v1/context/query"
    method: POST
    timeout: 180
    headers:
      Authorization: "Bearer {{ platform_context_api_token }}"
    body_format: json
    body:
      question: "{{ platform_context_verification_question }}"
      top_k: 3
    status_code: 200
    return_content: true
  register: platform_context_query
  changed_when: false
  no_log: true

- name: Record whether the live platform context query already has healthy vector retrieval
  ansible.builtin.set_fact:
    platform_context_query_is_healthy: >-
      {{
        (platform_context_query.json.retrieval_backend | default('')) == 'vector'
        and ((platform_context_query.json.matches | default([])) | length) > 0
        and ((platform_context_query.json.matches[0].source_path | default('')) | length) > 0
      }}

- name: Repair a degraded platform context vector index with a bounded controller-side seed rebuild
  ansible.builtin.command:
    cmd: >-
      python3 {{ platform_context_local_rebuild_script | quote }}
      --repo-root {{ platform_context_repo_root | quote }}
      --api-url {{ platform_context_controller_url | quote }}
      --api-token-file {{ platform_context_api_token_local_file | quote }}
      {% for path in platform_context_seed_sources %}
      --include-path {{ path | quote }}
      {% endfor %}
  args:
    chdir: "{{ platform_context_repo_root }}"
  delegate_to: localhost
  become: false
  register: platform_context_seed_rebuild
  changed_when: true
  when:
    - not (platform_context_verify_rebuild_local | bool)
    - platform_context_seed_when_degraded | bool
    - not (platform_context_query_is_healthy | bool)

- name: Re-verify the platform context query endpoint after seed repair
  ansible.builtin.uri:
    url: "{{ platform_context_private_url }}/v1/context/query"
    method: POST
    timeout: 180
    headers:
      Authorization: "Bearer {{ platform_context_api_token }}"
    body_format: json
    body:
      question: "{{ platform_context_verification_question }}"
      top_k: 3
    status_code: 200
    return_content: true
  register: platform_context_query_repaired
  changed_when: false
  no_log: true
  when:
    - platform_context_seed_rebuild is defined
    - not (platform_context_query_is_healthy | bool)

- name: Choose the verified platform context query payload
  ansible.builtin.set_fact:
    platform_context_verified_query: >-
      {{
        platform_context_query_repaired
        if (
          platform_context_query_repaired is defined
          and not (platform_context_query_is_healthy | bool)
        )
        else platform_context_query
      }}

- name: Note when verification had to repair a degraded vector collection
  ansible.builtin.debug:
    msg: >-
      The live vector collection was degraded during verification, so the role repaired it with a
      bounded controller-side semantic seed rebuild. Run the full repo-grounded rebuild as a
      separate maintenance action when you need the entire mirrored corpus refreshed.
  when:
    - platform_context_seed_rebuild is defined
    - not (platform_context_query_is_healthy | bool)

- name: Assert the platform context query returned cited results
  ansible.builtin.assert:
    that:
      - platform_context_verified_query.json.retrieval_backend == "vector"
      - (platform_context_verified_query.json.matches | default([])) | length > 0
      - (platform_context_verified_query.json.matches[0].source_path | default('')) | length > 0
    fail_msg: "Platform context API responded, but the query did not return cited matches."
