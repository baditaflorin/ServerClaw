---
# Dependencies: ADR 0371.
- name: Verify the NATS JetStream runtime
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: nats-jetstream
    common_verify_port: "{{ nats_jetstream_port }}"
    common_verify_port_timeout: 30
    common_verify_health_url: "{{ nats_jetstream_monitor_health_url }}"
    common_verify_health_retries: 10
    common_verify_health_delay: 2
