---
# NOTE: Conventional variables (site_dir, image, compose_file, env_file,
# openbao_*, container_name, internal_port, local_artifact_dir) are derived
# from platform_service_registry — ADR 0373.
nats_jetstream_server_name: lv3-nats-jetstream
nats_jetstream_config_dir: "{{ nats_jetstream_site_dir }}/config"
nats_jetstream_config_file: "{{ nats_jetstream_config_dir }}/nats-server.conf"
nats_jetstream_admin_password_local_file: "{{ nats_jetstream_local_artifact_dir }}/jetstream-admin-password.txt"
nats_jetstream_admin_user: jetstream-admin
nats_jetstream_listen_host: 0.0.0.0
nats_jetstream_port: 4222
nats_jetstream_monitor_host: 127.0.0.1
nats_jetstream_monitor_port: 8222
nats_jetstream_monitor_health_url: "http://127.0.0.1:{{ nats_jetstream_monitor_port }}/healthz"
nats_jetstream_publish_allow:
  - $JS.API.>
  - platform.>
  - rag.document.>
  - secret.rotation.>
nats_jetstream_subscribe_allow:
  - _INBOX.>
nats_jetstream_additional_users:
  - user: control-plane-publisher
    password_local_file: "{{ nats_jetstream_local_artifact_dir }}/control-plane-publisher-password.txt"
    publish_allow:
      - lv3.>
    subscribe_allow:
      - _INBOX.>
  - user: workflow-consumer
    password_local_file: "{{ nats_jetstream_local_artifact_dir }}/workflow-consumer-password.txt"
    publish_allow:
      - $JS.API.>
    subscribe_allow:
      - _INBOX.>
    allow_responses: true
  - user: alert-consumer
    password_local_file: "{{ nats_jetstream_local_artifact_dir }}/alert-consumer-password.txt"
    publish_allow:
      - $JS.API.>
    subscribe_allow:
      - _INBOX.>
    allow_responses: true
  - user: receipt-consumer
    password_local_file: "{{ nats_jetstream_local_artifact_dir }}/receipt-consumer-password.txt"
    publish_allow:
      - $JS.API.>
    subscribe_allow:
      - _INBOX.>
    allow_responses: true
  - user: agent-consumer
    password_local_file: "{{ nats_jetstream_local_artifact_dir }}/agent-consumer-password.txt"
    publish_allow:
      - $JS.API.>
    subscribe_allow:
      - _INBOX.>
    allow_responses: true
nats_jetstream_max_memory_store: 256MB
nats_jetstream_max_file_store: 2GB
