---
argument_specs:
  main:
    short_description: Enforce the canonical guest network policy with nftables on Debian guests.
    options:
      linux_guest_firewall_config_file:
        type: path
        required: false
        default: /etc/nftables.conf
        description:
          - Destination path for the managed guest nftables policy.
      linux_guest_firewall_host_id:
        type: str
        required: false
        default: proxmox-host
        description:
          - Inventory host ID that owns the canonical `network_policy` data.
      linux_guest_firewall_docker_bridge_chain_service_name:
        type: str
        required: false
        default: docker
        description:
          - Service name to use when checking or restarting Docker bridge chains after a guest firewall replay.
      linux_guest_firewall_recover_missing_docker_bridge_chains:
        type: bool
        required: false
        default: false
        description:
          - When true, restart the Docker service and re-run the bridge-chain helper if the guest firewall replay leaves the Docker nat or forward chains missing.
      network_policy:
        type: dict
        required: false
        description:
          - Canonical guest network policy mapping from the Proxmox host inventory.
