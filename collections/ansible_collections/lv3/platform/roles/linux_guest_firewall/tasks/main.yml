# Purpose: Render and apply the canonical nftables guest firewall policy on managed Linux guests.
# Use case: Include when a guest should enforce the repo-defined network policy derived from the host inventory.
# Inputs: linux_guest_firewall_* variables plus hostvars for the canonical guest network policy.
# Outputs: Installed nftables package, rendered guest firewall config, and enabled firewall service.
# Idempotency: Fully idempotent; tasks converge the same guest policy on repeated runs.
# Dependencies: ADR 0165 metadata standard, the linux_guest_firewall role defaults, and canonical host policy data.
---
- name: Validate guest network policy inputs
  ansible.builtin.assert:
    that:
      - linux_guest_firewall_config_file | length > 0
      - linux_guest_firewall_host_id in hostvars
      - hostvars[linux_guest_firewall_host_id].network_policy is mapping
      - hostvars[linux_guest_firewall_host_id].network_policy.guests is mapping
      - inventory_hostname in hostvars[linux_guest_firewall_host_id].network_policy.guests
    fail_msg: "linux_guest_firewall requires canonical host vars and a network policy entry for the current guest."

- name: Ensure nftables is installed on the guest
  ansible.builtin.apt:
    name: nftables
    state: present

- name: Snapshot the canonical guest firewall policy inputs
  ansible.builtin.set_fact:
    linux_guest_firewall_policy: "{{ hostvars[linux_guest_firewall_host_id].network_policy }}"
    linux_guest_firewall_guest_ip_map: >-
      {{
        dict(
          hostvars[linux_guest_firewall_host_id].proxmox_guests | map(attribute='name')
          | zip(hostvars[linux_guest_firewall_host_id].proxmox_guests | map(attribute='ipv4'))
        )
      }}
    linux_guest_firewall_guest_role_map: >-
      {{
        dict(
          hostvars[linux_guest_firewall_host_id].proxmox_guests | map(attribute='name')
          | zip(hostvars[linux_guest_firewall_host_id].proxmox_guests | map(attribute='role'))
        )
      }}

- name: Render guest nftables policy
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: "{{ linux_guest_firewall_config_file }}"
    mode: "0644"
    validate: /usr/sbin/nft -c -f %s
  register: linux_guest_firewall_config

- name: Ensure nftables is enabled and started
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started

- name: Reload guest nftables policy
  ansible.builtin.command: "nft -f {{ linux_guest_firewall_config_file }}"
  when: linux_guest_firewall_config.changed
  changed_when: true

- name: Reset SSH connection after guest nftables policy evaluation
  ansible.builtin.meta: reset_connection

- name: Wait for guest SSH after nftables changes
  ansible.builtin.wait_for_connection:
    timeout: 120
    connect_timeout: 5
    sleep: 2
  when: linux_guest_firewall_config.changed

- name: Ensure Docker bridge networking remains available after firewall evaluation
  block:
    - name: Assert Docker bridge chains remain available after guest firewall evaluation
      ansible.builtin.include_role:
        name: lv3.platform.common
        tasks_from: docker_bridge_chains
      vars:
        common_docker_bridge_chains_service_name: "{{ linux_guest_firewall_docker_bridge_chain_service_name }}"
  rescue:
    - name: Reset Docker failed state before guest firewall bridge-chain recovery restart
      ansible.builtin.command:
        argv:
          - systemctl
          - reset-failed
          - "{{ linux_guest_firewall_docker_bridge_chain_service_name }}.service"
      changed_when: false
      when: linux_guest_firewall_recover_missing_docker_bridge_chains | bool

    - name: Restart Docker to restore bridge chains after guest firewall evaluation
      ansible.builtin.service:
        name: "{{ linux_guest_firewall_docker_bridge_chain_service_name }}"
        state: restarted
      when: linux_guest_firewall_recover_missing_docker_bridge_chains | bool

    - name: Re-assert Docker bridge chains after guest firewall recovery restart
      ansible.builtin.include_role:
        name: lv3.platform.common
        tasks_from: docker_bridge_chains
      vars:
        common_docker_bridge_chains_service_name: "{{ linux_guest_firewall_docker_bridge_chain_service_name }}"
      when: linux_guest_firewall_recover_missing_docker_bridge_chains | bool

    - name: Surface Docker bridge-chain failures after guest firewall evaluation when recovery is disabled
      ansible.builtin.fail:
        msg: >-
          {{
            ansible_failed_result.msg
            | default(
                ansible_failed_result.stderr
                | default(
                    ansible_failed_result.stdout
                    | default('Docker bridge chain validation failed after guest firewall evaluation.')
                )
              )
          }}
      when: not linux_guest_firewall_recover_missing_docker_bridge_chains | bool

- name: Re-render guest nftables policy after Docker bridge chain evaluation
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: "{{ linux_guest_firewall_config_file }}"
    mode: "0644"
    validate: /usr/sbin/nft -c -f %s
  register: linux_guest_firewall_post_bridge_config

- name: Reload guest nftables policy after Docker bridge chain evaluation
  ansible.builtin.command: "nft -f {{ linux_guest_firewall_config_file }}"
  when: linux_guest_firewall_post_bridge_config.changed
  changed_when: true

- name: Reset SSH connection after post-bridge guest nftables policy evaluation
  ansible.builtin.meta: reset_connection

- name: Wait for guest SSH after post-bridge nftables changes
  ansible.builtin.wait_for_connection:
    timeout: 120
    connect_timeout: 5
    sleep: 2
  when: linux_guest_firewall_post_bridge_config.changed
