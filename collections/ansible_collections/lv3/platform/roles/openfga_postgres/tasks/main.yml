# Purpose: Provision the PostgreSQL role, database, and password material used by the OpenFGA runtime.
# Use case: Run during OpenFGA bootstrap or recovery when the delegated-auth data plane needs its backing database.
# Inputs: Database names, secret directories, and controller-local password sources for the OpenFGA service account.
# Outputs: Ensures the OpenFGA PostgreSQL database, role grants, and password files exist in the expected locations.
# Idempotency: Partially idempotent because first-run secret material may be created before later runs converge on it.
# Dependencies: ADR 0165, ADR 0026, and ADR 0262.
---
- name: Validate OpenFGA PostgreSQL inputs
  ansible.builtin.assert:
    that:
      - openfga_database_name | length > 0
      - openfga_database_user | length > 0
      - openfga_postgres_secret_dir | length > 0
      - openfga_postgres_password_file | length > 0
      - openfga_database_password_local_file | length > 0
    fail_msg: "openfga_postgres requires database names and local or remote password paths."

- name: Ensure the OpenFGA PostgreSQL secret directory exists
  ansible.builtin.file:
    path: "{{ openfga_postgres_secret_dir }}"
    state: directory
    owner: root
    group: postgres
    mode: "0750"

- name: Ensure the local OpenFGA artifact directory exists
  ansible.builtin.file:
    path: "{{ openfga_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate the OpenFGA database password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ openfga_database_password_local_file }}" ]; then
      umask 077
      openssl rand -base64 24 | tr -d '\n' > "{{ openfga_database_password_local_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: openfga_postgres_password_generation
  changed_when: "'changed' in openfga_postgres_password_generation.stdout"
  no_log: true

- name: Read the OpenFGA database password
  ansible.builtin.slurp:
    src: "{{ openfga_database_password_local_file }}"
  delegate_to: localhost
  become: false
  register: openfga_postgres_password_raw
  no_log: true

- name: Record the OpenFGA database password
  ansible.builtin.set_fact:
    openfga_database_password: "{{ openfga_postgres_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Mirror the OpenFGA database password to the control machine
  ansible.builtin.copy:
    dest: "{{ openfga_database_password_local_file }}"
    content: "{{ openfga_database_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Persist the OpenFGA database password on the current guest
  ansible.builtin.copy:
    dest: "{{ openfga_postgres_password_file }}"
    content: "{{ openfga_database_password }}\n"
    owner: root
    group: postgres
    mode: "0640"
  no_log: true

- name: Check whether the local PostgreSQL member is writable
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT CASE WHEN pg_is_in_recovery() THEN 0 ELSE 1 END"
  register: openfga_postgres_writable_check
  changed_when: false

- name: Check whether the OpenFGA database role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ openfga_database_user }}'"
  register: openfga_postgres_role_check
  changed_when: false
  when: openfga_postgres_writable_check.stdout | trim == "1"

- name: Create the OpenFGA database role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE ROLE {{ openfga_database_user }} LOGIN PASSWORD '{{ openfga_database_password }}'"
  changed_when: true
  no_log: true
  when:
    - openfga_postgres_writable_check.stdout | trim == "1"
    - openfga_postgres_role_check.stdout != "1"

- name: Check whether the OpenFGA PostgreSQL database already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_database WHERE datname = '{{ openfga_database_name }}'"
  register: openfga_postgres_database_check
  changed_when: false
  when: openfga_postgres_writable_check.stdout | trim == "1"

- name: Create the OpenFGA PostgreSQL database
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE DATABASE {{ openfga_database_name }} OWNER {{ openfga_database_user }}"
  when:
    - openfga_postgres_writable_check.stdout | trim == "1"
    - openfga_postgres_database_check.stdout != "1"
  changed_when: true

- name: Ensure the OpenFGA database owner is correct
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER DATABASE {{ openfga_database_name }} OWNER TO {{ openfga_database_user }}"
  changed_when: false
  when: openfga_postgres_writable_check.stdout | trim == "1"
