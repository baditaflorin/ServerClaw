---
# Purpose: Prepare the Vikunja PostgreSQL database, roles, and managed password artifacts on postgres-lv3.
# Use case: Run before the Vikunja runtime converge so the application has a repo-managed database and login.
#
# Inputs (required):
#   - vikunja_database_name (str, required): Managed Vikunja database name.
#   - vikunja_database_user (str, required): Managed Vikunja login role.
#   - vikunja_database_support_role (str, required): Managed support role granted to the login.
#   - vikunja_postgres_secret_dir (path, required): Guest-side secret directory.
#   - vikunja_postgres_password_file (path, required): Guest-side password file path.
#   - vikunja_database_password_local_file (path, required): Controller-local password artifact path.
#
# Outputs:
#   - Managed PostgreSQL roles, the Vikunja database, and mirrored local/remote password files.
#
# Idempotency: Fully idempotent
#              Role creation and database creation are guarded by existence checks; password material is reused after first generation.
#
# Dependencies:
#   - ADR 0286: Defines Vikunja as a repo-managed service with PostgreSQL storage.
#   - Requires: Writable PostgreSQL primary reachable on postgres-lv3.
#   - Role: vikunja_postgres — prepares the Vikunja database bootstrap state.
#
# Related ADRs: 0165, 0286
# Related Runbooks: docs/runbooks/configure-vikunja.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-30
- name: Validate Vikunja PostgreSQL inputs
  ansible.builtin.assert:
    that:
      - vikunja_database_name | length > 0
      - vikunja_database_user | length > 0
      - vikunja_database_support_role | length > 0
      - vikunja_postgres_secret_dir | length > 0
      - vikunja_postgres_password_file | length > 0
      - vikunja_database_password_local_file | length > 0
    fail_msg: "vikunja_postgres requires database names and password paths."

- name: Ensure the Vikunja PostgreSQL secret directory exists
  ansible.builtin.file:
    path: "{{ vikunja_postgres_secret_dir }}"
    state: directory
    owner: root
    group: postgres
    mode: "0750"

- name: Ensure the local Vikunja artifact directory exists
  ansible.builtin.file:
    path: "{{ vikunja_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate the Vikunja database password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ vikunja_database_password_local_file }}" ]; then
      umask 077
      openssl rand -base64 24 | tr -d '\n' > "{{ vikunja_database_password_local_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: vikunja_postgres_password_generation
  changed_when: "'changed' in vikunja_postgres_password_generation.stdout"
  no_log: true

- name: Read the Vikunja database password
  ansible.builtin.slurp:
    src: "{{ vikunja_database_password_local_file }}"
  delegate_to: localhost
  become: false
  register: vikunja_postgres_password_raw
  no_log: true

- name: Record the Vikunja database password
  ansible.builtin.set_fact:
    vikunja_database_password: "{{ vikunja_postgres_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Mirror the Vikunja database password to the control machine
  ansible.builtin.copy:
    dest: "{{ vikunja_database_password_local_file }}"
    content: "{{ vikunja_database_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Persist the Vikunja database password on the current guest
  ansible.builtin.copy:
    dest: "{{ vikunja_postgres_password_file }}"
    content: "{{ vikunja_database_password }}\n"
    owner: root
    group: postgres
    mode: "0640"
  no_log: true

- name: Check whether the local PostgreSQL member is writable
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT CASE WHEN pg_is_in_recovery() THEN 0 ELSE 1 END"
  register: vikunja_postgres_writable_check
  changed_when: false

- name: Check whether the Vikunja support role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ vikunja_database_support_role }}'"
  register: vikunja_postgres_support_role_check
  changed_when: false
  when: vikunja_postgres_writable_check.stdout | trim == "1"

- name: Create the Vikunja support role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE ROLE {{ vikunja_database_support_role }}"
  changed_when: true
  when:
    - vikunja_postgres_writable_check.stdout | trim == "1"
    - vikunja_postgres_support_role_check.stdout != "1"

- name: Check whether the Vikunja admin role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ vikunja_database_user }}'"
  register: vikunja_postgres_admin_role_check
  changed_when: false
  when: vikunja_postgres_writable_check.stdout | trim == "1"

- name: Create the Vikunja admin role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - >-
        CREATE ROLE {{ vikunja_database_user }} LOGIN
        PASSWORD '{{ vikunja_database_password }}' IN ROLE {{ vikunja_database_support_role }}
  changed_when: true
  no_log: true
  when:
    - vikunja_postgres_writable_check.stdout | trim == "1"
    - vikunja_postgres_admin_role_check.stdout != "1"

- name: Ensure the Vikunja admin role password matches the managed secret
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER ROLE {{ vikunja_database_user }} PASSWORD '{{ vikunja_database_password }}'"
  changed_when: false
  no_log: true
  when: vikunja_postgres_writable_check.stdout | trim == "1"

- name: Grant the Vikunja support role to the admin role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "GRANT {{ vikunja_database_support_role }} TO {{ vikunja_database_user }}"
  changed_when: false
  when: vikunja_postgres_writable_check.stdout | trim == "1"

- name: Check whether the Vikunja PostgreSQL database already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_database WHERE datname = '{{ vikunja_database_name }}'"
  register: vikunja_postgres_database_check
  changed_when: false
  when: vikunja_postgres_writable_check.stdout | trim == "1"

- name: Create the Vikunja PostgreSQL database
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE DATABASE {{ vikunja_database_name }} OWNER {{ vikunja_database_user }}"
  when:
    - vikunja_postgres_writable_check.stdout | trim == "1"
    - vikunja_postgres_database_check.stdout != "1"
  changed_when: true

- name: Ensure the Vikunja database owner is correct
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER DATABASE {{ vikunja_database_name }} OWNER TO {{ vikunja_database_user }}"
  changed_when: false
  when: vikunja_postgres_writable_check.stdout | trim == "1"
