---
- name: Validate NetBox PostgreSQL inputs
  ansible.builtin.assert:
    that:
      - netbox_database_name | length > 0
      - netbox_database_user | length > 0
      - netbox_postgres_secret_dir | length > 0
      - netbox_postgres_password_file | length > 0
      - netbox_database_password_local_file | length > 0
    fail_msg: "netbox_postgres requires database names and password paths."

- name: Ensure the NetBox PostgreSQL secret directory exists
  ansible.builtin.file:
    path: "{{ netbox_postgres_secret_dir }}"
    state: directory
    owner: root
    group: postgres
    mode: "0750"

- name: Ensure the local NetBox artifact directory exists
  ansible.builtin.file:
    path: "{{ netbox_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate the NetBox database password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ netbox_database_password_local_file }}" ]; then
      umask 077
      openssl rand -base64 24 | tr -d '\n' > "{{ netbox_database_password_local_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: netbox_postgres_password_generation
  changed_when: "'changed' in netbox_postgres_password_generation.stdout"
  no_log: true

- name: Read the NetBox database password
  ansible.builtin.slurp:
    src: "{{ netbox_database_password_local_file }}"
  delegate_to: localhost
  become: false
  register: netbox_postgres_password_raw
  no_log: true

- name: Record the NetBox database password
  ansible.builtin.set_fact:
    netbox_database_password: "{{ netbox_postgres_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Mirror the NetBox database password to the control machine
  ansible.builtin.copy:
    dest: "{{ netbox_database_password_local_file }}"
    content: "{{ netbox_database_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Persist the NetBox database password on the current guest
  ansible.builtin.copy:
    dest: "{{ netbox_postgres_password_file }}"
    content: "{{ netbox_database_password }}\n"
    owner: root
    group: postgres
    mode: "0640"
  no_log: true

- name: Check whether the local PostgreSQL member is writable
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT CASE WHEN pg_is_in_recovery() THEN 0 ELSE 1 END"
  register: netbox_postgres_writable_check
  changed_when: false

- name: Check whether the NetBox admin role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ netbox_database_user }}'"
  register: netbox_postgres_admin_role_check
  changed_when: false
  when: netbox_postgres_writable_check.stdout | trim == "1"

- name: Create the NetBox admin role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE ROLE {{ netbox_database_user }} LOGIN PASSWORD '{{ netbox_database_password }}'"
  changed_when: true
  no_log: true
  when:
    - netbox_postgres_writable_check.stdout | trim == "1"
    - netbox_postgres_admin_role_check.stdout != "1"

- name: Ensure the NetBox admin role password matches the mirrored secret
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER ROLE {{ netbox_database_user }} WITH LOGIN PASSWORD '{{ netbox_database_password }}'"
  changed_when: false
  no_log: true
  when: netbox_postgres_writable_check.stdout | trim == "1"

- name: Check whether the NetBox PostgreSQL database already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_database WHERE datname = '{{ netbox_database_name }}'"
  register: netbox_postgres_database_check
  changed_when: false
  when: netbox_postgres_writable_check.stdout | trim == "1"

- name: Create the NetBox PostgreSQL database
  become: true
  become_user: postgres
  ansible.builtin.shell: >
    psql -v ON_ERROR_STOP=1
    -c "CREATE DATABASE {{ netbox_database_name }} OWNER {{ netbox_database_user }}"
  args:
    executable: /bin/bash
  when:
    - netbox_postgres_writable_check.stdout | trim == "1"
    - netbox_postgres_database_check.stdout != "1"
  changed_when: true

- name: Ensure the NetBox database owner is correct
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER DATABASE {{ netbox_database_name }} OWNER TO {{ netbox_database_user }}"
  changed_when: false
  when: netbox_postgres_writable_check.stdout | trim == "1"
