---
# Purpose: Provision the netbox PostgreSQL database using the shared postgres_client role (ADR 0359).
# Use case: Called during netbox deployment to ensure the database, role, and credentials exist.
# Inputs: netbox_* variables from defaults/main.yml; resolves registry entry from platform_postgres_clients.
# Outputs: netbox PostgreSQL role, database, and credential files converged on postgres.
# Idempotency: Yes; postgres_client role handles all idempotency.
# Dependencies: ADR 0359 postgres_client role, platform_postgres_clients registry.
- name: Provision the netbox database via the shared postgres_client role
  ansible.builtin.include_role:
    name: lv3.platform.postgres_client
  vars:
    postgres_client_service: "{{ netbox_database_name }}"
    postgres_client_database: "{{ netbox_database_name }}"
    postgres_client_user: "{{ netbox_database_user }}"
    postgres_client_password_local_file: "{{ netbox_database_password_local_file }}"
    postgres_client_password_remote_dir: "{{ netbox_postgres_secret_dir }}"
    postgres_client_password_remote_file: "{{ netbox_postgres_password_file }}"
