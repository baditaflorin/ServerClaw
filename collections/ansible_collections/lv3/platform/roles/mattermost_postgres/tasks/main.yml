---
- name: Validate Mattermost PostgreSQL inputs
  ansible.builtin.assert:
    that:
      - mattermost_database_name | length > 0
      - mattermost_database_user | length > 0
      - mattermost_database_support_role | length > 0
      - mattermost_postgres_secret_dir | length > 0
      - mattermost_postgres_password_file | length > 0
      - mattermost_database_password_local_file | length > 0
    fail_msg: "mattermost_postgres requires database names and local or remote password paths."

- name: Ensure the Mattermost PostgreSQL secret directory exists
  ansible.builtin.file:
    path: "{{ mattermost_postgres_secret_dir }}"
    state: directory
    owner: root
    group: postgres
    mode: "0750"

- name: Generate the Mattermost database password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ mattermost_postgres_password_file }}" ]; then
      umask 077
      openssl rand -base64 24 | tr -d '\n' > "{{ mattermost_postgres_password_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: mattermost_postgres_password_generation
  changed_when: "'changed' in mattermost_postgres_password_generation.stdout"
  no_log: true

- name: Read the Mattermost database password
  ansible.builtin.slurp:
    src: "{{ mattermost_postgres_password_file }}"
  register: mattermost_postgres_password_raw
  no_log: true

- name: Record the Mattermost database password
  ansible.builtin.set_fact:
    mattermost_database_password: "{{ mattermost_postgres_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Ensure the local Mattermost artifact directory exists
  ansible.builtin.file:
    path: "{{ mattermost_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Mirror the Mattermost database password to the control machine
  ansible.builtin.copy:
    dest: "{{ mattermost_database_password_local_file }}"
    content: "{{ mattermost_database_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Check whether the Mattermost support role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ mattermost_database_support_role }}'"
  register: mattermost_postgres_support_role_check
  changed_when: false

- name: Create the Mattermost support role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE ROLE {{ mattermost_database_support_role }}"
  when: mattermost_postgres_support_role_check.stdout != "1"
  changed_when: true

- name: Check whether the Mattermost admin role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ mattermost_database_user }}'"
  register: mattermost_postgres_admin_role_check
  changed_when: false

- name: Create the Mattermost admin role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - >-
        CREATE ROLE {{ mattermost_database_user }} LOGIN
        PASSWORD '{{ mattermost_database_password }}' IN ROLE {{ mattermost_database_support_role }}
  when: mattermost_postgres_admin_role_check.stdout != "1"
  changed_when: true
  no_log: true

- name: Ensure the Mattermost admin role password matches the managed secret
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER ROLE {{ mattermost_database_user }} PASSWORD '{{ mattermost_database_password }}'"
  changed_when: false
  no_log: true

- name: Grant the Mattermost support role to the admin role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "GRANT {{ mattermost_database_support_role }} TO {{ mattermost_database_user }}"
  changed_when: false

- name: Check whether the Mattermost PostgreSQL database already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_database WHERE datname = '{{ mattermost_database_name }}'"
  register: mattermost_postgres_database_check
  changed_when: false

- name: Create the Mattermost PostgreSQL database
  become: true
  become_user: postgres
  ansible.builtin.shell: >
    psql -v ON_ERROR_STOP=1
    -c "CREATE DATABASE {{ mattermost_database_name }} OWNER {{ mattermost_database_user }}"
  args:
    executable: /bin/bash
  when: mattermost_postgres_database_check.stdout != "1"
  changed_when: true

- name: Ensure the Mattermost database owner is correct
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER DATABASE {{ mattermost_database_name }} OWNER TO {{ mattermost_database_user }}"
  changed_when: false
