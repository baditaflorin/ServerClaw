# Purpose: Verify that the managed Nextcloud runtime is healthy, installed, and operator-accessible after converge.
# Dependencies: ADR 0165, ADR 0260, ADR 0371; requires a running nextcloud_runtime deployment.
---
- name: Verify the Nextcloud runtime health
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: nextcloud
    common_verify_port: "{{ nextcloud_internal_port }}"
    common_verify_health_url: "{{ nextcloud_internal_base_url }}/status.php"
    common_verify_health_retries: 24
    common_verify_health_delay: 5
    common_verify_health_assertions:
      - "(common_verify_health_response.content | from_json).installed | default(false)"
      - "(common_verify_health_response.content | from_json).maintenance | default(false) == false"
      - "(common_verify_health_response.content | from_json).version | length > 0"
    common_verify_health_assertion_msg: "Nextcloud answered locally, but the status payload did not report an installed and healthy instance."

- name: Verify the bootstrap Nextcloud admin exists
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - --user
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - user:info
      - "{{ nextcloud_admin_user }}"
      - --output=json
  register: nextcloud_verify_admin
  retries: "{{ nextcloud_occ_command_retries | int }}"
  delay: "{{ nextcloud_occ_command_delay_seconds | int }}"
  until: nextcloud_verify_admin.rc == 0
  changed_when: false
  no_log: true

- name: Assert the bootstrap Nextcloud admin is enabled
  ansible.builtin.assert:
    that:
      - (nextcloud_verify_admin.stdout | from_json).enabled | default(false)
    fail_msg: "The repo-managed Nextcloud bootstrap admin could not be queried through OCC."
  no_log: true

- name: Verify Nextcloud background jobs run in cron mode
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - --user
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - config:app:get
      - core
      - backgroundjobs_mode
  register: nextcloud_verify_background_jobs
  retries: "{{ nextcloud_occ_command_retries | int }}"
  delay: "{{ nextcloud_occ_command_delay_seconds | int }}"
  until: nextcloud_verify_background_jobs.rc == 0
  changed_when: false

- name: Assert the Nextcloud background job mode is cron
  ansible.builtin.assert:
    that:
      - nextcloud_verify_background_jobs.stdout | trim == 'cron'
    fail_msg: "Nextcloud background jobs are not configured for the managed cron runner."
