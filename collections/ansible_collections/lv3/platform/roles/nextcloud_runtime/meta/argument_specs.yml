# Purpose: Declare the argument contract for the Nextcloud runtime role.
# Use case: Run during syntax and argument validation before converging the Nextcloud application stack.
# Inputs: nextcloud_runtime and nextcloud_* variables required by the role tasks and templates.
# Outputs: Machine-readable argument specs for the nextcloud_runtime role.
# Idempotency: Fully idempotent; metadata only validates role inputs.
# Dependencies: ADR 0165 metadata standard, ADR 0260, and the nextcloud_runtime role tasks.
---
argument_specs:
  main:
    short_description: Converge the Nextcloud runtime, bootstrap personal data plane secrets, and enforce DAV-ready proxy settings.
    options:
      nextcloud_site_dir:
        type: path
        required: true
      nextcloud_data_dir:
        type: path
        required: true
      nextcloud_redis_data_dir:
        type: path
        required: true
      nextcloud_secret_dir:
        type: path
        required: true
      nextcloud_compose_file:
        type: path
        required: true
      nextcloud_env_file:
        type: path
        required: true
      nextcloud_container_name:
        type: str
        required: true
      nextcloud_cron_container_name:
        type: str
        required: true
      nextcloud_redis_container_name:
        type: str
        required: true
      nextcloud_port:
        type: int
        required: true
      nextcloud_image:
        type: str
        required: true
      nextcloud_redis_image:
        type: str
        required: true
      nextcloud_internal_base_url:
        type: str
        required: true
      nextcloud_public_base_url:
        type: str
        required: true
      nextcloud_public_hostname:
        type: str
        required: true
      nextcloud_database_host:
        type: str
        required: true
      nextcloud_database_name:
        type: str
        required: true
      nextcloud_database_user:
        type: str
        required: true
      nextcloud_database_password_local_file:
        type: path
        required: true
      nextcloud_admin_password_local_file:
        type: path
        required: true
      nextcloud_redis_password_local_file:
        type: path
        required: true
      nextcloud_admin_password_remote_file:
        type: path
        required: true
      nextcloud_redis_password_remote_file:
        type: path
        required: true
      nextcloud_admin_user:
        type: str
        required: true
      nextcloud_occ_command_retries:
        type: int
        required: false
      nextcloud_occ_command_delay_seconds:
        type: int
        required: false
