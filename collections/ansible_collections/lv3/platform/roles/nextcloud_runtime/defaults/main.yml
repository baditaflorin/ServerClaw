# Purpose: Set the default runtime, secret, and application settings for the managed Nextcloud service.
# Use case: Load when converging Nextcloud so compose, OpenBao, Redis, and OCC operations share canonical defaults.
# Inputs: Platform topology, image catalog, and optional role overrides.
# Outputs: Default variables consumed by the nextcloud_runtime tasks and templates.
# Idempotency: Fully idempotent; defaults describe desired values only.
# Dependencies: ADR 0165 metadata standard, ADR 0260, and the nextcloud_runtime role.
---
nextcloud_openbao_policy_name: lv3-service-nextcloud-runtime
nextcloud_openbao_approle_name: nextcloud-runtime
nextcloud_port: "{{ platform_service_topology | platform_service_port('nextcloud', 'internal') }}"
nextcloud_internal_base_url: "{{ platform_service_topology | platform_service_url('nextcloud', 'internal') }}"
nextcloud_public_base_url: "{{ platform_service_topology.nextcloud.urls.public }}"
nextcloud_public_hostname: "{{ platform_service_topology.nextcloud.public_hostname }}"
nextcloud_database_host: "{{ hostvars[hostvars[platform_topology_host].postgres_ha.initial_primary].ansible_host }}"
nextcloud_database_port: 5432
nextcloud_database_name: nextcloud
nextcloud_database_user: nextcloud
nextcloud_database_password_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/nextcloud/database-password.txt
nextcloud_admin_password_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/nextcloud/admin-password.txt
nextcloud_redis_password_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/nextcloud/redis-password.txt
nextcloud_admin_password_remote_file: "{{ nextcloud_secret_dir }}/admin-password.txt"
nextcloud_redis_password_remote_file: "{{ nextcloud_secret_dir }}/redis-password.txt"
nextcloud_admin_user: ops
nextcloud_trusted_proxies:
  - "{{ hostvars[platform_topology_host].proxmox_public_edge_ipv4 }}"
nextcloud_php_memory_limit: 1024M
nextcloud_php_upload_limit: 16G
nextcloud_overwrite_protocol: https
nextcloud_occ_command_retries: 5
nextcloud_occ_command_delay_seconds: 5
