---
argument_specs:
  main:
    short_description: Deploy the private OpenFGA runtime and bootstrap its repo-managed credentials.
    options:
      openfga_image:
        type: str
        required: true
        description:
          - Digest-pinned OpenFGA image reference taken from the image catalog.
      openfga_container_name:
        type: str
        required: true
        description:
          - Container name used by the OpenFGA runtime.
      openfga_site_dir:
        type: path
        required: true
        description:
          - Guest-local directory containing the compose project.
      openfga_compose_file:
        type: path
        required: true
        description:
          - Guest-local docker compose file for OpenFGA.
      openfga_env_file:
        type: path
        required: true
        description:
          - Guest-local runtime env file rendered through the OpenBao sidecar.
      openfga_openbao_agent_dir:
        type: path
        required: true
        description:
          - Guest-local OpenBao agent directory for runtime secret injection.
      openfga_database_name:
        type: str
        required: true
        description:
          - PostgreSQL database name used by OpenFGA.
      openfga_database_user:
        type: str
        required: true
        description:
          - PostgreSQL login role used by OpenFGA.
      openfga_database_host:
        type: str
        required: true
        description:
          - PostgreSQL host used by OpenFGA.
      openfga_database_password_local_file:
        type: path
        required: true
        description:
          - Controller-local database password generated by the postgres role.
      openfga_preshared_key_local_file:
        type: path
        required: true
        description:
          - Controller-local file used to mirror the OpenFGA API preshared key.
      openfga_internal_http_port:
        type: int
        required: true
        description:
          - Guest-local HTTP port exposed by the OpenFGA API.
      openfga_controller_url:
        type: str
        required: true
        description:
          - Controller-facing OpenFGA HTTP URL routed through the Proxmox Tailscale proxy.
