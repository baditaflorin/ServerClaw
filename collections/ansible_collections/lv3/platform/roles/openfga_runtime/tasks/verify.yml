# Purpose: Verify the deployed OpenFGA runtime health, auth enforcement, and repo-managed bootstrap readiness.
# Use case: Run after OpenFGA converges or during validation to prove the delegated-auth authorization service is live.
# Inputs: Local OpenFGA URLs, preshared API keys, and expected controller endpoints exposed by the runtime role.
# Outputs: Confirms the local health endpoint and authenticated API contract without mutating service state.
# Idempotency: Fully idempotent because these tasks only read state and assert expected behavior.
# Dependencies: ADR 0165 and ADR 0262.
---
- name: Verify OpenFGA responds on the local health endpoint
  ansible.builtin.uri:
    url: "{{ openfga_local_url }}/healthz"
    method: GET
    return_content: true
    status_code: 200
  register: openfga_verify_health
  changed_when: false

- name: Verify the OpenFGA API enforces the repo-managed preshared key
  ansible.builtin.uri:
    url: "{{ openfga_local_url }}/stores"
    method: GET
    headers:
      Authorization: "Bearer {{ openfga_preshared_key }}"
    return_content: true
    status_code: 200
  register: openfga_verify_authenticated_api
  changed_when: false
  no_log: true

- name: Assert OpenFGA health and authenticated access are working
  ansible.builtin.assert:
    that:
      - openfga_verify_health.status == 200
      - >-
        (
          openfga_verify_health.json is defined
          and (openfga_verify_health.json.status | default('')) == 'SERVING'
        ) or (openfga_verify_health.content | default('') | trim == 'ok')
      - openfga_verify_authenticated_api.status == 200
    fail_msg: "OpenFGA answered locally, but the authenticated API path did not validate."
  no_log: true
