# Purpose: Define default runtime paths, secret locations, and controller settings for the private OpenFGA service.
# Use case: Loaded whenever the OpenFGA runtime role converges or validates the delegated-auth authorization plane.
# Inputs: Image catalog entries, compose secret roots, OpenBao defaults, and service topology values.
# Outputs: Supplies stable defaults consumed by the OpenFGA runtime tasks and templates.
# Idempotency: Fully idempotent because this file only declares role defaults.
# Dependencies: ADR 0165 and ADR 0262.
---
# NOTE: Conventional variables (site_dir, image, compose_file, env_file,
# openbao_*, container_name, internal_port, local_artifact_dir) are derived
# from platform_service_registry — ADR 0373.
openfga_database_name: openfga
openfga_database_user: openfga
openfga_database_host: "{{ hostvars[hostvars[platform_topology_host].postgres_ha.initial_primary].ansible_host }}"
openfga_database_password_local_file: "{{ openfga_local_artifact_dir }}/database-password.txt"
openfga_preshared_key_local_file: "{{ openfga_local_artifact_dir }}/preshared-key.txt"
openfga_internal_http_port: "{{ hostvars[platform_topology_host].platform_port_assignments.openfga_http_port }}"
openfga_internal_grpc_port: 8097
openfga_controller_url: >-
  http://{{ hostvars[platform_topology_host].management_tailscale_ipv4 }}:{{
    hostvars[platform_topology_host].platform_port_assignments.openfga_host_proxy_port
  }}
openfga_local_url: "http://127.0.0.1:{{ openfga_internal_http_port }}"
openfga_http_addr: "0.0.0.0:{{ openfga_internal_http_port }}"
openfga_grpc_addr: "127.0.0.1:{{ openfga_internal_grpc_port }}"
openfga_datastore_uri: >-
  postgresql://{{ openfga_database_user }}:{{ openfga_database_password | urlencode }}@{{
    openfga_database_host
  }}:5432/{{ openfga_database_name }}?sslmode=disable
