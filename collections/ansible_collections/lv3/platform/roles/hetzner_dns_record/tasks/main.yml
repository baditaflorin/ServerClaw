---
# Purpose: Converge a canonical Hetzner DNS record while recovering cleanly from provider create-query races.
# Use case: Run during managed subdomain publication and exact-main DNS reconciliation.
# Inputs: Zone name, record name/type/value/ttl, desired state, and the Hetzner DNS API token environment variable.
# Outputs: The requested Hetzner DNS record matches repo truth or is absent when declared absent.
# Idempotency: Fully idempotent because provider lookups, retries, and canonical comparisons avoid duplicate record writes.
# Dependencies: ADR 0165 and the Hetzner DNS provider API contract.

- name: Ensure Hetzner DNS API token is available
  ansible.builtin.assert:
    that:
      - hetzner_dns_record_zone_name | length > 0
      - hetzner_dns_record_name | length > 0
      - hetzner_dns_record_type | length > 0
      - hetzner_dns_record_value | length > 0
      - hetzner_dns_record_state in ['present', 'absent']
      - (lookup('ansible.builtin.env', hetzner_dns_api_token_env_var) | trim) | length > 0
    fail_msg: >-
      Set {{ hetzner_dns_api_token_env_var }} before running the Hetzner DNS record playbook.

- name: Query Hetzner DNS zone by name
  ansible.builtin.uri:
    url: "{{ hetzner_dns_api_url }}/zones?name={{ hetzner_dns_record_zone_name }}"
    method: GET
    headers:
      Auth-API-Token: "{{ lookup('ansible.builtin.env', hetzner_dns_api_token_env_var) | trim }}"
    return_content: true
  register: hetzner_dns_zone_query
  no_log: true

- name: Translate Hetzner DNS zone provider payload into canonical zone facts
  ansible.builtin.set_fact:
    dns_provider_boundary_zone_candidates: >-
      {%- set items = [] -%}
      {%- for zone in hetzner_dns_zone_query.json.zones | default([]) -%}
      {%- set _ = items.append({
        "zone_ref": "dns-zone:" ~ (zone.name | default(hetzner_dns_record_zone_name)),
        "zone_name": zone.name | default(hetzner_dns_record_zone_name),
        "provider_ref": zone.id | default(""),
        "provider": "hetzner_dns"
      }) -%}
      {%- endfor -%}
      {{ items }}

- name: Assert that exactly one canonical DNS zone matched
  ansible.builtin.assert:
    that:
      - dns_provider_boundary_zone_candidates | length == 1
    fail_msg: >-
      Expected exactly one Hetzner DNS zone named {{ hetzner_dns_record_zone_name }}.

- name: Record the canonical DNS zone reference
  ansible.builtin.set_fact:
    dns_provider_boundary_zone: "{{ dns_provider_boundary_zone_candidates[0] }}"

- name: Query existing Hetzner DNS records for the zone
  ansible.builtin.uri:
    url: "{{ hetzner_dns_api_url }}/records?zone_id={{ dns_provider_boundary_zone.provider_ref }}"
    method: GET
    headers:
      Auth-API-Token: "{{ lookup('ansible.builtin.env', hetzner_dns_api_token_env_var) | trim }}"
    return_content: true
  register: hetzner_dns_records_query
  no_log: true

- name: Translate Hetzner DNS record provider payload into canonical record facts
  ansible.builtin.set_fact:
    dns_provider_boundary_existing_records: >-
      {%- set items = [] -%}
      {%- for record in hetzner_dns_records_query.json.records | default([]) -%}
      {%- set _ = items.append({
        "record_ref": "dns-record:" ~ (record.type | default("unknown")) ~ ":" ~ (record.name | default("")),
        "record_name": record.name | default(""),
        "record_type": record.type | default(""),
        "record_value": record.value | default(""),
        "record_ttl": record.ttl | default(0) | int,
        "provider_ref": record.id | default(""),
        "provider": "hetzner_dns"
      }) -%}
      {%- endfor -%}
      {{ items }}

- name: Select existing canonical DNS records with the same name and type
  ansible.builtin.set_fact:
    dns_provider_boundary_same_name_type_records: >-
      {{
        dns_provider_boundary_existing_records
        | selectattr('record_name', 'equalto', hetzner_dns_record_name)
        | selectattr('record_type', 'equalto', hetzner_dns_record_type)
        | list
      }}

- name: Select exact canonical DNS record matches by value
  ansible.builtin.set_fact:
    dns_provider_boundary_exact_records: >-
      {{
        dns_provider_boundary_same_name_type_records
        | selectattr('record_value', 'equalto', hetzner_dns_record_value)
        | list
      }}

- name: Select canonical managed DNS records by value identity
  ansible.builtin.set_fact:
    dns_provider_boundary_matching_records: >-
      {{
        dns_provider_boundary_exact_records
        if (dns_provider_boundary_exact_records | length > 0)
        else (
          (
            dns_provider_boundary_same_name_type_records
            | selectattr('record_value', 'search', hetzner_dns_record_value_match_regex)
            | list
          )
          if (hetzner_dns_record_value_match_regex | default('') | length > 0)
          else (
            dns_provider_boundary_same_name_type_records
            if hetzner_dns_record_state == 'present'
            else dns_provider_boundary_exact_records
          )
        )
      }}

- name: Assert that only one canonical DNS record match exists
  ansible.builtin.assert:
    that:
      - dns_provider_boundary_matching_records | length <= 1
    fail_msg: >-
      Multiple Hetzner DNS records matched {{ hetzner_dns_record_name }} {{ hetzner_dns_record_type }}
      for managed identity {{ hetzner_dns_record_value_match_regex | default(hetzner_dns_record_value) }}.

- name: Delete the canonical DNS record when it is retired
  ansible.builtin.uri:
    url: "{{ hetzner_dns_api_url }}/records/{{ dns_provider_boundary_matching_records[0].provider_ref }}"
    method: DELETE
    headers:
      Auth-API-Token: "{{ lookup('ansible.builtin.env', hetzner_dns_api_token_env_var) | trim }}"
    status_code:
      - 200
      - 204
      - 429
      - 500
      - 502
      - 503
      - 504
  register: hetzner_dns_record_delete_response
  when:
    - hetzner_dns_record_state == 'absent'
    - dns_provider_boundary_matching_records | length == 1
  retries: 5
  delay: 2
  until:
    - hetzner_dns_record_delete_response.status in [200, 204]
    - (hetzner_dns_record_delete_response.json.error.code | default(0) | int) == 0
  failed_when: false
  changed_when: >-
    hetzner_dns_record_delete_response.status in [200, 204]
    and (hetzner_dns_record_delete_response.json.error.code | default(0) | int) == 0
  no_log: true

- name: Fail with provider details when DNS record deletion did not complete
  ansible.builtin.fail:
    msg: >-
      Hetzner DNS did not delete {{ hetzner_dns_record_name }} {{ hetzner_dns_record_type }}
      in zone {{ hetzner_dns_record_zone_name }}. HTTP
      {{ hetzner_dns_record_delete_response.status | default('unknown') }}, provider
      error {{ hetzner_dns_record_delete_response.json.error.code | default('none') }}:
      {{
        hetzner_dns_record_delete_response.json.error.message
        | default('no provider message returned')
      }}.
      If this is the documented DNS Console brownout during migration, retry after
      the brownout window or migrate the zone to Hetzner Console first.
  when:
    - hetzner_dns_record_state == 'absent'
    - dns_provider_boundary_matching_records | length == 1
    - not (
        hetzner_dns_record_delete_response.status in [200, 204]
        and (hetzner_dns_record_delete_response.json.error.code | default(0) | int) == 0
      )

- name: Create the canonical DNS record when absent
  ansible.builtin.uri:
    url: "{{ hetzner_dns_api_url }}/records"
    method: POST
    headers:
      Auth-API-Token: "{{ lookup('ansible.builtin.env', hetzner_dns_api_token_env_var) | trim }}"
      Content-Type: application/json
    body: >-
      {{
        {
          "zone_id": dns_provider_boundary_zone.provider_ref,
          "name": hetzner_dns_record_name,
          "type": hetzner_dns_record_type,
          "value": hetzner_dns_record_value,
          "ttl": (hetzner_dns_record_ttl | int)
        } | to_json
      }}
    return_content: true
    status_code:
      - 200
      - 201
      - 429
      - 500
      - 502
      - 503
      - 504
  register: hetzner_dns_record_create_response
  when:
    - hetzner_dns_record_state == 'present'
    - dns_provider_boundary_matching_records | length == 0
  retries: 5
  delay: 2
  until:
    - hetzner_dns_record_create_response.status in [200, 201]
    - (hetzner_dns_record_create_response.json.error.code | default(0) | int) == 0
    - (hetzner_dns_record_create_response.json.record.id | default('') | length) > 0
  failed_when: false
  changed_when: >-
    hetzner_dns_record_create_response.status in [200, 201]
    and (hetzner_dns_record_create_response.json.error.code | default(0) | int) == 0
    and (hetzner_dns_record_create_response.json.record.id | default('') | length) > 0
  no_log: true

- name: Query Hetzner DNS records for the zone after a create attempt
  ansible.builtin.uri:
    url: "{{ hetzner_dns_api_url }}/records?zone_id={{ dns_provider_boundary_zone.provider_ref }}"
    method: GET
    headers:
      Auth-API-Token: "{{ lookup('ansible.builtin.env', hetzner_dns_api_token_env_var) | trim }}"
    return_content: true
    status_code:
      - 200
      - 429
      - 500
      - 502
      - 503
      - 504
  register: hetzner_dns_records_post_create_query
  when:
    - hetzner_dns_record_state == 'present'
    - dns_provider_boundary_matching_records | length == 0
  retries: 5
  delay: 2
  until:
    - hetzner_dns_records_post_create_query.status == 200
    - >-
      (
        hetzner_dns_records_post_create_query.json.records | default([])
        | selectattr('name', 'equalto', hetzner_dns_record_name)
        | selectattr('type', 'equalto', hetzner_dns_record_type)
        | selectattr('value', 'equalto', hetzner_dns_record_value)
        | list
        | length
      ) > 0
  failed_when: false
  no_log: true

- name: Fail with provider details when DNS record creation did not complete
  ansible.builtin.fail:
    msg: >-
      Hetzner DNS did not create {{ hetzner_dns_record_name }} {{ hetzner_dns_record_type }}
      in zone {{ hetzner_dns_record_zone_name }} with value {{ hetzner_dns_record_value }}.
      HTTP {{ hetzner_dns_record_create_response.status | default('unknown') }},
      provider error {{ hetzner_dns_record_create_response.json.error.code | default('none') }}:
      {{
        hetzner_dns_record_create_response.json.error.message
        | default('no provider message returned')
      }}.
      If this is the documented DNS Console brownout during migration, retry after
      the brownout window or migrate the zone to Hetzner Console first.
  when:
    - hetzner_dns_record_state == 'present'
    - dns_provider_boundary_matching_records | length == 0
    - not (
        hetzner_dns_record_create_response.status in [200, 201]
        and (hetzner_dns_record_create_response.json.error.code | default(0) | int) == 0
        and (hetzner_dns_record_create_response.json.record.id | default('') | length) > 0
      )
    - not (
        hetzner_dns_records_post_create_query.status | default(0) == 200
        and (
          hetzner_dns_records_post_create_query.json.records | default([])
          | selectattr('name', 'equalto', hetzner_dns_record_name)
          | selectattr('type', 'equalto', hetzner_dns_record_type)
          | selectattr('value', 'equalto', hetzner_dns_record_value)
          | list
          | length
        ) > 0
      )

- name: Update the canonical DNS record when drift is detected
  ansible.builtin.uri:
    url: "{{ hetzner_dns_api_url }}/records/{{ dns_provider_boundary_matching_records[0].provider_ref }}"
    method: PUT
    headers:
      Auth-API-Token: "{{ lookup('ansible.builtin.env', hetzner_dns_api_token_env_var) | trim }}"
      Content-Type: application/json
    body: >-
      {{
        {
          "zone_id": dns_provider_boundary_zone.provider_ref,
          "name": hetzner_dns_record_name,
          "type": hetzner_dns_record_type,
          "value": hetzner_dns_record_value,
          "ttl": (hetzner_dns_record_ttl | int)
        } | to_json
      }}
    return_content: true
    status_code:
      - 200
      - 429
      - 500
      - 502
      - 503
      - 504
  register: hetzner_dns_record_update_response
  when:
    - hetzner_dns_record_state == 'present'
    - dns_provider_boundary_matching_records | length == 1
    - dns_provider_boundary_matching_records[0].record_value != hetzner_dns_record_value
      or (dns_provider_boundary_matching_records[0].record_ttl | int) != (hetzner_dns_record_ttl | int)
  retries: 5
  delay: 2
  until:
    - hetzner_dns_record_update_response.status == 200
    - (hetzner_dns_record_update_response.json.error.code | default(0) | int) == 0
  failed_when: false
  changed_when: >-
    hetzner_dns_record_update_response.status == 200
    and (hetzner_dns_record_update_response.json.error.code | default(0) | int) == 0
  no_log: true

- name: Fail with provider details when DNS record update did not complete
  ansible.builtin.fail:
    msg: >-
      Hetzner DNS did not update {{ hetzner_dns_record_name }} {{ hetzner_dns_record_type }}
      in zone {{ hetzner_dns_record_zone_name }} to value {{ hetzner_dns_record_value }}.
      HTTP {{ hetzner_dns_record_update_response.status | default('unknown') }},
      provider error {{ hetzner_dns_record_update_response.json.error.code | default('none') }}:
      {{
        hetzner_dns_record_update_response.json.error.message
        | default('no provider message returned')
      }}.
      If this is the documented DNS Console brownout during migration, retry after
      the brownout window or migrate the zone to Hetzner Console first.
  when:
    - hetzner_dns_record_state == 'present'
    - dns_provider_boundary_matching_records | length == 1
    - dns_provider_boundary_matching_records[0].record_value != hetzner_dns_record_value
      or (dns_provider_boundary_matching_records[0].record_ttl | int) != (hetzner_dns_record_ttl | int)
    - not (
        hetzner_dns_record_update_response.status == 200
        and (hetzner_dns_record_update_response.json.error.code | default(0) | int) == 0
      )
