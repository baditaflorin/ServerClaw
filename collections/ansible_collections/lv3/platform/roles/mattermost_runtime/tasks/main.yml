---
- name: Derive Mattermost conventional defaults from the service registry
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: derive_service_defaults
  vars:
    common_derive_service_name: mattermost


- name: Validate Mattermost runtime inputs
  ansible.builtin.assert:
    that:
      - mattermost_team_name | length > 0
      - mattermost_team_display_name | length > 0
      - mattermost_site_dir | length > 0
      - mattermost_secret_dir | length > 0
      - mattermost_compose_file | length > 0
      - mattermost_env_file | length > 0
      - mattermost_bootstrap_file | length > 0
      - mattermost_server_port | int > 0
      - mattermost_controller_url | length > 0
      - mattermost_database_name | length > 0
      - mattermost_database_user | length > 0
      - mattermost_database_host | length > 0
      - mattermost_database_password_local_file | length > 0
      - mattermost_admin_username | length > 0
      - mattermost_admin_email | length > 0
      - mattermost_channels | length > 0
    fail_msg: "mattermost_runtime requires site, database, admin, and channel inputs."

- name: Check Mattermost prerequisites on the control machine
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: check_local_secrets
  vars:
    common_check_local_secrets_files:
      - path: "{{ mattermost_database_password_local_file }}"
        description: "Mattermost database password"
        prerequisite: "Converge mattermost_postgres before deploying Mattermost"

- name: Ensure the Mattermost runtime packages are present
  ansible.builtin.apt:
    name:
      - python3
      - openssl
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure the Mattermost directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ mattermost_site_dir }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ mattermost_secret_dir }}"
      owner: root
      group: root
      mode: "0700"
    - path: "{{ mattermost_site_dir }}/volumes"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ mattermost_site_dir }}/volumes/app"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ mattermost_site_dir }}/volumes/app/mattermost"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ mattermost_site_dir }}/volumes/app/mattermost/config"
      owner: 2000
      group: 2000
      mode: "0755"
    - path: "{{ mattermost_site_dir }}/volumes/app/mattermost/data"
      owner: 2000
      group: 2000
      mode: "0755"
    - path: "{{ mattermost_site_dir }}/volumes/app/mattermost/logs"
      owner: 2000
      group: 2000
      mode: "0755"
    - path: "{{ mattermost_site_dir }}/volumes/app/mattermost/plugins"
      owner: 2000
      group: 2000
      mode: "0755"
    - path: "{{ mattermost_site_dir }}/volumes/app/mattermost/client"
      owner: 2000
      group: 2000
      mode: "0755"
    - path: "{{ mattermost_site_dir }}/volumes/app/mattermost/client/plugins"
      owner: 2000
      group: 2000
      mode: "0755"
    - path: "{{ mattermost_site_dir }}/volumes/app/mattermost/bleve-indexes"
      owner: 2000
      group: 2000
      mode: "0755"

- name: Manage Mattermost runtime secrets
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: manage_service_secrets
  vars:
    common_manage_service_secrets_generate:
      - path: "{{ mattermost_admin_password_remote_file }}"
        command: "openssl rand -base64 24"
        label: "mattermost-admin-password"
    common_manage_service_secrets_read:
      - "{{ mattermost_admin_password_remote_file }}"
    common_manage_service_secrets_mirror:
      - dest: "{{ mattermost_admin_password_local_file }}"
        content_index: 0
    common_manage_service_secrets_local_artifact_dir: "{{ mattermost_local_artifact_dir }}"
    common_manage_service_secrets_fact_name: "mattermost_decoded_secrets"
  no_log: true

- name: Record the Mattermost runtime secrets
  ansible.builtin.set_fact:
    mattermost_admin_password: "{{ mattermost_decoded_secrets[0] }}"
    mattermost_database_password: "{{ lookup('ansible.builtin.file', mattermost_database_password_local_file) | trim }}"
    mattermost_runtime_secret_payload:
      MM_SQLSETTINGS_DATASOURCE: >-
        postgres://{{ mattermost_database_user }}:{{ mattermost_database_password | urlencode | replace('/', '%2F') }}@{{ mattermost_database_host }}:{{ mattermost_database_port }}/{{ mattermost_database_name }}?sslmode=disable&connect_timeout=10
      MM_ADMIN_PASSWORD: "{{ mattermost_decoded_secrets[0] }}"
  no_log: true

- name: Prepare OpenBao agent runtime secret injection for Mattermost
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: openbao_compose_env
  vars:
    common_openbao_compose_env_service_name: mattermost
    common_openbao_compose_env_agent_dir: "{{ mattermost_openbao_agent_dir }}"
    common_openbao_compose_env_runtime_dir: "{{ mattermost_env_file | dirname }}"
    common_openbao_compose_env_env_file: "{{ mattermost_env_file }}"
    common_openbao_compose_env_secret_path: "{{ mattermost_openbao_secret_path }}"
    common_openbao_compose_env_secret_payload: "{{ mattermost_runtime_secret_payload }}"
    common_openbao_compose_env_policy_name: "{{ mattermost_openbao_policy_name }}"
    common_openbao_compose_env_policy_rules: |
      path "sys/health" {
        capabilities = ["read"]
      }

      path "kv/data/{{ mattermost_openbao_secret_path }}" {
        capabilities = ["read"]
      }

      path "kv/metadata/{{ mattermost_openbao_secret_path }}" {
        capabilities = ["read", "list"]
      }
    common_openbao_compose_env_approle_name: "{{ mattermost_openbao_approle_name }}"
    common_openbao_compose_env_agent_config_file: "{{ mattermost_openbao_agent_dir }}/agent.hcl"
    common_openbao_compose_env_agent_template_file: "{{ mattermost_openbao_agent_dir }}/runtime.env.ctmpl"
    common_openbao_compose_env_agent_template_src: mattermost.env.ctmpl.j2
    common_openbao_compose_env_role_id_file: "{{ mattermost_openbao_agent_dir }}/role_id"
    common_openbao_compose_env_secret_id_file: "{{ mattermost_openbao_agent_dir }}/secret_id"
    common_openbao_compose_env_image: "{{ mattermost_openbao_agent_image }}"
    common_openbao_compose_env_legacy_env_files:
      - "{{ mattermost_legacy_env_file }}"
  no_log: true

- name: Render the Mattermost environment file
  ansible.builtin.template:
    src: mattermost.env.j2
    dest: "{{ mattermost_env_file }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  register: mattermost_env_template

- name: Render the Mattermost compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ mattermost_compose_file }}"
    owner: root
    group: root
    mode: "0644"
  vars:
    ansible_search_path: "{{ [role_path + '/../common'] + (ansible_search_path | default([])) }}"
  register: mattermost_compose_template

- name: Render the Mattermost bootstrap script
  ansible.builtin.template:
    src: bootstrap-mattermost.py.j2
    dest: "{{ mattermost_bootstrap_file }}"
    owner: root
    group: root
    mode: "0750"
  no_log: true

- name: Converge the Mattermost stack
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: docker_compose_converge
  vars:
    common_docker_compose_converge_compose_file: "{{ mattermost_compose_file }}"
    common_docker_compose_converge_site_dir: "{{ mattermost_site_dir }}"
    common_docker_compose_converge_service_name: mattermost
    common_docker_compose_converge_template_results:
      - "{{ mattermost_env_template }}"
      - "{{ mattermost_compose_template }}"

- name: Wait for Mattermost to listen locally
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ mattermost_server_port }}"
    delay: 0
    timeout: 240

- name: Wait for the Mattermost system ping endpoint
  ansible.builtin.uri:
    url: "{{ mattermost_private_base_url }}/api/v4/system/ping"
    method: GET
    status_code: 200
  register: mattermost_ping
  retries: 24
  delay: 5
  until: mattermost_ping.status == 200
  changed_when: false

- name: Bootstrap Mattermost team, channels, and webhooks
  ansible.builtin.command:
    argv:
      - python3
      - "{{ mattermost_bootstrap_file }}"
  register: mattermost_bootstrap
  changed_when: >-
    'BOOTSTRAP_CHANGED=true' in mattermost_bootstrap.stdout
  no_log: true

- name: Read the Mattermost incoming webhook manifest
  ansible.builtin.slurp:
    src: "{{ mattermost_webhooks_remote_file }}"
  register: mattermost_webhooks_raw
  no_log: true

- name: Mirror the Mattermost incoming webhook manifest to the control machine
  ansible.builtin.copy:
    dest: "{{ mattermost_webhooks_local_file }}"
    content: "{{ mattermost_webhooks_raw.content | b64decode }}"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Post a Mattermost smoke message through the workflow webhook
  ansible.builtin.uri:
    url: >-
      {{
        (
          mattermost_webhooks_raw.content
          | b64decode
          | from_json
        ).webhooks.workflows.internal_url
      }}
    method: POST
    body_format: json
    body:
      text: "LV3 Mattermost workflow smoke test from repo-managed converge."
      username: LV3 Workflow Smoke
    status_code: 200
  changed_when: false
  no_log: true

- name: Verify the Mattermost team webhook manifest matches the desired channels
  ansible.builtin.assert:
    that:
      - "((mattermost_webhooks_raw.content | b64decode | from_json).team.name) == mattermost_team_name"
      - >-
        (
          (mattermost_webhooks_raw.content | b64decode | from_json).channels.keys()
          | sort
        ) == (mattermost_channels | map(attribute='webhook_key') | sort)
    fail_msg: "Mattermost bootstrap completed, but the webhook manifest does not match the desired team and channel set."

- name: Run Mattermost health probe verification tasks
  ansible.builtin.import_tasks: verify.yml
