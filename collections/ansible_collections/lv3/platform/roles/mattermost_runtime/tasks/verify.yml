---
# Dependencies: ADR 0165 and ADR 0371.
- name: Verify the Mattermost runtime
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: mattermost
    common_verify_port: "{{ mattermost_server_port }}"
    common_verify_health_url: "{{ mattermost_private_base_url }}/api/v4/system/ping"
    common_verify_health_retries: 24
    common_verify_health_delay: 5
    common_verify_health_assertions:
      - "(common_verify_health_response.json.status | default('')) == 'OK'"
    common_verify_health_assertion_msg: "Mattermost responded, but the system ping payload did not report status OK."

- name: Verify the Mattermost webhook manifest contains every repo-managed channel
  ansible.builtin.assert:
    that:
      - "((mattermost_webhooks_raw.content | b64decode | from_json).team.name) == mattermost_team_name"
      - >-
        (
          (mattermost_webhooks_raw.content | b64decode | from_json).channels.keys()
          | sort
        ) == (mattermost_channels | map(attribute='webhook_key') | sort)
    fail_msg: "Mattermost started, but the repo-managed webhook manifest does not match the declared channels."
  no_log: true
