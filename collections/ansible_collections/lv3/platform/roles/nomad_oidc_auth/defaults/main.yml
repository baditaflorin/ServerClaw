---
# Purpose: Default inputs for the Nomad OIDC auth method configuration role.
# Use case: Wires Keycloak SSO into Nomad's native OIDC auth, creating policies, roles, and binding rules.
# Dependencies: ADR 0232, ADR 0361.
nomad_oidc_auth_server_url: https://127.0.0.1:4646
nomad_oidc_auth_ca_cert_file: /etc/lv3/nomad/tls/nomad-agent-ca.pem
nomad_oidc_auth_bootstrap_token_remote_file: /etc/lv3/nomad/bootstrap-management.token
nomad_oidc_auth_keycloak_client_id: nomad
nomad_oidc_auth_keycloak_client_secret_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/keycloak/nomad-client-secret.txt
nomad_oidc_auth_oidc_discovery_url: "{{ keycloak_oidc_issuer_url }}"
nomad_oidc_auth_allowed_redirect_uris:
  - https://scheduler.{{ platform_domain }}/ui/settings/tokens
  - http://localhost:4649/oidc/callback
nomad_oidc_auth_admin_group: lv3-platform-admins
nomad_oidc_auth_admin_policy_name: platform-admin
nomad_oidc_auth_reader_policy_name: platform-reader
nomad_oidc_auth_admin_role_name: platform-admin
nomad_oidc_auth_reader_role_name: platform-reader
nomad_oidc_auth_method_name: keycloak
nomad_oidc_auth_max_token_ttl: 8h0m0s
