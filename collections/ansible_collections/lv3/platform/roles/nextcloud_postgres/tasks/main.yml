---
# Purpose: Provision the PostgreSQL role and database required by the Nextcloud personal data plane.
# Use case: Run during Nextcloud deployment or replay before the runtime stack starts on docker-runtime-lv3.
#
# Inputs (required):
#   - nextcloud_database_name (str, required): PostgreSQL database name for Nextcloud.
#   - nextcloud_database_user (str, required): PostgreSQL login role used by Nextcloud.
#   - nextcloud_postgres_password_file (path, required): Guest-local mirror of the managed database password.
#   - nextcloud_database_password_local_file (path, required): Controller-local copy of the managed database password.
#
# Inputs (optional):
#   - nextcloud_postgres_secret_dir (path, optional, default=/etc/lv3/nextcloud): Guest-side directory for PostgreSQL bootstrap secrets.
#
# Outputs:
#   - A managed Nextcloud database role, database, and mirrored password on the controller and postgres guest.
#
# Idempotency: Fully idempotent
#
# Dependencies:
#   - ADR 0260: Nextcloud as the canonical personal data plane for ServerClaw.
#   - Requires: PostgreSQL on the current host and controller-local access to write `.local/nextcloud`.
#
# Related ADRs: 0165, 0260

- name: Validate Nextcloud PostgreSQL inputs
  ansible.builtin.assert:
    that:
      - nextcloud_database_name | length > 0
      - nextcloud_database_user | length > 0
      - nextcloud_postgres_secret_dir | length > 0
      - nextcloud_postgres_password_file | length > 0
      - nextcloud_database_password_local_file | length > 0
    fail_msg: "nextcloud_postgres requires database names and local or remote password paths."

- name: Ensure the Nextcloud PostgreSQL secret directory exists
  ansible.builtin.file:
    path: "{{ nextcloud_postgres_secret_dir }}"
    state: directory
    owner: root
    group: postgres
    mode: "0750"

- name: Ensure the local Nextcloud artifact directory exists
  ansible.builtin.file:
    path: "{{ nextcloud_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate the Nextcloud database password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ nextcloud_database_password_local_file }}" ]; then
      umask 077
      openssl rand -base64 24 | tr -d '\n' > "{{ nextcloud_database_password_local_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: nextcloud_postgres_password_generation
  changed_when: "'changed' in nextcloud_postgres_password_generation.stdout"
  no_log: true

- name: Read the Nextcloud database password
  ansible.builtin.slurp:
    src: "{{ nextcloud_database_password_local_file }}"
  delegate_to: localhost
  become: false
  register: nextcloud_postgres_password_raw
  no_log: true

- name: Record the Nextcloud database password
  ansible.builtin.set_fact:
    nextcloud_database_password: "{{ nextcloud_postgres_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Mirror the Nextcloud database password to the control machine
  ansible.builtin.copy:
    dest: "{{ nextcloud_database_password_local_file }}"
    content: "{{ nextcloud_database_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Persist the Nextcloud database password on the current guest
  ansible.builtin.copy:
    dest: "{{ nextcloud_postgres_password_file }}"
    content: "{{ nextcloud_database_password }}\n"
    owner: root
    group: postgres
    mode: "0640"
  no_log: true

- name: Check whether the local PostgreSQL member is writable
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT CASE WHEN pg_is_in_recovery() THEN 0 ELSE 1 END"
  register: nextcloud_postgres_writable_check
  changed_when: false

- name: Check whether the Nextcloud database role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ nextcloud_database_user }}'"
  register: nextcloud_postgres_role_check
  changed_when: false
  when: nextcloud_postgres_writable_check.stdout | trim == "1"

- name: Create the Nextcloud database role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE ROLE {{ nextcloud_database_user }} LOGIN PASSWORD '{{ nextcloud_database_password }}'"
  changed_when: true
  no_log: true
  when:
    - nextcloud_postgres_writable_check.stdout | trim == "1"
    - nextcloud_postgres_role_check.stdout != "1"

- name: Ensure the Nextcloud database role password matches the managed secret
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER ROLE {{ nextcloud_database_user }} PASSWORD '{{ nextcloud_database_password }}'"
  changed_when: false
  no_log: true
  when: nextcloud_postgres_writable_check.stdout | trim == "1"

- name: Check whether the Nextcloud PostgreSQL database already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_database WHERE datname = '{{ nextcloud_database_name }}'"
  register: nextcloud_postgres_database_check
  changed_when: false
  when: nextcloud_postgres_writable_check.stdout | trim == "1"

- name: Create the Nextcloud PostgreSQL database
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE DATABASE {{ nextcloud_database_name }} OWNER {{ nextcloud_database_user }}"
  when:
    - nextcloud_postgres_writable_check.stdout | trim == "1"
    - nextcloud_postgres_database_check.stdout != "1"
  changed_when: true

- name: Ensure the Nextcloud database owner is correct
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER DATABASE {{ nextcloud_database_name }} OWNER TO {{ nextcloud_database_user }}"
  changed_when: false
  when: nextcloud_postgres_writable_check.stdout | trim == "1"
