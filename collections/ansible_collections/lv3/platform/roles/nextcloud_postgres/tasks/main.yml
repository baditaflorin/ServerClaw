---
# Purpose: Provision the nextcloud PostgreSQL database using the shared postgres_client role (ADR 0359).
# Use case: Called during nextcloud deployment to ensure the database, role, and credentials exist.
# Inputs: nextcloud_* variables from defaults/main.yml; resolves registry entry from platform_postgres_clients.
# Outputs: nextcloud PostgreSQL role, database, and credential files converged on postgres.
# Idempotency: Yes; postgres_client role handles all idempotency.
# Dependencies: ADR 0359 postgres_client role, platform_postgres_clients registry.
- name: Provision the nextcloud database via the shared postgres_client role
  ansible.builtin.include_role:
    name: lv3.platform.postgres_client
  vars:
    postgres_client_service: "{{ nextcloud_database_name }}"
    postgres_client_database: "{{ nextcloud_database_name }}"
    postgres_client_user: "{{ nextcloud_database_user }}"
    postgres_client_password_local_file: "{{ nextcloud_database_password_local_file }}"
    postgres_client_password_remote_dir: "{{ nextcloud_postgres_secret_dir }}"
    postgres_client_password_remote_file: "{{ nextcloud_postgres_password_file }}"
