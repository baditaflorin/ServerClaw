---
argument_specs:
  main:
    short_description: Provision the PostgreSQL role and database required by Nextcloud.
    options:
      nextcloud_database_name:
        type: str
        required: true
      nextcloud_database_user:
        type: str
        required: true
      nextcloud_postgres_secret_dir:
        type: path
        required: true
      nextcloud_postgres_password_file:
        type: path
        required: true
      nextcloud_local_artifact_dir:
        type: path
        required: true
      nextcloud_database_password_local_file:
        type: path
        required: true
