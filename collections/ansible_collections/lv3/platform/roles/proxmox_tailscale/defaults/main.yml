---
tailscale_apt_keyring_path: /usr/share/keyrings/tailscale-archive-keyring.gpg
tailscale_apt_key_url: https://pkgs.tailscale.com/stable/debian/trixie.noarmor.gpg
tailscale_apt_repo_file: /etc/apt/sources.list.d/tailscale.list
tailscale_apt_repo_url: https://pkgs.tailscale.com/stable/debian/trixie.tailscale-keyring.list
proxmox_tailscale_auth_key_env_var: TAILSCALE_AUTH_KEY
proxmox_tailscale_login_server: ""
proxmox_tailscale_accept_dns: false
proxmox_tailscale_snat_subnet_routes: true
proxmox_tailscale_enable_ssh: false
proxmox_tailscale_stateful_filtering: false
proxmox_tailscale_tags: []
proxmox_tailscale_forwarding_interfaces: >-
  {{
    [
      management_interface | default(''),
      proxmox_wan_bridge | default(''),
      proxmox_internal_bridge | default(''),
      'tailscale0'
    ]
    | reject('equalto', '')
    | unique
    | list
  }}
