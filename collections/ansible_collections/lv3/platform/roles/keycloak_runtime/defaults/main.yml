# END SERVICE: ops_portal
# BEGIN SERVICE: gitea
keycloak_gitea_client_id: gitea-oauth
keycloak_gitea_client_secret_local_file: "{{ keycloak_local_artifact_dir }}/gitea-client-secret.txt"
# END SERVICE: gitea
# BEGIN SERVICE: agent
keycloak_agent_client_id: lv3-agent-hub
keycloak_agent_client_secret_local_file: "{{ keycloak_local_artifact_dir }}/lv3-agent-hub-client-secret.txt"
# END SERVICE: agent
# BEGIN SERVICE: api_gateway
keycloak_api_gateway_client_id: api-gateway
keycloak_api_gateway_client_secret_local_file: "{{ keycloak_local_artifact_dir }}/api-gateway-client-secret.txt"
# END SERVICE: api_gateway
# BEGIN SERVICE: serverclaw_runtime
keycloak_serverclaw_runtime_client_id: serverclaw-runtime
keycloak_serverclaw_runtime_client_secret_local_file: "{{ keycloak_local_artifact_dir }}/serverclaw-runtime-client-secret.txt"
# END SERVICE: serverclaw_runtime
# BEGIN SERVICE: langfuse
keycloak_langfuse_client_id: langfuse
keycloak_langfuse_client_secret_local_file: "{{ keycloak_local_artifact_dir }}/langfuse-client-secret.txt"
# END SERVICE: langfuse
# BEGIN SERVICE: semaphore
keycloak_semaphore_client_id: semaphore
keycloak_semaphore_client_secret_local_file: "{{ keycloak_local_artifact_dir }}/semaphore-client-secret.txt"
# END SERVICE: semaphore
# BEGIN SERVICE: grist
keycloak_grist_client_id: grist
keycloak_grist_client_secret_local_file: "{{ keycloak_local_artifact_dir }}/grist-client-secret.txt"
# END SERVICE: grist
# BEGIN SERVICE: directus
keycloak_directus_client_id: directus
keycloak_directus_client_secret_local_file: "{{ keycloak_local_artifact_dir }}/directus-client-secret.txt"
# END SERVICE: directus
# BEGIN SERVICE: superset
keycloak_superset_client_id: superset
keycloak_superset_client_secret_local_file: "{{ keycloak_local_artifact_dir }}/superset-client-secret.txt"
# END SERVICE: superset
# BEGIN SERVICE: glitchtip
keycloak_glitchtip_client_id: glitchtip
keycloak_glitchtip_client_secret_local_file: "{{ keycloak_local_artifact_dir }}/glitchtip-client-secret.txt"
# END SERVICE: glitchtip
# BEGIN SERVICE: outline
keycloak_outline_client_id: outline
keycloak_outline_client_secret_local_file: "{{ keycloak_local_artifact_dir }}/outline-client-secret.txt"
# END SERVICE: outline
# BEGIN SERVICE: paperless
keycloak_paperless_client_id: paperless
keycloak_paperless_client_secret_local_file: "{{ keycloak_local_artifact_dir }}/paperless-client-secret.txt"
# END SERVICE: paperless
# BEGIN SERVICE: serverclaw
keycloak_serverclaw_client_id: serverclaw
keycloak_serverclaw_client_secret_local_file: "{{ keycloak_local_artifact_dir }}/serverclaw-client-secret.txt"
# END SERVICE: serverclaw
# BEGIN SERVICE: grafana
keycloak_grafana_groups:
  admins: grafana-admins
  viewers: grafana-viewers
# END SERVICE: grafana
keycloak_realm_groups:
  - name: lv3-platform-admins
    attributes:
      identity_class: human_operator
      scope_boundary: platform_admin
  - name: grafana-admins
    attributes:
      identity_class: human_operator
      scope_boundary: grafana_admin
  - name: grafana-viewers
    attributes:
      identity_class: human_operator
      scope_boundary: grafana_readonly
  - name: approved-agent-clients
    attributes:
      identity_class: agent
      scope_boundary: agent_client_credentials
keycloak_realm_roles:
  - name: platform-read
    description: Read access to platform metadata and health APIs.
    composites: []
  - name: platform-operator
    description: Operator access to platform automation APIs.
    composites:
      - name: platform-read
keycloak_group_realm_role_mappings:
  - group_name: lv3-platform-admins
    roles:
      - name: platform-operator
keycloak_service_account_realm_role_mappings:
  - service_account_user_client_id: "{{ keycloak_agent_client_id }}"
    roles:
      - name: platform-read
  - service_account_user_client_id: "{{ keycloak_serverclaw_runtime_client_id }}"
    roles:
      - name: platform-read
keycloak_public_base_url: "https://{{ keycloak_service_topology.public_hostname }}"
keycloak_local_admin_url: "http://127.0.0.1:{{ keycloak_local_http_port }}"
keycloak_repo_user_admin_url: "{{ keycloak_local_admin_url }}"
keycloak_admin_connection_timeout: 60
keycloak_admin_reconciliation_retries: 24
keycloak_admin_reconciliation_delay: 5
keycloak_startup_probe_retries: 60
keycloak_startup_probe_delay: 5
keycloak_repo_user_reconciliation_retries: 24
keycloak_repo_user_reconciliation_delay: 5
keycloak_reconcile_outline_users: true
# BEGIN SERVICE: grafana
keycloak_grafana_root_url: "https://{{ hostvars[platform_topology_host].lv3_service_topology.grafana.public_hostname }}"
# END SERVICE: grafana
# BEGIN SERVICE: langfuse
