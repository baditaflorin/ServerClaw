# Purpose: Define default paths, image pins, secret locations, and realm settings for the repo-managed Keycloak runtime.
# Use case: Loaded whenever the Keycloak runtime role converges or validates the delegated-auth control plane.
# Inputs: Service topology, platform-wide authority settings, image catalog entries, and OpenBao runtime defaults.
# Outputs: Supplies stable default variables consumed by Keycloak runtime tasks and templates.
# Idempotency: Fully idempotent because this file only declares role defaults.
# Dependencies: ADR 0165, ADR 0046, ADR 0197, and ADR 0262.
---
# NOTE: Conventional variables (site_dir, image, compose_file, env_file,
# openbao_*, container_name, internal_port, local_artifact_dir) are derived
# from platform_service_registry — ADR 0373. These are automatically set by
# derive_service_defaults when the role is invoked.
# Purpose: Default runtime inputs for Keycloak and its repo-managed identity integrations.

keycloak_service_topology: "{{ hostvars[platform_topology_host].lv3_service_topology | service_topology_get('keycloak') }}"
keycloak_session_authority: "{{ platform_session_authority }}"
keycloak_image: quay.io/keycloak/keycloak:26.1.0
keycloak_image_pull_retries: 5
keycloak_image_pull_delay_seconds: 5
keycloak_realm_name: lv3
keycloak_realm_display_name: LV3 Control Plane
keycloak_compose_project_name: keycloak
keycloak_compose_network_name: "{{ keycloak_compose_project_name }}_default"
keycloak_database_name: keycloak
keycloak_database_user: keycloak
keycloak_database_host: "{{ hostvars[hostvars[platform_topology_host].postgres_ha.initial_primary].ansible_host }}"
keycloak_database_password_local_file: "{{ keycloak_local_artifact_dir }}/database-password.txt"
keycloak_internal_http_port: "{{ platform_service_topology | platform_service_port('keycloak', 'internal') }}"
keycloak_local_http_port: 18080
keycloak_local_management_port: 19000
keycloak_bootstrap_admin_username: lv3-bootstrap-admin
keycloak_bootstrap_admin_password_remote_file: "{{ keycloak_secret_dir }}/bootstrap-admin-password"
keycloak_admin_client_id: lv3-admin-runtime
keycloak_admin_client_secret_remote_file: "{{ keycloak_secret_dir }}/admin-client-secret"
keycloak_recovery_admin_service_client_id: lv3-recovery-admin
keycloak_recovery_admin_service_secret_remote_file: "{{ keycloak_secret_dir }}/recovery-admin-service-secret"
keycloak_operator_username: florin.badita
keycloak_operator_first_name: Florin
keycloak_operator_last_name: Badita
keycloak_operator_email: "{{ platform_operator_email }}"
keycloak_operator_password_remote_file: "{{ keycloak_secret_dir }}/florin.badita-password"
# BEGIN SERVICE: outline
keycloak_outline_automation_username: outline.automation
keycloak_outline_automation_first_name: Outline
keycloak_outline_automation_last_name: Automation
keycloak_outline_automation_email: outline.automation@{{ platform_domain }}
keycloak_outline_automation_password_remote_file: "{{ keycloak_secret_dir }}/outline.automation-password"
# END SERVICE: outline
keycloak_bootstrap_admin_password_local_file: "{{ keycloak_local_artifact_dir }}/bootstrap-admin-password.txt"
keycloak_admin_client_secret_local_file: "{{ keycloak_local_artifact_dir }}/admin-client-secret.txt"
keycloak_operator_password_local_file: "{{ keycloak_local_artifact_dir }}/florin.badita-password.txt"
# BEGIN SERVICE: outline
keycloak_outline_automation_password_local_file: "{{ keycloak_local_artifact_dir }}/outline.automation-password.txt"
# END SERVICE: outline
keycloak_mail_platform_submission_username: "{{ smtp_username }}"
keycloak_mail_platform_submission_password_local_file: "{{ smtp_password_local_file }}"
keycloak_mail_platform_submission_host: "{{ smtp_host }}"
keycloak_mail_platform_submission_port: "{{ smtp_port }}"
keycloak_mail_platform_submission_starttls: "{{ smtp_starttls }}"
keycloak_mail_platform_submission_auth_enabled: "{{ smtp_auth_enabled }}"
keycloak_mail_platform_docker_network_name: "{{ smtp_docker_network_name }}"
keycloak_mail_platform_compose_file: "{{ mail_platform_compose_file | default('/opt/mail-platform/docker-compose.yml') }}"
keycloak_mail_platform_submission_service_name: stalwart
keycloak_mail_platform_submission_recovery_enabled: >-
  {{
    (keycloak_mail_platform_docker_network_name | length > 0)
    and (keycloak_mail_platform_compose_file | length > 0)
  }}
keycloak_mail_platform_from_address: "{{ smtp_from_address }}"
keycloak_mail_platform_reply_to_address: "{{ smtp_reply_to_address }}"
keycloak_realm_smtp_server:
  host: "{{ keycloak_mail_platform_submission_host }}"
  port: "{{ keycloak_mail_platform_submission_port }}"
  from: "{{ keycloak_mail_platform_from_address }}"
  fromDisplayName: "{{ keycloak_realm_display_name }}"
  replyTo: "{{ keycloak_mail_platform_reply_to_address }}"
  replyToDisplayName: "{{ keycloak_realm_display_name }}"
  auth: "{{ keycloak_mail_platform_submission_auth_enabled }}"
  user: "{{ keycloak_mail_platform_submission_username if keycloak_mail_platform_submission_auth_enabled else '' }}"
  password: "{{ keycloak_mail_platform_submission_password | default('') }}"
  starttls: "{{ keycloak_mail_platform_submission_starttls }}"
  ssl: false
# BEGIN SERVICE: grafana
keycloak_grafana_client_id: grafana-oauth
keycloak_grafana_client_secret_local_file: "{{ keycloak_local_artifact_dir }}/grafana-client-secret.txt"
# END SERVICE: grafana
# BEGIN SERVICE: ops_portal
keycloak_ops_portal_client_id: ops-portal-oauth
