---
keycloak_service_topology: "{{ hostvars['proxmox_florin'].lv3_service_topology | service_topology_get('keycloak') }}"
keycloak_session_authority: "{{ platform_session_authority }}"
keycloak_image: quay.io/keycloak/keycloak:26.5.4
keycloak_realm_name: lv3
keycloak_realm_display_name: LV3 Control Plane
keycloak_site_dir: /opt/keycloak
keycloak_secret_dir: /etc/lv3/keycloak
keycloak_compose_file: "{{ keycloak_site_dir }}/docker-compose.yml"
keycloak_compose_project_name: keycloak
keycloak_compose_network_name: "{{ keycloak_compose_project_name }}_default"
keycloak_env_file: "{{ compose_runtime_secret_root }}/keycloak/runtime.env"
keycloak_legacy_env_file: "{{ keycloak_site_dir }}/keycloak.env"
keycloak_openbao_agent_dir: "{{ keycloak_site_dir }}/openbao"
keycloak_openbao_agent_image: "{{ openbao_agent_image }}"
keycloak_openbao_agent_container_name: keycloak-openbao-agent
keycloak_openbao_secret_path: services/keycloak/runtime-env
keycloak_openbao_policy_name: lv3-service-keycloak-runtime
keycloak_openbao_approle_name: keycloak-runtime
keycloak_database_name: keycloak
keycloak_database_user: keycloak
keycloak_database_host: "{{ hostvars[hostvars['proxmox_florin'].postgres_ha.initial_primary].ansible_host }}"
keycloak_database_password_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/keycloak/database-password.txt
keycloak_internal_http_port: 8091
keycloak_local_http_port: 18080
keycloak_local_management_port: 19000
keycloak_bootstrap_admin_username: lv3-bootstrap-admin
keycloak_bootstrap_admin_password_remote_file: "{{ keycloak_secret_dir }}/bootstrap-admin-password"
keycloak_operator_username: florin.badita
keycloak_operator_first_name: Florin
keycloak_operator_last_name: Badita
keycloak_operator_email: baditaflorin@gmail.com
keycloak_operator_password_remote_file: "{{ keycloak_secret_dir }}/florin.badita-password"
keycloak_outline_automation_username: outline.automation
keycloak_outline_automation_first_name: Outline
keycloak_outline_automation_last_name: Automation
keycloak_outline_automation_email: outline.automation@lv3.org
keycloak_outline_automation_password_remote_file: "{{ keycloak_secret_dir }}/outline.automation-password"
keycloak_local_artifact_dir: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/keycloak
keycloak_bootstrap_admin_password_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/keycloak/bootstrap-admin-password.txt
keycloak_operator_password_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/keycloak/florin.badita-password.txt
keycloak_outline_automation_password_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/keycloak/outline.automation-password.txt
keycloak_mail_platform_submission_username: "{{ smtp_username }}"
keycloak_mail_platform_submission_password_local_file: "{{ smtp_password_local_file }}"
keycloak_mail_platform_submission_host: "{{ smtp_host }}"
keycloak_mail_platform_submission_port: "{{ smtp_port }}"
keycloak_mail_platform_submission_starttls: "{{ smtp_starttls }}"
keycloak_mail_platform_submission_auth_enabled: "{{ smtp_auth_enabled }}"
keycloak_mail_platform_docker_network_name: "{{ smtp_docker_network_name }}"
keycloak_mail_platform_from_address: "{{ smtp_from_address }}"
keycloak_mail_platform_reply_to_address: "{{ smtp_reply_to_address }}"
keycloak_realm_smtp_server:
  host: "{{ keycloak_mail_platform_submission_host }}"
  port: "{{ keycloak_mail_platform_submission_port }}"
  from: "{{ keycloak_mail_platform_from_address }}"
  fromDisplayName: "{{ keycloak_realm_display_name }}"
  replyTo: "{{ keycloak_mail_platform_reply_to_address }}"
  replyToDisplayName: "{{ keycloak_realm_display_name }}"
  auth: "{{ keycloak_mail_platform_submission_auth_enabled }}"
  user: "{{ keycloak_mail_platform_submission_username if keycloak_mail_platform_submission_auth_enabled else '' }}"
  password: "{{ keycloak_mail_platform_submission_password | default('') }}"
  starttls: "{{ keycloak_mail_platform_submission_starttls }}"
  ssl: false
keycloak_grafana_client_id: grafana-oauth
keycloak_grafana_client_secret_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/keycloak/grafana-client-secret.txt
keycloak_ops_portal_client_id: ops-portal-oauth
keycloak_ops_portal_client_secret_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/keycloak/ops-portal-client-secret.txt
keycloak_gitea_client_id: gitea-oauth
keycloak_gitea_client_secret_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/keycloak/gitea-client-secret.txt
keycloak_agent_client_id: lv3-agent-hub
keycloak_agent_client_secret_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/keycloak/lv3-agent-hub-client-secret.txt
keycloak_api_gateway_client_id: api-gateway
keycloak_api_gateway_client_secret_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/keycloak/api-gateway-client-secret.txt
keycloak_langfuse_client_id: langfuse
keycloak_langfuse_client_secret_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/keycloak/langfuse-client-secret.txt
keycloak_outline_client_id: outline
keycloak_outline_client_secret_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/keycloak/outline-client-secret.txt
keycloak_serverclaw_client_id: serverclaw
keycloak_serverclaw_client_secret_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/keycloak/serverclaw-client-secret.txt
keycloak_grafana_groups:
  admins: grafana-admins
  viewers: grafana-viewers
keycloak_realm_groups:
  - name: lv3-platform-admins
    attributes:
      identity_class: human_operator
      scope_boundary: platform_admin
  - name: grafana-admins
    attributes:
      identity_class: human_operator
      scope_boundary: grafana_admin
  - name: grafana-viewers
    attributes:
      identity_class: human_operator
      scope_boundary: grafana_readonly
  - name: approved-agent-clients
    attributes:
      identity_class: agent
      scope_boundary: agent_client_credentials
keycloak_realm_roles:
  - name: platform-read
    description: Read access to platform metadata and health APIs.
    composites: []
  - name: platform-operator
    description: Operator access to platform automation APIs.
    composites:
      - name: platform-read
keycloak_group_realm_role_mappings:
  - group_name: lv3-platform-admins
    roles:
      - name: platform-operator
keycloak_service_account_realm_role_mappings:
  - service_account_user_client_id: "{{ keycloak_agent_client_id }}"
    roles:
      - name: platform-read
keycloak_public_base_url: "https://{{ keycloak_service_topology.public_hostname }}"
keycloak_local_admin_url: "http://{{ ansible_host }}:{{ keycloak_internal_http_port }}"
keycloak_repo_user_admin_url: "{{ keycloak_local_admin_url }}"
keycloak_admin_connection_timeout: 30
keycloak_startup_probe_retries: 60
keycloak_startup_probe_delay: 5
keycloak_repo_user_reconciliation_retries: 24
keycloak_repo_user_reconciliation_delay: 5
keycloak_grafana_root_url: "https://{{ hostvars['proxmox_florin'].lv3_service_topology.grafana.public_hostname }}"
keycloak_langfuse_root_url: https://langfuse.lv3.org
keycloak_outline_root_url: https://wiki.lv3.org
keycloak_serverclaw_root_url: https://chat.lv3.org
keycloak_gitea_root_url: "{{ hostvars['proxmox_florin'].platform_service_topology | platform_service_url('gitea', 'public') }}"
keycloak_ops_portal_root_url: https://ops.lv3.org
keycloak_ops_portal_post_logout_redirect_uris:
  - "{{ keycloak_ops_portal_root_url }}/"
  - "{{ keycloak_ops_portal_root_url }}"
  - "{{ keycloak_session_authority.shared_logged_out_url }}"
keycloak_grafana_post_logout_redirect_uris:
  - "{{ keycloak_grafana_root_url }}/login"
  - "{{ keycloak_session_authority.shared_proxy_cleanup_url }}"
keycloak_outline_post_logout_redirect_uris:
  - "{{ keycloak_outline_root_url }}"
  - "{{ keycloak_outline_root_url }}/"
  - "{{ keycloak_session_authority.shared_proxy_cleanup_url }}"
keycloak_serverclaw_post_logout_redirect_uris:
  - "{{ keycloak_serverclaw_root_url }}"
  - "{{ keycloak_serverclaw_root_url }}/"
