# Purpose: Declare the supported input contract for the Keycloak runtime role.
# Use case: Loaded by Ansible to validate required Keycloak runtime variables before execution.
# Inputs: Role variables covering topology, bootstrap identities, runtime secrets, and delegated-auth settings.
# Outputs: Provides argument specifications used by Ansible role validation.
# Idempotency: Fully idempotent because this file only documents the role interface.
# Dependencies: ADR 0165 and ADR 0262.
---
# Purpose: Describe the required runtime variables for the Keycloak stack.

argument_specs:
  main:
    short_description: Converge the Keycloak runtime, realm bootstrap, and brokered identities.
    description: >-
      Converges the Keycloak identity service on docker-runtime.
      Conventional variables (site_dir, secret_dir, compose_file, env_file, image, etc.) are
      automatically derived from the platform_service_registry via ADR 0373.
      Only service-specific variables are documented here.
    options:
      keycloak_service_topology:
        type: dict
        required: true
        description:
          - Service topology entry for the Keycloak publication surface.
      keycloak_realm_name:
        type: str
        required: true
        description:
          - Realm identifier that should exist after convergence.
      keycloak_realm_display_name:
        type: str
        required: true
        description:
          - Human-readable display name for the managed realm.
      keycloak_compose_project_name:
        type: str
        required: true
        description:
          - Compose project name used for runtime network cleanup during forced replays.
      keycloak_compose_network_name:
        type: str
        required: true
        description:
          - Managed compose network name removed before forced Keycloak recovery replays.
      keycloak_database_name:
        type: str
        required: true
        description:
          - PostgreSQL database name used by Keycloak.
      keycloak_database_user:
        type: str
        required: true
        description:
          - PostgreSQL login role used by Keycloak.
      keycloak_database_password_local_file:
        type: path
        required: true
        description:
          - Controller-local file that stores the runtime database password.
      keycloak_internal_http_port:
        type: int
        required: true
        description:
          - Guest-local HTTP port exposed by the runtime stack.
      keycloak_local_http_port:
        type: int
        required: true
        description:
          - Loopback-only admin API port used for local verification.
      keycloak_local_management_port:
        type: int
        required: true
        description:
          - Loopback-only management port used for readiness checks.
      keycloak_bootstrap_admin_username:
        type: str
        required: true
        description:
          - Break-glass Keycloak bootstrap admin username.
      keycloak_bootstrap_admin_password_remote_file:
        type: path
        required: true
        description:
          - Guest-local file containing the generated bootstrap admin password.
      keycloak_admin_client_id:
        type: str
        required: true
        description:
          - Confidential client id used by repo-managed Keycloak automation admin flows.
      keycloak_admin_client_secret_remote_file:
        type: path
        required: true
        description:
          - Guest-local file containing the repo-managed Keycloak automation admin client secret.
      keycloak_recovery_admin_service_client_id:
        type: str
        required: true
        description:
          - Temporary admin service-account client id used only for offline Keycloak admin access recovery.
      keycloak_recovery_admin_service_secret_remote_file:
        type: path
        required: true
        description:
          - Guest-local file containing the temporary Keycloak recovery admin service secret.
      keycloak_operator_username:
        type: str
        required: true
        description:
          - Named human operator username to provision in the realm.
      keycloak_operator_first_name:
        type: str
        required: true
        description:
          - First name for the named operator account.
      keycloak_operator_last_name:
        type: str
        required: true
        description:
          - Last name for the named operator account.
      keycloak_operator_email:
        type: str
        required: true
        description:
          - Email address for the named operator account.
      keycloak_operator_password_remote_file:
        type: path
        required: true
        description:
          - Guest-local file containing the generated named-operator bootstrap password.
      keycloak_local_artifact_dir:
        type: path
        required: true
        description:
          - Controller-local directory used to mirror Keycloak artifacts.
      keycloak_bootstrap_admin_password_local_file:
        type: path
        required: true
        description:
          - Controller-local file used to mirror the bootstrap admin password.
      keycloak_admin_client_secret_local_file:
        type: path
        required: true
        description:
          - Controller-local file used to mirror the repo-managed Keycloak automation admin client secret.
      keycloak_operator_password_local_file:
        type: path
        required: true
        description:
          - Controller-local file used to mirror the named-operator password.
      keycloak_mail_platform_submission_username:
        type: str
        required: true
        description:
          - SMTP login username used by Keycloak for reset and action emails through the private mail relay.
      keycloak_mail_platform_submission_password_local_file:
        type: path
        required: true
        description:
          - Controller-local file containing the managed mailbox password used for Keycloak mail submission when SMTP auth is enabled.
      keycloak_mail_platform_submission_host:
        type: str
        required: true
        description:
          - Hostname or IP for the private mail submission relay.
      keycloak_mail_platform_submission_port:
        type: int
        required: true
        description:
          - TCP port for the private mail submission relay.
      keycloak_mail_platform_submission_starttls:
        type: bool
        required: true
        description:
          - Whether Keycloak should negotiate STARTTLS on the configured submission listener.
      keycloak_mail_platform_submission_auth_enabled:
        type: bool
        required: true
        description:
          - Whether Keycloak should authenticate to the configured SMTP relay.
      keycloak_mail_platform_docker_network_name:
        type: str
        required: true
        description:
          - External Docker network name Keycloak joins so it can reach the configured SMTP relay directly.
      keycloak_mail_platform_compose_file:
        type: path
        required: true
        description:
          - Compose file used to recover the private SMTP relay when the shared Docker host restarts and the relay is no longer reachable from Keycloak.
      keycloak_mail_platform_submission_service_name:
        type: str
        required: true
        description:
          - Compose service name that exposes the private SMTP relay consumed by Keycloak.
      keycloak_mail_platform_submission_recovery_enabled:
        type: bool
        required: true
        description:
          - Whether the role should recover the private SMTP relay locally when the initial in-container DNS probe fails.
      keycloak_mail_platform_from_address:
        type: str
        required: true
        description:
          - Sender address used for Keycloak transactional mail.
      keycloak_mail_platform_reply_to_address:
        type: str
        required: true
        description:
          - Reply-to address used for Keycloak transactional mail.
      keycloak_realm_smtp_server:
        type: dict
        required: true
        description:
          - Repo-managed SMTP configuration applied to the Keycloak realm.
      keycloak_grafana_client_id:
        type: str
        required: true
        description:
          - OIDC client id used by Grafana.
      keycloak_grafana_client_secret_local_file:
        type: path
        required: true
        description:
          - Controller-local file used to mirror the Grafana client secret.
      keycloak_ops_portal_client_id:
        type: str
        required: true
        description:
          - OIDC client id used by the operations portal auth proxy.
      keycloak_ops_portal_client_secret_local_file:
        type: path
        required: true
        description:
          - Controller-local file used to mirror the operations portal client secret.
      keycloak_serverclaw_client_id:
        type: str
        required: true
        description:
          - OIDC client id used by the public ServerClaw surface.
      keycloak_serverclaw_client_secret_local_file:
        type: path
        required: true
        description:
          - Controller-local file used to mirror the ServerClaw client secret.
      keycloak_agent_client_id:
        type: str
        required: true
        description:
          - Confidential client id used by approved agent workflows.
      keycloak_agent_client_secret_local_file:
        type: path
        required: true
        description:
          - Controller-local file used to mirror the agent client secret.
      keycloak_api_gateway_client_id:
        type: str
        required: true
        description:
          - Confidential client id used by the unified platform API gateway migration path.
      keycloak_api_gateway_client_secret_local_file:
        type: path
        required: true
        description:
          - Controller-local file used to mirror the API gateway client secret.
      keycloak_serverclaw_runtime_client_id:
        type: str
        required: true
        description:
          - Confidential client id used by the ServerClaw runtime client-credentials flow.
      keycloak_serverclaw_runtime_client_secret_local_file:
        type: path
        required: true
        description:
          - Controller-local file used to mirror the ServerClaw runtime client secret.
      keycloak_grist_client_id:
        type: str
        required: true
        description:
          - OIDC client id used by Grist.
      keycloak_grist_client_secret_local_file:
        type: path
        required: true
        description:
          - Controller-local file used to mirror the Grist client secret.
      keycloak_glitchtip_client_id:
        type: str
        required: true
        description:
          - OIDC client id used by GlitchTip.
      keycloak_glitchtip_client_secret_local_file:
        type: path
        required: true
        description:
          - Controller-local file used to mirror the GlitchTip client secret.
      keycloak_grafana_groups:
        type: dict
        required: true
        description:
          - Mapping of Grafana role group names expected in the realm.
      keycloak_realm_groups:
        type: list
        elements: dict
        required: true
        description:
          - Managed Keycloak groups that must exist in the realm.
      keycloak_public_base_url:
        type: str
        required: true
        description:
          - Public issuer base URL for Keycloak.
      keycloak_local_admin_url:
        type: str
        required: true
        description:
          - Loopback-only Keycloak admin API URL used for bootstrap.
      keycloak_admin_connection_timeout:
        type: int
        required: true
        description:
          - Timeout in seconds for repo-managed Keycloak admin module requests.
      keycloak_admin_reconciliation_retries:
        type: int
        required: true
        description:
          - Retry attempts for transient failures in repo-managed Keycloak admin module reconciliation.
      keycloak_admin_reconciliation_delay:
        type: int
        required: true
        description:
          - Delay in seconds between repo-managed Keycloak admin module reconciliation retries.
      keycloak_grafana_root_url:
        type: str
        required: true
        description:
          - Public Grafana base URL used when provisioning redirect URIs.
      keycloak_ops_portal_root_url:
        type: str
        required: true
        description:
          - Public operations portal base URL used when provisioning redirect URIs.
      keycloak_serverclaw_root_url:
        type: str
        required: true
        description:
          - Public ServerClaw base URL used when provisioning redirect URIs.
