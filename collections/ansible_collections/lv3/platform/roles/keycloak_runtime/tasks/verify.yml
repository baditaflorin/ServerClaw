---
# Dependencies: ADR 0165 and ADR 0371.
- name: Verify the Keycloak runtime
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: keycloak
    common_verify_port: "{{ keycloak_local_management_port }}"
    common_verify_health_url: "http://127.0.0.1:{{ keycloak_local_management_port }}/health/live"
    common_verify_health_retries: 24
    common_verify_health_delay: 5
    common_verify_extra_endpoints:
      - url: "{{ keycloak_local_admin_url }}/realms/{{ keycloak_realm_name }}/.well-known/openid-configuration"
        assertions:
          - "common_verify_extra_response.json.issuer == keycloak_public_base_url ~ '/realms/' ~ keycloak_realm_name"
        assertion_msg: "Keycloak answered locally, but the realm discovery document does not match the expected public issuer."
