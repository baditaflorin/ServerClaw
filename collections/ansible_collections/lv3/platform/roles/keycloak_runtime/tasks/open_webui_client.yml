# Purpose: Converge the dedicated Open WebUI OAuth client and mirror its secret locally.
# Use case: Run from the standalone Open WebUI play when only the private workbench client must be reconciled.
# Inputs: Keycloak admin client credentials, Open WebUI client settings, and local artifact paths.
# Outputs: Ensures the Keycloak client exists and writes the mirrored client secret to the controller.
# Idempotency: Partially idempotent because Keycloak reconciliation may refresh secrets and mirrored artifacts.
# Dependencies: ADR 0165, ADR 0056, ADR 0060, and the repo-managed Keycloak runtime.
---
- name: Derive Keycloak conventional defaults from the service registry
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: derive_service_defaults
  vars:
    common_derive_service_name: keycloak

- name: Ensure the repo-managed Keycloak admin client secret exists on the control machine
  ansible.builtin.stat:
    path: "{{ keycloak_admin_client_secret_local_file }}"
  delegate_to: localhost
  become: false
  register: keycloak_admin_client_secret_local

- name: Fail if the repo-managed Keycloak admin client secret is missing locally
  ansible.builtin.fail:
    msg: >-
      {{ keycloak_admin_client_secret_local_file }} is missing on the control machine.
      Converge Keycloak first so repo-managed OAuth clients can authenticate to the admin API.
  when: not keycloak_admin_client_secret_local.stat.exists

- name: Record the repo-managed Keycloak admin client secret from the control machine
  ansible.builtin.set_fact:
    keycloak_admin_client_secret: "{{ lookup('ansible.builtin.file', keycloak_admin_client_secret_local_file) | trim }}"
  no_log: true

- name: Ensure the local Keycloak artifact directory exists
  ansible.builtin.file:
    path: "{{ keycloak_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Wait for the Keycloak readiness endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ keycloak_local_management_port }}/health/ready"
    method: GET
    status_code: 200
  register: keycloak_open_webui_readiness_probe
  retries: "{{ keycloak_startup_probe_retries }}"
  delay: "{{ keycloak_startup_probe_delay }}"
  until: keycloak_open_webui_readiness_probe.status == 200
  changed_when: false

- name: Wait for the Keycloak admin API to answer
  ansible.builtin.uri:
    url: "{{ keycloak_local_admin_url }}/realms/master/.well-known/openid-configuration"
    method: GET
    status_code: 200
  register: keycloak_open_webui_admin_api_probe
  retries: "{{ keycloak_startup_probe_retries }}"
  delay: "{{ keycloak_startup_probe_delay }}"
  until: keycloak_open_webui_admin_api_probe.status == 200
  changed_when: false

- name: Wait for the repo-managed Keycloak admin client token endpoint to succeed
  ansible.builtin.uri:
    url: "{{ keycloak_local_admin_url }}/realms/master/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: client_credentials
      client_id: "{{ keycloak_admin_client_id }}"
      client_secret: "{{ keycloak_admin_client_secret }}"
    return_content: true
    status_code: 200
  register: keycloak_open_webui_admin_client_token_probe
  retries: "{{ keycloak_startup_probe_retries }}"
  delay: "{{ keycloak_startup_probe_delay }}"
  until: keycloak_open_webui_admin_client_token_probe.status == 200
  changed_when: false
  no_log: true

- name: Wait for an authenticated Keycloak admin realm query to answer
  ansible.builtin.uri:
    url: "{{ keycloak_local_admin_url }}/admin/realms/{{ keycloak_realm_name }}"
    method: GET
    headers:
      Authorization: "Bearer {{ keycloak_open_webui_admin_client_token_probe.json.access_token }}"
    status_code: 200
  register: keycloak_open_webui_admin_probe
  retries: "{{ keycloak_startup_probe_retries }}"
  delay: "{{ keycloak_startup_probe_delay }}"
  until: keycloak_open_webui_admin_probe.status == 200
  changed_when: false
  no_log: true

- name: Converge the dedicated Open WebUI Keycloak client
  module_defaults:
    community.general.keycloak_client:
      connection_timeout: "{{ keycloak_admin_connection_timeout }}"
      auth_client_id: "{{ keycloak_admin_client_id }}"
      auth_client_secret: "{{ keycloak_admin_client_secret }}"
      auth_keycloak_url: "{{ keycloak_local_admin_url }}"
      auth_realm: master
      validate_certs: false
    community.general.keycloak_clientsecret_info:
      connection_timeout: "{{ keycloak_admin_connection_timeout }}"
      auth_client_id: "{{ keycloak_admin_client_id }}"
      auth_client_secret: "{{ keycloak_admin_client_secret }}"
      auth_keycloak_url: "{{ keycloak_local_admin_url }}"
      auth_realm: master
      validate_certs: false
  block:
    - name: Ensure the Open WebUI OAuth client exists
      community.general.keycloak_client:
        auth_keycloak_url: "{{ keycloak_local_admin_url }}"
        realm: "{{ keycloak_realm_name }}"
        client_id: "{{ keycloak_open_webui_client_id }}"
        name: Open WebUI
        description: Repo-managed OIDC client for the private Open WebUI operator and agent workbench.
        enabled: true
        protocol: openid-connect
        public_client: false
        client_authenticator_type: client-secret
        standard_flow_enabled: true
        implicit_flow_enabled: false
        direct_access_grants_enabled: false
        service_accounts_enabled: false
        full_scope_allowed: false
        root_url: "{{ keycloak_open_webui_root_url }}"
        base_url: "{{ keycloak_open_webui_root_url }}"
        admin_url: "{{ keycloak_open_webui_root_url }}"
        redirect_uris:
          - "{{ keycloak_open_webui_root_url }}/oauth/oidc/callback"
        valid_post_logout_redirect_uris: "{{ keycloak_open_webui_post_logout_redirect_uris }}"
        web_origins:
          - "{{ keycloak_open_webui_root_url }}"
        state: present

    - name: Read the Open WebUI client secret
      community.general.keycloak_clientsecret_info:
        auth_keycloak_url: "{{ keycloak_local_admin_url }}"
        realm: "{{ keycloak_realm_name }}"
        client_id: "{{ keycloak_open_webui_client_id }}"
      register: keycloak_open_webui_client_secret_info
      no_log: true

- name: Record the Open WebUI client secret
  ansible.builtin.set_fact:
    keycloak_open_webui_client_secret: "{{ keycloak_open_webui_client_secret_info.clientsecret_info.value }}"
  no_log: true

- name: Mirror the Open WebUI client secret to the control machine
  ansible.builtin.copy:
    dest: "{{ keycloak_open_webui_client_secret_local_file }}"
    content: "{{ keycloak_open_webui_client_secret }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true
