---
# Purpose: Reconcile the repo-managed OIDC client for Plane task board authentication against Keycloak.
# Use case: Run as part of keycloak_runtime role to ensure Plane can authenticate via OIDC delegation.
# Inputs:
#   - keycloak_admin_client_secret: Admin runtime secret for Keycloak API access
#   - keycloak_service_topology: Service topology for Keycloak URL resolution
#   - plane_service_topology: Service topology for Plane URL resolution
# Outputs:
#   - Plane OIDC client created/updated in Keycloak with proper redirect URIs and secrets
#   - plane_oidc_client_secret written to plane_oidc_client_secret_local_file
# Idempotency: Fully idempotent — client is created once and updated as needed
# Dependencies: keycloak_runtime must have already configured the admin client
# Author: LV3 Platform
# Last Updated: 2026-04-07

- name: Set Plane OIDC client configuration facts
  ansible.builtin.set_fact:
    plane_oidc_client_id: lv3-plane-oidc
    plane_oidc_client_name: "LV3 Plane Task Board"
    plane_oidc_public_url: "{{ plane_service_topology.public_base_url | default('https://tasks.lv3.org') }}"
    plane_oidc_internal_url: "{{ plane_service_topology.internal_base_url | default('http://docker-runtime-lv3.internal:8000') }}"
    keycloak_api_url: "{{ keycloak_service_topology.public_base_url | default('https://keycloak.lv3.org') }}"

- name: Check if Plane OIDC client already exists in Keycloak
  ansible.builtin.uri:
    url: "{{ keycloak_api_url }}/admin/realms/{{ keycloak_realm_name }}/clients?clientId={{ plane_oidc_client_id }}"
    method: GET
    headers:
      Authorization: "Bearer {{ keycloak_admin_token }}"
      Content-Type: "application/json"
    status_code: [200, 404]
    validate_certs: false
  register: plane_client_check
  no_log: true

- name: Set plane_client_exists fact
  ansible.builtin.set_fact:
    plane_client_exists: "{{ plane_client_check.json | length > 0 }}"
    plane_client_uuid: "{{ (plane_client_check.json | first).id | default('') }}"
  when: plane_client_check.json | length > 0

- name: Set plane_client_exists fact (not found)
  ansible.builtin.set_fact:
    plane_client_exists: false
    plane_client_uuid: ""
  when: plane_client_check.json | length == 0

- name: Generate Plane OIDC client secret if needed
  ansible.builtin.command:
    cmd: openssl rand -hex 32
  register: plane_oidc_client_secret_gen
  when: not plane_client_exists
  no_log: true

- name: Set plane_oidc_client_secret fact
  ansible.builtin.set_fact:
    plane_oidc_client_secret: "{{ plane_oidc_client_secret_gen.stdout | default('') }}"
  when: not plane_client_exists
  no_log: true

- name: Retrieve existing Plane OIDC client secret if client exists
  ansible.builtin.uri:
    url: "{{ keycloak_api_url }}/admin/realms/{{ keycloak_realm_name }}/clients/{{ plane_client_uuid }}/client-secret"
    method: GET
    headers:
      Authorization: "Bearer {{ keycloak_admin_token }}"
      Content-Type: "application/json"
    validate_certs: false
  register: plane_existing_secret
  when: plane_client_exists
  no_log: true

- name: Set plane_oidc_client_secret from existing client
  ansible.builtin.set_fact:
    plane_oidc_client_secret: "{{ plane_existing_secret.json.value }}"
  when: plane_client_exists
  no_log: true

- name: Create Plane OIDC client in Keycloak
  ansible.builtin.uri:
    url: "{{ keycloak_api_url }}/admin/realms/{{ keycloak_realm_name }}/clients"
    method: POST
    headers:
      Authorization: "Bearer {{ keycloak_admin_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      clientId: "{{ plane_oidc_client_id }}"
      name: "{{ plane_oidc_client_name }}"
      description: "OIDC client for LV3 Plane task management system"
      enabled: true
      clientAuthenticatorType: "client-secret"
      secret: "{{ plane_oidc_client_secret }}"
      directAccessGrantsEnabled: true
      publicClient: false
      redirectUris:
        - "{{ plane_oidc_public_url }}/auth/callback/keycloak"
        - "{{ plane_oidc_public_url }}/auth/oidc/callback"
        - "{{ plane_oidc_internal_url }}/auth/callback/keycloak"
        - "{{ plane_oidc_internal_url }}/auth/oidc/callback"
      webOrigins:
        - "{{ plane_oidc_public_url }}"
        - "{{ plane_oidc_internal_url }}"
      attributes:
        "backchannel.logout.session.required": "true"
        "backchannel.logout.revoke.offline.tokens": "true"
      standardFlowEnabled: true
      implicitFlowEnabled: false
      serviceAccountsEnabled: false
      authorizationServicesEnabled: false
      protocolMappers:
        - name: "email"
          protocolMapperType: "oidc-usermodel-attribute-mapper"
          protocol: "openid-connect"
          config:
            "userinfo.token.claim": "true"
            "user.attribute": "email"
            "id.token.claim": "true"
            "access.token.claim": "true"
            "claim.name": "email"
            "jsonType.label": "String"
        - name: "given name"
          protocolMapperType: "oidc-usermodel-attribute-mapper"
          protocol: "openid-connect"
          config:
            "userinfo.token.claim": "true"
            "user.attribute": "firstName"
            "id.token.claim": "true"
            "access.token.claim": "true"
            "claim.name": "given_name"
            "jsonType.label": "String"
        - name: "family name"
          protocolMapperType: "oidc-usermodel-attribute-mapper"
          protocol: "openid-connect"
          config:
            "userinfo.token.claim": "true"
            "user.attribute": "lastName"
            "id.token.claim": "true"
            "access.token.claim": "true"
            "claim.name": "family_name"
            "jsonType.label": "String"
        - name: "username"
          protocolMapperType: "oidc-usermodel-property-mapper"
          protocol: "openid-connect"
          config:
            "userinfo.token.claim": "true"
            "user.property": "username"
            "id.token.claim": "true"
            "access.token.claim": "true"
            "claim.name": "preferred_username"
            "jsonType.label": "String"
    status_code: [201, 409]
    validate_certs: false
  register: plane_client_create
  when: not plane_client_exists
  no_log: true

- name: Update Plane OIDC client redirect URIs
  ansible.builtin.uri:
    url: "{{ keycloak_api_url }}/admin/realms/{{ keycloak_realm_name }}/clients/{{ plane_client_uuid }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ keycloak_admin_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      redirectUris:
        - "{{ plane_oidc_public_url }}/auth/callback/keycloak"
        - "{{ plane_oidc_public_url }}/auth/oidc/callback"
        - "{{ plane_oidc_internal_url }}/auth/callback/keycloak"
        - "{{ plane_oidc_internal_url }}/auth/oidc/callback"
      webOrigins:
        - "{{ plane_oidc_public_url }}"
        - "{{ plane_oidc_internal_url }}"
    status_code: [204]
    validate_certs: false
  when: plane_client_exists
  no_log: true

- name: Write Plane OIDC client secret to local artifact
  ansible.builtin.copy:
    content: "{{ plane_oidc_client_secret }}"
    dest: "{{ plane_oidc_client_secret_local_file }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user_group }}"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true
  register: plane_oidc_secret_write

- name: Display Plane OIDC client configuration
  ansible.builtin.debug:
    msg:
      - "Plane OIDC Client Configuration:"
      - "Client ID: {{ plane_oidc_client_id }}"
      - "Client Secret: {{ '*' * (plane_oidc_client_secret | length) }}"
      - "Public URL: {{ plane_oidc_public_url }}"
      - "Keycloak URL: {{ keycloak_api_url }}"
      - "Realm: {{ keycloak_realm_name }}"
      - "Secret artifact: {{ plane_oidc_client_secret_local_file }}"
