# Purpose: Recover the repo-managed Keycloak bootstrap admin password through a temporary admin service account when the stored password drifts from live state.
# Use case: Included from the main Keycloak runtime role after startup recovery when authenticated bootstrap-admin probes still fail with invalid credentials.
# Inputs: Keycloak compose/runtime paths, the managed recovery admin service secret, the managed bootstrap admin password, and the loopback admin API endpoint.
# Outputs: Ensures a recovery admin service account exists, then resets the bootstrap admin password in the master realm back to the repo-managed secret.
# Idempotency: Partially idempotent because it only mutates live Keycloak state when the bootstrap password has drifted, while repeated recovery-account bootstrap attempts safely no-op if the client already exists.
# Dependencies: ADR 0165, ADR 0056, and ADR 0262.
- name: Ensure the recovery admin service account exists for bootstrap password recovery
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ keycloak_compose_file }}"
      - run
      - --rm
      - -e
      - BOOTSTRAP_ADMIN_SERVICE_SECRET
      - keycloak
      - bootstrap-admin
      - service
      - --no-prompt
      - --client-id
      - "{{ keycloak_recovery_admin_service_client_id }}"
      - --client-secret:env
      - BOOTSTRAP_ADMIN_SERVICE_SECRET
  args:
    chdir: "{{ keycloak_site_dir }}"
  environment:
    BOOTSTRAP_ADMIN_SERVICE_SECRET: "{{ keycloak_recovery_admin_service_secret }}"
  register: keycloak_recovery_admin_service_bootstrap
  changed_when: >-
    'Created temporary admin service account' in (keycloak_recovery_admin_service_bootstrap.stdout | default(''))
  failed_when: keycloak_recovery_admin_service_bootstrap.rc != 0
  no_log: true

- name: Request a recovery admin service token for bootstrap password recovery
  ansible.builtin.uri:
    url: "{{ keycloak_local_admin_url }}/realms/master/protocol/openid-connect/token"
    method: POST
    timeout: "{{ keycloak_admin_connection_timeout }}"
    body_format: form-urlencoded
    body:
      grant_type: client_credentials
      client_id: "{{ keycloak_recovery_admin_service_client_id }}"
      client_secret: "{{ keycloak_recovery_admin_service_secret }}"
    return_content: true
    status_code: 200
  register: keycloak_recovery_admin_service_token
  retries: "{{ keycloak_admin_reconciliation_retries }}"
  delay: "{{ keycloak_admin_reconciliation_delay }}"
  until: >-
    keycloak_recovery_admin_service_token.status == 200
    and (keycloak_recovery_admin_service_token.json.access_token | default('') | length) > 0
  no_log: true

- name: Look up the Keycloak bootstrap admin user through the recovery admin service account
  ansible.builtin.uri:
    url: "{{ keycloak_local_admin_url }}/admin/realms/master/users?username={{ keycloak_bootstrap_admin_username | urlencode }}&exact=true"
    method: GET
    headers:
      Authorization: "Bearer {{ keycloak_recovery_admin_service_token.json.access_token }}"
    return_content: true
    status_code: 200
  register: keycloak_recovery_bootstrap_admin_lookup
  retries: "{{ keycloak_admin_reconciliation_retries }}"
  delay: "{{ keycloak_admin_reconciliation_delay }}"
  until: >-
    keycloak_recovery_bootstrap_admin_lookup.status == 200
    and (keycloak_recovery_bootstrap_admin_lookup.json | default([]) | length) > 0
  changed_when: false
  no_log: true

- name: Reset the Keycloak bootstrap admin password through the recovery admin service account
  ansible.builtin.uri:
    url: "{{ keycloak_local_admin_url }}/admin/realms/master/users/{{ keycloak_recovery_bootstrap_admin_lookup.json[0].id }}/reset-password"
    method: PUT
    headers:
      Authorization: "Bearer {{ keycloak_recovery_admin_service_token.json.access_token }}"
    body_format: json
    body:
      type: password
      value: "{{ keycloak_bootstrap_admin_password }}"
      temporary: false
    status_code: 204
  register: keycloak_recovery_bootstrap_admin_password_reset
  retries: "{{ keycloak_admin_reconciliation_retries }}"
  delay: "{{ keycloak_admin_reconciliation_delay }}"
  until: keycloak_recovery_bootstrap_admin_password_reset.status == 204
  no_log: true
