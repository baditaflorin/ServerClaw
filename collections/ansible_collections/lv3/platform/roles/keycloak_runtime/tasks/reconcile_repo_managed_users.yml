# Purpose: Reconcile repo-managed Keycloak users, credentials, and group memberships against the live realm.
# Use case: Included by the Keycloak runtime role when named operator and service identities must match repo contracts.
# Inputs: Keycloak admin endpoints, the repo-managed admin client credentials, repo-managed user definitions, and target group ids.
# Outputs: Repo-managed Keycloak users exist with the expected enabled state, passwords, and group assignments.
# Idempotency: Fully idempotent because the task only creates or updates drifted identities.
# Dependencies: ADR 0165, ADR 0056, and ADR 0262.
- name: Request a Keycloak admin token for repo-managed user reconciliation
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/realms/master/protocol/openid-connect/token"
    method: POST
    timeout: "{{ keycloak_admin_connection_timeout }}"
    body_format: form-urlencoded
    body:
      grant_type: client_credentials
      client_id: "{{ keycloak_admin_client_id }}"
      client_secret: "{{ keycloak_admin_client_secret }}"
    return_content: true
    status_code: 200
  register: keycloak_repo_user_admin_token
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: >-
    keycloak_repo_user_admin_token.status == 200
    and (keycloak_repo_user_admin_token.json.access_token | default('') | length) > 0
  no_log: true

- name: Record the repo-managed Keycloak admin headers
  ansible.builtin.set_fact:
    keycloak_repo_user_admin_headers:
      Authorization: "Bearer {{ keycloak_repo_user_admin_token.json.access_token }}"
  no_log: true

- name: Look up the lv3-platform-admins group in Keycloak
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/admin/realms/{{ keycloak_realm_name }}/groups?search=lv3-platform-admins"
    method: GET
    headers: "{{ keycloak_repo_user_admin_headers }}"
    return_content: true
    status_code: 200
  register: keycloak_platform_admin_group_lookup
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: keycloak_platform_admin_group_lookup.status == 200
  changed_when: false
  no_log: true

- name: Look up the Grafana admins group in Keycloak
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/admin/realms/{{ keycloak_realm_name }}/groups?search={{ keycloak_grafana_groups.admins | urlencode }}"
    method: GET
    headers: "{{ keycloak_repo_user_admin_headers }}"
    return_content: true
    status_code: 200
  register: keycloak_grafana_admin_group_lookup
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: keycloak_grafana_admin_group_lookup.status == 200
  changed_when: false
  no_log: true

- name: Record the repo-managed Keycloak group IDs
  ansible.builtin.set_fact:
    keycloak_platform_admin_group_id: >-
      {{
        (
          keycloak_platform_admin_group_lookup.json
          | selectattr('name', 'equalto', 'lv3-platform-admins')
          | map(attribute='id')
          | first
        ) | default('')
      }}
    keycloak_grafana_admin_group_id: >-
      {{
        (
          keycloak_grafana_admin_group_lookup.json
          | selectattr('name', 'equalto', keycloak_grafana_groups.admins)
          | map(attribute='id')
          | first
        ) | default('')
      }}
  no_log: true

- name: Assert the repo-managed Keycloak groups exist
  ansible.builtin.assert:
    that:
      - keycloak_platform_admin_group_id | length > 0
      - keycloak_grafana_admin_group_id | length > 0
    fail_msg: "The repo-managed Keycloak admin groups must exist before reconciling operator identities."
  no_log: true

- name: Look up the named operator in Keycloak
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/admin/realms/{{ keycloak_realm_name }}/users?username={{ keycloak_operator_username | urlencode }}&exact=true"
    method: GET
    headers: "{{ keycloak_repo_user_admin_headers }}"
    return_content: true
    status_code: 200
  register: keycloak_operator_lookup
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: keycloak_operator_lookup.status == 200
  changed_when: false
  no_log: true

- name: Create the named operator in Keycloak when missing
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/admin/realms/{{ keycloak_realm_name }}/users"
    method: POST
    headers: "{{ keycloak_repo_user_admin_headers }}"
    body_format: json
    body:
      username: "{{ keycloak_operator_username }}"
      firstName: "{{ keycloak_operator_first_name }}"
      lastName: "{{ keycloak_operator_last_name }}"
      email: "{{ keycloak_operator_email }}"
      emailVerified: true
      enabled: true
      requiredActions:
        - CONFIGURE_TOTP
    status_code:
      - 201
      - 204
      - 409
  register: keycloak_operator_create
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: keycloak_operator_create.status in [201, 204, 409]
  when: (keycloak_operator_lookup.json | length) == 0
  no_log: true

- name: Re-read the named operator in Keycloak
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/admin/realms/{{ keycloak_realm_name }}/users?username={{ keycloak_operator_username | urlencode }}&exact=true"
    method: GET
    headers: "{{ keycloak_repo_user_admin_headers }}"
    return_content: true
    status_code: 200
  register: keycloak_operator_lookup_final
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: keycloak_operator_lookup_final.status == 200
  changed_when: false
  no_log: true

- name: Read the named operator details from Keycloak
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/admin/realms/{{ keycloak_realm_name }}/users/{{ keycloak_operator_lookup_final.json[0].id }}"
    method: GET
    headers: "{{ keycloak_repo_user_admin_headers }}"
    return_content: true
    status_code: 200
  register: keycloak_operator_details
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: keycloak_operator_details.status == 200
  changed_when: false
  no_log: true

- name: Update the named operator profile in Keycloak
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/admin/realms/{{ keycloak_realm_name }}/users/{{ keycloak_operator_lookup_final.json[0].id }}"
    method: PUT
    headers: "{{ keycloak_repo_user_admin_headers }}"
    body_format: json
    body:
      id: "{{ keycloak_operator_lookup_final.json[0].id }}"
      username: "{{ keycloak_operator_username }}"
      firstName: "{{ keycloak_operator_first_name }}"
      lastName: "{{ keycloak_operator_last_name }}"
      email: "{{ keycloak_operator_email }}"
      emailVerified: true
      enabled: true
      requiredActions:
        - CONFIGURE_TOTP
    status_code: 204
  when: >-
    (keycloak_operator_details.json.firstName | default('')) != keycloak_operator_first_name
    or (keycloak_operator_details.json.lastName | default('')) != keycloak_operator_last_name
    or (keycloak_operator_details.json.email | default('')) != keycloak_operator_email
    or not (keycloak_operator_details.json.emailVerified | default(false) | bool)
    or not (keycloak_operator_details.json.enabled | default(false) | bool)
    or (
      (keycloak_operator_details.json.requiredActions | default([]) | sort)
      != (['CONFIGURE_TOTP'] | sort)
    )
  register: keycloak_operator_update
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: keycloak_operator_update.status == 204
  no_log: true

- name: Reset the named operator password in Keycloak
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/admin/realms/{{ keycloak_realm_name }}/users/{{ keycloak_operator_lookup_final.json[0].id }}/reset-password"
    method: PUT
    headers: "{{ keycloak_repo_user_admin_headers }}"
    body_format: json
    body:
      type: password
      value: "{{ keycloak_operator_password }}"
      temporary: false
    status_code: 204
  register: keycloak_operator_password_reset
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: keycloak_operator_password_reset.status == 204
  changed_when: false
  no_log: true

- name: Read the named operator groups from Keycloak
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/admin/realms/{{ keycloak_realm_name }}/users/{{ keycloak_operator_lookup_final.json[0].id }}/groups"
    method: GET
    headers: "{{ keycloak_repo_user_admin_headers }}"
    return_content: true
    status_code: 200
  register: keycloak_operator_groups
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: keycloak_operator_groups.status == 200
  changed_when: false
  no_log: true

- name: Ensure the named operator belongs to lv3-platform-admins
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/admin/realms/{{ keycloak_realm_name }}/users/{{ keycloak_operator_lookup_final.json[0].id }}/groups/{{ keycloak_platform_admin_group_id }}"
    method: PUT
    headers: "{{ keycloak_repo_user_admin_headers }}"
    status_code: 204
  when: >-
    (
      keycloak_operator_groups.json
      | selectattr('name', 'equalto', 'lv3-platform-admins')
      | list
      | length
    ) == 0
  register: keycloak_operator_platform_group_membership
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: keycloak_operator_platform_group_membership.status == 204
  no_log: true

- name: Ensure the named operator belongs to the Grafana admins group
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/admin/realms/{{ keycloak_realm_name }}/users/{{ keycloak_operator_lookup_final.json[0].id }}/groups/{{ keycloak_grafana_admin_group_id }}"
    method: PUT
    headers: "{{ keycloak_repo_user_admin_headers }}"
    status_code: 204
  when: >-
    (
      keycloak_operator_groups.json
      | selectattr('name', 'equalto', keycloak_grafana_groups.admins)
      | list
      | length
    ) == 0
  register: keycloak_operator_grafana_group_membership
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: keycloak_operator_grafana_group_membership.status == 204
  no_log: true

- name: Refresh the Keycloak admin token before reconciling the Outline automation user
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/realms/master/protocol/openid-connect/token"
    method: POST
    timeout: "{{ keycloak_admin_connection_timeout }}"
    body_format: form-urlencoded
    body:
      grant_type: client_credentials
      client_id: "{{ keycloak_admin_client_id }}"
      client_secret: "{{ keycloak_admin_client_secret }}"
    return_content: true
    status_code: 200
  register: keycloak_repo_user_outline_admin_token
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: >-
    keycloak_repo_user_outline_admin_token.status == 200
    and (keycloak_repo_user_outline_admin_token.json.access_token | default('') | length) > 0
  no_log: true
  when: keycloak_reconcile_outline_users | bool

- name: Record the refreshed Keycloak admin headers for Outline automation reconciliation
  ansible.builtin.set_fact:
    keycloak_repo_user_admin_headers:
      Authorization: "Bearer {{ keycloak_repo_user_outline_admin_token.json.access_token }}"
  no_log: true
  when: keycloak_reconcile_outline_users | bool

- name: Look up the Outline automation user in Keycloak
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/admin/realms/{{ keycloak_realm_name }}/users?username={{ keycloak_outline_automation_username | urlencode }}&exact=true"
    method: GET
    headers: "{{ keycloak_repo_user_admin_headers }}"
    return_content: true
    status_code: 200
  register: keycloak_outline_automation_lookup
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: keycloak_outline_automation_lookup.status == 200
  changed_when: false
  no_log: true
  when: keycloak_reconcile_outline_users | bool

- name: Create the Outline automation user in Keycloak when missing
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/admin/realms/{{ keycloak_realm_name }}/users"
    method: POST
    headers: "{{ keycloak_repo_user_admin_headers }}"
    body_format: json
    body:
      username: "{{ keycloak_outline_automation_username }}"
      firstName: "{{ keycloak_outline_automation_first_name }}"
      lastName: "{{ keycloak_outline_automation_last_name }}"
      email: "{{ keycloak_outline_automation_email }}"
      emailVerified: true
      enabled: true
      requiredActions: []
    status_code:
      - 201
      - 204
      - 409
  register: keycloak_outline_automation_create
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: keycloak_outline_automation_create.status in [201, 204, 409]
  when:
    - keycloak_reconcile_outline_users | bool
    - (keycloak_outline_automation_lookup.json | default([]) | length) == 0
  no_log: true

- name: Re-read the Outline automation user in Keycloak
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/admin/realms/{{ keycloak_realm_name }}/users?username={{ keycloak_outline_automation_username | urlencode }}&exact=true"
    method: GET
    headers: "{{ keycloak_repo_user_admin_headers }}"
    return_content: true
    status_code: 200
  register: keycloak_outline_automation_lookup_final
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: keycloak_outline_automation_lookup_final.status == 200
  changed_when: false
  no_log: true
  when: keycloak_reconcile_outline_users | bool

- name: Read the Outline automation user details from Keycloak
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/admin/realms/{{ keycloak_realm_name }}/users/{{ keycloak_outline_automation_lookup_final.json[0].id }}"
    method: GET
    headers: "{{ keycloak_repo_user_admin_headers }}"
    return_content: true
    status_code: 200
  register: keycloak_outline_automation_details
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: keycloak_outline_automation_details.status == 200
  changed_when: false
  no_log: true
  when: keycloak_reconcile_outline_users | bool

- name: Update the Outline automation user profile in Keycloak
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/admin/realms/{{ keycloak_realm_name }}/users/{{ keycloak_outline_automation_lookup_final.json[0].id }}"
    method: PUT
    headers: "{{ keycloak_repo_user_admin_headers }}"
    body_format: json
    body:
      id: "{{ keycloak_outline_automation_lookup_final.json[0].id }}"
      username: "{{ keycloak_outline_automation_username }}"
      firstName: "{{ keycloak_outline_automation_first_name }}"
      lastName: "{{ keycloak_outline_automation_last_name }}"
      email: "{{ keycloak_outline_automation_email }}"
      emailVerified: true
      enabled: true
      requiredActions: []
    status_code: 204
  when:
    - keycloak_reconcile_outline_users | bool
    - >-
      (keycloak_outline_automation_details.json.firstName | default('')) != keycloak_outline_automation_first_name
      or (keycloak_outline_automation_details.json.lastName | default('')) != keycloak_outline_automation_last_name
      or (keycloak_outline_automation_details.json.email | default('')) != keycloak_outline_automation_email
      or not (keycloak_outline_automation_details.json.emailVerified | default(false) | bool)
      or not (keycloak_outline_automation_details.json.enabled | default(false) | bool)
      or (keycloak_outline_automation_details.json.requiredActions | default([]) | length) > 0
  register: keycloak_outline_automation_update
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: keycloak_outline_automation_update.status == 204
  no_log: true

- name: Reset the Outline automation user password in Keycloak
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/admin/realms/{{ keycloak_realm_name }}/users/{{ keycloak_outline_automation_lookup_final.json[0].id }}/reset-password"
    method: PUT
    headers: "{{ keycloak_repo_user_admin_headers }}"
    body_format: json
    body:
      type: password
      value: "{{ keycloak_outline_automation_password }}"
      temporary: false
    status_code: 204
  register: keycloak_outline_automation_password_reset
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: keycloak_outline_automation_password_reset.status == 204
  changed_when: false
  no_log: true
  when: keycloak_reconcile_outline_users | bool

- name: Read the Outline automation user groups from Keycloak
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/admin/realms/{{ keycloak_realm_name }}/users/{{ keycloak_outline_automation_lookup_final.json[0].id }}/groups"
    method: GET
    headers: "{{ keycloak_repo_user_admin_headers }}"
    return_content: true
    status_code: 200
  register: keycloak_outline_automation_groups
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: keycloak_outline_automation_groups.status == 200
  changed_when: false
  no_log: true
  when: keycloak_reconcile_outline_users | bool

- name: Ensure the Outline automation user belongs to lv3-platform-admins
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/admin/realms/{{ keycloak_realm_name }}/users/{{ keycloak_outline_automation_lookup_final.json[0].id }}/groups/{{ keycloak_platform_admin_group_id }}"
    method: PUT
    headers: "{{ keycloak_repo_user_admin_headers }}"
    status_code: 204
  when:
    - keycloak_reconcile_outline_users | bool
    - >-
      (
        keycloak_outline_automation_groups.json
        | selectattr('name', 'equalto', 'lv3-platform-admins')
        | list
        | length
      ) == 0
  register: keycloak_outline_platform_group_membership
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: keycloak_outline_platform_group_membership.status == 204
  no_log: true

- name: Ensure the Outline automation user belongs to the Grafana admins group
  ansible.builtin.uri:
    url: "{{ keycloak_repo_user_admin_url }}/admin/realms/{{ keycloak_realm_name }}/users/{{ keycloak_outline_automation_lookup_final.json[0].id }}/groups/{{ keycloak_grafana_admin_group_id }}"
    method: PUT
    headers: "{{ keycloak_repo_user_admin_headers }}"
    status_code: 204
  when:
    - keycloak_reconcile_outline_users | bool
    - >-
      (
        keycloak_outline_automation_groups.json
        | selectattr('name', 'equalto', keycloak_grafana_groups.admins)
        | list
        | length
      ) == 0
  register: keycloak_outline_grafana_group_membership
  retries: "{{ keycloak_repo_user_reconciliation_retries }}"
  delay: "{{ keycloak_repo_user_reconciliation_delay }}"
  until: keycloak_outline_grafana_group_membership.status == 204
  no_log: true
