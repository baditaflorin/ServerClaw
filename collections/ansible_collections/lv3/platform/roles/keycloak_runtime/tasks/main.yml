- name: Ensure the named operator exists in Keycloak
  community.general.keycloak_user:
    realm: "{{ keycloak_realm_name }}"
    username: "{{ keycloak_operator_username }}"
    first_name: "{{ keycloak_operator_first_name }}"
    last_name: "{{ keycloak_operator_last_name }}"
    email: "{{ keycloak_operator_email }}"
    email_verified: true
    enabled: true
    credentials:
      - type: password
        value: "{{ keycloak_operator_password }}"
        temporary: false
    required_actions:
      - CONFIGURE_TOTP
    groups:
      - name: lv3-platform-admins
        state: present
      - name: "{{ keycloak_grafana_groups.admins }}"
        state: present
    state: present
    auth_client_id: admin-cli
    auth_keycloak_url: "{{ keycloak_local_admin_url }}"
    auth_realm: master
    auth_username: "{{ keycloak_bootstrap_admin_username }}"
    auth_password: "{{ keycloak_bootstrap_admin_password }}"
    validate_certs: false
  no_log: true

- name: Read the realm OpenID configuration locally
  ansible.builtin.uri:
    url: "{{ keycloak_local_admin_url }}/realms/{{ keycloak_realm_name }}/.well-known/openid-configuration"
    method: GET
    status_code: 200
  register: keycloak_realm_openid_config
  changed_when: false

- name: Request an agent client-credentials token
  ansible.builtin.uri:
    url: "{{ keycloak_local_admin_url }}/realms/{{ keycloak_realm_name }}/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: client_credentials
      client_id: "{{ keycloak_agent_client_id }}"
      client_secret: "{{ keycloak_agent_client_secret }}"
    return_content: true
    status_code: 200
  register: keycloak_agent_token
  changed_when: false
  no_log: true

- name: Assert Keycloak endpoints and agent credentials are working
  ansible.builtin.assert:
    that:
      - keycloak_realm_openid_config.json.issuer == keycloak_public_base_url ~ '/realms/' ~ keycloak_realm_name
      - (keycloak_agent_token.json.access_token | default('')) | length > 0
      - keycloak_agent_token.json.token_type == 'Bearer'
    fail_msg: "Keycloak answered locally, but the realm metadata or agent client credentials did not validate."
  no_log: true
