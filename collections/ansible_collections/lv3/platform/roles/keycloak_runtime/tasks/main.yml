- name: Reconcile repo-managed Keycloak users
  block:
    - name: Run the repo-managed Keycloak user reconciliation tasks
      ansible.builtin.include_tasks: reconcile_repo_managed_users.yml
  rescue:
    - name: Classify the repo-managed Keycloak user reconciliation failure
      ansible.builtin.set_fact:
        keycloak_repo_user_reconciliation_retryable: >-
          {{
            (ansible_failed_result.status | default(0) | int) in [-1, 500, 502, 503, 504]
            or 'unknown_error' in (ansible_failed_result.content | default(''))
            or 'Unable to acquire JDBC Connection' in (ansible_failed_result.msg | default(''))
            or 'Unable to acquire JDBC Connection' in (ansible_failed_result.content | default(''))
            or 'acquisition timeout' in (ansible_failed_result.msg | default('') | lower)
            or 'status code was -1' in (ansible_failed_result.msg | default('') | lower)
            or 'status code was 500' in (ansible_failed_result.msg | default('') | lower)
          }}
      no_log: true

    - name: Surface unexpected repo-managed Keycloak user reconciliation failures
      ansible.builtin.fail:
        msg: >-
          Repo-managed Keycloak user reconciliation failed during
          "{{ ansible_failed_task.name }}" and did not match a transient
          Keycloak admin/API outage signature.
      when: not keycloak_repo_user_reconciliation_retryable | bool

    - name: Recreate the Keycloak service before retrying repo-managed user reconciliation
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ keycloak_compose_file }}"
          - up
          - -d
          - --force-recreate
          - --no-deps
          - keycloak
      args:
        chdir: "{{ keycloak_site_dir }}"
      register: keycloak_repo_user_reconciliation_recovery_up
      changed_when: >-
        'Creating' in keycloak_repo_user_reconciliation_recovery_up.stdout
        or 'Recreating' in keycloak_repo_user_reconciliation_recovery_up.stdout
        or 'Starting' in keycloak_repo_user_reconciliation_recovery_up.stdout
      when: keycloak_repo_user_reconciliation_retryable | bool

    - name: Wait for the Keycloak management port after repo-managed user reconciliation recovery
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ keycloak_local_management_port }}"
        delay: 0
        timeout: 240
      when: keycloak_repo_user_reconciliation_retryable | bool

    - name: Wait for the Keycloak readiness endpoint after repo-managed user reconciliation recovery
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ keycloak_local_management_port }}/health/ready"
        method: GET
        status_code: 200
      register: keycloak_repo_user_reconciliation_health_ready
      retries: "{{ keycloak_startup_probe_retries }}"
      delay: "{{ keycloak_startup_probe_delay }}"
      until: keycloak_repo_user_reconciliation_health_ready.status == 200
      changed_when: false
      when: keycloak_repo_user_reconciliation_retryable | bool

    - name: Wait for the Keycloak admin API after repo-managed user reconciliation recovery
      ansible.builtin.uri:
        url: "{{ keycloak_local_admin_url }}/realms/master/.well-known/openid-configuration"
        method: GET
        status_code: 200
      register: keycloak_repo_user_reconciliation_master_openid_config
      retries: "{{ keycloak_startup_probe_retries }}"
      delay: "{{ keycloak_startup_probe_delay }}"
      until: keycloak_repo_user_reconciliation_master_openid_config.status == 200
      changed_when: false
      when: keycloak_repo_user_reconciliation_retryable | bool

    - name: Wait for the Keycloak bootstrap admin token endpoint after repo-managed user reconciliation recovery
      ansible.builtin.uri:
        url: "{{ keycloak_local_admin_url }}/realms/master/protocol/openid-connect/token"
        method: POST
        body_format: form-urlencoded
        body:
          grant_type: password
          client_id: admin-cli
          username: "{{ keycloak_bootstrap_admin_username }}"
          password: "{{ keycloak_bootstrap_admin_password }}"
        return_content: true
        status_code:
          - 200
          - 400
          - 401
          - 500
      register: keycloak_repo_user_reconciliation_bootstrap_admin_token_probe
      retries: "{{ keycloak_startup_probe_retries }}"
      delay: "{{ keycloak_startup_probe_delay }}"
      until: keycloak_repo_user_reconciliation_bootstrap_admin_token_probe.status == 200
      changed_when: false
      no_log: true
      when: keycloak_repo_user_reconciliation_retryable | bool

    - name: Wait for an authenticated Keycloak admin realm query after repo-managed user reconciliation recovery
      ansible.builtin.uri:
        url: "{{ keycloak_local_admin_url }}/admin/realms/{{ keycloak_realm_name }}"
        method: GET
        headers:
          Authorization: "Bearer {{ keycloak_repo_user_reconciliation_bootstrap_admin_token_probe.json.access_token }}"
        return_content: true
        status_code:
          - 200
          - 404
      register: keycloak_repo_user_reconciliation_admin_realm_probe
      retries: "{{ keycloak_startup_probe_retries }}"
      delay: "{{ keycloak_startup_probe_delay }}"
      until: keycloak_repo_user_reconciliation_admin_realm_probe.status in [200, 404]
      changed_when: false
      no_log: true
      when: keycloak_repo_user_reconciliation_retryable | bool

    - name: Retry the repo-managed Keycloak user reconciliation tasks after recovery
      ansible.builtin.include_tasks: reconcile_repo_managed_users.yml
      when: keycloak_repo_user_reconciliation_retryable | bool

- name: Read the realm OpenID configuration locally
  ansible.builtin.uri:
    url: "{{ keycloak_local_admin_url }}/realms/{{ keycloak_realm_name }}/.well-known/openid-configuration"
    method: GET
    status_code: 200
  register: keycloak_realm_openid_config
  changed_when: false

- name: Request an agent client-credentials token
  ansible.builtin.uri:
    url: "{{ keycloak_local_admin_url }}/realms/{{ keycloak_realm_name }}/protocol/openid-connect/token"
    method: POST
    timeout: "{{ keycloak_admin_connection_timeout }}"
    body_format: form-urlencoded
    body:
      grant_type: client_credentials
      client_id: "{{ keycloak_agent_client_id }}"
      client_secret: "{{ keycloak_agent_client_secret }}"
    return_content: true
    status_code: 200
  register: keycloak_agent_token
  changed_when: false
  retries: "{{ keycloak_admin_reconciliation_retries }}"
  delay: "{{ keycloak_admin_reconciliation_delay }}"
  until: keycloak_agent_token.status == 200
  no_log: true

- name: Request the ServerClaw runtime client-credentials token
  ansible.builtin.uri:
    url: "{{ keycloak_local_admin_url }}/realms/{{ keycloak_realm_name }}/protocol/openid-connect/token"
    method: POST
    timeout: "{{ keycloak_admin_connection_timeout }}"
    body_format: form-urlencoded
    body:
      grant_type: client_credentials
      client_id: "{{ keycloak_serverclaw_runtime_client_id }}"
      client_secret: "{{ keycloak_serverclaw_runtime_client_secret }}"
    return_content: true
    status_code: 200
  register: keycloak_serverclaw_runtime_token
  changed_when: false
  retries: "{{ keycloak_admin_reconciliation_retries }}"
  delay: "{{ keycloak_admin_reconciliation_delay }}"
  until: keycloak_serverclaw_runtime_token.status == 200
  no_log: true

- name: Assert Keycloak endpoints and automation credentials are working
  ansible.builtin.assert:
    that:
      - keycloak_realm_openid_config.json.issuer == keycloak_public_base_url ~ '/realms/' ~ keycloak_realm_name
      - (keycloak_agent_token.json.access_token | default('')) | length > 0
      - keycloak_agent_token.json.token_type == 'Bearer'
      - (keycloak_serverclaw_runtime_token.json.access_token | default('')) | length > 0
      - keycloak_serverclaw_runtime_token.json.token_type == 'Bearer'
    fail_msg: "Keycloak answered locally, but the repo-managed runtime or existing agent client credentials did not validate."
  no_log: true
