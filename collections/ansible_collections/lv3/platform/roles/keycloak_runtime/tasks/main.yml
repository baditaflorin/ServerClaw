# Purpose: Converge the repo-managed Keycloak runtime, identities, client contracts, and verification flows.
# Use case: Run during Keycloak deployment, recovery, and delegated-auth exact-main replays.
# Inputs: Runtime paths, database and mail credentials, realm settings, repo-managed users, and topology defaults.
# Outputs: The live Keycloak container, runtime env, admin identities, and repo-managed clients match repo truth.
# Idempotency: Partially idempotent because downstream compose restarts and verification probes intentionally refresh live runtime state.
# Dependencies: ADR 0165, ADR 0056, ADR 0197, and ADR 0262.
---
- name: Validate Keycloak runtime inputs
  ansible.builtin.assert:
    that:
      - keycloak_site_dir | length > 0
      - keycloak_secret_dir | length > 0
      - keycloak_compose_file | length > 0
      - keycloak_env_file | length > 0
      - keycloak_database_name | length > 0
      - keycloak_database_user | length > 0
      - keycloak_database_password_local_file | length > 0
      - keycloak_bootstrap_admin_username | length > 0
      - keycloak_bootstrap_admin_password_remote_file | length > 0
      - keycloak_operator_username | length > 0
      - keycloak_operator_password_remote_file | length > 0
      - keycloak_service_topology.public_hostname | length > 0
    fail_msg: "keycloak_runtime requires runtime paths, database credentials, and bootstrap identities."

- name: Ensure the Keycloak database password exists on the control machine
  ansible.builtin.stat:
    path: "{{ keycloak_database_password_local_file }}"
  delegate_to: localhost
  become: false
  register: keycloak_database_password_local

- name: Fail if the Keycloak database password is missing locally
  ansible.builtin.fail:
    msg: >-
      {{ keycloak_database_password_local_file }} is missing on the control machine.
      Run the Keycloak PostgreSQL converge first so the runtime can connect to postgres-lv3.
  when: not keycloak_database_password_local.stat.exists

- name: Ensure the Keycloak mail submission password exists on the control machine when SMTP auth is enabled
  ansible.builtin.stat:
    path: "{{ keycloak_mail_platform_submission_password_local_file }}"
  delegate_to: localhost
  become: false
  register: keycloak_mail_platform_submission_password_local
  when: keycloak_mail_platform_submission_auth_enabled

- name: Fail if the Keycloak mail submission password is missing locally when SMTP auth is enabled
  ansible.builtin.fail:
    msg: >-
      {{ keycloak_mail_platform_submission_password_local_file }} is missing on the control machine.
      Converge the mail platform first so Keycloak can send password-reset and required-action mail.
  when:
    - keycloak_mail_platform_submission_auth_enabled
    - not keycloak_mail_platform_submission_password_local.stat.exists

- name: Ensure the Keycloak runtime packages are present
  ansible.builtin.apt:
    name:
      - openssl
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure the Keycloak directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ keycloak_site_dir }}"
      mode: "0755"
    - path: "{{ keycloak_secret_dir }}"
      mode: "0700"

- name: Generate the Keycloak bootstrap admin password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ keycloak_bootstrap_admin_password_remote_file }}" ]; then
      umask 077
      openssl rand -base64 24 | tr -d '\n' > "{{ keycloak_bootstrap_admin_password_remote_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: keycloak_bootstrap_admin_password_generation
  changed_when: "'changed' in keycloak_bootstrap_admin_password_generation.stdout"
  no_log: true

- name: Generate the Keycloak operator password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ keycloak_operator_password_remote_file }}" ]; then
      umask 077
      openssl rand -base64 24 | tr -d '\n' > "{{ keycloak_operator_password_remote_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: keycloak_operator_password_generation
  changed_when: "'changed' in keycloak_operator_password_generation.stdout"
  no_log: true

- name: Generate the Outline automation password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ keycloak_outline_automation_password_remote_file }}" ]; then
      umask 077
      openssl rand -base64 24 | tr -d '\n' > "{{ keycloak_outline_automation_password_remote_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: keycloak_outline_automation_password_generation
  changed_when: "'changed' in keycloak_outline_automation_password_generation.stdout"
  no_log: true

- name: Read the Keycloak bootstrap admin password
  ansible.builtin.slurp:
    src: "{{ keycloak_bootstrap_admin_password_remote_file }}"
  register: keycloak_bootstrap_admin_password_raw
  no_log: true

- name: Read the Keycloak operator password
  ansible.builtin.slurp:
    src: "{{ keycloak_operator_password_remote_file }}"
  register: keycloak_operator_password_raw
  no_log: true

- name: Read the Outline automation password
  ansible.builtin.slurp:
    src: "{{ keycloak_outline_automation_password_remote_file }}"
  register: keycloak_outline_automation_password_raw
  no_log: true

- name: Record the Keycloak mail submission password when SMTP auth is enabled
  ansible.builtin.set_fact:
    keycloak_mail_platform_submission_password: "{{ lookup('ansible.builtin.file', keycloak_mail_platform_submission_password_local_file) | trim }}"
  when: keycloak_mail_platform_submission_auth_enabled
  no_log: true

- name: Default the Keycloak mail submission password when SMTP auth is disabled
  ansible.builtin.set_fact:
    keycloak_mail_platform_submission_password: ""
  when: not keycloak_mail_platform_submission_auth_enabled
  no_log: true

- name: Record the Keycloak runtime secrets
  ansible.builtin.set_fact:
    keycloak_bootstrap_admin_password: "{{ keycloak_bootstrap_admin_password_raw.content | b64decode | trim }}"
    keycloak_operator_password: "{{ keycloak_operator_password_raw.content | b64decode | trim }}"
    keycloak_outline_automation_password: "{{ keycloak_outline_automation_password_raw.content | b64decode | trim }}"
    keycloak_database_password: "{{ lookup('ansible.builtin.file', keycloak_database_password_local_file) | trim }}"
    keycloak_runtime_secret_payload:
      KC_DB_PASSWORD: "{{ lookup('ansible.builtin.file', keycloak_database_password_local_file) | trim }}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "{{ keycloak_bootstrap_admin_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Ensure the local Keycloak artifact directory exists
  ansible.builtin.file:
    path: "{{ keycloak_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Mirror the Keycloak bootstrap admin password to the control machine
  ansible.builtin.copy:
    dest: "{{ keycloak_bootstrap_admin_password_local_file }}"
    content: "{{ keycloak_bootstrap_admin_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Mirror the Keycloak operator password to the control machine
  ansible.builtin.copy:
    dest: "{{ keycloak_operator_password_local_file }}"
    content: "{{ keycloak_operator_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Mirror the Outline automation password to the control machine
  ansible.builtin.copy:
    dest: "{{ keycloak_outline_automation_password_local_file }}"
    content: "{{ keycloak_outline_automation_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Prepare OpenBao agent runtime secret injection for Keycloak
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: openbao_compose_env
  vars:
    common_openbao_compose_env_service_name: keycloak
    common_openbao_compose_env_agent_dir: "{{ keycloak_openbao_agent_dir }}"
    common_openbao_compose_env_runtime_dir: "{{ keycloak_env_file | dirname }}"
    common_openbao_compose_env_env_file: "{{ keycloak_env_file }}"
    common_openbao_compose_env_secret_path: "{{ keycloak_openbao_secret_path }}"
    common_openbao_compose_env_secret_payload: "{{ keycloak_runtime_secret_payload }}"
    common_openbao_compose_env_policy_name: "{{ keycloak_openbao_policy_name }}"
    common_openbao_compose_env_policy_rules: |
      path "sys/health" {
        capabilities = ["read"]
      }

      path "kv/data/{{ keycloak_openbao_secret_path }}" {
        capabilities = ["read"]
      }

      path "kv/metadata/{{ keycloak_openbao_secret_path }}" {
        capabilities = ["read", "list"]
      }
    common_openbao_compose_env_approle_name: "{{ keycloak_openbao_approle_name }}"
    common_openbao_compose_env_agent_config_file: "{{ keycloak_openbao_agent_dir }}/agent.hcl"
    common_openbao_compose_env_agent_template_file: "{{ keycloak_openbao_agent_dir }}/runtime.env.ctmpl"
    common_openbao_compose_env_agent_template_src: keycloak.env.ctmpl.j2
    common_openbao_compose_env_role_id_file: "{{ keycloak_openbao_agent_dir }}/role_id"
    common_openbao_compose_env_secret_id_file: "{{ keycloak_openbao_agent_dir }}/secret_id"
    common_openbao_compose_env_image: "{{ keycloak_openbao_agent_image }}"
    common_openbao_compose_env_legacy_env_files:
      - "{{ keycloak_legacy_env_file }}"
  no_log: true

- name: Render the Keycloak environment file
  ansible.builtin.template:
    src: keycloak.env.j2
    dest: "{{ keycloak_env_file }}"
    owner: root
    group: root
    mode: "0600"
  register: keycloak_env_template
  no_log: true

- name: Render the Keycloak compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ keycloak_compose_file }}"
    owner: root
    group: root
    mode: "0644"
  register: keycloak_compose_template

- name: Pull the Keycloak image
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ keycloak_compose_file }}"
      - pull
  args:
    chdir: "{{ keycloak_site_dir }}"
  register: keycloak_pull
  retries: "{{ keycloak_image_pull_retries }}"
  delay: "{{ keycloak_image_pull_delay_seconds }}"
  until: keycloak_pull.rc == 0
  changed_when: >-
    'Pulling' in keycloak_pull.stdout
    or 'Downloaded newer image' in keycloak_pull.stdout
    or 'Pull complete' in keycloak_pull.stdout

- name: Check whether the Docker nat chain exists before recreating Keycloak published ports
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - nat
      - -S
      - DOCKER
  register: keycloak_docker_nat_chain
  changed_when: false
  failed_when: false

- name: Restore Docker networking when the nat chain is missing before Keycloak startup
  ansible.builtin.service:
    name: docker
    state: restarted
  when: keycloak_docker_nat_chain.rc != 0

- name: Ensure Docker bridge networking chains are present before Keycloak startup
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: docker_bridge_chains
  vars:
    common_docker_bridge_chains_service_name: docker
    common_docker_bridge_chains_require_nat_chain: true
  when: keycloak_docker_nat_chain.rc != 0

- name: Assert Docker nat chain is present before Keycloak startup
  ansible.builtin.assert:
    that:
      - keycloak_docker_nat_chain.rc == 0 or (common_docker_bridge_chains_nat_verify.rc | default(1)) == 0
    fail_msg: "Docker is running but the nat DOCKER chain is missing; Keycloak published ports will fail."

- name: Check whether the Keycloak admin port is already published locally
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ keycloak_local_http_port }}"
    delay: 0
    timeout: 1
  register: keycloak_local_http_port_probe
  changed_when: false
  failed_when: false

- name: Check whether the current Keycloak readiness endpoint is healthy before startup
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ keycloak_local_management_port }}/health/ready"
    method: GET
    status_code: 200
  register: keycloak_readiness_probe
  changed_when: false
  failed_when: false

- name: Record whether the Keycloak startup needs a force recreate
  ansible.builtin.set_fact:
    keycloak_force_recreate: >-
      {{
        keycloak_docker_nat_chain.rc != 0
        or (keycloak_local_http_port_probe.failed | default(false))
        or (keycloak_readiness_probe.status | default(0)) != 200
      }}

- name: Reset the Keycloak stack before a force recreate
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ keycloak_compose_file }}"
      - down
      - --remove-orphans
  args:
    chdir: "{{ keycloak_site_dir }}"
  register: keycloak_force_recreate_down
  failed_when: false
  changed_when: >-
    'Stopping' in keycloak_force_recreate_down.stdout
    or 'Removing' in keycloak_force_recreate_down.stdout
    or 'Network' in keycloak_force_recreate_down.stdout
    or 'Stopping' in keycloak_force_recreate_down.stderr
    or 'Removing' in keycloak_force_recreate_down.stderr
    or 'Network' in keycloak_force_recreate_down.stderr
  when: keycloak_force_recreate

- name: Remove stale Keycloak compose networks after the reset
  ansible.builtin.shell: |
    set -euo pipefail
    stale_networks="$(docker network ls -q --filter name={{ keycloak_compose_network_name }})"
    if [ -n "${stale_networks}" ]; then
      docker network rm ${stale_networks}
      echo changed
    fi
  args:
    executable: /bin/bash
  register: keycloak_force_recreate_network_cleanup
  changed_when: "'changed' in keycloak_force_recreate_network_cleanup.stdout"
  when: keycloak_force_recreate

- name: Remove stale Keycloak compose replacement containers before recovery
  ansible.builtin.shell: |
    set -euo pipefail
    stale_ids="$(docker ps -aq \
      --filter label=com.docker.compose.project=keycloak \
      --filter label=com.docker.compose.replace)"
    if [ -n "$stale_ids" ]; then
      docker rm -f $stale_ids
      echo changed
    fi
  args:
    chdir: "{{ keycloak_site_dir }}"
    executable: /bin/bash
  register: keycloak_replace_cleanup
  changed_when: "'changed' in keycloak_replace_cleanup.stdout"
  when: keycloak_force_recreate

- name: Force-recreate the Keycloak OpenBao agent after Docker networking recovery
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ keycloak_compose_file }}"
      - up
      - -d
      - --force-recreate
      - openbao-agent
  args:
    chdir: "{{ keycloak_site_dir }}"
  register: keycloak_openbao_agent_up
  changed_when: >-
    'Creating' in keycloak_openbao_agent_up.stdout
    or 'Recreating' in keycloak_openbao_agent_up.stdout
    or 'Starting' in keycloak_openbao_agent_up.stdout
    or 'Running' in keycloak_openbao_agent_up.stdout
  failed_when: false
  retries: 3
  delay: 5
  until: keycloak_openbao_agent_up.rc == 0
  when: keycloak_force_recreate

- name: Wait for the Keycloak runtime env file after OpenBao agent recovery
  ansible.builtin.shell: |
    set -euo pipefail
    test -s "{{ keycloak_env_file }}"
    grep -Fqx "KC_DB_URL_HOST={{ keycloak_database_host }}" "{{ keycloak_env_file }}"
    grep -Fqx "KC_BOOTSTRAP_ADMIN_USERNAME={{ keycloak_bootstrap_admin_username }}" "{{ keycloak_env_file }}"
  args:
    chdir: "{{ keycloak_site_dir }}"
    executable: /bin/bash
  register: keycloak_runtime_env_contract
  retries: 24
  delay: 5
  until: keycloak_runtime_env_contract.rc == 0
  changed_when: false
  no_log: true
  when: keycloak_force_recreate

- name: Force-recreate the Keycloak service and recover Docker bridge-chain loss after networking recovery
  when: keycloak_force_recreate
  block:
    - name: Force-recreate the Keycloak service after Docker networking recovery
      ansible.builtin.shell: |
        set -euo pipefail
        for attempt in $(seq 1 3); do
          if [ "{{ keycloak_mail_platform_docker_network_name | length }}" -gt 0 ] \
            && ! docker network inspect "{{ keycloak_mail_platform_docker_network_name }}" >/dev/null 2>&1; then
            sleep 5
            continue
          fi

          if docker compose --file "{{ keycloak_compose_file }}" up -d --force-recreate --no-deps keycloak; then
            exit 0
          fi

          stale_ids="$(docker ps -aq \
            --filter label=com.docker.compose.project=keycloak \
            --filter label=com.docker.compose.service=keycloak)"
          if [ -n "$stale_ids" ]; then
            docker rm -f $stale_ids || true
          fi
          sleep 5
        done
        exit 1
      args:
        chdir: "{{ keycloak_site_dir }}"
        executable: /bin/bash
      register: keycloak_up
      changed_when: >-
        'Creating' in keycloak_up.stdout
        or 'Recreating' in keycloak_up.stdout
        or 'Starting' in keycloak_up.stdout
      failed_when: keycloak_up.rc != 0
  rescue:
    - name: Detect Docker bridge-chain loss during the Keycloak force-recreate
      ansible.builtin.set_fact:
        keycloak_force_recreate_bridge_chains_missing: >-
          {{
            'Failed to Setup IP tables' in (
              (ansible_failed_result.stderr | default(''))
              ~ ' ' ~ (ansible_failed_result.stdout | default(''))
              ~ ' ' ~ (ansible_failed_result.msg | default(''))
            )
            and (
              'No chain/target/match by that name' in (
                (ansible_failed_result.stderr | default(''))
                ~ ' ' ~ (ansible_failed_result.stdout | default(''))
                ~ ' ' ~ (ansible_failed_result.msg | default(''))
              )
              or 'Unable to enable ACCEPT OUTGOING rule' in (
                (ansible_failed_result.stderr | default(''))
                ~ ' ' ~ (ansible_failed_result.stdout | default(''))
                ~ ' ' ~ (ansible_failed_result.msg | default(''))
              )
              or 'Unable to enable DNAT rule' in (
                (ansible_failed_result.stderr | default(''))
                ~ ' ' ~ (ansible_failed_result.stdout | default(''))
                ~ ' ' ~ (ansible_failed_result.msg | default(''))
              )
            )
          }}

    - name: Surface unexpected Keycloak force-recreate failures
      ansible.builtin.fail:
        msg: "{{ ansible_failed_result.stderr | default(ansible_failed_result.msg | default('keycloak compose force-recreate failed')) }}"
      when: not keycloak_force_recreate_bridge_chains_missing

    - name: Reset the Keycloak stack after Docker bridge-chain loss during force-recreate
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ keycloak_compose_file }}"
          - down
          - --remove-orphans
      args:
        chdir: "{{ keycloak_site_dir }}"
      register: keycloak_force_recreate_down_retry
      failed_when: false
      changed_when: >-
        'Stopping' in (keycloak_force_recreate_down_retry.stdout | default(''))
        or 'Removing' in (keycloak_force_recreate_down_retry.stdout | default(''))
        or 'Network' in (keycloak_force_recreate_down_retry.stdout | default(''))
        or 'Stopping' in (keycloak_force_recreate_down_retry.stderr | default(''))
        or 'Removing' in (keycloak_force_recreate_down_retry.stderr | default(''))
        or 'Network' in (keycloak_force_recreate_down_retry.stderr | default(''))
      when: keycloak_force_recreate_bridge_chains_missing

    - name: Remove stale Keycloak compose networks after Docker bridge-chain loss during force-recreate
      ansible.builtin.shell: |
        set -euo pipefail
        stale_networks="$(docker network ls -q --filter name={{ keycloak_compose_network_name }})"
        if [ -n "${stale_networks}" ]; then
          docker network rm ${stale_networks}
          echo changed
        fi
      args:
        executable: /bin/bash
      register: keycloak_force_recreate_network_cleanup_retry
      changed_when: "'changed' in keycloak_force_recreate_network_cleanup_retry.stdout"
      when: keycloak_force_recreate_bridge_chains_missing

    - name: Remove stale Keycloak compose replacement containers after Docker bridge-chain loss during force-recreate
      ansible.builtin.shell: |
        set -euo pipefail
        stale_ids="$(docker ps -aq \
          --filter label=com.docker.compose.project=keycloak \
          --filter label=com.docker.compose.replace)"
        if [ -n "$stale_ids" ]; then
          docker rm -f $stale_ids
          echo changed
        fi
      args:
        chdir: "{{ keycloak_site_dir }}"
        executable: /bin/bash
      register: keycloak_replace_cleanup_retry
      changed_when: "'changed' in keycloak_replace_cleanup_retry.stdout"
      when: keycloak_force_recreate_bridge_chains_missing

    - name: Restart Docker to restore bridge networking before retrying the Keycloak force-recreate
      ansible.builtin.service:
        name: docker
        state: restarted
      when: keycloak_force_recreate_bridge_chains_missing

    - name: Ensure Docker bridge networking chains are present before retrying the Keycloak force-recreate
      ansible.builtin.include_role:
        name: lv3.platform.common
        tasks_from: docker_bridge_chains
      vars:
        common_docker_bridge_chains_service_name: docker
        common_docker_bridge_chains_require_nat_chain: true
      when: keycloak_force_recreate_bridge_chains_missing

    - name: Retry the Keycloak service force-recreate after Docker networking recovery
      ansible.builtin.shell: |
        set -euo pipefail
        for attempt in $(seq 1 3); do
          if [ "{{ keycloak_mail_platform_docker_network_name | length }}" -gt 0 ] \
            && ! docker network inspect "{{ keycloak_mail_platform_docker_network_name }}" >/dev/null 2>&1; then
            sleep 5
            continue
          fi

          if docker compose --file "{{ keycloak_compose_file }}" up -d --force-recreate --no-deps keycloak; then
            exit 0
          fi

          stale_ids="$(docker ps -aq \
            --filter label=com.docker.compose.project=keycloak \
            --filter label=com.docker.compose.service=keycloak)"
          if [ -n "$stale_ids" ]; then
            docker rm -f $stale_ids || true
          fi
          sleep 5
        done
        exit 1
      args:
        chdir: "{{ keycloak_site_dir }}"
        executable: /bin/bash
      register: keycloak_up
      changed_when: >-
        'Creating' in keycloak_up.stdout
        or 'Recreating' in keycloak_up.stdout
        or 'Starting' in keycloak_up.stdout
      failed_when: keycloak_up.rc != 0
      when: keycloak_force_recreate_bridge_chains_missing
- name: Assert the Keycloak force-recreate succeeded
  ansible.builtin.assert:
    that:
      - keycloak_up.rc == 0
    fail_msg: "{{ keycloak_up.stderr | default(keycloak_up.msg | default('keycloak compose force-recreate failed')) }}"
  when: keycloak_force_recreate

- name: Start the Keycloak stack
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ keycloak_compose_file }}"
      - up
      - -d
      - --remove-orphans
  args:
    chdir: "{{ keycloak_site_dir }}"
  register: keycloak_up
  changed_when: >-
    'Creating' in keycloak_up.stdout
    or 'Recreating' in keycloak_up.stdout
    or 'Starting' in keycloak_up.stdout
  when: not keycloak_force_recreate

- name: Wait for the Keycloak management port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ keycloak_local_management_port }}"
    delay: 0
    timeout: 240

- name: Wait for the Keycloak readiness endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ keycloak_local_management_port }}/health/ready"
    method: GET
    status_code: 200
  register: keycloak_health_ready
  retries: "{{ keycloak_startup_probe_retries }}"
  delay: "{{ keycloak_startup_probe_delay }}"
  until: keycloak_health_ready.status == 200
  changed_when: false

- name: Wait for the Keycloak admin API to answer
  ansible.builtin.uri:
    url: "{{ keycloak_local_admin_url }}/realms/master/.well-known/openid-configuration"
    method: GET
    status_code: 200
  register: keycloak_master_openid_config
  retries: "{{ keycloak_startup_probe_retries }}"
  delay: "{{ keycloak_startup_probe_delay }}"
  until: keycloak_master_openid_config.status == 200
  changed_when: false

- name: Wait for the Keycloak bootstrap admin token endpoint to succeed
  ansible.builtin.uri:
    url: "{{ keycloak_local_admin_url }}/realms/master/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: password
      client_id: admin-cli
      username: "{{ keycloak_bootstrap_admin_username }}"
      password: "{{ keycloak_bootstrap_admin_password }}"
    return_content: true
    status_code:
      - 200
      - 400
      - 401
      - 500
  register: keycloak_bootstrap_admin_token_probe
  retries: "{{ keycloak_startup_probe_retries }}"
  delay: "{{ keycloak_startup_probe_delay }}"
  until: keycloak_bootstrap_admin_token_probe.status == 200
  changed_when: false
  no_log: true

- name: Wait for an authenticated Keycloak admin realm query to answer
  ansible.builtin.uri:
    url: "{{ keycloak_local_admin_url }}/admin/realms/{{ keycloak_realm_name }}"
    method: GET
    headers:
      Authorization: "Bearer {{ keycloak_bootstrap_admin_token_probe.json.access_token }}"
    return_content: true
    status_code:
      - 200
      - 404
  register: keycloak_admin_realm_probe
  retries: "{{ keycloak_startup_probe_retries }}"
  delay: "{{ keycloak_startup_probe_delay }}"
  until: keycloak_admin_realm_probe.status in [200, 404]
  changed_when: false
  no_log: true

- name: Allow the Keycloak admin API to settle after the first authenticated probe
  ansible.builtin.pause:
    seconds: "{{ keycloak_startup_probe_delay }}"
  changed_when: false

- name: Reconfirm the Keycloak bootstrap admin token endpoint after the settle window
  ansible.builtin.uri:
    url: "{{ keycloak_local_admin_url }}/realms/master/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: password
      client_id: admin-cli
      username: "{{ keycloak_bootstrap_admin_username }}"
      password: "{{ keycloak_bootstrap_admin_password }}"
    return_content: true
    status_code:
      - 200
      - 400
      - 401
      - 500
  register: keycloak_bootstrap_admin_token_probe_confirmed
  retries: "{{ keycloak_startup_probe_retries }}"
  delay: "{{ keycloak_startup_probe_delay }}"
  until: keycloak_bootstrap_admin_token_probe_confirmed.status == 200
  changed_when: false
  no_log: true

- name: Reconfirm an authenticated Keycloak admin realm query after the settle window
  ansible.builtin.uri:
    url: "{{ keycloak_local_admin_url }}/admin/realms/{{ keycloak_realm_name }}"
    method: GET
    headers:
      Authorization: "Bearer {{ keycloak_bootstrap_admin_token_probe_confirmed.json.access_token }}"
    return_content: true
    status_code:
      - 200
      - 404
  register: keycloak_admin_realm_probe_confirmed
  retries: "{{ keycloak_startup_probe_retries }}"
  delay: "{{ keycloak_startup_probe_delay }}"
  until: keycloak_admin_realm_probe_confirmed.status in [200, 404]
  changed_when: false
  no_log: true

- name: Verify Keycloak resolves the internal mail-platform relay host
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - keycloak-keycloak-1
      - getent
      - ahostsv4
      - "{{ keycloak_mail_platform_submission_host }}"
  register: keycloak_mail_submission_host_lookup_initial
  changed_when: false
  failed_when: false
  when: keycloak_mail_platform_submission_recovery_enabled

- name: Recover the internal mail-platform submission relay before Keycloak SMTP verification
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ keycloak_mail_platform_compose_file }}"
      - up
      - -d
      - --force-recreate
      - --no-deps
      - "{{ keycloak_mail_platform_submission_service_name }}"
  args:
    chdir: "{{ keycloak_mail_platform_compose_file | dirname }}"
  register: keycloak_mail_submission_dependency_up
  changed_when: >-
    'Creating' in (keycloak_mail_submission_dependency_up.stdout | default(''))
    or 'Recreating' in (keycloak_mail_submission_dependency_up.stdout | default(''))
    or 'Starting' in (keycloak_mail_submission_dependency_up.stdout | default(''))
    or 'Running' in (keycloak_mail_submission_dependency_up.stdout | default(''))
  retries: 3
  delay: 5
  until: keycloak_mail_submission_dependency_up.rc == 0
  when:
    - keycloak_mail_platform_submission_recovery_enabled
    - keycloak_mail_submission_host_lookup_initial.rc != 0

- name: Wait for the internal mail-platform submission listener after dependency recovery
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: "{{ keycloak_mail_platform_submission_port }}"
    delay: 0
    timeout: 120
  when:
    - keycloak_mail_platform_submission_recovery_enabled
    - keycloak_mail_submission_host_lookup_initial.rc != 0

- name: Verify Keycloak resolves the internal mail-platform relay host
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - keycloak-keycloak-1
      - getent
      - ahostsv4
      - "{{ keycloak_mail_platform_submission_host }}"
  register: keycloak_mail_submission_host_lookup
  changed_when: false
  retries: "{{ keycloak_admin_reconciliation_retries }}"
  delay: "{{ keycloak_admin_reconciliation_delay }}"
  until: keycloak_mail_submission_host_lookup.rc == 0

- name: Verify Keycloak reaches the internal mail-platform submission listener
  ansible.builtin.shell: >-
    docker exec keycloak-keycloak-1 /bin/bash -lc
    'timeout 15 bash -lc "exec 3<>/dev/tcp/{{ keycloak_mail_platform_submission_host }}/{{ keycloak_mail_platform_submission_port }}"'
  args:
    executable: /bin/bash
  register: keycloak_mail_submission_probe
  changed_when: false
  retries: "{{ keycloak_admin_reconciliation_retries }}"
  delay: "{{ keycloak_admin_reconciliation_delay }}"
  until: keycloak_mail_submission_probe.rc == 0

- name: Converge Keycloak realm objects
  module_defaults:
    group/community.general.keycloak:
      connection_timeout: "{{ keycloak_admin_connection_timeout }}"
  block:
    - name: Ensure the LV3 realm exists
      community.general.keycloak_realm:
        realm: "{{ keycloak_realm_name }}"
        display_name: "{{ keycloak_realm_display_name }}"
        enabled: true
        registration_allowed: false
        login_with_email_allowed: true
        duplicate_emails_allowed: false
        reset_password_allowed: true
        remember_me: true
        brute_force_protected: true
        ssl_required: external
        access_code_lifespan: 60
        access_code_lifespan_login: 1800
        access_token_lifespan: 300
        sso_session_idle_timeout: 28800
        sso_session_max_lifespan: 43200
        smtp_server: "{{ keycloak_realm_smtp_server }}"
        state: present
        auth_client_id: admin-cli
        auth_keycloak_url: "{{ keycloak_local_admin_url }}"
        auth_realm: master
        auth_username: "{{ keycloak_bootstrap_admin_username }}"
        auth_password: "{{ keycloak_bootstrap_admin_password }}"
        validate_certs: false
      register: keycloak_realm_reconcile
      retries: "{{ keycloak_admin_reconciliation_retries }}"
      delay: "{{ keycloak_admin_reconciliation_delay }}"
      until: keycloak_realm_reconcile is succeeded

    - name: Ensure the Keycloak realm groups exist
      community.general.keycloak_group:
        realm: "{{ keycloak_realm_name }}"
        name: "{{ item.name }}"
        attributes: "{{ item.attributes }}"
        state: present
        auth_client_id: admin-cli
        auth_keycloak_url: "{{ keycloak_local_admin_url }}"
        auth_realm: master
        auth_username: "{{ keycloak_bootstrap_admin_username }}"
        auth_password: "{{ keycloak_bootstrap_admin_password }}"
        validate_certs: false
      loop: "{{ keycloak_realm_groups }}"
      loop_control:
        label: "{{ item.name }}"
      register: keycloak_realm_groups_reconcile
      retries: "{{ keycloak_admin_reconciliation_retries }}"
      delay: "{{ keycloak_admin_reconciliation_delay }}"
      until: keycloak_realm_groups_reconcile is succeeded

    - name: Ensure the Keycloak realm roles exist
      community.general.keycloak_role:
        realm: "{{ keycloak_realm_name }}"
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        composite: "{{ (item.composites | default([])) | length > 0 }}"
        composites: "{{ item.composites | default([]) }}"
        state: present
        auth_client_id: admin-cli
        auth_keycloak_url: "{{ keycloak_local_admin_url }}"
        auth_realm: master
        auth_username: "{{ keycloak_bootstrap_admin_username }}"
        auth_password: "{{ keycloak_bootstrap_admin_password }}"
        validate_certs: false
      loop: "{{ keycloak_realm_roles }}"
      loop_control:
        label: "{{ item.name }}"
      register: keycloak_realm_roles_reconcile
      retries: "{{ keycloak_admin_reconciliation_retries }}"
      delay: "{{ keycloak_admin_reconciliation_delay }}"
      until: keycloak_realm_roles_reconcile is succeeded

    - name: Ensure realm roles are mapped to Keycloak groups
      community.general.keycloak_realm_rolemapping:
        realm: "{{ keycloak_realm_name }}"
        group_name: "{{ item.group_name }}"
        roles: "{{ item.roles }}"
        state: present
        auth_client_id: admin-cli
        auth_keycloak_url: "{{ keycloak_local_admin_url }}"
        auth_realm: master
        auth_username: "{{ keycloak_bootstrap_admin_username }}"
        auth_password: "{{ keycloak_bootstrap_admin_password }}"
        validate_certs: false
      loop: "{{ keycloak_group_realm_role_mappings }}"
      loop_control:
        label: "{{ item.group_name }}"
      register: keycloak_group_realm_role_mappings_reconcile
      retries: "{{ keycloak_admin_reconciliation_retries }}"
      delay: "{{ keycloak_admin_reconciliation_delay }}"
      until: keycloak_group_realm_role_mappings_reconcile is succeeded

