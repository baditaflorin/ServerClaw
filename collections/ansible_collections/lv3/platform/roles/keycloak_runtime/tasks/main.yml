# Purpose: Converge the repo-managed Keycloak runtime, identities, client contracts, and verification flows.
# Use case: Run during Keycloak deployment, recovery, and delegated-auth exact-main replays.
# Inputs: Runtime paths, database and mail credentials, realm settings, repo-managed users, and topology defaults.
# Outputs: The live Keycloak container, runtime env, admin identities, and repo-managed clients match repo truth.
# Idempotency: Partially idempotent because downstream compose restarts and verification probes intentionally refresh live runtime state.
# Dependencies: ADR 0165, ADR 0056, ADR 0197, and ADR 0262.
---
# Purpose: Deploy Keycloak with repo-managed runtime secrets, realms, and client registrations.

- name: Derive conventional service variables from platform_service_registry
  ansible.builtin.import_tasks: ../common/tasks/derive_service_defaults.yml
  vars:
    common_derive_service_name: keycloak

- name: Validate Keycloak runtime inputs
  ansible.builtin.assert:
    that:
      - keycloak_site_dir | length > 0
      - keycloak_secret_dir | length > 0
      - keycloak_compose_file | length > 0
      - keycloak_env_file | length > 0
      - keycloak_database_name | length > 0
      - keycloak_database_user | length > 0
      - keycloak_database_password_local_file | length > 0
      - keycloak_bootstrap_admin_username | length > 0
      - keycloak_bootstrap_admin_password_remote_file | length > 0
      - keycloak_admin_client_id | length > 0
      - keycloak_admin_client_secret_remote_file | length > 0
      - keycloak_admin_client_secret_local_file | length > 0
      - keycloak_recovery_admin_service_client_id | length > 0
      - keycloak_recovery_admin_service_secret_remote_file | length > 0
      - keycloak_operator_username | length > 0
      - keycloak_operator_password_remote_file | length > 0
      - keycloak_service_topology.public_hostname | length > 0
    fail_msg: "keycloak_runtime requires runtime paths, database credentials, and bootstrap identities."

- name: Check Keycloak prerequisites on the control machine
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: check_local_secrets
  vars:
    common_check_local_secrets_files:
      - path: "{{ keycloak_database_password_local_file }}"
        description: "Keycloak database password"
        prerequisite: "Converge keycloak_postgres before deploying Keycloak"

- name: Check Keycloak mail submission password when SMTP auth is enabled
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: check_local_secrets
  vars:
    common_check_local_secrets_files:
      - path: "{{ keycloak_mail_platform_submission_password_local_file }}"
        description: "Keycloak mail submission password"
        prerequisite: "Converge the mail platform before deploying Keycloak"
  when: keycloak_mail_platform_submission_auth_enabled

- name: Ensure the Keycloak runtime packages are present
  ansible.builtin.apt:
    name:
      - openssl
    state: present
    update_cache: true
    cache_valid_time: 3600
    force_apt_get: true

- name: Ensure the Keycloak directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ keycloak_site_dir }}"
      mode: "0755"
    - path: "{{ keycloak_secret_dir }}"
      mode: "0700"

- name: Manage Keycloak runtime secrets
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: manage_service_secrets
  vars:
    common_manage_service_secrets_generate:
      - path: "{{ keycloak_bootstrap_admin_password_remote_file }}"
        command: "openssl rand -base64 24 | tr -d '\\n'"
        label: "keycloak-bootstrap-admin-password"
      - path: "{{ keycloak_operator_password_remote_file }}"
        command: "openssl rand -base64 24 | tr -d '\\n'"
        label: "keycloak-operator-password"
      - path: "{{ keycloak_admin_client_secret_remote_file }}"
        command: "openssl rand -base64 24 | tr -d '\\n'"
        label: "keycloak-admin-client-secret"
      - path: "{{ keycloak_recovery_admin_service_secret_remote_file }}"
        command: "openssl rand -base64 24 | tr -d '\\n'"
        label: "keycloak-recovery-admin-service-secret"
      - path: "{{ keycloak_outline_automation_password_remote_file }}"
        command: "openssl rand -base64 24 | tr -d '\\n'"
        label: "keycloak-outline-automation-password"
      - path: "{{ keycloak_platform_admin_password_remote_file }}"
        command: "openssl rand -base64 24 | tr -d '\\n'"
        label: "keycloak-platform-admin-password"
    common_manage_service_secrets_read:
      - "{{ keycloak_bootstrap_admin_password_remote_file }}"
      - "{{ keycloak_operator_password_remote_file }}"
      - "{{ keycloak_admin_client_secret_remote_file }}"
      - "{{ keycloak_recovery_admin_service_secret_remote_file }}"
      - "{{ keycloak_outline_automation_password_remote_file }}"
      - "{{ keycloak_platform_admin_password_remote_file }}"
    common_manage_service_secrets_mirror:
      - dest: "{{ keycloak_bootstrap_admin_password_local_file }}"
        content_index: 0
      - dest: "{{ keycloak_operator_password_local_file }}"
        content_index: 1
      - dest: "{{ keycloak_admin_client_secret_local_file }}"
        content_index: 2
      - dest: "{{ keycloak_outline_automation_password_local_file }}"
        content_index: 4
      - dest: "{{ keycloak_platform_admin_password_local_file }}"
        content_index: 5
    common_manage_service_secrets_local_artifact_dir: "{{ keycloak_local_artifact_dir }}"
    common_manage_service_secrets_fact_name: "keycloak_decoded_secrets"
  no_log: true

- name: Record the Keycloak mail submission password when SMTP auth is enabled
  ansible.builtin.set_fact:
    keycloak_mail_platform_submission_password: "{{ lookup('ansible.builtin.file', keycloak_mail_platform_submission_password_local_file) | trim }}"
  when: keycloak_mail_platform_submission_auth_enabled
  no_log: true

- name: Default the Keycloak mail submission password when SMTP auth is disabled
  ansible.builtin.set_fact:
    keycloak_mail_platform_submission_password: ""
  when: not keycloak_mail_platform_submission_auth_enabled
  no_log: true

- name: Record the Keycloak runtime secrets
  ansible.builtin.set_fact:
    keycloak_bootstrap_admin_password: "{{ keycloak_decoded_secrets[0] }}"
    keycloak_operator_password: "{{ keycloak_decoded_secrets[1] }}"
    keycloak_admin_client_secret: "{{ keycloak_decoded_secrets[2] }}"
    keycloak_recovery_admin_service_secret: "{{ keycloak_decoded_secrets[3] }}"
    keycloak_outline_automation_password: "{{ keycloak_decoded_secrets[4] }}"
    keycloak_platform_admin_password: "{{ keycloak_decoded_secrets[5] }}"
    keycloak_database_password: "{{ lookup('ansible.builtin.file', keycloak_database_password_local_file) | trim }}"
    keycloak_runtime_secret_payload:
      KC_DB_PASSWORD: "{{ lookup('ansible.builtin.file', keycloak_database_password_local_file) | trim }}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "{{ keycloak_decoded_secrets[0] }}"
  no_log: true

# BEGIN SERVICE: agent
- name: Prepare OpenBao agent runtime secret injection for Keycloak
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: openbao_compose_env
  vars:
    common_openbao_compose_env_service_name: keycloak
    common_openbao_compose_env_agent_dir: "{{ keycloak_openbao_agent_dir }}"
    common_openbao_compose_env_runtime_dir: "{{ keycloak_env_file | dirname }}"
    common_openbao_compose_env_env_file: "{{ keycloak_env_file }}"
    common_openbao_compose_env_secret_path: "{{ keycloak_openbao_secret_path }}"
    common_openbao_compose_env_secret_payload: "{{ keycloak_runtime_secret_payload }}"
    common_openbao_compose_env_policy_name: "{{ keycloak_openbao_policy_name }}"
    common_openbao_compose_env_policy_rules: |
      path "sys/health" {
        capabilities = ["read"]
      }

      path "kv/data/{{ keycloak_openbao_secret_path }}" {
        capabilities = ["read"]
      }

      path "kv/metadata/{{ keycloak_openbao_secret_path }}" {
        capabilities = ["read", "list"]
      }
    common_openbao_compose_env_approle_name: "{{ keycloak_openbao_approle_name }}"
    common_openbao_compose_env_agent_config_file: "{{ keycloak_openbao_agent_dir }}/agent.hcl"
    common_openbao_compose_env_agent_template_file: "{{ keycloak_openbao_agent_dir }}/runtime.env.ctmpl"
    common_openbao_compose_env_agent_template_src: keycloak.env.ctmpl.j2
    common_openbao_compose_env_role_id_file: "{{ keycloak_openbao_agent_dir }}/role_id"
    common_openbao_compose_env_secret_id_file: "{{ keycloak_openbao_agent_dir }}/secret_id"
    common_openbao_compose_env_image: "{{ keycloak_openbao_agent_image }}"
    common_openbao_compose_env_legacy_env_files:
      - "{{ keycloak_legacy_env_file }}"
  no_log: true
# END SERVICE: agent

- name: Render the Keycloak environment file
  ansible.builtin.template:
    src: keycloak.env.j2
    dest: "{{ keycloak_env_file }}"
    owner: root
    group: root
    mode: "0600"
  register: keycloak_env_template
  no_log: true

- name: Render the Keycloak compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ keycloak_compose_file }}"
    owner: root
    group: root
    mode: "0644"
  vars:
    ansible_search_path: "{{ [role_path + '/../common'] + (ansible_search_path | default([])) }}"
  register: keycloak_compose_template

- name: Pull the Keycloak image
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ keycloak_compose_file }}"
      - pull
  args:
    chdir: "{{ keycloak_site_dir }}"
  register: keycloak_pull
  retries: "{{ keycloak_image_pull_retries }}"
  delay: "{{ keycloak_image_pull_delay_seconds }}"
  until: keycloak_pull.rc == 0
  changed_when: >-
    'Pulling' in keycloak_pull.stdout
    or 'Downloaded newer image' in keycloak_pull.stdout
    or 'Pull complete' in keycloak_pull.stdout

- name: Ensure the shared mail-platform Docker network exists with correct compose labels before Keycloak startup
  ansible.builtin.shell: |
    net="{{ keycloak_mail_platform_docker_network_name }}"
    if docker network inspect "$net" >/dev/null 2>&1; then
      label="$(docker network inspect "$net" --format '{{ "{{" }}index .Labels "com.docker.compose.network"{{ "}}" }}')"
      if [ "$label" = "default" ]; then
        exit 0
      fi
      for container in $(docker network inspect "$net" --format '{{ "{{" }}range .Containers{{ "}}" }}{{ "{{" }}.Name{{ "}}" }} {{ "{{" }}end{{ "}}" }}'); do
        docker network disconnect -f "$net" "$container" 2>/dev/null || true
      done
      docker network rm "$net"
    fi
    docker network create \
      --label com.docker.compose.network=default \
      --label com.docker.compose.project=mail-platform \
      "$net" && echo changed
  args:
    executable: /bin/bash
  register: keycloak_mail_platform_network_ensure
  changed_when: "'changed' in keycloak_mail_platform_network_ensure.stdout"
  when: keycloak_mail_platform_docker_network_name | length > 0

- name: Check whether the Docker nat chain exists before recreating Keycloak published ports
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - nat
      - -S
      - DOCKER
  register: keycloak_docker_nat_chain
  changed_when: false
  failed_when: false

- name: Restore Docker networking when the nat chain is missing before Keycloak startup
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: docker_daemon_restart
  vars:
    common_docker_daemon_restart_service_name: docker
    common_docker_daemon_restart_reason: Keycloak startup nat-chain recovery
  when: keycloak_docker_nat_chain.rc != 0

- name: Ensure Docker bridge networking chains are present before Keycloak startup
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: docker_bridge_chains
  vars:
    common_docker_bridge_chains_service_name: docker
    common_docker_bridge_chains_require_nat_chain: true
  when: keycloak_docker_nat_chain.rc != 0

- name: Assert Docker nat chain is present before Keycloak startup
  ansible.builtin.assert:
    that:
      - keycloak_docker_nat_chain.rc == 0 or (common_docker_bridge_chains_nat_chain_present | default(false))
    fail_msg: "Docker is running but the nat DOCKER chain is missing; Keycloak published ports will fail."

- name: Check whether the Keycloak admin port is already published locally
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ keycloak_local_http_port }}"
    delay: 0
    timeout: 1
  register: keycloak_local_http_port_probe
  changed_when: false
  failed_when: false

- name: Check whether the current Keycloak readiness endpoint is healthy before startup
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ keycloak_local_management_port }}/health/ready"
    method: GET
    status_code: 200
  register: keycloak_readiness_probe
  changed_when: false
  failed_when: false

- name: Record whether the Keycloak startup needs a force recreate
  ansible.builtin.set_fact:
    keycloak_force_recreate: >-
      {{
        keycloak_docker_nat_chain.rc != 0
        or (keycloak_local_http_port_probe.failed | default(false))
        or (keycloak_readiness_probe.status | default(0)) != 200
      }}

- name: Reset the Keycloak stack before a force recreate
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ keycloak_compose_file }}"
      - down
      - --remove-orphans
  args:
    chdir: "{{ keycloak_site_dir }}"
  register: keycloak_force_recreate_down
  failed_when: false
  changed_when: >-
    'Stopping' in keycloak_force_recreate_down.stdout
    or 'Removing' in keycloak_force_recreate_down.stdout
    or 'Network' in keycloak_force_recreate_down.stdout
    or 'Stopping' in keycloak_force_recreate_down.stderr
    or 'Removing' in keycloak_force_recreate_down.stderr
    or 'Network' in keycloak_force_recreate_down.stderr
  when: keycloak_force_recreate

- name: Remove stale Keycloak project containers before network cleanup
  ansible.builtin.shell: |
    set -euo pipefail
    stale_ids="$(docker ps -aq --filter label=com.docker.compose.project=keycloak)"
    if [ -n "$stale_ids" ]; then
      docker rm -f $stale_ids
      echo changed
    fi
  args:
    chdir: "{{ keycloak_site_dir }}"
    executable: /bin/bash
  register: keycloak_project_container_cleanup
  changed_when: "'changed' in keycloak_project_container_cleanup.stdout"
  when: keycloak_force_recreate

- name: Remove stale Keycloak compose networks after project cleanup
  ansible.builtin.shell: |
    set -euo pipefail
    for attempt in $(seq 1 5); do
      stale_networks="$(docker network ls -q --filter name={{ keycloak_compose_network_name }})"
      if [ -z "${stale_networks}" ]; then
        exit 0
      fi
      if docker network rm ${stale_networks}; then
        echo changed
        exit 0
      fi
      sleep 3
    done
    stale_networks="$(docker network ls -q --filter name={{ keycloak_compose_network_name }})"
    if [ -n "${stale_networks}" ]; then
      docker network rm ${stale_networks}
      echo changed
    fi
  args:
    executable: /bin/bash
  register: keycloak_force_recreate_network_cleanup
  changed_when: "'changed' in keycloak_force_recreate_network_cleanup.stdout"
  when: keycloak_force_recreate

- name: Remove stale Keycloak compose replacement containers before recovery
  ansible.builtin.shell: |
    set -euo pipefail
    stale_ids="$(docker ps -aq \
      --filter label=com.docker.compose.project=keycloak \
      --filter label=com.docker.compose.replace)"
    if [ -n "$stale_ids" ]; then
      docker rm -f $stale_ids
      echo changed
    fi
  args:
    chdir: "{{ keycloak_site_dir }}"
    executable: /bin/bash
  register: keycloak_replace_cleanup
  changed_when: "'changed' in keycloak_replace_cleanup.stdout"
  when: keycloak_force_recreate

# BEGIN SERVICE: agent
- name: Force-recreate the Keycloak OpenBao agent after Docker networking recovery
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ keycloak_compose_file }}"
      - up
      - -d
      - --force-recreate
      - openbao-agent
  args:
    chdir: "{{ keycloak_site_dir }}"
  register: keycloak_openbao_agent_up
  changed_when: >-
    'Creating' in keycloak_openbao_agent_up.stdout
    or 'Recreating' in keycloak_openbao_agent_up.stdout
    or 'Starting' in keycloak_openbao_agent_up.stdout
    or 'Running' in keycloak_openbao_agent_up.stdout
  failed_when: false
  retries: 3
  delay: 5
  until: keycloak_openbao_agent_up.rc == 0
  when: keycloak_force_recreate
# END SERVICE: agent

# BEGIN SERVICE: agent
- name: Wait for the Keycloak runtime env file after OpenBao agent recovery
  ansible.builtin.shell: |
    set -euo pipefail
    test -s "{{ keycloak_env_file }}"
    grep -Fqx "KC_DB_URL_HOST={{ keycloak_database_host }}" "{{ keycloak_env_file }}"
    grep -Fqx "KC_BOOTSTRAP_ADMIN_USERNAME={{ keycloak_bootstrap_admin_username }}" "{{ keycloak_env_file }}"
  args:
    chdir: "{{ keycloak_site_dir }}"
    executable: /bin/bash
  register: keycloak_runtime_env_contract
  retries: 24
  delay: 5
  until: keycloak_runtime_env_contract.rc == 0
  changed_when: false
  no_log: true
  when: keycloak_force_recreate
# END SERVICE: agent

- name: Force-recreate the Keycloak service and recover Docker bridge-chain loss after networking recovery
  when: keycloak_force_recreate
  block:
    - name: Force-recreate the Keycloak service after Docker networking recovery
      ansible.builtin.shell: |
        set -euo pipefail
        for attempt in $(seq 1 3); do
          if [ "{{ keycloak_mail_platform_docker_network_name | length }}" -gt 0 ] \
            && ! docker network inspect "{{ keycloak_mail_platform_docker_network_name }}" >/dev/null 2>&1; then
            sleep 5
            continue
          fi

          if docker compose --file "{{ keycloak_compose_file }}" up -d --force-recreate --no-deps keycloak; then
            exit 0
          fi

          stale_ids="$(docker ps -aq \
            --filter label=com.docker.compose.project=keycloak \
            --filter label=com.docker.compose.service=keycloak)"
          if [ -n "$stale_ids" ]; then
            docker rm -f $stale_ids || true
          fi
          sleep 5
        done
        exit 1
      args:
        chdir: "{{ keycloak_site_dir }}"
        executable: /bin/bash
      register: keycloak_up
      changed_when: >-
        'Creating' in keycloak_up.stdout
        or 'Recreating' in keycloak_up.stdout
        or 'Starting' in keycloak_up.stdout
      failed_when: keycloak_up.rc != 0
  rescue:
    - name: Detect Docker bridge-chain loss during the Keycloak force-recreate
      ansible.builtin.set_fact:
        keycloak_force_recreate_bridge_chains_missing: >-
          {{
            'Failed to Setup IP tables' in (
              (ansible_failed_result.stderr | default(''))
              ~ ' ' ~ (ansible_failed_result.stdout | default(''))
              ~ ' ' ~ (ansible_failed_result.msg | default(''))
            )
            and (
              'No chain/target/match by that name' in (
                (ansible_failed_result.stderr | default(''))
                ~ ' ' ~ (ansible_failed_result.stdout | default(''))
                ~ ' ' ~ (ansible_failed_result.msg | default(''))
              )
              or 'Unable to enable ACCEPT OUTGOING rule' in (
                (ansible_failed_result.stderr | default(''))
                ~ ' ' ~ (ansible_failed_result.stdout | default(''))
                ~ ' ' ~ (ansible_failed_result.msg | default(''))
              )
              or 'Unable to enable DNAT rule' in (
                (ansible_failed_result.stderr | default(''))
                ~ ' ' ~ (ansible_failed_result.stdout | default(''))
                ~ ' ' ~ (ansible_failed_result.msg | default(''))
              )
            )
          }}

    - name: Surface unexpected Keycloak force-recreate failures
      ansible.builtin.fail:
        msg: "{{ ansible_failed_result.stderr | default(ansible_failed_result.msg | default('keycloak compose force-recreate failed')) }}"
      when: not keycloak_force_recreate_bridge_chains_missing

    - name: Reset the Keycloak stack after Docker bridge-chain loss during force-recreate
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ keycloak_compose_file }}"
          - down
          - --remove-orphans
      args:
        chdir: "{{ keycloak_site_dir }}"
      register: keycloak_force_recreate_down_retry
      failed_when: false
      changed_when: >-
        'Stopping' in (keycloak_force_recreate_down_retry.stdout | default(''))
        or 'Removing' in (keycloak_force_recreate_down_retry.stdout | default(''))
        or 'Network' in (keycloak_force_recreate_down_retry.stdout | default(''))
        or 'Stopping' in (keycloak_force_recreate_down_retry.stderr | default(''))
        or 'Removing' in (keycloak_force_recreate_down_retry.stderr | default(''))
        or 'Network' in (keycloak_force_recreate_down_retry.stderr | default(''))
      when: keycloak_force_recreate_bridge_chains_missing

    - name: Remove stale Keycloak compose networks after Docker bridge-chain loss during force-recreate
      ansible.builtin.shell: |
        set -euo pipefail
        stale_networks="$(docker network ls -q --filter name={{ keycloak_compose_network_name }})"
        if [ -n "${stale_networks}" ]; then
          docker network rm ${stale_networks}
          echo changed
        fi
      args:
        executable: /bin/bash
      register: keycloak_force_recreate_network_cleanup_retry
      changed_when: "'changed' in keycloak_force_recreate_network_cleanup_retry.stdout"
      when: keycloak_force_recreate_bridge_chains_missing

    - name: Remove stale Keycloak compose replacement containers after Docker bridge-chain loss during force-recreate
      ansible.builtin.shell: |
        set -euo pipefail
        stale_ids="$(docker ps -aq \
          --filter label=com.docker.compose.project=keycloak \
          --filter label=com.docker.compose.replace)"
        if [ -n "$stale_ids" ]; then
          docker rm -f $stale_ids
          echo changed
        fi
      args:
        chdir: "{{ keycloak_site_dir }}"
        executable: /bin/bash
      register: keycloak_replace_cleanup_retry
      changed_when: "'changed' in keycloak_replace_cleanup_retry.stdout"
      when: keycloak_force_recreate_bridge_chains_missing

    - name: Restart Docker to restore bridge networking before retrying the Keycloak force-recreate
      ansible.builtin.include_role:
        name: lv3.platform.common
        tasks_from: docker_daemon_restart
      vars:
        common_docker_daemon_restart_service_name: docker
        common_docker_daemon_restart_reason: Keycloak force-recreate bridge-chain recovery
      when: keycloak_force_recreate_bridge_chains_missing

    - name: Ensure Docker bridge networking chains are present before retrying the Keycloak force-recreate
      ansible.builtin.include_role:
        name: lv3.platform.common
        tasks_from: docker_bridge_chains
      vars:
        common_docker_bridge_chains_service_name: docker
        common_docker_bridge_chains_require_nat_chain: true
      when: keycloak_force_recreate_bridge_chains_missing

    - name: Retry the Keycloak service force-recreate after Docker networking recovery
      ansible.builtin.shell: |
        set -euo pipefail
        for attempt in $(seq 1 3); do
          if [ "{{ keycloak_mail_platform_docker_network_name | length }}" -gt 0 ] \
            && ! docker network inspect "{{ keycloak_mail_platform_docker_network_name }}" >/dev/null 2>&1; then
            sleep 5
            continue
          fi

          if docker compose --file "{{ keycloak_compose_file }}" up -d --force-recreate --no-deps keycloak; then
            exit 0
          fi

          stale_ids="$(docker ps -aq \
            --filter label=com.docker.compose.project=keycloak \
            --filter label=com.docker.compose.service=keycloak)"
          if [ -n "$stale_ids" ]; then
            docker rm -f $stale_ids || true
          fi
          sleep 5
        done
        exit 1
      args:
        chdir: "{{ keycloak_site_dir }}"
        executable: /bin/bash
      register: keycloak_up
      changed_when: >-
        'Creating' in keycloak_up.stdout
        or 'Recreating' in keycloak_up.stdout
        or 'Starting' in keycloak_up.stdout
      failed_when: keycloak_up.rc != 0
      when: keycloak_force_recreate_bridge_chains_missing
- name: Assert the Keycloak force-recreate succeeded
  ansible.builtin.assert:
    that:
      - keycloak_up.rc == 0
    fail_msg: "{{ keycloak_up.stderr | default(keycloak_up.msg | default('keycloak compose force-recreate failed')) }}"
  when: keycloak_force_recreate

- name: Ensure the Keycloak external Docker network exists
  ansible.builtin.command:
    argv:
      - docker
      - network
      - create
      - "{{ keycloak_mail_platform_docker_network_name }}"
  register: keycloak_network_create
  changed_when: keycloak_network_create.rc == 0
  failed_when: >-
    keycloak_network_create.rc != 0
    and 'already exists' not in keycloak_network_create.stderr
  when: keycloak_mail_platform_docker_network_name | length > 0

- name: Start the Keycloak stack
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ keycloak_compose_file }}"
      - up
      - -d
      - --remove-orphans
  args:
    chdir: "{{ keycloak_site_dir }}"
  register: keycloak_up
  changed_when: >-
    'Creating' in keycloak_up.stdout
    or 'Recreating' in keycloak_up.stdout
    or 'Starting' in keycloak_up.stdout
  when: not keycloak_force_recreate

- name: Warm the Keycloak admin APIs before realm reconciliation
  block:
    - name: Wait for the Keycloak management port
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ keycloak_local_management_port }}"
        delay: 0
        timeout: 240

    - name: Wait for the Keycloak readiness endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ keycloak_local_management_port }}/health/ready"
        method: GET
        return_content: true
        status_code:
          - 200
          - 503
      register: keycloak_health_ready
      retries: "{{ keycloak_startup_probe_retries }}"
      delay: "{{ keycloak_startup_probe_delay }}"
      until: (keycloak_health_ready.status | default(0)) in [200, 503]
      changed_when: false
      failed_when: (keycloak_health_ready.status | default(0)) != 200

    - name: Wait for the Keycloak admin API to answer
      ansible.builtin.uri:
        url: "{{ keycloak_local_admin_url }}/realms/master/.well-known/openid-configuration"
        method: GET
        status_code: 200
      register: keycloak_master_openid_config
      retries: "{{ keycloak_startup_probe_retries }}"
      delay: "{{ keycloak_startup_probe_delay }}"
      until: keycloak_master_openid_config.status == 200
      changed_when: false
  rescue:
    - name: Detect whether the Docker service is active before Keycloak startup probe recovery
      ansible.builtin.command:
        argv:
          - systemctl
          - is-active
          - docker
      register: keycloak_startup_probe_recovery_docker_active_state
      changed_when: false
      failed_when: keycloak_startup_probe_recovery_docker_active_state.rc not in [0, 3, 4]

    - name: Reset Docker failed state before Keycloak startup probe recovery
      ansible.builtin.command: systemctl reset-failed docker.service
      changed_when: false
      when: keycloak_startup_probe_recovery_docker_active_state.rc != 0

    - name: Start Docker before Keycloak startup probe recovery
      ansible.builtin.service:
        name: docker
        state: started
      when: keycloak_startup_probe_recovery_docker_active_state.rc != 0

    - name: Ensure Docker bridge networking chains are present after Keycloak startup probe failure
      ansible.builtin.include_role:
        name: lv3.platform.common
        tasks_from: docker_bridge_chains
      vars:
        common_docker_bridge_chains_service_name: docker
        common_docker_bridge_chains_require_nat_chain: true

    - name: Assert Docker nat chain is present after Keycloak startup probe failure
      ansible.builtin.assert:
        that:
          - keycloak_startup_probe_recovery_docker_active_state.rc != 0 or keycloak_docker_nat_chain.rc == 0 or (common_docker_bridge_chains_nat_verify.rc | default(1)) == 0
        fail_msg: "Docker is running but the nat DOCKER chain is missing; Keycloak recovery cannot republish the admin endpoints."

    - name: Clear stale Keycloak JDBC_PING rows before retrying the startup probes
      ansible.builtin.command:
        argv:
          - psql
          - -d
          - "{{ keycloak_database_name }}"
          - -v
          - ON_ERROR_STOP=1
          - -c
          - DELETE FROM jgroups_ping;
      delegate_to: "{{ playbook_execution_required_hosts.postgres[playbook_execution_env] }}"
      become: true
      become_user: postgres
      register: keycloak_startup_probe_recovery_jgroups_cleanup
      changed_when: "'DELETE ' in (keycloak_startup_probe_recovery_jgroups_cleanup.stdout | default(''))"

    # BEGIN SERVICE: agent
    - name: Recreate the Keycloak OpenBao agent before retrying the startup probes
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ keycloak_compose_file }}"
          - up
          - -d
          - --force-recreate
          - openbao-agent
      args:
        chdir: "{{ keycloak_site_dir }}"
      register: keycloak_startup_probe_recovery_openbao_agent_up
      changed_when: >-
        'Creating' in keycloak_startup_probe_recovery_openbao_agent_up.stdout
        or 'Recreating' in keycloak_startup_probe_recovery_openbao_agent_up.stdout
        or 'Starting' in keycloak_startup_probe_recovery_openbao_agent_up.stdout
        or 'Running' in keycloak_startup_probe_recovery_openbao_agent_up.stdout
    # END SERVICE: agent

    - name: Wait for the Keycloak runtime env file after startup probe recovery
      ansible.builtin.shell: |
        set -euo pipefail
        test -s "{{ keycloak_env_file }}"
        grep -Fqx "KC_DB_URL_HOST={{ keycloak_database_host }}" "{{ keycloak_env_file }}"
        grep -Fqx "KC_BOOTSTRAP_ADMIN_USERNAME={{ keycloak_bootstrap_admin_username }}" "{{ keycloak_env_file }}"
      args:
        chdir: "{{ keycloak_site_dir }}"
        executable: /bin/bash
      register: keycloak_startup_probe_recovery_runtime_env_contract
      retries: 24
      delay: 5
      until: keycloak_startup_probe_recovery_runtime_env_contract.rc == 0
      changed_when: false
      no_log: true

    - name: Recreate the Keycloak service before retrying the startup probes
      ansible.builtin.shell: |
        set -euo pipefail
        for attempt in $(seq 1 3); do
          if [ "{{ keycloak_mail_platform_docker_network_name | length }}" -gt 0 ] \
            && ! docker network inspect "{{ keycloak_mail_platform_docker_network_name }}" >/dev/null 2>&1; then
            sleep 5
            continue
          fi

          if docker compose --file "{{ keycloak_compose_file }}" up -d --force-recreate --no-deps keycloak; then
            exit 0
          fi

          stale_ids="$(docker ps -aq \
            --filter label=com.docker.compose.project=keycloak \
            --filter label=com.docker.compose.service=keycloak)"
          if [ -n "$stale_ids" ]; then
            docker rm -f $stale_ids || true
          fi
          sleep 5
        done
        exit 1
      args:
        chdir: "{{ keycloak_site_dir }}"
        executable: /bin/bash
      register: keycloak_startup_probe_recovery_up
      changed_when: >-
        'Creating' in keycloak_startup_probe_recovery_up.stdout
        or 'Recreating' in keycloak_startup_probe_recovery_up.stdout
        or 'Starting' in keycloak_startup_probe_recovery_up.stdout

    - name: Wait for the Keycloak management port after startup probe recovery
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ keycloak_local_management_port }}"
        delay: 0
        timeout: 240

    - name: Wait for the Keycloak readiness endpoint after startup probe recovery
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ keycloak_local_management_port }}/health/ready"
        method: GET
        return_content: true
        status_code:
          - 200
          - 503
      register: keycloak_startup_probe_recovery_health_ready
      retries: "{{ keycloak_startup_probe_retries }}"
      delay: "{{ keycloak_startup_probe_delay }}"
      until: (keycloak_startup_probe_recovery_health_ready.status | default(0)) in [200, 503]
      changed_when: false
      failed_when: (keycloak_startup_probe_recovery_health_ready.status | default(0)) != 200

    - name: Wait for the Keycloak admin API after startup probe recovery
      ansible.builtin.uri:
        url: "{{ keycloak_local_admin_url }}/realms/master/.well-known/openid-configuration"
        method: GET
        status_code: 200
      register: keycloak_startup_probe_recovery_master_openid_config
      retries: "{{ keycloak_startup_probe_retries }}"
      delay: "{{ keycloak_startup_probe_delay }}"
      until: keycloak_startup_probe_recovery_master_openid_config.status == 200
      changed_when: false

- name: Ensure the repo-managed Keycloak admin client can authenticate before realm reconciliation
  block:
    - name: Wait for the repo-managed Keycloak admin client token endpoint to succeed
      ansible.builtin.uri:
        url: "{{ keycloak_local_admin_url }}/realms/master/protocol/openid-connect/token"
        method: POST
        timeout: "{{ keycloak_admin_connection_timeout }}"
        body_format: form-urlencoded
        body:
          grant_type: client_credentials
          client_id: "{{ keycloak_admin_client_id }}"
          client_secret: "{{ keycloak_admin_client_secret }}"
        return_content: true
        status_code:
          - 200
          - 400
          - 401
          - 403
          - 500
      register: keycloak_admin_client_token_probe
      retries: "{{ keycloak_startup_probe_retries }}"
      delay: "{{ keycloak_startup_probe_delay }}"
      until: (keycloak_admin_client_token_probe.status | default(0)) in [200, 400, 401, 403]
      changed_when: false
      failed_when: (keycloak_admin_client_token_probe.status | default(0)) != 200
      no_log: true

    - name: Require an authenticated Keycloak admin realm query before accepting the repo-managed admin client
      ansible.builtin.uri:
        url: "{{ keycloak_local_admin_url }}/admin/realms/{{ keycloak_realm_name }}"
        method: GET
        headers:
          Authorization: "Bearer {{ keycloak_admin_client_token_probe.json.access_token }}"
        return_content: true
        status_code:
          - 200
          - 403
          - 404
      register: keycloak_admin_realm_probe_preflight
      retries: "{{ keycloak_startup_probe_retries }}"
      delay: "{{ keycloak_startup_probe_delay }}"
      until: (keycloak_admin_realm_probe_preflight.status | default(0)) in [200, 403, 404]
      changed_when: false
      failed_when: (keycloak_admin_realm_probe_preflight.status | default(0)) == 403
      no_log: true
  rescue:
    - name: Inspect the Keycloak service state before admin bootstrap recovery
      ansible.builtin.shell: |
        set -euo pipefail
        container_id="$(docker ps -aq \
          --filter label=com.docker.compose.project=keycloak \
          --filter label=com.docker.compose.service=keycloak \
          | head -n 1)"
        if [ -z "${container_id}" ]; then
          printf 'missing|missing keycloak container\n'
          exit 0
        fi
        docker inspect --format '{% raw %}{{.State.Status}}|{{.State.Error}}{% endraw %}' "${container_id}"
      args:
        chdir: "{{ keycloak_site_dir }}"
        executable: /bin/bash
      register: keycloak_admin_access_container_state
      changed_when: false
      failed_when: false

    - name: Record whether the Keycloak runtime needs recovery before admin bootstrap fallback
      ansible.builtin.set_fact:
        keycloak_admin_access_runtime_recovery_needed: >-
          {{
            (keycloak_admin_access_container_state.rc | default(0)) != 0
            or not (keycloak_admin_access_container_state.stdout | default('')) is search('^running\\|')
          }}

    - name: Recreate the Keycloak service after admin-client runtime drift
      ansible.builtin.shell: |
        set -euo pipefail
        for attempt in $(seq 1 3); do
          if [ "{{ keycloak_mail_platform_docker_network_name | length }}" -gt 0 ] \
            && ! docker network inspect "{{ keycloak_mail_platform_docker_network_name }}" >/dev/null 2>&1; then
            sleep 5
            continue
          fi

          if docker compose --file "{{ keycloak_compose_file }}" up -d --force-recreate --no-deps keycloak; then
            exit 0
          fi

          stale_ids="$(docker ps -aq \
            --filter label=com.docker.compose.project=keycloak \
            --filter label=com.docker.compose.service=keycloak)"
          if [ -n "$stale_ids" ]; then
            docker rm -f $stale_ids || true
          fi
          sleep 5
        done
        exit 1
      args:
        chdir: "{{ keycloak_site_dir }}"
        executable: /bin/bash
      register: keycloak_admin_access_recovery_up
      changed_when: >-
        'Creating' in (keycloak_admin_access_recovery_up.stdout | default(''))
        or 'Recreating' in (keycloak_admin_access_recovery_up.stdout | default(''))
        or 'Starting' in (keycloak_admin_access_recovery_up.stdout | default(''))
      failed_when: false
      when: keycloak_admin_access_runtime_recovery_needed | bool

    - name: Wait for the Keycloak management port after admin-client runtime recovery
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ keycloak_local_management_port }}"
        delay: 0
        timeout: 240
      when:
        - keycloak_admin_access_runtime_recovery_needed | bool
        - (keycloak_admin_access_recovery_up.rc | default(1)) == 0

    - name: Wait for the Keycloak readiness endpoint after admin-client runtime recovery
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ keycloak_local_management_port }}/health/ready"
        method: GET
        return_content: true
        status_code:
          - 200
          - 503
      register: keycloak_admin_access_recovery_health_ready
      retries: "{{ keycloak_startup_probe_retries }}"
      delay: "{{ keycloak_startup_probe_delay }}"
      until: (keycloak_admin_access_recovery_health_ready.status | default(0)) in [200, 503]
      changed_when: false
      failed_when: (keycloak_admin_access_recovery_health_ready.status | default(0)) != 200
      when:
        - keycloak_admin_access_runtime_recovery_needed | bool
        - (keycloak_admin_access_recovery_up.rc | default(1)) == 0

    - name: Wait for the Keycloak admin API after admin-client runtime recovery
      ansible.builtin.uri:
        url: "{{ keycloak_local_admin_url }}/realms/master/.well-known/openid-configuration"
        method: GET
        status_code: 200
      register: keycloak_admin_access_recovery_master_openid_config
      retries: "{{ keycloak_startup_probe_retries }}"
      delay: "{{ keycloak_startup_probe_delay }}"
      until: keycloak_admin_access_recovery_master_openid_config.status == 200
      changed_when: false
      when:
        - keycloak_admin_access_runtime_recovery_needed | bool
        - (keycloak_admin_access_recovery_up.rc | default(1)) == 0

    - name: Retry the repo-managed Keycloak admin client token endpoint after admin-client runtime recovery
      ansible.builtin.uri:
        url: "{{ keycloak_local_admin_url }}/realms/master/protocol/openid-connect/token"
        method: POST
        timeout: "{{ keycloak_admin_connection_timeout }}"
        body_format: form-urlencoded
        body:
          grant_type: client_credentials
          client_id: "{{ keycloak_admin_client_id }}"
          client_secret: "{{ keycloak_admin_client_secret }}"
        return_content: true
        status_code:
          - 200
          - 400
          - 401
          - 403
          - 500
      register: keycloak_admin_access_token_probe_recovery
      retries: "{{ keycloak_startup_probe_retries }}"
      delay: "{{ keycloak_startup_probe_delay }}"
      until: (keycloak_admin_access_token_probe_recovery.status | default(0)) in [200, 400, 401, 403]
      changed_when: false
      failed_when: (keycloak_admin_access_token_probe_recovery.status | default(0)) != 200
      no_log: true
      when:
        - keycloak_admin_access_runtime_recovery_needed | bool
        - (keycloak_admin_access_recovery_up.rc | default(1)) == 0

    - name: Retry the authenticated Keycloak admin realm query after admin-client runtime recovery
      ansible.builtin.uri:
        url: "{{ keycloak_local_admin_url }}/admin/realms/{{ keycloak_realm_name }}"
        method: GET
        headers:
          Authorization: "Bearer {{ keycloak_admin_access_token_probe_recovery.json.access_token }}"
        return_content: true
        status_code:
          - 200
          - 403
          - 404
      register: keycloak_admin_access_realm_probe_recovery
      retries: "{{ keycloak_startup_probe_retries }}"
      delay: "{{ keycloak_startup_probe_delay }}"
      until: (keycloak_admin_access_realm_probe_recovery.status | default(0)) in [200, 403, 404]
      changed_when: false
      failed_when: (keycloak_admin_access_realm_probe_recovery.status | default(0)) == 403
      no_log: true
      when:
        - keycloak_admin_access_runtime_recovery_needed | bool
        - (keycloak_admin_access_recovery_up.rc | default(1)) == 0
        - (keycloak_admin_access_token_probe_recovery.status | default(0)) == 200

    - name: Read the live Keycloak admin client secret directly from PostgreSQL when file-based auth fails
      ansible.builtin.command:
        argv:
          - psql
          - -d
          - "{{ keycloak_database_name }}"
          - -At
          - -v
          - ON_ERROR_STOP=1
          - -c
          - "SELECT secret FROM client WHERE client_id = '{{ keycloak_admin_client_id }}';"
      delegate_to: "{{ playbook_execution_required_hosts.postgres[playbook_execution_env] }}"
      become: true
      become_user: postgres
      register: keycloak_admin_client_live_secret_query
      changed_when: false
      failed_when: false
      no_log: true
      when: >-
        (keycloak_admin_client_token_probe.status | default(0)) != 200
        and (
          not (keycloak_admin_access_runtime_recovery_needed | default(false))
          or (keycloak_admin_access_token_probe_recovery.status | default(0)) != 200
          or (keycloak_admin_access_realm_probe_recovery.status | default(403)) == 403
        )

    - name: Record the live Keycloak admin client secret from PostgreSQL when available
      ansible.builtin.set_fact:
        keycloak_admin_client_secret_live: "{{ keycloak_admin_client_live_secret_query.stdout | trim }}"
      no_log: true
      when: (keycloak_admin_client_live_secret_query.stdout | default('') | trim | length) > 0

    - name: Retry the repo-managed Keycloak admin client token endpoint with the live PostgreSQL-backed secret
      ansible.builtin.uri:
        url: "{{ keycloak_local_admin_url }}/realms/master/protocol/openid-connect/token"
        method: POST
        timeout: "{{ keycloak_admin_connection_timeout }}"
        body_format: form-urlencoded
        body:
          grant_type: client_credentials
          client_id: "{{ keycloak_admin_client_id }}"
          client_secret: "{{ keycloak_admin_client_secret_live }}"
        return_content: true
        status_code:
          - 200
          - 400
          - 401
          - 403
          - 500
      register: keycloak_admin_client_live_secret_token_probe
      retries: "{{ keycloak_startup_probe_retries }}"
      delay: "{{ keycloak_startup_probe_delay }}"
      until: (keycloak_admin_client_live_secret_token_probe.status | default(0)) in [200, 400, 401, 403]
      changed_when: false
      failed_when: (keycloak_admin_client_live_secret_token_probe.status | default(0)) != 200
      no_log: true
      when: (keycloak_admin_client_secret_live | default('') | length) > 0

    - name: Retry the authenticated Keycloak admin realm query with the live PostgreSQL-backed secret
      ansible.builtin.uri:
        url: "{{ keycloak_local_admin_url }}/admin/realms/{{ keycloak_realm_name }}"
        method: GET
        headers:
          Authorization: "Bearer {{ keycloak_admin_client_live_secret_token_probe.json.access_token }}"
        return_content: true
        status_code:
          - 200
          - 403
          - 404
      register: keycloak_admin_client_live_secret_realm_probe
      retries: "{{ keycloak_startup_probe_retries }}"
      delay: "{{ keycloak_startup_probe_delay }}"
      until: (keycloak_admin_client_live_secret_realm_probe.status | default(0)) in [200, 403, 404]
      changed_when: false
      failed_when: (keycloak_admin_client_live_secret_realm_probe.status | default(0)) == 403
      no_log: true
      when: (keycloak_admin_client_live_secret_token_probe.status | default(0)) == 200

    - name: Reconcile the repo-managed Keycloak admin client using the live PostgreSQL-backed secret
      ansible.builtin.include_tasks: reconcile_admin_client.yml
      vars:
        keycloak_admin_bootstrap_auth_realm: master
        keycloak_admin_bootstrap_auth_client_id: "{{ keycloak_admin_client_id }}"
        keycloak_admin_bootstrap_auth_client_secret: "{{ keycloak_admin_client_secret_live }}"
      when: (keycloak_admin_client_live_secret_realm_probe.status | default(403)) in [200, 404]

    - name: Record whether bootstrap admin recovery is still required after runtime and live-secret recovery
      ansible.builtin.set_fact:
        keycloak_admin_bootstrap_fallback_required: >-
          {{
            (keycloak_admin_access_realm_probe_recovery.status | default(403)) not in [200, 404]
            and (keycloak_admin_client_live_secret_realm_probe.status | default(403)) not in [200, 404]
          }}

    - name: Recover repo-managed Keycloak admin access with bootstrap credentials when runtime recovery is insufficient
      when: keycloak_admin_bootstrap_fallback_required | bool
      block:
        - name: Try the Keycloak bootstrap admin token endpoint as a fallback admin bootstrap path
          ansible.builtin.uri:
            url: "{{ keycloak_local_admin_url }}/realms/master/protocol/openid-connect/token"
            method: POST
            body_format: form-urlencoded
            body:
              grant_type: password
              client_id: admin-cli
              username: "{{ keycloak_bootstrap_admin_username }}"
              password: "{{ keycloak_bootstrap_admin_password }}"
            return_content: true
            status_code:
              - 200
              - 400
              - 401
              - 500
          register: keycloak_bootstrap_admin_token_probe
          changed_when: false
          no_log: true

        - name: Reconcile the repo-managed Keycloak admin client using the bootstrap admin fallback credentials
          ansible.builtin.include_tasks: reconcile_admin_client.yml
          vars:
            keycloak_admin_bootstrap_auth_realm: master
            keycloak_admin_bootstrap_auth_client_id: admin-cli
            keycloak_admin_bootstrap_auth_username: "{{ keycloak_bootstrap_admin_username }}"
            keycloak_admin_bootstrap_auth_password: "{{ keycloak_bootstrap_admin_password }}"
          when: (keycloak_bootstrap_admin_token_probe.status | default(0)) == 200

        - name: Stop the Keycloak service before offline admin recovery
          ansible.builtin.command:
            argv:
              - docker
              - compose
              - --file
              - "{{ keycloak_compose_file }}"
              - stop
              - keycloak
          args:
            chdir: "{{ keycloak_site_dir }}"
          register: keycloak_admin_recovery_stop
          changed_when: >-
            'Stopping' in (keycloak_admin_recovery_stop.stdout | default(''))
            or 'Stopped' in (keycloak_admin_recovery_stop.stdout | default(''))
          when: (keycloak_bootstrap_admin_token_probe.status | default(0)) != 200

        - name: Bootstrap the temporary Keycloak recovery admin service account while Keycloak is stopped
          ansible.builtin.shell: |
            set -euo pipefail
            export KEYCLOAK_RECOVERY_ADMIN_SERVICE_CLIENT_SECRET="{{ keycloak_recovery_admin_service_secret }}"
            docker compose --file "{{ keycloak_compose_file }}" run --rm --no-deps \
              -e KEYCLOAK_RECOVERY_ADMIN_SERVICE_CLIENT_SECRET \
              keycloak bootstrap-admin service --no-prompt \
              --client-id "{{ keycloak_recovery_admin_service_client_id }}" \
              --client-secret:env KEYCLOAK_RECOVERY_ADMIN_SERVICE_CLIENT_SECRET
          args:
            chdir: "{{ keycloak_site_dir }}"
            executable: /bin/bash
          register: keycloak_recovery_admin_service_bootstrap
          retries: 3
          delay: 5
          until: keycloak_recovery_admin_service_bootstrap.rc == 0
          changed_when: false
          no_log: true
          when: (keycloak_bootstrap_admin_token_probe.status | default(0)) != 200

        - name: Start the Keycloak service after offline admin recovery bootstrap
          ansible.builtin.command:
            argv:
              - docker
              - compose
              - --file
              - "{{ keycloak_compose_file }}"
              - up
              - -d
              - --no-deps
              - keycloak
          args:
            chdir: "{{ keycloak_site_dir }}"
          register: keycloak_admin_recovery_up
          changed_when: >-
            'Creating' in (keycloak_admin_recovery_up.stdout | default(''))
            or 'Recreating' in (keycloak_admin_recovery_up.stdout | default(''))
            or 'Starting' in (keycloak_admin_recovery_up.stdout | default(''))
          when: (keycloak_bootstrap_admin_token_probe.status | default(0)) != 200

        - name: Wait for the Keycloak management port after offline admin recovery
          ansible.builtin.wait_for:
            host: 127.0.0.1
            port: "{{ keycloak_local_management_port }}"
            delay: 0
            timeout: 240
          when: (keycloak_bootstrap_admin_token_probe.status | default(0)) != 200

        - name: Wait for the Keycloak readiness endpoint after offline admin recovery
          ansible.builtin.uri:
            url: "http://127.0.0.1:{{ keycloak_local_management_port }}/health/ready"
            method: GET
            status_code: 200
          register: keycloak_recovery_admin_service_health_ready
          retries: "{{ keycloak_startup_probe_retries }}"
          delay: "{{ keycloak_startup_probe_delay }}"
          until: keycloak_recovery_admin_service_health_ready.status == 200
          changed_when: false
          when: (keycloak_bootstrap_admin_token_probe.status | default(0)) != 200

        - name: Wait for the Keycloak admin API after offline admin recovery
          ansible.builtin.uri:
            url: "{{ keycloak_local_admin_url }}/realms/master/.well-known/openid-configuration"
            method: GET
            status_code: 200
          register: keycloak_recovery_admin_service_openid_config
          retries: "{{ keycloak_startup_probe_retries }}"
          delay: "{{ keycloak_startup_probe_delay }}"
          until: keycloak_recovery_admin_service_openid_config.status == 200
          changed_when: false
          when: (keycloak_bootstrap_admin_token_probe.status | default(0)) != 200

        - name: Request the temporary Keycloak recovery admin service token
          ansible.builtin.uri:
            url: "{{ keycloak_local_admin_url }}/realms/master/protocol/openid-connect/token"
            method: POST
            body_format: form-urlencoded
            body:
              grant_type: client_credentials
              client_id: "{{ keycloak_recovery_admin_service_client_id }}"
              client_secret: "{{ keycloak_recovery_admin_service_secret }}"
            return_content: true
            status_code:
              - 200
              - 400
              - 401
              - 403
              - 500
          register: keycloak_recovery_admin_service_token_probe
          retries: "{{ keycloak_startup_probe_retries }}"
          delay: "{{ keycloak_startup_probe_delay }}"
          until: (keycloak_recovery_admin_service_token_probe.status | default(0)) in [200, 400, 401, 403]
          changed_when: false
          failed_when: false
          no_log: true
          when: (keycloak_bootstrap_admin_token_probe.status | default(0)) != 200

        - name: Read the live temporary Keycloak recovery admin secret directly from PostgreSQL when file-based recovery auth fails
          ansible.builtin.command:
            argv:
              - psql
              - -d
              - "{{ keycloak_database_name }}"
              - -At
              - -v
              - ON_ERROR_STOP=1
              - -c
              - "SELECT secret FROM client WHERE client_id = '{{ keycloak_recovery_admin_service_client_id }}';"
          delegate_to: "{{ playbook_execution_required_hosts.postgres[playbook_execution_env] }}"
          become: true
          become_user: postgres
          register: keycloak_recovery_admin_service_live_secret_query
          changed_when: false
          failed_when: false
          no_log: true
          when:
            - (keycloak_bootstrap_admin_token_probe.status | default(0)) != 200
            - (keycloak_recovery_admin_service_token_probe.status | default(0)) != 200

        - name: Record the live temporary Keycloak recovery admin secret from PostgreSQL when available
          ansible.builtin.set_fact:
            keycloak_recovery_admin_service_secret_live: "{{ keycloak_recovery_admin_service_live_secret_query.stdout | trim }}"
          no_log: true
          when:
            - (keycloak_bootstrap_admin_token_probe.status | default(0)) != 200
            - (keycloak_recovery_admin_service_live_secret_query.stdout | default('') | trim | length) > 0

        - name: Retry the temporary Keycloak recovery admin service token endpoint with the live PostgreSQL-backed secret
          ansible.builtin.uri:
            url: "{{ keycloak_local_admin_url }}/realms/master/protocol/openid-connect/token"
            method: POST
            body_format: form-urlencoded
            body:
              grant_type: client_credentials
              client_id: "{{ keycloak_recovery_admin_service_client_id }}"
              client_secret: "{{ keycloak_recovery_admin_service_secret_live }}"
            return_content: true
            status_code:
              - 200
              - 400
              - 401
              - 403
              - 500
          register: keycloak_recovery_admin_service_live_secret_token_probe
          retries: "{{ keycloak_startup_probe_retries }}"
          delay: "{{ keycloak_startup_probe_delay }}"
          until: (keycloak_recovery_admin_service_live_secret_token_probe.status | default(0)) in [200, 400, 401, 403]
          changed_when: false
          failed_when: false
          no_log: true
          when:
            - (keycloak_bootstrap_admin_token_probe.status | default(0)) != 200
            - (keycloak_recovery_admin_service_secret_live | default('') | length) > 0

        - name: Select the temporary Keycloak recovery admin secret that can authenticate
          ansible.builtin.set_fact:
            keycloak_recovery_admin_service_auth_client_secret: >-
              {{
                keycloak_recovery_admin_service_secret
                if (keycloak_recovery_admin_service_token_probe.status | default(0)) == 200
                else keycloak_recovery_admin_service_secret_live
              }}
          no_log: true
          when:
            - (keycloak_bootstrap_admin_token_probe.status | default(0)) != 200
            - >-
              (keycloak_recovery_admin_service_token_probe.status | default(0)) == 200
              or (keycloak_recovery_admin_service_live_secret_token_probe.status | default(0)) == 200

        - name: Reconcile the repo-managed Keycloak admin client using the temporary recovery admin service credentials
          ansible.builtin.include_tasks: reconcile_admin_client.yml
          vars:
            keycloak_admin_bootstrap_auth_realm: master
            keycloak_admin_bootstrap_auth_client_id: "{{ keycloak_recovery_admin_service_client_id }}"
            keycloak_admin_bootstrap_auth_client_secret: "{{ keycloak_recovery_admin_service_auth_client_secret }}"
          when:
            - (keycloak_bootstrap_admin_token_probe.status | default(0)) != 200
            - (keycloak_recovery_admin_service_auth_client_secret | default('') | length) > 0

        - name: Remove the temporary Keycloak recovery admin service account now that permanent admin access is back
          community.general.keycloak_client:
            realm: master
            client_id: "{{ keycloak_recovery_admin_service_client_id }}"
            state: absent
            auth_client_id: "{{ keycloak_admin_client_id }}"
            auth_client_secret: "{{ keycloak_admin_client_secret }}"
            auth_keycloak_url: "{{ keycloak_local_admin_url }}"
            auth_realm: master
            validate_certs: false
          register: keycloak_recovery_admin_service_client_absent
          retries: "{{ keycloak_admin_reconciliation_retries }}"
          delay: "{{ keycloak_admin_reconciliation_delay }}"
          until: keycloak_recovery_admin_service_client_absent is succeeded
          when: (keycloak_bootstrap_admin_token_probe.status | default(0)) != 200

- name: Reconfirm the repo-managed Keycloak admin client token endpoint after bootstrap or recovery
  ansible.builtin.uri:
    url: "{{ keycloak_local_admin_url }}/realms/master/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: client_credentials
      client_id: "{{ keycloak_admin_client_id }}"
      client_secret: "{{ keycloak_admin_client_secret }}"
    return_content: true
    status_code: 200
  register: keycloak_admin_client_token_probe_confirmed
  retries: "{{ keycloak_startup_probe_retries }}"
  delay: "{{ keycloak_startup_probe_delay }}"
  until: keycloak_admin_client_token_probe_confirmed.status == 200
  changed_when: false
  no_log: true

- name: Wait for an authenticated Keycloak admin realm query to answer
  ansible.builtin.uri:
    url: "{{ keycloak_local_admin_url }}/admin/realms/{{ keycloak_realm_name }}"
    method: GET
    headers:
      Authorization: "Bearer {{ keycloak_admin_client_token_probe_confirmed.json.access_token }}"
    return_content: true
    status_code:
      - 200
      - 403
      - 404
  register: keycloak_admin_realm_probe
  retries: "{{ keycloak_startup_probe_retries }}"
  delay: "{{ keycloak_startup_probe_delay }}"
  until: (keycloak_admin_realm_probe.status | default(0)) in [200, 403, 404]
  changed_when: false
  failed_when: (keycloak_admin_realm_probe.status | default(0)) == 403
  no_log: true

- name: Allow the Keycloak admin API to settle after the first authenticated admin-client probe
  ansible.builtin.pause:
    seconds: "{{ keycloak_startup_probe_delay }}"
  changed_when: false

- name: Reconfirm the repo-managed Keycloak admin client token endpoint after the settle window
  ansible.builtin.uri:
    url: "{{ keycloak_local_admin_url }}/realms/master/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: client_credentials
      client_id: "{{ keycloak_admin_client_id }}"
      client_secret: "{{ keycloak_admin_client_secret }}"
    return_content: true
    status_code: 200
  register: keycloak_admin_client_token_probe_stable
  retries: "{{ keycloak_startup_probe_retries }}"
  delay: "{{ keycloak_startup_probe_delay }}"
  until: keycloak_admin_client_token_probe_stable.status == 200
  changed_when: false
  no_log: true

- name: Reconfirm an authenticated Keycloak admin realm query after the settle window
  ansible.builtin.uri:
    url: "{{ keycloak_local_admin_url }}/admin/realms/{{ keycloak_realm_name }}"
    method: GET
    headers:
      Authorization: "Bearer {{ keycloak_admin_client_token_probe_stable.json.access_token }}"
    return_content: true
    status_code:
      - 200
      - 403
      - 404
  register: keycloak_admin_realm_probe_confirmed
  retries: "{{ keycloak_startup_probe_retries }}"
  delay: "{{ keycloak_startup_probe_delay }}"
  until: (keycloak_admin_realm_probe_confirmed.status | default(0)) in [200, 403, 404]
  changed_when: false
  failed_when: (keycloak_admin_realm_probe_confirmed.status | default(0)) == 403
  no_log: true

- name: Verify Keycloak resolves the internal mail-platform relay host
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - keycloak-keycloak-1
      - getent
      - ahostsv4
      - "{{ keycloak_mail_platform_submission_host }}"
  register: keycloak_mail_submission_host_lookup_initial
  changed_when: false
  failed_when: false
  when: keycloak_mail_platform_submission_recovery_enabled

- name: Remove a stale mail-platform network with missing compose labels before relay recovery
  ansible.builtin.shell: |
    net="{{ keycloak_mail_platform_docker_network_name }}"
    if docker network inspect "$net" >/dev/null 2>&1; then
      label="$(docker network inspect "$net" --format '{{ "{{" }}index .Labels "com.docker.compose.network"{{ "}}" }}')"
      if [ "$label" != "default" ]; then
        for container in $(docker network inspect "$net" --format '{{ "{{" }}range .Containers{{ "}}" }}{{ "{{" }}.Name{{ "}}" }} {{ "{{" }}end{{ "}}" }}'); do
          docker network disconnect -f "$net" "$container" 2>/dev/null || true
        done
        docker network rm "$net" && echo changed || true
      fi
    fi
  args:
    executable: /bin/bash
  register: keycloak_mail_platform_network_label_cleanup
  changed_when: "'changed' in keycloak_mail_platform_network_label_cleanup.stdout"
  when:
    - keycloak_mail_platform_submission_recovery_enabled
    - keycloak_mail_submission_host_lookup_initial.rc != 0

- name: Recover the internal mail-platform submission relay before Keycloak SMTP verification
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ keycloak_mail_platform_compose_file }}"
      - up
      - -d
      - --force-recreate
      - --no-deps
      - "{{ keycloak_mail_platform_submission_service_name }}"
  args:
    chdir: "{{ keycloak_mail_platform_compose_file | dirname }}"
  register: keycloak_mail_submission_dependency_up
  changed_when: >-
    'Creating' in (keycloak_mail_submission_dependency_up.stdout | default(''))
    or 'Recreating' in (keycloak_mail_submission_dependency_up.stdout | default(''))
    or 'Starting' in (keycloak_mail_submission_dependency_up.stdout | default(''))
    or 'Running' in (keycloak_mail_submission_dependency_up.stdout | default(''))
  retries: 3
  delay: 5
  until: keycloak_mail_submission_dependency_up.rc == 0
  when:
    - keycloak_mail_platform_submission_recovery_enabled
    - keycloak_mail_submission_host_lookup_initial.rc != 0

- name: Wait for the internal mail-platform submission listener after dependency recovery
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: "{{ keycloak_mail_platform_submission_port }}"
    delay: 0
    timeout: 120
  when:
    - keycloak_mail_platform_submission_recovery_enabled
    - keycloak_mail_submission_host_lookup_initial.rc != 0

- name: Verify Keycloak resolves the internal mail-platform relay host
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - keycloak-keycloak-1
      - getent
      - ahostsv4
      - "{{ keycloak_mail_platform_submission_host }}"
  register: keycloak_mail_submission_host_lookup
  changed_when: false
  retries: "{{ keycloak_admin_reconciliation_retries }}"
  delay: "{{ keycloak_admin_reconciliation_delay }}"
  until: keycloak_mail_submission_host_lookup.rc == 0

- name: Verify Keycloak reaches the internal mail-platform submission listener
  ansible.builtin.shell: >-
    docker exec keycloak-keycloak-1 /bin/bash -lc
    'timeout 15 bash -lc "exec 3<>/dev/tcp/{{ keycloak_mail_platform_submission_host }}/{{ keycloak_mail_platform_submission_port }}"'
  args:
    executable: /bin/bash
  register: keycloak_mail_submission_probe
  changed_when: false
  retries: "{{ keycloak_admin_reconciliation_retries }}"
  delay: "{{ keycloak_admin_reconciliation_delay }}"
  until: keycloak_mail_submission_probe.rc == 0

- name: Converge Keycloak realm objects
  module_defaults:
    community.general.keycloak_realm:
      connection_timeout: "{{ keycloak_admin_connection_timeout }}"
      auth_client_id: "{{ keycloak_admin_client_id }}"
      auth_client_secret: "{{ keycloak_admin_client_secret }}"
      auth_keycloak_url: "{{ keycloak_local_admin_url }}"
      auth_realm: master
      validate_certs: false
    community.general.keycloak_group:
      connection_timeout: "{{ keycloak_admin_connection_timeout }}"
      auth_client_id: "{{ keycloak_admin_client_id }}"
      auth_client_secret: "{{ keycloak_admin_client_secret }}"
      auth_keycloak_url: "{{ keycloak_local_admin_url }}"
      auth_realm: master
      validate_certs: false
    community.general.keycloak_role:
      connection_timeout: "{{ keycloak_admin_connection_timeout }}"
      auth_client_id: "{{ keycloak_admin_client_id }}"
      auth_client_secret: "{{ keycloak_admin_client_secret }}"
      auth_keycloak_url: "{{ keycloak_local_admin_url }}"
      auth_realm: master
      validate_certs: false
    community.general.keycloak_realm_rolemapping:
      connection_timeout: "{{ keycloak_admin_connection_timeout }}"
      auth_client_id: "{{ keycloak_admin_client_id }}"
      auth_client_secret: "{{ keycloak_admin_client_secret }}"
      auth_keycloak_url: "{{ keycloak_local_admin_url }}"
      auth_realm: master
      validate_certs: false
    community.general.keycloak_client:
      connection_timeout: "{{ keycloak_admin_connection_timeout }}"
      auth_client_id: "{{ keycloak_admin_client_id }}"
      auth_client_secret: "{{ keycloak_admin_client_secret }}"
      auth_keycloak_url: "{{ keycloak_local_admin_url }}"
      auth_realm: master
      validate_certs: false
    community.general.keycloak_user_rolemapping:
      connection_timeout: "{{ keycloak_admin_connection_timeout }}"
      auth_client_id: "{{ keycloak_admin_client_id }}"
      auth_client_secret: "{{ keycloak_admin_client_secret }}"
      auth_keycloak_url: "{{ keycloak_local_admin_url }}"
      auth_realm: master
      validate_certs: false
    community.general.keycloak_clientsecret_info:
      connection_timeout: "{{ keycloak_admin_connection_timeout }}"
      auth_client_id: "{{ keycloak_admin_client_id }}"
      auth_client_secret: "{{ keycloak_admin_client_secret }}"
      auth_keycloak_url: "{{ keycloak_local_admin_url }}"
      auth_realm: master
      validate_certs: false
  block:
    - name: Ensure the LV3 realm exists
      community.general.keycloak_realm:
        auth_keycloak_url: "{{ keycloak_local_admin_url }}"
        realm: "{{ keycloak_realm_name }}"
        display_name: "{{ keycloak_realm_display_name }}"
        enabled: true
        registration_allowed: false
        login_with_email_allowed: true
        duplicate_emails_allowed: false
        reset_password_allowed: true
        remember_me: true
        brute_force_protected: true
        ssl_required: external
        access_code_lifespan: 60
        access_code_lifespan_login: 1800
        access_token_lifespan: 300
        sso_session_idle_timeout: 28800
        sso_session_max_lifespan: 43200
        smtp_server: "{{ keycloak_realm_smtp_server }}"
        state: present
      register: keycloak_realm_reconcile
      retries: "{{ keycloak_admin_reconciliation_retries }}"
      delay: "{{ keycloak_admin_reconciliation_delay }}"
      until: keycloak_realm_reconcile is succeeded

    - name: Ensure the Keycloak realm groups exist
      community.general.keycloak_group:
        auth_keycloak_url: "{{ keycloak_local_admin_url }}"
        realm: "{{ keycloak_realm_name }}"
        name: "{{ item.name }}"
        attributes: "{{ item.attributes }}"
        state: present
      loop: "{{ keycloak_realm_groups }}"
      loop_control:
        label: "{{ item.name }}"
      register: keycloak_realm_groups_reconcile
      retries: "{{ keycloak_admin_reconciliation_retries }}"
      delay: "{{ keycloak_admin_reconciliation_delay }}"
      until: keycloak_realm_groups_reconcile is succeeded

    - name: Ensure the Keycloak realm roles exist
      community.general.keycloak_role:
        realm: "{{ keycloak_realm_name }}"
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        composite: "{{ (item.composites | default([])) | length > 0 }}"
        composites: "{{ item.composites | default([]) }}"
        state: present
      loop: "{{ keycloak_realm_roles }}"
      loop_control:
        label: "{{ item.name }}"
      register: keycloak_realm_roles_reconcile
      retries: "{{ keycloak_admin_reconciliation_retries }}"
      delay: "{{ keycloak_admin_reconciliation_delay }}"
      until: keycloak_realm_roles_reconcile is succeeded

    - name: Ensure realm roles are mapped to Keycloak groups
      community.general.keycloak_realm_rolemapping:
        realm: "{{ keycloak_realm_name }}"
        group_name: "{{ item.group_name }}"
        roles: "{{ item.roles }}"
        state: present
      loop: "{{ keycloak_group_realm_role_mappings }}"
      loop_control:
        label: "{{ item.group_name }}"
      register: keycloak_group_realm_role_mappings_reconcile
      retries: "{{ keycloak_admin_reconciliation_retries }}"
      delay: "{{ keycloak_admin_reconciliation_delay }}"
      until: keycloak_group_realm_role_mappings_reconcile is succeeded

    # BEGIN SERVICE: grafana
    - name: Ensure the Grafana OAuth client exists
      community.general.keycloak_client:
        auth_keycloak_url: "{{ keycloak_local_admin_url }}"
        realm: "{{ keycloak_realm_name }}"
        client_id: "{{ keycloak_grafana_client_id }}"
        name: Grafana
        description: Repo-managed Grafana SSO integration for LV3 operators.
        enabled: true
        protocol: openid-connect
        public_client: false
        client_authenticator_type: client-secret
        standard_flow_enabled: true
        implicit_flow_enabled: false
        direct_access_grants_enabled: false
        service_accounts_enabled: false
        full_scope_allowed: false
        root_url: "{{ keycloak_grafana_root_url }}"
        base_url: "{{ keycloak_grafana_root_url }}"
        admin_url: "{{ keycloak_grafana_root_url }}"
        redirect_uris:
          - "{{ keycloak_grafana_root_url }}/login/generic_oauth"
        valid_post_logout_redirect_uris: "{{ keycloak_grafana_post_logout_redirect_uris }}"
        web_origins:
          - "{{ keycloak_grafana_root_url }}"
        protocol_mappers:
          - name: groups
            protocol: openid-connect
            protocolMapper: oidc-group-membership-mapper
            config:
              claim.name: groups
              full.path: "false"
              id.token.claim: "true"
              access.token.claim: "true"
              userinfo.token.claim: "true"
        state: present
      register: keycloak_grafana_client_reconcile
      retries: "{{ keycloak_admin_reconciliation_retries }}"
      delay: "{{ keycloak_admin_reconciliation_delay }}"
      until: keycloak_grafana_client_reconcile is succeeded
    # END SERVICE: grafana

    - name: Ensure the operations portal OAuth client exists
      community.general.keycloak_client:
        auth_keycloak_url: "{{ keycloak_local_admin_url }}"
        realm: "{{ keycloak_realm_name }}"
        client_id: "{{ keycloak_ops_portal_client_id }}"
        name: Platform Operations Portal
        description: Repo-managed OIDC client for the operations portal auth proxy.
        enabled: true
        protocol: openid-connect
        public_client: false
        client_authenticator_type: client-secret
        standard_flow_enabled: true
        implicit_flow_enabled: false
        direct_access_grants_enabled: false
        service_accounts_enabled: false
        full_scope_allowed: false
        root_url: "{{ keycloak_ops_portal_root_url }}"
        base_url: "{{ keycloak_ops_portal_root_url }}"
        admin_url: "{{ keycloak_ops_portal_root_url }}"
