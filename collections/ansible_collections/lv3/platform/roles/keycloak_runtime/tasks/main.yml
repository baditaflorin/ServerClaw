- name: Record the Keycloak client secrets
  ansible.builtin.set_fact:
    keycloak_grafana_client_secret: "{{ keycloak_grafana_client_secret_info.clientsecret_info.value }}"
    keycloak_ops_portal_client_secret: "{{ keycloak_ops_portal_client_secret_info.clientsecret_info.value }}"
    keycloak_gitea_client_secret: "{{ keycloak_gitea_client_secret_info.clientsecret_info.value }}"
    keycloak_agent_client_secret: "{{ keycloak_agent_client_secret_info.clientsecret_info.value }}"
    keycloak_langfuse_client_secret: "{{ keycloak_langfuse_client_secret_info.clientsecret_info.value }}"
    keycloak_api_gateway_client_secret: "{{ keycloak_api_gateway_client_secret_info.clientsecret_info.value }}"
  no_log: true

- name: Mirror the Grafana client secret to the control machine
  ansible.builtin.copy:
    dest: "{{ keycloak_grafana_client_secret_local_file }}"
    content: "{{ keycloak_grafana_client_secret }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Mirror the operations portal client secret to the control machine
  ansible.builtin.copy:
    dest: "{{ keycloak_ops_portal_client_secret_local_file }}"
    content: "{{ keycloak_ops_portal_client_secret }}\n"
    mode: "0600"
