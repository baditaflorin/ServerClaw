---
# NOTE: Conventional variables (site_dir, image, compose_file, env_file,
# openbao_*, container_name, internal_port, local_artifact_dir) are derived
# from platform_service_registry — ADR 0373.
# Purpose: Default runtime inputs for the Grist operational spreadsheet database.

grist_service_topology: "{{ hostvars[platform_topology_host].lv3_service_topology | service_topology_get('grist') }}"
grist_session_authority: "{{ platform_session_authority }}"
grist_persist_dir: "{{ grist_site_dir }}/persist"
grist_runtime_uid: "1001"
grist_runtime_gid: "1001"
grist_static_env_file: "{{ grist_site_dir }}/grist.env"
grist_internal_base_url: "http://127.0.0.1:{{ grist_internal_port }}"
grist_public_base_url: "https://{{ grist_service_topology.public_hostname }}"
grist_public_edge_private_ip: "{{ hostvars[platform_topology_host].proxmox_public_edge_ipv4 }}"
grist_public_hostname_overrides:
  - hostname: "{{ grist_service_topology.public_hostname }}"
    address: "{{ grist_public_edge_private_ip }}"
  - hostname: "{{ hostvars[platform_topology_host].lv3_service_topology.keycloak.public_hostname }}"
    address: "{{ grist_public_edge_private_ip }}"
grist_session_secret_local_file: "{{ grist_local_artifact_dir }}/session-secret.txt"
grist_keycloak_client_secret_local_file: "{{ repo_shared_local_root }}/keycloak/grist-client-secret.txt"
grist_session_secret_remote_file: "{{ grist_secret_dir }}/session-secret.txt"
grist_keycloak_client_id: grist
grist_keycloak_issuer: "{{ keycloak_oidc_issuer_url }}"
grist_keycloak_scopes: openid profile email
grist_keycloak_sp_host: "{{ grist_public_base_url }}"
grist_single_org: lv3
grist_default_email: "{{ keycloak_operator_email | default('baditaflorin@gmail.com') }}"
grist_force_login: false
grist_support_anon: true
grist_anonymous_playground: false
