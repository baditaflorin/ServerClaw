---
# Purpose: Deploy Grist with repo-managed OIDC publication and persistent document storage.

- name: Validate Grist runtime inputs
  ansible.builtin.assert:
    that:
      - grist_site_dir | length > 0
      - grist_persist_dir | length > 0
      - grist_secret_dir | length > 0
      - grist_compose_file | length > 0
      - grist_static_env_file | length > 0
      - grist_env_file | length > 0
      - grist_runtime_uid | length > 0
      - grist_runtime_gid | length > 0
      - grist_internal_port | int > 0
      - grist_internal_base_url | length > 0
      - grist_public_base_url | length > 0
      - grist_keycloak_client_secret_local_file | length > 0
      - grist_image | length > 0
      - grist_keycloak_client_id | length > 0
      - grist_keycloak_issuer | length > 0
      - grist_default_email | length > 0
    fail_msg: >-
      grist_runtime requires runtime paths, image refs, public URLs,
      and Keycloak OIDC credentials.

- name: Check whether the Grist Keycloak client secret exists on the control machine
  ansible.builtin.stat:
    path: "{{ grist_keycloak_client_secret_local_file }}"
  delegate_to: localhost
  become: false
  register: grist_keycloak_client_secret_local

- name: Fail if the Grist Keycloak client secret is missing locally
  ansible.builtin.fail:
    msg: >-
      {{ grist_keycloak_client_secret_local_file }} is missing on the control machine.
      Converge the Keycloak runtime before deploying Grist.
  when: not grist_keycloak_client_secret_local.stat.exists

- name: Ensure the Grist runtime packages are present
  ansible.builtin.apt:
    name:
      - openssl
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure the Grist runtime directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ grist_site_dir }}"
      mode: "0755"
    - path: "{{ grist_persist_dir }}"
      mode: "0755"
    - path: "{{ grist_secret_dir }}"
      mode: "0700"

- name: Ensure the Grist persist directory is writable by the runtime user
  ansible.builtin.file:
    path: "{{ grist_persist_dir }}"
    state: directory
    owner: "{{ grist_runtime_uid }}"
    group: "{{ grist_runtime_gid }}"
    mode: "0755"

- name: Ensure existing Grist persist content is owned by the runtime user
  ansible.builtin.file:
    path: "{{ grist_persist_dir }}"
    state: directory
    owner: "{{ grist_runtime_uid }}"
    group: "{{ grist_runtime_gid }}"
    recurse: true

- name: Generate the Grist session secret
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ grist_session_secret_remote_file }}" ]; then
      umask 077
      openssl rand -hex 32 > "{{ grist_session_secret_remote_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: grist_session_secret_generation
  changed_when: "'changed' in grist_session_secret_generation.stdout"
  no_log: true

- name: Read the Grist session secret
  ansible.builtin.slurp:
    src: "{{ grist_session_secret_remote_file }}"
  register: grist_session_secret_raw
  no_log: true

- name: Record the Grist runtime secrets
  ansible.builtin.set_fact:
    grist_session_secret: "{{ grist_session_secret_raw.content | b64decode | trim }}"
    grist_keycloak_client_secret: "{{ lookup('ansible.builtin.file', grist_keycloak_client_secret_local_file) | trim }}"
    grist_runtime_secret_payload:
      GRIST_SESSION_SECRET: "{{ grist_session_secret_raw.content | b64decode | trim }}"
      GRIST_OIDC_IDP_CLIENT_SECRET: "{{ lookup('ansible.builtin.file', grist_keycloak_client_secret_local_file) | trim }}"
  no_log: true

- name: Ensure the local Grist artifact directory exists
  ansible.builtin.file:
    path: "{{ grist_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Mirror the Grist session secret to the control machine
  ansible.builtin.copy:
    dest: "{{ grist_session_secret_local_file }}"
    content: "{{ grist_session_secret }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Prepare OpenBao agent runtime secret injection for Grist
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: openbao_compose_env
  vars:
    common_openbao_compose_env_service_name: grist
    common_openbao_compose_env_agent_dir: "{{ grist_openbao_agent_dir }}"
    common_openbao_compose_env_runtime_dir: "{{ grist_env_file | dirname }}"
    common_openbao_compose_env_env_file: "{{ grist_env_file }}"
    common_openbao_compose_env_secret_path: "{{ grist_openbao_secret_path }}"
    common_openbao_compose_env_secret_payload: "{{ grist_runtime_secret_payload }}"
    common_openbao_compose_env_policy_name: "{{ grist_openbao_policy_name }}"
    common_openbao_compose_env_policy_rules: |
      path "sys/health" {
        capabilities = ["read"]
      }

      path "kv/data/{{ grist_openbao_secret_path }}" {
        capabilities = ["read"]
      }

      path "kv/metadata/{{ grist_openbao_secret_path }}" {
        capabilities = ["read", "list"]
      }
    common_openbao_compose_env_approle_name: "{{ grist_openbao_approle_name }}"
    common_openbao_compose_env_agent_config_file: "{{ grist_openbao_agent_dir }}/agent.hcl"
    common_openbao_compose_env_agent_template_file: "{{ grist_openbao_agent_dir }}/runtime.env.ctmpl"
    common_openbao_compose_env_agent_template_src: grist.env.ctmpl.j2
    common_openbao_compose_env_role_id_file: "{{ grist_openbao_agent_dir }}/role_id"
    common_openbao_compose_env_secret_id_file: "{{ grist_openbao_agent_dir }}/secret_id"
    common_openbao_compose_env_image: "{{ grist_openbao_agent_image }}"
    common_openbao_compose_env_legacy_env_files:
      - "{{ grist_legacy_env_file }}"
  no_log: true

- name: Render the Grist environment file
  ansible.builtin.template:
    src: grist.env.j2
    dest: "{{ grist_static_env_file }}"
    owner: root
    group: root
    mode: "0600"
  register: grist_env_template
  no_log: true

- name: Render the Grist compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ grist_compose_file }}"
    owner: root
    group: root
    mode: "0644"
  register: grist_compose_template

- name: Pull the Grist image
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ grist_compose_file }}"
      - pull
  args:
    chdir: "{{ grist_site_dir }}"
  register: grist_pull
  changed_when: >-
    'Pulling' in grist_pull.stdout
    or 'Downloaded newer image' in grist_pull.stdout
    or 'Pull complete' in grist_pull.stdout

- name: Check whether the Docker nat chain exists before Grist startup
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - nat
      - -S
      - DOCKER
  register: grist_docker_nat_chain
  changed_when: false
  failed_when: false

- name: Record container ids that are running before the Grist-triggered Docker restart
  ansible.builtin.command:
    argv:
      - docker
      - ps
      - -q
      - --no-trunc
  register: grist_pre_restart_container_ids
  changed_when: false
  when: grist_docker_nat_chain.rc != 0

- name: Inspect running containers before the Grist-triggered Docker restart
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json
        import subprocess
        import sys

        container_ids = json.load(sys.stdin)
        inspected = []

        for container_id in container_ids:
            result = subprocess.run(
                ["docker", "inspect", container_id],
                text=True,
                capture_output=True,
            )
            if result.returncode == 0:
                inspected.extend(json.loads(result.stdout or "[]"))
                continue

            stderr = (result.stderr or "").lower()
            if "no such object" in stderr:
                continue

            raise subprocess.CalledProcessError(
                result.returncode,
                result.args,
                output=result.stdout,
                stderr=result.stderr,
            )

        print(json.dumps(inspected))
    stdin: "{{ grist_pre_restart_container_ids.stdout_lines | to_json }}"
  register: grist_pre_restart_container_inspect
  changed_when: false
  when:
    - grist_docker_nat_chain.rc != 0
    - grist_pre_restart_container_ids.stdout_lines | length > 0

- name: Record containers that were running before the Grist-triggered Docker restart
  ansible.builtin.set_fact:
    grist_pre_restart_container_details: >-
      {{
        (grist_pre_restart_container_inspect.stdout | default('[]')) | from_json
      }}
    grist_pre_restart_container_names: >-
      {{
        (
          (grist_pre_restart_container_inspect.stdout | default('[]')) | from_json
        )
        | map(attribute='Name')
        | map('regex_replace', '^/', '')
        | list
      }}
  when: grist_docker_nat_chain.rc != 0

- name: Restore Docker networking when the nat chain is missing before Grist startup
  ansible.builtin.service:
    name: docker
    state: restarted
  when: grist_docker_nat_chain.rc != 0

- name: Recheck the Docker nat chain before Grist startup
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - nat
      - -S
      - DOCKER
  register: grist_docker_nat_chain_recheck
  changed_when: false
  failed_when: grist_docker_nat_chain_recheck.rc not in [0, 1]
  retries: 10
  delay: 2
  until: grist_docker_nat_chain_recheck.rc == 0
  when: grist_docker_nat_chain.rc != 0

- name: Wait for the Docker daemon to answer after networking recovery
  ansible.builtin.command:
    argv:
      - docker
      - info
      - --format
      - '{{ "{{.ServerVersion}}" }}'
  register: grist_docker_info
  changed_when: false
  retries: 10
  delay: 2
  until: grist_docker_info.rc == 0
  when: grist_docker_nat_chain.rc != 0

- name: Re-inspect pre-restart containers after the Grist-triggered Docker restart
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json
        import subprocess
        import sys

        container_names = json.load(sys.stdin)
        statuses = []

        for container_name in container_names:
            result = subprocess.run(
                ["docker", "inspect", container_name],
                text=True,
                capture_output=True,
            )
            if result.returncode == 0:
                payload = json.loads(result.stdout or "[]")
                container = payload[0] if payload else {}
                statuses.append(
                    {
                        "requested_name": container_name,
                        "full_name": container.get("Name") or f"/{container_name}",
                        "exists": True,
                        "running": bool(container.get("State", {}).get("Running")),
                    }
                )
                continue

            stderr = (result.stderr or "").lower()
            if "no such object" in stderr:
                statuses.append(
                    {
                        "requested_name": container_name,
                        "full_name": f"/{container_name}",
                        "exists": False,
                        "running": False,
                    }
                )
                continue

            raise subprocess.CalledProcessError(
                result.returncode,
                result.args,
                output=result.stdout,
                stderr=result.stderr,
            )

        print(json.dumps(statuses))
    stdin: "{{ grist_pre_restart_container_names | default([]) | to_json }}"
  register: grist_post_restart_container_status
  changed_when: false
  when:
    - grist_docker_nat_chain.rc != 0
    - grist_pre_restart_container_names | default([]) | length > 0

- name: Record pre-restart containers that remained stopped after the Grist-triggered Docker restart
  ansible.builtin.set_fact:
    grist_stopped_pre_restart_container_details: >-
      {{
        (
          grist_pre_restart_container_details | default([])
        )
        | rejectattr(
            'Name',
            'in',
            (
              (
                grist_post_restart_container_status.stdout | default('[]')
              )
              | from_json
              | selectattr('exists')
              | selectattr('running')
              | map(attribute='full_name')
              | list
            )
          )
        | list
      }}
    grist_stopped_pre_restart_container_names: >-
      {{
        (
          (
            grist_pre_restart_container_details | default([])
          )
          | rejectattr(
              'Name',
              'in',
              (
                (
                  grist_post_restart_container_status.stdout | default('[]')
                )
                | from_json
                | selectattr('exists')
                | selectattr('running')
                | map(attribute='full_name')
                | list
              )
            )
          | list
        )
        | map(attribute='Name')
        | map('regex_replace', '^/', '')
        | list
      }}
  when: grist_docker_nat_chain.rc != 0

- name: Recover pre-restart containers that remained stopped after the Grist-triggered Docker restart
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json
        import subprocess
        import sys
        import time
        import urllib.error
        import urllib.request

        TRANSIENT_DOCKER_NETWORK_ERRORS = (
            "No chain/target/match by that name",
            "driver failed programming external connectivity",
        )
        STALE_COMPOSE_ENDPOINT_ERRORS = (
            "failed to create endpoint",
            "does not exist",
        )
        OPENBAO_HEALTH_URL = "http://127.0.0.1:8201/v1/sys/health"
        OPENBAO_READY_STATUS_CODES = {200, 429}


        def combined_output(stdout, stderr):
            parts = []
            if stderr:
                parts.append(stderr)
            if stdout:
                parts.append(stdout)
            return "\n".join(part for part in parts if part)


        def exception_output(exc):
            return combined_output(getattr(exc, "output", ""), getattr(exc, "stderr", ""))


        def run_with_retry(command, cwd=None, attempts=3, delay_seconds=3, retry_on_any_error=False):
            for attempt in range(1, attempts + 1):
                result = subprocess.run(command, cwd=cwd, text=True, capture_output=True)
                if result.returncode == 0:
                    return

                output = combined_output(result.stdout or "", result.stderr or "")
                retryable = retry_on_any_error or any(
                    marker in output for marker in TRANSIENT_DOCKER_NETWORK_ERRORS
                )
                if (
                    attempt == attempts
                    or not retryable
                ):
                    raise subprocess.CalledProcessError(
                        result.returncode,
                        command,
                        output=result.stdout,
                        stderr=output,
                    )

                time.sleep(delay_seconds)


        def wait_for_local_openbao(*, timeout_seconds=60, delay_seconds=2):
            deadline = time.monotonic() + timeout_seconds
            last_error = ""
            while time.monotonic() < deadline:
                try:
                    with urllib.request.urlopen(OPENBAO_HEALTH_URL, timeout=5) as response:
                        if response.status in OPENBAO_READY_STATUS_CODES:
                            return
                        last_error = f"unexpected HTTP {response.status}"
                except urllib.error.HTTPError as exc:
                    if exc.code in OPENBAO_READY_STATUS_CODES:
                        return
                    last_error = f"HTTP {exc.code}"
                except OSError as exc:
                    last_error = str(exc)
                time.sleep(delay_seconds)

            raise RuntimeError(
                f"local OpenBao did not become ready at {OPENBAO_HEALTH_URL}: {last_error or 'timed out'}"
            )

        containers = json.load(sys.stdin)

        direct_start = []
        compose_groups = {}

        for container in containers:
            name = (container.get("Name") or "").lstrip("/")
            labels = container.get("Config", {}).get("Labels") or {}
            working_dir = labels.get("com.docker.compose.project.working_dir") or ""
            config_files = labels.get("com.docker.compose.project.config_files") or ""
            service = labels.get("com.docker.compose.service") or ""

            if working_dir and service:
                compose_group = compose_groups.setdefault(
                    (working_dir, config_files),
                    {"services": set(), "container_names": set()},
                )
                compose_group["services"].add(service)
                if name:
                    compose_group["container_names"].add(name)
                continue

            if name:
                direct_start.append(name)

        actions = []

        if direct_start:
            run_with_retry(["docker", "start", *direct_start])
            actions.append({"type": "docker_start", "containers": direct_start})

        def is_local_openbao_group(working_dir, config_files, services, container_names):
            normalized_working_dir = (working_dir or "").rstrip("/")
            config_file_list = [value for value in config_files.split(",") if value]
            return (
                normalized_working_dir == "/opt/openbao"
                or any(
                    config_file.rstrip("/") == "/opt/openbao/docker-compose.yml"
                    for config_file in config_file_list
                )
                or "openbao" in services
                or "lv3-openbao" in container_names
            )

        for (working_dir, config_files), compose_group in sorted(
            compose_groups.items(),
            key=lambda item: (
                0
                if is_local_openbao_group(
                    item[0][0],
                    item[0][1],
                    item[1]["services"],
                    item[1]["container_names"],
                )
                else 1,
                item[0][0],
                item[0][1],
            ),
        ):
            command = ["docker", "compose"]
            config_file_list = [value for value in config_files.split(",") if value]
            for config_file in config_file_list:
                command.extend(["--file", config_file])
            services = sorted(compose_group["services"])
            container_names = sorted(compose_group["container_names"])
            local_openbao_group = is_local_openbao_group(
                working_dir,
                config_files,
                services,
                container_names,
            )
            if "openbao-agent" in services and not local_openbao_group:
                wait_for_local_openbao()
            command.extend(["up", "-d", "--force-recreate", *services])

            try:
                run_with_retry(
                    command,
                    cwd=working_dir or None,
                    attempts=5,
                    delay_seconds=5,
                    retry_on_any_error=True,
                )
                actions.append(
                    {
                        "type": "docker_compose_up",
                        "working_dir": working_dir,
                        "config_files": config_file_list,
                        "services": services,
                    }
                )
            except subprocess.CalledProcessError as exc:
                stderr = exception_output(exc)
                if not (
                    container_names
                    and all(marker in stderr for marker in STALE_COMPOSE_ENDPOINT_ERRORS)
                ):
                    raise

                remove_command = ["docker", "rm", "-f", *container_names]
                remove_result = subprocess.run(remove_command, text=True, capture_output=True)
                if remove_result.returncode != 0 and "No such container" not in (remove_result.stderr or ""):
                    raise subprocess.CalledProcessError(
                        remove_result.returncode,
                        remove_command,
                        output=remove_result.stdout,
                        stderr=remove_result.stderr,
                    ) from exc
                actions.append(
                    {
                        "type": "docker_rm_stale_compose_containers",
                        "working_dir": working_dir,
                        "config_files": config_file_list,
                        "containers": container_names,
                    }
                )

                recovery_command = ["docker", "compose"]
                for config_file in config_file_list:
                    recovery_command.extend(["--file", config_file])
                if "openbao-agent" in services and not local_openbao_group:
                    wait_for_local_openbao()
                recovery_command.extend(["up", "-d", "--force-recreate", *services])
                try:
                    run_with_retry(
                        recovery_command,
                        cwd=working_dir or None,
                        attempts=5,
                        delay_seconds=5,
                        retry_on_any_error=True,
                    )
                    actions.append(
                        {
                            "type": "docker_compose_up_force_recreate",
                            "working_dir": working_dir,
                            "config_files": config_file_list,
                            "services": services,
                        }
                    )
                    continue
                except subprocess.CalledProcessError as recovery_exc:
                    recovery_stderr = exception_output(recovery_exc)
                    if not all(marker in recovery_stderr for marker in STALE_COMPOSE_ENDPOINT_ERRORS):
                        raise

                down_command = ["docker", "compose"]
                for config_file in config_file_list:
                    down_command.extend(["--file", config_file])
                down_command.extend(["down", "--remove-orphans"])
                run_with_retry(down_command, cwd=working_dir or None)
                actions.append(
                    {
                        "type": "docker_compose_down_remove_orphans",
                        "working_dir": working_dir,
                        "config_files": config_file_list,
                        "services": services,
                    }
                )

                final_up_command = ["docker", "compose"]
                for config_file in config_file_list:
                    final_up_command.extend(["--file", config_file])
                if "openbao-agent" in services and not local_openbao_group:
                    wait_for_local_openbao()
                final_up_command.extend(["up", "-d", *services])
                run_with_retry(
                    final_up_command,
                    cwd=working_dir or None,
                    attempts=5,
                    delay_seconds=5,
                    retry_on_any_error=True,
                )
                actions.append(
                    {
                        "type": "docker_compose_up_after_down",
                        "working_dir": working_dir,
                        "config_files": config_file_list,
                        "services": services,
                    }
                )

        print(json.dumps({"actions": actions}))
    stdin: "{{ (grist_stopped_pre_restart_container_details | default([])) | to_json }}"
  register: grist_recover_stopped_containers
  changed_when: grist_stopped_pre_restart_container_names | length > 0
  when:
    - grist_docker_nat_chain.rc != 0
    - grist_stopped_pre_restart_container_names | default([]) | length > 0

- name: Confirm pre-restart containers recovered after the Grist-triggered Docker restart
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json
        import subprocess
        import sys

        NONPERSISTENT_RESTART_POLICIES = {"", "no"}

        containers = json.load(sys.stdin)
        statuses = []
        all_running = True

        for container in containers:
            container_name = (container.get("Name") or "").lstrip("/")
            restart_policy = (container.get("HostConfig") or {}).get("RestartPolicy") or {}
            restart_policy_name = str(restart_policy.get("Name") or "").strip().lower()
            require_running = restart_policy_name not in NONPERSISTENT_RESTART_POLICIES
            result = subprocess.run(
                ["docker", "inspect", container_name],
                text=True,
                capture_output=True,
            )
            if result.returncode == 0:
                payload = json.loads(result.stdout or "[]")
                live_container = payload[0] if payload else {}
                state = live_container.get("State", {})
                running = bool(state.get("Running"))
                status = str(state.get("Status") or "")
                exit_code = state.get("ExitCode")
                healthy = running or (
                    not require_running
                    and status == "exited"
                    and exit_code == 0
                )
                if require_running and not running:
                    all_running = False
                statuses.append(
                    {
                        "container": container_name,
                        "running": running,
                        "restart_policy": restart_policy_name,
                        "status": status,
                        "exit_code": exit_code,
                        "healthy": healthy,
                    }
                )
                continue

            statuses.append(
                {
                    "container": container_name,
                    "running": False,
                    "restart_policy": restart_policy_name,
                    "status": "missing",
                    "exit_code": None,
                    "healthy": False,
                }
            )
            if require_running:
                all_running = False

        print(json.dumps(statuses))
        sys.exit(0 if all_running else 1)
    stdin: "{{ grist_pre_restart_container_details | default([]) | to_json }}"
  register: grist_recovered_container_inspect
  changed_when: false
  retries: 12
  delay: 5
  until: grist_recovered_container_inspect.rc == 0
  when:
    - grist_docker_nat_chain.rc != 0
    - grist_pre_restart_container_details | default([]) | length > 0

- name: Assert Docker nat chain is present before Grist startup
  ansible.builtin.assert:
    that:
      - grist_docker_nat_chain.rc == 0 or grist_docker_nat_chain_recheck.rc == 0
    fail_msg: "Docker is running but the nat DOCKER chain is missing; Grist published ports will fail."

- name: Wait for the Keycloak issuer discovery document before Grist startup
  ansible.builtin.uri:
    url: "{{ grist_keycloak_issuer }}/.well-known/openid-configuration"
    method: GET
    status_code: 200
    return_content: true
  register: grist_keycloak_discovery
  retries: 18
  delay: 5
  until: >-
    grist_keycloak_discovery.status == 200
    and ((grist_keycloak_discovery.json | default({})).issuer | default('')) == grist_keycloak_issuer
  changed_when: false

- name: Check whether the Grist local port is already published
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ grist_internal_port }}"
    delay: 0
    timeout: 1
  register: grist_local_port_probe
  changed_when: false
  failed_when: false

- name: Check whether the current Grist local status endpoint is healthy before startup
  ansible.builtin.uri:
    url: "{{ grist_internal_base_url }}/status"
    method: GET
    status_code: 200
  register: grist_status_probe
  changed_when: false
  failed_when: false

- name: Record whether the Grist startup needs a force recreate
  ansible.builtin.set_fact:
    grist_force_recreate: >-
      {{
        grist_docker_nat_chain.rc != 0
        or (grist_env_template.changed | default(false))
        or (grist_compose_template.changed | default(false))
        or (grist_pull.changed | default(false))
        or (grist_local_port_probe.failed | default(false))
        or (grist_status_probe.status | default(0)) != 200
      }}

- name: Remove stale Grist compose replacement containers before recovery
  ansible.builtin.shell: |
    set -euo pipefail
    stale_ids="$(docker ps -aq \
      --filter label=com.docker.compose.project={{ grist_site_dir | basename }} \
      --filter label=com.docker.compose.replace)"
    if [ -n "$stale_ids" ]; then
      docker rm -f $stale_ids
      echo changed
    fi
  args:
    chdir: "{{ grist_site_dir }}"
    executable: /bin/bash
  register: grist_replace_cleanup
  changed_when: "'changed' in grist_replace_cleanup.stdout"
  when: grist_force_recreate | bool

- name: Force-recreate the Grist OpenBao agent after Docker networking recovery
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ grist_compose_file }}"
      - up
      - -d
      - --force-recreate
      - openbao-agent
  args:
    chdir: "{{ grist_site_dir }}"
  register: grist_openbao_agent_up
  changed_when: >-
    'Creating' in grist_openbao_agent_up.stdout
    or 'Recreating' in grist_openbao_agent_up.stdout
    or 'Starting' in grist_openbao_agent_up.stdout
    or 'Running' in grist_openbao_agent_up.stdout
  failed_when: false
  retries: 3
  delay: 5
  until: grist_openbao_agent_up.rc == 0
  when: grist_force_recreate | bool

- name: Wait for the Grist runtime env file after OpenBao agent recovery
  ansible.builtin.shell: |
    set -euo pipefail
    test -s "{{ grist_env_file }}"
    grep -Fq 'GRIST_SESSION_SECRET=' "{{ grist_env_file }}"
  args:
    chdir: "{{ grist_site_dir }}"
    executable: /bin/bash
  register: grist_runtime_env_contract
  retries: 24
  delay: 5
  until: grist_runtime_env_contract.rc == 0
  changed_when: false
  no_log: true
  when: grist_force_recreate | bool

- name: Force-recreate the Grist runtime stack after Docker networking recovery
  ansible.builtin.shell: |
    set -euo pipefail
    for attempt in $(seq 1 3); do
      if docker compose --file "{{ grist_compose_file }}" up -d --force-recreate --no-deps grist; then
        exit 0
      fi

      stale_ids="$(docker ps -aq \
        --filter label=com.docker.compose.project={{ grist_site_dir | basename }} \
        --filter label=com.docker.compose.service=grist)"
      if [ -n "$stale_ids" ]; then
        docker rm -f $stale_ids || true
      fi

      stale_replace_ids="$(docker ps -aq \
        --filter label=com.docker.compose.project={{ grist_site_dir | basename }} \
        --filter label=com.docker.compose.replace)"
      if [ -n "$stale_replace_ids" ]; then
        docker rm -f $stale_replace_ids || true
      fi

      sleep 5
    done
    exit 1
  args:
    chdir: "{{ grist_site_dir }}"
    executable: /bin/bash
  register: grist_force_recreate_up
  changed_when: >-
    'Creating' in grist_force_recreate_up.stdout
    or 'Recreating' in grist_force_recreate_up.stdout
    or 'Starting' in grist_force_recreate_up.stdout
  failed_when: false
  when: grist_force_recreate | bool

- name: Flag stale Grist compose-network failures during force-recreate
  ansible.builtin.set_fact:
    grist_force_recreate_network_missing: >-
      {{
        (grist_force_recreate_up.rc | default(0)) != 0
        and 'failed to create endpoint' in (grist_force_recreate_up.stderr | default(''))
        and 'does not exist' in (grist_force_recreate_up.stderr | default(''))
      }}
  when: grist_force_recreate | bool

- name: Surface unexpected Grist force-recreate failures
  ansible.builtin.fail:
    msg: >-
      {{
        grist_force_recreate_up.stderr
        | default(grist_force_recreate_up.msg | default('grist compose force-recreate failed'))
      }}
  when:
    - grist_force_recreate | bool
    - (grist_force_recreate_up.rc | default(0)) != 0
    - not (grist_force_recreate_network_missing | default(false))

- name: Reset stale Grist compose resources before retrying force-recreate
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ grist_compose_file }}"
      - down
      - --remove-orphans
  args:
    chdir: "{{ grist_site_dir }}"
  register: grist_force_recreate_down
  changed_when: >-
    'Stopping' in (grist_force_recreate_down.stdout | default(''))
    or 'Removing' in (grist_force_recreate_down.stdout | default(''))
    or 'Removing' in (grist_force_recreate_down.stderr | default(''))
  failed_when: false
  when: grist_force_recreate_network_missing | default(false)

- name: Remove the stale Grist compose network before retrying force-recreate
  ansible.builtin.shell: |
    set -euo pipefail
    stale_networks="$(docker network ls -q --filter name=^{{ grist_site_dir | basename }}_default$)"
    if [ -n "${stale_networks}" ]; then
      docker network rm ${stale_networks}
      echo changed
    fi
  args:
    chdir: "{{ grist_site_dir }}"
    executable: /bin/bash
  register: grist_force_recreate_network_cleanup
  changed_when: "'changed' in grist_force_recreate_network_cleanup.stdout"
  when: grist_force_recreate_network_missing | default(false)

- name: Restart Docker to restore bridge networking before retrying Grist force-recreate
  ansible.builtin.service:
    name: docker
    state: restarted
  when: grist_force_recreate_network_missing | default(false)

- name: Ensure Docker bridge networking chains are present before retrying Grist force-recreate
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: docker_bridge_chains
  vars:
    common_docker_bridge_chains_service_name: docker
    common_docker_bridge_chains_require_nat_chain: true
  when: grist_force_recreate_network_missing | default(false)

- name: Retry Grist force-recreate after Docker networking recovery
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ grist_compose_file }}"
      - up
      - -d
      - --force-recreate
      - --remove-orphans
  args:
    chdir: "{{ grist_site_dir }}"
  register: grist_force_recreate_retry
  changed_when: true
  when: grist_force_recreate_network_missing | default(false)

- name: Start the Grist runtime stack when a force recreate is not needed
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ grist_compose_file }}"
      - up
      - -d
      - --remove-orphans
  args:
    chdir: "{{ grist_site_dir }}"
  register: grist_up
  changed_when: >-
    'Creating' in grist_up.stdout
    or 'Recreating' in grist_up.stdout
    or 'Starting' in grist_up.stdout
  when: not (grist_force_recreate | bool)

- name: Wait for Grist to listen locally
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ grist_internal_port }}"
    delay: 0
    timeout: 180

- name: Verify the Grist runtime
  ansible.builtin.import_tasks: verify.yml
