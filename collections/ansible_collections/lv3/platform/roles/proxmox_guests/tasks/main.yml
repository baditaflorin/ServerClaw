---
- name: Validate Proxmox guest provisioning inputs
  ansible.builtin.assert:
    that:
      - proxmox_storage_id | length > 0
      - proxmox_internal_bridge | length > 0
      - proxmox_vm_templates | length > 0
      - (proxmox_guests_active | default(proxmox_guests, true)) | length > 0
    fail_msg: "proxmox_guests requires template catalog, storage, bridge, and guest inventory inputs."

- name: Ensure snippets directory exists
  ansible.builtin.file:
    path: /var/lib/vz/snippets
    state: directory
    mode: "0755"

- name: Validate each guest references a declared template
  ansible.builtin.assert:
    that:
      - item.template_key is defined
      - item.template_key in proxmox_vm_templates
      - proxmox_vm_templates[item.template_key].vmid is defined
    fail_msg: "Each guest must declare template_key present in proxmox_vm_templates."
  loop: "{{ proxmox_guests_active | default(proxmox_guests, true) }}"
  loop_control:
    label: "{{ item.name }}"

- name: Discover currently available Proxmox template VMIDs
  ansible.builtin.command:
    argv:
      - pvesh
      - get
      - /cluster/resources
      - --type
      - vm
      - --output-format
      - json
  register: proxmox_cluster_vm_resources
  changed_when: false

- name: Record currently available Proxmox template VMIDs
  ansible.builtin.set_fact:
    proxmox_available_template_vmids: >-
      {{
        proxmox_cluster_vm_resources.stdout
        | from_json
        | selectattr('template', 'defined')
        | selectattr('template', 'equalto', 1)
        | map(attribute='vmid')
        | map('int')
        | list
      }}

- name: Resolve template VMIDs against currently available templates
  ansible.builtin.set_fact:
    proxmox_resolved_template_vmids: >-
      {{
        proxmox_resolved_template_vmids | default({}) | combine({
          item.key: (
            item.value.vmid
            if (item.value.vmid | int) in proxmox_available_template_vmids
            else (
              proxmox_vm_templates[item.value.source_template].vmid
              if (
                item.value.source_template is defined
                and item.value.source_template in proxmox_vm_templates
                and (proxmox_vm_templates[item.value.source_template].vmid | int) in proxmox_available_template_vmids
              )
              else item.value.vmid
            )
          )
        })
      }}
  loop: "{{ proxmox_vm_templates | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Report template fallbacks when specialized templates are unavailable
  ansible.builtin.debug:
    msg: >-
      Template {{ item.key }} (VMID {{ item.value.vmid }}) is unavailable on this
      Proxmox host; provisioning will fall back to source template
      {{ item.value.source_template }} (VMID {{ proxmox_resolved_template_vmids[item.key] }}).
  when:
    - item.value.source_template is defined
    - (item.value.vmid | int) != (proxmox_resolved_template_vmids[item.key] | int)
  loop: "{{ proxmox_vm_templates | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Assert each guest resolves to an available template VMID
  ansible.builtin.assert:
    that:
      - (proxmox_resolved_template_vmids[item.template_key] | int) in proxmox_available_template_vmids
    fail_msg: >-
      Guest {{ item.name }} template {{ item.template_key }} does not resolve to a
      live Proxmox template VMID. Resolved VMID:
      {{ proxmox_resolved_template_vmids[item.template_key] | default('undefined') }}.
      Available template VMIDs: {{ proxmox_available_template_vmids | join(', ') }}.
  loop: "{{ proxmox_guests_active | default(proxmox_guests, true) }}"
  loop_control:
    label: "{{ item.name }}"

- name: Build failure-domain live label map
  ansible.builtin.set_fact:
    proxmox_failure_domain_live_labels: >-
      {{
        dict(
          (platform_failure_domains | default([]) | map(attribute='id'))
          | zip(platform_failure_domains | default([]) | map(attribute='live_label'))
        )
      }}

- name: Render cloud-init user-data snippets for guests
  ansible.builtin.template:
    src: user-data.yml.j2
    dest: "/var/lib/vz/snippets/{{ item.name }}-user-data.yml"
    mode: "0644"
  loop: "{{ proxmox_guests_active | default(proxmox_guests, true) }}"
  loop_control:
    label: "{{ item.name }}"

- name: Check which guest VMs already exist
  ansible.builtin.command: "qm status {{ item.vmid }}"
  register: proxmox_guest_status
  failed_when: false
  changed_when: false
  loop: "{{ proxmox_guests_active | default(proxmox_guests, true) }}"
  loop_control:
    label: "{{ item.name }}"

- name: Read current guest configurations
  ansible.builtin.command: "qm config {{ item.vmid }}"
  register: proxmox_guest_config
  failed_when: false
  changed_when: false
  loop: "{{ proxmox_guests_active | default(proxmox_guests, true) }}"
  loop_control:
    label: "{{ item.name }}"

- name: Clone guest VMs from template
  ansible.builtin.command:
    argv:
      - qm
      - clone
      - "{{ proxmox_resolved_template_vmids[item.item.template_key] | string }}"
      - "{{ item.item.vmid | string }}"
      - --name
      - "{{ item.item.name }}"
      - --full
      - "1"
      - --storage
      - "{{ proxmox_storage_id }}"
      - --format
      - qcow2
  loop: "{{ proxmox_guest_status.results }}"
  when: item.rc != 0
  changed_when: true
  loop_control:
    label: "{{ item.item.name }}"

- name: Resize guest disks on first clone
  ansible.builtin.command:
    argv:
      - qm
      - resize
      - "{{ item.item.vmid | string }}"
      - scsi0
      - "{{ item.item.disk_gb }}G"
  loop: "{{ proxmox_guest_status.results }}"
  when: item.rc != 0
  changed_when: true
  loop_control:
    label: "{{ item.item.name }}"

- name: Apply guest hardware and cloud-init settings
  ansible.builtin.command:
    argv:
      - qm
      - set
      - "{{ item.vmid | string }}"
      - --cpu
      - host
      - --cores
      - "{{ item.cores | string }}"
      - --memory
      - "{{ item.memory_mb | string }}"
      - --balloon
      - "0"
      - --agent
      - enabled=1,fstrim_cloned_disks=1
      - --onboot
      - "1"
      - --tags
      - "{{ ((item.tags | default([])) + proxmox_guest_policy_tags) | unique | join(';') }}"
      - --net0
      - >-
        virtio{% if item.macaddr is defined %}={{ item.macaddr }}{% endif %},bridge={{ proxmox_internal_bridge }}
      - --ipconfig0
      - "ip={{ item.ipv4 }}/{{ item.cidr }},gw={{ item.gateway4 }}"
      - --nameserver
      - "{{ proxmox_guest_nameserver }}"
      - --searchdomain
      - "{{ proxmox_guest_searchdomain }}"
      - --cicustom
      - "user={{ proxmox_snippets_storage_id }}:snippets/{{ item.name }}-user-data.yml"
      - --description
      - "{{ item.role }} VM for {{ platform_domain }} platform"
  loop: "{{ proxmox_guests_active | default(proxmox_guests, true) }}"
  changed_when: true
  vars:
    proxmox_guest_policy_tags: >-
      {{
        (
          [proxmox_failure_domain_live_labels[item.placement.failure_domain]]
          + ['pc-' ~ item.placement.placement_class]
          + [
            'aag-'
            ~ (
              item.placement.anti_affinity_group
              | lower
              | regex_replace('[^a-z0-9]+', '-')
              | regex_replace('(^-+|-+$)', '')
            )
          ]
          + (
            ['exc-same-domain']
            if (item.placement.co_location_exceptions | default([]) | length > 0)
            else []
          )
        )
        if item.placement is defined
        else []
      }}
  loop_control:
    label: "{{ item.name }}"

- name: Attach additional guest disks when declared
  ansible.builtin.command:
    argv:
      - qm
      - set
      - "{{ item.0.vmid | string }}"
      - "--{{ item.1.interface }}"
      - "{{ item.1.storage | default(proxmox_storage_id) }}:{{ item.1.size_gb }}"
  loop: "{{ (proxmox_guests_active | default(proxmox_guests, true)) | subelements('extra_disks', skip_missing=True) }}"
  changed_when: true
  loop_control:
    label: "{{ item.0.name }} {{ item.1.interface }}"
  when: >
    (
      proxmox_guest_config.results
      | selectattr('item.vmid', 'equalto', item.0.vmid)
      | list
      | first
    ).stdout is not search('(?m)^' ~ item.1.interface ~ ':')

- name: Refresh cloud-init seed data after guest config changes
  ansible.builtin.command:
    argv:
      - qm
      - cloudinit
      - update
      - "{{ item.vmid | string }}"
  loop: "{{ proxmox_guests_active | default(proxmox_guests, true) }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: true

- name: Start guest VMs
  ansible.builtin.command: "qm start {{ item.vmid }}"
  register: proxmox_guest_start
  failed_when: proxmox_guest_start.rc not in [0, 255]
  changed_when: proxmox_guest_start.rc == 0
  loop: "{{ proxmox_guests_active | default(proxmox_guests, true) }}"
  loop_control:
    label: "{{ item.name }}"
