---
- name: Systemd daemon-reload
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart Docker
  ansible.builtin.shell: |
    set -euo pipefail
    restart_rc=0
    systemctl reset-failed docker.service
    if systemctl restart docker.service; then
      restart_rc=0
    else
      restart_rc=$?
    fi
    for attempt in $(seq 1 15); do
      if systemctl is-active --quiet docker.service; then
        exit 0
      fi
      sleep 2
    done
    systemctl status docker.service --no-pager -l || true
    exit "${restart_rc:-1}"
  args:
    executable: /bin/bash

- name: Reload Nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded

- name: Restart generic service
  ansible.builtin.systemd:
    name: "{{ common_handlers_service_name }}"
    state: restarted
  when: common_handlers_service_name | length > 0
