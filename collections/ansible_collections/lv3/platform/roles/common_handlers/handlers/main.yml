---
- name: Systemd daemon-reload
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart Docker
  ansible.builtin.shell: |
    set -euo pipefail
    systemctl reset-failed docker.service
    systemctl restart docker.service
  args:
    executable: /bin/bash

- name: Reload Nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded

- name: Restart generic service
  ansible.builtin.systemd:
    name: "{{ common_handlers_service_name }}"
    state: restarted
  when: common_handlers_service_name | length > 0
