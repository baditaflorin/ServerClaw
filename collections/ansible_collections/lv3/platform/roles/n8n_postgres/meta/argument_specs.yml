---
argument_specs:
  main:
    short_description: Provision the PostgreSQL role and database required by n8n.
    options:
      n8n_database_name:
        type: str
        required: true
      n8n_database_user:
        type: str
        required: true
      n8n_postgres_secret_dir:
        type: path
        required: true
      n8n_postgres_password_file:
        type: path
        required: true
      n8n_local_artifact_dir:
        type: path
        required: true
      n8n_database_password_local_file:
        type: path
        required: true
