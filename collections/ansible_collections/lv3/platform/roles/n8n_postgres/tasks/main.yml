---
# Purpose: Provision the n8n PostgreSQL database using the shared postgres_client role (ADR 0359).
# Use case: Called during n8n deployment to ensure the database, role, and credentials exist.
# Inputs: n8n_* variables from defaults/main.yml; resolves registry entry from platform_postgres_clients.
# Outputs: n8n PostgreSQL role, database, and credential files converged on postgres-lv3.
# Idempotency: Yes; postgres_client role handles all idempotency.
# Dependencies: ADR 0359 postgres_client role, platform_postgres_clients registry.
- name: Provision the n8n database via the shared postgres_client role
  ansible.builtin.include_role:
    name: lv3.platform.postgres_client
  vars:
    postgres_client_service: "{{ n8n_database_name }}"
    postgres_client_database: "{{ n8n_database_name }}"
    postgres_client_user: "{{ n8n_database_user }}"
    postgres_client_password_local_file: "{{ n8n_database_password_local_file }}"
    postgres_client_password_remote_dir: "{{ n8n_postgres_secret_dir }}"
    postgres_client_password_remote_file: "{{ n8n_postgres_password_file }}"
