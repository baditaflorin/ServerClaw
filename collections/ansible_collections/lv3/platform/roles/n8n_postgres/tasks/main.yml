---
- name: Validate n8n PostgreSQL inputs
  ansible.builtin.assert:
    that:
      - n8n_database_name | length > 0
      - n8n_database_user | length > 0
      - n8n_postgres_secret_dir | length > 0
      - n8n_postgres_password_file | length > 0
      - n8n_database_password_local_file | length > 0
    fail_msg: "n8n_postgres requires database names and local or remote password paths."

- name: Ensure the n8n PostgreSQL secret directory exists
  ansible.builtin.file:
    path: "{{ n8n_postgres_secret_dir }}"
    state: directory
    owner: root
    group: postgres
    mode: "0750"

- name: Ensure the local n8n artifact directory exists
  ansible.builtin.file:
    path: "{{ n8n_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate the n8n database password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ n8n_database_password_local_file }}" ]; then
      umask 077
      openssl rand -base64 24 | tr -d '\n' > "{{ n8n_database_password_local_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: n8n_postgres_password_generation
  changed_when: "'changed' in n8n_postgres_password_generation.stdout"
  no_log: true

- name: Read the n8n database password
  ansible.builtin.slurp:
    src: "{{ n8n_database_password_local_file }}"
  delegate_to: localhost
  become: false
  register: n8n_postgres_password_raw
  no_log: true

- name: Record the n8n database password
  ansible.builtin.set_fact:
    n8n_database_password: "{{ n8n_postgres_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Mirror the n8n database password to the control machine
  ansible.builtin.copy:
    dest: "{{ n8n_database_password_local_file }}"
    content: "{{ n8n_database_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Persist the n8n database password on the current guest
  ansible.builtin.copy:
    dest: "{{ n8n_postgres_password_file }}"
    content: "{{ n8n_database_password }}\n"
    owner: root
    group: postgres
    mode: "0640"
  no_log: true

- name: Check whether the local PostgreSQL member is writable
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT CASE WHEN pg_is_in_recovery() THEN 0 ELSE 1 END"
  register: n8n_postgres_writable_check
  changed_when: false

- name: Check whether the n8n database role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ n8n_database_user }}'"
  register: n8n_postgres_role_check
  changed_when: false
  when: n8n_postgres_writable_check.stdout | trim == "1"

- name: Create the n8n database role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE ROLE {{ n8n_database_user }} LOGIN PASSWORD '{{ n8n_database_password }}'"
  changed_when: true
  no_log: true
  when:
    - n8n_postgres_writable_check.stdout | trim == "1"
    - n8n_postgres_role_check.stdout != "1"

- name: Check whether the n8n PostgreSQL database already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_database WHERE datname = '{{ n8n_database_name }}'"
  register: n8n_postgres_database_check
  changed_when: false
  when: n8n_postgres_writable_check.stdout | trim == "1"

- name: Create the n8n PostgreSQL database
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE DATABASE {{ n8n_database_name }} OWNER {{ n8n_database_user }}"
  when:
    - n8n_postgres_writable_check.stdout | trim == "1"
    - n8n_postgres_database_check.stdout != "1"
  changed_when: true

- name: Ensure the n8n database owner is correct
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER DATABASE {{ n8n_database_name }} OWNER TO {{ n8n_database_user }}"
  changed_when: false
  when: n8n_postgres_writable_check.stdout | trim == "1"
