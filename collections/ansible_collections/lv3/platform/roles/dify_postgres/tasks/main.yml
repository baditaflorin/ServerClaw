---
# Purpose: Provision the dify PostgreSQL database using the shared postgres_client role (ADR 0359).
# Use case: Called during dify deployment to ensure the database, role, and credentials exist.
# Inputs: dify_* variables from defaults/main.yml; resolves registry entry from platform_postgres_clients.
# Outputs: dify PostgreSQL role, database, and credential files converged on postgres.
# Idempotency: Yes; postgres_client role handles all idempotency.
# Dependencies: ADR 0359 postgres_client role, platform_postgres_clients registry.
- name: Provision the dify database via the shared postgres_client role
  ansible.builtin.include_role:
    name: lv3.platform.postgres_client
  vars:
    postgres_client_service: "{{ dify_database_name }}"
    postgres_client_database: "{{ dify_database_name }}"
    postgres_client_user: "{{ dify_database_user }}"
    postgres_client_password_local_file: "{{ dify_database_password_local_file }}"
    postgres_client_password_remote_dir: "{{ dify_postgres_secret_dir }}"
    postgres_client_password_remote_file: "{{ dify_postgres_password_file }}"
