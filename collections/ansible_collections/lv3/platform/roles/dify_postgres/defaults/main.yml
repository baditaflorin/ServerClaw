# Purpose: Define the default PostgreSQL database, role, and credential paths used by Dify.
# Use case: Loaded whenever the Dify PostgreSQL role provisions or verifies the backing database.
# Inputs: May be overridden by inventory or playbook variables when Dify database naming changes.
# Outputs: Supplies stable defaults for the Dify database bootstrap tasks.
# Idempotency: Fully idempotent because this file only declares role defaults.
# Dependencies: ADR 0165, ADR 0197, ADR 0359.
---
dify_database_name: dify
dify_database_user: dify
dify_postgres_password_file: "{{ dify_postgres_secret_dir }}/database-password"
dify_database_password_local_file: "{{ repo_shared_root }}/.local/dify/database-password.txt"
