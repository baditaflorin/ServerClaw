---
# NOTE: Conventional variables (site_dir, image, compose_file, env_file,
# openbao_*, container_name, internal_port, local_artifact_dir) are derived
# from platform_service_registry — ADR 0373.
# Purpose: Declare the shared defaults for converging the Vikunja runtime, bootstrap artifacts, and controller access paths.
# Use case: Used whenever the vikunja_runtime role renders the Vikunja stack, secrets, and validation commands.
#
# Inputs (required):
#   - platform service topology (generated, required): Supplies Vikunja hostnames, URLs, and assigned ports.
#   - container image catalog (generated, required): Supplies pinned Vikunja image references.
#
# Outputs:
#   - Default variable values consumed by the Vikunja runtime role tasks and templates.
#
# Idempotency: Fully idempotent
#              This file only declares role defaults.
#
# Dependencies:
#   - ADR 0286: Defines the Vikunja runtime, alert integration, and controller lane.
#   - Requires: Generated topology and image catalog facts to be current.
#   - Role: vikunja_runtime — converges the Vikunja compose stack and bootstrap flow.
#
# Related ADRs: 0165, 0286
# Related Runbooks: docs/runbooks/configure-vikunja.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-30
vikunja_service_topology: "{{ hostvars[platform_topology_host].lv3_service_topology | service_topology_get('vikunja') }}"
vikunja_files_dir: "{{ vikunja_data_dir }}/files"
vikunja_internal_base_url: "{{ hostvars[platform_topology_host].platform_service_topology | platform_service_url('vikunja', 'internal') }}"
vikunja_controller_url: "{{ hostvars[platform_topology_host].platform_service_topology | platform_service_url('vikunja', 'controller') }}"
vikunja_public_base_url: "https://{{ vikunja_service_topology.public_hostname }}"
vikunja_container_port: 3456
vikunja_bridge_container_name: vikunja-webhook-bridge
vikunja_bridge_port: 8081
vikunja_bridge_image: "{{ container_image_catalog.images.vikunja_webhook_bridge_runtime.ref }}"
vikunja_database_name: vikunja
vikunja_database_user: vikunja_admin
vikunja_database_host: "{{ hostvars[hostvars[platform_topology_host].postgres_ha.initial_primary].ansible_host }}"
vikunja_database_password_local_file: "{{ vikunja_local_artifact_dir }}/database-password.txt"
vikunja_service_secret_local_file: "{{ vikunja_local_artifact_dir }}/service-secret.txt"
vikunja_webhook_secret_local_file: "{{ vikunja_local_artifact_dir }}/webhook-secret.txt"
vikunja_automation_password_local_file: "{{ vikunja_local_artifact_dir }}/automation-password.txt"
vikunja_api_token_local_file: "{{ vikunja_local_artifact_dir }}/api-token.txt"
vikunja_admin_auth_local_file: "{{ vikunja_local_artifact_dir }}/admin-auth.json"
vikunja_desired_state_local_file: "{{ vikunja_local_artifact_dir }}/desired-state.json"
vikunja_sync_summary_local_file: "{{ vikunja_local_artifact_dir }}/sync-summary.json"
vikunja_service_secret_remote_file: "{{ vikunja_secret_dir }}/service-secret.txt"
vikunja_webhook_secret_remote_file: "{{ vikunja_secret_dir }}/webhook-secret.txt"
vikunja_automation_password_remote_file: "{{ vikunja_secret_dir }}/vikunja.automation-password.txt"
vikunja_operator_shadow_password_remote_file: "{{ vikunja_secret_dir }}/florin.badita-shadow-password.txt"
vikunja_keycloak_client_id: vikunja
vikunja_keycloak_provider_id: lv3
vikunja_keycloak_provider_name: LV3 SSO
vikunja_keycloak_client_secret_local_file: "{{ repo_shared_local_root }}/keycloak/vikunja-client-secret.txt"
vikunja_keycloak_issuer: https://sso.{{ platform_domain }}/realms/lv3
vikunja_keycloak_logout_uri: >-
  {{ platform_session_authority.keycloak_logout_url }}?client_id={{ vikunja_keycloak_client_id }}&post_logout_redirect_uri={{ vikunja_public_base_url | urlencode }}
vikunja_event_nats_url: nats://127.0.0.1:4222
vikunja_event_nats_username: jetstream-admin
vikunja_event_nats_password_local_file: "{{ repo_shared_local_root }}/nats/jetstream-admin-password.txt"
vikunja_event_subject_prefix: platform.task
vikunja_automation_username: vikunja.automation
vikunja_automation_email: vikunja.automation@{{ platform_domain }}
vikunja_operator_username: florin.badita
vikunja_operator_email: baditaflorin@gmail.com
vikunja_automation_token_title: LV3 Vikunja Automation
vikunja_automation_token_expires_at: "2036-01-01T00:00:00Z"
vikunja_webhook_target_url: "http://{{ vikunja_bridge_container_name }}:{{ vikunja_bridge_port }}/webhook"
vikunja_webhook_events:
  - task.created
  - task.updated
  - task.deleted
  - task.overdue
  - task.comment.created
vikunja_alert_task_project_identifier: PLATOPS
vikunja_alert_task_default_assignee_username: florin.badita
vikunja_project_manifests:
  - id: platform-ops
    title: Platform Ops
    identifier: PLATOPS
    description: Repo-managed operator work queue for alerts, incidents, maintenance actions, and deployment follow-up.
    hex_color: "#0b7285"
    members:
      - username: florin.badita
        permission: 2
      - username: vikunja.automation
        permission: 2
    labels:
      - title: security
        description: Security review and remediation work.
        hex_color: "#c92a2a"
      - title: maintenance
        description: Planned maintenance and upkeep work.
        hex_color: "#f08c00"
      - title: deployment
        description: Deployment, release, and rollback follow-up.
        hex_color: "#1971c2"
      - title: incident
        description: Incident handling, alert response, and recovery tracking.
        hex_color: "#862e9c"
      - title: review
        description: Human review and approval tasks.
        hex_color: "#2b8a3e"
    webhooks:
      - target_url: "{{ vikunja_webhook_target_url }}"
        secret: "{{ vikunja_webhook_secret }}"
        events: "{{ vikunja_webhook_events }}"
