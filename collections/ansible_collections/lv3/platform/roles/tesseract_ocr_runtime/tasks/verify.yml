---
# Purpose: Verify the local Tesseract OCR health endpoint and OCR extraction route with a deterministic image fixture.
# Inputs: Running Tesseract OCR container plus the configured local runtime URL and the repo-managed verification image.
# Outputs: Read-only health and OCR probe results for the private OCR runtime.
# Idempotency: Fully idempotent; these are read-only verification steps that only use temporary files.
# Dependencies: ADR 0286, ADR 0165, ADR 0371; requires the Tesseract OCR compose stack to be running.
- name: Verify the Tesseract OCR runtime health
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: tesseract-ocr
    common_verify_port: "{{ tesseract_ocr_runtime_port }}"
    common_verify_health_url: "{{ tesseract_ocr_runtime_local_base_url }}/healthz"
    common_verify_health_retries: 12
    common_verify_health_delay: 5

- name: Create a temporary Tesseract OCR verification image path
  ansible.builtin.tempfile:
    state: file
    suffix: -ocr-ok.png
  register: tesseract_ocr_runtime_verify_image_tempfile
  changed_when: false

- name: Stage the deterministic Tesseract OCR verification image
  ansible.builtin.copy:
    src: ocr-ok.png
    dest: "{{ tesseract_ocr_runtime_verify_image_tempfile.path }}"
    owner: root
    group: root
    mode: "0644"
  changed_when: false

- name: Verify Tesseract OCR extracts text from the deterministic image fixture
  ansible.builtin.shell: |
    set -euo pipefail
    response_file="$(mktemp)"
    trap 'rm -f "$response_file"' EXIT
    curl -fsS -o "$response_file"       -F "file=@{{ tesseract_ocr_runtime_verify_image_tempfile.path }};filename={{ tesseract_ocr_runtime_verify_filename }};type=image/png"       "{{ tesseract_ocr_runtime_local_base_url }}/ocr"
    python3 - "$response_file" <<'PY'
    import json
    import sys

    with open(sys.argv[1], "r", encoding="utf-8") as handle:
        payload = json.load(handle)

    extracted = str(payload.get("text", "")).upper()
    assert "OCR" in extracted, payload
    assert "OK" in extracted, payload
    assert payload.get("extraction_method") == "tesseract", payload
    assert payload.get("page_count") == 1, payload
    print("verified")
    PY
  args:
    executable: /bin/bash
  register: tesseract_ocr_runtime_verify_extract
  changed_when: false

- name: Remove the staged Tesseract OCR verification image
  ansible.builtin.file:
    path: "{{ tesseract_ocr_runtime_verify_image_tempfile.path }}"
    state: absent
  changed_when: false
