# Purpose: Declare the canonical Proxmox automation identity, RBAC defaults, and shared overlay token export path.
# Use case: Loaded whenever the proxmox_api_access role provisions or verifies the durable Proxmox API automation token contract.
# Inputs: Proxmox hostname, automation-user defaults, token privilege defaults, and shared repo-local overlay paths.
# Outputs: Resolved default variables for the automation user, token privileges, and exported controller-local credential file.
# Idempotency: N/A for defaults file because it only declares variables that downstream tasks consume.
# Dependencies: ADR 0165, ADR 0034, ADR 0167, and ADR 0333.
---
proxmox_api_hostname: proxmox.lv3.org
proxmox_api_automation_user: lv3-automation@pve
proxmox_api_automation_comment: LV3 durable automation identity
proxmox_api_token_id: primary
proxmox_api_token_comment: LV3 primary automation token
proxmox_api_token_role: LV3Automation
proxmox_api_token_role_manage: true
proxmox_api_token_role_privileges:
  - Datastore.Allocate
  - Datastore.AllocateSpace
  - Datastore.AllocateTemplate
  - Datastore.Audit
  - Group.Allocate
  - Mapping.Audit
  - Mapping.Use
  - Pool.Allocate
  - Pool.Audit
  - Realm.AllocateUser
  - SDN.Allocate
  - SDN.Audit
  - SDN.Use
  - Sys.Audit
  - Sys.Console
  - Sys.Modify
  - Sys.Syslog
  - User.Modify
  - VM.Allocate
  - VM.Audit
  - VM.Backup
  - VM.Clone
  - VM.Config.CDROM
  - VM.Config.CPU
  - VM.Config.Cloudinit
  - VM.Config.Disk
  - VM.Config.HWType
  - VM.Config.Memory
  - VM.Config.Network
  - VM.Config.Options
  - VM.Console
  - VM.GuestAgent.Audit
  - VM.GuestAgent.FileRead
  - VM.GuestAgent.FileSystemMgmt
  - VM.GuestAgent.FileWrite
  - VM.GuestAgent.Unrestricted
  - VM.Migrate
  - VM.PowerMgmt
  - VM.Replicate
  - VM.Snapshot
  - VM.Snapshot.Rollback
proxmox_api_token_acl_path: /
proxmox_api_token_privsep: true
proxmox_api_token_local_dir: "{{ repo_shared_local_root | default((playbook_dir | dirname) ~ '/.local', true) }}/proxmox-api"
proxmox_api_token_local_file: "{{ proxmox_api_token_local_dir }}/lv3-automation-primary.json"
