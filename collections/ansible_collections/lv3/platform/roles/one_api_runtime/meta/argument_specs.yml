# Purpose: Declare the supported input contract for the One-API runtime role.
# Use case: Loaded by Ansible to validate One-API runtime variables before execution.
# Inputs: Role variables covering image pins, database wiring, bootstrap secrets, and controller URLs.
# Outputs: Provides argument specifications used by Ansible role validation.
# Idempotency: Fully idempotent because this file only documents the role interface.
# Dependencies: ADR 0165 and ADR 0294.
---
argument_specs:
  main:
    short_description: Deploy the private One-API runtime and bootstrap its repo-managed credentials.
    options:
      one_api_image:
        type: str
        required: true
        description:
          - Digest-pinned One-API image reference taken from the image catalog.
      one_api_container_name:
        type: str
        required: true
        description:
          - Container name used by the One-API runtime.
      one_api_site_dir:
        type: path
        required: true
        description:
          - Guest-local directory containing the compose project.
      one_api_compose_file:
        type: path
        required: true
        description:
          - Guest-local docker compose file for One-API.
      one_api_env_file:
        type: path
        required: true
        description:
          - Guest-local runtime env file rendered through the OpenBao sidecar.
      one_api_openbao_agent_dir:
        type: path
        required: true
        description:
          - Guest-local OpenBao agent directory for runtime secret injection.
      one_api_database_name:
        type: str
        required: true
        description:
          - PostgreSQL database name used by One-API.
      one_api_database_user:
        type: str
        required: true
        description:
          - PostgreSQL login role used by One-API.
      one_api_database_host:
        type: str
        required: true
        description:
          - PostgreSQL host used by One-API.
      one_api_database_password_local_file:
        type: path
        required: true
        description:
          - Controller-local database password generated by the postgres role.
      one_api_session_secret_local_file:
        type: path
        required: true
        description:
          - Controller-local file used to mirror the One-API session secret.
      one_api_root_access_token_local_file:
        type: path
        required: true
        description:
          - Controller-local file used to mirror the One-API root management token.
      one_api_root_password_local_file:
        type: path
        required: true
        description:
          - Controller-local file used to mirror the One-API root password.
      one_api_internal_http_port:
        type: int
        required: true
        description:
          - Guest-local HTTP port exposed by the One-API API and UI.
      one_api_controller_url:
        type: str
        required: true
        description:
          - Controller-facing One-API HTTP URL routed through the Proxmox Tailscale proxy.
