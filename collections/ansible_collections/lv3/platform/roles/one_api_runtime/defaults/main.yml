# Purpose: Define default runtime paths, secret locations, and controller settings for the private One-API service.
# Use case: Loaded whenever the One-API runtime role converges or validates the unified LLM proxy.
# Inputs: Image catalog entries, compose secret roots, OpenBao defaults, and service topology values.
# Outputs: Supplies stable defaults consumed by the One-API runtime tasks and templates.
# Idempotency: Fully idempotent because this file only declares role defaults.
# Dependencies: ADR 0165 and ADR 0294.
---
one_api_image: "{{ container_image_catalog.images.one_api_runtime.ref }}"
one_api_container_name: one-api
one_api_site_dir: /opt/one-api
one_api_secret_dir: /etc/lv3/one-api
one_api_compose_file: "{{ one_api_site_dir }}/docker-compose.yml"
one_api_env_file: "{{ compose_runtime_secret_root }}/one-api/runtime.env"
one_api_legacy_env_file: "{{ one_api_site_dir }}/one-api.env"
one_api_openbao_agent_dir: "{{ one_api_site_dir }}/openbao"
one_api_openbao_agent_image: "{{ openbao_agent_image }}"
one_api_openbao_agent_container_name: one-api-openbao-agent
one_api_openbao_secret_path: services/one-api/runtime-env
one_api_openbao_policy_name: lv3-service-one-api-runtime
one_api_openbao_approle_name: one-api-runtime
one_api_local_artifact_dir: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/one-api
one_api_database_name: oneapi
one_api_database_user: oneapi
one_api_database_host: "{{ hostvars[hostvars['proxmox_florin'].postgres_ha.initial_primary].ansible_host }}"
one_api_database_password_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/one-api/database-password.txt
one_api_session_secret_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/one-api/session-secret.txt
one_api_root_access_token_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/one-api/root-access-token.txt
one_api_root_password_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/one-api/root-password.txt
one_api_internal_http_port: "{{ hostvars['proxmox_florin'].platform_port_assignments.one_api_port }}"
one_api_controller_url: >-
  http://{{ hostvars['proxmox_florin'].management_tailscale_ipv4 }}:{{
    hostvars['proxmox_florin'].platform_port_assignments.one_api_host_proxy_port
  }}
one_api_local_url: "http://127.0.0.1:{{ one_api_internal_http_port }}"
one_api_root_user_display_name: LV3 Platform Root
one_api_sql_dsn: >-
  postgres://{{ one_api_database_user }}:{{ one_api_database_password | urlencode }}@{{
    one_api_database_host
  }}:5432/{{ one_api_database_name }}?sslmode=disable
