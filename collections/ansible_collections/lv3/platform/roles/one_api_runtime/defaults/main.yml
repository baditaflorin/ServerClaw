# Purpose: Define default runtime paths, secret locations, and controller settings for the private One-API service.
# Use case: Loaded whenever the One-API runtime role converges or validates the unified LLM proxy.
# Inputs: Image catalog entries, compose secret roots, OpenBao defaults, and service topology values.
# Outputs: Supplies stable defaults consumed by the One-API runtime tasks and templates.
# Idempotency: Fully idempotent because this file only declares role defaults.
# Dependencies: ADR 0165 and ADR 0294.
---
# NOTE: Conventional variables (site_dir, image, compose_file, env_file,
# openbao_*, container_name, internal_port, local_artifact_dir) are derived
# from platform_service_registry — ADR 0373.
one_api_database_name: oneapi
one_api_database_user: oneapi
one_api_database_host: "{{ hostvars[hostvars['proxmox_florin'].postgres_ha.initial_primary].ansible_host }}"
one_api_database_password_local_file: "{{ repo_shared_local_root }}/one-api/database-password.txt"
one_api_session_secret_local_file: "{{ repo_shared_local_root }}/one-api/session-secret.txt"
one_api_root_access_token_local_file: "{{ repo_shared_local_root }}/one-api/root-access-token.txt"
one_api_root_password_local_file: "{{ repo_shared_local_root }}/one-api/root-password.txt"
one_api_internal_http_port: "{{ hostvars['proxmox_florin'].platform_port_assignments.one_api_port }}"
one_api_controller_url: >-
  http://{{ hostvars['proxmox_florin'].management_tailscale_ipv4 }}:{{
    hostvars['proxmox_florin'].platform_port_assignments.one_api_host_proxy_port
  }}
one_api_local_url: "http://127.0.0.1:{{ one_api_internal_http_port }}"
one_api_root_user_display_name: LV3 Platform Root
one_api_sql_dsn: >-
  postgres://{{ one_api_database_user }}:{{ one_api_database_password | urlencode }}@{{
    one_api_database_host
  }}:5432/{{ one_api_database_name }}?sslmode=disable
