# Purpose: Converge the Open WebUI runtime, mirrored secrets, bootstrap admin state, and runtime verification.
# Use case: Run during Open WebUI deploys, updates, and exact-main live replays.
# Inputs: Runtime paths, feature flags, OpenBao secret material, and optional OIDC/search settings.
# Outputs: Brings the Open WebUI container stack and admin bootstrap state to the repo-managed target state.
# Idempotency: Partially idempotent because bootstrap state and runtime restarts may intentionally refresh live state.
# Dependencies: ADR 0165, ADR 0060, ADR 0145, and ADR 0148.
---
- name: Validate Open WebUI runtime inputs
  ansible.builtin.assert:
    that:
      - open_webui_site_dir | length > 0
      - open_webui_data_dir | length > 0
      - open_webui_secret_dir | length > 0
      - open_webui_compose_file | length > 0
      - open_webui_env_file | length > 0
      - open_webui_image | length > 0
      - open_webui_container_name | length > 0
      - open_webui_port | int > 0
      - open_webui_admin_name | length > 0
      - open_webui_admin_email | length > 0
      - open_webui_internal_base_url | length > 0
      - open_webui_webui_url | length > 0
      - (not open_webui_enable_ollama_api | bool) or (open_webui_ollama_base_url | length > 0)
      - (not open_webui_enable_web_search | bool) or (open_webui_web_search_engine | length > 0)
      - (not open_webui_enable_web_search | bool) or (open_webui_web_search_engine != 'searxng') or (open_webui_searxng_query_url | length > 0)
      - (not open_webui_enable_oidc | bool) or (open_webui_oidc_client_id | length > 0)
      - (not open_webui_enable_oidc | bool) or (open_webui_oidc_provider_url | length > 0)
      - (not open_webui_enable_oidc | bool) or (open_webui_oidc_redirect_uri | length > 0)
    fail_msg: >-
      open_webui_runtime requires compose paths, image, admin bootstrap, base URLs,
      web-search settings when enabled, and OIDC settings when SSO is enabled.

- name: Check whether a controller-local provider environment file exists
  ansible.builtin.stat:
    path: "{{ open_webui_provider_env_local_file }}"
  delegate_to: localhost
  become: false
  register: open_webui_provider_env_local

- name: Check whether a controller-local OIDC client secret file exists
  ansible.builtin.stat:
    path: "{{ open_webui_oidc_client_secret_local_file }}"
  delegate_to: localhost
  become: false
  register: open_webui_oidc_client_secret_local
  when: open_webui_enable_oidc | bool

- name: Fail if OIDC is enabled but the client secret file is missing
  ansible.builtin.fail:
    msg: >-
      {{ open_webui_oidc_client_secret_local_file }} is missing on the control machine.
      Provide the OIDC client secret before enabling SSO for Open WebUI.
  when:
    - open_webui_enable_oidc | bool
    - not open_webui_oidc_client_secret_local.stat.exists

- name: Ensure the Open WebUI runtime packages are present
  ansible.builtin.apt:
    name:
      - openssl
    state: present
    update_cache: true
    cache_valid_time: 3600
    force_apt_get: true

- name: Ensure the Open WebUI directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ open_webui_site_dir }}"
      mode: "0755"
    - path: "{{ open_webui_data_dir }}"
      mode: "0755"
    - path: "{{ open_webui_secret_dir }}"
      mode: "0700"
    - path: "{{ open_webui_env_file | dirname }}"
      mode: "0700"
    - path: "{{ open_webui_openbao_agent_dir }}"
      mode: "0700"
      enabled: "{{ open_webui_enable_openbao_agent | bool }}"
  when: item.enabled | default(true) | bool

- name: Generate the Open WebUI admin password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ open_webui_admin_password_remote_file }}" ]; then
      umask 077
      openssl rand -base64 36 > "{{ open_webui_admin_password_remote_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: open_webui_admin_password_generation
  changed_when: "'changed' in open_webui_admin_password_generation.stdout"
  no_log: true

- name: Generate the Open WebUI secret key
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ open_webui_secret_key_remote_file }}" ]; then
      umask 077
      openssl rand -hex 32 > "{{ open_webui_secret_key_remote_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: open_webui_secret_key_generation
  changed_when: "'changed' in open_webui_secret_key_generation.stdout"
  no_log: true

- name: Read the Open WebUI admin password
  ansible.builtin.slurp:
    src: "{{ open_webui_admin_password_remote_file }}"
  register: open_webui_admin_password_raw
  no_log: true

- name: Read the Open WebUI secret key
  ansible.builtin.slurp:
    src: "{{ open_webui_secret_key_remote_file }}"
  register: open_webui_secret_key_raw
  no_log: true

- name: Load optional provider and OIDC secrets from the control machine
  ansible.builtin.set_fact:
    open_webui_admin_password: "{{ open_webui_admin_password_raw.content | b64decode | trim }}"
    open_webui_secret_key: "{{ open_webui_secret_key_raw.content | b64decode | trim }}"
    open_webui_provider_env_content: >-
      {{ lookup('ansible.builtin.file', open_webui_provider_env_local_file)
         if open_webui_provider_env_local.stat.exists else '' }}
    open_webui_oidc_client_secret: >-
      {{ lookup('ansible.builtin.file', open_webui_oidc_client_secret_local_file) | trim
         if open_webui_enable_oidc | bool else '' }}
    open_webui_runtime_secret_payload:
      WEBUI_SECRET_KEY: "{{ open_webui_secret_key_raw.content | b64decode | trim }}"
      WEBUI_ADMIN_PASSWORD: "{{ open_webui_admin_password_raw.content | b64decode | trim }}"
      OAUTH_CLIENT_SECRET: >-
        {{ lookup('ansible.builtin.file', open_webui_oidc_client_secret_local_file) | trim
           if open_webui_enable_oidc | bool else '' }}
      PROVIDER_ENV_BLOCK: >-
        {{ lookup('ansible.builtin.file', open_webui_provider_env_local_file)
           if open_webui_provider_env_local.stat.exists else '' }}
  no_log: true

- name: Ensure the local Open WebUI artifact directory exists
  ansible.builtin.file:
    path: "{{ open_webui_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Mirror the Open WebUI bootstrap secrets to the control machine
  ansible.builtin.copy:
    dest: "{{ item.dest }}"
    content: "{{ item.content }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  loop:
    - dest: "{{ open_webui_admin_password_local_file }}"
      content: "{{ open_webui_admin_password }}"
    - dest: "{{ open_webui_secret_key_local_file }}"
      content: "{{ open_webui_secret_key }}"
  no_log: true

- name: Prepare OpenBao agent runtime secret injection for Open WebUI
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: openbao_compose_env
  vars:
    common_openbao_compose_env_service_name: open-webui
    common_openbao_compose_env_agent_dir: "{{ open_webui_openbao_agent_dir }}"
    common_openbao_compose_env_runtime_dir: "{{ open_webui_env_file | dirname }}"
    common_openbao_compose_env_env_file: "{{ open_webui_env_file }}"
    common_openbao_compose_env_secret_path: "{{ open_webui_openbao_secret_path }}"
    common_openbao_compose_env_secret_payload: "{{ open_webui_runtime_secret_payload }}"
    common_openbao_compose_env_policy_name: "{{ open_webui_openbao_policy_name }}"
    common_openbao_compose_env_policy_rules: |
      path "sys/health" {
        capabilities = ["read"]
      }

      path "kv/data/{{ open_webui_openbao_secret_path }}" {
        capabilities = ["read"]
      }

      path "kv/metadata/{{ open_webui_openbao_secret_path }}" {
        capabilities = ["read", "list"]
      }
    common_openbao_compose_env_approle_name: "{{ open_webui_openbao_approle_name }}"
    common_openbao_compose_env_agent_config_file: "{{ open_webui_openbao_agent_dir }}/agent.hcl"
    common_openbao_compose_env_agent_template_file: "{{ open_webui_openbao_agent_dir }}/runtime.env.ctmpl"
    common_openbao_compose_env_agent_template_src: open-webui.env.ctmpl.j2
    common_openbao_compose_env_role_id_file: "{{ open_webui_openbao_agent_dir }}/role_id"
    common_openbao_compose_env_secret_id_file: "{{ open_webui_openbao_agent_dir }}/secret_id"
    common_openbao_compose_env_image: "{{ open_webui_openbao_agent_image }}"
    common_openbao_compose_env_legacy_env_files:
      - "{{ open_webui_legacy_env_file }}"
  when: open_webui_enable_openbao_agent | bool
  no_log: true

- name: Render the Open WebUI environment file
  ansible.builtin.template:
    src: open-webui.env.j2
    dest: "{{ open_webui_env_file }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Render the Open WebUI compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ open_webui_compose_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Pull the Open WebUI image
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ open_webui_compose_file }}"
      - pull
  args:
    chdir: "{{ open_webui_site_dir }}"
  register: open_webui_pull
  changed_when: >-
    'Pulling' in open_webui_pull.stdout
    or 'Downloaded newer image' in open_webui_pull.stdout
    or 'Pull complete' in open_webui_pull.stdout

- name: Start Open WebUI and wait for the local socket
  block:
    - name: Start the Open WebUI stack
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ open_webui_compose_file }}"
          - up
          - -d
          - --remove-orphans
      args:
        chdir: "{{ open_webui_site_dir }}"
      register: open_webui_up
      changed_when: >-
        'Creating' in open_webui_up.stdout
        or 'Recreating' in open_webui_up.stdout
        or 'Starting' in open_webui_up.stdout

    - name: Wait for Open WebUI to listen locally
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ open_webui_port }}"
        delay: 0
        timeout: 180
  rescue:
    - name: Detect stale Open WebUI compose-network startup failures
      ansible.builtin.set_fact:
        open_webui_missing_network_failure: >-
          {{
            'network ' in (open_webui_up.stderr | default(''))
            and ' does not exist' in (open_webui_up.stderr | default(''))
          }}

    - name: Reset the stale Open WebUI compose network before retrying startup
      ansible.builtin.shell: |
        set -euo pipefail
        docker compose --file "{{ open_webui_compose_file }}" down --remove-orphans >/dev/null 2>&1 || true
        docker network rm open-webui_default >/dev/null 2>&1 || true
        echo changed
      args:
        chdir: "{{ open_webui_site_dir }}"
        executable: /bin/bash
      register: open_webui_network_reset
      changed_when: "'changed' in open_webui_network_reset.stdout"
      when: open_webui_missing_network_failure | bool

    - name: Recreate the full Open WebUI stack after stale-network cleanup
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ open_webui_compose_file }}"
          - up
          - -d
          - --remove-orphans
      args:
        chdir: "{{ open_webui_site_dir }}"
      register: open_webui_network_retry_up
      changed_when: >-
        'Creating' in open_webui_network_retry_up.stdout
        or 'Recreating' in open_webui_network_retry_up.stdout
        or 'Starting' in open_webui_network_retry_up.stdout
      when: open_webui_missing_network_failure | bool

    - name: Wait for Open WebUI to listen locally after stale-network cleanup
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ open_webui_port }}"
        delay: 0
        timeout: 180
      when: open_webui_missing_network_failure | bool

    - name: Fail when Open WebUI startup failed for a reason other than stale networking
      ansible.builtin.fail:
        msg: "{{ open_webui_up.stderr | default('Open WebUI startup failed without stderr output.') }}"
      when: not (open_webui_missing_network_failure | bool)

- name: Wait for the Open WebUI HTTP surface
  ansible.builtin.uri:
    url: "{{ open_webui_internal_base_url }}"
    method: GET
    status_code: 200
  register: open_webui_http_ready
  retries: 24
  delay: 5
  until: open_webui_http_ready.status == 200
  changed_when: false

- name: Verify Open WebUI admin sign-in works
  ansible.builtin.uri:
    url: "{{ open_webui_internal_base_url }}/api/v1/auths/signin"
    method: POST
    body_format: json
    body:
      email: "{{ open_webui_admin_email }}"
      password: "{{ open_webui_admin_password }}"
    return_content: true
    status_code: 200
  register: open_webui_admin_signin
  changed_when: false
  no_log: true
  when: open_webui_enable_password_auth | bool

- name: Assert Open WebUI sign-in returned the expected account
  ansible.builtin.assert:
    that:
      - open_webui_admin_signin.json.email == open_webui_admin_email
      - (open_webui_admin_signin.json.role | default('')) == 'admin'
    fail_msg: "Open WebUI started, but the repo-managed admin bootstrap could not be verified."
  no_log: true
  when: open_webui_enable_password_auth | bool

- name: Verify Open WebUI health probes
  ansible.builtin.import_tasks: verify.yml
