# Purpose: Verify the Open WebUI runtime health, bootstrap admin flow, and configured integrations.
# Use case: Imported at the end of Open WebUI convergence and during targeted verification runs.
# Inputs: Open WebUI base URLs, bootstrap credentials, and enabled integration settings.
# Outputs: Produces runtime assertions for the HTTP surface, admin sign-in, and optional connectors.
# Idempotency: Idempotent because these tasks only probe live state.
# Dependencies: ADR 0165, ADR 0371, and the converged Open WebUI runtime.
---
- name: Verify the Open WebUI runtime health
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: open-webui
    common_verify_port: "{{ open_webui_port }}"
    common_verify_health_url: "{{ open_webui_internal_base_url }}"
    common_verify_health_retries: 24
    common_verify_health_delay: 5

- name: Verify Open WebUI admin sign-in works
  ansible.builtin.uri:
    url: "{{ open_webui_internal_base_url }}/api/v1/auths/signin"
    method: POST
    body_format: json
    body:
      email: "{{ open_webui_admin_email }}"
      password: "{{ open_webui_admin_password }}"
    return_content: true
    status_code: 200
  register: open_webui_verify_admin_signin
  changed_when: false
  no_log: true
  when: open_webui_enable_password_auth | bool

- name: Assert Open WebUI sign-in returned the expected account
  ansible.builtin.assert:
    that:
      - open_webui_verify_admin_signin.json.email == open_webui_admin_email
      - (open_webui_verify_admin_signin.json.role | default('')) == 'admin'
    fail_msg: "Open WebUI started, but the repo-managed admin bootstrap could not be verified."
  no_log: true
  when: open_webui_enable_password_auth | bool

- name: Verify Open WebUI OIDC login redirects through the configured provider
  ansible.builtin.uri:
    url: "{{ open_webui_internal_base_url }}{{ open_webui_oidc_login_path }}"
    method: GET
    follow_redirects: none
    status_code:
      - 302
      - 303
      - 307
  register: open_webui_verify_oidc_redirect
  changed_when: false
  when: open_webui_enable_oidc | bool
