---
- name: Validate control-plane recovery runtime inputs
  ansible.builtin.assert:
    that:
      - control_plane_recovery_runtime_root | length > 0
      - control_plane_recovery_runtime_backup_script | length > 0
      - control_plane_recovery_runtime_ssh_private_key_local_file | length > 0
      - control_plane_recovery_runtime_openbao_policy_name | length > 0
      - control_plane_recovery_runtime_openbao_secret_path | length > 0
      - control_plane_recovery_runtime_openbao_approle_name | length > 0
      - control_plane_recovery_runtime_openbao_agent_dir | length > 0
      - control_plane_recovery_runtime_openbao_agent_service_name | length > 0
      - control_plane_recovery_runtime_credential_dir | length > 0
      - control_plane_recovery_runtime_openbao_token_file | length > 0
      - control_plane_recovery_runtime_windmill_db_dsn_file | length > 0
      - control_plane_recovery_runtime_backup_target_host | length > 0
      - control_plane_recovery_runtime_backup_target_user | length > 0
      - control_plane_recovery_runtime_backup_target_dir | length > 0
      - control_plane_recovery_windmill_backup_database_dsn | length > 0
      - openbao_init_local_file | length > 0
      - step_ca_home | length > 0
      - step_ca_password_dir | length > 0
      - openbao_config_dir | length > 0
      - openbao_tls_dir | length > 0
      - openbao_policy_dir | length > 0
      - windmill_site_dir | length > 0
      - windmill_secret_dir | length > 0
      - mail_platform_site_dir | length > 0
      - mail_platform_secret_dir | length > 0
    fail_msg: "control_plane_recovery requires runtime paths, the controller-local SSH keypair, and control-plane component paths."

- name: Ensure controller-local control-plane recovery directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  loop:
    - "{{ control_plane_recovery_runtime_ssh_private_key_local_file | dirname }}"
  delegate_to: localhost
  become: false

- name: Generate the controller-local runtime backup SSH keypair when missing
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ control_plane_recovery_runtime_ssh_private_key_local_file }}" ] || [ ! -s "{{ control_plane_recovery_runtime_ssh_public_key_local_file }}" ]; then
      ssh-keygen -q -t ed25519 -N '' -f "{{ control_plane_recovery_runtime_ssh_private_key_local_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: control_plane_recovery_runtime_keygen
  changed_when: "'changed' in control_plane_recovery_runtime_keygen.stdout"

- name: Read the controller-local runtime backup private key
  ansible.builtin.slurp:
    src: "{{ control_plane_recovery_runtime_ssh_private_key_local_file }}"
  delegate_to: localhost
  become: false
  register: control_plane_recovery_runtime_private_key_raw
  no_log: true

- name: Install control-plane recovery runtime packages
  ansible.builtin.apt:
    name:
      - curl
      - jq
      - openssh-client
      - postgresql-client
      - rsync
      - zstd
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure the control-plane recovery runtime directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ control_plane_recovery_runtime_root }}"
      mode: "0755"
    - path: "{{ control_plane_recovery_runtime_bin_dir }}"
      mode: "0755"
    - path: "{{ control_plane_recovery_runtime_config_dir }}"
      mode: "0700"
    - path: "{{ control_plane_recovery_runtime_state_dir }}"
      mode: "0700"
    - path: "{{ control_plane_recovery_runtime_state_dir }}/staging"
      mode: "0700"
    - path: /root/.ssh
      mode: "0700"

- name: Install the runtime backup SSH private key on docker-runtime-lv3
  ansible.builtin.copy:
    dest: "{{ control_plane_recovery_runtime_config_dir }}/docker-runtime-backup.id_ed25519"
    content: "{{ control_plane_recovery_runtime_private_key_raw.content | b64decode }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Capture the backup VM SSH host key from docker-runtime-lv3
  ansible.builtin.command:
    argv:
      - ssh-keyscan
      - -H
      - "{{ control_plane_recovery_runtime_backup_target_host }}"
  register: control_plane_recovery_runtime_hostkey
  changed_when: false

- name: Record the backup VM SSH host key for runtime pushes
  ansible.builtin.copy:
    dest: /root/.ssh/known_hosts
    content: "{{ control_plane_recovery_runtime_hostkey.stdout }}\n"
    owner: root
    group: root
    mode: "0600"

- name: Reset SSH connection after updating runtime known_hosts
  ansible.builtin.meta: reset_connection

- name: Wait for docker-runtime-lv3 SSH after updating runtime known_hosts
  ansible.builtin.wait_for_connection:
    timeout: 120
    connect_timeout: 5
    sleep: 2

- name: Provision OpenBao-backed systemd credentials for control-plane backups
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: openbao_systemd_credentials
  vars:
    common_openbao_systemd_credentials_service_name: control-plane-backup
    common_openbao_systemd_credentials_agent_dir: "{{ control_plane_recovery_runtime_openbao_agent_dir }}"
    common_openbao_systemd_credentials_credential_dir: "{{ control_plane_recovery_runtime_credential_dir }}"
    common_openbao_systemd_credentials_credential_file: "{{ control_plane_recovery_runtime_windmill_db_dsn_file }}"
    common_openbao_systemd_credentials_token_file: "{{ control_plane_recovery_runtime_openbao_token_file }}"
    common_openbao_systemd_credentials_secret_path: "{{ control_plane_recovery_runtime_openbao_secret_path }}"
    common_openbao_systemd_credentials_secret_payload: "{{ control_plane_recovery_runtime_openbao_secret_payload }}"
    common_openbao_systemd_credentials_policy_name: "{{ control_plane_recovery_runtime_openbao_policy_name }}"
    common_openbao_systemd_credentials_policy_rules: "{{ control_plane_recovery_runtime_openbao_policy_rules }}"
    common_openbao_systemd_credentials_approle_name: "{{ control_plane_recovery_runtime_openbao_approle_name }}"
    common_openbao_systemd_credentials_agent_config_file: "{{ control_plane_recovery_runtime_openbao_agent_config_file }}"
    common_openbao_systemd_credentials_agent_template_file: "{{ control_plane_recovery_runtime_openbao_agent_template_file }}"
    common_openbao_systemd_credentials_agent_template_src: "{{ role_path }}/templates/control-plane-backup-windmill-dsn.ctmpl.j2"
    common_openbao_systemd_credentials_role_id_file: "{{ control_plane_recovery_runtime_openbao_role_id_file }}"
    common_openbao_systemd_credentials_secret_id_file: "{{ control_plane_recovery_runtime_openbao_secret_id_file }}"
    common_openbao_systemd_credentials_image: "{{ openbao_agent_image }}"
    common_openbao_systemd_credentials_agent_service_name: "{{ control_plane_recovery_runtime_openbao_agent_service_name }}"
    common_openbao_systemd_credentials_container_name: "{{ control_plane_recovery_runtime_openbao_agent_container_name }}"

- name: Remove the legacy OpenBao backup token artifact
  ansible.builtin.file:
    path: "{{ control_plane_recovery_runtime_config_dir }}/openbao-backup-token.json"
    state: absent

- name: Render the runtime backup script
  ansible.builtin.template:
    src: lv3-control-plane-backup.sh.j2
    dest: "{{ control_plane_recovery_runtime_backup_script }}"
    owner: root
    group: root
    mode: "0755"

- name: Render the runtime backup systemd service
  ansible.builtin.template:
    src: lv3-control-plane-backup.service.j2
    dest: "/etc/systemd/system/{{ control_plane_recovery_runtime_backup_service }}"
    owner: root
    group: root
    mode: "0644"

- name: Render the runtime backup systemd timer
  ansible.builtin.template:
    src: lv3-control-plane-backup.timer.j2
    dest: "/etc/systemd/system/{{ control_plane_recovery_runtime_backup_timer }}"
    owner: root
    group: root
    mode: "0644"

- name: Enable and start the runtime backup timer
  ansible.builtin.systemd:
    name: "{{ control_plane_recovery_runtime_backup_timer }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Run the control-plane backup service immediately
  ansible.builtin.command:
    argv:
      - systemctl
      - start
      - "{{ control_plane_recovery_runtime_backup_service }}"
  register: control_plane_recovery_runtime_backup_now
  changed_when: true
  when: control_plane_recovery_run_backup_now | bool
