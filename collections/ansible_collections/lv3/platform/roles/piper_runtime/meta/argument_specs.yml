# Purpose: Declare the argument contract for the private Piper runtime role.
# Use case: Run during syntax and argument validation before converging Piper.
# Inputs: piper_runtime_* variables required by the role.
# Outputs: Machine-readable argument specs for the piper_runtime role.
# Idempotency: Fully idempotent; metadata only validates role inputs.
# Dependencies: ADR 0165 metadata standard, ADR 0284, and the piper_runtime role tasks.
---
argument_specs:
  main:
    short_description: Converge the private Piper text-to-speech runtime.
    options:
      piper_runtime_site_dir:
        type: str
      piper_runtime_service_dir:
        type: str
      piper_runtime_compose_file:
        type: str
      piper_runtime_dockerfile:
        type: str
      piper_runtime_requirements_file:
        type: str
      piper_runtime_service_script:
        type: str
      piper_runtime_container_name:
        type: str
      piper_runtime_image_name:
        type: str
      piper_runtime_base_image:
        type: str
      piper_runtime_port:
        type: int
      piper_runtime_base_url:
        type: str
      piper_runtime_health_url:
        type: str
      piper_runtime_bind_host:
        type: str
      piper_runtime_loopback_bind_host:
        type: str
      piper_runtime_container_port:
        type: int
      piper_runtime_model_volume_name:
        type: str
      piper_runtime_model_dir:
        type: str
      piper_runtime_default_voice:
        type: str
      piper_runtime_voice_models:
        type: list
        elements: str
      piper_runtime_sentence_silence:
        type: float
      piper_runtime_test_text:
        type: str
