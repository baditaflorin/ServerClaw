---
# Purpose: Default PostgreSQL inputs for the Paperless application database.

paperless_database_name: paperless
paperless_database_user: paperless
paperless_postgres_secret_dir: /etc/lv3/paperless
paperless_postgres_password_file: "{{ paperless_postgres_secret_dir }}/database-password"
paperless_local_artifact_dir: "{{ repo_shared_local_root }}/paperless"
paperless_database_password_local_file: "{{ paperless_local_artifact_dir }}/database-password.txt"
