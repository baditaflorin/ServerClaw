---
# Purpose: Provision the paperless PostgreSQL database using the shared postgres_client role (ADR 0359).
# Use case: Called during paperless deployment to ensure the database, role, and credentials exist.
# Inputs: paperless_* variables from defaults/main.yml; resolves registry entry from platform_postgres_clients.
# Outputs: paperless PostgreSQL role, database, and credential files converged on postgres.
# Idempotency: Yes; postgres_client role handles all idempotency.
# Dependencies: ADR 0359 postgres_client role, platform_postgres_clients registry.
- name: Provision the paperless database via the shared postgres_client role
  ansible.builtin.include_role:
    name: lv3.platform.postgres_client
  vars:
    postgres_client_service: "{{ paperless_database_name }}"
    postgres_client_database: "{{ paperless_database_name }}"
    postgres_client_user: "{{ paperless_database_user }}"
    postgres_client_password_local_file: "{{ paperless_database_password_local_file }}"
    postgres_client_password_remote_dir: "{{ paperless_postgres_secret_dir }}"
    postgres_client_password_remote_file: "{{ paperless_postgres_password_file }}"
