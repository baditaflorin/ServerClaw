---
# Purpose: Describe the required PostgreSQL variables for Paperless.

argument_specs:
  main:
    short_description: Converge the PostgreSQL backend for Paperless.
    options:
      paperless_database_name:
        type: str
        required: true
      paperless_database_user:
        type: str
        required: true
      paperless_postgres_secret_dir:
        type: path
        required: true
      paperless_postgres_password_file:
        type: path
        required: true
      paperless_database_password_local_file:
        type: path
        required: true
