---
# Purpose: Verify the public JupyterHub publication after edge rollout.

- name: Check whether the JupyterHub service API token exists on the control machine
  ansible.builtin.stat:
    path: "{{ jupyterhub_service_api_token_local_file }}"
  register: jupyterhub_service_api_token_local

- name: Fail if the JupyterHub service API token is missing locally
  ansible.builtin.fail:
    msg: >-
      {{ jupyterhub_service_api_token_local_file }} is missing on the control machine.
      Converge the JupyterHub runtime before verifying the public publication.
  when: not jupyterhub_service_api_token_local.stat.exists

- name: Wait for the JupyterHub public health endpoint
  ansible.builtin.uri:
    url: "{{ jupyterhub_public_base_url }}/hub/health"
    method: GET
    status_code: 200
  register: jupyterhub_public_health
  retries: 24
  delay: 5
  until: jupyterhub_public_health.status == 200
  changed_when: false

- name: Verify the JupyterHub public OIDC login handoff redirects to Keycloak
  ansible.builtin.uri:
    url: "{{ jupyterhub_public_base_url }}/hub/oauth_login"
    method: GET
    follow_redirects: none
    status_code:
      - 302
      - 303
  register: jupyterhub_public_oidc_redirect
  changed_when: false

- name: Assert the JupyterHub public OIDC login handoff points at Keycloak
  ansible.builtin.assert:
    that:
      - "'sso.lv3.org' in (jupyterhub_public_oidc_redirect.location | default(''))"
    fail_msg: "The JupyterHub public oauth_login endpoint did not redirect to Keycloak."

- name: Verify the JupyterHub public admin API responds with the service token
  ansible.builtin.uri:
    url: "{{ jupyterhub_public_base_url }}/hub/api"
    method: GET
    headers:
      Authorization: "token {{ lookup('ansible.builtin.file', jupyterhub_service_api_token_local_file) | trim }}"
    status_code: 200
  register: jupyterhub_public_api_probe
  changed_when: false
