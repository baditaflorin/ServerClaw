# Purpose: Converge the managed mail platform runtime, notification profiles, gateway assets, and mail relay credentials.
# Use case: Run during mail-platform deploys or when downstream services depend on the repo-managed submission path.
# Inputs: Mail platform paths, hostnames, Brevo credentials, notification profiles, and service topology inputs.
# Outputs: The mail runtime, generated profile artifacts, and relay contracts match repo-managed configuration.
# Idempotency: Partially idempotent because secret rendering, compose refreshes, and verification probes intentionally update live state.
# Dependencies: ADR 0165, ADR 0050, ADR 0171, and ADR 0262.
---
- name: Derive Mail Platform conventional defaults from the service registry
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: derive_service_defaults
  vars:
    common_derive_service_name: mail_platform


- name: Validate mail platform runtime inputs
  ansible.builtin.assert:
    that:
      - mail_platform_domain | length > 0
      - mail_platform_hostname | length > 0
      - mail_platform_mailbox_address | length > 0
      - mail_platform_site_dir | length > 0
      - mail_platform_stalwart_dir | length > 0
      - mail_platform_gateway_dir | length > 0
      - mail_platform_stalwart_image | length > 0
      - mail_platform_gateway_base_image | length > 0
      - mail_platform_compose_file | length > 0
      - mail_platform_brevo_sender_email | length > 0
      - mail_platform_brevo_api_key_local_file | length > 0
      - mail_platform_notification_profiles | length > 0
    fail_msg: "mail_platform_runtime requires mail hostnames, paths, mailbox identity, and the Brevo API key path."

- name: Validate notification profile definitions
  ansible.builtin.assert:
    that:
      - item.id | length > 0
      - item.mailbox_localpart | length > 0
      - item.mailbox_address | length > 0
      - item.sender_email | length > 0
      - item.sender_name | length > 0
      - item.reply_to | length > 0
      - item.owner | length > 0
      - item.credential_scope | length > 0
      - item.rate_expectation | length > 0
      - item.retention_policy | length > 0
      - item.observability_policy | length > 0
    fail_msg: "Each notification profile needs identity, ownership, sender, and policy metadata."
  loop: "{{ mail_platform_notification_profiles }}"
  loop_control:
    label: "{{ item.id }}"

- name: Assert notification profile ids are unique
  ansible.builtin.assert:
    that:
      - (mail_platform_notification_profiles | map(attribute='id') | list | unique | length) == (mail_platform_notification_profiles | length)
      - (mail_platform_notification_profiles | map(attribute='mailbox_localpart') | list | unique | length) == (mail_platform_notification_profiles | length)
      - (mail_platform_notification_profiles | map(attribute='mailbox_address') | list | unique | length) == (mail_platform_notification_profiles | length)
      - mail_platform_mailbox_localpart not in (mail_platform_notification_profiles | map(attribute='mailbox_localpart') | list)
      - mail_platform_mailbox_address not in (mail_platform_notification_profiles | map(attribute='mailbox_address') | list)
    fail_msg: "Notification profile ids, localparts, and mailbox addresses must be unique."

- name: Check mail platform prerequisites on the control machine
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: check_local_secrets
  vars:
    common_check_local_secrets_files:
      - path: "{{ mail_platform_brevo_api_key_local_file }}"
        description: "Brevo transactional API key"
        prerequisite: "Create the file with the Brevo API key before deploying the mail platform"

- name: Ensure mail platform prerequisite packages are present
  ansible.builtin.apt:
    name:
      - python3
      - openssl
    lock_timeout: 300
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure mail platform directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ mail_platform_site_dir }}"
      mode: "0755"
    - path: "{{ mail_platform_stalwart_dir }}"
      mode: "0755"
    - path: "{{ mail_platform_stalwart_dir }}/etc"
      mode: "0755"
    - path: "{{ mail_platform_gateway_dir }}"
      mode: "0755"
    - path: "{{ mail_platform_gateway_app_dir }}"
      mode: "0755"
    - path: "{{ mail_platform_gateway_data_dir }}"
      mode: "0755"
    - path: "{{ mail_platform_secret_dir }}"
      mode: "0700"
    - path: "{{ mail_platform_profile_secret_dir }}"
      mode: "0700"

- name: Generate Stalwart admin password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ mail_platform_admin_password_file }}" ]; then
      umask 077
      openssl rand -base64 24 > "{{ mail_platform_admin_password_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: mail_platform_admin_password_generation
  changed_when: "'changed' in mail_platform_admin_password_generation.stdout"

- name: Generate mailbox password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ mail_platform_mailbox_password_file }}" ]; then
      umask 077
      openssl rand -base64 24 > "{{ mail_platform_mailbox_password_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: mail_platform_mailbox_password_generation
  changed_when: "'changed' in mail_platform_mailbox_password_generation.stdout"

- name: Generate mail metrics password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ mail_platform_metrics_password_file }}" ]; then
      umask 077
      openssl rand -base64 24 > "{{ mail_platform_metrics_password_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: mail_platform_metrics_password_generation
  changed_when: "'changed' in mail_platform_metrics_password_generation.stdout"

- name: Generate mail gateway API key
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ mail_platform_gateway_api_key_file }}" ]; then
      umask 077
      openssl rand -hex 32 > "{{ mail_platform_gateway_api_key_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: mail_platform_gateway_api_key_generation
  changed_when: "'changed' in mail_platform_gateway_api_key_generation.stdout"

- name: Generate notification profile mailbox passwords
  ansible.builtin.shell: |
    umask 077
    openssl rand -base64 24 > "{{ mail_platform_profile_secret_dir }}/{{ item.id }}-mailbox-password"
  args:
    executable: /bin/bash
    creates: "{{ mail_platform_profile_secret_dir }}/{{ item.id }}-mailbox-password"
  loop: "{{ mail_platform_notification_profiles }}"
  loop_control:
    label: "{{ item.id }}"

- name: Generate notification profile gateway API keys
  ansible.builtin.shell: |
    umask 077
    openssl rand -hex 32 > "{{ mail_platform_profile_secret_dir }}/{{ item.id }}-gateway-api-key"
  args:
    executable: /bin/bash
    creates: "{{ mail_platform_profile_secret_dir }}/{{ item.id }}-gateway-api-key"
  loop: "{{ mail_platform_notification_profiles }}"
  loop_control:
    label: "{{ item.id }}"

- name: Read Stalwart admin password
  ansible.builtin.slurp:
    src: "{{ mail_platform_admin_password_file }}"
  register: mail_platform_admin_password_raw
  no_log: true

- name: Read mailbox password
  ansible.builtin.slurp:
    src: "{{ mail_platform_mailbox_password_file }}"
  register: mail_platform_mailbox_password_raw
  no_log: true

- name: Read mail metrics password
  ansible.builtin.slurp:
    src: "{{ mail_platform_metrics_password_file }}"
  register: mail_platform_metrics_password_raw
  no_log: true

- name: Read mail gateway API key
  ansible.builtin.slurp:
    src: "{{ mail_platform_gateway_api_key_file }}"
  register: mail_platform_gateway_api_key_raw
  no_log: true

- name: Read notification profile mailbox passwords
  ansible.builtin.slurp:
    src: "{{ mail_platform_profile_secret_dir }}/{{ item.id }}-mailbox-password"
  loop: "{{ mail_platform_notification_profiles }}"
  loop_control:
    label: "{{ item.id }}"
  register: mail_platform_profile_mailbox_password_raw
  no_log: true

- name: Read notification profile gateway API keys
  ansible.builtin.slurp:
    src: "{{ mail_platform_profile_secret_dir }}/{{ item.id }}-gateway-api-key"
  loop: "{{ mail_platform_notification_profiles }}"
  loop_control:
    label: "{{ item.id }}"
  register: mail_platform_profile_gateway_api_key_raw
  no_log: true

- name: Record mail platform secret facts
  ansible.builtin.set_fact:
    mail_platform_admin_password: "{{ mail_platform_admin_password_raw.content | b64decode | trim }}"
    mail_platform_mailbox_password: "{{ mail_platform_mailbox_password_raw.content | b64decode | trim }}"
    mail_platform_metrics_password: "{{ mail_platform_metrics_password_raw.content | b64decode | trim }}"
    mail_platform_gateway_api_key: "{{ mail_platform_gateway_api_key_raw.content | b64decode | trim }}"
    mail_platform_runtime_secret_payload:
      brevo_api_key: "{{ lookup('ansible.builtin.file', mail_platform_brevo_api_key_local_file) | trim }}"
      gateway_api_key: "{{ mail_platform_gateway_api_key_raw.content | b64decode | trim }}"
      metrics_password: "{{ mail_platform_metrics_password_raw.content | b64decode | trim }}"
      mailbox_password: "{{ mail_platform_mailbox_password_raw.content | b64decode | trim }}"
      stalwart_admin_password: "{{ mail_platform_admin_password_raw.content | b64decode | trim }}"
      sentry_dsn: "{{ mail_platform_gateway_sentry_dsn }}"
  no_log: true

- name: Record notification profile runtime facts
  ansible.builtin.set_fact:
    mail_platform_notification_profiles_runtime: >-
      {{
        (mail_platform_notification_profiles_runtime | default([]))
        + [
            item
            | combine(
                {
                  'mailbox_password': (
                    mail_platform_profile_mailbox_password_raw.results
                    | selectattr('item.id', 'equalto', item.id)
                    | map(attribute='content')
                    | first
                    | b64decode
                    | trim
                  ),
                  'mailbox_password_file': mail_platform_profile_secret_dir ~ '/' ~ item.id ~ '-mailbox-password',
                  'mailbox_password_local_file': mail_platform_profile_local_artifact_dir ~ '/' ~ item.id ~ '-mailbox-password.txt',
                  'gateway_api_key': (
                    mail_platform_profile_gateway_api_key_raw.results
                    | selectattr('item.id', 'equalto', item.id)
                    | map(attribute='content')
                    | first
                    | b64decode
                    | trim
                  ),
                  'gateway_api_key_file': mail_platform_profile_secret_dir ~ '/' ~ item.id ~ '-gateway-api-key',
                  'gateway_api_key_local_file': mail_platform_profile_local_artifact_dir ~ '/' ~ item.id ~ '-gateway-api-key.txt'
                }
              )
          ]
      }}
  loop: "{{ mail_platform_notification_profiles }}"
  loop_control:
    label: "{{ item.id }}"
  no_log: true

- name: Record managed mailbox runtime facts
  ansible.builtin.set_fact:
    mail_platform_managed_mailboxes_runtime:
      - localpart: "{{ mail_platform_mailbox_localpart }}"
        address: "{{ mail_platform_mailbox_address }}"
        password: "{{ mail_platform_mailbox_password }}"
        description: "{{ mail_platform_mailbox_description }}"
  no_log: true

- name: Append notification profile mailboxes to the managed mailbox list
  ansible.builtin.set_fact:
    mail_platform_managed_mailboxes_runtime: >-
      {{
        mail_platform_managed_mailboxes_runtime
        + [
            {
              'localpart': item.mailbox_localpart,
              'address': item.mailbox_address,
              'password': item.mailbox_password,
              'description': item.description
            }
          ]
      }}
  loop: "{{ mail_platform_notification_profiles_runtime }}"
  loop_control:
    label: "{{ item.id }}"
  no_log: true

- name: Ensure local mail platform artifact directory exists
  ansible.builtin.file:
    path: "{{ mail_platform_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Ensure local notification profile artifact directory exists
  ansible.builtin.file:
    path: "{{ mail_platform_profile_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Mirror Stalwart admin password to the control machine
  ansible.builtin.copy:
    dest: "{{ mail_platform_admin_password_local_file }}"
    content: "{{ mail_platform_admin_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Mirror mailbox password to the control machine
  ansible.builtin.copy:
    dest: "{{ mail_platform_mailbox_password_local_file }}"
    content: "{{ mail_platform_mailbox_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Mirror mail metrics password to the control machine
  ansible.builtin.copy:
    dest: "{{ mail_platform_metrics_password_local_file }}"
    content: "{{ mail_platform_metrics_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Mirror mail gateway API key to the control machine
  ansible.builtin.copy:
    dest: "{{ mail_platform_gateway_api_key_local_file }}"
    content: "{{ mail_platform_gateway_api_key }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Mirror notification profile mailbox passwords to the control machine
  ansible.builtin.copy:
    dest: "{{ item.mailbox_password_local_file }}"
    content: "{{ item.mailbox_password }}\n"
    mode: "0600"
  loop: "{{ mail_platform_notification_profiles_runtime }}"
  loop_control:
    label: "{{ item.id }}"
  delegate_to: localhost
  become: false
  no_log: true

- name: Mirror notification profile gateway API keys to the control machine
  ansible.builtin.copy:
    dest: "{{ item.gateway_api_key_local_file }}"
    content: "{{ item.gateway_api_key }}\n"
    mode: "0600"
  loop: "{{ mail_platform_notification_profiles_runtime }}"
  loop_control:
    label: "{{ item.id }}"
  delegate_to: localhost
  become: false
  no_log: true

- name: Render the Stalwart configuration file
  ansible.builtin.template:
    src: stalwart-config.toml.j2
    dest: "{{ mail_platform_stalwart_config_file }}"
    owner: root
    group: root
    mode: "0640"
  register: mail_platform_stalwart_config
  no_log: true

- name: Render the mail platform bootstrap script
  ansible.builtin.template:
    src: bootstrap-mail-platform.py.j2
    dest: "{{ mail_platform_stalwart_bootstrap_file }}"
    owner: root
    group: root
    mode: "0750"
  no_log: true

- name: Copy the mail gateway application files
  ansible.builtin.copy:
    src: mail-gateway/
    dest: "{{ mail_platform_gateway_app_dir }}/"
    owner: root
    group: root
    mode: preserve

- name: Render the mail gateway Dockerfile
  ansible.builtin.template:
    src: mail-gateway.Dockerfile.j2
    dest: "{{ mail_platform_gateway_app_dir }}/Dockerfile"
    owner: root
    group: root
    mode: "0644"

- name: Create a controller-local staging path for the mail platform OpenBao agent runtime env template
  ansible.builtin.tempfile:
    state: file
    suffix: .ctmpl
  delegate_to: localhost
  become: false
  register: mail_platform_openbao_agent_template_local

- name: Resolve the mail gateway OTLP endpoint before delegating the OpenBao env template render
  ansible.builtin.set_fact:
    mail_platform_gateway_trace_otlp_endpoint_resolved: "{{ mail_platform_gateway_trace_otlp_endpoint }}"

- name: Render the mail platform OpenBao agent runtime env template to a controller-local file
  vars:
    mail_platform_gateway_trace_otlp_endpoint: "{{ mail_platform_gateway_trace_otlp_endpoint_resolved }}"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../collections/ansible_collections/lv3/platform/roles/mail_platform_runtime/templates/mail-gateway.env.ctmpl.j2"
    dest: "{{ mail_platform_openbao_agent_template_local.path }}"
    mode: "0600"
  delegate_to: localhost
  become: false

- name: Prepare OpenBao agent runtime secret injection for the mail platform gateway
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: openbao_compose_env
  vars:
    common_openbao_compose_env_service_name: mail-platform
    common_openbao_compose_env_agent_dir: "{{ mail_platform_openbao_agent_dir }}"
    common_openbao_compose_env_runtime_dir: "{{ mail_platform_gateway_env_file | dirname }}"
    common_openbao_compose_env_env_file: "{{ mail_platform_gateway_env_file }}"
    common_openbao_compose_env_secret_path: "{{ mail_platform_openbao_secret_path }}"
    common_openbao_compose_env_secret_payload: "{{ mail_platform_runtime_secret_payload }}"
    common_openbao_compose_env_policy_name: "{{ mail_platform_openbao_policy_name }}"
    common_openbao_compose_env_policy_rules: |
      path "sys/health" {
        capabilities = ["read"]
      }

      path "kv/data/{{ mail_platform_openbao_secret_path }}" {
        capabilities = ["read"]
      }

      path "kv/metadata/{{ mail_platform_openbao_secret_path }}" {
        capabilities = ["read", "list"]
      }
    common_openbao_compose_env_approle_name: "{{ mail_platform_openbao_approle_name }}"
    common_openbao_compose_env_agent_config_file: "{{ mail_platform_openbao_agent_dir }}/agent.hcl"
    common_openbao_compose_env_agent_template_file: "{{ mail_platform_openbao_agent_dir }}/runtime.env.ctmpl"
    common_openbao_compose_env_agent_template_local_file: "{{ mail_platform_openbao_agent_template_local.path }}"
    common_openbao_compose_env_role_id_file: "{{ mail_platform_openbao_agent_dir }}/role_id"
    common_openbao_compose_env_secret_id_file: "{{ mail_platform_openbao_agent_dir }}/secret_id"
    common_openbao_compose_env_image: "{{ mail_platform_openbao_agent_image }}"
    common_openbao_compose_env_legacy_env_files:
      - "{{ mail_platform_gateway_legacy_env_file }}"
  no_log: true

- name: Remove the controller-local mail platform OpenBao agent runtime env template staging file
  ansible.builtin.file:
    path: "{{ mail_platform_openbao_agent_template_local.path }}"
    state: absent
  delegate_to: localhost
  become: false

- name: Render the mail gateway environment file
  ansible.builtin.template:
    src: mail-gateway.env.j2
    dest: "{{ mail_platform_gateway_env_file }}"
    owner: root
    group: root
    mode: "0600"
  register: mail_platform_gateway_env
  no_log: true

- name: Render the notification profiles catalog
  ansible.builtin.template:
    src: notification-profiles.json.j2
    dest: "{{ mail_platform_gateway_profiles_file }}"
    owner: root
    group: root
    mode: "0600"
  register: mail_platform_gateway_profiles
  no_log: true

- name: Render the mail platform Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ mail_platform_compose_file }}"
    owner: root
    group: root
    mode: "0644"
  vars:
    ansible_search_path: "{{ [role_path + '/../common'] + (ansible_search_path | default([])) }}"
  register: mail_platform_compose

- name: Pull the Stalwart image
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ mail_platform_compose_file }}"
      - pull
      - stalwart
  args:
    chdir: "{{ mail_platform_site_dir }}"
  register: mail_platform_pull
  changed_when: >-
    'Downloaded newer image' in mail_platform_pull.stdout
    or 'Pull complete' in mail_platform_pull.stdout
    or 'Pulling' in mail_platform_pull.stdout

- name: Build the mail gateway image
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ mail_platform_compose_file }}"
      - build
      - mail-gateway
  args:
    chdir: "{{ mail_platform_site_dir }}"
  register: mail_platform_gateway_build
  changed_when: >-
    'Successfully tagged' in mail_platform_gateway_build.stdout
    or 'writing image sha256' in mail_platform_gateway_build.stdout
    or 'exporting to image' in mail_platform_gateway_build.stdout

- name: Check whether the Docker nat chain exists before recreating mail-platform published ports
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - nat
      - -S
      - DOCKER
  register: mail_platform_docker_nat_chain
  changed_when: false
  failed_when: mail_platform_docker_nat_chain.rc not in [0, 1]

- name: Check whether the Docker forward chain exists before mail-platform startup
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - filter
      - -S
      - DOCKER-FORWARD
  register: mail_platform_docker_forward_chain
  changed_when: false
  failed_when: mail_platform_docker_forward_chain.rc not in [0, 1]

- name: Restore Docker networking when bridge chains are missing before mail-platform startup
  ansible.builtin.service:
    name: docker
    state: restarted
  register: mail_platform_docker_restart_before_startup
  failed_when: false
  when: mail_platform_docker_nat_chain.rc != 0 or mail_platform_docker_forward_chain.rc != 0

- name: Recheck the Docker nat chain before mail-platform startup
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - nat
      - -S
      - DOCKER
  register: mail_platform_docker_nat_chain_recheck
  changed_when: false
  failed_when: mail_platform_docker_nat_chain_recheck.rc not in [0, 1]
  retries: 10
  delay: 2
  until: mail_platform_docker_nat_chain_recheck.rc == 0
  when: mail_platform_docker_nat_chain.rc != 0 or mail_platform_docker_forward_chain.rc != 0

- name: Recheck the Docker forward chain before mail-platform startup
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - filter
      - -S
      - DOCKER-FORWARD
  register: mail_platform_docker_forward_chain_recheck
  changed_when: false
  failed_when: mail_platform_docker_forward_chain_recheck.rc not in [0, 1]
  retries: 10
  delay: 2
  until: mail_platform_docker_forward_chain_recheck.rc == 0
  when: mail_platform_docker_nat_chain.rc != 0 or mail_platform_docker_forward_chain.rc != 0

- name: Wait for the Docker daemon to answer after bridge recovery before mail-platform startup
  ansible.builtin.command:
    argv:
      - docker
      - info
      - --format
      - '{{ "{{.ServerVersion}}" }}'
  register: mail_platform_docker_info
  changed_when: false
  retries: 10
  delay: 2
  until: mail_platform_docker_info.rc == 0
  when: mail_platform_docker_nat_chain.rc != 0 or mail_platform_docker_forward_chain.rc != 0

- name: Assert Docker bridge chains are present before mail-platform startup
  ansible.builtin.assert:
    that:
      - mail_platform_docker_nat_chain.rc == 0 or mail_platform_docker_nat_chain_recheck.rc == 0
      - mail_platform_docker_forward_chain.rc == 0 or mail_platform_docker_forward_chain_recheck.rc == 0
    fail_msg: "Docker is running but the DOCKER or DOCKER-FORWARD chains are missing; mail-platform startup will fail."

- name: Check whether the Stalwart management port is already published locally
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ mail_platform_stalwart_http_port }}"
    delay: 0
    timeout: 1
  register: mail_platform_stalwart_port_probe
  changed_when: false
  failed_when: false

- name: Probe whether the mail platform can attach a fresh container to the shared bridge network
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ mail_platform_compose_file }}"
      - run
      - --rm
      - --no-deps
      - mail-gateway
      - python
      - -c
      - pass
  args:
    chdir: "{{ mail_platform_site_dir }}"
  register: mail_platform_network_attach_probe
  changed_when: false
  failed_when: false

- name: Record whether the mail platform startup needs a force recreate
  ansible.builtin.set_fact:
    mail_platform_force_recreate: >-
      {{
        mail_platform_docker_nat_chain.rc != 0
        or (mail_platform_stalwart_port_probe.failed | default(false))
        or (mail_platform_stalwart_config.changed | default(false))
        or (mail_platform_gateway_env.changed | default(false))
        or (mail_platform_gateway_profiles.changed | default(false))
        or (mail_platform_compose.changed | default(false))
        or (mail_platform_gateway_build.changed | default(false))
        or (mail_platform_network_attach_probe.rc | default(0)) != 0
      }}

- name: Reset the mail platform stack before a force recreate
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ mail_platform_compose_file }}"
      - down
      - --remove-orphans
  args:
    chdir: "{{ mail_platform_site_dir }}"
  register: mail_platform_force_recreate_down
  failed_when: false
  changed_when: >-
    'Stopping' in (mail_platform_force_recreate_down.stdout | default(''))
    or 'Removing' in (mail_platform_force_recreate_down.stdout | default(''))
    or 'Network' in (mail_platform_force_recreate_down.stdout | default(''))
    or 'Stopping' in (mail_platform_force_recreate_down.stderr | default(''))
    or 'Removing' in (mail_platform_force_recreate_down.stderr | default(''))
    or 'Network' in (mail_platform_force_recreate_down.stderr | default(''))
  when: mail_platform_force_recreate

- name: Remove stale mail platform compose networks before recovery
  ansible.builtin.shell: |
    set -euo pipefail
    removed=0
    stale_networks="$(docker network ls -q --filter name=^{{ mail_platform_docker_network_name }}$)"
    if [ -z "${stale_networks}" ]; then
      exit 0
    fi
    for network_id in ${stale_networks}; do
      endpoint_count="$(docker network inspect --format '{% raw %}{{ len .Containers }}{% endraw %}' "${network_id}" 2>/dev/null || echo 1)"
      if [ "${endpoint_count}" = "0" ] && docker network rm "${network_id}" >/dev/null 2>&1; then
        removed=1
      elif [ "${endpoint_count}" = "0" ]; then
        echo "skipped ${network_id} removal_failed"
      else
        echo "skipped ${network_id} active_endpoints=${endpoint_count}"
      fi
    done
    if [ "${removed}" = "1" ]; then
      echo changed
    fi
  args:
    chdir: "{{ mail_platform_site_dir }}"
    executable: /bin/bash
  register: mail_platform_force_recreate_network_cleanup
  changed_when: "'changed' in mail_platform_force_recreate_network_cleanup.stdout"
  when: mail_platform_force_recreate

- name: Force-recreate the mail platform stack after Docker networking recovery
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ mail_platform_compose_file }}"
      - up
      - -d
      - --force-recreate
      - --remove-orphans
  args:
    chdir: "{{ mail_platform_site_dir }}"
  register: mail_platform_up
  failed_when: false
  changed_when: >-
    'Creating' in mail_platform_up.stdout
    or 'Recreating' in mail_platform_up.stdout
    or 'Starting' in mail_platform_up.stdout
  when: mail_platform_force_recreate

- name: Start the mail platform stack
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ mail_platform_compose_file }}"
      - up
      - -d
      - --remove-orphans
  args:
    chdir: "{{ mail_platform_site_dir }}"
  register: mail_platform_up
  failed_when: false
  changed_when: >-
    'Creating' in mail_platform_up.stdout
    or 'Recreating' in mail_platform_up.stdout
    or 'Starting' in mail_platform_up.stdout
  when: not mail_platform_force_recreate

- name: Flag stale mail platform compose-network failures during startup
  ansible.builtin.set_fact:
    mail_platform_docker_network_missing: >-
      {{
        (mail_platform_up.rc | default(0)) != 0
        and 'failed to create endpoint' in (mail_platform_up.stderr | default(''))
        and 'does not exist' in (mail_platform_up.stderr | default(''))
      }}

- name: Surface unexpected mail platform startup failures
  ansible.builtin.fail:
    msg: >-
      {{
        mail_platform_up.stderr
        | default(mail_platform_up.msg | default('mail-platform compose up failed'))
      }}
  when:
    - (mail_platform_up.rc | default(0)) != 0
    - not mail_platform_docker_network_missing

- name: Reset stale mail platform compose resources before retrying startup
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ mail_platform_compose_file }}"
      - down
      - --remove-orphans
  args:
    chdir: "{{ mail_platform_site_dir }}"
  register: mail_platform_down
  changed_when: >-
    'Stopping' in (mail_platform_down.stdout | default(''))
    or 'Removing' in (mail_platform_down.stdout | default(''))
    or 'Removing' in (mail_platform_down.stderr | default(''))
  failed_when: false
  when: mail_platform_docker_network_missing

- name: Remove the stale mail-platform compose network before retrying startup
  ansible.builtin.shell: |
    set -euo pipefail
    stale_networks="$(docker network ls -q --filter name=^{{ mail_platform_docker_network_name }}$)"
    if [ -n "$stale_networks" ]; then
      docker network rm $stale_networks
      echo changed
    fi
  args:
    executable: /bin/bash
  register: mail_platform_network_cleanup
  changed_when: "'changed' in mail_platform_network_cleanup.stdout"
  when: mail_platform_docker_network_missing

- name: Retry mail platform stack startup after compose-network recovery
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ mail_platform_compose_file }}"
      - up
      - -d
      - --force-recreate
      - --remove-orphans
  args:
    chdir: "{{ mail_platform_site_dir }}"
  register: mail_platform_up
  changed_when: true
  when: mail_platform_docker_network_missing

- name: Wait for the Stalwart management API to listen locally
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ mail_platform_stalwart_http_port }}"
    delay: 0
    timeout: 120

- name: Wait for the private mail submission relay to listen
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: "{{ mail_platform_internal_submission_port }}"
    delay: 0
    timeout: 120

- name: Verify the private mail submission relay keeps STARTTLS disabled and accepts auth
  ansible.builtin.shell: |
    python3 - <<'PY'
    import smtplib
    from pathlib import Path

    password = Path("{{ mail_platform_mailbox_password_file }}").read_text().strip()
    with smtplib.SMTP("{{ ansible_host }}", {{ mail_platform_internal_submission_port }}, timeout=10) as client:
        client.ehlo()
        if "starttls" in client.esmtp_features:
            raise SystemExit("internal submission relay unexpectedly advertises STARTTLS")
        code, response = client.login("{{ mail_platform_mailbox_login }}", password)
        if code != 235:
            raise SystemExit(f"unexpected SMTP auth response: {code} {response!r}")
    PY
  register: mail_platform_submission_auth_check
  changed_when: false
  retries: "{{ mail_platform_submission_auth_retries }}"
  delay: "{{ mail_platform_submission_auth_delay_seconds }}"
  until: mail_platform_submission_auth_check.rc == 0
  no_log: true

- name: Inspect the mail gateway startup state before waiting on the API
  ansible.builtin.command:
    argv:
      - docker
      - inspect
      - --format
      - "{% raw %}{{.State.Status}}|{{.State.Error}}{% endraw %}"
      - "{{ mail_platform_gateway_container_name }}"
  register: mail_platform_gateway_start_state
  changed_when: false
  failed_when: false

- name: Detect Docker bridge-chain loss during the mail gateway startup
  ansible.builtin.set_fact:
    mail_platform_gateway_bridge_chains_missing: >-
      {{
        (mail_platform_gateway_start_state.rc | default(1)) == 0
        and (mail_platform_gateway_start_state.stdout | default('')) is search('^created\\|')
        and 'failed programming external connectivity' in (mail_platform_gateway_start_state.stdout | default(''))
        and (
          'No chain/target/match by that name' in (mail_platform_gateway_start_state.stdout | default(''))
          or 'Unable to enable DNAT rule' in (mail_platform_gateway_start_state.stdout | default(''))
        )
      }}

- name: Surface unexpected mail gateway startup failures
  ansible.builtin.fail:
    msg: >-
      {{
        mail_platform_gateway_start_state.stdout
        | default(mail_platform_gateway_start_state.stderr | default('mail gateway failed to reach a running state'))
      }}
  when:
    - (mail_platform_gateway_start_state.rc | default(1)) != 0
      or (
        not mail_platform_gateway_bridge_chains_missing
        and (
          (mail_platform_gateway_start_state.stdout | default('')) is search('^(exited|dead)\\|')
          or (mail_platform_gateway_start_state.stdout | default('')) is search('^created\\|.+')
        )
      )

- name: Remove the stalled mail gateway container after Docker bridge-chain loss
  ansible.builtin.command:
    argv:
      - docker
      - rm
      - -f
      - "{{ mail_platform_gateway_container_name }}"
  register: mail_platform_gateway_remove
  changed_when: "'{{ mail_platform_gateway_container_name }}' in (mail_platform_gateway_remove.stdout | default(''))"
  failed_when: false
  when: mail_platform_gateway_bridge_chains_missing

- name: Restart Docker to restore bridge networking before retrying the mail gateway startup
  ansible.builtin.service:
    name: docker
    state: restarted
  register: mail_platform_gateway_docker_restart
  failed_when: false
  when: mail_platform_gateway_bridge_chains_missing

- name: Ensure Docker bridge networking chains are present before retrying the mail gateway startup
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: docker_bridge_chains
  vars:
    common_docker_bridge_chains_service_name: docker
    common_docker_bridge_chains_require_nat_chain: true
  when: mail_platform_gateway_bridge_chains_missing

- name: Retry the mail gateway startup after Docker networking recovery
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ mail_platform_compose_file }}"
      - up
      - -d
      - --force-recreate
      - --no-deps
      - mail-gateway
  args:
    chdir: "{{ mail_platform_site_dir }}"
  register: mail_platform_gateway_retry
  changed_when: >-
    'Creating' in (mail_platform_gateway_retry.stdout | default(''))
    or 'Recreating' in (mail_platform_gateway_retry.stdout | default(''))
    or 'Starting' in (mail_platform_gateway_retry.stdout | default(''))
    or 'Running' in (mail_platform_gateway_retry.stdout | default(''))
  failed_when: mail_platform_gateway_retry.rc != 0
  retries: 3
  delay: 5
  until: mail_platform_gateway_retry.rc == 0
  when: mail_platform_gateway_bridge_chains_missing

- name: Wait for the local mail gateway API to listen
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ mail_platform_gateway_port }}"
    delay: 0
    timeout: 120

- name: Wait for the mail gateway CRUD API to answer before bootstrapping mail principals
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ mail_platform_gateway_port }}/v1/domains"
    method: GET
    headers:
      X-API-Key: "{{ mail_platform_gateway_api_key }}"
    status_code: 200
  register: mail_platform_gateway_catalog_ready
  changed_when: false
  retries: "{{ mail_platform_submission_auth_retries }}"
  delay: "{{ mail_platform_submission_auth_delay_seconds }}"
  until: mail_platform_gateway_catalog_ready.status == 200
  no_log: true

- name: Upsert the managed mail domain through the mail gateway CRUD API
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ mail_platform_gateway_port }}/v1/domains/{{ mail_platform_domain | urlencode }}"
    method: PUT
    headers:
      X-API-Key: "{{ mail_platform_gateway_api_key }}"
    body_format: json
    body:
      description: "LV3 managed mail domain"
    status_code: 200
  register: mail_platform_domain_bootstrap
  changed_when: mail_platform_domain_bootstrap.json.status != 'unchanged'
  no_log: true

- name: Upsert the managed mailbox accounts through the mail gateway CRUD API
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ mail_platform_gateway_port }}/v1/mailboxes/{{ item.localpart | urlencode }}"
    method: PUT
    headers:
      X-API-Key: "{{ mail_platform_gateway_api_key }}"
    body_format: json
    body:
      description: "{{ item.description }}"
      emails:
        - "{{ item.address }}"
      password: "{{ item.password }}"
    status_code: 200
  register: mail_platform_mailbox_bootstrap
  loop: "{{ mail_platform_managed_mailboxes_runtime }}"
  loop_control:
    label: "{{ item.localpart }}"
  changed_when: mail_platform_mailbox_bootstrap.json.status != 'unchanged'
  no_log: true

- name: Verify the mail gateway health endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ mail_platform_gateway_port }}/healthz"
    method: GET
    status_code: 200
  register: mail_platform_gateway_health
  changed_when: false

- name: Verify the mail gateway CRUD API can list domains
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ mail_platform_gateway_port }}/v1/domains"
    method: GET
    headers:
      X-API-Key: "{{ mail_platform_gateway_api_key }}"
    status_code: 200
  register: mail_platform_gateway_domains
  changed_when: false
  no_log: true

- name: Verify the mail gateway CRUD API can list managed mailboxes
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ mail_platform_gateway_port }}/v1/mailboxes"
    method: GET
    headers:
      X-API-Key: "{{ mail_platform_gateway_api_key }}"
    status_code: 200
  register: mail_platform_gateway_mailboxes
  changed_when: false
  no_log: true

- name: Verify the mail gateway can list notification profiles
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ mail_platform_gateway_port }}/v1/profiles"
    method: GET
    headers:
      X-API-Key: "{{ mail_platform_gateway_api_key }}"
    status_code: 200
  register: mail_platform_gateway_profiles
  changed_when: false
  no_log: true

- name: Assert the managed mail domain is present
  ansible.builtin.assert:
    that:
      - (mail_platform_gateway_domains.json['items'] | map(attribute='name') | list) is contains(mail_platform_domain)
    fail_msg: "Managed domain {{ mail_platform_domain }} is not present in Stalwart."

- name: Assert the managed mailbox accounts are present
  ansible.builtin.assert:
    that:
      - >-
        (
          mail_platform_managed_mailboxes_runtime
          | map(attribute='localpart')
          | difference(mail_platform_gateway_mailboxes.json['items'] | map(attribute='name') | list)
          | length
        ) == 0
    fail_msg: "One or more managed mailboxes are missing from Stalwart."

- name: Assert the notification profile catalog is present
  ansible.builtin.assert:
    that:
      - >-
        (
          mail_platform_notification_profiles_runtime
          | map(attribute='id')
          | difference(mail_platform_gateway_profiles.json['items'] | map(attribute='id') | list)
          | length
        ) == 0
    fail_msg: "One or more notification profiles are missing from the mail gateway catalog."

- name: Verify mail platform health probes
  ansible.builtin.import_tasks: verify.yml
