---
public_edge_oidc_auth_version: 7.15.1
public_edge_oidc_auth_download_url: >-
  https://github.com/oauth2-proxy/oauth2-proxy/releases/download/v{{ public_edge_oidc_auth_version }}/oauth2-proxy-v{{ public_edge_oidc_auth_version }}.linux-amd64.tar.gz
public_edge_oidc_auth_binary_path: /usr/local/bin/oauth2-proxy
public_edge_oidc_auth_service_name: lv3-ops-portal-oauth2-proxy
public_edge_oidc_auth_http_address: 127.0.0.1:4180
public_edge_oidc_auth_config_dir: /etc/lv3/oauth2-proxy
public_edge_oidc_auth_config_file: "{{ public_edge_oidc_auth_config_dir }}/ops-portal.cfg"
public_edge_oidc_auth_cookie_secret_local_file: "{{ repo_shared_local_root }}/ops-portal/oauth2-proxy-cookie-secret.txt"
public_edge_oidc_auth_cookie_name: _lv3_ops_portal_proxy
public_edge_oidc_auth_client_id: ops-portal-oauth
public_edge_oidc_auth_client_secret_local_file: "{{ repo_shared_local_root }}/keycloak/ops-portal-client-secret.txt"
public_edge_oidc_auth_issuer_url: "{{ keycloak_oidc_issuer_url }}"
public_edge_oidc_auth_public_login_url: "{{ keycloak_oidc_auth_url }}"
public_edge_oidc_auth_internal_base_url: "{{ hostvars[platform_topology_host].platform_service_topology | platform_service_url('keycloak', 'internal') }}"
public_edge_oidc_auth_redirect_url: https://ops.{{ platform_domain }}/oauth2/callback
public_edge_oidc_auth_allowed_groups:
  - /lv3-platform-admins
public_edge_oidc_auth_email_domains:
  - "*"
# The Keycloak client maps the groups claim directly, so requesting a literal
# "groups" scope causes invalid_scope redirects unless a matching client scope exists.
public_edge_oidc_auth_scope: openid profile email
public_edge_oidc_auth_cookie_domain: .{{ platform_domain }}
public_edge_oidc_auth_cookie_expire: 8h
public_edge_oidc_auth_cookie_refresh: 1h
public_edge_oidc_auth_redeem_url: "{{ public_edge_oidc_auth_internal_base_url }}/realms/{{ keycloak_realm_name }}/protocol/openid-connect/token"
public_edge_oidc_auth_profile_url: "{{ public_edge_oidc_auth_internal_base_url }}/realms/{{ keycloak_realm_name }}/protocol/openid-connect/userinfo"
public_edge_oidc_auth_validate_url: "{{ public_edge_oidc_auth_internal_base_url }}/realms/{{ keycloak_realm_name }}/protocol/openid-connect/userinfo"
public_edge_oidc_auth_jwks_url: "{{ public_edge_oidc_auth_internal_base_url }}/realms/{{ keycloak_realm_name }}/protocol/openid-connect/certs"
public_edge_oidc_auth_probe_hostname: ops.{{ platform_domain }}

# Watchdog — checks oauth2-proxy is alive and auto-restarts via systemd every 30s
public_edge_oidc_auth_watchdog_enabled: true
public_edge_oidc_auth_watchdog_interval_sec: 30
public_edge_oidc_auth_watchdog_script_path: /usr/local/libexec/lv3-ops-portal-oauth2-proxy-watchdog.sh
public_edge_oidc_auth_watchdog_service_name: lv3-ops-portal-oauth2-proxy-watchdog
public_edge_oidc_auth_watchdog_failure_threshold: 2
public_edge_oidc_auth_watchdog_ntfy_url: "http://127.0.0.1:2586"
public_edge_oidc_auth_watchdog_ntfy_topic: platform-identity-critical
public_edge_oidc_auth_watchdog_ntfy_title: "LV3 OAuth2 Proxy Watchdog"
