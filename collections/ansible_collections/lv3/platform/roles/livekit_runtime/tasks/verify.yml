---
# Purpose: Verify the deployed LiveKit signal and media listeners plus the repo-managed room lifecycle contract.
# Dependencies: ADR 0165, ADR 0293, ADR 0371.
- name: Verify the LiveKit runtime signal port
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: livekit
    common_verify_port: "{{ livekit_signal_port }}"
    common_verify_port_timeout: 10

- name: Verify the LiveKit TCP media listener is reachable locally
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ livekit_media_tcp_port }}"
    timeout: 10
    state: started
  changed_when: false

- name: Verify the LiveKit UDP media listener is present locally
  ansible.builtin.shell: |
    set -euo pipefail
    ss -lunH | awk '{print $4}' | grep -Eq '(^|:){{ livekit_media_udp_port }}$'
  args:
    executable: /bin/bash
  register: livekit_verify_udp_listener
  changed_when: false

- name: Verify the LiveKit room lifecycle locally
  ansible.builtin.command:
    argv:
      - python3
      - "{{ livekit_remote_helper_script }}"
      - verify-room-lifecycle
      - --url
      - "{{ livekit_local_url }}"
      - --runtime-env-file
      - "{{ livekit_env_file }}"
      - --room-prefix
      - "{{ livekit_verify_room_prefix }}"
      - --identity
      - "{{ livekit_verify_identity }}"
      - --timeout-seconds
      - "{{ livekit_verify_timeout_seconds | string }}"
  register: livekit_verify_room_lifecycle
  retries: 12
  delay: 5
  until: >-
    livekit_verify_room_lifecycle.rc == 0 and
    (livekit_verify_room_lifecycle.stdout | length > 0) and
    ((livekit_verify_room_lifecycle.stdout | from_json).verification_passed)
  changed_when: false

- name: Assert the LiveKit listeners and room lifecycle are healthy
  ansible.builtin.assert:
    that:
      - livekit_verify_udp_listener.rc == 0
      - (livekit_verify_room_lifecycle.stdout | from_json).verification_passed
      - (livekit_verify_room_lifecycle.stdout | from_json).created
      - (livekit_verify_room_lifecycle.stdout | from_json).listed_after_create
      - (livekit_verify_room_lifecycle.stdout | from_json).deleted
      - not (livekit_verify_room_lifecycle.stdout | from_json).listed_after_delete
    fail_msg: "LiveKit answered locally, but the managed room lifecycle contract did not verify."
