---
windmill_workspace_id: lv3
windmill_workspace_name: LV3
windmill_site_dir: /opt/windmill
windmill_secret_dir: /etc/lv3/windmill
windmill_compose_file: "{{ windmill_site_dir }}/docker-compose.yml"
windmill_env_file: "{{ compose_runtime_secret_root }}/windmill/runtime.env"
windmill_legacy_env_file: "{{ windmill_site_dir }}/windmill.env"
windmill_openbao_agent_dir: "{{ windmill_site_dir }}/openbao"
windmill_openbao_agent_image: "{{ openbao_agent_image }}"
windmill_openbao_agent_container_name: windmill-openbao-agent
windmill_openbao_secret_path: services/windmill/runtime-env
windmill_openbao_policy_name: lv3-service-windmill-runtime
windmill_openbao_approle_name: windmill-runtime
windmill_runtime_packages:
  - openssl
  - tar
windmill_server_port: "{{ platform_service_topology | platform_service_port('windmill', 'internal') }}"
windmill_host_proxy_port: "{{ platform_service_topology | platform_service_port('windmill', 'controller') }}"
windmill_image: "{{ container_image_catalog.images.windmill_runtime.ref }}"
windmill_extra_image: "{{ container_image_catalog.images.windmill_extra_runtime.ref }}"
windmill_uv_version: "0.9.21"
windmill_uv_download_url: >-
  https://github.com/astral-sh/uv/releases/download/{{ windmill_uv_version }}/uv-x86_64-unknown-linux-gnu.tar.gz
windmill_uv_install_dir: /usr/local/bin
windmill_uv_binary_path: "{{ windmill_uv_install_dir }}/uv"
windmill_uvx_binary_path: "{{ windmill_uv_install_dir }}/uvx"
windmill_worker_count: 2
windmill_native_worker_count: 4
windmill_database_name: windmill
windmill_database_user: windmill_admin
windmill_database_inventory_host: >-
  {{ 'postgres-staging-lv3' if (env | default('production')) == 'staging' else 'postgres-lv3' }}
windmill_database_host: >-
  {{ hostvars[windmill_database_inventory_host].ansible_host }}
windmill_database_port: 5432
windmill_database_password_local_file: "{{ windmill_local_artifact_dir }}/database-password.txt"
windmill_database_dsn: >-
  postgres://{{ windmill_database_user }}:{{
    (
      windmill_database_password
      | default(lookup('ansible.builtin.file', windmill_database_password_local_file) | trim, true)
    )
    | urlencode
    | replace('/', '%2F')
  }}@{{ windmill_database_host }}:{{ windmill_database_port }}/{{ windmill_database_name }}?sslmode=disable
windmill_platform_dsn: "{{ windmill_database_dsn }}"
windmill_superadmin_secret_remote_file: "{{ windmill_secret_dir }}/superadmin-secret"
windmill_local_artifact_dir: >-
  {{
    (
      lookup(
        'ansible.builtin.pipe',
        'git -C ' ~ ((playbook_dir | dirname) | quote) ~ ' rev-parse --path-format=absolute --git-common-dir'
      )
      | dirname
    )
    ~ '/.local/windmill'
  }}
windmill_superadmin_secret_local_file: "{{ windmill_local_artifact_dir }}/superadmin-secret.txt"
windmill_bootstrap_identity_email: superadmin_secret@windmill.dev
windmill_bootstrap_identity_username: superadmin_secret
windmill_bootstrap_identity_login_type: password
windmill_private_base_url: "{{ platform_service_topology | platform_service_url('windmill', 'internal') }}"
windmill_base_url: "{{ platform_service_topology | platform_service_url('windmill', 'controller') }}"
windmill_worker_checkout_repo_root_local_dir: "{{ playbook_dir }}/.."
windmill_worker_repo_checkout_host_path: /srv/proxmox_florin_server
windmill_worker_repo_checkout_container_path: /srv/proxmox_florin_server
windmill_worker_secret_manifest_path: "{{ playbook_execution_controller_secret_manifest_path }}"
windmill_worker_secret_mirror_ids:
  - bootstrap_ssh_private_key
  - nats_jetstream_admin_password
windmill_worker_proxmox_api_token_payload_dir: "{{ windmill_worker_repo_checkout_host_path }}/.local/proxmox-api"
windmill_worker_proxmox_api_token_payload_file: "{{ windmill_worker_proxmox_api_token_payload_dir }}/lv3-automation-primary.json"
windmill_worker_checkout_sync_paths:
  - ansible.cfg
  - callback_plugins
  - collections
  - config
  - docs
  - filter_plugins
  - inventory
  - migrations
  - playbooks
  - platform
  - receipts
  - scripts
  - windmill
windmill_worker_runtime_writable_directories:
  - path: "{{ windmill_worker_repo_checkout_host_path }}/receipts/fixtures"
    mode: "1777"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local"
    mode: "0755"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/fixtures"
    mode: "1777"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/fixtures/reaper-runs"
    mode: "1777"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/fixtures/runtime"
    mode: "1777"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/fixtures/archive"
    mode: "1777"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/fixtures/locks"
    mode: "1777"
windmill_seed_app_repo_root_local_dir: "{{ inventory_dir }}/../config/windmill/apps"
windmill_seed_app_sync_dir: "{{ windmill_site_dir }}/seed-apps"
windmill_mutation_audit_dir: "{{ platform_log_dir }}"
windmill_mutation_audit_file: "{{ mutation_audit_log_file }}"
windmill_seed_scripts:
  - path: f/lv3/windmill_healthcheck
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/lv3-healthcheck.py"
    language: python3
    summary: LV3 Windmill healthcheck
    description: Repo-managed verification script for Windmill runtime and worker execution.
  - path: f/lv3/scheduler_watchdog_loop
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/scheduler-watchdog-loop.py"
    language: python3
    summary: ADR 0170 scheduler watchdog loop
    description: Repo-managed helper that runs the budget watchdog against active mutation jobs every 10 seconds.
  - path: f/lv3/platform_observation_loop
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/platform-observation-loop.py"
    language: python3
    summary: LV3 observation loop summary helper
    description: Repo-managed Windmill helper for ADR 0071 observation-loop summaries and later scheduler activation.
  - path: f/lv3/scheduler_watchdog_loop
    local_file: "{{ inventory_dir }}/../windmill/scheduler/watchdog-loop.py"
    language: python3
    summary: ADR 0172 scheduler watchdog loop
    description: Repo-managed Windmill helper that scans running jobs every 10 seconds, aborts stale mutation workflows, and emits watchdog heartbeats.
  - path: f/lv3/lane_scheduler
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/lane-scheduler.py"
    language: python3
    summary: ADR 0154 execution lane scheduler
    description: Repo-managed worker that dequeues VM-scoped execution intents when a lane has free capacity and submits them to Windmill.
  - path: f/lv3/scheduler_watchdog
    local_file: "{{ inventory_dir }}/../windmill/scheduler/watchdog-loop.py"
    language: python3
    summary: ADR 0119 scheduler watchdog
    description: Repo-managed worker that releases active scheduler state for completed or budget-violating Windmill jobs.
  - path: f/lv3/platform_findings_daily_digest
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/platform-findings-daily-digest.py"
    language: python3
    summary: LV3 findings daily digest helper
    description: Repo-managed Windmill helper that formats ADR 0071 findings into Markdown for operator review.
  - path: f/lv3/config_merge/merge_config_changes
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/merge-config-changes.py"
    language: python3
    summary: Merge staged config registry changes
    description: Repo-managed ADR 0158 helper that merges pending change rows from config_change_staging into the merge-eligible registry files.
  - path: f/lv3/rebuild_rag_index
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/rebuild-rag-index.py"
    language: python3
    summary: Rebuild the LV3 platform context index
    description: Repo-managed Windmill script that triggers a local-corpus rebuild on the private platform context API.
  - path: f/lv3/rebuild_search_index
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/rebuild-search-index.py"
    language: python3
    summary: Rebuild the LV3 local search fabric index
    description: Repo-managed Windmill helper that rebuilds the ADR 0121 local search index from repository-backed collections.
  - path: f/lv3/upgrade_container_image
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/upgrade-container-image.py"
    language: python3
    summary: LV3 container image upgrade workflow
    description: Repo-managed wrapper for catalog-based image upgrades, receipts, and optional converges.
  - path: f/lv3/deploy_and_promote
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/deploy-and-promote.py"
    language: python3
    summary: LV3 deploy and promote workflow
    description: Repo-managed wrapper for ADR 0073 staging gate evaluation, production promotion, and receipt generation.
  - path: f/lv3/mutation_audit_emit
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/lv3-mutation-audit.py"
    language: python3
    summary: LV3 mutation audit helper
    description: Repo-managed helper that emits a structured mutation audit event from a Windmill job.
  - path: f/lv3/warm_build_cache
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/warm-build-cache.py"
    language: python3
    summary: Warm the LV3 build caches
    description: Repo-managed helper that refreshes Docker, pip, Packer, and Ansible collection caches and rewrites config/build-cache-manifest.json.
  - path: f/lv3/build_cache_maintenance
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/build-cache-maintenance.py"
    language: python3
    summary: Maintain the LV3 build caches
    description: Repo-managed helper that purges the shared pip cache and checks the apt-cacher-ng report endpoint on the build server.
  - path: f/lv3/ephemeral_vm_reaper
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/ephemeral-vm-reaper.py"
    language: python3
    summary: ADR 0106 ephemeral VM lifecycle reaper
    description: Repo-managed worker that sweeps the governed 910-979 ephemeral VM pool, retags unowned VMs with a one-hour grace period, and destroys expired VMs.
  - path: f/lv3/fault-injection
    local_file: "{{ playbook_dir }}/../config/windmill/scripts/fault-injection.py"
    language: python3
    summary: ADR 0171 controlled fault injection
    description: Repo-managed Windmill wrapper that runs the bounded Keycloak and OpenBao fault-injection subset on docker-runtime-lv3.
  - path: f/lv3/disaster_recovery_runbook
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/disaster-recovery-runbook.py"
    language: python3
    summary: ADR 0100 disaster recovery runbook
    description: Repo-managed helper that renders the ordered LV3 disaster recovery plan and records the runbook invocation path.
  - path: f/lv3/operator_onboard
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/operator-onboard.py"
    language: python3
    summary: ADR 0108 operator onboarding
    description: Repo-managed wrapper that provisions one human operator across Keycloak, OpenBao, step-ca, Tailscale, and Mattermost.
  - path: f/lv3/operator_offboard
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/operator-offboard.py"
    language: python3
    summary: ADR 0108 operator off-boarding
    description: Repo-managed wrapper that disables one human operator across the managed identity systems while preserving audit history.
  - path: f/lv3/sync_operators
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/sync-operators.py"
    language: python3
    summary: ADR 0108 operator roster reconciliation
    description: Repo-managed wrapper that reconciles the merged operator roster into the live identity systems.
  - path: f/lv3/quarterly_access_review
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/quarterly-access-review.py"
    language: python3
    summary: ADR 0108 quarterly access review
    description: Repo-managed helper that builds the operator access review summary for scheduled or manual review.
  - path: f/lv3/operator_roster
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/operator-roster.py"
    language: python3
    summary: Operator roster reader
    description: Repo-managed helper that returns a sanitized snapshot of config/operators.yaml for browser-first admin tooling.
  - path: f/lv3/operator_inventory
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/operator-inventory.py"
    language: python3
    summary: Operator access inventory
    description: Repo-managed helper that runs the operator inventory report and returns structured JSON for the admin app.
  - path: f/lv3/world_state/refresh_proxmox_vms
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/world-state/refresh-proxmox-vms.py"
    language: python3
    summary: Refresh world-state Proxmox VM inventory
    description: Repo-managed ADR 0113 worker that refreshes the canonical Proxmox VM inventory surface.
  - path: f/lv3/world_state/refresh_service_health
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/world-state/refresh-service-health.py"
    language: python3
    summary: Refresh world-state service health
    description: Repo-managed ADR 0113 worker that refreshes service health from the platform capability catalog and live probes.
  - path: f/lv3/world_state/refresh_container_inventory
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/world-state/refresh-container-inventory.py"
    language: python3
    summary: Refresh world-state container inventory
    description: Repo-managed ADR 0113 worker that refreshes runtime container inventory from the Docker host.
  - path: f/lv3/world_state/refresh_netbox_topology
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/world-state/refresh-netbox-topology.py"
    language: python3
    summary: Refresh world-state NetBox topology
    description: Repo-managed ADR 0113 worker that refreshes the canonical NetBox topology surface.
  - path: f/lv3/world_state/refresh_dns_records
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/world-state/refresh-dns-records.py"
    language: python3
    summary: Refresh world-state DNS records
    description: Repo-managed ADR 0113 worker that refreshes canonical DNS publication state.
  - path: f/lv3/world_state/refresh_tls_certs
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/world-state/refresh-tls-certs.py"
    language: python3
    summary: Refresh world-state TLS certificates
    description: Repo-managed ADR 0113 worker that refreshes TLS certificate expiry inventory.
  - path: f/lv3/world_state/refresh_opentofu_drift
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/world-state/refresh-opentofu-drift.py"
    language: python3
    summary: Refresh world-state OpenTofu drift
    description: Repo-managed ADR 0113 worker that refreshes the OpenTofu drift summary surface.
  - path: f/lv3/world_state/refresh_openbao_secret_expiry
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/world-state/refresh-openbao-leases.py"
    language: python3
    summary: Refresh world-state OpenBao secret expiry
    description: Repo-managed ADR 0113 worker that refreshes OpenBao lease and secret expiry metadata.
  - path: f/lv3/world_state/refresh_maintenance_windows
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/world-state/refresh-maintenance-windows.py"
    language: python3
    summary: Refresh world-state maintenance windows
    description: Repo-managed ADR 0113 worker that refreshes active maintenance windows.
  - path: f/lv3/graph/import_from_catalog
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/graph/import-from-catalog.py"
    language: python3
    summary: Rebuild the dependency graph from repo metadata
    description: Repo-managed ADR 0117 worker that rebuilds graph.nodes and graph.edges from the service catalog, workflow catalog, and dependency manifest.
  - path: f/lv3/graph/import_from_netbox
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/graph/import-from-netbox.py"
    language: python3
    summary: Rebuild the dependency graph from NetBox world state
    description: Repo-managed ADR 0117 worker that rebuilds graph.nodes and graph.edges after folding in the latest NetBox topology and DNS world-state surfaces.
  - path: f/lv3/graph/propagate_health
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/graph/propagate-health.py"
    language: python3
    summary: Emit derived health degradation events
    description: Repo-managed ADR 0117 helper that walks dependency descendants for degraded upstream services and emits derived_health_degraded events plus ledger records.
  - path: f/lv3/health/refresh_composite
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/health/refresh-composite.py"
    language: python3
    summary: Refresh the platform health composite index
    description: Repo-managed ADR 0128 worker that aggregates service health, SLO, drift, incident, maintenance, and mutation signals into the canonical composite index.
  - path: f/lv3/detect_deadlocks
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/detect-deadlocks.py"
    language: python3
    summary: ADR 0162 distributed deadlock detector
    description: Repo-managed ADR 0162 worker that scans the lock registry, intent queue, and coordination map for deadlock cycles and requeues the lowest-priority participant.
  - path: f/lv3/intent_queue_dispatcher
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/intent-queue-dispatcher.py"
    language: python3
    summary: ADR 0155 queued intent dispatcher
    description: Repo-managed ADR 0155 worker that replays queued intents once their blocking workflow or resource claims are released.
windmill_seed_schedules:
  - path: f/lv3/scheduler_watchdog_loop_every_10s
    schedule: "*/10 * * * * *"
    timezone: Europe/Bucharest
    script_path: f/lv3/scheduler_watchdog_loop
    args: {}
    enabled: true
    summary: ADR 0172 scheduler watchdog loop
    description: Repo-managed 10-second watchdog schedule that aborts stale scheduler-managed jobs and emits a heartbeat for operator verification.
    no_flow_overlap: true
  - path: f/lv3/lane_scheduler_every_2s
    schedule: "*/2 * * * * *"
    timezone: Europe/Bucharest
    script_path: f/lv3/lane_scheduler
    args: {}
    enabled: true
    summary: ADR 0154 execution lane scheduler
    description: Repo-managed two-second dispatch loop that drains queued VM-scoped intents when their primary lane frees capacity.
    no_flow_overlap: true
  - path: f/lv3/intent_queue_dispatcher_every_minute
    schedule: "0 * * * * *"
    timezone: Europe/Bucharest
    script_path: f/lv3/intent_queue_dispatcher
    args: {}
    enabled: true
    summary: ADR 0155 queued intent dispatcher safety schedule
    description: Repo-managed minute safety schedule that drains queued conflict-blocked intents if release-triggered dispatch was missed.
    no_flow_overlap: true
  - path: f/lv3/scheduler_watchdog_every_30s
    schedule: "*/30 * * * * *"
    timezone: Europe/Bucharest
    script_path: f/lv3/scheduler_watchdog
    args: {}
    enabled: true
    summary: ADR 0119 scheduler watchdog
    description: Repo-managed 30-second watchdog schedule that releases queued scheduler state for completed or budget-violating jobs.
    no_flow_overlap: true
  - path: f/lv3/platform_observation_loop_every_4h
    schedule: "0 0 */4 * * *"
    timezone: Europe/Bucharest
    script_path: f/lv3/platform_observation_loop
    args: {}
    enabled: false
    summary: Disabled ADR 0071 observation-loop schedule placeholder
    description: Repo-managed Windmill schedule definition reserved for the observation loop once controller-equivalent secret contracts are available inside Windmill.
    no_flow_overlap: true
  - path: f/lv3/platform_findings_daily_digest_daily
    schedule: "0 0 8 * * *"
    timezone: Europe/Bucharest
    script_path: f/lv3/platform_findings_daily_digest
    args: {}
    enabled: false
    summary: Disabled ADR 0071 daily digest schedule placeholder
    description: Repo-managed Windmill schedule definition reserved for automatic findings digests after the observation loop is promoted into Windmill.
    no_flow_overlap: true
  - path: f/lv3/config_merge/merge_config_changes_every_minute
    schedule: "0 * * * * *"
    timezone: Europe/Bucharest
    script_path: f/lv3/config_merge/merge_config_changes
    args:
      dsn: "{{ windmill_database_dsn }}"
    enabled: true
    summary: ADR 0158 config-merge worker
    description: Repo-managed minute merge for pending config_change_staging rows against the merge-eligible registry catalog.
    no_flow_overlap: true
  - path: f/lv3/warm_build_cache_nightly
    schedule: "0 0 3 * * *"
    timezone: Europe/Bucharest
    script_path: f/lv3/warm_build_cache
    args: {}
    enabled: false
    summary: Disabled ADR 0089 nightly cache warming placeholder
    description: Repo-managed nightly cache warmer definition for the build-cache workflow; enable it after the cache host is applied live from main.
    no_flow_overlap: true
  - path: f/lv3/build_cache_maintenance_weekly
    schedule: "0 0 4 * * 7"
    timezone: Europe/Bucharest
    script_path: f/lv3/build_cache_maintenance
    args: {}
    enabled: false
    summary: Disabled ADR 0089 weekly cache maintenance placeholder
    description: Repo-managed weekly cache maintenance definition that purges the shared pip cache and checks apt-cacher-ng after the cache host is applied live from main.
    no_flow_overlap: true
  - path: f/lv3/ephemeral_vm_reaper_every_30m
    schedule: "0 */30 * * * *"
    timezone: Europe/Bucharest
    script_path: f/lv3/ephemeral_vm_reaper
    args: {}
    enabled: true
    summary: ADR 0106 ephemeral VM lifecycle reaper
    description: Repo-managed 30-minute sweep that enforces expiry on the governed 910-979 ephemeral VM pool and applies a one-hour grace tag to unowned VMs before the next pass.
    no_flow_overlap: true
  - path: f/lv3/detect_deadlocks_every_30s
    schedule: "*/30 * * * * *"
    timezone: Europe/Bucharest
    script_path: f/lv3/detect_deadlocks
    args: {}
    enabled: true
    summary: ADR 0162 deadlock detector
    description: Repo-managed 30-second deadlock detector schedule for the worker-shared lock, queue, and coordination state.
  - path: f/lv3/fault-injection-first-sunday
    schedule: "0 0 3 * * 7"
    timezone: UTC
    script_path: f/lv3/fault-injection
    args:
      scenario_names: fault:keycloak-unavailable,fault:openbao-unavailable
      schedule_guard: first_sunday
    enabled: true
    summary: ADR 0171 first-Sunday guarded fault injection
    description: Repo-managed weekly trigger at 03:00 UTC that only executes the bounded ADR 0171 monthly subset on the first Sunday of the month.
    no_flow_overlap: true
  - path: f/lv3/world_state/refresh_proxmox_vms_every_minute
    schedule: "0 * * * * *"
    timezone: Europe/Bucharest
    script_path: f/lv3/world_state/refresh_proxmox_vms
    args:
      dsn: "{{ windmill_platform_dsn }}"
    enabled: true
    summary: ADR 0113 Proxmox VM world-state refresh
    description: Repo-managed minute refresh definition for the canonical Proxmox VM world-state surface; enable after the worker checkout is applied from main.
    no_flow_overlap: true
  - path: f/lv3/world_state/refresh_service_health_every_30s
    schedule: "*/30 * * * * *"
    timezone: Europe/Bucharest
    script_path: f/lv3/world_state/refresh_service_health
    args:
      dsn: "{{ windmill_platform_dsn }}"
    enabled: true
    summary: ADR 0113 service health world-state refresh
    description: Repo-managed 30-second refresh definition for the service health world-state surface; enable after the worker checkout is applied from main.
    no_flow_overlap: true
  - path: f/lv3/world_state/refresh_container_inventory_every_minute
    schedule: "0 * * * * *"
    timezone: Europe/Bucharest
    script_path: f/lv3/world_state/refresh_container_inventory
    args:
      dsn: "{{ windmill_platform_dsn }}"
    enabled: true
    summary: ADR 0113 container inventory world-state refresh
    description: Repo-managed minute refresh definition for the container inventory world-state surface; enable after the worker checkout is applied from main.
    no_flow_overlap: true
  - path: f/lv3/world_state/refresh_netbox_topology_every_5m
    schedule: "0 */5 * * * *"
    timezone: Europe/Bucharest
    script_path: f/lv3/world_state/refresh_netbox_topology
    args:
      dsn: "{{ windmill_platform_dsn }}"
    enabled: true
    summary: ADR 0113 NetBox topology world-state refresh
    description: Repo-managed five-minute refresh definition for the NetBox topology world-state surface; enable after the worker checkout is applied from main.
    no_flow_overlap: true
  - path: f/lv3/world_state/refresh_dns_records_every_5m
    schedule: "0 */5 * * * *"
    timezone: Europe/Bucharest
    script_path: f/lv3/world_state/refresh_dns_records
    args:
      dsn: "{{ windmill_platform_dsn }}"
    enabled: true
    summary: ADR 0113 DNS records world-state refresh
