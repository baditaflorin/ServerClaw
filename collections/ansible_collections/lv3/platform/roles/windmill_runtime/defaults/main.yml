---
# Purpose: Define Windmill runtime defaults, worker checkout sync, and runtime secret wiring.
# Inputs: Inventory facts, platform topology helpers, and controller-local secret artifacts.
# Outputs: Role defaults consumed by the Windmill runtime converge tasks and seeded workers.
# Idempotency: Fully idempotent; this file only declares defaults.
# Dependencies: ADR 0077, ADR 0106, ADR 0113, ADR 0165; used by the windmill_runtime role.
# Related Runbooks: docs/runbooks/configure-windmill.md, docs/runbooks/world-state-materializer.md

windmill_workspace_id: lv3
windmill_workspace_name: LV3
windmill_service_topology: "{{ hostvars['proxmox_florin'].lv3_service_topology | service_topology_get('windmill') }}"
windmill_site_dir: /opt/windmill
windmill_secret_dir: /etc/lv3/windmill
windmill_compose_file: "{{ windmill_site_dir }}/docker-compose.yml"
windmill_env_file: "{{ compose_runtime_secret_root }}/windmill/runtime.env"
windmill_legacy_env_file: "{{ windmill_site_dir }}/windmill.env"
windmill_openbao_agent_dir: "{{ windmill_site_dir }}/openbao"
windmill_openbao_agent_image: "{{ openbao_agent_image }}"
windmill_openbao_agent_container_name: windmill-openbao-agent
windmill_openbao_secret_path: services/windmill/runtime-env
windmill_openbao_policy_name: lv3-service-windmill-runtime
windmill_openbao_approle_name: windmill-runtime
windmill_runtime_packages:
  - make
  - openssl
  - python3-psycopg
  - tar
windmill_server_port: "{{ hostvars['proxmox_florin'].platform_port_assignments.windmill_server_port }}"
windmill_host_proxy_port: "{{ hostvars['proxmox_florin'].platform_port_assignments.windmill_host_proxy_port }}"
windmill_server_network_mode: host
windmill_server_requires_docker_nat: "{{ windmill_server_network_mode != 'host' }}"
windmill_image: "{{ container_image_catalog.images.windmill_runtime.ref }}"
windmill_extra_image: "{{ container_image_catalog.images.windmill_extra_runtime.ref }}"
windmill_uv_version: "0.9.21"
windmill_uv_download_url: >-
  https://github.com/astral-sh/uv/releases/download/{{ windmill_uv_version }}/uv-x86_64-unknown-linux-gnu.tar.gz
windmill_uv_install_dir: /usr/local/bin
windmill_uv_binary_path: "{{ windmill_uv_install_dir }}/uv"
windmill_uvx_binary_path: "{{ windmill_uv_install_dir }}/uvx"
windmill_worker_count: 2
windmill_native_worker_count: 4
windmill_database_name: windmill
windmill_database_user: windmill_admin
windmill_database_inventory_host: >-
  {{ 'postgres-staging-lv3' if (env | default('production')) == 'staging' else 'postgres-lv3' }}
windmill_database_host: >-
  {{ hostvars[windmill_database_inventory_host].ansible_host }}
windmill_database_port: 5432
windmill_controller_repo_common_root: >-
  {{
    (
      lookup(
        'ansible.builtin.pipe',
        'git -C ' ~ ((playbook_dir | dirname) | quote) ~ ' rev-parse --path-format=absolute --git-common-dir'
      )
      | dirname
    )
  }}
windmill_database_password_local_file: "{{ windmill_local_artifact_dir }}/database-password.txt"
windmill_database_dsn: >-
  postgres://{{ windmill_database_user }}:{{
    (
      windmill_database_password
      | default(lookup('ansible.builtin.file', windmill_database_password_local_file) | trim, true)
    )
    | urlencode
    | replace('/', '%2F')
  }}@{{ windmill_database_host }}:{{ windmill_database_port }}/{{ windmill_database_name }}?sslmode=disable
windmill_platform_dsn: "{{ windmill_database_dsn }}"
windmill_world_state_dsn: "{{ windmill_database_dsn }}"
windmill_nats_url: nats://127.0.0.1:4222
windmill_nats_username: jetstream-admin
windmill_nats_password_local_file: "{{ windmill_controller_repo_common_root }}/.local/nats/jetstream-admin-password.txt"
windmill_nats_password: >-
  {{
    lookup('ansible.builtin.file', windmill_nats_password_local_file, errors='ignore')
    | default('', true)
    | trim
  }}
windmill_ledger_postgres_user: patroni
windmill_ledger_postgres_database: postgres
windmill_ledger_postgres_host: "{{ hostvars[windmill_database_inventory_host].ansible_host }}"
windmill_ledger_postgres_port: 5432
windmill_ledger_postgres_password_local_file: "{{ windmill_controller_repo_common_root }}/.local/postgres-ha/patroni-superuser-password.txt"
windmill_ledger_postgres_password: >-
  {{
    lookup('ansible.builtin.file', windmill_ledger_postgres_password_local_file, errors='ignore')
    | default('', true)
    | trim
  }}
windmill_ledger_dsn: >-
  {%- set password = windmill_ledger_postgres_password | trim -%}
  {%- if password | length == 0 -%}
  {{ "" }}
  {%- else -%}
  postgresql://{{ windmill_ledger_postgres_user }}:{{ password | urlencode | replace('/', '%2F') }}@{{ windmill_ledger_postgres_host }}:{{ windmill_ledger_postgres_port }}/{{ windmill_ledger_postgres_database }}?sslmode=disable
  {%- endif -%}
windmill_ledger_nats_username: jetstream-admin
windmill_ledger_nats_host: "{{ ansible_host }}"
windmill_ledger_nats_port: 4222
windmill_ledger_nats_password_local_file: "{{ windmill_controller_repo_common_root }}/.local/nats/jetstream-admin-password.txt"
windmill_ledger_nats_password: >-
  {{
    lookup('ansible.builtin.file', windmill_ledger_nats_password_local_file, errors='ignore')
    | default('', true)
    | trim
  }}
windmill_ledger_nats_url: >-
  {%- set password = windmill_ledger_nats_password | trim -%}
  {%- if password | length == 0 -%}
  {{ "" }}
  {%- else -%}
  nats://{{ windmill_ledger_nats_username }}:{{ password | urlencode | replace('/', '%2F') }}@{{ windmill_ledger_nats_host }}:{{ windmill_ledger_nats_port }}
  {%- endif -%}
windmill_superadmin_secret_remote_file: "{{ windmill_secret_dir }}/superadmin-secret"
windmill_local_artifact_dir: "{{ windmill_controller_repo_common_root ~ '/.local/windmill' }}"
windmill_superadmin_secret_local_file: "{{ windmill_local_artifact_dir }}/superadmin-secret.txt"
windmill_controller_local_root: "{{ windmill_local_artifact_dir | dirname }}"
windmill_bootstrap_identity_email: superadmin_secret@windmill.dev
windmill_bootstrap_identity_username: superadmin_secret
windmill_bootstrap_identity_login_type: password
windmill_private_base_url: "http://{{ windmill_service_topology.private_ip }}:{{ windmill_server_port }}"
windmill_base_url: "http://{{ hostvars['proxmox_florin'].management_tailscale_ipv4 }}:{{ windmill_host_proxy_port }}"
windmill_runtime_api_base_url: "http://127.0.0.1:{{ windmill_server_port }}"
windmill_worker_api_base_url: "http://windmill_server:8000"
windmill_healthcheck_script_path: f/lv3/windmill_healthcheck
windmill_validation_gate_status_script_path: f/lv3/gate-status
windmill_default_operations_surface_script_paths:
  - f/lv3/post_merge_gate
  - f/lv3/nightly_integration_tests
  - f/lv3/run_triage
  - f/lv3/runbook_executor
  - f/lv3/calibrate_triage_rules
  - f/lv3/continuous_drift_detection
  - f/lv3/subdomain_exposure_audit
  - f/lv3/restore_verification
  - f/lv3/security_posture_scan
  - f/lv3/weekly_security_scan
  - f/lv3/audit_token_inventory
  - f/lv3/token_exposure_response
  - f/lv3/weekly_capacity_report
  - f/lv3/collection_publish
  - f/lv3/packer_template_rebuild
  - f/lv3/fixture_expiry_reaper
  - f/lv3/maintenance_window
windmill_seed_job_timeout_seconds: 120
windmill_worker_checkout_repo_root_local_dir: >-
  {{
    (inventory_dir ~ '/..')
    if (inventory_dir is defined and inventory_dir | length > 0)
    else (lookup('ansible.builtin.env', 'PWD') | default(playbook_dir ~ '/..', true))
  }}
windmill_worker_repo_checkout_host_path: /srv/proxmox_florin_server
windmill_worker_repo_checkout_container_path: /srv/proxmox_florin_server
windmill_worker_repo_checkout_compat_root: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server
windmill_worker_secret_manifest_path: "{{ playbook_execution_controller_secret_manifest_path }}"
windmill_worker_secret_mirror_ids:
  - bootstrap_ssh_private_key
  - nats_jetstream_admin_password
windmill_worker_proxmox_api_token_payload_dir: "{{ windmill_worker_repo_checkout_host_path }}/.local/proxmox-api"
windmill_worker_proxmox_api_token_payload_file: "{{ windmill_worker_proxmox_api_token_payload_dir }}/lv3-automation-primary.json"
windmill_worker_superadmin_secret_dir: "{{ windmill_worker_repo_checkout_host_path }}/.local/windmill"
windmill_worker_superadmin_secret_file: "{{ windmill_worker_superadmin_secret_dir }}/superadmin-secret.txt"
windmill_openbao_runtime_network: openbao_default
windmill_worker_repo_mutable_directories:
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/state"
    mode: "0777"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/state/operator-access"
    mode: "0777"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/state/idempotency"
    mode: "0777"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/state/execution-lanes"
    mode: "0777"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/scheduler"
    mode: "0777"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/fault-injection"
    mode: "0777"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/network-impairment-matrix"
    mode: "0777"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/integration-tests"
    mode: "0777"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/governed-command/logs"
    mode: "0777"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/governed-command/receipts"
    mode: "0777"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/token-lifecycle"
    mode: "0777"
windmill_worker_repo_mutable_files:
  - path: "{{ windmill_worker_repo_checkout_host_path }}/config/operators.yaml"
    mode: "0666"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/state/execution-lanes/registry.json"
    mode: "0666"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/state/execution-lanes/registry.lock"
    mode: "0666"
windmill_worker_repo_secret_directories:
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/keycloak"
    mode: "0700"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/openbao"
    mode: "0700"
windmill_worker_repo_secret_files:
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/keycloak/bootstrap-admin-password.txt"
    src: "{{ windmill_controller_local_root }}/keycloak/bootstrap-admin-password.txt"
    mode: "0600"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/openbao/init.json"
    src: "{{ windmill_controller_local_root }}/openbao/init.json"
    mode: "0600"
windmill_worker_checkout_checksum_file: "{{ windmill_site_dir }}/worker-checkout.sha256"
windmill_worker_checkout_integrity_files:
  - Makefile
  - scripts/policy_checks.py
  - scripts/policy_toolchain.py
  - scripts/command_catalog.py
  - scripts/gate_status.py
  - config/windmill/scripts/gate-status.py
windmill_worker_checkout_sync_paths:
  - README.md
  - VERSION
  - ansible.cfg
  - callback_plugins
  - changelog.md
  - collections
  - config
  - docs
  - filter_plugins
  - inventory
  - Makefile
  - mkdocs.yml
  - migrations
  - playbooks
  - policy
  - platform
  - receipts
  - versions
  - pytest.ini
  - requirements
  - roles
  - scripts
  - tests
  - workstreams.yaml
  - windmill
windmill_worker_checkout_prune_preserve_paths: >-
  {{
    (
      windmill_worker_repo_mutable_directories
      | map(attribute='path')
      | list
      + windmill_worker_repo_mutable_files
      | map(attribute='path')
      | list
      + windmill_worker_runtime_writable_directories
      | map(attribute='path')
      | list
      + windmill_worker_repo_secret_directories
      | map(attribute='path')
      | list
      + windmill_worker_repo_secret_files
      | map(attribute='path')
      | list
      + [
        windmill_worker_proxmox_api_token_payload_dir,
        windmill_worker_proxmox_api_token_payload_file,
        windmill_worker_superadmin_secret_dir,
        windmill_worker_superadmin_secret_file,
      ]
    )
    | map('regex_replace', '^' ~ (windmill_worker_repo_checkout_host_path | regex_escape) ~ '/?', '')
    | reject('equalto', '')
    | unique
    | list
  }}
windmill_worker_runtime_writable_directories:
  - path: "{{ windmill_worker_repo_checkout_host_path }}/receipts/fixtures"
    mode: "1777"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local"
    mode: "0755"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/fixtures"
    mode: "1777"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/fixtures/reaper-runs"
    mode: "1777"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/fixtures/runtime"
    mode: "1777"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/fixtures/archive"
    mode: "1777"
  - path: "{{ windmill_worker_repo_checkout_host_path }}/.local/fixtures/locks"
    mode: "1777"
windmill_worker_checkout_stale_paths:
  - "{{ windmill_worker_repo_checkout_host_path }}/.venv"
  - "{{ windmill_worker_repo_checkout_host_path }}/pyproject.toml"
  - "{{ windmill_worker_repo_checkout_host_path }}/setup.py"
  - "{{ windmill_worker_repo_checkout_host_path }}/setup.cfg"
  - "{{ windmill_worker_repo_checkout_host_path }}/lv3_platform_cli.egg-info"
windmill_operator_manager_env:
  LV3_OPERATOR_MANAGER_SURFACE: windmill
  LV3_OPENBAO_URL: http://lv3-openbao:8201
  KEYCLOAK_BOOTSTRAP_PASSWORD: >-
    {{
      lookup('ansible.builtin.file', windmill_controller_local_root ~ '/keycloak/bootstrap-admin-password.txt', errors='ignore')
      | default('', true)
      | trim
    }}
  OPENBAO_INIT_JSON: >-
    {{
      lookup('ansible.builtin.file', windmill_controller_local_root ~ '/openbao/init.json', errors='ignore')
      | default('', true)
      | trim
    }}
  TAILSCALE_API_KEY: "{{ lookup('ansible.builtin.env', 'TAILSCALE_API_KEY') | default('', true) }}"
  TAILSCALE_TAILNET: "{{ lookup('ansible.builtin.env', 'TAILSCALE_TAILNET') | default('', true) }}"
  LV3_TAILSCALE_INVITE_ENDPOINT: "{{ lookup('ansible.builtin.env', 'LV3_TAILSCALE_INVITE_ENDPOINT') | default('', true) }}"
  LV3_STEP_CA_SSH_REGISTER_COMMAND: "{{ lookup('ansible.builtin.env', 'LV3_STEP_CA_SSH_REGISTER_COMMAND') | default('', true) }}"
  LV3_STEP_CA_SSH_REVOKE_COMMAND: "{{ lookup('ansible.builtin.env', 'LV3_STEP_CA_SSH_REVOKE_COMMAND') | default('', true) }}"
  LV3_MATTERMOST_WEBHOOK: "{{ lookup('ansible.builtin.env', 'LV3_MATTERMOST_WEBHOOK') | default('', true) }}"
windmill_seed_app_repo_root_local_dir: "{{ windmill_worker_checkout_repo_root_local_dir }}/config/windmill/apps"
windmill_seed_app_sync_dir: "{{ windmill_site_dir }}/seed-apps"
windmill_mutation_audit_dir: "{{ platform_log_dir }}"
windmill_mutation_audit_file: "{{ mutation_audit_log_file }}"
windmill_integration_test_runner_username: test-runner@lv3.org
windmill_integration_test_runner_password_local_file: >-
  {{ windmill_controller_repo_common_root }}/.local/integration-tests/test-runner-password.txt
windmill_seed_scripts:
  - path: f/lv3/gate-status
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/gate-status.py"
    language: python3
    summary: Validation gate status
    description: Repo-managed Windmill wrapper that returns the latest repository validation gate status as structured JSON.
  - path: f/lv3/windmill_healthcheck
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/lv3-healthcheck.py"
    language: python3
    summary: LV3 Windmill healthcheck
    description: Repo-managed verification script for Windmill runtime and worker execution.
  - path: f/lv3/scheduler_watchdog_loop
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/scheduler-watchdog-loop.py"
    language: python3
    summary: ADR 0170 scheduler watchdog loop
    description: Repo-managed helper that runs the budget watchdog against active mutation jobs every 10 seconds.
  - path: f/lv3/platform_observation_loop
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/platform-observation-loop.py"
    language: python3
    summary: LV3 observation loop summary helper
    description: Repo-managed Windmill helper for ADR 0071 observation-loop summaries and later scheduler activation.
  - path: f/lv3/lane_scheduler
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/lane-scheduler.py"
    language: python3
    summary: ADR 0154 execution lane scheduler
    description: Repo-managed worker that dequeues VM-scoped execution intents when a lane has free capacity and submits them to Windmill.
  - path: f/lv3/scheduler_watchdog
    local_file: "{{ inventory_dir }}/../windmill/scheduler/watchdog-loop.py"
    language: python3
    summary: ADR 0119 scheduler watchdog
    description: Repo-managed worker that releases active scheduler state for completed or budget-violating Windmill jobs.
  - path: f/lv3/platform_findings_daily_digest
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/platform-findings-daily-digest.py"
    language: python3
    summary: LV3 findings daily digest helper
    description: Repo-managed Windmill helper that formats ADR 0071 findings into Markdown for operator review.
  - path: f/lv3/config_merge/merge_config_changes
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/merge-config-changes.py"
    language: python3
    summary: Merge staged config registry changes
    description: Repo-managed ADR 0158 helper that merges pending change rows from config_change_staging into the merge-eligible registry files.
  - path: f/lv3/rebuild_rag_index
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/rebuild-rag-index.py"
    language: python3
    summary: Rebuild the LV3 platform context index
    description: Repo-managed Windmill script that triggers a local-corpus rebuild on the private platform context API.
  - path: f/lv3/rebuild_search_index
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/rebuild-search-index.py"
    language: python3
    summary: Rebuild the LV3 local search fabric index
    description: Repo-managed Windmill helper that rebuilds the ADR 0121 local search index from repository-backed collections.
  - path: f/lv3/upgrade_container_image
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/upgrade-container-image.py"
    language: python3
    summary: LV3 container image upgrade workflow
    description: Repo-managed wrapper for catalog-based image upgrades, receipts, and optional converges.
  - path: f/lv3/deploy_and_promote
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/deploy-and-promote.py"
    language: python3
    summary: LV3 deploy and promote workflow
    description: Repo-managed wrapper for ADR 0073 staging gate evaluation, production promotion, and receipt generation.
  - path: f/lv3/mutation_audit_emit
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/lv3-mutation-audit.py"
    language: python3
    summary: LV3 mutation audit helper
    description: Repo-managed helper that emits a structured mutation audit event from a Windmill job.
  - path: f/lv3/warm_build_cache
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/warm-build-cache.py"
    language: python3
    summary: Warm the LV3 build caches
    description: Repo-managed helper that refreshes Docker, pip, Packer, and Ansible collection caches and rewrites config/build-cache-manifest.json.
  - path: f/lv3/build_cache_maintenance
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/build-cache-maintenance.py"
    language: python3
    summary: Maintain the LV3 build caches
    description: Repo-managed helper that purges the shared pip cache and checks the apt-cacher-ng report endpoint on the build server.
  - path: f/lv3/post_merge_gate
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/post-merge-gate.py"
    language: python3
    summary: Post-merge validation gate
    description: Repo-managed Windmill wrapper that re-runs the repository validation gate from the worker checkout after mainline changes land.
  - path: f/lv3/nightly_integration_tests
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/nightly-integration-tests.py"
    language: python3
    summary: ADR 0111 nightly integration tests
    description: Repo-managed Windmill wrapper that runs the production-oriented nightly integration suite and publishes the configured notifications.
  - path: f/lv3/run_triage
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/run-triage.py"
    language: python3
    summary: ADR 0114 incident triage
    description: Repo-managed Windmill wrapper that builds and optionally emits a triage report for one alert payload.
  - path: f/lv3/runbook_executor
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/runbook-executor.py"
    language: python3
    summary: ADR 0129 runbook executor
    description: Repo-managed Windmill wrapper that executes, resumes, or inspects structured runbooks from the mounted worker checkout.
  - path: f/lv3/calibrate_triage_rules
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/calibrate-triage-rules.py"
    language: python3
    summary: ADR 0114 triage calibration
    description: Repo-managed Windmill wrapper that calibrates triage rules from resolved cases and optionally posts the summary to Mattermost.
  - path: f/lv3/continuous_drift_detection
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/continuous-drift-detection.py"
    language: python3
    summary: ADR 0091 continuous drift detection
    description: Repo-managed Windmill wrapper that runs the multi-source drift suite and returns the latest report summary.
  - path: f/lv3/subdomain_exposure_audit
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/subdomain-exposure-audit.py"
    language: python3
    summary: ADR 0139 subdomain exposure audit
    description: Repo-managed Windmill wrapper that audits the subdomain exposure registry against live DNS and edge-auth behavior.
  - path: f/lv3/restore_verification
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/restore-verification.py"
    language: python3
    summary: ADR 0099 restore verification
    description: Repo-managed Windmill wrapper that runs the restore verification workflow and returns the latest receipt summary.
  - path: f/lv3/security_posture_scan
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/security-posture-scan.py"
    language: python3
    summary: ADR 0102 security posture scan
    description: Repo-managed Windmill wrapper that runs the security posture report from the worker checkout and returns the structured scan output.
  - path: f/lv3/weekly_security_scan
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/weekly-security-scan.py"
    language: python3
    summary: ADR 0142 public surface security scan
    description: Repo-managed Windmill wrapper that runs the public-surface security scan and stores one receipt.
  - path: f/lv3/audit_token_inventory
    local_file: "{{ inventory_dir }}/../config/windmill/scripts/audit-token-inventory.py"
    language: python3
    summary: ADR 0141 token inventory audit
    description: Repo-managed Windmill wrapper that audits governed tokens against the lifecycle policy and returns the structured report.
  - path: f/lv3/token_exposure_response
