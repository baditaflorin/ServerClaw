- name: Create a local manifest path for repo-managed Windmill scripts
  ansible.builtin.tempfile:
    state: file
    suffix: .json
  delegate_to: localhost
  become: false
  register: windmill_seed_script_manifest_local

- name: Render the repo-managed Windmill script manifest locally
  ansible.builtin.copy:
    dest: "{{ windmill_seed_script_manifest_local.path }}"
    content: "{{ windmill_seed_scripts | to_nice_json }}"
    mode: "0600"
  delegate_to: localhost
  become: false

- name: Sync repo-managed Windmill scripts
  vars:
    mutation_audit_action: sync.windmill_scripts
    mutation_audit_target: windmill-workspace
    mutation_audit_emit_on_success: true
  ansible.builtin.command:
    argv:
      - uv
      - run
      - --no-project
      - --with
      - pyyaml
      - python3
      - "{{ inventory_dir }}/../scripts/sync_windmill_seed_scripts.py"
      - --base-url
      - "{{ windmill_private_base_url }}"
      - --workspace
      - "{{ windmill_workspace_id }}"
      - --manifest
      - "{{ windmill_seed_script_manifest_local.path }}"
      - --max-attempts
      - "20"
      - --settle-interval
      - "2.0"
  delegate_to: localhost
  become: false
  environment:
    WINDMILL_TOKEN: "{{ windmill_bootstrap_session_token }}"
  register: windmill_seed_script_sync
  changed_when: false
  tags:
    - mutation

- name: Remove the local repo-managed Windmill script manifest
  ansible.builtin.file:
    path: "{{ windmill_seed_script_manifest_local.path }}"
    state: absent
  delegate_to: localhost
  become: false

- name: Ensure the Windmill seed app sync directory exists
  ansible.builtin.file:
    path: "{{ windmill_seed_app_sync_dir }}"
    state: directory
    mode: "0755"
  when: (windmill_seed_raw_apps | default([])) | length > 0

- name: Copy the repo-managed Windmill app sync root
  ansible.builtin.copy:
    src: "{{ windmill_seed_app_repo_root_local_dir }}/"
    dest: "{{ windmill_seed_app_sync_dir }}/"
    mode: preserve
  when: (windmill_seed_raw_apps | default([])) | length > 0

- name: Sync repo-managed Windmill raw apps
  vars:
    mutation_audit_action: sync.windmill_raw_apps
    mutation_audit_target: "{{ item.path }}"
    mutation_audit_emit_on_success: true
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - --network
      - host
      - -e
      - WM_WORKSPACE
      - -e
      - WM_TOKEN
      - -e
      - BASE_INTERNAL_URL
      - -v
      - "{{ windmill_seed_app_sync_dir }}:/workspace"
      - "{{ windmill_image }}"
      - sh
      - -lc
      - >-
        cd /workspace
        && wmill sync push
        --yes
        --skip-variables
        --skip-secrets
        --skip-resources
        --skip-resource-types
        --skip-scripts
        --skip-flows
        --skip-folders
        --skip-workspace-dependencies
        --skip-branch-validation
        --includes "{{ item.sync_pattern }}"
        --message "Repo-managed Windmill raw app sync"
  loop: "{{ windmill_seed_raw_apps | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  register: windmill_seed_raw_app_sync
  environment:
    WM_WORKSPACE: "{{ windmill_workspace_id }}"
    WM_TOKEN: "{{ windmill_bootstrap_session_token }}"
    BASE_INTERNAL_URL: "{{ windmill_runtime_api_base_url }}"
  changed_when: false
  when: (windmill_seed_raw_apps | default([])) | length > 0
  tags:
    - mutation

- name: Create a local manifest path for repo-managed Windmill schedules
  ansible.builtin.tempfile:
    state: file
    suffix: .json
  delegate_to: localhost
  become: false
  register: windmill_seed_schedule_manifest_local

- name: Render the repo-managed Windmill schedule manifest locally
  ansible.builtin.copy:
    dest: "{{ windmill_seed_schedule_manifest_local.path }}"
    content: "{{ windmill_seed_schedules | to_nice_json }}"
    mode: "0600"
  delegate_to: localhost
  become: false

- name: Sync repo-managed Windmill schedules
  vars:
    mutation_audit_action: sync.windmill_schedules
    mutation_audit_target: windmill-workspace
    mutation_audit_emit_on_success: true
  ansible.builtin.command:
    argv:
      - python3
      - "{{ inventory_dir }}/../scripts/sync_windmill_seed_schedules.py"
      - --base-url
      - "{{ windmill_private_base_url }}"
      - --workspace
      - "{{ windmill_workspace_id }}"
      - --manifest
      - "{{ windmill_seed_schedule_manifest_local.path }}"
      - --max-attempts
      - "8"
      - --settle-interval
      - "1.0"
  delegate_to: localhost
  become: false
  environment:
    WINDMILL_TOKEN: "{{ windmill_bootstrap_session_token }}"
  register: windmill_seed_schedule_sync
  changed_when: false
  tags:
    - mutation

- name: Remove the local repo-managed Windmill schedule manifest
  ansible.builtin.file:
    path: "{{ windmill_seed_schedule_manifest_local.path }}"
    state: absent
  delegate_to: localhost
  become: false

- name: Converge repo-managed Windmill schedule enabled flags
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    database_url="$(awk -F= '$1 == "DATABASE_URL" { sub(/^[^=]*=/, ""); print; exit }' "{{ windmill_env_file }}")"
    test -n "${database_url}"
    psql "${database_url}" -v ON_ERROR_STOP=1 -Atqc \
      "UPDATE schedule SET enabled = {{ item.enabled | default(false) | ternary('true', 'false') }} WHERE path = '{{ item.path }}' AND enabled IS DISTINCT FROM {{ item.enabled | default(false) | ternary('true', 'false') }};"
  args:
    executable: /bin/bash
  loop: "{{ windmill_seed_schedules }}"
  loop_control:
    label: "{{ item.path }}"
  register: windmill_seed_schedule_enabled_sync
  changed_when: "'UPDATE 1' in (windmill_seed_schedule_enabled_sync.stdout | default(''))"
  no_log: true

- name: Run the Windmill seeded healthcheck script
  ansible.builtin.shell: >
    python3 {{ (playbook_dir | dirname ~ '/scripts/windmill_run_wait_result.py') | quote }}
    --base-url {{ windmill_base_url | quote }}
    --workspace {{ windmill_workspace_id | quote }}
    --path {{ windmill_healthcheck_script_path | quote }}
    --payload-json '{"probe":"live-verify"}'
    --timeout {{ windmill_seed_job_timeout_seconds }}
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  environment:
    WINDMILL_TOKEN: "{{ windmill_bootstrap_session_token }}"
  register: windmill_healthcheck
  changed_when: false
  no_log: true

- name: Assert the Windmill seeded healthcheck result
  ansible.builtin.assert:
    that:
      - (windmill_healthcheck.stdout | from_json).probe == "live-verify"
      - (windmill_healthcheck.stdout | from_json).job_id_present | bool
      - (windmill_healthcheck.stdout | from_json).workspace == windmill_workspace_id
    fail_msg: "Windmill API responded, but the seeded healthcheck script did not return the expected result."

- name: Verify Windmill health probes
  ansible.builtin.import_tasks: verify.yml
