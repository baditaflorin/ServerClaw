- name: Create a local manifest path for repo-managed Windmill scripts
  ansible.builtin.tempfile:
    state: file
    suffix: .json
  delegate_to: localhost
  become: false
  register: windmill_seed_script_manifest_local

- name: Render the repo-managed Windmill script manifest locally
  ansible.builtin.copy:
    dest: "{{ windmill_seed_script_manifest_local.path }}"
    content: "{{ windmill_seed_scripts | to_nice_json }}"
    mode: "0600"
  delegate_to: localhost
  become: false

- name: Wait for the Windmill API before syncing repo-managed scripts
  ansible.builtin.uri:
    url: "{{ windmill_base_url }}/api/version"
    method: GET
    status_code: 200
  delegate_to: localhost
  become: false
  register: windmill_seed_script_sync_api_wait
  retries: "{{ windmill_runtime_api_wait_retries }}"
  delay: "{{ windmill_runtime_api_wait_delay_seconds }}"
  until: windmill_seed_script_sync_api_wait.status == 200
  changed_when: false

- name: Sync repo-managed Windmill scripts
  vars:
    mutation_audit_action: sync.windmill_scripts
    mutation_audit_target: windmill-workspace
    mutation_audit_emit_on_success: true
  ansible.builtin.command:
    argv:
      - uv
      - run
      - --no-project
      - --with
      - pyyaml
      - python3
      - "{{ windmill_worker_checkout_repo_root_local_dir }}/scripts/sync_windmill_seed_scripts.py"
      - --base-url
      - "{{ windmill_base_url }}"
      - --workspace
      - "{{ windmill_workspace_id }}"
      - --manifest
      - "{{ windmill_seed_script_manifest_local.path }}"
      - --max-attempts
      - "20"
      - --settle-interval
      - "2.0"
  delegate_to: localhost
  become: false
  environment:
    WINDMILL_TOKEN: "{{ windmill_runtime_api_token }}"
  register: windmill_seed_script_sync
  changed_when: false
  tags:
    - mutation

- name: Remove the local repo-managed Windmill script manifest
  ansible.builtin.file:
    path: "{{ windmill_seed_script_manifest_local.path }}"
    state: absent
  delegate_to: localhost
  become: false

- name: Create a local manifest path for repo-managed Windmill resources
  ansible.builtin.tempfile:
    state: file
    suffix: .json
  delegate_to: localhost
  become: false
  register: windmill_seed_resource_manifest_local

- name: Render the repo-managed Windmill resource manifest locally
  ansible.builtin.copy:
    dest: "{{ windmill_seed_resource_manifest_local.path }}"
    content: >-
      {{
        {
          'resource_types': windmill_seed_resource_types,
          'resources': windmill_seed_resources,
        } | to_nice_json
      }}
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Sync repo-managed Windmill resources
  vars:
    mutation_audit_action: sync.windmill_resources
    mutation_audit_target: windmill-workspace
    mutation_audit_emit_on_success: true
  ansible.builtin.command:
    argv:
      - python3
      - "{{ windmill_worker_checkout_repo_root_local_dir }}/scripts/sync_windmill_resources.py"
      - --base-url
      - "{{ windmill_base_url }}"
      - --workspace
      - "{{ windmill_workspace_id }}"
      - --token
      - "{{ windmill_runtime_api_token }}"
      - --manifest
      - "{{ windmill_seed_resource_manifest_local.path }}"
  delegate_to: localhost
  become: false
  register: windmill_seed_resource_sync
  changed_when: false
  no_log: true
  tags:
    - mutation

- name: Remove the local repo-managed Windmill resource manifest
  ansible.builtin.file:
    path: "{{ windmill_seed_resource_manifest_local.path }}"
    state: absent
  delegate_to: localhost
  become: false

- name: Create a temporary Windmill seed app sync directory
  ansible.builtin.tempfile:
    state: directory
    path: "{{ windmill_site_dir }}"
    prefix: seed-apps-
  when: (windmill_seed_raw_apps | default([])) | length > 0
  register: windmill_seed_app_sync_dir

- name: Create a controller-local staging directory for the Windmill app sync root
  ansible.builtin.tempfile:
    state: directory
    suffix: .windmill-app-sync
  when: (windmill_seed_raw_apps | default([])) | length > 0
  delegate_to: localhost
  become: false
  register: windmill_seed_app_sync_root_local

- name: Stage the repo-managed Windmill app sync root without ignored frontend build artifacts
  ansible.builtin.command:
    argv:
      - rsync
      - -a
      - --delete
      - --exclude
      - .DS_Store
      - --filter
      - dir-merge,- .gitignore
      - "{{ windmill_seed_app_repo_root_local_dir }}/"
      - "{{ windmill_seed_app_sync_root_local.path }}/"
  when: (windmill_seed_raw_apps | default([])) | length > 0
  delegate_to: localhost
  become: false
  changed_when: false

- name: Copy the repo-managed Windmill app sync root
  ansible.builtin.copy:
    src: "{{ windmill_seed_app_sync_root_local.path }}/"
    dest: "{{ windmill_seed_app_sync_dir.path }}/"
    mode: preserve
  when: (windmill_seed_raw_apps | default([])) | length > 0

- name: Install frontend dependencies for repo-managed Windmill raw apps
  vars:
    mutation_audit_action: sync.windmill_raw_app_dependencies
    mutation_audit_target: "{{ item.path }}"
    mutation_audit_emit_on_success: true
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - --network
      - host
      - -v
      - "{{ windmill_seed_app_sync_dir.path }}:/workspace"
      - "{{ windmill_image }}"
      - sh
      - -lc
      - >-
        cd /workspace/{{ item.relative_dir }}
        && if [ -f package.json ] && [ ! -f package-lock.json ]; then
          echo "missing package-lock.json for {{ item.path }}" >&2;
          exit 1;
        elif [ -f package-lock.json ]; then
          rm -rf node_modules;
          npm ci --no-audit --no-fund;
        fi
  loop: "{{ windmill_seed_raw_apps | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  register: windmill_seed_raw_app_frontend_install
  retries: 3
  delay: 5
  until: windmill_seed_raw_app_frontend_install.rc == 0
  changed_when: false
  when: (windmill_seed_raw_apps | default([])) | length > 0
  tags:
    - mutation

- name: Sync repo-managed Windmill raw apps
  vars:
    mutation_audit_action: sync.windmill_raw_apps
    mutation_audit_target: "{{ item.path }}"
    mutation_audit_emit_on_success: true
  ansible.builtin.shell: |
    set -euo pipefail
    windmill_version_url="{{ windmill_runtime_api_base_url }}/api/version"
    if ! curl -fsS "$windmill_version_url" >/dev/null; then
      docker compose --file "{{ windmill_compose_file }}" up -d --remove-orphans \
        openbao-agent windmill_server windmill_worker windmill_worker_native >/dev/null
      for _ in $(seq 1 {{ windmill_runtime_api_wait_retries }}); do
        if curl -fsS "$windmill_version_url" >/dev/null; then
          break
        fi
        sleep {{ windmill_runtime_api_wait_delay_seconds }}
      done
      curl -fsS "$windmill_version_url" >/dev/null
    fi
    docker run --rm --network host \
      -e WM_WORKSPACE \
      -e WM_TOKEN \
      -e BASE_INTERNAL_URL \
      -v "{{ windmill_seed_app_sync_dir.path }}:/workspace" \
      "{{ windmill_image }}" \
      sh -lc 'cd /workspace && wmill sync push \
        --yes \
        --skip-variables \
        --skip-secrets \
        --skip-resources \
        --skip-resource-types \
        --skip-scripts \
        --skip-flows \
        --skip-folders \
        --skip-workspace-dependencies \
        --skip-branch-validation \
        --includes "{{ item.sync_pattern }}" \
        --message "Repo-managed Windmill raw app sync"'
  args:
    executable: /bin/bash
  loop: "{{ windmill_seed_raw_apps | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  register: windmill_seed_raw_app_sync
  retries: 3
  delay: 5
  until: windmill_seed_raw_app_sync.rc == 0
  environment:
    WM_WORKSPACE: "{{ windmill_workspace_id }}"
    WM_TOKEN: "{{ windmill_runtime_api_token }}"
    BASE_INTERNAL_URL: "{{ windmill_runtime_api_base_url }}"
  changed_when: false
  when: (windmill_seed_raw_apps | default([])) | length > 0
  tags:
    - mutation

- name: Remove the temporary Windmill seed app sync directory
  ansible.builtin.file:
    path: "{{ windmill_seed_app_sync_dir.path }}"
    state: absent
  when: (windmill_seed_raw_apps | default([])) | length > 0

- name: Remove the controller-local Windmill app sync staging directory
  ansible.builtin.file:
    path: "{{ windmill_seed_app_sync_root_local.path }}"
    state: absent
  when: (windmill_seed_raw_apps | default([])) | length > 0
  delegate_to: localhost
  become: false

- name: Create a local manifest path for repo-managed Windmill schedules
  ansible.builtin.tempfile:
    state: file
    suffix: .json
  delegate_to: localhost
  become: false
  register: windmill_seed_schedule_manifest_local

- name: Render the repo-managed Windmill schedule manifest locally
  ansible.builtin.copy:
    dest: "{{ windmill_seed_schedule_manifest_local.path }}"
    content: "{{ windmill_seed_schedules | to_nice_json }}"
    mode: "0600"
  delegate_to: localhost
  become: false

- name: Sync repo-managed Windmill schedules
  vars:
    mutation_audit_action: sync.windmill_schedules
    mutation_audit_target: windmill-workspace
    mutation_audit_emit_on_success: true
  ansible.builtin.command:
    argv:
      - uv
      - run
      - --no-project
      - --with
      - pyyaml
      - python3
      - "{{ windmill_worker_checkout_repo_root_local_dir }}/scripts/sync_windmill_seed_schedules.py"
      - --base-url
      - "{{ windmill_base_url }}"
      - --workspace
      - "{{ windmill_workspace_id }}"
      - --manifest
      - "{{ windmill_seed_schedule_manifest_local.path }}"
      - --max-attempts
      - "8"
      - --settle-interval
      - "1.0"
  delegate_to: localhost
  become: false
  environment:
    WINDMILL_TOKEN: "{{ windmill_runtime_api_token }}"
  register: windmill_seed_schedule_sync
  changed_when: false
  tags:
    - mutation

- name: Remove the local repo-managed Windmill schedule manifest
  ansible.builtin.file:
    path: "{{ windmill_seed_schedule_manifest_local.path }}"
    state: absent
  delegate_to: localhost
  become: false

- name: Converge repo-managed Windmill schedule enabled flags
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    database_url="$(awk -F= '$1 == "DATABASE_URL" { sub(/^[^=]*=/, ""); print; exit }' "{{ windmill_env_file }}")"
    test -n "${database_url}"
    psql "${database_url}" -v ON_ERROR_STOP=1 -Atqc \
      "UPDATE schedule SET enabled = {{ item.enabled | default(false) | ternary('true', 'false') }} WHERE path = '{{ item.path }}' AND enabled IS DISTINCT FROM {{ item.enabled | default(false) | ternary('true', 'false') }};"
  args:
    executable: /bin/bash
  loop: "{{ windmill_seed_schedules }}"
  loop_control:
    label: "{{ item.path }}"
  changed_when: false
  no_log: true

- name: Wait for Windmill workers to register before seeded healthcheck execution
  ansible.builtin.import_tasks: wait_for_workers.yml

- name: Run the Windmill seeded healthcheck script
  ansible.builtin.shell: >
    python3 {{ (windmill_worker_checkout_repo_root_local_dir ~ '/scripts/windmill_run_wait_result.py') | quote }}
    --base-url {{ windmill_base_url | quote }}
    --workspace {{ windmill_workspace_id | quote }}
    --path {{ windmill_healthcheck_script_path | quote }}
    --payload-json '{"probe":"live-verify"}'
    --timeout {{ windmill_seed_job_timeout_seconds }}
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  environment:
    WINDMILL_BOOTSTRAP_SECRET: "{{ windmill_superadmin_secret }}"
    WINDMILL_TOKEN: "{{ windmill_bootstrap_session_token }}"
  register: windmill_healthcheck
  retries: 3
  delay: 10
  until: windmill_healthcheck.rc == 0
  changed_when: false
  failed_when: false
  no_log: true

- name: Assert the Windmill seeded healthcheck result
  ansible.builtin.assert:
    that:
      - (windmill_healthcheck.stdout | from_json).probe == "live-verify"
      - (windmill_healthcheck.stdout | from_json).job_id_present | bool
      - (windmill_healthcheck.stdout | from_json).workspace == windmill_workspace_id
    fail_msg: "Windmill API responded, but the seeded healthcheck script did not return the expected result."
- name: Verify Windmill health probes
  ansible.builtin.import_tasks: verify.yml
