- name: Remove the temporary ADR 0117 graph migration file
  delegate_to: "{{ windmill_database_inventory_host }}"
  become: true
  become_user: postgres
  ansible.builtin.file:
    path: "{{ windmill_graph_migration_tmp.path }}"
    state: absent

- name: Assert the ADR 0117 graph schema exists in the Windmill database
  delegate_to: "{{ windmill_database_inventory_host }}"
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -d
      - "{{ windmill_database_name }}"
      - -Atqc
      - "SELECT to_regclass('graph.nodes')"
  register: windmill_graph_schema_check
  changed_when: false

- name: Fail when the ADR 0117 graph schema is missing
  ansible.builtin.assert:
    that:
      - windmill_graph_schema_check.stdout | trim == 'graph.nodes'
    fail_msg: "ADR 0117 live schema apply did not create graph.nodes in the Windmill database."

- name: Ensure the ADR 0117 graph schema is owned by the Windmill database role
  delegate_to: "{{ windmill_database_inventory_host }}"
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -d
      - "{{ windmill_database_name }}"
      - -v
      - ON_ERROR_STOP=1
      - -c
      - >-
        ALTER SCHEMA graph OWNER TO {{ windmill_database_user }};
        ALTER TABLE graph.nodes OWNER TO {{ windmill_database_user }};
        ALTER TABLE graph.edges OWNER TO {{ windmill_database_user }};
        ALTER SEQUENCE graph.edges_id_seq OWNER TO {{ windmill_database_user }};
  changed_when: false

- name: Ensure the ADR 0117 graph schema grants runtime access to the Windmill database role
  delegate_to: "{{ windmill_database_inventory_host }}"
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -d
      - "{{ windmill_database_name }}"
      - -v
      - ON_ERROR_STOP=1
      - -c
      - >-
        GRANT USAGE ON SCHEMA graph TO {{ windmill_database_user }};
        GRANT ALL ON ALL TABLES IN SCHEMA graph TO {{ windmill_database_user }};
        GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA graph TO {{ windmill_database_user }};
  changed_when: false

