  become: true
  become_user: postgres
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../migrations/0012_graph_schema.sql"
    dest: "{{ windmill_graph_migration_tmp.path }}"
    mode: "0600"

- name: Apply the ADR 0117 graph migration in the Windmill database
  delegate_to: "{{ windmill_database_inventory_host }}"
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -d
      - "{{ windmill_database_name }}"
      - -v
      - ON_ERROR_STOP=1
      - -f
      - "{{ windmill_graph_migration_tmp.path }}"
