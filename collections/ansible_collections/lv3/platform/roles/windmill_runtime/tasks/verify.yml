---
# Purpose: Verify the converged Windmill runtime, seeded workflows, and worker-side gate wrappers.
# Inputs: Windmill runtime defaults, bootstrap session credentials, and mirrored worker checkout content.
# Outputs: Verified Windmill API reachability, workflow execution receipts, and seeded-script availability checks.
# Idempotency: Fully idempotent; this task file only reads runtime state and asserts expected verification results.
# Dependencies: ADR 0165, ADR 0228, ADR 0230, ADR 0251, ADR 0267, ADR 0371; requires windmill_runtime convergence and seeded scripts.
# Related Runbooks: docs/runbooks/configure-windmill.md, docs/runbooks/validation-gate.md

- name: Verify the Windmill runtime health
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: windmill
    common_verify_port: "{{ windmill_server_port }}"
    common_verify_health_url: "{{ windmill_runtime_api_base_url }}/api/version"
    common_verify_health_retries: "{{ windmill_runtime_api_wait_retries }}"
    common_verify_health_delay: "{{ windmill_runtime_api_wait_delay_seconds }}"

- name: Wait for Windmill workers to register before verification
  ansible.builtin.import_tasks: wait_for_workers.yml

- name: Run the Windmill seeded healthcheck script
  ansible.builtin.shell: >
    python3 {{ (playbook_dir | dirname ~ '/scripts/windmill_run_wait_result.py') | quote }}
    --base-url {{ windmill_base_url | quote }}
    --workspace {{ windmill_workspace_id | quote }}
    --path {{ windmill_healthcheck_script_path | quote }}
    --payload-json '{"probe":"live-verify"}'
    --timeout {{ windmill_seed_job_timeout_seconds }}
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  environment:
    WINDMILL_BOOTSTRAP_SECRET: "{{ windmill_superadmin_secret }}"
    WINDMILL_TOKEN: "{{ windmill_bootstrap_session_token }}"
  register: windmill_verify_healthcheck
  changed_when: false
  failed_when: false
  retries: 4
  delay: 15
  until:
    - windmill_verify_healthcheck.rc == 0
    - (windmill_verify_healthcheck.stdout | default('') | trim | length) > 0
  no_log: true

- name: Assert the Windmill seeded healthcheck result
  ansible.builtin.assert:
    that:
      - (windmill_verify_healthcheck.stdout | from_json).probe == "live-verify"
      - (windmill_verify_healthcheck.stdout | from_json).job_id_present | bool
      - (windmill_verify_healthcheck.stdout | from_json).workspace == windmill_workspace_id
    fail_msg: "Windmill API responded, but the seeded healthcheck script did not return the expected result."

- name: Ensure Windmill validation gate integrity file parent directories exist on the guest
  ansible.builtin.file:
    path: "{{ (windmill_worker_repo_checkout_host_path ~ '/' ~ item) | dirname }}"
    state: directory
    mode: "0755"
  loop: "{{ windmill_worker_checkout_integrity_files }}"
  loop_control:
    label: "{{ item }}"

- name: Mirror Windmill validation gate integrity files to the guest before verification
  ansible.builtin.copy:
    src: "{{ windmill_worker_checkout_repo_root_local_dir }}/{{ item }}"
    dest: "{{ windmill_worker_repo_checkout_host_path }}/{{ item }}"
    mode: preserve
  loop: "{{ windmill_worker_checkout_integrity_files }}"
  loop_control:
    label: "{{ item }}"

- name: Reconcile the Windmill runtime before validation gate verification
  ansible.builtin.import_tasks: recover_verification_runtime.yml
  vars:
    windmill_verify_runtime_reconcile_reason: validation gate verification

- name: Run the Windmill validation gate status script
  ansible.builtin.shell: >
    python3 {{ (playbook_dir | dirname ~ '/scripts/windmill_run_wait_result.py') | quote }}
    --base-url {{ windmill_base_url | quote }}
    --workspace {{ windmill_workspace_id | quote }}
    --path {{ windmill_validation_gate_status_script_path | quote }}
    --payload-json '{}'
    --timeout {{ windmill_seed_job_timeout_seconds }}
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  environment:
    WINDMILL_BOOTSTRAP_SECRET: "{{ windmill_superadmin_secret }}"
    WINDMILL_TOKEN: "{{ windmill_bootstrap_session_token }}"
  register: windmill_verify_validation_gate_status
  changed_when: false
  failed_when: false
  retries: 10
  delay: 5
  until:
    - windmill_verify_validation_gate_status.rc == 0
    - (windmill_verify_validation_gate_status.stdout | default('') | trim | length) > 0
  no_log: true

- name: Assert the Windmill validation gate status result
  ansible.builtin.assert:
    that:
      - windmill_verify_validation_gate_status.rc == 0
      - (windmill_verify_validation_gate_status.stdout | default('') | trim | length) > 0
    fail_msg: >-
      Windmill validation gate status did not return structured output after retries.
      rc={{ windmill_verify_validation_gate_status.rc }}
      stderr={{ windmill_verify_validation_gate_status.stderr | default('') | trim }}

- name: Assert the Windmill validation gate status result
  ansible.builtin.assert:
    that:
      - (windmill_verify_validation_gate_status.stdout | from_json).status == "ok"
      - (windmill_verify_validation_gate_status.stdout | from_json).gate_status.manifest_path | length > 0
      - ((windmill_verify_validation_gate_status.stdout | from_json).gate_status.enabled_checks | length) >= 1
      - ((windmill_verify_validation_gate_status.stdout | from_json).gate_status.waiver_summary.totals.compliant_receipts | int) >= 0
      - ((windmill_verify_validation_gate_status.stdout | from_json).gate_status.waiver_summary.release_blockers | type_debug) == "list"
    fail_msg: >-
      Windmill API responded, but the seeded validation gate status script did not return the expected structured result.

- name: Reconcile the Windmill runtime before stage smoke verification
  ansible.builtin.import_tasks: recover_verification_runtime.yml
  vars:
    windmill_verify_runtime_reconcile_reason: stage smoke verification

- name: Run the Windmill stage smoke suites script
  ansible.builtin.shell: >
    python3 {{ (playbook_dir | dirname ~ '/scripts/windmill_run_wait_result.py') | quote }}
    --base-url {{ windmill_base_url | quote }}
    --workspace {{ windmill_workspace_id | quote }}
    --path {{ windmill_stage_smoke_suites_script_path | quote }}
    --payload-json '{"service":"windmill","environment":"production"}'
    --timeout {{ windmill_seed_job_timeout_seconds }}
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  environment:
    WINDMILL_BOOTSTRAP_SECRET: "{{ windmill_superadmin_secret }}"
    WINDMILL_TOKEN: "{{ windmill_bootstrap_session_token }}"
  register: windmill_verify_stage_smoke_suites
  changed_when: false
  no_log: true

- name: Assert the Windmill stage smoke suites result
  ansible.builtin.assert:
    that:
      - (windmill_verify_stage_smoke_suites.stdout | from_json).status == "ok"
      - (windmill_verify_stage_smoke_suites.stdout | from_json).result.status == "passed"
      - ((windmill_verify_stage_smoke_suites.stdout | from_json).result.receipt_smoke_suites | length) >= 1
    fail_msg: >-
      Windmill API responded, but the seeded stage smoke suites script did not return a passing structured result.
  ignore_errors: "{{ windmill_smoke_suite_soft_fail | default(true) | bool }}"
  register: windmill_smoke_suite_assertion

- name: Warn when the Windmill stage smoke suites did not pass
  ansible.builtin.debug:
    msg: >-
      [warning] Stage smoke suites did not pass. This is non-fatal during deployment but should be investigated.
      Review the smoke suite results in the Windmill job log.
  when: windmill_smoke_suite_assertion is failed

- name: Collect controller-side checksums for Windmill Atlas verification helper files
  ansible.builtin.stat:
    path: "{{ windmill_worker_checkout_repo_root_local_dir }}/{{ item }}"
    checksum_algorithm: sha256
  delegate_to: localhost
  become: false
  loop:
    - scripts/atlas_schema.py
    - scripts/run_python_with_packages.sh
  register: windmill_verify_atlas_helper_files_local
  changed_when: false

- name: Assert controller-side Windmill Atlas verification helper files exist
  ansible.builtin.assert:
    that:
      - item.stat.exists | bool
    fail_msg: >-
      Windmill Atlas verification helper {{ item.item }} is missing from the controller workspace.
  loop: "{{ windmill_verify_atlas_helper_files_local.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Ensure Windmill Atlas verification helper parent directories exist on the guest
  ansible.builtin.file:
    path: "{{ (windmill_worker_repo_checkout_host_path ~ '/' ~ item) | dirname }}"
    state: directory
    mode: "0755"
  loop:
    - scripts/atlas_schema.py
    - scripts/run_python_with_packages.sh
  loop_control:
    label: "{{ item }}"

- name: Mirror Windmill Atlas verification helper files to the guest immediately before Atlas verification
  ansible.builtin.copy:
    src: "{{ windmill_worker_checkout_repo_root_local_dir }}/{{ item.item }}"
    dest: "{{ windmill_worker_repo_checkout_host_path }}/{{ item.item }}"
    mode: preserve
  loop: "{{ windmill_verify_atlas_helper_files_local.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Ensure the Windmill Atlas snapshot directory exists on the guest immediately before Atlas verification
  ansible.builtin.file:
    path: "{{ windmill_worker_repo_checkout_host_path }}/config/atlas"
    state: directory
    mode: "0755"

- name: Mirror Windmill Atlas schema snapshots to the guest immediately before Atlas verification
  ansible.builtin.copy:
    src: "{{ windmill_worker_checkout_repo_root_local_dir }}/config/atlas/"
    dest: "{{ windmill_worker_repo_checkout_host_path }}/config/atlas/"
    mode: preserve

- name: Collect guest-side checksums for Windmill Atlas verification helper files
  ansible.builtin.stat:
    path: "{{ windmill_worker_repo_checkout_host_path }}/{{ item.item }}"
    checksum_algorithm: sha256
  loop: "{{ windmill_verify_atlas_helper_files_local.results }}"
  loop_control:
    label: "{{ item.item }}"
  register: windmill_verify_atlas_helper_files_remote
  changed_when: false

- name: Assert the Windmill Atlas verification helper files match controller state immediately before Atlas verification
  ansible.builtin.assert:
    that:
      - windmill_verify_atlas_helper_files_remote.results[item].stat.exists | default(false)
      - >-
        (windmill_verify_atlas_helper_files_remote.results[item].stat.checksum | default(''))
        ==
        (windmill_verify_atlas_helper_files_local.results[item].stat.checksum | default(''))
    fail_msg: >-
      Windmill Atlas verification helper
      {{ windmill_verify_atlas_helper_files_local.results[item].item }}
      does not match the controller workspace immediately before Atlas verification.
  loop: "{{ range(0, windmill_verify_atlas_helper_files_local.results | length) | list }}"
  loop_control:
    label: "{{ windmill_verify_atlas_helper_files_local.results[item].item }}"

- name: Ensure the Windmill Atlas verification seeded job secret directories exist on the guest immediately before Atlas verification
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
  loop: "{{ windmill_worker_seed_job_secret_directories }}"
  no_log: true

- name: Stat optional Windmill Atlas verification seeded job secret files before mirror
  ansible.builtin.stat:
    path: "{{ item.src }}"
  loop: "{{ windmill_worker_seed_job_secret_files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  delegate_to: localhost
  become: false
  register: windmill_verify_seed_secret_stat

- name: Mirror the Windmill Atlas verification seeded job secret files to the guest immediately before Atlas verification
  ansible.builtin.copy:
    src: "{{ item.item.src }}"
    dest: "{{ item.item.path }}"
    mode: "{{ item.item.mode }}"
    owner: "{{ item.item.owner }}"
    group: "{{ item.item.group }}"
  loop: "{{ windmill_verify_seed_secret_stat.results }}"
  loop_control:
    label: "{{ item.item.path | basename }}"
  when: item.stat.exists or not (item.item.optional | default(false) | bool)
  no_log: true

- name: Define the critical Windmill verification script expectations
  ansible.builtin.set_fact:
    windmill_verify_critical_seed_script_expectations:
      "{{ {
        windmill_healthcheck_script_path: {
          'local_file': windmill_seed_script_root_local_dir ~ '/lv3-healthcheck.py',
          'content': lookup('ansible.builtin.file', windmill_seed_script_root_local_dir ~ '/lv3-healthcheck.py', rstrip=False),
        },
        windmill_validation_gate_status_script_path: {
          'local_file': windmill_seed_script_root_local_dir ~ '/gate-status.py',
          'content': lookup('ansible.builtin.file', windmill_seed_script_root_local_dir ~ '/gate-status.py', rstrip=False),
        },
        windmill_stage_smoke_suites_script_path: {
          'local_file': inventory_dir ~ '/../config/windmill/scripts/stage-smoke-suites.py',
          'content': lookup('ansible.builtin.file', inventory_dir ~ '/../config/windmill/scripts/stage-smoke-suites.py', rstrip=False),
        },
        windmill_atlas_drift_check_script_path: {
          'local_file': inventory_dir ~ '/../config/windmill/scripts/atlas-drift-check.py',
          'content': lookup('ansible.builtin.file', inventory_dir ~ '/../config/windmill/scripts/atlas-drift-check.py', rstrip=False),
        },
      } }}"
  no_log: true

- name: Verify the critical Windmill verification scripts are seeded with current controller content
  ansible.builtin.uri:
    url: "{{ windmill_base_url }}/api/w/{{ windmill_workspace_id }}/scripts/get/p/{{ item.path | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ windmill_bootstrap_session_token }}"
    status_code:
      - 200
  loop:
    - path: "{{ windmill_healthcheck_script_path }}"
    - path: "{{ windmill_validation_gate_status_script_path }}"
    - path: "{{ windmill_stage_smoke_suites_script_path }}"
    - path: "{{ windmill_atlas_drift_check_script_path }}"
  loop_control:
    label: "{{ item.path }}"
  delegate_to: localhost
  become: false
  register: windmill_verify_critical_seed_scripts
  changed_when: false
  failed_when: false
  retries: 6
  delay: 5
  until:
    - windmill_verify_critical_seed_scripts.status == 200
    - ((windmill_verify_critical_seed_scripts.json | default({})).path | default('')) == item.path
  no_log: true

- name: Initialize the critical Windmill verification script drift tracker
  ansible.builtin.set_fact:
    windmill_verify_critical_seed_script_drift_paths: []
  no_log: true

- name: Record critical Windmill verification scripts that drifted after sync
  ansible.builtin.set_fact:
    windmill_verify_critical_seed_script_drift_paths: >-
      {{
        (
          windmill_verify_critical_seed_script_drift_paths
          + [item.item.path]
        ) | unique
      }}
  loop: "{{ windmill_verify_critical_seed_scripts.results }}"
  loop_control:
    label: "{{ item.item.path }}"
  when:
    - item.status != 200
      or (((item.json | default({})).path | default('')) != item.item.path)
      or (((item.json | default({})).content | default(''))
         != windmill_verify_critical_seed_script_expectations[item.item.path].content)
  no_log: true

- name: Create a local manifest path for drifted critical Windmill verification scripts
  ansible.builtin.tempfile:
    state: file
    suffix: .json
  when: (windmill_verify_critical_seed_script_drift_paths | length) > 0
  delegate_to: localhost
  become: false
  register: windmill_verify_critical_seed_script_manifest_local

- name: Render the drifted critical Windmill verification script manifest locally
  ansible.builtin.copy:
    dest: "{{ windmill_verify_critical_seed_script_manifest_local.path }}"
    content: >-
      {{
        (
          windmill_seed_scripts
          | selectattr('path', 'in', windmill_verify_critical_seed_script_drift_paths)
          | list
        ) | to_nice_json
      }}
    mode: "0600"
  when: (windmill_verify_critical_seed_script_drift_paths | length) > 0
  delegate_to: localhost
  become: false

- name: Re-sync drifted critical Windmill verification scripts after concurrent drift
  ansible.builtin.command:
    argv:
      - uv
      - run
      - --no-project
      - --with
      - pyyaml
      - python3
      - "{{ windmill_worker_checkout_repo_root_local_dir }}/scripts/sync_windmill_seed_scripts.py"
      - --base-url
      - "{{ windmill_base_url }}"
      - --workspace
      - "{{ windmill_workspace_id }}"
      - --manifest
      - "{{ windmill_verify_critical_seed_script_manifest_local.path }}"
      - --max-attempts
      - "20"
      - --settle-interval
      - "2.0"
  when: (windmill_verify_critical_seed_script_drift_paths | length) > 0
  delegate_to: localhost
  become: false
  environment:
    WINDMILL_TOKEN: "{{ windmill_bootstrap_session_token }}"
  register: windmill_verify_critical_seed_script_resync
  changed_when: false
  no_log: true

- name: Remove the local drifted critical Windmill verification script manifest
  ansible.builtin.file:
    path: "{{ windmill_verify_critical_seed_script_manifest_local.path }}"
    state: absent
  when: (windmill_verify_critical_seed_script_drift_paths | length) > 0
  delegate_to: localhost
  become: false

- name: Verify the critical Windmill verification scripts are seeded with current controller content after any repair attempt
  ansible.builtin.uri:
    url: "{{ windmill_base_url }}/api/w/{{ windmill_workspace_id }}/scripts/get/p/{{ item.path | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ windmill_bootstrap_session_token }}"
    status_code:
      - 200
  loop:
    - path: "{{ windmill_healthcheck_script_path }}"
    - path: "{{ windmill_validation_gate_status_script_path }}"
    - path: "{{ windmill_stage_smoke_suites_script_path }}"
    - path: "{{ windmill_atlas_drift_check_script_path }}"
  loop_control:
    label: "{{ item.path }}"
  delegate_to: localhost
  become: false
  register: windmill_verify_critical_seed_scripts_final
  changed_when: false
  failed_when: false
  retries: 6
  delay: 5
  until:
    - windmill_verify_critical_seed_scripts_final.status == 200
    - ((windmill_verify_critical_seed_scripts_final.json | default({})).path | default('')) == item.path
  no_log: true

- name: Assert the critical Windmill verification scripts match controller content
  ansible.builtin.assert:
    that:
      - item.status == 200
      - item.json.path == item.item.path
      - item.json.content == windmill_verify_critical_seed_script_expectations[item.json.path].content
    fail_msg: >-
      Windmill seeded script {{ item.item.path }} does not match controller content from
      {{ windmill_verify_critical_seed_script_expectations[item.json.path].local_file }} after converge and repair.
  loop: "{{ windmill_verify_critical_seed_scripts_final.results }}"
  loop_control:
    label: "{{ item.item.path }}"
  no_log: true

- name: Reconcile the Windmill runtime before Atlas drift verification
  ansible.builtin.import_tasks: recover_verification_runtime.yml
  vars:
    windmill_verify_runtime_reconcile_reason: Atlas drift verification

- name: Run the Windmill Atlas drift check script
  ansible.builtin.shell: >
    python3 {{ (playbook_dir | dirname ~ '/scripts/windmill_run_wait_result.py') | quote }}
    --base-url {{ windmill_base_url | quote }}
    --workspace {{ windmill_workspace_id | quote }}
    --path {{ windmill_atlas_drift_check_script_path | quote }}
    --payload-json '{}'
    --timeout {{ windmill_seed_job_timeout_seconds }}
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  environment:
    WINDMILL_BOOTSTRAP_SECRET: "{{ windmill_superadmin_secret }}"
    WINDMILL_TOKEN: "{{ windmill_bootstrap_session_token }}"
  register: windmill_verify_atlas_drift_check
  retries: 3
  delay: 10
  until: windmill_verify_atlas_drift_check.rc == 0
  changed_when: false
  failed_when: false
  no_log: true

- name: Assert the Windmill Atlas drift check result
  ansible.builtin.assert:
    that:
      - (windmill_verify_atlas_drift_check.stdout | from_json).status == "ok"
      - (windmill_verify_atlas_drift_check.stdout | from_json).report.status == "clean"
      - ((windmill_verify_atlas_drift_check.stdout | from_json).report.checked_databases | length) >= 1
    fail_msg: >-
      Windmill API responded, but the seeded Atlas drift check script did not return the expected clean structured result.

- name: Verify the Windmill default operations scripts are seeded
  ansible.builtin.uri:
    url: "{{ windmill_base_url }}/api/w/{{ windmill_workspace_id }}/scripts/get/p/{{ item | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ windmill_runtime_api_token }}"
    status_code:
      - 200
      - 404
      - 429
      - 500
      - 502
      - 503
      - 504
  loop: "{{ windmill_default_operations_surface_script_paths }}"
  loop_control:
    label: "{{ item }}"
  delegate_to: localhost
  become: false
  register: windmill_verify_default_operations_scripts
  changed_when: false
  failed_when: false
  retries: 6
  delay: 5
  until:
    - windmill_verify_default_operations_scripts.status == 200
    - ((windmill_verify_default_operations_scripts.json | default({})).path | default('')) == item
  no_log: true

- name: Assert the Windmill default operations scripts exist
  ansible.builtin.assert:
    that:
      - item.status == 200
      - item.json.path == item.item
    fail_msg: "Windmill default operations surface is missing seeded script {{ item.item }}."
  loop: "{{ windmill_verify_default_operations_scripts.results }}"
  loop_control:
    label: "{{ item.item }}"
