---
- name: Verify the Windmill API version endpoint
  ansible.builtin.uri:
    url: "{{ windmill_runtime_api_base_url }}/api/version"
    method: GET
    status_code: 200
  register: windmill_verify_version
  retries: "{{ windmill_runtime_api_wait_retries }}"
  delay: "{{ windmill_runtime_api_wait_delay_seconds }}"
  until: windmill_verify_version.status == 200
  changed_when: false

- name: Wait for Windmill workers to register before verification
  ansible.builtin.import_tasks: wait_for_workers.yml

- name: Run the Windmill seeded healthcheck script
  ansible.builtin.shell: >
    python3 {{ (playbook_dir | dirname ~ '/scripts/windmill_run_wait_result.py') | quote }}
    --base-url {{ windmill_base_url | quote }}
    --workspace {{ windmill_workspace_id | quote }}
    --path {{ windmill_healthcheck_script_path | quote }}
    --payload-json '{"probe":"live-verify"}'
    --timeout {{ windmill_seed_job_timeout_seconds }}
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  environment:
    WINDMILL_BOOTSTRAP_SECRET: "{{ windmill_superadmin_secret }}"
    WINDMILL_TOKEN: "{{ windmill_bootstrap_session_token }}"
  register: windmill_verify_healthcheck
  retries: 3
  delay: 10
  until: windmill_verify_healthcheck.rc == 0
  changed_when: false
  failed_when: false
  no_log: true

- name: Assert the Windmill seeded healthcheck result
  ansible.builtin.assert:
    that:
      - (windmill_verify_healthcheck.stdout | from_json).probe == "live-verify"
      - (windmill_verify_healthcheck.stdout | from_json).job_id_present | bool
      - (windmill_verify_healthcheck.stdout | from_json).workspace == windmill_workspace_id
    fail_msg: "Windmill API responded, but the seeded healthcheck script did not return the expected result."

- name: Run the Windmill validation gate status script
  ansible.builtin.shell: >
    python3 {{ (playbook_dir | dirname ~ '/scripts/windmill_run_wait_result.py') | quote }}
    --base-url {{ windmill_base_url | quote }}
    --workspace {{ windmill_workspace_id | quote }}
    --path {{ windmill_validation_gate_status_script_path | quote }}
    --payload-json '{}'
    --timeout {{ windmill_seed_job_timeout_seconds }}
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  environment:
    WINDMILL_BOOTSTRAP_SECRET: "{{ windmill_superadmin_secret }}"
    WINDMILL_TOKEN: "{{ windmill_bootstrap_session_token }}"
  register: windmill_verify_validation_gate_status
  retries: 3
  delay: 10
  until:
    - windmill_verify_validation_gate_status.rc == 0
    - windmill_verify_validation_gate_status.stdout | trim | length > 0
  changed_when: false
  failed_when: false
  no_log: true

- name: Assert the Windmill validation gate status result
  ansible.builtin.assert:
    that:
      - (windmill_verify_validation_gate_status.stdout | from_json).status == "ok"
      - (windmill_verify_validation_gate_status.stdout | from_json).gate_status.manifest_path | length > 0
      - ((windmill_verify_validation_gate_status.stdout | from_json).gate_status.enabled_checks | length) >= 1
    fail_msg: >-
      Windmill API responded, but the seeded validation gate status script did not return the expected structured result.

- name: Run the Windmill stage smoke suites script
  ansible.builtin.shell: >
    python3 {{ (playbook_dir | dirname ~ '/scripts/windmill_run_wait_result.py') | quote }}
    --base-url {{ windmill_base_url | quote }}
    --workspace {{ windmill_workspace_id | quote }}
    --path {{ windmill_stage_smoke_suites_script_path | quote }}
    --payload-json '{"service":"windmill","environment":"production"}'
    --timeout {{ windmill_seed_job_timeout_seconds }}
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  environment:
    WINDMILL_BOOTSTRAP_SECRET: "{{ windmill_superadmin_secret }}"
    WINDMILL_TOKEN: "{{ windmill_bootstrap_session_token }}"
  register: windmill_verify_stage_smoke_suites
  changed_when: false
  no_log: true

- name: Assert the Windmill stage smoke suites result
  ansible.builtin.assert:
    that:
      - (windmill_verify_stage_smoke_suites.stdout | from_json).status == "ok"
      - (windmill_verify_stage_smoke_suites.stdout | from_json).result.status == "passed"
      - ((windmill_verify_stage_smoke_suites.stdout | from_json).result.receipt_smoke_suites | length) >= 1
    fail_msg: >-
      Windmill API responded, but the seeded stage smoke suites script did not return a passing structured result.

- name: Verify the Windmill default operations scripts are seeded
  ansible.builtin.uri:
    url: "{{ windmill_base_url }}/api/w/{{ windmill_workspace_id }}/scripts/get/p/{{ item | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ windmill_runtime_api_token }}"
    status_code:
      - 200
      - 404
      - 429
      - 500
      - 502
      - 503
      - 504
  loop: "{{ windmill_default_operations_surface_script_paths }}"
  loop_control:
    label: "{{ item }}"
  delegate_to: localhost
  become: false
  register: windmill_verify_default_operations_scripts
  changed_when: false
  failed_when: false
  retries: 6
  delay: 5
  until:
    - windmill_verify_default_operations_scripts.status == 200
    - ((windmill_verify_default_operations_scripts.json | default({})).path | default('')) == item
  no_log: true

- name: Assert the Windmill default operations scripts exist
  ansible.builtin.assert:
    that:
      - item.status == 200
      - item.json.path == item.item
    fail_msg: "Windmill default operations surface is missing seeded script {{ item.item }}."
  loop: "{{ windmill_verify_default_operations_scripts.results }}"
  loop_control:
    label: "{{ item.item }}"
