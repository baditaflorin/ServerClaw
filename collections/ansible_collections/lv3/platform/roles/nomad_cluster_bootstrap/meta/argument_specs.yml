    short_description: Bootstrap Nomad TLS artifacts, ACL access, and smoke jobs.
    options:
      nomad_cluster_bootstrap_local_tls_dir:
        type: path
        required: true
      nomad_cluster_bootstrap_local_ca_key_file:
        type: path
        required: true
      nomad_cluster_bootstrap_local_ca_cert_file:
        type: path
        required: true
      nomad_cluster_bootstrap_local_server_key_file:
        type: path
        required: true
      nomad_cluster_bootstrap_local_server_cert_file:
        type: path
        required: true
      nomad_cluster_bootstrap_local_client_key_file:
        type: path
        required: true
      nomad_cluster_bootstrap_local_client_cert_file:
        type: path
        required: true
      nomad_cluster_bootstrap_management_token_local_file:
        type: path
        required: true
      nomad_cluster_bootstrap_management_token_remote_file:
        type: path
        required: true
      nomad_cluster_bootstrap_remote_job_dir:
        type: path
        required: true
      nomad_cluster_bootstrap_server_host:
        type: str
        required: true
      nomad_cluster_bootstrap_runtime_host:
        type: str
        required: true
      nomad_cluster_bootstrap_build_host:
        type: str
        required: true
      nomad_cluster_bootstrap_server_ip:
        type: str
        required: true
      nomad_cluster_bootstrap_proxy_ip:
