---
# Neko Runtime Handlers

- name: restart neko
  docker_container:
    name: "{{ neko_runtime_container_name }}"
    state: restarted
    restart_timeout: 10
  listen: "restart neko"
  tags: [neko, handlers]

- name: reload neko configuration
  block:
    - name: Stop Neko container
      docker_container:
        name: "{{ neko_runtime_container_name }}"
        state: stopped

    - name: Remove Neko container
      docker_container:
        name: "{{ neko_runtime_container_name }}"
        state: absent

    - name: Re-deploy Neko container
      docker_compose:
        project_src: "{{ neko_runtime_data_dir }}"
        files:
          - docker-compose.yml
        state: present
  listen: "reload neko configuration"
  tags: [neko, handlers]
