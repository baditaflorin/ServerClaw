---
# Neko Runtime Convergence — Multi-Instance
# Manages N isolated browser containers driven by neko_instances dict.
# Graceful: each instance deploys independently; one failing never blocks others.

- name: Derive Neko conventional defaults from the service registry
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: derive_service_defaults
  vars:
    common_derive_service_name: neko
  when: neko_site_dir is not defined

- name: Assert neko_instances is defined
  ansible.builtin.assert:
    that:
      - neko_instances is mapping
    fail_msg: "neko_instances must be a dict (can be empty: {})"

- name: Ensure base Neko data directory exists
  ansible.builtin.file:
    path: "{{ neko_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Pull Neko Docker image (shared across all instances)
  community.docker.docker_image:
    name: "{{ neko_runtime_image_name }}"
    tag: "{{ neko_runtime_image_tag }}"
    source: pull
    force_tag: true
  register: neko_image_pulled

- name: Capture image digest for change detection
  ansible.builtin.shell: |
    docker inspect {{ neko_runtime_image_name }}:{{ neko_runtime_image_tag }} \
      --format='{{ "{{" }}index .RepoDigests 0{{ "}}" }}'
  register: neko_image_digest_output
  changed_when: false

- name: Set image digest fact
  ansible.builtin.set_fact:
    neko_runtime_image_pull_digest: "{{ neko_image_digest_output.stdout }}"

# Deploy each configured instance (failures are isolated — other instances continue)
- name: Deploy Neko instances
  ansible.builtin.include_tasks: deploy_instance.yml
  loop: "{{ neko_instances | dict2items }}"
  loop_control:
    loop_var: _neko_inst_item
    label: "neko-{{ _neko_inst_item.key }}"

# Remove containers for instances that were removed from neko_instances
- name: Clean up removed Neko instances
  ansible.builtin.include_tasks: cleanup_removed_instances.yml

# Remove the legacy single-instance container if it exists (migration)
- name: Remove legacy neko container if present (replaced by named instances)
  ansible.builtin.shell: |
    docker rm -f neko 2>/dev/null && echo removed || echo absent
  register: _neko_legacy_cleanup
  changed_when: "'removed' in _neko_legacy_cleanup.stdout"
