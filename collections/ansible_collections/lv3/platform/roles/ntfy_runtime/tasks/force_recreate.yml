# Purpose: Force-recreate the ntfy compose stack while recovering stale container-name conflicts.
# Use case: Included by ntfy drift repair paths that must replay docker compose with --force-recreate.
# Inputs: ntfy_runtime_compose_file, ntfy_runtime_site_dir, and ntfy_runtime_container_name.
# Outputs: Recreates the ntfy service and clears stale compose containers when Docker reports a name conflict.
# Idempotency: Partially idempotent because the task intentionally forces a container recreate when it runs.
# Dependencies: Docker Compose on the guest and the ntfy_runtime role defaults.
---
- name: Force-recreate the ntfy stack
  ansible.builtin.shell: |
    set -euo pipefail

    status=1
    output_file="$(mktemp)"
    trap 'rm -f "$output_file"' EXIT

    for attempt in 1 2; do
      if docker compose --file "{{ ntfy_runtime_compose_file }}" up -d --force-recreate --remove-orphans >"$output_file" 2>&1; then
        cat "$output_file"
        exit 0
      fi

      status=$?
      cat "$output_file"

      if ! grep -Fq "Conflict. The container name" "$output_file"; then
        exit "$status"
      fi

      docker compose --file "{{ ntfy_runtime_compose_file }}" down --remove-orphans >/dev/null 2>&1 || true

      stale_ids="$(docker ps -aq \
        --filter "label=com.docker.compose.project.working_dir={{ ntfy_runtime_site_dir }}" \
        --filter "label=com.docker.compose.service=ntfy")"
      if [ -n "$stale_ids" ]; then
        docker rm -f $stale_ids >/dev/null 2>&1 || true
      fi

      if docker inspect "{{ ntfy_runtime_container_name }}" >/dev/null 2>&1; then
        docker rm -f "{{ ntfy_runtime_container_name }}" >/dev/null 2>&1 || true
      fi

      sleep 2
    done

    exit "$status"
  args:
    chdir: "{{ ntfy_runtime_site_dir }}"
    executable: /bin/bash
  register: ntfy_runtime_force_recreate
  changed_when: true
