---
argument_specs:
  main:
    short_description: Converge Grafana Alloy log shipping for managed hosts and guests.
    options:
      loki_log_agent_packages:
        type: list
        elements: str
        required: false
        default: []
        description:
          - Packages installed for the Loki log agent runtime.
      loki_log_agent_config_file:
        type: path
        required: true
        description:
          - Rendered Alloy configuration file path.
      loki_log_agent_env_file:
        type: path
        required: false
        description:
          - Managed environment file used by the packaged Alloy systemd service.
      loki_log_agent_http_listen_address:
        type: str
        required: false
        description:
          - HTTP listen address for Alloy metrics and debug endpoints.
      loki_log_agent_loki_push_url:
        type: str
        required: true
        description:
          - Loki push API endpoint used by the log agent.
      loki_log_agent_service_name:
        type: str
        required: true
        description:
          - Service name for the managed Alloy agent.
      loki_log_agent_postgres_audit_enabled:
        type: bool
        required: false
        description:
          - Enables the PostgreSQL audit and connection-log parsing pipeline.
      loki_log_agent_postgres_audit_approved_roles:
        type: list
        elements: str
        required: false
        description:
          - Approved PostgreSQL login roles used to classify unknown connection events.
