# Purpose: Declare controller-side recovery bundle defaults, shared overlay artifact paths, and break-glass dependency locations.
# Use case: Loaded whenever the control_plane_recovery_controller role packages or verifies the controller-local recovery bundle inputs.
# Inputs: Shared repo-local overlay roots, bootstrap alias paths, and controller recovery bundle source declarations.
# Outputs: Resolved default variables for controller bundle staging, archival sources, and external dependency handling.
# Idempotency: N/A for defaults file because it only declares variables that downstream tasks consume.
# Dependencies: ADR 0165, ADR 0167, ADR 0268, and ADR 0333.
---
control_plane_recovery_local_artifact_dir: "{{ repo_shared_local_root | default((playbook_dir | dirname) ~ '/.local', true) }}/control-plane-recovery"
control_plane_recovery_local_controller_dir: "{{ control_plane_recovery_local_artifact_dir }}/controller"
control_plane_recovery_local_controller_bundle_file: "{{ control_plane_recovery_local_controller_dir }}/controller-recovery-bundle.tar.zst"
control_plane_recovery_local_controller_manifest_file: "{{ control_plane_recovery_local_controller_dir }}/control-plane-recovery-manifest.json"
control_plane_recovery_local_controller_staging_dir: "{{ control_plane_recovery_local_controller_dir }}/staging"
control_plane_recovery_store_controller_dir: /srv/control-plane-recovery/controller
control_plane_recovery_store_user: lv3-control-plane-backup
control_plane_recovery_store_group: "{{ control_plane_recovery_store_user }}"
control_plane_recovery_controller_bundle_sources:
  - id: step_ca
    path: "{{ repo_shared_local_root | default((playbook_dir | dirname) ~ '/.local', true) }}/step-ca"
    archive_name: step-ca
    required: true
  - id: openbao
    path: "{{ repo_shared_local_root | default((playbook_dir | dirname) ~ '/.local', true) }}/openbao"
    archive_name: openbao
    required: true
  - id: windmill
    path: "{{ repo_shared_local_root | default((playbook_dir | dirname) ~ '/.local', true) }}/windmill"
    archive_name: windmill
    required: true
  - id: mail_platform
    path: "{{ repo_shared_local_root | default((playbook_dir | dirname) ~ '/.local', true) }}/mail-platform"
    archive_name: mail-platform
    required: true
  - id: proxmox_api
    path: "{{ repo_shared_local_root | default((playbook_dir | dirname) ~ '/.local', true) }}/proxmox-api/lv3-automation-primary.json"
    archive_name: proxmox-api/lv3-automation-primary.json
    required: true
  - id: proxmox_tfa
    path: "{{ repo_shared_local_root | default((playbook_dir | dirname) ~ '/.local', true) }}/tfa/proxmox-ops-pam-totp.json"
    archive_name: tfa/proxmox-ops-pam-totp.json
    required: true
  - id: bootstrap_public_key
    path: "{{ repo_shared_bootstrap_public_key_path | default(((repo_shared_local_root | default((playbook_dir | dirname) ~ '/.local', true)) ~ '/ssh/bootstrap.id_ed25519.pub'), true) }}"
    archive_name: ssh/bootstrap.id_ed25519.pub
    required: true
control_plane_recovery_controller_external_breakglass_dependencies:
  - id: bootstrap_ssh_private_key
    path: "{{ repo_shared_bootstrap_private_key_path | default(((repo_shared_local_root | default((playbook_dir | dirname) ~ '/.local', true)) ~ '/ssh/bootstrap.id_ed25519'), true) }}"
    required: true
    reason: Externalized break-glass SSH private key. Preserve separately from the archived controller bundle.
