---
# Purpose: Declare the default PostgreSQL inputs for the Matrix Synapse database role.
# Use case: Used when provisioning the Matrix Synapse PostgreSQL role, database, and mirrored password artifact.
#
# Inputs (required):
#   - none
#
# Inputs (optional):
#   - matrix_synapse_database_name (str, optional, default=matrix_synapse): Managed PostgreSQL database name.
#   - matrix_synapse_database_user (str, optional, default=matrix_synapse): Managed PostgreSQL login role.
#
# Outputs:
#   - Default paths and identifiers for Matrix Synapse PostgreSQL convergence.
#
# Idempotency: Fully idempotent
#              This file only declares role defaults.
#
# Dependencies:
#   - ADR 0255: Matrix Synapse As The Canonical ServerClaw Conversation Hub
#   - ADR 0256: Mautrix Bridges For External Chat Channel Adapters
#   - Role: matrix_synapse_postgres — provisions the database and mirrored password.
#
# Related ADRs: 0165, 0255, 0256
# Related Runbooks: docs/runbooks/configure-matrix-synapse.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-29
matrix_synapse_database_name: matrix_synapse
matrix_synapse_database_user: matrix_synapse
matrix_synapse_database_collation: C
matrix_synapse_database_ctype: C
matrix_synapse_database_template: template0
matrix_synapse_postgres_secret_dir: /etc/lv3/matrix-synapse
matrix_synapse_postgres_password_file: "{{ matrix_synapse_postgres_secret_dir }}/database-password.txt"
matrix_synapse_local_artifact_dir: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/matrix-synapse
matrix_synapse_database_password_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/matrix-synapse/database-password.txt
matrix_synapse_bridge_databases:
  - id: mautrix_discord
    database_name: mautrix_discord
    database_user: mautrix_discord
    database_collation: C
    database_ctype: C
    database_template: template0
    password_local_file: "{{ matrix_synapse_local_artifact_dir }}/mautrix-discord-database-password.txt"
    password_remote_file: "{{ matrix_synapse_postgres_secret_dir }}/mautrix-discord-database-password.txt"
  - id: mautrix_whatsapp
    database_name: mautrix_whatsapp
    database_user: mautrix_whatsapp
    database_collation: C
    database_ctype: C
    database_template: template0
    password_local_file: "{{ matrix_synapse_local_artifact_dir }}/mautrix-whatsapp-database-password.txt"
    password_remote_file: "{{ matrix_synapse_postgres_secret_dir }}/mautrix-whatsapp-database-password.txt"
