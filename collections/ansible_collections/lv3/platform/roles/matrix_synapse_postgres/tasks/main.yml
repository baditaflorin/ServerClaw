---
# Purpose: Provision the Matrix Synapse PostgreSQL role, database, and mirrored password artifact.
# Use case: Applied on postgres before the Matrix Synapse runtime converges on docker-runtime.
#
# Inputs (required):
#   - matrix_synapse_database_name (str, required): Managed PostgreSQL database name.
#   - matrix_synapse_database_user (str, required): Managed PostgreSQL login role.
#   - matrix_synapse_postgres_secret_dir (path, required): Guest-side secret directory for the mirrored password.
#   - matrix_synapse_postgres_password_file (path, required): Guest-side database password path.
#   - matrix_synapse_database_password_local_file (path, required): Controller-local database password path.
#
# Inputs (optional):
#   - matrix_synapse_local_artifact_dir (path, optional): Controller-local artifact directory.
#   - matrix_synapse_bridge_databases (list, optional): Additional bridge databases and password artifacts.
#
# Outputs:
#   - PostgreSQL role and database provisioned for Matrix Synapse and the first mautrix bridges, with passwords mirrored locally and on postgres.
#
# Idempotency: Fully idempotent
#              Existing passwords, roles, and databases are reused; repeat runs only reconcile drift.
#
# Dependencies:
#   - ADR 0255: Matrix Synapse As The Canonical ServerClaw Conversation Hub
#   - ADR 0256: Mautrix Bridges For External Chat Channel Adapters
#   - ADR 0359: Declarative PostgreSQL Client Registry
#   - Requires: postgres writable primary state.
#   - Role: postgres_vm — prepares the managed PostgreSQL host before service provisioning.
#
# Related ADRs: 0165, 0255, 0256, 0359
# Related Runbooks: docs/runbooks/configure-matrix-synapse.md
#
# Author: LV3 Platform
# Last Updated: 2026-04-05
- name: Provision the matrix_synapse main database via the shared postgres_client role
  ansible.builtin.include_role:
    name: lv3.platform.postgres_client
  vars:
    postgres_client_service: "{{ matrix_synapse_database_name }}"
    postgres_client_database: "{{ matrix_synapse_database_name }}"
    postgres_client_user: "{{ matrix_synapse_database_user }}"
    postgres_client_password_local_file: "{{ matrix_synapse_database_password_local_file }}"
    postgres_client_password_remote_dir: "{{ matrix_synapse_postgres_secret_dir }}"
    postgres_client_password_remote_file: "{{ matrix_synapse_postgres_password_file }}"
    postgres_client_database_collation: "{{ matrix_synapse_database_collation }}"
    postgres_client_database_ctype: "{{ matrix_synapse_database_ctype }}"
    postgres_client_database_template: "{{ matrix_synapse_database_template }}"

- name: Check whether the local PostgreSQL member is writable for Matrix bridge databases
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT CASE WHEN pg_is_in_recovery() THEN 0 ELSE 1 END"
  register: matrix_synapse_postgres_writable_check
  changed_when: false

- name: Generate the Matrix bridge database passwords
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ item.password_local_file }}" ]; then
      umask 077
      openssl rand -base64 24 | tr -d '\n' > "{{ item.password_local_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  loop: "{{ matrix_synapse_bridge_databases }}"
  loop_control:
    label: "{{ item.id }}"
  register: matrix_synapse_bridge_password_generation
  changed_when: "'changed' in matrix_synapse_bridge_password_generation.stdout"
  no_log: true

- name: Persist the Matrix bridge database passwords on the current guest
  ansible.builtin.copy:
    dest: "{{ item.password_remote_file }}"
    content: "{{ lookup('ansible.builtin.file', item.password_local_file) | trim }}\n"
    owner: root
    group: postgres
    mode: "0640"
  loop: "{{ matrix_synapse_bridge_databases }}"
  loop_control:
    label: "{{ item.id }}"
  no_log: true

- name: Check whether the Matrix bridge database roles already exist
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ item.database_user }}'"
  loop: "{{ matrix_synapse_bridge_databases }}"
  loop_control:
    label: "{{ item.id }}"
  register: matrix_synapse_bridge_role_checks
  changed_when: false
  when: matrix_synapse_postgres_writable_check.stdout | trim == "1"

- name: Create the missing Matrix bridge database roles
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - >-
        CREATE ROLE {{ item.database_user }} LOGIN PASSWORD
        '{{ lookup('ansible.builtin.file', item.password_local_file) | trim }}'
  loop: "{{ matrix_synapse_bridge_databases }}"
  loop_control:
    label: "{{ item.id }}"
    index_var: matrix_synapse_bridge_role_index
  changed_when: true
  no_log: true
  when:
    - matrix_synapse_postgres_writable_check.stdout | trim == "1"
    - matrix_synapse_bridge_role_checks.results[matrix_synapse_bridge_role_index].stdout != "1"

- name: Ensure the Matrix bridge database role passwords match the managed secrets
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - >-
        ALTER ROLE {{ item.database_user }} PASSWORD '{{ lookup('ansible.builtin.file', item.password_local_file) | trim }}'
  loop: "{{ matrix_synapse_bridge_databases }}"
  loop_control:
    label: "{{ item.id }}"
  changed_when: false
  no_log: true
  when: matrix_synapse_postgres_writable_check.stdout | trim == "1"

- name: Check whether the Matrix bridge PostgreSQL databases already exist
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_database WHERE datname = '{{ item.database_name }}'"
  loop: "{{ matrix_synapse_bridge_databases }}"
  loop_control:
    label: "{{ item.id }}"
  register: matrix_synapse_bridge_database_checks
  changed_when: false
  when: matrix_synapse_postgres_writable_check.stdout | trim == "1"

- name: Create the missing Matrix bridge PostgreSQL databases
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - >-
        CREATE DATABASE {{ item.database_name }}
        OWNER {{ item.database_user }}
        TEMPLATE {{ item.database_template }}
        LC_COLLATE '{{ item.database_collation }}'
        LC_CTYPE '{{ item.database_ctype }}'
  loop: "{{ matrix_synapse_bridge_databases }}"
  loop_control:
    label: "{{ item.id }}"
    index_var: matrix_synapse_bridge_database_index
  changed_when: true
  when:
    - matrix_synapse_postgres_writable_check.stdout | trim == "1"
    - matrix_synapse_bridge_database_checks.results[matrix_synapse_bridge_database_index].stdout != "1"

- name: Read the Matrix bridge database locales after convergence
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - >-
        SELECT datcollate || '|' || datctype
        FROM pg_database
        WHERE datname = '{{ item.database_name }}'
  loop: "{{ matrix_synapse_bridge_databases }}"
  loop_control:
    label: "{{ item.id }}"
  register: matrix_synapse_bridge_database_locales_after
  changed_when: false
  when: matrix_synapse_postgres_writable_check.stdout | trim == "1"

- name: Assert the Matrix bridge database locales match the managed settings
  ansible.builtin.assert:
    that:
      - >-
        matrix_synapse_bridge_database_locales_after.results[matrix_synapse_bridge_database_locale_after_index].stdout | trim
        == item.database_collation ~ '|' ~ item.database_ctype
    fail_msg: >-
      Matrix bridge database {{ item.database_name }} must use
      {{ item.database_collation }}/{{ item.database_ctype }}
      for predictable bridge compatibility.
  loop: "{{ matrix_synapse_bridge_databases }}"
  loop_control:
    label: "{{ item.id }}"
    index_var: matrix_synapse_bridge_database_locale_after_index
  when: matrix_synapse_postgres_writable_check.stdout | trim == "1"

- name: Ensure the Matrix bridge database owners are correct
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER DATABASE {{ item.database_name }} OWNER TO {{ item.database_user }}"
  loop: "{{ matrix_synapse_bridge_databases }}"
  loop_control:
    label: "{{ item.id }}"
  changed_when: false
  when: matrix_synapse_postgres_writable_check.stdout | trim == "1"
