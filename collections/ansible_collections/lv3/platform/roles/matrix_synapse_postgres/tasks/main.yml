---
# Purpose: Provision the Matrix Synapse PostgreSQL role, database, and mirrored password artifact.
# Use case: Applied on postgres-lv3 before the Matrix Synapse runtime converges on docker-runtime-lv3.
#
# Inputs (required):
#   - matrix_synapse_database_name (str, required): Managed PostgreSQL database name.
#   - matrix_synapse_database_user (str, required): Managed PostgreSQL login role.
#   - matrix_synapse_postgres_secret_dir (path, required): Guest-side secret directory for the mirrored password.
#   - matrix_synapse_postgres_password_file (path, required): Guest-side database password path.
#   - matrix_synapse_database_password_local_file (path, required): Controller-local database password path.
#
# Inputs (optional):
#   - matrix_synapse_local_artifact_dir (path, optional): Controller-local artifact directory.
#
# Outputs:
#   - PostgreSQL role and database provisioned for Matrix Synapse, with the password mirrored locally and on postgres-lv3.
#
# Idempotency: Fully idempotent
#              Existing passwords, roles, and databases are reused; repeat runs only reconcile drift.
#
# Dependencies:
#   - ADR 0255: Matrix Synapse As The Canonical ServerClaw Conversation Hub
#   - Requires: postgres-lv3 writable primary state.
#   - Role: postgres_vm — prepares the managed PostgreSQL host before service provisioning.
#
# Related ADRs: 0165, 0255
# Related Runbooks: docs/runbooks/configure-matrix-synapse.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-29
- name: Validate Matrix Synapse PostgreSQL inputs
  ansible.builtin.assert:
    that:
      - matrix_synapse_database_name | length > 0
      - matrix_synapse_database_user | length > 0
      - matrix_synapse_postgres_secret_dir | length > 0
      - matrix_synapse_postgres_password_file | length > 0
      - matrix_synapse_database_password_local_file | length > 0
    fail_msg: >-
      matrix_synapse_postgres requires database names and local or remote password paths.

- name: Ensure the Matrix Synapse PostgreSQL secret directory exists
  ansible.builtin.file:
    path: "{{ matrix_synapse_postgres_secret_dir }}"
    state: directory
    owner: root
    group: postgres
    mode: "0750"

- name: Ensure the local Matrix Synapse artifact directory exists
  ansible.builtin.file:
    path: "{{ matrix_synapse_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate the Matrix Synapse database password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ matrix_synapse_database_password_local_file }}" ]; then
      umask 077
      openssl rand -base64 24 | tr -d '\n' > "{{ matrix_synapse_database_password_local_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: matrix_synapse_postgres_password_generation
  changed_when: "'changed' in matrix_synapse_postgres_password_generation.stdout"
  no_log: true

- name: Read the Matrix Synapse database password
  ansible.builtin.slurp:
    src: "{{ matrix_synapse_database_password_local_file }}"
  delegate_to: localhost
  become: false
  register: matrix_synapse_postgres_password_raw
  no_log: true

- name: Record the Matrix Synapse database password
  ansible.builtin.set_fact:
    matrix_synapse_database_password: "{{ matrix_synapse_postgres_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Mirror the Matrix Synapse database password to the control machine
  ansible.builtin.copy:
    dest: "{{ matrix_synapse_database_password_local_file }}"
    content: "{{ matrix_synapse_database_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Persist the Matrix Synapse database password on the current guest
  ansible.builtin.copy:
    dest: "{{ matrix_synapse_postgres_password_file }}"
    content: "{{ matrix_synapse_database_password }}\n"
    owner: root
    group: postgres
    mode: "0640"
  no_log: true

- name: Check whether the local PostgreSQL member is writable
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT CASE WHEN pg_is_in_recovery() THEN 0 ELSE 1 END"
  register: matrix_synapse_postgres_writable_check
  changed_when: false

- name: Check whether the Matrix Synapse database role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ matrix_synapse_database_user }}'"
  register: matrix_synapse_postgres_role_check
  changed_when: false
  when: matrix_synapse_postgres_writable_check.stdout | trim == "1"

- name: Create the Matrix Synapse database role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - >-
        CREATE ROLE {{ matrix_synapse_database_user }} LOGIN PASSWORD
        '{{ matrix_synapse_database_password }}'
  changed_when: true
  no_log: true
  when:
    - matrix_synapse_postgres_writable_check.stdout | trim == "1"
    - matrix_synapse_postgres_role_check.stdout != "1"

- name: Check whether the Matrix Synapse PostgreSQL database already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_database WHERE datname = '{{ matrix_synapse_database_name }}'"
  register: matrix_synapse_postgres_database_check
  changed_when: false
  when: matrix_synapse_postgres_writable_check.stdout | trim == "1"

- name: Create the Matrix Synapse PostgreSQL database
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - >-
        CREATE DATABASE {{ matrix_synapse_database_name }}
        OWNER {{ matrix_synapse_database_user }}
  changed_when: true
  when:
    - matrix_synapse_postgres_writable_check.stdout | trim == "1"
    - matrix_synapse_postgres_database_check.stdout != "1"

- name: Ensure the Matrix Synapse database owner is correct
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - >-
        ALTER DATABASE {{ matrix_synapse_database_name }}
        OWNER TO {{ matrix_synapse_database_user }}
  changed_when: false
  when: matrix_synapse_postgres_writable_check.stdout | trim == "1"
