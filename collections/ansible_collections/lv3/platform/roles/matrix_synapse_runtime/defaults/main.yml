---
# NOTE: Conventional variables (site_dir, image, compose_file, env_file,
# openbao_*, container_name, internal_port, local_artifact_dir) are derived
# from platform_service_registry — ADR 0373.
# Purpose: Declare the default runtime inputs for the Matrix Synapse service role.
# Use case: Used when converging Matrix Synapse on docker-runtime with repo-managed bootstrap secrets, config, and publication contracts.
#
# Inputs (required):
#   - none
#
# Inputs (optional):
#   - matrix_synapse_server_name (str, optional, default=matrix.{{ platform_domain }}): Canonical Matrix server name.
#   - matrix_synapse_admin_localpart (str, optional, default=ops): Bootstrap admin localpart.
#   - matrix_synapse_disable_federation (bool, optional, default=true): Whether the repo-managed listener stays client-only.
#
# Outputs:
#   - Default paths, URLs, and image references for Matrix Synapse runtime convergence.
#
# Idempotency: Fully idempotent
#              This file only declares role defaults.
#
# Dependencies:
#   - ADR 0255: Matrix Synapse As The Canonical ServerClaw Conversation Hub
#   - ADR 0256: Mautrix Bridges For External Chat Channel Adapters
#   - Role: matrix_synapse_runtime — deploys the Matrix Synapse runtime on docker-runtime.
#
# Related ADRs: 0165, 0255, 0256
# Related Runbooks: docs/runbooks/configure-matrix-synapse.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-29
matrix_synapse_container_data_dir: /data
matrix_synapse_homeserver_config_file: "{{ matrix_synapse_data_dir }}/homeserver.yaml"
matrix_synapse_log_config_file: "{{ matrix_synapse_data_dir }}/{{ matrix_synapse_server_name }}.log.config"
matrix_synapse_log_config_container_file: "{{ matrix_synapse_container_data_dir }}/{{ matrix_synapse_server_name }}.log.config"
matrix_synapse_mautrix_discord_dir: "{{ matrix_synapse_site_dir }}/mautrix-discord"
matrix_synapse_mautrix_discord_config_file: "{{ matrix_synapse_mautrix_discord_dir }}/config.yaml"
matrix_synapse_mautrix_discord_registration_file: "{{ matrix_synapse_mautrix_discord_dir }}/registration.yaml"
matrix_synapse_mautrix_discord_container_name: matrix-mautrix-discord
matrix_synapse_mautrix_whatsapp_dir: "{{ matrix_synapse_site_dir }}/mautrix-whatsapp"
matrix_synapse_mautrix_whatsapp_config_file: "{{ matrix_synapse_mautrix_whatsapp_dir }}/config.yaml"
matrix_synapse_mautrix_whatsapp_registration_file: "{{ matrix_synapse_mautrix_whatsapp_dir }}/registration.yaml"
matrix_synapse_mautrix_whatsapp_container_name: matrix-mautrix-whatsapp
matrix_synapse_mautrix_discord_image: "{{ container_image_catalog.images.matrix_mautrix_discord_runtime.ref }}"
matrix_synapse_mautrix_whatsapp_image: "{{ container_image_catalog.images.matrix_mautrix_whatsapp_runtime.ref }}"
matrix_synapse_server_name: matrix.{{ platform_domain }}
matrix_synapse_public_hostname: "{{ hostvars[platform_topology_host].platform_service_topology.matrix_synapse.public_hostname }}"
matrix_synapse_port: "{{ hostvars[platform_topology_host].platform_service_topology | platform_service_port('matrix_synapse', 'internal') }}"
matrix_synapse_host_proxy_port: "{{ hostvars[platform_topology_host].platform_service_topology | platform_service_port('matrix_synapse', 'controller') }}"
matrix_synapse_internal_base_url: "{{ hostvars[platform_topology_host].platform_service_topology | platform_service_url('matrix_synapse', 'internal') }}"
matrix_synapse_controller_url: "{{ hostvars[platform_topology_host].platform_service_topology | platform_service_url('matrix_synapse', 'controller') }}"
matrix_synapse_public_url: "{{ hostvars[platform_topology_host].platform_service_topology.matrix_synapse.urls.public }}"
matrix_synapse_public_base_url: "{{ hostvars[platform_topology_host].platform_service_topology.matrix_synapse.urls.public }}/"
matrix_synapse_database_host: "{{ hostvars[hostvars[platform_topology_host].postgres_ha.initial_primary].ansible_host }}"
matrix_synapse_database_port: 5432
matrix_synapse_database_name: matrix_synapse
matrix_synapse_database_user: matrix_synapse
matrix_synapse_mautrix_discord_database_name: mautrix_discord
matrix_synapse_mautrix_discord_database_user: mautrix_discord
matrix_synapse_mautrix_discord_database_host: "{{ matrix_synapse_database_host }}"
matrix_synapse_mautrix_whatsapp_database_name: mautrix_whatsapp
matrix_synapse_mautrix_whatsapp_database_user: mautrix_whatsapp
matrix_synapse_mautrix_whatsapp_database_host: "{{ matrix_synapse_database_host }}"
matrix_synapse_database_password_local_file: "{{ repo_shared_local_root }}/matrix-synapse/database-password.txt"
matrix_synapse_ops_password_local_file: "{{ repo_shared_local_root }}/matrix-synapse/ops-password.txt"
matrix_synapse_ops_access_token_local_file: "{{ repo_shared_local_root }}/matrix-synapse/ops-access-token.txt"
matrix_synapse_registration_shared_secret_local_file: "{{ repo_shared_local_root }}/matrix-synapse/registration-shared-secret.txt"
matrix_synapse_signing_key_local_file: "{{ repo_shared_local_root }}/matrix-synapse/server-signing.key"
matrix_synapse_mautrix_discord_database_password_local_file: "{{ repo_shared_local_root }}/matrix-synapse/mautrix-discord-database-password.txt"
matrix_synapse_mautrix_discord_as_token_local_file: "{{ repo_shared_local_root }}/matrix-synapse/mautrix-discord-as-token.txt"
matrix_synapse_mautrix_discord_hs_token_local_file: "{{ repo_shared_local_root }}/matrix-synapse/mautrix-discord-hs-token.txt"
matrix_synapse_mautrix_discord_provisioning_shared_secret_local_file: "{{ repo_shared_local_root }}/matrix-synapse/mautrix-discord-provisioning-shared-secret.txt"
matrix_synapse_mautrix_discord_avatar_proxy_key_local_file: "{{ repo_shared_local_root }}/matrix-synapse/mautrix-discord-avatar-proxy-key.txt"
matrix_synapse_mautrix_whatsapp_database_password_local_file: "{{ repo_shared_local_root }}/matrix-synapse/mautrix-whatsapp-database-password.txt"
matrix_synapse_mautrix_whatsapp_as_token_local_file: "{{ repo_shared_local_root }}/matrix-synapse/mautrix-whatsapp-as-token.txt"
matrix_synapse_mautrix_whatsapp_hs_token_local_file: "{{ repo_shared_local_root }}/matrix-synapse/mautrix-whatsapp-hs-token.txt"
matrix_synapse_mautrix_whatsapp_provisioning_shared_secret_local_file: "{{ repo_shared_local_root }}/matrix-synapse/mautrix-whatsapp-provisioning-shared-secret.txt"
matrix_synapse_mautrix_whatsapp_public_media_signing_key_local_file: "{{ repo_shared_local_root }}/matrix-synapse/mautrix-whatsapp-public-media-signing-key.txt"
matrix_synapse_mautrix_whatsapp_encryption_pickle_key_local_file: "{{ repo_shared_local_root }}/matrix-synapse/mautrix-whatsapp-encryption-pickle-key.txt"
matrix_synapse_ops_password_remote_file: "{{ matrix_synapse_secret_dir }}/ops-password.txt"
matrix_synapse_registration_shared_secret_remote_file: "{{ matrix_synapse_secret_dir }}/registration-shared-secret.txt"
matrix_synapse_form_secret_remote_file: "{{ matrix_synapse_secret_dir }}/form-secret.txt"
matrix_synapse_macaroon_secret_key_remote_file: "{{ matrix_synapse_secret_dir }}/macaroon-secret-key.txt"
matrix_synapse_signing_key_remote_file: "{{ matrix_synapse_data_dir }}/{{ matrix_synapse_server_name }}.signing.key"
matrix_synapse_signing_key_container_file: "{{ matrix_synapse_container_data_dir }}/{{ matrix_synapse_server_name }}.signing.key"
matrix_synapse_admin_localpart: ops
matrix_synapse_admin_user_id: "@{{ matrix_synapse_admin_localpart }}:{{ matrix_synapse_server_name }}"
matrix_synapse_mautrix_discord_bot_user_id: "@discordbot:{{ matrix_synapse_server_name }}"
matrix_synapse_mautrix_whatsapp_bot_user_id: "@whatsappbot:{{ matrix_synapse_server_name }}"
matrix_synapse_public_smoke_bot_user_ids:
  - "{{ matrix_synapse_mautrix_discord_bot_user_id }}"
  - "{{ matrix_synapse_mautrix_whatsapp_bot_user_id }}"
matrix_synapse_public_smoke_timeout_seconds: 90
matrix_synapse_report_stats: false
matrix_synapse_disable_federation: true
matrix_synapse_trusted_key_servers:
  - matrix.org
matrix_synapse_uid: "991"
matrix_synapse_gid: "991"
