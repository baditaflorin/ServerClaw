---
# Purpose: Converge the Matrix Synapse runtime, bootstrap secrets, and verification flow on docker-runtime-lv3.
# Use case: Applied when deploying, upgrading, or recovering the repo-managed Matrix Synapse conversation hub.
#
# Inputs (required):
#   - matrix_synapse_site_dir (path, required): Runtime root directory.
#   - matrix_synapse_data_dir (path, required): Persistent data directory mounted into the Synapse container.
#   - matrix_synapse_secret_dir (path, required): Guest-side secret directory.
#   - matrix_synapse_compose_file (path, required): Managed compose file path.
#   - matrix_synapse_env_file (path, required): Managed runtime environment file path.
#   - matrix_synapse_homeserver_config_file (path, required): Managed Synapse config path.
#   - matrix_synapse_port (int, required): Internal Synapse listener port.
#   - matrix_synapse_internal_base_url (str, required): Guest-local base URL used for verification.
#   - matrix_synapse_public_base_url (str, required): Public Matrix base URL.
#   - matrix_synapse_database_password_local_file (path, required): Controller-local database password artifact.
#   - matrix_synapse_ops_password_local_file (path, required): Controller-local bootstrap admin password artifact.
#
# Inputs (optional):
#   - matrix_synapse_disable_federation (bool, optional, default=true): Whether the listener stays client-only.
#   - matrix_synapse_trusted_key_servers (list, optional, default=[matrix.org]): Trusted key servers retained for upstream lookup.
#
# Outputs:
#   - Matrix Synapse deployed on docker-runtime-lv3 with repo-managed config, mirrored bootstrap artifacts, and a verified ops admin login.
#
# Idempotency: Fully idempotent
#              Existing passwords, signing material, and bootstrap users are reused when present; repeat runs only reconcile drift.
#
# Dependencies:
#   - ADR 0255: Matrix Synapse As The Canonical ServerClaw Conversation Hub
#   - ADR 0256: Mautrix Bridges For External Chat Channel Adapters
#   - Requires: docker_runtime and the Matrix Synapse PostgreSQL converge to have completed first.
#   - Uses: the shared OpenBao compose env helper for runtime secret delivery.
#
# Related ADRs: 0165, 0255, 0256
# Related Runbooks: docs/runbooks/configure-matrix-synapse.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-29
- name: Derive Matrix Synapse conventional defaults from the service registry
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: derive_service_defaults
  vars:
    common_derive_service_name: matrix_synapse


- name: Validate Matrix Synapse runtime inputs
  ansible.builtin.assert:
    that:
      - matrix_synapse_site_dir | length > 0
      - matrix_synapse_data_dir | length > 0
      - matrix_synapse_secret_dir | length > 0
      - matrix_synapse_compose_file | length > 0
      - matrix_synapse_env_file | length > 0
      - matrix_synapse_homeserver_config_file | length > 0
      - matrix_synapse_image | length > 0
      - matrix_synapse_mautrix_discord_image | length > 0
      - matrix_synapse_mautrix_whatsapp_image | length > 0
      - matrix_synapse_container_name | length > 0
      - matrix_synapse_server_name | length > 0
      - matrix_synapse_port | int > 0
      - matrix_synapse_internal_base_url | length > 0
      - matrix_synapse_public_base_url | length > 0
      - matrix_synapse_mautrix_discord_dir | length > 0
      - matrix_synapse_mautrix_whatsapp_dir | length > 0
      - matrix_synapse_database_host | length > 0
      - matrix_synapse_database_name | length > 0
      - matrix_synapse_database_user | length > 0
      - matrix_synapse_database_password_local_file | length > 0
      - matrix_synapse_mautrix_discord_database_password_local_file | length > 0
      - matrix_synapse_mautrix_whatsapp_database_password_local_file | length > 0
      - matrix_synapse_admin_localpart | length > 0
      - matrix_synapse_admin_user_id | length > 0
      - matrix_synapse_ops_password_local_file | length > 0
      - matrix_synapse_registration_shared_secret_local_file | length > 0
      - matrix_synapse_signing_key_local_file | length > 0
    fail_msg: >-
      matrix_synapse_runtime requires compose paths, service URLs, PostgreSQL credentials,
      and bootstrap secret artifact paths.

- name: Check Matrix Synapse prerequisites on the control machine
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: check_local_secrets
  vars:
    common_check_local_secrets_files:
      - path: "{{ matrix_synapse_database_password_local_file }}"
        description: "Matrix Synapse database password"
        prerequisite: "Converge the Matrix Synapse PostgreSQL role before deploying Matrix Synapse"

- name: Check whether the Matrix bridge database passwords exist on the control machine
  ansible.builtin.stat:
    path: "{{ item }}"
  delegate_to: localhost
  become: false
  loop:
    - "{{ matrix_synapse_mautrix_discord_database_password_local_file }}"
    - "{{ matrix_synapse_mautrix_whatsapp_database_password_local_file }}"
  register: matrix_synapse_bridge_database_password_stats

- name: Fail if the Matrix bridge database passwords are missing locally
  ansible.builtin.fail:
    msg: >-
      One or more Matrix bridge database password files are missing on the control machine.
      Run the Matrix Synapse PostgreSQL converge first so the bridge configs can connect to postgres-lv3.
  when: >-
    (matrix_synapse_bridge_database_password_stats.results | selectattr('stat.exists', 'equalto', false) | list | length) > 0

- name: Ensure the Matrix Synapse runtime packages are present
  ansible.builtin.apt:
    name:
      - openssl
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure the Matrix Synapse directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ matrix_synapse_site_dir }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ matrix_synapse_data_dir }}"
      owner: "{{ matrix_synapse_uid }}"
      group: "{{ matrix_synapse_gid }}"
      mode: "0755"
    - path: "{{ matrix_synapse_secret_dir }}"
      owner: root
      group: root
      mode: "0700"
    - path: "{{ matrix_synapse_mautrix_discord_dir }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ matrix_synapse_mautrix_discord_dir }}/logs"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ matrix_synapse_mautrix_whatsapp_dir }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ matrix_synapse_mautrix_whatsapp_dir }}/logs"
      owner: root
      group: root
      mode: "0755"

- name: Generate the Matrix Synapse ops password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ matrix_synapse_ops_password_remote_file }}" ]; then
      umask 077
      openssl rand -base64 36 | tr -d '\n' > "{{ matrix_synapse_ops_password_remote_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: matrix_synapse_ops_password_generation
  changed_when: "'changed' in matrix_synapse_ops_password_generation.stdout"
  no_log: true

- name: Generate the Matrix Synapse registration shared secret
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ matrix_synapse_registration_shared_secret_remote_file }}" ]; then
      umask 077
      openssl rand -hex 32 > "{{ matrix_synapse_registration_shared_secret_remote_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: matrix_synapse_registration_shared_secret_generation
  changed_when: "'changed' in matrix_synapse_registration_shared_secret_generation.stdout"
  no_log: true

- name: Generate the Matrix Synapse form secret
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ matrix_synapse_form_secret_remote_file }}" ]; then
      umask 077
      openssl rand -hex 32 > "{{ matrix_synapse_form_secret_remote_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: matrix_synapse_form_secret_generation
  changed_when: "'changed' in matrix_synapse_form_secret_generation.stdout"
  no_log: true

- name: Generate the Matrix Synapse macaroon secret key
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ matrix_synapse_macaroon_secret_key_remote_file }}" ]; then
      umask 077
      openssl rand -hex 32 > "{{ matrix_synapse_macaroon_secret_key_remote_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: matrix_synapse_macaroon_secret_key_generation
  changed_when: "'changed' in matrix_synapse_macaroon_secret_key_generation.stdout"
  no_log: true

- name: Read the Matrix Synapse ops password
  ansible.builtin.slurp:
    src: "{{ matrix_synapse_ops_password_remote_file }}"
  register: matrix_synapse_ops_password_raw
  no_log: true

- name: Read the Matrix Synapse registration shared secret
  ansible.builtin.slurp:
    src: "{{ matrix_synapse_registration_shared_secret_remote_file }}"
  register: matrix_synapse_registration_shared_secret_raw
  no_log: true

- name: Read the Matrix Synapse form secret
  ansible.builtin.slurp:
    src: "{{ matrix_synapse_form_secret_remote_file }}"
  register: matrix_synapse_form_secret_raw
  no_log: true

- name: Read the Matrix Synapse macaroon secret key
  ansible.builtin.slurp:
    src: "{{ matrix_synapse_macaroon_secret_key_remote_file }}"
  register: matrix_synapse_macaroon_secret_key_raw
  no_log: true

- name: Record the Matrix Synapse runtime secrets
  ansible.builtin.set_fact:
    matrix_synapse_database_password: "{{ lookup('ansible.builtin.file', matrix_synapse_database_password_local_file) | trim }}"
    matrix_synapse_ops_password: "{{ matrix_synapse_ops_password_raw.content | b64decode | trim }}"
    matrix_synapse_registration_shared_secret: >-
      {{ matrix_synapse_registration_shared_secret_raw.content | b64decode | trim }}
    matrix_synapse_form_secret: "{{ matrix_synapse_form_secret_raw.content | b64decode | trim }}"
    matrix_synapse_macaroon_secret_key: >-
      {{ matrix_synapse_macaroon_secret_key_raw.content | b64decode | trim }}
    matrix_synapse_runtime_secret_payload:
      MATRIX_SYNAPSE_DATABASE_PASSWORD: >-
        {{ lookup('ansible.builtin.file', matrix_synapse_database_password_local_file) | trim }}
  no_log: true

- name: Ensure the local Matrix Synapse artifact directory exists
  ansible.builtin.file:
    path: "{{ matrix_synapse_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate the Matrix bridge secret artifacts
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ item.path }}" ]; then
      umask 077
      {{ item.command }} > "{{ item.path }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  loop:
    - path: "{{ matrix_synapse_mautrix_discord_as_token_local_file }}"
      command: "openssl rand -hex 32"
    - path: "{{ matrix_synapse_mautrix_discord_hs_token_local_file }}"
      command: "openssl rand -hex 32"
    - path: "{{ matrix_synapse_mautrix_discord_provisioning_shared_secret_local_file }}"
      command: "openssl rand -hex 32"
    - path: "{{ matrix_synapse_mautrix_discord_avatar_proxy_key_local_file }}"
      command: "openssl rand -hex 32"
    - path: "{{ matrix_synapse_mautrix_whatsapp_as_token_local_file }}"
      command: "openssl rand -hex 32"
    - path: "{{ matrix_synapse_mautrix_whatsapp_hs_token_local_file }}"
      command: "openssl rand -hex 32"
    - path: "{{ matrix_synapse_mautrix_whatsapp_provisioning_shared_secret_local_file }}"
      command: "openssl rand -hex 32"
    - path: "{{ matrix_synapse_mautrix_whatsapp_public_media_signing_key_local_file }}"
      command: "openssl rand -hex 32"
    - path: "{{ matrix_synapse_mautrix_whatsapp_encryption_pickle_key_local_file }}"
      command: "openssl rand -hex 32"
  register: matrix_synapse_bridge_secret_generation
  changed_when: "'changed' in matrix_synapse_bridge_secret_generation.stdout"
  no_log: true

- name: Record the Matrix bridge runtime secrets
  ansible.builtin.set_fact:
    matrix_synapse_mautrix_discord_database_password: >-
      {{ lookup('ansible.builtin.file', matrix_synapse_mautrix_discord_database_password_local_file) | trim }}
    matrix_synapse_mautrix_discord_as_token: >-
      {{ lookup('ansible.builtin.file', matrix_synapse_mautrix_discord_as_token_local_file) | trim }}
    matrix_synapse_mautrix_discord_hs_token: >-
      {{ lookup('ansible.builtin.file', matrix_synapse_mautrix_discord_hs_token_local_file) | trim }}
    matrix_synapse_mautrix_discord_provisioning_shared_secret: >-
      {{ lookup('ansible.builtin.file', matrix_synapse_mautrix_discord_provisioning_shared_secret_local_file) | trim }}
    matrix_synapse_mautrix_discord_avatar_proxy_key: >-
      {{ lookup('ansible.builtin.file', matrix_synapse_mautrix_discord_avatar_proxy_key_local_file) | trim }}
    matrix_synapse_mautrix_whatsapp_database_password: >-
      {{ lookup('ansible.builtin.file', matrix_synapse_mautrix_whatsapp_database_password_local_file) | trim }}
    matrix_synapse_mautrix_whatsapp_as_token: >-
      {{ lookup('ansible.builtin.file', matrix_synapse_mautrix_whatsapp_as_token_local_file) | trim }}
    matrix_synapse_mautrix_whatsapp_hs_token: >-
      {{ lookup('ansible.builtin.file', matrix_synapse_mautrix_whatsapp_hs_token_local_file) | trim }}
    matrix_synapse_mautrix_whatsapp_provisioning_shared_secret: >-
      {{ lookup('ansible.builtin.file', matrix_synapse_mautrix_whatsapp_provisioning_shared_secret_local_file) | trim }}
    matrix_synapse_mautrix_whatsapp_public_media_signing_key: >-
      {{ lookup('ansible.builtin.file', matrix_synapse_mautrix_whatsapp_public_media_signing_key_local_file) | trim }}
    matrix_synapse_mautrix_whatsapp_encryption_pickle_key: >-
      {{ lookup('ansible.builtin.file', matrix_synapse_mautrix_whatsapp_encryption_pickle_key_local_file) | trim }}
  no_log: true

- name: Mirror the Matrix Synapse bootstrap secrets to the control machine
  ansible.builtin.copy:
    dest: "{{ item.dest }}"
    content: "{{ item.content }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  loop:
    - dest: "{{ matrix_synapse_ops_password_local_file }}"
      content: "{{ matrix_synapse_ops_password }}"
    - dest: "{{ matrix_synapse_registration_shared_secret_local_file }}"
      content: "{{ matrix_synapse_registration_shared_secret }}"
  no_log: true

- name: Prepare OpenBao agent runtime secret injection for Matrix Synapse
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: openbao_compose_env
  vars:
    common_openbao_compose_env_service_name: matrix-synapse
    common_openbao_compose_env_agent_dir: "{{ matrix_synapse_openbao_agent_dir }}"
    common_openbao_compose_env_runtime_dir: "{{ matrix_synapse_env_file | dirname }}"
    common_openbao_compose_env_env_file: "{{ matrix_synapse_env_file }}"
    common_openbao_compose_env_secret_path: "{{ matrix_synapse_openbao_secret_path }}"
    common_openbao_compose_env_secret_payload: "{{ matrix_synapse_runtime_secret_payload }}"
    common_openbao_compose_env_policy_name: "{{ matrix_synapse_openbao_policy_name }}"
    common_openbao_compose_env_policy_rules: |
      path "sys/health" {
        capabilities = ["read"]
      }

      path "kv/data/{{ matrix_synapse_openbao_secret_path }}" {
        capabilities = ["read"]
      }

      path "kv/metadata/{{ matrix_synapse_openbao_secret_path }}" {
        capabilities = ["read", "list"]
      }
    common_openbao_compose_env_approle_name: "{{ matrix_synapse_openbao_approle_name }}"
    common_openbao_compose_env_agent_config_file: "{{ matrix_synapse_openbao_agent_dir }}/agent.hcl"
    common_openbao_compose_env_agent_template_file: "{{ matrix_synapse_openbao_agent_dir }}/runtime.env.ctmpl"
    common_openbao_compose_env_agent_template_src: matrix-synapse.env.ctmpl.j2
    common_openbao_compose_env_role_id_file: "{{ matrix_synapse_openbao_agent_dir }}/role_id"
    common_openbao_compose_env_secret_id_file: "{{ matrix_synapse_openbao_agent_dir }}/secret_id"
    common_openbao_compose_env_image: "{{ matrix_synapse_openbao_agent_image }}"
    common_openbao_compose_env_legacy_env_files:
      - "{{ matrix_synapse_legacy_env_file }}"
  no_log: true

- name: Render the Matrix Synapse environment file
  ansible.builtin.template:
    src: matrix-synapse.env.j2
    dest: "{{ matrix_synapse_env_file }}"
    owner: root
    group: root
    mode: "0600"
  register: matrix_synapse_env_template
  no_log: true

- name: Render the Matrix Synapse compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ matrix_synapse_compose_file }}"
    owner: root
    group: root
    mode: "0644"
  vars:
    ansible_search_path: "{{ [role_path + '/../common'] + (ansible_search_path | default([])) }}"
  register: matrix_synapse_compose_template

- name: Check whether the Matrix Synapse signing key already exists
  ansible.builtin.stat:
    path: "{{ matrix_synapse_signing_key_remote_file }}"
  register: matrix_synapse_signing_key_stat

- name: Check whether the Matrix Synapse generated log config already exists
  ansible.builtin.stat:
    path: "{{ matrix_synapse_log_config_file }}"
  register: matrix_synapse_log_config_stat

- name: Pre-pull the Matrix Synapse image when bootstrap artifacts are missing
  ansible.builtin.command:
    argv:
      - docker
      - pull
      - "{{ matrix_synapse_image }}"
  register: matrix_synapse_initial_pull
  retries: 3
  delay: 15
  until: matrix_synapse_initial_pull.rc == 0
  changed_when: >-
    'Downloaded newer image' in matrix_synapse_initial_pull.stdout
    or 'Pull complete' in matrix_synapse_initial_pull.stdout
  when:
    - not matrix_synapse_signing_key_stat.stat.exists
      or not matrix_synapse_log_config_stat.stat.exists

- name: Generate the initial Matrix Synapse signing material and log config
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -e
      - "SYNAPSE_SERVER_NAME={{ matrix_synapse_server_name }}"
      - -e
      - "SYNAPSE_REPORT_STATS={{ 'yes' if matrix_synapse_report_stats | bool else 'no' }}"
      - -v
      - "{{ matrix_synapse_data_dir }}:/data"
      - "{{ matrix_synapse_image }}"
      - generate
  register: matrix_synapse_generate
  failed_when: false
  changed_when: >-
    'Generating config file' in matrix_synapse_generate.stdout
    or 'Generating signing key file' in matrix_synapse_generate.stdout
  when:
    - not matrix_synapse_signing_key_stat.stat.exists
      or not matrix_synapse_log_config_stat.stat.exists

- name: Recheck whether the Matrix Synapse signing key exists after bootstrap generation
  ansible.builtin.stat:
    path: "{{ matrix_synapse_signing_key_remote_file }}"
  register: matrix_synapse_signing_key_post_generate_stat

- name: Recheck whether the Matrix Synapse generated log config exists after bootstrap generation
  ansible.builtin.stat:
    path: "{{ matrix_synapse_log_config_file }}"
  register: matrix_synapse_log_config_post_generate_stat

- name: Assert Matrix Synapse bootstrap generation produced the required artifacts
  ansible.builtin.assert:
    that:
      - matrix_synapse_generate.rc == 0
        or (
          matrix_synapse_signing_key_post_generate_stat.stat.exists
          and matrix_synapse_log_config_post_generate_stat.stat.exists
        )
    fail_msg: >-
      Matrix Synapse bootstrap generation did not leave the expected signing key and
      log config artifacts behind.
  when:
    - not matrix_synapse_signing_key_stat.stat.exists
      or not matrix_synapse_log_config_stat.stat.exists

- name: Render the Matrix Synapse homeserver config
  ansible.builtin.template:
    src: homeserver.yaml.j2
    dest: "{{ matrix_synapse_homeserver_config_file }}"
    owner: "{{ matrix_synapse_uid }}"
    group: "{{ matrix_synapse_gid }}"
    mode: "0600"
  register: matrix_synapse_homeserver_template
  no_log: true

- name: Render the mautrix Discord configuration
  ansible.builtin.template:
    src: mautrix-discord-config.yaml.j2
    dest: "{{ matrix_synapse_mautrix_discord_config_file }}"
    owner: root
    group: root
    mode: "0640"
  register: matrix_synapse_mautrix_discord_config_template
  no_log: true

- name: Render the mautrix WhatsApp configuration
  ansible.builtin.template:
    src: mautrix-whatsapp-config.yaml.j2
    dest: "{{ matrix_synapse_mautrix_whatsapp_config_file }}"
    owner: root
    group: root
    mode: "0640"
  register: matrix_synapse_mautrix_whatsapp_config_template
  no_log: true

- name: Check whether the mautrix bridge registration files already exist
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ matrix_synapse_mautrix_discord_registration_file }}"
    - "{{ matrix_synapse_mautrix_whatsapp_registration_file }}"
  register: matrix_synapse_bridge_registration_stats

- name: Remove the mautrix Discord registration when the config changed
  ansible.builtin.file:
    path: "{{ matrix_synapse_mautrix_discord_registration_file }}"
    state: absent
  when: matrix_synapse_mautrix_discord_config_template.changed

- name: Remove the mautrix WhatsApp registration when the config changed
  ansible.builtin.file:
    path: "{{ matrix_synapse_mautrix_whatsapp_registration_file }}"
    state: absent
  when: matrix_synapse_mautrix_whatsapp_config_template.changed

- name: Generate the mautrix Discord registration when needed
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -v
      - "{{ matrix_synapse_mautrix_discord_dir }}:/data"
      - --entrypoint
      - mautrix-discord
      - "{{ matrix_synapse_mautrix_discord_image }}"
      - -g
      - -c
      - /data/config.yaml
      - -r
      - /data/registration.yaml
  when: >-
    matrix_synapse_mautrix_discord_config_template.changed
    or not matrix_synapse_bridge_registration_stats.results[0].stat.exists
  register: matrix_synapse_mautrix_discord_registration_generate
  changed_when: matrix_synapse_mautrix_discord_registration_generate.rc == 0

- name: Generate the mautrix WhatsApp registration when needed
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -v
      - "{{ matrix_synapse_mautrix_whatsapp_dir }}:/data"
      - --entrypoint
      - mautrix-whatsapp
      - "{{ matrix_synapse_mautrix_whatsapp_image }}"
      - -g
      - -c
      - /data/config.yaml
      - -r
      - /data/registration.yaml
  when: >-
    matrix_synapse_mautrix_whatsapp_config_template.changed
    or not matrix_synapse_bridge_registration_stats.results[1].stat.exists
  register: matrix_synapse_mautrix_whatsapp_registration_generate
  changed_when: matrix_synapse_mautrix_whatsapp_registration_generate.rc == 0

- name: Ensure the mautrix bridge registrations are readable by Synapse
  ansible.builtin.file:
    path: "{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - "{{ matrix_synapse_mautrix_discord_registration_file }}"
    - "{{ matrix_synapse_mautrix_whatsapp_registration_file }}"

- name: Decide whether the Matrix Synapse stack must be force-recreated for config-backed changes
  ansible.builtin.set_fact:
    matrix_synapse_force_recreate_stack: >-
      {{
        (matrix_synapse_env_template.changed | default(false))
        or (matrix_synapse_compose_template.changed | default(false))
        or (matrix_synapse_homeserver_template.changed | default(false))
        or (matrix_synapse_mautrix_discord_config_template.changed | default(false))
        or (matrix_synapse_mautrix_whatsapp_config_template.changed | default(false))
        or (matrix_synapse_mautrix_discord_registration_generate.changed | default(false))
        or (matrix_synapse_mautrix_whatsapp_registration_generate.changed | default(false))
      }}

- name: Pull the Matrix Synapse image
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ matrix_synapse_compose_file }}"
      - pull
  args:
    chdir: "{{ matrix_synapse_site_dir }}"
  register: matrix_synapse_pull
  retries: 3
  delay: 15
  until: matrix_synapse_pull.rc == 0
  changed_when: >-
    'Pulling' in matrix_synapse_pull.stdout
    or 'Downloaded newer image' in matrix_synapse_pull.stdout
    or 'Pull complete' in matrix_synapse_pull.stdout

- name: Start the Matrix Synapse stack and recover stale compose networks
  block:
    - name: Recreate the Matrix Synapse stack when config-backed files changed
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ matrix_synapse_compose_file }}"
          - up
          - -d
          - --remove-orphans
          - --force-recreate
      args:
        chdir: "{{ matrix_synapse_site_dir }}"
      register: matrix_synapse_up
      changed_when: >-
        'Creating' in matrix_synapse_up.stdout
        or 'Recreating' in matrix_synapse_up.stdout
        or 'Starting' in matrix_synapse_up.stdout
        or 'Running' in matrix_synapse_up.stdout
      when: matrix_synapse_force_recreate_stack

    - name: Start the Matrix Synapse stack
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ matrix_synapse_compose_file }}"
          - up
          - -d
          - --remove-orphans
      args:
        chdir: "{{ matrix_synapse_site_dir }}"
      register: matrix_synapse_up
      changed_when: >-
        'Creating' in matrix_synapse_up.stdout
        or 'Recreating' in matrix_synapse_up.stdout
        or 'Starting' in matrix_synapse_up.stdout
      when: not matrix_synapse_force_recreate_stack
  rescue:
    - name: Flag Docker bridge-chain and stale Matrix Synapse compose network failures after startup failure
      ansible.builtin.set_fact:
        matrix_synapse_docker_bridge_chain_missing: >-
          {{
            'No chain/target/match by that name' in (matrix_synapse_up.stderr | default(''))
            or 'Unable to enable ACCEPT OUTGOING rule' in (matrix_synapse_up.stderr | default(''))
          }}
        matrix_synapse_compose_network_missing: >-
          {{
            'failed to create endpoint' in (matrix_synapse_up.stderr | default(''))
            and 'does not exist' in (matrix_synapse_up.stderr | default(''))
          }}

    - name: Surface unexpected Matrix Synapse startup failures
      ansible.builtin.fail:
        msg: >-
          {{
            matrix_synapse_up.stderr
            | default(matrix_synapse_up.stdout)
            | default('Unknown Matrix Synapse compose startup failure.')
          }}
      when: >-
        not matrix_synapse_docker_bridge_chain_missing
        and not matrix_synapse_compose_network_missing

    - name: Reset stale Matrix Synapse compose resources after startup failure
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ matrix_synapse_compose_file }}"
          - down
          - --remove-orphans
      args:
        chdir: "{{ matrix_synapse_site_dir }}"
      register: matrix_synapse_compose_down_retry
      changed_when: >-
        'Stopping' in matrix_synapse_compose_down_retry.stdout
        or 'Removing' in matrix_synapse_compose_down_retry.stdout
      failed_when: false
      when: matrix_synapse_compose_network_missing

    - name: Restart Docker to restore bridge chains before retrying Matrix Synapse startup
      ansible.builtin.service:
        name: docker
        state: restarted
      when: matrix_synapse_docker_bridge_chain_missing or matrix_synapse_compose_network_missing

    - name: Ensure Docker bridge networking chains are present before retrying Matrix Synapse startup
      ansible.builtin.include_role:
        name: lv3.platform.common
        tasks_from: docker_bridge_chains
      vars:
        common_docker_bridge_chains_service_name: docker
        common_docker_bridge_chains_require_nat_chain: true
      when: matrix_synapse_docker_bridge_chain_missing or matrix_synapse_compose_network_missing

    - name: Wait for the Docker daemon to answer after Matrix Synapse network recovery
      ansible.builtin.command:
        argv:
          - docker
          - info
          - --format
          - '{{ "{{.ServerVersion}}" }}'
      register: matrix_synapse_docker_info
      changed_when: false
      retries: 10
      delay: 2
      until: matrix_synapse_docker_info.rc == 0
      when: matrix_synapse_docker_bridge_chain_missing or matrix_synapse_compose_network_missing

    - name: Remove the broken Matrix Synapse container before retrying startup
      ansible.builtin.command:
        argv:
          - docker
          - rm
          - -f
          - "{{ matrix_synapse_container_name }}"
      register: matrix_synapse_remove_broken_container
      changed_when: "'No such container' not in (matrix_synapse_remove_broken_container.stderr | default(''))"
      failed_when: false
      when: matrix_synapse_docker_bridge_chain_missing or matrix_synapse_compose_network_missing

    - name: Retry Matrix Synapse startup after resetting stale compose resources
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ matrix_synapse_compose_file }}"
          - up
          - -d
          - --remove-orphans
          - --force-recreate
      args:
        chdir: "{{ matrix_synapse_site_dir }}"
      register: matrix_synapse_up_retry
      changed_when: >-
        'Creating' in matrix_synapse_up_retry.stdout
        or 'Recreating' in matrix_synapse_up_retry.stdout
        or 'Starting' in matrix_synapse_up_retry.stdout
        or 'Running' in matrix_synapse_up_retry.stdout
      when: matrix_synapse_docker_bridge_chain_missing or matrix_synapse_compose_network_missing

- name: Wait for Matrix Synapse to listen locally
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ matrix_synapse_port }}"
    delay: 0
    timeout: 240

- name: Wait for the Matrix Synapse client versions endpoint
  ansible.builtin.uri:
    url: "{{ matrix_synapse_internal_base_url }}/_matrix/client/versions"
    method: GET
    status_code: 200
  register: matrix_synapse_versions_ready
  retries: 24
  delay: 5
  until: matrix_synapse_versions_ready.status == 200
  changed_when: false

- name: Check whether the Matrix Synapse ops admin already accepts the bootstrap password
  ansible.builtin.uri:
    url: "{{ matrix_synapse_internal_base_url }}/_matrix/client/v3/login"
    method: POST
    body_format: json
    body:
      type: m.login.password
      identifier:
        type: m.id.user
        user: "{{ matrix_synapse_admin_localpart }}"
      password: "{{ matrix_synapse_ops_password }}"
    status_code:
      - 200
      - 400
      - 401
      - 403
      - 429
  register: matrix_synapse_admin_login_probe
  changed_when: false
  failed_when: false
  no_log: true

- name: Ensure the Matrix Synapse ops admin exists when the bootstrap password does not work yet
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ matrix_synapse_container_name }}"
      - register_new_matrix_user
      - --exists-ok
      - -u
      - "{{ matrix_synapse_admin_localpart }}"
      - -p
      - "{{ matrix_synapse_ops_password }}"
      - -a
      - -c
      - /data/homeserver.yaml
      - http://127.0.0.1:8008
  register: matrix_synapse_admin_registration
  changed_when: false
  failed_when: false
  when: matrix_synapse_admin_login_probe.status != 200
  no_log: true

- name: Confirm the Matrix Synapse ops admin password login succeeds
  ansible.builtin.uri:
    url: "{{ matrix_synapse_internal_base_url }}/_matrix/client/v3/login"
    method: POST
    body_format: json
    body:
      type: m.login.password
      identifier:
        type: m.id.user
        user: "{{ matrix_synapse_admin_localpart }}"
      password: "{{ matrix_synapse_ops_password }}"
    status_code: 200
  register: matrix_synapse_admin_login_ready
  retries: 6
  delay: 10
  until: matrix_synapse_admin_login_ready.status == 200
  changed_when: false
  no_log: true

- name: Read the Matrix Synapse signing key
  ansible.builtin.slurp:
    src: "{{ matrix_synapse_signing_key_remote_file }}"
  register: matrix_synapse_signing_key_raw
  no_log: true

- name: Mirror the Matrix Synapse signing key to the control machine
  ansible.builtin.copy:
    dest: "{{ matrix_synapse_signing_key_local_file }}"
    content: "{{ matrix_synapse_signing_key_raw.content | b64decode }}"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Import the Matrix Synapse verification flow
  ansible.builtin.import_tasks: verify.yml
