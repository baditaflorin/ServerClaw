---
# Purpose: Provision the PostgreSQL role and database required by the SFTPGo metadata plane.
# Use case: Run during SFTPGo deployment or replay before the runtime stack starts on docker-runtime-lv3.

- name: Validate SFTPGo PostgreSQL inputs
  ansible.builtin.assert:
    that:
      - sftpgo_database_name | length > 0
      - sftpgo_database_user | length > 0
      - sftpgo_postgres_secret_dir | length > 0
      - sftpgo_postgres_password_file | length > 0
      - sftpgo_database_password_local_file | length > 0
    fail_msg: "sftpgo_postgres requires database names and local or remote password paths."

- name: Ensure the SFTPGo PostgreSQL secret directory exists
  ansible.builtin.file:
    path: "{{ sftpgo_postgres_secret_dir }}"
    state: directory
    owner: root
    group: postgres
    mode: "0750"

- name: Ensure the local SFTPGo artifact directory exists
  ansible.builtin.file:
    path: "{{ sftpgo_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate the SFTPGo database password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ sftpgo_database_password_local_file }}" ]; then
      umask 077
      openssl rand -base64 24 | tr -d '\n' > "{{ sftpgo_database_password_local_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: sftpgo_postgres_password_generation
  changed_when: "'changed' in sftpgo_postgres_password_generation.stdout"
  no_log: true

- name: Read the SFTPGo database password
  ansible.builtin.slurp:
    src: "{{ sftpgo_database_password_local_file }}"
  delegate_to: localhost
  become: false
  register: sftpgo_postgres_password_raw
  no_log: true

- name: Record the SFTPGo database password
  ansible.builtin.set_fact:
    sftpgo_database_password: "{{ sftpgo_postgres_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Mirror the SFTPGo database password to the control machine
  ansible.builtin.copy:
    dest: "{{ sftpgo_database_password_local_file }}"
    content: "{{ sftpgo_database_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Persist the SFTPGo database password on the current guest
  ansible.builtin.copy:
    dest: "{{ sftpgo_postgres_password_file }}"
    content: "{{ sftpgo_database_password }}\n"
    owner: root
    group: postgres
    mode: "0640"
  no_log: true

- name: Check whether the local PostgreSQL member is writable
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT CASE WHEN pg_is_in_recovery() THEN 0 ELSE 1 END"
  register: sftpgo_postgres_writable_check
  changed_when: false

- name: Check whether the SFTPGo database role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ sftpgo_database_user }}'"
  register: sftpgo_postgres_role_check
  changed_when: false
  when: sftpgo_postgres_writable_check.stdout | trim == "1"

- name: Create the SFTPGo database role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE ROLE {{ sftpgo_database_user }} LOGIN PASSWORD '{{ sftpgo_database_password }}'"
  changed_when: true
  no_log: true
  when:
    - sftpgo_postgres_writable_check.stdout | trim == "1"
    - sftpgo_postgres_role_check.stdout != "1"

- name: Ensure the SFTPGo database role password matches the managed secret
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER ROLE {{ sftpgo_database_user }} PASSWORD '{{ sftpgo_database_password }}'"
  changed_when: false
  no_log: true
  when: sftpgo_postgres_writable_check.stdout | trim == "1"

- name: Check whether the SFTPGo PostgreSQL database already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_database WHERE datname = '{{ sftpgo_database_name }}'"
  register: sftpgo_postgres_database_check
  changed_when: false
  when: sftpgo_postgres_writable_check.stdout | trim == "1"

- name: Create the SFTPGo PostgreSQL database
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE DATABASE {{ sftpgo_database_name }} OWNER {{ sftpgo_database_user }}"
  when:
    - sftpgo_postgres_writable_check.stdout | trim == "1"
    - sftpgo_postgres_database_check.stdout != "1"
  changed_when: true

- name: Ensure the SFTPGo database owner is correct
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER DATABASE {{ sftpgo_database_name }} OWNER TO {{ sftpgo_database_user }}"
  changed_when: false
  when: sftpgo_postgres_writable_check.stdout | trim == "1"
