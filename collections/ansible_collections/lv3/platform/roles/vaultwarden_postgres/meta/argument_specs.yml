---
argument_specs:
  main:
    short_description: Provision the Vaultwarden PostgreSQL database and login roles.
    options:
      vaultwarden_database_name:
        type: str
        required: true
      vaultwarden_database_user:
        type: str
        required: true
      vaultwarden_database_support_role:
        type: str
        required: true
      vaultwarden_postgres_secret_dir:
        type: path
        required: true
      vaultwarden_postgres_password_file:
        type: path
        required: true
      vaultwarden_local_artifact_dir:
        type: path
        required: true
      vaultwarden_database_password_local_file:
        type: path
        required: true
