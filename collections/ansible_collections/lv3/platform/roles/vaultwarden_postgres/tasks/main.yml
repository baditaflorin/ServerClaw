---
- name: Validate Vaultwarden PostgreSQL inputs
  ansible.builtin.assert:
    that:
      - vaultwarden_database_name | length > 0
      - vaultwarden_database_user | length > 0
      - vaultwarden_database_support_role | length > 0
      - vaultwarden_postgres_secret_dir | length > 0
      - vaultwarden_postgres_password_file | length > 0
      - vaultwarden_database_password_local_file | length > 0
    fail_msg: "vaultwarden_postgres requires database names and local or remote password paths."

- name: Ensure the Vaultwarden PostgreSQL secret directory exists
  ansible.builtin.file:
    path: "{{ vaultwarden_postgres_secret_dir }}"
    state: directory
    owner: root
    group: postgres
    mode: "0750"

- name: Ensure the local Vaultwarden artifact directory exists
  ansible.builtin.file:
    path: "{{ vaultwarden_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate the Vaultwarden database password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ vaultwarden_database_password_local_file }}" ]; then
      umask 077
      openssl rand -base64 24 | tr -d '\n' > "{{ vaultwarden_database_password_local_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: vaultwarden_postgres_password_generation
  changed_when: "'changed' in vaultwarden_postgres_password_generation.stdout"
  no_log: true

- name: Read the Vaultwarden database password
  ansible.builtin.slurp:
    src: "{{ vaultwarden_database_password_local_file }}"
  delegate_to: localhost
  become: false
  register: vaultwarden_postgres_password_raw
  no_log: true

- name: Record the Vaultwarden database password
  ansible.builtin.set_fact:
    vaultwarden_database_password: "{{ vaultwarden_postgres_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Mirror the Vaultwarden database password to the control machine
  ansible.builtin.copy:
    dest: "{{ vaultwarden_database_password_local_file }}"
    content: "{{ vaultwarden_database_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Persist the Vaultwarden database password on the current guest
  ansible.builtin.copy:
    dest: "{{ vaultwarden_postgres_password_file }}"
    content: "{{ vaultwarden_database_password }}\n"
    owner: root
    group: postgres
    mode: "0640"
  no_log: true

- name: Check whether the local PostgreSQL member is writable
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT CASE WHEN pg_is_in_recovery() THEN 0 ELSE 1 END"
  register: vaultwarden_postgres_writable_check
  changed_when: false

- name: Check whether the Vaultwarden support role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ vaultwarden_database_support_role }}'"
  register: vaultwarden_postgres_support_role_check
  changed_when: false
  when: vaultwarden_postgres_writable_check.stdout | trim == "1"

- name: Create the Vaultwarden support role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE ROLE {{ vaultwarden_database_support_role }}"
  changed_when: true
  when:
    - vaultwarden_postgres_writable_check.stdout | trim == "1"
    - vaultwarden_postgres_support_role_check.stdout != "1"

- name: Check whether the Vaultwarden admin role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ vaultwarden_database_user }}'"
  register: vaultwarden_postgres_admin_role_check
  changed_when: false
  when: vaultwarden_postgres_writable_check.stdout | trim == "1"

- name: Create the Vaultwarden admin role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - >-
        CREATE ROLE {{ vaultwarden_database_user }} LOGIN
        PASSWORD '{{ vaultwarden_database_password }}' IN ROLE {{ vaultwarden_database_support_role }}
  changed_when: true
  no_log: true
  when:
    - vaultwarden_postgres_writable_check.stdout | trim == "1"
    - vaultwarden_postgres_admin_role_check.stdout != "1"

- name: Ensure the Vaultwarden admin role password matches the managed secret
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER ROLE {{ vaultwarden_database_user }} PASSWORD '{{ vaultwarden_database_password }}'"
  changed_when: false
  no_log: true
  when: vaultwarden_postgres_writable_check.stdout | trim == "1"

- name: Grant the Vaultwarden support role to the admin role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "GRANT {{ vaultwarden_database_support_role }} TO {{ vaultwarden_database_user }}"
  changed_when: false
  when: vaultwarden_postgres_writable_check.stdout | trim == "1"

- name: Check whether the Vaultwarden PostgreSQL database already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_database WHERE datname = '{{ vaultwarden_database_name }}'"
  register: vaultwarden_postgres_database_check
  changed_when: false
  when: vaultwarden_postgres_writable_check.stdout | trim == "1"

- name: Create the Vaultwarden PostgreSQL database
  become: true
  become_user: postgres
  ansible.builtin.shell: >
    psql -v ON_ERROR_STOP=1
    -c "CREATE DATABASE {{ vaultwarden_database_name }} OWNER {{ vaultwarden_database_user }}"
  args:
    executable: /bin/bash
  when:
    - vaultwarden_postgres_writable_check.stdout | trim == "1"
    - vaultwarden_postgres_database_check.stdout != "1"
  changed_when: true

- name: Ensure the Vaultwarden database owner is correct
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER DATABASE {{ vaultwarden_database_name }} OWNER TO {{ vaultwarden_database_user }}"
  changed_when: false
  when: vaultwarden_postgres_writable_check.stdout | trim == "1"
