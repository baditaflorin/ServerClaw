---
# Purpose: Provision the vaultwarden PostgreSQL database using the shared postgres_client role (ADR 0359).
# Use case: Called during vaultwarden deployment to ensure the database, role, and credentials exist.
# Inputs: vaultwarden_* variables from defaults/main.yml; resolves registry entry from platform_postgres_clients.
# Outputs: vaultwarden PostgreSQL role, database, and credential files converged on postgres-lv3.
# Idempotency: Yes; postgres_client role handles all idempotency.
# Dependencies: ADR 0359 postgres_client role, platform_postgres_clients registry.
- name: Provision the vaultwarden database via the shared postgres_client role
  ansible.builtin.include_role:
    name: lv3.platform.postgres_client
  vars:
    postgres_client_service: "{{ vaultwarden_database_name }}"
    postgres_client_database: "{{ vaultwarden_database_name }}"
    postgres_client_user: "{{ vaultwarden_database_user }}"
    postgres_client_password_local_file: "{{ vaultwarden_database_password_local_file }}"
    postgres_client_password_remote_dir: "{{ vaultwarden_postgres_secret_dir }}"
    postgres_client_password_remote_file: "{{ vaultwarden_postgres_password_file }}"
    postgres_client_support_role: "{{ vaultwarden_database_support_role }}"
