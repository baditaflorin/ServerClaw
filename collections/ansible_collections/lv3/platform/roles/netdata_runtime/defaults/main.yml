---
# Purpose: Declare the shared defaults for converging the Netdata parent and child streaming runtime.
# Use case: Used whenever the netdata_runtime role configures the monitoring parent, guest children, and stream API key artifacts.
#
# Inputs (required):
#   - inventory host facts (generated, required): Supply parent/child guest names, ports, and public hostname wiring.
#
# Inputs (optional):
#   - netdata_runtime_parent_retention_time (str, optional, default=1d): Parent retention window.
#   - netdata_runtime_child_history (int, optional, default=3600): Child in-memory history length.
#
# Outputs:
#   - Default variable values consumed by the netdata_runtime role tasks and verification.
#
# Idempotency: Fully idempotent
#              This file only declares role defaults.
#
# Dependencies:
#   - ADR 0196: Defines the Netdata realtime metrics runtime and publication contract.
#   - Role: netdata_runtime — converges the parent/child Netdata streaming mesh.
#
# Related ADRs: 0165, 0196
# Related Runbooks: docs/runbooks/configure-netdata.md
#
# Author: LV3 Platform
# Last Updated: 2026-04-05
netdata_runtime_parent_inventory_host: monitoring-lv3
netdata_runtime_child_inventory_hosts: >-
  {{ ((groups['proxmox_hosts'] | default([])) + (groups['lv3_guests'] | default([])))
     | select('in', groups['production'] | default([]))
     | reject('equalto', netdata_runtime_parent_inventory_host)
     | unique
     | list }}
netdata_runtime_is_parent: "{{ inventory_hostname == netdata_runtime_parent_inventory_host }}"
netdata_runtime_parent_web_port: "{{ hostvars[groups['proxmox_hosts'][0]].platform_port_assignments.netdata_port }}"
netdata_runtime_parent_private_ip: "{{ hostvars[netdata_runtime_parent_inventory_host].ansible_host }}"
netdata_runtime_parent_public_url: "https://{{ hostvars[groups['proxmox_hosts'][0]].lv3_service_topology.realtime.public_hostname }}"
netdata_runtime_stream_api_key_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/monitoring/netdata-stream-api-key.txt
netdata_runtime_stream_api_key_remote_file: /etc/lv3/monitoring/netdata-stream-api-key
netdata_runtime_state_dir: /etc/lv3/netdata
netdata_runtime_parent_bind_to: "0.0.0.0:{{ netdata_runtime_parent_web_port }}"
netdata_runtime_child_bind_to: "127.0.0.1:{{ netdata_runtime_parent_web_port }}"
netdata_runtime_stream_allow_from:
  - 10.10.10.*
  - 100.64.0.1
  - 127.0.0.1
netdata_runtime_parent_retention_time: 1d
netdata_runtime_parent_retention_size: 1024MiB
netdata_runtime_child_db_mode: ram
netdata_runtime_child_history: 3600
netdata_runtime_kickstart_url: https://get.netdata.cloud/kickstart.sh
netdata_runtime_kickstart_script_path: /usr/local/sbin/netdata-kickstart.sh
netdata_runtime_repo_bootstrap_args:
  - --stable-channel
  - --native-only
  - --repositories-only
  - --non-interactive
  - --disable-telemetry
  - --no-updates
netdata_runtime_verify_info_url: "http://127.0.0.1:{{ netdata_runtime_parent_web_port }}/api/v1/info"
netdata_runtime_verify_allmetrics_url: >-
  http://127.0.0.1:{{ netdata_runtime_parent_web_port }}/api/v1/allmetrics?format=prometheus_all_hosts&source=as-collected
