---
# Purpose: Verify that the converged Netdata info and allmetrics endpoints respond on the managed realtime runtime.
# Dependencies: ADR 0196, ADR 0165, ADR 0371.
- name: Verify the Netdata runtime health
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: netdata
    common_verify_port: "{{ netdata_runtime_parent_web_port }}"
    common_verify_health_url: "{{ netdata_runtime_verify_info_url }}"
    common_verify_health_retries: 20
    common_verify_health_delay: 3

- name: Verify the parent Netdata Prometheus exporter responds
  ansible.builtin.uri:
    url: "{{ netdata_runtime_verify_allmetrics_url }}"
    method: GET
    status_code: 200
    return_content: true
    timeout: 30
  register: netdata_runtime_verify_allmetrics
  retries: 20
  delay: 3
  until: netdata_runtime_verify_allmetrics.status == 200
  changed_when: false
  when: netdata_runtime_is_parent
