---
# Purpose: Declare the validated input contract for the netdata_runtime role.
# Use case: Used by Ansible argument validation before Netdata parent/child converge tasks run.
#
# Inputs (required):
#   - netdata_runtime_parent_inventory_host (str, required): Parent inventory hostname.
#   - netdata_runtime_child_inventory_hosts (list[str], required): Child inventory hostnames.
#   - netdata_runtime_parent_web_port (int, required): Netdata listener port.
#   - netdata_runtime_parent_private_ip (str, required): Parent guest IPv4.
#   - netdata_runtime_parent_public_url (str, required): Public realtime hostname URL.
#   - netdata_runtime_stream_api_key_local_file (path, required): Controller-local stream API key artifact.
#   - netdata_runtime_stream_api_key_remote_file (path, required): Guest-side stream API key path.
#   - netdata_runtime_state_dir (path, required): Netdata state directory.
#
# Inputs (optional):
#   - netdata_runtime_stream_allow_from (list[str], optional): Allowed stream source CIDRs/globs.
#   - netdata_runtime_verify_info_url (str, optional): Info endpoint URL used during verification.
#
# Outputs:
#   - Argument-spec validation metadata for the netdata_runtime role.
#
# Idempotency: Fully idempotent
#              This file only declares validation metadata.
#
# Dependencies:
#   - ADR 0196: Defines the Netdata runtime converge contract.
#   - Role: netdata_runtime — validates inputs before converge.
#
# Related ADRs: 0165, 0196
# Related Runbooks: docs/runbooks/configure-netdata.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-28
argument_specs:
  main:
    short_description: Converge Netdata parent and child agents for live streaming metrics.
    options:
      netdata_runtime_parent_inventory_host:
        type: str
        required: true
      netdata_runtime_child_inventory_hosts:
        type: list
        elements: str
        required: true
      netdata_runtime_is_parent:
        type: bool
        required: true
      netdata_runtime_parent_web_port:
        type: int
        required: true
      netdata_runtime_parent_private_ip:
        type: str
        required: true
      netdata_runtime_parent_public_url:
        type: str
        required: true
      netdata_runtime_stream_api_key_local_file:
        type: path
        required: true
      netdata_runtime_stream_api_key_remote_file:
        type: path
        required: true
      netdata_runtime_state_dir:
        type: path
        required: true
      netdata_runtime_parent_bind_to:
        type: str
        required: true
      netdata_runtime_child_bind_to:
        type: str
        required: true
      netdata_runtime_stream_allow_from:
        type: list
        elements: str
        required: true
      netdata_runtime_parent_retention_time:
        type: str
        required: true
      netdata_runtime_parent_retention_size:
        type: str
        required: true
      netdata_runtime_child_db_mode:
        type: str
        required: true
      netdata_runtime_child_history:
        type: int
        required: true
      netdata_runtime_verify_info_url:
        type: str
        required: true
      netdata_runtime_verify_allmetrics_url:
        type: str
        required: true
