# Purpose: Describe the supported arguments for the reusable common-role entrypoints.
# Use case: Run with ansible argument-spec validation whenever another role calls the common helper tasks.
# Inputs: The common_* variables accepted by each entrypoint.
# Outputs: Machine-readable argument contracts for the common role.
# Idempotency: Fully idempotent; metadata only constrains role inputs.
# Dependencies: ADR 0165 metadata standard and the common role task includes.
---
argument_specs:
  main:
    short_description: Shared task entrypoints for reusable Ansible role patterns.
    options: {}
  assert_vars:
    short_description: Validate required variables before role tasks continue.
    options:
      common_assert_vars_required:
        type: list
        elements: str
        required: false
        default: []
        description:
          - Variable names that must be defined and non-empty.
      common_assert_vars_expressions:
        type: list
        elements: str
        required: false
        default: []
        description:
          - Additional Ansible assertion expressions to evaluate.
      common_assert_vars_fail_msg:
        type: str
        required: false
        default: Common role variable assertion failed.
        description:
          - Failure message used for the assertion.
  directory_tree:
    short_description: Ensure one or more managed directories exist with shared defaults.
    options:
      common_directory_tree_paths:
        type: list
        elements: raw
        required: true
        description:
          - Directory definitions as either paths or mapping objects with path, owner, group, mode, and recurse.
      common_directory_tree_owner:
        type: str
        required: false
        default: root
        description:
          - Default owner applied when an item does not override it.
      common_directory_tree_group:
        type: str
        required: false
        default: root
        description:
          - Default group applied when an item does not override it.
      common_directory_tree_mode:
        type: str
        required: false
        default: "0755"
        description:
          - Default directory mode applied when an item does not override it.
      common_directory_tree_state:
        type: str
        required: false
        default: directory
        description:
          - File module state used for each directory item.
      common_directory_tree_recurse:
        type: bool
        required: false
        default: false
        description:
          - Whether ownership and mode should recurse through existing content by default.
  systemd_unit:
    short_description: Enable, start, and optionally verify a systemd unit.
    options:
      common_systemd_unit_name:
        type: str
        required: true
        description:
          - Name of the systemd unit to manage.
      common_systemd_unit_enabled:
        type: bool
        required: false
        default: true
        description:
          - Whether the unit should be enabled.
      common_systemd_unit_state:
        type: str
        required: false
        default: started
        choices:
          - started
          - stopped
          - restarted
          - reloaded
        description:
          - Desired systemd state for the unit.
      common_systemd_unit_daemon_reload:
        type: bool
        required: false
        default: false
        description:
          - Whether to reload systemd units before managing the service.
      common_systemd_unit_verify_active:
        type: bool
        required: false
        default: false
        description:
          - Whether to verify the unit's active state after managing it.
      common_systemd_unit_expected_active_state:
        type: str
        required: false
        default: active
        description:
          - Expected output from `systemctl is-active` when verification is enabled.
  docker_bridge_chains:
    short_description: Ensure Docker bridge networking chains exist when Docker is active on the target host.
    options:
      common_docker_bridge_chains_service_name:
        type: str
        required: false
        default: docker
        description:
          - Name of the Docker systemd unit whose bridge chains should be rechecked.
      common_docker_bridge_chains_require_nat_chain:
        type: bool
        required: false
        default: true
        description:
          - Whether the helper should also require the nat DOCKER chain in addition to DOCKER-FORWARD.
      common_docker_bridge_chains_retries:
        type: int
        required: false
        default: 10
        description:
          - Number of retries used when waiting for Docker to recreate its bridge chains after a restart.
      common_docker_bridge_chains_delay:
        type: int
        required: false
        default: 2
        description:
          - Delay in seconds between Docker bridge chain recheck attempts.
  docker_daemon_restart:
    short_description: Restart Docker only when the target host is not a protected shared runtime, unless an operator explicitly forces it.
    options:
      common_docker_daemon_restart_service_name:
        type: str
        required: false
        default: docker
        description:
          - Name of the Docker systemd unit that would be restarted.
      common_docker_daemon_restart_reason:
        type: str
        required: true
        description:
          - Human-readable reason included in the failure message when the restart is refused.
      common_docker_daemon_restart_force:
        type: bool
        required: false
        default: false
        description:
          - Whether an explicitly approved maintenance window allows the restart on a protected host.
      common_docker_daemon_restart_protected_hosts:
        type: list
        elements: str
        required: false
        default:
          - docker-runtime
          - docker-runtime
        description:
          - Inventory hosts where automatic Docker daemon restarts must fail closed by default.
  wait_port:
    short_description: Wait for a TCP listener with shared retry defaults.
    options:
      common_wait_port_host:
        type: str
        required: false
        default: 127.0.0.1
        description:
          - Hostname or IP address to probe.
      common_wait_port_port:
        type: int
        required: true
        description:
          - TCP port to wait for.
      common_wait_port_delay:
        type: int
        required: false
        default: 0
        description:
          - Delay before the first probe attempt.
      common_wait_port_timeout:
        type: int
        required: false
        default: 120
        description:
          - Total timeout in seconds.
      common_wait_port_state:
        type: str
        required: false
        default: started
        choices:
          - started
          - stopped
          - drained
          - present
          - absent
        description:
          - Expected listener state passed to `wait_for`.
  openbao_systemd_credentials:
    short_description: Install an OpenBao Agent plus systemd-credential bundle for a host-native service.
    options:
      common_openbao_systemd_credentials_service_name:
        type: str
        required: true
        description:
          - Friendly service label used for the managed OpenBao Agent bundle.
      common_openbao_systemd_credentials_agent_dir:
        type: path
        required: true
        description:
          - Directory that stores the AppRole bootstrap files and agent templates.
      common_openbao_systemd_credentials_credential_dir:
        type: path
        required: true
        description:
          - Runtime directory where the OpenBao Agent renders credential files for systemd to load.
      common_openbao_systemd_credentials_credential_file:
        type: path
        required: true
        description:
          - Credential file rendered by the OpenBao Agent for the target systemd service.
      common_openbao_systemd_credentials_token_file:
        type: path
        required: false
        default: ""
        description:
          - Optional OpenBao token sink file rendered by the agent for services that must call the API directly.
      common_openbao_systemd_credentials_secret_path:
        type: str
        required: true
        description:
          - Relative KV v2 path under `kv/data/` that stores the rendered credential payload.
      common_openbao_systemd_credentials_secret_payload:
        type: dict
        required: true
        description:
          - Secret payload persisted under the declared OpenBao KV path.
      common_openbao_systemd_credentials_policy_name:
        type: str
        required: true
        description:
          - OpenBao ACL policy name attached to the AppRole.
      common_openbao_systemd_credentials_policy_rules:
        type: str
        required: true
        description:
          - ACL policy rules granted to the AppRole token.
      common_openbao_systemd_credentials_approle_name:
        type: str
        required: true
        description:
          - AppRole name used by the managed OpenBao Agent auto-auth flow.
      common_openbao_systemd_credentials_agent_config_file:
        type: path
        required: true
        description:
          - Managed OpenBao Agent HCL configuration path on the target host.
      common_openbao_systemd_credentials_agent_template_file:
        type: path
        required: true
        description:
          - Managed template path that the OpenBao Agent reads inside the mounted agent directory.
      common_openbao_systemd_credentials_agent_template_local_file:
        type: path
        required: false
        default: ""
        description:
          - Optional controller-local source file copied verbatim as the agent template.
      common_openbao_systemd_credentials_agent_template_src:
        type: str
        required: false
        default: ""
        description:
          - Optional Ansible template source rendered into the agent template path.
      common_openbao_systemd_credentials_agent_template_content:
        type: str
        required: false
        default: ""
        description:
          - Optional inline template content written into the agent template path.
      common_openbao_systemd_credentials_role_id_file:
        type: path
        required: true
        description:
          - Host-local file that stores the durable AppRole role ID.
      common_openbao_systemd_credentials_secret_id_file:
        type: path
        required: true
        description:
          - Host-local file that stores the durable AppRole secret ID.
      common_openbao_systemd_credentials_image:
        type: str
        required: true
        description:
          - Container image used to run the OpenBao Agent under systemd supervision.
      common_openbao_systemd_credentials_container_entrypoint:
        type: str
        required: false
        default: /bin/vault
        description:
          - Executable path inside the container used to bypass the image entrypoint and run the OpenBao Agent directly.
      common_openbao_systemd_credentials_agent_service_name:
        type: str
        required: true
        description:
          - Name of the managed systemd service that supervises the OpenBao Agent container.
      common_openbao_systemd_credentials_container_name:
        type: str
        required: true
        description:
          - Container name used for the managed OpenBao Agent runtime.
      common_openbao_systemd_credentials_openbao_address:
        type: str
        required: false
        default: ""
        description:
          - Optional explicit OpenBao API address; defaults to the local loopback listener on `openbao_http_port`.
      common_openbao_systemd_credentials_manage_local_openbao_runtime:
        type: bool
        required: false
        default: true
        description:
          - Whether the helper may restart and recover a local OpenBao runtime when the configured API address is unavailable.
      common_openbao_api_operation_retries:
        type: int
        required: false
        default: 36
        description:
          - Number of retries used for OpenBao read and write API operations after helper preflight succeeds.
      common_openbao_api_operation_delay:
        type: int
        required: false
        default: 5
        description:
          - Delay in seconds between OpenBao read and write API operation retries.
