---
- name: Validate common systemd_unit entrypoint inputs
  ansible.builtin.assert:
    that:
      - common_systemd_unit_name | length > 0
    fail_msg: "common.systemd_unit requires a systemd unit name."
    quiet: true

- name: Ensure the managed systemd unit matches the requested state
  ansible.builtin.systemd_service:
    name: "{{ common_systemd_unit_name }}"
    enabled: "{{ common_systemd_unit_enabled }}"
    state: "{{ common_systemd_unit_state }}"
    daemon_reload: "{{ common_systemd_unit_daemon_reload }}"

- name: Verify the managed systemd unit active state
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - "{{ common_systemd_unit_name }}"
  register: common_systemd_unit_active_state
  changed_when: false
  failed_when: common_systemd_unit_active_state.stdout | trim != common_systemd_unit_expected_active_state
  when: common_systemd_unit_verify_active | bool
