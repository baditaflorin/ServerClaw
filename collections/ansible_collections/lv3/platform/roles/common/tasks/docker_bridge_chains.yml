# Purpose: Wait for Docker-managed iptables bridge chains to exist before dependent publication logic runs.
# Use case: Include after Docker starts on guests where downstream tasks rely on the DOCKER nat and forward chains.
# Inputs: common_docker_bridge_chains_* variables describing the service name and retry behavior.
# Outputs: Verified presence of the expected Docker bridge chains or an explicit failure without restarting Docker.
# Idempotency: Fully idempotent; checks state, waits for bounded automatic recovery, and does not mutate Docker service state.
# Dependencies: ADR 0165 metadata standard, the common role defaults, and a Docker-managed guest.
---
- name: Validate common docker_bridge_chains entrypoint inputs
  ansible.builtin.assert:
    that:
      - common_docker_bridge_chains_service_name | length > 0
      - common_docker_bridge_chains_retries | int > 0
      - common_docker_bridge_chains_delay | int >= 0
    fail_msg: "common.docker_bridge_chains requires a service name plus non-negative retry settings."
    quiet: true

- name: Detect whether the Docker service is active
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - "{{ common_docker_bridge_chains_service_name }}"
  register: common_docker_bridge_chains_active_state
  changed_when: false
  failed_when: common_docker_bridge_chains_active_state.rc not in [0, 3, 4]

- name: Warm the Docker control socket before chain health checks
  ansible.builtin.command:
    argv:
      - docker
      - info
      - --format
      - "{{ '{{.ServerVersion}}' }}"
  register: common_docker_bridge_chains_info_ready
  changed_when: false
  retries: "{{ common_docker_bridge_chains_retries }}"
  delay: "{{ common_docker_bridge_chains_delay }}"
  until: common_docker_bridge_chains_info_ready.rc == 0
  when: common_docker_bridge_chains_active_state.rc == 0

- name: Check whether Docker nat chain exists
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - nat
      - -S
      - DOCKER
  register: common_docker_bridge_chains_nat_check
  changed_when: false
  failed_when: common_docker_bridge_chains_nat_check.rc not in [0, 1]
  when:
    - common_docker_bridge_chains_require_nat_chain | bool
    - common_docker_bridge_chains_active_state.rc == 0

- name: Check whether Docker forward chain exists
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - filter
      - -S
      - DOCKER-FORWARD
  register: common_docker_bridge_chains_forward_check
  changed_when: false
  failed_when: common_docker_bridge_chains_forward_check.rc not in [0, 1]
  when: common_docker_bridge_chains_active_state.rc == 0

- name: Check whether Docker has running containers
  ansible.builtin.command:
    argv:
      - docker
      - ps
      - -q
  register: common_docker_bridge_chains_running_containers
  changed_when: false
  when: common_docker_bridge_chains_active_state.rc == 0

- name: Check whether Docker has bridge networks beyond the default bridge
  ansible.builtin.command:
    argv:
      - docker
      - network
      - ls
      - --filter
      - driver=bridge
      - -q
  register: common_docker_bridge_chains_bridge_networks
  changed_when: false
  when: common_docker_bridge_chains_active_state.rc == 0

- name: Decide whether Docker forward-chain enforcement is required
  ansible.builtin.set_fact:
    common_docker_bridge_chains_expect_forward_chain: >-
      {{
        common_docker_bridge_chains_active_state.rc == 0
        and (
          common_docker_bridge_chains_forward_check.rc == 0
          or (common_docker_bridge_chains_running_containers.stdout | trim | length) > 0
          or (common_docker_bridge_chains_bridge_networks.stdout_lines | length) > 1
        )
      }}
  when: common_docker_bridge_chains_active_state.rc == 0

- name: Reset SSH connection before Docker bridge-chain recovery checks
  ansible.builtin.meta: reset_connection
  when:
    - common_docker_bridge_chains_active_state.rc == 0
    - >
      (
        common_docker_bridge_chains_expect_forward_chain | default(false)
        and common_docker_bridge_chains_forward_check.rc == 1
      )
      or (
        (common_docker_bridge_chains_require_nat_chain | bool)
        and common_docker_bridge_chains_nat_check.rc == 1
      )

- name: Wait for SSH before Docker bridge-chain recovery checks
  ansible.builtin.wait_for_connection:
    timeout: "{{ ((common_docker_bridge_chains_retries | int) * (common_docker_bridge_chains_delay | int)) + 60 }}"
    connect_timeout: 5
    sleep: "{{ [common_docker_bridge_chains_delay | int, 1] | max }}"
  when:
    - common_docker_bridge_chains_active_state.rc == 0
    - >
      (
        common_docker_bridge_chains_expect_forward_chain | default(false)
        and common_docker_bridge_chains_forward_check.rc == 1
      )
      or (
        (common_docker_bridge_chains_require_nat_chain | bool)
        and common_docker_bridge_chains_nat_check.rc == 1
      )

- name: Wait briefly for Docker bridge chains to recover after daemon activation
  ansible.builtin.shell: |
    set -euo pipefail
    for _ in $(seq 1 {{ common_docker_bridge_chains_retries }}); do
      if {% if common_docker_bridge_chains_require_nat_chain | bool %}iptables -t nat -S DOCKER >/dev/null 2>&1 && {% endif %}{% if common_docker_bridge_chains_expect_forward_chain | default(false) %}iptables -t filter -S DOCKER-FORWARD >/dev/null 2>&1{% else %}true{% endif %}; then
        exit 0
      fi
      sleep {{ common_docker_bridge_chains_delay }}
    done
    exit 1
  args:
    executable: /bin/bash
  register: common_docker_bridge_chains_wait
  changed_when: false
  failed_when: false
  when:
    - common_docker_bridge_chains_active_state.rc == 0
    - >
      (
        common_docker_bridge_chains_expect_forward_chain | default(false)
        and common_docker_bridge_chains_forward_check.rc == 1
      )
      or (
        (common_docker_bridge_chains_require_nat_chain | bool)
        and common_docker_bridge_chains_nat_check.rc == 1
      )

- name: Recheck Docker nat chain after health evaluation
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - nat
      - -S
      - DOCKER
  register: common_docker_bridge_chains_nat_recheck
  changed_when: false
  failed_when: common_docker_bridge_chains_nat_recheck.rc not in [0, 1]
  retries: "{{ common_docker_bridge_chains_retries }}"
  delay: "{{ common_docker_bridge_chains_delay }}"
  until: common_docker_bridge_chains_nat_recheck.rc == 0
  when:
    - common_docker_bridge_chains_require_nat_chain | bool
    - common_docker_bridge_chains_active_state.rc == 0

- name: Recheck Docker forward chain after health evaluation
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - filter
      - -S
      - DOCKER-FORWARD
  register: common_docker_bridge_chains_forward_recheck
  changed_when: false
  failed_when: common_docker_bridge_chains_forward_recheck.rc not in [0, 1]
  retries: "{{ common_docker_bridge_chains_retries }}"
  delay: "{{ common_docker_bridge_chains_delay }}"
  until: common_docker_bridge_chains_forward_recheck.rc == 0
  when: common_docker_bridge_chains_active_state.rc == 0

- name: Verify Docker nat chain after retry loop
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - nat
      - -S
      - DOCKER
  register: common_docker_bridge_chains_nat_verify
  changed_when: false
  failed_when: common_docker_bridge_chains_nat_verify.rc not in [0, 1]
  retries: "{{ common_docker_bridge_chains_retries }}"
  delay: "{{ common_docker_bridge_chains_delay }}"
  until: common_docker_bridge_chains_nat_verify.rc == 0
  when:
    - common_docker_bridge_chains_require_nat_chain | bool
    - common_docker_bridge_chains_active_state.rc == 0

- name: Verify Docker forward chain after retry loop
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - filter
      - -S
      - DOCKER-FORWARD
  register: common_docker_bridge_chains_forward_verify
  changed_when: false
  failed_when: common_docker_bridge_chains_forward_verify.rc not in [0, 1]
  retries: "{{ common_docker_bridge_chains_retries }}"
  delay: "{{ common_docker_bridge_chains_delay }}"
  until: common_docker_bridge_chains_forward_verify.rc == 0
  when:
    - common_docker_bridge_chains_active_state.rc == 0
    - common_docker_bridge_chains_expect_forward_chain | default(false)

- name: Assert Docker nat chain is present after health evaluation
  ansible.builtin.assert:
    that:
      - common_docker_bridge_chains_nat_verify.rc == 0
    fail_msg: "Docker is running but the nat DOCKER chain is missing; published ports will fail."
  when:
    - common_docker_bridge_chains_require_nat_chain | bool
    - common_docker_bridge_chains_active_state.rc == 0

- name: Assert Docker forward chain is present after health evaluation
  ansible.builtin.assert:
    that:
      - common_docker_bridge_chains_forward_verify.rc == 0
    fail_msg: "Docker is running but the filter DOCKER-FORWARD chain is missing; bridge networking will fail."
  when:
    - common_docker_bridge_chains_active_state.rc == 0
    - common_docker_bridge_chains_expect_forward_chain | default(false)
