# Purpose: Check that required secret files exist on the Ansible control machine before deploying to the remote host.
# Use case: Called by runtime roles to fail early with actionable guidance if a prerequisite hasn't been converged.
# Inputs:
#   common_check_local_secrets_files (list, required): List of dicts with path, description, and prerequisite fields.
# Outputs: Fails with an actionable message if any required secret file is missing.
# Idempotency: Fully idempotent; stat-only, no side effects.
# Dependencies: ADR 0370.
---
- name: Validate check_local_secrets inputs
  ansible.builtin.assert:
    that:
      - common_check_local_secrets_files | length > 0
    fail_msg: "common.check_local_secrets requires at least one secret file definition."
    quiet: true

- name: Check whether required secret files exist on the control machine
  ansible.builtin.stat:
    path: "{{ item.path }}"
  delegate_to: localhost
  become: false
  register: common_check_local_secrets_results
  loop: "{{ common_check_local_secrets_files }}"
  loop_control:
    label: "{{ item.description }}"

- name: Fail if any required secret file is missing on the control machine
  ansible.builtin.fail:
    msg: >-
      {{ item.item.path }} is missing on the control machine.
      {{ item.item.prerequisite }}.
  when: not item.stat.exists
  loop: "{{ common_check_local_secrets_results.results }}"
  loop_control:
    label: "{{ item.item.description }}"
