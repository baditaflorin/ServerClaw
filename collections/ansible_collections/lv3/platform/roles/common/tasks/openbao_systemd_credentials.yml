# Purpose: Render and install an OpenBao-backed systemd credential delivery bundle for a host-native service.
# Use case: Included by roles that need repo-managed host-native secrets delivered through systemd credentials instead of plaintext files.
# Inputs: Service name, OpenBao secret payload, AppRole metadata, agent paths, rendered credential paths, and the pinned OpenBao image.
# Outputs: Ensures the OpenBao policy, AppRole, agent config, rendered credential template, and supervising systemd service exist for the target service.
# Idempotency: Partially idempotent because secret writes and AppRole bootstrap material can rotate when requested inputs change.
# Dependencies: ADR 0165, ADR 0043, ADR 0077, and ADR 0231.
---
- name: Validate OpenBao systemd credential helper inputs
  ansible.builtin.assert:
    that:
      - common_openbao_systemd_credentials_service_name | length > 0
      - common_openbao_systemd_credentials_agent_dir | length > 0
      - common_openbao_systemd_credentials_credential_dir | length > 0
      - common_openbao_systemd_credentials_credential_file | length > 0
      - common_openbao_systemd_credentials_secret_path | length > 0
      - common_openbao_systemd_credentials_secret_payload | length > 0
      - common_openbao_systemd_credentials_policy_name | length > 0
      - common_openbao_systemd_credentials_policy_rules | length > 0
      - common_openbao_systemd_credentials_approle_name | length > 0
      - common_openbao_systemd_credentials_agent_config_file | length > 0
      - common_openbao_systemd_credentials_agent_template_file | length > 0
      - >-
        (common_openbao_systemd_credentials_agent_template_local_file | default('') | length > 0)
        or
        (common_openbao_systemd_credentials_agent_template_src | default('') | length > 0)
        or (common_openbao_systemd_credentials_agent_template_content | default('') | length > 0)
      - common_openbao_systemd_credentials_role_id_file | length > 0
      - common_openbao_systemd_credentials_secret_id_file | length > 0
      - common_openbao_systemd_credentials_image | length > 0
      - common_openbao_systemd_credentials_container_entrypoint | length > 0
      - common_openbao_systemd_credentials_agent_service_name | length > 0
      - common_openbao_systemd_credentials_container_name | length > 0
      - openbao_init_local_file | length > 0
      - openbao_http_port | string | length > 0
    fail_msg: >-
      common openbao_systemd_credentials helper requires runtime paths, OpenBao secret payload,
      AppRole metadata, agent supervision settings, and either a controller-local template source
      or pre-rendered template content.

- name: Check whether the controller-local OpenBao init payload exists
  ansible.builtin.stat:
    path: "{{ openbao_init_local_file }}"
  delegate_to: localhost
  become: false
  register: common_openbao_systemd_credentials_init_payload_local
  no_log: true

- name: Fail when the controller-local OpenBao init payload is missing
  ansible.builtin.fail:
    msg: >-
      {{ openbao_init_local_file }} is missing on the control machine.
      Converge OpenBao before enabling host-native secret delivery for
      {{ common_openbao_systemd_credentials_service_name }}.
  when: not common_openbao_systemd_credentials_init_payload_local.stat.exists

- name: Record the controller-local OpenBao init payload
  ansible.builtin.set_fact:
    common_openbao_systemd_credentials_init_payload: "{{ lookup('ansible.builtin.file', openbao_init_local_file) | from_json }}"
  no_log: true

- name: Ensure the local OpenBao API answers before host-native secret delivery
  block:
    - name: Wait for the local OpenBao API to answer
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/health"
        method: GET
        status_code:
          - 200
          - 429
          - 472
          - 473
          - 501
          - 503
      register: common_openbao_systemd_credentials_api_health
      retries: 24
      delay: 5
      until: common_openbao_systemd_credentials_api_health.status in [200, 429, 472, 473, 501, 503]
      changed_when: false
  rescue:
    - name: Classify the local OpenBao API failure before host-native secret delivery recovery
      ansible.builtin.set_fact:
        common_openbao_systemd_credentials_api_retryable: >-
          {{
            (ansible_failed_result.status | default(0) | int) == -1
            or 'connection refused' in (ansible_failed_result.msg | default('') | lower)
            or 'failed to connect' in (ansible_failed_result.msg | default('') | lower)
          }}
      no_log: true

    - name: Surface unexpected local OpenBao API failures before host-native secret delivery
      ansible.builtin.fail:
        msg: >-
          The local OpenBao API failed during host-native secret delivery for
          {{ common_openbao_systemd_credentials_service_name }} and did not match a
          recoverable local publication outage signature.
      when: not common_openbao_systemd_credentials_api_retryable | bool

    - name: Force-recreate the OpenBao service when the local API publication is missing before host-native secret delivery
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ openbao_site_dir }}/docker-compose.yml"
          - up
          - -d
          - --force-recreate
          - --remove-orphans
          - openbao
      args:
        chdir: "{{ openbao_site_dir }}"
      register: common_openbao_systemd_credentials_openbao_recovery_up
      changed_when: >-
        'Creating' in common_openbao_systemd_credentials_openbao_recovery_up.stdout
        or 'Recreating' in common_openbao_systemd_credentials_openbao_recovery_up.stdout
        or 'Starting' in common_openbao_systemd_credentials_openbao_recovery_up.stdout
      when: common_openbao_systemd_credentials_api_retryable | bool

    - name: Wait for the local OpenBao loopback port after host-native secret delivery recovery
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ openbao_http_port }}"
        delay: 0
        timeout: 120
      when: common_openbao_systemd_credentials_api_retryable | bool

    - name: Wait for the local OpenBao API to answer after host-native secret delivery recovery
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/health"
        method: GET
        status_code:
          - 200
          - 429
          - 472
          - 473
          - 501
          - 503
      register: common_openbao_systemd_credentials_api_health
      retries: 24
      delay: 5
      until: common_openbao_systemd_credentials_api_health.status in [200, 429, 472, 473, 501, 503]
      changed_when: false
      when: common_openbao_systemd_credentials_api_retryable | bool

- name: Read the local OpenBao seal status
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/seal-status"
    method: GET
    return_content: true
    status_code: 200
  register: common_openbao_systemd_credentials_seal_status
  retries: 12
  delay: 2
  until: common_openbao_systemd_credentials_seal_status.status == 200
  changed_when: false

- name: Unseal the local OpenBao API when host-native secret delivery finds it sealed
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/unseal"
    method: POST
    body_format: json
    body:
      key: "{{ item }}"
    status_code: 200
  loop: "{{ common_openbao_systemd_credentials_init_payload.keys_base64[: (openbao_init_key_threshold | default(2) | int)] }}"
  register: common_openbao_systemd_credentials_unseal_result
  retries: 6
  delay: 2
  until: common_openbao_systemd_credentials_unseal_result.status == 200
  when: common_openbao_systemd_credentials_seal_status.json.sealed | bool
  no_log: true

- name: Confirm the local OpenBao API is unsealed
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/seal-status"
    method: GET
    return_content: true
    status_code: 200
  register: common_openbao_systemd_credentials_unsealed_status
  retries: 12
  delay: 2
  until: common_openbao_systemd_credentials_unsealed_status.status == 200
  changed_when: false

- name: Assert the local OpenBao API is unsealed before host-native secret delivery
  ansible.builtin.assert:
    that:
      - not (common_openbao_systemd_credentials_unsealed_status.json.sealed | bool)
    fail_msg: >-
      OpenBao remained sealed on the runtime host while preparing host-native secret delivery
      for {{ common_openbao_systemd_credentials_service_name }}.

- name: Wait for the local OpenBao API to become active
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/health"
    method: GET
    status_code:
      - 200
      - 429
      - 472
      - 473
  register: common_openbao_systemd_credentials_health
  retries: 24
  delay: 5
  until: common_openbao_systemd_credentials_health.status in [200, 429, 472, 473]
  changed_when: false

- name: Ensure the OpenBao agent and credential directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ common_openbao_systemd_credentials_agent_dir }}"
      mode: "0700"
    - path: "{{ common_openbao_systemd_credentials_credential_dir }}"
      mode: "0700"

- name: Read the current host-native secret payload from OpenBao
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/kv/data/{{ common_openbao_systemd_credentials_secret_path }}"
    method: GET
    headers:
      X-Vault-Token: "{{ common_openbao_systemd_credentials_init_payload.root_token }}"
    return_content: true
    status_code:
      - 200
      - 404
      - 500
      - 502
      - 503
  register: common_openbao_systemd_credentials_current_secret
  retries: 12
  delay: 2
  until: common_openbao_systemd_credentials_current_secret.status in [200, 404]
  changed_when: false
  no_log: true

- name: Store the host-native secret payload in OpenBao
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/kv/data/{{ common_openbao_systemd_credentials_secret_path }}"
    method: POST
    headers:
      X-Vault-Token: "{{ common_openbao_systemd_credentials_init_payload.root_token }}"
    body_format: json
    body:
      data: "{{ common_openbao_systemd_credentials_secret_payload }}"
    status_code: 200
  when: >-
    common_openbao_systemd_credentials_current_secret.status == 404
    or (common_openbao_systemd_credentials_current_secret.json.data.data | default({})) != common_openbao_systemd_credentials_secret_payload
  no_log: true

- name: Read the current OpenBao policy for the host-native AppRole
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/policies/acl/{{ common_openbao_systemd_credentials_policy_name }}"
    method: GET
    headers:
      X-Vault-Token: "{{ common_openbao_systemd_credentials_init_payload.root_token }}"
    return_content: true
    status_code:
      - 200
      - 404
      - 500
      - 502
      - 503
  register: common_openbao_systemd_credentials_current_policy
  retries: 12
  delay: 2
  until: common_openbao_systemd_credentials_current_policy.status in [200, 404]
  changed_when: false
  no_log: true

- name: Upsert the OpenBao policy for the host-native AppRole
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/policies/acl/{{ common_openbao_systemd_credentials_policy_name }}"
    method: PUT
    headers:
      X-Vault-Token: "{{ common_openbao_systemd_credentials_init_payload.root_token }}"
    body_format: json
    body:
      policy: "{{ common_openbao_systemd_credentials_policy_rules }}"
    status_code: 204
  when: >-
    common_openbao_systemd_credentials_current_policy.status == 404
    or (common_openbao_systemd_credentials_current_policy.json.data.policy | default('')) != common_openbao_systemd_credentials_policy_rules
  no_log: true

- name: Upsert the OpenBao AppRole for the host-native agent
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/auth/approle/role/{{ common_openbao_systemd_credentials_approle_name }}"
    method: POST
    headers:
      X-Vault-Token: "{{ common_openbao_systemd_credentials_init_payload.root_token }}"
    body_format: json
    body:
      token_policies: "{{ common_openbao_systemd_credentials_policy_name }}"
      token_ttl: 15m
      token_max_ttl: 1h
      token_num_uses: 0
      secret_id_ttl: 0
      secret_id_num_uses: 0
    status_code: 204
  no_log: true

- name: Read the OpenBao AppRole role ID
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/auth/approle/role/{{ common_openbao_systemd_credentials_approle_name }}/role-id"
    method: GET
    headers:
      X-Vault-Token: "{{ common_openbao_systemd_credentials_init_payload.root_token }}"
    return_content: true
    status_code: 200
  register: common_openbao_systemd_credentials_role_id
  retries: 12
  delay: 2
  until: common_openbao_systemd_credentials_role_id.status == 200
  changed_when: false
  no_log: true

- name: Persist the OpenBao AppRole role ID
  ansible.builtin.copy:
    dest: "{{ common_openbao_systemd_credentials_role_id_file }}"
    content: "{{ common_openbao_systemd_credentials_role_id.json.data.role_id }}\n"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Check whether the OpenBao AppRole secret ID already exists on disk
  ansible.builtin.stat:
    path: "{{ common_openbao_systemd_credentials_secret_id_file }}"
  register: common_openbao_systemd_credentials_secret_id_stat
  no_log: true

- name: Generate a durable OpenBao AppRole secret ID
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/auth/approle/role/{{ common_openbao_systemd_credentials_approle_name }}/secret-id"
    method: POST
    headers:
      X-Vault-Token: "{{ common_openbao_systemd_credentials_init_payload.root_token }}"
    body_format: json
    body: {}
    return_content: true
    status_code: 200
  register: common_openbao_systemd_credentials_secret_id
  when: not common_openbao_systemd_credentials_secret_id_stat.stat.exists
  no_log: true

- name: Persist the durable OpenBao AppRole secret ID
  ansible.builtin.copy:
    dest: "{{ common_openbao_systemd_credentials_secret_id_file }}"
    content: "{{ common_openbao_systemd_credentials_secret_id.json.data.secret_id }}\n"
    owner: root
    group: root
    mode: "0600"
  when: not common_openbao_systemd_credentials_secret_id_stat.stat.exists
  no_log: true

- name: Check whether the OpenBao runtime image is already present
  ansible.builtin.command:
    argv:
      - docker
      - image
      - inspect
      - "{{ common_openbao_systemd_credentials_image }}"
  register: common_openbao_systemd_credentials_image_present
  failed_when: false
  changed_when: false

- name: Pull the pinned OpenBao runtime image when missing
  ansible.builtin.command:
    argv:
      - docker
      - pull
      - "{{ common_openbao_systemd_credentials_image }}"
  when: common_openbao_systemd_credentials_image_present.rc != 0
  register: common_openbao_systemd_credentials_image_pull
  changed_when: true

- name: Render the OpenBao agent configuration for systemd credentials
  ansible.builtin.template:
    src: openbao-agent-systemd-credentials.hcl.j2
    dest: "{{ common_openbao_systemd_credentials_agent_config_file }}"
    owner: root
    group: root
    mode: "0640"
  register: common_openbao_systemd_credentials_agent_config

- name: Render the OpenBao agent credential template
  ansible.builtin.copy:
    src: "{{ common_openbao_systemd_credentials_agent_template_local_file }}"
    dest: "{{ common_openbao_systemd_credentials_agent_template_file }}"
    owner: root
    group: root
    mode: "0640"
  when: common_openbao_systemd_credentials_agent_template_local_file | default('') | length > 0
  register: common_openbao_systemd_credentials_agent_template_copy
  no_log: true

- name: Render the OpenBao agent credential template
  ansible.builtin.copy:
    dest: "{{ common_openbao_systemd_credentials_agent_template_file }}"
    content: "{{ common_openbao_systemd_credentials_agent_template_content }}"
    owner: root
    group: root
    mode: "0640"
  when:
    - common_openbao_systemd_credentials_agent_template_local_file | default('') | length == 0
    - common_openbao_systemd_credentials_agent_template_content | default('') | length > 0
  register: common_openbao_systemd_credentials_agent_template_content_render
  no_log: true

- name: Render the OpenBao agent credential template
  ansible.builtin.template:
    src: "{{ common_openbao_systemd_credentials_agent_template_src }}"
    dest: "{{ common_openbao_systemd_credentials_agent_template_file }}"
    owner: root
    group: root
    mode: "0640"
  when:
    - common_openbao_systemd_credentials_agent_template_local_file | default('') | length == 0
    - common_openbao_systemd_credentials_agent_template_content | default('') | length == 0
  register: common_openbao_systemd_credentials_agent_template_render
  no_log: true

- name: Render the OpenBao agent systemd unit
  ansible.builtin.template:
    src: openbao-agent-systemd-credentials.service.j2
    dest: "/etc/systemd/system/{{ common_openbao_systemd_credentials_agent_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  register: common_openbao_systemd_credentials_unit

- name: Enable and start the OpenBao agent systemd unit
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: systemd_unit
  vars:
    common_systemd_unit_name: "{{ common_openbao_systemd_credentials_agent_service_name }}"
    common_systemd_unit_enabled: true
    common_systemd_unit_state: >-
      {{
        'restarted'
        if (
          common_openbao_systemd_credentials_image_present.rc != 0
          or common_openbao_systemd_credentials_agent_config.changed
          or common_openbao_systemd_credentials_unit.changed
          or (common_openbao_systemd_credentials_agent_template_copy is defined and common_openbao_systemd_credentials_agent_template_copy.changed)
          or (common_openbao_systemd_credentials_agent_template_content_render is defined and common_openbao_systemd_credentials_agent_template_content_render.changed)
          or (common_openbao_systemd_credentials_agent_template_render is defined and common_openbao_systemd_credentials_agent_template_render.changed)
        )
        else 'started'
      }}
    common_systemd_unit_daemon_reload: "{{ common_openbao_systemd_credentials_unit.changed }}"
    common_systemd_unit_verify_active: true
    common_systemd_unit_expected_active_state: active
