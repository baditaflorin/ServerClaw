---
# Purpose: Derive all conventional runtime variables for a registered platform service.
# Use case: Include at the top of every *_runtime role's tasks/main.yml to avoid repeating
#           15-25 identical variable definitions across 70+ roles.
# Inputs:
#   common_derive_service_name (str, required) — must match a key in platform_service_registry
#   platform_service_registry  (dict, required) — loaded from inventory/group_vars/platform_services.yml
# Outputs: Sets conventional variables based on service_type:
#   - docker_compose: {service}_site_dir, {service}_data_dir, {service}_secret_dir,
#                     {service}_compose_file, {service}_env_file, {service}_legacy_env_file,
#                     {service}_container_name, {service}_image, {service}_internal_port,
#                     {service}_internal_base_url, {service}_local_artifact_dir, {service}_openbao_*
#   - system_package: {service}_config_dir, {service}_data_dir, {service}_secret_dir,
#                     {service}_env_file, {service}_openbao_*
#   - infrastructure: minimal defaults (service-specific handling)
#   - multi_instance: service-specific variables (e.g., neko_instances)
#   Also sets any extra_defaults declared in the registry entry.
# Idempotency: Fully idempotent — only calls set_fact.
# Dependencies: ADR 0373 (Service Registry and Derived Defaults).

- name: "Validate {{ common_derive_service_name }} exists in platform_service_registry"
  ansible.builtin.assert:
    that:
      - platform_service_registry is defined
      - common_derive_service_name in platform_service_registry
    fail_msg: >-
      Service '{{ common_derive_service_name }}' not found in platform_service_registry.
      Add it to inventory/group_vars/platform_services.yml.
    quiet: true

# Get service registry entry for convenience.
# Uses platform_service_registry directly (group_var available to all platform hosts)
# rather than hostvars[platform_topology_host] which is unavailable in scope runner shards.
- name: "Get service registry entry for {{ common_derive_service_name }}"
  ansible.builtin.set_fact:
    __derive_service_entry: "{{ platform_service_registry[common_derive_service_name] }}"
    __derive_service_type: "{{ platform_service_registry[common_derive_service_name].service_type | default('docker_compose') }}"

# ============================================================================
# DOCKER_COMPOSE SERVICE TYPE (60 services)
# ============================================================================
# Derives: site_dir, data_dir, secret_dir, compose_file, env_file,
#          container_name, image, internal_port, internal_base_url,
#          local_artifact_dir, openbao_*

- name: "Derive docker_compose defaults for {{ common_derive_service_name }} (with image catalog)"
  ansible.builtin.set_fact:
    "{{ common_derive_service_name }}_site_dir": >-
      {{ __derive_service_entry.site_dir | default('/opt/' + common_derive_service_name) }}
    "{{ common_derive_service_name }}_data_dir": >-
      {{ (__derive_service_entry.site_dir | default('/opt/' + common_derive_service_name)) + '/data' }}
    "{{ common_derive_service_name }}_secret_dir": >-
      {{ __derive_service_entry.secret_dir | default('/etc/lv3/' + common_derive_service_name) }}
    "{{ common_derive_service_name }}_compose_file": >-
      {{ (__derive_service_entry.site_dir | default('/opt/' + common_derive_service_name)) + '/docker-compose.yml' }}
    "{{ common_derive_service_name }}_env_file": >-
      {{ compose_runtime_secret_root + '/' + common_derive_service_name + '/runtime.env' }}
    "{{ common_derive_service_name }}_legacy_env_file": >-
      {{ (__derive_service_entry.site_dir | default('/opt/' + common_derive_service_name)) + '/' + common_derive_service_name + '.env' }}
    "{{ common_derive_service_name }}_container_name": >-
      {{ __derive_service_entry.container_name | default(common_derive_service_name) }}
    "{{ common_derive_service_name }}_image": >-
      {{ container_image_catalog.images[__derive_service_entry.image_catalog_key].ref }}
    "{{ common_derive_service_name }}_internal_port": >-
      {{ __derive_service_entry.internal_port }}
    "{{ common_derive_service_name }}_internal_base_url": >-
      {{ 'http://127.0.0.1:' + (__derive_service_entry.internal_port | string) }}
    "{{ common_derive_service_name }}_local_artifact_dir": >-
      {{ repo_shared_local_root + '/' + (__derive_service_entry.local_artifact_dir | default(common_derive_service_name)) }}
  when:
    - __derive_service_type == 'docker_compose'
    - (__derive_service_entry.image_catalog_key | default('')) | length > 0

- name: "Derive docker_compose defaults for {{ common_derive_service_name }} (no image catalog)"
  ansible.builtin.set_fact:
    "{{ common_derive_service_name }}_site_dir": >-
      {{ __derive_service_entry.site_dir | default('/opt/' + common_derive_service_name) }}
    "{{ common_derive_service_name }}_data_dir": >-
      {{ (__derive_service_entry.site_dir | default('/opt/' + common_derive_service_name)) + '/data' }}
    "{{ common_derive_service_name }}_secret_dir": >-
      {{ __derive_service_entry.secret_dir | default('/etc/lv3/' + common_derive_service_name) }}
    "{{ common_derive_service_name }}_compose_file": >-
      {{ (__derive_service_entry.site_dir | default('/opt/' + common_derive_service_name)) + '/docker-compose.yml' }}
    "{{ common_derive_service_name }}_env_file": >-
      {{ compose_runtime_secret_root + '/' + common_derive_service_name + '/runtime.env' }}
    "{{ common_derive_service_name }}_legacy_env_file": >-
      {{ (__derive_service_entry.site_dir | default('/opt/' + common_derive_service_name)) + '/' + common_derive_service_name + '.env' }}
    "{{ common_derive_service_name }}_container_name": >-
      {{ __derive_service_entry.container_name | default(common_derive_service_name) }}
    "{{ common_derive_service_name }}_internal_port": >-
      {{ __derive_service_entry.internal_port }}
    "{{ common_derive_service_name }}_internal_base_url": >-
      {{ 'http://127.0.0.1:' + (__derive_service_entry.internal_port | string) }}
    "{{ common_derive_service_name }}_local_artifact_dir": >-
      {{ repo_shared_local_root + '/' + (__derive_service_entry.local_artifact_dir | default(common_derive_service_name)) }}
  when:
    - __derive_service_type == 'docker_compose'
    - (__derive_service_entry.image_catalog_key | default('')) | length == 0

# ============================================================================
# SYSTEM_PACKAGE SERVICE TYPE (2 services: alertmanager, nginx_runtime)
# ============================================================================
# Derives: config_dir, data_dir, secret_dir, env_file (for environment overrides)

- name: "Derive system_package defaults for {{ common_derive_service_name }}"
  ansible.builtin.set_fact:
    "{{ common_derive_service_name }}_config_dir": >-
      {{ __derive_service_entry.state_dirs.config | default('/etc/' + common_derive_service_name) }}
    "{{ common_derive_service_name }}_data_dir": >-
      {{ __derive_service_entry.state_dirs.data | default('/var/lib/' + common_derive_service_name) }}
    "{{ common_derive_service_name }}_secret_dir": >-
      {{ __derive_service_entry.state_dirs.secrets | default('/etc/lv3/' + common_derive_service_name) }}
    "{{ common_derive_service_name }}_env_file": >-
      {{ __derive_service_entry.state_dirs.secrets | default('/etc/lv3/' + common_derive_service_name) }}/runtime.env
    "{{ common_derive_service_name }}_internal_port": >-
      {{ __derive_service_entry.internal_port }}
    "{{ common_derive_service_name }}_internal_base_url": >-
      {% if __derive_service_entry.internal_port %}
      http://127.0.0.1:{{ __derive_service_entry.internal_port }}
      {% else %}
      null
      {% endif %}
  when: __derive_service_type == 'system_package'

# ============================================================================
# INFRASTRUCTURE SERVICE TYPE (5 services)
# ============================================================================
# Minimal derivation; most configuration is service-specific

- name: "Derive infrastructure defaults for {{ common_derive_service_name }}"
  ansible.builtin.set_fact:
    "{{ common_derive_service_name }}_internal_port": >-
      {{ __derive_service_entry.internal_port }}
    "{{ common_derive_service_name }}_container_name": >-
      {{ __derive_service_entry.container_name | default(common_derive_service_name) }}
  when: __derive_service_type == 'infrastructure'

# ============================================================================
# MULTI_INSTANCE SERVICE TYPE (1 service: neko)
# ============================================================================
# Minimal derivation; service-specific patterns take precedence

- name: "Derive multi_instance defaults for {{ common_derive_service_name }}"
  ansible.builtin.set_fact:
    "{{ common_derive_service_name }}_internal_port": >-
      {{ __derive_service_entry.internal_port }}
    "{{ common_derive_service_name }}_container_name": >-
      {{ __derive_service_entry.container_name | default(common_derive_service_name) }}
  when: __derive_service_type == 'multi_instance'

# ============================================================================
# OPENBAO AGENT DEFAULTS (all service types that need it)
# ============================================================================

- name: "Derive OpenBao defaults for {{ common_derive_service_name }}"
  ansible.builtin.set_fact:
    "{{ common_derive_service_name }}_openbao_agent_dir": >-
      {%- if __derive_service_type == 'docker_compose' -%}
      {{ (__derive_service_entry.site_dir | default('/opt/' + common_derive_service_name)) + '/openbao' }}
      {%- elif __derive_service_type == 'system_package' -%}
      {{ (__derive_service_entry.state_dirs.secrets | default('/etc/lv3/' + common_derive_service_name)) + '/openbao' }}
      {%- else -%}
      /etc/lv3/{{ common_derive_service_name }}/openbao
      {%- endif -%}
    "{{ common_derive_service_name }}_openbao_agent_image": "{{ openbao_agent_image }}"
    "{{ common_derive_service_name }}_openbao_agent_container_name": >-
      {{ common_derive_service_name }}-openbao-agent
    "{{ common_derive_service_name }}_openbao_secret_path": >-
      services/{{ common_derive_service_name }}/runtime-env
    "{{ common_derive_service_name }}_openbao_policy_name": >-
      lv3-service-{{ common_derive_service_name }}-runtime
    "{{ common_derive_service_name }}_openbao_approle_name": >-
      {{ common_derive_service_name }}-runtime
  when: __derive_service_entry.needs_openbao | default(true)

# ============================================================================
# EXTRA DEFAULTS (all service types)
# ============================================================================

- name: "Apply extra defaults for {{ common_derive_service_name }}"
  ansible.builtin.set_fact:
    "{{ item.key }}": "{{ item.value }}"
  loop: "{{ __derive_service_entry.extra_defaults | default({}) | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
