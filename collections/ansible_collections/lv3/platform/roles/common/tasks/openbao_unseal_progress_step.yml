---
- name: Submit an available local OpenBao unseal key
  ansible.builtin.uri:
    url: "{{ common_openbao_unseal_api_url }}/v1/sys/unseal"
    method: POST
    body_format: json
    body:
      key: "{{ common_openbao_unseal_key }}"
    status_code: 200
  when: common_openbao_unseal_progress.json.sealed | bool
  no_log: true

- name: Refresh the local OpenBao seal status after submitting an unseal key
  ansible.builtin.uri:
    url: "{{ common_openbao_unseal_api_url }}/v1/sys/seal-status"
    method: GET
    return_content: true
    status_code: 200
  register: common_openbao_unseal_progress_refresh
  retries: 12
  delay: 2
  until: common_openbao_unseal_progress_refresh.status == 200
  changed_when: false
  when: common_openbao_unseal_progress.json.sealed | bool

- name: Record the refreshed local OpenBao seal status after submitting an unseal key
  ansible.builtin.set_fact:
    common_openbao_unseal_progress: "{{ common_openbao_unseal_progress_refresh }}"
  when: common_openbao_unseal_progress.json.sealed | bool
