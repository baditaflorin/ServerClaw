# Purpose: Idempotently generate secrets on the remote host, read them back, and mirror them to the control machine.
# Use case: Called by runtime roles to handle phases 4-6 of the service lifecycle (generate, read, mirror).
# Inputs:
#   common_manage_service_secrets_generate (list): Secrets to generate on the remote host. Each has: path, command, label.
#   common_manage_service_secrets_read (list): Remote paths to slurp. Order matters — results are indexed positionally.
#   common_manage_service_secrets_mirror (list): Dicts with dest (local path) and content_index (index into read results).
#   common_manage_service_secrets_local_artifact_dir (str): Local directory to create before mirroring.
#   common_manage_service_secrets_fact_name (str): Name of the fact to set with all decoded secrets.
# Outputs: Sets a fact named by common_manage_service_secrets_fact_name containing a list of decoded secret strings.
# Idempotency: Fully idempotent; secrets are only generated when the file is missing or empty.
# Dependencies: ADR 0370.
---
- name: Validate manage_service_secrets inputs
  ansible.builtin.assert:
    that:
      - common_manage_service_secrets_generate | length > 0 or common_manage_service_secrets_read | length > 0
    fail_msg: "common.manage_service_secrets requires at least one secret to generate or read."
    quiet: true

- name: Generate secrets idempotently on the remote host
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ item.path }}" ]; then
      umask 077
      {{ item.command }} > "{{ item.path }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  loop: "{{ common_manage_service_secrets_generate }}"
  loop_control:
    label: "{{ item.label }}"
  register: common_manage_service_secrets_gen_results
  changed_when: "'changed' in common_manage_service_secrets_gen_results.stdout"
  no_log: true
  when: common_manage_service_secrets_generate | length > 0

- name: Read secrets from the remote host
  ansible.builtin.slurp:
    src: "{{ item }}"
  register: common_manage_service_secrets_read_results
  loop: "{{ common_manage_service_secrets_read }}"
  no_log: true
  when: common_manage_service_secrets_read | length > 0

- name: Record decoded secrets as a fact
  ansible.builtin.set_fact:
    "{{ common_manage_service_secrets_fact_name }}": >-
      {{
        common_manage_service_secrets_read_results.results
        | map(attribute='content')
        | map('b64decode')
        | map('trim')
        | list
      }}
  no_log: true
  when: common_manage_service_secrets_read | length > 0

- name: Ensure the local artifact directory exists
  ansible.builtin.file:
    path: "{{ common_manage_service_secrets_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false
  when: common_manage_service_secrets_mirror | length > 0

- name: Mirror secrets to the control machine
  ansible.builtin.copy:
    dest: "{{ item.dest }}"
    content: "{{ vars[common_manage_service_secrets_fact_name][item.content_index] }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  loop: "{{ common_manage_service_secrets_mirror }}"
  loop_control:
    label: "{{ item.dest | basename }}"
  no_log: true
  when: common_manage_service_secrets_mirror | length > 0
