# Purpose: Define shared default variables for reusable common-role task entrypoints.
# Use case: Load when another role imports the common helper role for assertions, directory trees, waits, or Docker/OpenBao helpers.
# Inputs: None; this file provides default values consumed by role callers and task includes.
# Outputs: Stable default variables for the common role.
# Idempotency: Fully idempotent; defaults declare desired values only.
# Dependencies: ADR 0165 metadata standard and the common role task entrypoints.
---
common_assert_vars_required: []
common_assert_vars_expressions: []
common_assert_vars_fail_msg: Common role variable assertion failed.

common_directory_tree_paths: []
common_directory_tree_owner: root
common_directory_tree_group: root
common_directory_tree_mode: "0755"
common_directory_tree_state: directory
common_directory_tree_recurse: false

common_systemd_unit_name: ""
common_systemd_unit_enabled: true
common_systemd_unit_state: started
common_systemd_unit_daemon_reload: false
common_systemd_unit_verify_active: false
common_systemd_unit_expected_active_state: active

common_docker_bridge_chains_service_name: docker
common_docker_bridge_chains_require_nat_chain: true
common_docker_bridge_chains_retries: 10
common_docker_bridge_chains_delay: 2

common_wait_port_host: 127.0.0.1
common_wait_port_port: 0
common_wait_port_delay: 0
common_wait_port_timeout: 120
common_wait_port_state: started

common_openbao_systemd_credentials_service_name: ""
common_openbao_systemd_credentials_agent_dir: ""
common_openbao_systemd_credentials_credential_dir: ""
common_openbao_systemd_credentials_credential_file: ""
common_openbao_systemd_credentials_token_file: ""
common_openbao_systemd_credentials_secret_path: ""
common_openbao_systemd_credentials_secret_payload: {}
common_openbao_systemd_credentials_policy_name: ""
common_openbao_systemd_credentials_policy_rules: ""
common_openbao_systemd_credentials_approle_name: ""
common_openbao_systemd_credentials_agent_config_file: ""
common_openbao_systemd_credentials_agent_template_file: ""
common_openbao_systemd_credentials_agent_template_local_file: ""
common_openbao_systemd_credentials_agent_template_src: ""
common_openbao_systemd_credentials_agent_template_content: ""
common_openbao_systemd_credentials_role_id_file: ""
common_openbao_systemd_credentials_secret_id_file: ""
common_openbao_systemd_credentials_image: ""
common_openbao_systemd_credentials_container_entrypoint: /bin/vault
common_openbao_systemd_credentials_agent_service_name: ""
common_openbao_systemd_credentials_container_name: ""
common_openbao_systemd_credentials_openbao_address: ""
common_openbao_systemd_credentials_manage_local_openbao_runtime: true
