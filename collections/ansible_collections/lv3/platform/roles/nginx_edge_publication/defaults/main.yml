---
# Purpose: Declare the shared default inputs for publishing private and public services through the NGINX edge VM.
# Use case: Used whenever the nginx_edge_publication role renders edge config, certificate domains, and hardened response headers.
#
# Inputs (required):
#   - hostvars / inventory facts (generated, required): Platform topology, guest inventory, and port assignments.
#
# Inputs (optional):
#   - public_edge_sync_generated_static_dirs (bool, optional, default=true): Whether generated static directories are synced on a run.
#   - public_edge_dns_hetzner_propagation_seconds (int, optional, default=30): DNS wait used for certbot DNS-01 issuance.
#
# Outputs:
#   - Shared defaults consumed by the edge publication role for packages, directories, certificates, proxy sites, and security headers.
#
# Idempotency: Fully idempotent
#              This file only declares role defaults.
#
# Dependencies:
#   - ADR 0133: Keeps operator-facing publications authenticated by default.
#   - ADR 0136: Defines the hardened edge security-header baseline.
#   - Requires: inventory topology and host facts to be current.
#   - Role: nginx_edge_publication — publishes repo-managed sites and certificate domains.
#
# Related ADRs: 0133, 0136, 0165
# Related Runbooks: docs/runbooks/configure-edge-publication.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-27
public_edge_control_plane_host: "{{ groups['proxmox_hosts'][0] }}"
proxmox_guests: "{{ hostvars[public_edge_control_plane_host].proxmox_guests }}"
management_tailscale_ipv4: "{{ hostvars[public_edge_control_plane_host].management_tailscale_ipv4 }}"
platform_port_assignments: "{{ hostvars[public_edge_control_plane_host].platform_port_assignments }}"
postgres_ha: "{{ hostvars[public_edge_control_plane_host].postgres_ha }}"
public_edge_service_topology: >-
  {{
    hostvars[public_edge_control_plane_host].public_edge_service_topology
    | default(
        hostvars[public_edge_control_plane_host].platform_service_topology
        | default(platform_service_topology)
      )
  }}
public_edge_session_authority: "{{ platform_session_authority }}"
public_edge_certbot_email: "{{ platform_operator_email }}"
public_edge_cert_name: lv3-edge
public_edge_site_tls_materials: {}
public_edge_acme_challenge_method: webroot
public_edge_certbot_retries: 6
public_edge_certbot_delay_seconds: 15
public_edge_update_apt_cache: false
public_edge_sync_generated_static_dirs: true
public_edge_static_root: /var/www/lv3-edge
public_edge_generated_static_root: /var/www/lv3-generated
public_edge_acme_root: /var/www/lv3-edge-acme
public_edge_dns_hetzner_plugin_version: 3.0.0
public_edge_dns_hetzner_credentials_file: /etc/letsencrypt/hetzner.ini
public_edge_dns_hetzner_propagation_seconds: 120
public_edge_dns_hetzner_virtualenv: /opt/certbot-dns-hetzner
public_edge_certbot_plugin_path: >-
  {{ public_edge_dns_hetzner_virtualenv }}/lib/python{{ ansible_python.version.major }}.{{ ansible_python.version.minor }}/site-packages
public_edge_apex_hostname: "{{ platform_domain }}"
public_edge_probe_hostname: "{{ public_edge_service_topology.nginx_edge.public_hostname }}"
public_edge_additional_certificate_domains:
  - "{{ public_edge_apex_hostname }}"
public_edge_robots_meta_content: "noindex, nofollow"
public_edge_robots_txt_content: |
  User-agent: *
  Disallow: /

  # This domain is a private homelab infrastructure platform.
  # There is no public content intended for indexing.
public_edge_generated_build_root: "{{ inventory_dir | dirname }}/build"
public_edge_static_sites: "{{ public_edge_service_topology | service_topology_edge_static_sites }}"
public_edge_plausible_service_topology: "{{ public_edge_service_topology.get('plausible', {}) }}"
public_edge_plausible_base_url: "{{ public_edge_plausible_service_topology.get('urls', {}).get('public', '') }}"
public_edge_api_gateway_upstream: >-
  {{
    public_edge_service_topology.get('api_gateway', {}).get(
      'urls',
      {}
    ).get(
      'internal',
      public_edge_service_topology.get('api_gateway', {}).get(
        'edge',
        {}
      ).get(
        'upstream',
        'http://127.0.0.1:8083'
      )
    )
  }}
public_edge_plausible_site_registrations: "{{ hostvars[public_edge_control_plane_host].plausible_site_registrations | default([]) }}"
public_edge_plausible_tracked_sites: >-
  {{
    public_edge_plausible_site_registrations
    | items2dict(key_name='hostname', value_name='site_domain')
    if (public_edge_plausible_site_registrations | length > 0)
    else {}
  }}
public_edge_security_headers_default:
  strict_transport_security: "max-age=63072000; includeSubDomains; preload"
  cross_origin_resource_policy: same-origin
  x_content_type_options: nosniff
  x_frame_options: DENY
  referrer_policy: strict-origin-when-cross-origin
  permissions_policy: "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
  x_robots_tag: "noindex, nofollow"
  content_security_policy: >-
    default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';
    object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline';
    img-src 'self' data:; font-src 'self' data:; connect-src 'self'; manifest-src 'self'
public_edge_security_headers_overrides:
  api.{{ platform_domain }}:
    content_security_policy: >-
      default-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';
      object-src 'none'
  bi.{{ platform_domain }}:
    content_security_policy: >-
      default-src 'self' data: blob:; base-uri 'self'; form-action 'self'; frame-ancestors 'none';
      object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self'
      'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:;
      connect-src 'self' https://bi.{{ platform_domain }} https://sso.{{ platform_domain }}; worker-src 'self' blob:;
      child-src 'self' blob:; manifest-src 'self'
  coolify.{{ platform_domain }}:
    content_security_policy: >-
      default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';
      object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self'
      'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:;
      connect-src 'self' https://coolify.{{ platform_domain }} wss://coolify.{{ platform_domain }};
      worker-src 'self' blob:; child-src 'self' blob:; manifest-src 'self'
  annotate.{{ platform_domain }}:
    content_security_policy: >-
      default-src 'self' data: blob:; base-uri 'self'; form-action 'self'; frame-ancestors 'none';
      object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:;
      style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:;
      font-src 'self' data:; connect-src 'self' https://annotate.{{ platform_domain }}
      https://sso.{{ platform_domain }} wss://annotate.{{ platform_domain }}; worker-src 'self' blob:;
      child-src 'self' blob:; manifest-src 'self'
  chat.{{ platform_domain }}:
    content_security_policy: >-
      default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';
      object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self'
      'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:;
      connect-src 'self' https://chat.{{ platform_domain }} ws://chat.{{ platform_domain }} wss://chat.{{ platform_domain }};
      worker-src 'self' blob:; child-src 'self' blob:; manifest-src 'self'
  docs.{{ platform_domain }}:
    content_security_policy: >-
      default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';
      object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'
      https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' data:
      https://fonts.gstatic.com; connect-src 'self'; manifest-src 'self'
  draw.{{ platform_domain }}:
    content_security_policy: >-
      default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';
      object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self'
      'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:;
      connect-src 'self' https://draw.{{ platform_domain }} wss://draw.{{ platform_domain }}; worker-src 'self' blob:;
      child-src 'self' blob:; manifest-src 'self'
  grist.{{ platform_domain }}:
    content_security_policy: >-
      default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';
      object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';
      img-src 'self' data: blob:; font-src 'self' data:;
      connect-src 'self' https://grist.{{ platform_domain }} https://sso.{{ platform_domain }}; manifest-src 'self'
  grafana.{{ platform_domain }}:
    content_security_policy: >-
      default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';
      object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self'
      'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:;
      connect-src 'self' https://grafana.{{ platform_domain }} wss://grafana.{{ platform_domain }};
      worker-src 'self' blob:; child-src 'self' blob:; manifest-src 'self'
  notebooks.{{ platform_domain }}:
    content_security_policy: >-
      default-src 'self' data: blob:; base-uri 'self'; form-action 'self'; frame-ancestors 'none';
      object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:;
      style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:;
      font-src 'self' data:; connect-src 'self' https://notebooks.{{ platform_domain }}
      wss://notebooks.{{ platform_domain }} https://sso.{{ platform_domain }}; worker-src 'self' blob:;
      child-src 'self' blob:; manifest-src 'self'
  n8n.{{ platform_domain }}:
    content_security_policy: >-
      default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';
      object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self'
      'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:;
      connect-src 'self' https://n8n.{{ platform_domain }} wss://n8n.{{ platform_domain }};
      worker-src 'self' blob:; child-src 'self' blob:; manifest-src 'self'
  agents.{{ platform_domain }}:
    content_security_policy: >-
      default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';
      object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self'
      'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:;
      connect-src 'self' https://agents.{{ platform_domain }} wss://agents.{{ platform_domain }};
      worker-src 'self' blob:; child-src 'self' blob:; manifest-src 'self'
  tasks.{{ platform_domain }}:
    content_security_policy: >-
      default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';
      object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self'
      'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:;
      connect-src 'self' https://tasks.{{ platform_domain }} wss://tasks.{{ platform_domain }};
      worker-src 'self' blob:; child-src 'self' blob:; manifest-src 'self'
  logs.{{ platform_domain }}:
    content_security_policy: >-
      default-src 'self' 'wasm-unsafe-eval' blob: https://cdn.jsdelivr.net https://*.duckdb.org;
      base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none';
      script-src 'self' 'wasm-unsafe-eval' blob: https://cdn.jsdelivr.net https://*.duckdb.org;
      style-src 'self' 'unsafe-inline' blob:; img-src 'self' data:;
      font-src 'self' data:; connect-src 'self' https://logs.{{ platform_domain }} wss://logs.{{ platform_domain }};
      manifest-src 'self'
  ops.{{ platform_domain }}:
    content_security_policy: >-
      default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';
      object-src 'none'; script-src 'self' https://unpkg.com;
      style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: https://unpkg.com;
      font-src 'self' data: https://unpkg.com;
      connect-src 'self'; manifest-src 'self'
  sso.{{ platform_domain }}:
    # Keycloak uses same-origin iframes for session management (authChecker.js
    # and the admin-console 3rd-party-cookie probe).  frame-ancestors must be
    # 'self', and X-Frame-Options must be SAMEORIGIN, or the iframe times out
    # and the Sign-In button on the login page becomes unresponsive.
    x_frame_options: SAMEORIGIN
    content_security_policy: >-
      default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self';
      object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';
      img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://sso.{{ platform_domain }};
      frame-src 'self'; manifest-src 'self'
  wiki.{{ platform_domain }}:
    content_security_policy: >-
      default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';
      object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';
      img-src 'self' data: https: blob:; font-src 'self' data:;
      connect-src 'self' https://wiki.{{ platform_domain }}; manifest-src 'self'
  status.{{ platform_domain }}:
    content_security_policy: >-
      default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';
      object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';
      img-src 'self' data:; font-src 'self' data:; connect-src 'self'
      https://status.{{ platform_domain }} ws://status.{{ platform_domain }} wss://status.{{ platform_domain }}; manifest-src 'self'
  git.{{ platform_domain }}:
    content_security_policy: >-
      default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';
      object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self'
      'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:;
      connect-src 'self' https://git.{{ platform_domain }} wss://git.{{ platform_domain }}; manifest-src 'self'
  uptime.{{ platform_domain }}:
    content_security_policy: >-
      default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';
      object-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';
      img-src 'self' data:; font-src 'self' data:; connect-src 'self'
      https://uptime.{{ platform_domain }} ws://uptime.{{ platform_domain }} wss://uptime.{{ platform_domain }}; manifest-src 'self'
  scheduler.{{ platform_domain }}:
    content_security_policy: >-
      default-src 'self'; base-uri 'self'; form-action 'self' https://sso.{{ platform_domain }};
      frame-ancestors 'none'; object-src 'none';
      script-src 'self' 'unsafe-inline' 'unsafe-eval';
      style-src 'self' 'unsafe-inline';
      img-src 'self' data:; font-src 'self' data:;
      connect-src 'self' https://scheduler.{{ platform_domain }} wss://scheduler.{{ platform_domain }};
      worker-src 'self' blob:; child-src 'self' blob:; manifest-src 'self'
# ADR 0413: Prefix-path ACL overrides — keyed by raw hostname (with {{ platform_domain }} placeholders).
# Use acl_prefix_paths when you need allow/deny CIDR lists (e.g. Keycloak admin restricted to VPN).
# Use blocked_prefix_paths when you want a blanket 404 for a path prefix.
public_edge_acl_prefix_paths_overrides:
  sso.{{ platform_domain }}:
    # Keycloak admin console — internal network and Tailscale VPN only (ADR 0413).
    # External access blocked to prevent brute-force and CVE exposure on the admin API.
    - path: /admin/
      allow:
        - 10.10.10.0/24
        - 100.64.0.0/10
        - 127.0.0.1

public_edge_blocked_prefix_paths_overrides: {}

# ADR 0413: Exact-path block overrides — keyed by raw hostname.
# Blocks API gateway developer docs from external discovery.
public_edge_blocked_exact_paths_overrides:
  api.{{ platform_domain }}:
    - path: /docs
      status: 404
    - path: /openapi.json
      status: 404

public_edge_extra_sites:
  - hostname: minio-console.{{ platform_domain }}
    kind: proxy
    upstream: "http://{{ hostvars[playbook_execution_host_patterns.docker_runtime[playbook_execution_env]].ansible_host }}:{{ platform_port_assignments.minio_console_port }}"
    client_max_body_size: 0
    chunked_transfer_encoding: true
    proxy_request_buffering: false
    proxy_read_timeout_seconds: 900
    proxy_send_timeout_seconds: 900
    security_headers_enabled: false
    preserve_upstream_security_headers: true
  - hostname: changelog.{{ platform_domain }}
    kind: static_dir
    source_dir: changelog-portal
  - hostname: docs.{{ platform_domain }}
    kind: static_dir
    source_dir: docs-portal
public_edge_authenticated_sites:
  annotate.{{ platform_domain }}:
    auth_proxy_upstream: http://127.0.0.1:4180
  analytics.{{ platform_domain }}:
    auth_proxy_upstream: http://127.0.0.1:4180
    unauthenticated_paths:
      - /api/error
      - /api/event
      - /api/health
      - /api/system/health/live
      - /api/system/health/ready
    unauthenticated_prefix_paths:
      - /js/
  changelog.{{ platform_domain }}:
    auth_proxy_upstream: http://127.0.0.1:4180
  coolify.{{ platform_domain }}:
    auth_proxy_upstream: http://127.0.0.1:4180
  billing.{{ platform_domain }}:
    auth_proxy_upstream: http://127.0.0.1:4180
    unauthenticated_proxy_routes:
      - path: /api/health
        upstream: "{{ public_edge_api_gateway_upstream }}/v1/billing/health"
      - path: /api/v1/events
        upstream: "{{ public_edge_api_gateway_upstream }}/v1/billing/events"
  docs.{{ platform_domain }}:
    auth_proxy_upstream: http://127.0.0.1:4180
  draw.{{ platform_domain }}:
    auth_proxy_upstream: http://127.0.0.1:4180
  flags.{{ platform_domain }}:
    auth_proxy_upstream: http://127.0.0.1:4180
    unauthenticated_paths:
      - /health
  agents.{{ platform_domain }}:
    auth_proxy_upstream: http://127.0.0.1:4180
    unauthenticated_paths:
      - /healthz
  langfuse.{{ platform_domain }}:
    auth_proxy_upstream: http://127.0.0.1:4180
    unauthenticated_prefix_paths:
      - /api/public/
  minio-console.{{ platform_domain }}:
    auth_proxy_upstream: http://127.0.0.1:4180
  tasks.{{ platform_domain }}:
    auth_proxy_upstream: http://127.0.0.1:4180
  n8n.{{ platform_domain }}:
    auth_proxy_upstream: http://127.0.0.1:4180
    unauthenticated_paths:
      - /healthz
    unauthenticated_prefix_paths:
      - /webhook/
      - /webhook-test/
      - /webhook-waiting/
  logs.{{ platform_domain }}:
    auth_proxy_upstream: http://127.0.0.1:4180
  home.{{ platform_domain }}:
    auth_proxy_upstream: http://127.0.0.1:4180
  ops.{{ platform_domain }}:
    auth_proxy_upstream: http://127.0.0.1:4180
    unauthenticated_paths:
      - /health
    unauthenticated_prefix_paths:
      - /static/                   # CSS, JS, and static assets bypass OAuth2
  repo-intake.{{ platform_domain }}:
    auth_proxy_upstream: http://127.0.0.1:4180
public_edge_certificate_domains: >-
  {{
    (
      (public_edge_service_topology | service_topology_edge_certificate_domains)
      + (public_edge_extra_sites | map(attribute='hostname') | list)
      + public_edge_additional_certificate_domains
    ) | unique
  }}
public_edge_sites: >-
  {{
    (
      public_edge_extra_sites
      + (public_edge_service_topology | service_topology_edge_sites)
    )
    | unique(attribute='hostname')
  }}
