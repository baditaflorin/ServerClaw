---
# Purpose: Declare the validated input contract for the backup_vm role.
# Use case: Used by Ansible argument validation before Proxmox Backup Server converge tasks run.
#
# Inputs (required):
#   - backup_vm_ipv4 (str, required): Guest IPv4 address.
#   - backup_vm_repo_file (path, required): PBS repository definition path.
#   - backup_vm_datastore_name (str, required): Managed datastore name.
#   - backup_vm_datastore_disk_device (path, required): Datastore disk device.
#   - backup_vm_datastore_mountpoint (path, required): Managed datastore mountpoint.
#   - backup_vm_api_user (str, required): Managed PBS automation user.
#   - backup_vm_api_user_password_local_file (path, required): Controller-local password artifact.
#   - backup_vm_api_token_id (str, required): Managed token identifier.
#   - backup_vm_api_token_local_dir (path, required): Controller-local artifact directory.
#   - backup_vm_api_token_local_file (path, required): Controller-local token JSON path.
#
# Inputs (optional):
#   - backup_vm_seed_snapshot_store_path (path, optional): Root directory for seed snapshot storage.
#   - backup_vm_seed_snapshot_classes (list[str], optional): Seed snapshot class directories.
#
# Outputs:
#   - Argument-spec validation metadata for the backup_vm role.
#
# Idempotency: Fully idempotent
#              This file only declares validation metadata.
#
# Dependencies:
#   - ADR 0029: Defines the backup VM contract.
#   - ADR 0187: Adds managed seed snapshot storage.
#   - Role: backup_vm — validates inputs before PBS convergence.
#
# Related ADRs: 0029, 0165, 0187
# Related Runbooks: docs/runbooks/backup-restore-verification.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-28
argument_specs:
  main:
    short_description: Install and configure the Proxmox Backup Server guest.
    options:
      backup_vm_ipv4:
        type: str
        required: true
        description:
          - IPv4 address assigned to the backup guest.
      backup_vm_repo_file:
        type: path
        required: true
        description:
          - APT source file rendered for the Proxmox Backup repository.
      backup_vm_datastore_name:
        type: str
        required: true
        description:
          - Name of the managed Proxmox Backup datastore.
      backup_vm_api_port:
        type: int
        required: false
        description:
          - TCP port exposed by the Proxmox Backup API.
      backup_vm_datastore_disk_device:
        type: path
        required: true
        description:
          - Disk device prepared for the datastore filesystem.
      backup_vm_datastore_disk_filesystem:
        type: str
        required: false
        description:
          - Filesystem type created on the datastore disk.
      backup_vm_datastore_mountpoint:
        type: path
        required: true
        description:
          - Mountpoint backing the managed datastore.
      backup_vm_datastore_gc_schedule:
        type: str
        required: false
        description:
          - Garbage-collection schedule applied to the datastore.
      backup_vm_api_user:
        type: str
        required: true
        description:
          - Backup API user created for Proxmox automation.
      backup_vm_api_user_password_local_file:
        type: path
        required: true
        description:
          - Controller-local file used to store or load the API user password.
      backup_vm_api_token_id:
        type: str
        required: true
        description:
          - Token identifier generated for the managed API user.
      backup_vm_api_token_local_dir:
        type: path
        required: true
        description:
          - Controller-local directory that stores backup API artifacts.
      backup_vm_api_token_local_file:
        type: path
        required: true
        description:
          - Controller-local JSON file that stores the generated API token.
      backup_vm_seed_snapshot_store_path:
        type: path
        required: false
        description:
          - Root directory on backup used to store anonymized seed-data snapshots.
      backup_vm_seed_snapshot_store_mode:
        type: str
        required: false
        description:
          - File mode applied to the managed seed snapshot store directories.
      backup_vm_seed_snapshot_classes:
        type: list
        elements: str
        required: false
        description:
          - Seed snapshot class directories created and verified on backup.
