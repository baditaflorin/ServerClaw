---
# Purpose: Declare the shared defaults for converging the backup VM, PBS datastore, automation identity, and seed snapshot store.
# Use case: Used whenever the backup_vm role installs Proxmox Backup Server and manages its repo-local bootstrap artifacts.
#
# Inputs (required):
#   - ansible_host (generated, required): Supplies the guest IPv4 for the PBS runtime.
#
# Inputs (optional):
#   - backup_vm_api_port (int, optional, default=8007): TCP port exposed by the PBS API.
#   - backup_vm_seed_snapshot_classes (list[str], optional): Snapshot class directories kept on backup-lv3.
#
# Outputs:
#   - Default variable values consumed by the backup_vm role tasks and verification.
#
# Idempotency: Fully idempotent
#              This file only declares role defaults.
#
# Dependencies:
#   - ADR 0029: Defines the managed backup VM.
#   - ADR 0187: Adds anonymized seed snapshot storage to the backup guest.
#   - Role: backup_vm — converges PBS packages, datastore state, and seed snapshot storage.
#
# Related ADRs: 0029, 0165, 0187
# Related Runbooks: docs/runbooks/backup-restore-verification.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-28
backup_vm_ipv4: "{{ ansible_host }}"
backup_vm_repo_file: /etc/apt/sources.list.d/proxmox-backup.sources
backup_vm_repo_uri: http://download.proxmox.com/debian/pbs
backup_vm_repo_channel: pbs-no-subscription
backup_vm_datastore_name: proxmox
backup_vm_api_port: 8007
backup_vm_datastore_disk_device: /dev/sdb
backup_vm_datastore_disk_filesystem: xfs
backup_vm_datastore_mountpoint: /mnt/datastore/proxmox
backup_vm_datastore_gc_schedule: "03:45"
backup_vm_api_user: proxmox-host@pbs
backup_vm_api_user_comment: Proxmox VE host backup client
backup_vm_api_user_password_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/proxmox-backup/backup-lv3-user-password.txt
backup_vm_api_token_id: pve
backup_vm_api_token_comment: Proxmox VE host backup token
backup_vm_api_token_local_dir: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/proxmox-backup
backup_vm_api_token_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/proxmox-backup/backup-lv3-token.json
backup_vm_seed_snapshot_store_path: /var/lib/lv3/seed-data-snapshots
backup_vm_seed_snapshot_store_mode: "0750"
backup_vm_seed_snapshot_classes:
  - tiny
  - standard
  - recovery
