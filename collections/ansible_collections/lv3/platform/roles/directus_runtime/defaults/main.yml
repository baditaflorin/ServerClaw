# Purpose: Define the default Directus runtime paths, image pin, bootstrap identities, and Keycloak publication settings.
# Use case: Loaded whenever the Directus runtime role converges or verifies the repo-managed data API surface.
# Inputs: Platform topology, image catalog, Keycloak settings, PostgreSQL location, and controller-local secret paths.
# Outputs: Supplies stable runtime defaults consumed by the directus_runtime tasks and templates.
# Idempotency: Fully idempotent because this file only declares desired defaults.
# Dependencies: ADR 0165, ADR 0021, ADR 0063, ADR 0077, ADR 0289, ADR 0373.
#
# NOTE: Conventional variables (site_dir, image, compose_file, env_file, openbao_*, container_name,
# internal_port, internal_base_url, local_artifact_dir, and service-specific health/ping/openapi paths)
# are derived at play time from platform_service_registry by common/tasks/derive_service_defaults.
# Only non-conventional, Directus-specific defaults remain here.
---
directus_service_topology: "{{ hostvars['proxmox_florin'].lv3_service_topology | service_topology_get('directus') }}"
directus_session_authority: "{{ platform_session_authority }}"
directus_public_base_url: "https://{{ directus_service_topology.public_hostname }}"
directus_public_edge_private_ip: "{{ hostvars['proxmox_florin'].proxmox_public_edge_ipv4 }}"
directus_public_hostname_overrides:
  - hostname: "{{ directus_service_topology.public_hostname }}"
    address: "{{ directus_public_edge_private_ip }}"
  - hostname: "{{ hostvars['proxmox_florin'].lv3_service_topology.keycloak.public_hostname }}"
    address: "{{ directus_public_edge_private_ip }}"
directus_compose_project_name: directus
directus_compose_network_name: "{{ directus_compose_project_name }}_default"
directus_container_port: "{{ platform_service_topology | platform_service_port('directus', 'internal') }}"
directus_database_name: directus
directus_database_user: directus
directus_database_host: "{{ hostvars[hostvars['proxmox_florin'].postgres_ha.initial_primary].ansible_host }}"
directus_database_password_local_file: "{{ directus_local_artifact_dir }}/database-password.txt"
directus_key_local_file: "{{ directus_local_artifact_dir }}/key.txt"
directus_secret_local_file: "{{ directus_local_artifact_dir }}/secret.txt"
directus_admin_password_local_file: "{{ directus_local_artifact_dir }}/admin-password.txt"
directus_service_registry_token_local_file: "{{ directus_local_artifact_dir }}/service-registry-token.txt"
directus_keycloak_client_secret_local_file: "{{ repo_shared_local_root }}/keycloak/directus-client-secret.txt"
directus_key_remote_file: "{{ directus_secret_dir }}/key.txt"
directus_secret_remote_file: "{{ directus_secret_dir }}/secret.txt"
directus_admin_password_remote_file: "{{ directus_secret_dir }}/admin-password.txt"
directus_keycloak_client_id: directus
directus_keycloak_issuer_url: https://sso.lv3.org/realms/lv3
directus_keycloak_allow_public_registration: true
directus_keycloak_sync_user_info: true
directus_keycloak_group_claim_name: groups
directus_keycloak_email_key: email
directus_keycloak_first_name_key: given_name
directus_keycloak_last_name_key: family_name
directus_keycloak_label: Keycloak
directus_keycloak_icon: lock
directus_observer_role_id: 4b0fd2c2-596a-4e1f-bd0a-a9d8617c4c40
directus_operator_role_id: 1e4a3bf6-1798-49dd-b8e3-1c129422e7df
directus_keycloak_role_mapping_json: >-
  {"/lv3-platform-admins":"{{ directus_operator_role_id }}"}
directus_keycloak_login_path: /auth/login/keycloak
directus_keycloak_callback_path: /auth/login/keycloak/callback
directus_bootstrap_collection_name: service_registry
directus_bootstrap_public_hostname: "{{ directus_service_topology.public_hostname }}"
directus_bootstrap_internal_url: "http://{{ ansible_host }}:{{ directus_internal_port }}"
