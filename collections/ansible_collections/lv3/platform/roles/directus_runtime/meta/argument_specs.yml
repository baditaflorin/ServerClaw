# Purpose: Describe the required runtime variables for the Directus stack.
# Use case: Run during syntax and role-argument validation before converging Directus.
# Inputs: directus_* variables consumed by the runtime tasks and templates.
# Outputs: Machine-readable argument specs for the directus_runtime role.
# Idempotency: Fully idempotent because this file only validates role inputs.
# Dependencies: ADR 0165, ADR 0063, ADR 0077, ADR 0289, ADR 0373.
#
# NOTE: Conventional variables (site_dir, image, compose_file, env_file, openbao_*, container_name,
# internal_port, internal_base_url, local_artifact_dir) are derived from platform_service_registry
# by common/tasks/derive_service_defaults and are NOT validated here.
---
argument_specs:
  main:
    short_description: Converge the Directus runtime, schema bootstrap, and public verification path.
    options:
      directus_public_base_url:
        type: str
        required: true
      directus_database_host:
        type: str
        required: true
      directus_database_name:
        type: str
        required: true
      directus_database_user:
        type: str
        required: true
      directus_database_password_local_file:
        type: path
        required: true
      directus_keycloak_client_secret_local_file:
        type: path
        required: true
      directus_admin_password_local_file:
        type: path
        required: true
      directus_service_registry_token_local_file:
        type: path
        required: true
