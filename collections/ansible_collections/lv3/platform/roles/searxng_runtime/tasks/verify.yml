---
# Dependencies: ADR 0371.
- name: Verify the SearXNG runtime
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: searxng
    common_verify_port: "{{ searxng_runtime_port }}"
    common_verify_health_url: "{{ searxng_runtime_internal_base_url }}"
    common_verify_health_retries: 12
    common_verify_health_delay: 5
    common_verify_extra_endpoints:
      - url: "{{ searxng_runtime_internal_base_url }}/search?q={{ searxng_runtime_default_query | urlencode }}&format=json"
        retries: 6
        delay: 5
        assertions:
          - "common_verify_extra_response.json.results is defined"
          - "common_verify_extra_response.json.results is sequence"
        assertion_msg: "SearXNG did not return a JSON search results list during verification."
