    options:
      searxng_runtime_site_dir:
        type: path
        required: true
      searxng_runtime_config_dir:
        type: path
        required: true
      searxng_runtime_secret_dir:
        type: path
        required: true
      searxng_runtime_cache_dir:
        type: path
        required: true
      searxng_runtime_valkey_data_dir:
        type: path
        required: true
      searxng_runtime_compose_file:
        type: path
        required: true
      searxng_runtime_settings_file:
        type: path
        required: true
      searxng_runtime_container_name:
        type: str
        required: true
      searxng_runtime_valkey_container_name:
        type: str
        required: true
      searxng_runtime_image:
        type: str
        required: true
      searxng_runtime_valkey_image:
        type: str
        required: true
      searxng_runtime_port:
        type: int
        required: true
      searxng_runtime_internal_base_url:
        type: str
        required: true
      searxng_runtime_controller_url:
        type: str
        required: true
      searxng_runtime_public_base_url:
