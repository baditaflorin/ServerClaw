---
- name: Validate nginx observability inputs
  ansible.builtin.assert:
    that:
      - nginx_observability_state_dir | length > 0
      - nginx_observability_telegraf_config_file | length > 0
      - nginx_observability_stub_status_config_file | length > 0
      - nginx_observability_stub_status_url | length > 0
      - nginx_observability_hostname | length > 0
      - nginx_observability_role | length > 0
    fail_msg: "nginx_observability requires stub_status, Telegraf fragment, and service identity inputs."

- name: Prepare shared guest observability plumbing for nginx
  ansible.builtin.include_role:
    name: lv3.platform.guest_observability
    public: true
    tasks_from: setup
  vars:
    guest_observability_state_dir: "{{ nginx_observability_state_dir }}"
    guest_observability_hostname: "{{ nginx_observability_hostname }}"
    guest_observability_role: "{{ nginx_observability_role }}"
    guest_observability_service: nginx

- name: Render NGINX stub_status loopback configuration
  ansible.builtin.template:
    src: lv3-stub-status.conf.j2
    dest: "{{ nginx_observability_stub_status_config_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload NGINX

- name: Validate NGINX configuration
  ansible.builtin.command: nginx -t
  changed_when: false

- name: Render Telegraf NGINX observability configuration
  ansible.builtin.template:
    src: telegraf-nginx.conf.j2
    dest: "{{ nginx_observability_telegraf_config_file }}"
    owner: root
    group: telegraf
    mode: "0640"
  no_log: true
  notify: Restart Telegraf

- name: Flush nginx observability handlers
  ansible.builtin.meta: flush_handlers

- name: Verify shared guest observability services for nginx
  ansible.builtin.include_role:
    name: lv3.platform.guest_observability
    public: true
    tasks_from: verify

- name: Verify local NGINX stub_status endpoint
  ansible.builtin.uri:
    url: "{{ nginx_observability_stub_status_url }}"
    method: GET
    status_code: 200
  register: nginx_observability_stub_status
  changed_when: false
