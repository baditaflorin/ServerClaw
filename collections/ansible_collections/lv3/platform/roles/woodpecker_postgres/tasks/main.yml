# Purpose: Provision the PostgreSQL role, database, and password material used by the Woodpecker runtime.
# Use case: Run during Woodpecker bootstrap or recovery when the CI control plane needs its backing PostgreSQL database.
# Inputs: Database names, secret directories, and controller-local password sources for the Woodpecker service account.
# Outputs: Ensures the Woodpecker PostgreSQL database, role grants, and password files exist in the expected locations.
# Idempotency: Partially idempotent because first-run secret material may be created before later runs converge on it.
# Dependencies: ADR 0165, ADR 0026, and ADR 0287.
---
- name: Validate Woodpecker PostgreSQL inputs
  ansible.builtin.assert:
    that:
      - woodpecker_database_name | length > 0
      - woodpecker_database_user | length > 0
      - woodpecker_postgres_secret_dir | length > 0
      - woodpecker_postgres_password_file | length > 0
      - woodpecker_database_password_local_file | length > 0
    fail_msg: "woodpecker_postgres requires database names and local or remote password paths."

- name: Ensure the Woodpecker PostgreSQL secret directory exists
  ansible.builtin.file:
    path: "{{ woodpecker_postgres_secret_dir }}"
    state: directory
    owner: root
    group: postgres
    mode: "0750"

- name: Ensure the local Woodpecker artifact directory exists
  ansible.builtin.file:
    path: "{{ woodpecker_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate the Woodpecker database password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ woodpecker_database_password_local_file }}" ]; then
      umask 077
      openssl rand -base64 24 | tr -d '\n' > "{{ woodpecker_database_password_local_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: woodpecker_postgres_password_generation
  changed_when: "'changed' in woodpecker_postgres_password_generation.stdout"
  no_log: true

- name: Read the Woodpecker database password
  ansible.builtin.slurp:
    src: "{{ woodpecker_database_password_local_file }}"
  delegate_to: localhost
  become: false
  register: woodpecker_postgres_password_raw
  no_log: true

- name: Record the Woodpecker database password
  ansible.builtin.set_fact:
    woodpecker_database_password: "{{ woodpecker_postgres_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Mirror the Woodpecker database password to the control machine
  ansible.builtin.copy:
    dest: "{{ woodpecker_database_password_local_file }}"
    content: "{{ woodpecker_database_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Persist the Woodpecker database password on the current guest
  ansible.builtin.copy:
    dest: "{{ woodpecker_postgres_password_file }}"
    content: "{{ woodpecker_database_password }}\n"
    owner: root
    group: postgres
    mode: "0640"
  no_log: true

- name: Check whether the local PostgreSQL member is writable
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT CASE WHEN pg_is_in_recovery() THEN 0 ELSE 1 END"
  register: woodpecker_postgres_writable_check
  changed_when: false

- name: Check whether the Woodpecker database role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ woodpecker_database_user }}'"
  register: woodpecker_postgres_role_check
  changed_when: false
  when: woodpecker_postgres_writable_check.stdout | trim == "1"

- name: Create the Woodpecker database role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE ROLE {{ woodpecker_database_user }} LOGIN PASSWORD '{{ woodpecker_database_password }}'"
  changed_when: true
  no_log: true
  when:
    - woodpecker_postgres_writable_check.stdout | trim == "1"
    - woodpecker_postgres_role_check.stdout != "1"

- name: Check whether the Woodpecker PostgreSQL database already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_database WHERE datname = '{{ woodpecker_database_name }}'"
  register: woodpecker_postgres_database_check
  changed_when: false
  when: woodpecker_postgres_writable_check.stdout | trim == "1"

- name: Create the Woodpecker PostgreSQL database
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE DATABASE {{ woodpecker_database_name }} OWNER {{ woodpecker_database_user }}"
  when:
    - woodpecker_postgres_writable_check.stdout | trim == "1"
    - woodpecker_postgres_database_check.stdout != "1"
  changed_when: true

- name: Ensure the Woodpecker database owner is correct
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER DATABASE {{ woodpecker_database_name }} OWNER TO {{ woodpecker_database_user }}"
  changed_when: false
  when: woodpecker_postgres_writable_check.stdout | trim == "1"
