---
# Purpose: Provision the woodpecker PostgreSQL database using the shared postgres_client role (ADR 0359).
# Use case: Called during woodpecker deployment to ensure the database, role, and credentials exist.
# Inputs: woodpecker_* variables from defaults/main.yml; resolves registry entry from platform_postgres_clients.
# Outputs: woodpecker PostgreSQL role, database, and credential files converged on postgres-lv3.
# Idempotency: Yes; postgres_client role handles all idempotency.
# Dependencies: ADR 0359 postgres_client role, platform_postgres_clients registry.
- name: Provision the woodpecker database via the shared postgres_client role
  ansible.builtin.include_role:
    name: lv3.platform.postgres_client
  vars:
    postgres_client_service: "{{ woodpecker_database_name }}"
    postgres_client_database: "{{ woodpecker_database_name }}"
    postgres_client_user: "{{ woodpecker_database_user }}"
    postgres_client_password_local_file: "{{ woodpecker_database_password_local_file }}"
    postgres_client_password_remote_dir: "{{ woodpecker_postgres_secret_dir }}"
    postgres_client_password_remote_file: "{{ woodpecker_postgres_password_file }}"
