---
argument_specs:
  main:
    short_description: Provision the Woodpecker PostgreSQL role, database, and mirrored password artifact.
    options:
      woodpecker_database_name:
        type: str
        required: true
      woodpecker_database_user:
        type: str
        required: true
      woodpecker_postgres_secret_dir:
        type: path
        required: true
      woodpecker_postgres_password_file:
        type: path
        required: true
      woodpecker_local_artifact_dir:
        type: path
        required: true
      woodpecker_database_password_local_file:
        type: path
        required: true
