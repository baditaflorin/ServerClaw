---
# NOTE: Conventional variables (site_dir, image, compose_file, env_file,
# openbao_*, container_name, internal_port, local_artifact_dir) are derived
# from platform_service_registry — ADR 0373.
# Purpose: Declare the shared defaults for converging the interactive ops portal runtime, synced portal data, and live verification endpoints.
# Use case: Run from the managed ops-portal playbook when the repo-managed dashboard, templates, or supporting portal data contracts change.
#
# Inputs (required):
#   - hostvars['proxmox_florin'].lv3_service_topology (mapping, required): Service topology facts used to resolve the API gateway contract.
#
# Inputs (optional):
#   - ops_portal_maintenance_windows_file (string, optional, default=""): Override file for active maintenance windows mirrored into the runtime.
#   - ops_portal_static_api_token (string, optional, default=controller-local file): Static API token used for dashboard-only gateway reads.
#
# Outputs:
#   - Defines the ops-portal filesystem layout, runtime ports, synced config payloads, and verification endpoints consumed by the role tasks.
#
# Idempotency: Fully idempotent
# Dependencies:
#   - ADR 0093: Interactive ops portal runtime contract
#   - ADR 0205: Capability contracts before product selection
#   - Requires: docker-runtime-lv3 topology and platform port assignments
#   - Role: ops_portal_runtime — converges the managed portal container and synced runtime data
#
# Related ADRs: 0093, 0205, 0210
# Related Runbooks: docs/runbooks/ops-portal-down.md

ops_portal_gateway_service_topology: "{{ hostvars['proxmox_florin'].lv3_service_topology | service_topology_get('api_gateway') }}"
ops_portal_service_dir: "{{ ops_portal_site_dir }}/service"
ops_portal_build_context_dir: "{{ ops_portal_site_dir }}/build-context"
ops_portal_state_dir: "{{ ops_portal_site_dir }}/state"
ops_portal_session_secret_file: "{{ ops_portal_secret_dir }}/session-secret.txt"
ops_portal_attention_state_file: "{{ ops_portal_state_dir }}/attention-state.json"
ops_portal_network_mode: host
ops_portal_bind_address: 0.0.0.0
ops_portal_container_port: "{{ ops_portal_internal_port }}"
ops_portal_verify_address: "{{ ansible_host | default('127.0.0.1') }}"
ops_portal_gateway_substrate_owner_vm: runtime-control-lv3
ops_portal_gateway_substrate_port: 9080
ops_portal_gateway_substrate_path: /api-gateway
ops_portal_gateway_substrate_url: >-
  {{
    (
      'http://'
      ~ (ops_portal_gateway_service_topology.private_ip | default('', true))
      ~ ':'
      ~ (ops_portal_gateway_substrate_port | string)
      ~ ops_portal_gateway_substrate_path
      if (
        (ops_portal_gateway_service_topology.owning_vm | default('', true)) == ops_portal_gateway_substrate_owner_vm
        and (ops_portal_gateway_service_topology.private_ip | default('', true))
      )
      else ''
    )
  }}
ops_portal_gateway_url: >-
  {{
    (
      ops_portal_gateway_substrate_url
      | default('', true)
    )
    or
    (
      ops_portal_gateway_service_topology.urls.internal
      if (
        ops_portal_gateway_service_topology.urls is defined
        and ops_portal_gateway_service_topology.urls.internal is defined
      )
      | default('', true)
    )
    or
    (
      hostvars['proxmox_florin'].api_gateway_internal_url
      | default('', true)
    )
    or
    (
      'http://'
      ~ (ops_portal_gateway_service_topology.private_ip | default('', true))
      ~ ':'
      ~ (hostvars['proxmox_florin'].platform_port_assignments.api_gateway_internal_port | default(8083) | string)
      if (ops_portal_gateway_service_topology.private_ip | default('', true))
      else ''
    )
    or
    (
      'http://127.0.0.1:'
      ~ (hostvars['proxmox_florin'].platform_port_assignments.api_gateway_internal_port | default(8083) | string)
    )
  }}
ops_portal_public_base_url: https://ops.lv3.org
ops_portal_docs_base_url: https://docs.lv3.org
ops_portal_grafana_logs_url: https://grafana.lv3.org/explore?left=%7B%22queries%22:%5B%5D%7D
ops_portal_service_image_name: lv3-ops-portal
ops_portal_repo_root: "{{ playbook_dir | dirname }}"
ops_portal_static_api_token: >-
  {{
    lookup(
      'ansible.builtin.file',
      '/Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/platform-context/api-token.txt',
      errors='ignore'
    )
    | default('', true)
    | trim
  }}
ops_portal_maintenance_windows_file: ""
ops_portal_file_sources:
  - src: "{{ ops_portal_repo_root }}/config/activation-checklist.json"
    dest: "{{ ops_portal_data_dir }}/config/activation-checklist.json"
  - src: "{{ ops_portal_repo_root }}/config/capability-contract-catalog.json"
    dest: "{{ ops_portal_data_dir }}/config/capability-contract-catalog.json"
  - src: "{{ ops_portal_repo_root }}/config/dependency-graph.json"
    dest: "{{ ops_portal_data_dir }}/config/dependency-graph.json"
  - src: "{{ ops_portal_repo_root }}/config/service-capability-catalog.json"
    dest: "{{ ops_portal_data_dir }}/config/service-capability-catalog.json"
  - src: "{{ ops_portal_repo_root }}/config/persona-catalog.json"
    dest: "{{ ops_portal_data_dir }}/config/persona-catalog.json"
  - src: "{{ ops_portal_repo_root }}/config/workbench-information-architecture.json"
    dest: "{{ ops_portal_data_dir }}/config/workbench-information-architecture.json"
  - src: "{{ ops_portal_repo_root }}/config/subdomain-exposure-registry.json"
    dest: "{{ ops_portal_data_dir }}/config/subdomain-exposure-registry.json"
  - src: "{{ ops_portal_repo_root }}/config/workflow-catalog.json"
    dest: "{{ ops_portal_data_dir }}/config/workflow-catalog.json"
  - src: "{{ ops_portal_repo_root }}/changelog.md"
    dest: "{{ ops_portal_data_dir }}/changelog.md"
ops_portal_directory_sources:
  - src: "{{ ops_portal_repo_root }}/receipts/live-applies/"
    dest: "{{ ops_portal_data_dir }}/receipts/live-applies/"
    patterns:
      - "*.json"
    depth: 1
    excludes:
      - evidence
      - preview
  - src: "{{ ops_portal_repo_root }}/receipts/live-applies/staging/"
    dest: "{{ ops_portal_data_dir }}/receipts/live-applies/staging/"
    patterns:
      - "*.json"
    depth: 1
  - src: "{{ ops_portal_repo_root }}/receipts/promotions/"
    dest: "{{ ops_portal_data_dir }}/receipts/promotions/"
    depth: 1
  - src: "{{ ops_portal_repo_root }}/receipts/drift-reports/"
    dest: "{{ ops_portal_data_dir }}/receipts/drift-reports/"
    patterns:
      - "*.json"
    depth: 1
ops_portal_pruned_data_paths:
  - "{{ ops_portal_data_dir }}/receipts/live-applies/evidence"
  - "{{ ops_portal_data_dir }}/receipts/live-applies/preview"
ops_portal_runtime_file_sources:
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/__init__.py"
    dest: "{{ ops_portal_service_dir }}/ops_portal/__init__.py"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/app.py"
    dest: "{{ ops_portal_service_dir }}/ops_portal/app.py"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/runtime_assurance.py"
    dest: "{{ ops_portal_service_dir }}/ops_portal/runtime_assurance.py"
  - src: "{{ ops_portal_repo_root }}/scripts/workbench_information_architecture.py"
    dest: "{{ ops_portal_service_dir }}/workbench_information_architecture.py"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/static/portal.css"
    dest: "{{ ops_portal_service_dir }}/ops_portal/static/portal.css"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/static/portal.js"
    dest: "{{ ops_portal_service_dir }}/ops_portal/static/portal.js"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/templates/base.html"
    dest: "{{ ops_portal_service_dir }}/ops_portal/templates/base.html"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/templates/entry.html"
    dest: "{{ ops_portal_service_dir }}/ops_portal/templates/entry.html"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/templates/index.html"
    dest: "{{ ops_portal_service_dir }}/ops_portal/templates/index.html"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/templates/macros/lane_context.html"
    dest: "{{ ops_portal_service_dir }}/ops_portal/templates/macros/lane_context.html"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/templates/macros/states.html"
    dest: "{{ ops_portal_service_dir }}/ops_portal/templates/macros/states.html"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/templates/partials/action_result.html"
    dest: "{{ ops_portal_service_dir }}/ops_portal/templates/partials/action_result.html"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/templates/partials/activation.html"
    dest: "{{ ops_portal_service_dir }}/ops_portal/templates/partials/activation.html"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/templates/partials/attention.html"
    dest: "{{ ops_portal_service_dir }}/ops_portal/templates/partials/attention.html"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/templates/partials/agents.html"
    dest: "{{ ops_portal_service_dir }}/ops_portal/templates/partials/agents.html"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/templates/partials/changelog.html"
    dest: "{{ ops_portal_service_dir }}/ops_portal/templates/partials/changelog.html"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/templates/partials/drift.html"
    dest: "{{ ops_portal_service_dir }}/ops_portal/templates/partials/drift.html"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/templates/partials/launcher.html"
    dest: "{{ ops_portal_service_dir }}/ops_portal/templates/partials/launcher.html"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/templates/partials/overview.html"
    dest: "{{ ops_portal_service_dir }}/ops_portal/templates/partials/overview.html"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/templates/partials/runbooks.html"
    dest: "{{ ops_portal_service_dir }}/ops_portal/templates/partials/runbooks.html"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/templates/partials/runtime_assurance.html"
    dest: "{{ ops_portal_service_dir }}/ops_portal/templates/partials/runtime_assurance.html"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/templates/partials/tasks.html"
    dest: "{{ ops_portal_service_dir }}/ops_portal/templates/partials/tasks.html"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/templates/partials/search.html"
    dest: "{{ ops_portal_service_dir }}/ops_portal/templates/partials/search.html"
  - src: "{{ ops_portal_repo_root }}/scripts/ops_portal/templates/task_detail.html"
    dest: "{{ ops_portal_service_dir }}/ops_portal/templates/task_detail.html"
ops_portal_runtime_overlay_directories:
  - "{{ ops_portal_service_dir }}/ops_portal"
  - "{{ ops_portal_service_dir }}/ops_portal/static"
  - "{{ ops_portal_service_dir }}/ops_portal/templates"
  - "{{ ops_portal_service_dir }}/ops_portal/templates/macros"
  - "{{ ops_portal_service_dir }}/ops_portal/templates/partials"
ops_portal_build_file_sources:
  - src: "{{ ops_portal_repo_root }}/scripts/publication_contract.py"
    filename: publication_contract.py
  - src: "{{ ops_portal_repo_root }}/scripts/stage_smoke.py"
    filename: stage_smoke.py
  - src: "{{ ops_portal_repo_root }}/scripts/workbench_information_architecture.py"
    filename: workbench_information_architecture.py
  - src: "{{ ops_portal_repo_root }}/requirements/ops-portal.txt"
    filename: requirements.txt
