---
- name: Validate ops portal runtime inputs
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: assert_vars
  vars:
    common_assert_vars_required:
      - ops_portal_site_dir
      - ops_portal_service_dir
      - ops_portal_data_dir
      - ops_portal_secret_dir
      - ops_portal_compose_file
      - ops_portal_env_file
      - ops_portal_session_secret_file
      - ops_portal_container_name
      - ops_portal_internal_port
      - ops_portal_gateway_url
      - ops_portal_public_base_url
      - ops_portal_docs_base_url
      - ops_portal_grafana_logs_url
      - ops_portal_service_image_name
    common_assert_vars_expressions:
      - ops_portal_internal_port | int > 0
    common_assert_vars_fail_msg: >-
      ops_portal_runtime requires the application directories, runtime secret,
      compose inputs, gateway URL, and the internal listener port.

- name: Ensure ops portal runtime packages are present
  ansible.builtin.apt:
    name:
      - docker-compose-plugin
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure ops portal directories exist
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: directory_tree
  vars:
    common_directory_tree_paths:
      - path: "{{ ops_portal_site_dir }}"
        mode: "0755"
      - path: "{{ ops_portal_service_dir }}"
        mode: "0755"
      - path: "{{ ops_portal_data_dir }}"
        mode: "0755"
      - path: "{{ ops_portal_data_dir }}/config"
        mode: "0755"
      - path: "{{ ops_portal_data_dir }}/receipts/live-applies"
        mode: "0755"
      - path: "{{ ops_portal_data_dir }}/receipts/drift-reports"
        mode: "0755"
      - path: "{{ ops_portal_secret_dir }}"
        mode: "0700"

- name: Generate the ops portal session secret when missing
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ ops_portal_session_secret_file }}" ]; then
      umask 077
      openssl rand -hex 32 > "{{ ops_portal_session_secret_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: ops_portal_session_secret_generation
  changed_when: "'changed' in ops_portal_session_secret_generation.stdout"
  no_log: true

- name: Read the ops portal session secret
  ansible.builtin.slurp:
    src: "{{ ops_portal_session_secret_file }}"
  register: ops_portal_session_secret_raw
  no_log: true

- name: Record the ops portal session secret
  ansible.builtin.set_fact:
    ops_portal_session_secret: "{{ ops_portal_session_secret_raw.content | b64decode | trim }}"
  no_log: true

- name: Render the ops portal environment file
  ansible.builtin.template:
    src: ops-portal.env.j2
    dest: "{{ ops_portal_env_file }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Render the ops portal compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ ops_portal_compose_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Render the ops portal Dockerfile
  ansible.builtin.template:
    src: Dockerfile.j2
    dest: "{{ ops_portal_service_dir }}/Dockerfile"
    owner: root
    group: root
    mode: "0644"

- name: Sync the ops portal application sources
  ansible.builtin.copy:
    src: "{{ ops_portal_repo_root }}/scripts/ops_portal/"
    dest: "{{ ops_portal_service_dir }}/ops_portal/"
    owner: root
    group: root
    mode: "0644"
    directory_mode: "0755"

- name: Sync the ops portal requirements file
  ansible.builtin.copy:
    src: "{{ ops_portal_repo_root }}/requirements/ops-portal.txt"
    dest: "{{ ops_portal_service_dir }}/requirements.txt"
    owner: root
    group: root
    mode: "0644"

- name: Sync the ops portal file-backed data sources
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ ops_portal_file_sources }}"

- name: Sync the ops portal directory-backed data sources
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
    directory_mode: "0755"
  loop: "{{ ops_portal_directory_sources }}"

- name: Build and start the ops portal stack
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ ops_portal_compose_file }}"
      - up
      - -d
      - --build
      - --remove-orphans
  args:
    chdir: "{{ ops_portal_site_dir }}"
  register: ops_portal_up
  changed_when: >-
    'Creating' in ops_portal_up.stdout
    or 'Recreating' in ops_portal_up.stdout
    or 'Starting' in ops_portal_up.stdout
    or 'Building' in ops_portal_up.stdout

- name: Verify ops portal health probes
  ansible.builtin.import_tasks: verify.yml
