---
# Purpose: Render and run the repo-managed ops portal runtime on the docker guest with its required directories, secrets, and image build context.
- name: Validate ops portal runtime inputs
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: assert_vars
  vars:
    common_assert_vars_required:
      - ops_portal_site_dir
      - ops_portal_service_dir
      - ops_portal_build_context_dir
      - ops_portal_data_dir
      - ops_portal_secret_dir
      - ops_portal_compose_file
      - ops_portal_env_file
      - ops_portal_session_secret_file
      - ops_portal_container_name
      - ops_portal_internal_port
      - ops_portal_gateway_url
      - ops_portal_public_base_url
      - ops_portal_docs_base_url
      - ops_portal_grafana_logs_url
      - ops_portal_service_image_name
    common_assert_vars_expressions:
      - ops_portal_internal_port | int > 0
    common_assert_vars_fail_msg: >-
      ops_portal_runtime requires the application directories, runtime secret,
      compose inputs, gateway URL, and the internal listener port.

- name: Ensure ops portal runtime packages are present
  ansible.builtin.apt:
    name:
      - docker-compose-plugin
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure ops portal directories exist
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: directory_tree
  vars:
    common_directory_tree_paths:
      - path: "{{ ops_portal_site_dir }}"
        mode: "0755"
      - path: "{{ ops_portal_service_dir }}"
        mode: "0755"
      - path: "{{ ops_portal_build_context_dir }}"
        mode: "0755"
      - path: "{{ ops_portal_data_dir }}"
        mode: "0755"
      - path: "{{ ops_portal_data_dir }}/config"
        mode: "0755"
      - path: "{{ ops_portal_data_dir }}/receipts/live-applies"
        mode: "0755"
      - path: "{{ ops_portal_data_dir }}/receipts/drift-reports"
        mode: "0755"
      - path: "{{ ops_portal_secret_dir }}"
        mode: "0700"

- name: Generate the ops portal session secret when missing
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ ops_portal_session_secret_file }}" ]; then
      umask 077
      openssl rand -hex 32 > "{{ ops_portal_session_secret_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: ops_portal_session_secret_generation
  changed_when: "'changed' in ops_portal_session_secret_generation.stdout"
  no_log: true

- name: Read the ops portal session secret
  ansible.builtin.slurp:
    src: "{{ ops_portal_session_secret_file }}"
  register: ops_portal_session_secret_raw
  no_log: true

- name: Record the ops portal session secret
  ansible.builtin.set_fact:
    ops_portal_session_secret: "{{ ops_portal_session_secret_raw.content | b64decode | trim }}"
  no_log: true

- name: Render the ops portal environment file
  ansible.builtin.template:
    src: ops-portal.env.j2
    dest: "{{ ops_portal_env_file }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Render the ops portal compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ ops_portal_compose_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Render the ops portal Dockerfile
  ansible.builtin.template:
    src: Dockerfile.j2
    dest: "{{ ops_portal_service_dir }}/Dockerfile"
    owner: root
    group: root
    mode: "0644"

- name: Sync the repo-managed ops portal service tree
  ansible.builtin.import_tasks: sync_service_tree.yml

- name: Sync the ops portal file-backed data sources
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ ops_portal_file_sources }}"
  loop_control:
    label: "{{ item.dest | replace(ops_portal_data_dir ~ '/', '') }}"

- name: Ensure the ops portal directory-backed data destinations exist
  ansible.builtin.file:
    path: "{{ item.dest }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ ops_portal_directory_sources }}"

- name: Discover the ops portal directory-backed data files on the controller
  ansible.builtin.find:
    paths: "{{ item.src }}"
    recurse: true
    file_type: file
    patterns: "{{ item.patterns | default(['*.json']) }}"
    excludes: "{{ (item.excludes | default([])) + ['._*', '.DS_Store'] }}"
  loop: "{{ ops_portal_directory_sources }}"
  loop_control:
    label: "{{ item.dest | replace(ops_portal_data_dir ~ '/', '') }}"
  register: ops_portal_directory_source_files
  delegate_to: localhost
  become: false

- name: Ensure the synced ops portal directory-backed data subdirectories exist
  ansible.builtin.file:
    path: "{{ (item.0.item.dest ~ (item.1.path | replace(item.0.item.src, ''))) | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ ops_portal_directory_source_files.results | subelements('files', skip_missing=True) }}"
  loop_control:
    label: >-
      {{ ((item.0.item.dest ~ (item.1.path | replace(item.0.item.src, ''))) | dirname)
      | replace(ops_portal_data_dir ~ '/', '') }}
  when: >-
    (
      item.0.item.excludes | default([])
      | select('in', item.1.path.split('/'))
      | list
      | length
    ) == 0

- name: Sync the ops portal directory-backed data source files
  ansible.builtin.copy:
    src: "{{ item.1.path }}"
    dest: "{{ item.0.item.dest }}{{ item.1.path | replace(item.0.item.src, '') }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ ops_portal_directory_source_files.results | subelements('files', skip_missing=True) }}"
  loop_control:
    label: "{{ (item.0.item.dest ~ (item.1.path | replace(item.0.item.src, ''))) | replace(ops_portal_data_dir ~ '/', '') }}"
  when: >-
    (
      item.0.item.excludes | default([])
      | select('in', item.1.path.split('/'))
      | list
      | length
    ) == 0

- name: Discover macOS metadata files in the synced ops portal data tree
  ansible.builtin.find:
    paths: "{{ ops_portal_data_dir }}"
    recurse: true
    file_type: file
    hidden: true
    patterns:
      - "._*"
      - ".DS_Store"
  register: ops_portal_data_metadata_files

- name: Remove macOS metadata files from the synced ops portal data tree
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ ops_portal_data_metadata_files.files }}"

- name: Refresh the repo-managed ops portal service tree immediately before build-context sync
  ansible.builtin.import_tasks: sync_service_tree.yml

- name: Remove stale ops portal build-context ignore and metadata files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ ops_portal_service_dir }}/.dockerignore"
    - "{{ ops_portal_build_context_dir }}/.dockerignore"
    - "{{ ops_portal_service_dir }}/._ops_portal"
    - "{{ ops_portal_service_dir }}/._search_fabric"
    - "{{ ops_portal_service_dir }}/._publication_contract.py"
    - "{{ ops_portal_service_dir }}/._stage_smoke.py"
    - "{{ ops_portal_service_dir }}/._requirements.txt"
    - "{{ ops_portal_build_context_dir }}/._ops_portal"
    - "{{ ops_portal_build_context_dir }}/._search_fabric"
    - "{{ ops_portal_build_context_dir }}/._publication_contract.py"
    - "{{ ops_portal_build_context_dir }}/._stage_smoke.py"
    - "{{ ops_portal_build_context_dir }}/._requirements.txt"
    - "{{ ops_portal_build_context_dir }}/._Dockerfile"

- name: Remove stale ops portal build-context entries before sync
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ ops_portal_build_context_dir }}/Dockerfile"
    - "{{ ops_portal_build_context_dir }}/ops_portal"
    - "{{ ops_portal_build_context_dir }}/publication_contract.py"
    - "{{ ops_portal_build_context_dir }}/stage_smoke.py"
    - "{{ ops_portal_build_context_dir }}/requirements.txt"
    - "{{ ops_portal_build_context_dir }}/search_fabric"

- name: Sync the clean ops portal Docker build-context directories
  ansible.builtin.copy:
    remote_src: true
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
    directory_mode: "0755"
  loop:
    - src: "{{ ops_portal_service_dir }}/ops_portal/"
      dest: "{{ ops_portal_build_context_dir }}/ops_portal/"
    - src: "{{ ops_portal_service_dir }}/search_fabric/"
      dest: "{{ ops_portal_build_context_dir }}/search_fabric/"
  loop_control:
    label: "{{ item.dest | replace(ops_portal_build_context_dir ~ '/', '') }}"

- name: Sync the clean ops portal Docker build-context Dockerfile
  ansible.builtin.copy:
    remote_src: true
    src: "{{ ops_portal_service_dir }}/Dockerfile"
    dest: "{{ ops_portal_build_context_dir }}/Dockerfile"
    owner: root
    group: root
    mode: "0644"

- name: Sync the clean ops portal Docker build-context helper files directly from controller sources
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ ops_portal_build_context_dir }}/{{ item.filename }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ ops_portal_build_file_sources }}"
  loop_control:
    label: "{{ item.filename }}"

- name: Normalize the synced ops portal application tree ownership
  ansible.builtin.file:
    path: "{{ ops_portal_service_dir }}/ops_portal"
    state: directory
    owner: root
    group: root
    recurse: true

- name: Normalize the synced search fabric tree ownership
  ansible.builtin.file:
    path: "{{ ops_portal_service_dir }}/search_fabric"
    state: directory
    owner: root
    group: root
    recurse: true

- name: Gather the synced ops portal build context manifest
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ ops_portal_build_context_dir }}/Dockerfile"
    - "{{ ops_portal_build_context_dir }}/requirements.txt"
    - "{{ ops_portal_build_context_dir }}/publication_contract.py"
    - "{{ ops_portal_build_context_dir }}/stage_smoke.py"
    - "{{ ops_portal_build_context_dir }}/ops_portal/app.py"
    - "{{ ops_portal_build_context_dir }}/search_fabric/__init__.py"
  register: ops_portal_build_context_manifest

- name: Assert the ops portal build context is complete
  ansible.builtin.assert:
    that:
      - ops_portal_build_context_manifest.results | map(attribute='stat.exists') | min
    fail_msg: >-
      Ops portal build context is incomplete. Expected Dockerfile, requirements,
      publication contract helper, stage smoke helper, app module, and search
      fabric package to be present in {{ ops_portal_build_context_dir }} before
      docker compose up.

- name: Build and start the ops portal stack
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ ops_portal_compose_file }}"
      - up
      - -d
      - --build
      - --force-recreate
      - --remove-orphans
  args:
    chdir: "{{ ops_portal_site_dir }}"
  register: ops_portal_up
  failed_when: false
  retries: 3
  delay: 5
  until: ops_portal_up.rc == 0
  changed_when: >-
    'Creating' in ops_portal_up.stdout
    or 'Recreating' in ops_portal_up.stdout
    or 'Starting' in ops_portal_up.stdout
    or 'Building' in ops_portal_up.stdout

- name: Assert the ops portal stack build and start succeeded
  ansible.builtin.assert:
    that:
      - ops_portal_up.rc == 0
    fail_msg: "{{ ops_portal_up.stderr | default(ops_portal_up.msg | default('ops portal compose up failed')) }}"

- name: Verify ops portal health probes
  ansible.builtin.import_tasks: verify.yml
