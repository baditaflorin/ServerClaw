---
- name: Validate ops portal runtime inputs
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: assert_vars
  vars:
    common_assert_vars_required:
      - ops_portal_site_dir
      - ops_portal_service_dir
      - ops_portal_data_dir
      - ops_portal_secret_dir
      - ops_portal_compose_file
      - ops_portal_env_file
      - ops_portal_session_secret_file
      - ops_portal_container_name
      - ops_portal_internal_port
      - ops_portal_gateway_url
      - ops_portal_public_base_url
      - ops_portal_docs_base_url
      - ops_portal_grafana_logs_url
      - ops_portal_service_image_name
    common_assert_vars_expressions:
      - ops_portal_internal_port | int > 0
    common_assert_vars_fail_msg: >-
      ops_portal_runtime requires the application directories, runtime secret,
      compose inputs, gateway URL, and the internal listener port.

- name: Ensure ops portal runtime packages are present
  ansible.builtin.apt:
    name:
      - docker-compose-plugin
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure ops portal directories exist
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: directory_tree
  vars:
    common_directory_tree_paths:
      - path: "{{ ops_portal_site_dir }}"
        mode: "0755"
      - path: "{{ ops_portal_service_dir }}"
        mode: "0755"
      - path: "{{ ops_portal_data_dir }}"
        mode: "0755"
      - path: "{{ ops_portal_data_dir }}/config"
        mode: "0755"
      - path: "{{ ops_portal_data_dir }}/receipts/live-applies"
        mode: "0755"
      - path: "{{ ops_portal_data_dir }}/receipts/drift-reports"
        mode: "0755"
      - path: "{{ ops_portal_secret_dir }}"
        mode: "0700"

- name: Generate the ops portal session secret when missing
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ ops_portal_session_secret_file }}" ]; then
      umask 077
      openssl rand -hex 32 > "{{ ops_portal_session_secret_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: ops_portal_session_secret_generation
  changed_when: "'changed' in ops_portal_session_secret_generation.stdout"
  no_log: true

- name: Read the ops portal session secret
  ansible.builtin.slurp:
    src: "{{ ops_portal_session_secret_file }}"
  register: ops_portal_session_secret_raw
  no_log: true

- name: Record the ops portal session secret
  ansible.builtin.set_fact:
    ops_portal_session_secret: "{{ ops_portal_session_secret_raw.content | b64decode | trim }}"
  no_log: true

- name: Render the ops portal environment file
  ansible.builtin.template:
    src: ops-portal.env.j2
    dest: "{{ ops_portal_env_file }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Render the ops portal compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ ops_portal_compose_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Render the ops portal Dockerfile
  ansible.builtin.template:
    src: Dockerfile.j2
    dest: "{{ ops_portal_service_dir }}/Dockerfile"
    owner: root
    group: root
    mode: "0644"

- name: Remove stale ops portal build context entries before sync
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ ops_portal_service_dir }}/ops_portal"
    - "{{ ops_portal_service_dir }}/search_fabric"
    - "{{ ops_portal_service_dir }}/publication_contract.py"
    - "{{ ops_portal_service_dir }}/requirements.txt"

- name: Stage and expand the ops portal application sources
  block:
    - name: Create a local staging archive path for the ops portal application sources
      ansible.builtin.tempfile:
        state: file
        suffix: .tar.gz
      delegate_to: localhost
      become: false
      register: ops_portal_app_archive_local

    - name: Build the local staging archive for the ops portal application sources
      ansible.builtin.shell: |
        set -euo pipefail
        tar -C "{{ ops_portal_repo_root }}/scripts" -czf "{{ ops_portal_app_archive_local.path }}" ops_portal
      args:
        executable: /bin/bash
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Copy the staged archive to the guest for the ops portal application sources
      ansible.builtin.copy:
        src: "{{ ops_portal_app_archive_local.path }}"
        dest: "{{ ops_portal_site_dir }}/ops-portal-app-sync.tar.gz"
        owner: root
        group: root
        mode: "0600"

    - name: Expand the staged archive on the guest for the ops portal application sources
      ansible.builtin.shell: |
        set -euo pipefail
        tar -xzf "{{ ops_portal_site_dir }}/ops-portal-app-sync.tar.gz" -C "{{ ops_portal_service_dir }}"
      args:
        executable: /bin/bash
      changed_when: true
  always:
    - name: Remove the staged archive from the guest for the ops portal application sources
      ansible.builtin.file:
        path: "{{ ops_portal_site_dir }}/ops-portal-app-sync.tar.gz"
        state: absent

    - name: Remove the local staging archive for the ops portal application sources
      ansible.builtin.file:
        path: "{{ ops_portal_app_archive_local.path }}"
        state: absent
      delegate_to: localhost
      become: false
      when: ops_portal_app_archive_local is defined

- name: Stage and expand the shared search fabric package
  block:
    - name: Create a local staging archive path for the shared search fabric package
      ansible.builtin.tempfile:
        state: file
        suffix: .tar.gz
      delegate_to: localhost
      become: false
      register: ops_portal_search_fabric_archive_local

    - name: Build the local staging archive for the shared search fabric package
      ansible.builtin.shell: |
        set -euo pipefail
        tar -C "{{ ops_portal_repo_root }}/scripts" -czf "{{ ops_portal_search_fabric_archive_local.path }}" search_fabric
      args:
        executable: /bin/bash
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Copy the staged archive to the guest for the shared search fabric package
      ansible.builtin.copy:
        src: "{{ ops_portal_search_fabric_archive_local.path }}"
        dest: "{{ ops_portal_site_dir }}/ops-portal-search-fabric-sync.tar.gz"
        owner: root
        group: root
        mode: "0600"

    - name: Expand the staged archive on the guest for the shared search fabric package
      ansible.builtin.shell: |
        set -euo pipefail
        tar -xzf "{{ ops_portal_site_dir }}/ops-portal-search-fabric-sync.tar.gz" -C "{{ ops_portal_service_dir }}"
      args:
        executable: /bin/bash
      changed_when: true
  always:
    - name: Remove the staged archive from the guest for the shared search fabric package
      ansible.builtin.file:
        path: "{{ ops_portal_site_dir }}/ops-portal-search-fabric-sync.tar.gz"
        state: absent

    - name: Remove the local staging archive for the shared search fabric package
      ansible.builtin.file:
        path: "{{ ops_portal_search_fabric_archive_local.path }}"
        state: absent
      delegate_to: localhost
      become: false
      when: ops_portal_search_fabric_archive_local is defined

- name: Sync the ops portal file-backed data sources
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ ops_portal_file_sources }}"

- name: Remove stale ops portal directory-backed data sources before sync
  ansible.builtin.file:
    path: "{{ item.dest | regex_replace('/$', '') }}"
    state: absent
  loop: "{{ ops_portal_directory_sources }}"
  loop_control:
    label: "{{ item.dest }}"

- name: Build local staging archives for the ops portal directory-backed data sources
  ansible.builtin.shell: |
    set -euo pipefail
    tar -C "{{ item.src | regex_replace('/$', '') | dirname }}" \
      -czf "/tmp/ops-portal-{{ item.dest | regex_replace('/$', '') | basename }}-sync.tar.gz" \
      "{{ item.src | regex_replace('/$', '') | basename }}"
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  changed_when: false
  loop: "{{ ops_portal_directory_sources }}"
  loop_control:
    label: "{{ item.src }}"

- name: Copy the staged archives to the guest for the ops portal directory-backed data sources
  ansible.builtin.copy:
    src: "/tmp/ops-portal-{{ item.dest | regex_replace('/$', '') | basename }}-sync.tar.gz"
    dest: "{{ ops_portal_site_dir }}/ops-portal-{{ item.dest | regex_replace('/$', '') | basename }}-sync.tar.gz"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ ops_portal_directory_sources }}"
  loop_control:
    label: "{{ item.dest }}"

- name: Expand the staged archives on the guest for the ops portal directory-backed data sources
  ansible.builtin.shell: |
    set -euo pipefail
    tar -xzf "{{ ops_portal_site_dir }}/ops-portal-{{ item.dest | regex_replace('/$', '') | basename }}-sync.tar.gz" \
      -C "{{ item.dest | regex_replace('/$', '') | dirname }}"
  args:
    executable: /bin/bash
  changed_when: true
  loop: "{{ ops_portal_directory_sources }}"
  loop_control:
    label: "{{ item.dest }}"

- name: Remove the staged archives from the guest for the ops portal directory-backed data sources
  ansible.builtin.file:
    path: "{{ ops_portal_site_dir }}/ops-portal-{{ item.dest | regex_replace('/$', '') | basename }}-sync.tar.gz"
    state: absent
  loop: "{{ ops_portal_directory_sources }}"
  loop_control:
    label: "{{ item.dest }}"

- name: Remove the local staging archives for the ops portal directory-backed data sources
  ansible.builtin.file:
    path: "/tmp/ops-portal-{{ item.dest | regex_replace('/$', '') | basename }}-sync.tar.gz"
    state: absent
  delegate_to: localhost
  become: false
  loop: "{{ ops_portal_directory_sources }}"
  loop_control:
    label: "{{ item.src }}"

- name: Sync the ops portal service build inputs explicitly
  ansible.builtin.copy:
    content: "{{ lookup('ansible.builtin.file', item.src) }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - src: "{{ ops_portal_repo_root }}/scripts/publication_contract.py"
      dest: "{{ ops_portal_service_dir }}/publication_contract.py"
    - src: "{{ ops_portal_repo_root }}/requirements/ops-portal.txt"
      dest: "{{ ops_portal_service_dir }}/requirements.txt"

- name: Discover macOS metadata files in the synced ops portal service tree
  ansible.builtin.find:
    paths: "{{ ops_portal_service_dir }}"
    recurse: true
    file_type: file
    hidden: true
    patterns:
      - "._*"
      - ".DS_Store"
  register: ops_portal_service_metadata_files

- name: Remove macOS metadata files from the synced ops portal service tree
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ ops_portal_service_metadata_files.files }}"

- name: Normalize the synced ops portal application tree ownership
  ansible.builtin.file:
    path: "{{ ops_portal_service_dir }}/ops_portal"
    state: directory
    owner: root
    group: root
    recurse: true

- name: Normalize the synced search fabric tree ownership
  ansible.builtin.file:
    path: "{{ ops_portal_service_dir }}/search_fabric"
    state: directory
    owner: root
    group: root
    recurse: true

- name: Gather the synced ops portal build context manifest
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ ops_portal_service_dir }}/Dockerfile"
    - "{{ ops_portal_service_dir }}/requirements.txt"
    - "{{ ops_portal_service_dir }}/publication_contract.py"
    - "{{ ops_portal_service_dir }}/ops_portal/app.py"
    - "{{ ops_portal_service_dir }}/search_fabric/__init__.py"
  register: ops_portal_build_context_manifest

- name: Assert the ops portal build context is complete
  ansible.builtin.assert:
    that:
      - ops_portal_build_context_manifest.results | map(attribute='stat.exists') | min
    fail_msg: >-
      Ops portal build context is incomplete. Expected Dockerfile, requirements,
      publication contract helper, app module, and search fabric package to be
      present in {{ ops_portal_service_dir }} before docker compose up.

- name: Build and start the ops portal stack
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ ops_portal_compose_file }}"
      - up
      - -d
      - --build
      - --force-recreate
      - --remove-orphans
  args:
    chdir: "{{ ops_portal_site_dir }}"
  register: ops_portal_up
  failed_when: false
  retries: 3
  delay: 5
  until: ops_portal_up.rc == 0
  changed_when: >-
    'Creating' in ops_portal_up.stdout
    or 'Recreating' in ops_portal_up.stdout
    or 'Starting' in ops_portal_up.stdout
    or 'Building' in ops_portal_up.stdout

- name: Assert the ops portal stack build and start succeeded
  ansible.builtin.assert:
    that:
      - ops_portal_up.rc == 0
    fail_msg: "{{ ops_portal_up.stderr | default(ops_portal_up.msg | default('ops portal compose up failed')) }}"

- name: Verify ops portal health probes
  ansible.builtin.import_tasks: verify.yml
