---
# Purpose: Verify the private and public Lago runtime contracts after convergence.
# Use case: Included after Lago deployment or live replay to prove the runtime serves the expected smoke paths.
# Inputs: lago_* verification URLs, seeded smoke data, and direct API credentials.
# Outputs: Failing or passing verification results for the Lago health and usage contracts.
# Idempotency: Fully idempotent; verification only reads runtime state.
# Dependencies: ADR 0165, ADR 0292, ADR 0371, and a converged Lago runtime.
- name: Verify the Lago runtime health
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: lago
    common_verify_port: "{{ platform_service_topology.lago.ports.api }}"
    common_verify_health_url: "{{ lago_direct_api_local_base_url }}/health"
    common_verify_health_retries: 30
    common_verify_health_delay: 5

- name: Verify the Lago direct current usage endpoint returns the smoke metric
  ansible.builtin.shell: |
    set -euo pipefail
    response_file="$(mktemp)"
    trap 'rm -f "$response_file"' EXIT

    for _ in $(seq 1 24); do
      status="$(
        curl -sS \
          -o "$response_file" \
          -w '%{http_code}' \
          -H "Authorization: Bearer {{ lago_org_api_key }}" \
          "{{ lago_direct_api_local_base_url }}/api/v1/customers/{{ lago_smoke_external_customer_id }}/current_usage?external_subscription_id={{ lago_smoke_external_subscription_id }}"
      )"

      if [ "$status" = "200" ] \
        && tr '[:upper:]' '[:lower:]' <"$response_file" | grep -q "{{ lago_smoke_metric_code | lower }}"; then
        exit 0
      fi

      sleep 5
    done

    cat "$response_file" >&2
    exit 1
  args:
    executable: /bin/bash
  register: lago_verify_current_usage
  changed_when: false
  no_log: true

- name: Verify the Lago front surface listens locally
  ansible.builtin.uri:
    url: "{{ lago_direct_front_local_base_url }}/"
    method: GET
    status_code: 200
  register: lago_verify_front
  retries: 24
  delay: 5
  until: lago_verify_front.status == 200
  changed_when: false
