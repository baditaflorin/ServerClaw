lago_smoke_external_customer_id: lv3-billing-smoke-customer
lago_smoke_customer_name: LV3 Billing Smoke Customer
lago_smoke_customer_email: billing-smoke@lv3.org
lago_smoke_external_subscription_id: lv3-billing-smoke-subscription
