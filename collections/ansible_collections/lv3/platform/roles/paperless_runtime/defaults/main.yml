---
# Purpose: Default runtime inputs for the Paperless document archive and API.

paperless_service_topology: "{{ hostvars['proxmox_florin'].platform_service_topology | platform_service('paperless') }}"
paperless_site_dir: /opt/paperless
paperless_secret_dir: /etc/lv3/paperless
paperless_compose_file: "{{ paperless_site_dir }}/docker-compose.yml"
paperless_env_file: "{{ compose_runtime_secret_root }}/paperless/runtime.env"
paperless_legacy_env_file: "{{ paperless_site_dir }}/paperless.env"
paperless_openbao_agent_dir: "{{ paperless_site_dir }}/openbao"
paperless_openbao_agent_image: "{{ openbao_agent_image }}"
paperless_openbao_agent_container_name: paperless-openbao-agent
paperless_openbao_secret_path: services/paperless/runtime-env
paperless_openbao_api_token_path: services/paperless/api-token
paperless_openbao_policy_name: lv3-service-paperless-runtime
paperless_openbao_approle_name: paperless-runtime
paperless_openbao_runtime_compose_file: "{{ openbao_compose_file | default('/opt/openbao/docker-compose.yml') }}"
paperless_openbao_runtime_service_name: openbao
paperless_openbao_runtime_recovery_enabled: "{{ paperless_openbao_runtime_compose_file | length > 0 }}"
paperless_internal_port: "{{ paperless_service_topology.ports.internal }}"
paperless_internal_base_url: "http://127.0.0.1:{{ paperless_internal_port }}"
paperless_public_base_url: "https://{{ paperless_service_topology.public_hostname }}"
paperless_public_edge_private_ip: "{{ hostvars['proxmox_florin'].proxmox_public_edge_ipv4 }}"
paperless_public_hostname_overrides:
  - hostname: "{{ paperless_service_topology.public_hostname }}"
    address: "{{ paperless_public_edge_private_ip }}"
  - hostname: "{{ hostvars['proxmox_florin'].lv3_service_topology.keycloak.public_hostname }}"
    address: "{{ paperless_public_edge_private_ip }}"
paperless_container_name: paperless
paperless_redis_container_name: paperless-redis
paperless_image: "{{ container_image_catalog.images.paperless_runtime.ref }}"
paperless_redis_image: "{{ container_image_catalog.images.langfuse_redis_runtime.ref }}"
paperless_image_pull_retries: 5
paperless_image_pull_delay_seconds: 5
paperless_database_name: paperless
paperless_database_user: paperless
paperless_database_host: "{{ hostvars[hostvars['proxmox_florin'].postgres_ha.initial_primary].ansible_host }}"
paperless_local_artifact_dir: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/paperless
paperless_database_password_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/paperless/database-password.txt
paperless_secret_key_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/paperless/secret-key.txt
paperless_redis_password_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/paperless/redis-password.txt
paperless_admin_password_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/paperless/admin-password.txt
paperless_api_token_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/paperless/api-token.txt
paperless_taxonomy_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/paperless/taxonomy.json
paperless_sync_report_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/paperless/sync-report.json
paperless_smoke_report_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/paperless/smoke-upload-report.json
paperless_keycloak_client_secret_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/keycloak/paperless-client-secret.txt
paperless_secret_key_remote_file: "{{ paperless_secret_dir }}/secret-key.txt"
paperless_redis_password_remote_file: "{{ paperless_secret_dir }}/redis-password.txt"
paperless_admin_password_remote_file: "{{ paperless_secret_dir }}/admin-password.txt"
paperless_api_token_file: "{{ paperless_secret_dir }}/api-token"
paperless_taxonomy_manifest_file: "{{ paperless_secret_dir }}/taxonomy.json"
paperless_sync_report_file: "{{ paperless_site_dir }}/taxonomy-sync-report.json"
paperless_sync_script: "{{ playbook_dir }}/../scripts/paperless_sync.py"
paperless_keycloak_client_id: paperless
paperless_keycloak_provider_id: keycloak
paperless_keycloak_issuer: https://sso.lv3.org/realms/lv3
paperless_admin_username: admin
paperless_admin_mail: paperless-admin@lv3.org
paperless_timezone: Europe/Bucharest
paperless_ocr_language: eng
paperless_volume_names:
  data: paperless-data
  media: paperless-media
  export: paperless-export
  consume: paperless-consume
paperless_default_sso_group: lv3-platform-users
paperless_default_sso_group_permissions:
  - documents.view_document
  - documents.add_document
  - documents.change_document
  - documents.delete_document
  - documents.view_tag
  - documents.add_tag
  - documents.change_tag
  - documents.view_correspondent
  - documents.add_correspondent
  - documents.change_correspondent
  - documents.view_documenttype
  - documents.add_documenttype
  - documents.change_documenttype
  - documents.view_savedview
  - documents.add_savedview
  - documents.change_savedview
  - documents.delete_savedview
  - documents.view_uisettings
  - documents.add_uisettings
  - documents.change_uisettings
  - documents.delete_uisettings
  - documents.view_sharingtoken
  - documents.add_sharingtoken
  - documents.change_sharingtoken
  - documents.delete_sharingtoken

paperless_taxonomy_manifest:
  schema_version: "1.0.0"
  correspondents:
    - id: lv3-platform
      name: LV3 Platform
    - id: external-vendor
      name: External Vendor
    - id: customer
      name: Customer
  document_types:
    - id: invoice
      name: Invoice
    - id: contract
      name: Contract
    - id: report
      name: Report
  tags:
    - id: compliance
      name: compliance
    - id: finance
      name: finance
    - id: knowledge
      name: knowledge
