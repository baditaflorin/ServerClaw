---
# Dependencies: ADR 0371.
- name: Verify the n8n runtime health
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: n8n
    common_verify_port: "{{ n8n_port }}"
    common_verify_health_url: "{{ n8n_internal_base_url }}/healthz"
    common_verify_health_retries: 24
    common_verify_health_delay: 5
    common_verify_extra_endpoints:
      - url: "{{ n8n_internal_base_url }}/healthz/readiness"
        retries: 24
        delay: 5

- name: Verify n8n owner sign-in works
  ansible.builtin.uri:
    url: "{{ n8n_internal_base_url }}/rest/login"
    method: POST
    body_format: json
    body:
      emailOrLdapLoginId: "{{ n8n_owner_email }}"
      password: "{{ n8n_owner_password }}"
    return_content: true
    status_code: 200
  register: n8n_verify_login
  changed_when: false
  no_log: true

- name: Assert the n8n sign-in returned the expected account
  ansible.builtin.assert:
    that:
      - n8n_verify_login.json.data.email == n8n_owner_email
      - n8n_verify_login.json.data.role == 'global:owner'
    fail_msg: "n8n answered locally, but the repo-managed owner account could not authenticate."
  no_log: true
