---
- name: Validate n8n runtime inputs
  ansible.builtin.assert:
    that:
      - n8n_site_dir | length > 0
      - n8n_data_dir | length > 0
      - n8n_secret_dir | length > 0
      - n8n_compose_file | length > 0
      - n8n_env_file | length > 0
      - n8n_image | length > 0
      - n8n_container_name | length > 0
      - n8n_port | int > 0
      - n8n_internal_base_url | length > 0
      - n8n_public_base_url | length > 0
      - n8n_public_hostname | length > 0
      - n8n_database_host | length > 0
      - n8n_database_name | length > 0
      - n8n_database_user | length > 0
      - n8n_database_password_local_file | length > 0
      - n8n_owner_email | length > 0
      - n8n_owner_first_name | length > 0
      - n8n_owner_last_name | length > 0
    fail_msg: >-
      n8n_runtime requires compose paths, image, service URLs, PostgreSQL credentials,
      and owner bootstrap settings.

- name: Ensure the n8n database password exists on the control machine
  ansible.builtin.stat:
    path: "{{ n8n_database_password_local_file }}"
  delegate_to: localhost
  become: false
  register: n8n_database_password_local

- name: Fail if the n8n database password is missing locally
  ansible.builtin.fail:
    msg: >-
      {{ n8n_database_password_local_file }} is missing on the control machine.
      Run the n8n PostgreSQL converge first so the runtime can connect to postgres-lv3.
  when: not n8n_database_password_local.stat.exists

- name: Ensure the n8n runtime packages are present
  ansible.builtin.apt:
    name:
      - openssl
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure the n8n directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ n8n_site_dir }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ n8n_data_dir }}"
      owner: "1000"
      group: "1000"
      mode: "0755"
    - path: "{{ n8n_secret_dir }}"
      owner: root
      group: root
      mode: "0700"

- name: Generate the n8n owner password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ n8n_owner_password_remote_file }}" ]; then
      umask 077
      openssl rand -base64 24 | tr -d '\n' > "{{ n8n_owner_password_remote_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: n8n_owner_password_generation
  changed_when: "'changed' in n8n_owner_password_generation.stdout"
  no_log: true

- name: Generate the n8n encryption key
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ n8n_encryption_key_remote_file }}" ]; then
      umask 077
      openssl rand -hex 32 > "{{ n8n_encryption_key_remote_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: n8n_encryption_key_generation
  changed_when: "'changed' in n8n_encryption_key_generation.stdout"
  no_log: true

- name: Read the n8n owner password
  ansible.builtin.slurp:
    src: "{{ n8n_owner_password_remote_file }}"
  register: n8n_owner_password_raw
  no_log: true

- name: Read the n8n encryption key
  ansible.builtin.slurp:
    src: "{{ n8n_encryption_key_remote_file }}"
  register: n8n_encryption_key_raw
  no_log: true

- name: Record the n8n runtime secrets
  ansible.builtin.set_fact:
    n8n_owner_password: "{{ n8n_owner_password_raw.content | b64decode | trim }}"
    n8n_encryption_key: "{{ n8n_encryption_key_raw.content | b64decode | trim }}"
    n8n_runtime_secret_payload:
      DB_POSTGRESDB_PASSWORD: "{{ lookup('ansible.builtin.file', n8n_database_password_local_file) | trim }}"
      N8N_ENCRYPTION_KEY: "{{ n8n_encryption_key_raw.content | b64decode | trim }}"
  no_log: true

- name: Ensure the local n8n artifact directory exists
  ansible.builtin.file:
    path: "{{ n8n_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Mirror the n8n bootstrap secrets to the control machine
  ansible.builtin.copy:
    dest: "{{ item.dest }}"
    content: "{{ item.content }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  loop:
    - dest: "{{ n8n_owner_password_local_file }}"
      content: "{{ n8n_owner_password }}"
    - dest: "{{ n8n_encryption_key_local_file }}"
      content: "{{ n8n_encryption_key }}"
  no_log: true

- name: Prepare OpenBao agent runtime secret injection for n8n
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: openbao_compose_env
  vars:
    common_openbao_compose_env_service_name: n8n
    common_openbao_compose_env_agent_dir: "{{ n8n_openbao_agent_dir }}"
    common_openbao_compose_env_runtime_dir: "{{ n8n_env_file | dirname }}"
    common_openbao_compose_env_env_file: "{{ n8n_env_file }}"
    common_openbao_compose_env_secret_path: "{{ n8n_openbao_secret_path }}"
    common_openbao_compose_env_secret_payload: "{{ n8n_runtime_secret_payload }}"
    common_openbao_compose_env_policy_name: "{{ n8n_openbao_policy_name }}"
    common_openbao_compose_env_policy_rules: |
      path "sys/health" {
        capabilities = ["read"]
      }

      path "kv/data/{{ n8n_openbao_secret_path }}" {
        capabilities = ["read"]
      }

      path "kv/metadata/{{ n8n_openbao_secret_path }}" {
        capabilities = ["read", "list"]
      }
    common_openbao_compose_env_approle_name: "{{ n8n_openbao_approle_name }}"
    common_openbao_compose_env_agent_config_file: "{{ n8n_openbao_agent_dir }}/agent.hcl"
    common_openbao_compose_env_agent_template_file: "{{ n8n_openbao_agent_dir }}/runtime.env.ctmpl"
    common_openbao_compose_env_agent_template_src: n8n.env.ctmpl.j2
    common_openbao_compose_env_role_id_file: "{{ n8n_openbao_agent_dir }}/role_id"
    common_openbao_compose_env_secret_id_file: "{{ n8n_openbao_agent_dir }}/secret_id"
    common_openbao_compose_env_image: "{{ n8n_openbao_agent_image }}"
    common_openbao_compose_env_legacy_env_files:
      - "{{ n8n_legacy_env_file }}"
  no_log: true

- name: Render the n8n environment file
  ansible.builtin.template:
    src: n8n.env.j2
    dest: "{{ n8n_env_file }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Render the n8n compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ n8n_compose_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Pull the n8n image
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ n8n_compose_file }}"
      - pull
  args:
    chdir: "{{ n8n_site_dir }}"
  register: n8n_pull
  changed_when: >-
    'Pulling' in n8n_pull.stdout
    or 'Downloaded newer image' in n8n_pull.stdout
    or 'Pull complete' in n8n_pull.stdout

- name: Check whether the Docker nat chain exists before n8n startup
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - nat
      - -S
      - DOCKER
  register: n8n_docker_nat_chain_check
  changed_when: false
  failed_when: n8n_docker_nat_chain_check.rc not in [0, 1]

- name: Check whether the Docker forward chain exists before n8n startup
  ansible.builtin.command:
    argv:
      - iptables
      - -S
      - DOCKER-FORWARD
  register: n8n_docker_forward_chain_check
  changed_when: false
  failed_when: n8n_docker_forward_chain_check.rc not in [0, 1]

- name: Restart Docker when the nat or forward chain is missing before n8n startup
  ansible.builtin.service:
    name: docker
    state: restarted
  when: n8n_docker_nat_chain_check.rc == 1 or n8n_docker_forward_chain_check.rc == 1

- name: Recheck the Docker nat chain before n8n startup
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - nat
      - -S
      - DOCKER
  register: n8n_docker_nat_chain_recheck
  changed_when: false
  retries: 6
  delay: 2
  until: n8n_docker_nat_chain_recheck.rc == 0

- name: Recheck the Docker forward chain before n8n startup
  ansible.builtin.command:
    argv:
      - iptables
      - -S
      - DOCKER-FORWARD
  register: n8n_docker_forward_chain_recheck
  changed_when: false
  retries: 6
  delay: 2
  until: n8n_docker_forward_chain_recheck.rc == 0

- name: Assert Docker bridge chains are present before n8n startup
  ansible.builtin.assert:
    that:
      - n8n_docker_nat_chain_recheck.rc == 0
      - n8n_docker_forward_chain_recheck.rc == 0
    fail_msg: "Docker is running but the nat DOCKER or filter DOCKER-FORWARD chain is missing; n8n bridge networking will fail."

- name: Start the n8n runtime and recover Docker bridge-chain failures
  block:
    - name: Start the n8n runtime
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ n8n_compose_file }}"
          - up
          - -d
          - --remove-orphans
      args:
        chdir: "{{ n8n_site_dir }}"
      register: n8n_up
      changed_when: >-
        'Creating' in n8n_up.stdout
        or 'Recreating' in n8n_up.stdout
        or 'Starting' in n8n_up.stdout
  rescue:
    - name: Flag Docker bridge-chain failures during n8n startup
      ansible.builtin.set_fact:
        n8n_docker_bridge_chain_missing: >-
          {{
            'No chain/target/match by that name' in (ansible_failed_result.stderr | default(''))
            or 'Unable to enable ACCEPT OUTGOING rule' in (ansible_failed_result.stderr | default(''))
          }}

    - name: Surface unexpected n8n startup failures
      ansible.builtin.fail:
        msg: "{{ ansible_failed_result.stderr | default(ansible_failed_result.msg | default('n8n compose up failed')) }}"
      when: not n8n_docker_bridge_chain_missing

    - name: Restart Docker to restore bridge chains before retrying n8n startup
      ansible.builtin.service:
        name: docker
        state: restarted
      when: n8n_docker_bridge_chain_missing

    - name: Retry n8n startup after Docker bridge-chain recovery
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ n8n_compose_file }}"
          - up
          - -d
          - --remove-orphans
      args:
        chdir: "{{ n8n_site_dir }}"
      register: n8n_up
      changed_when: true
      when: n8n_docker_bridge_chain_missing

- name: Wait for n8n to listen locally
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ n8n_port }}"
    delay: 0
    timeout: 180

- name: Wait for the n8n liveness endpoint
  ansible.builtin.uri:
    url: "{{ n8n_internal_base_url }}/healthz"
    method: GET
    status_code: 200
  register: n8n_healthz
  retries: 24
  delay: 5
  until: n8n_healthz.status == 200
  changed_when: false

- name: Wait for the n8n readiness endpoint
  ansible.builtin.uri:
    url: "{{ n8n_internal_base_url }}/healthz/readiness"
    method: GET
    status_code: 200
  register: n8n_readiness
  retries: 24
  delay: 5
  until: n8n_readiness.status == 200
  changed_when: false

- name: Bootstrap the n8n owner account when needed
  ansible.builtin.uri:
    url: "{{ n8n_internal_base_url }}/rest/owner/setup"
    method: POST
    body_format: json
    body:
      email: "{{ n8n_owner_email }}"
      firstName: "{{ n8n_owner_first_name }}"
      lastName: "{{ n8n_owner_last_name }}"
      password: "{{ n8n_owner_password }}"
    return_content: true
    status_code:
      - 200
      - 400
  register: n8n_owner_setup
  changed_when: n8n_owner_setup.status == 200
  failed_when: >-
    n8n_owner_setup.status not in [200, 400]
    or (
      n8n_owner_setup.status == 400
      and 'Instance owner already setup' not in (
        n8n_owner_setup.json.message
        | default(n8n_owner_setup.content)
        | string
      )
    )
  no_log: true

- name: Verify n8n owner sign-in works
  ansible.builtin.uri:
    url: "{{ n8n_internal_base_url }}/rest/login"
    method: POST
    body_format: json
    body:
      emailOrLdapLoginId: "{{ n8n_owner_email }}"
      password: "{{ n8n_owner_password }}"
    return_content: true
    status_code: 200
  register: n8n_login
  changed_when: false
  no_log: true

- name: Assert the n8n owner sign-in returned the expected account
  ansible.builtin.assert:
    that:
      - n8n_login.json.data.email == n8n_owner_email
      - n8n_login.json.data.role == 'global:owner'
    fail_msg: "n8n started, but the repo-managed owner bootstrap could not be verified."
  no_log: true
