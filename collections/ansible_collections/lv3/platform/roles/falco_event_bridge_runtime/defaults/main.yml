---
falco_event_bridge_repo_root: "{{ inventory_dir | dirname }}"
falco_event_bridge_service_name: lv3-falco-event-bridge
falco_event_bridge_service_file: "/etc/systemd/system/{{ falco_event_bridge_service_name }}.service"
falco_event_bridge_listen_host: 0.0.0.0
falco_event_bridge_listen_port: "{{ hostvars[platform_topology_host].platform_port_assignments.falco_event_bridge_port }}"
falco_event_bridge_source_host: docker-runtime-lv3
falco_event_bridge_actor_id: falco-event-bridge
falco_event_bridge_event_topic: platform.security.falco
falco_event_bridge_nats_subject: platform.security.falco
falco_event_bridge_nats_host: >-
  {{
    (
      hostvars[platform_topology_host].proxmox_guests
      | selectattr('name', 'equalto', 'runtime-control-lv3')
      | map(attribute='ipv4')
      | first
    ) | default('127.0.0.1', true)
  }}
falco_event_bridge_nats_port: 4222
falco_event_bridge_nats_username: jetstream-admin
falco_event_bridge_nats_password_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/nats/jetstream-admin-password.txt
falco_event_bridge_ntfy_base_url: "http://127.0.0.1:{{ hostvars[platform_topology_host].platform_port_assignments.ntfy_port }}"
falco_event_bridge_ntfy_topic: platform-security-critical
falco_event_bridge_ntfy_username: alertmanager
falco_event_bridge_ntfy_password_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/ntfy/alertmanager-password.txt
falco_event_bridge_mutation_audit_file: /var/log/platform/mutation-audit.jsonl
falco_event_bridge_http_timeout_seconds: 5
falco_event_bridge_script_sources:
  - src: "{{ falco_event_bridge_repo_root }}/scripts/falco_event_bridge.py"
    dest: "{{ falco_event_bridge_site_dir }}/falco_event_bridge.py"
  - src: "{{ falco_event_bridge_repo_root }}/scripts/falco_event_bridge_server.py"
    dest: "{{ falco_event_bridge_site_dir }}/falco_event_bridge_server.py"
