---
# Purpose: Create and maintain the PostgreSQL role and database used by Flagsmith.

- name: Validate Flagsmith PostgreSQL inputs
  ansible.builtin.assert:
    that:
      - flagsmith_database_name | length > 0
      - flagsmith_database_user | length > 0
      - flagsmith_postgres_secret_dir | length > 0
      - flagsmith_postgres_password_file | length > 0
      - flagsmith_database_password_local_file | length > 0
    fail_msg: "flagsmith_postgres requires database names and password paths."

- name: Ensure the Flagsmith PostgreSQL secret directory exists
  ansible.builtin.file:
    path: "{{ flagsmith_postgres_secret_dir }}"
    state: directory
    owner: root
    group: postgres
    mode: "0750"

- name: Ensure the local Flagsmith artifact directory exists
  ansible.builtin.file:
    path: "{{ flagsmith_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate the Flagsmith database password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ flagsmith_database_password_local_file }}" ]; then
      umask 077
      openssl rand -hex 24 > "{{ flagsmith_database_password_local_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: flagsmith_postgres_password_generation
  changed_when: "'changed' in flagsmith_postgres_password_generation.stdout"
  no_log: true

- name: Read the Flagsmith database password
  ansible.builtin.slurp:
    src: "{{ flagsmith_database_password_local_file }}"
  delegate_to: localhost
  become: false
  register: flagsmith_postgres_password_raw
  no_log: true

- name: Record the Flagsmith database password
  ansible.builtin.set_fact:
    flagsmith_database_password: "{{ flagsmith_postgres_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Persist the Flagsmith database password on the PostgreSQL member
  ansible.builtin.copy:
    dest: "{{ flagsmith_postgres_password_file }}"
    content: "{{ flagsmith_database_password }}\n"
    owner: root
    group: postgres
    mode: "0640"
  no_log: true

- name: Check whether the local PostgreSQL member is writable
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT CASE WHEN pg_is_in_recovery() THEN 0 ELSE 1 END"
  register: flagsmith_postgres_writable_check
  changed_when: false

- name: Check whether the Flagsmith role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ flagsmith_database_user }}'"
  register: flagsmith_postgres_role_check
  changed_when: false
  when: flagsmith_postgres_writable_check.stdout | trim == "1"

- name: Create the Flagsmith role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - >-
        CREATE ROLE {{ flagsmith_database_user }} LOGIN
        PASSWORD '{{ flagsmith_database_password }}'
  changed_when: true
  no_log: true
  when:
    - flagsmith_postgres_writable_check.stdout | trim == "1"
    - flagsmith_postgres_role_check.stdout != "1"

- name: Ensure the Flagsmith role password matches the managed secret
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER ROLE {{ flagsmith_database_user }} PASSWORD '{{ flagsmith_database_password }}'"
  changed_when: false
  no_log: true
  when: flagsmith_postgres_writable_check.stdout | trim == "1"

- name: Check whether the Flagsmith PostgreSQL database already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_database WHERE datname = '{{ flagsmith_database_name }}'"
  register: flagsmith_postgres_database_check
  changed_when: false
  when: flagsmith_postgres_writable_check.stdout | trim == "1"

- name: Create the Flagsmith PostgreSQL database
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE DATABASE {{ flagsmith_database_name }} OWNER {{ flagsmith_database_user }}"
  changed_when: true
  when:
    - flagsmith_postgres_writable_check.stdout | trim == "1"
    - flagsmith_postgres_database_check.stdout != "1"

- name: Ensure the Flagsmith database owner is correct
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER DATABASE {{ flagsmith_database_name }} OWNER TO {{ flagsmith_database_user }}"
  changed_when: false
  when: flagsmith_postgres_writable_check.stdout | trim == "1"
