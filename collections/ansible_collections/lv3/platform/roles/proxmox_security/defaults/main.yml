---
proxmox_notification_email: "{{ platform_operator_email }}"
proxmox_notification_author: "Proxmox {{ platform_domain | split('.') | first | upper }}"
proxmox_notification_endpoint_name: "{{ platform_domain | split('.') | first }}-ops-email"
proxmox_notification_endpoint_comment: "{{ platform_domain | split('.') | first | upper }} operations mailbox"
proxmox_notification_matcher_name: "{{ platform_domain | split('.') | first }}-all-events"
proxmox_notification_matcher_comment: "Send all Proxmox notifications to {{ platform_domain | split('.') | first | upper }} operations"
proxmox_acme_account_name: default
proxmox_acme_contact_email: "{{ platform_operator_email }}"
proxmox_acme_directory: https://acme-v02.api.letsencrypt.org/directory
proxmox_acme_plugin_id: "{{ platform_domain | split('.') | first }}-hetzner-dns"
proxmox_acme_domain: "proxmox.{{ platform_domain }}"
proxmox_acme_validation_delay: 30
proxmox_security_manage_acme: true
proxmox_tfa_description: Primary TOTP
proxmox_management_allowed_tcp_ports: []
proxmox_breakglass_ssh_port: 2222
