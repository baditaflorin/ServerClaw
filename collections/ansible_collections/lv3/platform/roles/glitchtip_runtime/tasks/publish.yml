---
# Purpose: Verify the public GlitchTip publication and end-to-end event ingestion path.

- name: Validate GlitchTip publication inputs
  ansible.builtin.assert:
    that:
      - glitchtip_public_base_url | length > 0
      - glitchtip_api_token_local_file | length > 0
      - glitchtip_platform_findings_event_url_local_file | length > 0
    fail_msg: >-
      glitchtip_runtime publication requires the public URL plus the
      controller-local API token and DSN artifact paths.

- name: Check whether the GlitchTip API token exists on the control machine
  ansible.builtin.stat:
    path: "{{ glitchtip_api_token_local_file }}"
  register: glitchtip_api_token_local

- name: Check whether the GlitchTip platform findings DSN exists on the control machine
  ansible.builtin.stat:
    path: "{{ glitchtip_platform_findings_event_url_local_file }}"
  register: glitchtip_platform_findings_dsn_local

- name: Fail if the GlitchTip API token is missing locally
  ansible.builtin.fail:
    msg: >-
      {{ glitchtip_api_token_local_file }} is missing on the control machine.
      Converge the GlitchTip runtime first so the bootstrap role can mint the API token.
  when: not glitchtip_api_token_local.stat.exists

- name: Fail if the GlitchTip platform findings DSN is missing locally
  ansible.builtin.fail:
    msg: >-
      {{ glitchtip_platform_findings_event_url_local_file }} is missing on the control machine.
      Converge the GlitchTip runtime first so the bootstrap role can export the repo-managed DSNs.
  when: not glitchtip_platform_findings_dsn_local.stat.exists

- name: Select controller-local quiet-window hosts for GlitchTip publication
  ansible.builtin.set_fact:
    glitchtip_publication_quiet_hosts: >-
      {{
        ['docker-runtime-staging-lv3', 'nginx-staging-lv3']
        if (env | default('production')) == 'staging'
        else ['docker-runtime-lv3', 'nginx-lv3']
      }}

- name: Verify the GlitchTip public surface with a controller-local quiet-window retry
  block:
    - name: Wait for a controller-local quiet window before public GlitchTip verification
      ansible.builtin.command: >-
        python3 {{ inventory_dir }}/../scripts/await_ansible_quiet.py
        --label glitchtip-publication
        --wait-seconds 1800
        --quiet-seconds 30
        --poll-seconds 5
        {% for host in glitchtip_publication_quiet_hosts %}
        --host {{ host }}
        {% endfor %}
      changed_when: false

    - name: Verify the GlitchTip public surface
      ansible.builtin.include_tasks: publish_verify.yml
  rescue:
    - name: Wait for a controller-local quiet window before retrying public GlitchTip verification
      ansible.builtin.command: >-
        python3 {{ inventory_dir }}/../scripts/await_ansible_quiet.py
        --label glitchtip-publication-retry
        --wait-seconds 1800
        --quiet-seconds 30
        --poll-seconds 5
        {% for host in glitchtip_publication_quiet_hosts %}
        --host {{ host }}
        {% endfor %}
      changed_when: false

    - name: Retry the GlitchTip public surface verification
      ansible.builtin.include_tasks: publish_verify.yml
