---
# Purpose: Verify the local GlitchTip runtime health after compose convergence.
# Dependencies: ADR 0165 and ADR 0371.
- name: Verify the GlitchTip runtime
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: glitchtip
    common_verify_port: "{{ glitchtip_internal_port }}"
    common_verify_health_url: "{{ glitchtip_internal_base_url }}/api/0/internal/health/"
    common_verify_health_retries: 12
    common_verify_health_delay: 5
