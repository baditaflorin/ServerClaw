---
# Dependencies: ADR 0371.
- name: Verify the PostgreSQL HA runtime health
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: patroni
    common_verify_port: "{{ postgres_ha_cluster.postgres_port }}"
    common_verify_port_timeout: 60
    common_verify_health_url: "http://127.0.0.1:{{ postgres_ha_cluster.patroni_rest_port }}/patroni"
    common_verify_health_retries: 12
    common_verify_health_delay: 3
    common_verify_health_assertions:
      - "common_verify_health_response.json.role in ['leader', 'replica']"
      - "common_verify_health_response.json.state in ['running', 'streaming']"
    common_verify_health_assertion_msg: "Patroni is not reporting a healthy leader or replica state."

- name: Verify the cluster membership from the initial primary
  ansible.builtin.command:
    argv:
      - patronictl
      - -c
      - "{{ postgres_ha_patroni_config_file }}"
      - list
      - --format
      - json
  register: postgres_ha_cluster_list
  changed_when: false
  run_once: true
  delegate_to: "{{ postgres_ha_cluster.initial_primary }}"

- name: Assert both PostgreSQL members are present in Patroni
  ansible.builtin.assert:
    that:
      - (postgres_ha_cluster_list.stdout | from_json) | length == 2
    fail_msg: "Patroni did not report the expected two-member PostgreSQL cluster."
  run_once: true
  delegate_to: localhost
