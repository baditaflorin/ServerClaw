---
# Purpose: Converge the ADR 0302 restic file-level backup runtime on docker-runtime-lv3.
# Use case: Run from playbooks/restic-config-backup.yml to install the systemd timer, OpenBao runtime credential bundle, and initial backup replay.
# Inputs: Repo checkout path, controller-local password artifacts, and OpenBao helper defaults.
# Outputs: Managed restic backup service, timer, runtime state directories, and OpenBao-backed credential delivery.
# Idempotency: Idempotent; reruns only rewrite managed files and restart the timer if inputs changed.
# Dependencies: ADR 0165, ADR 0302, and the lv3.platform.common OpenBao credential helper.

- name: Validate restic config backup inputs
  ansible.builtin.assert:
    that:
      - restic_config_backup_runtime_root | length > 0
      - restic_config_backup_runtime_config_dir | length > 0
      - restic_config_backup_runtime_state_dir | length > 0
      - restic_config_backup_runtime_script | length > 0
      - restic_config_backup_repo_checkout_host_path | length > 0
      - restic_config_backup_runtime_openbao_secret_path | length > 0
      - restic_config_backup_runtime_openbao_policy_name | length > 0
      - restic_config_backup_runtime_openbao_approle_name | length > 0
      - restic_config_backup_runtime_openbao_agent_dir | length > 0
      - restic_config_backup_runtime_credential_dir | length > 0
      - restic_config_backup_runtime_credential_file | length > 0
      - openbao_init_local_file | length > 0
    fail_msg: "restic_config_backup requires runtime paths, the repo checkout mirror, and OpenBao bootstrap inputs."

- name: Ensure the worker checkout exists on docker-runtime-lv3
  ansible.builtin.stat:
    path: "{{ restic_config_backup_repo_checkout_host_path }}"
  register: restic_config_backup_repo_checkout

- name: Fail when the worker checkout is missing
  ansible.builtin.assert:
    that:
      - restic_config_backup_repo_checkout.stat.exists
      - restic_config_backup_repo_checkout.stat.isdir
    fail_msg: >-
      {{ restic_config_backup_repo_checkout_host_path }} is missing on docker-runtime-lv3.
      Converge Windmill first so the worker checkout mirror exists before ADR 0302 is enabled.

- name: Ensure controller-local restic password directory exists
  ansible.builtin.file:
    path: "{{ restic_config_backup_repository_password_local_file | dirname }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate the controller-local restic repository password when missing
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ restic_config_backup_repository_password_local_file }}" ]; then
      openssl rand -base64 48 > "{{ restic_config_backup_repository_password_local_file }}"
      chmod 600 "{{ restic_config_backup_repository_password_local_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: restic_config_backup_password_generate
  changed_when: "'changed' in restic_config_backup_password_generate.stdout"

- name: Read the controller-local restic repository password
  ansible.builtin.set_fact:
    restic_config_backup_repository_password: >-
      {{
        lookup('ansible.builtin.file', restic_config_backup_repository_password_local_file) | trim
      }}
    restic_config_backup_minio_secret_key: >-
      {{
        lookup('ansible.builtin.file', restic_config_backup_minio_secret_key_local_file) | trim
      }}
    restic_config_backup_nats_password: >-
      {{
        lookup('ansible.builtin.file', restic_config_backup_nats_password_local_file) | trim
      }}
    restic_config_backup_ntfy_token: >-
      {{
        lookup('ansible.builtin.file', restic_config_backup_ntfy_token_local_file) | trim
      }}
  delegate_to: localhost
  become: false

- name: Assert restic runtime secrets are available locally
  ansible.builtin.assert:
    that:
      - restic_config_backup_repository_password | length > 0
      - restic_config_backup_minio_secret_key | length > 0
      - restic_config_backup_nats_password | length > 0
      - restic_config_backup_ntfy_token | length > 0
    fail_msg: "Controller-local restic, MinIO, NATS, or ntfy token credentials are missing."

- name: Install restic runtime packages
  ansible.builtin.apt:
    name:
      - restic
      - python3
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure the restic runtime directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ restic_config_backup_runtime_root }}"
      mode: "0755"
    - path: "{{ restic_config_backup_runtime_config_dir }}"
      mode: "0700"
    - path: "{{ restic_config_backup_runtime_state_dir }}"
      mode: "0700"
    - path: "{{ restic_config_backup_runtime_cache_dir }}"
      mode: "0700"
    - path: "{{ restic_config_backup_runtime_openbao_agent_dir }}"
      mode: "0700"

- name: Render the runtime restic catalog
  ansible.builtin.copy:
    src: "{{ restic_config_backup_controller_catalog_local_file }}"
    dest: "{{ restic_config_backup_runtime_catalog_path }}"
    owner: root
    group: root
    mode: "0644"

- name: Record the restic runtime credential payload
  ansible.builtin.set_fact:
    restic_config_backup_runtime_config_payload:
      restic_password: "{{ restic_config_backup_repository_password }}"
      minio_secret_key: "{{ restic_config_backup_minio_secret_key }}"
      nats_password: "{{ restic_config_backup_nats_password }}"
      ntfy_token: "{{ restic_config_backup_ntfy_token }}"

- name: Provision OpenBao-backed systemd credentials for the restic backup service
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: openbao_systemd_credentials
  vars:
    common_openbao_systemd_credentials_service_name: restic-config-backup
    common_openbao_systemd_credentials_agent_dir: "{{ restic_config_backup_runtime_openbao_agent_dir }}"
    common_openbao_systemd_credentials_credential_dir: "{{ restic_config_backup_runtime_credential_dir }}"
    common_openbao_systemd_credentials_credential_file: "{{ restic_config_backup_runtime_credential_file }}"
    common_openbao_systemd_credentials_secret_path: "{{ restic_config_backup_runtime_openbao_secret_path }}"
    common_openbao_systemd_credentials_secret_payload: "{{ restic_config_backup_runtime_openbao_secret_payload }}"
    common_openbao_systemd_credentials_policy_name: "{{ restic_config_backup_runtime_openbao_policy_name }}"
    common_openbao_systemd_credentials_policy_rules: "{{ restic_config_backup_runtime_openbao_policy_rules }}"
    common_openbao_systemd_credentials_approle_name: "{{ restic_config_backup_runtime_openbao_approle_name }}"
    common_openbao_systemd_credentials_agent_config_file: "{{ restic_config_backup_runtime_openbao_agent_config_file }}"
    common_openbao_systemd_credentials_agent_template_file: "{{ restic_config_backup_runtime_openbao_agent_template_file }}"
    common_openbao_systemd_credentials_agent_template_content: >-
      [[ with secret "kv/data/{{ restic_config_backup_runtime_openbao_secret_path }}" ]][[ .Data.data.runtime_config_json ]][[ end ]]
    common_openbao_systemd_credentials_role_id_file: "{{ restic_config_backup_runtime_openbao_role_id_file }}"
    common_openbao_systemd_credentials_secret_id_file: "{{ restic_config_backup_runtime_openbao_secret_id_file }}"
    common_openbao_systemd_credentials_image: "{{ openbao_agent_image }}"
    common_openbao_systemd_credentials_agent_service_name: "{{ restic_config_backup_runtime_openbao_agent_service_name }}"
    common_openbao_systemd_credentials_container_name: "{{ restic_config_backup_runtime_openbao_agent_container_name }}"

- name: Render the restic runtime wrapper
  ansible.builtin.template:
    src: lv3-restic-config-backup.sh.j2
    dest: "{{ restic_config_backup_runtime_script }}"
    owner: root
    group: root
    mode: "0755"

- name: Render the restic systemd service
  ansible.builtin.template:
    src: lv3-restic-config-backup.service.j2
    dest: "/etc/systemd/system/{{ restic_config_backup_service_name }}"
    owner: root
    group: root
    mode: "0644"

- name: Render the restic systemd timer
  ansible.builtin.template:
    src: lv3-restic-config-backup.timer.j2
    dest: "/etc/systemd/system/{{ restic_config_backup_timer_name }}"
    owner: root
    group: root
    mode: "0644"

- name: Sync restic runtime support files into the worker checkout
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ restic_config_backup_repo_checkout_host_path }}/{{ item.dest }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - src: "{{ playbook_dir | dirname }}/scripts/restic_config_backup.py"
      dest: scripts/restic_config_backup.py
      mode: "0755"
    - src: "{{ playbook_dir | dirname }}/scripts/script_bootstrap.py"
      dest: scripts/script_bootstrap.py
      mode: "0644"
    - src: "{{ playbook_dir | dirname }}/scripts/controller_automation_toolkit.py"
      dest: scripts/controller_automation_toolkit.py
      mode: "0644"
    - src: "{{ playbook_dir | dirname }}/config/restic-file-backup-catalog.json"
      dest: config/restic-file-backup-catalog.json
      mode: "0644"

- name: Check whether the shared MinIO container exists
  ansible.builtin.command:
    argv:
      - docker
      - ps
      - -a
      - --filter
      - "name={{ restic_config_backup_minio_container_name }}"
      - --format
      - "{{ '{{' }}.Names{{ '}}' }}"
  register: restic_config_backup_minio_container_present
  changed_when: false

- name: Assert the shared MinIO container exists
  ansible.builtin.assert:
    that:
      - >-
        restic_config_backup_minio_container_present.stdout_lines
        | select('equalto', restic_config_backup_minio_container_name)
        | list
        | length
        == 1
    fail_msg: >-
      {{ restic_config_backup_minio_container_name }} is missing on docker-runtime-lv3.
      Converge MinIO before enabling ADR 0302 restic backups.

- name: Check whether the shared MinIO container is already running
  ansible.builtin.command:
    argv:
      - docker
      - ps
      - --filter
      - "name={{ restic_config_backup_minio_container_name }}"
      - --filter
      - status=running
      - --format
      - "{{ '{{' }}.Names{{ '}}' }}"
  register: restic_config_backup_minio_container_running
  changed_when: false

- name: Start the shared MinIO container when it is stopped
  ansible.builtin.command:
    argv:
      - docker
      - start
      - "{{ restic_config_backup_minio_container_name }}"
  register: restic_config_backup_minio_container_start
  changed_when: true
  when: >-
    restic_config_backup_minio_container_running.stdout_lines
    | select('equalto', restic_config_backup_minio_container_name)
    | list
    | length
    == 0

- name: Wait for the shared MinIO container to report running
  ansible.builtin.command:
    argv:
      - docker
      - ps
      - --filter
      - "name={{ restic_config_backup_minio_container_name }}"
      - --filter
      - status=running
      - --format
      - "{{ '{{' }}.Names{{ '}}' }}"
  register: restic_config_backup_minio_container_running_verify
  changed_when: false
  retries: 12
  delay: 5
  until: >-
    (
      restic_config_backup_minio_container_running_verify.stdout_lines
      | select('equalto', restic_config_backup_minio_container_name)
      | list
      | length
    ) == 1

- name: Ensure the MinIO restic bucket exists with object lock
  ansible.builtin.shell: |
    set -euo pipefail
    container_name={{ restic_config_backup_minio_container_name | quote }}
    if ! docker inspect "$container_name" >/dev/null 2>&1; then
      if docker inspect outline-minio >/dev/null 2>&1; then
        container_name=outline-minio
      else
        echo "unable to find MinIO container: tried $container_name and outline-minio" >&2
        exit 1
      fi
    fi
    if [ "$(docker inspect --format '{% raw %}{{.State.Running}}{% endraw %}' "$container_name")" != "true" ]; then
      docker start "$container_name" >/dev/null
    fi
    docker exec \
      -e MINIO_ROOT_USER={{ restic_config_backup_minio_access_key | quote }} \
      -e MINIO_ROOT_PASSWORD={{ restic_config_backup_minio_secret_key | quote }} \
      "$container_name" sh -ceu '
        mc alias set local http://127.0.0.1:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" >/dev/null
        mc mb --ignore-existing --with-lock local/restic-config-backup >/dev/null
        mc version enable local/restic-config-backup >/dev/null
      '
  args:
    executable: /bin/bash
  register: restic_config_backup_bucket_bootstrap
  changed_when: false
  retries: 12
  delay: 5
  until: restic_config_backup_bucket_bootstrap.rc == 0

- name: Enable and start the restic backup timer
  ansible.builtin.systemd:
    name: "{{ restic_config_backup_timer_name }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Run the restic backup service immediately
  ansible.builtin.command:
    argv:
      - systemctl
      - start
      - "{{ restic_config_backup_service_name }}"
  register: restic_config_backup_run_now
  changed_when: true
  when: restic_config_backup_run_backup_now | bool
