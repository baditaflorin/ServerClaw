# Purpose: Declare the supported input contract for the ADR 0302 restic config backup role.
# Use case: Loaded by Ansible to validate restic backup role variables before execution on docker-runtime.
# Inputs: Role variables covering repo checkout mirroring, MinIO repository settings, runtime paths, and controller-local password artifacts.
# Outputs: Provides argument specifications used by Ansible role validation.
# Idempotency: Fully idempotent because this file only documents the role interface.
# Dependencies: ADR 0165 and ADR 0302.
---
argument_specs:
  main:
    short_description: Converge ADR 0302 restic-backed file-level backup automation.
    options:
      restic_config_backup_repo_checkout_host_path:
        type: str
        required: true
        description:
          - Absolute repo checkout path mirrored onto docker-runtime.
      restic_config_backup_runtime_catalog_path:
        type: str
        required: false
        description:
          - Absolute runtime path for the deployed ADR 0302 restic catalog on docker-runtime.
      restic_config_backup_controller_catalog_local_file:
        type: str
        required: false
        description:
          - Controller-local source path for the repo-managed ADR 0302 restic catalog JSON.
      restic_config_backup_fallback_script_path:
        type: str
        required: false
        description:
          - Absolute fallback script path used when the worker checkout mirror is missing the ADR 0302 entrypoint.
      restic_config_backup_minio_container_name:
        type: str
        required: false
        description:
          - Docker container name for the shared MinIO runtime that hosts the ADR 0302 Restic repository.
