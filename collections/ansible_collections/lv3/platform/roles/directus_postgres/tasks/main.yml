# Purpose: Create and maintain the PostgreSQL role, database, and durable service token used by Directus.
# Use case: Run before the Directus runtime so the application and later access-model seed can rely on stable credentials.
# Inputs: Database names, PostgreSQL secret paths, and controller-local artifact paths.
# Outputs: A managed PostgreSQL role and database for Directus plus controller-local password and token artefacts.
# Idempotency: Partially idempotent because it creates long-lived secret material only when missing and otherwise reconciles the database state in place.
# Dependencies: ADR 0165, ADR 0042, ADR 0289, ADR 0359.
---
- name: Validate Directus PostgreSQL inputs
  ansible.builtin.assert:
    that:
      - directus_database_name | length > 0
      - directus_database_user | length > 0
      - directus_postgres_secret_dir | length > 0
      - directus_postgres_password_file | length > 0
      - directus_database_password_local_file | length > 0
      - directus_service_registry_token_local_file | length > 0
    fail_msg: "directus_postgres requires database names and controller-local password/token paths."

- name: Provision the directus database via the shared postgres_client role
  ansible.builtin.include_role:
    name: lv3.platform.postgres_client
  vars:
    postgres_client_service: "{{ directus_database_name }}"
    postgres_client_database: "{{ directus_database_name }}"
    postgres_client_user: "{{ directus_database_user }}"
    postgres_client_password_local_file: "{{ directus_database_password_local_file }}"
    postgres_client_password_remote_dir: "{{ directus_postgres_secret_dir }}"
    postgres_client_password_remote_file: "{{ directus_postgres_password_file }}"

- name: Ensure the local Directus artifact directory exists
  ansible.builtin.file:
    path: "{{ directus_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate the Directus service registry token
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ directus_service_registry_token_local_file }}" ]; then
      umask 077
      openssl rand -hex 32 > "{{ directus_service_registry_token_local_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: directus_service_registry_token_generation
  changed_when: "'changed' in directus_service_registry_token_generation.stdout"
  no_log: true
