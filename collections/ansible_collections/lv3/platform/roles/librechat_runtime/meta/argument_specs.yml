---
argument_specs:
  main:
    short_description: Converge the LibreChat runtime.
    description: >-
      Converges the LibreChat chat surface on its target host with MongoDB and
      Meilisearch sidecars, OIDC auth, and system prompt presets.
      Conventional variables (site_dir, data_dir, compose_file, env_file, image, etc.) are
      automatically derived from the platform_service_registry via ADR 0373.
      Only service-specific variables are documented here.
    options:
      librechat_config_file:
        type: path
        required: true
        description:
          - LibreChat YAML config file path on the guest.
      librechat_container_port:
        type: int
        required: true
        description:
          - Container port exposed by the LibreChat image.
      librechat_healthcheck_path:
        type: str
        required: true
        description:
          - HTTP path used by the health check.
