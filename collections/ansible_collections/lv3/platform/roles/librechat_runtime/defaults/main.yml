# Purpose: Define LibreChat runtime defaults, secret paths, auth settings, and upstream integration knobs.
# Use case: Loaded whenever the LibreChat runtime converges or verifies.
# Inputs: Platform topology, image catalog entries, OpenBao settings, OIDC connectors.
# Outputs: Supplies stable defaults for the LibreChat runtime role.
# Idempotency: Fully idempotent because this file only declares defaults.
# Dependencies: ADR 0165, ADR 0060.
---
librechat_site_dir: /opt/librechat
librechat_data_dir: "{{ librechat_site_dir }}/data"
librechat_secret_dir: /etc/lv3/librechat
librechat_compose_file: "{{ librechat_site_dir }}/docker-compose.yml"
librechat_config_file: "{{ librechat_site_dir }}/librechat.yaml"
librechat_env_file: "{{ compose_runtime_secret_root }}/librechat/runtime.env"
librechat_legacy_env_file: "{{ librechat_site_dir }}/librechat.env"
librechat_openbao_agent_dir: "{{ librechat_site_dir }}/openbao"
librechat_openbao_agent_image: "{{ openbao_agent_image }}"
librechat_openbao_agent_container_name: librechat-openbao-agent
librechat_enable_openbao_agent: false
librechat_openbao_secret_path: services/librechat/runtime-env
librechat_openbao_policy_name: lv3-service-librechat-runtime
librechat_openbao_approle_name: librechat-runtime
librechat_container_name: librechat
librechat_internal_port: 8096
librechat_container_port: 3080
librechat_healthcheck_path: /
librechat_image: "{{ container_image_catalog.images.librechat_runtime.ref }}"
librechat_mongo_container_name: librechat-mongodb
librechat_mongo_image: mongo:7
librechat_mongo_data_dir: "{{ librechat_data_dir }}/mongodb"
librechat_meilisearch_container_name: librechat-meilisearch
librechat_meilisearch_image: getmeili/meilisearch:v1.7
librechat_meilisearch_data_dir: "{{ librechat_data_dir }}/meilisearch"
librechat_local_artifact_dir: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/librechat
librechat_jwt_secret_local_file: "{{ librechat_local_artifact_dir }}/jwt-secret.txt"
librechat_jwt_secret_remote_file: "{{ librechat_secret_dir }}/jwt-secret"
librechat_jwt_refresh_secret_remote_file: "{{ librechat_secret_dir }}/jwt-refresh-secret"
librechat_creds_key_local_file: "{{ librechat_local_artifact_dir }}/creds-key.txt"
librechat_creds_key_remote_file: "{{ librechat_secret_dir }}/creds-key"
librechat_creds_iv_local_file: "{{ librechat_local_artifact_dir }}/creds-iv.txt"
librechat_creds_iv_remote_file: "{{ librechat_secret_dir }}/creds-iv"
# OIDC / Keycloak
librechat_enable_oidc: true
librechat_oidc_client_id: serverclaw
# HTTPS via the NGINX edge at 10.10.10.10 (nginx-lv3).
# Docker bridge can't resolve public sso.lv3.org due to hairpin NAT; extra_hosts
# maps sso.lv3.org to the NGINX internal IP so the container reaches Keycloak.
librechat_oidc_issuer: https://sso.lv3.org/realms/lv3
librechat_oidc_callback_url: /oauth/openid/callback
librechat_oidc_button_label: Login with Keycloak
librechat_oidc_client_secret_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/keycloak/serverclaw-client-secret.txt
librechat_oidc_session_secret_local_file: "{{ librechat_local_artifact_dir }}/oidc-session-secret.txt"
# Ollama — direct IP because Docker bridge can't resolve host.docker.internal on Linux
librechat_ollama_base_url: http://10.10.10.20:11434
# Anthropic
librechat_anthropic_api_key_remote_file: "{{ librechat_secret_dir }}/anthropic-api-key"
librechat_anthropic_api_key_local_file: "{{ librechat_local_artifact_dir }}/anthropic-api-key.txt"
# OpenAI
librechat_openai_api_key_remote_file: "{{ librechat_secret_dir }}/openai-api-key"
librechat_openai_api_key_local_file: "{{ librechat_local_artifact_dir }}/openai-api-key.txt"
# System prompt preset
librechat_system_prompt_file: "{{ librechat_site_dir }}/system-prompt.md"
librechat_system_prompt_src: ../../../../config/serverclaw/system-prompt.md
# Model lists for built-in endpoints (fetch: true not supported in v0.8.4)
# Update these when providers add or remove models.
librechat_anthropic_models:
  - claude-sonnet-4-20250514
  - claude-sonnet-4-6-20250725
  - claude-haiku-4-5-20251001
  - claude-opus-4-20250115
  - claude-opus-4-6-20250725
librechat_openai_models:
  - gpt-4o
  - gpt-4o-mini
  - gpt-4.1
  - gpt-4.1-mini
  - gpt-4.1-nano
  - gpt-5
  - gpt-5-mini
  - o3
  - o3-mini
  - o3-pro
  - o4-mini
# Ollama models (auto-discovered via fetch: true on custom endpoint)
librechat_ollama_default_model: gemma4:e4b
# Admin
librechat_admin_email: ops@lv3.org
# Web search
librechat_enable_web_search: true
librechat_searxng_query_url: "http://host.docker.internal:8888/search?q=%s&format=json"
# Extra hosts for hairpin NAT — Docker bridge can't reach public IPs of these
# services, so we route through the NGINX edge internal IP (10.10.10.10).
librechat_extra_hosts:
  - "sso.lv3.org:10.10.10.10"
  - "chat.lv3.org:10.10.10.10"
