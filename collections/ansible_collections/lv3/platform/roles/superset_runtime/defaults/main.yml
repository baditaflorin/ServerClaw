# Purpose: Define the default Superset runtime paths, image pin, datasource topology, and Keycloak publication settings.
# Use case: Loaded whenever the Superset runtime role converges or verifies the SQL-first BI surface.
# Inputs: Platform topology, PostgreSQL host placement, Keycloak settings, and controller-local artefact paths.
# Outputs: Supplies stable runtime defaults consumed by the superset_runtime tasks and templates.
# Idempotency: Fully idempotent because this file only declares desired defaults.
# Dependencies: ADR 0165, ADR 0021, ADR 0042, ADR 0063, ADR 0077, and ADR 0292.
---
# NOTE: Conventional variables (site_dir, image, compose_file, env_file,
# openbao_*, container_name, internal_port, local_artifact_dir) are derived
# from platform_service_registry — ADR 0373.
superset_service_topology: "{{ hostvars['proxmox_florin'].lv3_service_topology | service_topology_get('superset') }}"
superset_session_authority: "{{ platform_session_authority }}"
superset_build_dir: "{{ superset_site_dir }}/build"
superset_pythonpath_dir: "{{ superset_site_dir }}/pythonpath"
superset_asset_dir: "{{ superset_site_dir }}/assets"
superset_static_env_file: "{{ superset_site_dir }}/runtime.env"
superset_internal_base_url: "http://127.0.0.1:{{ superset_internal_port }}"
superset_public_base_url: "https://{{ superset_service_topology.public_hostname }}"
superset_public_edge_private_ip: "{{ hostvars['proxmox_florin'].proxmox_public_edge_ipv4 }}"
superset_public_hostname_overrides:
  - hostname: "{{ superset_service_topology.public_hostname }}"
    address: "{{ superset_public_edge_private_ip }}"
  - hostname: "{{ hostvars['proxmox_florin'].lv3_service_topology.keycloak.public_hostname }}"
    address: "{{ superset_public_edge_private_ip }}"
superset_compose_project_name: superset
superset_compose_network_name: "{{ superset_compose_project_name }}_default"
superset_container_port: 8088
superset_image_name: lv3/superset
superset_base_image: docker.io/apache/superset:6.0.0@sha256:f2b551dda3c6b53167760aaeda3fe4252fd3777486a6ab264a1ff06b2e9d72d1
superset_base_image_pull_timeout_seconds: 180
superset_python_dependencies:
  - authlib==1.6.9
  - psycopg2-binary==2.9.11
  - clickhouse-connect==0.8.18
superset_database_password_local_file: "{{ superset_local_artifact_dir }}/database-password.txt"
superset_reader_password_local_file: "{{ superset_local_artifact_dir }}/reader-password.txt"
superset_postgres_database_catalog_local_file: "{{ superset_local_artifact_dir }}/postgres-databases.json"
superset_secret_key_local_file: "{{ superset_local_artifact_dir }}/secret-key.txt"
superset_admin_password_local_file: "{{ superset_local_artifact_dir }}/admin-password.txt"
superset_keycloak_client_secret_local_file: "{{ repo_shared_local_root }}/keycloak/superset-client-secret.txt"
superset_secret_key_remote_file: "{{ superset_secret_dir }}/secret-key.txt"
superset_admin_password_remote_file: "{{ superset_secret_dir }}/admin-password.txt"
superset_bootstrap_definition_file: "{{ superset_asset_dir }}/superset-bootstrap.json"
superset_bootstrap_definition_container_file: /app/assets/superset-bootstrap.json
superset_bootstrap_script_file: "{{ superset_pythonpath_dir }}/superset_bootstrap.py"
superset_bootstrap_script_container_file: /app/pythonpath/superset_bootstrap.py
superset_controller_bootstrap_script_local_path: "{{ inventory_dir ~ '/../scripts/superset_bootstrap.py' }}"
superset_verify_report_remote_file: "{{ superset_data_dir }}/verify-local-report.json"
superset_verify_report_container_file: /app/superset_home/verify-local-report.json
superset_verify_report_local_file: "{{ superset_local_artifact_dir }}/verify-public-report.json"
superset_database_host: "{{ hostvars[hostvars['proxmox_florin'].postgres_ha.initial_primary].ansible_host }}"
superset_database_port: 5432
superset_database_name: postgres
superset_database_schema: superset
superset_database_user: superset
superset_reader_user: superset_reader
superset_database_display_name_prefix: "PostgreSQL"
superset_register_plausible_clickhouse: true
superset_plausible_service_topology: "{{ hostvars['proxmox_florin'].lv3_service_topology | service_topology_get('plausible') }}"
superset_plausible_clickhouse_name: "Plausible ClickHouse"
superset_plausible_clickhouse_uri: "clickhousedb://default:@{{ superset_plausible_service_topology.private_ip }}:8123/plausible_events_db"
superset_landing_dataset_name: platform_database_inventory
superset_landing_dataset_sql: "SELECT datname AS database_name FROM pg_database WHERE datistemplate = false ORDER BY datname"
superset_landing_chart_title: PostgreSQL Databases
superset_landing_dashboard_title: LV3 Platform Database Inventory
superset_landing_dashboard_slug: lv3-platform-database-inventory
superset_admin_username: admin
superset_admin_first_name: LV3
superset_admin_last_name: Admin
superset_admin_email: superset.admin@lv3.org
superset_keycloak_client_id: superset
superset_keycloak_issuer: https://sso.lv3.org/realms/lv3
superset_keycloak_server_metadata_url: "{{ superset_keycloak_issuer }}/.well-known/openid-configuration"
superset_keycloak_authorize_url: "{{ superset_keycloak_issuer }}/protocol/openid-connect/auth"
superset_keycloak_token_url: "{{ superset_keycloak_issuer }}/protocol/openid-connect/token"
superset_keycloak_api_base_url: "{{ superset_keycloak_issuer }}/protocol/"
superset_keycloak_logout_url: >-
  {{ superset_session_authority.keycloak_logout_url }}?client_id={{ superset_keycloak_client_id }}&post_logout_redirect_uri={{ superset_public_base_url | urlencode }}
superset_keycloak_scopes:
  - openid
  - profile
  - email
superset_auth_user_registration_role: Gamma
superset_auth_roles_mapping:
  /lv3-platform-admins:
    - Admin
