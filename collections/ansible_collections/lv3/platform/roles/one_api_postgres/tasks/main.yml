# Purpose: Provision the PostgreSQL role, database, and password material used by the One-API runtime.
# Use case: Run during One-API bootstrap or recovery when the unified LLM proxy needs its backing database.
# Inputs: Database names, secret directories, and controller-local password sources for the One-API service account.
# Outputs: Ensures the One-API PostgreSQL database, role grants, and password files exist in the expected locations.
# Idempotency: Partially idempotent because first-run secret material may be created before later runs converge on it.
# Dependencies: ADR 0165, ADR 0026, and ADR 0294.
---
- name: Validate One-API PostgreSQL inputs
  ansible.builtin.assert:
    that:
      - one_api_database_name | length > 0
      - one_api_database_user | length > 0
      - one_api_postgres_secret_dir | length > 0
      - one_api_postgres_password_file | length > 0
      - one_api_database_password_local_file | length > 0
    fail_msg: "one_api_postgres requires database names and local or remote password paths."

- name: Ensure the One-API PostgreSQL secret directory exists
  ansible.builtin.file:
    path: "{{ one_api_postgres_secret_dir }}"
    state: directory
    owner: root
    group: postgres
    mode: "0750"

- name: Ensure the local One-API artifact directory exists
  ansible.builtin.file:
    path: "{{ one_api_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate the One-API database password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ one_api_database_password_local_file }}" ]; then
      umask 077
      openssl rand -base64 24 | tr -d '\n' > "{{ one_api_database_password_local_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: one_api_postgres_password_generation
  changed_when: "'changed' in one_api_postgres_password_generation.stdout"
  no_log: true

- name: Read the One-API database password
  ansible.builtin.slurp:
    src: "{{ one_api_database_password_local_file }}"
  delegate_to: localhost
  become: false
  register: one_api_postgres_password_raw
  no_log: true

- name: Record the One-API database password
  ansible.builtin.set_fact:
    one_api_database_password: "{{ one_api_postgres_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Mirror the One-API database password to the control machine
  ansible.builtin.copy:
    dest: "{{ one_api_database_password_local_file }}"
    content: "{{ one_api_database_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Persist the One-API database password on the current guest
  ansible.builtin.copy:
    dest: "{{ one_api_postgres_password_file }}"
    content: "{{ one_api_database_password }}\n"
    owner: root
    group: postgres
    mode: "0640"
  no_log: true

- name: Check whether the local PostgreSQL member is writable
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT CASE WHEN pg_is_in_recovery() THEN 0 ELSE 1 END"
  register: one_api_postgres_writable_check
  changed_when: false

- name: Check whether the One-API database role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ one_api_database_user }}'"
  register: one_api_postgres_role_check
  changed_when: false
  when: one_api_postgres_writable_check.stdout | trim == "1"

- name: Create the One-API database role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE ROLE {{ one_api_database_user }} LOGIN PASSWORD '{{ one_api_database_password }}'"
  changed_when: true
  no_log: true
  when:
    - one_api_postgres_writable_check.stdout | trim == "1"
    - one_api_postgres_role_check.stdout != "1"

- name: Check whether the One-API PostgreSQL database already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_database WHERE datname = '{{ one_api_database_name }}'"
  register: one_api_postgres_database_check
  changed_when: false
  when: one_api_postgres_writable_check.stdout | trim == "1"

- name: Create the One-API PostgreSQL database
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE DATABASE {{ one_api_database_name }} OWNER {{ one_api_database_user }}"
  when:
    - one_api_postgres_writable_check.stdout | trim == "1"
    - one_api_postgres_database_check.stdout != "1"
  changed_when: true

- name: Ensure the One-API database owner is correct
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER DATABASE {{ one_api_database_name }} OWNER TO {{ one_api_database_user }}"
  changed_when: false
  when: one_api_postgres_writable_check.stdout | trim == "1"
