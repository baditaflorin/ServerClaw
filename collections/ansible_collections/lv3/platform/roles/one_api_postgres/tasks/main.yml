---
# Purpose: Provision the one_api PostgreSQL database using the shared postgres_client role (ADR 0359).
# Use case: Called during one_api deployment to ensure the database, role, and credentials exist.
# Inputs: one_api_* variables from defaults/main.yml; resolves registry entry from platform_postgres_clients.
# Outputs: one_api PostgreSQL role, database, and credential files converged on postgres-lv3.
# Idempotency: Yes; postgres_client role handles all idempotency.
# Dependencies: ADR 0359 postgres_client role, platform_postgres_clients registry.
- name: Provision the one_api database via the shared postgres_client role
  ansible.builtin.include_role:
    name: lv3.platform.postgres_client
  vars:
    postgres_client_service: "{{ one_api_database_name }}"
    postgres_client_database: "{{ one_api_database_name }}"
    postgres_client_user: "{{ one_api_database_user }}"
    postgres_client_password_local_file: "{{ one_api_database_password_local_file }}"
    postgres_client_password_remote_dir: "{{ one_api_postgres_secret_dir }}"
    postgres_client_password_remote_file: "{{ one_api_postgres_password_file }}"
