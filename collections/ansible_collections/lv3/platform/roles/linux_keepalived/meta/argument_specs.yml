---
argument_specs:
  main:
    short_description: Manage one keepalived VRRP instance on Linux.
    options:
      linux_keepalived_service_name:
        type: str
        required: true
      linux_keepalived_config_file:
        type: path
        required: true
      linux_keepalived_track_script:
        type: path
        required: true
      linux_keepalived_track_url:
        type: str
        required: true
      linux_keepalived_state:
        type: str
        required: true
      linux_keepalived_interface:
        type: str
        required: true
      linux_keepalived_virtual_router_id:
        type: int
        required: true
      linux_keepalived_priority:
        type: int
        required: true
      linux_keepalived_advert_int:
        type: int
        required: true
      linux_keepalived_auth_pass:
        type: str
        required: false
      linux_keepalived_unicast_source_ip:
        type: str
        required: true
      linux_keepalived_unicast_peers:
        type: list
        elements: str
        required: true
      linux_keepalived_virtual_ipaddresses:
        type: list
        elements: str
        required: true
