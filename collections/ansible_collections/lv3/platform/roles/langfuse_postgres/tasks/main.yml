---
- name: Validate Langfuse PostgreSQL inputs
  ansible.builtin.assert:
    that:
      - langfuse_database_name | length > 0
      - langfuse_database_user | length > 0
      - langfuse_postgres_secret_dir | length > 0
      - langfuse_postgres_password_file | length > 0
      - langfuse_database_password_local_file | length > 0
    fail_msg: "langfuse_postgres requires database names and password paths."

- name: Ensure the Langfuse PostgreSQL secret directory exists
  ansible.builtin.file:
    path: "{{ langfuse_postgres_secret_dir }}"
    state: directory
    owner: root
    group: postgres
    mode: "0750"

- name: Ensure the local Langfuse artifact directory exists
  ansible.builtin.file:
    path: "{{ langfuse_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate the Langfuse database password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ langfuse_database_password_local_file }}" ]; then
      umask 077
      openssl rand -hex 24 > "{{ langfuse_database_password_local_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: langfuse_postgres_password_generation
  changed_when: "'changed' in langfuse_postgres_password_generation.stdout"
  no_log: true

- name: Read the Langfuse database password
  ansible.builtin.slurp:
    src: "{{ langfuse_database_password_local_file }}"
  delegate_to: localhost
  become: false
  register: langfuse_postgres_password_raw
  no_log: true

- name: Record the Langfuse database password
  ansible.builtin.set_fact:
    langfuse_database_password: "{{ langfuse_postgres_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Persist the Langfuse database password on the PostgreSQL member
  ansible.builtin.copy:
    dest: "{{ langfuse_postgres_password_file }}"
    content: "{{ langfuse_database_password }}\n"
    owner: root
    group: postgres
    mode: "0640"
  no_log: true

- name: Check whether the local PostgreSQL member is writable
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT CASE WHEN pg_is_in_recovery() THEN 0 ELSE 1 END"
  register: langfuse_postgres_writable_check
  changed_when: false

- name: Check whether the Langfuse role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ langfuse_database_user }}'"
  register: langfuse_postgres_role_check
  changed_when: false
  when: langfuse_postgres_writable_check.stdout | trim == "1"

- name: Create the Langfuse role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - >-
        CREATE ROLE {{ langfuse_database_user }} LOGIN
        PASSWORD '{{ langfuse_database_password }}'
  changed_when: true
  no_log: true
  when:
    - langfuse_postgres_writable_check.stdout | trim == "1"
    - langfuse_postgres_role_check.stdout != "1"

- name: Ensure the Langfuse role password matches the managed secret
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER ROLE {{ langfuse_database_user }} PASSWORD '{{ langfuse_database_password }}'"
  changed_when: false
  no_log: true
  when: langfuse_postgres_writable_check.stdout | trim == "1"

- name: Check whether the Langfuse database already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_database WHERE datname = '{{ langfuse_database_name }}'"
  register: langfuse_postgres_database_check
  changed_when: false
  when: langfuse_postgres_writable_check.stdout | trim == "1"

- name: Create the Langfuse database
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE DATABASE {{ langfuse_database_name }} OWNER {{ langfuse_database_user }}"
  changed_when: true
  when:
    - langfuse_postgres_writable_check.stdout | trim == "1"
    - langfuse_postgres_database_check.stdout != "1"

- name: Ensure the Langfuse database owner is correct
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER DATABASE {{ langfuse_database_name }} OWNER TO {{ langfuse_database_user }}"
  changed_when: false
  when: langfuse_postgres_writable_check.stdout | trim == "1"
