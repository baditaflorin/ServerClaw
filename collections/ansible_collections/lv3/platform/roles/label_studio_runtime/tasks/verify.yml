---
# Purpose: Verify the Label Studio loopback health contract and repo-managed annotation project catalog.
# Dependencies: ADR 0165, ADR 0042, ADR 0077, ADR 0289, ADR 0371.
- name: Verify the Label Studio container is running
  ansible.builtin.command:
    argv:
      - docker
      - inspect
      - --format
      - '{{ "{{.State.Running}}" }}'
      - "{{ label_studio_container_name }}"
  register: label_studio_container_running
  changed_when: false

- name: Assert the Label Studio container is running
  ansible.builtin.assert:
    that:
      - label_studio_container_running.stdout | trim == 'true'
    fail_msg: "The Label Studio container is not running."

- name: Wait for the Label Studio container health check to pass
  ansible.builtin.command:
    argv:
      - docker
      - inspect
      - --format
      - '{{ "{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}" }}'
      - "{{ label_studio_container_name }}"
  register: label_studio_container_health
  retries: 36
  delay: 5
  until: label_studio_container_health.stdout | trim == 'healthy'
  changed_when: false

- name: Verify the Label Studio runtime health
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: label-studio
    common_verify_port: "{{ label_studio_internal_port }}"
    common_verify_health_url: "{{ label_studio_internal_base_url }}{{ label_studio_health_path }}"
    common_verify_health_retries: 12
    common_verify_health_delay: 5
    common_verify_health_assertions:
      - "(common_verify_health_response.json.release | default('') | length) > 0"
    common_verify_health_assertion_msg: "Label Studio health endpoint did not return a release version."

- name: Verify the repo-managed Label Studio project catalog
  ansible.builtin.script: >-
    {{ label_studio_sync_script }} verify
    --base-url {{ label_studio_internal_base_url }}
    --token-file {{ label_studio_admin_token_remote_file }}
    --project-catalog {{ label_studio_project_catalog_file }}
    --report-file {{ label_studio_verify_report_file }}
  register: label_studio_project_verify
  changed_when: false
  when: label_studio_verify_project_catalog | default(true) | bool
