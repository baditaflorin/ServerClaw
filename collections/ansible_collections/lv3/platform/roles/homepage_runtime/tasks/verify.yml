---
# Dependencies: ADR 0371.
- name: Verify the Homepage runtime health
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: homepage
    common_verify_port: "{{ homepage_port }}"
    common_verify_health_url: "{{ homepage_internal_url }}"
    common_verify_health_retries: 24
    common_verify_health_delay: 5
    common_verify_extra_endpoints:
      - url: "{{ homepage_internal_url }}/api/services"
        assertions:
          - "'Homepage' in common_verify_extra_response.content"
          - "'https://home.lv3.org' in common_verify_extra_response.content"
        assertion_msg: "Homepage started, but the repo-managed services catalog was not rendered."
      - url: "{{ homepage_internal_url }}/api/bookmarks"
        assertions:
          - "'Ops Portal' in common_verify_extra_response.content"
          - "'https://ops.lv3.org' in common_verify_extra_response.content"
        assertion_msg: "Homepage started, but the repo-managed bookmarks catalog was not rendered."
