---
argument_specs:
  main:
    short_description: Render a reusable Compose sidecar fragment for certificate renewal.
    options:
      cert_renewer_sidecar_name:
        type: str
        required: false
        default: cert-renewer
      cert_renewer_sidecar_image:
        type: str
        required: false
        default: smallstep/step-cli:latest
      cert_renewer_sidecar_cert_mount_path:
        type: str
        required: false
        default: /certs
      cert_renewer_sidecar_restart:
        type: str
        required: false
        default: unless-stopped
      cert_renewer_sidecar_exec_command:
        type: str
        required: false
        default: ""
      cert_renewer_sidecar_ca_url:
        type: str
        required: true
      cert_renewer_sidecar_root_file:
        type: str
        required: false
        default: /certs/root_ca.crt
      cert_renewer_sidecar_certificate_file:
        type: str
        required: false
        default: /certs/service.crt
      cert_renewer_sidecar_key_file:
        type: str
        required: false
        default: /certs/service.key
      cert_renewer_sidecar_output_path:
        type: str
        required: true
