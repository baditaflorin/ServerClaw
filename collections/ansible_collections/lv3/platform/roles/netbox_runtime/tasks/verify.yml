---
# Dependencies: ADR 0371.
- name: Verify the NetBox runtime health
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: netbox
    common_verify_port: "{{ netbox_server_port }}"
    common_verify_health_url: "{{ netbox_private_base_url }}/login/"
    common_verify_health_retries: 30
    common_verify_health_delay: 10

- name: Verify the NetBox bootstrap API token
  ansible.builtin.uri:
    url: "{{ netbox_private_base_url }}/api/users/users/?limit=1"
    method: GET
    headers:
      Authorization: "Bearer {{ netbox_superuser_api_token }}"
    status_code: 200
    return_content: true
  register: netbox_verify_api_token
  retries: 12
  delay: 5
  until: netbox_verify_api_token.status == 200
  changed_when: false
  no_log: true
