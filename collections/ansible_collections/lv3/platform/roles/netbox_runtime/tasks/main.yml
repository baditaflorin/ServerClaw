---
- name: Derive Netbox conventional defaults from the service registry
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: derive_service_defaults
  vars:
    common_derive_service_name: netbox


- name: Validate NetBox runtime inputs
  ansible.builtin.assert:
    that:
      - netbox_image | length > 0
      - netbox_redis_image | length > 0
      - netbox_site_dir | length > 0
      - netbox_secret_dir | length > 0
      - netbox_compose_file | length > 0
      - netbox_env_file | length > 0
      - netbox_server_port | int > 0
      - netbox_database_name | length > 0
      - netbox_database_user | length > 0
      - netbox_database_host | length > 0
      - netbox_database_password_local_file | length > 0
      - netbox_superuser_name | length > 0
      - netbox_superuser_email | length > 0
      - netbox_superuser_password_local_file | length > 0
      - netbox_superuser_api_token_local_file | length > 0
    fail_msg: "netbox_runtime requires image, path, database, and bootstrap-secret inputs."

- name: Check NetBox prerequisites on the control machine
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: check_local_secrets
  vars:
    common_check_local_secrets_files:
      - path: "{{ netbox_database_password_local_file }}"
        description: "NetBox database password"
        prerequisite: "Converge netbox_postgres before deploying NetBox"

- name: Ensure the local NetBox artifact directory exists
  ansible.builtin.file:
    path: "{{ netbox_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate the NetBox local bootstrap secrets
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ item.path }}" ]; then
      umask 077
      {{ item.generator }} > "{{ item.path }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  loop:
    - path: "{{ netbox_superuser_password_local_file }}"
      generator: "openssl rand -base64 24 | tr -d '\\n'"
  delegate_to: localhost
  become: false
  register: netbox_local_secret_generation
  changed_when: "'changed' in netbox_local_secret_generation.stdout"
  no_log: true

- name: Ensure NetBox runtime prerequisite packages are present
  ansible.builtin.apt:
    name:
      - openssl
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure the NetBox runtime directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ netbox_site_dir }}"
      mode: "0755"
    - path: "{{ netbox_secret_dir }}"
      mode: "0700"

- name: Generate the NetBox runtime secret files
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ item.path }}" ]; then
      umask 077
      {{ item.generator }} > "{{ item.path }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  loop:
    - path: "{{ netbox_secret_key_file }}"
      generator: "openssl rand -hex 64"
    - path: "{{ netbox_redis_password_file }}"
      generator: "openssl rand -hex 24"
    - path: "{{ netbox_redis_cache_password_file }}"
      generator: "openssl rand -hex 24"
  register: netbox_runtime_secret_generation
  changed_when: "'changed' in netbox_runtime_secret_generation.stdout"
  no_log: true

- name: Read the NetBox bootstrap secrets from the control machine
  ansible.builtin.slurp:
    src: "{{ item }}"
  loop:
    - "{{ netbox_database_password_local_file }}"
    - "{{ netbox_superuser_password_local_file }}"
  delegate_to: localhost
  become: false
  register: netbox_local_secret_payloads
  no_log: true

- name: Read the NetBox runtime secret files
  ansible.builtin.slurp:
    src: "{{ item }}"
  loop:
    - "{{ netbox_secret_key_file }}"
    - "{{ netbox_redis_password_file }}"
    - "{{ netbox_redis_cache_password_file }}"
  register: netbox_runtime_secret_payloads
  no_log: true

- name: Record the NetBox secret facts
  ansible.builtin.set_fact:
    netbox_database_password: "{{ netbox_local_secret_payloads.results[0].content | b64decode | trim }}"
    netbox_superuser_password: "{{ netbox_local_secret_payloads.results[1].content | b64decode | trim }}"
    netbox_secret_key: "{{ netbox_runtime_secret_payloads.results[0].content | b64decode | trim }}"
    netbox_redis_password: "{{ netbox_runtime_secret_payloads.results[1].content | b64decode | trim }}"
    netbox_redis_cache_password: "{{ netbox_runtime_secret_payloads.results[2].content | b64decode | trim }}"
    netbox_runtime_secret_payload:
      DB_PASSWORD: "{{ netbox_local_secret_payloads.results[0].content | b64decode | trim }}"
      REDIS_PASSWORD: "{{ netbox_runtime_secret_payloads.results[1].content | b64decode | trim }}"
      REDIS_CACHE_PASSWORD: "{{ netbox_runtime_secret_payloads.results[2].content | b64decode | trim }}"
      SECRET_KEY: "{{ netbox_runtime_secret_payloads.results[0].content | b64decode | trim }}"
      SUPERUSER_PASSWORD: "{{ netbox_local_secret_payloads.results[1].content | b64decode | trim }}"
  no_log: true

- name: Prepare OpenBao agent runtime secret injection for NetBox
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: openbao_compose_env
  vars:
    common_openbao_compose_env_service_name: netbox
    common_openbao_compose_env_agent_dir: "{{ netbox_openbao_agent_dir }}"
    common_openbao_compose_env_runtime_dir: "{{ netbox_env_file | dirname }}"
    common_openbao_compose_env_env_file: "{{ netbox_env_file }}"
    common_openbao_compose_env_secret_path: "{{ netbox_openbao_secret_path }}"
    common_openbao_compose_env_secret_payload: "{{ netbox_runtime_secret_payload }}"
    common_openbao_compose_env_policy_name: "{{ netbox_openbao_policy_name }}"
    common_openbao_compose_env_policy_rules: |
      path "sys/health" {
        capabilities = ["read"]
      }

      path "kv/data/{{ netbox_openbao_secret_path }}" {
        capabilities = ["read"]
      }

      path "kv/metadata/{{ netbox_openbao_secret_path }}" {
        capabilities = ["read", "list"]
      }
    common_openbao_compose_env_approle_name: "{{ netbox_openbao_approle_name }}"
    common_openbao_compose_env_agent_config_file: "{{ netbox_openbao_agent_dir }}/agent.hcl"
    common_openbao_compose_env_agent_template_file: "{{ netbox_openbao_agent_dir }}/runtime.env.ctmpl"
    common_openbao_compose_env_agent_template_src: netbox.env.ctmpl.j2
    common_openbao_compose_env_role_id_file: "{{ netbox_openbao_agent_dir }}/role_id"
    common_openbao_compose_env_secret_id_file: "{{ netbox_openbao_agent_dir }}/secret_id"
    common_openbao_compose_env_image: "{{ netbox_openbao_agent_image }}"
    common_openbao_compose_env_legacy_env_files:
      - "{{ netbox_legacy_env_file }}"
  no_log: true

- name: Render the NetBox environment file
  ansible.builtin.template:
    src: netbox.env.j2
    dest: "{{ netbox_env_file }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Render the NetBox compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ netbox_compose_file }}"
    owner: root
    group: root
    mode: "0644"
  vars:
    ansible_search_path: "{{ [role_path + '/../common'] + (ansible_search_path | default([])) }}"

- name: Render the NetBox housekeeping script
  ansible.builtin.template:
    src: netbox-housekeeping.sh.j2
    dest: "{{ netbox_housekeeping_script }}"
    owner: root
    group: root
    mode: "0755"

- name: Render the NetBox housekeeping systemd service
  ansible.builtin.template:
    src: netbox-housekeeping.service.j2
    dest: "/etc/systemd/system/{{ netbox_housekeeping_service_name }}"
    owner: root
    group: root
    mode: "0644"

- name: Render the NetBox housekeeping systemd timer
  ansible.builtin.template:
    src: netbox-housekeeping.timer.j2
    dest: "/etc/systemd/system/{{ netbox_housekeeping_timer_name }}"
    owner: root
    group: root
    mode: "0644"

- name: Pull the NetBox images
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ netbox_compose_file }}"
      - pull
  args:
    chdir: "{{ netbox_site_dir }}"
  register: netbox_pull
  changed_when: >-
    'Pulling' in netbox_pull.stdout
    or 'Downloaded newer image' in netbox_pull.stdout
    or 'Pull complete' in netbox_pull.stdout

- name: Start the NetBox stack
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ netbox_compose_file }}"
      - up
      - -d
      - --remove-orphans
  args:
    chdir: "{{ netbox_site_dir }}"
  register: netbox_up
  changed_when: >-
    'Creating' in netbox_up.stdout
    or 'Recreating' in netbox_up.stdout
    or 'Starting' in netbox_up.stdout

- name: Enable the NetBox housekeeping timer
  ansible.builtin.systemd:
    name: "{{ netbox_housekeeping_timer_name }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for NetBox to listen locally
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ netbox_server_port }}"
    delay: 0
    timeout: 300

- name: Wait for the NetBox API status endpoint
  ansible.builtin.uri:
    url: "{{ netbox_private_base_url }}/login/"
    method: GET
    status_code: 200
    return_content: true
  register: netbox_status
  retries: 30
  delay: 10
  until: netbox_status.status == 200
  changed_when: false

- name: Check whether the NetBox bootstrap API token already works
  ansible.builtin.stat:
    path: "{{ netbox_superuser_api_token_local_file }}"
  delegate_to: localhost
  become: false
  register: netbox_superuser_api_token_local

- name: Read the existing NetBox bootstrap API token
  ansible.builtin.slurp:
    src: "{{ netbox_superuser_api_token_local_file }}"
  delegate_to: localhost
  become: false
  register: netbox_superuser_api_token_raw
  when: netbox_superuser_api_token_local.stat.exists
  no_log: true

- name: Record the existing NetBox bootstrap API token
  ansible.builtin.set_fact:
    netbox_superuser_api_token: "{{ netbox_superuser_api_token_raw.content | b64decode | trim }}"
  when: netbox_superuser_api_token_local.stat.exists
  no_log: true

- name: Mark whether the saved NetBox bootstrap token is already in v2 bearer format
  ansible.builtin.set_fact:
    netbox_existing_token_is_v2: "{{ (netbox_superuser_api_token | default('')) is match('^nbt_[A-Za-z0-9]+\\.[A-Za-z0-9]+$') }}"
  when: netbox_superuser_api_token_local.stat.exists
  no_log: true

- name: Check whether the NetBox bootstrap API token already works
  ansible.builtin.shell: |
    set -euo pipefail
    http_code="$(
      curl -sS -o /dev/null -w '%{http_code}' \
        -H 'Authorization: Bearer {{ netbox_superuser_api_token }}' \
        '{{ netbox_private_base_url }}/api/users/users/?limit=1'
    )"
    printf '%s\n' "${http_code}"
  args:
    executable: /bin/bash
  register: netbox_existing_token_check
  when: netbox_superuser_api_token_local.stat.exists
  changed_when: false
  failed_when: false
  no_log: true

- name: Wait for NetBox superuser to be usable (active wait with login test)
  ansible.builtin.uri:
    url: "{{ netbox_private_base_url }}/api/users/users/?limit=1"
    method: GET
    user: "{{ netbox_superuser_name }}"
    password: "{{ netbox_superuser_password }}"
    force_basic_auth: true
    status_code: [200, 401, 403]
    return_content: false
  register: netbox_superuser_readiness
  retries: 60
  delay: 5
  until: netbox_superuser_readiness.status == 200
  when: not netbox_superuser_api_token_local.stat.exists
  changed_when: false
  failed_when: false

- name: Provision the NetBox bootstrap API token
  ansible.builtin.uri:
    url: "{{ netbox_private_base_url }}/api/users/tokens/provision/"
    method: POST
    body_format: json
    body:
      write_enabled: true
      description: "Repo-managed NetBox bootstrap token"
    user: "{{ netbox_superuser_name }}"
    password: "{{ netbox_superuser_password }}"
    force_basic_auth: true
    status_code: [200, 201, 403]
    return_content: true
  register: netbox_token_provision
  when: >-
    not netbox_superuser_api_token_local.stat.exists
    or not (netbox_existing_token_is_v2 | default(false))
    or (netbox_existing_token_check.stdout | default('000') | trim) != '200'
  failed_when: false
  retries: 30
  delay: 10
  until: netbox_token_provision.status in [200, 201]

- name: Debug NetBox token provisioning response
  ansible.builtin.debug:
    msg: |
      Token provisioning returned HTTP {{ netbox_token_provision.status | default('unknown') }}
      Response type: {{ netbox_token_provision.json | type_debug }}
      Response keys: {{ netbox_token_provision.json.keys() | list if (netbox_token_provision.json | type_debug == 'dict') else 'not a dict' }}
      Has 'key' field: {{ 'key' in netbox_token_provision.json if (netbox_token_provision.json | type_debug == 'dict') else 'N/A' }}
      Has 'token' field: {{ 'token' in netbox_token_provision.json if (netbox_token_provision.json | type_debug == 'dict') else 'N/A' }}
      Raw response: {{ netbox_token_provision.json }}
  when: netbox_token_provision is not skipped
  changed_when: false

- name: Write NetBox token provisioning response to file
  ansible.builtin.copy:
    content: "{{ netbox_token_provision | to_nice_json }}"
    dest: "/tmp/netbox-token-provision-response.json"
    mode: "0644"
  delegate_to: localhost
  become: false
  when: netbox_token_provision is not skipped
  changed_when: false

- name: Fail if token provisioning response is invalid
  ansible.builtin.fail:
    msg: |
      Token provisioning returned HTTP {{ netbox_token_provision.status }} but response doesn't contain expected 'key' and 'token' fields.
      Response type: {{ netbox_token_provision.json | type_debug }}
      Response keys: {{ netbox_token_provision.json.keys() | list if (netbox_token_provision.json | type_debug == 'dict') else 'N/A' }}
      Full response: {{ netbox_token_provision.json }}

      This indicates the NetBox API endpoint response format has changed or is different than expected.
      Check NetBox API documentation for /api/users/tokens/provision/ endpoint response format.
  when: >-
    netbox_token_provision is not skipped
    and netbox_token_provision.status in [200, 201]
    and not (netbox_token_provision.json.key is defined and netbox_token_provision.json.token is defined)
  changed_when: false

- name: Persist the NetBox bootstrap API token locally
  ansible.builtin.copy:
    dest: "{{ netbox_superuser_api_token_local_file }}"
    content: "nbt_{{ netbox_token_provision.json.key }}.{{ netbox_token_provision.json.token }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  when: >-
    netbox_token_provision is not skipped
    and netbox_token_provision.status in [200, 201]
    and netbox_token_provision.json.key is defined
    and netbox_token_provision.json.token is defined
  no_log: true

- name: Record the provisioned NetBox bootstrap API token
  ansible.builtin.set_fact:
    netbox_superuser_api_token: "nbt_{{ netbox_token_provision.json.key }}.{{ netbox_token_provision.json.token }}"
  when: >-
    netbox_token_provision is not skipped
    and netbox_token_provision.status in [200, 201]
    and netbox_token_provision.json.key is defined
    and netbox_token_provision.json.token is defined
  no_log: true

- name: Verify the NetBox bootstrap API token
  ansible.builtin.uri:
    url: "{{ netbox_private_base_url }}/api/users/users/?limit=1"
    method: GET
    headers:
      Authorization: "Bearer {{ netbox_superuser_api_token }}"
    status_code: 200
    return_content: true
  register: netbox_api_token_verify
  retries: 12
  delay: 5
  until: netbox_api_token_verify.status == 200
  changed_when: false
  when: netbox_superuser_api_token is defined
  no_log: true

- name: Verify NetBox health probes
  ansible.builtin.import_tasks: verify.yml
