---
# Purpose: Declare the supported input contract for the Proxmox host bridge, NAT, and guest firewall policy role.
# Use case: Loaded by Ansible to validate Proxmox network variables before the role mutates host networking or per-guest firewall files.
# Inputs: Role variables covering host uplink topology, bridges, guest inventory, forwarding behavior, and the canonical guest allow matrix.
# Outputs: Provides argument specifications used by Ansible role validation.
# Idempotency: Fully idempotent because this file only documents the role interface.
# Dependencies: ADR 0165, ADR 0021, ADR 0067, and ADR 0293.
argument_specs:
  main:
    short_description: Configure the Proxmox host bridge, NAT, and per-VM firewall policy.
    options:
      management_interface:
        type: str
        required: true
        description:
          - Physical management uplink interface on the Proxmox host.
      management_ipv4:
        type: str
        required: true
        description:
          - Public management IPv4 address assigned to the host.
      management_gateway4:
        type: str
        required: true
        description:
          - Default IPv4 gateway for the management uplink.
      proxmox_wan_bridge:
        type: str
        required: true
        description:
          - External bridge name used for public ingress and NAT egress.
      proxmox_internal_bridge:
        type: str
        required: true
        description:
          - Internal guest bridge name used for the private subnet.
      proxmox_internal_ipv4:
        type: str
        required: true
        description:
          - Host IPv4 address on the internal guest bridge.
      proxmox_internal_network:
        type: str
        required: true
        description:
          - IPv4 CIDR for the internal guest network.
      proxmox_staging_bridge_enabled:
        type: bool
        required: false
        default: true
        description:
          - Whether the optional staging bridge should be rendered on the Proxmox host.
      proxmox_staging_bridge:
        type: str
        required: false
        description:
          - Optional staging bridge name used for the pre-production guest subnet.
      proxmox_staging_ipv4:
        type: str
        required: false
        description:
          - Host IPv4 address on the staging bridge.
      proxmox_staging_cidr:
        type: int
        required: false
        description:
          - IPv4 prefix length for the staging bridge.
      proxmox_staging_network:
        type: str
        required: false
        description:
          - IPv4 CIDR for the staging bridge subnet.
      proxmox_guests:
        type: list
        elements: raw
        required: true
        description:
          - Canonical guest inventory entries including VM IDs, names, IPs, and MAC addresses.
      network_policy:
        type: dict
        required: true
        description:
          - Canonical guest allow matrix used to render the Proxmox VM firewall files.
      proxmox_network_enable_ipv4_forwarding:
        type: bool
        required: false
        default: true
        description:
          - Whether host IPv4 forwarding should be enabled.
      proxmox_public_ingress_tcp_forwards:
        type: list
        elements: raw
        required: false
        default: []
        description:
          - Explicit host TCP forward definitions for public ingress.
      proxmox_public_ingress_udp_forwards:
        type: list
        elements: raw
        required: false
        default: []
        description:
          - Explicit host UDP forward definitions for public ingress.
      proxmox_public_edge_ipv4:
        type: str
        required: false
        description:
          - Internal destination IPv4 used by the legacy public edge forwarding contract.
      proxmox_public_ingress_tcp_ports:
        type: list
        elements: int
        required: false
        description:
          - Legacy public ingress ports forwarded to the public edge VM when explicit forward mappings are not used.
      proxmox_network_conntrack_helper_path:
        type: path
        required: false
        default: /usr/local/sbin/lv3-proxmox-firewall-conntrack
        description:
          - Managed helper path that installs the conntrack-zone rule for `fwbr+` traffic.
      proxmox_network_conntrack_service_file:
        type: path
        required: false
        default: /etc/systemd/system/lv3-proxmox-firewall-conntrack.service
        description:
          - Managed systemd unit that reapplies the conntrack-zone helper on boot.
