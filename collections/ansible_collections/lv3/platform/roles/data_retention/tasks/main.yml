---
- name: Validate data retention role inputs
  ansible.builtin.assert:
    that:
      - data_retention_repo_root | length > 0
      - data_retention_runtime_root | length > 0
      - data_retention_config_dir | length > 0
      - data_retention_receipts_root | length > 0
      - data_retention_purge_script_path | length > 0
      - data_retention_catalog_path | length > 0
      - data_retention_service_name | length > 0
      - data_retention_timer_name | length > 0
      - data_retention_on_calendar | length > 0
      - data_retention_audit_log_path | length > 0
    fail_msg: "data_retention requires repo, runtime, and schedule paths."

- name: Install runtime prerequisites for data retention
  ansible.builtin.apt:
    name:
      - python3
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure data retention directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ data_retention_runtime_root }}"
      mode: "0755"
    - path: "{{ data_retention_bin_dir }}"
      mode: "0755"
    - path: "{{ data_retention_config_dir }}"
      mode: "0755"
    - path: "{{ data_retention_receipts_root }}"
      mode: "0755"

- name: Copy the repo-managed purge script
  ansible.builtin.copy:
    src: "{{ data_retention_repo_root }}/scripts/purge_old_receipts.py"
    dest: "{{ data_retention_purge_script_path }}"
    owner: root
    group: root
    mode: "0755"

- name: Copy the repo-managed data catalog
  ansible.builtin.copy:
    src: "{{ data_retention_repo_root }}/config/data-catalog.json"
    dest: "{{ data_retention_catalog_path }}"
    owner: root
    group: root
    mode: "0644"

- name: Render the data retention systemd service
  ansible.builtin.template:
    src: lv3-data-retention.service.j2
    dest: "/etc/systemd/system/{{ data_retention_service_name }}"
    owner: root
    group: root
    mode: "0644"

- name: Render the data retention systemd timer
  ansible.builtin.template:
    src: lv3-data-retention.timer.j2
    dest: "/etc/systemd/system/{{ data_retention_timer_name }}"
    owner: root
    group: root
    mode: "0644"

- name: Enable the data retention timer
  ansible.builtin.systemd:
    name: "{{ data_retention_timer_name }}"
    enabled: true
    state: started
    daemon_reload: true
