      vaultwarden_image:
        type: str
        required: true
      vaultwarden_container_name:
        type: str
        required: true
      vaultwarden_site_dir:
        type: path
        required: true
      vaultwarden_data_dir:
        type: path
        required: true
      vaultwarden_tls_dir:
        type: path
        required: true
      vaultwarden_compose_file:
        type: path
        required: true
      vaultwarden_https_port:
        type: int
        required: true
      vaultwarden_internal_base_url:
        type: str
        required: true
      vaultwarden_controller_url:
        type: str
        required: true
      vaultwarden_public_base_url:
        type: str
        required: true
      vaultwarden_database_name:
        type: str
        required: true
      vaultwarden_database_user:
        type: str
        required: true
      vaultwarden_database_host:
        type: str
        required: true
      vaultwarden_database_port:
