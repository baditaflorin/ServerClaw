# Purpose: Set the default paths, image, ports, and verification settings for the private Apache Tika runtime.
# Use case: Load when converging Tika so the role can render compose state and extraction verification consistently.
# Inputs: Platform topology, image catalog, and optional role overrides.
# Outputs: Default variables consumed by the tika_runtime tasks and templates.
# Idempotency: Fully idempotent; defaults describe desired values only.
# Dependencies: ADR 0165 metadata standard, ADR 0275, and the tika_runtime role.
---
# NOTE: Conventional variables (site_dir, image, compose_file, env_file,
# openbao_*, container_name, internal_port, local_artifact_dir) are derived
# from platform_service_registry — ADR 0373.
tika_runtime_port: "{{ platform_port_assignments.tika_port }}"
tika_runtime_base_url: "http://127.0.0.1:{{ tika_runtime_port }}"
tika_runtime_container_port: 9998
tika_runtime_sample_text: "Hello from Apache Tika.\n"
tika_runtime_java_opts: "-Xms256m -Xmx1024m"
tika_runtime_verify_html_fixture: |
  <html>
    <body>
      <h1>Hello Tika</h1>
      <p>Example extraction fixture.</p>
    </body>
  </html>
