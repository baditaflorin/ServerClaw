---
# Purpose: Deploy Outline and seed the repo-managed living knowledge surfaces.
- name: Derive Outline conventional defaults from the service registry
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: derive_service_defaults
  vars:
    common_derive_service_name: outline


- name: Validate Outline runtime inputs
  ansible.builtin.assert:
    that:
      - outline_site_dir | length > 0
      - outline_data_dir | length > 0
      - outline_secret_dir | length > 0
      - outline_compose_file | length > 0
      - outline_env_file | length > 0
      - outline_internal_port | int > 0
      - outline_internal_base_url | length > 0
      - outline_public_base_url | length > 0
      - outline_database_password_local_file | length > 0
      - outline_keycloak_client_secret_local_file | length > 0
      - outline_image | length > 0
      - outline_redis_image | length > 0
      - outline_minio_image | length > 0
    fail_msg: >-
      outline_runtime requires runtime paths, image refs, database auth,
      and Keycloak OIDC credentials.

- name: Check Outline prerequisites on the control machine
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: check_local_secrets
  vars:
    common_check_local_secrets_files:
      - path: "{{ outline_database_password_local_file }}"
        description: "Outline database password"
        prerequisite: "Converge outline_postgres before deploying Outline"
      - path: "{{ outline_keycloak_client_secret_local_file }}"
        description: "Outline Keycloak client secret"
        prerequisite: "Converge the Keycloak runtime before deploying Outline"

- name: Ensure the Outline runtime packages are present
  ansible.builtin.apt:
    name:
      - openssl
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure the Outline runtime directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ outline_site_dir }}"
      mode: "0755"
    - path: "{{ outline_data_dir }}"
      mode: "0755"
    - path: "{{ outline_minio_data_dir }}"
      mode: "0755"
    - path: "{{ outline_minio_data_dir }}/{{ outline_bucket_name }}"
      mode: "0755"
    - path: "{{ outline_secret_dir }}"
      mode: "0700"

- name: Manage Outline runtime secrets
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: manage_service_secrets
  vars:
    common_manage_service_secrets_generate:
      - path: "{{ outline_secret_key_remote_file }}"
        command: "openssl rand -hex 32"
        label: "outline-secret-key"
      - path: "{{ outline_utils_secret_remote_file }}"
        command: "openssl rand -hex 32"
        label: "outline-utils-secret"
      - path: "{{ outline_redis_password_remote_file }}"
        command: "openssl rand -base64 24 | tr -d '\\n'"
        label: "outline-redis-password"
      - path: "{{ outline_minio_root_password_remote_file }}"
        command: "openssl rand -base64 24 | tr -d '\\n'"
        label: "outline-minio-root-password"
    common_manage_service_secrets_read:
      - "{{ outline_secret_key_remote_file }}"
      - "{{ outline_utils_secret_remote_file }}"
      - "{{ outline_redis_password_remote_file }}"
      - "{{ outline_minio_root_password_remote_file }}"
    common_manage_service_secrets_mirror:
      - dest: "{{ outline_secret_key_local_file }}"
        content_index: 0
      - dest: "{{ outline_utils_secret_local_file }}"
        content_index: 1
      - dest: "{{ outline_redis_password_local_file }}"
        content_index: 2
      - dest: "{{ outline_minio_root_password_local_file }}"
        content_index: 3
    common_manage_service_secrets_local_artifact_dir: "{{ outline_local_artifact_dir }}"
    common_manage_service_secrets_fact_name: "outline_decoded_secrets"
  no_log: true

- name: Record the Outline runtime secrets
  ansible.builtin.set_fact:
    outline_secret_key: "{{ outline_decoded_secrets[0] }}"
    outline_utils_secret: "{{ outline_decoded_secrets[1] }}"
    outline_redis_password: "{{ outline_decoded_secrets[2] }}"
    outline_minio_root_password: "{{ outline_decoded_secrets[3] }}"
    outline_database_password: "{{ lookup('ansible.builtin.file', outline_database_password_local_file) | trim }}"
    outline_keycloak_client_secret: "{{ lookup('ansible.builtin.file', outline_keycloak_client_secret_local_file) | trim }}"
    outline_runtime_secret_payload:
      DATABASE_URL: >-
        postgres://{{ outline_database_user }}:{{ (lookup('ansible.builtin.file', outline_database_password_local_file) | trim) | urlencode }}@{{ outline_database_host }}:5432/{{ outline_database_name }}
      PGSSLMODE: disable
      REDIS_URL: "redis://:{{ outline_decoded_secrets[2] | urlencode | replace('/', '%2F') }}@redis:6379/0"
      SECRET_KEY: "{{ outline_decoded_secrets[0] }}"
      UTILS_SECRET: "{{ outline_decoded_secrets[1] }}"
      OIDC_CLIENT_SECRET: "{{ lookup('ansible.builtin.file', outline_keycloak_client_secret_local_file) | trim }}"
      AWS_SECRET_ACCESS_KEY: "{{ outline_decoded_secrets[3] }}"
      AWS_S3_UPLOAD_BUCKET_URL: "http://minio:9000"
  no_log: true

- name: Prepare OpenBao agent runtime secret injection for Outline
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: openbao_compose_env
  vars:
    common_openbao_compose_env_service_name: outline
    common_openbao_compose_env_agent_dir: "{{ outline_openbao_agent_dir }}"
    common_openbao_compose_env_runtime_dir: "{{ outline_env_file | dirname }}"
    common_openbao_compose_env_env_file: "{{ outline_env_file }}"
    common_openbao_compose_env_secret_path: "{{ outline_openbao_secret_path }}"
    common_openbao_compose_env_secret_payload: "{{ outline_runtime_secret_payload }}"
    common_openbao_compose_env_policy_name: "{{ outline_openbao_policy_name }}"
    common_openbao_compose_env_policy_rules: |
      path "sys/health" {
        capabilities = ["read"]
      }

      path "kv/data/{{ outline_openbao_secret_path }}" {
        capabilities = ["read"]
      }

      path "kv/metadata/{{ outline_openbao_secret_path }}" {
        capabilities = ["read", "list"]
      }
    common_openbao_compose_env_approle_name: "{{ outline_openbao_approle_name }}"
    common_openbao_compose_env_agent_config_file: "{{ outline_openbao_agent_dir }}/agent.hcl"
    common_openbao_compose_env_agent_template_file: "{{ outline_openbao_agent_dir }}/runtime.env.ctmpl"
    common_openbao_compose_env_agent_template_src: outline.env.ctmpl.j2
    common_openbao_compose_env_role_id_file: "{{ outline_openbao_agent_dir }}/role_id"
    common_openbao_compose_env_secret_id_file: "{{ outline_openbao_agent_dir }}/secret_id"
    common_openbao_compose_env_image: "{{ outline_openbao_agent_image }}"
    common_openbao_compose_env_legacy_env_files:
      - "{{ outline_legacy_env_file }}"
  no_log: true

- name: Render the Outline environment file
  ansible.builtin.template:
    src: outline.env.j2
    dest: "{{ outline_env_file }}"
    owner: root
    group: root
    mode: "0600"
  register: outline_env_template
  no_log: true

- name: Render the Outline compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ outline_compose_file }}"
    owner: root
    group: root
    mode: "0644"
  vars:
    ansible_search_path: "{{ [role_path + '/../common'] + (ansible_search_path | default([])) }}"
  register: outline_compose_template

- name: Pull the Outline images
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ outline_compose_file }}"
      - pull
  args:
    chdir: "{{ outline_site_dir }}"
  register: outline_pull
  changed_when: >-
    'Pulling' in outline_pull.stdout
    or 'Downloaded newer image' in outline_pull.stdout
    or 'Pull complete' in outline_pull.stdout
  retries: 3
  delay: 5
  until: outline_pull.rc == 0

- name: Check whether the Docker nat chain exists before Outline startup
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - nat
      - -S
      - DOCKER
  register: outline_docker_nat_chain
  changed_when: false
  failed_when: false

- name: Record container ids that are running before the Outline-triggered Docker restart
  ansible.builtin.command:
    argv:
      - docker
      - ps
      - -q
      - --no-trunc
  register: outline_pre_restart_container_ids
  changed_when: false
  when: outline_docker_nat_chain.rc != 0

- name: Inspect running containers before the Outline-triggered Docker restart
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json
        import subprocess
        import sys

        container_ids = json.load(sys.stdin)
        inspected = []

        for container_id in container_ids:
            result = subprocess.run(
                ["docker", "inspect", container_id],
                text=True,
                capture_output=True,
            )
            if result.returncode == 0:
                inspected.extend(json.loads(result.stdout or "[]"))
                continue

            stderr = (result.stderr or "").lower()
            if "no such object" in stderr:
                continue

            raise subprocess.CalledProcessError(
                result.returncode,
                result.args,
                output=result.stdout,
                stderr=result.stderr,
            )

        print(json.dumps(inspected))
    stdin: "{{ outline_pre_restart_container_ids.stdout_lines | to_json }}"
  register: outline_pre_restart_container_inspect
  changed_when: false
  when:
    - outline_docker_nat_chain.rc != 0
    - outline_pre_restart_container_ids.stdout_lines | length > 0

- name: Record containers that were running before the Outline-triggered Docker restart
  ansible.builtin.set_fact:
    outline_pre_restart_container_details: >-
      {{
        (outline_pre_restart_container_inspect.stdout | default('[]')) | from_json
      }}
    outline_pre_restart_container_names: >-
      {{
        (
          (outline_pre_restart_container_inspect.stdout | default('[]')) | from_json
        )
        | map(attribute='Name')
        | map('regex_replace', '^/', '')
        | list
      }}
  when: outline_docker_nat_chain.rc != 0

- name: Restore Docker networking when the nat chain is missing before Outline startup
  ansible.builtin.service:
    name: docker
    state: restarted
  when: outline_docker_nat_chain.rc != 0

- name: Recheck the Docker nat chain before Outline startup
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - nat
      - -S
      - DOCKER
  register: outline_docker_nat_chain_recheck
  changed_when: false
  failed_when: outline_docker_nat_chain_recheck.rc not in [0, 1]
  retries: 10
  delay: 2
  until: outline_docker_nat_chain_recheck.rc == 0
  when: outline_docker_nat_chain.rc != 0

- name: Wait for the Docker daemon to answer after networking recovery
  ansible.builtin.command:
    argv:
      - docker
      - info
      - --format
      - '{{ "{{.ServerVersion}}" }}'
  register: outline_docker_info
  changed_when: false
  retries: 10
  delay: 2
  until: outline_docker_info.rc == 0
  when: outline_docker_nat_chain.rc != 0

- name: Re-inspect pre-restart containers after the Outline-triggered Docker restart
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json
        import subprocess
        import sys

        container_names = json.load(sys.stdin)
        statuses = []

        for container_name in container_names:
            result = subprocess.run(
                ["docker", "inspect", container_name],
                text=True,
                capture_output=True,
            )
            if result.returncode == 0:
                payload = json.loads(result.stdout or "[]")
                container = payload[0] if payload else {}
                statuses.append(
                    {
                        "requested_name": container_name,
                        "full_name": container.get("Name") or f"/{container_name}",
                        "exists": True,
                        "running": bool(container.get("State", {}).get("Running")),
                    }
                )
                continue

            stderr = (result.stderr or "").lower()
            if "no such object" in stderr:
                statuses.append(
                    {
                        "requested_name": container_name,
                        "full_name": f"/{container_name}",
                        "exists": False,
                        "running": False,
                    }
                )
                continue

            raise subprocess.CalledProcessError(
                result.returncode,
                result.args,
                output=result.stdout,
                stderr=result.stderr,
            )

        print(json.dumps(statuses))
    stdin: "{{ outline_pre_restart_container_names | default([]) | to_json }}"
  register: outline_post_restart_container_status
  changed_when: false
  when:
    - outline_docker_nat_chain.rc != 0
    - outline_pre_restart_container_names | default([]) | length > 0

- name: Record pre-restart containers that remained stopped after the Outline-triggered Docker restart
  ansible.builtin.set_fact:
    outline_stopped_pre_restart_container_details: >-
      {{
        (
          outline_pre_restart_container_details | default([])
        )
        | rejectattr(
            'Name',
            'in',
            (
              (
                outline_post_restart_container_status.stdout | default('[]')
              )
              | from_json
              | selectattr('exists')
              | selectattr('running')
              | map(attribute='full_name')
              | list
            )
          )
        | list
      }}
    outline_stopped_pre_restart_container_names: >-
      {{
        (
          (
            outline_pre_restart_container_details | default([])
          )
          | rejectattr(
              'Name',
              'in',
              (
                (
                  outline_post_restart_container_status.stdout | default('[]')
                )
                | from_json
                | selectattr('exists')
                | selectattr('running')
                | map(attribute='full_name')
                | list
              )
            )
          | list
        )
        | map(attribute='Name')
        | map('regex_replace', '^/', '')
        | list
      }}
  when: outline_docker_nat_chain.rc != 0

- name: Recover pre-restart containers that remained stopped after the Outline-triggered Docker restart
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json
        import subprocess
        import sys
        import time
        import urllib.error
        import urllib.request

        TRANSIENT_DOCKER_NETWORK_ERRORS = (
            "No chain/target/match by that name",
            "driver failed programming external connectivity",
        )
        STALE_COMPOSE_ENDPOINT_ERRORS = (
            "failed to create endpoint",
            "does not exist",
        )
        OPENBAO_HEALTH_URL = "http://127.0.0.1:8201/v1/sys/health"
        OPENBAO_READY_STATUS_CODES = {200, 429}


        def combined_output(stdout, stderr):
            parts = []
            if stderr:
                parts.append(stderr)
            if stdout:
                parts.append(stdout)
            return "\n".join(part for part in parts if part)


        def exception_output(exc):
            return combined_output(getattr(exc, "output", ""), getattr(exc, "stderr", ""))


        def run_with_retry(command, cwd=None, attempts=3, delay_seconds=3, retry_on_any_error=False):
            for attempt in range(1, attempts + 1):
                result = subprocess.run(command, cwd=cwd, text=True, capture_output=True)
                if result.returncode == 0:
                    return

                output = combined_output(result.stdout or "", result.stderr or "")
                retryable = retry_on_any_error or any(
                    marker in output for marker in TRANSIENT_DOCKER_NETWORK_ERRORS
                )
                if attempt == attempts or not retryable:
                    raise subprocess.CalledProcessError(
                        result.returncode,
                        command,
                        output=result.stdout,
                        stderr=output,
                    )

                time.sleep(delay_seconds)


        def wait_for_local_openbao(*, timeout_seconds=60, delay_seconds=2):
            deadline = time.monotonic() + timeout_seconds
            last_error = ""
            while time.monotonic() < deadline:
                try:
                    with urllib.request.urlopen(OPENBAO_HEALTH_URL, timeout=5) as response:
                        if response.status in OPENBAO_READY_STATUS_CODES:
                            return
                        last_error = f"unexpected HTTP {response.status}"
                except urllib.error.HTTPError as exc:
                    if exc.code in OPENBAO_READY_STATUS_CODES:
                        return
                    last_error = f"HTTP {exc.code}"
                except OSError as exc:
                    last_error = str(exc)
                time.sleep(delay_seconds)

            raise RuntimeError(
                f"local OpenBao did not become ready at {OPENBAO_HEALTH_URL}: {last_error or 'timed out'}"
            )

        containers = json.load(sys.stdin)

        direct_start = []
        compose_groups = {}

        for container in containers:
            name = (container.get("Name") or "").lstrip("/")
            labels = container.get("Config", {}).get("Labels") or {}
            working_dir = labels.get("com.docker.compose.project.working_dir") or ""
            config_files = labels.get("com.docker.compose.project.config_files") or ""
            service = labels.get("com.docker.compose.service") or ""

            if working_dir and service:
                compose_group = compose_groups.setdefault(
                    (working_dir, config_files),
                    {"services": set(), "container_names": set()},
                )
                compose_group["services"].add(service)
                if name:
                    compose_group["container_names"].add(name)
                continue

            if name:
                direct_start.append(name)

        actions = []

        if direct_start:
            run_with_retry(["docker", "start", *direct_start])
            actions.append({"type": "docker_start", "containers": direct_start})

        def is_local_openbao_group(working_dir, config_files, services, container_names):
            normalized_working_dir = (working_dir or "").rstrip("/")
            config_file_list = [value for value in config_files.split(",") if value]
            return (
                normalized_working_dir == "/opt/openbao"
                or any(
                    config_file.rstrip("/") == "/opt/openbao/docker-compose.yml"
                    for config_file in config_file_list
                )
                or "openbao" in services
                or "lv3-openbao" in container_names
            )

        for (working_dir, config_files), compose_group in sorted(
            compose_groups.items(),
            key=lambda item: (
                0
                if is_local_openbao_group(
                    item[0][0],
                    item[0][1],
                    item[1]["services"],
                    item[1]["container_names"],
                )
                else 1,
                item[0][0],
                item[0][1],
            ),
        ):
            command = ["docker", "compose"]
            config_file_list = [value for value in config_files.split(",") if value]
            for config_file in config_file_list:
                command.extend(["--file", config_file])
            services = sorted(compose_group["services"])
            container_names = sorted(compose_group["container_names"])
            local_openbao_group = is_local_openbao_group(
                working_dir,
                config_files,
                services,
                container_names,
            )
            if "openbao-agent" in services and not local_openbao_group:
                wait_for_local_openbao()
            command.extend(["up", "-d", "--force-recreate", *services])

            try:
                run_with_retry(
                    command,
                    cwd=working_dir or None,
                    attempts=5,
                    delay_seconds=5,
                    retry_on_any_error=True,
                )
                actions.append(
                    {
                        "type": "docker_compose_up",
                        "working_dir": working_dir,
                        "config_files": config_file_list,
                        "services": services,
                    }
                )
                continue
            except subprocess.CalledProcessError as exc:
                stderr = exception_output(exc)
                if not (
                    container_names
                    and all(marker in stderr for marker in STALE_COMPOSE_ENDPOINT_ERRORS)
                ):
                    raise

            remove_command = ["docker", "rm", "-f", *container_names]
            remove_result = subprocess.run(remove_command, text=True, capture_output=True)
            if remove_result.returncode != 0 and "No such container" not in (remove_result.stderr or ""):
                raise subprocess.CalledProcessError(
                    remove_result.returncode,
                    remove_command,
                    output=remove_result.stdout,
                    stderr=remove_result.stderr,
                )
            actions.append(
                {
                    "type": "docker_rm_stale_compose_containers",
                    "working_dir": working_dir,
                    "config_files": config_file_list,
                    "containers": container_names,
                }
            )

            recovery_command = ["docker", "compose"]
            for config_file in config_file_list:
                recovery_command.extend(["--file", config_file])
            if "openbao-agent" in services and not local_openbao_group:
                wait_for_local_openbao()
            recovery_command.extend(["up", "-d", "--force-recreate", *services])
            try:
                run_with_retry(
                    recovery_command,
                    cwd=working_dir or None,
                    attempts=5,
                    delay_seconds=5,
                    retry_on_any_error=True,
                )
                actions.append(
                    {
                        "type": "docker_compose_up_force_recreate",
                        "working_dir": working_dir,
                        "config_files": config_file_list,
                        "services": services,
                    }
                )
                continue
            except subprocess.CalledProcessError as recovery_exc:
                recovery_stderr = exception_output(recovery_exc)
                if not all(marker in recovery_stderr for marker in STALE_COMPOSE_ENDPOINT_ERRORS):
                    raise

            down_command = ["docker", "compose"]
            for config_file in config_file_list:
                down_command.extend(["--file", config_file])
            down_command.extend(["down", "--remove-orphans"])
            run_with_retry(down_command, cwd=working_dir or None)
            actions.append(
                {
                    "type": "docker_compose_down_remove_orphans",
                    "working_dir": working_dir,
                    "config_files": config_file_list,
                    "services": services,
                }
            )

            final_up_command = ["docker", "compose"]
            for config_file in config_file_list:
                final_up_command.extend(["--file", config_file])
            if "openbao-agent" in services and not local_openbao_group:
                wait_for_local_openbao()
            final_up_command.extend(["up", "-d", *services])
            run_with_retry(
                final_up_command,
                cwd=working_dir or None,
                attempts=5,
                delay_seconds=5,
                retry_on_any_error=True,
            )
            actions.append(
                {
                    "type": "docker_compose_up_after_down",
                    "working_dir": working_dir,
                    "config_files": config_file_list,
                    "services": services,
                }
            )

        print(json.dumps({"actions": actions}))
    stdin: "{{ (outline_stopped_pre_restart_container_details | default([])) | to_json }}"
  register: outline_recover_stopped_containers
  changed_when: outline_stopped_pre_restart_container_names | length > 0
  when:
    - outline_docker_nat_chain.rc != 0
    - outline_stopped_pre_restart_container_names | default([]) | length > 0

- name: Confirm pre-restart containers recovered after the Outline-triggered Docker restart
  ansible.builtin.command:
    argv:
      - python3
      - -c
      - |
        import json
        import subprocess
        import sys

        NONPERSISTENT_RESTART_POLICIES = {"", "no"}

        containers = json.load(sys.stdin)
        statuses = []
        all_running = True

        for container in containers:
            container_name = (container.get("Name") or "").lstrip("/")
            restart_policy = (container.get("HostConfig") or {}).get("RestartPolicy") or {}
            restart_policy_name = str(restart_policy.get("Name") or "").strip().lower()
            require_running = restart_policy_name not in NONPERSISTENT_RESTART_POLICIES
            result = subprocess.run(
                ["docker", "inspect", container_name],
                text=True,
                capture_output=True,
            )
            if result.returncode == 0:
                payload = json.loads(result.stdout or "[]")
                live_container = payload[0] if payload else {}
                state = live_container.get("State", {})
                running = bool(state.get("Running"))
                status = str(state.get("Status") or "")
                exit_code = state.get("ExitCode")
                healthy = running or (
                    not require_running
                    and status == "exited"
                    and exit_code == 0
                )
                statuses.append(
                    {
                        "container": container_name,
                        "running": running,
                        "restart_policy": restart_policy_name,
                        "status": status,
                        "exit_code": exit_code,
                        "healthy": healthy,
                    }
                )
                if require_running and not running:
                    all_running = False
                continue

            statuses.append(
                {
                    "container": container_name,
                    "running": False,
                    "restart_policy": restart_policy_name,
                    "status": "missing",
                    "exit_code": None,
                    "healthy": False,
                }
            )
            if require_running:
                all_running = False

        print(json.dumps(statuses))
        sys.exit(0 if all_running else 1)
    stdin: "{{ outline_pre_restart_container_details | default([]) | to_json }}"
  register: outline_recovered_container_inspect
  changed_when: false
  retries: 12
  delay: 5
  until: outline_recovered_container_inspect.rc == 0
  when:
    - outline_docker_nat_chain.rc != 0
    - outline_pre_restart_container_details | default([]) | length > 0

- name: Assert Docker nat chain is present before Outline startup
  ansible.builtin.assert:
    that:
      - outline_docker_nat_chain.rc == 0 or outline_docker_nat_chain_recheck.rc == 0
    fail_msg: "Docker is running but the nat DOCKER chain is missing; Outline published ports will fail."

- name: Check whether the Outline local port is already published
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ outline_internal_port }}"
    delay: 0
    timeout: 1
  register: outline_local_port_probe
  changed_when: false
  failed_when: false

- name: Check whether the current Outline local health endpoint is healthy before startup
  ansible.builtin.uri:
    url: "{{ outline_internal_base_url }}/_health"
    method: GET
    status_code: 200
  register: outline_health_probe
  changed_when: false
  failed_when: false

- name: Record whether the Outline startup needs a force recreate
  ansible.builtin.set_fact:
    outline_force_recreate: >-
      {{
        outline_docker_nat_chain.rc != 0
        or (outline_env_template.changed | default(false))
        or (outline_compose_template.changed | default(false))
        or (outline_pull.changed | default(false))
        or (outline_local_port_probe.failed | default(false))
        or (outline_health_probe.status | default(0)) != 200
      }}

- name: Force-recreate the Outline runtime stack after Docker networking recovery
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ outline_compose_file }}"
      - up
      - -d
      - --remove-orphans
      - --force-recreate
  args:
    chdir: "{{ outline_site_dir }}"
  register: outline_force_recreate_up
  changed_when: >-
    'Creating' in outline_force_recreate_up.stdout
    or 'Recreating' in outline_force_recreate_up.stdout
    or 'Starting' in outline_force_recreate_up.stdout
  failed_when: false
  retries: 3
  delay: 5
  until: outline_force_recreate_up.rc == 0
  when: outline_force_recreate

- name: Assert the Outline force-recreate succeeded
  ansible.builtin.assert:
    that:
      - outline_force_recreate_up.rc == 0
    fail_msg: "{{ outline_force_recreate_up.stderr | default(outline_force_recreate_up.msg | default('outline compose force-recreate failed')) }}"
  when: outline_force_recreate

- name: Start the Outline runtime stack
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ outline_compose_file }}"
      - up
      - -d
      - --remove-orphans
  args:
    chdir: "{{ outline_site_dir }}"
  register: outline_start_up
  changed_when: >-
    'Creating' in outline_start_up.stdout
    or 'Recreating' in outline_start_up.stdout
    or 'Starting' in outline_start_up.stdout
  when: not outline_force_recreate

- name: Assert the Outline runtime stack started successfully
  ansible.builtin.assert:
    that:
      - outline_start_up.rc == 0
    fail_msg: "{{ outline_start_up.stderr | default(outline_start_up.msg | default('outline compose up failed')) }}"
  when: not outline_force_recreate

- name: Wait for the Outline runtime listener
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ outline_internal_port }}"
    delay: 0
    timeout: 240

- name: Wait for the Outline local health endpoint
  ansible.builtin.uri:
    url: "{{ outline_internal_base_url }}/_health"
    method: GET
    status_code: 200
  register: outline_health_check
  retries: 36
  delay: 5
  until: outline_health_check.status == 200
  changed_when: false

- name: Verify the Outline runtime
  ansible.builtin.import_tasks: verify.yml
