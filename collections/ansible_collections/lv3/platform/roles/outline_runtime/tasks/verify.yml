---
# Purpose: Verify the local Outline runtime health after compose convergence.
# Dependencies: ADR 0165 and ADR 0371.
- name: Verify the Outline runtime
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: outline
    common_verify_port: "{{ outline_internal_port }}"
    common_verify_health_url: "{{ outline_internal_base_url }}/_health"
    common_verify_health_retries: 12
    common_verify_health_delay: 5
