---
# NOTE: Conventional variables (site_dir, image, compose_file, env_file, openbao_*,
# container_name, internal_port, local_artifact_dir) are derived from
# platform_service_registry — ADR 0373.
# Purpose: Default runtime inputs for the Outline knowledge wiki.

outline_service_topology: "{{ hostvars[platform_topology_host].lv3_service_topology | service_topology_get('outline') }}"
outline_session_authority: "{{ platform_session_authority }}"
outline_internal_base_url: "http://127.0.0.1:{{ outline_internal_port }}"
outline_public_base_url: "https://{{ outline_service_topology.public_hostname }}"
# S3 access via shared platform MinIO (ADR 0274, ADR 0397, ADR 0398)
outline_s3_bucket_name: "{{ minio_outline_bucket_name }}"
outline_s3_access_key_id: "{{ minio_outline_access_key_id }}"
outline_s3_secret_key_local_file: "{{ minio_outline_secret_key_local_file }}"
outline_s3_public_url: "{{ minio_public_base_url }}"
outline_s3_internal_url: "{{ minio_private_api_url }}"
outline_public_edge_private_ip: "{{ hostvars[platform_topology_host].proxmox_public_edge_ipv4 }}"
outline_public_hostname_overrides:
  - hostname: "{{ outline_service_topology.public_hostname }}"
    address: "{{ outline_public_edge_private_ip }}"
  - hostname: "{{ hostvars[platform_topology_host].lv3_service_topology.keycloak.public_hostname }}"
    address: "{{ outline_public_edge_private_ip }}"
outline_redis_container_name: outline-redis
outline_minio_container_name: outline-minio
outline_redis_image: "{{ container_image_catalog.images.langfuse_redis_runtime.ref }}"
outline_minio_image: "{{ container_image_catalog.images.minio_runtime.ref }}"
outline_database_name: outline
outline_database_user: outline
outline_database_host: "{{ hostvars[hostvars[platform_topology_host].postgres_ha.initial_primary].ansible_host }}"
outline_database_password_local_file: "{{ outline_local_artifact_dir }}/database-password.txt"
outline_secret_key_local_file: "{{ outline_local_artifact_dir }}/secret-key.txt"
outline_utils_secret_local_file: "{{ outline_local_artifact_dir }}/utils-secret.txt"
outline_redis_password_local_file: "{{ outline_local_artifact_dir }}/redis-password.txt"
outline_minio_root_password_local_file: "{{ outline_local_artifact_dir }}/minio-root-password.txt"
outline_api_token_local_file: "{{ outline_local_artifact_dir }}/api-token.txt"
outline_keycloak_client_secret_local_file: "{{ repo_shared_local_root }}/keycloak/outline-client-secret.txt"
outline_operator_password_local_file: "{{ repo_shared_local_root }}/keycloak/outline.automation-password.txt"
outline_secret_key_remote_file: "{{ outline_secret_dir }}/secret-key.txt"
outline_utils_secret_remote_file: "{{ outline_secret_dir }}/utils-secret.txt"
outline_redis_password_remote_file: "{{ outline_secret_dir }}/redis-password.txt"
outline_minio_root_password_remote_file: "{{ outline_secret_dir }}/minio-root-password.txt"
outline_keycloak_client_id: outline
outline_keycloak_issuer: "{{ keycloak_oidc_issuer_url }}"
outline_keycloak_auth_uri: "{{ keycloak_oidc_auth_url }}"
outline_keycloak_token_uri: "{{ keycloak_oidc_token_url }}"
outline_keycloak_userinfo_uri: "{{ keycloak_oidc_userinfo_url }}"
outline_keycloak_logout_uri: >-
  {{ outline_session_authority.keycloak_logout_url }}?client_id={{ outline_keycloak_client_id }}&post_logout_redirect_uri={{ outline_session_authority.shared_proxy_cleanup_url | urlencode }}
outline_keycloak_username_claim: preferred_username
outline_keycloak_scopes: openid profile email
outline_bootstrap_username: outline.automation
outline_aws_region: eu-central-1
outline_api_token_name: lv3-outline-sync
outline_api_token_scopes:
  - collections.create
  - collections.delete
  - collections.info
  - collections.list
  - collections.update
  - collections.memberships
  - collections.addUser
  - collections.removeUser
  - collections.addGroup
  - collections.removeGroup
  - documents.create
  - documents.delete
  - documents.info
  - documents.list
  - documents.update
  - groups.create
  - groups.delete
  - groups.info
  - groups.list
  - groups.update
  - groups.memberships
  - groups.addUser
  - groups.removeUser
  - users.list
  - users.read
outline_app_name: LV3 Knowledge Wiki
outline_force_https: true
outline_enable_updates: false
