---
# Dependencies: ADR 0371.
- name: Verify the Semaphore runtime health
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: semaphore
    common_verify_port: "{{ semaphore_server_port }}"
    common_verify_health_url: "{{ semaphore_private_base_url }}/api/ping"
    common_verify_health_retries: 18
    common_verify_health_delay: 5
    common_verify_health_assertions:
      - "common_verify_health_response.content | trim == 'pong'"
    common_verify_health_assertion_msg: "Semaphore API responded, but the expected ping payload was not returned."

- name: Run the seeded Semaphore self-test template
  ansible.builtin.command:
    argv:
      - python3
      - "{{ playbook_dir }}/../scripts/semaphore_tool.py"
      - --auth-file
      - "{{ semaphore_admin_auth_local_file }}"
      - run-template
      - --template
      - "{{ semaphore_self_test_template_name }}"
      - --wait
      - --timeout
      - "300"
  delegate_to: localhost
  become: false
  register: semaphore_verify_task
  changed_when: false

- name: Assert the seeded Semaphore self-test task succeeded
  ansible.builtin.assert:
    that:
      - (semaphore_verify_task.stdout | from_json).status == "success"
      - (semaphore_verify_task.stdout | from_json).finished | bool
    fail_msg: "Semaphore UI/API bootstrap succeeded, but the seeded self-test template did not finish successfully."
