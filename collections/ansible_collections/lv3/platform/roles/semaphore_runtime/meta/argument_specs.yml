---
argument_specs:
  main:
    short_description: Converge Semaphore, bootstrap controller auth, and seed the self-test project state.
    options:
      semaphore_site_dir:
        type: path
        required: true
      semaphore_data_dir:
        type: path
        required: true
      semaphore_secret_dir:
        type: path
        required: true
      semaphore_compose_file:
        type: path
        required: true
      semaphore_env_file:
        type: path
        required: true
      semaphore_server_port:
        type: int
        required: true
      semaphore_host_proxy_port:
        type: int
        required: true
      semaphore_image:
        type: str
        required: true
      semaphore_container_name:
        type: str
        required: true
      semaphore_controller_url:
        type: str
        required: true
      semaphore_private_base_url:
        type: str
        required: true
      semaphore_database_name:
        type: str
        required: true
      semaphore_database_user:
        type: str
        required: true
      semaphore_database_host:
        type: str
        required: true
      semaphore_database_password_local_file:
        type: path
        required: true
      semaphore_admin_password_local_file:
        type: path
        required: true
      semaphore_api_token_local_file:
        type: path
        required: true
      semaphore_admin_auth_local_file:
        type: path
        required: true
      semaphore_bootstrap_spec_local_file:
        type: path
        required: true
      semaphore_enable_oidc:
        type: bool
        required: false
        default: true
        description: Enable Keycloak OIDC SSO authentication
      semaphore_oidc_provider:
        type: str
        required: false
        default: keycloak
        description: OIDC provider name
      semaphore_oidc_client_id:
        type: str
        required: false
        default: semaphore
        description: Keycloak OIDC client ID
      semaphore_oidc_client_secret_local_file:
        type: path
        required: false
        description: Path to OIDC client secret on control machine
      semaphore_oidc_issuer_url:
        type: str
        required: false
        description: Keycloak realm issuer URL
      semaphore_oidc_callback_url:
        type: str
        required: false
        description: OIDC callback/redirect URL
      semaphore_oidc_scopes:
        type: str
        required: false
        default: "openid profile email"
        description: OpenID Connect scopes to request
      semaphore_oidc_auto_provision_user:
        type: bool
        required: false
        default: true
        description: Auto-provision users on first OIDC login
