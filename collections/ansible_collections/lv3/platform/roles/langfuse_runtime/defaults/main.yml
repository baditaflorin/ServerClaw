---
# NOTE: Conventional variables (site_dir, image, compose_file, env_file,
# openbao_*, container_name, internal_port, local_artifact_dir) are derived
# from platform_service_registry — ADR 0373.
# Purpose: Declare the shared defaults for converging Langfuse, its backing services, and the shared MinIO upload contract.
# Use case: Load whenever the langfuse_runtime role renders compose state, runtime secrets, and bootstrap metadata.
#
# Inputs (required):
#   - ansible host facts, service topology, image catalog refs, and repo-local secret paths.
#
# Inputs (optional):
#   - langfuse_* overrides (optional): Allow controlled overrides of runtime paths, bootstrap metadata, and object-storage inputs.
#
# Outputs:
#   - Default variable values consumed by the langfuse_runtime role.
#
# Idempotency: Fully idempotent
#              This file only declares role defaults.
#
# Dependencies:
#   - ADR 0146: Defines Langfuse as the agent observability surface.
#   - ADR 0165: Requires metadata headers on managed playbook and role surfaces.
#   - ADR 0274: Moves Langfuse uploads to the shared MinIO object layer.
langfuse_service_topology: "{{ hostvars[platform_topology_host].lv3_service_topology | service_topology_get('langfuse') }}"
langfuse_clickhouse_log_dir: "{{ langfuse_data_dir }}/clickhouse-logs"
langfuse_internal_base_url: "{{ platform_service_topology | platform_service_url('langfuse', 'internal') }}"
langfuse_public_base_url: "https://{{ langfuse_service_topology.public_hostname }}"
langfuse_redis_uid: "999"
langfuse_redis_gid: "999"
langfuse_database_name: langfuse
langfuse_database_user: langfuse
langfuse_database_host: "{{ hostvars[hostvars[platform_topology_host].postgres_ha.initial_primary].ansible_host }}"
langfuse_database_password_local_file: "{{ langfuse_local_artifact_dir }}/database-password.txt"
langfuse_nextauth_secret_local_file: "{{ langfuse_local_artifact_dir }}/nextauth-secret.txt"
langfuse_salt_local_file: "{{ langfuse_local_artifact_dir }}/salt.txt"
langfuse_encryption_key_local_file: "{{ langfuse_local_artifact_dir }}/encryption-key.txt"
langfuse_clickhouse_password_local_file: "{{ langfuse_local_artifact_dir }}/clickhouse-password.txt"
langfuse_redis_password_local_file: "{{ langfuse_local_artifact_dir }}/redis-password.txt"
langfuse_minio_secret_key_local_file: "{{ langfuse_local_artifact_dir }}/minio-secret-key.txt"
langfuse_bootstrap_user_password_local_file: "{{ langfuse_local_artifact_dir }}/bootstrap-user-password.txt"
langfuse_project_public_key_local_file: "{{ langfuse_local_artifact_dir }}/project-public-key.txt"
langfuse_project_secret_key_local_file: "{{ langfuse_local_artifact_dir }}/project-secret-key.txt"
langfuse_project_id_local_file: "{{ langfuse_local_artifact_dir }}/project-id.txt"
langfuse_keycloak_client_secret_local_file: "{{ repo_shared_local_root }}/keycloak/langfuse-client-secret.txt"
langfuse_nextauth_secret_remote_file: "{{ langfuse_secret_dir }}/nextauth-secret.txt"
langfuse_salt_remote_file: "{{ langfuse_secret_dir }}/salt.txt"
langfuse_encryption_key_remote_file: "{{ langfuse_secret_dir }}/encryption-key.txt"
langfuse_clickhouse_password_remote_file: "{{ langfuse_secret_dir }}/clickhouse-password.txt"
langfuse_redis_password_remote_file: "{{ langfuse_secret_dir }}/redis-password.txt"
langfuse_bootstrap_user_password_remote_file: "{{ langfuse_secret_dir }}/bootstrap-user-password.txt"
langfuse_project_public_key_remote_file: "{{ langfuse_secret_dir }}/project-public-key.txt"
langfuse_project_secret_key_remote_file: "{{ langfuse_secret_dir }}/project-secret-key.txt"
langfuse_keycloak_client_id: langfuse
langfuse_keycloak_issuer: "{{ keycloak_oidc_issuer_url }}"
langfuse_init_org_id: lv3
langfuse_init_org_name: LV3
langfuse_init_project_id: lv3-agent-observability
langfuse_init_project_name: LV3 Agent Observability
langfuse_init_user_email: baditaflorin@gmail.com
langfuse_init_user_name: Florin Badita
langfuse_clickhouse_user: clickhouse
langfuse_minio_access_key_id: langfuseapp
langfuse_minio_bucket_name: langfuse-exports
langfuse_minio_private_endpoint: "{{ hostvars[platform_topology_host].platform_service_topology | platform_service_url('minio', 'internal') }}"
langfuse_minio_public_endpoint: "{{ hostvars[platform_topology_host].platform_service_topology | platform_service_url('minio', 'public') }}"
langfuse_disable_signup: false
langfuse_telemetry_enabled: false
