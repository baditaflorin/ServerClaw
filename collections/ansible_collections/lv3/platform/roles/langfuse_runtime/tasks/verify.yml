---
# Purpose: Verify the Langfuse runtime health and bootstrap API contracts after convergence.
# Use case: Included after Langfuse deployment or recovery to confirm the private runtime is reachable and usable.
# Inputs: langfuse_* verification URLs and seeded project credentials.
# Outputs: Pass/fail verification results for the Langfuse health and bootstrap API checks.
# Idempotency: Fully idempotent; verification only reads runtime state.
# Dependencies: ADR 0146, ADR 0165, ADR 0371, and a converged Langfuse runtime.
- name: Verify the Langfuse runtime health
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: langfuse
    common_verify_port: "{{ langfuse_internal_port }}"
    common_verify_health_url: "{{ langfuse_internal_base_url }}/api/public/health"
    common_verify_health_retries: 30
    common_verify_health_delay: 5

- name: Verify the Langfuse bootstrap project API is reachable
  ansible.builtin.uri:
    url: "{{ langfuse_internal_base_url }}/api/public/projects"
    method: GET
    headers:
      Authorization: "Basic {{ (langfuse_project_public_key ~ ':' ~ langfuse_project_secret_key) | b64encode }}"
    return_content: true
    status_code: 200
  register: langfuse_verify_project
  retries: 30
  delay: 5
  until: (langfuse_verify_project.status | default(0)) == 200
  changed_when: false
  failed_when: false
  no_log: true

- name: Assert the Langfuse bootstrap project matches the repo-managed seed
  ansible.builtin.assert:
    that:
      - (langfuse_verify_project.json.data | selectattr('id', 'equalto', langfuse_init_project_id) | list | length) == 1
      - (langfuse_verify_project.json.data | selectattr('id', 'equalto', langfuse_init_project_id) | map(attribute='name') | first) == langfuse_init_project_name
    fail_msg: "Langfuse started, but the repo-managed bootstrap project could not be verified."
  no_log: true
