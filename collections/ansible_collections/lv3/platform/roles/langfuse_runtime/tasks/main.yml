---
# Purpose: Converge the Langfuse runtime stack, bootstrap secrets, and shared MinIO upload contract on docker-runtime-lv3.
# Use case: Run during Langfuse deploys, upgrades, and recovery replays when the observability runtime must match repo truth.
#
# Inputs (required):
#   - langfuse_* role defaults, image catalog refs, controller-local secrets, and topology-derived URLs.
#
# Inputs (optional):
#   - Langfuse bootstrap and OpenBao overrides declared through the langfuse_* role variables.
#
# Outputs:
#   - Rendered Langfuse runtime env and compose files, mirrored bootstrap artifacts, and a running Langfuse stack.
#
# Idempotency: Partially idempotent
#              Reruns reconcile the same runtime stack, bootstrap secrets, and MinIO upload settings.
#
# Dependencies:
#   - ADR 0146, ADR 0165, ADR 0274, and ADR 0370.
- name: Derive Langfuse conventional defaults from the service registry
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: derive_service_defaults
  vars:
    common_derive_service_name: langfuse


- name: Validate Langfuse runtime inputs
  ansible.builtin.assert:
    that:
      - langfuse_site_dir | length > 0
      - langfuse_secret_dir | length > 0
      - langfuse_compose_file | length > 0
      - langfuse_env_file | length > 0
      - langfuse_internal_port | int > 0
      - langfuse_internal_base_url | length > 0
      - langfuse_public_base_url | length > 0
      - langfuse_database_password_local_file | length > 0
      - langfuse_keycloak_client_secret_local_file | length > 0
      - langfuse_minio_secret_key_local_file | length > 0
      - langfuse_web_image | length > 0
      - langfuse_worker_image | length > 0
      - langfuse_clickhouse_image | length > 0
      - langfuse_redis_image | length > 0
    fail_msg: >-
      langfuse_runtime requires runtime paths, pinned image refs, database auth,
      and the repo-managed Keycloak client secret.

- name: Check Langfuse prerequisites on the control machine
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: check_local_secrets
  vars:
    common_check_local_secrets_files:
      - path: "{{ langfuse_database_password_local_file }}"
        description: "Langfuse database password"
        prerequisite: "Converge langfuse_postgres before deploying Langfuse"
      - path: "{{ langfuse_keycloak_client_secret_local_file }}"
        description: "Langfuse Keycloak client secret"
        prerequisite: "Converge the Keycloak runtime before deploying Langfuse"
      - path: "{{ langfuse_minio_secret_key_local_file }}"
        description: "Langfuse MinIO secret key"
        prerequisite: "Converge MinIO before deploying Langfuse so shared object storage is available"

- name: Ensure the Langfuse runtime packages are present
  ansible.builtin.apt:
    name:
      - openssl
      - python3
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure the Langfuse runtime directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ langfuse_site_dir }}"
      mode: "0755"
    - path: "{{ langfuse_data_dir }}"
      mode: "0755"
    - path: "{{ langfuse_clickhouse_data_dir }}"
      owner: "101"
      group: "101"
      mode: "0750"
    - path: "{{ langfuse_clickhouse_log_dir }}"
      owner: "101"
      group: "101"
      mode: "0750"
    - path: "{{ langfuse_redis_data_dir }}"
      owner: "{{ langfuse_redis_uid }}"
      group: "{{ langfuse_redis_gid }}"
      mode: "0750"
    - path: "{{ langfuse_secret_dir }}"
      mode: "0700"

- name: Manage Langfuse runtime secrets
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: manage_service_secrets
  vars:
    common_manage_service_secrets_generate:
      - path: "{{ langfuse_nextauth_secret_remote_file }}"
        command: "openssl rand -base64 36 | tr -d '\\n'"
        label: "langfuse-nextauth-secret"
      - path: "{{ langfuse_salt_remote_file }}"
        command: "openssl rand -hex 16"
        label: "langfuse-salt"
      - path: "{{ langfuse_encryption_key_remote_file }}"
        command: "openssl rand -hex 32"
        label: "langfuse-encryption-key"
      - path: "{{ langfuse_clickhouse_password_remote_file }}"
        command: "openssl rand -base64 24 | tr -d '\\n'"
        label: "langfuse-clickhouse-password"
      - path: "{{ langfuse_redis_password_remote_file }}"
        command: "openssl rand -base64 24 | tr -d '\\n'"
        label: "langfuse-redis-password"
      - path: "{{ langfuse_bootstrap_user_password_remote_file }}"
        command: "openssl rand -base64 24 | tr -d '\\n'"
        label: "langfuse-bootstrap-user-password"
      - path: "{{ langfuse_project_public_key_remote_file }}"
        command: "python3 -c \"from uuid import uuid4; print(f'pk-lf-{uuid4()}')\""
        label: "langfuse-project-public-key"
      - path: "{{ langfuse_project_secret_key_remote_file }}"
        command: "python3 -c \"from uuid import uuid4; print(f'sk-lf-{uuid4()}')\""
        label: "langfuse-project-secret-key"
    common_manage_service_secrets_read:
      - "{{ langfuse_nextauth_secret_remote_file }}"
      - "{{ langfuse_salt_remote_file }}"
      - "{{ langfuse_encryption_key_remote_file }}"
      - "{{ langfuse_clickhouse_password_remote_file }}"
      - "{{ langfuse_redis_password_remote_file }}"
      - "{{ langfuse_bootstrap_user_password_remote_file }}"
      - "{{ langfuse_project_public_key_remote_file }}"
      - "{{ langfuse_project_secret_key_remote_file }}"
    common_manage_service_secrets_mirror:
      - dest: "{{ langfuse_nextauth_secret_local_file }}"
        content_index: 0
      - dest: "{{ langfuse_salt_local_file }}"
        content_index: 1
      - dest: "{{ langfuse_encryption_key_local_file }}"
        content_index: 2
      - dest: "{{ langfuse_clickhouse_password_local_file }}"
        content_index: 3
      - dest: "{{ langfuse_redis_password_local_file }}"
        content_index: 4
      - dest: "{{ langfuse_bootstrap_user_password_local_file }}"
        content_index: 5
      - dest: "{{ langfuse_project_public_key_local_file }}"
        content_index: 6
      - dest: "{{ langfuse_project_secret_key_local_file }}"
        content_index: 7
    common_manage_service_secrets_local_artifact_dir: "{{ langfuse_local_artifact_dir }}"
    common_manage_service_secrets_fact_name: "langfuse_decoded_secrets"
  no_log: true

- name: Mirror the Langfuse project ID to the control machine
  ansible.builtin.copy:
    dest: "{{ langfuse_project_id_local_file }}"
    content: "{{ langfuse_init_project_id }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false

- name: Record the Langfuse runtime secrets
  ansible.builtin.set_fact:
    langfuse_nextauth_secret: "{{ langfuse_decoded_secrets[0] }}"
    langfuse_salt: "{{ langfuse_decoded_secrets[1] }}"
    langfuse_encryption_key: "{{ langfuse_decoded_secrets[2] }}"
    langfuse_clickhouse_password: "{{ langfuse_decoded_secrets[3] }}"
    langfuse_redis_password: "{{ langfuse_decoded_secrets[4] }}"
    langfuse_bootstrap_user_password: "{{ langfuse_decoded_secrets[5] }}"
    langfuse_project_public_key: "{{ langfuse_decoded_secrets[6] }}"
    langfuse_project_secret_key: "{{ langfuse_decoded_secrets[7] }}"
    langfuse_database_password: "{{ lookup('ansible.builtin.file', langfuse_database_password_local_file) | trim }}"
    langfuse_keycloak_client_secret: "{{ lookup('ansible.builtin.file', langfuse_keycloak_client_secret_local_file) | trim }}"
    langfuse_minio_secret_key: "{{ lookup('ansible.builtin.file', langfuse_minio_secret_key_local_file) | trim }}"
    langfuse_database_url: >-
      postgresql://{{ langfuse_database_user }}:{{ (lookup('ansible.builtin.file', langfuse_database_password_local_file) | trim) | urlencode }}@{{ langfuse_database_host }}:5432/{{ langfuse_database_name }}
    langfuse_runtime_secret_payload:
      NEXTAUTH_SECRET: "{{ langfuse_decoded_secrets[0] }}"
      SALT: "{{ langfuse_decoded_secrets[1] }}"
      ENCRYPTION_KEY: "{{ langfuse_decoded_secrets[2] }}"
      CLICKHOUSE_PASSWORD: "{{ langfuse_decoded_secrets[3] }}"
      REDIS_AUTH: "{{ langfuse_decoded_secrets[4] }}"
      LANGFUSE_S3_SECRET_ACCESS_KEY: "{{ lookup('ansible.builtin.file', langfuse_minio_secret_key_local_file) | trim }}"
      LANGFUSE_INIT_USER_PASSWORD: "{{ langfuse_decoded_secrets[5] }}"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: "{{ langfuse_decoded_secrets[6] }}"
      LANGFUSE_INIT_PROJECT_SECRET_KEY: "{{ langfuse_decoded_secrets[7] }}"
      DATABASE_PASSWORD: "{{ lookup('ansible.builtin.file', langfuse_database_password_local_file) | trim }}"
      DATABASE_URL: >-
        postgresql://{{ langfuse_database_user }}:{{ (lookup('ansible.builtin.file', langfuse_database_password_local_file) | trim) | urlencode }}@{{ langfuse_database_host }}:5432/{{ langfuse_database_name }}
      AUTH_KEYCLOAK_CLIENT_SECRET: "{{ lookup('ansible.builtin.file', langfuse_keycloak_client_secret_local_file) | trim }}"
  no_log: true

- name: Prepare OpenBao agent runtime secret injection for Langfuse
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: openbao_compose_env
  vars:
    common_openbao_compose_env_service_name: langfuse
    common_openbao_compose_env_agent_dir: "{{ langfuse_openbao_agent_dir }}"
    common_openbao_compose_env_runtime_dir: "{{ langfuse_env_file | dirname }}"
    common_openbao_compose_env_env_file: "{{ langfuse_env_file }}"
    common_openbao_compose_env_secret_path: "{{ langfuse_openbao_secret_path }}"
    common_openbao_compose_env_secret_payload: "{{ langfuse_runtime_secret_payload }}"
    common_openbao_compose_env_policy_name: "{{ langfuse_openbao_policy_name }}"
    common_openbao_compose_env_policy_rules: |
      path "sys/health" {
        capabilities = ["read"]
      }

      path "kv/data/{{ langfuse_openbao_secret_path }}" {
        capabilities = ["read"]
      }

      path "kv/metadata/{{ langfuse_openbao_secret_path }}" {
        capabilities = ["read", "list"]
      }
    common_openbao_compose_env_approle_name: "{{ langfuse_openbao_approle_name }}"
    common_openbao_compose_env_agent_config_file: "{{ langfuse_openbao_agent_dir }}/agent.hcl"
    common_openbao_compose_env_agent_template_file: "{{ langfuse_openbao_agent_dir }}/runtime.env.ctmpl"
    common_openbao_compose_env_agent_template_src: langfuse.env.ctmpl.j2
    common_openbao_compose_env_role_id_file: "{{ langfuse_openbao_agent_dir }}/role_id"
    common_openbao_compose_env_secret_id_file: "{{ langfuse_openbao_agent_dir }}/secret_id"
    common_openbao_compose_env_image: "{{ langfuse_openbao_agent_image }}"
    common_openbao_compose_env_legacy_env_files:
      - "{{ langfuse_legacy_env_file }}"
  no_log: true

- name: Render the Langfuse environment file
  ansible.builtin.template:
    src: langfuse.env.j2
    dest: "{{ langfuse_env_file }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Render the Langfuse compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ langfuse_compose_file }}"
    owner: root
    group: root
    mode: "0644"
  vars:
    ansible_search_path: "{{ [role_path + '/../common'] + (ansible_search_path | default([])) }}"

- name: Pull the Langfuse images
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ langfuse_compose_file }}"
      - pull
  args:
    chdir: "{{ langfuse_site_dir }}"
  register: langfuse_pull
  changed_when: >-
    'Pulling' in langfuse_pull.stdout
    or 'Downloaded newer image' in langfuse_pull.stdout
    or 'Pull complete' in langfuse_pull.stdout

- name: Start the Langfuse stack and recover stale compose-network failures
  block:
    - name: Start the Langfuse stack
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ langfuse_compose_file }}"
          - up
          - -d
          - --remove-orphans
      args:
        chdir: "{{ langfuse_site_dir }}"
      register: langfuse_up
      changed_when: >-
        'Creating' in langfuse_up.stdout
        or 'Recreating' in langfuse_up.stdout
        or 'Starting' in langfuse_up.stdout
  rescue:
    - name: Flag stale Langfuse compose-network failures during startup
      ansible.builtin.set_fact:
        langfuse_compose_network_missing: >-
          {{
            'failed to create endpoint' in (ansible_failed_result.stderr | default(''))
            and 'does not exist' in (ansible_failed_result.stderr | default(''))
          }}

    - name: Surface unexpected Langfuse startup failures
      ansible.builtin.fail:
        msg: >-
          {{
            ansible_failed_result.stderr
            | default(ansible_failed_result.msg | default('langfuse compose up failed'))
          }}
      when: not langfuse_compose_network_missing

    - name: Reset stale Langfuse compose resources before retrying startup
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ langfuse_compose_file }}"
          - down
          - --remove-orphans
      args:
        chdir: "{{ langfuse_site_dir }}"
      register: langfuse_down
      changed_when: >-
        'Stopping' in (langfuse_down.stdout | default(''))
        or 'Removing' in (langfuse_down.stdout | default(''))
        or 'Removing' in (langfuse_down.stderr | default(''))
      failed_when: false
      when: langfuse_compose_network_missing

    - name: Retry Langfuse stack startup after compose-network recovery
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ langfuse_compose_file }}"
          - up
          - -d
          - --force-recreate
          - --remove-orphans
      args:
        chdir: "{{ langfuse_site_dir }}"
      register: langfuse_up
      changed_when: >-
        'Creating' in langfuse_up.stdout
        or 'Recreating' in langfuse_up.stdout
        or 'Starting' in langfuse_up.stdout
      when: langfuse_compose_network_missing

- name: Check whether Langfuse has an attached Docker network
  ansible.builtin.shell: |
    set -euo pipefail
    docker inspect "{{ langfuse_web_container_name }}" --format '{{ "{{json .NetworkSettings.Networks}}" }}'
  args:
    executable: /bin/bash
  register: langfuse_network_attachment_check
  changed_when: false
  failed_when: false

- name: Force-recreate Langfuse when Docker network attachment is missing
  when: langfuse_network_attachment_check.stdout | trim in ['', '{}', 'null']
  block:
    - name: Reset stale Langfuse compose resources after missing network attachment detection
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ langfuse_compose_file }}"
          - down
          - --remove-orphans
      args:
        chdir: "{{ langfuse_site_dir }}"
      register: langfuse_network_recovery_down
      changed_when: >-
        'Stopping' in (langfuse_network_recovery_down.stdout | default(''))
        or 'Removing' in (langfuse_network_recovery_down.stdout | default(''))
        or 'Removing' in (langfuse_network_recovery_down.stderr | default(''))
      failed_when: false

    - name: Remove the stale Langfuse compose network before retrying startup
      ansible.builtin.shell: |
        set -euo pipefail
        stale_networks="$(docker network ls -q --filter name=^{{ langfuse_site_dir | basename }}_default$)"
        if [ -n "${stale_networks}" ]; then
          docker network rm ${stale_networks}
          echo changed
        fi
      args:
        chdir: "{{ langfuse_site_dir }}"
        executable: /bin/bash
      register: langfuse_network_cleanup
      changed_when: "'changed' in langfuse_network_cleanup.stdout"

    - name: Force-recreate Langfuse after local network attachment recovery
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ langfuse_compose_file }}"
          - up
          - -d
          - --force-recreate
          - --remove-orphans
      args:
        chdir: "{{ langfuse_site_dir }}"
      register: langfuse_network_recovery_up
      changed_when: >-
        'Creating' in langfuse_network_recovery_up.stdout
        or 'Recreating' in langfuse_network_recovery_up.stdout
        or 'Starting' in langfuse_network_recovery_up.stdout

- name: Recheck Langfuse Docker network attachment
  ansible.builtin.shell: |
    set -euo pipefail
    docker inspect "{{ langfuse_web_container_name }}" --format '{{ "{{json .NetworkSettings.Networks}}" }}'
  args:
    executable: /bin/bash
  register: langfuse_network_attachment_recheck
  changed_when: false
  retries: 5
  delay: 2
  until: langfuse_network_attachment_recheck.stdout | trim not in ['', '{}', 'null']

- name: Wait for Langfuse to listen locally
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ langfuse_internal_port }}"
    delay: 0
    timeout: 300

- name: Wait for the Langfuse public health endpoint
  ansible.builtin.uri:
    url: "{{ langfuse_internal_base_url }}/api/public/health"
    method: GET
    status_code: 200
  register: langfuse_health_ready
  retries: 60
  delay: 5
  until: langfuse_health_ready.status == 200
  changed_when: false

- name: Verify Langfuse health probes
  ansible.builtin.import_tasks: verify.yml
