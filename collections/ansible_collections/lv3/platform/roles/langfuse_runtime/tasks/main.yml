---
- name: Validate Langfuse runtime inputs
  ansible.builtin.assert:
    that:
      - langfuse_site_dir | length > 0
      - langfuse_secret_dir | length > 0
      - langfuse_compose_file | length > 0
      - langfuse_env_file | length > 0
      - langfuse_internal_port | int > 0
      - langfuse_internal_base_url | length > 0
      - langfuse_public_base_url | length > 0
      - langfuse_database_password_local_file | length > 0
      - langfuse_keycloak_client_secret_local_file | length > 0
      - langfuse_web_image | length > 0
      - langfuse_worker_image | length > 0
      - langfuse_clickhouse_image | length > 0
      - langfuse_minio_image | length > 0
      - langfuse_redis_image | length > 0
    fail_msg: >-
      langfuse_runtime requires runtime paths, pinned image refs, database auth,
      and the repo-managed Keycloak client secret.

- name: Check whether the Langfuse database password exists on the control machine
  ansible.builtin.stat:
    path: "{{ langfuse_database_password_local_file }}"
  delegate_to: localhost
  become: false
  register: langfuse_database_password_local

- name: Check whether the Langfuse Keycloak client secret exists on the control machine
  ansible.builtin.stat:
    path: "{{ langfuse_keycloak_client_secret_local_file }}"
  delegate_to: localhost
  become: false
  register: langfuse_keycloak_client_secret_local

- name: Fail if the Langfuse database password is missing locally
  ansible.builtin.fail:
    msg: >-
      {{ langfuse_database_password_local_file }} is missing on the control machine.
      Converge langfuse_postgres before deploying Langfuse.
  when: not langfuse_database_password_local.stat.exists

- name: Fail if the Langfuse Keycloak client secret is missing locally
  ansible.builtin.fail:
    msg: >-
      {{ langfuse_keycloak_client_secret_local_file }} is missing on the control machine.
      Converge the Keycloak runtime before deploying Langfuse.
  when: not langfuse_keycloak_client_secret_local.stat.exists

- name: Ensure the Langfuse runtime packages are present
  ansible.builtin.apt:
    name:
      - openssl
      - python3
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure the Langfuse runtime directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ langfuse_site_dir }}"
      mode: "0755"
    - path: "{{ langfuse_data_dir }}"
      mode: "0755"
    - path: "{{ langfuse_clickhouse_data_dir }}"
      owner: "101"
      group: "101"
      mode: "0750"
    - path: "{{ langfuse_clickhouse_log_dir }}"
      owner: "101"
      group: "101"
      mode: "0750"
    - path: "{{ langfuse_minio_data_dir }}"
      mode: "0755"
    - path: "{{ langfuse_minio_data_dir }}/{{ langfuse_bucket_name }}"
      mode: "0755"
    - path: "{{ langfuse_redis_data_dir }}"
      mode: "0755"
    - path: "{{ langfuse_secret_dir }}"
      mode: "0700"

- name: Generate the Langfuse runtime secrets
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ item.path }}" ]; then
      umask 077
      {{ item.command }} > "{{ item.path }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  loop:
    - path: "{{ langfuse_nextauth_secret_remote_file }}"
      command: "openssl rand -base64 36 | tr -d '\n'"
    - path: "{{ langfuse_salt_remote_file }}"
      command: "openssl rand -hex 16"
    - path: "{{ langfuse_encryption_key_remote_file }}"
      command: "openssl rand -hex 32"
    - path: "{{ langfuse_clickhouse_password_remote_file }}"
      command: "openssl rand -base64 24 | tr -d '\n'"
    - path: "{{ langfuse_redis_password_remote_file }}"
      command: "openssl rand -base64 24 | tr -d '\n'"
    - path: "{{ langfuse_minio_root_password_remote_file }}"
      command: "openssl rand -base64 24 | tr -d '\n'"
    - path: "{{ langfuse_bootstrap_user_password_remote_file }}"
      command: "openssl rand -base64 24 | tr -d '\n'"
    - path: "{{ langfuse_project_public_key_remote_file }}"
      command: "python3 -c \"from uuid import uuid4; print(f'pk-lf-{uuid4()}')\""
    - path: "{{ langfuse_project_secret_key_remote_file }}"
      command: "python3 -c \"from uuid import uuid4; print(f'sk-lf-{uuid4()}')\""
  register: langfuse_secret_generation
  changed_when: "'changed' in langfuse_secret_generation.stdout"
  no_log: true

- name: Read the Langfuse runtime secrets
  ansible.builtin.slurp:
    src: "{{ item }}"
  register: langfuse_secret_reads
  loop:
    - "{{ langfuse_nextauth_secret_remote_file }}"
    - "{{ langfuse_salt_remote_file }}"
    - "{{ langfuse_encryption_key_remote_file }}"
    - "{{ langfuse_clickhouse_password_remote_file }}"
    - "{{ langfuse_redis_password_remote_file }}"
    - "{{ langfuse_minio_root_password_remote_file }}"
    - "{{ langfuse_bootstrap_user_password_remote_file }}"
    - "{{ langfuse_project_public_key_remote_file }}"
    - "{{ langfuse_project_secret_key_remote_file }}"
  no_log: true

- name: Record the Langfuse runtime secrets
  ansible.builtin.set_fact:
    langfuse_nextauth_secret: "{{ langfuse_secret_reads.results[0].content | b64decode | trim }}"
    langfuse_salt: "{{ langfuse_secret_reads.results[1].content | b64decode | trim }}"
    langfuse_encryption_key: "{{ langfuse_secret_reads.results[2].content | b64decode | trim }}"
    langfuse_clickhouse_password: "{{ langfuse_secret_reads.results[3].content | b64decode | trim }}"
    langfuse_redis_password: "{{ langfuse_secret_reads.results[4].content | b64decode | trim }}"
    langfuse_minio_root_password: "{{ langfuse_secret_reads.results[5].content | b64decode | trim }}"
    langfuse_bootstrap_user_password: "{{ langfuse_secret_reads.results[6].content | b64decode | trim }}"
    langfuse_project_public_key: "{{ langfuse_secret_reads.results[7].content | b64decode | trim }}"
    langfuse_project_secret_key: "{{ langfuse_secret_reads.results[8].content | b64decode | trim }}"
    langfuse_database_password: "{{ lookup('ansible.builtin.file', langfuse_database_password_local_file) | trim }}"
    langfuse_keycloak_client_secret: "{{ lookup('ansible.builtin.file', langfuse_keycloak_client_secret_local_file) | trim }}"
    langfuse_database_url: >-
      postgresql://{{ langfuse_database_user }}:{{ (lookup('ansible.builtin.file', langfuse_database_password_local_file) | trim) | urlencode }}@{{ langfuse_database_host }}:5432/{{ langfuse_database_name }}
    langfuse_runtime_secret_payload:
      NEXTAUTH_SECRET: "{{ langfuse_secret_reads.results[0].content | b64decode | trim }}"
      SALT: "{{ langfuse_secret_reads.results[1].content | b64decode | trim }}"
      ENCRYPTION_KEY: "{{ langfuse_secret_reads.results[2].content | b64decode | trim }}"
      CLICKHOUSE_PASSWORD: "{{ langfuse_secret_reads.results[3].content | b64decode | trim }}"
      REDIS_AUTH: "{{ langfuse_secret_reads.results[4].content | b64decode | trim }}"
      MINIO_ROOT_PASSWORD: "{{ langfuse_secret_reads.results[5].content | b64decode | trim }}"
      LANGFUSE_INIT_USER_PASSWORD: "{{ langfuse_secret_reads.results[6].content | b64decode | trim }}"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: "{{ langfuse_secret_reads.results[7].content | b64decode | trim }}"
      LANGFUSE_INIT_PROJECT_SECRET_KEY: "{{ langfuse_secret_reads.results[8].content | b64decode | trim }}"
      DATABASE_PASSWORD: "{{ lookup('ansible.builtin.file', langfuse_database_password_local_file) | trim }}"
      DATABASE_URL: >-
        postgresql://{{ langfuse_database_user }}:{{ (lookup('ansible.builtin.file', langfuse_database_password_local_file) | trim) | urlencode }}@{{ langfuse_database_host }}:5432/{{ langfuse_database_name }}
      AUTH_KEYCLOAK_CLIENT_SECRET: "{{ lookup('ansible.builtin.file', langfuse_keycloak_client_secret_local_file) | trim }}"
  no_log: true

- name: Ensure the local Langfuse artifact directory exists
  ansible.builtin.file:
    path: "{{ langfuse_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Mirror the Langfuse bootstrap and API secrets to the control machine
  ansible.builtin.copy:
    dest: "{{ item.dest }}"
    content: "{{ item.content }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  loop:
    - dest: "{{ langfuse_nextauth_secret_local_file }}"
      content: "{{ langfuse_nextauth_secret }}"
    - dest: "{{ langfuse_salt_local_file }}"
      content: "{{ langfuse_salt }}"
    - dest: "{{ langfuse_encryption_key_local_file }}"
      content: "{{ langfuse_encryption_key }}"
    - dest: "{{ langfuse_clickhouse_password_local_file }}"
      content: "{{ langfuse_clickhouse_password }}"
    - dest: "{{ langfuse_redis_password_local_file }}"
      content: "{{ langfuse_redis_password }}"
    - dest: "{{ langfuse_minio_root_password_local_file }}"
      content: "{{ langfuse_minio_root_password }}"
    - dest: "{{ langfuse_bootstrap_user_password_local_file }}"
      content: "{{ langfuse_bootstrap_user_password }}"
    - dest: "{{ langfuse_project_public_key_local_file }}"
      content: "{{ langfuse_project_public_key }}"
    - dest: "{{ langfuse_project_secret_key_local_file }}"
      content: "{{ langfuse_project_secret_key }}"
    - dest: "{{ langfuse_project_id_local_file }}"
      content: "{{ langfuse_init_project_id }}"
  no_log: true

- name: Prepare OpenBao agent runtime secret injection for Langfuse
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: openbao_compose_env
  vars:
    common_openbao_compose_env_service_name: langfuse
    common_openbao_compose_env_agent_dir: "{{ langfuse_openbao_agent_dir }}"
    common_openbao_compose_env_runtime_dir: "{{ langfuse_env_file | dirname }}"
    common_openbao_compose_env_env_file: "{{ langfuse_env_file }}"
    common_openbao_compose_env_secret_path: "{{ langfuse_openbao_secret_path }}"
    common_openbao_compose_env_secret_payload: "{{ langfuse_runtime_secret_payload }}"
    common_openbao_compose_env_policy_name: "{{ langfuse_openbao_policy_name }}"
    common_openbao_compose_env_policy_rules: |
      path "sys/health" {
        capabilities = ["read"]
      }

      path "kv/data/{{ langfuse_openbao_secret_path }}" {
        capabilities = ["read"]
      }

      path "kv/metadata/{{ langfuse_openbao_secret_path }}" {
        capabilities = ["read", "list"]
      }
    common_openbao_compose_env_approle_name: "{{ langfuse_openbao_approle_name }}"
    common_openbao_compose_env_agent_config_file: "{{ langfuse_openbao_agent_dir }}/agent.hcl"
    common_openbao_compose_env_agent_template_file: "{{ langfuse_openbao_agent_dir }}/runtime.env.ctmpl"
    common_openbao_compose_env_agent_template_src: langfuse.env.ctmpl.j2
    common_openbao_compose_env_role_id_file: "{{ langfuse_openbao_agent_dir }}/role_id"
    common_openbao_compose_env_secret_id_file: "{{ langfuse_openbao_agent_dir }}/secret_id"
    common_openbao_compose_env_image: "{{ langfuse_openbao_agent_image }}"
    common_openbao_compose_env_legacy_env_files:
      - "{{ langfuse_legacy_env_file }}"
  no_log: true

- name: Render the Langfuse environment file
  ansible.builtin.template:
    src: langfuse.env.j2
    dest: "{{ langfuse_env_file }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Render the Langfuse compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ langfuse_compose_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Pull the Langfuse images
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ langfuse_compose_file }}"
      - pull
  args:
    chdir: "{{ langfuse_site_dir }}"
  register: langfuse_pull
  changed_when: >-
    'Pulling' in langfuse_pull.stdout
    or 'Downloaded newer image' in langfuse_pull.stdout
    or 'Pull complete' in langfuse_pull.stdout

- name: Start the Langfuse stack
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ langfuse_compose_file }}"
      - up
      - -d
      - --remove-orphans
  args:
    chdir: "{{ langfuse_site_dir }}"
  register: langfuse_up
  changed_when: >-
    'Creating' in langfuse_up.stdout
    or 'Recreating' in langfuse_up.stdout
    or 'Starting' in langfuse_up.stdout

- name: Wait for Langfuse to listen locally
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ langfuse_internal_port }}"
    delay: 0
    timeout: 300

- name: Wait for the Langfuse public health endpoint
  ansible.builtin.uri:
    url: "{{ langfuse_internal_base_url }}/api/public/health"
    method: GET
    status_code: 200
  register: langfuse_health_ready
  retries: 60
  delay: 5
  until: langfuse_health_ready.status == 200
  changed_when: false

- name: Verify Langfuse health probes
  ansible.builtin.import_tasks: verify.yml
