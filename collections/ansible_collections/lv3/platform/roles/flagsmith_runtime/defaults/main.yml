---
# Purpose: Default runtime inputs for the Flagsmith feature flag and remote configuration deployment.

flagsmith_service_topology: "{{ hostvars[platform_topology_host].lv3_service_topology | service_topology_get('flagsmith') }}"
flagsmith_site_dir: /opt/flagsmith
flagsmith_compose_file: "{{ flagsmith_site_dir }}/docker-compose.yml"
flagsmith_env_file: "{{ compose_runtime_secret_root }}/flagsmith/runtime.env"
flagsmith_legacy_env_file: "{{ flagsmith_site_dir }}/flagsmith.env"
flagsmith_secret_dir: /etc/lv3/flagsmith
flagsmith_openbao_agent_dir: "{{ flagsmith_site_dir }}/openbao"
flagsmith_openbao_agent_image: "{{ openbao_agent_image }}"
flagsmith_openbao_agent_container_name: flagsmith-openbao-agent
flagsmith_openbao_secret_path: services/flagsmith/runtime-env
flagsmith_openbao_policy_name: lv3-service-flagsmith-runtime
flagsmith_openbao_approle_name: flagsmith-runtime
flagsmith_openbao_environment_keys_path: services/flagsmith/environment-keys
flagsmith_internal_port: "{{ platform_service_topology | platform_service_port('flagsmith', 'internal') }}"
flagsmith_internal_base_url: "{{ platform_service_topology | platform_service_url('flagsmith', 'internal') }}"
flagsmith_public_base_url: "https://{{ flagsmith_service_topology.public_hostname }}"
flagsmith_container_name: flagsmith
flagsmith_task_processor_container_name: flagsmith-task-processor
flagsmith_runtime_image: "{{ container_image_catalog.images.flagsmith_runtime.ref }}"
flagsmith_access_log_file: /dev/null
flagsmith_access_log_format: >-
  %(h)s %(l)s %(u)s %(t)s "%(r)s" %(s)s %(b)s "%(f)s" "%(a)s"
  %({origin}i)s %({access-control-allow-origin}o)s
flagsmith_api_worker_tmp_dir: /dev/shm
flagsmith_api_timeout_seconds: 30
flagsmith_api_workers: 1
flagsmith_api_threads: 1
flagsmith_api_keepalive_seconds: 2
flagsmith_task_processor_bind: 0.0.0.0:8000
flagsmith_task_processor_sleep_interval_ms: 500
flagsmith_task_processor_grace_period_ms: 20000
flagsmith_task_processor_threads: 2
flagsmith_task_processor_queue_pop_size: 10
flagsmith_database_host: "{{ hostvars[hostvars[platform_topology_host].postgres_ha.initial_primary].ansible_host }}"
flagsmith_database_name: flagsmith
flagsmith_database_user: flagsmith
flagsmith_local_artifact_dir: "{{ repo_shared_local_root }}/flagsmith"
flagsmith_database_password_local_file: "{{ repo_shared_local_root }}/flagsmith/database-password.txt"
flagsmith_django_secret_key_local_file: "{{ repo_shared_local_root }}/flagsmith/django-secret-key.txt"
flagsmith_admin_password_local_file: "{{ repo_shared_local_root }}/flagsmith/admin-password.txt"
flagsmith_environment_keys_local_file: "{{ repo_shared_local_root }}/flagsmith/environment-keys.json"
flagsmith_django_secret_key_remote_file: "{{ flagsmith_secret_dir }}/django-secret-key.txt"
flagsmith_admin_password_remote_file: "{{ flagsmith_secret_dir }}/admin-password.txt"
flagsmith_seed_script_remote_file: "{{ flagsmith_site_dir }}/flagsmith_seed.py"
flagsmith_admin_email: flagsmith.automation@{{ platform_domain }}
flagsmith_admin_first_name: Flagsmith
flagsmith_admin_last_name: Automation
flagsmith_organisation_name: LV3 Platform
flagsmith_project_name: Platform Services
flagsmith_allowed_hosts:
  - "{{ flagsmith_service_topology.public_hostname }}"
  - localhost
  - 127.0.0.1
  - "{{ ansible_host }}"
flagsmith_environment_definitions:
  - name: production
    allow_client_traits: true
  - name: staging
    allow_client_traits: true
  - name: development
    allow_client_traits: true
flagsmith_seed_features:
  - name: SERVERCLAW_EXPERIMENTAL_TOOLS
    type: STANDARD
    default_enabled: false
    initial_value: ""
    environment_overrides:
      production:
        enabled: false
      staging:
        enabled: false
      development:
        enabled: true
  - name: CONF_LLM_MODEL_NAME
    type: STANDARD
    default_enabled: true
    initial_value: gpt-5.4-mini
    environment_overrides:
      production:
        enabled: true
        feature_state_value: gpt-5.4-mini
      staging:
        enabled: true
        feature_state_value: gpt-5.4-mini
      development:
        enabled: true
        feature_state_value: gpt-5.4
flagsmith_verify_boolean_feature: SERVERCLAW_EXPERIMENTAL_TOOLS
flagsmith_verify_boolean_expectations:
  production: false
  staging: false
  development: true
flagsmith_verify_config_feature: CONF_LLM_MODEL_NAME
flagsmith_verify_config_expectations:
  production: gpt-5.4-mini
  staging: gpt-5.4-mini
  development: gpt-5.4
