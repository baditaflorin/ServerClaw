# Purpose: Define default paths, sync sources, and topology inputs for the repo-managed API gateway runtime.
# Use case: Loaded whenever the API gateway role converges the packaged workflow bridge and related runtime assets.
# Inputs: Inventory-derived topology, image catalog entries, local artifact roots, and sync tree definitions.
# Outputs: Supplies stable defaults consumed by the API gateway runtime tasks and templates.
# Idempotency: Fully idempotent because this file only declares role defaults.
# Dependencies: ADR 0165, ADR 0092, ADR 0175, and ADR 0197.
---
api_gateway_service_topology: >-
  {{
    hostvars['proxmox_florin'].platform_service_topology.api_gateway
    | default(
        hostvars['proxmox_florin'].lv3_service_topology | service_topology_get('api_gateway')
      )
  }}
api_gateway_windmill_service_topology: "{{ hostvars['proxmox_florin'].lv3_service_topology | service_topology_get('windmill') }}"
api_gateway_lago_service_topology: >-
  {{
    hostvars['proxmox_florin'].platform_service_topology.lago
    | default(
        hostvars['proxmox_florin'].lv3_service_topology | service_topology_get('lago')
      )
  }}
api_gateway_repo_root: "{{ inventory_dir | dirname }}"
api_gateway_site_dir: /opt/api-gateway
api_gateway_service_dir: "{{ api_gateway_site_dir }}/service"
api_gateway_config_dir: "{{ api_gateway_site_dir }}/config"
api_gateway_data_dir: "{{ api_gateway_site_dir }}/data"
api_gateway_compose_file: "{{ api_gateway_site_dir }}/docker-compose.yml"
api_gateway_env_file: "{{ api_gateway_site_dir }}/api-gateway.env"
api_gateway_image_name: lv3-platform-api-gateway
api_gateway_container_name: api-gateway
api_gateway_network_mode: host
api_gateway_internal_port: 8080
api_gateway_local_artifact_dir: "{{ api_gateway_repo_root }}/.local/api-gateway"
api_gateway_shared_local_root: >-
  {{
    (
      lookup(
        'ansible.builtin.pipe',
        'git -C ' ~ (api_gateway_repo_root | quote) ~ ' rev-parse --path-format=absolute --git-common-dir'
      )
      | dirname
    )
    ~ '/.local'
  }}
api_gateway_tree_sync_specs:
  - name: gitea workflow tree required by packaged workflow implementation refs
    archive_root: "{{ api_gateway_repo_root }}"
    source: .gitea
    dest_parent: "{{ api_gateway_service_dir }}"
    remote_archive: "{{ api_gateway_site_dir }}/gitea-sync.tar.gz"
  - name: ansible collection tree required by packaged workflow implementation refs
    archive_root: "{{ api_gateway_repo_root }}"
    source: collections
    dest_parent: "{{ api_gateway_service_dir }}"
    remote_archive: "{{ api_gateway_site_dir }}/collections-sync.tar.gz"
  - name: inventory tree required by packaged workflow implementation refs
    archive_root: "{{ api_gateway_repo_root }}"
    source: inventory
    dest_parent: "{{ api_gateway_service_dir }}"
    remote_archive: "{{ api_gateway_site_dir }}/inventory-sync.tar.gz"
  - name: migrations tree required by packaged workflow implementation refs
    archive_root: "{{ api_gateway_repo_root }}"
    source: migrations
    dest_parent: "{{ api_gateway_service_dir }}"
    remote_archive: "{{ api_gateway_site_dir }}/migrations-sync.tar.gz"
  - name: molecule tree required by packaged workflow implementation refs
    archive_root: "{{ api_gateway_repo_root }}"
    source: molecule
    dest_parent: "{{ api_gateway_service_dir }}"
    remote_archive: "{{ api_gateway_site_dir }}/molecule-sync.tar.gz"
  - name: packer tree required by packaged workflow implementation refs
    archive_root: "{{ api_gateway_repo_root }}"
    source: packer
    dest_parent: "{{ api_gateway_service_dir }}"
    remote_archive: "{{ api_gateway_site_dir }}/packer-sync.tar.gz"
  - name: platform package for gateway graph support
    archive_root: "{{ api_gateway_repo_root }}"
    source: platform
    dest_parent: "{{ api_gateway_service_dir }}"
    remote_archive: "{{ api_gateway_site_dir }}/platform-sync.tar.gz"
  - name: playbooks tree required by packaged workflow implementation refs
    archive_root: "{{ api_gateway_repo_root }}"
    source: playbooks
    dest_parent: "{{ api_gateway_service_dir }}"
    remote_archive: "{{ api_gateway_site_dir }}/playbooks-sync.tar.gz"
  - name: shared search fabric package for gateway search routes
    archive_root: "{{ api_gateway_repo_root }}/scripts"
    source: search_fabric
    dest_parent: "{{ api_gateway_service_dir }}"
    remote_archive: "{{ api_gateway_site_dir }}/search-fabric-sync.tar.gz"
  - name: shared scripts tree required by packaged platform modules
    archive_root: "{{ api_gateway_repo_root }}"
    source: scripts
    dest_parent: "{{ api_gateway_service_dir }}"
    remote_archive: "{{ api_gateway_site_dir }}/scripts-sync.tar.gz"
  - name: shared repo config tree required by packaged platform modules
    archive_root: "{{ api_gateway_repo_root }}"
    source: config
    dest_parent: "{{ api_gateway_site_dir }}"
    remote_archive: "{{ api_gateway_site_dir }}/config-sync.tar.gz"
    preserve_destination_root: true
  - name: repo documentation tree required by the local search fabric
    archive_root: "{{ api_gateway_repo_root }}"
    source: docs
    dest_parent: "{{ api_gateway_service_dir }}"
    remote_archive: "{{ api_gateway_site_dir }}/docs-sync.tar.gz"
  - name: repo receipts tree required by the local search fabric
    archive_root: "{{ api_gateway_repo_root }}"
    source: receipts
    dest_parent: "{{ api_gateway_service_dir }}"
    remote_archive: "{{ api_gateway_site_dir }}/receipts-sync.tar.gz"
  - name: requirements tree required by packaged workflow implementation refs
    archive_root: "{{ api_gateway_repo_root }}"
    source: requirements
    dest_parent: "{{ api_gateway_service_dir }}"
    remote_archive: "{{ api_gateway_site_dir }}/requirements-sync.tar.gz"
  - name: roles tree required by packaged workflow implementation refs
    archive_root: "{{ api_gateway_repo_root }}"
    source: roles
    dest_parent: "{{ api_gateway_service_dir }}"
    remote_archive: "{{ api_gateway_site_dir }}/roles-sync.tar.gz"
  - name: tests tree required by packaged workflow implementation refs
    archive_root: "{{ api_gateway_repo_root }}"
    source: tests
    dest_parent: "{{ api_gateway_service_dir }}"
    remote_archive: "{{ api_gateway_site_dir }}/tests-sync.tar.gz"
  - name: tofu tree required by packaged workflow implementation refs
    archive_root: "{{ api_gateway_repo_root }}"
    source: tofu
    dest_parent: "{{ api_gateway_service_dir }}"
    remote_archive: "{{ api_gateway_site_dir }}/tofu-sync.tar.gz"
  - name: windmill tree required by packaged workflow implementation refs
    archive_root: "{{ api_gateway_repo_root }}"
    source: windmill
    dest_parent: "{{ api_gateway_service_dir }}"
    remote_archive: "{{ api_gateway_site_dir }}/windmill-sync.tar.gz"
  - name: Gitea workflow tree required by governed registry implementation refs
    archive_root: "{{ api_gateway_repo_root }}"
    source: .gitea
    dest_parent: "{{ api_gateway_service_dir }}"
    remote_archive: "{{ api_gateway_site_dir }}/gitea-sync.tar.gz"
  - name: ServerClaw config tree required by governed skill-pack resolution
    archive_root: "{{ api_gateway_repo_root }}/config"
    source: serverclaw
    dest_parent: "{{ api_gateway_site_dir }}/config"
    remote_archive: "{{ api_gateway_site_dir }}/serverclaw-config-sync.tar.gz"
  - name: ServerClaw skill-pack resolver script required by governed registry implementation refs
    archive_root: "{{ api_gateway_repo_root }}/scripts"
    source: serverclaw_skill_packs.py
    dest_parent: "{{ api_gateway_service_dir }}/scripts"
    remote_archive: "{{ api_gateway_site_dir }}/serverclaw-skill-packs-script-sync.tar.gz"
  - name: ServerClaw use-case module required by governed registry implementation refs
    archive_root: "{{ api_gateway_repo_root }}/platform/use_cases"
    source: serverclaw_skills.py
    dest_parent: "{{ api_gateway_service_dir }}/platform/use_cases"
    remote_archive: "{{ api_gateway_site_dir }}/serverclaw-use-case-sync.tar.gz"
  - name: ServerClaw runbook required by governed registry implementation refs
    archive_root: "{{ api_gateway_repo_root }}/docs/runbooks"
    source: serverclaw-skills.md
    dest_parent: "{{ api_gateway_service_dir }}/docs/runbooks"
    remote_archive: "{{ api_gateway_site_dir }}/serverclaw-runbook-sync.tar.gz"
api_gateway_gateway_catalog_src: "{{ api_gateway_repo_root }}/config/api-gateway-catalog.json"
api_gateway_service_catalog_src: "{{ api_gateway_repo_root }}/config/service-capability-catalog.json"
api_gateway_error_registry_src: "{{ api_gateway_repo_root }}/config/error-codes.yaml"
api_gateway_workflow_catalog_src: "{{ api_gateway_repo_root }}/config/workflow-catalog.json"
api_gateway_retry_policy_src: "{{ api_gateway_repo_root }}/config/retry-policies.yaml"
api_gateway_circuit_policies_src: "{{ api_gateway_repo_root }}/config/circuit-policies.yaml"
api_gateway_ledger_event_types_src: "{{ api_gateway_repo_root }}/config/ledger-event-types.yaml"
api_gateway_event_taxonomy_src: "{{ api_gateway_repo_root }}/config/event-taxonomy.yaml"
api_gateway_timeout_hierarchy_src: "{{ api_gateway_repo_root }}/config/timeout-hierarchy.yaml"
api_gateway_runtime_assurance_matrix_src: "{{ api_gateway_repo_root }}/config/runtime-assurance-matrix.json"
api_gateway_environment_topology_src: "{{ api_gateway_repo_root }}/config/environment-topology.json"
api_gateway_platform_vars_src: "{{ api_gateway_repo_root }}/inventory/group_vars/platform.yml"
api_gateway_drift_receipts_glob: "{{ api_gateway_repo_root }}/receipts/drift-reports/*.json"
api_gateway_platform_context_token_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/platform-context/api-token.txt
api_gateway_dify_tools_api_key_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/dify/tools-api-key.txt
api_gateway_billing_ingest_producers_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/lago/producer-catalog.json
api_gateway_lago_org_api_key_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/lago/org-api-key.txt
api_gateway_dify_tools_api_key_header: X-LV3-Dify-Api-Key
api_gateway_typesense_service_topology: >-
  {{
    (
      platform_service_topology | service_topology_get('typesense')
    )
    if (platform_service_topology is defined)
    else (
      hostvars['proxmox_florin'].lv3_service_topology | service_topology_get('typesense')
    )
  }}
api_gateway_typesense_controller_url: >-
  {{
    (
      api_gateway_typesense_service_topology.urls.controller
    )
    if (
      api_gateway_typesense_service_topology is mapping
      and api_gateway_typesense_service_topology.urls is defined
      and api_gateway_typesense_service_topology.urls.controller is defined
    )
    else (
      'http://'
      ~ hostvars['proxmox_florin'].management_tailscale_ipv4
      ~ ':'
      ~ (hostvars['proxmox_florin'].typesense_host_proxy_port | string)
    )
  }}
api_gateway_typesense_base_url: http://127.0.0.1:8108
api_gateway_typesense_collection: platform-services
api_gateway_typesense_api_key_local_file: "{{ api_gateway_shared_local_root }}/typesense/api-key.txt"
api_gateway_typesense_sync_script: "{{ api_gateway_repo_root }}/scripts/typesense_catalog_sync.py"
api_gateway_windmill_base_url: "http://{{ api_gateway_windmill_service_topology.private_ip }}:{{ windmill_server_port }}"
api_gateway_windmill_token_local_file: "{{ api_gateway_shared_local_root }}/windmill/superadmin-secret.txt"
api_gateway_runbook_runs_dir: /data/runbooks/runs
api_gateway_billing_api_base_url: "{{ api_gateway_lago_service_topology.urls.api | default('') }}"
api_gateway_billing_ingest_producers_path: /config/billing-ingest-producers.json
api_gateway_billing_rejection_subject: billing.events.rejected
api_gateway_sources:
  - src: "{{ api_gateway_repo_root }}/.githooks/pre-push"
    dest: .githooks/pre-push
  - src: "{{ api_gateway_repo_root }}/.github/workflows/validate.yml"
    dest: .github/workflows/validate.yml
  - src: "{{ api_gateway_repo_root }}/.pre-commit-config.yaml"
    dest: .pre-commit-config.yaml
  - src: "{{ api_gateway_repo_root }}/Makefile"
    dest: Makefile
  - src: "{{ api_gateway_repo_root }}/README.md"
    dest: README.md
  - src: "{{ api_gateway_repo_root }}/ansible.cfg"
    dest: ansible.cfg
  - src: "{{ api_gateway_repo_root }}/scripts/controller_automation_toolkit.py"
    dest: controller_automation_toolkit.py
  - src: "{{ api_gateway_repo_root }}/scripts/api_gateway_catalog.py"
    dest: api_gateway_catalog.py
  - src: "{{ api_gateway_repo_root }}/scripts/maintenance_window_tool.py"
    dest: maintenance_window_tool.py
  - src: "{{ api_gateway_repo_root }}/scripts/slo_tracking.py"
    dest: slo_tracking.py
  - src: "{{ api_gateway_repo_root }}/scripts/runtime_assurance.py"
    dest: runtime_assurance.py
  - src: "{{ api_gateway_repo_root }}/scripts/api_gateway/__init__.py"
    dest: api_gateway/__init__.py
  - src: "{{ api_gateway_repo_root }}/scripts/api_gateway/main.py"
    dest: api_gateway/main.py
  - src: "{{ api_gateway_repo_root }}/requirements/api-gateway.txt"
    dest: requirements.txt
  - src: "{{ api_gateway_repo_root }}/inventory/host_vars/proxmox_florin.yml"
    dest: inventory/host_vars/proxmox_florin.yml
  - src: "{{ api_gateway_repo_root }}/versions/stack.yaml"
    dest: versions/stack.yaml
  - src: "{{ api_gateway_repo_root }}/workstreams.yaml"
    dest: workstreams.yaml
api_gateway_config_sources:
  - src: "{{ api_gateway_gateway_catalog_src }}"
    dest: api-gateway-catalog.json
  - src: "{{ api_gateway_repo_root }}/config/agent-tool-registry.json"
    dest: agent-tool-registry.json
  - src: "{{ api_gateway_repo_root }}/config/api-publication.json"
    dest: api-publication.json
  - src: "{{ api_gateway_repo_root }}/config/command-catalog.json"
    dest: command-catalog.json
  - src: "{{ api_gateway_repo_root }}/config/workflow-defaults.yaml"
    dest: workflow-defaults.yaml
  - src: "{{ api_gateway_repo_root }}/config/execution-lanes.yaml"
    dest: execution-lanes.yaml
  - src: "{{ api_gateway_service_catalog_src }}"
    dest: service-capability-catalog.json
  - src: "{{ api_gateway_error_registry_src }}"
    dest: error-codes.yaml
  - src: "{{ api_gateway_workflow_catalog_src }}"
    dest: workflow-catalog.json
  - src: "{{ api_gateway_retry_policy_src }}"
    dest: retry-policies.yaml
  - src: "{{ api_gateway_circuit_policies_src }}"
    dest: circuit-policies.yaml
  - src: "{{ api_gateway_ledger_event_types_src }}"
    dest: ledger-event-types.yaml
  - src: "{{ api_gateway_event_taxonomy_src }}"
    dest: event-taxonomy.yaml
  - src: "{{ api_gateway_timeout_hierarchy_src }}"
    dest: timeout-hierarchy.yaml
  - src: "{{ api_gateway_runtime_assurance_matrix_src }}"
    dest: runtime-assurance-matrix.json
  - src: "{{ api_gateway_environment_topology_src }}"
    dest: environment-topology.json
  - src: "{{ api_gateway_platform_vars_src }}"
    dest: platform.yml
api_gateway_keycloak_internal_base_url: http://127.0.0.1:18080
api_gateway_keycloak_jwks_url: "{{ api_gateway_keycloak_internal_base_url }}/realms/lv3/protocol/openid-connect/certs"
api_gateway_keycloak_issuer_url: https://sso.lv3.org/realms/lv3
api_gateway_keycloak_token_url: https://sso.lv3.org/realms/lv3/protocol/openid-connect/token
api_gateway_keycloak_verify_base_url: http://127.0.0.1:18080
api_gateway_keycloak_verify_ready_retries: 60
api_gateway_keycloak_verify_ready_delay: 5
api_gateway_keycloak_verify_token_retries: 18
api_gateway_keycloak_verify_token_delay: 5
api_gateway_structured_search_verify_retries: 12
api_gateway_structured_search_verify_delay: 5
api_gateway_keycloak_docker_network: keycloak_default
api_gateway_runtime_recovery_probe_retries: 18
api_gateway_runtime_recovery_probe_delay: 5
api_gateway_runtime_config_probe_path: /app/config/ledger-event-types.yaml
api_gateway_runtime_packaged_probe_paths:
  - /app/.gitea/workflows/release-bundle.yml
  - /app/.github/workflows/validate.yml
api_gateway_database_name: windmill
api_gateway_database_user: windmill_admin
api_gateway_database_inventory_host: >-
  {{ 'postgres-staging-lv3' if (env | default('production')) == 'staging' else 'postgres-lv3' }}
api_gateway_database_host: "{{ hostvars[api_gateway_database_inventory_host].ansible_host }}"
api_gateway_database_port: 5432
api_gateway_database_password_local_file: "{{ api_gateway_shared_local_root }}/windmill/database-password.txt"
api_gateway_graph_dsn: >-
  postgres://{{ api_gateway_database_user }}:{{
    (
      lookup('ansible.builtin.file', api_gateway_database_password_local_file, errors='ignore')
      | default('', true)
      | trim
    )
    | urlencode
    | replace('/', '%2F')
  }}@{{ api_gateway_database_host }}:{{ api_gateway_database_port }}/{{ api_gateway_database_name }}?sslmode=disable
api_gateway_world_state_dsn: "{{ api_gateway_graph_dsn }}"
api_gateway_verify_client_id: lv3-agent-hub
api_gateway_verify_client_secret_local_file: >-
  {{
    keycloak_agent_client_secret_local_file
    | default(api_gateway_repo_root ~ '/.local/keycloak/lv3-agent-hub-client-secret.txt')
  }}
api_gateway_nats_url: nats://127.0.0.1:4222
api_gateway_nats_username: jetstream-admin
api_gateway_nats_password_local_file: "{{ api_gateway_repo_root }}/.local/nats/jetstream-admin-password.txt"
api_gateway_keycloak_retry_after_seconds: 30
api_gateway_nats_password: >-
  {{
    lookup('ansible.builtin.file', api_gateway_nats_password_local_file, errors='ignore')
    | default('', true)
    | trim
  }}
api_gateway_deploy_webhook_url: ""
api_gateway_secret_rotation_webhook_url: ""
api_gateway_include_upstream_openapi: false
api_gateway_dify_tools_api_key: >-
  {{
    lookup('ansible.builtin.file', api_gateway_dify_tools_api_key_local_file, errors='ignore')
    | default('', true)
    | trim
  }}
api_gateway_lago_org_api_key: >-
  {{
    lookup('ansible.builtin.file', api_gateway_lago_org_api_key_local_file, errors='ignore')
    | default('', true)
    | trim
  }}
api_gateway_typesense_api_key: >-
  {{
    lookup('ansible.builtin.file', api_gateway_typesense_api_key_local_file, errors='ignore')
    | default('', true)
    | trim
  }}
api_gateway_windmill_token: >-
  {{
    lookup('ansible.builtin.file', api_gateway_windmill_token_local_file, errors='ignore')
    | default('', true)
    | trim
  }}
