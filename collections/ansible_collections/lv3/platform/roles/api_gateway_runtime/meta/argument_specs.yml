---
argument_specs:
  main:
    short_description: Converge the LV3 unified platform API gateway.
    options:
      api_gateway_internal_port:
        type: int
        required: true
        description:
          - Host port exposed by the gateway on runtime-control-lv3.
      api_gateway_sources:
        type: list
        elements: dict
        required: true
        description:
          - Controller-local gateway application files copied into the build context.
      api_gateway_config_sources:
        type: list
        elements: dict
        required: true
        description:
          - Controller-local catalog files copied into the runtime config directory.
      api_gateway_keycloak_jwks_url:
        type: str
        required: true
        description:
          - Keycloak JWKS endpoint used for bearer-token verification.
      api_gateway_keycloak_issuer_url:
        type: str
        required: true
        description:
          - Expected Keycloak issuer for gateway JWT verification.
