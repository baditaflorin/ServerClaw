# Purpose: Converge the API gateway runtime files, packaged repo surfaces, and supporting local artifacts.
# Use case: Run during API gateway deploys and updates, including governed tool bridge changes for Dify.
# Inputs: API gateway paths, build sources, tree sync specs, and Keycloak/openbao/runtime settings.
# Outputs: Creates the on-host API gateway runtime tree and prepares synced sources and configuration.
# Idempotency: Partially idempotent because some downstream sync and container restart steps intentionally refresh deployed state.
# Dependencies: ADR 0165, ADR 0092, ADR 0175, and ADR 0197.
---
- name: Validate API gateway runtime inputs
  ansible.builtin.assert:
    that:
      - api_gateway_site_dir | length > 0
      - api_gateway_service_dir | length > 0
      - api_gateway_config_dir | length > 0
      - api_gateway_data_dir | length > 0
      - api_gateway_compose_file | length > 0
      - api_gateway_env_file | length > 0
      - api_gateway_image_name | length > 0
      - api_gateway_container_name | length > 0
      - api_gateway_internal_port | int > 0
      - api_gateway_sources | length > 0
      - api_gateway_config_sources | length > 0
      - api_gateway_tree_sync_specs | length > 0
      - api_gateway_keycloak_jwks_url | length > 0
      - api_gateway_keycloak_issuer_url | length > 0
    fail_msg: "api_gateway_runtime requires runtime paths, build sources, and Keycloak endpoint settings."

- name: Ensure API gateway prerequisite packages are present
  ansible.builtin.apt:
    name:
      - ca-certificates
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure API gateway directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ api_gateway_site_dir }}"
      mode: "0755"
    - path: "{{ api_gateway_service_dir }}"
      mode: "0755"
    - path: "{{ api_gateway_service_dir }}/.githooks"
      mode: "0755"
    - path: "{{ api_gateway_service_dir }}/.github"
      mode: "0755"
    - path: "{{ api_gateway_service_dir }}/.github/workflows"
      mode: "0755"
    - path: "{{ api_gateway_service_dir }}/api_gateway"
      mode: "0755"
    - path: "{{ api_gateway_service_dir }}/inventory"
      mode: "0755"
    - path: "{{ api_gateway_service_dir }}/inventory/host_vars"
      mode: "0755"
    - path: "{{ api_gateway_service_dir }}/versions"
      mode: "0755"
    - path: "{{ api_gateway_config_dir }}"
      mode: "0755"
    - path: "{{ api_gateway_data_dir }}"
      mode: "0755"
    - path: "{{ api_gateway_data_dir }}/runbooks"
      mode: "0755"
    - path: "{{ api_gateway_data_dir }}/runbooks/runs"
      mode: "0755"
    - path: "{{ api_gateway_data_dir }}/receipts/drift-reports"
      mode: "0755"

- name: Ensure the local API gateway artifact directory exists
  ansible.builtin.file:
    path: "{{ api_gateway_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Check whether the controller-local platform-context token exists for migration routing
  ansible.builtin.stat:
    path: "{{ api_gateway_platform_context_token_local_file }}"
  delegate_to: localhost
  become: false
  register: api_gateway_platform_context_token_stat

- name: Read the controller-local platform-context token for migration routing
  ansible.builtin.slurp:
    src: "{{ api_gateway_platform_context_token_local_file }}"
  delegate_to: localhost
  become: false
  register: api_gateway_platform_context_token_raw
  when: api_gateway_platform_context_token_stat.stat.exists
  no_log: true

- name: Record the optional migration token for platform-context gateway routing
  ansible.builtin.set_fact:
    api_gateway_platform_context_legacy_token: "{{ api_gateway_platform_context_token_raw.content | b64decode | trim }}"
  when: api_gateway_platform_context_token_stat.stat.exists
  no_log: true

- name: Ensure nested parent directories for managed API gateway source files exist
  ansible.builtin.file:
    path: "{{ api_gateway_service_dir }}/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: >-
    {{
      api_gateway_sources
      | map(attribute='dest')
      | map('dirname')
      | reject('equalto', '')
      | reject('equalto', '.')
      | unique
      | list
    }}

- name: Sync the API gateway application sources
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ api_gateway_service_dir }}/{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ api_gateway_sources }}"
  loop_control:
    label: "{{ item.dest }}"

- name: Sync the staged repo trees required by the API gateway runtime
  ansible.builtin.include_tasks: sync_tree.yml
  loop: "{{ api_gateway_tree_sync_specs }}"
  loop_control:
    loop_var: api_gateway_tree_sync_spec
    label: "{{ api_gateway_tree_sync_spec.name }}"

- name: Remove stale API gateway build-context ignore files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ api_gateway_service_dir }}/.dockerignore"
    - "{{ api_gateway_service_dir }}/receipts/.dockerignore"

- name: Remove stale managed API gateway config bundle entries
  ansible.builtin.file:
    path: "{{ api_gateway_config_dir }}/{{ item.dest }}"
    state: absent
  loop: "{{ api_gateway_config_sources }}"
  loop_control:
    label: "{{ item.dest }}"

- name: Sync the API gateway runtime config bundle
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ api_gateway_config_dir }}/{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ api_gateway_config_sources }}"
  loop_control:
    label: "{{ item.dest }}"

- name: Check whether the controller-local Lago billing producer catalog exists
  ansible.builtin.stat:
    path: "{{ api_gateway_billing_ingest_producers_local_file }}"
  delegate_to: localhost
  become: false
  register: api_gateway_billing_ingest_producers_stat

- name: Sync the controller-local Lago billing producer catalog
  ansible.builtin.copy:
    src: "{{ api_gateway_billing_ingest_producers_local_file }}"
    dest: "{{ api_gateway_config_dir }}/billing-ingest-producers.json"
    owner: root
    group: root
    mode: "0600"
  when: api_gateway_billing_ingest_producers_stat.stat.exists
  no_log: true

- name: Render an empty Lago billing producer catalog when no controller-local catalog exists
  ansible.builtin.copy:
    dest: "{{ api_gateway_config_dir }}/billing-ingest-producers.json"
    owner: root
    group: root
    mode: "0600"
    content: |
      {"producers":[]}
  when: not api_gateway_billing_ingest_producers_stat.stat.exists

- name: Discover committed drift receipts to bundle with the gateway
  ansible.builtin.set_fact:
    api_gateway_drift_receipts: "{{ lookup('ansible.builtin.fileglob', api_gateway_drift_receipts_glob, wantlist=True) }}"
  delegate_to: localhost
  become: false

- name: Sync committed drift receipts into the runtime bundle
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ api_gateway_data_dir }}/receipts/drift-reports/{{ item | basename }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ api_gateway_drift_receipts }}"
  loop_control:
    label: "{{ item | basename }}"

- name: Render the API gateway environment file
  ansible.builtin.template:
    src: api-gateway.env.j2
    dest: "{{ api_gateway_env_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Render the API gateway Dockerfile
  ansible.builtin.copy:
    dest: "{{ api_gateway_service_dir }}/Dockerfile"
    owner: root
    group: root
    mode: "0644"
    content: |
      FROM python:3.12-slim
      WORKDIR /app
      COPY requirements.txt ./requirements.txt
      RUN pip install --no-cache-dir -r requirements.txt
      COPY .gitea ./.gitea
      COPY .githooks ./.githooks
      COPY Makefile ./Makefile
      COPY .github ./.github
      COPY .pre-commit-config.yaml ./.pre-commit-config.yaml
      COPY README.md ./README.md
      COPY ansible.cfg ./ansible.cfg
      COPY controller_automation_toolkit.py ./controller_automation_toolkit.py
      COPY canonical_errors.py ./canonical_errors.py
      COPY api_gateway_catalog.py ./api_gateway_catalog.py
      COPY maintenance_window_tool.py ./maintenance_window_tool.py
      COPY slo_tracking.py ./slo_tracking.py
      COPY runtime_assurance.py ./runtime_assurance.py
      COPY api_gateway ./api_gateway
      COPY collections ./collections
      COPY docs ./docs
      COPY inventory ./inventory
      COPY migrations ./migrations
      COPY molecule ./molecule
      COPY packer ./packer
      COPY platform ./platform
      COPY playbooks ./playbooks
      COPY receipts ./receipts
      COPY requirements ./requirements
      COPY roles ./roles
      COPY scripts ./scripts
      COPY search_fabric ./search_fabric
      COPY tests ./tests
      COPY tofu ./tofu
      COPY versions ./versions
      COPY windmill ./windmill
      COPY workstreams.yaml ./workstreams.yaml
      EXPOSE 8080
      CMD ["uvicorn", "api_gateway.main:app", "--host", "0.0.0.0", "--port", "8080"]

- name: Render the API gateway compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ api_gateway_compose_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Assert the external Keycloak Docker network exists
  ansible.builtin.command:
    argv:
      - docker
      - network
      - inspect
      - "{{ api_gateway_keycloak_docker_network }}"
  register: api_gateway_keycloak_network
  changed_when: false
  when: api_gateway_network_mode != 'host'

- name: Pull the API gateway base image
  ansible.builtin.command:
    argv:
      - docker
      - pull
      - python:3.12-slim
  register: api_gateway_pull
  changed_when: "'Downloaded newer image' in api_gateway_pull.stdout or 'Status: Downloaded newer image' in api_gateway_pull.stdout"

- name: Build the API gateway image
  ansible.builtin.shell: |
    set -euo pipefail
    build_dir="$(mktemp -d /tmp/api-gateway-build.XXXXXX)"
    log_file="/tmp/api-gateway-build.log"
    trap 'rm -rf "$build_dir"' EXIT
    cp -a "{{ api_gateway_service_dir }}/." "$build_dir/"
    if DOCKER_BUILDKIT=0 docker build --pull=false -t "{{ api_gateway_image_name }}:latest" "$build_dir" >"$log_file" 2>&1; then
      cat "$log_file"
    else
      rc="$?"
      cat "$log_file"
      exit "$rc"
    fi
  args:
    chdir: "{{ api_gateway_site_dir }}"
    executable: /bin/bash
  register: api_gateway_build
  retries: 2
  delay: 5
  until: api_gateway_build.rc == 0
  changed_when: >-
    'writing image' in (api_gateway_build.stdout | lower)
    or 'writing image' in (api_gateway_build.stderr | lower)
    or 'naming to' in (api_gateway_build.stdout | lower)
    or 'naming to' in (api_gateway_build.stderr | lower)
    or 'exporting to image' in (api_gateway_build.stdout | lower)
    or 'exporting to image' in (api_gateway_build.stderr | lower)
    or 'successfully built' in (api_gateway_build.stdout | lower)
    or 'successfully tagged' in (api_gateway_build.stdout | lower)

- name: Build and start the API gateway stack
  block:
    - name: Build and start the API gateway stack
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ api_gateway_compose_file }}"
          - up
          - -d
          - --remove-orphans
      args:
        chdir: "{{ api_gateway_site_dir }}"
      register: api_gateway_up
      changed_when: >-
        'Creating' in api_gateway_up.stdout
        or 'Recreating' in api_gateway_up.stdout
        or 'Starting' in api_gateway_up.stdout
        or 'Building' in api_gateway_up.stdout
  rescue:
    - name: Flag recoverable Docker engine failures during API gateway start
      ansible.builtin.set_fact:
        api_gateway_docker_nat_missing: >-
          {{
            'No chain/target/match by that name' in (ansible_failed_result.stderr | default(''))
            or 'Unable to enable DNAT rule' in (ansible_failed_result.stderr | default(''))
          }}
        api_gateway_docker_builder_database_missing: >-
          {{
            'database not open' in
            (
              ansible_failed_result.stderr
              | default(ansible_failed_result.msg | default(''))
              | lower
            )
          }}
        api_gateway_docker_builder_status_stream_unavailable: >-
          {{
            'failed to receive status' in
            (
              ansible_failed_result.stderr
              | default(ansible_failed_result.msg | default(''))
              | lower
            )
            and
            (
              'rpc error: code = unavailable' in
              (
                ansible_failed_result.stderr
                | default(ansible_failed_result.msg | default(''))
                | lower
              )
              or 'error reading from server: eof' in
              (
                ansible_failed_result.stderr
                | default(ansible_failed_result.msg | default(''))
                | lower
              )
            )
          }}

    - name: Record whether the API gateway startup failure is recoverable
      ansible.builtin.set_fact:
        api_gateway_docker_recoverable_start_failure: >-
          {{
            api_gateway_docker_nat_missing
            or api_gateway_docker_builder_database_missing
            or api_gateway_docker_builder_status_stream_unavailable
          }}

    - name: Surface unexpected API gateway startup failures
      ansible.builtin.fail:
        msg: "{{ ansible_failed_result.stderr | default(ansible_failed_result.msg | default('api gateway compose up failed')) }}"
      when: not api_gateway_docker_recoverable_start_failure

    - name: Restart Docker to restore the container engine before retrying the API gateway start
      ansible.builtin.service:
        name: docker
        state: restarted
      when: api_gateway_docker_recoverable_start_failure

    - name: Retry the API gateway stack start after Docker engine recovery
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ api_gateway_compose_file }}"
          - up
          - -d
          - --remove-orphans
      args:
        chdir: "{{ api_gateway_site_dir }}"
      register: api_gateway_up
      changed_when: true
      when: api_gateway_docker_recoverable_start_failure

- name: Check whether the API gateway published host port is present
  ansible.builtin.command:
    argv:
      - docker
      - port
      - "{{ api_gateway_container_name }}"
      - 8080/tcp
  register: api_gateway_published_port
  changed_when: false
  failed_when: false
  when: api_gateway_network_mode != 'host'

- name: Inspect the built API gateway image id
  ansible.builtin.command:
    argv:
      - docker
      - image
      - inspect
      - "{{ api_gateway_image_name }}:latest"
      - --format
      - "{{ '{{.Id}}' }}"
  register: api_gateway_built_image_id
  changed_when: false

- name: Inspect the running API gateway container image id
  ansible.builtin.command:
    argv:
      - docker
      - inspect
      - "{{ api_gateway_container_name }}"
      - --format
      - "{{ '{{.Image}}' }}"
  register: api_gateway_running_container_image_id
  changed_when: false
  failed_when: false

- name: Record whether the API gateway container image drifted from the freshly built image
  ansible.builtin.set_fact:
    api_gateway_container_image_drifted: >-
      {{
        api_gateway_running_container_image_id.rc != 0
        or (api_gateway_running_container_image_id.stdout | trim) != (api_gateway_built_image_id.stdout | trim)
      }}

- name: Check whether the API gateway container sees the runtime config bundle
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ api_gateway_container_name }}"
      - test
      - -f
      - "{{ api_gateway_runtime_config_probe_path }}"
  register: api_gateway_runtime_config_probe
  changed_when: false
  failed_when: false

- name: Check whether the API gateway container sees the packaged runtime probes
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ api_gateway_container_name }}"
      - test
      - -f
      - "{{ item }}"
  loop: "{{ api_gateway_runtime_packaged_probe_paths }}"
  register: api_gateway_runtime_packaged_probes
  changed_when: false
  failed_when: false

- name: Force recreate the API gateway when the built image drifted or runtime probes are stale
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ api_gateway_compose_file }}"
      - up
      - -d
      - --force-recreate
      - --remove-orphans
  args:
    chdir: "{{ api_gateway_site_dir }}"
  register: api_gateway_force_recreate
  changed_when: true
  when:
    - >-
      (
        api_gateway_network_mode != 'host'
        and api_gateway_published_port.stdout | trim == ""
      )
      or api_gateway_runtime_config_probe.rc != 0
      or api_gateway_container_image_drifted
      or (
        api_gateway_runtime_packaged_probes.results
        | selectattr('rc', 'ne', 0)
        | list
        | length
      ) > 0

- name: Re-check whether the API gateway container sees the runtime config bundle after startup recovery
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ api_gateway_container_name }}"
      - test
      - -f
      - "{{ api_gateway_runtime_config_probe_path }}"
  register: api_gateway_runtime_config_probe_after_recovery
  changed_when: false
  failed_when: false

- name: Re-check whether the API gateway container sees the packaged runtime probes after startup recovery
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ api_gateway_container_name }}"
      - test
      - -f
      - "{{ item }}"
  loop: "{{ api_gateway_runtime_packaged_probe_paths }}"
  register: api_gateway_runtime_packaged_probes_after_recovery
  changed_when: false
  failed_when: false

- name: Fail when the API gateway runtime still misses required packaged content after recovery
  ansible.builtin.fail:
    msg: >-
      API gateway runtime recovery left required files unavailable:
      config={{ api_gateway_runtime_config_probe_path if api_gateway_runtime_config_probe_after_recovery.rc != 0 else 'ok' }};
      packaged={{
        (
          api_gateway_runtime_packaged_probes_after_recovery.results
          | selectattr('rc', 'ne', 0)
          | map(attribute='item')
          | list
          | join(', ')
        )
        or 'ok'
      }}
  when:
    - api_gateway_runtime_config_probe_after_recovery.rc != 0
      or (
        api_gateway_runtime_packaged_probes_after_recovery.results
        | selectattr('rc', 'ne', 0)
        | list
        | length
      ) > 0

- name: Verify the API gateway runtime
  ansible.builtin.meta: reset_connection

- name: Verify the API gateway runtime
  ansible.builtin.import_tasks: verify.yml
