# Purpose: Stage, copy, and expand one declared API gateway source tree onto the target runtime host.
# Use case: Included by the API gateway role when packaged workflow dependencies must mirror repo content on-host.
# Inputs: One `api_gateway_tree_sync_spec` item describing the source path, archive root, destination, and archive location.
# Outputs: Refreshes the selected destination tree on the guest from the controller-side repository contents.
# Idempotency: Partially idempotent because the archive expansion path rewrites the staged destination tree by design.
# Dependencies: ADR 0165, ADR 0092, and ADR 0197.
---
- name: Stage and expand the {{ api_gateway_tree_sync_spec.name }}
  block:
    - name: Create a local staging archive path for the {{ api_gateway_tree_sync_spec.name }}
      ansible.builtin.tempfile:
        state: file
        suffix: .tar.gz
      delegate_to: localhost
      become: false
      register: api_gateway_tree_archive_local

    - name: Build the local staging archive for the {{ api_gateway_tree_sync_spec.name }}
      vars:
        mutation_audit_action: >-
          sync.api_gateway_tree.{{ api_gateway_tree_sync_spec.source | replace('-', '_') | replace('/', '_') }}
        mutation_audit_target: >-
          {{ api_gateway_tree_sync_spec.dest_parent }}/{{ api_gateway_tree_sync_spec.source | basename }}
      ansible.builtin.shell: |
        set -euo pipefail
        export COPYFILE_DISABLE=1
        export COPY_EXTENDED_ATTRIBUTES_DISABLE=1
        tar -C "{{ api_gateway_tree_sync_spec.archive_root }}" -czf "{{ api_gateway_tree_archive_local.path }}" "{{ api_gateway_tree_sync_spec.source }}"
      args:
        executable: /bin/bash
      delegate_to: localhost
      become: false
      changed_when: false
      tags:
        - mutation

    - name: Derive a per-run guest archive path for {{ api_gateway_tree_sync_spec.name }}
      ansible.builtin.set_fact:
        api_gateway_tree_remote_archive_path: >-
          {{
            (api_gateway_tree_sync_spec.remote_archive | regex_replace('\\.tar\\.gz$', ''))
            ~ '-'
            ~ (api_gateway_tree_archive_local.path | basename)
          }}

    - name: Remove the previously staged guest copy for {{ api_gateway_tree_sync_spec.name }}
      ansible.builtin.shell: |
        set -euo pipefail
        destination="{{ api_gateway_tree_sync_spec.dest_parent }}/{{ api_gateway_tree_sync_spec.source | basename }}"
        apple_double="{{ api_gateway_tree_sync_spec.dest_parent }}/._{{ api_gateway_tree_sync_spec.source | basename }}"
        if [ -e "$destination" ] || [ -e "$apple_double" ]; then
          rm -rf "$destination" "$apple_double"
          echo changed
        fi
      args:
        executable: /bin/bash
      register: api_gateway_tree_remove_destination
      changed_when: "'changed' in api_gateway_tree_remove_destination.stdout"
      when: not (api_gateway_tree_sync_spec.preserve_destination_root | default(false))

    - name: Clear the previously staged guest contents for {{ api_gateway_tree_sync_spec.name }}
      ansible.builtin.shell: |
        set -euo pipefail
        destination="{{ api_gateway_tree_sync_spec.dest_parent }}/{{ api_gateway_tree_sync_spec.source | basename }}"
        if [ -d "$destination" ] && find "$destination" -mindepth 1 -maxdepth 1 -print -quit | grep -q .; then
          find "$destination" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          echo changed
        fi
      args:
        executable: /bin/bash
      register: api_gateway_tree_preserve_root_clear
      changed_when: "'changed' in api_gateway_tree_preserve_root_clear.stdout"
      when: api_gateway_tree_sync_spec.preserve_destination_root | default(false)

    - name: Copy the staged archive to the guest for {{ api_gateway_tree_sync_spec.name }}
      ansible.builtin.copy:
        src: "{{ api_gateway_tree_archive_local.path }}"
        dest: "{{ api_gateway_tree_remote_archive_path }}"
        owner: root
        group: root
        mode: "0600"

    - name: Expand the staged archive on the guest for {{ api_gateway_tree_sync_spec.name }}
      ansible.builtin.shell: |
        set -euo pipefail
        tar --no-same-owner --no-same-permissions \
          -xzf "{{ api_gateway_tree_remote_archive_path }}" \
          -C "{{ api_gateway_tree_sync_spec.dest_parent }}"
      args:
        executable: /bin/bash
      changed_when: true
  always:
    - name: Remove the staged archive from the guest for {{ api_gateway_tree_sync_spec.name }}
      ansible.builtin.file:
        path: "{{ api_gateway_tree_remote_archive_path | default(api_gateway_tree_sync_spec.remote_archive) }}"
        state: absent

    - name: Remove the local staging archive for the {{ api_gateway_tree_sync_spec.name }}
      ansible.builtin.file:
        path: "{{ api_gateway_tree_archive_local.path }}"
        state: absent
      delegate_to: localhost
      become: false
      when: api_gateway_tree_archive_local is defined
