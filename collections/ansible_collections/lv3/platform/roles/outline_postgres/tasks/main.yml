---
# Purpose: Create and maintain the PostgreSQL role and database used by Outline.

- name: Validate Outline PostgreSQL inputs
  ansible.builtin.assert:
    that:
      - outline_database_name | length > 0
      - outline_database_user | length > 0
      - outline_postgres_secret_dir | length > 0
      - outline_postgres_password_file | length > 0
      - outline_database_password_local_file | length > 0
    fail_msg: "outline_postgres requires database names and password paths."

- name: Ensure the Outline PostgreSQL secret directory exists
  ansible.builtin.file:
    path: "{{ outline_postgres_secret_dir }}"
    state: directory
    owner: root
    group: postgres
    mode: "0750"

- name: Ensure the local Outline artifact directory exists
  ansible.builtin.file:
    path: "{{ outline_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate the Outline database password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ outline_database_password_local_file }}" ]; then
      umask 077
      openssl rand -hex 24 > "{{ outline_database_password_local_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: outline_postgres_password_generation
  changed_when: "'changed' in outline_postgres_password_generation.stdout"
  no_log: true

- name: Read the Outline database password
  ansible.builtin.slurp:
    src: "{{ outline_database_password_local_file }}"
  delegate_to: localhost
  become: false
  register: outline_postgres_password_raw
  no_log: true

- name: Record the Outline database password
  ansible.builtin.set_fact:
    outline_database_password: "{{ outline_postgres_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Persist the Outline database password on the PostgreSQL member
  ansible.builtin.copy:
    dest: "{{ outline_postgres_password_file }}"
    content: "{{ outline_database_password }}\n"
    owner: root
    group: postgres
    mode: "0640"
  no_log: true

- name: Check whether the local PostgreSQL member is writable
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT CASE WHEN pg_is_in_recovery() THEN 0 ELSE 1 END"
  register: outline_postgres_writable_check
  changed_when: false

- name: Check whether the Outline role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ outline_database_user }}'"
  register: outline_postgres_role_check
  changed_when: false
  when: outline_postgres_writable_check.stdout | trim == "1"

- name: Create the Outline role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - >-
        CREATE ROLE {{ outline_database_user }} LOGIN
        PASSWORD '{{ outline_database_password }}'
  changed_when: true
  no_log: true
  when:
    - outline_postgres_writable_check.stdout | trim == "1"
    - outline_postgres_role_check.stdout != "1"

- name: Ensure the Outline role password matches the managed secret
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER ROLE {{ outline_database_user }} PASSWORD '{{ outline_database_password }}'"
  changed_when: false
  no_log: true
  when: outline_postgres_writable_check.stdout | trim == "1"

- name: Check whether the Outline PostgreSQL database already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_database WHERE datname = '{{ outline_database_name }}'"
  register: outline_postgres_database_check
  changed_when: false
  when: outline_postgres_writable_check.stdout | trim == "1"

- name: Create the Outline PostgreSQL database
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE DATABASE {{ outline_database_name }} OWNER {{ outline_database_user }}"
  changed_when: true
  when:
    - outline_postgres_writable_check.stdout | trim == "1"
    - outline_postgres_database_check.stdout != "1"

- name: Ensure the Outline database owner is correct
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER DATABASE {{ outline_database_name }} OWNER TO {{ outline_database_user }}"
  changed_when: false
  when: outline_postgres_writable_check.stdout | trim == "1"
