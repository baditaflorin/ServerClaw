---
# NOTE: Conventional variables (site_dir, image, compose_file, env_file,
# openbao_*, container_name, internal_port, local_artifact_dir) are derived
# from platform_service_registry — ADR 0373.
uptime_kuma_service_topology: "{{ platform_service_topology | platform_service('uptime_kuma') }}"
uptime_kuma_hostname: "{{ uptime_kuma_service_topology.public_hostname }}"
uptime_kuma_base_url: "https://{{ uptime_kuma_service_topology.public_hostname }}"
uptime_kuma_site_dir: /opt/uptime-kuma
uptime_kuma_compose_file: "{{ uptime_kuma_site_dir }}/docker-compose.yml"
uptime_kuma_data_dir: "{{ uptime_kuma_site_dir }}/data"
uptime_kuma_container_name: uptime-kuma
uptime_kuma_image: "{{ container_image_catalog.images.uptime_kuma_runtime.ref }}"
uptime_kuma_port: "{{ uptime_kuma_service_topology.ports.internal }}"
uptime_kuma_local_artifact_dir: "{{ repo_shared_local_root }}/uptime-kuma"
uptime_kuma_local_auth_file: "{{ repo_shared_local_root }}/uptime-kuma/admin-session.json"
uptime_kuma_local_requirements_file: "{{ repo_shared_root }}/requirements/uptime-kuma-client.txt"
uptime_kuma_local_seed_file: "{{ repo_shared_root }}/config/uptime-kuma/monitors.json"
