---
- name: Derive Uptime Kuma conventional defaults from the service registry
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: derive_service_defaults
  vars:
    common_derive_service_name: uptime_kuma


- name: Validate Uptime Kuma runtime inputs
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: assert_vars
  vars:
    common_assert_vars_required:
      - uptime_kuma_site_dir
      - uptime_kuma_data_dir
      - uptime_kuma_compose_file
      - uptime_kuma_container_name
      - uptime_kuma_image
      - uptime_kuma_port
    common_assert_vars_expressions:
      - uptime_kuma_port | int > 0
    common_assert_vars_fail_msg: "uptime_kuma_runtime requires compose paths, image, container name, and port inputs."

- name: Ensure Uptime Kuma runtime packages are present
  ansible.builtin.apt:
    name:
      - docker-compose-plugin
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure Uptime Kuma directories exist
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: directory_tree
  vars:
    common_directory_tree_paths:
      - path: "{{ uptime_kuma_site_dir }}"
        mode: "0755"
      - path: "{{ uptime_kuma_data_dir }}"
        mode: "0755"

- name: Render the Uptime Kuma compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ uptime_kuma_compose_file }}"
    owner: root
    group: root
    mode: "0644"
  register: uptime_kuma_compose_render

- name: Converge the Uptime Kuma compose stack
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: docker_compose_converge
  vars:
    common_docker_compose_converge_compose_file: "{{ uptime_kuma_compose_file }}"
    common_docker_compose_converge_site_dir: "{{ uptime_kuma_site_dir }}"
    common_docker_compose_converge_service_name: uptime-kuma
    common_docker_compose_converge_template_results:
      - "{{ uptime_kuma_compose_render }}"
    common_docker_compose_converge_health_port: "{{ uptime_kuma_port }}"

- name: Wait for Uptime Kuma to listen locally
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: wait_port
  vars:
    common_wait_port_port: "{{ uptime_kuma_port }}"

- name: Verify the Uptime Kuma container is running
  ansible.builtin.command:
    argv:
      - docker
      - ps
      - --filter
      - "name={{ uptime_kuma_container_name }}"
      - --filter
      - status=running
      - --format
      - "{{ '{{' }}.Names{{ '}}' }}"
  register: uptime_kuma_running
  changed_when: false

- name: Assert the Uptime Kuma container is running
  ansible.builtin.assert:
    that:
      - uptime_kuma_running.stdout_lines | select('equalto', uptime_kuma_container_name) | list | length == 1
    fail_msg: "Uptime Kuma container is not running."

- name: Verify Uptime Kuma health probes
  ansible.builtin.import_tasks: verify.yml
