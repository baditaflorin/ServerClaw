---
# Purpose: Build the private Playwright browser runner image from repo-managed sources, start the runtime on docker-runtime, and verify the local session API.
- name: Derive Browser Runner conventional defaults from the service registry
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: derive_service_defaults
  vars:
    common_derive_service_name: browser_runner


- name: Validate browser runner runtime inputs
  ansible.builtin.assert:
    that:
      - browser_runner_runtime_site_dir | length > 0
      - browser_runner_runtime_service_dir | length > 0
      - browser_runner_runtime_data_dir | length > 0
      - browser_runner_runtime_artifact_dir | length > 0
      - browser_runner_runtime_compose_file | length > 0
      - browser_runner_runtime_dockerfile | length > 0
      - browser_runner_runtime_requirements_file | length > 0
      - browser_runner_runtime_service_script | length > 0
      - browser_runner_runtime_container_name | length > 0
      - browser_runner_runtime_image_name | length > 0
      - browser_runner_runtime_base_image | length > 0
      - browser_runner_runtime_internal_port | int > 0
      - browser_runner_runtime_bind_host | length > 0
      - browser_runner_runtime_network_mode | length > 0
      - browser_runner_runtime_default_timeout_seconds | int > 0
      - browser_runner_runtime_max_timeout_seconds | int >= browser_runner_runtime_default_timeout_seconds | int
      - browser_runner_runtime_service_sources | length > 0
    fail_msg: >-
      browser_runner_runtime requires the runtime paths, local image build
      inputs, bounded timeout configuration, and repo-managed service sources.

- name: Ensure browser runner runtime packages are present
  ansible.builtin.apt:
    name:
      - docker-compose-plugin
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure browser runner directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ browser_runner_runtime_site_dir }}"
    - "{{ browser_runner_runtime_service_dir }}"
    - "{{ browser_runner_runtime_data_dir }}"
    - "{{ browser_runner_runtime_artifact_dir }}"

- name: Render the browser runner compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ browser_runner_runtime_compose_file }}"
    owner: root
    group: root
    mode: "0644"
  register: browser_runner_runtime_compose_template

- name: Render the browser runner Dockerfile
  ansible.builtin.template:
    src: Dockerfile.j2
    dest: "{{ browser_runner_runtime_dockerfile }}"
    owner: root
    group: root
    mode: "0644"
  register: browser_runner_runtime_dockerfile_template

- name: Sync the browser runner service sources
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ browser_runner_runtime_service_sources }}"
  loop_control:
    label: "{{ item.dest }}"
  register: browser_runner_runtime_source_sync

- name: Build the browser runner image
  ansible.builtin.shell: |
    set -euo pipefail
    build_dir="$(mktemp -d /tmp/browser-runner-build.XXXXXX)"
    log_file="/tmp/browser-runner-build.log"
    trap 'rm -rf "$build_dir"' EXIT
    cp -a "{{ browser_runner_runtime_service_dir }}/." "$build_dir/"
    if DOCKER_BUILDKIT=0 docker build --pull=false -t "{{ browser_runner_runtime_image_name }}:latest" "$build_dir" >"$log_file" 2>&1; then
      cat "$log_file"
    else
      rc="$?"
      cat "$log_file"
      exit "$rc"
    fi
  args:
    chdir: "{{ browser_runner_runtime_site_dir }}"
    executable: /bin/bash
  register: browser_runner_runtime_build
  retries: 2
  delay: 5
  until: browser_runner_runtime_build.rc == 0
  changed_when: >-
    'writing image' in (browser_runner_runtime_build.stdout | lower)
    or 'writing image' in (browser_runner_runtime_build.stderr | lower)
    or 'naming to' in (browser_runner_runtime_build.stdout | lower)
    or 'naming to' in (browser_runner_runtime_build.stderr | lower)
    or 'exporting to image' in (browser_runner_runtime_build.stdout | lower)
    or 'exporting to image' in (browser_runner_runtime_build.stderr | lower)
    or 'successfully built' in (browser_runner_runtime_build.stdout | lower)
    or 'successfully tagged' in (browser_runner_runtime_build.stdout | lower)

- name: Converge the browser runner stack
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: docker_compose_converge
  vars:
    common_docker_compose_converge_compose_file: "{{ browser_runner_runtime_compose_file }}"
    common_docker_compose_converge_site_dir: "{{ browser_runner_runtime_site_dir }}"
    common_docker_compose_converge_service_name: browser-runner
    common_docker_compose_converge_template_results:
      - "{{ browser_runner_runtime_compose_template }}"
      - "{{ browser_runner_runtime_dockerfile_template }}"
      - "{{ browser_runner_runtime_source_sync }}"
      - "{{ browser_runner_runtime_build }}"

- name: Wait for the browser runner listener
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ browser_runner_runtime_internal_port }}"
    delay: 0
    timeout: 240

- name: Verify the browser runner runtime
  ansible.builtin.import_tasks: verify.yml
