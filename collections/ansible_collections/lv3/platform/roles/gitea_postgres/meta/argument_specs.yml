---
argument_specs:
  main:
    short_description: Provision the PostgreSQL role and database used by Gitea.
    options:
      gitea_database_name:
        type: str
        required: true
      gitea_database_user:
        type: str
        required: true
      gitea_postgres_secret_dir:
        type: path
        required: true
      gitea_postgres_password_file:
        type: path
        required: true
      gitea_local_artifact_dir:
        type: path
        required: true
      gitea_database_password_local_file:
        type: path
        required: true
