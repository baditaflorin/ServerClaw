---
# Purpose: Create and maintain the PostgreSQL role and database used by Label Studio.

- name: Validate Label Studio PostgreSQL inputs
  ansible.builtin.assert:
    that:
      - label_studio_database_name | length > 0
      - label_studio_database_user | length > 0
      - label_studio_postgres_secret_dir | length > 0
      - label_studio_postgres_password_file | length > 0
      - label_studio_database_password_local_file | length > 0
    fail_msg: "label_studio_postgres requires database names and password paths."

- name: Ensure the Label Studio PostgreSQL secret directory exists
  ansible.builtin.file:
    path: "{{ label_studio_postgres_secret_dir }}"
    state: directory
    owner: root
    group: postgres
    mode: "0750"

- name: Ensure the local Label Studio artifact directory exists
  ansible.builtin.file:
    path: "{{ label_studio_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Generate the Label Studio database password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ label_studio_database_password_local_file }}" ]; then
      umask 077
      openssl rand -hex 24 > "{{ label_studio_database_password_local_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: label_studio_postgres_password_generation
  changed_when: "'changed' in label_studio_postgres_password_generation.stdout"
  no_log: true

- name: Read the Label Studio database password
  ansible.builtin.slurp:
    src: "{{ label_studio_database_password_local_file }}"
  delegate_to: localhost
  become: false
  register: label_studio_postgres_password_raw
  no_log: true

- name: Record the Label Studio database password
  ansible.builtin.set_fact:
    label_studio_database_password: "{{ label_studio_postgres_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Persist the Label Studio database password on the PostgreSQL member
  ansible.builtin.copy:
    dest: "{{ label_studio_postgres_password_file }}"
    content: "{{ label_studio_database_password }}\n"
    owner: root
    group: postgres
    mode: "0640"
  no_log: true

- name: Check whether the local PostgreSQL member is writable
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT CASE WHEN pg_is_in_recovery() THEN 0 ELSE 1 END"
  register: label_studio_postgres_writable_check
  changed_when: false

- name: Check whether the Label Studio role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ label_studio_database_user }}'"
  register: label_studio_postgres_role_check
  changed_when: false
  when: label_studio_postgres_writable_check.stdout | trim == "1"

- name: Create the Label Studio role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - >-
        CREATE ROLE {{ label_studio_database_user }} LOGIN
        PASSWORD '{{ label_studio_database_password }}'
  changed_when: true
  no_log: true
  when:
    - label_studio_postgres_writable_check.stdout | trim == "1"
    - label_studio_postgres_role_check.stdout != "1"

- name: Ensure the Label Studio role password matches the managed secret
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER ROLE {{ label_studio_database_user }} PASSWORD '{{ label_studio_database_password }}'"
  changed_when: false
  no_log: true
  when: label_studio_postgres_writable_check.stdout | trim == "1"

- name: Check whether the Label Studio PostgreSQL database already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_database WHERE datname = '{{ label_studio_database_name }}'"
  register: label_studio_postgres_database_check
  changed_when: false
  when: label_studio_postgres_writable_check.stdout | trim == "1"

- name: Create the Label Studio PostgreSQL database
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE DATABASE {{ label_studio_database_name }} OWNER {{ label_studio_database_user }}"
  changed_when: true
  when:
    - label_studio_postgres_writable_check.stdout | trim == "1"
    - label_studio_postgres_database_check.stdout != "1"

- name: Ensure the Label Studio database owner is correct
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER DATABASE {{ label_studio_database_name }} OWNER TO {{ label_studio_database_user }}"
  changed_when: false
  when: label_studio_postgres_writable_check.stdout | trim == "1"
