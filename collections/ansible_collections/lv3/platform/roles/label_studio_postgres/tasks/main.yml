---
# Purpose: Provision the label_studio PostgreSQL database using the shared postgres_client role (ADR 0359).
# Use case: Called during label_studio deployment to ensure the database, role, and credentials exist.
# Inputs: label_studio_* variables from defaults/main.yml; resolves registry entry from platform_postgres_clients.
# Outputs: label_studio PostgreSQL role, database, and credential files converged on postgres-lv3.
# Idempotency: Yes; postgres_client role handles all idempotency.
# Dependencies: ADR 0359 postgres_client role, platform_postgres_clients registry.
- name: Provision the label_studio database via the shared postgres_client role
  ansible.builtin.include_role:
    name: lv3.platform.postgres_client
  vars:
    postgres_client_service: "{{ label_studio_database_name }}"
    postgres_client_database: "{{ label_studio_database_name }}"
    postgres_client_user: "{{ label_studio_database_user }}"
    postgres_client_password_local_file: "{{ label_studio_database_password_local_file }}"
    postgres_client_password_remote_dir: "{{ label_studio_postgres_secret_dir }}"
    postgres_client_password_remote_file: "{{ label_studio_postgres_password_file }}"
