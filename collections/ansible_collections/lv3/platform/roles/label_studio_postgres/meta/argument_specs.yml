---
# Purpose: Describe the required PostgreSQL variables for Label Studio.

argument_specs:
  main:
    short_description: Converge the PostgreSQL backend for Label Studio.
    options:
      label_studio_database_name:
        type: str
        required: true
      label_studio_database_user:
        type: str
        required: true
      label_studio_postgres_secret_dir:
        type: path
        required: true
      label_studio_postgres_password_file:
        type: path
        required: true
      label_studio_database_password_local_file:
        type: path
        required: true
