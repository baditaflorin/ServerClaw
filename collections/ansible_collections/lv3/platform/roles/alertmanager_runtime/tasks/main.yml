---
- name: Derive conventional service variables from platform_service_registry
  ansible.builtin.import_tasks: ../common/tasks/derive_service_defaults.yml
  vars:
    common_derive_service_name: alertmanager

- name: Validate Alertmanager runtime inputs
  ansible.builtin.assert:
    that:
      - alertmanager_runtime_package | length > 0
      - alertmanager_runtime_service_name | length > 0
      - alertmanager_runtime_env_file | length > 0
      - alertmanager_runtime_config_template | length > 0
      - alertmanager_runtime_config_file | length > 0
      - alertmanager_runtime_data_dir | length > 0
      - alertmanager_runtime_rules_dir | length > 0
      - alertmanager_runtime_platform_rules_source | length > 0
      - alertmanager_runtime_ntfy_password_local_file | length > 0
      - alertmanager_runtime_mattermost_webhook_manifest_local_file | length > 0
      - not alertmanager_runtime_pgaudit_relay_enabled or alertmanager_runtime_pgaudit_relay_service_name | length > 0
      - not alertmanager_runtime_pgaudit_relay_enabled or alertmanager_runtime_pgaudit_relay_service_file | length > 0
      - not alertmanager_runtime_pgaudit_relay_enabled or alertmanager_runtime_pgaudit_relay_script_file | length > 0
      - not alertmanager_runtime_pgaudit_relay_enabled or alertmanager_runtime_pgaudit_relay_env_file | length > 0
      - not alertmanager_runtime_pgaudit_relay_enabled or alertmanager_runtime_pgaudit_relay_webhook_url | length > 0
      - not alertmanager_runtime_pgaudit_relay_enabled or alertmanager_runtime_pgaudit_relay_health_url | length > 0
      - not alertmanager_runtime_pgaudit_relay_enabled or alertmanager_runtime_pgaudit_relay_nats_url | length > 0
      - not alertmanager_runtime_pgaudit_relay_enabled or alertmanager_runtime_pgaudit_relay_nats_subject | length > 0
      - not alertmanager_runtime_pgaudit_relay_enabled or alertmanager_runtime_pgaudit_relay_nats_username | length > 0
      - not alertmanager_runtime_pgaudit_relay_enabled or alertmanager_runtime_pgaudit_relay_nats_password_local_file | length > 0
    fail_msg: "alertmanager_runtime requires package, config, rules, and controller-local secret inputs."

- name: Check Alertmanager prerequisites on the control machine
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: check_local_secrets
  vars:
    common_check_local_secrets_files:
      - path: "{{ alertmanager_runtime_ntfy_password_local_file }}"
        description: "Alertmanager ntfy password"
        prerequisite: "Converge ntfy before deploying Alertmanager"
      - path: "{{ alertmanager_runtime_mattermost_webhook_manifest_local_file }}"
        description: "Alertmanager Mattermost webhook manifest"
        prerequisite: "Converge Mattermost before deploying Alertmanager"

- name: Check Alertmanager NATS relay prerequisites when enabled
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: check_local_secrets
  vars:
    common_check_local_secrets_files:
      - path: "{{ alertmanager_runtime_pgaudit_relay_nats_password_local_file }}"
        description: "Alertmanager pgaudit NATS relay password"
        prerequisite: "Converge the NATS JetStream runtime before enabling the pgaudit relay"
  when: alertmanager_runtime_pgaudit_relay_enabled | bool

- name: Ensure Alertmanager package is present
  ansible.builtin.apt:
    name:
      - "{{ alertmanager_runtime_package }}"
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure Alertmanager directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ alertmanager_runtime_config_file | dirname }}"
      group: root
      mode: "0755"
    - path: "{{ alertmanager_runtime_data_dir }}"
      group: root
      mode: "0755"
    - path: "{{ alertmanager_runtime_rules_dir }}"
      group: prometheus
      mode: "0755"
    - path: "{{ alertmanager_runtime_pgaudit_relay_script_file | dirname }}"
      group: root
      mode: "0755"

- name: Read controller-local ntfy password
  ansible.builtin.slurp:
    src: "{{ alertmanager_runtime_ntfy_password_local_file }}"
  delegate_to: localhost
  become: false
  register: alertmanager_runtime_ntfy_password_raw
  no_log: true

- name: Read controller-local NATS relay password
  ansible.builtin.slurp:
    src: "{{ alertmanager_runtime_pgaudit_relay_nats_password_local_file }}"
  delegate_to: localhost
  become: false
  register: alertmanager_runtime_pgaudit_relay_nats_password_raw
  no_log: true
  when: alertmanager_runtime_pgaudit_relay_enabled | bool

- name: Load controller-local Mattermost webhook manifest
  ansible.builtin.set_fact:
    alertmanager_runtime_ntfy_password: "{{ alertmanager_runtime_ntfy_password_raw.content | b64decode | trim }}"
    alertmanager_runtime_mattermost_webhooks: "{{ lookup('ansible.builtin.file', alertmanager_runtime_mattermost_webhook_manifest_local_file) | from_json }}"
    alertmanager_runtime_pgaudit_relay_nats_password: >-
      {{
        (alertmanager_runtime_pgaudit_relay_nats_password_raw.content | b64decode | trim)
        if alertmanager_runtime_pgaudit_relay_enabled | bool
        else ''
      }}
  no_log: true

- name: Persist Alertmanager ntfy password
  ansible.builtin.copy:
    dest: "{{ alertmanager_runtime_ntfy_password_file }}"
    content: "{{ alertmanager_runtime_ntfy_password }}\n"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart Alertmanager

- name: Derive Alertmanager Mattermost webhook URLs
  ansible.builtin.set_fact:
    alertmanager_runtime_mattermost_critical_webhook_url: >-
      {{
        (
          alertmanager_runtime_mattermost_webhooks.webhooks.get(
            'alerts_critical',
            alertmanager_runtime_mattermost_webhooks.webhooks.get('alerts', {}),
          )
        ).get('internal_url', '')
      }}
    alertmanager_runtime_mattermost_warning_webhook_url: >-
      {{
        (
          alertmanager_runtime_mattermost_webhooks.webhooks.get('alerts', {})
        ).get('internal_url', '')
      }}
    alertmanager_runtime_mattermost_info_webhook_url: >-
      {{
        (
          alertmanager_runtime_mattermost_webhooks.webhooks.get(
            'ops',
            alertmanager_runtime_mattermost_webhooks.webhooks.get(
              'workflows',
              alertmanager_runtime_mattermost_webhooks.webhooks.get('alerts', {}),
            ),
          )
        ).get('internal_url', '')
      }}
  no_log: true

- name: Assert Alertmanager Mattermost webhook URLs are available
  ansible.builtin.assert:
    that:
      - alertmanager_runtime_mattermost_critical_webhook_url | length > 0
      - alertmanager_runtime_mattermost_warning_webhook_url | length > 0
      - alertmanager_runtime_mattermost_info_webhook_url | length > 0
    fail_msg: >-
      Alertmanager requires repo-managed Mattermost incoming webhook URLs for
      critical, warning, and informational notifications.
  no_log: true

- name: Render pgaudit alert relay environment file
  ansible.builtin.template:
    src: pgaudit-alert-relay.env.j2
    dest: "{{ alertmanager_runtime_pgaudit_relay_env_file }}"
    owner: root
    group: prometheus
    mode: "0640"
  no_log: true
  notify: Restart pgaudit alert relay
  when: alertmanager_runtime_pgaudit_relay_enabled | bool

- name: Render pgaudit alert relay script
  ansible.builtin.template:
    src: pgaudit-alert-relay.py.j2
    dest: "{{ alertmanager_runtime_pgaudit_relay_script_file }}"
    owner: root
    group: prometheus
    mode: "0750"
  notify: Restart pgaudit alert relay
  when: alertmanager_runtime_pgaudit_relay_enabled | bool

- name: Render pgaudit alert relay systemd service
  ansible.builtin.template:
    src: pgaudit-alert-relay.service.j2
    dest: "{{ alertmanager_runtime_pgaudit_relay_service_file }}"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart pgaudit alert relay
  when: alertmanager_runtime_pgaudit_relay_enabled | bool

- name: Render Alertmanager package environment file
  ansible.builtin.template:
    src: prometheus-alertmanager.env.j2
    dest: "{{ alertmanager_runtime_env_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Alertmanager

- name: Render Alertmanager configuration
  ansible.builtin.template:
    src: "{{ alertmanager_runtime_config_template }}"
    dest: "{{ alertmanager_runtime_config_file }}"
    owner: root
    group: root
    mode: "0644"
  no_log: true
  notify: Restart Alertmanager

- name: Template platform alert rules
  ansible.builtin.template:
    src: "{{ alertmanager_runtime_platform_rules_source }}"
    dest: "{{ alertmanager_runtime_rules_dir }}/platform.yml"
    owner: root
    group: prometheus
    mode: "0644"
  notify: Restart Prometheus

- name: Flush Alertmanager handlers before service enablement
  ansible.builtin.meta: flush_handlers

- name: Enable and start Alertmanager
  ansible.builtin.systemd:
    name: "{{ alertmanager_runtime_service_name }}"
    enabled: true
    state: started

- name: Enable and start pgaudit alert relay
  ansible.builtin.systemd:
    name: "{{ alertmanager_runtime_pgaudit_relay_service_name }}"
    enabled: true
    state: started
  when: alertmanager_runtime_pgaudit_relay_enabled | bool

- name: Verify Alertmanager runtime health probes
  ansible.builtin.import_tasks: verify.yml
