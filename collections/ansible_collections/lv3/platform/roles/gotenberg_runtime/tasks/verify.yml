---
# Purpose: Verify the local Gotenberg health contract and both PDF conversion routes.
# Dependencies: ADR 0278, ADR 0165, ADR 0371; requires the gotenberg_runtime compose stack to be running.
- name: Verify the Gotenberg runtime health
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: gotenberg
    common_verify_port: "{{ gotenberg_runtime_port }}"
    common_verify_health_url: "{{ gotenberg_runtime_local_base_url }}{{ gotenberg_runtime_healthcheck_path }}"
    common_verify_health_retries: 12
    common_verify_health_delay: 2

- name: Verify the Gotenberg Chromium HTML conversion route renders a PDF
  ansible.builtin.shell: |
    set -euo pipefail
    html="$(mktemp --suffix=.html)"
    pdf="$(mktemp)"
    trap 'rm -f "$html" "$pdf"' EXIT
    cat >"$html" <<'EOF'
    <html>
      <body>
        <h1>{{ gotenberg_runtime_verify_html_title }}</h1>
        <p>Chromium route verification.</p>
      </body>
    </html>
    EOF
    curl -fsS -o "$pdf" \
      -F "files=@${html};filename=index.html;type=text/html" \
      "{{ gotenberg_runtime_local_base_url }}/forms/chromium/convert/html"
    head -c 4 "$pdf" | grep -q '%PDF'
  args:
    executable: /bin/bash
  register: gotenberg_runtime_verify_html
  changed_when: false

- name: Verify the Gotenberg LibreOffice conversion route renders a PDF
  ansible.builtin.shell: |
    set -euo pipefail
    text_file="$(mktemp --suffix=.txt)"
    pdf="$(mktemp)"
    trap 'rm -f "$text_file" "$pdf"' EXIT
    printf 'LV3 Gotenberg LibreOffice verification\n' >"$text_file"
    curl -fsS -o "$pdf" \
      -F "files=@${text_file};filename={{ gotenberg_runtime_verify_text_filename }};type=text/plain" \
      "{{ gotenberg_runtime_local_base_url }}/forms/libreoffice/convert"
    head -c 4 "$pdf" | grep -q '%PDF'
  args:
    executable: /bin/bash
  register: gotenberg_runtime_verify_libreoffice
  changed_when: false
