# Purpose: Converge the OpenBao runtime, initialization flow, unseal artifacts, and repo-managed auth/bootstrap contracts.
# Use case: Run during OpenBao deployment, TLS hardening, or downstream recovery when secret delivery must match repo truth.
# Inputs: Runtime paths, TLS materials, PostgreSQL backend inputs, local artifact files, and bootstrap identity settings.
# Outputs: The OpenBao runtime, bootstrap payloads, auth backends, and operator credentials match the declared configuration.
# Idempotency: Partially idempotent because first-run initialization, unseal handling, and runtime restarts intentionally change state.
# Dependencies: ADR 0165, ADR 0043, ADR 0101, and ADR 0231.
---
- name: Validate OpenBao runtime inputs
  ansible.builtin.assert:
    that:
      - openbao_image | length > 0
      - openbao_container_name | length > 0
      - openbao_site_dir | length > 0
      - openbao_config_file | length > 0
      - openbao_compose_file | length > 0
      - openbao_local_artifact_dir | length > 0
      - openbao_init_local_file | length > 0
      - openbao_postgres_host | length > 0
      - openbao_postgres_admin_role | length > 0
      - not openbao_tls_enabled or openbao_tls_dir | length > 0
      - not openbao_tls_enabled or openbao_tls_server_cert_file | length > 0
      - not openbao_tls_enabled or openbao_tls_server_key_file | length > 0
      - not openbao_tls_enabled or openbao_tls_client_ca_file | length > 0
      - not openbao_tls_enabled or openbao_tls_server_cert_host_file | length > 0
      - not openbao_tls_enabled or openbao_tls_server_key_host_file | length > 0
      - not openbao_tls_enabled or openbao_tls_client_ca_host_file | length > 0
      - not openbao_tls_enabled or (openbao_controller_url | default('')) | length > 0
      - not openbao_tls_enabled or (step_ca_internal_url | default('')) | length > 0
      - not openbao_tls_enabled or (step_ca_services_password_file | default('')) | length > 0
      - not openbao_tls_enabled or (step_ca_remote_root_certificate_file | default('')) | length > 0
    fail_msg: "openbao_runtime requires image, filesystem paths, local artifact paths, and PostgreSQL backend inputs."

- name: Ensure OpenBao local artifact directory exists
  ansible.builtin.file:
    path: "{{ openbao_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Ensure generated OpenBao local password files exist
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ item.path }}" ]; then
      umask 077
      openssl rand -base64 24 > "{{ item.path }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  loop:
    - path: "{{ openbao_ops_password_local_file }}"
    - path: "{{ openbao_breakglass_password_local_file }}"
    - path: "{{ openbao_postgres_rotator_password_local_file }}"
  delegate_to: localhost
  become: false
  register: openbao_local_password_generation
  changed_when: "'changed' in openbao_local_password_generation.stdout"
  no_log: true

- name: Check whether the OpenBao init payload exists locally
  ansible.builtin.stat:
    path: "{{ openbao_init_local_file }}"
  delegate_to: localhost
  become: false
  register: openbao_init_payload_local
  no_log: true

- name: Reset the OpenBao data and log directories before first initialization
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ openbao_data_dir }}"
    - "{{ openbao_log_dir }}"
  when: not openbao_init_payload_local.stat.exists

- name: Read the OpenBao userpass and rotator passwords from the control machine
  ansible.builtin.slurp:
    src: "{{ item }}"
  loop:
    - "{{ openbao_ops_password_local_file }}"
    - "{{ openbao_breakglass_password_local_file }}"
    - "{{ openbao_postgres_rotator_password_local_file }}"
  delegate_to: localhost
  become: false
  register: openbao_password_payloads
  no_log: true

- name: Record OpenBao password facts
  ansible.builtin.set_fact:
    openbao_ops_password: "{{ openbao_password_payloads.results[0].content | b64decode | trim }}"
    openbao_breakglass_password: "{{ openbao_password_payloads.results[1].content | b64decode | trim }}"
    openbao_postgres_rotator_password: "{{ openbao_password_payloads.results[2].content | b64decode | trim }}"
  no_log: true

- name: Ensure OpenBao runtime prerequisite packages are present
  ansible.builtin.apt:
    name:
      - curl
    state: present
    update_cache: true
    cache_valid_time: 3600
    lock_timeout: 300
    force_apt_get: true

- name: Ensure OpenBao runtime directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ openbao_site_dir }}"
      mode: "0755"
      owner: root
      group: root
    - path: "{{ openbao_config_dir }}"
      mode: "0755"
      owner: "{{ openbao_runtime_uid }}"
      group: "{{ openbao_runtime_gid }}"
    - path: "{{ openbao_data_dir }}"
      mode: "0700"
      owner: "{{ openbao_runtime_uid }}"
      group: "{{ openbao_runtime_gid }}"
    - path: "{{ openbao_log_dir }}"
      mode: "0700"
      owner: "{{ openbao_runtime_uid }}"
      group: "{{ openbao_runtime_gid }}"
    - path: "{{ openbao_tls_dir }}"
      mode: "0750"
      owner: "{{ openbao_runtime_uid }}"
      group: "{{ openbao_runtime_gid }}"
    - path: "{{ openbao_policy_dir }}"
      mode: "0755"
      owner: "{{ openbao_runtime_uid }}"
      group: "{{ openbao_runtime_gid }}"

- name: Ensure the OpenBao audit log file exists with managed ownership
  ansible.builtin.file:
    path: "{{ openbao_log_dir }}/audit.log"
    state: touch
    owner: "{{ openbao_runtime_uid }}"
    group: "{{ openbao_runtime_gid }}"
    mode: "0640"
    access_time: preserve
    modification_time: preserve

- name: Mirror the step-ca root certificate for OpenBao TLS trust
  ansible.builtin.copy:
    remote_src: true
    src: "{{ step_ca_remote_root_certificate_file }}"
    dest: "{{ openbao_tls_client_ca_host_file }}"
    owner: "{{ openbao_runtime_uid }}"
    group: "{{ openbao_runtime_gid }}"
    mode: "0644"

- name: Check whether the OpenBao external TLS certificate remains fresh enough
  ansible.builtin.command:
    argv:
      - openssl
      - x509
      - -checkend
      - "{{ openbao_tls_cert_renew_before_seconds | string }}"
      - -noout
      - -in
      - "{{ openbao_tls_server_cert_host_file }}"
  register: openbao_tls_certificate_freshness
  changed_when: false
  failed_when: false

- name: Issue or renew the OpenBao external TLS certificate
  vars:
    mutation_audit_action: issue.openbao_tls_certificate
    mutation_audit_target: openbao-runtime
  ansible.builtin.shell: |
    set -euo pipefail
    step ca certificate \
      --force \
      --provisioner services \
      --provisioner-password-file "{{ step_ca_services_password_file }}" \
      --ca-url "{{ step_ca_internal_url }}" \
      --root "{{ step_ca_remote_root_certificate_file }}" \
    {% for san in openbao_tls_server_sans %}
      --san "{{ san }}" \
    {% endfor %}
      --not-after "{{ openbao_tls_certificate_not_after }}" \
      "{{ openbao_tls_certificate_subject }}" \
      "{{ openbao_tls_server_cert_host_file }}" \
      "{{ openbao_tls_server_key_host_file }}"

    chown {{ openbao_runtime_uid }}:{{ openbao_runtime_gid }} "{{ openbao_tls_server_cert_host_file }}" "{{ openbao_tls_server_key_host_file }}"
    chmod 0644 "{{ openbao_tls_server_cert_host_file }}"
    chmod 0600 "{{ openbao_tls_server_key_host_file }}"
    echo changed
  args:
    executable: /bin/bash
  register: openbao_tls_certificate_issue
  changed_when: "'changed' in openbao_tls_certificate_issue.stdout"
  when: openbao_tls_certificate_freshness.rc != 0
  no_log: true
  tags:
    - mutation

- name: Render OpenBao policy files
  vars:
    mutation_audit_action: render.openbao_policies
    mutation_audit_target: openbao-runtime
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ openbao_policy_dir }}/{{ item.name }}.hcl"
    owner: root
    group: root
    mode: "0640"
  loop: "{{ openbao_policies }}"
  tags:
    - mutation

- name: Render OpenBao server configuration
  vars:
    mutation_audit_action: render.openbao_config
    mutation_audit_target: openbao-runtime
  ansible.builtin.template:
    src: openbao.hcl.j2
    dest: "{{ openbao_config_file }}"
    owner: root
    group: root
    mode: "0644"
  tags:
    - mutation

- name: Render the OpenBao Compose file
  vars:
    mutation_audit_action: render.openbao_compose
    mutation_audit_target: openbao-runtime
  ansible.builtin.copy:
    content: "{{ lookup('ansible.builtin.template', role_path ~ '/templates/docker-compose.yml.j2') }}"
    dest: "{{ openbao_compose_file }}"
    owner: root
    group: root
    mode: "0644"
  tags:
    - mutation

- name: Pull the OpenBao image
  vars:
    mutation_audit_action: pull.openbao_image
    mutation_audit_target: openbao-runtime
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ openbao_compose_file }}"
      - pull
  args:
    chdir: "{{ openbao_site_dir }}"
  register: openbao_pull
  changed_when: >-
    'Downloaded newer image' in openbao_pull.stdout
    or 'Pull complete' in openbao_pull.stdout
    or 'Pulling' in openbao_pull.stdout
  tags:
    - mutation

- name: Reset SSH connection before Docker chain checks for OpenBao startup
  ansible.builtin.meta: reset_connection

- name: Check whether Docker nat chain exists before OpenBao startup
  ansible.builtin.command: iptables -t nat -S DOCKER
  register: openbao_docker_nat_chain_check
  changed_when: false
  failed_when: openbao_docker_nat_chain_check.rc not in [0, 1]

- name: Check whether Docker forward chain exists before OpenBao startup
  ansible.builtin.command: iptables -t filter -S DOCKER-FORWARD
  register: openbao_docker_forward_chain_check
  changed_when: false
  failed_when: openbao_docker_forward_chain_check.rc not in [0, 1]

- name: Restart Docker when required chains are missing before OpenBao startup
  ansible.builtin.systemd:
    name: docker
    state: restarted
  when: openbao_docker_nat_chain_check.rc == 1 or openbao_docker_forward_chain_check.rc == 1

- name: Recheck Docker nat chain before OpenBao startup
  ansible.builtin.command: iptables -t nat -S DOCKER
  register: openbao_docker_nat_chain_recheck
  changed_when: false
  failed_when: openbao_docker_nat_chain_recheck.rc not in [0, 1]
  retries: "{{ openbao_runtime_chain_recheck_retries }}"
  delay: "{{ openbao_runtime_chain_recheck_delay_seconds }}"
  until: openbao_docker_nat_chain_recheck.rc == 0

- name: Recheck Docker forward chain before OpenBao startup
  ansible.builtin.command: iptables -t filter -S DOCKER-FORWARD
  register: openbao_docker_forward_chain_recheck
  changed_when: false
  failed_when: openbao_docker_forward_chain_recheck.rc not in [0, 1]
  retries: "{{ openbao_runtime_chain_recheck_retries }}"
  delay: "{{ openbao_runtime_chain_recheck_delay_seconds }}"
  until: openbao_docker_forward_chain_recheck.rc == 0

- name: Record Docker chain readiness before OpenBao startup
  ansible.builtin.set_fact:
    openbao_docker_chains_ready_before_startup: >-
      {{ openbao_docker_nat_chain_recheck.rc == 0 and openbao_docker_forward_chain_recheck.rc == 0 }}

- name: Warn when Docker chains are still missing before OpenBao startup
  ansible.builtin.debug:
    msg: >-
      Docker DOCKER or DOCKER-FORWARD chains are still missing after restart;
      continuing to docker compose up and relying on the published-port, loopback,
      and seal-status checks to catch any remaining Docker startup failure.
  when: not openbao_docker_chains_ready_before_startup

- name: Check whether the named OpenBao container already exists
  ansible.builtin.command:
    argv:
      - docker
      - container
      - inspect
      - "{{ openbao_container_name }}"
  register: openbao_container_inspect
  changed_when: false
  failed_when: openbao_container_inspect.rc not in [0, 1]

- name: Remove the existing named OpenBao container before compose up
  ansible.builtin.command:
    argv:
      - docker
      - rm
      - -f
      - "{{ openbao_container_name }}"
  register: openbao_container_remove
  changed_when: openbao_container_remove.rc == 0
  when: openbao_container_inspect.rc == 0

- name: Inspect the managed OpenBao default network before compose up
  ansible.builtin.command:
    argv:
      - docker
      - network
      - inspect
      - "{{ openbao_default_network_name }}"
  register: openbao_default_network_inspect
  changed_when: false
  failed_when: openbao_default_network_inspect.rc not in [0, 1]

- name: Remove the detached managed OpenBao default network before compose up
  vars:
    mutation_audit_action: remove.openbao_default_network
    mutation_audit_target: openbao-runtime
  ansible.builtin.command:
    argv:
      - docker
      - network
      - rm
      - "{{ openbao_default_network_name }}"
  register: openbao_default_network_remove
  changed_when: openbao_default_network_remove.rc == 0
  when:
    - openbao_default_network_inspect.rc == 0
    - >-
      (
        (openbao_default_network_inspect.stdout | from_json | first).Containers | default({})
      ) | length == 0
  tags:
    - mutation

- name: Start the OpenBao stack and recover Docker bridge-chain failures
  block:
    - name: Start the OpenBao stack
      vars:
        mutation_audit_action: start.openbao_stack
        mutation_audit_target: openbao-runtime
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ openbao_compose_file }}"
          - up
          - -d
          - --remove-orphans
      args:
        chdir: "{{ openbao_site_dir }}"
      register: openbao_up
      changed_when: >-
        'Creating' in openbao_up.stdout
        or 'Recreating' in openbao_up.stdout
        or 'Starting' in openbao_up.stdout
      tags:
        - mutation
  rescue:
    - name: Flag Docker bridge-chain failures during OpenBao startup
      ansible.builtin.set_fact:
        openbao_docker_bridge_chain_missing: >-
          {{
            'No chain/target/match by that name' in (ansible_failed_result.stderr | default(''))
            or 'Unable to enable DNAT rule' in (ansible_failed_result.stderr | default(''))
          }}

    - name: Surface unexpected OpenBao startup failures
      ansible.builtin.fail:
        msg: "{{ ansible_failed_result.stderr | default(ansible_failed_result.msg | default('OpenBao compose up failed')) }}"
      when: not openbao_docker_bridge_chain_missing

    - name: Restart Docker to restore bridge chains before retrying OpenBao startup
      ansible.builtin.service:
        name: docker
        state: restarted
      when: openbao_docker_bridge_chain_missing

    - name: Reset SSH connection before retrying OpenBao startup after Docker recovery
      ansible.builtin.meta: reset_connection
      when: openbao_docker_bridge_chain_missing

    - name: Recheck Docker nat chain after Docker recovery for OpenBao startup
      ansible.builtin.command: iptables -t nat -S DOCKER
      register: openbao_docker_nat_chain_retry
      changed_when: false
      failed_when: openbao_docker_nat_chain_retry.rc not in [0, 1]
      retries: "{{ openbao_runtime_chain_recheck_retries }}"
      delay: "{{ openbao_runtime_chain_recheck_delay_seconds }}"
      until: openbao_docker_nat_chain_retry.rc == 0
      when: openbao_docker_bridge_chain_missing

    - name: Recheck Docker forward chain after Docker recovery for OpenBao startup
      ansible.builtin.command: iptables -t filter -S DOCKER-FORWARD
      register: openbao_docker_forward_chain_retry
      changed_when: false
      failed_when: openbao_docker_forward_chain_retry.rc not in [0, 1]
      retries: "{{ openbao_runtime_chain_recheck_retries }}"
      delay: "{{ openbao_runtime_chain_recheck_delay_seconds }}"
      until: openbao_docker_forward_chain_retry.rc == 0
      when: openbao_docker_bridge_chain_missing

    - name: Remove the failed OpenBao container before retrying startup
      ansible.builtin.command:
        argv:
          - docker
          - rm
          - -f
          - "{{ openbao_container_name }}"
      register: openbao_container_remove_retry
      changed_when: openbao_container_remove_retry.rc == 0
      failed_when: false
      when: openbao_docker_bridge_chain_missing

    - name: Remove the detached managed OpenBao default network before retrying startup
      ansible.builtin.command:
        argv:
          - docker
          - network
          - rm
          - "{{ openbao_default_network_name }}"
      register: openbao_default_network_remove_retry
      changed_when: openbao_default_network_remove_retry.rc == 0
      failed_when: false
      when: openbao_docker_bridge_chain_missing

    - name: Retry OpenBao startup after Docker bridge-chain recovery
      vars:
        mutation_audit_action: start.openbao_stack
        mutation_audit_target: openbao-runtime
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ openbao_compose_file }}"
          - up
          - -d
          - --remove-orphans
      args:
        chdir: "{{ openbao_site_dir }}"
      register: openbao_up
      changed_when: >-
        'Creating' in openbao_up.stdout
        or 'Recreating' in openbao_up.stdout
        or 'Starting' in openbao_up.stdout
      when: openbao_docker_bridge_chain_missing
      tags:
        - mutation

- name: Install the OpenBao TLS renewal timer
  ansible.builtin.include_role:
    name: lv3.platform.cert_renewal_timer
  vars:
    cert_renewal_timer_name: "{{ openbao_tls_renewal_timer_name }}"
    cert_renewal_timer_description: OpenBao TLS certificate renewal
    cert_renewal_timer_script_path: "{{ openbao_tls_renewal_script_path }}"
    cert_renewal_timer_service_path: "{{ openbao_tls_renewal_service_path }}"
    cert_renewal_timer_timer_path: "{{ openbao_tls_renewal_timer_path }}"
    cert_renewal_timer_on_calendar: "{{ openbao_tls_renewal_on_calendar }}"
    cert_renewal_timer_randomized_delay_seconds: "{{ openbao_tls_renewal_randomized_delay_seconds }}"
    cert_renewal_timer_issue_command: |
      if [ -s "{{ openbao_tls_server_cert_host_file }}" ] && \
        openssl x509 -checkend {{ openbao_tls_cert_renew_before_seconds }} -noout -in "{{ openbao_tls_server_cert_host_file }}" >/dev/null 2>&1; then
        exit 0
      fi

      step ca certificate \
        --force \
        --provisioner services \
        --provisioner-password-file "{{ step_ca_services_password_file }}" \
        --ca-url "{{ step_ca_internal_url }}" \
        --root "{{ step_ca_remote_root_certificate_file }}" \
      {% for san in openbao_tls_server_sans %}
        --san "{{ san }}" \
      {% endfor %}
        --not-after "{{ openbao_tls_certificate_not_after }}" \
        "{{ openbao_tls_certificate_subject }}" \
        "{{ openbao_tls_server_cert_host_file }}" \
        "{{ openbao_tls_server_key_host_file }}"

      chown {{ openbao_runtime_uid }}:{{ openbao_runtime_gid }} "{{ openbao_tls_server_cert_host_file }}" "{{ openbao_tls_server_key_host_file }}"
      chmod 0644 "{{ openbao_tls_server_cert_host_file }}"
      chmod 0600 "{{ openbao_tls_server_key_host_file }}"
      echo changed
    cert_renewal_timer_reload_command: "{{ openbao_tls_reload_command }}"

- name: Wait for OpenBao to listen on loopback
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ openbao_http_port }}"
    delay: 0
    timeout: 120

- name: Read OpenBao initialization status
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/init"
    method: GET
    return_content: true
    status_code: 200
  register: openbao_init_status
  retries: 12
  delay: 2
  until: openbao_init_status.status == 200
  changed_when: false

- name: Fail if OpenBao is initialized remotely but the local init payload is missing
  ansible.builtin.fail:
    msg: >-
      OpenBao is already initialized on {{ inventory_hostname }} but
      {{ openbao_init_local_file }} is missing on the control machine.
      Restore the controller-local init payload before rerunning automation.
  when:
    - openbao_init_status.json.initialized | bool
    - not openbao_init_payload_local.stat.exists

- name: Fail if a local init payload exists but the remote service is not initialized
  ansible.builtin.fail:
    msg: >-
      {{ openbao_init_local_file }} exists on the control machine, but OpenBao on
      {{ inventory_hostname }} is not initialized. Resolve the drift before rerunning automation.
  when:
    - not (openbao_init_status.json.initialized | bool)
    - openbao_init_payload_local.stat.exists

- name: Initialize OpenBao
  vars:
    mutation_audit_action: initialize.openbao
    mutation_audit_target: openbao-runtime
    mutation_audit_emit_on_success: true
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/init"
    method: POST
    body_format: json
    body:
      secret_shares: "{{ openbao_init_key_shares }}"
      secret_threshold: "{{ openbao_init_key_threshold }}"
    return_content: true
    status_code: 200
  when:
    - not (openbao_init_status.json.initialized | bool)
    - not openbao_init_payload_local.stat.exists
  register: openbao_init_response
  changed_when: true
  no_log: true
  tags:
    - mutation

- name: Persist the OpenBao init payload locally
  ansible.builtin.copy:
    dest: "{{ openbao_init_local_file }}"
    content: "{{ openbao_init_response.json | to_nice_json }}\n"
    mode: "0600"
  when: openbao_init_response is not skipped
  delegate_to: localhost
  become: false
  no_log: true

- name: Read the OpenBao init payload from the control machine
  ansible.builtin.slurp:
    src: "{{ openbao_init_local_file }}"
  delegate_to: localhost
  become: false
  register: openbao_init_payload_raw
  no_log: true

- name: Record the OpenBao init payload facts
  ansible.builtin.set_fact:
    openbao_init_payload: "{{ openbao_init_payload_raw.content | b64decode | from_json }}"
  no_log: true

- name: Read OpenBao seal status
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/seal-status"
    method: GET
    return_content: true
    status_code: 200
  register: openbao_seal_status
  retries: 12
  delay: 2
  until: openbao_seal_status.status == 200
  changed_when: false

- name: Unseal OpenBao with the first threshold of recovery keys
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/unseal"
    method: POST
    body_format: json
    body:
      key: "{{ item }}"
    status_code: 200
  loop: "{{ openbao_init_payload.keys_base64[:openbao_init_key_threshold] }}"
  register: openbao_unseal_result
  when: openbao_seal_status.json.sealed | bool
  no_log: true

- name: Confirm that OpenBao is unsealed
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/seal-status"
    method: GET
    return_content: true
    status_code: 200
  register: openbao_unsealed_status
  retries: 12
  delay: 2
  until: openbao_unsealed_status.status == 200
  changed_when: false

- name: Assert that OpenBao is unsealed
  ansible.builtin.assert:
    that:
      - not (openbao_unsealed_status.json.sealed | bool)
    fail_msg: "OpenBao is still sealed after the managed unseal sequence."

- name: Wait for OpenBao to become the active node
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/health"
    method: GET
    return_content: true
    status_code: 200
  register: openbao_active_health
  retries: 30
  delay: 2
  until: openbao_active_health.status == 200

- name: Discover enabled auth methods
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/auth"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    return_content: true
    status_code:
      - 200
      - 500
      - 502
      - 503
  register: openbao_auth_methods
  retries: 12
  delay: 2
  until: openbao_auth_methods.status == 200
  changed_when: false
  no_log: true

- name: Enable userpass auth
  vars:
    mutation_audit_action: enable.openbao_userpass
    mutation_audit_target: openbao-runtime
    mutation_audit_emit_on_success: true
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/auth/userpass"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      type: userpass
      description: LV3 named human and break-glass access
    status_code: 204
  register: openbao_enable_userpass_result
  retries: 6
  delay: 2
  until: openbao_enable_userpass_result.status == 204
  when: "'userpass/' not in openbao_auth_methods.json"
  no_log: true
  tags:
    - mutation

- name: Enable approle auth
  vars:
    mutation_audit_action: enable.openbao_approle
    mutation_audit_target: openbao-runtime
    mutation_audit_emit_on_success: true
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/auth/approle"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      type: approle
      description: LV3 service and agent access
    status_code: 204
  register: openbao_enable_approle_result
  retries: 6
  delay: 2
  until: openbao_enable_approle_result.status == 204
  when: "'approle/' not in openbao_auth_methods.json"
  no_log: true
  tags:
    - mutation

- name: Discover enabled secret engines
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/mounts"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    return_content: true
    status_code:
      - 200
      - 500
      - 502
      - 503
  register: openbao_secret_engines
  retries: 12
  delay: 2
  until: openbao_secret_engines.status == 200
  changed_when: false
  no_log: true

- name: Enable kv-v2 secrets engine
  vars:
    mutation_audit_action: enable.openbao_kv
    mutation_audit_target: openbao-runtime
    mutation_audit_emit_on_success: true
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/mounts/kv"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      type: kv
      description: LV3 managed secret data
      options:
        version: "2"
    status_code: 204
  register: openbao_enable_kv_result
  retries: 6
  delay: 2
  until: openbao_enable_kv_result.status == 204
  when: "'kv/' not in openbao_secret_engines.json"
  no_log: true
  tags:
    - mutation

- name: Enable transit secrets engine
  vars:
    mutation_audit_action: enable.openbao_transit
    mutation_audit_target: openbao-runtime
    mutation_audit_emit_on_success: true
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/mounts/transit"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      type: transit
      description: LV3 managed encryption and signing
    status_code: 204
  register: openbao_enable_transit_result
  retries: 6
  delay: 2
  until: openbao_enable_transit_result.status == 204
  when: "'transit/' not in openbao_secret_engines.json"
  no_log: true
  tags:
    - mutation

- name: Enable database secrets engine
  vars:
    mutation_audit_action: enable.openbao_database
    mutation_audit_target: openbao-runtime
    mutation_audit_emit_on_success: true
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/mounts/{{ openbao_database_mount_path }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      type: database
      description: LV3 dynamic database credentials
    status_code: 204
  register: openbao_enable_database_result
  retries: 6
  delay: 2
  until: openbao_enable_database_result.status == 204
  when: "(openbao_database_mount_path ~ '/') not in openbao_secret_engines.json"
  no_log: true
  tags:
    - mutation

- name: Read rendered policy contents
  ansible.builtin.slurp:
    src: "{{ openbao_policy_dir }}/{{ item.name }}.hcl"
  loop: "{{ openbao_policies }}"
  register: openbao_policy_contents

- name: Read current OpenBao policies
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/policies/acl/{{ item.item.name }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    return_content: true
    status_code:
      - 200
      - 404
      - 500
      - 502
      - 503
  loop: "{{ openbao_policy_contents.results }}"
  register: openbao_current_policies
  retries: 12
  delay: 2
  until: openbao_current_policies.status in [200, 404]
  changed_when: false
  no_log: true

- name: Upsert OpenBao policies
  vars:
    mutation_audit_action: upsert.openbao_policies
    mutation_audit_target: openbao-runtime
    mutation_audit_emit_on_success: true
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/policies/acl/{{ item.item.item.name }}"
    method: PUT
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      policy: "{{ item.item.content | b64decode }}"
    status_code: 204
  loop: "{{ openbao_current_policies.results }}"
  when: >-
    item.status == 404
    or (item.json.data.policy | default('')) != (item.item.content | b64decode)
  no_log: true
  tags:
    - mutation

- name: Upsert OpenBao userpass users
  vars:
    mutation_audit_action: upsert.openbao_userpass_users
    mutation_audit_target: openbao-runtime
    mutation_audit_emit_on_success: true
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/auth/userpass/users/{{ item.username }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      password: "{{ openbao_ops_password if item.username == 'ops' else openbao_breakglass_password }}"
      policies: "{{ item.policies | join(',') }}"
      token_ttl: "{{ item.token_ttl }}"
      token_max_ttl: "{{ item.token_max_ttl }}"
    status_code: 204
  register: openbao_userpass_upsert_result
  retries: 6
  delay: 2
  until: openbao_userpass_upsert_result.status == 204
  loop: "{{ openbao_userpass_users }}"
  no_log: true
  tags:
    - mutation

- name: Upsert OpenBao AppRoles
  vars:
    mutation_audit_action: upsert.openbao_approles
    mutation_audit_target: openbao-runtime
    mutation_audit_emit_on_success: true
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/auth/approle/role/{{ item.name }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      token_policies: "{{ item.policies | join(',') }}"
      token_ttl: "{{ item.token_ttl }}"
      token_max_ttl: "{{ item.token_max_ttl }}"
      token_num_uses: "{{ item.token_num_uses }}"
      secret_id_ttl: "{{ item.secret_id_ttl }}"
      secret_id_num_uses: "{{ item.secret_id_num_uses }}"
    status_code: 204
  register: openbao_approle_upsert_result
  retries: 6
  delay: 2
  until: openbao_approle_upsert_result.status == 204
  loop: "{{ openbao_approles }}"
  no_log: true
  tags:
    - mutation

- name: Read current OpenBao transit keys
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/transit/keys/{{ item }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    return_content: true
    status_code:
      - 200
      - 404
      - 500
      - 502
      - 503
  loop: "{{ openbao_transit_keys }}"
  register: openbao_transit_key_statuses
  retries: 12
  delay: 2
  until: openbao_transit_key_statuses.status in [200, 404]
  changed_when: false
  no_log: true

- name: Create missing OpenBao transit keys
  vars:
    mutation_audit_action: create.openbao_transit_keys
    mutation_audit_target: openbao-runtime
    mutation_audit_emit_on_success: true
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/transit/keys/{{ item.item }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      type: aes256-gcm96
    status_code: 200
  register: openbao_transit_key_create_result
  retries: 6
  delay: 2
  until: openbao_transit_key_create_result.status == 200
  loop: "{{ openbao_transit_key_statuses.results }}"
  when: item.status == 404
  no_log: true
  tags:
    - mutation

- name: Configure the PostgreSQL dynamic credential backend
  vars:
    mutation_audit_action: configure.openbao_database_backend
    mutation_audit_target: openbao-runtime
    mutation_audit_emit_on_success: true
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/{{ openbao_database_mount_path }}/config/{{ openbao_database_name }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      plugin_name: "{{ openbao_database_plugin_name }}"
      allowed_roles: "{{ openbao_database_allowed_roles | join(',') }}"
      connection_url: "{{ openbao_database_connection_url }}"
      username: "{{ openbao_postgres_admin_role }}"
      password: "{{ openbao_postgres_rotator_password }}"
      password_authentication: "{{ openbao_database_password_authentication }}"
    status_code: 204
  register: openbao_database_backend_result
  retries: 6
  delay: 2
  until: openbao_database_backend_result.status == 204
  no_log: true
  tags:
    - mutation

- name: Configure OpenBao database roles
  vars:
    mutation_audit_action: configure.openbao_database_roles
    mutation_audit_target: openbao-runtime
    mutation_audit_emit_on_success: true
    openbao_database_role_creation_statements: >-
      {{
        item.creation_statements
        if item.creation_statements is not string
        else [item.creation_statements]
      }}
    openbao_database_role_revocation_statements: >-
      {{
        item.revocation_statements
        if item.revocation_statements is not string
        else [item.revocation_statements]
      }}
    openbao_database_role_rollback_statements: >-
      {{
        item.rollback_statements | default([])
        if (item.rollback_statements | default([])) is not string
        else [item.rollback_statements]
      }}
    openbao_database_role_renew_statements: >-
      {{
        item.renew_statements | default([])
        if (item.renew_statements | default([])) is not string
        else [item.renew_statements]
      }}
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/{{ openbao_database_mount_path }}/roles/{{ item.name }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      db_name: "{{ item.db_name }}"
      creation_statements: "{{ openbao_database_role_creation_statements }}"
      revocation_statements: "{{ openbao_database_role_revocation_statements }}"
      rollback_statements: "{{ openbao_database_role_rollback_statements }}"
      renew_statements: "{{ openbao_database_role_renew_statements }}"
      default_ttl: "{{ item.default_ttl }}"
      max_ttl: "{{ item.max_ttl }}"
    status_code: 204
  register: openbao_database_role_result
  retries: 6
  delay: 2
  until: openbao_database_role_result.status == 204
  loop: "{{ openbao_database_roles }}"
  tags:
    - mutation

- name: Seed controller secrets and verify OpenBao auth flows
  ansible.builtin.import_tasks: seeded_secrets_and_verification.yml

- name: Verify OpenBao health probes
  ansible.builtin.import_tasks: verify.yml
