# Purpose: Seed controller-local secrets into OpenBao and verify the declared runtime payloads remain in sync.
# Use case: Included during OpenBao convergence after bootstrap when repo-managed controller and mail-platform secrets must exist.
# Inputs: OpenBao root-token facts, local secret files, seeded KV paths, and monitoring, mail, and Proxmox credential payloads.
# Outputs: OpenBao KV entries match the controller-local source secrets and verification facts capture the resulting state.
# Idempotency: Partially idempotent because the task rewrites only drifted secret payloads while preserving matching values.
# Dependencies: ADR 0165, ADR 0077, ADR 0101, and ADR 0231.
---
- name: Read current controller Proxmox API secret
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/kv/data/{{ openbao_seeded_secret_paths.controller_proxmox_api }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    return_content: true
    status_code:
      - 200
      - 404
      - 500
      - 502
      - 503
  register: openbao_controller_proxmox_api_current
  retries: 12
  delay: 2
  until: openbao_controller_proxmox_api_current.status in [200, 404]
  changed_when: false
  no_log: true

- name: Read current controller monitoring secret
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/kv/data/{{ openbao_seeded_secret_paths.controller_monitoring }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    return_content: true
    status_code:
      - 200
      - 404
      - 500
      - 502
      - 503
  register: openbao_controller_monitoring_current
  retries: 12
  delay: 2
  until: openbao_controller_monitoring_current.status in [200, 404]
  changed_when: false
  no_log: true

- name: Read current mail platform runtime secret
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/kv/data/{{ openbao_seeded_secret_paths.mail_platform_runtime }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    return_content: true
    status_code:
      - 200
      - 404
      - 500
      - 502
      - 503
  register: openbao_mail_platform_runtime_current
  retries: 12
  delay: 2
  until: openbao_mail_platform_runtime_current.status in [200, 404]
  changed_when: false
  no_log: true

- name: Read the controller-local Proxmox API payload
  ansible.builtin.slurp:
    src: "{{ proxmox_api_token_local_file }}"
  delegate_to: localhost
  become: false
  register: openbao_proxmox_api_payload_raw
  no_log: true

- name: Read the controller-local monitoring tokens
  ansible.builtin.slurp:
    src: "{{ item }}"
  loop:
    - "{{ monitoring_proxmox_writer_token_local_file }}"
    - "{{ monitoring_guest_writer_token_local_file }}"
  delegate_to: localhost
  become: false
  register: openbao_monitoring_token_payloads
  no_log: true

- name: Read the controller-local mail platform secrets
  ansible.builtin.slurp:
    src: "{{ item }}"
  loop:
    - "{{ mail_platform_brevo_api_key_local_file }}"
    - "{{ mail_platform_gateway_api_key_local_file }}"
    - "{{ mail_platform_metrics_password_local_file }}"
    - "{{ mail_platform_mailbox_password_local_file }}"
    - "{{ mail_platform_admin_password_local_file }}"
  delegate_to: localhost
  become: false
  register: openbao_mail_platform_secret_payloads
  no_log: true

- name: Record OpenBao seeded secret facts
  ansible.builtin.set_fact:
    openbao_controller_proxmox_api_secret: "{{ openbao_proxmox_api_payload_raw.content | b64decode | from_json }}"
    openbao_controller_monitoring_secret:
      proxmox_writer_token: "{{ openbao_monitoring_token_payloads.results[0].content | b64decode | trim }}"
      guest_writer_token: "{{ openbao_monitoring_token_payloads.results[1].content | b64decode | trim }}"
    openbao_mail_platform_runtime_secret:
      brevo_api_key: "{{ openbao_mail_platform_secret_payloads.results[0].content | b64decode | trim }}"
      gateway_api_key: "{{ openbao_mail_platform_secret_payloads.results[1].content | b64decode | trim }}"
      metrics_password: "{{ openbao_mail_platform_secret_payloads.results[2].content | b64decode | trim }}"
      mailbox_password: "{{ openbao_mail_platform_secret_payloads.results[3].content | b64decode | trim }}"
      stalwart_admin_password: "{{ openbao_mail_platform_secret_payloads.results[4].content | b64decode | trim }}"
  no_log: true

- name: Store controller Proxmox API secret in OpenBao
  vars:
    mutation_audit_action: store.openbao_controller_secret
    mutation_audit_target: openbao-runtime
    mutation_audit_emit_on_success: true
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/kv/data/{{ openbao_seeded_secret_paths.controller_proxmox_api }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      data: "{{ openbao_controller_proxmox_api_secret }}"
    status_code: 200
  register: openbao_store_controller_secret_result
  retries: 6
  delay: 2
  until: openbao_store_controller_secret_result.status == 200
  when: >-
    openbao_controller_proxmox_api_current.status == 404
    or (openbao_controller_proxmox_api_current.json.data.data | default({})) != openbao_controller_proxmox_api_secret
  no_log: true
  tags:
    - mutation

- name: Store controller monitoring tokens in OpenBao
  vars:
    mutation_audit_action: store.openbao_monitoring_secret
    mutation_audit_target: openbao-runtime
    mutation_audit_emit_on_success: true
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/kv/data/{{ openbao_seeded_secret_paths.controller_monitoring }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      data: "{{ openbao_controller_monitoring_secret }}"
    status_code: 200
  register: openbao_store_monitoring_secret_result
  retries: 6
  delay: 2
  until: openbao_store_monitoring_secret_result.status == 200
  when: >-
    openbao_controller_monitoring_current.status == 404
    or (openbao_controller_monitoring_current.json.data.data | default({})) != openbao_controller_monitoring_secret
  no_log: true
  tags:
    - mutation

- name: Store mail platform runtime secrets in OpenBao
  vars:
    mutation_audit_action: store.openbao_mail_platform_secret
    mutation_audit_target: openbao-runtime
    mutation_audit_emit_on_success: true
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/kv/data/{{ openbao_seeded_secret_paths.mail_platform_runtime }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      data: "{{ openbao_mail_platform_runtime_secret }}"
    status_code: 200
  register: openbao_store_mail_platform_secret_result
  retries: 6
  delay: 2
  until: openbao_store_mail_platform_secret_result.status == 200
  when: >-
    openbao_mail_platform_runtime_current.status == 404
    or (openbao_mail_platform_runtime_current.json.data.data | default({})) != openbao_mail_platform_runtime_secret
  no_log: true
  tags:
    - mutation

- name: Load the rotatable secret catalog and controller secret manifest
  ansible.builtin.set_fact:
    openbao_rotatable_secret_catalog: "{{ lookup('ansible.builtin.file', openbao_secret_catalog_file) | from_json }}"
    openbao_controller_secret_manifest: "{{ lookup('ansible.builtin.file', openbao_controller_secret_manifest_file) | from_json }}"
  no_log: true

- name: Derive OpenBao secret rotation facts from the loaded catalog
  ansible.builtin.set_fact:
    openbao_rotation_metadata: >-
      {{
        openbao_rotatable_secret_catalog.rotation_metadata
        if openbao_rotatable_secret_catalog.rotation_metadata is defined
        else openbao_rotatable_secret_catalog.metadata
      }}
    openbao_rotatable_secret_contracts: >-
      {{
        openbao_rotatable_secret_catalog.rotation_contracts
        if openbao_rotatable_secret_catalog.rotation_contracts is defined
        else openbao_rotatable_secret_catalog.secrets
      }}
  no_log: true

- name: Read current dedicated rotatable secrets from OpenBao
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/kv/data/{{ item.value.openbao_path }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    return_content: true
    status_code:
      - 200
      - 404
      - 500
      - 502
      - 503
  loop: "{{ openbao_rotatable_secret_contracts | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  register: openbao_rotatable_secret_current
  retries: 12
  delay: 2
  until: openbao_rotatable_secret_current.status in [200, 404]
  changed_when: false
  no_log: true

- name: Seed dedicated rotatable secrets into OpenBao
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/kv/data/{{ item.value.openbao_path }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      data: >-
        {{
          {
            (item.value.openbao_field):
              (lookup('ansible.builtin.file', openbao_controller_secret_manifest.secrets[item.value.seed_controller_secret_id].path) | trim)
          }
        }}
    status_code: 200
  loop: "{{ openbao_rotatable_secret_contracts | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  register: openbao_seed_rotatable_secret_result
  retries: 6
  delay: 2
  until: openbao_seed_rotatable_secret_result.status == 200
  when: >-
    (
      openbao_rotatable_secret_current.results
      | selectattr('item.key', 'equalto', item.key)
      | map(attribute='status')
      | first
    ) == 404
    or (
      (
        openbao_rotatable_secret_current.results
        | selectattr('item.key', 'equalto', item.key)
        | map(attribute='json.data.data')
        | first
        | default({})
      ).get(item.value.openbao_field, '')
      != (lookup('ansible.builtin.file', openbao_controller_secret_manifest.secrets[item.value.seed_controller_secret_id].path) | trim)
    )
  no_log: true

- name: Seed rotation metadata for dedicated rotatable secrets
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/kv/metadata/{{ item.value.openbao_path }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body: >-
      {{
        {
          'custom_metadata': {
            'secret_id': item.key,
            'service': item.value.service,
            'owner': item.value.owner,
            'risk_level': item.value.risk_level,
            'approval_mode': item.value.approval_mode,
            'command_contract': item.value.command_contract,
            'rotation_period_days': (item.value.rotation_period_days | string),
            'warning_window_days': (item.value.warning_window_days | string),
            (openbao_rotation_metadata.last_rotated_metadata_key): (item.value.last_rotated | default('unrotated', true)),
            (openbao_rotation_metadata.rotated_by_metadata_key): 'openbao-seed'
          }
        }
      }}
    status_code:
      - 200
      - 204
  loop: "{{ openbao_rotatable_secret_contracts | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  register: openbao_rotatable_secret_metadata_seed
  retries: 6
  delay: 2
  until: openbao_rotatable_secret_metadata_seed.status in [200, 204]
  failed_when: false
  no_log: true

- name: Assert rotation metadata for dedicated rotatable secrets was seeded successfully
  ansible.builtin.assert:
    that:
      - >-
        (
          openbao_rotatable_secret_metadata_seed.results
          | rejectattr('status', 'in', [200, 204])
          | list
          | length
        ) == 0
    fail_msg: "OpenBao failed to store rotation metadata for one or more dedicated rotatable secrets."
  no_log: true

- name: Read AppRole role IDs
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/auth/approle/role/{{ item.name }}/role-id"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    return_content: true
    status_code: 200
  loop: "{{ openbao_approles }}"
  register: openbao_approle_role_ids
  retries: 6
  delay: 2
  until: openbao_approle_role_ids.status == 200
  failed_when: false
  changed_when: false
  no_log: true

- name: Assert AppRole role IDs were read successfully
  ansible.builtin.assert:
    that:
      - >-
        (
          openbao_approle_role_ids.results
          | rejectattr('status', 'equalto', 200)
          | list
          | length
        ) == 0
      - >-
        (
          openbao_approle_role_ids.results
          | map(attribute='json.data.role_id')
          | select('defined')
          | select('string')
          | list
          | length
        ) == (openbao_approles | length)
    fail_msg: "OpenBao failed to read one or more AppRole role IDs."
  no_log: true

- name: Generate fresh short-lived AppRole secret IDs
  vars:
    mutation_audit_action: generate.openbao_approle_secret_ids
    mutation_audit_target: openbao-runtime
    mutation_audit_emit_on_success: true
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/auth/approle/role/{{ item.name }}/secret-id"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body: {}
    return_content: true
    status_code: 200
  loop: "{{ openbao_approles }}"
  register: openbao_generated_secret_ids
  retries: 6
  delay: 2
  until: openbao_generated_secret_ids.status == 200
  failed_when: false
  no_log: true
  tags:
    - mutation

- name: Assert fresh short-lived AppRole secret IDs were generated successfully
  ansible.builtin.assert:
    that:
      - >-
        (
          openbao_generated_secret_ids.results
          | rejectattr('status', 'equalto', 200)
          | list
          | length
        ) == 0
    fail_msg: "OpenBao failed to generate one or more initial AppRole secret IDs."
  no_log: true

- name: Persist fresh short-lived AppRole artifacts locally
  ansible.builtin.copy:
    dest: "{{ item.item.local_file }}"
    content: "{{ {'role_name': item.item.name, 'auth_path': 'approle', 'role_id': (openbao_approle_role_ids.results | selectattr('item.name', 'equalto', item.item.name) | map(attribute='json.data.role_id') | first), 'secret_id': item.json.data.secret_id, 'secret_id_accessor': item.json.data.secret_id_accessor, 'generated_at': ansible_date_time.iso8601} | to_nice_json }}\n"
    mode: "0600"
  loop: "{{ openbao_generated_secret_ids.results | default([]) }}"
  delegate_to: localhost
  become: false
  no_log: true

- name: Ensure OpenBao remains unsealed before authentication verification
  ansible.builtin.include_tasks: ensure_unsealed.yml
  vars:
    openbao_unseal_context: authentication verification
    openbao_unseal_init_payload: "{{ openbao_init_payload }}"

- name: Verify userpass login for the ops operator
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/auth/userpass/login/ops"
    method: POST
    body_format: json
    body:
      password: "{{ openbao_ops_password }}"
    return_content: true
    status_code: 200
  register: openbao_ops_login
  retries: 6
  delay: 2
  until: openbao_ops_login.status == 200
  become: false
  failed_when: false
  no_log: true

- name: Assert that the ops userpass login succeeded
  ansible.builtin.assert:
    that:
      - openbao_ops_login.json.auth.client_token | default('') | length > 0
    fail_msg: "Managed userpass login for ops failed."

- name: Read the controller AppRole artifact
  ansible.builtin.slurp:
    src: "{{ openbao_controller_approle_local_file }}"
  delegate_to: localhost
  become: false
  register: openbao_controller_approle_raw
  no_log: true

- name: Read the mail-platform AppRole artifact
  ansible.builtin.slurp:
    src: "{{ openbao_mail_platform_approle_local_file }}"
  delegate_to: localhost
  become: false
  register: openbao_mail_platform_approle_raw
  no_log: true

- name: Record AppRole artifact facts
  ansible.builtin.set_fact:
    openbao_controller_approle: "{{ openbao_controller_approle_raw.content | b64decode | from_json }}"
    openbao_mail_platform_approle: "{{ openbao_mail_platform_approle_raw.content | b64decode | from_json }}"
  no_log: true

- name: Login with the controller AppRole
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/auth/approle/login"
    method: POST
    body_format: json
    body:
      role_id: "{{ openbao_controller_approle.role_id }}"
      secret_id: "{{ openbao_controller_approle.secret_id }}"
    return_content: true
    status_code: 200
  register: openbao_controller_login
  retries: 6
  delay: 2
  until: openbao_controller_login.status == 200
  become: false
  failed_when: false
  no_log: true

- name: Assert that the controller AppRole login succeeded
  ansible.builtin.assert:
    that:
      - openbao_controller_login.json.auth.client_token | default('') | length > 0
    fail_msg: "The controller AppRole login did not return a client token."
  no_log: true

- name: Read the controller Proxmox API secret through the AppRole
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/kv/data/{{ openbao_seeded_secret_paths.controller_proxmox_api }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_controller_login.json.auth.client_token }}"
    return_content: true
    status_code: 200
  register: openbao_controller_secret_read
  retries: 6
  delay: 2
  until: openbao_controller_secret_read.status == 200
  become: false
  failed_when: false
  no_log: true

- name: Assert that the controller AppRole can read the Proxmox API secret
  ansible.builtin.assert:
    that:
      - openbao_controller_secret_read.json.data.data.user == proxmox_api_automation_user
      - openbao_controller_secret_read.json.data.data.token_id == proxmox_api_token_id
    fail_msg: "The controller AppRole could not read the expected Proxmox API secret payload."

- name: Encrypt test material with the controller transit key
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/transit/encrypt/controller-automation"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_controller_login.json.auth.client_token }}"
    body_format: json
    body:
      plaintext: "{{ 'lv3-controller-test' | b64encode }}"
    return_content: true
    status_code: 200
  register: openbao_controller_transit_encrypt
  retries: 6
  delay: 2
  until: openbao_controller_transit_encrypt.status == 200
  become: false
  failed_when: false
  no_log: true

- name: Assert that controller transit encryption succeeded
  ansible.builtin.assert:
    that:
      - openbao_controller_transit_encrypt.json.data.ciphertext | default('') | length > 0
    fail_msg: "Controller transit encryption did not return ciphertext."
  no_log: true

- name: Decrypt test material with the controller transit key
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/transit/decrypt/controller-automation"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_controller_login.json.auth.client_token }}"
    body_format: json
    body:
      ciphertext: "{{ openbao_controller_transit_encrypt.json.data.ciphertext }}"
    return_content: true
    status_code: 200
  register: openbao_controller_transit_decrypt
  retries: 6
  delay: 2
  until: openbao_controller_transit_decrypt.status == 200
  become: false
  failed_when: false
  no_log: true

- name: Assert that controller transit round-trip succeeded
  ansible.builtin.assert:
    that:
      - (openbao_controller_transit_decrypt.json.data.plaintext | b64decode) == 'lv3-controller-test'
    fail_msg: "Controller transit encryption or decryption failed."

- name: Login with the mail-platform AppRole
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/auth/approle/login"
    method: POST
    body_format: json
    body:
      role_id: "{{ openbao_mail_platform_approle.role_id }}"
      secret_id: "{{ openbao_mail_platform_approle.secret_id }}"
    return_content: true
    status_code: 200
  register: openbao_mail_platform_login
  retries: 6
  delay: 2
  until: openbao_mail_platform_login.status == 200
  become: false
  failed_when: false
  no_log: true

- name: Assert that the mail-platform AppRole login succeeded
  ansible.builtin.assert:
    that:
      - openbao_mail_platform_login.json.auth.client_token | default('') | length > 0
    fail_msg: "The mail-platform AppRole login did not return a client token."
  no_log: true

- name: Read the mail-platform runtime secret through the AppRole
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/kv/data/{{ openbao_seeded_secret_paths.mail_platform_runtime }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_mail_platform_login.json.auth.client_token }}"
    return_content: true
    status_code: 200
  register: openbao_mail_platform_secret_read
  retries: 6
  delay: 2
  until: openbao_mail_platform_secret_read.status == 200
  become: false
  failed_when: false
  no_log: true

- name: Assert that the mail-platform AppRole can read its runtime secret
  ansible.builtin.assert:
    that:
      - openbao_mail_platform_secret_read.json.data.data.brevo_api_key | default('') | length > 0
      - openbao_mail_platform_secret_read.json.data.data.gateway_api_key | default('') | length > 0
    fail_msg: "The mail-platform AppRole could not read the expected runtime secret payload."

- name: Request a PostgreSQL dynamic credential through the controller AppRole
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/{{ openbao_database_mount_path }}/creds/postgres-readonly"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_controller_login.json.auth.client_token }}"
    return_content: true
    status_code: 200
  register: openbao_postgres_dynamic_credential
  retries: 6
  delay: 2
  until: openbao_postgres_dynamic_credential.status == 200
  become: false
  changed_when: false
  failed_when: false

- name: Assert that a PostgreSQL dynamic credential was issued
  ansible.builtin.assert:
    that:
      - openbao_postgres_dynamic_credential.status == 200
      - openbao_postgres_dynamic_credential.json.data.username | default('') | length > 0
      - openbao_postgres_dynamic_credential.json.data.password | default('') | length > 0
    fail_msg: "OpenBao failed to issue a PostgreSQL dynamic credential."

- name: Refresh short-lived AppRole secret IDs after managed verification
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/auth/approle/role/{{ item.name }}/secret-id"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body: {}
    return_content: true
    status_code: 200
  loop: "{{ openbao_approles }}"
  register: openbao_refreshed_secret_ids
  retries: 6
  delay: 2
  until: openbao_refreshed_secret_ids.status == 200
  failed_when: false
  no_log: true

- name: Assert refreshed short-lived AppRole secret IDs were generated successfully
  ansible.builtin.assert:
    that:
      - >-
        (
          openbao_refreshed_secret_ids.results
          | rejectattr('status', 'equalto', 200)
          | list
          | length
        ) == 0
    fail_msg: "OpenBao failed to refresh one or more AppRole secret IDs after verification."
  no_log: true

- name: Persist refreshed short-lived AppRole artifacts locally
  ansible.builtin.copy:
    dest: "{{ item.item.local_file }}"
    content: "{{ {'role_name': item.item.name, 'auth_path': 'approle', 'role_id': (openbao_approle_role_ids.results | selectattr('item.name', 'equalto', item.item.name) | map(attribute='json.data.role_id') | first), 'secret_id': item.json.data.secret_id, 'secret_id_accessor': item.json.data.secret_id_accessor, 'generated_at': ansible_date_time.iso8601} | to_nice_json }}\n"
    mode: "0600"
  loop: "{{ openbao_refreshed_secret_ids.results | default([]) }}"
  delegate_to: localhost
  become: false
  no_log: true
