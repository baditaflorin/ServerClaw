---
# Dependencies: ADR 0165 and ADR 0371.
- name: Verify the OpenBao runtime
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: openbao
    common_verify_port: "{{ openbao_http_port }}"
    common_verify_health_url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/seal-status"
    common_verify_health_assertions:
      - "not (common_verify_health_response.json.sealed | bool)"
    common_verify_health_assertion_msg: "OpenBao health probe returned a sealed node."
    common_verify_extra_endpoints:
      - url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/health"
        retries: 30
        delay: 2
