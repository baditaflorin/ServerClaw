---
# Dependencies: ADR 0371.
- name: Verify the step-ca runtime health
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: step-ca
    common_verify_port: "{{ step_ca_api_port }}"
    common_verify_port_timeout: 120
    common_verify_health_url: "https://127.0.0.1:{{ step_ca_api_port }}{{ step_ca_healthcheck_path }}"
    common_verify_health_retries: 12
    common_verify_health_delay: 3

- name: Verify X.509 issuance with the services provisioner
  ansible.builtin.command:
    argv:
      - step
      - ca
      - certificate
      - "{{ step_ca_service_test_name }}"
      - "{{ step_ca_site_dir }}/service-test.crt"
      - "{{ step_ca_site_dir }}/service-test.key"
      - --force
      - --ca-url
      - "{{ step_ca_internal_url }}"
      - --root
      - "{{ step_ca_home }}/certs/root_ca.crt"
      - --provisioner
      - services
      - --provisioner-password-file
      - "{{ step_ca_services_password_file }}"
      - --password-file
      - "{{ step_ca_services_password_file }}"
      - --san
      - "{{ step_ca_service_test_name }}"
      - --not-after
      - 1h
  register: step_ca_verify_issue
  retries: 5
  delay: 2
  until: step_ca_verify_issue.rc == 0
  changed_when: false
  no_log: true

- name: Verify the issued X.509 test certificate chains to the root
  ansible.builtin.command:
    argv:
      - openssl
      - verify
      - -CAfile
      - "{{ step_ca_home }}/certs/root_ca.crt"
      - -untrusted
      - "{{ step_ca_home }}/certs/intermediate_ca.crt"
      - "{{ step_ca_site_dir }}/service-test.crt"
  register: step_ca_verify_chain
  changed_when: false
