---
step_ca_name: LV3 Internal CA
step_ca_version: 0.30.1
step_ca_cli_version: 0.30.1
step_ca_image: "{{ container_image_catalog.images.step_ca_runtime.ref }}"
step_ca_cli_download_url: >-
  https://github.com/smallstep/cli/releases/download/v{{ step_ca_cli_version }}/step_linux_{{ step_ca_cli_version }}_amd64.tar.gz
step_ca_site_dir: /opt/step-ca
step_ca_home: /opt/step-ca/home
step_ca_compose_file: /opt/step-ca/docker-compose.yml
step_ca_password_dir: /opt/step-ca/secrets
step_ca_container_uid: "1000"
step_ca_container_gid: "1000"
step_ca_remote_root_certificate_file: "{{ step_ca_home }}/certs/root_ca.crt"
step_ca_remote_ssh_user_ca_file: "{{ step_ca_home }}/certs/ssh_user_ca_key.pub"
step_ca_remote_ssh_host_ca_file: "{{ step_ca_home }}/certs/ssh_host_ca_key.pub"
step_ca_ca_password_file: /opt/step-ca/secrets/ca-password.txt
step_ca_humans_password_file: /opt/step-ca/secrets/humans-password.txt
step_ca_agents_password_file: /opt/step-ca/secrets/agents-password.txt
step_ca_services_password_file: /opt/step-ca/secrets/services-password.txt
step_ca_hosts_password_file: /opt/step-ca/secrets/hosts-password.txt
step_ca_healthcheck_path: /health
step_ca_service_topology: "{{ hostvars['proxmox_florin'].platform_service_topology }}"
step_ca_api_port: "{{ step_ca_service_topology | platform_service_port('step_ca', 'internal') }}"
step_ca_internal_url: "{{ step_ca_service_topology | platform_service_url('step_ca', 'internal') }}"
step_ca_controller_url: "{{ step_ca_service_topology | platform_service_url('step_ca', 'controller') }}"
step_ca_default_network_name: "{{ step_ca_site_dir | basename }}_default"
step_ca_initial_provisioner: humans
step_ca_provisioners:
  - name: agents
    password_file: "{{ step_ca_agents_password_file }}"
  - name: services
    password_file: "{{ step_ca_services_password_file }}"
  - name: hosts
    password_file: "{{ step_ca_hosts_password_file }}"
step_ca_server_names:
  - localhost
  - 127.0.0.1
  - "{{ step_ca_service_topology | platform_service_host('step_ca') }}"
  - "{{ platform_host.management.tailscale_ipv4 }}"
step_ca_local_artifact_dir: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/step-ca
step_ca_local_certs_dir: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/step-ca/certs
step_ca_local_ssh_dir: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/step-ca/ssh
step_ca_local_secrets_dir: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/step-ca/secrets
step_ca_local_provisioner_secrets_dir: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/step-ca/secrets/provisioners
step_ca_local_root_certificate_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/step-ca/certs/root_ca.crt
step_ca_local_ssh_user_ca_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/step-ca/certs/ssh_user_ca.pub
step_ca_local_ssh_host_ca_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/step-ca/certs/ssh_host_ca.pub
step_ca_local_known_hosts_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/step-ca/ssh/known_hosts
step_ca_local_bootstrap_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/step-ca/bootstrap.json
step_ca_local_ca_password_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/step-ca/secrets/ca-password.txt
step_ca_local_humans_password_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/step-ca/secrets/provisioners/humans-password.txt
step_ca_local_agents_password_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/step-ca/secrets/provisioners/agents-password.txt
step_ca_local_services_password_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/step-ca/secrets/provisioners/services-password.txt
step_ca_local_hosts_password_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/step-ca/secrets/provisioners/hosts-password.txt
step_ca_runtime_packages:
  - curl
  - jq
  - openssl
  - tar
step_ca_service_test_name: step-ca-service-test.lv3.internal
step_ca_pull_recovery_retries: 10
step_ca_pull_recovery_delay_seconds: 2
