---
argument_specs:
  main:
    short_description: Converge the Mailpit runtime and verify SMTP capture.
    options:
      mailpit_service_topology:
        type: dict
        required: true
        description:
          - Generated service topology entry for the private Mailpit surface.
      mailpit_site_dir:
        type: path
        required: true
        description:
          - Base directory for the Mailpit runtime stack.
      mailpit_compose_file:
        type: path
        required: true
        description:
          - Compose file path for the Mailpit runtime stack.
      mailpit_container_name:
        type: str
        required: true
        description:
          - Expected container name for Mailpit.
      mailpit_image:
        type: str
        required: true
        description:
          - Digest-pinned Mailpit container image reference.
      mailpit_http_port:
        type: int
        required: true
        description:
          - Private HTTP port that exposes the Mailpit UI and API.
      mailpit_smtp_port:
        type: int
        required: true
        description:
          - Private SMTP port that accepts intercepted mail.
      mailpit_bind_host:
        type: str
        required: true
        description:
          - Guest-side address used for the private listener bindings.
      mailpit_loopback_bind_host:
        type: str
        required: true
        description:
          - Loopback address used for local verification bindings.
      mailpit_api_url:
        type: str
        required: true
        description:
          - Base Mailpit REST API URL used for verification.
      mailpit_disable_version_check:
        type: bool
        required: true
        description:
          - Whether the runtime should disable Mailpit's release check.
      mailpit_docker_network_name:
        type: str
        required: true
        description:
          - Compose network name that other staging containers can join to resolve `mailpit`.
      mailpit_test_from_address:
        type: str
        required: true
        description:
          - Sender address used by the repo-managed SMTP verification probe.
      mailpit_test_to_address:
        type: str
        required: true
        description:
          - Recipient address used by the repo-managed SMTP verification probe.
      mailpit_test_subject_prefix:
        type: str
        required: true
        description:
          - Subject prefix used for the verification probe.
      mailpit_test_body:
        type: str
        required: true
        description:
          - Plaintext body used for the verification probe.
