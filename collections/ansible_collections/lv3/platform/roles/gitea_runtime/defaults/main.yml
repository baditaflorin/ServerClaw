---
# NOTE: Conventional variables (site_dir, image, compose_file, env_file,
# openbao_*, container_name, internal_port, local_artifact_dir) are derived
# from platform_service_registry — ADR 0373.
# Purpose: Declare the shared defaults for converging the private Gitea runtime, bootstrap artifacts, and MinIO-backed LFS contract.
# Use case: Load whenever the gitea_runtime role renders the runtime env, compose stack, and bootstrap assets.
#
# Inputs (required):
#   - ansible host facts, service topology, and repo-local secret paths.
#
# Inputs (optional):
#   - gitea_* overrides (optional): Allow controlled overrides of runtime paths, endpoints, and bootstrap metadata.
#
# Outputs:
#   - Default variable values consumed by the gitea_runtime role.
#
# Idempotency: Fully idempotent
#              This file only declares role defaults.
#
# Dependencies:
#   - ADR 0143: Defines the private Gitea platform surface.
#   - ADR 0165: Requires metadata headers on managed playbook and role surfaces.
#   - ADR 0233: Adds the release-bundle bootstrap contract.
#   - ADR 0274: Moves Gitea LFS storage to the shared MinIO object layer.

# NOTE: Conventional variables are still derived from platform_service_registry
# via derive_service_defaults.yml. The fallback values below exist so Ansible's
# role argument-spec validation can evaluate before that task runs.

gitea_site_dir: /opt/gitea
gitea_data_dir: "{{ gitea_site_dir }}/data"
gitea_secret_dir: /etc/lv3/gitea
gitea_compose_file: "{{ gitea_site_dir }}/docker-compose.yml"
gitea_env_file: "{{ compose_runtime_secret_root }}/gitea/runtime.env"
gitea_legacy_env_file: "{{ gitea_site_dir }}/gitea.env"
gitea_container_name: gitea
gitea_image: docker.io/gitea/gitea:1.25.5
gitea_internal_port: 3003
gitea_service_topology: "{{ hostvars[platform_topology_host].lv3_service_topology | service_topology_get('gitea') }}"
gitea_keycloak_service_topology: "{{ hostvars[platform_topology_host].lv3_service_topology | service_topology_get('keycloak') }}"
gitea_bootstrap_script: "{{ gitea_site_dir }}/bootstrap-gitea.sh"
gitea_network_name: gitea_runtime_default
gitea_network_subnet: 172.16.240.0/24
gitea_http_port: "{{ platform_service_topology | platform_service_port('gitea', 'internal') }}"
gitea_host_proxy_port: "{{ platform_service_topology | platform_service_port('gitea', 'controller') }}"
gitea_public_hostname: "{{ gitea_service_topology.public_hostname }}"
gitea_root_url: "{{ gitea_service_topology.urls.public | default('https://' + gitea_public_hostname) }}"
gitea_private_base_url: "{{ platform_service_topology | platform_service_url('gitea', 'internal') }}"
gitea_controller_url: "{{ platform_service_topology | platform_service_url('gitea', 'controller') }}"
gitea_database_name: gitea
gitea_database_user: gitea
gitea_database_host: "{{ hostvars[playbook_execution_host_patterns.postgres[playbook_execution_env]].ansible_host }}"
gitea_database_port: 5432
gitea_local_artifact_dir: "{{ repo_shared_local_root }}/gitea"
gitea_database_password_local_file: "{{ gitea_local_artifact_dir }}/database-password.txt"
gitea_oidc_client_id: gitea-oauth
gitea_oidc_client_secret_local_file: "{{ repo_shared_local_root }}/keycloak/gitea-client-secret.txt"
gitea_oidc_discovery_url: "{{ gitea_keycloak_service_topology.urls.public }}/realms/{{ keycloak_realm_name }}/.well-known/openid-configuration"
gitea_oidc_internal_discovery_url: "{{ gitea_keycloak_service_topology.urls.internal }}/realms/{{ keycloak_realm_name }}/.well-known/openid-configuration"
gitea_oidc_required_claim_name: groups
gitea_oidc_required_claim_value: /lv3-platform-admins
gitea_oidc_group_team_map:
  /lv3-platform-admins:
    ops:
      - Owners
gitea_minio_service_topology: "{{ hostvars[platform_topology_host].lv3_service_topology | service_topology_get('minio') }}"
gitea_minio_access_key_id: gitealfs
gitea_minio_secret_key_local_file: "{{ gitea_local_artifact_dir }}/minio-secret-key.txt"
gitea_minio_bucket_name: gitea-lfs
gitea_minio_region: us-east-1
gitea_minio_endpoint: "{{ gitea_minio_service_topology.private_ip }}:{{ hostvars[platform_topology_host].platform_port_assignments.minio_api_port }}"
gitea_admin_username: ops-gitea
gitea_admin_email: "{{ proxmox_notification_email }}"
gitea_admin_password_remote_file: "{{ gitea_secret_dir }}/admin-password"
gitea_admin_password_local_file: "{{ gitea_local_artifact_dir }}/admin-password.txt"
gitea_admin_token_remote_file: "{{ gitea_secret_dir }}/admin-token"
gitea_admin_token_local_file: "{{ gitea_local_artifact_dir }}/admin-token.txt"
gitea_renovate_username: renovate-bot
gitea_renovate_email: renovate-bot@lv3.internal
gitea_renovate_password_remote_file: "{{ gitea_secret_dir }}/renovate-password"
gitea_renovate_password_local_file: "{{ gitea_local_artifact_dir }}/renovate-password.txt"
gitea_renovate_repo_permission: write
gitea_runner_registration_token_remote_file: "{{ gitea_secret_dir }}/runner-registration-token"
gitea_runner_registration_token_local_file: "{{ gitea_local_artifact_dir }}/runner-registration-token.txt"
gitea_webhook_secret_remote_file: "{{ gitea_secret_dir }}/webhook-secret"
gitea_webhook_secret_local_file: "{{ gitea_local_artifact_dir }}/webhook-secret.txt"
gitea_release_bundle_cosign_private_key_local_file: "{{ gitea_local_artifact_dir }}/release-bundle-cosign.key"
gitea_release_bundle_cosign_password_local_file: "{{ gitea_local_artifact_dir }}/release-bundle-cosign.password.txt"
gitea_release_bundle_cosign_public_key_repo_file: "{{ playbook_dir | dirname }}/keys/gitea-release-bundle-cosign.pub"
gitea_release_bundle_cosign_private_key_secret_name: RELEASE_BUNDLE_COSIGN_PRIVATE_KEY
gitea_release_bundle_cosign_password_secret_name: RELEASE_BUNDLE_COSIGN_PASSWORD
gitea_release_bundle_repo_token_secret_name: RELEASE_BUNDLE_REPO_TOKEN
gitea_ntfy_token_local_file: "{{ repo_shared_local_root }}/ntfy/gitea-actions-token.txt"
gitea_ntfy_token_secret_name: NTFY_TOKEN
gitea_repo_org: ops
gitea_repo_name: "{{ platform_repo_name }}"
gitea_prereceive_hook_template: "{{ gitea_site_dir }}/pre-receive.validation-hook"
