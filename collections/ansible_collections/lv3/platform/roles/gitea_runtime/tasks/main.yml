---
# Purpose: Converge the private Gitea runtime, SSO wiring, and repo automation baseline on docker-runtime-lv3.
# Use case: Run when provisioning or updating the repo-managed Gitea service and its control-plane integrations.
# Inputs: gitea_* runtime paths, database credentials, publication URLs, and OIDC/bootstrap secrets.
# Outputs: Rendered compose runtime, validated service configuration, and Gitea bootstrap state.
# Idempotency: Partially idempotent; reruns reconcile the same runtime, config files, and seeded settings.
# Dependencies: ADR 0143, ADR 0165, and the shared PostgreSQL plus Keycloak surfaces.
- name: Validate Gitea runtime inputs
  ansible.builtin.assert:
    that:
      - gitea_site_dir | length > 0
      - gitea_data_dir | length > 0
      - gitea_secret_dir | length > 0
      - gitea_compose_file | length > 0
      - gitea_env_file | length > 0
      - gitea_image | length > 0
      - gitea_http_port | int > 0
      - gitea_public_hostname | length > 0
      - gitea_private_base_url | length > 0
      - gitea_controller_url | length > 0
      - gitea_database_name | length > 0
      - gitea_database_user | length > 0
      - gitea_database_host | length > 0
      - gitea_database_password_local_file | length > 0
      - gitea_oidc_client_id | length > 0
      - gitea_oidc_client_secret_local_file | length > 0
      - gitea_oidc_discovery_url | length > 0
      - gitea_oidc_internal_discovery_url | length > 0
      - gitea_minio_secret_key_local_file | length > 0
      - gitea_minio_bucket_name | length > 0
      - gitea_minio_endpoint | length > 0
      - gitea_admin_username | length > 0
      - gitea_admin_email | length > 0
      - gitea_admin_password_remote_file | length > 0
      - gitea_admin_password_local_file | length > 0
      - gitea_admin_token_remote_file | length > 0
      - gitea_admin_token_local_file | length > 0
      - gitea_renovate_username | length > 0
      - gitea_renovate_email | length > 0
      - gitea_renovate_password_remote_file | length > 0
      - gitea_renovate_password_local_file | length > 0
      - gitea_renovate_repo_permission | length > 0
      - gitea_runner_registration_token_remote_file | length > 0
      - gitea_runner_registration_token_local_file | length > 0
      - gitea_webhook_secret_remote_file | length > 0
      - gitea_webhook_secret_local_file | length > 0
      - gitea_release_bundle_cosign_private_key_local_file | length > 0
      - gitea_release_bundle_cosign_password_local_file | length > 0
      - gitea_release_bundle_cosign_public_key_repo_file | length > 0
      - gitea_release_bundle_cosign_private_key_secret_name | length > 0
      - gitea_release_bundle_cosign_password_secret_name | length > 0
      - gitea_release_bundle_repo_token_secret_name | length > 0
      - gitea_ntfy_token_local_file | length > 0
      - gitea_ntfy_token_secret_name | length > 0
      - gitea_repo_org | length > 0
      - gitea_repo_name | length > 0
    fail_msg: "gitea_runtime requires runtime paths, database credentials, OIDC inputs, and bootstrap artifact paths."

- name: Ensure the Gitea database password exists on the control machine
  ansible.builtin.stat:
    path: "{{ gitea_database_password_local_file }}"
  delegate_to: localhost
  become: false
  register: gitea_database_password_local

- name: Fail if the Gitea database password is missing locally
  ansible.builtin.fail:
    msg: >-
      {{ gitea_database_password_local_file }} is missing on the control machine.
      Run the Gitea PostgreSQL converge first so the runtime can connect to postgres-lv3.
  when: not gitea_database_password_local.stat.exists

- name: Ensure the Gitea OIDC client secret exists on the control machine
  ansible.builtin.stat:
    path: "{{ gitea_oidc_client_secret_local_file }}"
  delegate_to: localhost
  become: false
  register: gitea_oidc_client_secret_local

- name: Ensure the Gitea MinIO secret key exists on the control machine
  ansible.builtin.stat:
    path: "{{ gitea_minio_secret_key_local_file }}"
  delegate_to: localhost
  become: false
  register: gitea_minio_secret_key_local

- name: Fail if the Gitea OIDC client secret is missing locally
  ansible.builtin.fail:
    msg: >-
      {{ gitea_oidc_client_secret_local_file }} is missing on the control machine.
      Re-run the Keycloak converge so the Gitea OIDC client is provisioned before bootstrapping Gitea.
  when: not gitea_oidc_client_secret_local.stat.exists

- name: Fail if the Gitea MinIO secret key is missing locally
  ansible.builtin.fail:
    msg: >-
      {{ gitea_minio_secret_key_local_file }} is missing on the control machine.
      Converge MinIO before deploying Gitea so the shared LFS object store credentials exist.
  when: not gitea_minio_secret_key_local.stat.exists

- name: Ensure the release-bundle Cosign private key exists on the control machine
  ansible.builtin.stat:
    path: "{{ gitea_release_bundle_cosign_private_key_local_file }}"
  delegate_to: localhost
  become: false
  register: gitea_release_bundle_private_key_local

- name: Fail if the release-bundle Cosign private key is missing locally
  ansible.builtin.fail:
    msg: >-
      {{ gitea_release_bundle_cosign_private_key_local_file }} is missing on the control machine.
      Run `python3 scripts/release_bundle.py init-signing` from the repository root before converging Gitea.
  when: not gitea_release_bundle_private_key_local.stat.exists

- name: Ensure the release-bundle Cosign password exists on the control machine
  ansible.builtin.stat:
    path: "{{ gitea_release_bundle_cosign_password_local_file }}"
  delegate_to: localhost
  become: false
  register: gitea_release_bundle_password_local

- name: Fail if the release-bundle Cosign password is missing locally
  ansible.builtin.fail:
    msg: >-
      {{ gitea_release_bundle_cosign_password_local_file }} is missing on the control machine.
      Run `python3 scripts/release_bundle.py init-signing` from the repository root before converging Gitea.
  when: not gitea_release_bundle_password_local.stat.exists

- name: Ensure the committed release-bundle Cosign public key exists
  ansible.builtin.stat:
    path: "{{ gitea_release_bundle_cosign_public_key_repo_file }}"
  delegate_to: localhost
  become: false
  register: gitea_release_bundle_public_key_repo

- name: Fail if the committed release-bundle Cosign public key is missing
  ansible.builtin.fail:
    msg: >-
      {{ gitea_release_bundle_cosign_public_key_repo_file }} is missing from the repository checkout.
      Commit the matching public key before converging Gitea so release bundles can be verified later.
  when: not gitea_release_bundle_public_key_repo.stat.exists

- name: Ensure the ntfy Actions token exists on the control machine
  ansible.builtin.stat:
    path: "{{ gitea_ntfy_token_local_file }}"
  delegate_to: localhost
  become: false
  register: gitea_ntfy_token_local

- name: Fail if the ntfy Actions token is missing locally
  ansible.builtin.fail:
    msg: >-
      {{ gitea_ntfy_token_local_file }} is missing on the control machine.
      Converge ntfy first so the repo-managed validation workflow can publish failure alerts.
  when: not gitea_ntfy_token_local.stat.exists

- name: Ensure Gitea runtime packages are present
  ansible.builtin.apt:
    name:
      - docker-compose-plugin
      - postgresql-client
      - python3
    state: present
    update_cache: true
    force_apt_get: true

- name: Ensure the Gitea directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ gitea_site_dir }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ gitea_data_dir }}"
      owner: "1000"
      group: "1000"
      mode: "0755"
    - path: "{{ gitea_secret_dir }}"
      owner: root
      group: root
      mode: "0700"

- name: Generate the Gitea admin password when missing
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ gitea_admin_password_remote_file }}" ]; then
      umask 077
      openssl rand -base64 24 > "{{ gitea_admin_password_remote_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: gitea_admin_password_generation
  changed_when: "'changed' in gitea_admin_password_generation.stdout"
  no_log: true

- name: Generate the Gitea webhook secret when missing
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ gitea_webhook_secret_remote_file }}" ]; then
      umask 077
      openssl rand -hex 32 > "{{ gitea_webhook_secret_remote_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: gitea_webhook_secret_generation
  changed_when: "'changed' in gitea_webhook_secret_generation.stdout"
  no_log: true

- name: Generate the Gitea Renovate bot password when missing
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ gitea_renovate_password_remote_file }}" ]; then
      umask 077
      openssl rand -base64 24 > "{{ gitea_renovate_password_remote_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: gitea_renovate_password_generation
  changed_when: "'changed' in gitea_renovate_password_generation.stdout"
  no_log: true

- name: Read the Gitea admin password
  ansible.builtin.slurp:
    src: "{{ gitea_admin_password_remote_file }}"
  register: gitea_admin_password_raw
  no_log: true

- name: Read the Gitea Renovate bot password
  ansible.builtin.slurp:
    src: "{{ gitea_renovate_password_remote_file }}"
  register: gitea_renovate_password_raw
  no_log: true

- name: Read the Gitea webhook secret
  ansible.builtin.slurp:
    src: "{{ gitea_webhook_secret_remote_file }}"
  register: gitea_webhook_secret_raw
  no_log: true

- name: Record Gitea secret facts
  ansible.builtin.set_fact:
    gitea_admin_password: "{{ gitea_admin_password_raw.content | b64decode | trim }}"
    gitea_database_password: "{{ lookup('ansible.builtin.file', gitea_database_password_local_file) | trim }}"
    gitea_oidc_client_secret: "{{ lookup('ansible.builtin.file', gitea_oidc_client_secret_local_file) | trim }}"
    gitea_minio_secret_key: "{{ lookup('ansible.builtin.file', gitea_minio_secret_key_local_file) | trim }}"
    gitea_renovate_password: "{{ gitea_renovate_password_raw.content | b64decode | trim }}"
    gitea_release_bundle_cosign_private_key: "{{ lookup('ansible.builtin.file', gitea_release_bundle_cosign_private_key_local_file) }}"
    gitea_release_bundle_cosign_password: "{{ lookup('ansible.builtin.file', gitea_release_bundle_cosign_password_local_file) | trim }}"
    gitea_ntfy_token: "{{ lookup('ansible.builtin.file', gitea_ntfy_token_local_file) | trim }}"
    gitea_webhook_secret: "{{ gitea_webhook_secret_raw.content | b64decode | trim }}"
  no_log: true

- name: Build Gitea runtime secret payload
  ansible.builtin.set_fact:
    gitea_runtime_secret_payload:
      GITEA__database__PASSWD: "{{ gitea_database_password }}"
      GITEA_ADMIN_PASSWORD: "{{ gitea_admin_password }}"
      GITEA_KEYCLOAK_CLIENT_SECRET: "{{ gitea_oidc_client_secret }}"
      GITEA__lfs__MINIO_SECRET_ACCESS_KEY: "{{ gitea_minio_secret_key }}"
      GITEA_WEBHOOK_SECRET: "{{ gitea_webhook_secret }}"
      GITEA_NTFY_TOKEN: "{{ gitea_ntfy_token }}"
  no_log: true

- name: Ensure the local Gitea artifact directory exists
  ansible.builtin.file:
    path: "{{ gitea_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Mirror the Gitea admin password to the control machine
  ansible.builtin.copy:
    dest: "{{ gitea_admin_password_local_file }}"
    content: "{{ gitea_admin_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Mirror the Gitea webhook secret to the control machine
  ansible.builtin.copy:
    dest: "{{ gitea_webhook_secret_local_file }}"
    content: "{{ gitea_webhook_secret }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Mirror the Gitea Renovate bot password to the control machine
  ansible.builtin.copy:
    dest: "{{ gitea_renovate_password_local_file }}"
    content: "{{ gitea_renovate_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Prepare OpenBao agent runtime secret injection for Gitea
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: openbao_compose_env
  vars:
    common_openbao_compose_env_service_name: gitea
    common_openbao_compose_env_agent_dir: "{{ gitea_openbao_agent_dir }}"
    common_openbao_compose_env_runtime_dir: "{{ gitea_env_file | dirname }}"
    common_openbao_compose_env_env_file: "{{ gitea_env_file }}"
    common_openbao_compose_env_secret_path: "{{ gitea_openbao_secret_path }}"
    common_openbao_compose_env_secret_payload: "{{ gitea_runtime_secret_payload }}"
    common_openbao_compose_env_policy_name: "{{ gitea_openbao_policy_name }}"
    common_openbao_compose_env_policy_rules: |
      path "sys/health" {
        capabilities = ["read"]
      }

      path "kv/data/{{ gitea_openbao_secret_path }}" {
        capabilities = ["read"]
      }

      path "kv/metadata/{{ gitea_openbao_secret_path }}" {
        capabilities = ["read", "list"]
      }
    common_openbao_compose_env_approle_name: "{{ gitea_openbao_approle_name }}"
    common_openbao_compose_env_agent_config_file: "{{ gitea_openbao_agent_dir }}/agent.hcl"
    common_openbao_compose_env_agent_template_file: "{{ gitea_openbao_agent_dir }}/runtime.env.ctmpl"
    common_openbao_compose_env_agent_template_src: runtime.env.ctmpl.j2
    common_openbao_compose_env_role_id_file: "{{ gitea_openbao_agent_dir }}/role_id"
    common_openbao_compose_env_secret_id_file: "{{ gitea_openbao_agent_dir }}/secret_id"
    common_openbao_compose_env_image: "{{ gitea_openbao_agent_image }}"
    common_openbao_compose_env_legacy_env_files:
      - "{{ gitea_legacy_env_file }}"
  no_log: true

- name: Render the Gitea environment file
  ansible.builtin.template:
    src: runtime.env.j2
    dest: "{{ gitea_env_file }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Render the Gitea compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ gitea_compose_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Render the Gitea bootstrap script
  ansible.builtin.template:
    src: bootstrap-gitea.sh.j2
    dest: "{{ gitea_bootstrap_script }}"
    owner: root
    group: root
    mode: "0750"
  no_log: true

- name: Render the managed Gitea pre-receive hook template
  ansible.builtin.template:
    src: pre-receive.validation-hook.j2
    dest: "{{ gitea_prereceive_hook_template }}"
    owner: root
    group: root
    mode: "0750"

- name: Pull the Gitea image
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ gitea_compose_file }}"
      - pull
  args:
    chdir: "{{ gitea_site_dir }}"
  register: gitea_pull
  changed_when: >-
    'Pulling' in gitea_pull.stdout
    or 'Downloaded newer image' in gitea_pull.stdout
    or 'Pull complete' in gitea_pull.stdout

- name: Check whether the Docker nat chain exists before Gitea startup
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - nat
      - -S
      - DOCKER
  register: gitea_docker_nat_chain
  changed_when: false
  failed_when: false

- name: Restore Docker networking when the nat chain is missing before Gitea startup
  ansible.builtin.service:
    name: docker
    state: restarted
  when: gitea_docker_nat_chain.rc != 0

- name: Recheck the Docker nat chain before Gitea startup
  ansible.builtin.command:
    argv:
      - iptables
      - -t
      - nat
      - -S
      - DOCKER
  register: gitea_docker_nat_chain_recheck
  changed_when: false
  failed_when: gitea_docker_nat_chain_recheck.rc not in [0, 1]
  retries: 10
  delay: 2
  until: gitea_docker_nat_chain_recheck.rc == 0
  when: gitea_docker_nat_chain.rc != 0

- name: Wait for the Docker daemon to answer after networking recovery
  ansible.builtin.command:
    argv:
      - docker
      - info
      - --format
      - '{{ "{{.ServerVersion}}" }}'
  register: gitea_docker_info
  changed_when: false
  retries: 10
  delay: 2
  until: gitea_docker_info.rc == 0
  when: gitea_docker_nat_chain.rc != 0

- name: Assert Docker nat chain is present before Gitea startup
  ansible.builtin.assert:
    that:
      - gitea_docker_nat_chain.rc == 0 or gitea_docker_nat_chain_recheck.rc == 0
    fail_msg: "Docker is running but the nat DOCKER chain is missing; Gitea published ports will fail."

- name: Wait for the shared MinIO API endpoint used by Gitea LFS
  ansible.builtin.uri:
    url: "http://{{ gitea_minio_endpoint }}/minio/health/live"
    method: GET
    status_code: 200
  register: gitea_minio_ready
  retries: 60
  delay: 5
  until: gitea_minio_ready.status == 200
  changed_when: false

- name: Check whether the Gitea local port is already published
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: "{{ gitea_http_port }}"
    delay: 0
    timeout: 1
  register: gitea_local_port_probe
  changed_when: false
  failed_when: false

- name: Check whether the current Gitea sign-in page is healthy before startup
  ansible.builtin.uri:
    url: "{{ gitea_private_base_url }}/user/login"
    method: GET
    status_code: 200
  register: gitea_login_probe
  changed_when: false
  failed_when: false

- name: Record whether the Gitea startup needs a force recreate
  ansible.builtin.set_fact:
    gitea_force_recreate: >-
      {{
        gitea_docker_nat_chain.rc != 0
        or (gitea_local_port_probe.failed | default(false))
        or (gitea_login_probe.status | default(0)) != 200
      }}

- name: Reset the Gitea stack before a force recreate
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ gitea_compose_file }}"
      - down
      - --remove-orphans
  args:
    chdir: "{{ gitea_site_dir }}"
  register: gitea_force_recreate_down
  failed_when: false
  changed_when: >-
    'Stopping' in gitea_force_recreate_down.stdout
    or 'Removing' in gitea_force_recreate_down.stdout
    or 'Network' in gitea_force_recreate_down.stdout
    or 'Stopping' in gitea_force_recreate_down.stderr
    or 'Removing' in gitea_force_recreate_down.stderr
    or 'Network' in gitea_force_recreate_down.stderr
  when: gitea_force_recreate

- name: Remove stale Gitea compose networks after the reset
  ansible.builtin.shell: |
    set -euo pipefail
    stale_networks="$(docker network ls -q --filter name={{ gitea_network_name }})"
    changed=false
    if [ -n "${stale_networks}" ]; then
      for network_id in ${stale_networks}; do
        container_count="$(
          docker network inspect "${network_id}" | python3 -c 'import json, sys; payload = json.load(sys.stdin); print(len((payload[0].get("Containers") or {})))'
        )"
        if [ "${container_count}" -gt 0 ]; then
          continue
        fi
        docker network rm "${network_id}"
        changed=true
      done
    fi
    if [ "${changed}" = true ]; then
      echo changed
    fi
  args:
    executable: /bin/bash
  register: gitea_force_recreate_network_cleanup
  changed_when: "'changed' in gitea_force_recreate_network_cleanup.stdout"
  when: gitea_force_recreate

- name: Remove stale Gitea containers before recovery
  ansible.builtin.shell: |
    set -euo pipefail
    stale_ids="$(
      docker ps -aq \
        --filter name=^/{{ gitea_container_name }}$ \
        --filter name=^/{{ gitea_openbao_agent_container_name }}$
    )"
    if [ -n "${stale_ids}" ]; then
      docker rm -f ${stale_ids}
      echo changed
    fi
  args:
    executable: /bin/bash
  register: gitea_force_recreate_container_cleanup
  changed_when: "'changed' in gitea_force_recreate_container_cleanup.stdout"
  when: gitea_force_recreate

- name: Force-recreate the Gitea stack after Docker networking recovery
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ gitea_compose_file }}"
      - up
      - -d
      - --remove-orphans
      - --force-recreate
  args:
    chdir: "{{ gitea_site_dir }}"
  register: gitea_force_recreate_up
  changed_when: >-
    'Creating' in gitea_force_recreate_up.stdout
    or 'Recreating' in gitea_force_recreate_up.stdout
    or 'Starting' in gitea_force_recreate_up.stdout
  failed_when: false
  retries: 3
  delay: 5
  until: gitea_force_recreate_up.rc == 0
  when: gitea_force_recreate

- name: Assert the Gitea force-recreate succeeded
  ansible.builtin.assert:
    that:
      - gitea_force_recreate_up.rc == 0
    fail_msg: "{{ gitea_force_recreate_up.stderr | default(gitea_force_recreate_up.msg | default('gitea compose force-recreate failed')) }}"
  when: gitea_force_recreate

- name: Start the Gitea stack
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ gitea_compose_file }}"
      - up
      - -d
      - --remove-orphans
  args:
    chdir: "{{ gitea_site_dir }}"
  register: gitea_up
  changed_when: >-
    'Creating' in gitea_up.stdout
    or 'Recreating' in gitea_up.stdout
    or 'Starting' in gitea_up.stdout
  when: not gitea_force_recreate

- name: Wait for Gitea to listen locally
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: "{{ gitea_http_port }}"
    delay: 0
    timeout: 240

- name: Wait for the Gitea sign-in page
  ansible.builtin.uri:
    url: "{{ gitea_private_base_url }}/user/login"
    method: GET
    status_code: 200
  register: gitea_login_page
  retries: 24
  delay: 5
  until: gitea_login_page.status == 200
  changed_when: false

- name: Wait for the Keycloak OIDC discovery endpoint used by Gitea bootstrap
  ansible.builtin.uri:
    url: "{{ gitea_oidc_internal_discovery_url }}"
    method: GET
    status_code: 200
  register: gitea_oidc_discovery_ready
  retries: 60
  delay: 5
  until: gitea_oidc_discovery_ready.status == 200
  changed_when: false

- name: Run the Gitea bootstrap script
  ansible.builtin.command:
    argv:
      - /bin/bash
      - "{{ gitea_bootstrap_script }}"
  environment:
    GITEA_ADMIN_PASSWORD: "{{ gitea_admin_password }}"
    GITEA_DATABASE_PASSWORD: "{{ gitea_database_password }}"
    GITEA_KEYCLOAK_CLIENT_SECRET: "{{ gitea_oidc_client_secret }}"
    GITEA_RENOVATE_PASSWORD: "{{ gitea_renovate_password }}"
    GITEA_RELEASE_BUNDLE_COSIGN_PRIVATE_KEY: "{{ gitea_release_bundle_cosign_private_key }}"
    GITEA_RELEASE_BUNDLE_COSIGN_PASSWORD: "{{ gitea_release_bundle_cosign_password }}"
    GITEA_NTFY_TOKEN: "{{ gitea_ntfy_token }}"
  register: gitea_bootstrap
  changed_when: "'GITEA_BOOTSTRAP_CHANGED=true' in gitea_bootstrap.stdout"
  no_log: true

- name: Assert the Gitea bootstrap produced the expected artifact files
  ansible.builtin.assert:
    that:
      - gitea_bootstrap.rc == 0
    fail_msg: "The managed Gitea bootstrap script failed."

- name: Read the mirrored Gitea admin token from the managed host
  ansible.builtin.slurp:
    src: "{{ gitea_admin_token_remote_file }}"
  register: gitea_admin_token_remote
  no_log: true

- name: Read the mirrored Gitea runner registration token from the managed host
  ansible.builtin.slurp:
    src: "{{ gitea_runner_registration_token_remote_file }}"
  register: gitea_runner_registration_token_remote
  no_log: true

- name: Mirror the Gitea admin token to the control machine
  ansible.builtin.copy:
    dest: "{{ gitea_admin_token_local_file }}"
    content: "{{ gitea_admin_token_remote.content | b64decode | trim }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Mirror the Gitea runner registration token to the control machine
  ansible.builtin.copy:
    dest: "{{ gitea_runner_registration_token_local_file }}"
    content: "{{ gitea_runner_registration_token_remote.content | b64decode | trim }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Verify Gitea health probes
  ansible.builtin.import_tasks: verify.yml
