---
- name: Verify the Gitea container is running
  ansible.builtin.command:
    argv:
      - docker
      - ps
      - --filter
      - "name={{ gitea_container_name }}"
      - --filter
      - status=running
      - --format
      - "{{ '{{' }}.Names{{ '}}' }}"
  register: gitea_verify_running
  changed_when: false

- name: Assert the Gitea container is running
  ansible.builtin.assert:
    that:
      - gitea_verify_running.stdout_lines | select('equalto', gitea_container_name) | list | length == 1
    fail_msg: "Gitea container is not running."

- name: Verify the Gitea sign-in page responds locally
  ansible.builtin.uri:
    url: "{{ gitea_private_base_url }}/user/login"
    method: GET
    status_code: 200
  register: gitea_verify_login
  changed_when: false

- name: Verify the Gitea swagger endpoint responds locally
  ansible.builtin.uri:
    url: "{{ gitea_private_base_url }}/api/swagger"
    method: GET
    status_code: 200
  register: gitea_verify_swagger
  changed_when: false

- name: Verify the Gitea admin token was mirrored locally
  ansible.builtin.stat:
    path: "{{ gitea_admin_token_local_file }}"
  delegate_to: localhost
  become: false
  register: gitea_admin_token_local

- name: Verify the runner registration token was mirrored locally
  ansible.builtin.stat:
    path: "{{ gitea_runner_registration_token_local_file }}"
  delegate_to: localhost
  become: false
  register: gitea_runner_token_local

- name: Verify the Renovate token was mirrored locally
  ansible.builtin.stat:
    path: "{{ gitea_renovate_token_local_file }}"
  delegate_to: localhost
  become: false
  register: gitea_renovate_token_local

- name: Assert the repo-managed Gitea bootstrap artifacts exist
  ansible.builtin.assert:
    that:
      - gitea_admin_token_local.stat.exists
      - gitea_runner_token_local.stat.exists
      - gitea_renovate_token_local.stat.exists
    fail_msg: "Gitea started, but the repo-managed admin, runner, or Renovate token artifacts were not mirrored locally."
