---
argument_specs:
  main:
    short_description: Converge the private Gitea runtime, bootstrap admin access, and prepare CI artifacts.
    description: >-
      Converges the private Gitea service on docker-runtime-lv3.
      Conventional variables (site_dir, data_dir, compose_file, env_file, image, etc.) are
      automatically derived from the platform_service_registry via ADR 0373.
      Only service-specific variables are documented here.
    options:
      gitea_public_hostname:
        type: str
        required: true
      gitea_private_base_url:
        type: str
        required: true
      gitea_controller_url:
        type: str
        required: true
      gitea_database_name:
        type: str
        required: true
      gitea_database_user:
        type: str
        required: true
      gitea_database_host:
        type: str
        required: true
      gitea_database_password_local_file:
        type: path
        required: true
      gitea_oidc_client_id:
        type: str
        required: true
      gitea_oidc_client_secret_local_file:
        type: path
        required: true
      gitea_oidc_discovery_url:
        type: str
        required: true
      gitea_oidc_internal_discovery_url:
        type: str
        required: true
      gitea_admin_username:
        type: str
        required: true
      gitea_admin_email:
        type: str
        required: true
      gitea_admin_password_remote_file:
        type: path
        required: true
      gitea_admin_password_local_file:
        type: path
        required: true
      gitea_admin_token_remote_file:
        type: path
        required: true
      gitea_admin_token_local_file:
        type: path
        required: true
      gitea_renovate_username:
        type: str
        required: true
      gitea_renovate_email:
        type: str
        required: true
      gitea_renovate_password_remote_file:
        type: path
        required: true
      gitea_renovate_password_local_file:
        type: path
        required: true
      gitea_renovate_repo_permission:
        type: str
        required: true
      gitea_runner_registration_token_remote_file:
        type: path
        required: true
      gitea_runner_registration_token_local_file:
        type: path
        required: true
      gitea_release_bundle_cosign_private_key_local_file:
        type: path
        required: true
      gitea_release_bundle_cosign_password_local_file:
        type: path
        required: true
      gitea_release_bundle_cosign_public_key_repo_file:
        type: path
        required: true
      gitea_release_bundle_cosign_private_key_secret_name:
        type: str
        required: true
      gitea_release_bundle_cosign_password_secret_name:
        type: str
        required: true
      gitea_release_bundle_repo_token_secret_name:
        type: str
        required: true
      gitea_webhook_secret_remote_file:
        type: path
        required: true
      gitea_webhook_secret_local_file:
        type: path
        required: true
