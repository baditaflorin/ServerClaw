---
- name: Verify PostgreSQL is listening on the managed TCP port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ postgres_vm_port }}"
    delay: 0
    timeout: 60

- name: Verify PostgreSQL accepts a local SQL readiness probe
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - SELECT 1
  register: postgres_vm_sql_probe
  changed_when: false
  failed_when: postgres_vm_sql_probe.stdout | trim != "1"

- name: Verify configured PostgreSQL preload libraries are active
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - SHOW shared_preload_libraries
  register: postgres_vm_shared_preload_libraries_show
  changed_when: false
  when: postgres_vm_shared_preload_libraries | length > 0

- name: Assert configured PostgreSQL preload libraries are active
  ansible.builtin.assert:
    that:
      - >-
        (
          postgres_vm_shared_preload_libraries
          | difference(
              (
                postgres_vm_shared_preload_libraries_show.stdout
                | trim
                | split(',')
                | map('trim')
                | reject('equalto', '')
                | list
              )
            )
          | length
        ) == 0
  when: postgres_vm_shared_preload_libraries | length > 0

- name: Verify PostgreSQL pgaudit session classes are configured
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - SHOW pgaudit.log
  register: postgres_vm_pgaudit_log_probe
  changed_when: false
  failed_when: postgres_vm_pgaudit_log_probe.stdout | trim != postgres_vm_pgaudit_log
  when: postgres_vm_pgaudit_enabled | bool

- name: Verify PostgreSQL connection logging is enabled
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - SHOW log_connections
  register: postgres_vm_log_connections_probe
  changed_when: false
  failed_when: postgres_vm_log_connections_probe.stdout | trim != "on"
  when: postgres_vm_pgaudit_enabled | bool
