# Purpose: Define default PostgreSQL database names, users, and secret paths required by the Temporal stack.
# Use case: Loaded whenever the Temporal PostgreSQL helper role provisions or validates database prerequisites.
# Inputs: Repo-local secret paths and Temporal database naming defaults.
# Outputs: Supplies stable defaults consumed by the Temporal PostgreSQL role tasks.
# Idempotency: Fully idempotent because this file only declares role defaults.
# Dependencies: ADR 0165 and ADR 0293.
---
temporal_database_name: temporal
temporal_visibility_database_name: temporal_visibility
temporal_database_user: temporal
temporal_postgres_secret_dir: /etc/lv3/temporal
temporal_postgres_password_file: "{{ temporal_postgres_secret_dir }}/database-password"
temporal_local_artifact_dir: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/temporal
temporal_database_password_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/temporal/database-password.txt
