# Purpose: Provision the PostgreSQL role, databases, and password material used by the Temporal runtime.
# Use case: Run during Temporal bootstrap or recovery when the durable workflow engine needs its backing stores.
# Inputs: Database names, secret directories, and controller-local password sources for the Temporal service account.
# Outputs: Ensures the Temporal PostgreSQL databases, role grants, and password files exist in the expected locations.
# Idempotency: Partially idempotent because the generated password is preserved once created while repeated role/database checks converge cleanly.
# Dependencies: ADR 0165, ADR 0293, ADR 0359.
---
- name: Provision the temporal main database via the shared postgres_client role
  ansible.builtin.include_role:
    name: lv3.platform.postgres_client
  vars:
    postgres_client_service: "{{ temporal_database_name }}"
    postgres_client_database: "{{ temporal_database_name }}"
    postgres_client_user: "{{ temporal_database_user }}"
    postgres_client_password_local_file: "{{ temporal_database_password_local_file }}"
    postgres_client_password_remote_dir: "{{ temporal_postgres_secret_dir }}"
    postgres_client_password_remote_file: "{{ temporal_postgres_password_file }}"

- name: Check whether the PostgreSQL host is writable for temporal visibility database
  ansible.builtin.command:
    argv:
      - sudo
      - -u
      - postgres
      - psql
      - -d
      - postgres
      - -Atqc
      - SELECT (NOT pg_is_in_recovery())::int
  register: temporal_postgres_writable_check
  changed_when: false

- name: Check whether the Temporal visibility database already exists
  ansible.builtin.command:
    argv:
      - sudo
      - -u
      - postgres
      - psql
      - -d
      - postgres
      - -Atqc
      - "SELECT 1 FROM pg_database WHERE datname = '{{ temporal_visibility_database_name }}'"
  register: temporal_postgres_visibility_database_check
  changed_when: false
  when: temporal_postgres_writable_check.stdout | trim == "1"

- name: Create the Temporal visibility PostgreSQL database
  ansible.builtin.command:
    argv:
      - sudo
      - -u
      - postgres
      - psql
      - -d
      - postgres
      - -c
      - "CREATE DATABASE {{ temporal_visibility_database_name }} OWNER {{ temporal_database_user }}"
  changed_when: true
  when:
    - temporal_postgres_writable_check.stdout | trim == "1"
    - temporal_postgres_visibility_database_check.stdout | trim != "1"

- name: Check whether the Temporal visibility database owner matches
  ansible.builtin.command:
    argv:
      - sudo
      - -u
      - postgres
      - psql
      - -d
      - postgres
      - -Atqc
      - "SELECT pg_catalog.pg_get_userbyid(datdba) FROM pg_database WHERE datname = '{{ temporal_visibility_database_name }}'"
  register: temporal_postgres_visibility_owner_check
  changed_when: false
  when: temporal_postgres_writable_check.stdout | trim == "1"

- name: Ensure the Temporal visibility database owner is correct
  ansible.builtin.command:
    argv:
      - sudo
      - -u
      - postgres
      - psql
      - -d
      - postgres
      - -c
      - "ALTER DATABASE {{ temporal_visibility_database_name }} OWNER TO {{ temporal_database_user }}"
  changed_when: true
  when:
    - temporal_postgres_writable_check.stdout | trim == "1"
    - temporal_postgres_visibility_owner_check.stdout | trim != temporal_database_user
