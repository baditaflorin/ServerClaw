# Purpose: Verify that the deployed Dify runtime is reachable and reports a bootstrap-safe setup state.
# Use case: Included after Dify convergence to confirm the stack is healthy before follow-on smoke automation runs.
# Inputs: The Dify internal base URL and the expected setup state contract.
# Outputs: Records health and setup probe results and fails fast if Dify is not ready for use.
# Idempotency: Fully idempotent because these are read-only verification probes.
# Dependencies: ADR 0165, ADR 0197, ADR 0371.
---
- name: Verify the Dify runtime health
  ansible.builtin.include_role:
    name: lv3.platform.common
    tasks_from: verify_service_health
  vars:
    common_verify_service_name: dify
    common_verify_port: "{{ dify_port }}"
    common_verify_health_url: "{{ dify_internal_base_url }}/healthz"
    common_verify_health_retries: 36
    common_verify_health_delay: 5

- name: Verify the Dify setup endpoint is reachable
  ansible.builtin.uri:
    url: "{{ dify_internal_base_url }}/console/api/setup"
    method: GET
    status_code: 200
  register: dify_verify_setup
  changed_when: false

- name: Assert Dify reported a bootstrap-safe setup state
  ansible.builtin.assert:
    that:
      - dify_verify_setup.json.step in ['not_started', 'finished']
    fail_msg: "Dify started, but the setup endpoint did not return a valid bootstrap state."
