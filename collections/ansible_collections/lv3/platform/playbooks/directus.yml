---
# Playbook: directus.yml
# Purpose: Converge the Directus PostgreSQL backend, runtime, Keycloak client, and shared-edge publication.
# Use case: Run during production or staging live apply of the repo-managed Directus REST and GraphQL data API.
#
# Inputs (required):
#   - env (string, required): Target environment selector used to choose the postgres, docker-runtime, and nginx guests.
#
# Inputs (optional):
#   - proxmox_guest_ssh_connection_mode (string, optional, default=proxmox_host_jump): SSH path to managed guests.
#
# Outputs:
#   - Directus DNS, PostgreSQL role/database, runtime secrets, Keycloak OIDC client, access-model seed, and public verification match repo truth.
#
# Idempotency: Partially idempotent; convergence is repeatable, while the governed collection bootstrap and access-model seed reconcile state in place when required.
#
# Dependencies:
#   - ADR 0289: Directus is the operational REST and GraphQL data API layer over PostgreSQL.
#   - Requires: postgres_vm, docker_runtime, keycloak_runtime, directus_postgres, directus_runtime, and nginx_edge_publication.
#
# Related ADRs: 0021, 0042, 0063, 0077, 0086, 0289
# Related Runbooks: docs/runbooks/configure-directus.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-30

- name: Ensure Hetzner DNS publication for Directus
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    subdomain_catalog_path: "{{ playbook_dir }}/../../../../../config/subdomain-catalog.json"
    inventory_defaults_path: "{{ playbook_dir }}/../../../../../inventory/group_vars/all/identity.yml"
    subdomain_fqdn: "data.{{ platform_domain }}"

  tasks:
    - name: Load controller defaults
      ansible.builtin.include_vars:
        file: "{{ inventory_defaults_path }}"

    - name: Load the subdomain catalog
      ansible.builtin.include_vars:
        file: "{{ subdomain_catalog_path }}"
        name: subdomain_catalog

    - name: Select the Directus subdomain entry
      ansible.builtin.set_fact:
        selected_subdomain: >-
          {{
            (
              subdomain_catalog.subdomains
              | selectattr('fqdn', 'equalto', subdomain_fqdn)
              | list
              | first
            ) | default({})
          }}

    - name: Assert the Directus subdomain is catalogued
      ansible.builtin.assert:
        that:
          - selected_subdomain != {}
          - selected_subdomain.status in ['active', 'planned']
          - selected_subdomain.fqdn.endswith(hetzner_dns_zone_name)
        fail_msg: "data.{{ platform_domain }} must exist in config/subdomain-catalog.json before live apply."

    - name: Derive the managed Hetzner record name
      ansible.builtin.set_fact:
        selected_subdomain_record_name: >-
          {{
            '@'
            if selected_subdomain.fqdn == hetzner_dns_zone_name
            else (
              selected_subdomain.fqdn.rsplit('.' ~ hetzner_dns_zone_name, 1)[0]
            )
          }}

    - name: Converge the Directus Hetzner DNS record
      ansible.builtin.include_role:
        name: lv3.platform.hetzner_dns_record
      vars:
        hetzner_dns_record_zone_name: "{{ hetzner_dns_zone_name }}"
        hetzner_dns_record_name: "{{ selected_subdomain_record_name }}"
        hetzner_dns_record_type: A
        hetzner_dns_record_value: "{{ selected_subdomain.target }}"
        hetzner_dns_record_ttl: "{{ selected_subdomain.ttl | default(60) }}"

- name: Prepare PostgreSQL for Directus
  hosts: "{{ 'postgres-staging' if (env | default('production')) == 'staging' else 'postgres' }}"
  become: true
  gather_facts: true

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_emit_audit: false
        required_hosts:
          - "{{ playbook_execution_required_hosts.postgres[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.postgres_vm
    - role: lv3.platform.directus_postgres

- name: Converge Directus on the Docker runtime VM
  hosts: "{{ 'docker-runtime-staging' if (env | default('production')) == 'staging' else 'docker-runtime' }}"
  become: true
  gather_facts: true

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.directus
        playbook_execution_audit_target: directus
        required_hosts:
          - "{{ playbook_execution_required_hosts.docker_runtime[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.keycloak_runtime
    - role: lv3.platform.directus_runtime

- name: Seed the Directus access model in PostgreSQL
  hosts: "{{ 'postgres-staging' if (env | default('production')) == 'staging' else 'postgres' }}"
  become: true
  gather_facts: true

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_emit_audit: false
        required_hosts:
          - "{{ playbook_execution_required_hosts.postgres[playbook_execution_env] }}"

  tasks:
    - name: Seed the Directus roles, policies, permissions, and service token user
      ansible.builtin.include_role:
        name: lv3.platform.directus_postgres
        tasks_from: access_model.yml

- name: Publish Directus through the NGINX edge
  hosts: "{{ 'nginx-staging' if (env | default('production')) == 'staging' else 'nginx' }}"
  become: true
  gather_facts: true
  vars_files:
    - "{{ playbook_dir }}/../../../../../inventory/group_vars/platform.yml"

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_emit_audit: false
        required_hosts:
          - "{{ playbook_execution_required_hosts.nginx_edge[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.nginx_edge_publication

- name: Verify the public Directus publication
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Verify the Directus public data API and SSO redirect path
      ansible.builtin.include_role:
        name: lv3.platform.directus_runtime
        tasks_from: publish.yml
