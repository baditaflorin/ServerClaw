---
- name: Assert the Docker publication contract is defined
  ansible.builtin.assert:
    that:
      - playbook_execution_docker_publication_contract is defined
      - playbook_execution_docker_publication_contract.container_name is defined
    fail_msg: "Docker publication assurance requires a contract with container_name."
  changed_when: false

- name: Run Docker publication assurance before final readiness verification
  ansible.builtin.command:
    argv:
      - "{{ playbook_execution_docker_publication_command | default('/usr/local/bin/lv3-docker-publication-assurance') }}"
      - --service-id
      - "{{ service_health_probe_id }}"
      - --service-probe-base64
      - "{{ playbook_execution_service_probe | to_json | b64encode }}"
      - --contract-base64
      - "{{ playbook_execution_docker_publication_contract | to_json | b64encode }}"
      - --heal
      - --allow-listener-warmup-after-heal
  register: playbook_execution_docker_publication_command_result
  retries: 6
  delay: 2
  until: >-
    (
      playbook_execution_docker_publication_command_result.stdout
      | default('', true)
      | trim
      | length
    ) > 0
  changed_when: >-
    (
      playbook_execution_docker_publication_command_result.stdout
      | default('{}', true)
      | from_json
    ).healed | default(false)
  failed_when: playbook_execution_docker_publication_command_result.rc != 0

- name: Record the Docker publication assurance result
  ansible.builtin.set_fact:
    playbook_execution_docker_publication_result: >-
      {{
        playbook_execution_docker_publication_command_result.stdout
        | default('{}', true)
        | from_json
      }}
  changed_when: false
