---
# Playbook: mailpit.yml
# Purpose: Converge the private Mailpit SMTP interceptor on the selected Docker runtime guest.
# Use case: Run when non-production workloads need a repo-managed SMTP capture target and operator UI.
#
# Inputs (required):
#   - env (str, required): Deployment environment selector that resolves the target Docker runtime host.
#
# Inputs (optional):
#   - proxmox_guest_ssh_connection_mode (str, optional, default=proxmox_host_jump): Guest SSH routing mode for the live apply.
#
# Outputs:
#   - Mailpit is running on the selected Docker runtime VM with private HTTP and SMTP listeners plus repo-managed verification.
#
# Idempotency: Partially idempotent
#              Mailpit is stateless in memory, so a force-recreate during image or config updates clears captured messages.
#
# Dependencies:
#   - ADR 0282: Defines Mailpit as the non-production SMTP interceptor.
#   - Requires: docker-runtime host access through the Proxmox jump path.
#   - Role: lv3.platform.mailpit_runtime — renders and verifies the Mailpit runtime stack.
#
# Related ADRs: 0079, 0107, 0282
# Related Runbooks: docs/runbooks/configure-mailpit.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-30

- name: Converge Mailpit on the Docker runtime VM
  hosts: "{{ 'docker-runtime-staging-lv3' if (env | default('production')) == 'staging' else 'docker-runtime-lv3' }}"
  become: true
  gather_facts: true
  tags:
    - tier-2
    - communication
    - service-mailpit

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.mailpit
        playbook_execution_audit_target: mailpit
        required_hosts:
          - "{{ playbook_execution_required_hosts.docker_runtime[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.mailpit_runtime

  post_tasks:
    - name: Run shared post-verify checks
      ansible.builtin.import_tasks: tasks/post-verify.yml
      vars:
        service_health_probe_id: mailpit
        playbook_execution_post_verify_audit_action: playbook.verify.mailpit
    - name: Run shared completion notifications
      ansible.builtin.import_tasks: tasks/notify.yml
      vars:
        playbook_execution_notification_service: mailpit
