---
# Playbook: tika.yml
# Purpose: Converge the private Apache Tika runtime on the dedicated runtime-ai pool guest.
# Use case: Run during Tika deployment, upgrade, recovery, or runtime-ai pool placement changes when the document-extraction service must match repo truth.
#
# Inputs (required):
#   - env (str, required): Target environment passed through the shared execution wrapper.
#
# Inputs (optional):
#   - proxmox_guest_ssh_connection_mode (str, optional, default=proxmox_host_jump): Guest SSH path for the live apply.
#
# Outputs:
#   - /opt/tika/docker-compose.yml on runtime-ai-lv3
#   - a running private Apache Tika container listening on the internal guest network
#
# Idempotency: Fully idempotent
#
# Dependencies:
#   - ADR 0023: docker-runtime host baseline
#   - ADR 0067: guest firewall policy controls private service exposure
#   - ADR 0275: Apache Tika extraction service decision
#   - Role: lv3.platform.docker_runtime - ensures Docker is available on the guest
#   - Role: lv3.platform.linux_guest_firewall - keeps Tika private to the approved network boundary
#   - Role: lv3.platform.tika_runtime - converges and verifies the Tika runtime
#
# Related ADRs: 0023, 0067, 0275
# Related Runbooks: docs/runbooks/configure-tika.md, docs/runbooks/configure-runtime-ai-pool.md
# Author: LV3 Platform
# Last Updated: 2026-04-02
- name: Converge Apache Tika on the runtime-ai pool guest
  hosts: "{{ playbook_execution_host_patterns.runtime_ai[playbook_execution_env] }}"
  become: true
  gather_facts: true
  tags:
    - tier-1
    - automation
    - service-tika

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.tika
        playbook_execution_audit_target: tika
        required_hosts:
          - "{{ playbook_execution_required_hosts.runtime_ai[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.tika_runtime

  post_tasks:
    - name: Run shared Apache Tika post-verify checks
      ansible.builtin.import_tasks: tasks/post-verify.yml
      vars:
        service_health_probe_id: tika
        playbook_execution_post_verify_audit_action: playbook.verify.tika
    - name: Run shared completion notifications
      ansible.builtin.import_tasks: tasks/notify.yml
      vars:
        playbook_execution_notification_service: tika
