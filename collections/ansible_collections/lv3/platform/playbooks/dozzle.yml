---
- name: Publish Dozzle through the shared NGINX edge
  hosts: nginx-lv3
  become: true
  gather_facts: true
  vars_files:
    - "{{ lookup('ansible.builtin.env', 'PWD') }}/inventory/group_vars/platform.yml"
  tags:
    - tier-1
    - access
    - service-dozzle

  pre_tasks:
    - name: Run shared preflight checks for the edge publication
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.dozzle.edge
        playbook_execution_audit_target: dozzle
        required_hosts:
          - "{{ playbook_execution_required_hosts.nginx_edge[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.public_edge_oidc_auth
    - role: lv3.platform.nginx_edge_publication

- name: Converge Proxmox guest firewall policy for Dozzle reachability
  hosts: proxmox_hosts
  become: true
  gather_facts: true
  tags:
    - tier-1
    - network
    - service-dozzle

  pre_tasks:
    - name: Run shared preflight checks for the Proxmox guest firewall policy
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.dozzle.network
        playbook_execution_audit_target: dozzle
        required_hosts:
          - "{{ playbook_execution_required_hosts.proxmox_hosts[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.proxmox_network

- name: Converge Dozzle across the Docker guests
  hosts: docker-runtime-lv3:docker-build-lv3:monitoring-lv3
  become: true
  gather_facts: true
  tags:
    - tier-1
    - observability
    - service-dozzle

  pre_tasks:
    - name: Run shared preflight checks for the Dozzle runtime
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.dozzle
        playbook_execution_audit_target: dozzle
        required_hosts:
          - "{{ playbook_execution_required_hosts.docker_runtime[playbook_execution_env] }}"
          - "{{ playbook_execution_required_hosts.docker_build[playbook_execution_env] }}"
          - "{{ playbook_execution_required_hosts.monitoring[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.dozzle_runtime

  post_tasks:
    - name: Run shared Dozzle post-verify checks
      ansible.builtin.import_tasks: tasks/post-verify.yml
      vars:
        service_health_probe_id: dozzle
        playbook_execution_post_verify_audit_action: playbook.verify.dozzle
    - name: Run shared completion notifications
      ansible.builtin.import_tasks: tasks/notify.yml
      vars:
        playbook_execution_notification_service: dozzle
