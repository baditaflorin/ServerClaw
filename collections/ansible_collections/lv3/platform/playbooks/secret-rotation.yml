---
- name: Prepare secret rotation inputs on the control machine
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    secret_rotation_catalog_file: "{{ playbook_dir }}/../config/secret-catalog.json"
    secret_rotation_secret_manifest_file: "{{ playbook_dir }}/../config/controller-local-secrets.json"

  tasks:
    - name: Assert the rotation request is well formed
      ansible.builtin.assert:
        that:
          - secret_rotation_secret_id | default('') | length > 0
          - secret_rotation_mode | default('plan') in ['plan', 'apply']
        fail_msg: "secret_rotation_secret_id is required and secret_rotation_mode must be plan or apply."

    - name: Load the canonical secret catalog
      ansible.builtin.set_fact:
        secret_rotation_catalog: "{{ lookup('ansible.builtin.file', secret_rotation_catalog_file) | from_json }}"

    - name: Record the rotation metadata and contracts from the catalog
      ansible.builtin.set_fact:
        secret_rotation_contracts: >-
          {{
            secret_rotation_catalog.rotation_contracts
            if secret_rotation_catalog.rotation_contracts is defined
            else secret_rotation_catalog.secrets
          }}
        secret_rotation_metadata: >-
          {{
            secret_rotation_catalog.rotation_metadata
            if secret_rotation_catalog.rotation_metadata is defined
            else secret_rotation_catalog.metadata
          }}

    - name: Load the controller-local secret manifest
      ansible.builtin.set_fact:
        secret_rotation_secret_manifest: "{{ lookup('ansible.builtin.file', secret_rotation_secret_manifest_file) | from_json }}"

    - name: Assert the selected secret exists in the catalog
      ansible.builtin.assert:
        that:
          - secret_rotation_secret_id in secret_rotation_contracts
        fail_msg: "Unknown secret_rotation_secret_id in config/secret-catalog.json."

    - name: Record the selected secret contract
      ansible.builtin.set_fact:
        secret_rotation_selected_secret: "{{ secret_rotation_contracts[secret_rotation_secret_id] }}"
        secret_rotation_requested_at: "{{ lookup('ansible.builtin.pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Enforce the approval gate for high-risk secrets
      ansible.builtin.assert:
        that:
          - secret_rotation_selected_secret.approval_mode != 'approval_required' or (secret_rotation_allow_high_risk | default(false) | bool)
        fail_msg: >-
          {{ secret_rotation_secret_id }} is high-risk and requires the
          {{ secret_rotation_selected_secret.command_contract }} approval path before apply mode.
      when: secret_rotation_mode == 'apply'

    - name: Read the OpenBao init payload from the control machine
      ansible.builtin.set_fact:
        secret_rotation_openbao_init_payload: >-
          {{
            lookup(
              'ansible.builtin.file',
              secret_rotation_secret_manifest.secrets.openbao_init_payload.path
            )
            | from_json
          }}
      no_log: true

    - name: Generate a new secret value when apply mode does not provide one
      ansible.builtin.shell: |
        set -euo pipefail
        case "{{ secret_rotation_selected_secret.value_generator }}" in
          base64_24)
            openssl rand -base64 24 | tr -d '\n'
            ;;
          hex_32)
            openssl rand -hex 32 | tr -d '\n'
            ;;
          *)
            echo "Unsupported generator {{ secret_rotation_selected_secret.value_generator }}" >&2
            exit 1
            ;;
        esac
      args:
        executable: /bin/bash
      register: secret_rotation_generated_value
      changed_when: false
      no_log: true
      when:
        - secret_rotation_mode == 'apply'
        - (secret_rotation_new_value | default('')) | length == 0

    - name: Record the rotation value for downstream plays
      ansible.builtin.set_fact:
        secret_rotation_effective_value: >-
          {{
            secret_rotation_new_value
            | default(secret_rotation_generated_value.stdout | default(''))
          }}
      no_log: true

- name: Rotate PostgreSQL-side credentials for Windmill when requested
  hosts: postgres-lv3
  become: true
  gather_facts: true

  tasks:
    - name: Apply the Windmill PostgreSQL password rotation
      ansible.builtin.include_role:
        name: lv3.platform.windmill_postgres
        tasks_from: rotate.yml
      vars:
        secret_rotation_secret_id: "{{ hostvars['localhost'].secret_rotation_secret_id }}"
        secret_rotation_selected_secret: "{{ hostvars['localhost'].secret_rotation_selected_secret }}"
        secret_rotation_new_value: "{{ hostvars['localhost'].secret_rotation_effective_value | default('') }}"
      when:
        - hostvars['localhost'].secret_rotation_mode == 'apply'
        - hostvars['localhost'].secret_rotation_selected_secret.apply_target == 'windmill_database'

- name: Plan or apply runtime-facing secret rotation on docker-runtime-lv3
  hosts: docker-runtime-lv3
  become: true
  gather_facts: true
  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/platform.yml"
  vars:
    secret_rotation_openbao_http_port: "{{ platform_port_assignments.openbao_http_port }}"
    windmill_private_base_url: "http://127.0.0.1:{{ platform_port_assignments.windmill_server_port }}"

  pre_tasks:
    - name: Ensure target guest is Debian
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
        fail_msg: "This playbook only supports Debian guests."

    - name: Record shared rotation facts from localhost
      ansible.builtin.set_fact:
        secret_rotation_secret_id: "{{ hostvars['localhost'].secret_rotation_secret_id }}"
        secret_rotation_mode: "{{ hostvars['localhost'].secret_rotation_mode }}"
        secret_rotation_selected_secret: "{{ hostvars['localhost'].secret_rotation_selected_secret }}"
        secret_rotation_metadata: "{{ hostvars['localhost'].secret_rotation_metadata }}"
        secret_rotation_requested_at: "{{ hostvars['localhost'].secret_rotation_requested_at }}"
        secret_rotation_effective_value: "{{ hostvars['localhost'].secret_rotation_effective_value | default('') }}"
        secret_rotation_openbao_init_payload: "{{ hostvars['localhost'].secret_rotation_openbao_init_payload }}"
      no_log: true

    - name: Read the current dedicated secret path from OpenBao
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ secret_rotation_openbao_http_port }}/v1/kv/data/{{ secret_rotation_selected_secret.openbao_path }}"
        method: GET
        headers:
          X-Vault-Token: "{{ secret_rotation_openbao_init_payload.root_token }}"
        return_content: true
        status_code:
          - 200
          - 404
      register: secret_rotation_current_secret
      changed_when: false
      no_log: true

    - name: Read the current dedicated secret metadata from OpenBao
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ secret_rotation_openbao_http_port }}/v1/kv/metadata/{{ secret_rotation_selected_secret.openbao_path }}"
        method: GET
        headers:
          X-Vault-Token: "{{ secret_rotation_openbao_init_payload.root_token }}"
        return_content: true
        status_code:
          - 200
          - 404
      register: secret_rotation_current_metadata
      changed_when: false
      no_log: true

    - name: Read the compatibility mirror path when one exists
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ secret_rotation_openbao_http_port }}/v1/kv/data/{{ secret_rotation_selected_secret.compatibility_mirror.openbao_path }}"
        method: GET
        headers:
          X-Vault-Token: "{{ secret_rotation_openbao_init_payload.root_token }}"
        return_content: true
        status_code:
          - 200
          - 404
      register: secret_rotation_current_mirror
      changed_when: false
      no_log: true
      when: secret_rotation_selected_secret.compatibility_mirror is defined

    - name: Show the planned rotation summary
      ansible.builtin.debug:
        msg:
          secret_id: "{{ secret_rotation_secret_id }}"
          mode: "{{ secret_rotation_mode }}"
          openbao_path: "{{ secret_rotation_selected_secret.openbao_path }}"
          apply_target: "{{ secret_rotation_selected_secret.apply_target }}"
          risk_level: "{{ secret_rotation_selected_secret.risk_level }}"
          approval_mode: "{{ secret_rotation_selected_secret.approval_mode }}"
          current_last_rotated: >-
            {{
              (
                secret_rotation_current_metadata.json.data.custom_metadata[secret_rotation_metadata.last_rotated_metadata_key]
                if secret_rotation_current_metadata.status == 200
                and secret_rotation_current_metadata.json.data.custom_metadata is defined
                and secret_rotation_metadata.last_rotated_metadata_key in secret_rotation_current_metadata.json.data.custom_metadata
                else secret_rotation_selected_secret.last_rotated
              )
            }}

  tasks:
    - name: Apply the Windmill runtime rotation task
      ansible.builtin.include_role:
        name: lv3.platform.windmill_runtime
        tasks_from: rotate.yml
      when:
        - secret_rotation_mode == 'apply'
        - secret_rotation_selected_secret.apply_target in ['windmill_database', 'windmill_superadmin']

    - name: Apply the mail platform runtime rotation task
      ansible.builtin.include_role:
        name: lv3.platform.mail_platform_runtime
        tasks_from: rotate.yml
      when:
        - secret_rotation_mode == 'apply'
        - secret_rotation_selected_secret.apply_target in ['mail_platform_runtime_field', 'mail_platform_profile_field']

    - name: Store the rotated value in the dedicated OpenBao path
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ secret_rotation_openbao_http_port }}/v1/kv/data/{{ secret_rotation_selected_secret.openbao_path }}"
        method: POST
        headers:
          X-Vault-Token: "{{ secret_rotation_openbao_init_payload.root_token }}"
        body_format: json
        body:
          data:
            "{{ secret_rotation_selected_secret.openbao_field }}": "{{ secret_rotation_effective_value }}"
        status_code: 200
      when: secret_rotation_mode == 'apply'
      no_log: true

    - name: Update the compatibility mirror value when one exists
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ secret_rotation_openbao_http_port }}/v1/kv/data/{{ secret_rotation_selected_secret.compatibility_mirror.openbao_path }}"
        method: POST
        headers:
          X-Vault-Token: "{{ secret_rotation_openbao_init_payload.root_token }}"
        body_format: json
        body:
          data: >-
            {{
              (secret_rotation_current_mirror.json.data.data | default({}))
              | combine({secret_rotation_selected_secret.compatibility_mirror.field: secret_rotation_effective_value})
            }}
        status_code: 200
      when:
        - secret_rotation_mode == 'apply'
        - secret_rotation_selected_secret.compatibility_mirror is defined
      no_log: true

    - name: Update the OpenBao rotation metadata for the dedicated secret path
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ secret_rotation_openbao_http_port }}/v1/kv/metadata/{{ secret_rotation_selected_secret.openbao_path }}"
        method: POST
        headers:
          X-Vault-Token: "{{ secret_rotation_openbao_init_payload.root_token }}"
        body_format: json
        body: >-
          {{
            {
              'custom_metadata': {
                'secret_id': secret_rotation_secret_id,
                'service': secret_rotation_selected_secret.service,
                'owner': secret_rotation_selected_secret.owner,
                'risk_level': secret_rotation_selected_secret.risk_level,
                'approval_mode': secret_rotation_selected_secret.approval_mode,
                'command_contract': secret_rotation_selected_secret.command_contract,
                'rotation_period_days': secret_rotation_selected_secret.rotation_period_days | string,
                'warning_window_days': secret_rotation_selected_secret.warning_window_days | string
              }
              | combine({
                secret_rotation_metadata.last_rotated_metadata_key: secret_rotation_requested_at,
                secret_rotation_metadata.rotated_by_metadata_key: 'repo-managed-secret-rotation'
              })
            }
          }}
        status_code:
          - 200
          - 204
      when: secret_rotation_mode == 'apply'
      no_log: true
