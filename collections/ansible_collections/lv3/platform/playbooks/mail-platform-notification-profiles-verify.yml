---
- name: Verify notification profiles on the mail platform runtime
  hosts: docker-runtime-lv3
  become: true
  gather_facts: true

  pre_tasks:
    - name: Ensure target guest is Debian
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
        fail_msg: "This playbook only supports Debian guests."

  tasks:
    - name: Verify the notification profile catalog through the mail gateway
      ansible.builtin.shell: |
        python3 - <<'PY'
        import json
        import urllib.request
        from pathlib import Path

        request = urllib.request.Request(
            'http://127.0.0.1:8081/v1/profiles',
            method='GET',
            headers={
                'X-API-Key': Path('/etc/lv3/mail-platform/gateway-api-key').read_text(encoding='utf-8').strip(),
            },
        )

        with urllib.request.urlopen(request, timeout=30) as response:
            payload = json.loads(response.read().decode('utf-8'))

        profile_ids = sorted(item['id'] for item in payload['items'])
        expected = ['agent-reports', 'operator-alerts', 'platform-transactional']
        if profile_ids != expected:
            raise SystemExit(f'unexpected profile ids: {profile_ids}')

        print(response.status)
        print(','.join(profile_ids))
        PY
      args:
        executable: /bin/bash
      register: mail_platform_profile_catalog
      changed_when: false

    - name: Verify scoped profile keys reject mismatched profile ids
      ansible.builtin.shell: |
        python3 - <<'PY'
        import json
        import urllib.error
        import urllib.request
        from pathlib import Path

        payload = json.dumps(
            {
                'profile_id': 'platform-transactional',
                'to': ['baditaflorin@gmail.com'],
                'subject': 'LV3 scoped profile rejection test',
                'text': 'This request should be rejected before delivery.',
            }
        ).encode('utf-8')
        request = urllib.request.Request(
            'http://127.0.0.1:8081/send',
            data=payload,
            method='POST',
            headers={
                'Content-Type': 'application/json',
                'X-API-Key': Path('/etc/lv3/mail-platform/profiles/operator-alerts-gateway-api-key').read_text(encoding='utf-8').strip(),
            },
        )

        try:
            urllib.request.urlopen(request, timeout=30)
        except urllib.error.HTTPError as exc:
            print(exc.code)
            print(exc.read().decode('utf-8'))
            if exc.code != 403:
                raise SystemExit(f'unexpected status: {exc.code}')
        else:
            raise SystemExit('expected scoped profile rejection')
        PY
      args:
        executable: /bin/bash
      register: mail_platform_profile_scope_rejection
      changed_when: false

    - name: Send outbound Gmail probes through each notification profile
      ansible.builtin.shell: |
        python3 - <<'PY'
        import json
        import urllib.request
        from pathlib import Path

        profiles = [
            (
                'operator-alerts',
                '/etc/lv3/mail-platform/profiles/operator-alerts-gateway-api-key',
                'LV3 operator alerts live test',
                'Operator alert notification profile delivery test.',
            ),
            (
                'platform-transactional',
                '/etc/lv3/mail-platform/profiles/platform-transactional-gateway-api-key',
                'LV3 platform transactional live test',
                'Platform transactional notification profile delivery test.',
            ),
            (
                'agent-reports',
                '/etc/lv3/mail-platform/profiles/agent-reports-gateway-api-key',
                'LV3 agent reports live test',
                'Agent reporting notification profile delivery test.',
            ),
        ]

        results = []
        for profile_id, key_path, subject, text in profiles:
            payload = json.dumps(
                {
                    'to': ['baditaflorin@gmail.com'],
                    'subject': subject,
                    'text': text,
                    'html': f'<p>{text}</p>',
                }
            ).encode('utf-8')
            request = urllib.request.Request(
                'http://127.0.0.1:8081/send',
                data=payload,
                method='POST',
                headers={
                    'Content-Type': 'application/json',
                    'X-API-Key': Path(key_path).read_text(encoding='utf-8').strip(),
                },
            )

            with urllib.request.urlopen(request, timeout=30) as response:
                body = json.loads(response.read().decode('utf-8'))
                results.append(
                    {
                        'profile_id': profile_id,
                        'status': response.status,
                        'channel': body['channel'],
                        'sender_email': body['sender_email'],
                    }
                )

        print(json.dumps(results, sort_keys=True))
        PY
      args:
        executable: /bin/bash
      register: mail_platform_outbound_probe
      changed_when: false

    - name: Read mail gateway state after profile verification
      ansible.builtin.command:
        argv:
          - cat
          - /opt/mail-platform/gateway/data/state.json
      register: mail_platform_gateway_state_after_profile_verify
      changed_when: false

    - name: Assert profile counters advanced in the mail gateway state
      ansible.builtin.assert:
        that:
          - (mail_platform_gateway_state_after_profile_verify.stdout | from_json).send_counters.by_profile['operator-alerts'].requests_total | int >= 1
          - (mail_platform_gateway_state_after_profile_verify.stdout | from_json).send_counters.by_profile['operator-alerts'].brevo_success_total | int >= 1
          - (mail_platform_gateway_state_after_profile_verify.stdout | from_json).send_counters.by_profile['platform-transactional'].requests_total | int >= 1
          - (mail_platform_gateway_state_after_profile_verify.stdout | from_json).send_counters.by_profile['platform-transactional'].brevo_success_total | int >= 1
          - (mail_platform_gateway_state_after_profile_verify.stdout | from_json).send_counters.by_profile['agent-reports'].requests_total | int >= 1
          - (mail_platform_gateway_state_after_profile_verify.stdout | from_json).send_counters.by_profile['agent-reports'].brevo_success_total | int >= 1
        fail_msg: "One or more notification profile counters did not advance after the live send verification."

    - name: Show notification profile verification summary
      ansible.builtin.debug:
        msg:
          - "profile_catalog={{ mail_platform_profile_catalog.stdout_lines[1] | default('missing') }}"
          - "scope_rejection_status={{ mail_platform_profile_scope_rejection.stdout_lines[0] | default('missing') }}"
          - "outbound_profiles={{ mail_platform_outbound_probe.stdout | default('missing') }}"
          - "gateway_state={{ mail_platform_gateway_state_after_profile_verify.stdout }}"
