---
# _includes/docker_runtime_converge.yml
# Purpose: Converge a service on the Docker runtime VM using a dynamic role list.
# Input:
#   service_audit_name (string) — service name for audit logging (e.g., "directus")
#   service_runtime_roles (list) — ordered list of roles to apply after linux_guest_firewall
# Usage: import_playbook with -e @playbooks/vars/<service>.yml

- name: "Converge {{ service_audit_name | default('service') }} on the Docker runtime VM"
  vars:
    # Defaults for Ansible parser validation; overridden by -e @playbooks/vars/<service>.yml
    service_audit_name: "docker_runtime"
    service_runtime_roles: []
  hosts: "{{ 'docker-runtime-staging' if (env | default('production')) == 'staging' else 'docker-runtime' }}"
  become: true
  gather_facts: true

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: ../tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: "playbook.start.{{ service_audit_name | default('service') }}"
        playbook_execution_audit_target: "{{ service_audit_name | default('service') }}"
        required_hosts:
          - "{{ playbook_execution_required_hosts.docker_runtime[playbook_execution_env] }}"

  tasks:
    - name: Apply prerequisite and runtime roles
      ansible.builtin.include_role:
        name: "{{ role_item }}"
      loop: "{{ [('lv3.platform.linux_guest_firewall')] + (service_runtime_roles | default([])) }}"
      loop_control:
        loop_var: role_item
