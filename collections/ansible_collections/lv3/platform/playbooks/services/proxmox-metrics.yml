---
- name: Wire Proxmox metrics into the monitoring stack
  hosts: proxmox_hosts
  become: true
  gather_facts: true
  tags:
    - tier-1
    - infrastructure
    - service-proxmox-metrics

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: ../tasks/preflight.yml
      vars:
        playbook_execution_audit_action: playbook.start.proxmox-metrics
        playbook_execution_audit_target: proxmox-metrics
        required_hosts:
          - "{{ playbook_execution_required_hosts.proxmox_hosts[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.proxmox_metrics

  post_tasks:
    - name: Run shared completion notifications
      ansible.builtin.import_tasks: ../tasks/notify.yml
      vars:
        playbook_execution_notification_service: proxmox-metrics
