---
# Service fragment: converge Netdata child streaming agents on all managed guests and the Proxmox host.
# Imported by groups/observability.yml so that site.yml (full-stack converge) automatically installs
# the child agent on every VM in the inventory — including newly provisioned ones.
#
# For the full realtime topology (parent + NGINX edge + children), run playbooks/realtime.yml directly
# or use: make converge-realtime
#
# Dependencies: ADR 0196 — Netdata real-time streaming metrics.
- name: Converge Netdata child streaming agents on all managed hosts
  hosts: "{{ 'lv3_guests:proxmox_hosts:&staging:!monitoring-lv3' if (env | default('production')) == 'staging' else 'lv3_guests:proxmox_hosts:&production:!monitoring-lv3' }}"
  become: true
  gather_facts: true
  tags:
    - tier-1
    - observability
    - service-realtime

  pre_tasks:
    - name: Run shared preflight checks for Netdata child agents
      ansible.builtin.import_tasks: ../tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.realtime.children
        playbook_execution_audit_target: realtime
        required_hosts:
          - "{{ playbook_execution_required_hosts.proxmox_hosts[playbook_execution_env] }}"
          - "{{ playbook_execution_required_hosts.lv3_guests[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.linux_guest_firewall
      when: inventory_hostname != groups['proxmox_hosts'][0]
    - role: lv3.platform.netdata_runtime

  post_tasks:
    - name: Run shared completion notifications
      ansible.builtin.import_tasks: ../tasks/notify.yml
      vars:
        playbook_execution_notification_service: realtime
