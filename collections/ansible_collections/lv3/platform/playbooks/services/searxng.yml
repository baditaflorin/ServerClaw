# Playbook: services/searxng.yml
# Purpose: Provide the stable live-apply service wrapper for SearXNG.
# Use case: Run `make live-apply-service service=searxng` so the generic service lane can invoke the SearXNG converge playbook.
#
# Inputs (required):
#   - env (str, required): Environment selector passed by the live-apply wrapper.
#
# Inputs (optional):
#   - proxmox_guest_ssh_connection_mode (str, optional, default=proxmox_host_jump): Guest SSH connection strategy.
#
# Outputs:
#   - Imports the canonical SearXNG converge playbook.
#
# Idempotency: Fully idempotent
#              The wrapper only imports the canonical playbook and adds no extra mutation.
#
# Dependencies:
#   - ADR 0258: SearXNG is the private federated search surface for governed agent web search.
#   - Requires: playbooks/searxng.yml
#
# Related ADRs: 0079, 0258
# Related Runbooks: docs/runbooks/configure-searxng.md
#
# Author: LV3 Platform
# Last Updated: 2026-04-11

- import_playbook: ../searxng.yml
