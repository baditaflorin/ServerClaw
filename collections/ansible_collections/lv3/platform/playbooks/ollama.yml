---
- name: Converge Ollama on the Docker runtime VM
  hosts: docker-runtime-lv3
  become: true
  gather_facts: true
  tags:
    - tier-2
    - automation
    - service-ollama

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.ollama
        playbook_execution_audit_target: ollama
        required_hosts:
          - "{{ playbook_execution_required_hosts.docker_runtime[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.ollama_runtime

  post_tasks:
    - name: Run shared Ollama post-verify checks
      ansible.builtin.import_tasks: tasks/post-verify.yml
      vars:
        service_health_probe_id: ollama
        playbook_execution_post_verify_audit_action: playbook.verify.ollama
    - name: Run shared completion notifications
      ansible.builtin.import_tasks: tasks/notify.yml
      vars:
        playbook_execution_notification_service: ollama
