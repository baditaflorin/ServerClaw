---
- name: Converge scheduled data retention on the Docker runtime VM
  hosts: "{{ playbook_execution_host_patterns.docker_runtime[playbook_execution_env] }}"
  become: true
  gather_facts: true

  pre_tasks:
    - name: Ensure target guest is Debian
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
        fail_msg: "This playbook only supports Debian guests."

  roles:
    - role: lv3.platform.data_retention
      vars:
        data_retention_repo_root: "{{ playbook_dir | dirname | regex_replace('/collections/ansible_collections/lv3/platform$', '') }}"
