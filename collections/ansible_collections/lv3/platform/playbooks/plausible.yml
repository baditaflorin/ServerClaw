---
# Playbook: plausible.yml
# Purpose: Converge the Plausible runtime, edge publication, and repo-managed site registrations for privacy-first public traffic analytics.
# Use case: Run during production or staging deployment, upgrade, or recovery when `analytics.lv3.org` and the shared edge injection contract must match repo truth.
#
# Inputs (required):
#   - env (string, required): Target environment selector used to choose the docker-runtime and nginx guests.
#
# Inputs (optional):
#   - proxmox_guest_ssh_connection_mode (string, optional, default=proxmox_host_jump): SSH path to managed guests.
#
# Outputs:
#   - Plausible DNS, runtime secrets, bootstrap user, registered sites, and authenticated edge publication are reconciled to the declared platform state.
#
# Idempotency: Fully idempotent
#
# Dependencies:
#   - ADR 0283: Plausible is the privacy-first analytics layer for public LV3 pages.
#   - Requires: docker-runtime, OpenBao, the internal submission relay on mail-platform, and the shared NGINX edge to already exist.
#   - Role: lv3.platform.plausible_runtime - converges the Plausible runtime and bootstrap state.
#   - Role: lv3.platform.nginx_edge_publication - publishes `analytics.lv3.org` and injects the tracker on declared public pages.
#
# Related ADRs: 0021, 0077, 0086, 0191, 0283
# Related Runbooks: docs/runbooks/configure-plausible.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-30

- name: Ensure Hetzner DNS publication for Plausible
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    subdomain_catalog_path: "{{ playbook_dir }}/../config/subdomain-catalog.json"
    inventory_defaults_path: "{{ playbook_dir }}/../inventory/group_vars/all/identity.yml"
    subdomain_fqdn: analytics.lv3.org

  tasks:
    - name: Load controller defaults
      ansible.builtin.include_vars:
        file: "{{ inventory_defaults_path }}"

    - name: Load the subdomain catalog
      ansible.builtin.include_vars:
        file: "{{ subdomain_catalog_path }}"
        name: subdomain_catalog

    - name: Select the Plausible subdomain entry
      ansible.builtin.set_fact:
        selected_subdomain: >-
          {{
            (
              subdomain_catalog.subdomains
              | selectattr('fqdn', 'equalto', subdomain_fqdn)
              | list
              | first
            ) | default({})
          }}

    - name: Assert the Plausible subdomain is catalogued
      ansible.builtin.assert:
        that:
          - selected_subdomain != {}
          - selected_subdomain.status in ['active', 'planned']
          - selected_subdomain.fqdn.endswith(hetzner_dns_zone_name)
        fail_msg: "analytics.lv3.org must exist in config/subdomain-catalog.json before live apply."

    - name: Derive the managed Hetzner record name
      ansible.builtin.set_fact:
        selected_subdomain_record_name: >-
          {{
            '@'
            if selected_subdomain.fqdn == hetzner_dns_zone_name
            else (
              selected_subdomain.fqdn.rsplit('.' ~ hetzner_dns_zone_name, 1)[0]
            )
          }}

    - name: Converge the Plausible Hetzner DNS record
      ansible.builtin.include_role:
        name: lv3.platform.hetzner_dns_record
      vars:
        hetzner_dns_record_zone_name: "{{ hetzner_dns_zone_name }}"
        hetzner_dns_record_name: "{{ selected_subdomain_record_name }}"
        hetzner_dns_record_type: A
        hetzner_dns_record_value: "{{ selected_subdomain.target }}"
        hetzner_dns_record_ttl: "{{ selected_subdomain.ttl | default(60) }}"

- name: Converge Plausible on the Docker runtime VM
  hosts: "{{ 'docker-runtime-staging-lv3' if (env | default('production')) == 'staging' else 'docker-runtime-lv3' }}"
  become: true
  gather_facts: true

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.plausible
        playbook_execution_audit_target: plausible
        required_hosts:
          - "{{ playbook_execution_required_hosts.docker_runtime[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.plausible_runtime

- name: Publish Plausible through the NGINX edge
  hosts: "{{ 'nginx-staging-lv3' if (env | default('production')) == 'staging' else 'nginx-lv3' }}"
  become: true
  gather_facts: true
  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/platform.yml"

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_emit_audit: false
        required_hosts:
          - "{{ playbook_execution_required_hosts.nginx_edge[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.nginx_edge_publication
