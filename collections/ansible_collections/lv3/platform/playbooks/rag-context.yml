---
- name: Converge the Tailscale operator proxy for the platform context API
  hosts: proxmox_hosts
  become: true
  gather_facts: true

  roles:
    - role: lv3.platform.proxmox_tailscale_proxy
    - role: lv3.platform.proxmox_security

- name: Converge the platform context API on the Docker runtime VM
  hosts: docker-runtime-lv3
  become: true
  gather_facts: true

  pre_tasks:
    - name: Ensure target guest is Debian
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
        fail_msg: "This playbook only supports Debian guests."

  roles:
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.rag_context_runtime
