[defaults]
inventory = inventory/hosts.yml
roles_path = roles
collections_path = ./collections:./build/collection-install:~/.ansible/collections
callback_plugins = callback_plugins
callbacks_enabled = mutation_audit, structured_log
filter_plugins = filter_plugins
host_key_checking = False
retry_files_enabled = False
gathering = smart
gather_subset = !hardware
fact_caching = jsonfile
fact_caching_connection = .ansible/fact_cache
fact_caching_timeout = 600
interpreter_python = auto_silent
stdout_callback = default
result_format = yaml

[galaxy]
server_list = release_galaxy, internal_galaxy

[galaxy_server.release_galaxy]
url = https://galaxy.ansible.com/

[galaxy_server.internal_galaxy]
url = https://galaxy.example.com/

[ssh_connection]
pipelining = True
