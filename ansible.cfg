[defaults]
inventory = inventory/hosts.yml
roles_path = roles
collections_path = ./collections:./build/collection-install:~/.ansible/collections
callback_plugins = callback_plugins
callbacks_enabled = mutation_audit
filter_plugins = filter_plugins
host_key_checking = False
retry_files_enabled = False
interpreter_python = auto_silent
stdout_callback = default
result_format = yaml

[galaxy]
server_list = release_galaxy, internal_galaxy

[galaxy_server.release_galaxy]
url = https://galaxy.ansible.com/

[galaxy_server.internal_galaxy]
url = https://galaxy.lv3.org/

[ssh_connection]
pipelining = True
