host_public_hostname: Debian-trixie-latest-amd64-base
management_interface: enp7s0
management_ipv4: 65.108.75.123
management_ipv4_cidr: 26
management_gateway4: 65.108.75.65
management_ipv6: 2a01:4f9:6b:4b47::2
management_ipv6_cidr: 64
management_gateway6: fe80::1
hetzner_ipv4_route_network: 65.108.75.64
hetzner_ipv4_route_netmask: 255.255.255.192
proxmox_wan_bridge: vmbr0
proxmox_internal_bridge: vmbr10
proxmox_internal_ipv4: 10.10.10.1
proxmox_internal_cidr: 24
proxmox_internal_network: 10.10.10.0/24
proxmox_public_edge_ipv4: 10.10.10.10
proxmox_tailscale_hostname: proxmox-florin-subnet-router
proxmox_tailscale_advertise_routes:
  - "{{ proxmox_internal_network }}"
proxmox_tailscale_operator_target_guest: 10.10.10.30
proxmox_public_ingress_tcp_ports:
  - 80
  - 443

proxmox_guests:
  - vmid: 110
    name: nginx-lv3
    role: nginx
    ipv4: 10.10.10.10
    cidr: 24
    gateway4: 10.10.10.1
    cores: 2
    memory_mb: 4096
    disk_gb: 32
    tags:
      - ingress
      - nginx
      - lv3
    packages:
      - nginx
  - vmid: 120
    name: docker-runtime-lv3
    role: docker-runtime
    ipv4: 10.10.10.20
    cidr: 24
    gateway4: 10.10.10.1
    cores: 4
    memory_mb: 12288
    disk_gb: 96
    tags:
      - docker
      - runtime
      - lv3
    packages:
      - docker.io
  - vmid: 130
    name: docker-build-lv3
    role: docker-build
    ipv4: 10.10.10.30
    cidr: 24
    gateway4: 10.10.10.1
    cores: 12
    memory_mb: 24576
    disk_gb: 160
    tags:
      - docker
      - build
      - lv3
    packages:
      - docker.io
      - git
      - make
      - build-essential
  - vmid: 140
    name: monitoring-lv3
    role: monitoring
    ipv4: 10.10.10.40
    cidr: 24
    gateway4: 10.10.10.1
    cores: 4
    memory_mb: 8192
    disk_gb: 64
    tags:
      - monitoring
      - grafana
      - lv3
    packages:
      - prometheus-node-exporter

proxmox_backup_storage:
  enabled: "{{ (lookup('ansible.builtin.env', 'PROXMOX_BACKUP_CIFS_SERVER') | trim | length) > 0 }}"
  id: lv3-backup-cifs
  type: cifs
  server: "{{ lookup('ansible.builtin.env', 'PROXMOX_BACKUP_CIFS_SERVER') | trim }}"
  share: "{{ lookup('ansible.builtin.env', 'PROXMOX_BACKUP_CIFS_SHARE') | trim }}"
  username: "{{ lookup('ansible.builtin.env', 'PROXMOX_BACKUP_CIFS_USERNAME') | trim }}"
  password_env: PROXMOX_BACKUP_CIFS_PASSWORD
  domain: WORKGROUP
  smbversion: "3"
  subdir: /proxmox_florin
  path: /mnt/pve/lv3-backup-cifs
  content:
    - backup
  options: noserverino,echo_interval=30
  nodes:
    - proxmox_florin

proxmox_backup_jobs:
  - id: backup-lv3-nightly
    enabled: "{{ proxmox_backup_storage.enabled }}"
    storage: "{{ proxmox_backup_storage.id }}"
    schedule: "02:30"
    node: proxmox_florin
    mode: snapshot
    compress: zstd
    notification_mode: notification-system
    repeat_missed: true
    vmid_list: "{{ proxmox_guests | map(attribute='vmid') | list }}"
    prune_backups:
      keep_last: 3
      keep_daily: 7
      keep_weekly: 5
      keep_monthly: 12
