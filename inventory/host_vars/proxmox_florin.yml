network_policy:
  guest_management_sources:
    - 100.64.0.0/10
    - 10.10.10.1/32
  host_source: 10.10.10.1/32
  guests:
    nginx-lv3:
      allowed_inbound:
        - source: management
          protocol: tcp
          ports:
            - 22
          description: Operator and Ansible SSH access
        - source: public
          protocol: tcp
          ports:
            - 80
            - 443
          description: Public edge ingress forwarded by the host
    docker-runtime-lv3:
      allow_container_forwarding: true
      allowed_inbound:
        - source: management
          protocol: tcp
          ports:
            - 22
          description: Operator and Ansible SSH access
        - source: management
          protocol: tcp
          ports:
            - 1025
            - 8025
            - 8100
          description: Operator access to the private Mailpit SMTP and UI listeners plus the Piper TTS API
        - source: all_guests
          protocol: tcp
          ports:
            - 1025
            - 8025
            - 8100
          description: Guest-network access to the private Mailpit SMTP and UI listeners plus the Piper TTS API
        - source: 172.16.0.0/12
          protocol: tcp
          ports:
            - 1025
            - 8025
            - 8100
          description: Local Docker workloads using the private Mailpit SMTP and UI listeners plus the Piper TTS API
        - source: 192.168.0.0/16
          protocol: tcp
          ports:
            - 1025
            - 8025
            - 8100
          description: Local Docker workloads using the private Mailpit SMTP and UI listeners plus the Piper TTS API
        - source: management
          protocol: tcp
          ports:
            - 9092
            - 9644
            - 8103
            - 8104
          description: Operator access to the private Redpanda Kafka, Admin API, HTTP Proxy, and Schema Registry listeners
        - source: all_guests
          protocol: tcp
          ports:
            - 9092
            - 8103
            - 8104
          description: Guest-network access to the private Redpanda Kafka, HTTP Proxy, and Schema Registry listeners
        - source: 172.16.0.0/12
          protocol: tcp
          ports:
            - 9092
            - 8103
            - 8104
          description: Local Docker workloads using the private Redpanda Kafka, HTTP Proxy, and Schema Registry listeners
        - source: 192.168.0.0/16
          protocol: tcp
          ports:
            - 9092
            - 8103
            - 8104
          description: Local Docker workloads using the private Redpanda Kafka, HTTP Proxy, and Schema Registry listeners
        - source: host
          protocol: tcp
          ports:
            - 3005
            - 5000
            - 8008
            - 8010
            - 8018
            - 8108
            - 8082
            - 8088
            - 8102
            - 8881
            - 9443
          description: Host-side private service proxies
        - source: all_guests
          protocol: tcp
          ports:
            - 8108
          description: Private guest-to-guest access to the Typesense structured-search API
        - source: 172.16.0.0/12
          protocol: tcp
          ports:
            - 8108
          description: Local Docker workloads that use the private Typesense structured-search API
        - source: 192.168.0.0/16
          protocol: tcp
          ports:
            - 8108
          description: Local Docker workloads that use the private Typesense structured-search API
        - source: nginx-lv3
          protocol: tcp
          ports:
            - 7880
          description: Reverse proxy access to the LiveKit signalling API
        - source: public
          protocol: tcp
          ports:
            - 7881
          description: Public TCP media ingress forwarded by the host for LiveKit
        - source: public
          protocol: udp
          ports:
