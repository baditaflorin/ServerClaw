network_policy:
  guest_management_sources:
    - 100.64.0.0/10
    - 10.10.10.1/32
  host_source: 10.10.10.1/32
  guests:
    nginx-lv3:
      allowed_inbound:
        - source: management
          protocol: tcp
          ports:
            - 22
          description: Operator and Ansible SSH access
        - source: public
          protocol: tcp
          ports:
            - 80
            - 443
          description: Public edge ingress forwarded by the host
    docker-runtime-lv3:
      allow_container_forwarding: true
      allowed_inbound:
        - source: management
          protocol: tcp
          ports:
            - 22
          description: Operator and Ansible SSH access
        - source: public
          protocol: tcp
          ports:
            - 25
            - 587
            - 993
          description: Public mail ingress forwarded by the host
        - source: 172.16.0.0/12
          protocol: tcp
          ports:
            - 1587
          description: Local Docker workloads using the private mail submission relay
        - source: 192.168.0.0/16
          protocol: tcp
          ports:
            - 1587
          description: Local Docker workloads using the private mail submission relay
        - source: host
          protocol: tcp
          ports:
            - 3003
            - 3004
            - 8000
            - 8010
            - 8082
            - 8088
            - 8200
            - 8222
            - 8881
            - 9000
            - 9443
          description: Host-side private service proxies
        - source: nginx-lv3
          protocol: tcp
          ports:
            - 3090
          description: Reverse proxy access to the Homepage dashboard
        - source: all_guests
          protocol: tcp
          ports:
            - 5678
          description: Private guest-to-guest access to the n8n automation runtime
        - source: 172.16.0.0/12
          protocol: tcp
          ports:
            - 5678
          description: Local Docker workloads that call the private n8n automation runtime
        - source: 192.168.0.0/16
          protocol: tcp
          ports:
            - 5678
          description: Local Docker workloads that call the private n8n automation runtime
        - source: all_guests
          protocol: tcp
          ports:
            - 8881
            - 11434
          description: Private guest-to-guest agent API traffic
        - source: 172.16.0.0/12
          protocol: tcp
          ports:
            - 8881
            - 11434
          description: Local Docker workloads that use the private Ollama and SearXNG APIs
        - source: 192.168.0.0/16
          protocol: tcp
          ports:
            - 8881
            - 11434
          description: Local Docker workloads that use the private Ollama and SearXNG APIs
        - source: docker-build-lv3
          protocol: tcp
          ports:
            - 3003
          description: Gitea Actions runner access from docker-build-lv3
        - source: nginx-lv3
          protocol: tcp
          ports:
            - 5678
          description: Reverse proxy access to the n8n editor, health checks, and public webhook ingress
        - source: nginx-lv3
          protocol: tcp
          ports:
            - 3001
          description: Reverse proxy access to Uptime Kuma
        - source: nginx-lv3
          protocol: tcp
          ports:
            - 8091
          description: Edge and oauth2-proxy access to Keycloak
        - source: 172.16.0.0/12
          protocol: tcp
          ports:
            - 8091
          description: Local Docker workloads that validate or broker Keycloak tokens
        - source: 192.168.0.0/16
          protocol: tcp
          ports:
            - 8091
          description: Local Docker workloads that validate or broker Keycloak tokens
        - source: nginx-lv3
          protocol: tcp
          ports:
            - 8092
          description: Reverse proxy access to the interactive ops portal
        - source: nginx-lv3
          protocol: tcp
          ports:
            - 8089
          description: Reverse proxy access to the Dozzle hub
        - source: nginx-lv3
          protocol: tcp
          ports:
            - 8083
          description: Edge access to the unified platform API gateway
        - source: monitoring-lv3
          protocol: tcp
          ports:
            - 8089
          description: Private monitoring probes for the Dozzle hub
        - source: docker-build-lv3
          protocol: tcp
          ports:
            - 7007
          description: Dozzle agent reachability from the hub host
        - source: monitoring-lv3
          protocol: tcp
          ports:
            - 7007
          description: Dozzle agent reachability from the hub host
        - source: monitoring-lv3
          protocol: tcp
          ports:
            - 2586
          description: Alertmanager access to the private ntfy paging gateway
    docker-build-lv3:
      allow_container_forwarding: true
      allowed_inbound:
        - source: management
          protocol: tcp
          ports:
            - 22
          description: Operator and Ansible SSH access
        - source: docker-runtime-lv3
          protocol: tcp
          ports:
            - 7007
          description: Dozzle hub access to the docker-build agent
    monitoring-lv3:
      allowed_inbound:
        - source: management
          protocol: tcp
          ports:
            - 22
          description: Operator and Ansible SSH access
        - source: host
          protocol: tcp
          ports:
            - 8086
            - 3100
          description: Proxmox host metrics and log shipping
        - source: all_guests
          protocol: tcp
          ports:
            - 8086
            - 3100
          description: Guest telemetry and log shipping
        - source: docker-runtime-lv3
          protocol: tcp
          ports:
            - 4318
          description: Mail platform OTLP trace export
        - source: docker-runtime-lv3
          protocol: tcp
          ports:
            - 7007
          description: Dozzle hub access to the monitoring agent
        - source: nginx-lv3
          protocol: tcp
          ports:
            - 3000
          description: Reverse proxy access to Grafana
        - source: postgres-lv3
          protocol: tcp
          ports:
            - 2379
            - 2380
          description: etcd quorum traffic from the primary PostgreSQL member
        - source: postgres-replica-lv3
          protocol: tcp
          ports:
            - 2379
            - 2380
          description: etcd quorum traffic from the replica PostgreSQL member
    postgres-lv3:
      allowed_inbound:
        - source: management
          protocol: tcp
          ports:
            - 22
          description: Operator and Ansible SSH access
        - source: host
          protocol: tcp
          ports:
            - 5432
          description: Host-side PostgreSQL TCP proxy
        - source: docker-runtime-lv3
          protocol: tcp
          ports:
            - 5432
          description: Application databases and secret rotation
        - source: postgres-replica-lv3
          protocol: tcp
          ports:
            - 5432
            - 8008
            - 2379
            - 2380
          description: Patroni, PostgreSQL replication, and etcd peer traffic from the replica
        - source: postgres-replica-lv3
          protocol: vrrp
          description: keepalived VRRP advertisements from the replica
        - source: monitoring-lv3
          protocol: tcp
          ports:
            - 2379
            - 2380
          description: etcd quorum traffic from the monitoring quorum member
    postgres-replica-lv3:
      allowed_inbound:
        - source: management
          protocol: tcp
          ports:
            - 22
          description: Operator and Ansible SSH access
        - source: postgres-lv3
          protocol: tcp
          ports:
            - 5432
            - 8008
            - 2379
            - 2380
          description: Patroni, PostgreSQL replication, and etcd peer traffic from the primary
        - source: postgres-lv3
          protocol: vrrp
          description: keepalived VRRP advertisements from the primary
        - source: monitoring-lv3
          protocol: tcp
          ports:
            - 2379
            - 2380
          description: etcd quorum traffic from the monitoring quorum member
    backup-lv3:
      allowed_inbound:
        - source: management
          protocol: tcp
          ports:
            - 22
          description: Operator and Ansible SSH access
        - source: docker-runtime-lv3
          protocol: tcp
          ports:
            - 22
          description: Control-plane recovery archive delivery from docker-runtime-lv3
        - source: host
          protocol: tcp
          ports:
            - 8007
          description: Proxmox Backup Server access from the host

backup_vm_vmid: 160
backup_vm_name: backup-lv3
backup_vm_ipv4: 10.10.10.60

postgres_ha:
  scope: postgres-ha
  database_hostname: database.lv3.org
  vip_ipv4: 10.10.10.55
  vip_cidr: 24
  postgres_port: 5432
  patroni_rest_port: 8008
  initial_primary: postgres-lv3
  keepalived:
    interface: eth0
    virtual_router_id: 51
    advert_int: 1
    auth_pass: lv3pgha8
    priorities:
      postgres-lv3: 110
      postgres-replica-lv3: 100
  dcs:
    client_port: 2379
    peer_port: 2380
    token: postgres-ha-etcd
    members:
      - name: postgres-lv3
        host: 10.10.10.50
      - name: postgres-replica-lv3
        host: 10.10.10.51
      - name: monitoring-lv3
        host: 10.10.10.40
  patroni:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576
    synchronous_mode: true
    synchronous_mode_strict: true
  users:
    superuser: patroni
    replicator: replicator

mail_platform_dns_records:
  - name: mail
    type: A
    value: "{{ management_ipv4 }}"
    ttl: 60
  - name: "@"
    type: MX
    value: "10 mail.lv3.org."
    ttl: 300
  - name: "@"
    type: TXT
    value: '"v=spf1 mx include:spf.brevo.com -all"'
    value_match_regex: '^"v=spf1 '
    ttl: 300
  - name: _dmarc
    type: TXT
    value: '"v=DMARC1; p=quarantine; rua=mailto:baditaflorin@gmail.com"'
    ttl: 300
  - name: brevo1._domainkey
    type: CNAME
    value: b1.lv3-org.dkim.brevo.com.
    value_match_regex: '^b1\\.lv3-org\\.dkim\\.brevo\\.com\\.?$'
    ttl: 300
  - name: brevo2._domainkey
    type: CNAME
    value: b2.lv3-org.dkim.brevo.com.
    value_match_regex: '^b2\\.lv3-org\\.dkim\\.brevo\\.com\\.?$'
    ttl: 300
  - name: "@"
    type: TXT
    value: '"brevo-code:b5e6a2e60000b8da96b912f8ea4c2e9a"'
    value_match_regex: '^"brevo-code:'
    ttl: 300

lv3_service_topology:
  nginx_edge:
    service_name: nginx-edge
    owning_vm: nginx-lv3
    private_ip: "{{ (proxmox_guests | selectattr('name', 'equalto', 'nginx-lv3') | map(attribute='ipv4') | first) }}"
    public_hostname: nginx.lv3.org
    exposure_model: edge-static
    observability:
      guest_dashboard: true
      service_telemetry: true
    dns:
      managed: true
      visibility: public
      name: nginx
      type: A
      target: "{{ management_ipv4 }}"
      ttl: 60
    edge:
      enabled: true
      tls: true
      kind: static
      slug: nginx
      title: LV3 Edge
      description: NGINX is the public edge for published lv3.org services on this platform.
      meta: Use the named subdomains for the actual service entry points exposed at the edge.
  grafana:
    service_name: grafana
    owning_vm: monitoring-lv3
    private_ip: "{{ (proxmox_guests | selectattr('name', 'equalto', 'monitoring-lv3') | map(attribute='ipv4') | first) }}"
    public_hostname: grafana.lv3.org
    exposure_model: edge-published
    observability:
      guest_dashboard: true
      service_telemetry: false
    dns:
      managed: true
      visibility: public
      name: grafana
      type: A
      target: "{{ management_ipv4 }}"
      ttl: 60
    edge:
      enabled: true
      tls: true
      noindex: true
      kind: proxy
      upstream: "http://{{ (proxmox_guests | selectattr('name', 'equalto', 'monitoring-lv3') | map(attribute='ipv4') | first) }}:3000"
      proxy_hide_headers:
        - X-Grafana-Version
        - Via
      blocked_exact_paths:
        - path: /api/health
          status: 404
  headscale:
    service_name: headscale
    owning_vm: proxmox_florin
    private_ip: "{{ hostvars['proxmox_florin'].proxmox_internal_ipv4 }}"
    public_hostname: headscale.lv3.org
    exposure_model: edge-published
    observability:
      guest_dashboard: false
      service_telemetry: false
    dns:
      managed: true
      visibility: public
      name: headscale
      type: A
      target: "{{ management_ipv4 }}"
      ttl: 60
    edge:
      enabled: true
      tls: true
      kind: proxy
      upstream: "http://{{ hostvars['proxmox_florin'].proxmox_internal_ipv4 }}:{{ hostvars['proxmox_florin'].platform_port_assignments.headscale_http_port }}"
  alertmanager:
    service_name: alertmanager
    owning_vm: monitoring-lv3
    private_ip: "{{ (proxmox_guests | selectattr('name', 'equalto', 'monitoring-lv3') | map(attribute='ipv4') | first) }}"
    exposure_model: private-only
    observability:
      guest_dashboard: false
      service_telemetry: false
  proxmox_ui:
    service_name: proxmox-ui
    owning_vm: proxmox_florin
    private_ip: "{{ management_tailscale_ipv4 }}"
    public_hostname: proxmox.lv3.org
    exposure_model: informational-only
    observability:
      guest_dashboard: false
      service_telemetry: false
    dns:
      managed: true
      visibility: public
      name: proxmox
      type: A
      target: "{{ management_ipv4 }}"
      ttl: 60
    edge:
      enabled: true
      tls: true
      kind: static
      slug: proxmox
      title: Proxmox Administration
      description: Proxmox administration remains private and is reached over Tailscale instead of being published directly on the public edge.
