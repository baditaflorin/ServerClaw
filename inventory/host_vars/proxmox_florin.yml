network_policy:
  guest_management_sources:
    - 100.64.0.0/10
    - 10.10.10.1/32
  host_source: 10.10.10.1/32
  guests:
    nginx-lv3:
      allowed_inbound:
        - source: management
          protocol: tcp
          ports:
            - 22
          description: Operator and Ansible SSH access
        - source: public
          protocol: tcp
          ports:
            - 80
            - 443
          description: Public edge ingress forwarded by the host
    docker-runtime-lv3:
      allowed_inbound:
        - source: management
          protocol: tcp
          ports:
            - 22
          description: Operator and Ansible SSH access
        - source: public
          protocol: tcp
          ports:
            - 25
            - 587
            - 993
          description: Public mail ingress forwarded by the host
        - source: host
          protocol: tcp
          ports:
            - 8000
            - 8082
            - 8088
            - 8200
            - 9000
            - 9443
          description: Host-side private service proxies
        - source: nginx-lv3
          protocol: tcp
          ports:
            - 3001
          description: Reverse proxy access to Uptime Kuma
    docker-build-lv3:
      allowed_inbound:
        - source: management
          protocol: tcp
          ports:
            - 22
          description: Operator and Ansible SSH access
    monitoring-lv3:
      allowed_inbound:
        - source: management
          protocol: tcp
          ports:
            - 22
          description: Operator and Ansible SSH access
        - source: host
          protocol: tcp
          ports:
            - 8086
            - 3100
          description: Proxmox host metrics and log shipping
        - source: all_guests
          protocol: tcp
          ports:
            - 8086
            - 3100
          description: Guest telemetry and log shipping
        - source: docker-runtime-lv3
          protocol: tcp
          ports:
            - 4318
          description: Mail platform OTLP trace export
        - source: nginx-lv3
          protocol: tcp
          ports:
            - 3000
          description: Reverse proxy access to Grafana
    postgres-lv3:
      allowed_inbound:
        - source: management
          protocol: tcp
          ports:
            - 22
          description: Operator and Ansible SSH access
        - source: host
          protocol: tcp
          ports:
            - 5432
          description: Host-side PostgreSQL TCP proxy
        - source: docker-runtime-lv3
          protocol: tcp
          ports:
            - 5432
          description: Application databases and secret rotation
    backup-lv3:
      allowed_inbound:
        - source: management
          protocol: tcp
          ports:
            - 22
          description: Operator and Ansible SSH access
        - source: host
          protocol: tcp
          ports:
            - 8007
          description: Proxmox Backup Server access from the host

backup_vm_vmid: 160
backup_vm_name: backup-lv3
backup_vm_ipv4: 10.10.10.60

mail_platform_dns_records:
  - name: mail
    type: A
    value: "{{ management_ipv4 }}"
    ttl: 60
  - name: "@"
    type: MX
    value: "10 mail.lv3.org."
    ttl: 300
  - name: "@"
    type: TXT
    value: '"v=spf1 mx include:spf.brevo.com -all"'
    value_match_regex: '^"v=spf1 '
    ttl: 300
  - name: _dmarc
    type: TXT
    value: '"v=DMARC1; p=quarantine; rua=mailto:baditaflorin@gmail.com"'
    ttl: 300
  - name: brevo1._domainkey
    type: CNAME
    value: b1.lv3-org.dkim.brevo.com.
    value_match_regex: '^b1\\.lv3-org\\.dkim\\.brevo\\.com\\.?$'
    ttl: 300
  - name: brevo2._domainkey
    type: CNAME
    value: b2.lv3-org.dkim.brevo.com.
    value_match_regex: '^b2\\.lv3-org\\.dkim\\.brevo\\.com\\.?$'
    ttl: 300
  - name: "@"
    type: TXT
    value: '"brevo-code:b5e6a2e60000b8da96b912f8ea4c2e9a"'
    value_match_regex: '^"brevo-code:'
    ttl: 300

lv3_service_topology:
  nginx_edge:
    service_name: nginx-edge
    owning_vm: nginx-lv3
    private_ip: "{{ (proxmox_guests | selectattr('name', 'equalto', 'nginx-lv3') | map(attribute='ipv4') | first) }}"
    public_hostname: nginx.lv3.org
    exposure_model: edge-static
    observability:
      guest_dashboard: true
      service_telemetry: true
    dns:
      managed: true
      visibility: public
      name: nginx
      type: A
      target: "{{ management_ipv4 }}"
      ttl: 60
    edge:
      enabled: true
      tls: true
      kind: static
      slug: nginx
      title: LV3 Edge
      description: NGINX is the public edge for published lv3.org services on this platform.
      meta: Use the named subdomains for the actual service entry points exposed at the edge.
  grafana:
    service_name: grafana
    owning_vm: monitoring-lv3
    private_ip: "{{ (proxmox_guests | selectattr('name', 'equalto', 'monitoring-lv3') | map(attribute='ipv4') | first) }}"
    public_hostname: grafana.lv3.org
    exposure_model: edge-published
    observability:
      guest_dashboard: true
      service_telemetry: false
    dns:
      managed: true
      visibility: public
      name: grafana
      type: A
      target: "{{ management_ipv4 }}"
      ttl: 60
    edge:
      enabled: true
      tls: true
      kind: proxy
      upstream: "http://{{ (proxmox_guests | selectattr('name', 'equalto', 'monitoring-lv3') | map(attribute='ipv4') | first) }}:3000"
  proxmox_ui:
    service_name: proxmox-ui
    owning_vm: proxmox_florin
    private_ip: "{{ management_tailscale_ipv4 }}"
    public_hostname: proxmox.lv3.org
    exposure_model: informational-only
    observability:
      guest_dashboard: false
      service_telemetry: false
    dns:
      managed: true
      visibility: public
      name: proxmox
      type: A
      target: "{{ management_ipv4 }}"
      ttl: 60
    edge:
      enabled: true
      tls: true
      kind: static
      slug: proxmox
      title: Proxmox Administration
      description: Proxmox administration remains private and is reached over Tailscale instead of being published directly on the public edge.
      action_url: "https://{{ management_tailscale_ipv4 }}:8006/"
      action_label: Open Private Proxmox UI
      meta: Use Tailscale host access for routine Proxmox administration.
  docker_runtime:
    service_name: docker-runtime
    owning_vm: docker-runtime-lv3
    private_ip: "{{ (proxmox_guests | selectattr('name', 'equalto', 'docker-runtime-lv3') | map(attribute='ipv4') | first) }}"
    public_hostname: docker.lv3.org
    exposure_model: informational-only
    observability:
      guest_dashboard: true
      service_telemetry: true
    dns:
      managed: true
      visibility: public
      name: docker
      type: A
      target: "{{ management_ipv4 }}"
      ttl: 60
    edge:
      enabled: true
      tls: true
      kind: static
      slug: docker
      title: Docker Runtime VM
      description: The Docker runtime VM does not currently publish a public web service at this hostname.
      meta: Public application endpoints should be published deliberately through the NGINX edge when needed.
  docker_build:
    service_name: docker-build
    owning_vm: docker-build-lv3
    private_ip: "{{ (proxmox_guests | selectattr('name', 'equalto', 'docker-build-lv3') | map(attribute='ipv4') | first) }}"
    public_hostname: build.lv3.org
    exposure_model: informational-only
    observability:
      guest_dashboard: true
      service_telemetry: true
    dns:
      managed: true
      visibility: public
      name: build
      type: A
      target: "{{ management_ipv4 }}"
      ttl: 60
    edge:
      enabled: true
      tls: true
      kind: static
      slug: build
      title: Docker Build VM
      description: The build VM is a private operator-facing host for interactive build workflows and is not a public web workload.
      meta: Reach the build VM through the approved operator access path rather than the public edge.
  uptime_kuma:
    service_name: uptime-kuma
    owning_vm: docker-runtime-lv3
    private_ip: "{{ (proxmox_guests | selectattr('name', 'equalto', 'docker-runtime-lv3') | map(attribute='ipv4') | first) }}"
    public_hostname: uptime.lv3.org
    exposure_model: edge-published
    observability:
      guest_dashboard: false
      service_telemetry: false
    dns:
      managed: true
      visibility: public
      name: uptime
      type: A
      target: "{{ management_ipv4 }}"
      ttl: 60
    edge:
      enabled: true
      tls: true
      kind: proxy
      upstream: "http://{{ (proxmox_guests | selectattr('name', 'equalto', 'docker-runtime-lv3') | map(attribute='ipv4') | first) }}:3001"
  mail_platform:
    service_name: mail-platform
    owning_vm: docker-runtime-lv3
    private_ip: "{{ (proxmox_guests | selectattr('name', 'equalto', 'docker-runtime-lv3') | map(attribute='ipv4') | first) }}"
    public_hostname: mail.lv3.org
    exposure_model: informational-only
    observability:
      guest_dashboard: false
      service_telemetry: true
    dns:
      managed: true
      visibility: public
      name: mail
      type: A
      target: "{{ management_ipv4 }}"
      ttl: 60
  step_ca:
    service_name: step-ca
    owning_vm: docker-runtime-lv3
    private_ip: "{{ (proxmox_guests | selectattr('name', 'equalto', 'docker-runtime-lv3') | map(attribute='ipv4') | first) }}"
    exposure_model: private-only
    observability:
      guest_dashboard: false
      service_telemetry: false
    access:
      kind: tailscale-tcp-proxy
      url: "{{ step_ca_controller_url }}"
  windmill:
    service_name: windmill
