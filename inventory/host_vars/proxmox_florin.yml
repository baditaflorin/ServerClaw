    access:
      kind: tailscale-tcp-proxy
      url: "{{ open_webui_controller_url }}"
  platform_context_api:
    service_name: platform-context-api
    owning_vm: docker-runtime-lv3
    private_ip: "{{ (proxmox_guests | selectattr('name', 'equalto', 'docker-runtime-lv3') | map(attribute='ipv4') | first) }}"
    exposure_model: private-only
    observability:
      guest_dashboard: false
      service_telemetry: false
    access:
      kind: tailscale-tcp-proxy
      url: "{{ platform_context_controller_url }}"
  openbao:
    service_name: openbao
    owning_vm: docker-runtime-lv3
    private_ip: "{{ (proxmox_guests | selectattr('name', 'equalto', 'docker-runtime-lv3') | map(attribute='ipv4') | first) }}"
