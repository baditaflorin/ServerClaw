host_public_hostname: Debian-trixie-latest-amd64-base
management_interface: enp7s0
management_ipv4: 65.108.75.123
management_tailscale_ipv4: 100.118.189.95
management_ipv4_cidr: 26
management_gateway4: 65.108.75.65
management_ipv6: 2a01:4f9:6b:4b47::2
management_ipv6_cidr: 64
management_gateway6: fe80::1
hetzner_ipv4_route_network: 65.108.75.64
hetzner_ipv4_route_netmask: 255.255.255.192
proxmox_wan_bridge: vmbr0
proxmox_internal_bridge: vmbr10
proxmox_internal_ipv4: 10.10.10.1
proxmox_internal_cidr: 24
proxmox_internal_network: 10.10.10.0/24
proxmox_public_edge_ipv4: 10.10.10.10
proxmox_tailscale_hostname: proxmox-florin-subnet-router
proxmox_tailscale_advertise_routes:
  - "{{ proxmox_internal_network }}"
proxmox_tailscale_operator_target_guest: 10.10.10.30
proxmox_public_ingress_tcp_ports:
  - 80
  - 443
proxmox_tailscale_tcp_proxies:
  - name: postgres-lv3
    listen_address: "{{ management_tailscale_ipv4 }}"
    listen_port: 5432
    upstream_host: 10.10.10.50
    upstream_port: 5432

proxmox_guests:
  - vmid: 110
    name: nginx-lv3
    role: nginx
    ipv4: 10.10.10.10
    cidr: 24
    gateway4: 10.10.10.1
    cores: 2
    memory_mb: 4096
    disk_gb: 32
    tags:
      - ingress
      - nginx
      - lv3
    packages:
      - nginx
  - vmid: 120
    name: docker-runtime-lv3
    role: docker-runtime
    ipv4: 10.10.10.20
    cidr: 24
    gateway4: 10.10.10.1
    cores: 4
    memory_mb: 12288
    disk_gb: 96
    tags:
      - docker
      - runtime
      - lv3
    packages:
      - docker.io
  - vmid: 130
    name: docker-build-lv3
    role: docker-build
    ipv4: 10.10.10.30
    cidr: 24
    gateway4: 10.10.10.1
    cores: 12
    memory_mb: 24576
    disk_gb: 160
    tags:
      - docker
      - build
      - lv3
    packages:
      - docker.io
      - git
      - make
      - build-essential
  - vmid: 140
    name: monitoring-lv3
    role: monitoring
    ipv4: 10.10.10.40
    cidr: 24
    gateway4: 10.10.10.1
    cores: 4
    memory_mb: 8192
    disk_gb: 64
    tags:
      - monitoring
      - grafana
      - lv3
    packages:
      - prometheus-node-exporter
  - vmid: 150
    name: postgres-lv3
    role: postgres
    ipv4: 10.10.10.50
    cidr: 24
    gateway4: 10.10.10.1
    cores: 4
    memory_mb: 8192
    disk_gb: 96
    tags:
      - postgres
      - database
      - lv3
    packages:
      - acl
      - nftables
      - postgresql
      - postgresql-contrib
  - vmid: 160
    name: backup-lv3
    role: backup
    ipv4: 10.10.10.60
    cidr: 24
    gateway4: 10.10.10.1
    macaddr: BC:24:11:2D:5F:37
    cores: 4
    memory_mb: 8192
    disk_gb: 32
    extra_disks:
      - interface: scsi1
        storage: local
        size_gb: 640
    tags:
      - backup
      - pbs
      - lv3
    packages:
      - acl
      - xfsprogs

backup_vm_vmid: 160
backup_vm_name: backup-lv3
backup_vm_ipv4: 10.10.10.60
backup_vm_repo_file: /etc/apt/sources.list.d/proxmox-backup.sources
backup_vm_repo_uri: http://download.proxmox.com/debian/pbs
backup_vm_repo_channel: pbs-no-subscription
backup_vm_datastore_name: proxmox
backup_vm_datastore_disk_device: /dev/sdb
backup_vm_datastore_disk_filesystem: xfs
backup_vm_datastore_mountpoint: /mnt/datastore/proxmox
backup_vm_datastore_gc_schedule: "03:45"
backup_vm_api_user: proxmox-host@pbs
backup_vm_api_user_comment: Proxmox VE host backup client
backup_vm_api_user_password_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/proxmox-backup/backup-lv3-user-password.txt
backup_vm_api_token_id: pve
backup_vm_api_token_comment: Proxmox VE host backup token
backup_vm_api_token_local_dir: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/proxmox-backup
backup_vm_api_token_local_file: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/proxmox-backup/backup-lv3-token.json

proxmox_backup_protected_vmids:
  - 110
  - 120
  - 130
  - 140
  - 150

proxmox_backup_storage:
  enabled: "{{ proxmox_backup_storage_enabled_override | default(false) }}"
  id: lv3-backup-pbs
  type: pbs
  server: "{{ backup_vm_ipv4 }}"
  port: 8007
  datastore: "{{ backup_vm_datastore_name }}"
  api_token_local_file: "{{ backup_vm_api_token_local_file }}"
  content:
    - backup
  nodes:
    - "{{ host_public_hostname }}"

proxmox_backup_jobs:
  - id: backup-lv3-nightly
    enabled: "{{ proxmox_backup_storage.enabled }}"
    storage: "{{ proxmox_backup_storage.id }}"
    schedule: "02:30"
    node: "{{ host_public_hostname }}"
    mode: snapshot
    compress: zstd
    notification_mode: notification-system
    repeat_missed: true
    vmid_list: "{{ proxmox_backup_protected_vmids }}"
    prune_backups:
      keep_last: 3
      keep_daily: 7
      keep_weekly: 5
      keep_monthly: 12
