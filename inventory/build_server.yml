all:
  vars:
    build_server_shared_local_root: >-
      {{
        (
          lookup(
            'ansible.builtin.pipe',
            'git -C ' ~ ((inventory_dir | dirname) | quote) ~ ' rev-parse --path-format=absolute --git-common-dir'
          )
          | dirname
        )
        ~ '/.local'
      }}
  children:
    build_server:
      hosts:
        build-lv3:
          ansible_host: 10.10.10.30
          ansible_user: ops
          ansible_ssh_private_key_file: "{{ build_server_shared_local_root }}/ssh/bootstrap.id_ed25519"
          ansible_ssh_common_args: >-
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=accept-new
            -o UserKnownHostsFile=/dev/null
            -o ProxyJump=ops@100.64.0.1
