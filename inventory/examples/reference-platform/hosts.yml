all:
  vars:
    playbook_execution_env: "{{ env | default('production') }}"
    playbook_execution_allowed_envs:
      - production
    playbook_execution_host_patterns:
      proxmox_hosts:
        production: "proxmox_hosts:&production"
      lv3_guests:
        production: "lv3_guests:&production"
      nginx_edge:
        production: nginx-edge-reference
      runtime_control:
        production: runtime-control-reference
      runtime_general:
        production: runtime-general-reference
  children:
    production:
      hosts:
        proxmox_reference:
        nginx-edge-reference:
        runtime-control-reference:
        runtime-general-reference:
    platform:
      children:
        proxmox_hosts:
        lv3_guests:
    proxmox_hosts:
      hosts:
        proxmox_reference:
          ansible_host: >-
            {{ lookup('env', 'REFERENCE_PROXMOX_HOST_ADDR') | default('100.64.0.10', true) }}
          ansible_user: ops
          ansible_become: true
          ansible_become_method: sudo
    lv3_guests:
      hosts:
        nginx-edge-reference:
          ansible_host: 10.30.10.10
          deployment_environment: production
        runtime-control-reference:
          ansible_host: 10.30.10.20
          deployment_environment: production
        runtime-general-reference:
          ansible_host: 10.30.10.30
          deployment_environment: production
