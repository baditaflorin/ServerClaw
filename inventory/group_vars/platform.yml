platform_service_topology:
  nginx_edge:
    service_name: nginx-edge
    owning_vm: nginx-lv3
    private_ip: 10.10.10.10
    public_hostname: nginx.lv3.org
    exposure_model: edge-static
    observability:
      guest_dashboard: true
      service_telemetry: true
    dns:
      managed: true
      visibility: public
      name: nginx
      type: A
      target: 65.108.75.123
      ttl: 60
    edge:
      enabled: true
      tls: true
      kind: static
      slug: nginx
      title: LV3 Edge
      description: NGINX is the public edge for published lv3.org services on this
        platform.
      meta: Use the named subdomains for the actual service entry points exposed at
        the edge.
    service_id: nginx_edge
    ports: {}
    urls:
      public: https://nginx.lv3.org
  grafana:
    service_name: grafana
    owning_vm: monitoring-lv3
    private_ip: 10.10.10.40
    public_hostname: grafana.lv3.org
    exposure_model: edge-published
    observability:
      guest_dashboard: true
      service_telemetry: false
    dns:
      managed: true
      visibility: public
      name: grafana
      type: A
      target: 65.108.75.123
      ttl: 60
    edge:
      enabled: true
      tls: true
      noindex: true
      kind: proxy
      upstream: http://10.10.10.40:3000
      proxy_hide_headers:
        - X-Grafana-Version
        - Via
      blocked_exact_paths:
        - path: /api/health
          status: 404
    service_id: grafana
    ports:
      internal: 3000
    urls:
      public: https://grafana.lv3.org
      internal: http://10.10.10.40:3000
      influxdb: http://10.10.10.40:8086
      loki_push: http://10.10.10.40:3100/loki/api/v1/push
      prometheus: http://10.10.10.40:9090
      tempo: http://10.10.10.40:3200
      otlp_grpc: http://10.10.10.40:4317
      otlp_http: http://10.10.10.40:4318/v1/traces
  headscale:
    service_name: headscale
    owning_vm: proxmox_florin
    private_ip: '{{ hostvars[''proxmox_florin''].proxmox_internal_ipv4 }}'
    public_hostname: headscale.lv3.org
    exposure_model: edge-published
    observability:
      guest_dashboard: false
      service_telemetry: false
    dns:
      managed: true
      visibility: public
      name: headscale
      type: A
      target: 65.108.75.123
      ttl: 60
    edge:
      enabled: true
      tls: true
      kind: proxy
      upstream: http://10.10.10.1:8080
    service_id: headscale
    ports:
      internal: 8080
    urls:
      public: https://headscale.lv3.org
      internal: http://10.10.10.1:8080
  alertmanager:
    service_name: alertmanager
    owning_vm: monitoring-lv3
    private_ip: 10.10.10.40
    exposure_model: private-only
    observability:
      guest_dashboard: false
      service_telemetry: false
    service_id: alertmanager
    ports:
      internal: 9093
    urls:
      internal: http://10.10.10.40:9093
  proxmox_ui:
    service_name: proxmox-ui
    owning_vm: proxmox_florin
    private_ip: 100.64.0.1
    public_hostname: proxmox.lv3.org
    exposure_model: informational-only
    observability:
      guest_dashboard: false
      service_telemetry: false
    dns:
      managed: true
      visibility: public
      name: proxmox
      type: A
      target: 65.108.75.123
      ttl: 60
    edge:
      enabled: true
      tls: true
      kind: static
      slug: proxmox
      title: Proxmox Administration
      description: Proxmox administration remains private and is reached over Tailscale
        instead of being published directly on the public edge.
      action_url: https://100.64.0.1:8006/
      action_label: Open Private Proxmox UI
      meta: Use Tailscale host access for routine Proxmox administration.
    service_id: proxmox_ui
    ports:
      controller: 8006
    urls:
      public: https://proxmox.lv3.org
      controller: https://100.64.0.1:8006/
  docker_runtime:
    service_name: docker-runtime
    owning_vm: docker-runtime-lv3
    private_ip: 10.10.10.20
    public_hostname: docker.lv3.org
    exposure_model: informational-only
    observability:
      guest_dashboard: true
      service_telemetry: true
    dns:
      managed: true
      visibility: public
      name: docker
      type: A
      target: 65.108.75.123
      ttl: 60
    edge:
      enabled: true
      tls: true
      kind: static
      slug: docker
      title: Docker Runtime VM
      description: The Docker runtime VM does not currently publish a public web service
        at this hostname.
      meta: Public application endpoints should be published deliberately through
        the NGINX edge when needed.
    service_id: docker_runtime
    ports: {}
    urls:
      public: https://docker.lv3.org
  docker_build:
    service_name: docker-build
    owning_vm: docker-build-lv3
    private_ip: 10.10.10.30
    public_hostname: build.lv3.org
    exposure_model: informational-only
    observability:
      guest_dashboard: true
      service_telemetry: true
    dns:
      managed: true
      visibility: public
      name: build
      type: A
      target: 65.108.75.123
      ttl: 60
    edge:
      enabled: true
      tls: true
      kind: static
      slug: build
      title: Docker Build VM
      description: The build VM is a private operator-facing host for interactive
        build workflows and is not a public web workload.
