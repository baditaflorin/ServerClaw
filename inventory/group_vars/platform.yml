      role: postgres-replica
      template_key: lv3-postgres-host
      ipv4: 10.10.10.51
      cidr: 24
      gateway4: 10.10.10.1
      macaddr: BC:24:11:8C:51:17
      cores: 4
      memory_mb: 8192
      disk_gb: 96
      tags:
        - postgres
        - database
        - ha
        - lv3
      placement:
        failure_domain: host:proxmox_florin
        placement_class: standby
        anti_affinity_group: postgres-ha
        co_location_exceptions:
          - scope: failure_domain
