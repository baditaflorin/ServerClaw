---
# platform_services.yml — service registry — ADR 0373
# GENERATED: false (maintained by hand, validated by scripts/validate_service_registry.py)
#
# Each entry declares a service's identity. The common/tasks/derive_service_defaults.yml
# task derives all conventional variables (site_dir, image, openbao_*, etc.) from these
# entries at play time. Roles should NOT define conventional variables in their
# defaults/main.yml — those are computed here.
#
# Required fields per entry:
#   image_catalog_key  — key in container_image_catalog.images (config/image-catalog.json)
#   internal_port      — port the container listens on inside the host
#   host_group         — Ansible host/group this service deploys to (production host name)
#
# Optional fields:
#   site_dir           — override /opt/<service_name>
#   secret_dir         — override /etc/lv3/<service_name>
#   container_name     — override <service_name>
#   needs_openbao      — default true; set false to skip OpenBao variable derivation
#   needs_redis        — informational, default false
#   needs_postgres     — informational, default false
#   local_artifact_dir — relative path under .local/ (default: .local/<service_name>)
#   extra_defaults     — map of additional key-value variables to set as facts

platform_service_registry:

  # ---------------------------------------------------------------------------
  # A
  # ---------------------------------------------------------------------------

  api_gateway:
    image_catalog_key: ""            # api-gateway is a bespoke binary, no catalog entry
    internal_port: 8080
    host_group: runtime-control-lv3
    site_dir: /opt/api-gateway
    container_name: api-gateway
    needs_openbao: false
    extra_defaults:
      api_gateway_database_port: 5432

