proxmox_guest_ssh_bootstrap_key_path: >-
  {{ lookup('env', 'LV3_BOOTSTRAP_SSH_PRIVATE_KEY') | default(repo_shared_bootstrap_private_key_path, true) }}
proxmox_guest_ssh_proxy_command: >-
  -o ProxyJump={{ proxmox_host_admin_user }}@{{ proxmox_guest_ssh_jump_host }}
proxmox_guest_ssh_public_proxy_command: >-
  -o ProxyJump={{ proxmox_host_admin_user }}@{{ hostvars[platform_topology_host].management_ipv4 }}
proxmox_guest_ssh_common_args:
  tailscale_direct: "-o IdentitiesOnly=yes"
