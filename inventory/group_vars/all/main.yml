proxmox_release_major: 9
proxmox_suite: trixie
proxmox_repo_channel: pve-no-subscription
proxmox_key_url: https://enterprise.proxmox.com/debian/proxmox-archive-keyring-trixie.gpg
proxmox_key_checksum: sha256:136673be77aba35dcce385b28737689ad64fd785a797e57897589aed08db6e45
proxmox_keyring_path: /usr/share/keyrings/proxmox-archive-keyring.gpg
proxmox_repo_file: /etc/apt/sources.list.d/proxmox.sources
proxmox_repo_uri: http://download.proxmox.com/debian/pve

proxmox_kernel_packages:
  - proxmox-default-kernel
  - ifupdown2

proxmox_core_packages:
  - proxmox-ve
  - postfix
  - open-iscsi
  - chrony

proxmox_cleanup_packages:
  - linux-image-amd64
  - os-prober

debian_prereq_packages:
  - wget
  - gpg
  - apt-transport-https

repo_shared_root: >-
  {{
    (
      lookup(
        'ansible.builtin.pipe',
        'git -C ' ~ ((inventory_dir | dirname) | quote) ~ ' rev-parse --path-format=absolute --git-common-dir'
      )
      | dirname
    )
  }}
repo_shared_local_root: "{{ repo_shared_root }}/.local"
repo_shared_bootstrap_private_key_path: "{{ repo_shared_local_root }}/ssh/bootstrap.id_ed25519"
repo_shared_bootstrap_public_key_path: "{{ repo_shared_local_root }}/ssh/bootstrap.id_ed25519.pub"
bootstrap_authorized_key_path: >-
  {{ lookup('env', 'LV3_BOOTSTRAP_SSH_PUBLIC_KEY') | default(repo_shared_bootstrap_public_key_path, true) }}

proxmox_vm_templates:
  lv3-debian-base:
    vmid: 9000
    name: lv3-debian-base
    source_template: debian13-cloud-template
  lv3-docker-host:
    vmid: 9001
    name: lv3-docker-host
    source_template: lv3-debian-base
  lv3-postgres-host:
    vmid: 9002
    name: lv3-postgres-host
    source_template: lv3-debian-base
  lv3-ops-base:
    vmid: 9003
    name: lv3-ops-base
