      auth_proxy: false             # Woodpecker has native Gitea OAuth handles auth
      websocket: true               # Woodpecker uses WebSockets for live build logs
    dns:
      records:
        - fqdn: "ci.{{ platform_domain }}"
          type: public
          target_host: nginx
          ttl: 3600
    tls:
      domains:
        - "ci.{{ platform_domain }}"
      cert_source: letsencrypt
      wildcard: false
      cert_validity_days: 90
  # END SERVICE: woodpecker

  # ---------------------------------------------------------------------------
  # Infrastructure & Foundation Services (Added for ADR 0373 completion)
  # ---------------------------------------------------------------------------

  # BEGIN SERVICE: alertmanager
  alertmanager:
    service_type: system_package
    image_catalog_key: alertmanager_runtime
    internal_port: 9093
    host_group: monitoring
    container_name: alertmanager
    needs_openbao: false
    needs_postgres: false
    state_dirs:
      config: /etc/alertmanager
      data: /var/lib/prometheus/alertmanager
      secrets: /etc/alertmanager
  # END SERVICE: alertmanager

    extra_defaults:
      alertmanager_runtime_config_file: /etc/alertmanager/alertmanager.yml
      alertmanager_runtime_data_dir: /var/lib/prometheus/alertmanager
      alertmanager_runtime_env_file: /etc/default/prometheus-alertmanager
      alertmanager_runtime_package: prometheus-alertmanager
      alertmanager_runtime_service_name: prometheus-alertmanager
      alertmanager_runtime_port: 9093
      alertmanager_runtime_url: "http://127.0.0.1:9093"

  # BEGIN SERVICE: docker_runtime
  docker_runtime:
    service_type: infrastructure
    image_catalog_key: docker_runtime
    internal_port: null
    host_group: all
    container_name: docker
    needs_openbao: false
    needs_postgres: false
    extra_defaults:
      docker_runtime_is_host_level: true
  # END SERVICE: docker_runtime

  # BEGIN SERVICE: docker_runtime_observability
  docker_runtime_observability:
    service_type: infrastructure
    image_catalog_key: docker_runtime_observability
    internal_port: null
    host_group: docker-runtime
    container_name: docker-observability
    needs_openbao: false
    needs_postgres: false
  # END SERVICE: docker_runtime_observability

  # BEGIN SERVICE: falco
  falco:
    service_type: infrastructure
    image_catalog_key: falco_runtime
    internal_port: null
    host_group: all
    container_name: falco
    needs_openbao: false
    needs_postgres: false
    extra_defaults:
      falco_is_daemonset: true
  # END SERVICE: falco

  # BEGIN SERVICE: falco_event_bridge
  falco_event_bridge:
    service_type: infrastructure
    image_catalog_key: falco_event_bridge_runtime
    internal_port: null
    host_group: docker-runtime
    container_name: falco-event-bridge
    needs_openbao: false
    needs_postgres: false
  # END SERVICE: falco_event_bridge

  # BEGIN SERVICE: librechat
  librechat:
    service_type: docker_compose
    image_catalog_key: librechat_runtime
    internal_port: 8096
    host_group: coolify
    site_dir: /opt/librechat
    container_name: librechat
    needs_openbao: true
    needs_postgres: false
    hairpin:
      publish:
        - hostname: "chat.{{ platform_domain }}"
          address_host: nginx
        - hostname: "sso.{{ platform_domain }}"
          address_host: nginx
    proxy:
      enabled: true
      upstream_port: 8096
      upstream_host: coolify
      public_fqdn: chat.{{ platform_domain }}
      auth_proxy: false             # upstream handles OIDC directly
      websocket: true
    dns:
      records:
        - fqdn: "chat.{{ platform_domain }}"
          type: public
          target_host: nginx
          ttl: 3600
    tls:
      domains:
        - "chat.{{ platform_domain }}"
      cert_source: letsencrypt
      wildcard: false
      cert_validity_days: 90
    sso:
      enabled: true
      provider: keycloak
      client_id: serverclaw
      client_secret_local_file: .local/keycloak/serverclaw-client-secret.txt
      redirect_uris:
        - "https://chat.{{ platform_domain }}/oauth/openid/callback"
      scopes:
        - openid
        - profile
        - email
      public_client: false
  # END SERVICE: librechat

  # BEGIN SERVICE: litellm
  litellm:
    service_type: docker_compose
    image_catalog_key: litellm_runtime
    internal_port: 8000
    host_group: docker-runtime
    container_name: litellm
    needs_openbao: true
    needs_postgres: false
  # END SERVICE: litellm

  # BEGIN SERVICE: neko
  neko:
    service_type: multi_instance
    image_catalog_key: neko_runtime
    internal_port: 8080
    host_group: runtime-comms
    container_name: neko
    needs_openbao: false
    needs_postgres: false
    extra_defaults:
      neko_multi_instance: true
      neko_instances: {}
  # END SERVICE: neko

  # BEGIN SERVICE: nginx_runtime
  nginx_runtime:
    service_type: system_package
    image_catalog_key: nginx_runtime
    internal_port: null
    host_group: all
    container_name: nginx
    needs_openbao: false
    needs_postgres: false
    extra_defaults:
      nginx_is_edge_infrastructure: true
      nginx_fragment_based_config: true
    state_dirs:
      config: /etc/nginx
      data: /var/cache/nginx
      secrets: /etc/lv3/nginx
  # END SERVICE: nginx_runtime

  # BEGIN SERVICE: runtime_pool_substrate
  runtime_pool_substrate:
    service_type: infrastructure
    image_catalog_key: runtime_pool_substrate
    internal_port: null
    host_group: all
    container_name: runtime-pool-substrate
    needs_openbao: false
    needs_postgres: false
    extra_defaults:
      runtime_pool_provides_traefik: true
      runtime_pool_provides_dapr: true
  # END SERVICE: runtime_pool_substrate
