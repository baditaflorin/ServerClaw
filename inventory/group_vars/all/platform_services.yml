      directus_admin_email: directus.admin@{{ platform_domain }}
      directus_health_path: /server/health
      directus_ping_path: /server/ping
      directus_graphql_path: /graphql
      directus_openapi_path: /server/specs/oas
    hairpin:
      publish:
        - hostname: "data.{{ platform_domain }}"
          address_host: nginx
        - hostname: "sso.{{ platform_domain }}"
          address_host: nginx
    dns:
      records:
        - fqdn: "data.{{ platform_domain }}"
          type: public
          target_host: nginx
          ttl: 60
    tls:
      domains:
        - "data.{{ platform_domain }}"
      cert_source: letsencrypt
      wildcard: false
      cert_validity_days: 90
    sso:
      enabled: true
      provider: keycloak
      client_id: directus
      client_secret_local_file: .local/keycloak/directus-client-secret.txt
      redirect_uris:
        - "https://data.{{ platform_domain }}/auth/login/keycloak/callback"
      scopes:
        - openid
        - profile
        - email
      public_client: false
    proxy:
      enabled: true
      upstream_port: 8055
      upstream_host: docker-runtime
      public_fqdn: data.{{ platform_domain }}
      auth_proxy: false             # upstream Keycloak OIDC handles auth
  # END SERVICE: directus

  # BEGIN SERVICE: dozzle
  dozzle:
    service_type: docker_compose
    image_catalog_key: dozzle_runtime
    internal_port: 8089
    host_group: docker-runtime
    site_dir: /opt/dozzle
    container_name: dozzle
    needs_openbao: false
    dns:
      records:
        - fqdn: "logs.{{ platform_domain }}"
          type: public
          target_host: nginx
          ttl: 3600
    tls:
      domains:
        - "logs.{{ platform_domain }}"
      cert_source: letsencrypt
      wildcard: false
      cert_validity_days: 90
    proxy:
      enabled: true
      upstream_port: 8089
      upstream_host: docker-runtime
      public_fqdn: logs.{{ platform_domain }}
      auth_proxy: true              # gated behind shared oauth2-proxy
