    proxy:
      enabled: true
      upstream_port: 8091
      upstream_host: docker-runtime
      public_fqdn: sso.{{ platform_domain }}
      auth_proxy: false             # Keycloak IS the SSO provider; cannot front itself
      extra_fqdns:
        - "sso.staging.{{ platform_domain }}"
  # END SERVICE: keycloak

