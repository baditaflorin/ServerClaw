---
# platform_services.yml — service registry — ADR 0373 + ADR 0374
# GENERATED: false (maintained by hand, validated by scripts/validate_service_registry.py)
#
# Each entry declares a service's identity. The common/tasks/derive_service_defaults.yml
# task derives all conventional variables (site_dir, image, openbao_*, etc.) from these
# entries at play time. Roles should NOT define conventional variables in their
# defaults/main.yml — those are computed here.
#
# Required fields per entry:
#   service_type       — 'docker_compose' | 'system_package' | 'infrastructure' | 'multi_instance'
#   internal_port      — port the service listens on (null for non-networked services)
#   host_group         — Ansible host/group this service deploys to (production host name)
#
# Conditional fields (based on service_type):
#   Docker services (docker_compose):
#     image_catalog_key  — key in container_image_catalog.images (config/image-catalog.json)
#     site_dir           — base directory (default: /opt/<service_name>)
#     container_name     — override <service_name>
#   System packages (system_package):
#     state_dirs         — map of directory paths { config, data, secrets } for the package
#     package_name       — system package name (for package managers)
#   Infrastructure (infrastructure):
#     Extra metadata as needed (varies by service type: kernel module, daemon, etc.)
#
# Optional fields (all service types):
#   secret_dir         — override /etc/lv3/<service_name> (docker_compose only)
#   needs_openbao      — default true; set false to skip OpenBao variable derivation
#   needs_redis        — informational, default false
#   needs_postgres     — informational, default false
#   local_artifact_dir — relative path under .local/ (default: .local/<service_name>)
#   extra_defaults     — map of additional key-value variables to set as facts
#
# Cross-cutting fields (ADR 0374):
#   dns                — DNS publication declarations. Generator: scripts/generate_cross_cutting_artifacts.py --only dns
#     records          — list of DNS records this service needs
#       fqdn           — fully-qualified domain name
#       type           — 'public' (edge-published) or 'internal' (private/internal only)
#       target_host    — platform guest that owns the IP (resolved via platform_guest_catalog)
#       ttl            — DNS TTL in seconds (default: 3600)
#   proxy              — nginx edge publication declarations. Generator: scripts/generate_cross_cutting_artifacts.py --only proxy
#     enabled          — whether this service is nginx edge-published (bool)
#     upstream_port    — port the upstream service listens on (defaults to internal_port)
#     upstream_host    — platform guest that runs the service (resolved to IP via inventory)
#     public_fqdn      — the public FQDN (must match a dns.records entry or subdomain-catalog entry)
#     auth_proxy       — whether to front with oauth2-proxy (bool, default: false)
#     websocket        — whether to add WebSocket upgrade headers (bool, default: false)
#     max_body_size    — nginx client_max_body_size (default: '10m')
#     extra_fqdns      — additional FQDNs served by the same upstream (list, optional)

platform_service_registry:

  # ---------------------------------------------------------------------------
  # A
  # ---------------------------------------------------------------------------

  # BEGIN SERVICE: api_gateway
  api_gateway:
    service_type: docker_compose
    image_catalog_key: ""            # api-gateway is a bespoke binary, no catalog entry
    internal_port: 8083
    host_group: runtime-control
    site_dir: /opt/api-gateway
    container_name: api-gateway
    needs_openbao: false
    extra_defaults:
      api_gateway_database_port: 5432
    dns:
      records:
        - fqdn: "api.{{ platform_domain }}"
          type: public
          target_host: nginx
          ttl: 60
    tls:
      domains:
        - "api.{{ platform_domain }}"
      cert_source: letsencrypt
      wildcard: false
      cert_validity_days: 90
    sso:
      enabled: true
      provider: keycloak
      client_id: api-gateway
      client_secret_local_file: .local/keycloak/api-gateway-client-secret.txt
      redirect_uris: []
      scopes:
        - openid
      public_client: false
    proxy:
      enabled: true
      upstream_port: 8080
      upstream_host: runtime-control
      public_fqdn: api.{{ platform_domain }}
      auth_proxy: false             # upstream handles its own auth
  # END SERVICE: api_gateway

  # BEGIN SERVICE: artifact_cache
  artifact_cache:
    service_type: docker_compose
    image_catalog_key: ""            # uses upstream docker.io/library/registry — no catalog key
    internal_port: 5001
    host_group: artifact-cache
    site_dir: /opt/artifact-cache
    needs_openbao: false
  # END SERVICE: artifact_cache

  # ---------------------------------------------------------------------------
  # B
  # ---------------------------------------------------------------------------

  # BEGIN SERVICE: browser_runner
  browser_runner:
    service_type: docker_compose
    image_catalog_key: ""            # built locally from Dockerfile.j2
    internal_port: 8096
    host_group: docker-runtime
    site_dir: /opt/browser-runner
    container_name: browser-runner
    needs_openbao: false
  # END SERVICE: browser_runner

  # ---------------------------------------------------------------------------
  # C
  # ---------------------------------------------------------------------------

  # BEGIN SERVICE: changedetection
  changedetection:
    service_type: docker_compose
    image_catalog_key: changedetection_runtime
    internal_port: 5000
    host_group: docker-runtime
    site_dir: /opt/changedetection
    container_name: changedetection
    needs_openbao: false
  # END SERVICE: changedetection

  # BEGIN SERVICE: coolify
  coolify:
