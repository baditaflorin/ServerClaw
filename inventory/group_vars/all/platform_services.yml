    internal_port: 8000
    host_group: coolify
    site_dir: /opt/coolify
    needs_openbao: false
    proxy:
      enabled: true
      upstream_port: 8000
      upstream_host: coolify
      public_fqdn: coolify.{{ platform_domain }}
      auth_proxy: true              # gated behind shared oauth2-proxy
  # END SERVICE: coolify

  # BEGIN SERVICE: crawl4ai
  crawl4ai:
    service_type: docker_compose
    image_catalog_key: crawl4ai_runtime
    internal_port: 11235
    host_group: docker-runtime
    site_dir: /opt/crawl4ai
