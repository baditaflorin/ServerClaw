  # ---------------------------------------------------------------------------
  # D
  # ---------------------------------------------------------------------------

  # BEGIN SERVICE: dify
  dify:
    service_type: docker_compose
    image_catalog_key: dify_api_runtime
    internal_port: 8094
    host_group: docker-runtime
    site_dir: /opt/dify
    container_name: dify-api
    needs_openbao: true
    hairpin:
      publish:
        - hostname: "agents.{{ platform_domain }}"
          address_host: nginx
        - hostname: "dify.{{ platform_domain }}"
          address_host: nginx
    dns:
      records:
        - fqdn: "agents.{{ platform_domain }}"
          type: public
          target_host: nginx
          ttl: 60
    tls:
      domains:
        - "agents.{{ platform_domain }}"
      cert_source: letsencrypt
      wildcard: false
      cert_validity_days: 90
    sso:
      enabled: true
      provider: keycloak
      client_id: dify
      client_secret_local_file: .local/keycloak/dify-client-secret.txt
      redirect_uris:
        - "https://agents.{{ platform_domain }}/console/api/oauth/login/oidc/callback"
      scopes:
        - openid
        - profile
        - email
      public_client: false
    proxy:
      enabled: true
      upstream_port: 8094
      upstream_host: docker-runtime
      public_fqdn: agents.{{ platform_domain }}
      auth_proxy: true              # gated behind shared oauth2-proxy
