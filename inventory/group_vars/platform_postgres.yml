---
# ADR 0359: Declarative PostgreSQL client registry.
# Single source of truth for all service database relationships.
# Add one entry per service. source_vm must match a key in platform_guest_catalog.by_name.
# This drives: pg_hba.conf (least-privilege), nftables allowed_inbound, and postgres_client role.
platform_postgres_clients:
  - service: dify
    database: dify
    user: dify
    source_vm: docker-runtime-lv3
    password_local_file: "{{ repo_shared_root }}/.local/dify/database-password.txt"
    password_remote_dir: /etc/lv3/dify
    password_remote_file: /etc/lv3/dify/database-password

