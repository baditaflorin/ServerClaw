all:
  vars:
    playbook_execution_env: "{{ env | default('production') }}"
    playbook_execution_allowed_envs:
      - production
      - staging
    playbook_execution_host_patterns:
      proxmox_hosts:
        production: "proxmox_hosts:&production"
        staging: "proxmox_hosts:&staging"
      lv3_guests:
        production: "lv3_guests:&production"
        staging: "lv3_guests:&staging"
      postgres_guests:
        production: "postgres_guests:&production"
        staging: "postgres_guests:&staging"
      backup_guests:
        production: "backup_guests:&production"
        staging: "backup_guests:&staging"
      nginx_edge:
        production: nginx-lv3
        staging: nginx-staging-lv3
      docker_runtime:
        production: docker-runtime-lv3
        staging: docker-runtime-staging-lv3
      docker_build:
        production: docker-build-lv3
        staging: docker-build-staging-lv3
      monitoring:
        production: monitoring-lv3
        staging: monitoring-staging-lv3
      postgres:
        production: postgres-lv3
        staging: postgres-staging-lv3
      backup:
        production: backup-lv3
        staging: backup-staging-lv3
  children:
    production:
      hosts:
        proxmox_florin:
        nginx-lv3:
        docker-runtime-lv3:
        docker-build-lv3:
        monitoring-lv3:
        postgres-lv3:
        postgres-replica-lv3:
        backup-lv3:
    staging:
      hosts:
        proxmox_florin:
        nginx-staging-lv3:
        docker-runtime-staging-lv3:
        docker-build-staging-lv3:
        monitoring-staging-lv3:
        postgres-staging-lv3:
        backup-staging-lv3:
    platform:
      children:
        proxmox_hosts:
        lv3_guests:
        postgres_guests:
        backup_guests:
    proxmox_hosts:
      hosts:
        proxmox_florin:
          ansible_host: 100.118.189.95
          ansible_user: ops
          ansible_become: true
          ansible_become_method: sudo
    lv3_guests:
      hosts:
        nginx-lv3:
          ansible_host: 10.10.10.10
          environment: production
        docker-runtime-lv3:
          ansible_host: 10.10.10.20
          environment: production
        docker-build-lv3:
          ansible_host: 10.10.10.30
          environment: production
        monitoring-lv3:
          ansible_host: 10.10.10.40
          environment: production
        postgres-lv3:
          ansible_host: 10.10.10.50
          environment: production
        postgres-replica-lv3:
          ansible_host: 10.10.10.51
          environment: production
        backup-lv3:
          ansible_host: 10.10.10.60
          environment: production
        nginx-staging-lv3:
          ansible_host: 10.20.10.10
          environment: staging
        docker-runtime-staging-lv3:
          ansible_host: 10.20.10.20
          environment: staging
        docker-build-staging-lv3:
          ansible_host: 10.20.10.30
          environment: staging
        monitoring-staging-lv3:
          ansible_host: 10.20.10.40
          environment: staging
        postgres-staging-lv3:
          ansible_host: 10.20.10.50
          environment: staging
        backup-staging-lv3:
          ansible_host: 10.20.10.60
          environment: staging
    postgres_guests:
      hosts:
        postgres-lv3:
        postgres-replica-lv3:
        postgres-staging-lv3:
    backup_guests:
      hosts:
        backup-lv3:
          ansible_host: 10.10.10.60
        backup-staging-lv3:
          ansible_host: 10.20.10.60
