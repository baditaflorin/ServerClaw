all:
  vars:
    playbook_execution_env: "{{ env | default('production') }}"
    playbook_execution_allowed_envs:
      - production
      - staging
    playbook_execution_host_patterns:
      proxmox_hosts:
        production: "proxmox_hosts:&production"
        staging: "proxmox_hosts:&staging"
      lv3_guests:
        production: "lv3_guests:&production"
        staging: "lv3_guests:&staging"
      postgres_guests:
        production: "postgres_guests:&production"
        staging: "postgres_guests:&staging"
      backup_guests:
        production: "backup_guests:&production"
        staging: "backup_guests:&staging"
      coolify:
        production: coolify
        staging: coolify-staging
      coolify_apps:
        production: coolify-apps
        staging: coolify-apps-staging
      nginx_edge:
        production: nginx
        staging: nginx-staging
      docker_runtime:
        production: docker-runtime
        staging: docker-runtime-staging
      runtime_ai:
        production: runtime-ai
        staging: docker-runtime-staging
      runtime_control:
        production: runtime-control
        staging: docker-runtime-staging
      runtime_general:
        production: runtime-general
        staging: docker-runtime-staging
      runtime_comms:
        production: runtime-comms
        staging: docker-runtime-staging
      runtime_apps:
        production: runtime-apps
        staging: docker-runtime-staging
      postgres_apps:
        production: postgres-apps
        staging: postgres-staging
      postgres_data:
        production: postgres-data
        staging: postgres-staging
      docker_build:
        production: docker-build
        staging: docker-build-staging
      monitoring:
        production: monitoring
        staging: monitoring-staging
      postgres:
        production: postgres
        staging: postgres-staging
      backup:
        production: backup
        staging: backup-staging
  children:
    production:
      hosts:
        proxmox_florin:
        nginx:
        docker-runtime:
        docker-build:
        monitoring:
        postgres:
        backup:
        coolify:
        coolify-apps:
        artifact-cache:
        runtime-ai:
        runtime-control:
        runtime-general:
        runtime-comms:
        runtime-apps:
        postgres-apps:
        postgres-data:
    staging:
      hosts:
        proxmox_florin:
        nginx-staging:
        docker-runtime-staging:
        docker-build-staging:
        monitoring-staging:
        postgres-staging:
        backup-staging:
        artifact-cache-staging:
    platform:
      children:
        proxmox_hosts:
        lv3_guests:
        postgres_guests:
        backup_guests:
    platform_services:
      children:
        proxmox_hosts:
    proxmox_hosts:
      hosts:
        proxmox_florin:
          ansible_host: >-
            {{ lookup('env', 'LV3_PROXMOX_HOST_ADDR') | default('100.64.0.1', true) }}
          ansible_user: ops
          ansible_become: true
          ansible_become_method: sudo
    lv3_guests:
      hosts:
        nginx:
          ansible_host: 10.10.10.10
          deployment_environment: production
        docker-runtime:
          ansible_host: 10.10.10.20
          deployment_environment: production
        docker-build:
          ansible_host: 10.10.10.30
          deployment_environment: production
        monitoring:
          ansible_host: 10.10.10.40
          deployment_environment: production
        postgres:
          ansible_host: 10.10.10.50
          deployment_environment: production
        postgres-replica:
          ansible_host: 10.10.10.51
          deployment_environment: production
        backup:
          ansible_host: 10.10.10.60
          deployment_environment: production
        coolify:
          ansible_host: 10.10.10.70
          deployment_environment: production
        coolify-apps:
          ansible_host: 10.10.10.71
          deployment_environment: production
        artifact-cache:
          ansible_host: 10.10.10.80
          deployment_environment: production
        runtime-ai:
          ansible_host: 10.10.10.90
          deployment_environment: production
        runtime-control:
          ansible_host: 10.10.10.92
          deployment_environment: production
        runtime-general:
          ansible_host: 10.10.10.91
          deployment_environment: production
        runtime-comms:
          ansible_host: 10.10.10.21
          deployment_environment: production
        runtime-apps:
          ansible_host: 10.10.10.22
          deployment_environment: production
        postgres-apps:
          ansible_host: 10.10.10.52
          deployment_environment: production
        postgres-data:
          ansible_host: 10.10.10.54
          deployment_environment: production
        nginx-staging:
          ansible_host: 10.20.10.10
          deployment_environment: staging
        docker-runtime-staging:
          ansible_host: 10.20.10.20
          deployment_environment: staging
        docker-build-staging:
          ansible_host: 10.20.10.30
          deployment_environment: staging
        monitoring-staging:
          ansible_host: 10.20.10.40
          deployment_environment: staging
        postgres-staging:
          ansible_host: 10.20.10.50
          deployment_environment: staging
        backup-staging:
          ansible_host: 10.20.10.60
          deployment_environment: staging
        artifact-cache-staging:
          ansible_host: 10.20.10.80
          deployment_environment: staging
    postgres_guests:
      hosts:
        postgres:
        postgres-replica:
        postgres-apps:
        postgres-data:
        postgres-staging:
    backup_guests:
      hosts:
        backup:
          ansible_host: 10.10.10.60
        backup-staging:
          ansible_host: 10.20.10.60
