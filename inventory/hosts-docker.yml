# =============================================================================
# ServerClaw — Docker Development Inventory
# =============================================================================
# Targets the Docker containers started by docker-dev/ compose files.
#
# On macOS Docker Desktop, container bridge IPs are NOT routable from the
# host. SSH is exposed via localhost port mappings: port 22xx maps to
# container with last-octet xx (e.g., 2250 -> postgres-vm at .50).
#
# On Linux, set DOCKER_DEV_USE_BRIDGE=true to use direct bridge IPs instead.
#
# Usage:
#   ansible-playbook -i inventory/hosts-docker.yml playbooks/site.yml
#   make docker-dev-converge
#
# See ADR 0387: ServerClaw-in-Docker, ADR 0410: Docker Isolation Testing
# =============================================================================

all:
  vars:
    playbook_execution_env: "{{ env | default('production') }}"
    playbook_execution_allowed_envs:
      - production
    # Docker-dev mode: skip Proxmox API, firewall, Tailscale, systemd timers
    platform_environment: docker-dev
    platform_skip_proxmox_api: true
    ansible_user: ops
    ansible_ssh_private_key_file: "{{ lookup('env', 'LOCAL_OVERLAY_ROOT') | default(inventory_dir ~ '/../.local', true) }}/ssh/bootstrap.id_ed25519"
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
    # ADR 0410 Phase 4c: identity injection for Docker dev.
    # Set PLATFORM_DOMAIN/PLATFORM_OPERATOR_EMAIL env vars to override.
    # Defaults to docker-dev.local so TLS/DNS roles get a resolvable placeholder.
    platform_domain: "{{ lookup('env', 'PLATFORM_DOMAIN') | default('docker-dev.local', true) }}"
    platform_operator_email: "{{ lookup('env', 'PLATFORM_OPERATOR_EMAIL') | default('operator@docker-dev.local', true) }}"
    platform_operator_name: "{{ lookup('env', 'PLATFORM_OPERATOR_NAME') | default('Docker Dev Operator', true) }}"
    playbook_execution_host_patterns:
      proxmox_hosts:
        production: "proxmox_hosts:&production"
      lv3_guests:
        production: "lv3_guests:&production"
      postgres_guests:
        production: "postgres_guests:&production"
      backup_guests:
        production: "backup_guests:&production"
      nginx_edge:
        production: nginx-docker
      docker_runtime:
        production: docker-runtime-docker
      runtime_control:
        production: runtime-control-docker
      postgres:
        production: postgres-docker
      backup:
        production: backup-docker
      monitoring:
        production: monitoring-docker
      docker_build:
        production: docker-build-docker

  children:
    production:
      hosts:
        localhost:
        nginx-docker:
        docker-runtime-docker:
        docker-build-docker:
        monitoring-docker:
        postgres-docker:
        backup-docker:
        runtime-control-docker:

    platform:
      children:
        proxmox_hosts:
        lv3_guests:
        postgres_guests:
        backup_guests:

    proxmox_hosts:
      hosts:
        localhost:
          ansible_connection: local
          # Stub: Proxmox API calls are skipped in docker-dev mode

    lv3_guests:
      hosts:
        nginx-docker:
          ansible_host: 127.0.0.1
          ansible_port: 2210
          deployment_environment: production
        docker-runtime-docker:
          ansible_host: 127.0.0.1
          ansible_port: 2220
          deployment_environment: production
        docker-build-docker:
          ansible_host: 127.0.0.1
          ansible_port: 2230
          deployment_environment: production
        monitoring-docker:
          ansible_host: 127.0.0.1
          ansible_port: 2240
          deployment_environment: production
        postgres-docker:
          ansible_host: 127.0.0.1
          ansible_port: 2250
          deployment_environment: production
        backup-docker:
          ansible_host: 127.0.0.1
          ansible_port: 2260
          deployment_environment: production
        runtime-control-docker:
          ansible_host: 127.0.0.1
          ansible_port: 2292
          deployment_environment: production

    postgres_guests:
      hosts:
        postgres-docker:

    backup_guests:
      hosts:
        backup-docker:
          ansible_host: 127.0.0.1
          ansible_port: 2260
