  operator_access:
    bootstrap_method: ssh_via_public_ipv4_or_proxmox_jump
    steady_state_host_method: ssh_to_proxmox_over_tailscale
    steady_state_host_target: 100.64.0.1
    private_guest_access_method: tailscale_subnet_route_when_needed
    private_build_vm: 10.10.10.30
  automation_access:
    proxmox_api_user: lv3-automation@pve
    proxmox_api_token_id: primary
    proxmox_api_role: PVEAdmin
    proxmox_api_privilege_separation: true
    proxmox_api_secret_storage: controller_local_only
  identity_taxonomy:
    classes:
      human_operator:
        description: Named human used for interactive administration, review, and approval.
        interactive_use: required
        automation_use: forbidden
      service:
        description: Non-human identity used by one long-running service or stack.
        interactive_use: forbidden
        automation_use: service_only
      agent:
        description: Non-human identity used by controller automation, workflow runners, or approved tooling.
        interactive_use: forbidden
        automation_use: approved_workflows_only
      break_glass:
        description: Recovery-only identity reserved for outages, lockouts, or emergency repair.
        interactive_use: emergency_only
        automation_use: forbidden
    required_metadata:
      - owner
      - purpose
      - scope_boundary
      - rotation_or_expiry
      - credential_storage
    managed_identities:
      - id: ops-linux
        class: human_operator
        principal: ops
        owner: Florin Badita
        purpose: Routine Linux administration on the Proxmox host and managed Debian guests.
        scope_boundary: Linux shell access with sudo on the Proxmox host and managed guests; not used for Proxmox API tokens.
        rotation_or_expiry: Rotate the shared bootstrap SSH key on personnel change or compromise and replace it with short-lived SSH certificates under ADR 0047.
        credential_storage: Controller-local SSH key material under .local/ssh plus authorized_keys deployment on the managed nodes.
        shared_credential_material: true
        surfaces:
          - proxmox_host_linux
          - managed_guest_linux
      - id: ops-proxmox-pam
        class: human_operator
        principal: ops@pam
        owner: Florin Badita
        purpose: Routine Proxmox UI and CLI administration with TOTP.
        scope_boundary: Proxmox administrative APIs and UI only; not used for direct Linux login or non-human automation.
        rotation_or_expiry: Rotate the password and TOTP seed on personnel change, compromise, or recovery events.
        credential_storage: Controller-local TOTP state under .local/tfa; password is provisioned during access hardening and retained outside git.
        shared_credential_material: false
        surfaces:
          - proxmox_ui
          - proxmox_cli
      - id: lv3-automation-proxmox
        class: agent
        principal: lv3-automation@pve
        owner: Repository automation
        purpose: Non-human Proxmox object management from repo workflows and controlled automation.
        scope_boundary: Proxmox API only with a privilege-separated token; no interactive Linux login and no break-glass usage.
        rotation_or_expiry: Revoke and recreate the token on controller compromise, workflow ownership change, or explicit secret rotation.
        credential_storage: Controller-local token payload under .local/proxmox-api.
        shared_credential_material: false
        surfaces:
          - proxmox_api
      - id: ops-portainer
        class: human_operator
        principal: ops-portainer
        owner: Florin Badita
        purpose: Routine read-mostly Docker runtime inspection in Portainer and bounded emergency actions through the governed Portainer surface.
        scope_boundary: Portainer UI and API on docker-runtime-lv3 only; desired state remains repo-managed and Portainer is not the source of truth for stack definitions.
        rotation_or_expiry: Rotate the controller-local Portainer bootstrap password on operator change, compromise, or when narrower SSO-backed identities replace the bootstrap path.
        credential_storage: Controller-local Portainer artifacts under .local/portainer; not committed to git.
        shared_credential_material: false
        surfaces:
          - portainer_ui
          - portainer_api
      - id: florin-badita-sso
        class: human_operator
        principal: florin.badita
        owner: Florin Badita
        purpose: Routine named operator login for the shared Keycloak broker and the first SSO-backed control-plane apps.
        scope_boundary: Keycloak realm `lv3` and downstream OIDC-integrated internal control-plane apps only; not used for Linux login, Proxmox API automation, or break-glass recovery.
        rotation_or_expiry: Rotate the bootstrap password after initial TOTP enrollment, on personnel change, or on compromise.
        credential_storage: Controller-local bootstrap password under .local/keycloak until the first interactive login completes and the operator rotates it.
        shared_credential_material: false
        surfaces:
          - keycloak_operator_login
          - grafana_sso
      - id: lv3-agent-hub
        class: agent
        principal: lv3-agent-hub
        owner: Repository automation
        purpose: Confidential client-credentials identity for approved LV3 agent workflows against the shared Keycloak broker.
        scope_boundary: Keycloak token issuance for the `lv3` realm only; not used for interactive login or unrelated services.
        rotation_or_expiry: Rotate the client secret on compromise, workflow ownership change, or broker reconfiguration.
        credential_storage: Controller-local client secret under .local/keycloak with a mirrored runtime value on docker-runtime-lv3.
        shared_credential_material: false
        surfaces:
          - keycloak_client_credentials
      - id: grafana-oauth
        class: service
        principal: grafana-oauth
        owner: Monitoring stack
        purpose: OIDC client identity that lets Grafana delegate user authentication to Keycloak.
        scope_boundary: Grafana login against the Keycloak `lv3` realm only; not used for Grafana admin API automation or any other application.
        rotation_or_expiry: Rotate the client secret on compromise, Grafana reconfiguration, or broker client-policy changes.
        credential_storage: Controller-local client secret under .local/keycloak with a mirrored value in Grafana's managed config on monitoring-lv3.
        shared_credential_material: false
        surfaces:
          - grafana_oauth
      - id: mail-platform-server-mailbox
        class: service
        principal: server@lv3.org
        owner: Mail platform runtime
        purpose: Authenticated mailbox and submission identity for the managed LV3 mail platform.
        scope_boundary: Mailbox access and SMTP submission on the internal mail platform only; not used for host, guest, or Proxmox administration.
        rotation_or_expiry: Rotate the mailbox password and gateway API key during mail-platform rotation, credential compromise, or sender-profile changes.
        credential_storage: Controller-local mail secrets under .local/mail-platform with mirrored runtime files on docker-runtime-lv3.
        shared_credential_material: false
        surfaces:
          - stalwart_mailbox
          - mail_gateway_submission
      - id: mail-platform-operator-alerts
        class: service
        principal: alerts@lv3.org
        owner: Platform operations
        purpose: Outbound operator alert sender profile for incident and health notifications.
        scope_boundary: Profile-bound outbound sends through the internal mail gateway only; cannot enumerate mail objects or reuse other sender credentials.
        rotation_or_expiry: Rotate the mailbox password and scoped gateway API key during sender-profile rotation, compromise, or ownership change.
        credential_storage: Controller-local profile secrets under .local/mail-platform/profiles with mirrored runtime files on docker-runtime-lv3.
        shared_credential_material: false
        surfaces:
          - stalwart_mailbox
          - mail_gateway_notification_profile
      - id: mail-platform-platform-transactional
        class: service
        principal: platform@lv3.org
        owner: Platform services
        purpose: Outbound transactional sender profile for repo-managed service notifications.
        scope_boundary: Profile-bound outbound sends through the internal mail gateway only; not used for operator alerts or agent reporting.
        rotation_or_expiry: Rotate the mailbox password and scoped gateway API key during sender-profile rotation, compromise, or service ownership change.
        credential_storage: Controller-local profile secrets under .local/mail-platform/profiles with mirrored runtime files on docker-runtime-lv3.
        shared_credential_material: false
        surfaces:
          - stalwart_mailbox
          - mail_gateway_notification_profile
      - id: mail-platform-agent-reports
        class: agent
        principal: agents@lv3.org
        owner: Repository automation
        purpose: Outbound sender profile for agent-generated reports and workflow summaries.
        scope_boundary: Profile-bound outbound sends through the internal mail gateway only; not used for human operators or unrelated services.
        rotation_or_expiry: Rotate the mailbox password and scoped gateway API key during sender-profile rotation, compromise, or workflow ownership change.
        credential_storage: Controller-local profile secrets under .local/mail-platform/profiles with mirrored runtime files on docker-runtime-lv3.
        shared_credential_material: false
        surfaces:
          - stalwart_mailbox
          - mail_gateway_notification_profile
      - id: proxmox-root-break-glass
        class: break_glass
        principal: root
        owner: Florin Badita
        purpose: Emergency recovery of the Proxmox host when named operator access is unavailable.
        scope_boundary: Proxmox host Linux only; not used for routine guest administration, API automation, or scheduled workflows.
        rotation_or_expiry: Rotate the SSH key immediately after any break-glass use or compromise.
        credential_storage: Controller-local SSH key material under .local/ssh until ADR 0047 replaces the shared key path.
        shared_credential_material: true
        surfaces:
          - proxmox_host_linux_break_glass
      - id: keycloak-bootstrap-admin
        class: break_glass
        principal: lv3-bootstrap-admin
        owner: Florin Badita
        purpose: Emergency master-realm and realm-administration recovery for Keycloak when named operator login is unavailable.
        scope_boundary: Keycloak recovery and bootstrap administration only; not used for routine operator sessions or non-human automation.
        rotation_or_expiry: Rotate the bootstrap admin password after any break-glass use, compromise, or major broker recovery event.
        credential_storage: Controller-local break-glass password under .local/keycloak; not committed to git.
        shared_credential_material: false
        surfaces:
          - keycloak_master_admin
  security:
    management_sources:
      - 100.64.0.0/10
