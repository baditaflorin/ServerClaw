    notification_profiles:
      - id: operator-alerts
        sender_address: alerts@lv3.org
        owner: Platform operations
        credential_scope: Profile-scoped mail gateway API key and Stalwart mailbox password.
        rate_expectation: Low volume with bursty spikes during incidents; not used for bulk mail.
        retention_policy: Retain gateway counters and mail delivery traces under the managed observability policy.
        observability_policy: Track request and delivery counters per profile in the mail gateway state and Grafana mail dashboard.
      - id: platform-transactional
        sender_address: platform@lv3.org
        owner: Platform services
        credential_scope: Profile-scoped mail gateway API key and Stalwart mailbox password.
        rate_expectation: Low to moderate transactional volume for repo-managed services.
        retention_policy: Retain gateway counters and mail delivery traces needed to audit service notifications.
        observability_policy: Track request and delivery counters per profile in the mail gateway state and Grafana mail dashboard.
      - id: agent-reports
        sender_address: agents@lv3.org
        owner: Repository automation
        credential_scope: Profile-scoped mail gateway API key and Stalwart mailbox password.
        rate_expectation: Low to moderate workflow-report volume with bursty audit windows.
        retention_policy: Retain gateway counters and mail delivery traces needed to audit automated reports.
        observability_policy: Track request and delivery counters per profile in the mail gateway state and Grafana mail dashboard.
    published_ports:
      - 25
      - 587
      - 993
  public_publication:
    edge_vm: 10.10.10.10
