name: validate

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  validate:
    runs-on: self-hosted
    container:
      image: registry.lv3.org/check-runner/python:3.12.10@sha256:9dd2ea22539ed61d0aed774d0f29d2a2de674531b80f852484849500d64169ff
    steps:
      - name: Checkout
        env:
          WORKFLOW_REPOSITORY: ${{ github.repository }}
          WORKFLOW_SERVER_URL: ${{ github.server_url }}
          WORKFLOW_REF: ${{ github.ref }}
          WORKFLOW_SHA: ${{ github.sha }}
          WORKFLOW_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$PWD"
          git init .
          if git remote get-url origin >/dev/null 2>&1; then
            git remote set-url origin "${WORKFLOW_SERVER_URL}/${WORKFLOW_REPOSITORY}.git"
          else
            git remote add origin "${WORKFLOW_SERVER_URL}/${WORKFLOW_REPOSITORY}.git"
          fi
          git -c http.extraHeader="Authorization: token ${WORKFLOW_TOKEN}" fetch --depth=1 origin "${WORKFLOW_REF}"
          git checkout --force "${WORKFLOW_SHA}"

      - name: Bootstrap validation toolchain
        run: |
          set -euo pipefail
          mkdir -p .local/validation-gate
          discover_workspace_host_path() {
            current_container_id="${HOSTNAME:-$(hostname)}"
            workspace_host_path="$("${docker_bin}" inspect "${current_container_id}" --format "{{range .Mounts}}{{if eq .Destination \"${PWD}\"}}{{.Source}}{{end}}{{end}}" 2>/dev/null || true)"
            if [ -n "${workspace_host_path}" ]; then
              printf '%s\n' "${workspace_host_path}"
              return 0
            fi
            "${docker_bin}" ps --filter "id=${current_container_id}" -q | while read -r container_id; do
              "${docker_bin}" inspect "${container_id}" --format "{{range .Mounts}}{{if eq .Destination \"${PWD}\"}}{{.Source}}{{end}}{{end}}"
            done | python3 -c 'import sys; lines=[line.strip() for line in sys.stdin if line.strip()]; print(lines[0] if lines else "", end="")'
          }
          docker_bin="$(command -v docker || command -v docker.io || true)"
          if [ -n "${docker_bin}" ]; then
            printf '%s\n' "${docker_bin}" > .local/validation-gate/docker-bin.path
            workspace_host_path="$(discover_workspace_host_path)"
            if [ -n "${workspace_host_path}" ]; then
              printf '%s\n' "${workspace_host_path}" > .local/validation-gate/workspace-host.path
            fi
            "${docker_bin}" --version
            exit 0
          fi
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends docker-cli
          docker_bin="$(command -v docker || command -v docker.io || true)"
          if [ -z "${docker_bin}" ]; then
            echo "Docker CLI remained unavailable after docker-cli installation." >&2
            exit 1
          fi
          printf '%s\n' "${docker_bin}" > .local/validation-gate/docker-bin.path
          workspace_host_path="$(discover_workspace_host_path)"
          if [ -z "${workspace_host_path}" ]; then
            echo "Workspace host path remained unavailable after Docker CLI installation." >&2
            exit 1
          fi
          printf '%s\n' "${workspace_host_path}" > .local/validation-gate/workspace-host.path
          "${docker_bin}" --version

      - name: Run authoritative validation gate
        run: |
          mkdir -p .local/validation-gate .local/policy-toolchain .local/trivy-cache .local/packer-plugin-cache .ansible/validation/collections receipts/sast
          export DOCKER_BIN="$(cat .local/validation-gate/docker-bin.path)"
          export LV3_DOCKER_WORKSPACE_PATH="$(cat .local/validation-gate/workspace-host.path)"
          export LV3_ANSIBLE_COLLECTIONS_DIR=.ansible/validation/collections
          export LV3_ANSIBLE_COLLECTIONS_SHA_FILE=.ansible/validation/requirements.sha
          export LV3_PACKER_PLUGIN_CACHE_DIR=.local/packer-plugin-cache
          export LV3_POLICY_TOOLCHAIN_ROOT=.local/policy-toolchain
          export LV3_TRIVY_CACHE_DIR=.local/trivy-cache
          if git show-ref --verify --quiet refs/remotes/origin/main; then
            export LV3_VALIDATION_BASE_REF=origin/main
          fi
          python3 scripts/run_gate.py --workspace . --docker-binary "${DOCKER_BIN}" --status-file .local/validation-gate/gitea-last-run.json --source gitea-actions --all-lanes

      - name: Bundle validation artifacts
        if: always()
        run: |
          set -euo pipefail
          artifact_list="$(mktemp)"
          for artifact_dir in receipts/sast .local/validation-gate; do
            if [ -d "${artifact_dir}" ]; then
              find "${artifact_dir}" -maxdepth 1 -type f \( -name '*.sarif.json' -o -name '*.json' \) >> "${artifact_list}"
            fi
          done
          if [ ! -s "${artifact_list}" ]; then
            echo "No validation artifacts found to bundle."
            exit 0
          fi
          sort -u "${artifact_list}" -o "${artifact_list}"
          tar -czf .local/validation-gate/gitea-validation-receipts.tar.gz -T "${artifact_list}"
          echo "Bundled validation artifacts:"
          cat "${artifact_list}"
          ls -lh .local/validation-gate/gitea-validation-receipts.tar.gz
