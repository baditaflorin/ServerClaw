name: validate

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  validate:
    runs-on: self-hosted
    container:
      image: registry.lv3.org/check-runner/python:3.12.10@sha256:9dd2ea22539ed61d0aed774d0f29d2a2de674531b80f852484849500d64169ff
    steps:
      - name: Checkout
        env:
          WORKFLOW_REPOSITORY: ${{ github.repository }}
          WORKFLOW_SERVER_URL: ${{ github.server_url }}
          WORKFLOW_REF: ${{ github.ref }}
          WORKFLOW_SHA: ${{ github.sha }}
          WORKFLOW_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$PWD"
          git init .
          if git remote get-url origin >/dev/null 2>&1; then
            git remote set-url origin "${WORKFLOW_SERVER_URL}/${WORKFLOW_REPOSITORY}.git"
          else
            git remote add origin "${WORKFLOW_SERVER_URL}/${WORKFLOW_REPOSITORY}.git"
          fi
          git -c http.extraHeader="Authorization: token ${WORKFLOW_TOKEN}" fetch --depth=1 origin "${WORKFLOW_REF}"
          git checkout --force "${WORKFLOW_SHA}"

      - name: Bootstrap JavaScript action runtime
        run: |
          set -euo pipefail
          if command -v node >/dev/null 2>&1; then
            node --version
            exit 0
          fi
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends nodejs
          node --version
          npm --version

      - name: Run authoritative validation gate
        run: |
          mkdir -p .local/validation-gate .local/policy-toolchain .local/trivy-cache .local/packer-plugin-cache .ansible/validation/collections receipts/sast
          export LV3_ANSIBLE_COLLECTIONS_DIR=.ansible/validation/collections
          export LV3_ANSIBLE_COLLECTIONS_SHA_FILE=.ansible/validation/requirements.sha
          export LV3_PACKER_PLUGIN_CACHE_DIR=.local/packer-plugin-cache
          export LV3_POLICY_TOOLCHAIN_ROOT=.local/policy-toolchain
          export LV3_TRIVY_CACHE_DIR=.local/trivy-cache
          if git show-ref --verify --quiet refs/remotes/origin/main; then
            export LV3_VALIDATION_BASE_REF=origin/main
          fi
          python3 scripts/run_gate.py --workspace . --status-file .local/validation-gate/gitea-last-run.json --source gitea-actions --all-lanes

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitea-validation-receipts
          path: |
            receipts/sast/*.sarif.json
            .local/validation-gate/*.json
          if-no-files-found: ignore
          retention-days: 90
