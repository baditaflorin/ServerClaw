name: renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

jobs:
  renovate:
    runs-on: self-hosted
    timeout-minutes: 30
    container:
      image: registry.lv3.org/check-runner/python:3.12.10@sha256:9dd2ea22539ed61d0aed774d0f29d2a2de674531b80f852484849500d64169ff
    env:
      DOCKER_HOST: unix:///var/run/docker.sock
      RENOVATE_HELPER_IMAGE: registry.lv3.org/check-runner/python:3.12.10@sha256:9dd2ea22539ed61d0aed774d0f29d2a2de674531b80f852484849500d64169ff
      RENOVATE_IMAGE: registry.lv3.org/check-runner/renovate:42.76.4@sha256:d203eba7da7a5d198363c3d96ac6f917a4ec630b3fc2bd12501efbb2b3aa8c7d
      RENOVATE_BOOTSTRAP_ENV: /var/run/lv3/renovate/renovate.env
      RENOVATE_RUNTIME_ENV: .tmp/renovate.runtime.env
      RENOVATE_RUNTIME_STATE: .tmp/renovate.runtime.json
    steps:
      - name: Checkout
        env:
          WORKFLOW_REPOSITORY: ${{ github.repository }}
          WORKFLOW_SERVER_URL: ${{ github.server_url }}
          WORKFLOW_REF: ${{ github.ref }}
          WORKFLOW_SHA: ${{ github.sha }}
          WORKFLOW_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$PWD"
          git init .
          if git remote get-url origin >/dev/null 2>&1; then
            git remote set-url origin "${WORKFLOW_SERVER_URL}/${WORKFLOW_REPOSITORY}.git"
          else
            git remote add origin "${WORKFLOW_SERVER_URL}/${WORKFLOW_REPOSITORY}.git"
          fi
          git -c http.extraHeader="Authorization: token ${WORKFLOW_TOKEN}" fetch --depth=1 origin "${WORKFLOW_REF}"
          git checkout --force "${WORKFLOW_SHA}"

      - name: Prepare Renovate runtime files
        run: mkdir -p .tmp

      - name: Install Docker CLI
        run: |
          set -euo pipefail
          if command -v docker >/dev/null 2>&1; then
            exit 0
          fi
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends docker.io

      - name: Discover runner host paths
        run: |
          set -euo pipefail
          docker_bin="$(command -v docker || command -v docker.io || true)"
          if [ -z "${docker_bin}" ]; then
            echo "Docker CLI is unavailable after bootstrap." >&2
            exit 1
          fi
          discover_workspace_host_path() {
            current_container_id="${HOSTNAME:-$(hostname)}"
            cgroup_container_id="$(sed -n 's|.*docker[-/]\\([0-9a-f]\\{12,64\\}\\).*|\\1|p' /proc/self/cgroup | head -n1)"
            named_container_id="$("${docker_bin}" ps --filter "name=WORKFLOW-renovate_JOB-renovate" -q | head -n1)"
            for candidate in "${current_container_id}" "${cgroup_container_id}" "${named_container_id}"; do
              [ -n "${candidate}" ] || continue
              workspace_host_path="$("${docker_bin}" inspect "${candidate}" --format "{{range .Mounts}}{{if eq .Destination \"${PWD}\"}}{{.Source}}{{end}}{{end}}" 2>/dev/null || true)"
              if [ -n "${workspace_host_path}" ]; then
                printf '%s\n' "${workspace_host_path}"
                return 0
              fi
            done
            return 1
          }
          discover_bootstrap_host_dir() {
            "${docker_bin}" ps -q | while read -r container_id; do
              "${docker_bin}" inspect "${container_id}" --format "{{range .Mounts}}{{if eq .Destination \"/var/run/lv3/renovate\"}}{{.Source}}{{end}}{{end}}"
            done | python3 -c 'import sys; lines=[line.strip() for line in sys.stdin if line.strip()]; print(lines[0] if lines else "", end="")'
          }
          workspace_host_path="$(discover_workspace_host_path)"
          if [ -z "${workspace_host_path}" ]; then
            echo "Unable to determine the hosted workspace source path." >&2
            exit 1
          fi
          bootstrap_host_dir="$(discover_bootstrap_host_dir)"
          if [ -z "${bootstrap_host_dir}" ]; then
            echo "Unable to determine the Renovate bootstrap credential host path." >&2
            exit 1
          fi
          printf '%s\n' "${workspace_host_path}" > .tmp/workspace-host.path
          printf '%s\n' "${bootstrap_host_dir}" > .tmp/bootstrap-host.path

      - name: Mint a short-lived Renovate token
        run: |
          set -euo pipefail
          workspace_host_path="$(cat .tmp/workspace-host.path)"
          bootstrap_host_dir="$(cat .tmp/bootstrap-host.path)"
          test -d "${workspace_host_path}"
          test -s "${bootstrap_host_dir}/renovate.env"
          docker run --rm \
            --network host \
            -e RENOVATE_BOOTSTRAP_ENV \
            -e RENOVATE_RUNTIME_STATE \
            -e RENOVATE_RUNTIME_ENV \
            -v "${bootstrap_host_dir}:/var/run/lv3/renovate:ro" \
            -v "${workspace_host_path}:/workspace" \
            -w /workspace \
            "${RENOVATE_HELPER_IMAGE}" \
            sh -lc '
              set -euo pipefail
              set -a
              . "${RENOVATE_BOOTSTRAP_ENV}"
              set +a
              python3 scripts/renovate_runtime_token.py create \
                --state-file "${RENOVATE_RUNTIME_STATE}" \
                --env-file "${RENOVATE_RUNTIME_ENV}"
            '

      - name: Run Renovate through the pinned Harbor image
        run: |
          set -euo pipefail
          workspace_host_path="$(cat .tmp/workspace-host.path)"
          test -d "${workspace_host_path}"
          set -a
          . "${RENOVATE_RUNTIME_ENV}"
          set +a
          docker pull "${RENOVATE_IMAGE}"
          docker run --rm \
            --network host \
            -e LOG_LEVEL \
            -e RENOVATE_PLATFORM \
            -e RENOVATE_ENDPOINT \
            -e RENOVATE_REPOSITORIES \
            -e RENOVATE_TOKEN \
            -v "${workspace_host_path}:/workspace" \
            -w /workspace \
            "${RENOVATE_IMAGE}" \
            renovate

      - name: Revoke the short-lived Renovate token
        if: always()
        run: |
          set -euo pipefail
          workspace_host_path="$(cat .tmp/workspace-host.path)"
          bootstrap_host_dir="$(cat .tmp/bootstrap-host.path)"
          if [ -s "${bootstrap_host_dir}/renovate.env" ]; then
            docker run --rm \
              --network host \
              -e RENOVATE_BOOTSTRAP_ENV \
              -e RENOVATE_RUNTIME_STATE \
              -e RENOVATE_RUNTIME_ENV \
              -v "${bootstrap_host_dir}:/var/run/lv3/renovate:ro" \
              -v "${workspace_host_path}:/workspace" \
              -w /workspace \
              "${RENOVATE_HELPER_IMAGE}" \
              sh -lc '
                set -euo pipefail
                set -a
                . "${RENOVATE_BOOTSTRAP_ENV}"
                set +a
                python3 scripts/renovate_runtime_token.py cleanup \
                  --state-file "${RENOVATE_RUNTIME_STATE}"
              '
          fi
