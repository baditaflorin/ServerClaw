name: renovate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".gitea/workflows/renovate.yml"
      - "config/renovate.json"
      - "docs/schema/renovate-config.schema.json"
      - "scripts/renovate_config.py"
  schedule:
    - cron: "17 4 * * *"

jobs:
  renovate:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Renovate config
        run: make validate-renovate-config

      - name: Run Renovate
        env:
          LOG_LEVEL: info
          RENOVATE_CONFIG_FILE: config/renovate.json
          RENOVATE_ENDPOINT: http://10.10.10.20:3003
          RENOVATE_PLATFORM: gitea
          RENOVATE_REPOSITORIES: ops/proxmox_florin_server
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: |
          docker run --rm --pull always \
            -e LOG_LEVEL \
            -e RENOVATE_CONFIG_FILE \
            -e RENOVATE_ENDPOINT \
            -e RENOVATE_PLATFORM \
            -e RENOVATE_REPOSITORIES \
            -e RENOVATE_TOKEN \
            -v "$PWD:/workspace" \
            -w /workspace \
            ghcr.io/renovatebot/renovate:39
