name: renovate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".gitea/workflows/renovate.yml"
      - "config/renovate.json"
      - "docs/schema/renovate-config.schema.json"
      - "scripts/renovate_config.py"
  schedule:
    - cron: "17 4 * * *"

jobs:
  renovate:
    runs-on: self-hosted
    steps:
      - name: Checkout
        env:
          GITEA_ACTOR: ${{ github.actor }}
          GITEA_REF: ${{ github.ref }}
          GITEA_REPOSITORY: ${{ github.repository }}
          GITEA_SERVER_URL: ${{ github.server_url }}
          GITEA_SHA: ${{ github.sha }}
          GITEA_TOKEN: ${{ github.token }}
        run: |
          set -eu
          AUTH_HEADER="$(printf '%s:%s' "${GITEA_ACTOR}" "${GITEA_TOKEN}" | base64 | tr -d '\n')"
          rm -rf .git
          git init .
          git remote add origin "${GITEA_SERVER_URL}/${GITEA_REPOSITORY}.git"
          git -c http.extraHeader="Authorization: Basic ${AUTH_HEADER}" fetch --depth 1 origin "${GITEA_SHA}"
          git checkout --detach FETCH_HEAD

      - name: Install runner prerequisites
        run: |
          set -eu
          apk add --no-cache docker-cli python3 py3-jsonschema py3-yaml

      - name: Validate Renovate config
        run: python3 scripts/renovate_config.py --validate

      - name: Run Renovate
        env:
          LOG_LEVEL: info
          RENOVATE_CONFIG_FILE: /workspace/config/renovate.json
          RENOVATE_ENDPOINT: http://10.10.10.20:3003
          RENOVATE_PLATFORM: gitea
          RENOVATE_REPOSITORIES: ops/proxmox_florin_server
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: |
          docker run --rm --pull always \
            -e LOG_LEVEL \
            -e RENOVATE_CONFIG_FILE \
            -e RENOVATE_ENDPOINT \
            -e RENOVATE_PLATFORM \
            -e RENOVATE_REPOSITORIES \
            -e RENOVATE_TOKEN \
            -v "$PWD:/workspace" \
            -w /workspace \
            ghcr.io/renovatebot/renovate:39
