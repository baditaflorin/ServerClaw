schema_version: 1.0.0
service:
  id: librechat
  name: LibreChat
  description: Private multi-model chat interface with Keycloak SSO, agent presets,
    and customizable UI.
  category: access
  lifecycle_status: active
  vm: coolify
  vmid: 170
  internal_url: http://10.10.10.70:8096
  public_url: https://chat.example.com
  subdomain: chat.example.com
  exposure: edge-published
  uptime_monitor_name: LibreChat Public
  health_probe_id: librechat
  image_catalog_ids: []
  secret_catalog_ids: []
  adr: 0380
  runbook: docs/runbooks/configure-librechat.md
  runtime_pool: dedicated-coolify
  deployment_surface: playbooks/services/librechat.yml
  restart_domain: dedicated-coolify-core
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/dedicated-coolify
  mobility_tier: movable_singleton
  tags:
    - chat
    - llm
    - ui
  environments:
    production:
      status: active
      url: https://chat.example.com
      subdomain: chat.example.com
completeness:
  service_type: compose
  requires_subdomain: true
  requires_oidc: true
  requires_secrets: true
  requires_compose_secrets: true
  dashboard_file: config/grafana/dashboards/librechat.json
  alert_rule_file: config/alertmanager/rules/librechat.yml
  suppressed_checks:
    api_gateway: '2026-09-23'
    keycloak_client: '2026-09-23'
    secret_definition: '2026-09-23'
    grafana_dashboard: '2026-09-23'
    slo_definition: '2026-09-23'
    data_catalog: '2026-09-23'
    alert_rules: '2026-09-23'
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
    - git_repository
    - pbs_vm_170
  standby:
    kind: cold
    location: coolify
    failover_trigger: Restore coolify when LibreChat or its runtime state cannot be
      recovered in place.
    failback_method: Restore or rebuild coolify, then rerun the LibreChat converge
      from git.
dependency:
  node:
    id: librechat
    service: librechat
    name: LibreChat
    vm: coolify
    tier: 2
    category: automation
  outbound_edges:
    - from: librechat
      to: keycloak
      type: soft
      description: LibreChat uses Keycloak OIDC for authentication but can fall back
        to local login.
    - from: librechat
      to: ollama
      type: hard
      description: LibreChat connects directly to Ollama for local model inference.
    - from: librechat
      to: openbao
      type: startup_only
      description: LibreChat consumes runtime secrets from the OpenBao sidecar.
    - from: librechat
      to: searxng
      type: soft
      description: LibreChat delegates optional web-search requests to the private
        SearXNG runtime.
health:
  service_name: librechat
  owning_vm: coolify
  role: librechat_runtime
  verify_file: roles/librechat_runtime/tasks/verify.yml
  startup:
    kind: http
    description: LibreChat startup completes once the health API endpoint answers.
    timeout_seconds: 180
    retries: 18
    delay_seconds: 5
    url: http://127.0.0.1:8096/
    method: GET
    expected_status:
      - 200
  liveness:
    kind: http
    description: The LibreChat health API endpoint continues to answer.
    timeout_seconds: 120
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:8096/
    method: GET
    expected_status:
      - 200
  readiness:
    kind: http
    description: LibreChat is ready to serve requests.
    timeout_seconds: 120
    retries: 12
    delay_seconds: 2
    url: http://127.0.0.1:8096/
    method: GET
    expected_status:
      - 200
  uptime_kuma:
    enabled: true
    monitor:
      name: LibreChat Public
      type: http
      url: https://chat.example.com
      description: Public LibreChat chat surface.
      interval: 60
      retryInterval: 60
      maxretries: 0
      maxredirects: 10
      accepted_statuscodes:
        - 200-302
