schema_version: 1.0.0
service:
  id: uptime_kuma
  name: Uptime Kuma
  description: Synthetic monitoring surface used to track public and internal service
    reachability.
  category: observability
  lifecycle_status: active
  vm: runtime-general-lv3
  vmid: 191
  internal_url: http://10.10.10.91:3001
  public_url: https://uptime.lv3.org
  subdomain: uptime.lv3.org
  exposure: edge-published
  uptime_monitor_name: Uptime Kuma Public
  health_probe_id: uptime_kuma
  image_catalog_ids:
  - uptime_kuma_runtime
  adr: '0027'
  runbook: docs/runbooks/deploy-uptime-kuma.md
  runtime_pool: runtime-general
  deployment_surface: playbooks/services/uptime-kuma.yml
  restart_domain: runtime-general-observability
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/runtime-general
  mobility_tier: movable_singleton
  tags:
  - monitoring
  - synthetics
  - health
  environments:
    production:
      status: active
      url: https://uptime.lv3.org
      subdomain: uptime.lv3.org
    staging:
      status: planned
      url: https://uptime.staging.lv3.org
      subdomain: uptime.staging.lv3.org
      notes: Planned staged monitor surface on the shared edge.
completeness:
  service_type: compose
  requires_subdomain: true
  requires_oidc: false
  requires_secrets: false
  requires_compose_secrets: true
  suppression_preset: legacy-service
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
  - git_repository
  - pbs_vm_191
  standby:
    kind: cold
    location: runtime-general-lv3
    failover_trigger: Restore runtime-general-lv3 when Uptime Kuma or its runtime
      state cannot be recovered in place.
    failback_method: Restore or rebuild runtime-general-lv3, then rerun the Uptime
      Kuma converge from git.
dependency:
  node:
    id: uptime_kuma
    service: uptime_kuma
    name: Uptime Kuma
    vm: docker-runtime-lv3
    tier: 1
    category: observability
    adr: '0027'
  outbound_edges: []
health:
  service_name: uptime-kuma
  owning_vm: runtime-general-lv3
  role: uptime_kuma_runtime
  verify_file: roles/uptime_kuma_runtime/tasks/verify.yml
  liveness:
    kind: command
    description: The Uptime Kuma container is running on runtime-general-lv3.
    timeout_seconds: 30
    retries: 1
    delay_seconds: 0
    argv:
    - docker
    - ps
    - --filter
    - name=uptime-kuma
    - --filter
    - status=running
    - --format
    - '{{.Names}}'
    success_rc: 0
  readiness:
    kind: http
    description: The Uptime Kuma web UI responds on the local listener.
    timeout_seconds: 30
    retries: 1
    delay_seconds: 0
    url: http://127.0.0.1:3001
    method: GET
    expected_status:
    - 200
  tls_certificate_ids:
  - uptime-kuma-edge
  uptime_kuma:
    enabled: true
    monitor:
      name: Uptime Kuma Public
      type: http
      url: https://uptime.lv3.org
      description: Public Uptime Kuma entrypoint through the NGINX edge.
      interval: 60
      retryInterval: 60
      maxretries: 0
      maxredirects: 10
      accepted_statuscodes:
      - 200-399
slos:
- id: uptime-kuma-availability
  service_id: uptime_kuma
  indicator: availability
  objective_percent: 99.9
  window_days: 30
  target_url: https://uptime.lv3.org
  probe_module: http_2xx_follow_redirects
  description: Uptime Kuma remains reachable through the public status surface.
