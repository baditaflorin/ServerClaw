schema_version: 1.0.0
service:
  id: directus
  name: Directus
  description: REST and GraphQL operational data API over the dedicated Directus PostgreSQL
    database.
  category: access
  lifecycle_status: active
  vm: docker-runtime-lv3
  vmid: 120
  internal_url: http://10.10.10.20:8055
  public_url: https://data.lv3.org
  subdomain: data.lv3.org
  exposure: edge-published
  uptime_monitor_name: Directus Public Health
  health_probe_id: directus
  image_catalog_ids:
  - directus_runtime
  secret_catalog_ids:
  - directus_database_password
  - directus_key
  - directus_secret
  - directus_admin_password
  - directus_service_registry_token
  - keycloak_directus_client_secret
  adr: 0289
  adr_file: docs/adr/0289-directus-as-the-rest-graphql-data-api-layer-over-postgres.md
  runbook: docs/runbooks/configure-directus.md
  runtime_pool: runtime-general
  deployment_surface: playbooks/services/directus.yml
  restart_domain: runtime-general-product-apps
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/runtime-general
  mobility_tier: movable_singleton
  tags:
  - data-api
  - directus
  - graphql
  - postgres
  - rest
  - oidc
  notes: Directus runs on docker-runtime-lv3, uses a dedicated PostgreSQL database
    named directus, publishes data.lv3.org through the shared NGINX edge, delegates
    routine browser sign-in to Keycloak, and retains a repo-managed break-glass local
    admin password for recovery.
  environments:
    production:
      status: active
      url: https://data.lv3.org
      subdomain: data.lv3.org
      notes: Repo automation verifies the public /server/health endpoint, the Keycloak
        login redirect, and scoped REST plus GraphQL token access against the governed
        service_registry collection.
completeness:
  service_type: compose
  requires_subdomain: true
  requires_oidc: true
  requires_secrets: true
  requires_compose_secrets: true
  keycloak_client_generated: true
  suppressed_checks:
    api_gateway: '2026-09-30'
    alert_rules: '2026-09-30'
    grafana_dashboard: '2026-09-30'
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
  - git_repository
  - pbs_vm_120
  - pbs_vm_130
  standby:
    kind: cold
    location: docker-runtime-lv3
    failover_trigger: Restore docker-runtime-lv3 or postgres-lv3 when Directus or
      the dedicated directus database cannot be recovered in place.
    failback_method: Restore or rebuild docker-runtime-lv3 and postgres-lv3 as needed,
      then rerun the Directus converge plus public token verification workflow.
dependency:
  node:
    id: directus
    service: directus
    name: Directus
    vm: docker-runtime-lv3
    tier: 2
    category: access
    adr: 0289
  outbound_edges:
  - from: directus
    to: docker_runtime
    type: hard
    description: The Directus runtime container and guest-local listener are hosted
      on docker-runtime-lv3.
  - from: directus
    to: keycloak
    type: soft
    description: Routine browser sign-in delegates to Keycloak via OIDC while the
      local Directus admin remains break-glass only.
  - from: directus
    to: nginx_edge
    type: soft
    description: The shared NGINX edge publishes data.lv3.org directly to Directus
      on docker-runtime-lv3.
  - from: directus
    to: openbao
    type: startup_only
    description: Directus consumes OpenBao-delivered runtime secrets during converge
      and container startup.
  - from: directus
    to: postgres
    type: hard
    description: Directus persists its system state and governed collections in the
      dedicated PostgreSQL database directus on postgres-lv3.
health:
  service_name: directus
  owning_vm: docker-runtime-lv3
  role: directus_runtime
  verify_file: roles/directus_runtime/tasks/verify.yml
  startup:
    kind: http
    description: Directus startup completes once the loopback /server/health endpoint
      responds on docker-runtime-lv3.
    timeout_seconds: 180
    retries: 36
    delay_seconds: 5
    url: http://127.0.0.1:8055/server/health
    method: GET
    expected_status:
    - 200
  liveness:
    kind: http
    description: Directus keeps serving the loopback /server/health contract on docker-runtime-lv3.
    timeout_seconds: 180
    retries: 36
    delay_seconds: 5
    url: http://127.0.0.1:8055/server/health
    method: GET
    expected_status:
    - 200
  readiness:
    kind: http
    description: Directus serves the managed health contract locally and keeps the
      published container port bound for edge publication.
    timeout_seconds: 180
    retries: 36
    delay_seconds: 5
    url: http://127.0.0.1:8055/server/health
    method: GET
    expected_status:
    - 200
    docker_publication:
      container_name: directus
      bindings:
      - host: 10.10.10.92
        port: 8055
      required_networks:
      - directus_default
  uptime_kuma:
    enabled: true
    monitor:
      name: Directus Public Health
      type: http
      url: https://data.lv3.org/server/health
      description: Public Directus health endpoint published through the shared NGINX
        edge.
      interval: 60
      retryInterval: 60
      maxretries: 0
      maxredirects: 5
      accepted_statuscodes:
      - 200-299
data:
- id: directus_primary_data
  service: directus
  name: Directus operational metadata database
  class: internal
  retention_days: null
  backup_included: true
  access_role: platform-operator
  pii_risk: low
  locations:
  - PostgreSQL database directus on postgres-lv3
  - Directus system tables plus governed collections in the public schema of the dedicated
    directus database
  notes: Directus persists repo-governed operational metadata in a dedicated PostgreSQL
    database. Upstream Directus 11.17.0 keeps both system tables and managed collections
    in the public schema of that dedicated database, so schema isolation is enforced
    at the database boundary rather than by a separate PostgreSQL schema.
slos:
- id: directus-availability
  service_id: directus
  indicator: availability
  objective_percent: 99.5
  window_days: 30
  target_url: https://data.lv3.org/server/health
  probe_module: http_2xx_follow_redirects
  description: Directus should keep the public health contract on data.lv3.org reachable
    through the shared edge.
