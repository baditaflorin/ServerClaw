schema_version: 1.0.0
service:
  id: typesense
  name: Typesense
  description: Private full-text search engine for structured internal platform data
    and faceted operator lookups.
  category: data
  lifecycle_status: active
  vm: docker-runtime
  vmid: 120
  internal_url: http://100.64.0.1:8016
  exposure: private-only
  health_probe_id: typesense
  image_catalog_ids:
    - typesense_runtime
  secret_catalog_ids:
    - typesense_api_key
  adr: '0277'
  runbook: docs/runbooks/configure-typesense.md
  runtime_pool: runtime-general
  deployment_surface: playbooks/services/typesense.yml
  restart_domain: runtime-general-data-apps
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/runtime-general
  mobility_tier: movable_singleton
  tags:
    - search
    - structured-data
    - full-text
    - private
  environments:
    production:
      status: active
      url: http://100.64.0.1:8016
      notes: Private Tailscale controller route published by the Proxmox host proxy.
completeness:
  service_type: compose
  requires_subdomain: false
  requires_oidc: false
  requires_secrets: true
  requires_compose_secrets: true
  dashboard_file: config/grafana/dashboards/typesense.json
  alert_rule_file: config/alertmanager/rules/typesense.yml
  suppressed_checks: {}
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
    - git_repository
    - pbs_vm_120
  standby:
    kind: cold
    location: docker-runtime
    failover_trigger: Restore docker-runtime when Typesense, its private controller
      proxy contract, or the derived search index volume cannot be recovered in place.
    failback_method: Restore or rebuild docker-runtime, then rerun the Typesense converge
      and API gateway converge from git to rebuild the repo-managed structured-search
      collections.
dependency:
  node:
    id: typesense
    service: typesense
    name: Typesense
    vm: docker-runtime
    tier: 2
    category: data
    adr: '0277'
  outbound_edges:
    - from: typesense
      to: docker_runtime
      type: hard
      description: The Typesense runtime and its derived index volume are hosted on
        docker-runtime.
    - from: typesense
      to: openbao
      type: startup_only
      description: Typesense reads the mirrored API key from the OpenBao-backed runtime
        secret path before startup.
health:
  service_name: typesense
  owning_vm: docker-runtime
  role: typesense_runtime
  verify_file: roles/typesense_runtime/tasks/verify.yml
  startup:
    kind: http
    description: Typesense startup completes once the local health endpoint responds
      on docker-runtime.
    timeout_seconds: 180
    retries: 36
    delay_seconds: 5
    url: http://127.0.0.1:8108/health
    method: GET
    expected_status:
      - 200
  liveness:
    kind: http
    description: The Typesense health endpoint responds on the private listener.
    timeout_seconds: 120
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:8108/health
    method: GET
    expected_status:
      - 200
  readiness:
    kind: http
    description: The Typesense runtime remains ready to accept private structured-search
      queries.
    timeout_seconds: 120
    retries: 6
    delay_seconds: 5
    url: http://127.0.0.1:8108/health
    method: GET
    expected_status:
      - 200
  uptime_kuma:
    enabled: false
    reason: Typesense is private-only and is verified directly by the runtime role
      plus API gateway structured-search checks.
data:
  - id: typesense-platform-service-index
    service: typesense
    name: Typesense platform service index
    class: internal
    retention_days: null
    backup_included: true
    access_role: platform-read
    pii_risk: low
    locations:
      - Docker volume typesense-data on docker-runtime
      - Typesense collection platform-services
    notes: The repo-managed platform service catalog is materialized into Typesense
      as a derived full-text and faceted-search index and can be replayed from git
      after restore.
slos:
  - id: typesense-availability
    service_id: typesense
    indicator: availability
    objective_percent: 99.0
    window_days: 30
    target_url: http://100.64.0.1:8016/health
    probe_module: http_2xx_follow_redirects
    description: The private Typesense controller endpoint remains reachable for repo-managed
      structured search sync and operator keyword lookups.
