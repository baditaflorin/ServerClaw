schema_version: 1.0.0
service:
  id: serverclaw
  name: ServerClaw
  description: Public chat-first ServerClaw assistant surface backed by repo-governed
    local model and search integrations.
  category: access
  lifecycle_status: active
  vm: coolify
  vmid: 170
  internal_url: http://10.10.10.70:8096
  public_url: https://chat.example.com
  exposure: edge-published
  uptime_monitor_name: ServerClaw
  health_probe_id: serverclaw
  image_catalog_ids: []
  secret_catalog_ids:
    - serverclaw_admin_password
    - serverclaw_secret_key
    - serverclaw_oidc_client_secret
  adr: '0254'
  runbook: docs/runbooks/configure-serverclaw.md
  runtime_pool: dedicated-coolify
  deployment_surface: playbooks/serverclaw.yml
  restart_domain: dedicated-coolify-core
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/dedicated-coolify
  mobility_tier: movable_singleton
  tags:
    - agents
    - chat
    - assistant
    - public
  environments:
    production:
      status: active
      url: https://chat.example.com
      notes: ServerClaw uses in-app Keycloak OIDC for routine browser login while
        retaining a repo-managed bootstrap admin as break-glass access.
completeness:
  service_type: compose
  requires_subdomain: true
  requires_oidc: true
  requires_secrets: true
  requires_compose_secrets: true
  keycloak_client_generated: true
  dashboard_file: config/grafana/dashboards/serverclaw.json
  alert_rule_file: config/alertmanager/rules/serverclaw.yml
  suppressed_checks: {}
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
    - git_repository
    - pbs_vm_170
  standby:
    kind: cold
    location: coolify
    failover_trigger: Restore coolify when ServerClaw or its runtime state cannot
      be recovered in place.
    failback_method: Restore or rebuild coolify, then rerun the ServerClaw converge
      from git.
dependency:
  node:
    id: serverclaw
    service: serverclaw
    name: ServerClaw
    vm: coolify
    tier: 2
    category: access
    adr: '0254'
  outbound_edges:
    - from: serverclaw
      to: keycloak
      type: soft
      description: ServerClaw prefers Keycloak-backed browser sign-in while retaining
        a repo-managed bootstrap admin as the break-glass fallback.
    - from: serverclaw
      to: nginx_edge
      type: soft
      description: Public access to chat.example.com depends on the shared NGINX edge
        publication path.
    - from: serverclaw
      to: ollama
      type: hard
      description: ServerClaw routes its default local model connector to the private
        Ollama runtime on docker-runtime.
    - from: serverclaw
      to: openbao
      type: startup_only
      description: ServerClaw consumes mirrored runtime secrets and the dedicated
        OIDC client secret from the OpenBao sidecar.
    - from: serverclaw
      to: searxng
      type: soft
      description: ServerClaw delegates optional web-search requests to the private
        SearXNG runtime when the feature is enabled.
health:
  service_name: serverclaw
  owning_vm: coolify
  role: null
  verify_file: null
  startup:
    kind: http
    description: ServerClaw startup completes once the local HTTP surface answers
      on the runtime VM.
    timeout_seconds: 120
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:8096
    method: GET
    expected_status:
      - 200
  liveness:
    kind: http
    description: The ServerClaw root page responds on the local listener.
    timeout_seconds: 120
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:8096
    method: GET
    expected_status:
      - 200
  readiness:
    kind: http
    description: The ServerClaw local listener still answers after the role-level
      admin sign-in verification completes.
    timeout_seconds: 120
    retries: 1
    delay_seconds: 0
    url: http://127.0.0.1:8096
    method: GET
    expected_status:
      - 200
  uptime_kuma:
    enabled: true
    monitor:
      name: ServerClaw
      type: http
      url: https://chat.example.com
      description: Public ServerClaw assistant surface published through the shared
        NGINX edge.
      interval: 60
      retryInterval: 60
      maxretries: 0
      maxredirects: 10
      accepted_statuscodes:
        - 200-299
data:
  - id: serverclaw-workbench-state
    service: serverclaw
    name: ServerClaw workbench state
    class: confidential
    retention_days: 90
    backup_included: false
    access_role: platform-operator
    pii_risk: high
    locations:
      - http://100.64.0.1:8008
    notes: ServerClaw persists conversations, workspace artifacts, prompt history,
      and user-specific workbench settings in its local runtime data volume on docker-runtime.
  - id: serverclaw-workspace-store
    service: serverclaw
    name: ServerClaw workspace and chat state
    class: confidential
    retention_days: 90
    backup_included: false
    access_role: platform-operator
    pii_risk: high
    locations:
      - /opt/serverclaw/data
      - https://chat.example.com
    notes: ServerClaw persists chat history, workspace metadata, uploaded knowledge
      artifacts, and user-facing assistant settings in its ServerClaw data volume
      on coolify.
slos:
  - id: serverclaw-availability
    service_id: serverclaw
    indicator: availability
    objective_percent: 99.0
    window_days: 30
    target_url: https://chat.example.com
    probe_module: http_2xx_follow_redirects
    description: ServerClaw remains reachable through the public LV3 edge for chat-first
      assistant access.
