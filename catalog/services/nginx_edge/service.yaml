schema_version: 1.0.0
service:
  id: nginx_edge
  name: NGINX Edge
  description: Public ingress edge that terminates TLS and publishes selected services.
  category: access
  lifecycle_status: active
  vm: nginx-lv3
  vmid: 110
  internal_url: http://10.10.10.10
  public_url: https://nginx.lv3.org
  subdomain: nginx.lv3.org
  exposure: edge-static
  uptime_monitor_name: NGINX Edge Public
  health_probe_id: nginx_edge
  adr: '0021'
  runbook: docs/runbooks/configure-edge-publication.md
  runtime_pool: dedicated-edge
  deployment_surface: playbooks/services/public-edge.yml
  restart_domain: dedicated-edge-publication
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/dedicated-edge
  mobility_tier: anchor
  dashboard_url: https://grafana.lv3.org/d/lv3-vm-nginx-lv3/lv3-vm-nginx-lv3
  tags:
    - nginx
    - edge
    - tls
    - ingress
  environments:
    production:
      status: active
      url: https://nginx.lv3.org
      subdomain: nginx.lv3.org
completeness:
  service_type: nginx-plugin
  requires_subdomain: true
  requires_oidc: false
  requires_secrets: false
  requires_compose_secrets: false
  suppression_preset: legacy-service
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 30
    rpo_minutes: 0
  backup_sources:
    - git_repository
    - pbs_vm_110
  standby:
    kind: cold
    location: nginx-lv3
    failover_trigger: Restore or rebuild nginx-lv3 when edge publication cannot be
      recovered in place.
    failback_method: Restore nginx-lv3 and replay the ingress and edge-publication
      converges from git.
dependency:
  node:
    id: nginx_edge
    service: nginx_edge
    name: NGINX Edge
    vm: nginx-lv3
    tier: 1
    category: infrastructure
    adr: '0021'
  outbound_edges: []
health:
  service_name: nginx-edge
  owning_vm: nginx-lv3
  role: nginx_edge_publication
  verify_file: roles/nginx_edge_publication/tasks/verify.yml
  liveness:
    kind: systemd
    description: The nginx edge unit is active on the public edge guest.
    timeout_seconds: 30
    retries: 1
    delay_seconds: 0
    unit: nginx
    expected_state: active
  readiness:
    kind: http
    description: The managed nginx.lv3.org host header is served over HTTPS.
    timeout_seconds: 30
    retries: 1
    delay_seconds: 0
    url: https://127.0.0.1/
    method: GET
    expected_status:
      - 200
    headers:
      Host: nginx.lv3.org
    validate_tls: false
  uptime_kuma:
    enabled: true
    monitor:
      name: NGINX Edge Public
      type: http
      url: https://nginx.lv3.org
      description: Public landing page served by the NGINX edge VM.
      interval: 60
      retryInterval: 60
      maxretries: 0
      maxredirects: 10
      accepted_statuscodes:
        - 200-399
slos:
  - id: nginx-edge-availability
    service_id: nginx_edge
    indicator: availability
    objective_percent: 99.95
    window_days: 30
    target_url: https://nginx.lv3.org
    probe_module: http_2xx_follow_redirects
    description: The edge reverse proxy remains reachable for published services.
