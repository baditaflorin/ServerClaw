schema_version: 1.0.0
service:
  id: crawl4ai
  name: Crawl4AI
  description: Private LLM-optimised web content crawler for cleaned Markdown extraction
    and bounded browser-assisted fetches.
  category: automation
  lifecycle_status: active
  vm: docker-runtime-lv3
  vmid: 120
  internal_url: http://10.10.10.20:11235
  exposure: private-only
  health_probe_id: crawl4ai
  image_catalog_ids:
  - crawl4ai_runtime
  adr: 0288
  adr_file: docs/adr/0288-crawl4ai-as-the-llm-optimised-web-content-crawler.md
  runbook: docs/runbooks/configure-crawl4ai.md
  runtime_pool: runtime-ai
  deployment_surface: playbooks/services/crawl4ai.yml
  restart_domain: runtime-ai-execution
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/runtime-ai
  mobility_tier: burst_batch
  dashboard_url: https://grafana.lv3.org/d/lv3-slo-overview/lv3-slo-overview?var-slo=crawl4ai-availability
  tags:
  - crawl
  - markdown
  - automation
  - private
  environments:
    production:
      status: active
      url: http://10.10.10.20:11235
      notes: The runtime stays private to docker-runtime-lv3 and the guest network;
        there is no public DNS record and no shared API gateway route for Crawl4AI.
completeness:
  service_type: compose
  requires_subdomain: false
  requires_oidc: false
  requires_secrets: false
  requires_compose_secrets: false
  dashboard_file: config/grafana/dashboards/slo-overview.json
  alert_rule_file: config/prometheus/rules/slo_alerts.yml
  suppressed_checks:
    api_gateway: '2026-09-23'
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
  - git_repository
  - pbs_vm_120
  standby:
    kind: cold
    location: docker-runtime-lv3
    failover_trigger: Restore docker-runtime-lv3 when the Crawl4AI runtime, its browser-backed
      crawl path, or the shared runtime state cannot be recovered in place.
    failback_method: Restore or rebuild docker-runtime-lv3, then rerun the Crawl4AI
      converge and private guest-network verification workflow.
dependency:
  node:
    id: crawl4ai
    service: crawl4ai
    name: Crawl4AI
    vm: docker-runtime-lv3
    tier: 2
    category: automation
    adr: 0288
  outbound_edges:
  - from: crawl4ai
    to: docker_runtime
    type: hard
    description: The Crawl4AI runtime and its bounded headless-browser worker pool
      are hosted on docker-runtime-lv3.
health:
  service_name: crawl4ai
  owning_vm: docker-runtime-lv3
  role: crawl4ai_runtime
  verify_file: roles/crawl4ai_runtime/tasks/verify.yml
  startup:
    kind: http
    description: Crawl4AI startup completes once the private health endpoint responds
      on the local listener.
    timeout_seconds: 180
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:11235/health
    method: GET
    expected_status:
    - 200
  liveness:
    kind: http
    description: Crawl4AI keeps serving the private health endpoint on docker-runtime-lv3.
    timeout_seconds: 180
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:11235/health
    method: GET
    expected_status:
    - 200
    docker_publication:
      container_name: crawl4ai
      bindings:
      - host: 10.10.10.20
        port: 11235
      required_networks:
      - crawl4ai_runtime
  readiness:
    kind: command
    description: The private monitor endpoint reports an active permanent browser
      pool after startup settles.
    timeout_seconds: 120
    retries: 3
    delay_seconds: 5
    argv:
    - /bin/bash
    - -lc
    - set -euo pipefail; payload=$(mktemp); trap 'rm -f "$payload"' EXIT; curl -fsS
      http://127.0.0.1:11235/monitor/health > "$payload"; python3 -c 'import json,
      pathlib, sys; monitor=json.loads(pathlib.Path(sys.argv[1]).read_text()); assert
      monitor["pool"]["permanent"]["active"] is True' "$payload"
    success_rc: 0
  uptime_kuma:
    enabled: false
    reason: Crawl4AI stays private-only and is verified through repo-managed health,
      monitor, and markdown smoke probes instead of a public uptime monitor.
data:
- id: crawl4ai-transient-crawl-buffers
  service: crawl4ai
  name: Crawl4AI transient crawl buffers
  class: internal
  retention_days: null
  backup_included: false
  access_role: platform-operator
  pii_risk: medium
  locations:
  - Transient request and response buffers inside the crawl4ai container on docker-runtime-lv3
  - Ephemeral browser session and temporary extraction state inside the Crawl4AI runtime
    on docker-runtime-lv3
  notes: Crawl4AI is stateless in this deployment and does not persist crawl history
    after each synchronous Markdown or extraction response completes.
slos:
- id: crawl4ai-availability
  service_id: crawl4ai
  indicator: availability
  objective_percent: 99.0
  window_days: 30
  target_url: http://10.10.10.20:11235/health
  probe_module: http_2xx_follow_redirects
  description: The private Crawl4AI runtime remains reachable on docker-runtime-lv3
    for LLM-oriented Markdown extraction and bounded browser-assisted fetches.
