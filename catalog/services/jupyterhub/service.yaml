schema_version: 1.0.0
service:
  id: jupyterhub
  name: JupyterHub
  description: Shared interactive notebook environment for exploratory platform analysis,
    prototype workflows, and governed operator experimentation.
  category: access
  lifecycle_status: active
  vm: docker-runtime-lv3
  vmid: 120
  internal_url: http://10.10.10.20:8097
  public_url: https://notebooks.lv3.org
  subdomain: notebooks.lv3.org
  exposure: edge-published
  uptime_monitor_name: JupyterHub Public Health
  health_probe_id: jupyterhub
  secret_catalog_ids:
  - jupyterhub_service_api_token
  - jupyterhub_minio_root_password
  - keycloak_jupyterhub_client_secret
  adr: 0291
  adr_file: docs/adr/0291-jupyterhub-as-the-interactive-notebook-environment.md
  runbook: docs/runbooks/configure-jupyterhub.md
  runtime_pool: runtime-ai
  deployment_surface: playbooks/services/jupyterhub.yml
  restart_domain: runtime-ai-execution
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/runtime-ai
  mobility_tier: burst_batch
  tags:
  - jupyter
  - notebooks
  - exploration
  - oidc
  notes: The current repo-managed notebook contract exposes Ollama, the private platform-context
    API, and the service-local jupyterhub-shared MinIO bucket inside spawned single-user
    servers; shared global MinIO, raw Qdrant, and LiteLLM remain future work.
  environments:
    production:
      status: active
      url: https://notebooks.lv3.org
      subdomain: notebooks.lv3.org
completeness:
  service_type: compose
  requires_subdomain: true
  requires_oidc: true
  requires_secrets: true
  requires_compose_secrets: true
  keycloak_client_generated: true
  suppressed_checks:
    grafana_dashboard: '2026-09-30'
    alert_rules: '2026-09-30'
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
  - git_repository
  - pbs_vm_120
  standby:
    kind: cold
    location: docker-runtime-lv3
    failover_trigger: Restore docker-runtime-lv3 when JupyterHub or its runtime state
      cannot be recovered in place.
    failback_method: Restore or rebuild docker-runtime-lv3, then rerun the JupyterHub
      converge and smoke-spawn verification workflow.
dependency:
  node:
    id: jupyterhub
    service: jupyterhub
    name: JupyterHub
    vm: docker-runtime-lv3
    tier: 1
    category: access
    adr: 0291
  outbound_edges:
  - from: jupyterhub
    to: keycloak
    type: soft
    description: JupyterHub delegates routine browser sign-in to the shared Keycloak
      OIDC broker.
  - from: jupyterhub
    to: nginx_edge
    type: soft
    description: Public access to notebooks.lv3.org depends on the shared NGINX edge
      publication path.
  - from: jupyterhub
    to: ollama
    type: soft
    description: Spawned notebook servers expose the private Ollama runtime for local
      model inference and the OpenAI-compatible API path.
  - from: jupyterhub
    to: openbao
    type: startup_only
    description: JupyterHub starts from OpenBao-rendered runtime secrets mirrored
      into its compose environment.
  - from: jupyterhub
    to: platform_context_api
    type: soft
    description: Spawned notebook servers expose the private platform-context API
      for exploratory repository and platform lookups.
health:
  service_name: jupyterhub
  owning_vm: docker-runtime-lv3
  role: jupyterhub_runtime
  verify_file: roles/jupyterhub_runtime/tasks/verify.yml
  startup:
    kind: http
    description: JupyterHub startup completes once the local hub health endpoint returns
      200 on the runtime listener.
    timeout_seconds: 300
    retries: 60
    delay_seconds: 5
    url: http://127.0.0.1:8097/hub/health
    method: GET
    expected_status:
    - 200
  liveness:
    kind: http
    description: The local JupyterHub health endpoint responds on docker-runtime-lv3.
    timeout_seconds: 300
    retries: 60
    delay_seconds: 5
    url: http://127.0.0.1:8097/hub/health
    method: GET
    expected_status:
    - 200
  readiness:
    kind: http
    description: The public JupyterHub health endpoint renders through the shared
      edge after OIDC and runtime startup settle.
    timeout_seconds: 300
    retries: 60
    delay_seconds: 5
    url: https://notebooks.lv3.org/hub/health
    method: GET
    expected_status:
    - 200
    docker_publication:
      container_name: jupyterhub
      bindings:
      - host: 10.10.10.20
        port: 8097
      required_networks:
      - jupyterhub_default
  uptime_kuma:
    enabled: true
    monitor:
      name: JupyterHub Public Health
      type: http
      url: https://notebooks.lv3.org/hub/health
      description: Public JupyterHub health endpoint published through the shared
        NGINX edge VM.
      interval: 60
      retryInterval: 60
      maxretries: 0
      maxredirects: 5
      accepted_statuscodes:
      - 200-299
data:
- id: jupyterhub-shared-notebook-bucket
  service: jupyterhub
  name: JupyterHub shared notebook bucket
  class: confidential
  retention_days: 365
  backup_included: false
  access_role: platform-operator
  pii_risk: medium
  locations:
  - /opt/jupyterhub/data/minio/jupyterhub-shared
  notes: The service-local MinIO bucket stores shared notebook assets and collaborative
    exploratory artifacts exchanged between operators.
- id: jupyterhub-user-notebook-volumes
  service: jupyterhub
  name: JupyterHub per-user notebook volumes
  class: confidential
  retention_days: 365
  backup_included: false
  access_role: platform-operator
  pii_risk: high
  locations:
  - Docker named volumes jupyterhub-user-* on docker-runtime-lv3 under /var/lib/docker/volumes
  notes: Per-user notebook workspaces can contain exploratory code, exported data,
    ad hoc credentials, and copied operational artifacts that must be treated as confidential
    operator material.
slos:
- id: jupyterhub-availability
  service_id: jupyterhub
  indicator: availability
  objective_percent: 99.5
  window_days: 30
  target_url: https://notebooks.lv3.org/hub/health
  probe_module: http_2xx_follow_redirects
  description: JupyterHub remains reachable through the public LV3 edge for interactive
    exploratory notebook sessions.
