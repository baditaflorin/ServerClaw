schema_version: 1.0.0
service:
  id: mailpit
  name: Mailpit
  description: Private SMTP interception surface for staging, development, and assertion-level
    email verification.
  category: communication
  lifecycle_status: active
  vm: runtime-general-lv3
  vmid: 191
  internal_url: http://10.10.10.91:8025
  exposure: private-only
  health_probe_id: mailpit
  image_catalog_ids:
  - mailpit_runtime
  adr: 0282
  runbook: docs/runbooks/configure-mailpit.md
  runtime_pool: runtime-general
  deployment_surface: playbooks/services/mailpit.yml
  restart_domain: runtime-general-communications
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/runtime-general
  mobility_tier: movable_singleton
  tags:
  - mail
  - smtp
  - development
  - testing
  environments:
    production:
      status: active
      url: http://10.10.10.91:8025
      notes: Mailpit runs privately on runtime-general-lv3 for non-production SMTP
        interception and operator inspection; production services must continue to
        relay through Stalwart.
completeness:
  service_type: compose
  requires_subdomain: false
  requires_oidc: false
  requires_secrets: false
  requires_compose_secrets: false
  suppressed_checks:
    api_gateway: '2026-09-23'
    grafana_dashboard: '2026-09-23'
    alert_rules: '2026-09-23'
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
  - git_repository
  - pbs_vm_191
  standby:
    kind: cold
    location: runtime-general-lv3
    failover_trigger: Restore runtime-general-lv3 when Mailpit or its private SMTP
      capture surface cannot be recovered in place.
    failback_method: Restore or rebuild runtime-general-lv3, then rerun the Mailpit
      converge from git.
dependency:
  node:
    id: mailpit
    service: mailpit
    name: Mailpit
    vm: docker-runtime-lv3
    tier: 1
    category: communication
    adr: 0282
  outbound_edges: []
health:
  service_name: mailpit
  owning_vm: runtime-general-lv3
  role: mailpit_runtime
  verify_file: roles/mailpit_runtime/tasks/verify.yml
  liveness:
    kind: http
    description: The Mailpit info endpoint responds on the private HTTP listener.
    timeout_seconds: 60
    retries: 1
    delay_seconds: 0
    url: http://127.0.0.1:8025/api/v1/info
    method: GET
    expected_status:
    - 200
  readiness:
    kind: command
    description: Mailpit accepts a local SMTP probe and exposes the captured message
      through the REST API.
    timeout_seconds: 120
    retries: 1
    delay_seconds: 0
    argv:
    - python3
    - -c
    - import json, smtplib, urllib.request; from email.message import EmailMessage;
      subject = 'LV3 health-probe Mailpit'; delete_request = urllib.request.Request('http://127.0.0.1:8025/api/v1/messages',
      method='DELETE'); urllib.request.urlopen(delete_request, timeout=30).read();
      message = EmailMessage(); message['From'] = 'healthcheck@lv3.org'; message['To']
      = 'mailpit-health@lv3.org'; message['Subject'] = subject; message.set_content('Mailpit
      readiness probe'); client = smtplib.SMTP('127.0.0.1', 1025, timeout=30); client.send_message(message);
      client.quit(); response = urllib.request.urlopen('http://127.0.0.1:8025/api/v1/messages',
      timeout=30); payload = json.loads(response.read().decode('utf-8')); messages
      = payload.get('messages', []); raise SystemExit(0 if any(item.get('Subject')
      == subject for item in messages) else 1)
    success_rc: 0
  uptime_kuma:
    enabled: false
    reason: Mailpit is intentionally private-only and is verified through role-level
      HTTP and SMTP probes instead of an always-on public monitor.
data:
- id: mailpit-captured-messages
  service: mailpit
  name: Mailpit captured message cache
  class: internal
  retention_days: null
  backup_included: false
  access_role: platform-operator
  pii_risk: medium
  locations:
  - Mailpit in-memory message store on docker-runtime-lv3
  notes: Mailpit intentionally keeps intercepted staging and development messages
    in ephemeral in-memory storage so assertion traffic is inspectable but lost on
    restart.
slos:
- id: mailpit-availability
  service_id: mailpit
  indicator: availability
  objective_percent: 99.0
  window_days: 30
  target_url: http://10.10.10.91:8025/api/v1/info
  probe_module: http_2xx_follow_redirects
  description: Mailpit remains reachable on the private guest-network listener for
    staging and development SMTP capture flows.
