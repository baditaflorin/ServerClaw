schema_version: 1.0.0
service:
  id: piper
  name: Piper
  description: Private CPU neural text-to-speech runtime for agent voice output, narrated
    notifications, and LiveKit-bound spoken responses.
  category: communication
  lifecycle_status: active
  vm: docker-runtime-lv3
  vmid: 120
  internal_url: http://10.10.10.20:8100
  exposure: private-only
  health_probe_id: piper
  adr: 0284
  adr_file: docs/adr/0284-piper-tts-as-the-cpu-neural-text-to-speech-service.md
  runbook: docs/runbooks/configure-piper.md
  runtime_pool: runtime-ai
  deployment_surface: playbooks/services/piper.yml
  restart_domain: runtime-ai-inference
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/runtime-ai
  mobility_tier: burst_batch
  dashboard_url: https://grafana.lv3.org/d/lv3-slo-overview/lv3-slo-overview?var-slo=piper-availability
  tags:
  - tts
  - speech
  - voice
  - private
  environments:
    production:
      status: active
      url: http://10.10.10.20:8100
      notes: Piper remains private to docker-runtime-lv3 and the managed guest network;
        there is no public hostname or shared API gateway route.
completeness:
  service_type: compose
  requires_subdomain: false
  requires_oidc: false
  requires_secrets: false
  requires_compose_secrets: false
  dashboard_file: config/grafana/dashboards/slo-overview.json
  alert_rule_file: config/prometheus/rules/slo_alerts.yml
  suppressed_checks:
    api_gateway: '2026-09-23'
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
  - git_repository
  - pbs_vm_120
  standby:
    kind: cold
    location: docker-runtime-lv3
    failover_trigger: Restore docker-runtime-lv3 when Piper or its voice-model cache
      cannot be recovered in place.
    failback_method: Restore or rebuild docker-runtime-lv3, then rerun the Piper converge
      and synthesis verification workflow from git.
dependency:
  node:
    id: piper
    service: piper
    name: Piper
    vm: docker-runtime-lv3
    tier: 1
    category: communication
    adr: 0284
  outbound_edges: []
health:
  service_name: piper
  owning_vm: docker-runtime-lv3
  role: piper_runtime
  verify_file: roles/piper_runtime/tasks/verify.yml
  startup:
    kind: http
    description: Piper startup completes once the local health endpoint reports the
      declared default voice on the private listener.
    timeout_seconds: 300
    retries: 60
    delay_seconds: 5
    url: http://127.0.0.1:8100/healthz
    method: GET
    expected_status:
    - 200
  liveness:
    kind: http
    description: The private Piper health endpoint responds on docker-runtime-lv3.
    timeout_seconds: 300
    retries: 60
    delay_seconds: 5
    url: http://127.0.0.1:8100/healthz
    method: GET
    expected_status:
    - 200
  readiness:
    kind: command
    description: Piper reports the declared voice and synthesizes a WAV payload from
      the repo-managed private `/api/tts` contract.
    timeout_seconds: 300
    retries: 3
    delay_seconds: 5
    argv:
    - python3
    - -c
    - 'import json, urllib.request; voices=json.loads(urllib.request.urlopen(''http://127.0.0.1:8100/api/voices'',
      timeout=60).read().decode(''utf-8'')); assert ''en_US-ryan-medium'' in voices[''voices''];
      request=urllib.request.Request(''http://127.0.0.1:8100/api/tts?voice=en_US-ryan-medium'',
      data=b''LV3 Piper readiness'', headers={''Content-Type'': ''text/plain; charset=utf-8''},
      method=''POST''); response=urllib.request.urlopen(request, timeout=180); payload=response.read();
      content_type=response.headers.get(''Content-Type'', ''''); assert content_type.startswith(''audio/wav'');
      assert payload[:4] == b''RIFF''; assert payload[8:12] == b''WAVE''; assert len(payload)
      > 1024'
    success_rc: 0
  uptime_kuma:
    enabled: false
    reason: Piper is intentionally private-only and is verified through the repo-managed
      health, voice-catalog, and WAV synthesis probes instead of a public monitor.
data:
- id: piper-transient-synthesis-payloads
  service: piper
  name: Piper transient synthesis payloads
  class: confidential
  retention_days: null
  backup_included: false
  access_role: platform-operator
  pii_risk: high
  locations:
  - Transient request and response buffers inside the piper container on docker-runtime-lv3
  - Ephemeral synthesized WAV bytes returned synchronously to callers on docker-runtime-lv3
  notes: Piper does not persist input text or synthesized audio after each request
    completes, but both may contain sensitive operator or agent content while the
    request is in flight.
- id: piper-voice-model-cache
  service: piper
  name: Piper voice model cache
  class: internal
  retention_days: null
  backup_included: false
  access_role: platform-operator
  pii_risk: low
  locations:
  - Docker volume piper-models on docker-runtime-lv3
  notes: Piper stores downloaded voice models in a named Docker volume so the private
    TTS runtime can restart without re-fetching the declared model set.
slos:
- id: piper-availability
  service_id: piper
  indicator: availability
  objective_percent: 99.0
  window_days: 30
  target_url: http://10.10.10.20:8100/healthz
  probe_module: http_2xx_follow_redirects
  description: The private Piper TTS health endpoint remains reachable on docker-runtime-lv3
    for real-time voice synthesis workflows.
