schema_version: 1.0.0
service:
  id: postgres
  name: PostgreSQL
  description: Managed high-availability PostgreSQL service for control-plane and
    future application state.
  category: data
  lifecycle_status: active
  vm: postgres
  vmid: 150
  internal_url: postgres://database.example.com:5432
  subdomain: database.example.com
  exposure: private-only
  uptime_monitor_name: PostgreSQL VIP Port
  health_probe_id: postgres
  adr: 0098
  runbook: docs/runbooks/postgres-failover.md
  runtime_pool: dedicated-postgres
  deployment_surface: playbooks/services/postgres-vm.yml
  restart_domain: dedicated-postgres-core
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/dedicated-postgres
  mobility_tier: anchor
  dashboard_url: https://grafana.example.com/d/lv3-vm-postgres/lv3-vm-postgres
  redundancy:
    tier: R2
    rto_target: 60s planned switchover, 5m unplanned failover
    rpo_target: 0s synchronous replication target
    backup_source: backup_pbs
    standby_location: postgres-replica on the same Proxmox host
    failover_trigger: Patroni health loss on postgres or operator-initiated switchover.
    failback_method: Reinitialize the former primary as a Patroni standby before a
      planned switchover back.
    standby:
      mode: warm
      vm: postgres-replica
      vmid: 151
      reservation:
        resources:
          ram_gb: 8
          vcpu: 4
          disk_gb: 96
        storage_class: local-lvm
        required_network_attachment: vmbr10
      placement:
        primary_compose_project: systemd:patroni-postgres
        standby_compose_project: systemd:patroni-postgres-replica
        primary_namespace: guest:postgres:patroni
        standby_namespace: guest:postgres-replica:patroni
        primary_data_paths:
          - guest:postgres:/var/lib/postgresql
        standby_data_paths:
          - guest:postgres-replica:/var/lib/postgresql
      failure_domain_honesty: This warm standby protects against guest-level corruption
        and software faults, but it does not cover loss of the single Proxmox host.
  tags:
    - postgres
    - database
    - ha
    - sql
  environments:
    production:
      status: active
      url: postgres://database.example.com:5432
      subdomain: database.example.com
completeness:
  service_type: vm-service
  requires_subdomain: true
  requires_oidc: false
  requires_secrets: false
  requires_compose_secrets: false
  suppression_preset: legacy-service
redundancy:
  tier: R2
  recovery_objective:
    rto_minutes: 1
    rpo_minutes: 0
  backup_sources:
    - patroni_replication
    - pbs_vm_150
  standby:
    kind: warm
    location: postgres-replica
    failover_trigger: Promote postgres-replica through the documented Patroni failover
      path when postgres or the current leader becomes unavailable.
    failback_method: Rebuild the old primary as a replica, let it resync, and only
      then move the writable VIP back if a planned failback is required.
  rehearsal:
    proofs:
      - proves_tier: R2
        result: fail
        performed_on: '2026-03-27'
        exercise: standby_switchover_or_promotion
        trigger: Operator-initiated planned PostgreSQL failover rehearsal from ws-0188-live-apply.
        target_environment: production
        duration_minutes: 7
        observed_rto_seconds: 0
        observed_data_loss: No switchover occurred because the standby guest and VIP
          path were both unavailable, so no data-loss window was exercised.
        health_verification: VM 151 is absent from `qm list`, `/etc/patroni` on VM
          150 only contains template inputs, both `patroni` and `keepalived` are inactive
          on postgres, and the Proxmox host can open `10.10.10.50:5432` but not the
          expected VIP `10.10.10.55:5432`.
        rollback_result: Not applicable because no promotion or failback was performed.
        evidence_ref: receipts/live-applies/2026-03-27-adr-0188-postgres-rehearsal-evidence.md
dependency:
  node:
    id: postgres
    service: postgres
    name: Postgres
    vm: postgres
    tier: 1
    category: data
    adr: '0026'
  outbound_edges: []
health:
  service_name: postgres
  owning_vm: postgres
  role: postgres_ha
  verify_file: roles/postgres_ha/tasks/verify.yml
  liveness:
    kind: tcp
    description: PostgreSQL listens on the local TCP port.
    timeout_seconds: 60
    retries: 1
    delay_seconds: 0
    host: 127.0.0.1
    port: 5432
  readiness:
    kind: command
    description: PostgreSQL returns a successful SQL readiness probe.
    timeout_seconds: 60
    retries: 1
    delay_seconds: 0
    argv:
      - psql
      - -Atqc
      - SELECT 1
    success_rc: 0
  uptime_kuma:
    enabled: true
    monitor:
      name: PostgreSQL VIP Port
      type: port
      hostname: 10.10.10.55
      port: 5432
      description: Private PostgreSQL VIP listener managed by Patroni and keepalived.
      interval: 60
      retryInterval: 60
      maxretries: 0
      accepted_statuscodes:
        - 200-299
