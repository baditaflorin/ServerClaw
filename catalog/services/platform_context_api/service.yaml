schema_version: 1.0.0
service:
  id: platform_context_api
  name: Platform Context API
  description: Private retrieval-augmented query API for repository and platform context.
  category: automation
  lifecycle_status: active
  vm: docker-runtime-lv3
  vmid: 120
  internal_url: http://100.64.0.1:8010
  exposure: private-only
  uptime_monitor_name: Platform Context Private
  health_probe_id: platform_context_api
  secret_catalog_ids:
    - platform_context_minio_secret_key
  adr: '0070'
  runbook: docs/runbooks/rag-platform-context.md
  runtime_pool: runtime-ai
  deployment_surface: playbooks/services/rag-context.yml
  restart_domain: runtime-ai-inference
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/runtime-ai
  mobility_tier: elastic_stateless
  tags:
    - api
    - context
    - rag
    - search
  environments:
    production:
      status: active
      url: http://100.64.0.1:8010
completeness:
  service_type: compose
  requires_subdomain: false
  requires_oidc: false
  requires_secrets: true
  requires_compose_secrets: true
  suppression_preset: legacy-service
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
    - git_repository
    - pbs_vm_120
  standby:
    kind: cold
    location: docker-runtime-lv3
    failover_trigger: Restore docker-runtime-lv3 when the platform context API or
      its runtime state cannot be recovered in place.
    failback_method: Restore or rebuild docker-runtime-lv3, then rerun the platform-context
      converge from git.
dependency:
  node:
    id: platform_context_api
    service: platform_context_api
    name: Platform Context API
    vm: docker-runtime-lv3
    tier: 1
    category: automation
    adr: '0070'
  outbound_edges:
    - from: platform_context_api
      to: minio
      type: soft
      description: Raw document upload staging depends on the shared MinIO bucket,
        while read-only query access can still run against the indexed corpus if staging
        is unavailable.
    - from: platform_context_api
      to: openbao
      type: startup_only
      description: The platform context API loads its bearer token and runtime configuration
        from OpenBao-rendered environment files.
    - from: platform_context_api
      to: step_ca
      type: reads_from
      description: The indexed corpus includes step-ca ADR and runbook content for
        operator query grounding.
health:
  service_name: platform-context-api
  owning_vm: docker-runtime-lv3
  role: rag_context_runtime
  verify_file: roles/rag_context_runtime/tasks/verify.yml
  startup:
    kind: http
    description: Platform-context startup completes once the private OpenAPI document
      is served locally.
    timeout_seconds: 120
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:8010/openapi.json
    method: GET
    expected_status:
      - 200
  liveness:
    kind: http
    description: The platform-context health endpoint responds on the local listener.
    timeout_seconds: 120
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:8010/healthz
    method: GET
    expected_status:
      - 200
  readiness:
    kind: http
    description: The private platform-context OpenAPI document is served locally after
      startup.
    timeout_seconds: 120
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:8010/openapi.json
    method: GET
    expected_status:
      - 200
  uptime_kuma:
    enabled: true
    monitor:
      name: Platform Context Private
      type: http
      url: http://10.10.10.20:8010/healthz
      description: Private platform-context health endpoint on docker-runtime-lv3.
      interval: 60
      retryInterval: 60
      maxretries: 0
      maxredirects: 10
      accepted_statuscodes:
        - 200-299
data:
  - id: platform-context-staging-objects
    service: platform_context_api
    name: Platform-context staging object storage
    class: confidential
    retention_days: 14
    backup_included: false
    access_role: platform-operator
    pii_risk: high
    locations:
      - s3://rag-staging
    notes: Raw document uploads stage in the shared MinIO bucket before extraction
      and should expire quickly to limit retained sensitive source material.
slos:
  - id: platform-context-api-availability
    service_id: platform_context_api
    indicator: availability
    objective_percent: 99.0
    window_days: 30
    target_url: http://10.10.10.20:8010/healthz
    probe_module: http_2xx_follow_redirects
    description: The platform context API remains reachable for agent-assisted operator
      workflows.
