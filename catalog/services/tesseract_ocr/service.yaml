schema_version: 1.0.0
service:
  id: tesseract_ocr
  name: Tesseract OCR
  description: Private OCR fallback API for scanned PDFs and image uploads when Apache
    Tika returns no embedded text.
  category: data
  lifecycle_status: active
  vm: runtime-ai-lv3
  vmid: 190
  internal_url: http://10.10.10.90:3008
  exposure: private-only
  health_probe_id: tesseract_ocr
  adr: 0286
  adr_file: docs/adr/0286-tesseract-ocr-service-for-scanned-image-text-extraction.md
  runbook: docs/runbooks/configure-tesseract-ocr.md
  runtime_pool: runtime-ai
  deployment_surface: playbooks/services/tesseract-ocr.yml
  restart_domain: runtime-ai-document-extraction
  api_contract_ref: config/contracts/runtime-pools/runtime-ai/tesseract-ocr.openapi.yaml
  mobility_tier: burst_batch
  dashboard_url: https://grafana.lv3.org/d/lv3-slo-overview/lv3-slo-overview?var-slo=tesseract-ocr-availability
  tags:
    - ocr
    - document-extraction
    - images
    - private
  environments:
    production:
      status: active
      url: http://10.10.10.90:3008
      notes: Tesseract OCR stays private on runtime-ai-lv3 and is intended as the
        second-stage fallback when Tika returns no text for image-like documents or
        scanned PDFs.
completeness:
  service_type: compose
  requires_subdomain: false
  requires_oidc: false
  requires_secrets: false
  requires_compose_secrets: false
  dashboard_file: config/grafana/dashboards/slo-overview.json
  alert_rule_file: config/prometheus/rules/slo_alerts.yml
  suppressed_checks:
    api_gateway: '2026-09-23'
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
    - git_repository
    - pbs_vm_190
  standby:
    kind: cold
    location: runtime-ai-lv3
    failover_trigger: Restore runtime-ai-lv3 when Tesseract OCR or the runtime-ai
      document-extraction pool state cannot be recovered in place.
    failback_method: Restore or rebuild runtime-ai-lv3, then rerun the Tika and Tesseract
      OCR converges from git.
dependency:
  node:
    id: tesseract_ocr
    service: tesseract_ocr
    name: Tesseract OCR
    vm: runtime-ai-lv3
    tier: 2
    category: data
    adr: 0286
  outbound_edges:
    - from: tesseract_ocr
      to: docker_runtime
      type: hard
      description: The Tesseract OCR runtime and its repo-built container image are
        hosted on runtime-ai-lv3.
    - from: tesseract_ocr
      to: tika
      type: soft
      description: Document-extraction callers invoke Tika first and only fall back
        to Tesseract OCR when Tika returns no embedded text.
health:
  service_name: tesseract-ocr
  owning_vm: runtime-ai-lv3
  role: tesseract_ocr_runtime
  verify_file: roles/tesseract_ocr_runtime/tasks/verify.yml
  startup:
    kind: http
    description: The Tesseract OCR health endpoint responds on the local listener
      after the repo-built runtime starts.
    timeout_seconds: 180
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:3008/healthz
    method: GET
    expected_status:
      - 200
  liveness:
    kind: http
    description: The Tesseract OCR health endpoint responds on the local listener.
    timeout_seconds: 180
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:3008/healthz
    method: GET
    expected_status:
      - 200
  readiness:
    kind: command
    description: Tesseract OCR extracts deterministic text from the repo-managed verification
      image fixture.
    timeout_seconds: 120
    retries: 1
    delay_seconds: 0
    argv:
      - python3
      - -c
      - 'import base64, json, urllib.request, uuid; boundary=''lv3-boundary-'' + uuid.uuid4().hex;
        image=base64.b64decode('''');
        chunks=[f''--{boundary}\r\n''.encode(), b''Content-Disposition: form-data;
        name="file"; filename="ocr-ok.png"\r\n'', b''Content-Type: image/png\r\n\r\n'',
        image, b''\r\n'', f''--{boundary}--\r\n''.encode()]; request=urllib.request.Request(''http://127.0.0.1:3008/ocr'',
        data=b''''.join(chunks), method=''POST'', headers={''Content-Type'': f''multipart/form-data;
        boundary={boundary}'', ''Accept'': ''application/json''}); payload=json.loads(urllib.request.urlopen(request,
        timeout=60).read().decode(''utf-8'')); text=str(payload.get(''text'', '''')).upper();
        raise SystemExit(0 if ''OCR'' in text and ''OK'' in text and payload.get(''page_count'')
        == 1 else 1)'
    success_rc: 0
  uptime_kuma:
    enabled: false
    reason: The Tesseract OCR runtime remains private to runtime-ai-lv3 and is verified
      through repo-managed readiness probes and helper-path checks.
data:
  - id: tesseract-ocr-transient-request-buffers
    service: tesseract_ocr
    name: Tesseract OCR transient request buffers
    class: internal
    retention_days: null
    backup_included: false
    access_role: platform-operator
    pii_risk: medium
    locations:
      - Transient uploaded image and PDF buffers inside the tesseract-ocr container
        on docker-runtime-lv3
      - Ephemeral rendered page images created during PDF OCR on docker-runtime-lv3
    notes: The OCR runtime is stateless and discards uploaded source files, rendered
      page images, and extracted text after each synchronous request completes.
slos:
  - id: tesseract-ocr-availability
    service_id: tesseract_ocr
    indicator: availability
    objective_percent: 99.0
    window_days: 30
    target_url: http://10.10.10.90:3008/healthz
    probe_module: http_2xx_follow_redirects
    description: The private Tesseract OCR runtime remains reachable on runtime-ai-lv3
      for scanned-image and image-only document fallback extraction.
