schema_version: 1.0.0
service:
  id: ops_portal
  name: Platform Operations Portal
  description: Interactive operator portal with live service actions, drift visibility,
    runbook launchers, and deployment streaming.
  category: access
  lifecycle_status: active
  vm: docker-runtime-lv3
  vmid: 120
  internal_url: http://10.10.10.20:8092
  public_url: https://ops.lv3.org
  subdomain: ops.lv3.org
  exposure: edge-published
  health_probe_id: ops_portal
  adr: 0093
  runbook: docs/runbooks/ops-portal-down.md
  runtime_pool: runtime-general
  deployment_surface: playbooks/services/ops-portal.yml
  restart_domain: runtime-general-operator-ui
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/runtime-general
  mobility_tier: movable_singleton
  tags:
  - portal
  - operations
  - actions
  - drift
  environments:
    production:
      status: active
      url: https://ops.lv3.org
      subdomain: ops.lv3.org
      notes: Interactive runtime now ships from the repo, but live cutover from the
        static portal still requires apply from main.
    staging:
      status: planned
      url: https://ops.staging.lv3.org
      subdomain: ops.staging.lv3.org
      notes: Planned staging portal for the interactive runtime.
completeness:
  service_type: nginx-plugin
  requires_subdomain: true
  requires_oidc: true
  requires_secrets: false
  requires_compose_secrets: false
  suppression_preset: legacy-service
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
  - git_repository
  - pbs_vm_120
  standby:
    kind: cold
    location: docker-runtime-lv3
    failover_trigger: Restore docker-runtime-lv3 when the ops portal runtime cannot
      be recovered in place.
    failback_method: Restore or rebuild docker-runtime-lv3, then regenerate and redeploy
      the ops portal from git.
dependency:
  node:
    id: ops_portal
    service: ops_portal
    name: Ops Portal
    vm: nginx-lv3
    tier: 4
    category: automation
    adr: '0074'
  outbound_edges:
  - from: ops_portal
    to: api_gateway
    type: hard
    description: The interactive operations portal depends on the unified API gateway
      for governed platform actions and live status reads.
  - from: ops_portal
    to: keycloak
    type: hard
    description: ops.lv3.org is gated behind oauth2-proxy and Keycloak-backed browser
      authentication.
  - from: ops_portal
    to: nginx_edge
    type: hard
    description: The generated portal is published as static content on nginx-lv3.
health:
  service_name: ops-portal
  owning_vm: docker-runtime-lv3
  role: ops_portal_runtime
  verify_file: roles/ops_portal_runtime/tasks/verify.yml
  liveness:
    kind: http
    description: The interactive ops portal health endpoint responds on the local
      listener.
    timeout_seconds: 120
    retries: 24
    delay_seconds: 5
    url: http://10.10.10.20:8092/health
    method: GET
    expected_status:
    - 200
  readiness:
    kind: http
    description: The interactive ops portal renders its dashboard shell locally after
      startup.
    timeout_seconds: 120
    retries: 24
    delay_seconds: 5
    url: http://10.10.10.20:8092/
    method: GET
    expected_status:
    - 200
  uptime_kuma:
    enabled: true
    monitor:
      name: Ops Portal Public
      type: http
      url: https://ops.lv3.org/health
      description: Interactive ops portal health endpoint published through the NGINX
        edge VM.
      interval: 60
      retryInterval: 60
      maxretries: 0
      maxredirects: 5
      accepted_statuscodes:
      - 200-299
