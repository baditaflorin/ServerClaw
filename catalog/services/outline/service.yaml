schema_version: 1.0.0
service:
  id: outline
  name: Outline
  description: Self-hosted living knowledge wiki that publishes repo-managed ADR,
    runbook, and architecture indexes through Outline.
  category: access
  lifecycle_status: active
  vm: docker-runtime
  vmid: 120
  internal_url: http://10.10.10.20:3006
  public_url: https://wiki.example.com
  subdomain: wiki.example.com
  exposure: edge-published
  uptime_monitor_name: Outline Public Health
  health_probe_id: outline
  image_catalog_ids:
    - outline_runtime
    - minio_runtime
    - langfuse_redis_runtime
  secret_catalog_ids:
    - outline_database_password
    - outline_secret_key
    - outline_utils_secret
    - outline_redis_password
    - outline_minio_root_password
    - outline_api_token
    - keycloak_outline_client_secret
  adr: 0199
  runbook: docs/runbooks/configure-outline.md
  runtime_pool: runtime-general
  deployment_surface: playbooks/services/outline.yml
  restart_domain: runtime-general-collaboration
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/runtime-general
  mobility_tier: movable_singleton
  tags:
    - wiki
    - knowledge
    - outline
    - oidc
  notes: Live-apply evidence is tracked on the workstream branch; merge-to-main still
    must update the integrated README, VERSION, changelog, and versions/stack.yaml
    surfaces.
  environments:
    production:
      status: active
      url: https://wiki.example.com
      subdomain: wiki.example.com
completeness:
  service_type: compose
  requires_subdomain: true
  requires_oidc: true
  requires_secrets: true
  requires_compose_secrets: true
  dashboard_file: config/grafana/dashboards/outline.json
  alert_rule_file: config/alertmanager/rules/outline.yml
  keycloak_client_generated: true
  suppressed_checks: {}
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
    - git_repository
    - pbs_vm_120
    - pbs_vm_150
  standby:
    kind: cold
    location: docker-runtime
    failover_trigger: Restore docker-runtime when Outline or its runtime state cannot
      be recovered in place.
    failback_method: Restore or rebuild docker-runtime, then rerun the Outline converge
      from git.
dependency:
  node:
    id: outline
    service: outline
    name: Outline
    vm: docker-runtime
    tier: 2
    category: access
    adr: 0199
  outbound_edges:
    - from: outline
      to: keycloak
      type: soft
      description: Outline delegates routine browser sign-in to the shared Keycloak
        OIDC broker.
    - from: outline
      to: nginx_edge
      type: soft
      description: Public access to wiki.example.com depends on the shared NGINX edge
        publication path.
    - from: outline
      to: openbao
      type: startup_only
      description: Outline starts from OpenBao-rendered runtime secrets mirrored into
        its compose environment.
    - from: outline
      to: postgres
      type: hard
      description: Outline stores workspace, user, and document metadata in Postgres.
health:
  service_name: outline
  owning_vm: docker-runtime
  role: outline_runtime
  verify_file: roles/outline_runtime/tasks/verify.yml
  startup:
    kind: http
    description: Outline startup completes once the shared-edge health endpoint renders
      through the OIDC publication path.
    timeout_seconds: 300
    retries: 60
    delay_seconds: 5
    url: https://wiki.example.com/_health
    method: GET
    expected_status:
      - 200
  liveness:
    kind: http
    description: The local Outline health endpoint responds on the runtime listener.
    timeout_seconds: 300
    retries: 60
    delay_seconds: 5
    url: http://127.0.0.1:3006/_health
    method: GET
    expected_status:
      - 200
  readiness:
    kind: http
    description: The public Outline health endpoint renders through the shared edge
      after OIDC and startup configuration settle.
    timeout_seconds: 300
    retries: 60
    delay_seconds: 5
    url: https://wiki.example.com/_health
    method: GET
    expected_status:
      - 200
    docker_publication:
      container_name: outline
      bindings:
        - host: 10.10.10.20
          port: 3006
      required_networks:
        - outline_default
  uptime_kuma:
    enabled: true
    monitor:
      name: Outline Public Health
      type: http
      url: https://wiki.example.com/_health
      description: Public Outline health endpoint published through the shared NGINX
        edge VM.
      interval: 60
      retryInterval: 60
      maxretries: 0
      maxredirects: 5
      accepted_statuscodes:
        - 200-299
data:
  - id: outline-attachment-storage
    service: outline
    name: Outline attachment storage
    class: confidential
    retention_days: 365
    backup_included: false
    access_role: platform-operator
    pii_risk: medium
    locations:
      - /opt/outline/data/minio/outline
    notes: S3-compatible MinIO storage holds attachment objects and future uploaded
      evidence referenced from wiki documents.
  - id: outline-knowledge-metadata
    service: outline
    name: Outline knowledge metadata
    class: confidential
    retention_days: 365
    backup_included: false
    access_role: platform-operator
    pii_risk: medium
    locations:
      - Outline PostgreSQL database
    notes: Outline stores workspace, user, collection, and document metadata that
      may include operator identities and operational text.
slos:
  - id: outline-availability
    service_id: outline
    indicator: availability
    objective_percent: 99.5
    window_days: 30
    target_url: https://wiki.example.com/_health
    probe_module: http_2xx_follow_redirects
    description: Outline remains reachable through the public LV3 edge for living
      knowledge browsing and sync automation.
