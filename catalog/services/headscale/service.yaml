schema_version: 1.0.0
service:
  id: headscale
  name: Headscale
  description: Repo-managed control plane for the LV3 zero-trust mesh VPN.
  category: access
  lifecycle_status: active
  vm: proxmox-host
  internal_url: http://10.10.10.1:8080
  public_url: https://headscale.example.com
  subdomain: headscale.example.com
  exposure: edge-published
  uptime_monitor_name: Headscale Public Health
  health_probe_id: headscale
  secret_catalog_ids:
    - headscale_api_key
  adr: '0144'
  runbook: docs/runbooks/configure-headscale.md
  runtime_pool: host-management
  deployment_surface: playbooks/services/headscale.yml
  restart_domain: host-management-access
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/host-management
  mobility_tier: anchor
  tags:
    - mesh
    - vpn
    - headscale
    - zero-trust
  environments:
    production:
      status: active
      url: https://headscale.example.com
      subdomain: headscale.example.com
completeness:
  service_type: vm-service
  requires_subdomain: true
  requires_oidc: false
  requires_secrets: true
  requires_compose_secrets: false
  suppression_preset: legacy-service
redundancy:
  tier: R0
  recovery_objective:
    rto_minutes: 240
    rpo_minutes: 1440
  backup_sources:
    - git_repository
    - host_reinstall_runbooks
  standby:
    kind: none
    location: none
    failover_trigger: No cold or warm standby exists; rebuild the host-local service
      from git and backups after host recovery.
    failback_method: Reapply the host-local Headscale automation on the rebuilt primary
      host.
dependency:
  node:
    id: headscale
    service: headscale
    name: Headscale
    vm: proxmox-host
    tier: 1
    category: access
    adr: '0144'
  outbound_edges:
    - from: headscale
      to: nginx_edge
      type: soft
      description: Public registration and control-plane reachability for headscale.example.com
        depends on the shared NGINX edge publication path.
health:
  service_name: headscale
  owning_vm: proxmox-host
  role: proxmox_headscale
  verify_file: roles/proxmox_headscale/tasks/main.yml
  liveness:
    kind: http
    description: The Headscale local health endpoint responds on the Proxmox host.
    timeout_seconds: 60
    retries: 20
    delay_seconds: 3
    url: http://127.0.0.1:8080/health
    method: GET
    expected_status:
      - 200
  readiness:
    kind: command
    description: The Headscale CLI can query the managed user catalog through the
      local config file.
    timeout_seconds: 30
    retries: 1
    delay_seconds: 0
    argv:
      - headscale
      - --config
      - /etc/headscale/config.yaml
      - users
      - list
      - --output
      - json
    success_rc: 0
  uptime_kuma:
    enabled: true
    monitor:
      name: Headscale Public Health
      type: http
      url: https://headscale.example.com/health
      description: Public Headscale health endpoint published through the shared NGINX
        edge.
      interval: 60
      retryInterval: 60
      maxretries: 0
      maxredirects: 5
      accepted_statuscodes:
        - 200-299
