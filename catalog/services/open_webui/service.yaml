schema_version: 1.0.0
service:
  id: open_webui
  name: Open WebUI
  description: Private operator and agent workbench with Keycloak-backed routine
    sign-in and a retained local break-glass admin path.
  category: access
  lifecycle_status: active
  vm: docker-runtime-lv3
  vmid: 120
  internal_url: http://100.64.0.1:8008
  exposure: private-only
  uptime_monitor_name: Open WebUI Private
  health_probe_id: open_webui
  image_catalog_ids:
  - open_webui_runtime
  secret_catalog_ids:
  - open_webui_admin_password
  - open_webui_oidc_client_secret
  - open_webui_secret_key
  adr: '0060'
  runbook: docs/runbooks/configure-open-webui.md
  runtime_pool: runtime-ai
  deployment_surface: playbooks/open-webui.yml
  restart_domain: runtime-ai-operator-ui
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/runtime-ai
  mobility_tier: movable_singleton
  tags:
  - agents
  - operators
  - workbench
  environments:
    production:
      status: active
      url: http://100.64.0.1:8008
completeness:
  service_type: compose
  requires_subdomain: false
  requires_oidc: false
  requires_secrets: true
  requires_compose_secrets: true
  suppression_preset: legacy-service
  dashboard_file: config/grafana/dashboards/open-webui.json
  alert_rule_file: config/alertmanager/rules/open-webui.yml
  suppressed_checks: {}
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
  - git_repository
  - pbs_vm_120
  standby:
    kind: cold
    location: docker-runtime-lv3
    failover_trigger: Restore docker-runtime-lv3 when Open WebUI or its runtime state
      cannot be recovered in place.
    failback_method: Restore or rebuild docker-runtime-lv3, then rerun the Open WebUI
      converge from git.
dependency:
  node:
    id: open_webui
    service: open_webui
    name: Open WebUI
    vm: docker-runtime-lv3
    tier: 3
    category: automation
    adr: '0060'
  outbound_edges:
  - from: open_webui
    to: keycloak
    type: soft
    description: Open WebUI can be configured for Keycloak OIDC, but the current runtime
      can still fall back to local login if OIDC is unavailable.
  - from: open_webui
    to: ollama
    type: hard
    description: Open WebUI routes the repo-managed local model connector to the private
      Ollama runtime on docker-runtime-lv3.
  - from: open_webui
    to: one_api
    type: hard
    description: Open WebUI uses the private One-API runtime for repo-managed local
      model access.
  - from: open_webui
    to: openbao
    type: startup_only
    description: Open WebUI consumes mirrored runtime secrets and optional OIDC client
      credentials from the OpenBao sidecar.
  - from: open_webui
    to: searxng
    type: soft
    description: Open WebUI delegates optional web-search requests to the private
      SearXNG runtime when the feature is enabled.
health:
  service_name: open-webui
  owning_vm: docker-runtime-lv3
  role: open_webui_runtime
  verify_file: roles/open_webui_runtime/tasks/verify.yml
  startup:
    kind: http
    description: Open WebUI startup completes once the repo-managed admin sign-in
      path succeeds locally.
    timeout_seconds: 120
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:8088/api/v1/auths/signin
    method: POST
    expected_status:
    - 200
  liveness:
    kind: http
    description: The Open WebUI root page responds on the local listener.
    timeout_seconds: 120
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:8088
    method: GET
    expected_status:
    - 200
  readiness:
    kind: http
    description: The repo-managed Open WebUI admin account can sign in successfully.
    timeout_seconds: 120
    retries: 1
    delay_seconds: 0
    url: http://127.0.0.1:8088/api/v1/auths/signin
    method: POST
    expected_status:
    - 200
  uptime_kuma:
    enabled: true
    monitor:
      name: Open WebUI Private
      type: http
      url: http://10.10.10.20:8088
      description: Private Open WebUI surface on docker-runtime-lv3.
      interval: 60
      retryInterval: 60
      maxretries: 0
      maxredirects: 10
      accepted_statuscodes:
      - 200-299
data:
- id: open-webui-workbench-state
  service: open_webui
  name: Open WebUI workbench state
  class: confidential
  retention_days: 90
  backup_included: false
  access_role: platform-operator
  pii_risk: high
  locations:
  - /opt/open-webui/data
  - http://100.64.0.1:8008
  notes: Open WebUI persists conversations, workspace artifacts, prompt history, and
    user-specific workbench settings in its local runtime data volume on docker-runtime-lv3.
slos:
- id: open-webui-availability
  service_id: open_webui
  indicator: availability
  objective_percent: 99.0
  window_days: 30
  target_url: http://10.10.10.20:8088
  probe_module: http_2xx_follow_redirects
  description: Open WebUI remains reachable on the private runtime network.
