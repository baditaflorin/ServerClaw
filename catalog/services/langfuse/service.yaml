schema_version: 1.0.0
service:
  id: langfuse
  name: Langfuse
  description: Self-hosted LLM trace, generation, and evaluation observability surface
    for repo-managed agents.
  category: observability
  lifecycle_status: active
  vm: docker-runtime-lv3
  vmid: 120
  internal_url: http://10.10.10.20:3002
  public_url: https://langfuse.lv3.org
  subdomain: langfuse.lv3.org
  exposure: edge-published
  uptime_monitor_name: Langfuse Public Health
  health_probe_id: langfuse
  image_catalog_ids:
    - langfuse_runtime
    - langfuse_worker_runtime
    - langfuse_clickhouse_runtime
    - langfuse_redis_runtime
  secret_catalog_ids:
    - langfuse_database_password
    - langfuse_bootstrap_user_password
    - langfuse_minio_secret_key
    - langfuse_project_secret_key
    - keycloak_langfuse_client_secret
  adr: '0146'
  runbook: docs/runbooks/configure-langfuse.md
  runtime_pool: runtime-general
  deployment_surface: playbooks/services/langfuse.yml
  restart_domain: runtime-general-observability
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/runtime-general
  mobility_tier: movable_singleton
  tags:
    - llm
    - traces
    - evaluations
    - observability
  environments:
    production:
      status: active
      url: https://langfuse.lv3.org
      subdomain: langfuse.lv3.org
completeness:
  service_type: compose
  requires_subdomain: true
  requires_oidc: true
  requires_secrets: true
  requires_compose_secrets: true
  suppression_preset: legacy-service
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
    - git_repository
    - pbs_vm_120
  standby:
    kind: cold
    location: docker-runtime-lv3
    failover_trigger: Restore docker-runtime-lv3 when Langfuse or its runtime state
      cannot be recovered in place.
    failback_method: Restore or rebuild docker-runtime-lv3, then rerun the Langfuse
      converge from git.
dependency:
  node:
    id: langfuse
    service: langfuse
    name: Langfuse
    vm: docker-runtime-lv3
    tier: 2
    category: observability
    adr: '0146'
  outbound_edges:
    - from: langfuse
      to: keycloak
      type: soft
      description: Keycloak provides the preferred OIDC browser sign-in path, but
        a repo-managed bootstrap user remains the break-glass fallback.
    - from: langfuse
      to: minio
      type: soft
      description: Langfuse event export and media attachment flows depend on the
        shared MinIO bucket, while core trace and project metadata remain available
        from Postgres and ClickHouse.
    - from: langfuse
      to: nginx_edge
      type: soft
      description: Public access to langfuse.lv3.org depends on the shared NGINX edge
        publication path.
    - from: langfuse
      to: openbao
      type: startup_only
      description: Langfuse starts from OpenBao-rendered runtime secrets mirrored
        into its compose environment.
    - from: langfuse
      to: postgres
      type: hard
      description: Langfuse stores application metadata, users, projects, and bootstrap
        state in Postgres.
health:
  service_name: langfuse
  owning_vm: docker-runtime-lv3
  role: langfuse_runtime
  verify_file: roles/langfuse_runtime/tasks/verify.yml
  startup:
    kind: http
    description: Langfuse startup completes once the local sign-in page renders after
      the web and worker services settle.
    timeout_seconds: 300
    retries: 60
    delay_seconds: 5
    url: http://127.0.0.1:3002/auth/sign-in
    method: GET
    expected_status:
      - 200
  liveness:
    kind: http
    description: The Langfuse public health endpoint responds on the local runtime
      listener.
    timeout_seconds: 300
    retries: 60
    delay_seconds: 5
    url: http://127.0.0.1:3002/api/public/health
    method: GET
    expected_status:
      - 200
  readiness:
    kind: http
    description: The Langfuse sign-in page renders locally after the web and worker
      services finish startup.
    timeout_seconds: 300
    retries: 60
    delay_seconds: 5
    url: http://127.0.0.1:3002/auth/sign-in
    method: GET
    expected_status:
      - 200
    docker_publication:
      container_name: langfuse-web
      bindings:
        - host: 10.10.10.20
          port: 3002
      required_networks:
        - langfuse_default
  uptime_kuma:
    enabled: true
    monitor:
      name: Langfuse Public Health
      type: http
      url: https://langfuse.lv3.org/api/public/health
      description: Public Langfuse health endpoint published through the shared NGINX
        edge VM.
      interval: 60
      retryInterval: 60
      maxretries: 0
      maxredirects: 5
      accepted_statuscodes:
        - 200-299
data:
  - id: langfuse-object-storage
    service: langfuse
    name: Langfuse event and media object storage
    class: confidential
    retention_days: 90
    backup_included: false
    access_role: platform-operator
    pii_risk: high
    locations:
      - /opt/langfuse/data/minio/langfuse/events
      - /opt/langfuse/data/minio/langfuse/media
    notes: Blob-backed event uploads and media attachments may contain raw prompts,
      responses, and attached evidence artifacts.
  - id: langfuse-trace-store
    service: langfuse
    name: Langfuse trace and observation store
    class: confidential
    retention_days: 90
    backup_included: false
    access_role: platform-operator
    pii_risk: high
    locations:
      - Langfuse PostgreSQL database
      - /opt/langfuse/data/clickhouse
    notes: Langfuse captures prompt, trace, and generation payloads that may contain
      operator-entered context and model outputs.
slos:
  - id: langfuse-availability
    service_id: langfuse
    indicator: availability
    objective_percent: 99.5
    window_days: 30
    target_url: https://langfuse.lv3.org/api/public/health
    probe_module: http_2xx_follow_redirects
    description: Langfuse remains reachable through the public LV3 edge for trace
      ingestion and operator access.
