schema_version: 1.0.0
service:
  id: homepage
  name: Homepage
  description: Unified operator-facing dashboard for the current LV3 service inventory,
    quick links, and live service reachability.
  category: access
  lifecycle_status: active
  vm: runtime-general
  vmid: 191
  internal_url: http://10.10.10.91:3090
  public_url: https://home.example.com
  subdomain: home.example.com
  exposure: edge-published
  uptime_monitor_name: Homepage Public
  health_probe_id: homepage
  image_catalog_ids:
    - homepage_runtime
  adr: '0152'
  runbook: docs/runbooks/configure-homepage.md
  runtime_pool: runtime-general
  deployment_surface: playbooks/services/homepage.yml
  restart_domain: runtime-general-operator-ui
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/runtime-general
  mobility_tier: elastic_stateless
  tags:
    - dashboard
    - homepage
    - operator
  environments:
    production:
      status: active
      url: https://home.example.com
      subdomain: home.example.com
      notes: Published through the shared NGINX edge and gated behind the repo-managed
        Keycloak oauth2-proxy flow.
completeness:
  service_type: compose
  requires_subdomain: true
  requires_oidc: false
  requires_secrets: false
  requires_compose_secrets: false
  dashboard_file: config/grafana/dashboards/slo-overview.json
  alert_rule_file: config/prometheus/rules/slo_alerts.yml
  suppressed_checks:
    api_gateway: '2026-09-23'
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
    - git_repository
    - pbs_vm_191
  standby:
    kind: cold
    location: runtime-general
    failover_trigger: Restore runtime-general when Homepage or the runtime-general
      operator surface cannot be recovered in place.
    failback_method: Restore or rebuild runtime-general, then rerun the Homepage converge
      from git.
dependency:
  node:
    id: homepage
    service: homepage
    name: Homepage
    vm: docker-runtime
    tier: 3
    category: access
    adr: '0152'
  outbound_edges:
    - from: homepage
      to: keycloak
      type: hard
      description: Public operator access to Homepage is intentionally gated through
        the shared Keycloak-backed oauth2-proxy flow on the NGINX edge.
    - from: homepage
      to: nginx_edge
      type: hard
      description: The unified dashboard is published at home.example.com through
        the shared NGINX edge and is not exposed directly on the public internet.
health:
  service_name: homepage
  owning_vm: runtime-general
  role: homepage_runtime
  verify_file: roles/homepage_runtime/tasks/verify.yml
  liveness:
    kind: http
    description: Homepage responds on the private runtime listener.
    timeout_seconds: 90
    retries: 18
    delay_seconds: 5
    url: http://10.10.10.91:3090/
    method: GET
    expected_status:
      - 200
  readiness:
    kind: http
    description: Homepage renders the repo-managed dashboard shell locally after startup.
    timeout_seconds: 90
    retries: 18
    delay_seconds: 5
    url: http://10.10.10.91:3090/
    method: GET
    expected_status:
      - 200
    docker_publication:
      container_name: homepage
      required_networks:
        - homepage_default
  uptime_kuma:
    enabled: true
    monitor:
      name: Homepage Public
      type: http
      url: https://home.example.com
      description: Unified service dashboard published through the authenticated shared
        NGINX edge.
      interval: 60
      retryInterval: 60
      maxretries: 0
      maxredirects: 5
      accepted_statuscodes:
        - 200-399
data:
  - id: homepage-config
    service: homepage
    name: Homepage generated dashboard config
    class: internal
    retention_days: 30
    backup_included: true
    access_role: platform-read
    pii_risk: low
    locations:
      - /opt/homepage/config
    notes: Homepage stores only repo-generated dashboard configuration and lightweight
      runtime state for the unified service dashboard.
slos:
  - id: homepage-availability
    service_id: homepage
    indicator: availability
    objective_percent: 99.5
    window_days: 30
    target_url: https://home.example.com
    probe_module: http_2xx_follow_redirects
    description: The unified operator dashboard remains reachable through the authenticated
      LV3 edge.
