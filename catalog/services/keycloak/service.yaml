schema_version: 1.0.0
service:
  id: keycloak
  name: Keycloak
  description: Shared SSO and OIDC broker for operator-facing and approved agent-facing
    applications.
  category: access
  lifecycle_status: active
  vm: runtime-control-lv3
  vmid: 192
  internal_url: http://10.10.10.92:18080
  public_url: https://sso.lv3.org
  subdomain: sso.lv3.org
  exposure: edge-published
  uptime_monitor_name: Keycloak OIDC Discovery
  health_probe_id: keycloak
  adr: '0056'
  tags:
  - identity
  - oidc
  - sso
  - tokens
  environments:
    production:
      status: active
      url: https://sso.lv3.org
      subdomain: sso.lv3.org
    staging:
      status: planned
      url: https://sso.staging.lv3.org
      subdomain: sso.staging.lv3.org
      notes: Planned staging identity hostname on the shared edge.
  runtime_pool: runtime-control
  deployment_surface: playbooks/keycloak.yml
  restart_domain: runtime-control-identity
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/runtime-control
  mobility_tier: anchor
completeness:
  service_type: compose
  requires_subdomain: true
  requires_oidc: false
  requires_secrets: false
  requires_compose_secrets: true
  suppression_preset: legacy-service
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
  - git_repository
  - pbs_vm_192
  standby:
    kind: cold
    location: runtime-control-lv3
    failover_trigger: Restore runtime-control-lv3 when Keycloak or its dependent runtime
      state cannot be recovered in place.
    failback_method: Restore or rebuild runtime-control-lv3, then rerun the Keycloak
      converge and identity verification flow.
dependency:
  node:
    id: keycloak
    service: keycloak
    name: Keycloak
    vm: docker-runtime-lv3
    tier: 2
    category: access
    adr: '0056'
  outbound_edges:
  - from: keycloak
    to: mailpit
    type: soft
    description: Staging and non-production Keycloak runs can relay SMTP through Mailpit
      for assertion-level mail verification without sending real email.
  - from: keycloak
    to: nginx_edge
    type: soft
    description: Public reachability for sso.lv3.org depends on the shared edge publication
      path.
  - from: keycloak
    to: openbao
    type: startup_only
    description: Keycloak reads its mirrored database and bootstrap secrets through
      the OpenBao agent before startup.
  - from: keycloak
    to: postgres
    type: hard
    description: Keycloak stores realm, client, and session state in Postgres.
  - from: keycloak
    to: step_ca
    type: startup_only
    description: Keycloak depends on the internal certificate authority when repo-managed
      internal TLS material is refreshed.
health:
  service_name: keycloak
  owning_vm: runtime-control-lv3
  role: keycloak_runtime
  verify_file: roles/keycloak_runtime/tasks/verify.yml
  startup:
    kind: http
    description: Keycloak startup completes once local realm discovery responds with
      the managed issuer metadata.
    timeout_seconds: 120
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:18080/realms/lv3/.well-known/openid-configuration
    method: GET
    expected_status:
    - 200
  liveness:
    kind: http
    description: The Keycloak management liveness endpoint responds on the loopback
      management port.
    timeout_seconds: 120
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:19000/health/live
    method: GET
    expected_status:
    - 200
  readiness:
    kind: http
    description: The Keycloak realm discovery endpoint responds locally with the expected
      issuer metadata.
    timeout_seconds: 120
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:18080/realms/lv3/.well-known/openid-configuration
    method: GET
    expected_status:
    - 200
    docker_publication:
      container_name: keycloak-keycloak-1
      bindings:
      - host: 10.10.10.92
        port: 8091
      required_networks:
      - keycloak_default
      - mail-platform_default
  tls_certificate_ids:
  - keycloak-edge
  uptime_kuma:
    enabled: true
    monitor:
      name: Keycloak OIDC Discovery
      type: http
      url: https://sso.lv3.org/realms/lv3/.well-known/openid-configuration
      description: Shared SSO discovery endpoint published through the NGINX edge
        VM.
      interval: 60
      retryInterval: 60
      maxretries: 0
      maxredirects: 5
      accepted_statuscodes:
      - 200-299
slos:
- id: keycloak-availability
  service_id: keycloak
  indicator: availability
  objective_percent: 99.7
  window_days: 30
  target_url: https://sso.lv3.org/realms/lv3/.well-known/openid-configuration
  probe_module: http_2xx_follow_redirects
  description: Keycloak discovery remains reachable for operator and service authentication.
- id: keycloak-latency
  service_id: keycloak
  indicator: latency
  objective_percent: 95.0
  window_days: 30
  target_url: https://sso.lv3.org/realms/lv3/.well-known/openid-configuration
  probe_module: http_2xx_follow_redirects
  latency_threshold_ms: 500
  description: Keycloak discovery responds in under 500ms for 95% of probes.
