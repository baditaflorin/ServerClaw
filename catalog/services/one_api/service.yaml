schema_version: 1.0.0
service:
  id: one_api
  name: One-API
  description: Private unified LLM API proxy and router that exposes governed OpenAI-compatible
    access for platform consumers.
  category: automation
  lifecycle_status: active
  vm: docker-runtime-lv3
  vmid: 120
  internal_url: http://100.64.0.1:8018/v1
  exposure: private-only
  health_probe_id: one_api
  image_catalog_ids:
  - one_api_runtime
  secret_catalog_ids:
  - one_api_database_password
  - one_api_session_secret
  - one_api_root_access_token
  - one_api_root_password
  adr: 0294
  adr_file: docs/adr/0294-one-api-as-the-unified-llm-api-proxy-and-router.md
  runbook: docs/runbooks/configure-one-api.md
  runtime_pool: runtime-ai
  deployment_surface: playbooks/services/one-api.yml
  restart_domain: runtime-ai-inference
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/runtime-ai
  mobility_tier: elastic_stateless
  dashboard_url: https://grafana.lv3.org/d/lv3-one-api/lv3-one-api
  tags:
  - llm
  - proxy
  - routing
  - openai-compatible
  environments:
    production:
      status: active
      url: http://100.64.0.1:8018/v1
      notes: Open WebUI, ServerClaw, and controller-local bootstrap checks use the
        private Proxmox host proxy while the runtime itself stays on docker-runtime-lv3.
completeness:
  service_type: compose
  requires_subdomain: false
  requires_oidc: false
  requires_secrets: true
  requires_compose_secrets: true
  dashboard_file: config/grafana/dashboards/one-api.json
  alert_rule_file: config/alertmanager/rules/one-api.yml
  suppressed_checks: {}
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
  - git_repository
  - pbs_vm_120
  standby:
    kind: cold
    location: docker-runtime-lv3
    failover_trigger: Restore docker-runtime-lv3 when One-API or its runtime state
      cannot be recovered in place.
    failback_method: Restore or rebuild docker-runtime-lv3, then rerun the One-API
      converge and bootstrap verification workflow from git.
dependency:
  node:
    id: one_api
    service: one_api
    name: One-API
    vm: docker-runtime-lv3
    tier: 2
    category: automation
    adr: 0294
  outbound_edges:
  - from: one_api
    to: ollama
    type: hard
    description: One-API forwards local chat and embedding aliases to the private
      Ollama runtime.
health:
  service_name: one-api
  owning_vm: docker-runtime-lv3
  role: one_api_runtime
  verify_file: roles/one_api_runtime/tasks/verify.yml
  startup:
    kind: http
    description: One-API startup completes once the local status endpoint answers
      on the runtime listener.
    timeout_seconds: 120
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:8101/api/status
    method: GET
    expected_status:
    - 200
  liveness:
    kind: http
    description: The One-API local status endpoint continues to answer on docker-runtime-lv3.
    timeout_seconds: 120
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:8101/api/status
    method: GET
    expected_status:
    - 200
  readiness:
    kind: http
    description: The repo-managed One-API runtime status endpoint is ready for authenticated
      admin verification.
    timeout_seconds: 120
    retries: 12
    delay_seconds: 2
    url: http://127.0.0.1:8101/api/status
    method: GET
    expected_status:
    - 200
  uptime_kuma:
    enabled: false
    reason: The private One-API surface is verified through repo-managed local status
      and authenticated admin API probes instead of an unauthenticated Uptime Kuma
      monitor.
data:
- id: one-api-routing-state
  service: one_api
  name: One-API routing state and usage ledger
  class: confidential
  retention_days: 90
  backup_included: true
  access_role: platform-operator
  pii_risk: medium
  locations:
  - PostgreSQL oneapi database on postgres-lv3
  notes: One-API persists channel definitions, consumer token metadata, quotas, and
    aggregate local LLM usage records in PostgreSQL so the proxy contract and audit
    trail survive restarts.
slos:
- id: one-api-availability
  service_id: one_api
  indicator: availability
  objective_percent: 99.0
  window_days: 30
  target_url: http://10.10.10.20:8101/api/status
  probe_module: http_2xx_follow_redirects
  description: One-API remains reachable on the private runtime network for governed
    local LLM proxy traffic.
