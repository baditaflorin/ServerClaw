schema_version: 1.0.0
service:
  id: plane
  name: Plane
  description: Repo-managed Plane workspace for platform kanban tracking and ADR synchronization.
  category: automation
  lifecycle_status: active
  vm: docker-runtime
  vmid: 120
  internal_url: http://10.10.10.20:8093
  public_url: https://tasks.example.com
  subdomain: tasks.example.com
  exposure: edge-published
  uptime_monitor_name: Plane Public
  health_probe_id: plane
  image_catalog_ids:
    - plane_frontend_runtime
    - plane_space_runtime
    - plane_admin_runtime
    - plane_live_runtime
    - plane_backend_runtime
    - plane_proxy_runtime
    - netbox_redis_runtime
    - minio_runtime
    - plane_rabbitmq_runtime
  secret_catalog_ids:
    - plane_database_password
    - plane_secret_key
    - plane_live_server_secret_key
    - plane_rabbitmq_password
    - plane_aws_secret_access_key
    - plane_bootstrap_admin_password
    - plane_api_token
  adr: 0193
  runbook: docs/runbooks/configure-plane.md
  runtime_pool: runtime-general
  deployment_surface: playbooks/services/plane.yml
  restart_domain: runtime-general-product-apps
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/runtime-general
  mobility_tier: movable_singleton
  tags:
    - tasks
    - kanban
    - adr
    - automation
  environments:
    production:
      status: active
      url: https://tasks.example.com
      subdomain: tasks.example.com
completeness:
  service_type: compose
  requires_subdomain: true
  requires_oidc: false
  requires_secrets: true
  requires_compose_secrets: true
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
    - git_repository
    - pbs_vm_120
  standby:
    kind: cold
    location: docker-runtime
    failover_trigger: Restore docker-runtime when the Plane runtime or its shared
      state cannot be recovered in place.
    failback_method: Restore or rebuild docker-runtime, then rerun the Plane converge
      from git.
dependency:
  node:
    id: plane
    service: plane
    name: Plane
    vm: docker-runtime
    tier: 2
    category: automation
    adr: 0193
  outbound_edges:
    - from: plane
      to: keycloak
      type: soft
      description: Authenticated browser access to tasks.example.com depends on the
        shared Keycloak-backed edge auth path, while the private controller path remains
        available for governed automation.
    - from: plane
      to: nginx_edge
      type: soft
      description: Public access to tasks.example.com depends on the shared NGINX
        edge publication path.
    - from: plane
      to: openbao
      type: startup_only
      description: Plane consumes mirrored runtime secrets from the OpenBao sidecar
        before the containers start.
    - from: plane
      to: postgres
      type: hard
      description: Plane persists workspaces, projects, users, and issue metadata
        in Postgres.
health:
  service_name: plane
  owning_vm: docker-runtime
  role: plane_runtime
  verify_file: roles/plane_runtime/tasks/verify.yml
  liveness:
    kind: http
    description: The Plane proxy root responds on the local runtime listener.
    timeout_seconds: 300
    retries: 60
    delay_seconds: 5
    url: http://127.0.0.1:8093/
    method: GET
    expected_status:
      - 200
  readiness:
    kind: http
    description: The Plane instance API answers locally after the proxy, API, and
      worker services finish startup.
    timeout_seconds: 300
    retries: 60
    delay_seconds: 5
    url: http://127.0.0.1:8093/api/instances/
    method: GET
    expected_status:
      - 200
  uptime_kuma:
    enabled: true
    monitor:
      name: Plane Public
      type: http
      url: https://tasks.example.com/
      description: Public Plane board published through the shared NGINX edge and
        authenticated by the repo-managed oauth2-proxy flow.
      interval: 60
      retryInterval: 60
      maxretries: 0
      maxredirects: 10
      accepted_statuscodes:
        - 200-399
data:
  - id: plane-object-storage
    service: plane
    name: Plane attachment object storage
    class: confidential
    retention_days: 365
    backup_included: true
    access_role: platform-operator
    pii_risk: medium
    locations:
      - /opt/plane/data/minio
    notes: Plane attachment uploads and exported artifacts are persisted in the local
      MinIO-backed object store on docker-runtime.
  - id: plane-workspace-store
    service: plane
    name: Plane workspace and issue store
    class: confidential
    retention_days: 365
    backup_included: true
    access_role: platform-operator
    pii_risk: medium
    locations:
      - Plane PostgreSQL database
    notes: Plane stores project boards, issue metadata, and operator-entered planning
      content that should remain recoverable across normal backup cycles.
slos:
  - id: plane-availability
    service_id: plane
    indicator: availability
    objective_percent: 99.0
    window_days: 30
    target_url: https://tasks.example.com/
    probe_module: http_2xx_follow_redirects
    description: Plane remains reachable through the public LV3 edge for ADR board
      tracking and issue synchronization.
