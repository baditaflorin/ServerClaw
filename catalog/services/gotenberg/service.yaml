schema_version: 1.0.0
service:
  id: gotenberg
  name: Gotenberg
  description: Private stateless document rendering service for HTML, Markdown, text,
    and Office-to-PDF conversion workflows.
  category: automation
  lifecycle_status: active
  vm: runtime-ai
  vmid: 190
  internal_url: http://10.10.10.90:3007
  exposure: private-only
  health_probe_id: gotenberg
  image_catalog_ids:
    - gotenberg_runtime
  adr: 0278
  runbook: docs/runbooks/configure-gotenberg.md
  runtime_pool: runtime-ai
  deployment_surface: playbooks/services/gotenberg.yml
  restart_domain: runtime-ai-document-extraction
  api_contract_ref: config/contracts/runtime-pools/runtime-ai/gotenberg.openapi.yaml
  mobility_tier: burst_batch
  dashboard_url: https://grafana.example.com/d/lv3-gotenberg/lv3-gotenberg
  tags:
    - documents
    - pdf
    - rendering
    - private
  environments:
    production:
      status: active
      url: http://10.10.10.90:3007
      notes: The runtime stays private on runtime-ai; authenticated operator and automation
        access is brokered through the shared API gateway route at https://api.example.com/v1/gotenberg.
completeness:
  service_type: compose
  requires_subdomain: false
  requires_oidc: false
  requires_secrets: false
  requires_compose_secrets: false
  dashboard_file: config/grafana/dashboards/gotenberg.json
  alert_rule_file: config/alertmanager/rules/gotenberg.yml
  suppressed_checks: {}
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
    - git_repository
    - pbs_vm_190
  standby:
    kind: cold
    location: runtime-ai
    failover_trigger: Restore runtime-ai when Gotenberg or the runtime-ai document-extraction
      pool state cannot be recovered in place.
    failback_method: Restore or rebuild runtime-ai, then rerun the Gotenberg converge
      and gateway verification workflow.
dependency:
  node:
    id: gotenberg
    service: gotenberg
    name: Gotenberg
    vm: runtime-ai
    tier: 2
    category: automation
    adr: 0278
  outbound_edges:
    - from: gotenberg
      to: api_gateway
      type: soft
      description: Authenticated operator and cross-service access can be brokered
        through the shared API gateway route, while private guest-network callers
        can still use the internal listener directly.
    - from: gotenberg
      to: docker_runtime
      type: hard
      description: The Gotenberg Chromium and LibreOffice renderers are hosted on
        runtime-ai.
health:
  service_name: gotenberg
  owning_vm: runtime-ai
  role: gotenberg_runtime
  verify_file: roles/gotenberg_runtime/tasks/verify.yml
  startup:
    kind: http
    description: The Gotenberg health endpoint responds on the local listener after
      Chromium and LibreOffice are ready.
    timeout_seconds: 180
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:3007/health
    method: GET
    expected_status:
      - 200
  liveness:
    kind: http
    description: The Gotenberg health endpoint responds on the local listener.
    timeout_seconds: 180
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:3007/health
    method: GET
    expected_status:
      - 200
  readiness:
    kind: command
    description: A minimal HTML document renders to a PDF through the Chromium conversion
      route.
    timeout_seconds: 120
    retries: 3
    delay_seconds: 5
    argv:
      - /bin/bash
      - -lc
      - set -euo pipefail; html=$(mktemp --suffix=.html); pdf=$(mktemp); trap 'rm
        -f "$html" "$pdf"' EXIT; printf '<html><body><h1>LV3 Gotenberg readiness</h1></body></html>'
        >"$html"; curl -fsS -o "$pdf" -F "files=@${html};filename=index.html;type=text/html"
        http://127.0.0.1:3007/forms/chromium/convert/html; head -c 4 "$pdf" | grep
        -q '%PDF'
    success_rc: 0
  uptime_kuma:
    enabled: false
    reason: The Gotenberg runtime stays private to runtime-ai and is verified through
      repo-managed readiness probes plus authenticated API gateway checks.
data:
  - id: gotenberg-transient-render-buffers
    service: gotenberg
    name: Gotenberg transient render buffers
    class: internal
    retention_days: null
    backup_included: false
    access_role: platform-operator
    pii_risk: medium
    locations:
      - Transient request and response buffers inside the gotenberg container on docker-runtime
      - Ephemeral temporary files created during Chromium and LibreOffice conversions
        on docker-runtime
    notes: Gotenberg is stateless and does not persist source documents or rendered
      PDFs after each synchronous conversion finishes.
slos:
  - id: gotenberg-availability
    service_id: gotenberg
    indicator: availability
    objective_percent: 99.0
    window_days: 30
    target_url: http://10.10.10.90:3007/health
    probe_module: http_2xx_follow_redirects
    description: The private Gotenberg document rendering API remains reachable on
      runtime-ai for synchronous PDF conversion workflows.
