schema_version: 1.0.0
service:
  id: dozzle
  name: Dozzle
  description: Repo-managed real-time container log hub across the Docker guests.
  category: observability
  lifecycle_status: active
  vm: docker-runtime
  vmid: 120
  internal_url: http://10.10.10.20:8089
  public_url: https://logs.example.com
  subdomain: logs.example.com
  exposure: edge-published
  health_probe_id: dozzle
  image_catalog_ids:
    - dozzle_runtime
  adr: '0150'
  runbook: docs/runbooks/configure-dozzle.md
  runtime_pool: runtime-general
  deployment_surface: playbooks/services/dozzle.yml
  restart_domain: runtime-general-observability
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/runtime-general
  mobility_tier: elastic_stateless
  tags:
    - logs
    - docker
    - realtime
    - observability
  environments:
    production:
      status: active
      url: https://logs.example.com
      subdomain: logs.example.com
completeness:
  service_type: compose
  requires_subdomain: true
  requires_oidc: false
  requires_secrets: false
  requires_compose_secrets: false
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
    - git_repository
    - pbs_vm_120
  standby:
    kind: cold
    location: docker-runtime
    failover_trigger: Restore docker-runtime when Dozzle or the shared runtime state
      cannot be recovered in place.
    failback_method: Restore or rebuild docker-runtime, then rerun the Dozzle converge
      from git.
dependency:
  node:
    id: dozzle
    service: dozzle
    name: Dozzle
    vm: docker-runtime
    tier: 1
    category: observability
    adr: '0150'
  outbound_edges:
    - from: dozzle
      to: keycloak
      type: soft
      description: Authenticated browser access to logs.example.com depends on the
        shared Keycloak-backed edge auth path, but the private hub remains reachable
        for controlled operator verification.
    - from: dozzle
      to: nginx_edge
      type: soft
      description: Public operator access to logs.example.com depends on the shared
        NGINX edge publication while the private runtime remains reachable inside
        the guest network.
health:
  service_name: dozzle
  owning_vm: docker-runtime
  role: dozzle_runtime
  verify_file: roles/dozzle_runtime/tasks/verify.yml
  liveness:
    kind: http
    description: The Dozzle hub healthcheck responds on the local listener.
    timeout_seconds: 120
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:8089/healthcheck
    method: GET
    expected_status:
      - 200
  readiness:
    kind: http
    description: The Dozzle hub responds on the local healthcheck endpoint.
    timeout_seconds: 120
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:8089/healthcheck
    method: GET
    expected_status:
      - 200
  uptime_kuma:
    enabled: true
    monitor:
      name: Dozzle Private
      type: http
      url: http://10.10.10.20:8089/healthcheck
      description: Private Dozzle healthcheck on docker-runtime.
      interval: 60
      retryInterval: 60
      maxretries: 0
      maxredirects: 10
      accepted_statuscodes:
        - 200-299
data:
  - id: dozzle-live-log-stream
    service: dozzle
    name: Dozzle live log stream cache
    class: internal
    retention_days: null
    backup_included: false
    access_role: platform-read
    pii_risk: medium
    locations:
      - Docker stdout and stderr log buffers on docker-runtime
      - Docker stdout and stderr log buffers on docker-build
      - Docker stdout and stderr log buffers on monitoring
    notes: Dozzle is read-only and does not persist its own datastore; it exposes
      recent container log buffers from the managed Docker hosts for real-time debugging.
slos:
  - id: dozzle-availability
    service_id: dozzle
    indicator: availability
    objective_percent: 99.0
    window_days: 30
    target_url: http://10.10.10.20:8089/healthcheck
    probe_module: http_2xx_follow_redirects
    description: The Dozzle hub remains reachable on the private runtime network for
      real-time container log access.
