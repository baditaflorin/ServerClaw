schema_version: 1.0.0
service:
  id: searxng
  name: SearXNG
  description: Private metasearch runtime for operator and agent web lookups with
    a tailnet-only hostname.
  category: automation
  lifecycle_status: active
  vm: docker-runtime-lv3
  vmid: 120
  internal_url: http://10.10.10.20:8881
  public_url: http://search.lv3.org
  subdomain: search.lv3.org
  exposure: private-only
  health_probe_id: searxng
  image_catalog_ids:
    - searxng_runtime
    - searxng_valkey_runtime
  secret_catalog_ids:
    - searxng_secret_key
  adr: 0148
  runbook: docs/runbooks/configure-searxng.md
  runtime_pool: runtime-general
  deployment_surface: playbooks/searxng.yml
  restart_domain: runtime-general-automation
  api_contract_ref: config/contracts/service-partitions/catalog.json#/partitions/runtime-general
  mobility_tier: movable_singleton
  tags:
    - search
    - web
    - agents
    - privacy
  environments:
    production:
      status: active
      url: http://search.lv3.org
      subdomain: search.lv3.org
      notes: Tailnet-only hostname published on the Proxmox host Tailscale IP.
completeness:
  service_type: compose
  requires_subdomain: true
  requires_oidc: false
  requires_secrets: true
  requires_compose_secrets: false
  suppression_preset: legacy-service
redundancy:
  tier: R1
  recovery_objective:
    rto_minutes: 120
    rpo_minutes: 1440
  backup_sources:
    - git_repository
    - pbs_vm_120
  standby:
    kind: cold
    location: docker-runtime-lv3
    failover_trigger: Restore docker-runtime-lv3 when SearXNG or its runtime state
      cannot be recovered in place.
    failback_method: Restore or rebuild docker-runtime-lv3, then rerun the SearXNG
      converge from git.
dependency:
  node:
    id: searxng
    service: searxng
    name: SearXNG
    vm: docker-runtime-lv3
    tier: 1
    category: automation
    adr: 0148
  outbound_edges: []
health:
  service_name: searxng
  owning_vm: docker-runtime-lv3
  role: searxng_runtime
  verify_file: roles/searxng_runtime/tasks/verify.yml
  liveness:
    kind: http
    description: The SearXNG root page responds on the local listener.
    timeout_seconds: 120
    retries: 24
    delay_seconds: 5
    url: http://127.0.0.1:8881/
    method: GET
    expected_status:
      - 200
  readiness:
    kind: http
    description: The SearXNG JSON search endpoint returns a structured payload for
      the default verification query.
    timeout_seconds: 120
    retries: 6
    delay_seconds: 5
    url: http://127.0.0.1:8881/search?q=proxmox%20ve&format=json
    method: GET
    expected_status:
      - 200
  uptime_kuma:
    enabled: false
    reason: The SearXNG interface is intentionally tailnet-only and verified by its
      runtime role plus direct operator checks.
