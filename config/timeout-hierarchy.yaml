schema_version: 1.0.0

# All values are seconds.
# timeout_s is the maximum allowed timeout for the layer.
# default_timeout_s is the repository default when a caller does not request a narrower budget.
layers:
  operator_session:
    timeout_s: 28800
    default_timeout_s: 3600
    inner_layers:
      - workflow_execution

  workflow_execution:
    timeout_s: 7200
    default_timeout_s: 600
    inner_layers:
      - ansible_play
      - api_call_chain
      - script_execution

  ansible_play:
    timeout_s: 3600
    default_timeout_s: 480
    inner_layers:
      - ansible_task
      - ssh_connection

  ansible_task:
    timeout_s: 600
    default_timeout_s: 120
    inner_layers:
      - ssh_connection
      - http_request
      - subprocess

  ssh_connection:
    timeout_s: 120
    default_timeout_s: 30
    inner_layers:
      - subprocess

  subprocess:
    timeout_s: 90
    default_timeout_s: 60
    inner_layers: []

  api_call_chain:
    timeout_s: 300
    default_timeout_s: 60
    inner_layers:
      - http_request

  http_request:
    timeout_s: 60
    default_timeout_s: 30
    inner_layers: []

  script_execution:
    timeout_s: 900
    default_timeout_s: 300
    inner_layers:
      - http_request
      - subprocess

  health_probe:
    timeout_s: 300
    default_timeout_s: 60
    inner_layers: []

  liveness_probe:
    timeout_s: 300
    default_timeout_s: 30
    inner_layers: []
