modules:
  http_2xx:
    prober: http
    timeout: 10s
    http:
      method: GET
      preferred_ip_protocol: ip4
      valid_status_codes: []
  http_2xx_follow_redirects:
    prober: http
    timeout: 10s
    http:
      method: GET
      preferred_ip_protocol: ip4
      valid_status_codes: []
      follow_redirects: true
  http_2xx_insecure:
    prober: http
    timeout: 10s
    http:
      method: GET
      preferred_ip_protocol: ip4
      valid_status_codes: []
      tls_config:
        insecure_skip_verify: true
  http_2xx_insecure_tls:
    prober: http
    timeout: 10s
    http:
      method: GET
      preferred_ip_protocol: ip4
      valid_status_codes: []
      follow_redirects: true
      tls_config:
        insecure_skip_verify: true
  http_2xx_follow_redirects_insecure_tls:
    prober: http
    timeout: 10s
    http:
      method: GET
      preferred_ip_protocol: ip4
      valid_status_codes: []
      follow_redirects: true
      tls_config:
        insecure_skip_verify: true
  tcp_connect:
    prober: tcp
    timeout: 10s
    tcp:
      preferred_ip_protocol: ip4
