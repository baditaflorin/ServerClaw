base-url: "{{ ntfy_runtime_base_url }}"
listen-http: ":{{ ntfy_runtime_port }}"
behind-proxy: false
cache-file: "{{ ntfy_runtime_cache_file }}"
attachment-cache-dir: "{{ ntfy_runtime_attachment_dir }}"
auth-file: "{{ ntfy_runtime_data_dir }}/user.db"
auth-default-access: deny-all
auth-users:
  - "{{ ntfy_runtime_username }}:{{ ntfy_runtime_password_hash }}:user"
auth-access:
  - "{{ ntfy_runtime_username }}:platform-alerts:rw"
