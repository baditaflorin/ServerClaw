rules:
  # Risk: committing private keys bypasses the controller-local secret model and
  # exposes long-lived credentials to every clone and CI worker.
  - id: lv3.semgrep.secret.private-key-material
    languages:
      - generic
    severity: ERROR
    message: Do not commit private key material into repo-managed executable surfaces.
    paths:
      include:
        - .gitea/workflows/**
        - .github/workflows/**
        - collections/ansible_collections/**
        - config/windmill/scripts/**
        - docker/**
        - platform/**
        - playbooks/**
        - roles/**
        - scripts/**
    pattern-regex: '-----BEGIN (?:RSA |EC |OPENSSH |DSA |)?PRIVATE KEY-----'

  # Risk: hardcoded live token prefixes create direct credential exposure that
  # bypasses OpenBao and controller-local secret handling.
  - id: lv3.semgrep.secret.live-token-prefix
    languages:
      - generic
    severity: ERROR
    message: Do not hardcode live token-like secrets in repo-managed code.
    paths:
      include:
        - .gitea/workflows/**
        - .github/workflows/**
        - collections/ansible_collections/**
        - config/windmill/scripts/**
        - docker/**
        - platform/**
        - playbooks/**
        - roles/**
        - scripts/**
    pattern-either:
      - pattern-regex: '(?<![A-Za-z0-9_])hvs\.[A-Za-z0-9._-]{10,}'
      - pattern-regex: '(?<![A-Za-z0-9_])ghp_[A-Za-z0-9]{20,}'
      - pattern-regex: '(?<![A-Za-z0-9_])glpat-[A-Za-z0-9_-]{20,}'
      - pattern-regex: '(?<![A-Za-z0-9_])xoxb-[A-Za-z0-9-]{20,}'
