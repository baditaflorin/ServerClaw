# Falco suppressions for the LV3 platform.
#
# Keep every suppression repo-managed and document the business reason inline.
- macro: known_drop_and_execute_activities
  condition: >-
    or (
      container.image.repository = "registry.lv3.org/check-runner/python"
      and proc.name = "semgrep-core"
      and proc.exepath contains "/site-packages/semgrep/bin/semgrep-core"
    )
  override:
    condition: append

# Business reason:
# The docker-build lane runs semgrep in the repo-managed check-runner Python
# image, and semgrep-core is unpacked into the container upper layer at
# runtime. Without this narrow suppression, the upstream "Drop and execute new
# binary in container" rule floods CRITICAL alerts and can delay real signals
# such as the repo-managed Falco smoke marker.
