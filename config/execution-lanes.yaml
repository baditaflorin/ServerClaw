schema_version: 1.0.0
lanes:
  - lane_id: lane:proxmox-host
    vm_id: null
    hostname: proxmox_florin
    services:
      - proxmox_ui
      - ntopng
    max_concurrent_ops: 1
    serialisation: strict
    admission_policy: hard
    vm_budget:
      total_cpu_milli: 1000
      total_memory_mb: 1024
      total_disk_iops: 120

  - lane_id: lane:nginx
    vm_id: 110
    hostname: nginx-lv3
    services:
      - nginx_edge
      - changelog_portal
      - docs_portal
