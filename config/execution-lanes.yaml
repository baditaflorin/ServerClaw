      - keycloak
      - mail_platform
      - mattermost
      - netbox
      - ntfy
      - ollama
      - open_webui
      - openbao
      - ops_portal
      - platform_context_api
      - portainer
      - step_ca
      - status_page
      - uptime_kuma
