schema_version: 1.0.0

extra_nodes:
  - id: cert:step-ca-internal
    kind: cert
    label: step-ca internal PKI
    metadata:
      service_id: step_ca
      source: manifest
  - id: service:loki
    kind: service
    label: Loki
    tier: 1
    metadata:
      category: observability
      source: manifest
  - id: service:prometheus
    kind: service
    label: Prometheus
    tier: 1
    metadata:
      category: observability
      source: manifest
  - id: service:neko
    kind: service
    label: Neko Remote Desktop
    tier: 2
    metadata:
      category: automation
      service_id: neko
      source: catalog
  - id: network:vlan:10
    kind: network
    label: guest-network
    metadata:
      prefix: 10.10.10.0/24
      source: manifest

extra_edges:
  - from: service:grafana
    to: service:loki
    edge_kind: depends_on
    metadata:
      source: manifest
      relationship: log_queries
      strength: hard
      description: Grafana dashboards query Loki for aggregated platform logs.
  - from: service:grafana
    to: service:prometheus
    edge_kind: depends_on
    metadata:
      source: manifest
      relationship: metrics_queries
      strength: hard
      description: Grafana dashboards depend on Prometheus for platform metrics and alert rule state.
  - from: service:api_gateway
    to: service:windmill
    edge_kind: depends_on
    metadata:
      source: manifest
      relationship: governed_execution
      strength: soft
      description: The gateway delegates governed workflow execution to Windmill when execute=true is requested.
  - from: service:alertmanager
    to: service:grafana
    edge_kind: depends_on
    metadata:
      source: manifest
      relationship: alert_review
      strength: soft
      description: Alert triage is materially degraded when operators cannot pivot from Alertmanager to Grafana dashboards.
  - from: service:neko
    to: service:nginx_edge
    edge_kind: depends_on
    metadata:
      source: manifest
      relationship: edge_publication
      strength: hard
      description: Neko WebRTC signalling is proxied through the shared NGINX edge at browser.{{ platform_domain }} with TLS termination and WebSocket upgrade support.
  - from: service:neko
    to: service:keycloak
    edge_kind: depends_on
    metadata:
      source: manifest
      relationship: operator_authentication
      strength: soft
      description: Neko operator access is controlled through Keycloak OIDC client configuration for Tailscale headscale management network.
