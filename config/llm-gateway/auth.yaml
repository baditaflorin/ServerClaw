schema_version: "1.0.0"
oidc:
  issuer: https://sso.{{ platform_domain }}/realms/lv3
  discovery_url: https://sso.{{ platform_domain }}/realms/lv3/.well-known/openid-configuration
  client_id: serverclaw
  scopes: [openid, email, profile]
  # client_secret injected via OpenBao at runtime
  default_user_role: pending
  login_form_enabled: true
  password_auth_enabled: true
