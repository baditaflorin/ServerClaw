groups:
  - name: lv3-excalidraw
    rules:
      - alert: ExcalidrawDown
        expr: probe_success{service="excalidraw",probe_kind="readiness"} == 0
        for: 2m
        labels:
          severity: warning
          service: excalidraw
        annotations:
          summary: Excalidraw is unreachable on the private runtime port.
          description: The Excalidraw readiness probe on docker-runtime has been failing for at least two minutes.
          runbook_url: https://docs.{{ platform_domain }}/runbooks/configure-excalidraw/
