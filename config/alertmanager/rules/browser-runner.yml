groups:
  - name: lv3-browser-runner
    rules:
      - alert: BrowserRunnerDown
        expr: probe_success{service="browser_runner",probe_kind="readiness"} == 0
        for: 2m
        labels:
          severity: warning
          service: browser_runner
        annotations:
          summary: Browser runner is unreachable on the private runtime port.
          description: The browser runner readiness probe on docker-runtime-lv3 has been failing for at least two minutes.
          runbook_url: https://docs.lv3.org/runbooks/configure-browser-runner/
