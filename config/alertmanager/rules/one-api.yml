groups:
  - name: one-api-alerts
    rules:
      - alert: OneAPIDown
        expr: probe_success{service="one_api",probe_kind="readiness"} == 0
        for: 2m
        labels:
          severity: critical
          service: one_api
        annotations:
          summary: One-API is unreachable on the private controller endpoint.
          description: The One-API readiness probe through the managed private contract has been failing for at least two minutes.
          runbook_url: https://docs.{{ platform_domain }}/runbooks/configure-one-api/
          dashboard_url: https://grafana.{{ platform_domain }}/d/lv3-one-api/lv3-one-api
