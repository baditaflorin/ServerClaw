groups:
  - name: lv3-nextcloud
    rules:
      - alert: NextcloudDown
        expr: probe_success{service="nextcloud",probe_kind="readiness"} == 0
        for: 2m
        labels:
          severity: warning
          service: nextcloud
        annotations:
          summary: Nextcloud is unreachable on the public cloud endpoint.
          description: The Nextcloud readiness probe for cloud.{{ platform_domain }} has been failing for at least two minutes.
          runbook_url: https://docs.{{ platform_domain }}/runbooks/configure-nextcloud/
