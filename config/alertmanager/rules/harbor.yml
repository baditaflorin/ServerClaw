groups:
  - name: harbor-alerts
    rules:
      - alert: HarborRegistryDown
        expr: probe_success{service="harbor",probe_kind="readiness"} == 0
        for: 2m
        labels:
          severity: critical
          service: harbor
        annotations:
          summary: Harbor is unreachable on the public registry endpoint.
          description: The Harbor readiness probe for registry.lv3.org has been failing for at least two minutes.
          runbook_url: https://docs.lv3.org/runbooks/configure-harbor/
          dashboard_url: https://grafana.lv3.org/d/lv3-harbor/lv3-harbor
