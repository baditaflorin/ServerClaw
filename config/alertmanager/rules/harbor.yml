groups:
  - name: harbor-alerts
    rules:
      - alert: HarborRegistryDown
        expr: probe_success{service="harbor",probe_kind="readiness"} == 0
        for: 2m
        labels:
          severity: critical
          service: harbor
        annotations:
          summary: Harbor is unreachable on the public registry endpoint.
          description: The Harbor readiness probe for registry.{{ platform_domain }} has been failing for at least two minutes.
          runbook_url: https://docs.{{ platform_domain }}/runbooks/configure-harbor/
          dashboard_url: https://grafana.{{ platform_domain }}/d/lv3-harbor/lv3-harbor
