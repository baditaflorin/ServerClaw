groups:
  - name: lv3-certificate-lifecycle
    rules:
      - alert: LV3CertificateExpiryWarning
        expr: lv3_certificate_days_remaining < 21 and lv3_certificate_days_remaining >= 14
        for: 15m
        labels:
          severity: warning
          service: certificate_lifecycle
        annotations:
          summary: TLS certificate enters the warning renewal window
          description: One or more tracked certificates have fewer than 21 days remaining.
          runbook_url: https://docs.{{ platform_domain }}/runbooks/cert-expired/

      - alert: LV3CertificateExpiryCritical
        expr: lv3_certificate_days_remaining < 14
        for: 15m
        labels:
          severity: critical
          service: certificate_lifecycle
        annotations:
          summary: TLS certificate enters the critical expiry window
          description: One or more tracked certificates have fewer than 14 days remaining or renewal automation has stalled.
          runbook_url: https://docs.{{ platform_domain }}/runbooks/cert-expired/

  - name: platform_core_alerts
    rules:
      - alert: KeycloakDown
        expr: probe_success{service="keycloak",probe_kind="readiness"} == 0
        for: 2m
        labels:
          severity: critical
          service: keycloak
        annotations:
          summary: Keycloak OIDC discovery is unreachable.
          description: The Keycloak readiness probe has been failing for at least two minutes.
          runbook_url: https://docs.{{ platform_domain }}/runbooks/keycloak-down/
          dashboard_url: https://grafana.{{ platform_domain }}/d/lv3-platform-overview/lv3-platform-overview

      - alert: PostgresDown
        expr: probe_success{service="postgres",probe_kind="readiness"} == 0
        for: 2m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: PostgreSQL is unreachable on the private service port.
          description: The PostgreSQL TCP readiness probe has been failing for at least two minutes.
          runbook_url: https://docs.{{ platform_domain }}/runbooks/postgres-down/
          dashboard_url: https://grafana.{{ platform_domain }}/d/lv3-vm-postgres/lv3-vm-postgres

      - alert: OpenBaoSealed
        expr: probe_success{service="openbao",probe_kind="readiness"} == 0
        for: 2m
        labels:
          severity: critical
          service: openbao
        annotations:
          summary: OpenBao is sealed or otherwise unavailable on the mTLS endpoint.
          description: The OpenBao readiness probe has been failing for at least two minutes.
          runbook_url: https://docs.{{ platform_domain }}/runbooks/openbao-sealed/
          dashboard_url: https://grafana.{{ platform_domain }}/d/lv3-vm-docker-runtime/lv3-vm-docker-runtime

      - alert: CertificateExpiringSoon
        expr: |
          (probe_ssl_earliest_cert_expiry{service=~"grafana|keycloak|mail_platform|openbao|portainer|step_ca|uptime_kuma|vaultwarden"} - time())
          < (14 * 24 * 60 * 60)
        for: 15m
        labels:
          severity: warning
          service: '{% raw %}{{ $labels.service }}{% endraw %}'
        annotations:
          summary: 'The {% raw %}{{ $labels.service }}{% endraw %} certificate expires within 14 days.'
          description: 'The earliest observed TLS certificate for {% raw %}{{ $labels.service }}{% endraw %} is approaching expiry.'
          runbook_url: https://docs.{{ platform_domain }}/runbooks/cert-expired/
          dashboard_url: https://grafana.{{ platform_domain }}/d/lv3-platform-overview/lv3-platform-overview

      - alert: TlsCertificateExpiryCritical
        expr: |
          (probe_ssl_earliest_cert_expiry{service=~"openbao"} - time())
          < (4 * 60 * 60)
        for: 5m
        labels:
          severity: critical
          service: '{% raw %}{{ $labels.service }}{% endraw %}'
        annotations:
          summary: 'The {% raw %}{{ $labels.service }}{% endraw %} certificate expires within 4 hours.'
          description: 'The short-lived TLS certificate for {% raw %}{{ $labels.service }}{% endraw %} is expiring imminently. The renewal timer may have failed. Run make converge-openbao immediately.'
          runbook_url: https://docs.{{ platform_domain }}/runbooks/openbao-cert-renewal/

  - name: postgres-audit
    rules:
      - alert: PostgresPrivilegeChangeBurst
        expr: |
          sum by (host, db, db_role) (
            increase(postgres_audit_events_total{job="postgres-audit-alloy",component="pgaudit",command_class="ROLE"}[5m])
          ) > 10
        for: 0m
        labels:
          severity: warning
          service: postgres
          component: pgaudit
        annotations:
          summary: PostgreSQL privilege changes are spiking for {% raw %}{{ $labels.db_role }}{% endraw %}.
          description: The pgaudit pipeline on {% raw %}{{ $labels.host }}{% endraw %} observed more than 10 ROLE-class audit events in five minutes for role {% raw %}{{ $labels.db_role }}{% endraw %} against database {% raw %}{{ $labels.db }}{% endraw %}.
          runbook_url: https://docs.{{ platform_domain }}/runbooks/postgres-audit/
          dashboard_url: https://grafana.{{ platform_domain }}/d/lv3-vm-postgres/lv3-vm-postgres

      - alert: PostgresUnknownRoleConnection
        expr: |
          (
            sum by (host, db, db_role) (
              increase(postgres_unknown_connection_events_total{job="postgres-audit-alloy",component="pgaudit"}[5m])
            ) > 0
          )
          or
          (
            sum by (host, db, db_role) (
              postgres_unknown_connection_events_total{job="postgres-audit-alloy",component="pgaudit"}
              unless
              postgres_unknown_connection_events_total{job="postgres-audit-alloy",component="pgaudit"} offset 5m
            ) > 0
          )
        for: 0m
        labels:
          severity: critical
          service: postgres
          component: pgaudit
        annotations:
          summary: PostgreSQL accepted a connection for an unapproved login role.
          description: The PostgreSQL audit pipeline on {% raw %}{{ $labels.host }}{% endraw %} observed an authorized connection for role {% raw %}{{ $labels.db_role }}{% endraw %} against database {% raw %}{{ $labels.db }}{% endraw %} outside the approved login-role catalog.
          runbook_url: https://docs.{{ platform_domain }}/runbooks/postgres-audit/
          dashboard_url: https://grafana.{{ platform_domain }}/d/lv3-vm-postgres/lv3-vm-postgres

  - name: lv3-platform-capacity
    rules:
      - alert: HostRamCommittedHigh
        expr: lv3_capacity_committed_ram_gb{scope="active",host="proxmox_florin"} / lv3_capacity_target_ram_gb{host="proxmox_florin"} > 0.90
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Host RAM commitment is above 90 percent of the configured target
          runbook_url: https://docs.{{ platform_domain }}/runbooks/capacity-model/
      - alert: HostDiskCommittedHigh
        expr: lv3_capacity_committed_disk_gb{scope="active",host="proxmox_florin"} / lv3_capacity_target_disk_gb{host="proxmox_florin"} > 0.80
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Host disk commitment is above 80 percent of the configured target
          runbook_url: https://docs.{{ platform_domain }}/runbooks/capacity-model/
      - alert: HostDiskCommittedCritical
        expr: lv3_capacity_committed_disk_gb{scope="active",host="proxmox_florin"} / lv3_capacity_target_disk_gb{host="proxmox_florin"} > 0.90
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: Host disk commitment is above 90 percent of the configured target
          runbook_url: https://docs.{{ platform_domain }}/runbooks/capacity-model/
      - alert: GuestRamActualNearAllocation
        expr: lv3_guest_actual_ram_gb / lv3_guest_allocated_ram_gb > 0.90
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Guest RAM usage is above 90 percent of its current allocation
          runbook_url: https://docs.{{ platform_domain }}/runbooks/capacity-model/

  - name: lv3-log-canary
    rules:
      - alert: LokiCanaryTargetDown
        expr: max(up{job="loki-canary"}) == 0
        for: 5m
        labels:
          severity: critical
          service: grafana
          component: loki-canary
        annotations:
          summary: Loki Canary is no longer being scraped by Prometheus.
          description: The managed Loki Canary runtime on monitoring is down or its metrics endpoint is unreachable.
          runbook_url: https://docs.{{ platform_domain }}/runbooks/log-queryability-canary/
          dashboard_url: https://grafana.{{ platform_domain }}/d/lv3-log-canary-overview/lv3-log-canary-overview

      - alert: LokiCanaryMissingEntries
        expr: increase(loki_canary_missing_entries_total[15m]) > 0
        for: 5m
        labels:
          severity: critical
          service: grafana
          component: loki-canary
        annotations:
          summary: Loki Canary has confirmed missing log entries.
          description: The canary emitted logs that could not be recovered from Loki during the last 15 minutes.
          runbook_url: https://docs.{{ platform_domain }}/runbooks/log-queryability-canary/
          dashboard_url: https://grafana.{{ platform_domain }}/d/lv3-log-canary-overview/lv3-log-canary-overview

      - alert: LokiCanarySpotCheckMissingEntries
        expr: increase(loki_canary_spot_check_missing_entries_total[15m]) > 0
        for: 5m
        labels:
          severity: critical
          service: grafana
          component: loki-canary
        annotations:
          summary: Loki Canary spot checks are failing.
          description: Historical canary entries that should still be queryable were missing from Loki during the last 15 minutes.
          runbook_url: https://docs.{{ platform_domain }}/runbooks/log-queryability-canary/
          dashboard_url: https://grafana.{{ platform_domain }}/d/lv3-log-canary-overview/lv3-log-canary-overview

      - alert: LokiCanaryWebsocketMissingEntries
        expr: increase(loki_canary_websocket_missing_entries_total[15m]) > 0
        for: 10m
        labels:
          severity: warning
          service: grafana
          component: loki-canary
        annotations:
          summary: Loki Canary is missing entries on the websocket path.
          description: The canary had to fall back to direct Loki queries because websocket delivery lagged or dropped entries during the last 15 minutes.
          runbook_url: https://docs.{{ platform_domain }}/runbooks/log-queryability-canary/
          dashboard_url: https://grafana.{{ platform_domain }}/d/lv3-log-canary-overview/lv3-log-canary-overview

      - alert: LokiCanaryMetricDeviationHigh
        expr: abs(loki_canary_metric_test_deviation) > 4
        for: 10m
        labels:
          severity: warning
          service: grafana
          component: loki-canary
        annotations:
          summary: Loki Canary metric-test deviation is above the expected bound.
          description: The canary's expected versus observed log-count comparison has drifted beyond four entries for at least 10 minutes.
          runbook_url: https://docs.{{ platform_domain }}/runbooks/log-queryability-canary/
          dashboard_url: https://grafana.{{ platform_domain }}/d/lv3-log-canary-overview/lv3-log-canary-overview
