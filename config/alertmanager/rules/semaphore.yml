groups:
  - name: semaphore-alerts
    rules:
      - alert: SemaphorePrivateProbeFailed
        expr: probe_success{monitor="Semaphore Private"} == 0
        for: 5m
        labels:
          severity: warning
          service: semaphore
        annotations:
          summary: "Semaphore private endpoint is failing probes"
          description: "The repo-managed private Semaphore ping endpoint on docker-runtime has failed for at least five minutes."
          runbook_url: "docs/runbooks/configure-semaphore.md"
