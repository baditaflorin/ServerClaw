groups:
  - name: lv3-typesense
    rules:
      - alert: TypesenseDown
        expr: probe_success{service="typesense",probe_kind="readiness"} == 0
        for: 2m
        labels:
          severity: warning
          service: typesense
        annotations:
          summary: Typesense is unreachable on the private controller path.
          description: The Typesense readiness probe has been failing for at least two minutes on docker-runtime.
          runbook_url: https://docs.{{ platform_domain }}/runbooks/configure-typesense/
