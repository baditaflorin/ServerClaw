groups:
  - name: lv3-outline
    rules:
      - alert: OutlineWikiDown
        expr: probe_success{service="outline",probe_kind="readiness"} == 0
        for: 2m
        labels:
          severity: warning
          service: outline
        annotations:
          summary: Outline is unreachable on the public wiki endpoint.
          description: The Outline readiness probe for wiki.lv3.org has been failing for at least two minutes.
          runbook_url: https://docs.lv3.org/runbooks/configure-outline/
