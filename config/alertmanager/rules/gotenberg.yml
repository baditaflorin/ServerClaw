groups:
  - name: lv3-gotenberg
    rules:
      - alert: GotenbergDown
        expr: probe_success{service="gotenberg",probe_kind="readiness"} == 0
        for: 2m
        labels:
          severity: warning
          service: gotenberg
        annotations:
          summary: Gotenberg is unreachable on the private runtime port.
          description: The Gotenberg readiness probe on docker-runtime-lv3 has been failing for at least two minutes.
          runbook_url: https://docs.{{ platform_domain }}/runbooks/configure-gotenberg/
