groups:
  - name: lv3-glitchtip
    rules:
      - alert: GlitchTipPublicHealthDown
        expr: probe_success{service="glitchtip",probe_kind="readiness"} == 0
        for: 2m
        labels:
          severity: warning
          service: glitchtip
        annotations:
          summary: GlitchTip is unreachable on the public health endpoint.
          description: The GlitchTip readiness probe through errors.{{ platform_domain }} has been failing for at least two minutes.
          runbook_url: https://docs.{{ platform_domain }}/runbooks/configure-glitchtip/

      - alert: GlitchTipLocalHealthDown
        expr: probe_success{service="glitchtip",probe_kind="liveness"} == 0
        for: 2m
        labels:
          severity: warning
          service: glitchtip
        annotations:
          summary: GlitchTip is unhealthy on docker-runtime.
          description: The private GlitchTip liveness probe on docker-runtime has been failing for at least two minutes.
          runbook_url: https://docs.{{ platform_domain }}/runbooks/configure-glitchtip/
