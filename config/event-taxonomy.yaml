schema_version: 1.0.0
event_schema_version: "1.0"

domains:
  api:
    description: HTTP control-plane request events emitted by the platform API gateway.
    topics:
      - name: platform.api.request
        description: One authenticated platform API request completed.
        status: active
        delivery: at_least_once
        retention: 7d
        producers:
          - adr-0092-platform-api-gateway
        payload:
          required:
            - request_id
            - method
            - path
            - status_code
            - latency_ms
            - caller_identity
            - caller_roles

  findings:
    description: Structured operator and agent observation findings.
    topics:
      - name: platform.findings.observation
        description: One observation-loop finding emitted on the canonical findings subject.
        status: active
        delivery: at_least_once
        retention: 14d
        producers:
          - adr-0071-agent-observation-loop
        payload:
          required:
            - check
            - severity
            - summary
            - details
            - ts
            - run_id
      - name: platform.findings.watchdog_repeated_action
        description: The scheduler watchdog repeated the same self-healing action often enough to indicate a systemic fault.
        status: active
        delivery: at_least_once
        retention: 14d
        producers:
          - adr-0172-watchdog-escalation-and-stale-job-self-healing
        payload:
          required:
            - action_type
            - count_in_window
            - window_seconds
            - threshold
            - severity
            - last_payload

  watchdog:
    description: Scheduler watchdog heartbeat and stale-job self-healing events.
    topics:
      - name: platform.watchdog.heartbeat
        description: One scheduler watchdog heartbeat emitted after a monitoring tick completes.
        status: active
        delivery: at_least_once
        retention: 14d
        producers:
          - adr-0172-watchdog-escalation-and-stale-job-self-healing
        payload:
          required:
            - checked_at
            - active_jobs
            - completed_jobs
            - violation_count
            - warning_count
            - poll_interval_seconds
      - name: platform.watchdog.stale_job_aborted
        description: The scheduler watchdog aborted one running mutation workflow after it went stale.
        status: active
        delivery: at_least_once
        retention: 30d
        producers:
          - adr-0172-watchdog-escalation-and-stale-job-self-healing
        payload:
          required:
            - job_id
            - workflow_id
            - actor_intent_id
            - parent_actor_intent_id
            - reason
            - observed
            - limit
            - message
            - escalation_action
            - requested_by
            - windmill_status
            - recent_action_count

  drift:
    description: Drift detection and reconciliation findings.
    topics:
      - name: platform.drift.warn
        description: Drift was detected and classified as warn severity.
        status: active
        delivery: at_least_once
        retention: 30d
        producers:
          - adr-0091-drift-detection
        payload:
          required:
            - event
            - source
            - severity
      - name: platform.drift.critical
        description: Drift was detected and classified as critical severity.
        status: active
        delivery: at_least_once
        retention: 30d
        producers:
          - adr-0091-drift-detection
        payload:
          required:
            - event
            - source
            - severity
      - name: platform.drift.unreachable
        description: Drift detection could not reach the target surface.
        status: active
        delivery: at_least_once
        retention: 30d
        producers:
          - adr-0091-drift-detection
        payload:
          required:
            - event
            - source
            - severity

  security:
    description: Security posture summaries plus high and critical findings.
    topics:
      - name: platform.security.report
        description: One generated security posture report summary.
        status: active
        delivery: at_least_once
        retention: 30d
        producers:
          - adr-0102-security-posture-reporting
        payload:
          required:
            - event
            - environment
            - generated_at
            - summary
      - name: platform.security.high-finding
        description: One high-severity security finding emitted from the public-surface or posture scan workflows.
        status: active
        delivery: at_least_once
        retention: 90d
        producers:
          - adr-0102-security-posture-reporting
          - adr-0142-public-surface-automated-security-scan
        payload:
          required:
            - event
            - kind
            - generated_at
      - name: platform.security.critical-finding
        description: One critical security finding emitted from the posture report.
        status: active
        delivery: at_least_once
        retention: 90d
        producers:
          - adr-0102-security-posture-reporting
        payload:
          required:
            - event
            - kind
            - generated_at
      - name: platform.security.cve_delta
        description: One newly detected high or critical CVE finding emitted by the SBOM refresh workflow.
        status: active
        delivery: at_least_once
        retention: 90d
        producers:
          - adr-0298-syft-and-grype-for-platform-wide-sbom-generation-and-continuous-cve-scanning
        payload:
          required:
            - event
            - generated_at
            - image_id
            - image_ref
            - runtime_host
            - finding
  maintenance:
    description: Planned maintenance-window state transitions.
    topics:
      - name: platform.maintenance.opened
        description: A maintenance window was opened or updated.
        status: active
        delivery: at_least_once
        retention: 30d
        producers:
          - adr-0080-maintenance-windows
        payload:
          required:
            - window
            - key
            - bucket
            - action
      - name: platform.maintenance.closed
        description: One or more maintenance windows were closed.
        status: active
        delivery: at_least_once
        retention: 30d
        producers:
          - adr-0080-maintenance-windows
        payload:
          required:
            - bucket
            - service_id
            - closed_by
            - windows
            - force
      - name: platform.maintenance.force_closed
        description: One or more maintenance windows were force-closed.
        status: active
        delivery: at_least_once
        retention: 30d
        producers:
          - adr-0080-maintenance-windows
        payload:
          required:
            - bucket
            - service_id
            - closed_by
            - windows
            - force

  backup:
    description: Backup verification lifecycle events.
    topics:
      - name: platform.backup.restore-verification.completed
        description: One restore-verification run completed.
        status: active
        delivery: at_least_once
        retention: 90d
        producers:
          - adr-0099-backup-restore-verification
        payload:
          required:
            - event
            - run_date
            - triggered_by
            - summary
            - overall
            - results
      - name: platform.backup.restore-verification.failed
        description: One restore-verification run completed with a failing outcome.
        status: active
        delivery: at_least_once
        retention: 90d
        producers:
          - adr-0099-backup-restore-verification
        payload:
          required:
            - event
            - run_date
            - triggered_by
            - summary
            - overall
            - results
      - name: platform.backup.stale
        description: One ADR 0302 restic-backed file-level source exceeded its freshness window.
        status: active
        delivery: at_least_once
        retention: 30d
        producers:
          - adr-0302-restic-for-encrypted-file-level-backup-of-platform-configuration-and-state-artifacts
        payload:
          required:
            - event
            - recorded_at
            - source_id
            - summary
            - expected_max_age_minutes

  config:
    description: Conflict-free config-merge events for merge-eligible registry files.
    topics:
      - name: platform.config.merged
        description: One staged config change was merged into a merge-eligible registry file.
        status: active
        delivery: at_least_once
        retention: 14d
        producers:
          - adr-0158-config-merge-protocol
        payload:
          required:
            - change_id
            - file_path
            - key_value
            - operation
            - status
      - name: platform.config.merge_conflict
        description: One staged config change could not be merged and now requires operator review.
        status: active
        delivery: at_least_once
        retention: 30d
        producers:
          - adr-0158-config-merge-protocol
        payload:
          required:
            - change_id
            - file_path
            - key_value
            - operation
            - status
            - reason

  world_state:
    description: World-state refresh lifecycle events.
    topics:
      - name: platform.world_state.refreshed
        description: One world-state surface refresh completed successfully.
        status: active
        delivery: at_least_once
        retention: 14d
        producers:
          - adr-0113-world-state-materializer
        payload:
          required:
            - surface
            - summary
            - collected_at
            - stale
            - record_count
            - refresh_interval_seconds
            - stale_threshold_seconds

  mutation:
    description: Mutation-ledger fan-out events for downstream consumers.
    topics:
      - name: platform.mutation.recorded
        description: One mutation-ledger event row was committed.
        status: active
        delivery: at_least_once
        retention: 90d
        producers:
          - adr-0115-mutation-ledger
        payload:
          required:
            - event_id
            - event_type
            - actor
            - target_kind
            - target_id

  intent:
    description: Goal compilation and approval lifecycle events.
    topics:
      - name: platform.intent.compiled
        description: A natural-language request was compiled into an execution intent.
        status: reserved
        delivery: at_least_once
        retention: 7d
        producers:
          - adr-0112-goal-compiler
        payload:
          required:
            - intent_id
            - requester
      - name: platform.intent.approved
        description: An execution intent passed approval and was submitted for scheduling.
        status: reserved
        delivery: at_least_once
        retention: 7d
        producers:
          - adr-0119-budgeted-scheduler
        payload:
          required:
            - intent_id
            - approved_by
      - name: platform.intent.rejected
        description: An execution intent was rejected.
        status: reserved
        delivery: at_least_once
        retention: 7d
        producers:
          - adr-0119-budgeted-scheduler
        payload:
          required:
            - intent_id
            - reason

  execution:
    description: Workflow and execution lifecycle events.
    topics:
      - name: platform.execution.started
        description: One workflow run started.
        status: reserved
        delivery: at_least_once
        retention: 7d
        producers:
          - adr-0119-budgeted-scheduler
        payload:
          required:
            - intent_id
            - workflow_id
      - name: platform.execution.completed
        description: One workflow run completed successfully.
        status: reserved
        delivery: at_least_once
        retention: 7d
        producers:
          - adr-0119-budgeted-scheduler
        payload:
          required:
            - intent_id
            - workflow_id
      - name: platform.execution.failed
        description: One workflow run failed.
        status: reserved
        delivery: at_least_once
        retention: 7d
        producers:
          - adr-0119-budgeted-scheduler
        payload:
          required:
            - intent_id
            - workflow_id
      - name: platform.execution.budget_exceeded
        description: One workflow run exceeded a declared budget.
        status: reserved
        delivery: at_least_once
        retention: 30d
        producers:
          - adr-0119-budgeted-scheduler
        payload:
          required:
            - intent_id
            - budget_name
      - name: platform.execution.deadlock_detected
        description: A distributed deadlock cycle was detected across the lock registry, intent queue, or coordination map.
        status: active
        delivery: at_least_once
        retention: 30d
        producers:
          - adr-0162-deadlock-detector
        payload:
          required:
            - cycle_nodes
      - name: platform.execution.deadlock_aborted
        description: The detector aborted and requeued one participant to break a deadlock cycle.
        status: active
        delivery: at_least_once
        retention: 30d
        producers:
          - adr-0162-deadlock-detector
        payload:
          required:
            - intent_id
            - victim_context_id
            - cycle_nodes
      - name: platform.execution.livelock_detected
        description: A queued intent exceeded the livelock threshold without making progress.
        status: active
        delivery: at_least_once
        retention: 30d
        producers:
          - adr-0162-deadlock-detector
        payload:
          required:
            - intent_id
            - attempts

  health:
    description: Health-state transition events.
    topics:
      - name: platform.health.degraded
        description: A service health signal degraded.
        status: reserved
        delivery: at_least_once
        retention: 30d
        producers:
          - adr-0128-health-composite-index
        payload:
          required:
            - service_id
            - status
      - name: platform.health.recovered
        description: A service health signal recovered.
        status: reserved
        delivery: at_least_once
        retention: 30d
        producers:
          - adr-0128-health-composite-index
        payload:
          required:
            - service_id
            - status

  incident:
    description: Incident lifecycle events.
    topics:
      - name: platform.incident.opened
        description: One incident entered the opened state.
        status: reserved
        delivery: at_least_once
        retention: 90d
        producers:
          - adr-0114-incident-triage
        payload:
          required:
            - incident_id
            - severity
      - name: platform.incident.resolved
        description: One incident was resolved.
        status: reserved
        delivery: at_least_once
        retention: 90d
        producers:
          - adr-0126-observation-to-action-closure-loop
        payload:
          required:
            - incident_id
            - resolution
      - name: platform.incident.escalated
        description: One incident was escalated.
        status: reserved
        delivery: at_least_once
        retention: 90d
        producers:
          - adr-0126-observation-to-action-closure-loop
        payload:
          required:
            - incident_id
            - escalation_reason

  deployment:
    description: Deployment lifecycle events.
    topics:
      - name: platform.deployment.completed
        description: A deployment completed successfully.
        status: reserved
        delivery: at_least_once
        retention: 90d
        producers:
          - adr-0073-promotion-pipeline
        payload:
          required:
            - service_id
            - version
      - name: platform.deployment.rolled_back
        description: A deployment rolled back.
        status: reserved
        delivery: at_least_once
        retention: 90d
        producers:
          - adr-0073-promotion-pipeline
        payload:
          required:
            - service_id
            - version

  agent:
    description: Agent coordination and state lifecycle events.
    topics:
      - name: platform.agent.state_updated
        description: One agent session published a live coordination-state update.
        status: active
        delivery: at_least_once
        retention: 7d
        producers:
          - adr-0161-real-time-agent-coordination-map
        payload:
          required:
            - session_id
            - agent_id
            - phase
            - status
      - name: platform.agent.handoff
        description: One agent delegated work to another agent.
        status: reserved
        delivery: exactly_once
        retention: 7d
        producers:
          - adr-0131-handoff-protocol
        payload:
          required:
            - handoff_id
            - from_agent
            - to_agent
      - name: platform.agent.state_checkpoint
        description: One agent emitted a durable state checkpoint.
        status: reserved
        delivery: at_least_once
        retention: 7d
        producers:
          - adr-0130-agent-state
        payload:
          required:
            - checkpoint_id
            - agent_id
