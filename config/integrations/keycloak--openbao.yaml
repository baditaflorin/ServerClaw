---
# ADR 0353: Service Integration Contract Registry
# managed-by: adr=0353 role=keycloak_runtime
schema_version: "1.0.0"
contract_id: keycloak--openbao
consumer: keycloak_runtime
provider: openbao_runtime
integration_type: secrets
adr: "0200"

connection:
  addr_var: openbao_addr
  auth_method: approle
  role: keycloak

secrets:
  - path: openbao/keycloak/admin_password
    env_var: KEYCLOAK_ADMIN_PASSWORD
  - path: openbao/postgres/keycloak/password
    env_var: KC_DB_PASSWORD

health_check:
  endpoint: /v1/sys/health
  expected_status: 200
  timeout_seconds: 5

pre_flight:
  - check: openbao_unsealed
  - check: approle_exists
    role: keycloak
