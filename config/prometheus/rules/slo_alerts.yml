# BEGIN SERVICE: browser_runner
      - alert: SLOFastBurn_browser_runner_availability
        expr: (slo:browser_runner_availability:error_rate_5m > (14 * 0.010000)) and (slo:browser_runner_availability:error_rate_1h > (14 * 0.010000))
        for: 2m
        labels:
          severity: critical
          service_id: browser_runner
          slo_id: browser-runner-availability
          indicator: availability
        annotations:
          summary: browser-runner-availability is burning its error budget at 14x
          description: The private browser runner remains reachable on docker-runtime-lv3 for governed Playwright session execution.
          runbook: docs/runbooks/slo-tracking.md
      - alert: SLOSlowBurn_browser_runner_availability
        expr: (slo:browser_runner_availability:error_rate_6h > (6 * 0.010000)) and (slo:browser_runner_availability:error_rate_30d > (6 * 0.010000))
        for: 15m
        labels:
          severity: warning
          service_id: browser_runner
          slo_id: browser-runner-availability
          indicator: availability
        annotations:
          summary: browser-runner-availability is burning its error budget at 6x
