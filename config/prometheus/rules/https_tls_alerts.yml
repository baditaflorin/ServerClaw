groups:
- name: https_tls_assurance
  interval: 1m
  rules:
  - alert: HTTPSProbeFailed_api_gateway_public
    expr: probe_success{job="https-tls-blackbox",assurance_id="api-gateway-public"}
      == 0
    for: 5m
    labels:
      service_id: api_gateway
      assurance_id: api-gateway-public
      environment: production
      scope: public
      severity: critical
    annotations:
      summary: api-gateway-public HTTPS probe is failing.
      description: https://api.{{ platform_domain }}:443/healthz is no longer completing
        a healthy HTTPS probe through blackbox exporter.
      runbook_url: docs/runbooks/https-tls-assurance.md
  - alert: TLSCertificateExpiringWarning_api_gateway_public
    expr: ((probe_ssl_earliest_cert_expiry{job="https-tls-blackbox",assurance_id="api-gateway-public"}
      - time()) / 86400) < 21
    for: 15m
    labels:
      service_id: api_gateway
      assurance_id: api-gateway-public
      environment: production
      scope: public
      severity: warning
    annotations:
      summary: api-gateway-public TLS certificate is approaching expiry.
      description: https://api.{{ platform_domain }}:443/healthz has less than 21
        days remaining before certificate expiry.
      runbook_url: docs/runbooks/https-tls-assurance.md
  - alert: TLSCertificateExpiringCritical_api_gateway_public
    expr: ((probe_ssl_earliest_cert_expiry{job="https-tls-blackbox",assurance_id="api-gateway-public"}
      - time()) / 86400) < 14
    for: 15m
    labels:
      service_id: api_gateway
      assurance_id: api-gateway-public
      environment: production
      scope: public
      severity: critical
    annotations:
      summary: api-gateway-public TLS certificate is within the critical expiry window.
      description: https://api.{{ platform_domain }}:443/healthz has less than 14
        days remaining before certificate expiry.
      runbook_url: docs/runbooks/https-tls-assurance.md
