# AUTO-GENERATED from config/certificate-catalog.json — do not edit manually
# Run: python3 scripts/generate_https_tls_assurance.py --write
groups:
  - name: https_tls_assurance
    interval: 1m
    rules:

# BEGIN SERVICE: api_gateway
      - alert: HTTPSProbeFailed_api_gateway_public
        annotations:
          description: https://api.lv3.org:443/healthz is no longer completing a healthy
            HTTPS probe through blackbox exporter.
          runbook_url: docs/runbooks/https-tls-assurance.md
          summary: api-gateway-public HTTPS probe is failing.
        expr: probe_success{job="https-tls-blackbox",assurance_id="api-gateway-public"}
          == 0
        for: 5m
        labels:
          assurance_id: api-gateway-public
          environment: production
          scope: public
          service_id: api_gateway
          severity: critical
      - alert: TLSCertificateExpiringWarning_api_gateway_public
        annotations:
          description: https://api.lv3.org:443/healthz has less than 21 days remaining before
            certificate expiry.
          runbook_url: docs/runbooks/https-tls-assurance.md
          summary: api-gateway-public TLS certificate is approaching expiry.
        expr: ((probe_ssl_earliest_cert_expiry{job="https-tls-blackbox",assurance_id="api-gateway-public"}
          - time()) / 86400) < 21
        for: 15m
        labels:
          assurance_id: api-gateway-public
          environment: production
          scope: public
          service_id: api_gateway
          severity: warning
      - alert: TLSCertificateExpiringCritical_api_gateway_public
        annotations:
          description: https://api.lv3.org:443/healthz has less than 14 days remaining before
            certificate expiry.
          runbook_url: docs/runbooks/https-tls-assurance.md
          summary: api-gateway-public TLS certificate is within the critical expiry window.
        expr: ((probe_ssl_earliest_cert_expiry{job="https-tls-blackbox",assurance_id="api-gateway-public"}
          - time()) / 86400) < 14
        for: 15m
        labels:
          assurance_id: api-gateway-public
          environment: production
          scope: public
          service_id: api_gateway
          severity: critical
# END SERVICE: api_gateway
