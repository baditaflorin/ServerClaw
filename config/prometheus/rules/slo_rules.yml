          slo_id: woodpecker-availability
          service_id: woodpecker
          indicator: availability
      - record: slo:woodpecker_availability:burn_rate_1h
        expr: slo:woodpecker_availability:error_rate_1h / 0.005000
        labels:
          slo_id: woodpecker-availability
          service_id: woodpecker
          indicator: availability
      - record: slo:woodpecker_availability:time_to_budget_exhaustion_days
        expr: (slo:woodpecker_availability:budget_remaining * 30) / clamp_min(slo:woodpecker_availability:burn_rate_1h,
          0.001)
        labels:
          slo_id: woodpecker-availability
