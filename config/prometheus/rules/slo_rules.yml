groups:
  - name: slo_recording_rules
    interval: 5m
    rules:
      - record: slo:browser_runner_availability:success_ratio_5m
        expr: avg_over_time(probe_success{job="slo-blackbox",slo_id="browser-runner-availability"}[5m])
        labels:
          slo_id: browser-runner-availability
          service_id: browser_runner
          indicator: availability
      - record: slo:browser_runner_availability:success_ratio_1h
        expr: avg_over_time(probe_success{job="slo-blackbox",slo_id="browser-runner-availability"}[1h])
        labels:
          slo_id: browser-runner-availability
          service_id: browser_runner
          indicator: availability
      - record: slo:browser_runner_availability:success_ratio_30d
        expr: avg_over_time(probe_success{job="slo-blackbox",slo_id="browser-runner-availability"}[30d])
        labels:
          slo_id: browser-runner-availability
          service_id: browser_runner
          indicator: availability
      - record: slo:browser_runner_availability:error_rate_5m
        expr: 1 - slo:browser_runner_availability:success_ratio_5m
        labels:
          slo_id: browser-runner-availability
          service_id: browser_runner
          indicator: availability
      - record: slo:browser_runner_availability:error_rate_1h
        expr: 1 - slo:browser_runner_availability:success_ratio_1h
        labels:
          slo_id: browser-runner-availability
          service_id: browser_runner
          indicator: availability
      - record: slo:browser_runner_availability:error_rate_30d
        expr: 1 - slo:browser_runner_availability:success_ratio_30d
        labels:
          slo_id: browser-runner-availability
          service_id: browser_runner
          indicator: availability
      - record: slo:browser_runner_availability:budget_remaining
        expr: clamp_min(1 - (slo:browser_runner_availability:error_rate_30d / 0.010000),
          0)
        labels:
          slo_id: browser-runner-availability
          service_id: browser_runner
          indicator: availability
      - record: slo:browser_runner_availability:burn_rate_1h
        expr: slo:browser_runner_availability:error_rate_1h / 0.010000
        labels:
          slo_id: browser-runner-availability
          service_id: browser_runner
          indicator: availability
      - record: slo:browser_runner_availability:time_to_budget_exhaustion_days
        expr: (slo:browser_runner_availability:budget_remaining * 30) / clamp_min(slo:browser_runner_availability:burn_rate_1h,
          0.001)
        labels:
          slo_id: browser-runner-availability
          service_id: browser_runner
          indicator: availability
      - record: slo:changedetection_availability:success_ratio_5m
