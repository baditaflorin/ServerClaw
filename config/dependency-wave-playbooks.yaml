      - vm:121
      - vm:121/service:neko
      - vm:110
      - vm:110/service:nginx_edge_publication
      - config/subdomain-catalog.json
      - inventory/host_vars/proxmox_florin.yml
    lock_resources:
      - host:proxmox_florin
      - host:proxmox_florin/service:proxmox_network
      - vm:121
      - vm:110
      - vm:110/service:nginx_edge_publication

  - path: playbooks/ntfy.yml
    workflow_id: converge-ntfy
