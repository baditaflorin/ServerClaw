openapi: 3.1.0
info:
  title: Runtime-AI Tesseract OCR Contract
  version: 1.0.0
  description: Private Tesseract OCR fallback contract for the runtime-ai pool.
servers:
  - url: http://10.10.10.90:3008
paths:
  /healthz:
    get:
      summary: Return the Tesseract OCR health state.
      operationId: getTesseractHealth
      responses:
        "200":
          description: Runtime is healthy.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /ocr:
    post:
      summary: Extract text from an uploaded image or scanned document.
      operationId: extractOcrText
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "200":
          description: OCR extraction succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  text:
                    type: string
                  extraction_method:
                    type: string
                  page_count:
                    type: integer
                required:
                  - text
                  - extraction_method
