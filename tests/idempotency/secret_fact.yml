---
- name: Idempotency test for secret_fact
  hosts: idempotency
  gather_facts: false
  vars:
    secret_path: test-secret
    secret_fact_name: fetched_secret
    secret_fact_openbao_url: "{{ lookup('ansible.builtin.env', 'IDEMPOTENCY_FIXTURE_URL') }}"
    secret_fact_token: "{{ lookup('ansible.builtin.env', 'OPENBAO_TOKEN') }}"
    secret_fact_validate_certs: false
  tasks:
    - name: Apply the secret_fact role
      ansible.builtin.include_role:
        name: lv3.platform.secret_fact

    - name: Assert the fetched secret matches the fixture
      ansible.builtin.assert:
        that:
          - fetched_secret.password == "s3cr3t"
