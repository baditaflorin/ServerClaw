---
- name: Publish mail DNS records
  hosts: proxmox_hosts
  become: false
  gather_facts: false

  tasks:
    - name: Ensure Hetzner DNS records are present for the mail platform
      ansible.builtin.include_role:
        name: hetzner_dns_records
        apply:
          delegate_to: localhost
          become: false
      vars:
        hetzner_dns_records: "{{ hostvars[inventory_hostname].mail_platform_dns_records }}"
      run_once: true

- name: Converge public mail ingress forwarding on the Proxmox host
  hosts: proxmox_hosts
  become: true
  gather_facts: true

  roles:
    - role: proxmox_network

- name: Converge the mail platform runtime on the Docker runtime VM
  hosts: docker-runtime-lv3
  become: true
  gather_facts: true

  pre_tasks:
    - name: Ensure target guest is Debian
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
        fail_msg: "This playbook only supports Debian guests."

  roles:
    - role: linux_guest_firewall
    - role: mail_platform_runtime

- name: Converge mail platform observability on the Docker runtime VM
  hosts: docker-runtime-lv3
  become: true
  gather_facts: true

  pre_tasks:
    - name: Ensure target guest is Debian
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
        fail_msg: "This playbook only supports Debian guests."

  roles:
    - role: linux_guest_firewall
    - role: mail_platform_observability

- name: Refresh the monitoring stack with the managed mail dashboard
  hosts: monitoring-lv3
  become: true
  gather_facts: true

  pre_tasks:
    - name: Ensure target guest is Debian
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
        fail_msg: "This playbook only supports Debian guests."

  roles:
    - role: monitoring_vm
