---
# Playbook: ntfy.yml
# Purpose: Converge the repo-managed ntfy runtime, public DNS publication, and shared edge route for ADR 0299.
# Use case: Run during ADR 0299 rollout, recovery, or replay when ntfy.{{ platform_domain }} and its governed publisher contracts must match repo truth.
#
# Inputs (required):
#   - env (string, required): Target environment selector used to choose the docker-runtime and nginx guests.
#
# Inputs (optional):
#   - proxmox_guest_ssh_connection_mode (string, optional, default=proxmox_host_jump): SSH path to managed guests.
#
# Outputs:
#   - ntfy is running on docker-runtime-lv3 with repo-managed auth, ntfy.{{ platform_domain }} resolves through Hetzner DNS, and the shared NGINX edge publishes the public health endpoint.
#
# Idempotency: Fully idempotent
#
# Dependencies:
#   - ADR 0299: ntfy as the self-hosted push notification channel for programmatic alert delivery.
#   - Requires: the existing Docker runtime baseline on docker-runtime-lv3, linux_guest_firewall, nginx_edge_publication, and Hetzner DNS access for the public hostname.
#   - Role: lv3.platform.ntfy_runtime - converges the ntfy runtime plus governed topic and credential contracts, including Docker publication self-heal during ntfy startup.
#   - Role: lv3.platform.nginx_edge_publication - publishes ntfy.{{ platform_domain }} through the shared edge certificate and proxy path.
#
# Related ADRs: 0068, 0077, 0087, 0095, 0204, 0276, 0280, 0299
# Related Runbooks: docs/runbooks/configure-ntfy.md docs/runbooks/subdomain-governance.md
#
# Invocation: ansible-playbook playbooks/ntfy.yml -e @playbooks/vars/ntfy.yml -e env=production
#
# Author: LV3 Platform
# Last Updated: 2026-04-06

# --- Standard plays (driven by vars/ntfy.yml) ---

- import_playbook: _includes/dns_publication.yml
  when: service_needs_dns | default(false)

# --- ntfy-specific docker runtime play (has post_tasks with post-verify and notify) ---

- name: Converge ntfy on the Docker runtime VM
  hosts: "{{ 'docker-runtime-staging-lv3' if (env | default('production')) == 'staging' else 'docker-runtime-lv3' }}"
  become: true
  gather_facts: true
  tags:
    - tier-2
    - communication
    - service-ntfy

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.ntfy
        playbook_execution_audit_target: ntfy
        required_hosts:
          - "{{ playbook_execution_required_hosts.docker_runtime[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.ntfy_runtime

  post_tasks:
    - name: Run shared ntfy post-verify checks
      ansible.builtin.import_tasks: tasks/post-verify.yml
      vars:
        service_health_probe_id: ntfy
        playbook_execution_post_verify_audit_action: playbook.verify.ntfy
    - name: Run shared completion notifications
      ansible.builtin.import_tasks: tasks/notify.yml
      vars:
        playbook_execution_notification_service: ntfy

- import_playbook: _includes/nginx_edge_publication.yml
  when: service_needs_nginx_edge | default(false)

# --- ntfy-specific verify play ---

- name: Verify the ntfy public health endpoint from the controller
  hosts: localhost
  connection: local
  gather_facts: false
  tags:
    - tier-2
    - communication
    - service-ntfy

  tasks:
    - name: Verify the ntfy public health endpoint responds
      ansible.builtin.uri:
        url: https://ntfy.{{ platform_domain }}/v1/health
        method: GET
        status_code: 200
      register: ntfy_public_health
      retries: 12
      delay: 5
      until: ntfy_public_health.status == 200
      changed_when: false
