---
# Purpose: Run the shared startup, liveness, Docker publication repair, and readiness verification flow after a service converge.
# Use case: Included by service playbooks after mutation tasks finish and the apply needs standardized health evidence.
#
# Inputs (required):
#   - service_health_probe_id
#   - playbook_execution_health_probe_catalog_path
#   - playbook_execution_mutation_audit_script
#   - playbook_execution_correlation_id
#
# Inputs (optional):
#   - playbook_execution_emit_audit (bool, optional, default=true)
#   - playbook_execution_post_verify_audit_action (string, optional, default=playbook.verify)
#   - playbook_execution_audit_evidence_ref (string, optional)
#
# Outputs:
#   - Service health probes executed in order, optional Docker publication recovery applied, and a best-effort completion audit emitted.
#
# Idempotency: Fully idempotent
#              Verification is read-only except for delegated Docker publication recovery when the declared contract is broken.
#
# Dependencies:
#   - ADR 0246: Startup, readiness, and liveness semantics.
#   - ADR 0270: Docker publication self-healing and port-programming assertions.
#   - Task file: playbooks/tasks/docker-publication-assert.yml - repairs Docker publication before readiness when required.
- name: Load the health probe catalog
  ansible.builtin.set_fact:
    playbook_execution_health_probe_catalog: >-
      {{
        lookup(
          'ansible.builtin.file',
          playbook_execution_health_probe_catalog_path
        ) | from_json
      }}
  changed_when: false

- name: Assert the requested service health probe exists
  ansible.builtin.assert:
    that:
      - service_health_probe_id is defined
      - service_health_probe_id in playbook_execution_health_probe_catalog.services
    fail_msg: >-
      Unknown health probe id '{{ service_health_probe_id | default('undefined') }}'.
  changed_when: false

- name: Record the active service health probe contract
  ansible.builtin.set_fact:
    playbook_execution_service_probe: "{{ playbook_execution_health_probe_catalog.services[service_health_probe_id] }}"
  changed_when: false

- name: Run startup verification
  ansible.builtin.include_tasks: verify-probe.yml
  vars:
    playbook_execution_probe_stage: startup
    playbook_execution_probe: "{{ playbook_execution_service_probe.startup }}"
  when:
    - inventory_hostname == playbook_execution_service_probe.owning_vm
    - playbook_execution_service_probe.startup is defined

- name: Run liveness verification
  ansible.builtin.include_tasks: verify-probe.yml
  vars:
    playbook_execution_probe_stage: liveness
    playbook_execution_probe: "{{ playbook_execution_service_probe.liveness }}"
  when: inventory_hostname == playbook_execution_service_probe.owning_vm

- name: Repair Docker publication before readiness verification
  ansible.builtin.include_tasks: docker-publication-assert.yml
  vars:
    playbook_execution_docker_publication_contract: "{{ playbook_execution_service_probe.readiness.docker_publication }}"
  when:
    - playbook_execution_verify_readiness | default(true)
    - inventory_hostname == playbook_execution_service_probe.owning_vm
    - playbook_execution_service_probe.readiness is defined
    - playbook_execution_service_probe.readiness.docker_publication is defined

- name: Run readiness verification
  ansible.builtin.include_tasks: verify-probe.yml
  vars:
    playbook_execution_probe_stage: readiness
    playbook_execution_probe: "{{ playbook_execution_service_probe.readiness }}"
  when:
    - playbook_execution_verify_readiness | default(true)
    - inventory_hostname == playbook_execution_service_probe.owning_vm

- name: Emit a best-effort playbook completion audit event
  ansible.builtin.command:
    argv:
      - python3
      - "{{ playbook_execution_mutation_audit_script }}"
      - --emit
      - --actor-class
      - automation
      - --actor-id
      - ansible-playbook
      - --surface
      - ansible
      - --action
      - "{{ playbook_execution_post_verify_audit_action | default('playbook.verify') }}"
      - --target
      - "{{ service_health_probe_id }}"
      - --outcome
      - success
      - --correlation-id
      - "{{ playbook_execution_correlation_id }}"
      - --evidence-ref
      - "{{ playbook_execution_audit_evidence_ref | default('') }}"
  delegate_to: localhost
  become: false
  run_once: true
  changed_when: false
  failed_when: false
  when: playbook_execution_emit_audit | bool
