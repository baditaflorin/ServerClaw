---
# Purpose: Converge the GlitchTip database, runtime, and edge publication.
# Use case: Run for production live apply of the repo-managed GlitchTip application error tracking surface.
# Outputs: PostgreSQL role and database, GlitchTip runtime secrets, Keycloak OIDC client, NGINX edge publication, and repo-managed bootstrap artifacts.
# Idempotency: Partially idempotent; runtime convergence is repeatable, while bootstrap refresh keeps controller-local API and DSN artifacts aligned with the live org, team, and project state.
# Dependencies: ADR 0281, postgres_vm, keycloak_runtime, glitchtip_postgres, glitchtip_runtime, nginx_edge_publication.
#
# Invocation: ansible-playbook playbooks/glitchtip.yml -e @playbooks/vars/glitchtip.yml -e env=production

# --- Standard plays (driven by vars/glitchtip.yml) ---

- import_playbook: _includes/dns_publication.yml
  when: service_needs_dns | default(false)

- import_playbook: _includes/postgres_preparation.yml
  when: service_needs_postgres | default(false)

# --- GlitchTip-specific docker runtime play (requires linux_guest_firewall_recover_missing_docker_bridge_chains) ---

- name: Converge GlitchTip on the Docker runtime VM
  hosts: "{{ 'docker-runtime-staging' if (env | default('production')) == 'staging' else 'docker-runtime' }}"
  become: true
  gather_facts: true
  vars:
    linux_guest_firewall_recover_missing_docker_bridge_chains: true

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.glitchtip
        playbook_execution_audit_target: glitchtip
        required_hosts:
          - "{{ playbook_execution_required_hosts.docker_runtime[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.keycloak_runtime
    - role: lv3.platform.glitchtip_runtime

- import_playbook: _includes/nginx_edge_publication.yml
  when: service_needs_nginx_edge | default(false)

# --- GlitchTip-specific plays ---

- name: Bootstrap and verify GlitchTip publication
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Bootstrap and verify the GlitchTip public error tracking surface
      ansible.builtin.include_role:
        name: lv3.platform.glitchtip_runtime
        tasks_from: publish.yml
