---
# Playbook: n8n.yml
# Purpose: Converge n8n DNS publication, PostgreSQL access, and runtime state for the repo-managed automation surface.
# Use case: Run during n8n deployment, upgrade, or recovery when workflow automation must match repo truth.
#
# Inputs (required):
#   - proxmox_guest_ssh_connection_mode (string, required): SSH path used by the runtime and postgres guest plays.
#
# Inputs (optional):
#   - n8n_runtime_skip_bootstrap (boolean, optional, default=false): Skip bootstrap-only tasks when verifying an existing runtime.
#
# Outputs:
#   - The n8n DNS records, PostgreSQL access, runtime services, and published edge endpoint are reconciled to repo state.
#
# Idempotency: Fully idempotent
#
# Dependencies:
#   - ADR 0151: n8n provides the managed automation surface.
#   - Requires: postgres-lv3, docker-runtime-lv3, and the shared edge components to already exist.
#   - Role: lv3.platform.n8n_postgres - provisions the n8n database and role.
#   - Role: lv3.platform.n8n_runtime - converges the n8n runtime and publication flow.
#
# Related ADRs: 0151, 0197
# Related Runbooks: docs/runbooks/configure-n8n.md
#
# Invocation: ansible-playbook playbooks/n8n.yml -e @playbooks/vars/n8n.yml -e env=production
#
# Author: LV3 Platform
# Last Updated: 2026-04-06

# --- Standard plays (driven by vars/n8n.yml) ---

- import_playbook: _includes/dns_publication.yml
  when: service_needs_dns | default(false)

- import_playbook: _includes/postgres_preparation.yml
  when: service_needs_postgres | default(false)

# --- n8n-specific docker runtime play (has post_tasks with post-verify and notify) ---

- name: Converge n8n on the Docker runtime VM
  hosts: "{{ 'docker-runtime-staging-lv3' if (env | default('production')) == 'staging' else 'docker-runtime-lv3' }}"
  become: true
  gather_facts: true

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.n8n
        playbook_execution_audit_target: n8n
        required_hosts:
          - "{{ playbook_execution_required_hosts.docker_runtime[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.n8n_runtime

  post_tasks:
    - name: Run shared n8n post-verify checks
      ansible.builtin.import_tasks: tasks/post-verify.yml
      vars:
        service_health_probe_id: n8n
        playbook_execution_post_verify_audit_action: playbook.verify.n8n
    - name: Run shared completion notifications
      ansible.builtin.import_tasks: tasks/notify.yml
      vars:
        playbook_execution_notification_service: n8n

# --- n8n-specific nginx play (has extra var public_edge_sync_generated_static_dirs) ---

- name: Publish n8n through the NGINX edge
  hosts: "{{ 'nginx-staging-lv3' if (env | default('production')) == 'staging' else 'nginx-lv3' }}"
  become: true
  gather_facts: true
  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/platform.yml"
  vars:
    public_edge_sync_generated_static_dirs: false

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_emit_audit: false
        required_hosts:
          - "{{ playbook_execution_required_hosts.nginx_edge[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.nginx_edge_publication
