---
# Playbook: flagsmith.yml
# Purpose: Converge the Flagsmith database, runtime, edge publication, and repo-managed feature-flag seed state.
# Use case: Run for production or staging live apply of the repo-managed feature flag and remote configuration surface.
#
# Inputs (required):
#   - env (string, required): Target environment selector used to choose the postgres, docker-runtime, and nginx guests.
#
# Inputs (optional):
#   - proxmox_guest_ssh_connection_mode (string, optional, default=proxmox_host_jump): SSH path to managed guests.
#
# Outputs:
#   - PostgreSQL role and database, Flagsmith runtime secrets, baseline org/project/environment state, environment API keys,
#     and edge-authenticated publication at `flags.{{ platform_domain }}`.
#
# Idempotency: Fully idempotent
#
# Dependencies:
#   - ADR 0288: Flagsmith is the feature flag and remote configuration control plane.
#   - Requires: postgres-vm, docker-runtime, OpenBao, and the shared NGINX edge to already exist.
#   - Role: lv3.platform.flagsmith_postgres - converges the shared PostgreSQL database and role.
#   - Role: lv3.platform.flagsmith_runtime - converges the Flagsmith CE runtime and repo-managed seed state.
#   - Role: lv3.platform.nginx_edge_publication - publishes `flags.{{ platform_domain }}` behind the shared edge auth boundary.
#
# Related ADRs: 0021, 0042, 0077, 0086, 0288
# Related Runbooks: docs/runbooks/configure-flagsmith.md
#
# Invocation: ansible-playbook playbooks/flagsmith.yml -e @playbooks/vars/flagsmith.yml -e env=production
#
# Author: LV3 Platform
# Last Updated: 2026-04-06

# --- Standard plays (driven by vars/flagsmith.yml) ---

- import_playbook: _includes/dns_publication.yml
  when: service_needs_dns | default(false)

- import_playbook: _includes/postgres_preparation.yml
  when: service_needs_postgres | default(false)

- import_playbook: _includes/docker_runtime_converge.yml

- import_playbook: _includes/nginx_edge_publication.yml
  when: service_needs_nginx_edge | default(false)

# --- Flagsmith-specific plays ---

- name: Verify the Flagsmith public publication
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Verify the Flagsmith public UI and health publication
      ansible.builtin.include_role:
        name: lv3.platform.flagsmith_runtime
        tasks_from: verify_public.yml
