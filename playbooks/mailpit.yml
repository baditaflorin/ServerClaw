---
# Playbook: mailpit.yml
# Purpose: Expose the repo-managed Mailpit converge path through the root playbook entrypoint.
# Use case: Run via `make converge-mailpit` or service wrappers that target the Mailpit runtime.
#
# Inputs (required):
#   - env (str, required): Deployment environment selector passed through to the collection playbook.
#
# Inputs (optional):
#   - proxmox_guest_ssh_connection_mode (str, optional, default=proxmox_host_jump): Guest SSH routing mode for the live apply.
#
# Outputs:
#   - Imports the collection-scoped Mailpit playbook used by live-apply wrappers and syntax checks.
#
# Idempotency: Fully idempotent
#              This wrapper only imports the collection playbook and does not mutate state on its own.
#
# Dependencies:
#   - ADR 0282: Defines Mailpit as the non-production SMTP interceptor.
#   - Requires: collections/ansible_collections/lv3/platform/playbooks/mailpit.yml.
#   - Role: lv3.platform.mailpit_runtime — owned by the imported playbook.
#
# Related ADRs: 0079, 0107, 0282
# Related Runbooks: docs/runbooks/configure-mailpit.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-30

- import_playbook: ../collections/ansible_collections/lv3/platform/playbooks/mailpit.yml
