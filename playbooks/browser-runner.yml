---
# Playbook: browser-runner.yml
# Purpose: Converge the private Playwright browser runner on docker-runtime for governed web action and extraction.
# Use case: Run when changing ADR 0261 runtime automation, local browser session policy, or the private browser runner service image build.
#
# Inputs (required):
#   - None.
#
# Inputs (optional):
#   - proxmox_guest_ssh_connection_mode (str, optional, default=proxmox_host_jump): SSH transport mode for guest access.
#
# Outputs:
#   - Browser runner container running on docker-runtime
#   - Private session artifacts persisted under /opt/browser-runner/data/artifacts
#
# Idempotency: Partially idempotent
#              Reruns rebuild the local image when repo-managed sources change and reconcile the private runtime state without touching protected release truth.
#
# Dependencies:
#   - ADR 0261: Defines Playwright browser runners as the governed ServerClaw browser action and extraction runtime.
#   - Requires: docker-runtime and the managed Docker host toolchain to be reachable.
#   - Role: lv3.platform.browser_runner_runtime — builds and converges the private Playwright runner.
#
# Related ADRs: 0165, 0247
# Related Runbooks: docs/runbooks/configure-browser-runner.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-29
- name: Converge Browser Runner on the Docker runtime VM
  hosts: docker-runtime
  become: true
  gather_facts: true
  vars:
    preflight_wait_for_connection: false
  tags:
    - tier-2
    - automation
    - service-browser-runner

  pre_tasks:
    - name: Ensure target guest is Debian
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
        fail_msg: "This playbook only supports Debian guests."

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.browser_runner_runtime
