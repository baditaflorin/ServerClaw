---
service_audit_name: minio
service_runtime_roles:
  - lv3.platform.linux_guest_firewall
  - lv3.platform.docker_runtime
  - lv3.platform.minio_runtime
service_needs_dns: false
service_needs_postgres: false
service_needs_nginx_edge: true

# ADR 0373: Conventional service variables derived from platform_service_registry
minio_site_dir: /opt/minio
minio_data_dir: /opt/minio/data
minio_secret_dir: /etc/lv3/minio
minio_local_artifact_dir: "{{ repo_shared_local_root }}/minio"
minio_compose_file: "{{ minio_site_dir }}/docker-compose.yml"
minio_env_file: "{{ minio_site_dir }}/minio.env"
minio_openbao_agent_dir: "{{ minio_site_dir }}/openbao-agent"
minio_openbao_secret_path: minio/data/root
minio_openbao_policy_name: minio-runtime
minio_openbao_approle_name: minio-runtime
minio_container_name: minio
minio_image: "{{ container_image_catalog.images.minio_runtime.ref }}"
