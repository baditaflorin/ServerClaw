---
# Playbook: fix-edge-certificate.yml
# Purpose: Reconcile the shared NGINX edge certificate when edge-published domains are missing from the current SAN set.
# Use case: Run after certificate-validation or edge publication drift reveals missing public SANs on the live edge certificate.
#
# Inputs (required):
#   - platform_domain (string, required): Base platform domain used to render operator-facing status messages.
#
# Inputs (optional):
#   - env (string, optional, default=production): Selects the production or staging NGINX target host group.
#
# Outputs:
#   - Reports missing edge-published domains and renews the shared edge certificate when SAN coverage is incomplete.
#
# Idempotency: Partially idempotent
#              Safe to rerun; renewal only executes when missing SANs are detected, but the renewal action itself changes live certificate state.
#
# Dependencies:
#   - ADR 0165: Playbook metadata standard required by the repository gate.
#   - ADR 0375: Certificate validation and concordance enforcement defines the drift this playbook repairs.
#   - Requires: inventory/group_vars/platform.yml and config/subdomain-catalog.json to be current before execution.
#
# Related ADRs: 0165, 0375
# Related Runbooks: docs/runbooks/validation-gate.md
#
# Author: LV3 Platform
# Last Updated: 2026-04-14

- name: Fix NGINX Edge Certificate Issues
  hosts: "{{ 'nginx-staging' if (env | default('production')) == 'staging' else 'nginx' }}"
  become: true
  gather_facts: true
  vars:
    fix_edge_cert_name: lv3-edge
    fix_edge_dns_hetzner_plugin_version: 3.0.0
    fix_edge_dns_hetzner_credentials_file: /etc/letsencrypt/hetzner.ini
    fix_edge_dns_hetzner_propagation_seconds: 120
    fix_edge_dns_hetzner_virtualenv: /opt/certbot-dns-hetzner
  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/platform.yml"
  tags:
    - tier-2
    - infrastructure
    - certificate-fix

  tasks:
    - name: Validate controller connectivity
      ansible.builtin.debug:
        msg: "Fixing NGINX edge certificate for missing domains (ci.{{ platform_domain | default('example.com') }}, bi.{{ platform_domain | default('example.com') }}, etc)"

    - name: Load subdomain catalog
      ansible.builtin.set_fact:
        subdomain_catalog: "{{ lookup('file', playbook_dir + '/../config/subdomain-catalog.json') | from_json }}"
      delegate_to: localhost
      become: false
      run_once: true

    - name: Collect all edge-published domains
      ansible.builtin.set_fact:
        edge_published_domains: >-
          {{
            subdomain_catalog.subdomains
            | selectattr('exposure', 'in', ['edge-published', 'edge-static'])
            | map(attribute='fqdn')
            | map('replace', 'example.com', platform_domain)
            | unique
            | sort
          }}
      run_once: true

    - name: Check current certificate
      ansible.builtin.command:
        argv:
          - openssl
          - x509
          - -in
          - "/etc/letsencrypt/live/{{ fix_edge_cert_name }}/cert.pem"
          - -text
          - -noout
      register: current_cert_info
      changed_when: false
      ignore_errors: true

    - name: Extract SANs from current certificate
      ansible.builtin.set_fact:
        current_cert_domains: >-
          {{
            (
              (
                current_cert_info.stdout
                | regex_search('Subject Alternative Name: (.*)', '\1')
                | first
                | default('')
              )
              | split(', ')
              | map('trim')
              | map('regex_replace', '^DNS:', '')
              | list
            ) if current_cert_info.rc == 0 else []
          }}

    - name: Compare current and desired domains
      ansible.builtin.set_fact:
        missing_domains: "{{ edge_published_domains | difference(current_cert_domains) }}"
      run_once: true

    - name: Report certificate status
      ansible.builtin.debug:
        msg: |
          Certificate Status:
          - Current domains in cert: {{ current_cert_domains | length }}
          - Desired domains: {{ edge_published_domains | length }}
          - Missing domains: {{ missing_domains | length }}

          {% if missing_domains | length > 0 %}
          Missing from certificate:
          {% for domain in missing_domains | sort %}
          - {{ domain }}
          {% endfor %}
          {% endif %}
      run_once: true

    - name: Check certbot configuration
      ansible.builtin.command:
        argv:
          - certbot
          - certificates
          - --cert-name
          - "{{ fix_edge_cert_name }}"
      register: certbot_status
      changed_when: false
      ignore_errors: true

    - name: Ensure certbot DNS-01 prerequisites are present
      ansible.builtin.apt:
        name:
          - certbot
          - python3-venv
        state: present
        force_apt_get: true
      when: missing_domains | length > 0

    - name: Derive the Certbot Hetzner plugin path
      ansible.builtin.set_fact:
        fix_edge_certbot_plugin_path: >-
          {{ fix_edge_dns_hetzner_virtualenv }}/lib/python{{ ansible_python.version.major }}.{{ ansible_python.version.minor }}/site-packages
      when: missing_domains | length > 0

    - name: Install the pinned Certbot Hetzner DNS plugin
      ansible.builtin.pip:
        name: "certbot-dns-hetzner=={{ fix_edge_dns_hetzner_plugin_version }}"
        virtualenv: "{{ fix_edge_dns_hetzner_virtualenv }}"
        virtualenv_command: /usr/bin/python3 -m venv
      when: missing_domains | length > 0

    - name: Write the Hetzner DNS credential file when a controller token is present
      ansible.builtin.copy:
        dest: "{{ fix_edge_dns_hetzner_credentials_file }}"
        mode: "0600"
        content: "dns_hetzner_api_token = {{ lookup('ansible.builtin.env', 'HETZNER_DNS_API_TOKEN') | trim }}\n"
      when:
        - missing_domains | length > 0
        - (lookup('ansible.builtin.env', 'HETZNER_DNS_API_TOKEN') | trim | length) > 0
      no_log: true

    - name: Check the Hetzner DNS credential file
      ansible.builtin.stat:
        path: "{{ fix_edge_dns_hetzner_credentials_file }}"
      register: fix_edge_dns_hetzner_credentials_after
      when: missing_domains | length > 0

    - name: Assert the Hetzner DNS credential file is available
      ansible.builtin.assert:
        that:
          - fix_edge_dns_hetzner_credentials_after.stat.exists
        fail_msg: >-
          Fixing the shared edge certificate requires either HETZNER_DNS_API_TOKEN on the controller
          or an existing {{ fix_edge_dns_hetzner_credentials_file }} on the edge host.
      when: missing_domains | length > 0

    - name: Force certificate renewal with all domains
      when: missing_domains | length > 0
      block:
        - name: Backup current renewal config
          ansible.builtin.copy:
            src: "/etc/letsencrypt/renewal/{{ fix_edge_cert_name }}.conf"
            dest: "/etc/letsencrypt/renewal/{{ fix_edge_cert_name }}.conf.backup"
            remote_src: true
            backup: true
            mode: preserve

        - name: Run certbot to request certificate with all domains
          ansible.builtin.command:
            argv:
              - certbot
              - certonly
              - --authenticator
              - dns-hetzner
              - --dns-hetzner-credentials
              - "{{ fix_edge_dns_hetzner_credentials_file }}"
              - --dns-hetzner-propagation-seconds
              - "{{ fix_edge_dns_hetzner_propagation_seconds | string }}"
              - --cert-name
              - "{{ fix_edge_cert_name }}"
              - --force-renewal
              - --non-interactive
              - --agree-tos
              - --email
              - "{{ public_edge_certbot_email | default('admin@' + platform_domain) }}"
              - -d
              - "{{ edge_published_domains | sort | join(',') }}"
          environment:
            CERTBOT_PLUGIN_PATH: "{{ fix_edge_certbot_plugin_path }}"
          changed_when: true
          async: 300
          poll: 5

        - name: Discover the latest public edge certificate lineage
          ansible.builtin.find:
            paths: /etc/letsencrypt/live
            file_type: directory
            patterns: "{{ fix_edge_cert_name }}*"
            recurse: false
          register: fix_edge_cert_lineages
          changed_when: false

        - name: Select the latest public edge certificate lineage
          ansible.builtin.set_fact:
            fix_edge_latest_cert_lineage: >-
              {{
                (
                  fix_edge_cert_lineages.files
                  | sort(attribute='mtime', reverse=true)
                  | map(attribute='path')
                  | list
                  | first
                ) | default('')
              }}

        - name: Assert the renewed public edge certificate lineage exists
          ansible.builtin.assert:
            that:
              - fix_edge_latest_cert_lineage | length > 0
            fail_msg: >-
              Certbot completed without leaving a visible lineage under /etc/letsencrypt/live/{{ fix_edge_cert_name }}*.

        - name: Refresh the canonical public edge lineage alias
          ansible.builtin.file:
            src: "{{ fix_edge_latest_cert_lineage }}"
            dest: "/etc/letsencrypt/live/{{ fix_edge_cert_name }}"
            state: link
            force: true
          when:
            - fix_edge_latest_cert_lineage != ('/etc/letsencrypt/live/' ~ fix_edge_cert_name)

        - name: Start nginx after renewal
          ansible.builtin.systemd:
            name: nginx
            state: started
            enabled: true

        - name: Verify certificate after renewal
          ansible.builtin.command:
            argv:
              - openssl
              - x509
              - -in
              - "/etc/letsencrypt/live/{{ fix_edge_cert_name }}/cert.pem"
              - -text
              - -noout
          register: new_cert_info
          changed_when: false

        - name: Report renewal results
          ansible.builtin.debug:
            msg: |
              Certificate renewal completed!
              Check: openssl x509 -in /etc/letsencrypt/live/{{ fix_edge_cert_name }}/cert.pem -text -noout | grep -A5 "Subject Alternative Name"

    - name: If no missing domains, run standard nginx converge
      when: missing_domains | length == 0
      block:
        - name: Display nginx is up to date
          ansible.builtin.debug:
            msg: "Certificate is up to date with all required domains"

    - name: Validate certificate domains
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/../scripts/certificate_validator.py"
          - --check-all
      delegate_to: localhost
      become: false
      register: validation_result
      changed_when: false
      ignore_errors: true

    - name: Show validation results
      ansible.builtin.debug:
        msg: "{{ validation_result.stdout }}"
      when: validation_result.stdout is defined
