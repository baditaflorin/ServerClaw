---
# Playbook: dify.yml
# Purpose: Converge the repo-managed Dify runtime, database, and edge publication.
# Use case: Run when applying ADR 0197 to production or replaying the Dify live rollout from the latest mainline base.
#
# Inputs (required):
#   - env (string, required): Target environment selector; production by default.
#
# Inputs (optional):
#   - dify_skip_edge (boolean, optional, default=false): Skip NGINX edge publication when testing the runtime privately.
#
# Outputs:
#   - Dify database state, runtime containers, edge publication, and controller-local bootstrap artifacts are aligned with repo truth.
#
# Idempotency: Fully idempotent
#
# Dependencies:
#   - ADR 0197: Dify visual workflow canvas deployment and governance boundary.
#   - Requires: OpenBao, Keycloak, Langfuse, and the shared NGINX edge to already be converged.
#   - Role: lv3.platform.dify_postgres - provisions the named PostgreSQL role and database.
#   - Role: lv3.platform.dify_runtime - converges the Dify runtime stack and bootstrap state.
#
# Related ADRs: 0044, 0146, 0197
# Related Runbooks: docs/runbooks/configure-dify.md
#
# Invocation: ansible-playbook playbooks/dify.yml -e @playbooks/vars/dify.yml -e env=production
#
# Author: LV3 Platform
# Last Updated: 2026-04-06

# --- Standard plays (driven by vars/dify.yml) ---

- import_playbook: _includes/dns_publication.yml
  when: service_needs_dns | default(false)

- import_playbook: _includes/postgres_preparation.yml
  when: service_needs_postgres | default(false)

# --- Dify-specific docker runtime play (has post_tasks with post-verify and notify) ---

- name: Converge Dify on the Docker runtime VM
  hosts: "{{ 'docker-runtime-staging' if (env | default('production')) == 'staging' else 'docker-runtime' }}"
  become: true
  gather_facts: true

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.dify
        playbook_execution_audit_target: dify
        required_hosts:
          - "{{ playbook_execution_required_hosts.docker_runtime[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.dify_runtime

  post_tasks:
    - name: Run shared Dify post-verify checks
      ansible.builtin.import_tasks: tasks/post-verify.yml
      vars:
        service_health_probe_id: dify
        playbook_execution_post_verify_audit_action: playbook.verify.dify
    - name: Run shared completion notifications
      ansible.builtin.import_tasks: tasks/notify.yml
      vars:
        playbook_execution_notification_service: dify

# --- Dify-specific nginx play (has dify_skip_edge conditional on the role) ---

- name: Publish Dify through the NGINX edge
  hosts: "{{ 'nginx-staging' if (env | default('production')) == 'staging' else 'nginx' }}"
  become: true
  gather_facts: true

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_emit_audit: false
        required_hosts:
          - "{{ playbook_execution_required_hosts.nginx_edge[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.nginx_edge_publication
      when: not (dify_skip_edge | default(false) | bool)
