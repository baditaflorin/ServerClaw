---
- name: Converge private Portainer access on the Proxmox host
  hosts: proxmox_hosts
  become: true
  gather_facts: true

  roles:
    - role: proxmox_tailscale_proxy
    - role: proxmox_security
      vars:
        proxmox_security_manage_acme: false

- name: Converge Portainer on the Docker runtime VM
  hosts: docker-runtime-lv3
  become: true
  gather_facts: true

  pre_tasks:
    - name: Ensure target guest is Debian
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
        fail_msg: "This playbook only supports Debian guests."

  roles:
    - role: docker_runtime
    - role: portainer_runtime
