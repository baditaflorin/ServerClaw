# Playbook: runtime-general-pool.yml
# Purpose: Provision the dedicated runtime-general guest, converge the Nomad/Traefik/Dapr pool substrate, move the first lightweight operator and support slice onto it, and retire the legacy copies from docker-runtime-lv3.
# Use case: Run for ADR 0319 and ADR 0320 follow-on work when the production runtime-general pool must become true end to end.
#
# Inputs (required):
#   - bootstrap_ssh_private_key (path, required via make targets): SSH private key used for the Proxmox host and guest jump path.
#
# Inputs (optional):
#   - env (string, optional, default=production): Deployment environment selector. This playbook currently converges only the production runtime-general guest.
#   - proxmox_guest_ssh_connection_mode (string, optional, default=proxmox_host_jump): SSH routing mode for guest access.
#   - platform_trace_id (string, optional): Mutation-audit trace identifier propagated by the make wrapper.
#
# Outputs:
#   - Dedicated VM `runtime-general-lv3` provisioned on Proxmox with Docker, guest firewall policy, named `ops` access, a runtime-general Nomad namespace and client, Traefik plus Dapr substrate services, and the migrated Uptime Kuma, status-page backing surface, Homepage, and Mailpit workloads.
#
# Idempotency: Partially idempotent
#              Provisioning and service converges are idempotent. The Proxmox-side replay intentionally stop/starts VM 191 after `qm set` changes so the cloud-init-backed network and hardware settings become effective.
#
# Dependencies:
#   - ADR 0319: Defines the runtime-general pool and the preferred Nomad, Traefik, and Dapr substrate.
#   - ADR 0320: Defines the pool-scoped deployment surface and lane boundary.
#   - ADR 0323: Governs the lightweight operator and support migration wave into runtime-general.
#   - ADR 0232: Provides the private Nomad scheduler and client bootstrap path.
#   - Role: lv3.platform.proxmox_guests — provisions the dedicated guest from the managed template catalog.
#   - Role: lv3.platform.proxmox_network — replays the Proxmox host firewall so the new pool guest and the Nomad scheduler can reach each other.
#   - Role: lv3.platform.linux_guest_firewall — refreshes the in-guest nftables policy on monitoring-lv3 after the canonical guest catalog changes so the Nomad scheduler admits the new runtime-general peer.
#   - Role: lv3.platform.nomad_cluster_member — enrolls the runtime-general guest into the private Nomad cluster.
#   - Role: lv3.platform.nomad_namespace — ensures the runtime-general namespace exists on the scheduler.
#   - Role: lv3.platform.runtime_pool_substrate — converges the Traefik and Dapr pool substrate.
#
# Related ADRs: 0232, 0319, 0320, 0323
# Related Runbooks: docs/runbooks/configure-runtime-general-pool.md
#
# Author: LV3 Platform
# Last Updated: 2026-04-02
---
- name: Ensure the runtime-general VM is provisioned on the Proxmox host
  hosts: proxmox_hosts
  become: true
  gather_facts: true
  tags:
    - tier-1
    - automation
    - service-runtime-general-pool
  vars:
    runtime_general_vm_vmid: 191
    proxmox_guests_active: >-
      {{
        proxmox_guests
        | selectattr('vmid', 'equalto', runtime_general_vm_vmid)
        | list
      }}

  roles:
    - role: lv3.platform.proxmox_guests
      tags:
        - guests
        - runtime-general-pool
    - role: lv3.platform.proxmox_network
      tags:
        - guests
        - runtime-general-pool

  post_tasks:
    - name: Stop the runtime-general VM from Proxmox after qm set changes
      ansible.builtin.command: "qm stop {{ runtime_general_vm_vmid }} --skiplock 1"
      register: runtime_general_vm_stop
      failed_when: runtime_general_vm_stop.rc not in [0, 255]
      changed_when: true
      tags:
        - guests
        - runtime-general-pool

    - name: Start the runtime-general VM from Proxmox after the forced stop
      ansible.builtin.command: "qm start {{ runtime_general_vm_vmid }}"
      register: runtime_general_vm_start_after_stop
      failed_when: runtime_general_vm_start_after_stop.rc not in [0, 255]
      changed_when: runtime_general_vm_start_after_stop.rc == 0
      tags:
        - guests
        - runtime-general-pool

- name: Converge the dedicated runtime-general guest substrate
  hosts: runtime-general-lv3
  become: true
  gather_facts: false
  tags:
    - tier-2
    - automation
    - service-runtime-general-pool
  vars:
    proxmox_guest_ssh_connection_mode: proxmox_host_jump
    runtime_pool_substrate_pool_id: runtime-general
    runtime_pool_substrate_entrypoint_name: runtime-general
    runtime_pool_substrate_routes:
      - route_id: uptime-kuma
        prefix: /uptime-kuma
        upstream: "{{ platform_service_topology | platform_service_url('uptime_kuma', 'internal') }}"
      - route_id: homepage
        prefix: /homepage
        upstream: "{{ platform_service_topology | platform_service_url('homepage', 'internal') }}"
      - route_id: mailpit
        prefix: /mailpit
        upstream: "{{ platform_service_topology | platform_service_url('mailpit', 'internal') }}"

  pre_tasks:
    - name: Wait for the runtime-general VM SSH service to be reachable
      ansible.builtin.wait_for_connection:
        timeout: 300

    - name: Gather facts after SSH is ready
      ansible.builtin.setup:

    - name: Wait for cloud-init first boot work to finish when present
      ansible.builtin.shell: |
        if command -v cloud-init >/dev/null 2>&1; then
          cloud-init status --wait
        fi
      args:
        executable: /bin/bash
      changed_when: false

    - name: Wait for Debian package manager activity to settle after cloud-init
      ansible.builtin.shell: |
        for _ in $(seq 1 120); do
          if ! pgrep -x apt-get >/dev/null \
            && ! pgrep -x dpkg >/dev/null; then
            exit 0
          fi
          sleep 5
        done
        exit 1
      args:
        executable: /bin/bash
      changed_when: false

  roles:
    - role: lv3.platform.linux_guest_firewall
      vars:
        linux_guest_firewall_recover_missing_docker_bridge_chains: true
    - role: lv3.platform.linux_access
      vars:
        linux_access_admin_user: "{{ proxmox_guest_ci_user }}"
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.nomad_cluster_member
      vars:
        nomad_cluster_server: false
        nomad_cluster_client: true
        nomad_cluster_node_class: runtime-general
        nomad_cluster_node_meta:
          workload_pool: runtime-general
    - role: lv3.platform.runtime_pool_substrate

- name: Refresh monitoring guest firewall policy after the runtime-general peer catalog changes
  hosts: monitoring-lv3
  become: true
  gather_facts: true
  tags:
    - tier-2
    - automation
    - service-runtime-general-pool

  pre_tasks:
    - name: Ensure the monitoring guest target is Debian
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
        fail_msg: "This playbook only supports Debian guests."

  roles:
    - role: lv3.platform.linux_guest_firewall
      vars:
        linux_guest_firewall_recover_missing_docker_bridge_chains: true

- name: Ensure the runtime-general Nomad namespace exists
  hosts: monitoring-lv3
  become: true
  gather_facts: true
  tags:
    - tier-2
    - automation
    - service-runtime-general-pool

  roles:
    - role: lv3.platform.nomad_namespace
      vars:
        nomad_namespace_name: runtime-general
        nomad_namespace_description: Runtime general pool namespace for the dedicated operator and support guest.

- name: Converge the operator and support services on runtime-general-lv3
  hosts: runtime-general-lv3
  become: true
  gather_facts: true
  vars:
    runtime_general_legacy_uptime_kuma_host: docker-runtime-lv3
    runtime_general_legacy_uptime_kuma_data_dir: /opt/uptime-kuma/data
    runtime_general_uptime_kuma_data_dir: /opt/uptime-kuma/data
    runtime_general_uptime_kuma_restore_archive: /tmp/runtime-general-uptime-kuma-data.tar.gz
    runtime_general_uptime_kuma_restore_marker: /opt/uptime-kuma/.legacy-data-restored
  tags:
    - tier-2
    - automation
    - service-runtime-general-pool

  pre_tasks:
    - name: Detect whether runtime-general already restored legacy Uptime Kuma data
      ansible.builtin.stat:
        path: "{{ runtime_general_uptime_kuma_restore_marker }}"
      register: runtime_general_uptime_kuma_restore_marker_stat

    - name: Detect whether legacy Uptime Kuma data exists on docker-runtime-lv3
      ansible.builtin.stat:
        path: "{{ runtime_general_legacy_uptime_kuma_data_dir }}/kuma.db"
      delegate_to: "{{ runtime_general_legacy_uptime_kuma_host }}"
      register: runtime_general_legacy_uptime_kuma_db

    - name: Create a controller-local staging directory for Uptime Kuma migration
      ansible.builtin.tempfile:
        state: directory
        prefix: runtime-general-uptime-kuma-
      delegate_to: localhost
      become: false
      register: runtime_general_uptime_kuma_staging_dir
      when:
        - not runtime_general_uptime_kuma_restore_marker_stat.stat.exists
        - runtime_general_legacy_uptime_kuma_db.stat.exists

    - name: Archive legacy Uptime Kuma data on docker-runtime-lv3
      ansible.builtin.command:
        argv:
          - tar
          - -C
          - "{{ runtime_general_legacy_uptime_kuma_data_dir }}"
          - -czf
          - "{{ runtime_general_uptime_kuma_restore_archive }}"
          - .
      delegate_to: "{{ runtime_general_legacy_uptime_kuma_host }}"
      when:
        - not runtime_general_uptime_kuma_restore_marker_stat.stat.exists
        - runtime_general_legacy_uptime_kuma_db.stat.exists
      changed_when: true

    - name: Fetch archived legacy Uptime Kuma data to the controller
      ansible.builtin.fetch:
        src: "{{ runtime_general_uptime_kuma_restore_archive }}"
        dest: "{{ runtime_general_uptime_kuma_staging_dir.path }}/uptime-kuma-data.tar.gz"
        flat: true
      delegate_to: "{{ runtime_general_legacy_uptime_kuma_host }}"
      when:
        - not runtime_general_uptime_kuma_restore_marker_stat.stat.exists
        - runtime_general_legacy_uptime_kuma_db.stat.exists

    - name: Ensure the runtime-general Uptime Kuma data directory exists before restore
      ansible.builtin.file:
        path: "{{ runtime_general_uptime_kuma_data_dir }}"
        state: directory
        mode: "0755"
      when:
        - not runtime_general_uptime_kuma_restore_marker_stat.stat.exists
        - runtime_general_legacy_uptime_kuma_db.stat.exists

    - name: Stop the fresh runtime-general Uptime Kuma container before restoring legacy data
      ansible.builtin.command:
        argv:
          - docker
          - rm
          - --force
          - uptime-kuma
      register: runtime_general_uptime_kuma_container_remove
      failed_when: >-
        runtime_general_uptime_kuma_container_remove.rc not in [0, 1]
        or (
          runtime_general_uptime_kuma_container_remove.rc == 1
          and 'No such container' not in runtime_general_uptime_kuma_container_remove.stderr
        )
      changed_when: runtime_general_uptime_kuma_container_remove.rc == 0
      when:
        - not runtime_general_uptime_kuma_restore_marker_stat.stat.exists
        - runtime_general_legacy_uptime_kuma_db.stat.exists

    - name: Copy archived legacy Uptime Kuma data onto runtime-general-lv3
      ansible.builtin.copy:
        src: "{{ runtime_general_uptime_kuma_staging_dir.path }}/uptime-kuma-data.tar.gz"
        dest: "{{ runtime_general_uptime_kuma_restore_archive }}"
        mode: "0600"
      when:
        - not runtime_general_uptime_kuma_restore_marker_stat.stat.exists
        - runtime_general_legacy_uptime_kuma_db.stat.exists

    - name: Restore legacy Uptime Kuma data onto runtime-general-lv3
      ansible.builtin.unarchive:
        src: "{{ runtime_general_uptime_kuma_restore_archive }}"
        dest: "{{ runtime_general_uptime_kuma_data_dir }}"
        remote_src: true
      when:
        - not runtime_general_uptime_kuma_restore_marker_stat.stat.exists
        - runtime_general_legacy_uptime_kuma_db.stat.exists

    - name: Record that runtime-general restored legacy Uptime Kuma data
      ansible.builtin.file:
        path: "{{ runtime_general_uptime_kuma_restore_marker }}"
        state: touch
        mode: "0644"
      when:
        - not runtime_general_uptime_kuma_restore_marker_stat.stat.exists
        - runtime_general_legacy_uptime_kuma_db.stat.exists

    - name: Remove the archived Uptime Kuma migration bundle from runtime-general-lv3
      ansible.builtin.file:
        path: "{{ runtime_general_uptime_kuma_restore_archive }}"
        state: absent
      when:
        - not runtime_general_uptime_kuma_restore_marker_stat.stat.exists
        - runtime_general_legacy_uptime_kuma_db.stat.exists

    - name: Remove the archived Uptime Kuma migration bundle from docker-runtime-lv3
      ansible.builtin.file:
        path: "{{ runtime_general_uptime_kuma_restore_archive }}"
        state: absent
      delegate_to: "{{ runtime_general_legacy_uptime_kuma_host }}"
      when:
        - not runtime_general_uptime_kuma_restore_marker_stat.stat.exists
        - runtime_general_legacy_uptime_kuma_db.stat.exists

    - name: Remove the controller-local Uptime Kuma migration staging directory
      ansible.builtin.file:
        path: "{{ runtime_general_uptime_kuma_staging_dir.path }}"
        state: absent
      delegate_to: localhost
      become: false
      when:
        - runtime_general_uptime_kuma_staging_dir is defined
        - runtime_general_uptime_kuma_staging_dir.path is defined

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.uptime_kuma_runtime
    - role: lv3.platform.homepage_runtime
    - role: lv3.platform.mailpit_runtime

  post_tasks:
    - name: Verify the runtime-general Traefik route to Uptime Kuma
      ansible.builtin.uri:
        url: "http://127.0.0.1:9080/uptime-kuma"
        method: GET
        follow_redirects: none
        status_code:
          - 200
          - 302
          - 303
        return_content: true
        timeout: 30
      register: runtime_general_uptime_route
      changed_when: false

    - name: Verify the runtime-general Traefik route to Homepage
      ansible.builtin.uri:
        url: "http://127.0.0.1:9080/homepage"
        method: GET
        follow_redirects: none
        status_code:
          - 200
          - 302
          - 303
        return_content: true
        timeout: 30
      register: runtime_general_homepage_route
      changed_when: false

    - name: Verify the runtime-general Traefik route to Mailpit
      ansible.builtin.uri:
        url: "http://127.0.0.1:9080/mailpit/api/v1/info"
        method: GET
        status_code:
          - 200
        return_content: true
        timeout: 30
      register: runtime_general_mailpit_route
      changed_when: false

    - name: Verify the runtime-general Dapr bridge can invoke Uptime Kuma through Traefik
      ansible.builtin.command:
        argv:
          - curl
          - --fail
          - --silent
          - --show-error
          - --path-as-is
          - http://127.0.0.1:3500/v1.0/invoke/http://127.0.0.1:9080/method/uptime-kuma
      register: runtime_general_dapr_uptime_route
      changed_when: false

- name: Refresh the shared NGINX edge after the runtime-general move
  hosts: nginx-lv3
  become: true
  gather_facts: true
  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/platform.yml"
  tags:
    - tier-2
    - automation
    - service-runtime-general-pool

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.nginx_edge_publication

  post_tasks:
    - name: Verify the Uptime Kuma public route through the shared edge
      ansible.builtin.uri:
        url: "{{ platform_service_topology | platform_service_url('uptime_kuma', 'public') }}"
        method: GET
        status_code:
          - 200
        timeout: 30
      register: runtime_general_public_uptime_route
      until: runtime_general_public_uptime_route.status == 200
      retries: 5
      delay: 2
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Verify the public status page route through the shared edge
      ansible.builtin.uri:
        url: https://status.lv3.org/
        method: GET
        status_code:
          - 200
        timeout: 30
      register: runtime_general_public_status_route
      until: runtime_general_public_status_route.status == 200
      retries: 5
      delay: 2
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Verify the Homepage public route through the shared edge
      ansible.builtin.uri:
        url: "{{ platform_service_topology | platform_service_url('homepage', 'public') }}"
        method: GET
        status_code:
          - 200
          - 302
          - 303
        timeout: 30
      register: runtime_general_public_homepage_route
      until: runtime_general_public_homepage_route.status in [200, 302, 303]
      retries: 5
      delay: 2
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Record runtime-general retirement readiness on the controller
      ansible.builtin.set_fact:
        runtime_general_retirement_ready: true
      delegate_to: localhost
      delegate_facts: true

- name: Retire the legacy support-service copies from docker-runtime-lv3
  hosts: docker-runtime-lv3
  become: true
  gather_facts: true
  tags:
    - tier-2
    - automation
    - service-runtime-general-pool
  vars:
    runtime_general_legacy_compose_files:
      - /opt/uptime-kuma/docker-compose.yml
      - /opt/homepage/docker-compose.yml
      - /opt/dev-tools/mailpit/docker-compose.yml

  pre_tasks:
    - name: Assert runtime-general verification completed before retiring legacy copies
      ansible.builtin.assert:
        that:
          - hostvars['localhost'].runtime_general_retirement_ready | default(false)
        fail_msg: >-
          Refusing to retire the legacy runtime-general support services on
          docker-runtime-lv3 until this run verifies the replacement
          runtime-general-lv3 routes and the shared edge publication.

    - name: Gather the legacy support-service compose files
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ runtime_general_legacy_compose_files }}"
      register: runtime_general_legacy_compose_stats

  tasks:
    - name: Stop the legacy support-service compose stacks on docker-runtime-lv3
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --file
          - "{{ item.stat.path }}"
          - down
          - --remove-orphans
      args:
        chdir: "{{ item.stat.path | dirname }}"
      loop: "{{ runtime_general_legacy_compose_stats.results }}"
      when: item.stat.exists
      register: runtime_general_legacy_compose_down
      changed_when: >-
        'Stopping' in (runtime_general_legacy_compose_down.stdout | default(''))
        or 'Removing' in (runtime_general_legacy_compose_down.stdout | default(''))
        or 'Removing' in (runtime_general_legacy_compose_down.stderr | default(''))
