---
- name: Converge PostgreSQL VM baseline
  hosts: "{{ 'postgres_guests:&staging' if (env | default('production')) == 'staging' else 'postgres_guests:&production' }}"
  become: true
  gather_facts: true
  tags:
    - tier-2
    - data
    - service-postgres

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_emit_audit: false
        required_hosts:
          - "{{ playbook_execution_required_hosts.postgres[playbook_execution_env] }}"

  roles:
    - role: linux_guest_firewall
    - role: linux_access
      vars:
        linux_access_admin_user: "{{ proxmox_guest_ci_user }}"
    - role: postgres_vm
