---
- name: Warm the host graph for guest jump access
  hosts: proxmox_hosts
  become: false
  gather_facts: false

  tasks:
    - name: Record mail verification start
      ansible.builtin.debug:
        msg: "Starting mail platform live verification."

- name: Read the server mailbox state before inbound probe
  hosts: docker-runtime-lv3
  become: true
  gather_facts: true

  tasks:
    - name: Read inbox count before SMTP probe
      ansible.builtin.shell: |
        python3 - <<'PY'
        import imaplib
        from pathlib import Path

        password = Path('/etc/lv3/mail-platform/server-mailbox-password').read_text(encoding='utf-8').strip()
        mailbox = imaplib.IMAP4_SSL('127.0.0.1', 993)
        mailbox.login('server', password)
        status, data = mailbox.select('INBOX', readonly=True)
        mailbox.logout()
        if status != 'OK':
            raise SystemExit('imap select failed')
        print(int(data[0]))
        PY
      args:
        executable: /bin/bash
      register: mail_platform_inbox_before
      changed_when: false

- name: Send an inbound probe through the public SMTP endpoint
  hosts: monitoring-lv3
  become: true
  gather_facts: true

  tasks:
    - name: Try SMTP probe to server mailbox through mail.lv3.org
      ansible.builtin.shell: |
        python3 - <<'PY'
        import smtplib
        from email.message import EmailMessage

        message = EmailMessage()
        message['From'] = 'monitor-probe@lv3.org'
        message['To'] = 'server@lv3.org'
        message['Subject'] = 'LV3 inbound SMTP probe'
        message.set_content('Inbound SMTP probe delivered through mail.lv3.org')

        with smtplib.SMTP('mail.lv3.org', 25, timeout=30) as client:
            client.send_message(message)

        print('sent')
        PY
      args:
        executable: /bin/bash
      register: mail_platform_public_inbound_probe
      changed_when: false
      failed_when: false

    - name: Fall back to private SMTP probe when public mail endpoint does not answer
      ansible.builtin.shell: |
        python3 - <<'PY'
        import smtplib
        from email.message import EmailMessage

        message = EmailMessage()
        message['From'] = 'monitor-probe@lv3.org'
        message['To'] = 'server@lv3.org'
        message['Subject'] = 'LV3 private SMTP probe'
        message.set_content('Inbound SMTP probe delivered through 10.10.10.20')

        with smtplib.SMTP('10.10.10.20', 25, timeout=30) as client:
            client.send_message(message)

        print('sent')
        PY
      args:
        executable: /bin/bash
      register: mail_platform_private_inbound_probe
      changed_when: false
      when: mail_platform_public_inbound_probe.rc != 0

- name: Verify inbound delivery and send a live outbound Gmail probe
  hosts: docker-runtime-lv3
  become: true
  gather_facts: true

  tasks:
    - name: Wait briefly for inbound SMTP delivery
      ansible.builtin.pause:
        seconds: 8

    - name: Read inbox count after SMTP probe
      ansible.builtin.shell: |
        python3 - <<'PY'
        import imaplib
        from pathlib import Path

        password = Path('/etc/lv3/mail-platform/server-mailbox-password').read_text(encoding='utf-8').strip()
        mailbox = imaplib.IMAP4_SSL('127.0.0.1', 993)
        mailbox.login('server', password)
        status, data = mailbox.select('INBOX', readonly=True)
        mailbox.logout()
        if status != 'OK':
            raise SystemExit('imap select failed')
        print(int(data[0]))
        PY
      args:
        executable: /bin/bash
      register: mail_platform_inbox_after
      changed_when: false

    - name: Assert inbox count increased
      ansible.builtin.assert:
        that:
          - (mail_platform_inbox_after.stdout | int) > (mail_platform_inbox_before.stdout | int)
        fail_msg: "The server mailbox did not receive the public SMTP probe."

    - name: Send outbound Gmail probe through the mail gateway
      ansible.builtin.shell: |
        python3 - <<'PY'
        import json
        import urllib.request
        from pathlib import Path

        gateway_api_key = Path('/etc/lv3/mail-platform/gateway-api-key').read_text(encoding='utf-8').strip()
        payload = json.dumps(
            {
                'to': ['baditaflorin@gmail.com'],
                'subject': 'LV3 mail platform live test',
                'text': 'This is the live delivery test from the new LV3 mail platform.',
                'html': '<p>This is the <strong>live delivery test</strong> from the new LV3 mail platform.</p>',
            }
        ).encode('utf-8')

        request = urllib.request.Request(
            'http://127.0.0.1:8081/send',
            data=payload,
            method='POST',
            headers={
                'Content-Type': 'application/json',
                'X-API-Key': gateway_api_key,
            },
        )

        with urllib.request.urlopen(request, timeout=30) as response:
            print(response.status)
            print(response.read().decode('utf-8'))
        PY
      args:
        executable: /bin/bash
      register: mail_platform_outbound_probe
      changed_when: false

    - name: Show live mail verification summary
      ansible.builtin.debug:
        msg:
          - "inbox_before={{ mail_platform_inbox_before.stdout | int }}"
          - "inbox_after={{ mail_platform_inbox_after.stdout | int }}"
          - "outbound_status={{ mail_platform_outbound_probe.stdout_lines[0] | default('missing') }}"
          - "public_inbound_rc={{ hostvars['monitoring-lv3'].mail_platform_public_inbound_probe.rc | default('missing') }}"
          - "private_inbound_rc={{ hostvars['monitoring-lv3'].mail_platform_private_inbound_probe.rc | default('not-run') }}"
