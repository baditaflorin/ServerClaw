---
# Playbook: excalidraw.yml
# Purpose: Converge the Excalidraw runtime on docker-runtime-lv3 and publish draw.lv3.org through the shared authenticated edge.
# Use case: Run when changing ADR 0202 runtime automation, shared-edge publication, or live Excalidraw image pins.
#
# Inputs (required):
#   - HETZNER_DNS_API_TOKEN (env, required for edge publication): Allows certbot DNS-01 updates when SANs change.
#
# Inputs (optional):
#   - proxmox_guest_ssh_connection_mode (str, optional, default=proxmox_host_jump): SSH transport mode for guest access.
#
# Outputs:
#   - Excalidraw frontend and collaboration room containers running on docker-runtime-lv3
#   - Shared-edge publication for https://draw.lv3.org with the repo-managed oauth2-proxy gate
#
# Idempotency: Partially idempotent
#
# Dependencies:
#   - ADR 0202: Defines the self-hosted Excalidraw and generated diagram publication model.
#   - Requires: docker-runtime-lv3, nginx-lv3, and the shared edge auth stack to be reachable.
#
# Related ADRs: 0133, 0136, 0165
# Related Runbooks: docs/runbooks/configure-excalidraw.md
#
# Invocation: ansible-playbook playbooks/excalidraw.yml -e @playbooks/vars/excalidraw.yml -e env=production
#
# Author: LV3 Platform
# Last Updated: 2026-04-06

# --- Standard plays (driven by vars/excalidraw.yml) ---

- import_playbook: _includes/dns_publication.yml
  when: service_needs_dns | default(false)

# --- Excalidraw-specific plays (fixed hosts, custom preflight) ---

- name: Converge Excalidraw on the Docker runtime VM
  hosts: docker-runtime-lv3
  become: true
  gather_facts: true
  vars:
    preflight_wait_for_connection: false
  tags:
    - tier-2
    - documentation
    - service-excalidraw

  pre_tasks:
    - name: Ensure target guest is Debian
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
        fail_msg: "This playbook only supports Debian guests."

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.excalidraw_runtime

- name: Publish Excalidraw on the shared NGINX edge
  hosts: nginx-lv3
  become: true
  gather_facts: true
  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/platform.yml"
  vars:
    preflight_wait_for_connection: false
    public_edge_sync_generated_static_dirs: false
  tags:
    - tier-1
    - documentation
    - service-excalidraw
    - publication-excalidraw

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.nginx_edge_publication
