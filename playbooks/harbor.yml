---
# Playbook: harbor.yml
# Purpose: Deploy Harbor on runtime-control-lv3 and publish registry.{{ platform_domain }} through the shared NGINX edge.
# Use case: Run when provisioning or updating the managed Harbor registry runtime and its public edge publication.
#
# Inputs (required):
#   - HETZNER_DNS_API_TOKEN (environment, required): Lets the shared edge publication path manage the live DNS record when needed.
#
# Inputs (optional):
#   - proxmox_guest_ssh_connection_mode (string, optional, default=proxmox_host_jump): Guest SSH path for the Docker runtime and edge VMs.
#
# Outputs:
#   - Harbor runtime converged on runtime-control-lv3 under /opt/harbor.
#   - registry.{{ platform_domain }} published through nginx-lv3.
#
# Idempotency: Fully idempotent
#              The Harbor installer assets and compose stack are rendered from repo inputs and can be re-applied safely.
#
# Dependencies:
#   - ADR 0201: Harbor with CVE scanning is the service being deployed.
#   - Requires: runtime-control-lv3, nginx-lv3, and Keycloak on runtime-control-lv3 to be reachable.
#   - Role: harbor_runtime — installs Harbor, bootstraps local runtime secrets, and verifies core services.
#   - Role: nginx_edge_publication — renders the public reverse-proxy publication for registry.{{ platform_domain }}.
#
# Related ADRs: 0056, 0083, 0089, 0201
# Related Runbooks: docs/runbooks/configure-harbor.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-28
# =============================================================================

- name: Converge Harbor on the runtime-control VM
  hosts: "{{ 'docker-runtime-staging-lv3' if (env | default('production')) == 'staging' else 'runtime-control-lv3' }}"
  become: true
  gather_facts: true
  vars:
    preflight_wait_for_connection: false
    # ADR 0373: Conventional service variables (derive_service_defaults compatibility)
    harbor_site_dir: /opt/harbor
    harbor_data_dir: /opt/harbor/data
    harbor_secret_dir: /etc/lv3/harbor
    harbor_local_artifact_dir: "{{ repo_shared_local_root }}/harbor"
    harbor_service_topology: "{{ hostvars[platform_topology_host].lv3_service_topology.harbor }}"
  tags:
    - tier-2
    - infrastructure
    - service-harbor

  pre_tasks:
    - name: Ensure target guest is Debian
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
        fail_msg: "This playbook only supports Debian guests."

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.harbor_runtime

- name: Publish Harbor on the shared NGINX edge
  hosts: nginx-lv3
  become: true
  gather_facts: true
  vars:
    preflight_wait_for_connection: false
    public_edge_sync_generated_static_dirs: false
  tags:
    - tier-1
    - infrastructure
    - service-harbor
    - publication-harbor

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.nginx_edge_publication
