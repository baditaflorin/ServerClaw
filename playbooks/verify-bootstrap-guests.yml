---
# Playbook: verify-bootstrap-guests.yml
# Purpose: Confirm that the declared guest VMs are reachable over SSH after bootstrap or provisioning.
# Use case: Run after bootstrap or guest creation to verify that every expected guest responds before deeper convergence.
#
# Inputs (required):
#   - inventory/hosts.yml (inventory, required): Declares the guest hosts that should be reachable.
#
# Inputs (optional):
#   - playbook_execution_env (string, optional, default=production): Selects the production or staging host-pattern mapping.
#   - playbook_execution_host_patterns (mapping, optional): Override host-pattern lookups for production or staging validation runs.
#
# Outputs:
#   - Reports per-host SSH reachability and basic operating-system facts for reachable guests.
#
# Idempotency: Fully idempotent
#              The playbook only reads connectivity and fact state.
#
# Dependencies:
#   - ADR 0165: Playbook metadata standard required by the repository gate.
#   - ADR 0386: Bootstrap verification flow defines this guest-validation step.
#
# Related ADRs: 0165, 0386
# Related Runbooks: docs/runbooks/playbook-execution-model.md
#
# Author: LV3 Platform
# Last Updated: 2026-04-14

# Verify guest VM provisioning succeeded — ADR 0386
#
# Inputs (required):
#   - playbook_execution_env (string, required): Selects the environment-specific lv3_guests host pattern to verify.
#
# Inputs (optional):
#   - env (string, optional, default=production): Fallback environment selector when playbook_execution_env is not set.
#   - playbook_execution_host_patterns (mapping, optional): Overrides the default lv3_guests host-pattern map for custom execution scopes.
#
# Outputs:
#   - Reports SSH reachability and basic operating-system facts for each targeted guest.
#   - Emits a local summary message confirming the guest verification sweep completed.
#
# Idempotency: Fully idempotent
#              This playbook performs connectivity checks and fact gathering only; it does not mutate remote state.
#
# Dependencies:
#   - ADR 0165: Requires the standard playbook metadata header for agent-governed validation.
#   - ADR 0386: Verifies the guest bootstrap and replacement path introduced for managed guest lifecycle operations.
#   - Requires: Inventory connectivity, bootstrap SSH access, and the target lv3_guests host pattern to be defined.
#
# Related ADRs: 0165, 0386
# Related Runbooks: docs/runbooks/bootstrap-proxmox-guests.md
#
# Author: LV3 Platform
# Last Updated: 2026-04-14

- name: Verify guest VMs are reachable
  hosts: >-
    {{
      (
        playbook_execution_host_patterns
        | default({'lv3_guests': {'production': 'lv3_guests', 'staging': 'lv3_guests'}}, true)
      )['lv3_guests'][playbook_execution_env | default(env | default('production'))]
    }}
  gather_facts: false
  tasks:
    - name: Wait for SSH connectivity
      ansible.builtin.wait_for_connection:
        timeout: 30
      register: ssh_result
      ignore_errors: true

    - name: Report SSH status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} ({{ ansible_host }}): {{ 'REACHABLE' if not ssh_result.failed else 'UNREACHABLE' }}"

    - name: Gather basic facts from reachable hosts
      ansible.builtin.setup:
        gather_subset:
          - min
      when: not ssh_result.failed

    - name: Report OS info
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ ansible_distribution | default('unknown') }} {{ ansible_distribution_version | default('unknown') }}"
      when: not ssh_result.failed

- name: Summarize guest verification
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Count reachable vs total guests
      ansible.builtin.debug:
        msg: >-
          Guest verification complete.
          Check the output above for individual host status.
          All hosts should show REACHABLE for a healthy bootstrap.
