---
# Playbook: label-studio.yml
# Purpose: Converge the Label Studio PostgreSQL backend, runtime, shared-edge OIDC publication, and operator gateway route.
# Use case: Run during production or staging live apply of the repo-managed Label Studio annotation platform.
#
# Inputs (required):
#   - env (string, required): Target environment selector used to choose the postgres, docker-runtime, and nginx guests.
#
# Inputs (optional):
#   - proxmox_guest_ssh_connection_mode (string, optional, default=proxmox_host_jump): SSH path to managed guests.
#
# Outputs:
#   - Label Studio DNS, PostgreSQL role/database, runtime secrets, repo-managed project catalog,
#     shared Typesense structured-search availability, API gateway route, and shared-edge publication
#     match repo truth.
#
# Idempotency: Partially idempotent; convergence is repeatable, while the repo-managed project sync reconciles live Label Studio projects in place when required.
#
# Dependencies:
#   - ADR 0289: Label Studio is the human-in-the-loop data annotation platform.
#   - Requires: postgres_vm, docker_runtime, label_studio_postgres, label_studio_runtime, typesense_runtime, api_gateway_runtime, public_edge_oidc_auth, and nginx_edge_publication.
#
# Related ADRs: 0021, 0042, 0063, 0077, 0086, 0289
# Related Runbooks: docs/runbooks/configure-label-studio.md
#
# Invocation: ansible-playbook playbooks/label-studio.yml -e @playbooks/vars/label-studio.yml -e env=production
#
# Author: LV3 Platform
# Last Updated: 2026-04-06

# --- Standard plays (driven by vars/label-studio.yml) ---

- import_playbook: _includes/dns_publication.yml
  when: service_needs_dns | default(false)

- import_playbook: _includes/postgres_preparation.yml
  when: service_needs_postgres | default(false)

- import_playbook: _includes/docker_runtime_converge.yml

# --- Label Studio-specific plays ---

# Custom nginx play: adds public_edge_oidc_auth and linux_guest_firewall before nginx_edge_publication
- name: Publish Label Studio through the NGINX edge
  hosts: "{{ 'nginx-staging' if (env | default('production')) == 'staging' else 'nginx' }}"
  become: true
  gather_facts: true
  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/platform.yml"

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_emit_audit: false
        required_hosts:
          - "{{ playbook_execution_required_hosts.nginx_edge[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.public_edge_oidc_auth
    - role: lv3.platform.nginx_edge_publication

- name: Verify the public Label Studio shared-edge publication
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Verify the Label Studio public UI and API redirect through the shared edge auth boundary
      ansible.builtin.include_role:
        name: lv3.platform.label_studio_runtime
        tasks_from: verify_public.yml
