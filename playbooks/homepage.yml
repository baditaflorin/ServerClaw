---
- name: Converge Homepage on the runtime-general VM
  hosts: "{{ playbook_execution_host_patterns.runtime_general[playbook_execution_env] }}"
  become: true
  gather_facts: true
  vars:
    preflight_wait_for_connection: false
  tags:
    - tier-2
    - access
    - service-homepage

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_emit_audit: false
        required_hosts:
          - "{{ playbook_execution_required_hosts.runtime_general[playbook_execution_env] }}"

    - name: Ensure target guest is Debian
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
        fail_msg: "This playbook only supports Debian guests."

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.homepage_runtime

- name: Publish Homepage on the shared NGINX edge
  hosts: "{{ playbook_execution_host_patterns.nginx_edge[playbook_execution_env] }}"
  become: true
  gather_facts: true
  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/platform.yml"
  vars:
    preflight_wait_for_connection: false
    public_edge_sync_generated_static_dirs: false
  tags:
    - tier-1
    - access
    - service-homepage
    - publication-homepage

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.nginx_edge_publication
