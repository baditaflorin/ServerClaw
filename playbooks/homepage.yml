---
- name: Converge Homepage on the runtime-general VM
  hosts: "{{ 'docker-runtime-staging-lv3' if (env | default('production')) == 'staging' else 'runtime-general-lv3' }}"
  become: true
  gather_facts: true
  vars:
    preflight_wait_for_connection: false
    # ADR 0373: Conventional service variables (derive_service_defaults compatibility)
    homepage_site_dir: /opt/homepage
    homepage_data_dir: /opt/homepage/data
    homepage_secret_dir: /etc/lv3/homepage
    homepage_local_artifact_dir: "{{ repo_shared_local_root }}/homepage"
    homepage_image: "ghcr.io/gethomepage/homepage:v1.8.0@sha256:a543b3b044b2fa349dfe319c9e9b256c4eb5b4f6923361045aa468be4d2ba990"
    homepage_container_name: homepage
    homepage_compose_file: /opt/homepage/docker-compose.yml
  tags:
    - tier-2
    - access
    - service-homepage

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_emit_audit: false
        required_hosts:
          - "{{ playbook_execution_required_hosts.runtime_general[playbook_execution_env] }}"

    - name: Ensure target guest is Debian
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
        fail_msg: "This playbook only supports Debian guests."

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.homepage_runtime

- name: Publish Homepage on the shared NGINX edge
  hosts: "{{ 'nginx-staging-lv3' if (env | default('production')) == 'staging' else 'nginx-lv3' }}"
  become: true
  gather_facts: true
  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/platform.yml"
  vars:
    preflight_wait_for_connection: false
    public_edge_sync_generated_static_dirs: false
  tags:
    - tier-1
    - access
    - service-homepage
    - publication-homepage

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.nginx_edge_publication
