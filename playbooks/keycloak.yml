---
# Playbook: keycloak.yml
# Purpose: Converge Keycloak DNS publication, PostgreSQL access, and runtime state for the repo-managed identity surface.
# Use case: Run during production or staging Keycloak deployment, upgrade, or recovery when the identity provider must match repo truth.
#
# Inputs (required):
#   - env (string, required): Target environment selector used to choose the postgres and runtime-control guests.
#
# Inputs (optional):
#   - proxmox_guest_ssh_connection_mode (string, optional, default=proxmox_host_jump): SSH path to managed guests.
#
# Outputs:
#   - Keycloak DNS records, PostgreSQL access, runtime configuration, and edge publication are reconciled to the declared platform state.
#
# Idempotency: Fully idempotent
#
# Dependencies:
#   - ADR 0097: Keycloak provides the shared identity plane for authenticated platform services.
#   - Requires: PostgreSQL, runtime-control, and the shared edge stack to already exist.
#   - Role: lv3.platform.keycloak_postgres - provisions the Keycloak database and role.
#   - Role: lv3.platform.keycloak_runtime - converges the application runtime and publication flow.
#
# Related ADRs: 0097, 0149, 0197
# Related Runbooks: docs/runbooks/configure-keycloak.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-28

- name: Ensure Hetzner DNS publication for Keycloak
  hosts: proxmox_hosts
  become: false
  gather_facts: false

  tasks:
    - name: Ensure Hetzner DNS records are present
      ansible.builtin.include_role:
        name: lv3.platform.hetzner_dns_records
        apply:
          delegate_to: localhost
          become: false
      run_once: true

- name: Prepare PostgreSQL for Keycloak
  hosts: "{{ 'postgres-staging-lv3' if (env | default('production')) == 'staging' else 'postgres-lv3' }}"
  become: true
  gather_facts: true

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_emit_audit: false
        required_hosts:
          - "{{ playbook_execution_required_hosts.postgres[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.postgres_vm
    - role: lv3.platform.keycloak_postgres

- name: Converge Keycloak on the runtime-control VM
  hosts: "{{ 'docker-runtime-staging-lv3' if (env | default('production')) == 'staging' else 'runtime-control-lv3' }}"
  become: true
  gather_facts: true

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.keycloak
        playbook_execution_audit_target: keycloak
        required_hosts:
          - "{{ playbook_execution_required_hosts.runtime_control[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.keycloak_runtime

- name: Publish Keycloak through the NGINX edge
  hosts: "{{ 'nginx-staging-lv3' if (env | default('production')) == 'staging' else 'nginx-lv3' }}"
  become: true
  gather_facts: true
  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/platform.yml"

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_emit_audit: false
        required_hosts:
          - "{{ playbook_execution_required_hosts.nginx_edge[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.nginx_edge_publication

- name: Converge Grafana SSO against Keycloak
  hosts: "{{ 'monitoring-staging-lv3' if (env | default('production')) == 'staging' else 'monitoring-lv3' }}"
  become: true
  gather_facts: true

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_emit_audit: false
        required_hosts:
          - "{{ playbook_execution_required_hosts.monitoring[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.grafana_sso
      vars:
        grafana_sso_client_secret: "{{ hostvars[playbook_execution_host_patterns.runtime_control[playbook_execution_env]].keycloak_grafana_client_secret }}"
