---
# Playbook: redpanda.yml
# Purpose: Converge the private Redpanda Kafka-compatible streaming runtime on the selected Docker runtime guest.
# Use case: Run during ADR 0290 rollout, runtime recovery, or later drift reconciliation from version-controlled automation.
#
# Inputs (required):
#   - env (str, required): Deployment environment selector that resolves the target Docker runtime host.
#
# Inputs (optional):
#   - proxmox_guest_ssh_connection_mode (str, optional, default=proxmox_host_jump): Guest SSH routing mode for the live apply.
#
# Outputs:
#   - Redpanda is running on the selected Docker runtime VM with the Kafka API, Admin API, HTTP Proxy, Schema Registry, and the repo-managed smoke contract verified.
#
# Idempotency: Fully idempotent
#              The playbook re-renders the runtime stack deterministically and reapplies the topic/auth contract safely.
#
# Dependencies:
#   - ADR 0290: Defines Redpanda as the Kafka-compatible durable streaming platform.
#   - Requires: docker-runtime host access through the Proxmox jump path plus local OpenBao for runtime secret injection.
#   - Role: lv3.platform.redpanda_runtime — renders, seeds, and verifies the Redpanda runtime stack.
#
# Related ADRs: 0077, 0079, 0165, 0290
# Related Runbooks: docs/runbooks/configure-redpanda.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-30

- name: Converge Redpanda on the Docker runtime VM
  hosts: "{{ 'docker-runtime-staging' if (env | default('production')) == 'staging' else 'runtime-comms' }}"
  become: true
  gather_facts: true
  tags:
    - tier-2
    - data
    - service-redpanda

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.redpanda
        playbook_execution_audit_target: redpanda
        required_hosts:
          - "{{ playbook_execution_required_hosts.docker_runtime[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.redpanda_runtime

  post_tasks:
    - name: Run shared post-verify checks
      ansible.builtin.import_tasks: tasks/post-verify.yml
      vars:
        service_health_probe_id: redpanda
        playbook_execution_post_verify_audit_action: playbook.verify.redpanda
    - name: Run shared completion notifications
      ansible.builtin.import_tasks: tasks/notify.yml
      vars:
        playbook_execution_notification_service: redpanda
