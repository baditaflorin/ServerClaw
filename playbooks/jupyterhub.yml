---
# Playbook: jupyterhub.yml
# Purpose: Converge the JupyterHub runtime, OIDC client, and edge publication.
# Use case: Run for branch-local or exact-main live apply of the shared notebook environment.
# Outputs: Hetzner DNS publication, JupyterHub runtime, Keycloak OIDC client, NGINX edge publication, and end-to-end publication verification.
# Idempotency: Partially idempotent; runtime convergence is repeatable, while the smoke single-user verification intentionally exercises a managed spawn and stop cycle.
# Dependencies: ADR 0291, keycloak_runtime, jupyterhub_runtime, nginx_edge_publication.
#
# Invocation: ansible-playbook playbooks/jupyterhub.yml -e @playbooks/vars/jupyterhub.yml -e env=production

- import_playbook: _includes/dns_publication.yml
  when: service_needs_dns | default(false)

- import_playbook: _includes/docker_runtime_converge.yml

- import_playbook: _includes/nginx_edge_publication.yml
  when: service_needs_nginx_edge | default(false)

- name: Verify JupyterHub publication
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Verify the published JupyterHub notebook surface
      ansible.builtin.include_role:
        name: lv3.platform.jupyterhub_runtime
        tasks_from: publish.yml
