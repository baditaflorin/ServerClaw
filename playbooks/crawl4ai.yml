---
# Playbook: crawl4ai.yml
# Purpose: Converge the private Crawl4AI runtime on docker-runtime for LLM-oriented markdown web crawling.
# Use case: Run when changing ADR 0288 runtime automation, image pins, firewall exposure, or crawl-rate configuration.
#
# Inputs (required):
#   - proxmox_guest_ssh_connection_mode (str, required via make target defaults): SSH transport mode for guest access.
#
# Inputs (optional):
#   - preflight_wait_for_connection (bool, optional, default=false): Skip redundant connection checks when the shared make preflight already passed.
#
# Outputs:
#   - Crawl4AI container running on docker-runtime with repo-managed rate limiting, monitoring, and markdown crawl verification
#
# Idempotency: Partially idempotent
#              Reruns reconcile the same compose stack, guest firewall, and runtime config without mutating shared release truth on this branch.
#
# Dependencies:
#   - ADR 0288: Defines Crawl4AI as the private LLM-optimized web content crawler.
#   - Role: lv3.platform.crawl4ai_runtime — converges the crawler runtime and verifies health plus markdown crawl output.
#
# Related ADRs: 0165, 0198, 0263, 0276
# Related Runbooks: docs/runbooks/configure-crawl4ai.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-30
- name: Converge Crawl4AI on the Docker runtime VM
  hosts: docker-runtime
  become: true
  gather_facts: true
  vars:
    preflight_wait_for_connection: false
  tags:
    - tier-2
    - automation
    - service-crawl4ai

  pre_tasks:
    - name: Ensure target guest is Debian
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
        fail_msg: "This playbook only supports Debian guests."

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.crawl4ai_runtime
