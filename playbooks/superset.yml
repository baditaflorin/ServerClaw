---
# Playbook: superset.yml
# Purpose: Converge the Superset PostgreSQL metadata plane, runtime, Keycloak client, and shared-edge publication.
# Use case: Run during production or staging live apply of the repo-managed SQL-first business intelligence layer.
#
# Inputs (required):
#   - env (string, required): Target environment selector used to choose the postgres, docker-runtime, and nginx guests.
#
# Inputs (optional):
#   - proxmox_guest_ssh_connection_mode (string, optional, default=proxmox_host_jump): SSH path to managed guests.
#
# Outputs:
#   - Superset DNS, PostgreSQL metadata schema, datasource roles, runtime secrets, Keycloak OIDC client, and public verification match repo truth.
#
# Idempotency: Partially idempotent; convergence is repeatable, while the runtime metadata bootstrap reconciles managed datasources and the landing dashboard in place.
#
# Dependencies:
#   - ADR 0292: Superset is the SQL-first business intelligence layer for operational data.
#   - Requires: postgres_vm, docker_runtime, keycloak_runtime, superset_postgres, superset_runtime, and nginx_edge_publication.
#
# Related ADRs: 0021, 0042, 0063, 0077, 0292
# Related Runbooks: docs/runbooks/configure-superset.md
#
# Invocation: ansible-playbook playbooks/superset.yml -e @playbooks/vars/superset.yml -e env=production
#
# Author: LV3 Platform
# Last Updated: 2026-04-06

# --- Standard plays (driven by vars/superset.yml) ---

- import_playbook: _includes/dns_publication.yml
  when: service_needs_dns | default(false)

- import_playbook: _includes/postgres_preparation.yml
  when: service_needs_postgres | default(false)

- import_playbook: _includes/docker_runtime_converge.yml

- import_playbook: _includes/nginx_edge_publication.yml
  when: service_needs_nginx_edge | default(false)

# --- Superset-specific plays ---

- name: Verify the public Superset publication
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Verify the Superset public BI surface and SSO redirect path
      ansible.builtin.include_role:
        name: lv3.platform.superset_runtime
        tasks_from: publish.yml
