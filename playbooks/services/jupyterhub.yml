---
# Purpose: Provide the service-scoped live-apply entrypoint for JupyterHub.
# Use case: Run through `make live-apply-service service=jupyterhub env=<environment>`.
#
# Inputs (required):
#   - env (str, required): Deployment environment selector passed through to the imported playbook.
#
# Inputs (optional):
#   - proxmox_guest_ssh_connection_mode (str, optional, default=proxmox_host_jump): Guest SSH routing mode for the live apply.
#
# Outputs:
#   - Imports the root JupyterHub playbook used by the governed service live-apply wrapper.
#
# Idempotency: Fully idempotent
#              This wrapper only imports the root JupyterHub playbook and does not mutate state on its own.
#
# Dependencies:
#   - ADR 0291: Defines JupyterHub as the shared interactive notebook environment.
#   - Requires: playbooks/jupyterhub.yml.
#   - Role: lv3.platform.jupyterhub_runtime — owned by the imported playbook.
#
# Related ADRs: 0021, 0063, 0077, 0165, 0291
# Related Runbooks: docs/runbooks/configure-jupyterhub.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-30

- import_playbook: ../jupyterhub.yml
