#
# Inputs (required):
#   - env (str, required): Target environment passed through the shared execution wrapper.
#
# Inputs (optional):
#   - EXTRA_ARGS (str, optional, default=""): Additional ansible arguments passed by the caller.
#
# Outputs:
#   - Imports the root Vikunja playbook used by the service-scoped wrappers.
#
# Idempotency: Fully idempotent
#
# Dependencies:
#   - ADR 0079: shared playbook execution model
#   - ADR 0286: Vikunja as the task and project management REST API
#   - Requires: playbooks/vikunja.yml
#
# Related ADRs: 0079, 0286
# Related Runbooks: docs/runbooks/configure-vikunja.md
