# Playbook: services/directus.yml
# Purpose: Provide the canonical service-scoped live-apply entrypoint for Directus.
# Use case: Run through `make live-apply-service service=directus env=production` and related guarded wrappers.
#
# Inputs (required):
#   - env (string, required): Target environment selector passed through the shared execution wrapper.
#
# Inputs (optional):
#   - EXTRA_ARGS (string, optional, default=""): Additional ansible arguments passed by the caller.
#
# Outputs:
#   - Imports the root Directus converge playbook used by the service-scoped wrappers.
#
# Idempotency: Matches playbooks/directus.yml.
#
# Dependencies:
#   - ADR 0079: shared playbook execution model
#   - ADR 0289: Directus data API decision
#   - Requires: playbooks/directus.yml
#
# Related ADRs: 0079, 0289
# Related Runbooks: docs/runbooks/configure-directus.md
# Author: LV3 Platform
# Last Updated: 2026-03-30
- import_playbook: ../directus.yml
