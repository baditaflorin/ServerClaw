# Playbook: services/temporal.yml
# Purpose: Provide a leaf service import for Temporal so repo automation can syntax-check and target the service cleanly.
# Use case: Used by generated or scoped automation paths that operate on one service leaf playbook at a time.
#
# Inputs (required):
#   - None.
#
# Inputs (optional):
#   - Same optional inputs as playbooks/temporal.yml.
#
# Outputs:
#   - Imports the top-level Temporal converge playbook.
#
# Idempotency: Fully idempotent
#              This file is a pure import wrapper around the top-level playbook.
#
# Dependencies:
#   - ADR 0293: Temporal as the durable workflow and task queue engine.
#   - Role: temporal_runtime — implemented in the imported playbook.
#
# Related ADRs: 0293
# Related Runbooks: docs/runbooks/configure-temporal.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-30

- import_playbook: ../temporal.yml
