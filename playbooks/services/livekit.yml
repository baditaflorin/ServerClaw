---
# Playbook: services/livekit.yml
# Purpose: Provide the stable live-apply service wrapper for LiveKit.
# Use case: Run `make live-apply-service service=livekit` so the generic service lane can invoke the LiveKit converge playbook.
#
# Inputs (required):
#   - env (str, required): Environment selector passed by the live-apply wrapper.
#
# Inputs (optional):
#   - proxmox_guest_ssh_connection_mode (str, optional, default=proxmox_host_jump): Guest SSH connection strategy.
#
# Outputs:
#   - Imports the canonical LiveKit converge playbook.
#
# Idempotency: Fully idempotent
#              The wrapper only imports the canonical playbook and adds no extra mutation.
#
# Dependencies:
#   - ADR 0293: LiveKit as the real-time audio and voice channel for agents.
#   - Requires: playbooks/livekit.yml
#   - Role: imported playbook — owns all live mutations.
#
# Related ADRs: 0293
# Related Runbooks: docs/runbooks/configure-livekit.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-30

- import_playbook: ../livekit.yml
