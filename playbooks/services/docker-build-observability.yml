---
- name: Converge docker build guest observability
  hosts: "{{ 'docker-build-staging' if (env | default('production')) == 'staging' else 'docker-build' }}"
  become: true
  gather_facts: true
  tags:
    - tier-2
    - observability
    - service-docker-build-observability

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: ../tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_emit_audit: false
        required_hosts:
          - "{{ playbook_execution_required_hosts.docker_build[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.docker_build_observability
