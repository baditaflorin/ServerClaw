# Playbook: services/runtime-apps-pool.yml
# Purpose: Provide the canonical live-apply entrypoint for the dedicated runtime-apps pool migration.
# Use case: Run through `make live-apply-service service=runtime-apps-pool env=production` for the ADR 0346 runtime-apps rollout.
#
# Inputs (required):
#   - env (str, required): Deployment environment selector passed through the shared execution wrapper.
#
# Inputs (optional):
#   - proxmox_guest_ssh_connection_mode (str, optional, default=proxmox_host_jump): Guest SSH routing mode for the live apply.
#
# Outputs:
#   - Imports the root runtime-apps pool playbook used by the governed service live-apply wrapper.
#
# Idempotency: Fully idempotent
#              This wrapper only imports the root runtime-apps pool playbook and does not mutate state on its own.
#
# Dependencies:
#   - ADR 0346: Defines the runtime-apps pool substrate decision.
#   - Requires: playbooks/runtime-apps-pool.yml.
#
# Related ADRs: 0329, 0346
# Related Runbooks: docs/runbooks/configure-runtime-apps-pool.md
#
# Author: LV3 Platform
# Last Updated: 2026-04-04

- import_playbook: ../runtime-apps-pool.yml
