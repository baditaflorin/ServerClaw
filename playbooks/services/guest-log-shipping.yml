---
- name: Converge guest log shipping
  hosts: "{{ 'lv3_guests:&staging' if (env | default('production')) == 'staging' else 'lv3_guests:&production' }}"
  become: true
  gather_facts: true
  tags:
    - tier-2
    - observability
    - service-guest-log-shipping

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: ../tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.guest-log-shipping
        playbook_execution_audit_target: guest-log-shipping
        required_hosts:
          - "{{ playbook_execution_required_hosts.lv3_guests[playbook_execution_env] }}"

    - name: Derive guest log shipping role and lane
      ansible.builtin.set_fact:
        monitoring_stack_guest_role: >-
          {{
            hostvars[groups['proxmox_hosts'][0]].proxmox_guests
            | selectattr('name', 'equalto', inventory_hostname)
            | map(attribute='role')
            | first
          }}
        monitoring_stack_guest_lane: >-
          {{
            {
              'nginx': 'edge',
              'docker-runtime': 'control-plane',
              'docker-build': 'build',
              'artifact-cache': 'build',
              'monitoring': 'monitoring',
              'postgres': 'data',
              'postgres-replica': 'data',
              'backup': 'backup',
              'coolify': 'paas'
            }[
              (
                hostvars[groups['proxmox_hosts'][0]].proxmox_guests
                | selectattr('name', 'equalto', inventory_hostname)
                | map(attribute='role')
                | first
              )
            ]
          }}

  roles:
    - role: lv3.platform.loki_log_agent
      vars:
        loki_log_agent_role: "{{ monitoring_stack_guest_role }}"
        loki_log_agent_lane: "{{ monitoring_stack_guest_lane }}"
        loki_log_agent_http_listen_address: >-
          {{
            ansible_host ~ ':12345'
            if monitoring_stack_guest_role == 'postgres' and inventory_hostname == 'postgres-lv3'
            else '127.0.0.1:12345'
          }}
        loki_log_agent_nginx_logs_enabled: "{{ monitoring_stack_guest_role == 'nginx' }}"
        loki_log_agent_docker_logs_enabled: "{{ monitoring_stack_guest_role == 'docker-runtime' }}"
        loki_log_agent_postgres_audit_enabled: "{{ monitoring_stack_guest_role == 'postgres' and inventory_hostname == 'postgres-lv3' }}"
        loki_log_agent_postgres_audit_approved_roles: >-
          {{
            (
              lookup(
                'ansible.builtin.file',
                (inventory_dir | dirname) ~ '/config/pgaudit/approved-roles.yaml',
              )
              | from_yaml
            ).approved_roles
            if monitoring_stack_guest_role == 'postgres' and inventory_hostname == 'postgres-lv3'
            else []
          }}
        loki_log_agent_file_scrapes: >-
          {{
            [
              {
                'name': 'mutation_audit',
                'paths': [mutation_audit_log_file],
                'labels': {
                  'job': 'mutation-audit',
                  'service': 'platform',
                  'source': 'file',
                  'log_type': 'structured'
                }
              },
              {
                'name': 'openbao_audit',
                'paths': [openbao_host_audit_log_file],
                'labels': {
                  'job': 'mutation-audit',
                  'surface': 'openbao',
                  'service': 'openbao',
                  'source': 'file',
                  'log_type': 'native-audit'
                }
              }
            ] if monitoring_stack_guest_role == 'docker-runtime' else []
          }}

  post_tasks:
    - name: Run shared completion notifications
      ansible.builtin.import_tasks: ../tasks/notify.yml
      vars:
        playbook_execution_notification_service: guest-log-shipping

- name: Verify PostgreSQL audit scrape after guest log shipping
  hosts: "{{ 'monitoring-staging-lv3' if (env | default('production')) == 'staging' else 'monitoring-lv3' }}"
  become: true
  gather_facts: false
  tags:
    - tier-2
    - observability
    - service-guest-log-shipping

  vars:
    monitoring_stack_postgres_audit_metrics_job_name: postgres-audit-alloy
    monitoring_stack_postgres_audit_metrics_port: 12345
    monitoring_stack_postgres_audit_metrics_target: >-
      {{
        hostvars[groups['proxmox_hosts'][0]].platform_guest_catalog.by_name[
          'postgres-staging-lv3' if (env | default('production')) == 'staging' else 'postgres-lv3'
        ].ipv4
      }}:{{ monitoring_stack_postgres_audit_metrics_port }}

  tasks:
    - name: Verify Prometheus scrapes the PostgreSQL audit Alloy target after guest log shipping
      ansible.builtin.uri:
        url: >-
          http://127.0.0.1:9090/api/v1/query?query={{
            ('up{job="' ~ monitoring_stack_postgres_audit_metrics_job_name ~ '"}') | urlencode
          }}
        method: GET
        status_code: 200
        return_content: true
      register: monitoring_stack_verify_postgres_audit_scrape
      retries: 20
      delay: 3
      until: >
        monitoring_stack_verify_postgres_audit_scrape.status == 200
        and (monitoring_stack_verify_postgres_audit_scrape.json.data.result | length) > 0
        and (monitoring_stack_verify_postgres_audit_scrape.json.data.result[0].metric.instance | default('')) == monitoring_stack_postgres_audit_metrics_target
        and ((monitoring_stack_verify_postgres_audit_scrape.json.data.result[0].value[1] | float) >= 1)
      changed_when: false
      failed_when: >
        monitoring_stack_verify_postgres_audit_scrape.status != 200
        or (monitoring_stack_verify_postgres_audit_scrape.json.data.result | length) == 0
        or (monitoring_stack_verify_postgres_audit_scrape.json.data.result[0].metric.instance | default('')) != monitoring_stack_postgres_audit_metrics_target
        or ((monitoring_stack_verify_postgres_audit_scrape.json.data.result[0].value[1] | float) < 1)

    - name: Verify the PostgreSQL audit Alloy endpoint exposes the expected metric families after guest log shipping
      ansible.builtin.uri:
        url: "http://{{ monitoring_stack_postgres_audit_metrics_target }}/metrics"
        method: GET
        status_code: 200
        return_content: true
      register: monitoring_stack_verify_postgres_audit_metrics_endpoint
      retries: 20
      delay: 3
      until: >
        monitoring_stack_verify_postgres_audit_metrics_endpoint.status == 200
        and 'loki_process_custom_postgres_connection_authorized_total'
        in (monitoring_stack_verify_postgres_audit_metrics_endpoint.content | default(''))
        and 'loki_process_custom_postgres_unknown_connection_events_total'
        in (monitoring_stack_verify_postgres_audit_metrics_endpoint.content | default(''))
      changed_when: false
      failed_when: >
        monitoring_stack_verify_postgres_audit_metrics_endpoint.status != 200
        or 'loki_process_custom_postgres_connection_authorized_total'
        not in (monitoring_stack_verify_postgres_audit_metrics_endpoint.content | default(''))
        or 'loki_process_custom_postgres_unknown_connection_events_total'
        not in (monitoring_stack_verify_postgres_audit_metrics_endpoint.content | default(''))
