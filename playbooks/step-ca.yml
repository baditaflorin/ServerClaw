---
- name: Converge private step-ca access on the Proxmox host
  hosts: proxmox_hosts
  become: true
  gather_facts: true
  tags:
    - tier-1
    - security
    - service-step-ca

  roles:
    - role: proxmox_tailscale_proxy
    - role: proxmox_security

- name: Converge the private step-ca runtime on docker-runtime-lv3
  hosts: "{{ 'docker-runtime-staging-lv3' if (env | default('production')) == 'staging' else 'docker-runtime-lv3' }}"
  become: true
  gather_facts: true
  tags:
    - tier-2
    - security
    - service-step-ca

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.step-ca
        playbook_execution_audit_target: step_ca
        required_hosts:
          - "{{ playbook_execution_required_hosts.docker_runtime[playbook_execution_env] }}"

  roles:
    - role: linux_guest_firewall
    - role: step_ca_runtime

  post_tasks:
    - name: Run shared post-verify checks
      ansible.builtin.import_tasks: tasks/post-verify.yml
      vars:
        service_health_probe_id: step_ca
        playbook_execution_post_verify_audit_action: playbook.verify.step-ca
    - name: Run shared completion notifications
      ansible.builtin.import_tasks: tasks/notify.yml
      vars:
        playbook_execution_notification_service: step_ca

- name: Converge SSH CA trust on the Proxmox host
  hosts: proxmox_hosts
  become: true
  gather_facts: true
  tags:
    - tier-1
    - security
    - service-step-ca

  roles:
    - role: linux_guest_firewall
    - role: step_ca_ssh_trust
      vars:
        step_ca_ssh_host_principals_extra:
          - "{{ management_ipv4 }}"
          - "{{ management_tailscale_ipv4 }}"

- name: Converge SSH CA trust on managed guests
  hosts: "{{ 'lv3_guests:&staging' if (env | default('production')) == 'staging' else 'lv3_guests:&production' }}"
  become: true
  gather_facts: true
  tags:
    - tier-1
    - security
    - service-step-ca

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_emit_audit: false
        required_hosts: "{{ ansible_play_hosts_all }}"

  roles:
    - role: step_ca_ssh_trust
