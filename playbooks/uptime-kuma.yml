---
- name: Ensure Hetzner DNS publication for Uptime Kuma
  hosts: proxmox_hosts
  become: false
  gather_facts: false
  tags:
    - tier-2
    - observability
    - service-uptime-kuma

  tasks:
    - name: Ensure Hetzner DNS records are present
      ansible.builtin.include_role:
        name: lv3.platform.hetzner_dns_records
        apply:
          delegate_to: localhost
          become: false
      run_once: true

- name: Converge Uptime Kuma on the runtime-general VM
  hosts: "{{ playbook_execution_host_patterns.runtime_general[playbook_execution_env] }}"
  become: true
  gather_facts: true
  tags:
    - tier-2
    - observability
    - service-uptime-kuma

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_emit_audit: false
        required_hosts:
          - "{{ playbook_execution_required_hosts.runtime_general[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.uptime_kuma_runtime

- name: Publish Uptime Kuma through the NGINX edge
  hosts: "{{ playbook_execution_host_patterns.nginx_edge[playbook_execution_env] }}"
  become: true
  gather_facts: true
  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/platform.yml"
  tags:
    - tier-2
    - observability
    - service-uptime-kuma

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.nginx_edge_publication
