---
# Invocation: ansible-playbook playbooks/headscale.yml -e @playbooks/vars/headscale.yml -e env=production

# --- Standard plays (driven by vars/headscale.yml) ---

- import_playbook: _includes/dns_publication.yml
  when: service_needs_dns | default(false)

# --- Headscale-specific plays ---

- name: Converge Headscale on the Proxmox host
  hosts: proxmox_hosts
  become: true
  gather_facts: true
  tags:
    - tier-1
    - access
    - networking
    - service-headscale

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.headscale
        playbook_execution_audit_target: headscale
        required_hosts:
          - "{{ playbook_execution_required_hosts.proxmox_hosts[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.proxmox_headscale

  post_tasks:
    - name: Run shared post-verify checks
      ansible.builtin.import_tasks: tasks/post-verify.yml
      vars:
        service_health_probe_id: headscale
        playbook_execution_post_verify_audit_action: playbook.verify.headscale
    - name: Run shared completion notifications
      ansible.builtin.import_tasks: tasks/notify.yml
      vars:
        playbook_execution_notification_service: headscale

- name: Publish Headscale on the NGINX edge
  hosts: "{{ 'nginx-staging-lv3' if (env | default('production')) == 'staging' else 'nginx-lv3' }}"
  become: true
  gather_facts: true
  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/platform.yml"
  tags:
    - tier-2
    - access
    - networking
    - service-headscale

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_emit_audit: false
        required_hosts:
          - "{{ playbook_execution_required_hosts.nginx_edge[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.public_edge_oidc_auth
    - role: lv3.platform.nginx_edge_publication

  post_tasks:
    - name: Verify the Headscale public health endpoint through the local edge
      ansible.builtin.uri:
        url: https://127.0.0.1/health
        method: GET
        headers:
          Host: headscale.{{ platform_domain }}
        status_code: 200
        validate_certs: false
      changed_when: false
