---
# Playbook: nextcloud.yml
# Purpose: Converge Nextcloud DNS publication, PostgreSQL access, runtime state, and edge publication for the canonical personal data plane.
# Use case: Run during Nextcloud deployment, upgrade, or recovery when the repo-managed data plane must match current ADR 0260 truth.
#
# Inputs (required):
#   - proxmox_guest_ssh_connection_mode (string, required): SSH path used by the runtime and postgres guest plays.
#
# Inputs (optional):
#   - env (string, optional, default=production): Selects the target environment lane.
#
# Outputs:
#   - The Nextcloud DNS record, PostgreSQL backend, runtime secrets, compose stack, and public edge publication are reconciled to repo state.
#
# Idempotency: Fully idempotent
#
# Dependencies:
#   - ADR 0260: Nextcloud as the canonical personal data plane for ServerClaw.
#   - Requires: postgres-lv3, docker-runtime-lv3, nginx-lv3, and OpenBao to already exist.
#   - Role: lv3.platform.nextcloud_postgres - provisions the Nextcloud database and role.
#   - Role: lv3.platform.nextcloud_runtime - converges the Nextcloud runtime and local verification flow.
#   - Role: lv3.platform.nginx_edge_publication - publishes the service through the shared edge.
#
# Related ADRs: 0206, 0259, 0260
# Related Runbooks: docs/runbooks/configure-nextcloud.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-29

- name: Ensure Hetzner DNS publication for Nextcloud
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    subdomain_catalog_path: "{{ playbook_dir }}/../config/subdomain-catalog.json"
    inventory_defaults_path: "{{ playbook_dir }}/../inventory/group_vars/all.yml"
    subdomain_fqdn: cloud.lv3.org

  tasks:
    - name: Load controller defaults
      ansible.builtin.include_vars:
        file: "{{ inventory_defaults_path }}"

    - name: Load the subdomain catalog
      ansible.builtin.include_vars:
        file: "{{ subdomain_catalog_path }}"
        name: subdomain_catalog

    - name: Select the Nextcloud subdomain entry
      ansible.builtin.set_fact:
        selected_subdomain: >-
          {{
            (
              subdomain_catalog.subdomains
              | selectattr('fqdn', 'equalto', subdomain_fqdn)
              | list
              | first
            ) | default({})
          }}

    - name: Assert the Nextcloud subdomain is catalogued
      ansible.builtin.assert:
        that:
          - selected_subdomain != {}
          - selected_subdomain.status in ['active', 'planned']
          - selected_subdomain.fqdn.endswith(hetzner_dns_zone_name)
        fail_msg: "cloud.lv3.org must exist in config/subdomain-catalog.json before live apply."

    - name: Derive the managed Hetzner record name
      ansible.builtin.set_fact:
        selected_subdomain_record_name: >-
          {{
            '@'
            if selected_subdomain.fqdn == hetzner_dns_zone_name
            else (
              selected_subdomain.fqdn.rsplit('.' ~ hetzner_dns_zone_name, 1)[0]
            )
          }}

    - name: Converge the Nextcloud Hetzner DNS record
      ansible.builtin.include_role:
        name: lv3.platform.hetzner_dns_record
      vars:
        hetzner_dns_record_zone_name: "{{ hetzner_dns_zone_name }}"
        hetzner_dns_record_name: "{{ selected_subdomain_record_name }}"
        hetzner_dns_record_type: A
        hetzner_dns_record_value: "{{ selected_subdomain.target }}"
        hetzner_dns_record_ttl: "{{ selected_subdomain.ttl | default(60) }}"

- name: Prepare PostgreSQL for Nextcloud
  hosts: "{{ 'postgres-staging-lv3' if (env | default('production')) == 'staging' else 'postgres-lv3' }}"
  become: true
  gather_facts: true

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_emit_audit: false
        required_hosts:
          - "{{ playbook_execution_required_hosts.postgres[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.postgres_vm
    - role: lv3.platform.nextcloud_postgres

- name: Converge Nextcloud on the Docker runtime VM
  hosts: "{{ 'docker-runtime-staging-lv3' if (env | default('production')) == 'staging' else 'docker-runtime-lv3' }}"
  become: true
  gather_facts: true

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.nextcloud
        playbook_execution_audit_target: nextcloud
        required_hosts:
          - "{{ playbook_execution_required_hosts.docker_runtime[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.nextcloud_runtime

  post_tasks:
    - name: Run shared Nextcloud post-verify checks
      ansible.builtin.import_tasks: tasks/post-verify.yml
      vars:
        service_health_probe_id: nextcloud
        playbook_execution_post_verify_audit_action: playbook.verify.nextcloud
    - name: Run shared completion notifications
      ansible.builtin.import_tasks: tasks/notify.yml
      vars:
        playbook_execution_notification_service: nextcloud

- name: Publish Nextcloud through the NGINX edge
  hosts: "{{ 'nginx-staging-lv3' if (env | default('production')) == 'staging' else 'nginx-lv3' }}"
  become: true
  gather_facts: true
  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/platform.yml"

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_emit_audit: false
        required_hosts:
          - "{{ playbook_execution_required_hosts.nginx_edge[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.nginx_edge_publication
