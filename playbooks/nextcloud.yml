---
# Playbook: nextcloud.yml
# Purpose: Converge Nextcloud DNS publication, PostgreSQL access, runtime state, and edge publication for the canonical personal data plane.
# Use case: Run during Nextcloud deployment, upgrade, or recovery when the repo-managed data plane must match current ADR 0260 truth.
#
# Inputs (required):
#   - proxmox_guest_ssh_connection_mode (string, required): SSH path used by the runtime and postgres guest plays.
#
# Inputs (optional):
#   - env (string, optional, default=production): Selects the target environment lane.
#
# Outputs:
#   - The Nextcloud DNS record, PostgreSQL backend, runtime secrets, compose stack, and public edge publication are reconciled to repo state.
#
# Idempotency: Fully idempotent
#
# Dependencies:
#   - ADR 0260: Nextcloud as the canonical personal data plane for ServerClaw.
#   - Requires: postgres, docker-runtime, nginx, and OpenBao to already exist.
#   - Role: lv3.platform.nextcloud_postgres - provisions the Nextcloud database and role.
#   - Role: lv3.platform.nextcloud_runtime - converges the Nextcloud runtime and local verification flow.
#   - Role: lv3.platform.nginx_edge_publication - publishes the service through the shared edge.
#
# Related ADRs: 0206, 0259, 0260
# Related Runbooks: docs/runbooks/configure-nextcloud.md
#
# Invocation: ansible-playbook playbooks/nextcloud.yml -e @playbooks/vars/nextcloud.yml -e env=production
#
# Author: LV3 Platform
# Last Updated: 2026-04-06

# --- Standard plays (driven by vars/nextcloud.yml) ---

- import_playbook: _includes/dns_publication.yml
  when: service_needs_dns | default(false)

- import_playbook: _includes/postgres_preparation.yml
  when: service_needs_postgres | default(false)

# --- Nextcloud-specific docker runtime play (uses runtime-apps host, not docker-runtime) ---

- name: Converge Nextcloud on the Docker runtime VM
  hosts: "{{ 'docker-runtime-staging' if (env | default('production')) == 'staging' else 'runtime-apps' }}"
  become: true
  gather_facts: true

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.nextcloud
        playbook_execution_audit_target: nextcloud
        required_hosts:
          - "{{ playbook_execution_required_hosts.docker_runtime[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.nextcloud_runtime

- import_playbook: _includes/nginx_edge_publication.yml
  when: service_needs_nginx_edge | default(false)

# --- Nextcloud-specific post-verify play ---

- name: Verify Nextcloud publication after edge convergence
  hosts: "{{ 'docker-runtime-staging' if (env | default('production')) == 'staging' else 'runtime-apps' }}"
  become: true
  gather_facts: false

  tasks:
    - name: Run shared Nextcloud post-verify checks
      ansible.builtin.import_tasks: tasks/post-verify.yml
      vars:
        service_health_probe_id: nextcloud
        playbook_execution_post_verify_audit_action: playbook.verify.nextcloud
    - name: Run shared completion notifications
      ansible.builtin.import_tasks: tasks/notify.yml
      vars:
        playbook_execution_notification_service: nextcloud
