---
# Playbook: gotenberg.yml
# Purpose: Converge the private Gotenberg document-to-PDF runtime on the dedicated runtime-ai pool guest.
# Use case: Run when changing ADR 0278 runtime automation, image pins, firewall exposure, or the runtime-ai pool placement for the document-rendering service.
#
# Inputs (required):
#   - proxmox_guest_ssh_connection_mode (str, required via make target defaults): SSH transport mode for guest access.
#
# Inputs (optional):
#   - preflight_wait_for_connection (bool, optional, default=false): Skip redundant connection checks when the shared make preflight already passed.
#
# Outputs:
#   - Gotenberg container running on the dedicated runtime-ai guest with Chromium and LibreOffice renderers pre-started
#
# Idempotency: Partially idempotent
#              Reruns reconcile the same compose stack, guest firewall, and API gateway bundle without mutating shared release truth on this branch.
#
# Dependencies:
#   - ADR 0278: Defines Gotenberg as the shared document-to-PDF rendering service.
#   - ADR 0319: Places document-rendering workloads on the runtime-ai pool substrate.
#   - ADR 0320: Gives the runtime-ai pool its own deployment surface and execution lane.
#   - Role: lv3.platform.gotenberg_runtime — converges the renderer runtime.
#
# Related ADRs: 0165, 0278, 0319, 0320
# Related Runbooks: docs/runbooks/configure-gotenberg.md
#
# Author: LV3 Platform
# Last Updated: 2026-04-02
- name: Converge Gotenberg on the runtime-ai pool guest
  hosts: "{{ 'docker-runtime-staging' if (env | default('production')) == 'staging' else 'runtime-ai' }}"
  become: true
  gather_facts: true
  vars:
    preflight_wait_for_connection: false
  tags:
    - tier-2
    - automation
    - service-gotenberg

  pre_tasks:
    - name: Ensure target guest is Debian
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
        fail_msg: "This playbook only supports Debian guests."

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.gotenberg_runtime
