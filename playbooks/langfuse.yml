---
# Playbook: langfuse.yml
# Purpose: Converge Langfuse DNS publication, PostgreSQL access, and runtime state for repo-managed observability tracing.
# Use case: Run during production or staging Langfuse deployment, upgrade, or recovery when workflow tracing must match repo truth.
#
# Inputs (required):
#   - env (string, required): Target environment selector used to choose the postgres and docker-runtime guests.
#
# Inputs (optional):
#   - proxmox_guest_ssh_connection_mode (string, optional, default=proxmox_host_jump): SSH path to managed guests.
#
# Outputs:
#   - Langfuse DNS records, PostgreSQL access, runtime configuration, and authenticated edge publication are reconciled to the declared platform state.
#
# Idempotency: Fully idempotent
#
# Dependencies:
#   - ADR 0146: Langfuse supplies governed trace capture for platform workflows.
#   - Requires: PostgreSQL, docker-runtime, and the shared NGINX edge to already exist.
#   - Role: lv3.platform.langfuse_postgres - provisions the Langfuse database and role.
#   - Role: lv3.platform.langfuse_runtime - converges the Langfuse runtime and publication flow.
#
# Related ADRs: 0146, 0197
# Related Runbooks: docs/runbooks/configure-langfuse.md
#
# Invocation: ansible-playbook playbooks/langfuse.yml -e @playbooks/vars/langfuse.yml -e env=production
#
# Author: LV3 Platform
# Last Updated: 2026-04-06

# --- Langfuse-specific DNS play (uses hetzner_dns_records role, not catalog-based) ---

- name: Ensure Hetzner DNS publication for Langfuse
  hosts: proxmox_hosts
  become: false
  gather_facts: false

  tasks:
    - name: Ensure Hetzner DNS records are present
      ansible.builtin.include_role:
        name: lv3.platform.hetzner_dns_records
        apply:
          delegate_to: localhost
          become: false
      run_once: true

# --- Standard plays (driven by vars/langfuse.yml) ---

- import_playbook: _includes/postgres_preparation.yml
  when: service_needs_postgres | default(false)

- import_playbook: _includes/docker_runtime_converge.yml

- import_playbook: _includes/nginx_edge_publication.yml
  when: service_needs_nginx_edge | default(false)
