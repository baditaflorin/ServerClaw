---
# Playbook: langfuse.yml
# Purpose: Converge Langfuse DNS publication, PostgreSQL access, and runtime state for repo-managed observability tracing.
# Use case: Run during production or staging Langfuse deployment, upgrade, or recovery when workflow tracing must match repo truth.
#
# Inputs (required):
#   - env (string, required): Target environment selector used to choose the postgres and docker-runtime guests.
#
# Inputs (optional):
#   - proxmox_guest_ssh_connection_mode (string, optional, default=proxmox_host_jump): SSH path to managed guests.
#
# Outputs:
#   - Langfuse DNS records, PostgreSQL access, runtime configuration, and authenticated edge publication are reconciled to the declared platform state.
#
# Idempotency: Fully idempotent
#
# Dependencies:
#   - ADR 0146: Langfuse supplies governed trace capture for platform workflows.
#   - Requires: PostgreSQL, docker-runtime, and the shared NGINX edge to already exist.
#   - Role: lv3.platform.langfuse_postgres - provisions the Langfuse database and role.
#   - Role: lv3.platform.langfuse_runtime - converges the Langfuse runtime and publication flow.
#
# Related ADRs: 0146, 0197
# Related Runbooks: docs/runbooks/configure-langfuse.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-28

- name: Ensure Hetzner DNS publication for Langfuse
  hosts: proxmox_hosts
  become: false
  gather_facts: false

  tasks:
    - name: Ensure Hetzner DNS records are present
      ansible.builtin.include_role:
        name: lv3.platform.hetzner_dns_records
        apply:
          delegate_to: localhost
          become: false
      run_once: true

- name: Prepare PostgreSQL for Langfuse
  hosts: "{{ 'postgres-staging-lv3' if (env | default('production')) == 'staging' else 'postgres-lv3' }}"
  become: true
  gather_facts: true

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_emit_audit: false
        required_hosts:
          - "{{ playbook_execution_required_hosts.postgres[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.postgres_vm
    - role: lv3.platform.langfuse_postgres

- name: Converge Langfuse on the Docker runtime VM
  hosts: "{{ 'docker-runtime-staging-lv3' if (env | default('production')) == 'staging' else 'docker-runtime-lv3' }}"
  become: true
  gather_facts: true

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.langfuse
        playbook_execution_audit_target: langfuse
        required_hosts:
          - "{{ playbook_execution_required_hosts.docker_runtime[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.linux_guest_firewall
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.keycloak_runtime
    - role: lv3.platform.langfuse_runtime

- name: Publish Langfuse through the NGINX edge
  hosts: "{{ 'nginx-staging-lv3' if (env | default('production')) == 'staging' else 'nginx-lv3' }}"
  become: true
  gather_facts: true
  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/platform.yml"

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_emit_audit: false
        required_hosts:
          - "{{ playbook_execution_required_hosts.nginx_edge[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.nginx_edge_publication
