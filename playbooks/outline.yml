---
# Purpose: Converge the Outline wiki database, runtime, and edge publication.
# Use case: Run for production or staging live apply of the repo-managed Outline knowledge surface.
# Outputs: PostgreSQL role and database, Outline runtime secrets, Keycloak OIDC client, NGINX edge publication, and repo-managed Outline landing pages.
# Idempotency: Partially idempotent; runtime convergence is repeatable, while the first admin bootstrap is skipped once the controller-local API token already exists and sync updates deterministic documents in place.
# Dependencies: ADR 0199, postgres_vm, keycloak_runtime, outline_postgres, outline_runtime, nginx_edge_publication.
#
# Invocation: ansible-playbook playbooks/outline.yml -e @playbooks/vars/outline.yml -e env=production

# --- Standard plays (driven by vars/outline.yml) ---

- import_playbook: _includes/dns_publication.yml
  when: service_needs_dns | default(false)

- import_playbook: _includes/postgres_preparation.yml
  when: service_needs_postgres | default(false)

- import_playbook: _includes/docker_runtime_converge.yml

- import_playbook: _includes/nginx_edge_publication.yml
  when: service_needs_nginx_edge | default(false)

# --- Outline-specific plays ---

- name: Bootstrap and verify Outline publication
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Bootstrap and verify the Outline living knowledge surface
      ansible.builtin.include_role:
        name: lv3.platform.outline_runtime
        tasks_from: publish.yml
