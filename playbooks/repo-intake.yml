# Playbook: repo-intake.yml
# Purpose: Converge the self-service repository intake application on the shared Docker runtime (ADR 0224).
# Use case: Run when the repo-intake UI, runtime assets, or reverse-proxy publication must be reconciled on production or staging.
#
# Inputs (required):
#   - bootstrap_ssh_private_key (path, required via make targets): SSH private key used for the Proxmox host and guest jump path.
#
# Inputs (optional):
#   - env (string, optional, default=production): Deployment environment selector.
#   - platform_trace_id (string, optional): Mutation-audit trace identifier propagated by the make wrapper.
#
# Outputs:
#   - Repo intake runtime converged on the selected Docker runtime guest with repo-managed health verification and completion notifications.
#
# Idempotency: Fully idempotent
#              Reruns reconcile the same runtime configuration, verification checks, and notification flow.
#
# Dependencies:
#   - ADR 0165: Requires committed playbook metadata headers.
#   - ADR 0224: Self-service repo intake and agent-assisted deployments.
#   - Role: lv3.platform.repo_intake_runtime — renders and reconciles the intake runtime.
#
# Related ADRs: 0165, 0224
# Related Runbooks: docs/runbooks/repo-intake.md
#
# Author: LV3 Platform
# Last Updated: 2026-04-08
---
- name: Converge the repository intake application on the Docker runtime VM
  hosts: "{{ 'docker-runtime-staging' if (env | default('production')) == 'staging' else 'docker-runtime' }}"
  become: true
  gather_facts: true
  tags:
    - tier-2
    - access
    - service-repo-intake

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.repo-intake
        playbook_execution_audit_target: repo-intake
        required_hosts:
          - "{{ playbook_execution_required_hosts.docker_runtime[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.linux_guest_firewall
      vars:
        linux_guest_firewall_recover_missing_docker_bridge_chains: true
    - role: lv3.platform.docker_runtime
      vars:
        # Repo-intake may be the first bridge-published runtime on a recovered
        # host, so let the role reconcile Docker without requiring a preexisting
        # nat DOCKER chain. The repo-intake runtime health checks still verify
        # the published listener after compose comes up.
        docker_runtime_require_nat_chain: false
    - role: lv3.platform.repo_intake_runtime

  post_tasks:
    - name: Run shared post-verify checks
      ansible.builtin.import_tasks: tasks/post-verify.yml
      vars:
        service_health_probe_id: repo_intake
        playbook_execution_post_verify_audit_action: playbook.verify.repo-intake
    - name: Run shared completion notifications
      ansible.builtin.import_tasks: tasks/notify.yml
      vars:
        playbook_execution_notification_service: repo_intake
