---
- name: Validate and Monitor SSL Certificates
  hosts: proxmox_hosts
  become: false
  gather_facts: false
  tags:
    - certificate-validation
    - observability
    - monitoring

  tasks:
    - name: Load subdomain catalog
      ansible.builtin.set_fact:
        subdomain_catalog: "{{ lookup('file', playbook_dir + '/../config/subdomain-catalog.json') | from_json }}"
      run_once: true

    - name: Extract edge-published domains
      ansible.builtin.set_fact:
        edge_domains: >-
          {{
            subdomain_catalog.subdomains
            | selectattr('exposure', 'in', ['edge-published', 'edge-static'])
            | map(attribute='fqdn')
            | list
          }}
      run_once: true

    - name: Display domains to validate
      ansible.builtin.debug:
        msg: "Will validate {{ edge_domains | length }} edge-published domains"
      run_once: true

    - name: Create certificate validation script on controller
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../scripts/certificate_validator.py"
        dest: /tmp/certificate_validator.py
        mode: "0755"
      delegate_to: localhost
      become: false
      run_once: true

    - name: Run certificate validation
      ansible.builtin.command:
        argv:
          - python3
          - /tmp/certificate_validator.py
          - --check-all
          - --json
      register: cert_validation_result
      delegate_to: localhost
      become: false
      run_once: true
      changed_when: false

    - name: Parse certificate validation results
      ansible.builtin.set_fact:
        cert_results: "{{ cert_validation_result.stdout | from_json }}"
      run_once: true

    - name: Report certificate issues
      ansible.builtin.debug:
        msg: |
          Certificate Validation Summary:
          - Total domains: {{ cert_results | length }}
          - Valid: {{ cert_results | selectattr('status', 'equalto', 'valid') | length }}
          - Expiring soon: {{ cert_results | selectattr('status', 'equalto', 'expiring_soon') | length }}
          - Expired: {{ cert_results | selectattr('status', 'equalto', 'expired') | length }}
          - Connection failed: {{ cert_results | selectattr('status', 'equalto', 'connection_failed') | length }}
          - Mismatch: {{ cert_results | selectattr('status', 'equalto', 'cert_mismatch') | length }}
      run_once: true

    - name: Assert no expired certificates
      ansible.builtin.assert:
        that:
          - (cert_results | selectattr('status', 'equalto', 'expired') | length) == 0
        fail_msg: |
          CRITICAL: One or more certificates are EXPIRED!
          See certificate_validator.py output for details.
          Run: make converge-nginx-edge env=production
      run_once: true
      ignore_errors: true

    - name: Warn about expiring certificates
      ansible.builtin.debug:
        msg: |
          WARNING: {{ item.fqdn }} expires in {{ item.days_until_expiry }} days
          Run: make converge-nginx-edge env=production
      loop: "{{ cert_results | selectattr('status', 'equalto', 'expiring_soon') | list }}"
      when: cert_results | selectattr('status', 'equalto', 'expiring_soon') | length > 0
      run_once: true

    - name: Report certificate mismatches
      ansible.builtin.debug:
        msg: |
          ERROR: {{ item.fqdn }} has certificate hostname mismatch
          - Expected: {{ item.fqdn }}
          - Certificate CN: {{ item.cn }}
          - Certificate SANs: {{ item.sans | join(', ') }}

          Fix:
          1. Verify {{ item.fqdn }} is in subdomain-catalog.json with exposure="edge-published"
          2. Run: make converge-nginx-edge env=production
      loop: "{{ cert_results | selectattr('status', 'equalto', 'cert_mismatch') | list }}"
      when: cert_results | selectattr('status', 'equalto', 'cert_mismatch') | length > 0
      run_once: true

    - name: Save validation report
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../build/certificate-validation-report.json"
        content: "{{ cert_results | to_nice_json }}"
        mode: "0644"
      delegate_to: localhost
      become: false
      run_once: true
      when: cert_results is defined

    - name: Check for missing domains
      ansible.builtin.set_fact:
        missing_domains: >-
          {{
            edge_domains
            | difference(
                cert_results
                | selectattr('status', 'in', ['valid', 'expiring_soon', 'cert_mismatch', 'expired'])
                | map(attribute='fqdn')
                | list
              )
          }}
      run_once: true

    - name: Report missing/unreachable domains
      ansible.builtin.debug:
        msg: |
          WARNING: {{ missing_domains | length }} domains were not validated (unreachable)
          {% for domain in missing_domains %}
          - {{ domain }}
          {% endfor %}

          These may be internal-only services or not yet deployed.
      when: missing_domains | length > 0
      run_once: true
