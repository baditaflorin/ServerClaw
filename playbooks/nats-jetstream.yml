---
# Purpose: Converge the private NATS JetStream runtime and its local verification path on runtime-control.
# Use case: Run during ADR 0276 rollout, runtime recovery, or later drift reconciliation from version-controlled automation.
# Inputs: env (optional), proxmox_guest_ssh_connection_mode, and nats_jetstream_* overrides when needed.
# Outputs: A running lv3-nats-jetstream container plus repo-rendered compose/config files under /opt/nats-jetstream.
# Idempotency: Yes; the playbook replays docker compose safely after deterministic config renders.
# Dependencies: ADR 0079, ADR 0124, ADR 0165, ADR 0276, and runtime-control.
- name: Converge NATS JetStream runtime
  hosts: "{{ 'docker-runtime-staging' if (env | default('production')) == 'staging' else 'runtime-control' }}"
  become: true
  gather_facts: true
  tags:
    - tier-2
    - automation
    - service-nats-jetstream

  pre_tasks:
    - name: Run shared preflight checks
      ansible.builtin.import_tasks: tasks/preflight.yml
      vars:
        playbook_execution_require_debian: true
        playbook_execution_audit_action: playbook.start.nats_jetstream
        playbook_execution_audit_target: nats-jetstream
        required_hosts:
          - "{{ playbook_execution_required_hosts.runtime_control[playbook_execution_env] }}"

  roles:
    - role: lv3.platform.docker_runtime
    - role: lv3.platform.nats_jetstream_runtime
    - role: lv3.platform.linux_guest_firewall

  post_tasks:
    - name: Run shared completion notifications
      ansible.builtin.import_tasks: tasks/notify.yml
      vars:
        playbook_execution_notification_service: nats-jetstream
