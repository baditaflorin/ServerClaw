# Playbook: tesseract-ocr.yml
# Purpose: Expose the repo-managed Tesseract OCR converge path through the root playbook entrypoint.
# Use case: Run via `make converge-tesseract-ocr` or service wrappers that target the OCR runtime.
#
# Inputs (required):
#   - env (str, required): Deployment environment selector passed through to the collection playbook.
#
# Inputs (optional):
#   - proxmox_guest_ssh_connection_mode (str, optional, default=proxmox_host_jump): Guest SSH routing mode for the live apply.
#
# Outputs:
#   - Imports the collection-scoped Tesseract OCR playbook used by live-apply wrappers and syntax checks.
#
# Idempotency: Fully idempotent
#              This wrapper only imports the collection playbook and does not mutate state on its own.
#
# Dependencies:
#   - ADR 0286: Defines Tesseract OCR as the scanned-image text extraction fallback service.
#   - Requires: collections/ansible_collections/lv3/platform/playbooks/tesseract-ocr.yml.
#   - Role: lv3.platform.tesseract_ocr_runtime — owned by the imported playbook.
#
# Related ADRs: 0107, 0165, 0275, 0286
# Related Runbooks: docs/runbooks/configure-tesseract-ocr.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-30

- import_playbook: ../collections/ansible_collections/lv3/platform/playbooks/tesseract-ocr.yml
