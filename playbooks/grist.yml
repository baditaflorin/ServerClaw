---
# Purpose: Converge the Grist runtime and edge publication.
# Use case: Run for production or staging live apply of the repo-managed Grist spreadsheet database.
# Outputs: Keycloak OIDC client, Grist runtime secrets, Docker Compose runtime, DNS publication, and NGINX edge publication.
# Idempotency: Partially idempotent; runtime convergence is repeatable and the public verification path rechecks the live OIDC-backed publication without mutating user data.
# Dependencies: ADR 0279, docker_runtime, keycloak_runtime, grist_runtime, nginx_edge_publication.
#
# Invocation: ansible-playbook playbooks/grist.yml -e @playbooks/vars/grist.yml -e env=production

# --- Standard plays (driven by vars/grist.yml) ---

- import_playbook: _includes/dns_publication.yml
  when: service_needs_dns | default(false)

- import_playbook: _includes/docker_runtime_converge.yml

- import_playbook: _includes/nginx_edge_publication.yml
  when: service_needs_nginx_edge | default(false)

# --- Grist-specific plays ---

- name: Verify Grist publication
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Verify the Grist public spreadsheet surface
      ansible.builtin.include_role:
        name: lv3.platform.grist_runtime
        tasks_from: publish.yml
