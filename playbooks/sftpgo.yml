---
# Playbook: sftpgo.yml
# Purpose: Converge SFTPGo DNS publication, PostgreSQL access, runtime state, and edge publication for the managed file-transfer surface.
# Use case: Run during SFTPGo deployment, update, or recovery when the repo-managed SFTP and WebDAV service must match ADR 0291.
# Outputs: The files.{{ platform_domain }} DNS record, PostgreSQL backend, SFTPGo runtime, private controller path, and public edge publication are reconciled to repo state.
# Idempotency: Fully idempotent
# Dependencies: ADR 0291, postgres_vm, keycloak_runtime, sftpgo_postgres, sftpgo_runtime, nginx_edge_publication.
#
# Related ADRs: 0042, 0056, 0077, 0086, 0276, 0291
# Related Runbooks: docs/runbooks/configure-sftpgo.md
#
# Invocation: ansible-playbook playbooks/sftpgo.yml -e @playbooks/vars/sftpgo.yml -e env=production

- import_playbook: _includes/dns_publication.yml
  when: service_needs_dns | default(false)

- import_playbook: _includes/postgres_preparation.yml
  when: service_needs_postgres | default(false)

- import_playbook: _includes/docker_runtime_converge.yml

- import_playbook: _includes/nginx_edge_publication.yml
  when: service_needs_nginx_edge | default(false)

- name: Bootstrap and verify the SFTPGo publication contract
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Bootstrap and verify the SFTPGo provisioning and publication contract
      ansible.builtin.include_role:
        name: lv3.platform.sftpgo_runtime
        tasks_from: publish.yml
