---
# Playbook: paperless.yml
# Purpose: Converge the Paperless PostgreSQL backend, runtime, API route, and edge publication.
# Use case: Run for production or staging live apply of the repo-managed Paperless document archive and API surface.
# Outputs: PostgreSQL role and database, Paperless runtime secrets, Keycloak OIDC client, API token bootstrap, taxonomy reconciliation, API gateway route, NGINX edge publication, and public smoke verification.
# Idempotency: Partially idempotent; runtime convergence is repeatable, while the public smoke upload performs a cleanup-backed verification transaction on each run.
# Dependencies: ADR 0285, postgres_vm, keycloak_runtime, paperless_postgres, paperless_runtime, api_gateway_runtime, nginx_edge_publication.
#
# Invocation: ansible-playbook playbooks/paperless.yml -e @playbooks/vars/paperless.yml -e env=production

- import_playbook: _includes/dns_publication.yml
  when: service_needs_dns | default(false)

- import_playbook: _includes/postgres_preparation.yml
  when: service_needs_postgres | default(false)

- import_playbook: _includes/docker_runtime_converge.yml

- import_playbook: _includes/nginx_edge_publication.yml
  when: service_needs_nginx_edge | default(false)

- name: Bootstrap and verify the Paperless publication contract
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Verify the Paperless public publication path
      ansible.builtin.include_role:
        name: lv3.platform.paperless_runtime
        tasks_from: publish.yml
