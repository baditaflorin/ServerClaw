---
- name: Converge Docker runtime VM baseline
  hosts: docker-runtime-lv3
  become: true
  gather_facts: true
  vars_files:
    - ../inventory/vars/docker_runtime.yml

  pre_tasks:
    - name: Ensure target guest is Debian
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
        fail_msg: "This playbook only supports Debian guests."

  roles:
    - role: docker_runtime
