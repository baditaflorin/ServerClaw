---
# Playbook: monitoring-stack.yml
# Purpose: Compose the full monitoring stack playbook by importing the monitoring-related service playbooks in the managed order.
# Use case: Run when converging monitoring surfaces such as Grafana, log shipping, and Proxmox metrics collectors.
#
# Inputs (required):
#   - inventory groups and host vars (generated, required): Supply the target hosts and service topology used by the imported playbooks.
#
# Inputs (optional):
#   - env (str, optional, default=production): Environment selector forwarded to imported service playbooks.
#
# Outputs:
#   - Imports the monitoring service playbooks that converge the live monitoring stack.
#
# Idempotency: Fully idempotent
#              Imported service playbooks are expected to be safe to replay and maintain desired state.
#
# Dependencies:
#   - ADR 0041: Defines the monitoring stack baseline.
#   - Requires: The imported playbooks under playbooks/services/ exist and remain valid.
#
# Related ADRs: 0041, 0165
# Related Runbooks: docs/runbooks/deploy-uptime-kuma.md
#
# Author: LV3 Platform
# Last Updated: 2026-03-28
- import_playbook: services/grafana.yml
- import_playbook: services/proxmox-metrics.yml
- import_playbook: services/proxmox-host-log-shipping.yml
- import_playbook: services/nginx-observability.yml
- import_playbook: services/docker-build-observability.yml
- import_playbook: services/docker-runtime-observability.yml
- import_playbook: services/guest-log-shipping.yml
