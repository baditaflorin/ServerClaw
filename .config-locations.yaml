# ============================================================================
# Canonical Configuration Locations Registry — ADR 0166
# ============================================================================
# Purpose: Map every canonical configuration file to its purpose, owner, and
#          update process. Agents should consult this before searching for or
#          modifying any configuration.
# Usage:   Find the section matching your concern; read 'use_for' and
#          'update_when' before touching any file.
# Updated: 2026-03-30
# ============================================================================

schema_version: 1
last_updated: "2026-03-30"

agent_quick_reference:
  find_config: "Check this file → find your concern section → read 'use_for'"
  where_to_document:
    infrastructure_changes: "workstreams.yaml + docs/workstreams/"
    service_deployments: "versions/stack.yaml"
    version_bumps: "VERSION + changelog.md + docs/release-notes/"
    operational_changes: "receipts/live-applies/"
  source_of_truth: "owner: human → primary source; owner: automation → modify the generator"
  validate: "make validate-data-models"

# ============================================================================
# INFRASTRUCTURE STATE
# ============================================================================

infrastructure_state:

  versions/stack.yaml:
    purpose: Canonical description of all deployed services and versions
    owner: human  # manual update after successful deployment
    format: YAML — service definitions with names, VMs, images, ports
    use_for: Querying what is deployed and at which version
    update_when: After a successful deployment to production
    update_by: Agent or human completing a deployment workstream
    validation: "make validate-data-models"
    related_files:
      - "config/*/: Per-service configuration files"
      - "build/platform-manifest.json: Generated manifest from this file"
      - "inventory/group_vars/all.yml: Common variables"
    schema_hint: |
      services:
        - service: service_name
          vm: vm_name
          image: image:version
          port: port_number

  receipts/live-applies/:
    purpose: Operational audit trail of successful live deployments
    owner: automation  # written by deployment automation
    format: JSON — timestamp, agent, ADR reference, changes, verification
    use_for: Understanding what changed when and confirming deploys succeeded
    update_when: After every live-apply run
    update_by: Deployment automation (Ansible/Windmill) or agent
    validation: Manual review
    naming_convention: "YYYY-MM-DD-adr-XXXX-description-live-apply.json"

  receipts/sast/:
    purpose: Semgrep SARIF receipts emitted by repo validation runs
    owner: automation
    format: SARIF JSON
    use_for: Preserving the latest branch-local or CI Semgrep findings in a tool-consumable format
    update_when: After `scripts/semgrep_gate.py` runs through `make validate` or the remote validation gate
    update_by: "scripts/semgrep_gate.py"
    validation: "python3 scripts/semgrep_gate.py --print-summary-json"
    naming_convention: "<git-sha>.sarif.json"

  receipts/backup-coverage/:
    purpose: Durable ADR 0271 backup coverage ledger receipts derived from live Proxmox backup jobs, storage listings, and restore-verification evidence
    owner: automation
    format: JSON
    use_for: Proving which governed assets are protected, degraded, or uncovered at a specific point in time
    update_when: After every `make backup-coverage-ledger` run or equivalent worker execution
    update_by: "scripts/backup_coverage_ledger.py --write-receipt"
    validation: Manual review
    naming_convention: "YYYYMMDDTHHMMSSZ.json"

  config/restic-file-backup-catalog.json:
    purpose: Canonical ADR 0302 catalog of file-level sources, schedules, and retention policy for Restic-backed configuration backups
    owner: human
    format: JSON
    use_for: Declaring which repository-backed configuration and receipt paths must be protected by the Restic backup workflow
    update_when: Adding or changing ADR 0302 governed file-level sources, retention, or notification metadata
    update_by: Agent or human implementing ADR 0302
    validation: "python3 -m json.tool config/restic-file-backup-catalog.json"

  receipts/restic-backups/:
    purpose: Durable ADR 0302 backup receipts emitted after each successful Restic snapshot workflow
    owner: automation
    format: JSON
    use_for: Proving which file-level sources were backed up, from which source commit, and whether stale notifications fired
    update_when: After every `make restic-config-backup env=production` run or equivalent systemd/Windmill execution
    update_by: "scripts/restic_config_backup.py --mode backup"
    validation: Manual review
    naming_convention: "YYYYMMDDTHHMMSSZ.json"

  receipts/restic-restore-verifications/:
    purpose: Durable ADR 0302 restore-verification receipts for the latest receipts snapshot rehearsal
    owner: automation
    format: JSON
    use_for: Proving the monthly restore path still restores the receipts tree to a temporary directory and meets the file-count expectation
    update_when: After every `make restic-config-restore-verify env=production` run or equivalent worker execution
    update_by: "scripts/restic_config_backup.py --mode restore-verify"
    validation: Manual review
    naming_convention: "YYYYMMDDTHHMMSSZ.json"

  receipts/restic-snapshots-latest.json:
    purpose: Canonical ADR 0302 latest-snapshot summary consumed by the backup-coverage ledger and stale-notification path
    owner: automation
    format: JSON
    use_for: Determining the freshest observed Restic snapshot per governed file-level source
    update_when: After every successful ADR 0302 backup run
    update_by: "scripts/restic_config_backup.py --mode backup"
    validation: Manual review

  receipts/gate-bypasses/:
    purpose: Records of --no-verify gate overrides with justification
    owner: automation  # written by pre-push hook bypass
    format: JSON
    use_for: Audit trail for why validation was bypassed
    update_when: When pre-push gate is bypassed
    validation: Reviewed by human on merge

  build/platform-manifest.json:
    purpose: Generated machine-readable platform state manifest
    owner: automation  # generated by scripts/platform_manifest.py
    format: JSON
    use_for: Machine-readable current platform state for tooling
    update_when: Generated on push; do NOT edit manually
    update_by: "scripts/platform_manifest.py --write"

  config/ephemeral-capacity-pools.json:
    purpose: Canonical lease-based warm-pool catalog for ADR 0186 ephemeral fixtures
    owner: human
    format: JSON
    use_for: Declaring per-fixture warm counts, refill targets, lease ceilings, spillover domains, and pool-local address allocations
    update_when: Changing governed ephemeral lease and prewarm policy
    update_by: Agent or human completing ADR 0186 follow-up work
    validation: "uv run --with pyyaml --with jsonschema python scripts/validate_repository_data_models.py --validate"
    related_files:
      - "docs/schema/ephemeral-capacity-pools.schema.json: JSON schema for the pool catalog"
      - "scripts/fixture_manager.py: pool reconciliation and lease handoff logic"
      - "docs/runbooks/ephemeral-fixtures.md: operator procedure"

  config/preview-environment-profiles.json:
    purpose: Canonical catalog of ADR 0185 branch-scoped preview profiles, network pool, and TTL defaults
    owner: human
    format: JSON
    use_for: Creating and validating ephemeral branch previews on the governed Proxmox pool
    update_when: Adding or changing preview profiles, network pool limits, or branch-preview defaults
    update_by: Agent or human implementing ADR 0185 preview automation
    validation: "python3 scripts/preview_environment.py validate-catalog"
    related_files:
      - "docs/schema/preview-environment-profiles.schema.json: Schema for the profile catalog"
      - "scripts/preview_environment.py: Lifecycle automation for create/validate/destroy"

  config/repo-deploy-base-image-profiles.json:
    purpose: Canonical ADR 0274 catalog of approved repo-deploy base-image bundles, freshness windows, and deployment-lane profile bindings
    owner: human
    format: JSON
    use_for: Declaring which base images must be prewarmed before governed Coolify repo deployments run
    update_when: Adding or changing an approved repo-deploy profile, its image bundles, or its freshness budget
    update_by: Agent or human implementing ADR 0274 repo-deploy cache policy
    validation: "uv run --with pyyaml --with jsonschema python scripts/validate_repository_data_models.py --validate"
    related_files:
      - "docs/schema/repo-deploy-base-image-profiles.schema.json: Schema for the approved profile catalog"
      - "scripts/repo_deploy_image_cache.py: Catalog planner, warm helper, and receipt verifier"
      - "docs/runbooks/repo-deploy-base-image-cache.md: Operator procedure"

  config/correction-loops.json:
    purpose: Canonical ADR 0204 registry of governed self-correcting automation loops and their workflow selectors
    owner: human
    format: JSON
    use_for: Declaring the invariant, observation sources, diagnosis taxonomy, repair actions, verification probe, and escalation boundary for mutable automation surfaces
    update_when: Adding a new mutating workflow, changing repair policy, or adjusting a loop's retry budget
    update_by: Agent or human implementing ADR 0204 self-correction changes
    validation: "python3 scripts/correction_loops.py --validate"
    related_files:
      - "docs/schema/correction-loop-catalog.schema.json: Schema for the correction-loop catalog"
      - "scripts/correction_loops.py: Selector resolution and validation helper"
      - "config/workflow-catalog.json: Workflows that must be covered by the correction-loop selectors"

  config/restore-readiness-profiles.json:
    purpose: Canonical ADR 0272 catalog of restore-readiness ladders and stateful warm-up profiles for protected restore targets
    owner: human
    format: JSON
    use_for: Declaring per-service-class warm-up timing, dependency-stage checks, and optional synthetic replay requirements for restore verification
    update_when: Adding a new restore target, changing the warm-up budget for a protected class, or changing which checks advance each ladder stage
    update_by: Agent or human implementing ADR 0272 restore semantics
    validation: "uv run --with pyyaml --with jsonschema python scripts/validate_repository_data_models.py --validate"
    related_files:
      - "docs/schema/restore-readiness-profiles.schema.json: JSON schema for restore-readiness profiles"
      - "scripts/restore_verification.py: restore ladder execution and receipt generation"
      - "docs/runbooks/backup-restore-verification.md: operator procedure"

  config/vulnerability-budget-policy.json:
    purpose: Canonical ADR 0269 vulnerability budgets, freshness windows, service-profile overrides, and host exception metadata
    owner: human
    format: JSON
    use_for: Governing production promotion and live-apply admission against fresh host and image security evidence
    update_when: Changing vulnerability thresholds, freshness windows, identity overrides, or structured host exceptions
    update_by: Agent or human implementing ADR 0269 follow-up work
    validation: "python3 scripts/vulnerability_budget.py --validate"
    related_files:
      - "config/image-catalog.json: Structured image exception metadata and scan receipt references"
      - "receipts/security-reports/: Latest host scan evidence"
      - "receipts/image-scans/: Latest image scan evidence"
      - "docs/schema/vulnerability-budget-policy.schema.json: Schema for the ADR 0269 policy document"
      - "docs/runbooks/vulnerability-budget-gates.md: Operator procedure"

  receipts/preview-environments/:
    purpose: Durable branch-local evidence for completed preview create/validate/destroy cycles
    owner: automation
    format: JSON
    use_for: Proving which branch preview ran, what it provisioned, how it validated, and when it was torn down
    update_when: After a preview environment is destroyed and its evidence is finalized
    update_by: "scripts/preview_environment.py destroy"

# ============================================================================
# VERSIONING AND RELEASES
# ============================================================================

versioning:

  VERSION:
    purpose: Current repository semantic version number
    owner: human  # bumped on integration/release
    format: "Plain text — X.Y.Z (e.g., 0.172.1)"
    use_for: Tracking repository version and identifying release boundaries
    update_when: When merging workstreams to main
    update_by: Integration agent or human
    validation: Must match regex ^[0-9]+\.[0-9]+\.[0-9]+$
    related_files:
      - "changelog.md: Release notes index"
      - "docs/release-notes/X.Y.Z.md: Detailed notes for this version"
      - "workstreams.yaml: What is included in this version"

  changelog.md:
    purpose: Human-readable changelog index pointing to versioned release notes
    owner: human  # curated
    format: Markdown — links to docs/release-notes/X.Y.Z.md files
    use_for: Understanding what changed in each release
    update_when: When VERSION changes
    update_by: Integration agent or human
    structure: |
      ## Unreleased
      ## Latest Release
      - [X.Y.Z release notes](docs/release-notes/X.Y.Z.md)
      ## Previous Releases

  docs/release-notes/:
    purpose: Versioned detailed release notes
    owner: human
    format: "Markdown — one file per version: X.Y.Z.md"
    use_for: Detailed change description per release
    update_when: When cutting a new version
    update_by: Integration agent or human
    naming_convention: "X.Y.Z.md"

# ============================================================================
# INVENTORY AND TOPOLOGY
# ============================================================================

inventory:

  inventory/hosts.yml:
    purpose: Ansible inventory — defines all hosts and group memberships
    owner: human  # updated when hosts change
    format: YAML — Ansible hosts and groups
    use_for: Defining which hosts exist and their relationships
    update_when: Adding/removing hosts or changing group memberships
    validation: ansible-inventory --list

  inventory/group_vars/all.yml:
    purpose: Variables applied to ALL hosts
    owner: human and automation
    format: YAML — variable definitions
    use_for: Shared infrastructure settings across all hosts
    update_when: Changing default behaviour across all hosts
    coverage: All hosts inherit these variables

  inventory/group_vars/platform.yml:
    purpose: Variables for the full platform group
    owner: human
    format: YAML
    use_for: Platform-wide configuration (service endpoints, domains)

  inventory/group_vars/proxmox_host.yml:
    purpose: Variables specific to the Proxmox hypervisor
    owner: human
    format: YAML
    use_for: Proxmox-specific config (networking, storage, firewall rules)
    examples: "pve_node_name, bridge configs (vmbr0/vmbr10), firewall rules"

  inventory/group_vars/guests.yml:
    purpose: Default variables for all guest VMs
    owner: human
    format: YAML
    use_for: Default VM configuration (OS, network, packages)
    examples: "guest_os, network_bridge, cloud_init_template"

  inventory/host_vars/:
    purpose: Per-host overrides to group_vars
    owner: human
    format: "YAML — one file per host named after hostname"
    use_for: Per-host customisation that differs from group defaults
    structure: "One file per host: inventory/host_vars/<hostname>.yml"

# ============================================================================
# AUTOMATION
# ============================================================================

automation:

  config/semgrep/rules/:
    purpose: Canonical local Semgrep rule packs for repo-managed SAST, secret-pattern detection, and Dockerfile policy checks
    owner: human
    format: YAML
    use_for: Declaring the reviewed Semgrep rules enforced by `make validate`, the remote validation gate, and CI workflows
    update_when: Adding or tuning a Semgrep rule after review of false-positive and false-negative impact
    update_by: Agent or human implementing ADR 0301
    validation: "./scripts/validate_repo.sh semgrep"
    related_files:
      - "config/semgrep/rule-pins.yaml: Governance record for any upstream rule references"
      - "scripts/semgrep_gate.py: Shared Semgrep wrapper that emits SARIF and mutation-audit summaries"
      - "docs/adr/0301-semgrep-for-sast-and-application-code-security-scanning-in-the-ci-gate.md: Decision record"
      - "docs/runbooks/validation-gate.md: Operator procedure"

  config/semgrep/rule-pins.yaml:
    purpose: Canonical governance file for pinned upstream Semgrep rule revisions
    owner: human
    format: YAML
    use_for: Recording the exact upstream Semgrep rule revision hashes referenced by the local rule packs
    update_when: Adding or changing an upstream Semgrep registry rule reference
    update_by: Agent or human implementing ADR 0301 follow-up rule governance
    validation: "python3 -c \"import yaml,sys; yaml.safe_load(open(sys.argv[1]))\" config/semgrep/rule-pins.yaml"
    related_files:
      - "config/semgrep/rules/: Local Semgrep rule packs"
      - "docs/adr/0301-semgrep-for-sast-and-application-code-security-scanning-in-the-ci-gate.md: Decision record"

  config/validation-runner-contracts.json:
    purpose: Canonical ADR 0266 catalog of validation runner capability contracts, supported lanes, and runtime attestation expectations
    owner: human
    format: JSON
    use_for: Declaring which runners may execute each validation lane across controller-local fallback, the remote build server, and the worker post-merge gate
    update_when: Adding a new validation runner, changing lane eligibility, or tightening runner capability requirements
    update_by: Agent or human implementing ADR 0266 validation-runner changes
    validation: "uv run --with pyyaml --with jsonschema python3 scripts/validation_runner_contracts.py --validate"
    related_files:
      - "docs/schema/validation-runner-contracts.schema.json: Schema for the validation runner contract catalog"
      - "scripts/validation_runner_contracts.py: Contract validation, attestation, and lane eligibility helper"
      - "config/build-server.json: Remote build-server command routing and runner identities"
      - "docs/runbooks/remote-build-gateway.md: Operator procedure for remote validation"

  config/gate-bypass-waiver-catalog.json:
    purpose: Canonical ADR 0267 taxonomy and escalation policy for governed validation-gate bypass waivers
    owner: human
    format: JSON
    use_for: Validating structured reason codes, expiry windows, and repeated-reason escalation before a gate bypass receipt is recorded or summarized
    update_when: Adding or changing allowed waiver reason codes, expiry windows, or repeat-after-expiry escalation thresholds
    update_by: Agent or human implementing ADR 0267 governance work
    validation: "python3 scripts/gate_bypass_waivers.py --validate"
    related_files:
      - "docs/schema/gate-bypass-waiver-catalog.schema.json: JSON schema for the waiver catalog"
      - "docs/schema/gate-bypass-waiver-receipt.schema.json: JSON schema for governed waiver receipts"
      - "scripts/gate_bypass_waivers.py: Loader, validator, and summary helper"
      - "docs/runbooks/validation-gate.md: operator procedure"

  keys/gitea-release-bundle-cosign.pub:
    purpose: Committed ADR 0233 Cosign public verifier for signed private Gitea release bundles
    owner: human
    format: PEM public key
    use_for: Verifying the detached Cosign signatures published alongside ADR 0233 release bundles
    update_when: Rotating the release-bundle signing material
    update_by: "python3 scripts/release_bundle.py init-signing --force"
    related_files:
      - "scripts/release_bundle.py: bundle build, publish, and verification helper"
      - "docs/runbooks/signed-release-bundles.md: operator procedure"
      - "config/controller-local-secrets.json: controller-local private-key and password contract"

  config/replaceability-review-catalog.json:
    purpose: Canonical ADR 0212 catalog of critical integrated product ADRs that must carry replaceability scorecards and vendor exit plans
    owner: human
    format: JSON
    use_for: Declaring which ADRs are governed by the replaceability fitness function and which capability-definition references anchor each review
    update_when: Adding or removing a governed critical product ADR, or changing its capability identifier or definition references
    update_by: Agent or human implementing ADR 0212 governance work
    validation: "python3 scripts/replaceability_scorecards.py --validate"
    related_files:
      - "docs/schema/replaceability-review-catalog.schema.json: Schema for the governed replaceability catalog"
      - "scripts/replaceability_scorecards.py: ADR section validator and summary report"
      - "docs/runbooks/replaceability-scorecards.md: authoring and review procedure"

  config/seed-data-catalog.json:
    purpose: Canonical contract for anonymized seed-data snapshot classes and storage paths
    owner: human
    format: JSON
    use_for: Building deterministic tiny/standard/recovery seed snapshots and resolving the managed backup-lv3 store
    update_when: Adjusting seed classes, dataset volumes, or storage locations
    validation: "uv run --with pyyaml --with jsonschema python scripts/validate_repository_data_models.py --validate"

  config/network-impairment-matrix.yaml:
    purpose: Canonical ADR 0189 matrix of governed latency, loss, and outage profiles for preview and staging fault drills
    owner: human
    format: YAML
    use_for: Declaring named network impairment scenarios, scope, and allowed execution surfaces
    update_when: Adding or changing governed impairment profiles, preview/staging eligibility, or scenario metadata
    validation: "uv run --with pyyaml --with jsonschema python scripts/validate_repository_data_models.py --validate"
    related_files:
      - "platform/faults/network_impairment_matrix.py: typed loader and execution helpers"
      - "scripts/network_impairment_matrix.py: CLI and repo-surface validation"
      - "config/windmill/scripts/network-impairment-matrix.py: mirrored worker entrypoint"
      - "docs/runbooks/network-impairment-matrix.md: operator procedure"

  config/provider-boundary-catalog.yaml:
    purpose: Canonical ADR 0207 catalog of provider boundaries that must translate raw provider payloads into canonical internal facts
    owner: human
    format: YAML
    use_for: Declaring which provider integrations are governed by anti-corruption validation and how their implementation guardrails are enforced
    update_when: Adding a new critical provider boundary or tightening the validation contract for an existing one
    validation: "uv run --with pyyaml python scripts/provider_boundary_catalog.py --validate"
    related_files:
      - "scripts/provider_boundary_catalog.py: validator and catalog reader"
      - "docs/runbooks/subdomain-governance.md: operator workflow for DNS-boundary usage"
      - "docs/runbooks/validation-gate.md: remote and post-merge validation path"

  policy/:
    purpose: Canonical ADR 0230 shared Rego bundle for Open Policy Agent and Conftest decisions
    owner: human
    format: "Rego modules and tests"
    use_for: Command approval, promotion eligibility, runner admission, and repository invariant checks through one shared policy engine
    update_when: Adding or changing governed decision logic that must stay consistent across controller and worker callers
    validation: "python3 scripts/policy_checks.py --validate"
    related_files:
      - "platform/policy/engine.py: shared Python adapters around OPA evaluation"
      - "scripts/policy_toolchain.py: local and remote OPA or Conftest bootstrap helper"
      - "policy/tests/: Rego policy test coverage"

  config/command-catalog.json:
    purpose: Canonical catalog of governed mutating commands, approval policies, and execution profiles
    owner: human
    format: JSON
    use_for: Declaring which command ids exist, which approval policy each uses, and which runtime envelope executes them
    update_when: Adding or changing recurring mutating command surfaces, approval classes, or execution profiles
    validation: "python3 scripts/command_catalog.py --validate"
    related_files:
      - "policy/decisions/command_approval.rego: ADR 0230 shared approval decision logic"
      - "scripts/command_catalog.py: catalog validator and approval evaluator"
      - "docs/runbooks/command-catalog-and-approval-gates.md: operator procedure"

  config/workflow-catalog.json:
    purpose: Canonical workflow registry for operator and automation entrypoints
    owner: human
    format: JSON
    use_for: Resolving preferred entrypoints, runbooks, verification commands, and worker-mirrored workflow wrappers including ADR 0251 smoke-suite entrypoints
    update_when: Adding or changing reusable workflows or their implementation references
    validation: "python3 scripts/workflow_catalog.py --validate"
    related_files:
      - "config/command-catalog.json: command layer that references these workflow ids"
      - "config/worktree-bootstrap-manifests.json: generated-artifact and local-helper bootstrap inputs referenced by workflow preflight"
      - "config/windmill/scripts/: worker-side wrappers for selected workflows"
      - "docs/runbooks/command-catalog-and-approval-gates.md: operator procedure"

  config/worktree-bootstrap-manifests.json:
    purpose: Canonical fresh-worktree bootstrap manifest catalog for generated artifacts and controller-local helper inputs
    owner: human
    format: JSON
    use_for: Declaring which governed workflows may auto-materialize generated artifacts and which local helper paths must fail early
    update_when: Adding or changing worktree bootstrap requirements for a governed workflow
    validation: "uv run --with pyyaml python scripts/workflow_catalog.py --validate"
    related_files:
      - "config/workflow-catalog.json: workflows that reference bootstrap manifest ids"
      - "scripts/preflight_controller_local.py: controller-side preflight executor"
      - "docs/runbooks/controller-local-secrets-and-preflight.md: operator procedure"

  config/persona-catalog.json:
    purpose: Canonical persona catalog for shared human launcher defaults and purpose-focused navigation
    owner: human
    format: JSON
    use_for: Declaring the operator personas, their preferred launcher purposes, and their default favorites
    update_when: Adding or changing shared persona defaults for first-party browser navigation
    validation: "uv run --with pyyaml --with jsonschema python scripts/validate_repository_data_models.py --validate"
    related_files:
      - "docs/schema/persona-catalog.schema.json: JSON Schema for launcher persona metadata"
      - "scripts/ops_portal/app.py: interactive launcher rendering and session-backed preferences"
      - "docs/runbooks/platform-operations-portal.md: operator usage of the shared launcher"

  playbooks/site.yml:
    purpose: Main site playbook — full host bootstrap from bare Debian 13
    owner: human  # maintained by platform team
    format: Ansible playbook YAML
    use_for: Complete host setup from Debian 13
    metadata_header: Check lines 1–30 for Purpose/Inputs/Outputs/Dependencies
    runs_when: Fresh Debian 13 installed or full site refresh
    validation: "ansible-playbook --syntax-check"

  playbooks/bootstrap.yml:
    purpose: Bootstrap — initial SSH access and base packages
    owner: human
    format: Ansible playbook YAML
    use_for: First-run access and initial security setup
    runs_when: Immediately after OS installation

  playbooks/.metadata-template.yml:
    purpose: Template for new playbook metadata headers (ADR 0165)
    owner: human  # reference template
    format: YAML comments
    use_for: Copy this header into every new playbook
    validation: "grep '# Purpose:' <playbook>"

  collections/ansible_collections/lv3/platform/roles/:
    purpose: Custom Ansible roles for this platform (PRIMARY roles location)
    owner: human
    format: Standard Ansible role structure
    metadata: "Check meta/main.yml for each role's documented contract"
    use_for: All infrastructure automation roles

  roles/:
    purpose: Legacy roles (prefer collections/ for new work)
    owner: human
    format: Standard Ansible role structure
    use_for: Older roles not yet migrated to collections

# ============================================================================
# SERVICE CONFIGURATION
# ============================================================================

service_configuration:

  config/:
    purpose: Service configuration files for all deployed services
    owner: human  # templated by Ansible
    format: "YAML/JSON/CONF — service-specific formats"
    use_for: Service-level customisation beyond environment defaults
    update_when: Changing service behaviour
    structure: "One subdirectory per service: config/<service>/"
    deployment: Copied to service at deploy time via Ansible

  config/service-capability-catalog.json:
    purpose: Machine-readable catalog of all service capabilities
    owner: automation  # generated by scripts/service_catalog.py
    format: JSON
    use_for: Declaring service metadata, environment bindings, and ADR 0251 stage-ready smoke suite ids per environment
    update_by: "scripts/service_catalog.py --write"

  config/stage-smoke-suites.json:
    purpose: Canonical ADR 0251 catalog of stage-scoped smoke suites mapped to service ids and environments
    owner: human
    format: JSON
    use_for: Declaring which smoke suites exist, which integration targets they run, and which services can claim stage-ready evidence
    update_when: Adding a new smoke suite, changing test selection, or promoting a service/environment into ADR 0251 enforcement
    validation: "python3 scripts/stage_smoke_suites.py --validate"
    related_files:
      - "docs/schema/stage-smoke-suites.schema.json: JSON schema for the smoke-suite catalog"
      - "config/service-capability-catalog.json: environment bindings that reference smoke_suite_ids"
      - "scripts/stage_smoke_suites.py: catalog validation and execution runner"
      - "docs/runbooks/integration-test-suite.md: operator workflow"

  config/capability-contract-catalog.json:
    purpose: Contract-first catalog for critical shared platform capabilities and their current product selections
    owner: human
    format: JSON
    use_for: Defining capability requirements before selecting or replacing a critical product surface
    update_when: Adding or changing a critical product selection, or tightening the shared capability contract
    validation: "uv run --with pyyaml --with jsonschema python scripts/capability_contracts.py --validate"
    related_files:
      - "docs/schema/capability-contract-catalog.schema.json: JSON Schema for the contract catalog"
      - "scripts/capability_contracts.py: Validation, CLI inspection, and manifest summaries"
      - "docs/runbooks/capability-contract-catalog.md: Operator workflow for contract-first product choices"

  config/immutable-guest-replacement-catalog.json:
    purpose: Guest-level ADR 0191 policy for immutable replacement, validation mode, and documented in-place exceptions
    owner: human
    format: JSON
    use_for: Determining which production guests default to immutable replacement instead of in-place mutation
    update_when: Changing the replacement policy, preview method, or rollback window for a governed guest
    validation: "uv run --with pyyaml --with jsonschema python scripts/immutable_guest_replacement.py --validate"
    related_files:
      - "docs/schema/immutable-guest-replacement-catalog.schema.json: JSON Schema for the catalog"
      - "scripts/immutable_guest_replacement.py: Validation, planning, and live-apply guard"
      - "docs/runbooks/immutable-guest-replacement.md: Operator workflow and exception path"

  config/dependency-graph.json:
    purpose: Service dependency graph
    owner: automation
    format: JSON
    update_by: "python scripts/generate_dependency_diagram.py --write"

  config/validation-gate.json:
    purpose: Validation gate configuration for local, remote, and worker post-merge checks
    owner: human
    format: JSON
    use_for: Controlling which validation checks are active, including ADR 0230 policy-validation, ADR 0251 smoke-catalog validation, and ADR 0301 Semgrep SAST on controller, build-server, and Windmill worker paths
    validation: "python3 scripts/gate_status.py --repo-path ."
    related_files:
      - "config/build-server.json: remote-validate and remote-pre-push command wiring"
      - "config/validation-lanes.yaml: ADR 0264 lane-to-surface catalog that selects blocking checks"
      - "config/check-runner-manifest.json: runner-image check definitions"
      - "config/semgrep/rules/: local Semgrep rule packs for the semgrep-sast gate"
      - "scripts/run_gate.py: gate orchestrator"
      - "scripts/semgrep_gate.py: shared Semgrep wrapper"
      - "scripts/validation_lanes.py: lane catalog loader and selector"
      - "scripts/policy_checks.py: ADR 0230 policy-validation stage"
      - "scripts/stage_smoke_suites.py: ADR 0251 catalog validation stage"
      - "docs/runbooks/validation-gate.md: operator procedure"

  config/validation-lanes.yaml:
    purpose: ADR 0264 failure-domain-isolated validation-lane catalog
    owner: human
    format: YAML
    use_for: Mapping mutable repository surface classes to blocking validation lanes and fast global invariants
    update_when: Adjusting lane coverage, fast-global invariants, or the changed-surface routing policy
    validation: "python3 scripts/validation_lanes.py --validate"
    related_files:
      - "config/validation-gate.json: runnable check manifest consumed by the lanes"
      - "scripts/validation_lanes.py: catalog loader, validator, and lane resolver"
      - "scripts/run_gate.py: lane-aware gate orchestrator"
      - "docs/runbooks/validation-gate.md: operator procedure"

  config/build-server.json:
    purpose: Canonical build-server remote automation command catalog
    owner: human
    format: JSON
    use_for: Declaring remote lint, validate, pre-push, and image-build entrypoints plus their local fallback commands
    update_when: Adjusting build-server automation or local fallback command contracts
    validation: "python3 scripts/policy_checks.py --validate"
    related_files:
      - "config/check-runner-manifest.json: runner image check definitions consumed by remote validate"
      - "config/validation-gate.json: authoritative enabled gate checks"
      - "config/validation-lanes.yaml: ADR 0264 lane-selection contract"
      - "scripts/remote_exec.sh: dispatch wrapper"

  config/check-runner-manifest.json:
    purpose: Canonical manifest of runner-backed validation checks for remote gate execution
    owner: human
    format: JSON
    use_for: Declaring the exact commands and container images used by the build-server check runners, including the Python-runner Semgrep SAST contract and the shared security runner for Trivy, Gitleaks, and Checkov
    update_when: Adding or changing remote validation checks or their toolchain images
    validation: "python3 scripts/policy_checks.py --validate"
    related_files:
      - "config/build-server.json: remote-validate entrypoint that invokes the manifest"
      - "config/semgrep/rules/: local rule packs mounted into the semgrep-sast check"
      - "scripts/policy_checks.py: ADR 0230 policy-validation check command"
      - "docs/runbooks/validation-gate.md: remote gate procedure"

  docker/docker-compose.yml:
    purpose: Docker Compose reference for services on docker-runtime-lv3
    owner: human  # template
    format: Docker Compose YAML
    use_for: Understanding service dependencies and networking
    validation: docker-compose config

# ============================================================================
# AGENT DISCOVERY FILES
# ============================================================================

agent_discovery:

  .repo-structure.yaml:
    purpose: Machine-readable directory index — ADR 0163
    owner: human  # updated on major reorganisations
    format: YAML
    use_for: Navigating repository structure without tree exploration
    update_when: Adding new top-level directories or major reorganisation

  docs/adr/.index.yaml:
    purpose: Searchable metadata index for all 170+ ADRs — ADR 0164
    owner: automation  # generated by scripts/generate_adr_index.py
    format: YAML
    use_for: Finding relevant ADRs by keyword without reading all files
    update_by: "python scripts/generate_adr_index.py --write"
    update_when: When new ADRs are added or status changes

  AGENTS.md:
    purpose: Rules, conventions, and handoff protocol for LLM agents — ADR 0167
    owner: human  # maintained collaboratively
    format: Markdown
    use_for: Understanding how to work in this repository
    update_when: Learning new lessons or conventions

# ============================================================================
# PROJECT TRACKING
# ============================================================================

project_tracking:

  workstreams.yaml:
    purpose: Active workstream registry — branch, assignee, status, ADR ref
    owner: human and automation
    format: YAML — workstream definitions
    use_for: Tracking parallel work and current projects
    update_when: Starting or completing a workstream
    update_by: Agent at start/end of branch work
    structure: |
      workstreams:
        - name: workstream-name
          branch: codex/adr-XXXX-description
          assignee: claude | codex | human
          status: in-progress | blocked | review-ready | complete
          adr_reference: docs/workstreams/adr-XXXX-workstream-name.md

  docs/workstreams/:
    purpose: ADR-style planning documents for active workstreams
    owner: human and automation
    format: Markdown — follows ADR format
    use_for: Detailed workstream planning and decision records
    creation: Create when starting a new workstream branch
    naming_convention: "adr-XXXX-workstream-name.md"

# ============================================================================
# VALIDATION AND CI
# ============================================================================

validation_and_ci:

  Makefile:
    purpose: Development and operational task runners
    owner: human  # maintained
    format: GNU Make
    use_for: Common tasks (validate, test, build, deploy, generate)
    key_targets:
      - "make validate-data-models"
      - "make test"
      - "make generate-docs"
      - "make pre-push-gate"

  scripts/validate_repo.sh:
    purpose: Local validation runner (called by pre-push hook)
    owner: human  # maintained
    format: Bash
    use_for: Running all validation checks locally before push
    validation_stages: |
      generated-vars, ansible-syntax, yaml, role-argument-specs,
      ansible-lint, data-models, generated-docs, health-probes,
      alert-rules, tofu, agent-standards

  .gitea/workflows/:
    purpose: Gitea Actions CI workflows (PRIMARY CI)
    owner: human
    format: "GitHub Actions-compatible YAML"
    use_for: Local CI on self-hosted Gitea runner
    runs_on: docker-build-lv3 self-hosted runner

  .github/workflows/:
    purpose: GitHub Actions workflows (LEGACY — mirrors Gitea)
    owner: human
    format: GitHub Actions YAML
    use_for: External CI (not primary — Gitea is primary)
