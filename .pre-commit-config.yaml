repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        args:
          - --unsafe
      - id: check-json
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        # Lint scope: scripts introduced in this session. Expand as pre-existing
        # violations (F841, SIM108, etc.) in the broader codebase are remediated.
        files: ^scripts/(validate_cross_catalog_integrity|verify_waiver_escalation|gate_bypass_waivers)\.py$|^tests/test_verify_waiver_escalation\.py$
      - id: ruff-format
        args: [--check]
        files: ^scripts/.*\.py$|^tests/.*\.py$

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        name: bandit security scan (scripts)
        args:
          - "--skip"
          - "B101,B603,B607"
          - "--severity-level"
          - "medium"
        # Scoped to scripts introduced in this session; expand as pre-existing
        # medium/high findings in the broader codebase are triaged and remediated.
        files: ^scripts/(validate_cross_catalog_integrity|verify_waiver_escalation|gate_bypass_waivers)\.py$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
        args:
          - --config=.gitleaks.toml

  - repo: local
    hooks:
      - id: block-local-credential-dir
        name: Block .local from being committed
        entry: "bash -c 'if git diff --cached --name-only | grep -q ^.local; then echo BLOCKED .local must never be committed; exit 1; fi'"
        language: system
        pass_filenames: false
        always_run: true
      - id: published-artifact-secret-scan
        name: Scan published artifacts for secrets
        entry: python3 scripts/published_artifact_secret_scan.py --repo-root .
        language: system
        pass_filenames: false
        files: ^(receipts/.*\.json|\.local/triage/reports/.*\.json|build/search-index/.*\.json|build/changelog-portal/.*\.(html|json))$
      - id: enforce-validation-toolkit
        name: Enforce validation_toolkit pattern for scripts
        entry: bash -c 'scripts/enforce_validation_toolkit.sh'
        language: system
        pass_filenames: false
        files: ^scripts/.*\.py$
        always_run: false
      - id: pyright-ansible-plugins
        name: pyright type-check Ansible filter/callback plugins
        entry: bash -c 'uvx --quiet pyright --pythonversion 3.12 collections/ansible_collections/lv3/platform/plugins/ 2>&1; exit ${PIPESTATUS[0]:-$?}'
        language: system
        pass_filenames: false
        files: ^collections/ansible_collections/lv3/platform/plugins/.*\.py$
        always_run: false
