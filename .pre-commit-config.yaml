repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        args:
          - --unsafe
      - id: check-json
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
        args:
          - --config=.gitleaks.toml
  - repo: local
    hooks:
      - id: published-artifact-secret-scan
        name: Scan published artifacts for secrets
        entry: python3 scripts/published_artifact_secret_scan.py --repo-root .
        language: system
        pass_filenames: false
        files: ^(receipts/.*\.json|\.local/triage/reports/.*\.json|build/search-index/.*\.json|build/changelog-portal/.*\.(html|json))$
