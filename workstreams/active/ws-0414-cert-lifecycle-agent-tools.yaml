notes: |
  Root cause: pre-push hook advertised SKIP_CERT_VALIDATION=1 bypass but
  never checked the env var, forcing operators to use --no-verify.
  Fixes: honor SKIP_CERT_VALIDATION=1 with proper bypass logging.
  Adds: cert_lifecycle_manager.py for programmatic subdomain+cert operations
  (create, delete, renew, revoke, sync-missing) callable from LibreChat agent.
  Adds: cron-based auto-sync for missing certs.
  Adds: --skip-cert-validation mode for deployments without Hetzner DNS API.
  Related postmortem: ADR 0415.
