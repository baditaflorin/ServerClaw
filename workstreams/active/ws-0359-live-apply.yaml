notes: >
  ADR 0359 is already implemented in repo code on origin/main, and this exact-main
  replay starts from origin/main@bbdb0f7008db4bac81c8cc30a287e728b83790a1
  (repo version 0.178.129). On 2026-04-13 the workstream restored active ownership,
  taught lv3.platform.proxmox_guests to fall back from missing specialized template
  VMIDs to live source templates, and then successfully provisioned the previously
  missing postgres-replica, postgres-apps, and postgres-data guests from template
  9000. The exact-main replay then fixed three live gaps the branch exposed:
  postgres_vm default evaluation through the generated platform_host dict,
  pgaudit grant assertions on guests that do not host the audited databases,
  and the missing ADR 0359 registry load / guest-wide 10.10.10.0/24 HBA fallback
  that otherwise allowed cross-database logins. The next step is rebasing this
  verified closeout onto the latest reachable origin/main and finishing the merge.
