notes: >
  ADR 0359 is already implemented in repo code on origin/main. This closeout
  started from the latest realistic 0.178.129 base
  origin/main@bbdb0f7008db4bac81c8cc30a287e728b83790a1, provisioned the missing
  postgres-replica, postgres-apps, and postgres-data guests from the live template
  fallback path, then fixed three exact-main replay gaps: postgres_vm default
  evaluation through the generated platform_host dict, pgaudit grant assertions on
  guests that do not host the audited databases, and the missing ADR 0359 registry
  load plus guest-wide 10.10.10.0/24 HBA fallback that otherwise allowed
  cross-database logins. The branch rebased first onto
  origin/main@063e88c0fe49c278cbfe231a345eaebb145ec404 and captured exact-tip
  replay evidence for repo/platform version 0.178.131. Reachable origin/main then
  advanced again to d95efb4e6e59218b7cbccb3a8e61aa95a7b7af72, which already cut
  repo version 0.178.131 for ADR 0413. The final closeout rebased onto that tip,
  cut repo version 0.178.132, replayed `make live-apply-service
  service=postgres-vm env=production` from exact commit
  a968095316c70ebe95858891c0e90fbfa9182a77, refreshed the runtime and least-
  privilege access proofs, and recorded ADR 0359 as live-applied in platform
  version 0.178.132.
