summary: >
  Red-team pentest (2026-04-14) found four external-facing vulnerabilities.
  This workstream hardens: (1) LibreChat open registration disabled by default,
  (2) internal IPs removed from system prompt, (3) Keycloak /admin/ ACL-restricted
  to internal CIDRs, (4) API gateway /docs blocked at nginx edge.
  Regression tests enforce these controls in CI.
