  - Fix immediate certificate issues (ci.lv3.org, bi.lv3.org, etc.)
  - Create ADR 0375 documenting the implementation
  - Integrate into pre-deployment checks and CI/CD gates

success_criteria:
  - All 53 edge-published domains show ✓ Valid in certificate validator
  - No "CERT_MISMATCH" issues reported by validator
  - Playbook fix-edge-certificate.yml successfully regenerates cert with all domains
  - Uptime Kuma monitors created for all edge-published domains
  - ADR 0375 committed and accepted
  - Documentation complete (runbook, setup guide, quick reference)

