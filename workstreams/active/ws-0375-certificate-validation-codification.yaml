notes: |
  Implements the missing validation layer from ADR 0101 and ADR 0273.

  Recent operational issue: ci.lv3.org, bi.lv3.org, grist.lv3.org,
  paperless.lv3.org, annotate.lv3.org, and ntfy.lv3.org all have
  hostname mismatch errors because they are in subdomain-catalog.json
  but missing from the NGINX edge certificate SANs.

  This workstream provides:
  1. Programmatic detection of such mismatches
  2. Automated remediation via certificate regeneration
  3. Continuous monitoring via Uptime Kuma
  4. Documentation and runbooks

