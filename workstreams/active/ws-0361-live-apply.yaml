blockers:
- Live apply blocked on 2026-04-11 because `make converge-semaphore env=production`
  reached the scoped Ansible run and then failed when SSH to `proxmox-host`
  at `100.64.0.1:22` timed out. Direct probes to `65.108.75.123:22`,
  `100.118.189.95:22`, `100.118.189.95:2222`, `10.10.10.92:22`,
  `http://100.64.0.1:8020`, and `https://100.64.0.1:8006/api2/json/` were
  also unreachable from this workstation; `tailscale ping 100.64.0.1` and
  `tailscale ping 10.10.10.92` timed out even though `tailscale status --json`
  still listed the subnet-router peer online, and the installed macOS App
  Store/TestFlight Tailscale build could not provide `tailscale ssh` as a
  fallback. The repo changes are ready but the live mutate remains pending
  restored host reachability.
