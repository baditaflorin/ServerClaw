id: ws-0364-outline-agent-tools
title: 'Outline agent tools: list/search/get/create documents (ADR 0362 + 0364)'
status: in_progress
owner: claude
branch: claude/implement-aw22-23
adr: '0364'
description: 'Implements AW-22 and AW-23 from the Plane task board.


  AW-22: Generic _resolve_service_auth(service_name) helper

  - Adds shared credential discovery to scripts/agent_tool_registry.py

  - Refactors _resolve_plane_auth() to delegate to this helper

  - Enables Outline and future services to follow ADR 0362 without copy-paste


  AW-23: Four Outline agent tools

  - list-outline-collections (observe)

  - search-outline-documents (observe)

  - get-outline-document (observe)

  - create-outline-document (execute, approval_required: true)


  Existing client: scripts/outline_client.py

  Auth: .local/outline/admin-auth.json (needs fresh token — see ADR 0364)

  '
blocker: ".local/outline/api-token.txt has insufficient scope for search/get (only\
  \ public\ncollections.list works without real auth). Operator needs to generate\
  \ a fresh API\ntoken in Outline Settings → API → Personal access token and save\
  \ to:\n  .local/outline/admin-auth.json:\n    { \"base_url\": \"https://wiki.lv3.org\"\
  , \"api_token\": \"<token>\" }\n"
