notes: >
  Branch-local integration closeout restarted from origin/main@0ed784c50 with
  VERSION=0.178.135. Latest main already contains the SFTPGo dependency-graph
  registration, so this branch replays the live-relevant fix to
  playbooks/fix-edge-certificate.yml and carries the repo metadata plus
  generated-artifact repairs required for the current validation gate to pass
  from a clean latest-main worktree. Final validation on the merged-main replay
  passed for semgrep, workstream surfaces, policy, alert rules, agent
  standards, generated docs, OpenTofu validation, and the staging integration
  gate skip path; remaining failures observed during the session were
  pre-existing mainline baseline issues outside this workstream's owned files.
