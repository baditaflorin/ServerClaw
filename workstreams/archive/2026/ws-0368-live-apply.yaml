notes: |
  Purpose-built closure workstream for ADR 0368. Scope covered the remaining
  compose-macro rollout, the later fresh-worktree and data-model drift that
  blocked truthful exact-main replay, the merged-main MinIO, Gitea, and
  Redpanda replays, and the final release-truth updates required once the
  live apply was verified from main.

  Latest realistic origin/main remained
  6aeb26434724680c6da2162cd3544031b5a93f03 during closeout, with repository
  version 0.178.137 and platform version 0.178.133. The workstream repaired
  the Redpanda readiness probe to read back from the produced Kafka offset,
  fixed shared-worktree receipt resolution in the SBOM and managed-image
  helpers, materialized the missing fresh-worktree generated artifacts needed
  for the exact-main MinIO replay, and reran MinIO, Gitea, and Redpanda from
  the merged main candidate.

  Final validation passed for focused pytest, the direct validate_repo gate
  bundle, live-apply receipt schema validation, git diff check,
  check-build-server, and remote-validate. remote-validate exercised the
  governed failure-and-recovery path end to end: the build server could not
  resolve registry.example.com for the validation runner images, and the repo
  then reran the unresolved checks locally with all blocking lanes passing.
  The final origin/main promotion records the governed skip_remote_gate waiver
  in receipts/gate-bypasses/20260414T071925Z-codex-ws-0368-main-publish-r4-b8a2a0d-skip-remote-gate.json
  because clean origin/main still reproduces the untouched whole-repo
  ansible-lint fatal baseline, while the ws-0368 publish branch reran the
  affected fresh-worktree checks locally and cleared the branch-local gate
  regressions before pushing main.
blockers: []
canonical_truth:
