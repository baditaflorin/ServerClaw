description: |
  Implements AW-22 and AW-23 from the Plane task board.

  AW-22: Generic _resolve_service_auth(service_name) helper
  - Adds shared credential discovery to scripts/agent_tool_registry.py
  - Refactors _resolve_plane_auth() to delegate to this helper
  - Enables Outline and future services to follow ADR 0362 without copy-paste

  AW-23: Four Outline agent tools
  - list-outline-collections (observe)
  - search-outline-documents (observe)
  - get-outline-document (observe)
  - create-outline-document (execute, approval_required: true)

  Auth: .local/outline/admin-auth.json — API token created programmatically via
  Outline PostgreSQL DB (see scripts/create_outline_api_token.py for automation).
