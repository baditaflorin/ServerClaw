notes: 'Replays ADR 0381 from the latest realistic origin/main baseline. Scope covers

  the remaining repo truth gaps around session-recovery automation, workstream

  state, focused regression coverage, live apply evidence, and final mainline

  integration after the login path is verified end to end. The exact-main replay
  on 2026-04-12 converged `keycloak`, `configure-edge-publication`, and
  `identity-core-watchdog`, reverified the ops/tasks redirect chain, and
  recorded the canonical mainline receipt against repo version 0.178.126 and
  platform version 0.178.78. Truthful replay from a fresh worktree also repaired
  four latest-main drifts discovered during execution: a missing playbook compose
  macro loader, a Plane OIDC raw Keycloak client update that returned HTTP 400,
  a `librechat.example.com` versus `chat.example.com` shared-edge catalog mismatch,
  and certificate validation resolving `.local` incorrectly when run from worktrees.
  Generated-doc validation on the same fresh worktree also surfaced a repo-root
  import bootstrap bug in `scripts/control_plane_lanes.py`; the final workstream
  state carries that fix and a CLI regression test so `scripts/generate_status_docs.py`
  can run from the repo root without shadowing against the standard-library
  `platform` module. The merge closeout rebased onto reachable `origin/main`
  commit `9afc6d691a9b99e40e8af1cdb2b61005ae8e266c`, corrected the final
  `librechat` capability/certificate bindings, and bounded the ops-portal gate
  probe timeout so the repo automation path completes predictably in a fresh
  worktree.

  '
