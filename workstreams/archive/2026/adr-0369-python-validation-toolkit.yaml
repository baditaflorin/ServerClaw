notes: |
  Rebased ADR 0369 onto origin/main @ fc3e43931 (repo version 0.178.139),
  reran the validator discovery step on that exact tree, and confirmed the
  remaining local require_* definitions were centralized into
  scripts/validation_toolkit.py with plain-assert coverage in
  scripts/test_validation_toolkit.py.

  Verification completed before merge:
  - python3 scripts/test_validation_toolkit.py
  - uv run --with pyyaml --with jsonschema python scripts/validate_repository_data_models.py --validate
  - make validate-data-models
  - make validate-cross-catalog
  - uv run --with pyyaml --with jsonschema python scripts/service_catalog.py --validate

  Main promotion note:
  - The final origin/main push used a governed skip_remote_gate waiver because
    repo-intake.lv3.org still reported a pre-existing certificate mismatch on
    origin/main that was unrelated to ADR 0369. Receipt:
    receipts/gate-bypasses/20260414T081512Z-codex-adr-0369-main-promotion-r2-3509526-skip-remote-gate.json

  Note:
  - make validate-schemas is referenced by ADR 0369 but is not a current Makefile target on latest origin/main; the merge used the repo's current validation targets instead.
