---
- name: Validate Windmill PostgreSQL inputs
  ansible.builtin.assert:
    that:
      - windmill_database_name | length > 0
      - windmill_database_user | length > 0
      - windmill_database_support_role | length > 0
      - windmill_postgres_secret_dir | length > 0
      - windmill_postgres_password_file | length > 0
      - windmill_database_password_local_file | length > 0
    fail_msg: "windmill_postgres requires database names and local or remote password paths."

- name: Ensure the Windmill PostgreSQL secret directory exists
  ansible.builtin.file:
    path: "{{ windmill_postgres_secret_dir }}"
    state: directory
    owner: root
    group: postgres
    mode: "0750"

- name: Generate the Windmill database password
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ windmill_postgres_password_file }}" ]; then
      umask 077
      openssl rand -base64 24 | tr -d '\n' > "{{ windmill_postgres_password_file }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: windmill_postgres_password_generation
  changed_when: "'changed' in windmill_postgres_password_generation.stdout"
  no_log: true

- name: Read the Windmill database password
  ansible.builtin.slurp:
    src: "{{ windmill_postgres_password_file }}"
  register: windmill_postgres_password_raw
  no_log: true

- name: Record the Windmill database password
  ansible.builtin.set_fact:
    windmill_database_password: "{{ windmill_postgres_password_raw.content | b64decode | trim }}"
  no_log: true

- name: Ensure the local Windmill artifact directory exists
  ansible.builtin.file:
    path: "{{ windmill_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Mirror the Windmill database password to the control machine
  ansible.builtin.copy:
    dest: "{{ windmill_database_password_local_file }}"
    content: "{{ windmill_database_password }}\n"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

- name: Check whether the Windmill support role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ windmill_database_support_role }}'"
  register: windmill_postgres_support_role_check
  changed_when: false

- name: Create the Windmill support role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "CREATE ROLE {{ windmill_database_support_role }}"
  when: windmill_postgres_support_role_check.stdout != "1"
  changed_when: true

- name: Check whether the Windmill admin role already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_roles WHERE rolname = '{{ windmill_database_user }}'"
  register: windmill_postgres_admin_role_check
  changed_when: false

- name: Create the Windmill admin role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - >-
        CREATE ROLE {{ windmill_database_user }} LOGIN BYPASSRLS
        PASSWORD '{{ windmill_database_password }}' IN ROLE {{ windmill_database_support_role }}
  when: windmill_postgres_admin_role_check.stdout != "1"
  changed_when: true
  no_log: true

- name: Grant the Windmill support role to the admin role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "GRANT {{ windmill_database_support_role }} TO {{ windmill_database_user }}"
  changed_when: false

- name: Check whether the Windmill PostgreSQL database already exists
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -Atqc
      - "SELECT 1 FROM pg_database WHERE datname = '{{ windmill_database_name }}'"
  register: windmill_postgres_database_check
  changed_when: false

- name: Create the Windmill PostgreSQL database
  become: true
  become_user: postgres
  ansible.builtin.shell: >
    psql -v ON_ERROR_STOP=1
    -c "CREATE DATABASE {{ windmill_database_name }} OWNER {{ windmill_database_user }}"
  args:
    executable: /bin/bash
  when: windmill_postgres_database_check.stdout != "1"
  changed_when: true

- name: Ensure the Windmill database owner is correct
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER DATABASE {{ windmill_database_name }} OWNER TO {{ windmill_database_user }}"
  changed_when: false

- name: Ensure the Windmill support role can access public tables
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -d
      - "{{ windmill_database_name }}"
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "GRANT ALL ON ALL TABLES IN SCHEMA public TO {{ windmill_database_support_role }}"
  changed_when: false

- name: Ensure the Windmill support role can access public sequences
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -d
      - "{{ windmill_database_name }}"
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO {{ windmill_database_support_role }}"
  changed_when: false

- name: Ensure future Windmill tables grant privileges to the support role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -d
      - "{{ windmill_database_name }}"
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO {{ windmill_database_support_role }}"
  changed_when: false

- name: Ensure future Windmill sequences grant privileges to the support role
  become: true
  become_user: postgres
  ansible.builtin.command:
    argv:
      - psql
      - -d
      - "{{ windmill_database_name }}"
      - -v
      - ON_ERROR_STOP=1
      - -c
      - "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO {{ windmill_database_support_role }}"
  changed_when: false
