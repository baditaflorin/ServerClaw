control_plane_recovery_store_required_windmill_paths:
  - opt/windmill/docker-compose.yml
  - etc/lv3/windmill/superadmin-secret
control_plane_recovery_store_required_mail_paths:
  - opt/mail-platform/docker-compose.yml
  - opt/mail-platform/stalwart/etc/config.toml
  - etc/lv3/mail-platform/gateway-api-key
control_plane_recovery_store_required_controller_bundle_paths:
  - step-ca/step-ca/certs/root_ca.crt
  - openbao/openbao/init.json
  - windmill/windmill/superadmin-secret.txt
