---
- name: Disable enterprise repository when using no-subscription channel
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/pve-enterprise.sources
    state: absent
  when: proxmox_repo_channel != "pve-enterprise"

- name: Install Debian prerequisite packages
  ansible.builtin.apt:
    name: "{{ debian_prereq_packages }}"
    state: present
    update_cache: true

- name: Download Proxmox archive keyring
  ansible.builtin.get_url:
    url: "{{ proxmox_key_url }}"
    dest: "{{ proxmox_keyring_path }}"
    mode: "0644"
    checksum: "{{ proxmox_key_checksum }}"

- name: Configure Proxmox package repository
  ansible.builtin.template:
    src: proxmox.sources.j2
    dest: "{{ proxmox_repo_file }}"
    mode: "0644"

- name: Update apt cache after repository changes
  ansible.builtin.apt:
    update_cache: true

- name: Fully upgrade Debian base packages
  ansible.builtin.apt:
    upgrade: dist
    autoremove: false
