---
loki_log_agent_prereq_packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gpg
loki_log_agent_packages:
  - alloy
loki_log_agent_keyring_dir: /etc/apt/keyrings
loki_log_agent_repo_key_url: "{{ monitoring_grafana_repo_key_url }}"
loki_log_agent_repo_keyring: "{{ monitoring_grafana_repo_keyring }}"
loki_log_agent_repo_file: "{{ monitoring_grafana_repo_file }}"
loki_log_agent_config_file: /etc/alloy/config.alloy
loki_log_agent_service_name: alloy
loki_log_agent_hostname: "{{ inventory_hostname }}"
loki_log_agent_role: "{{ inventory_hostname }}"
loki_log_agent_environment: lv3
loki_log_agent_lane: private
loki_log_agent_loki_push_url: "{{ monitoring_loki_push_api_url }}"
loki_log_agent_journal_enabled: true
loki_log_agent_journal_max_age: 24h
loki_log_agent_nginx_logs_enabled: false
loki_log_agent_nginx_access_logs:
  - /var/log/nginx/access.log
loki_log_agent_nginx_error_logs:
  - /var/log/nginx/error.log
loki_log_agent_docker_logs_enabled: false
loki_log_agent_docker_host: unix:///var/run/docker.sock
loki_log_agent_docker_refresh_interval: 30s
loki_log_agent_additional_groups:
  - adm
  - systemd-journal
