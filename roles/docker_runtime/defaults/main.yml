---
docker_runtime_prereq_packages:
  - ca-certificates
  - curl

docker_runtime_conflicting_packages:
  - docker.io
  - docker-buildx
  - docker-compose
  - docker-doc
  - podman-docker
  - containerd
  - runc

docker_runtime_apt_key_url: https://download.docker.com/linux/debian/gpg
docker_runtime_apt_keyring_path: /etc/apt/keyrings/docker.asc
docker_runtime_apt_repo_file: /etc/apt/sources.list.d/docker.sources
docker_runtime_apt_repo_uri: https://download.docker.com/linux/debian
docker_runtime_apt_repo_component: stable

docker_runtime_engine_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

docker_runtime_admin_users:
  - "{{ proxmox_guest_ci_user }}"

docker_runtime_daemon_config:
  live-restore: true
  log-driver: json-file
  log-opts:
    max-size: "10m"
    max-file: "5"
