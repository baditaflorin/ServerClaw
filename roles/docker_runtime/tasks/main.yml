---
- name: Validate Docker runtime inputs
  ansible.builtin.assert:
    that:
      - docker_runtime_prereq_packages | length > 0
      - docker_runtime_conflicting_packages | length > 0
      - docker_runtime_engine_packages | length > 0
      - docker_runtime_admin_users | length > 0
      - docker_runtime_apt_key_url | length > 0
      - docker_runtime_apt_keyring_path | length > 0
      - docker_runtime_apt_repo_file | length > 0
      - docker_runtime_apt_repo_uri | length > 0
    fail_msg: "docker_runtime requires package, repository, and admin user inputs."

- name: Install Docker repository prerequisites
  ansible.builtin.apt:
    name: "{{ docker_runtime_prereq_packages }}"
    state: present
    update_cache: true

- name: Ensure apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker apt key
  ansible.builtin.get_url:
    url: "{{ docker_runtime_apt_key_url }}"
    dest: "{{ docker_runtime_apt_keyring_path }}"
    mode: "0644"

- name: Configure Docker apt repository
  ansible.builtin.template:
    src: docker.sources.j2
    dest: "{{ docker_runtime_apt_repo_file }}"
    mode: "0644"

- name: Remove conflicting Docker packages
  ansible.builtin.apt:
    name: "{{ docker_runtime_conflicting_packages }}"
    state: absent

- name: Install Docker runtime packages
  ansible.builtin.apt:
    name: "{{ docker_runtime_engine_packages }}"
    state: present
    update_cache: true

- name: Ensure docker admin group exists
  ansible.builtin.group:
    name: docker
    state: present

- name: Grant operator access to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_runtime_admin_users }}"

- name: Ensure Docker config directory exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: "0755"

- name: Render Docker daemon configuration
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    mode: "0644"
  notify: restart docker

- name: Ensure Docker service is enabled and running
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
