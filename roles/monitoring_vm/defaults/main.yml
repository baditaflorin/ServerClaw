monitoring_otelcol_deb_file: /tmp/otelcol-contrib_0.148.0_linux_amd64.deb
monitoring_otelcol_config_file: /etc/otelcol-contrib/config.yaml
monitoring_otelcol_grpc_port: 4317
monitoring_otelcol_http_port: 4318
monitoring_otelcol_health_port: 13133
monitoring_otelcol_metrics_port: 8888
monitoring_otel_resource_environment: lv3
