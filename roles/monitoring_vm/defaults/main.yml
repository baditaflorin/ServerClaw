---
monitoring_grafana_repo_key_url: https://apt.grafana.com/gpg-full.key
monitoring_grafana_repo_keyring: /etc/apt/keyrings/grafana.asc
monitoring_grafana_repo_file: /etc/apt/sources.list.d/grafana.list
monitoring_stack_packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gpg
  - grafana
  - influxdb2
  - influxdb2-cli
  - prometheus
monitoring_stack_dir: /etc/lv3/monitoring
monitoring_grafana_admin_user: admin
monitoring_grafana_admin_password_file: /etc/lv3/monitoring/grafana-admin-password
monitoring_grafana_admin_password_hash_file: /var/lib/grafana/.lv3-admin-password.sha256
monitoring_grafana_datasource_name: InfluxDB Proxmox
monitoring_grafana_datasource_token_file: /etc/lv3/monitoring/grafana-reader.token
monitoring_grafana_provisioning_file: /etc/grafana/provisioning/datasources/influxdb-proxmox.yml
monitoring_grafana_prometheus_datasource_name: Prometheus Service Graphs
monitoring_grafana_prometheus_datasource_uid: lv3-prometheus
monitoring_grafana_prometheus_provisioning_file: /etc/grafana/provisioning/datasources/prometheus-service-graphs.yml
monitoring_grafana_tempo_datasource_name: Tempo
monitoring_grafana_tempo_datasource_uid: lv3-tempo
monitoring_grafana_tempo_provisioning_file: /etc/grafana/provisioning/datasources/tempo-traces.yml
monitoring_grafana_folder_uid: lv3
monitoring_grafana_folder_title: LV3
monitoring_grafana_dashboard_dir: /var/lib/grafana/dashboards/lv3
monitoring_grafana_dashboard_file: /var/lib/grafana/dashboards/lv3/lv3-platform-overview.json
monitoring_grafana_dashboard_uid: lv3-platform-overview
monitoring_grafana_dashboard_title: LV3 Platform Overview
monitoring_grafana_vm_dashboard_dir: /var/lib/grafana/dashboards/lv3/vms
monitoring_grafana_mail_dashboard_file: /var/lib/grafana/dashboards/lv3/lv3-mail-platform.json
monitoring_grafana_mail_dashboard_uid: lv3-mail-platform
monitoring_grafana_mail_dashboard_title: LV3 Mail Platform
monitoring_influxdb_admin_user: lv3-monitoring-admin
monitoring_influxdb_admin_password_file: /etc/lv3/monitoring/influxdb-admin-password
monitoring_influxdb_operator_token_file: /etc/lv3/monitoring/influxdb-operator.token
monitoring_influxdb_proxmox_writer_token_file: /etc/lv3/monitoring/influxdb-proxmox-writer.token
monitoring_influxdb_proxmox_writer_description: lv3-proxmox-writer
monitoring_influxdb_guest_writer_token_file: /etc/lv3/monitoring/influxdb-guest-writer.token
monitoring_influxdb_guest_writer_description: lv3-guest-writer
monitoring_influxdb_grafana_reader_description: lv3-grafana-reader
monitoring_prometheus_service_name: lv3-prometheus
monitoring_prometheus_service_file: /etc/systemd/system/lv3-prometheus.service
monitoring_prometheus_config_file: /etc/prometheus/prometheus.yml
monitoring_prometheus_data_dir: /var/lib/prometheus
monitoring_prometheus_retention_time: 15d
monitoring_prometheus_remote_write_url: http://127.0.0.1:9090/api/v1/write
