---
- name: Validate Linux access inputs
  ansible.builtin.assert:
    that:
      - linux_access_admin_user | length > 0
      - linux_access_admin_comment | length > 0
      - linux_access_admin_shell | length > 0
      - linux_access_sudo_group | length > 0
      - linux_access_ssh_hardening_file | length > 0
      - bootstrap_authorized_key_path | length > 0
    fail_msg: "linux_access requires admin identity, SSH hardening path, and bootstrap key inputs."

- name: Ensure non-root admin user exists
  ansible.builtin.user:
    name: "{{ linux_access_admin_user }}"
    comment: "{{ linux_access_admin_comment }}"
    shell: "{{ linux_access_admin_shell }}"
    groups: "{{ linux_access_sudo_group }}"
    append: true
    create_home: true
    password_lock: true
    state: present

- name: Install authorized key for non-root admin user
  ansible.posix.authorized_key:
    user: "{{ linux_access_admin_user }}"
    state: present
    key: "{{ lookup('file', bootstrap_authorized_key_path) | trim }}"

- name: Allow passwordless sudo for non-root admin user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/90-{{ linux_access_admin_user }}"
    mode: "0440"
    content: "{{ linux_access_admin_user }} ALL=(ALL) NOPASSWD:ALL\n"
    validate: "/usr/sbin/visudo -cf %s"

- name: Render SSH hardening drop-in
  ansible.builtin.copy:
    dest: "{{ linux_access_ssh_hardening_file }}"
    mode: "0644"
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PubkeyAuthentication yes
      PermitRootLogin {{ linux_access_permit_root_login }}
      PermitEmptyPasswords no
    validate: "/usr/sbin/sshd -t -f %s"
  register: linux_access_ssh_hardening_dropin

- name: Validate full SSH daemon configuration
  ansible.builtin.command: /usr/sbin/sshd -t
  changed_when: false

- name: Reload ssh service after hardening change
  ansible.builtin.service:
    name: ssh
    state: reloaded
  when: linux_access_ssh_hardening_dropin.changed
