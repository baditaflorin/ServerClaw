---
argument_specs:
  main:
    short_description: Provision the PostgreSQL role and database required by Keycloak.
    options:
      keycloak_database_name:
        type: str
        required: true
        description:
          - PostgreSQL database name that Keycloak should own.
      keycloak_database_user:
        type: str
        required: true
        description:
          - PostgreSQL login role used by Keycloak.
      keycloak_postgres_secret_dir:
        type: path
        required: true
        description:
          - Guest-local directory where the generated database password is stored.
      keycloak_postgres_password_file:
        type: path
        required: true
        description:
          - Guest-local file containing the generated database password.
      keycloak_local_artifact_dir:
        type: path
        required: true
        description:
          - Controller-local directory used to mirror Keycloak bootstrap artifacts.
      keycloak_database_password_local_file:
        type: path
        required: true
        description:
          - Controller-local file used to mirror the database password.
