---
- name: Validate OpenBao runtime inputs
  ansible.builtin.assert:
    that:
      - openbao_image | length > 0
      - openbao_container_name | length > 0
      - openbao_site_dir | length > 0
      - openbao_config_file | length > 0
      - openbao_compose_file | length > 0
      - openbao_local_artifact_dir | length > 0
      - openbao_init_local_file | length > 0
      - openbao_postgres_host | length > 0
      - openbao_postgres_admin_role | length > 0
      - not openbao_tls_enabled or openbao_tls_dir | length > 0
      - not openbao_tls_enabled or openbao_tls_server_cert_file | length > 0
      - not openbao_tls_enabled or openbao_tls_server_key_file | length > 0
      - not openbao_tls_enabled or openbao_tls_client_ca_file | length > 0
      - not openbao_tls_enabled or (openbao_controller_url | default('')) | length > 0
      - not openbao_tls_enabled or (step_ca_internal_url | default('')) | length > 0
      - not openbao_tls_enabled or (step_ca_services_password_file | default('')) | length > 0
      - not openbao_tls_enabled or (step_ca_remote_root_certificate_file | default('')) | length > 0
    fail_msg: "openbao_runtime requires image, filesystem paths, local artifact paths, and PostgreSQL backend inputs."

- name: Ensure OpenBao local artifact directory exists
  ansible.builtin.file:
    path: "{{ openbao_local_artifact_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Ensure generated OpenBao local password files exist
  ansible.builtin.shell: |
    set -euo pipefail
    if [ ! -s "{{ item.path }}" ]; then
      umask 077
      openssl rand -base64 24 > "{{ item.path }}"
      echo changed
    fi
  args:
    executable: /bin/bash
  loop:
    - path: "{{ openbao_ops_password_local_file }}"
    - path: "{{ openbao_breakglass_password_local_file }}"
    - path: "{{ openbao_postgres_rotator_password_local_file }}"
  delegate_to: localhost
  become: false
  register: openbao_local_password_generation
  changed_when: "'changed' in openbao_local_password_generation.stdout"
  no_log: true

- name: Check whether the OpenBao init payload exists locally
  ansible.builtin.stat:
    path: "{{ openbao_init_local_file }}"
  delegate_to: localhost
  become: false
  register: openbao_init_payload_local
  no_log: true

- name: Reset the OpenBao data and log directories before first initialization
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ openbao_data_dir }}"
    - "{{ openbao_log_dir }}"
  when: not openbao_init_payload_local.stat.exists

- name: Read the OpenBao userpass and rotator passwords from the control machine
  ansible.builtin.slurp:
    src: "{{ item }}"
  loop:
    - "{{ openbao_ops_password_local_file }}"
    - "{{ openbao_breakglass_password_local_file }}"
    - "{{ openbao_postgres_rotator_password_local_file }}"
  delegate_to: localhost
  become: false
  register: openbao_password_payloads
  no_log: true

- name: Record OpenBao password facts
  ansible.builtin.set_fact:
    openbao_ops_password: "{{ openbao_password_payloads.results[0].content | b64decode | trim }}"
    openbao_breakglass_password: "{{ openbao_password_payloads.results[1].content | b64decode | trim }}"
    openbao_postgres_rotator_password: "{{ openbao_password_payloads.results[2].content | b64decode | trim }}"
  no_log: true

- name: Ensure OpenBao runtime prerequisite packages are present
  ansible.builtin.apt:
    name:
      - curl
    state: present
    update_cache: true

- name: Ensure OpenBao runtime directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ openbao_site_dir }}"
      mode: "0755"
      owner: root
      group: root
    - path: "{{ openbao_config_dir }}"
      mode: "0755"
      owner: "{{ openbao_runtime_uid }}"
      group: "{{ openbao_runtime_gid }}"
    - path: "{{ openbao_data_dir }}"
      mode: "0700"
      owner: "{{ openbao_runtime_uid }}"
      group: "{{ openbao_runtime_gid }}"
    - path: "{{ openbao_log_dir }}"
      mode: "0700"
      owner: "{{ openbao_runtime_uid }}"
      group: "{{ openbao_runtime_gid }}"
    - path: "{{ openbao_tls_dir }}"
      mode: "0750"
      owner: "{{ openbao_runtime_uid }}"
      group: "{{ openbao_runtime_gid }}"
    - path: "{{ openbao_policy_dir }}"
      mode: "0755"
      owner: "{{ openbao_runtime_uid }}"
      group: "{{ openbao_runtime_gid }}"

- name: Mirror the step-ca root certificate for OpenBao TLS trust
  ansible.builtin.copy:
    remote_src: true
    src: "{{ step_ca_remote_root_certificate_file }}"
    dest: "{{ openbao_tls_client_ca_file }}"
    owner: "{{ openbao_runtime_uid }}"
    group: "{{ openbao_runtime_gid }}"
    mode: "0644"
  when: openbao_tls_enabled

- name: Issue or renew the OpenBao external TLS certificate
  ansible.builtin.shell: |
    set -euo pipefail
    if [ -s "{{ openbao_tls_server_cert_file }}" ] && \
      openssl x509 -checkend {{ openbao_tls_cert_renew_before_seconds }} -noout -in "{{ openbao_tls_server_cert_file }}" >/dev/null 2>&1; then
      exit 0
    fi

    step ca certificate \
      --force \
      --no-password \
      --insecure \
      --provisioner services \
      --provisioner-password-file "{{ step_ca_services_password_file }}" \
      --ca-url "{{ step_ca_internal_url }}" \
      --root "{{ step_ca_remote_root_certificate_file }}" \
    {% for san in openbao_tls_server_sans %}
      --san "{{ san }}" \
    {% endfor %}
      --not-after 24h \
      "{{ hostvars['proxmox_florin'].management_tailscale_ipv4 }}" \
      "{{ openbao_tls_server_cert_file }}" \
      "{{ openbao_tls_server_key_file }}"

    chown {{ openbao_runtime_uid }}:{{ openbao_runtime_gid }} "{{ openbao_tls_server_cert_file }}" "{{ openbao_tls_server_key_file }}"
    chmod 0644 "{{ openbao_tls_server_cert_file }}"
    chmod 0600 "{{ openbao_tls_server_key_file }}"
    echo changed
  args:
    executable: /bin/bash
  register: openbao_tls_certificate_issue
  changed_when: "'changed' in openbao_tls_certificate_issue.stdout"
  no_log: true
  when: openbao_tls_enabled

- name: Render OpenBao policy files
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ openbao_policy_dir }}/{{ item.name }}.hcl"
    owner: root
    group: root
    mode: "0640"
  loop: "{{ openbao_policies }}"

- name: Render OpenBao server configuration
  ansible.builtin.template:
    src: openbao.hcl.j2
    dest: "{{ openbao_config_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Render the OpenBao Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ openbao_compose_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Pull the OpenBao image
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ openbao_compose_file }}"
      - pull
  args:
    chdir: "{{ openbao_site_dir }}"
  register: openbao_pull
  changed_when: >-
    'Downloaded newer image' in openbao_pull.stdout
    or 'Pull complete' in openbao_pull.stdout
    or 'Pulling' in openbao_pull.stdout

- name: Start the OpenBao stack
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - --file
      - "{{ openbao_compose_file }}"
      - up
      - -d
      - --force-recreate
      - --remove-orphans
  args:
    chdir: "{{ openbao_site_dir }}"
  register: openbao_up
  changed_when: >-
    'Creating' in openbao_up.stdout
    or 'Recreating' in openbao_up.stdout
    or 'Starting' in openbao_up.stdout

- name: Wait for OpenBao to listen on loopback
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ openbao_http_port }}"
    delay: 0
    timeout: 120

- name: Read OpenBao initialization status
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/init"
    method: GET
    return_content: true
  register: openbao_init_status

- name: Fail if OpenBao is initialized remotely but the local init payload is missing
  ansible.builtin.fail:
    msg: >-
      OpenBao is already initialized on {{ inventory_hostname }} but
      {{ openbao_init_local_file }} is missing on the control machine.
      Restore the controller-local init payload before rerunning automation.
  when:
    - openbao_init_status.json.initialized | bool
    - not openbao_init_payload_local.stat.exists

- name: Fail if a local init payload exists but the remote service is not initialized
  ansible.builtin.fail:
    msg: >-
      {{ openbao_init_local_file }} exists on the control machine, but OpenBao on
      {{ inventory_hostname }} is not initialized. Resolve the drift before rerunning automation.
  when:
    - not (openbao_init_status.json.initialized | bool)
    - openbao_init_payload_local.stat.exists

- name: Initialize OpenBao
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/init"
    method: POST
    body_format: json
    body:
      secret_shares: "{{ openbao_init_key_shares }}"
      secret_threshold: "{{ openbao_init_key_threshold }}"
    return_content: true
    status_code: 200
  when:
    - not (openbao_init_status.json.initialized | bool)
    - not openbao_init_payload_local.stat.exists
  register: openbao_init_response
  changed_when: true
  no_log: true

- name: Persist the OpenBao init payload locally
  ansible.builtin.copy:
    dest: "{{ openbao_init_local_file }}"
    content: "{{ openbao_init_response.json | to_nice_json }}\n"
    mode: "0600"
  when: openbao_init_response is not skipped
  delegate_to: localhost
  become: false
  no_log: true

- name: Read the OpenBao init payload from the control machine
  ansible.builtin.slurp:
    src: "{{ openbao_init_local_file }}"
  delegate_to: localhost
  become: false
  register: openbao_init_payload_raw
  no_log: true

- name: Record the OpenBao init payload facts
  ansible.builtin.set_fact:
    openbao_init_payload: "{{ openbao_init_payload_raw.content | b64decode | from_json }}"
  no_log: true

- name: Read OpenBao seal status
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/seal-status"
    method: GET
    return_content: true
  register: openbao_seal_status

- name: Unseal OpenBao with the first threshold of recovery keys
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/unseal"
    method: POST
    body_format: json
    body:
      key: "{{ item }}"
    status_code: 200
  loop: "{{ openbao_init_payload.keys_base64[:openbao_init_key_threshold] }}"
  when: openbao_seal_status.json.sealed | bool
  no_log: true

- name: Confirm that OpenBao is unsealed
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/seal-status"
    method: GET
    return_content: true
  register: openbao_unsealed_status

- name: Assert that OpenBao is unsealed
  ansible.builtin.assert:
    that:
      - not (openbao_unsealed_status.json.sealed | bool)
    fail_msg: "OpenBao is still sealed after the managed unseal sequence."

- name: Discover enabled auth methods
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/auth"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    return_content: true
  register: openbao_auth_methods
  no_log: true

- name: Enable userpass auth
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/auth/userpass"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      type: userpass
      description: LV3 named human and break-glass access
    status_code: 204
  when: "'userpass/' not in openbao_auth_methods.json"
  no_log: true

- name: Enable approle auth
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/auth/approle"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      type: approle
      description: LV3 service and agent access
    status_code: 204
  when: "'approle/' not in openbao_auth_methods.json"
  no_log: true

- name: Discover enabled secret engines
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/mounts"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    return_content: true
  register: openbao_secret_engines
  no_log: true

- name: Enable kv-v2 secrets engine
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/mounts/kv"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      type: kv
      description: LV3 managed secret data
      options:
        version: "2"
    status_code: 204
  when: "'kv/' not in openbao_secret_engines.json"
  no_log: true

- name: Enable transit secrets engine
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/mounts/transit"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      type: transit
      description: LV3 managed encryption and signing
    status_code: 204
  when: "'transit/' not in openbao_secret_engines.json"
  no_log: true

- name: Enable database secrets engine
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/mounts/{{ openbao_database_mount_path }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      type: database
      description: LV3 dynamic database credentials
    status_code: 204
  when: "(openbao_database_mount_path ~ '/') not in openbao_secret_engines.json"
  no_log: true

- name: Read rendered policy contents
  ansible.builtin.slurp:
    src: "{{ openbao_policy_dir }}/{{ item.name }}.hcl"
  loop: "{{ openbao_policies }}"
  register: openbao_policy_contents

- name: Read current OpenBao policies
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/policies/acl/{{ item.item.name }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    return_content: true
    status_code:
      - 200
      - 404
  loop: "{{ openbao_policy_contents.results }}"
  register: openbao_current_policies
  no_log: true

- name: Upsert OpenBao policies
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/sys/policies/acl/{{ item.item.item.name }}"
    method: PUT
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      policy: "{{ item.item.content | b64decode }}"
    status_code: 204
  loop: "{{ openbao_current_policies.results }}"
  when: >-
    item.status == 404
    or (item.json.data.policy | default('')) != (item.item.content | b64decode)
  no_log: true

- name: Upsert OpenBao userpass users
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/auth/userpass/users/{{ item.username }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      password: "{{ openbao_ops_password if item.username == 'ops' else openbao_breakglass_password }}"
      policies: "{{ item.policies | join(',') }}"
      token_ttl: "{{ item.token_ttl }}"
      token_max_ttl: "{{ item.token_max_ttl }}"
    status_code: 204
  loop: "{{ openbao_userpass_users }}"
  no_log: true

- name: Upsert OpenBao AppRoles
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/auth/approle/role/{{ item.name }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      token_policies: "{{ item.policies | join(',') }}"
      token_ttl: "{{ item.token_ttl }}"
      token_max_ttl: "{{ item.token_max_ttl }}"
      token_num_uses: "{{ item.token_num_uses }}"
      secret_id_ttl: "{{ item.secret_id_ttl }}"
      secret_id_num_uses: "{{ item.secret_id_num_uses }}"
    status_code: 204
  loop: "{{ openbao_approles }}"
  no_log: true

- name: Read current OpenBao transit keys
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/transit/keys/{{ item }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    return_content: true
    status_code:
      - 200
      - 404
  loop: "{{ openbao_transit_keys }}"
  register: openbao_transit_key_statuses
  no_log: true

- name: Create missing OpenBao transit keys
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/transit/keys/{{ item.item }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      type: aes256-gcm96
    status_code: 200
  loop: "{{ openbao_transit_key_statuses.results }}"
  when: item.status == 404
  no_log: true

- name: Configure the PostgreSQL dynamic credential backend
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/{{ openbao_database_mount_path }}/config/{{ openbao_database_name }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      plugin_name: "{{ openbao_database_plugin_name }}"
      allowed_roles: "{{ openbao_database_allowed_roles | join(',') }}"
      connection_url: "{{ openbao_database_connection_url }}"
      username: "{{ openbao_postgres_admin_role }}"
      password: "{{ openbao_postgres_rotator_password }}"
      password_authentication: "{{ openbao_database_password_authentication }}"
    status_code: 204
  no_log: true

- name: Configure OpenBao database roles
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/{{ openbao_database_mount_path }}/roles/{{ item.name }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      db_name: "{{ item.db_name }}"
      creation_statements: "{{ item.creation_statements }}"
      revocation_statements: "{{ item.revocation_statements }}"
      default_ttl: "{{ item.default_ttl }}"
      max_ttl: "{{ item.max_ttl }}"
    status_code: 204
  loop: "{{ openbao_database_roles }}"

- name: Read current controller Proxmox API secret
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/kv/data/{{ openbao_seeded_secret_paths.controller_proxmox_api }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    return_content: true
    status_code:
      - 200
      - 404
  register: openbao_controller_proxmox_api_current
  no_log: true

- name: Read current controller monitoring secret
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/kv/data/{{ openbao_seeded_secret_paths.controller_monitoring }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    return_content: true
    status_code:
      - 200
      - 404
  register: openbao_controller_monitoring_current
  no_log: true

- name: Read current mail platform runtime secret
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/kv/data/{{ openbao_seeded_secret_paths.mail_platform_runtime }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    return_content: true
    status_code:
      - 200
      - 404
  register: openbao_mail_platform_runtime_current
  no_log: true

- name: Read the controller-local Proxmox API payload
  ansible.builtin.slurp:
    src: "{{ proxmox_api_token_local_file }}"
  delegate_to: localhost
  become: false
  register: openbao_proxmox_api_payload_raw
  no_log: true

- name: Read the controller-local monitoring tokens
  ansible.builtin.slurp:
    src: "{{ item }}"
  loop:
    - "{{ monitoring_proxmox_writer_token_local_file }}"
    - "{{ monitoring_guest_writer_token_local_file }}"
  delegate_to: localhost
  become: false
  register: openbao_monitoring_token_payloads
  no_log: true

- name: Read the controller-local mail platform secrets
  ansible.builtin.slurp:
    src: "{{ item }}"
  loop:
    - "{{ mail_platform_brevo_api_key_local_file }}"
    - "{{ mail_platform_gateway_api_key_local_file }}"
    - "{{ mail_platform_metrics_password_local_file }}"
    - "{{ mail_platform_mailbox_password_local_file }}"
    - "{{ mail_platform_admin_password_local_file }}"
  delegate_to: localhost
  become: false
  register: openbao_mail_platform_secret_payloads
  no_log: true

- name: Record OpenBao seeded secret facts
  ansible.builtin.set_fact:
    openbao_controller_proxmox_api_secret: "{{ openbao_proxmox_api_payload_raw.content | b64decode | from_json }}"
    openbao_controller_monitoring_secret:
      proxmox_writer_token: "{{ openbao_monitoring_token_payloads.results[0].content | b64decode | trim }}"
      guest_writer_token: "{{ openbao_monitoring_token_payloads.results[1].content | b64decode | trim }}"
    openbao_mail_platform_runtime_secret:
      brevo_api_key: "{{ openbao_mail_platform_secret_payloads.results[0].content | b64decode | trim }}"
      gateway_api_key: "{{ openbao_mail_platform_secret_payloads.results[1].content | b64decode | trim }}"
      metrics_password: "{{ openbao_mail_platform_secret_payloads.results[2].content | b64decode | trim }}"
      mailbox_password: "{{ openbao_mail_platform_secret_payloads.results[3].content | b64decode | trim }}"
      stalwart_admin_password: "{{ openbao_mail_platform_secret_payloads.results[4].content | b64decode | trim }}"
  no_log: true

- name: Store controller Proxmox API secret in OpenBao
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/kv/data/{{ openbao_seeded_secret_paths.controller_proxmox_api }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      data: "{{ openbao_controller_proxmox_api_secret }}"
    status_code: 200
  when: >-
    openbao_controller_proxmox_api_current.status == 404
    or (openbao_controller_proxmox_api_current.json.data.data | default({})) != openbao_controller_proxmox_api_secret
  no_log: true

- name: Store controller monitoring tokens in OpenBao
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/kv/data/{{ openbao_seeded_secret_paths.controller_monitoring }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      data: "{{ openbao_controller_monitoring_secret }}"
    status_code: 200
  when: >-
    openbao_controller_monitoring_current.status == 404
    or (openbao_controller_monitoring_current.json.data.data | default({})) != openbao_controller_monitoring_secret
  no_log: true

- name: Store mail platform runtime secrets in OpenBao
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/kv/data/{{ openbao_seeded_secret_paths.mail_platform_runtime }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body:
      data: "{{ openbao_mail_platform_runtime_secret }}"
    status_code: 200
  when: >-
    openbao_mail_platform_runtime_current.status == 404
    or (openbao_mail_platform_runtime_current.json.data.data | default({})) != openbao_mail_platform_runtime_secret
  no_log: true

- name: Read AppRole role IDs
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/auth/approle/role/{{ item.name }}/role-id"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    return_content: true
  loop: "{{ openbao_approles }}"
  register: openbao_approle_role_ids
  no_log: true

- name: Generate fresh short-lived AppRole secret IDs
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/auth/approle/role/{{ item.name }}/secret-id"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_init_payload.root_token }}"
    body_format: json
    body: {}
    return_content: true
    status_code: 200
  loop: "{{ openbao_approles }}"
  register: openbao_generated_secret_ids
  no_log: true

- name: Persist fresh short-lived AppRole artifacts locally
  ansible.builtin.copy:
    dest: "{{ item.item.local_file }}"
    content: "{{ {'role_name': item.item.name, 'auth_path': 'approle', 'role_id': (openbao_approle_role_ids.results | selectattr('item.name', 'equalto', item.item.name) | map(attribute='json.data.role_id') | first), 'secret_id': item.json.data.secret_id, 'secret_id_accessor': item.json.data.secret_id_accessor, 'generated_at': ansible_date_time.iso8601} | to_nice_json }}\n"
    mode: "0600"
  loop: "{{ openbao_generated_secret_ids.results | default([]) }}"
  delegate_to: localhost
  become: false
  no_log: true

- name: Verify userpass login for the ops operator
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/auth/userpass/login/ops"
    method: POST
    body_format: json
    body:
      password: "{{ openbao_ops_password }}"
    return_content: true
    status_code: 200
  register: openbao_ops_login
  no_log: true

- name: Assert that the ops userpass login succeeded
  ansible.builtin.assert:
    that:
      - openbao_ops_login.json.auth.client_token | default('') | length > 0
    fail_msg: "Managed userpass login for ops failed."

- name: Read the controller AppRole artifact
  ansible.builtin.slurp:
    src: "{{ openbao_controller_approle_local_file }}"
  delegate_to: localhost
  become: false
  register: openbao_controller_approle_raw
  no_log: true

- name: Read the mail-platform AppRole artifact
  ansible.builtin.slurp:
    src: "{{ openbao_mail_platform_approle_local_file }}"
  delegate_to: localhost
  become: false
  register: openbao_mail_platform_approle_raw
  no_log: true

- name: Record AppRole artifact facts
  ansible.builtin.set_fact:
    openbao_controller_approle: "{{ openbao_controller_approle_raw.content | b64decode | from_json }}"
    openbao_mail_platform_approle: "{{ openbao_mail_platform_approle_raw.content | b64decode | from_json }}"
  no_log: true

- name: Login with the controller AppRole
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/auth/approle/login"
    method: POST
    body_format: json
    body:
      role_id: "{{ openbao_controller_approle.role_id }}"
      secret_id: "{{ openbao_controller_approle.secret_id }}"
    return_content: true
    status_code: 200
  register: openbao_controller_login
  no_log: true

- name: Read the controller Proxmox API secret through the AppRole
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/kv/data/{{ openbao_seeded_secret_paths.controller_proxmox_api }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_controller_login.json.auth.client_token }}"
    return_content: true
    status_code: 200
  register: openbao_controller_secret_read
  no_log: true

- name: Assert that the controller AppRole can read the Proxmox API secret
  ansible.builtin.assert:
    that:
      - openbao_controller_secret_read.json.data.data.user == proxmox_api_automation_user
      - openbao_controller_secret_read.json.data.data.token_id == proxmox_api_token_id
    fail_msg: "The controller AppRole could not read the expected Proxmox API secret payload."

- name: Encrypt test material with the controller transit key
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/transit/encrypt/controller-automation"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_controller_login.json.auth.client_token }}"
    body_format: json
    body:
      plaintext: "{{ 'lv3-controller-test' | b64encode }}"
    return_content: true
    status_code: 200
  register: openbao_controller_transit_encrypt
  no_log: true

- name: Decrypt test material with the controller transit key
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/transit/decrypt/controller-automation"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_controller_login.json.auth.client_token }}"
    body_format: json
    body:
      ciphertext: "{{ openbao_controller_transit_encrypt.json.data.ciphertext }}"
    return_content: true
    status_code: 200
  register: openbao_controller_transit_decrypt
  no_log: true

- name: Assert that controller transit round-trip succeeded
  ansible.builtin.assert:
    that:
      - (openbao_controller_transit_decrypt.json.data.plaintext | b64decode) == 'lv3-controller-test'
    fail_msg: "Controller transit encryption or decryption failed."

- name: Login with the mail-platform AppRole
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/auth/approle/login"
    method: POST
    body_format: json
    body:
      role_id: "{{ openbao_mail_platform_approle.role_id }}"
      secret_id: "{{ openbao_mail_platform_approle.secret_id }}"
    return_content: true
    status_code: 200
  register: openbao_mail_platform_login
  no_log: true

- name: Read the mail-platform runtime secret through the AppRole
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/kv/data/{{ openbao_seeded_secret_paths.mail_platform_runtime }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_mail_platform_login.json.auth.client_token }}"
    return_content: true
    status_code: 200
  register: openbao_mail_platform_secret_read
  no_log: true

- name: Assert that the mail-platform AppRole can read its runtime secret
  ansible.builtin.assert:
    that:
      - openbao_mail_platform_secret_read.json.data.data.brevo_api_key | default('') | length > 0
      - openbao_mail_platform_secret_read.json.data.data.gateway_api_key | default('') | length > 0
    fail_msg: "The mail-platform AppRole could not read the expected runtime secret payload."

- name: Request a PostgreSQL dynamic credential through the controller AppRole
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ openbao_http_port }}/v1/{{ openbao_database_mount_path }}/creds/postgres-readonly"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_controller_login.json.auth.client_token }}"
    return_content: true
    status_code: 200
  register: openbao_postgres_dynamic_credential

- name: Assert that a PostgreSQL dynamic credential was issued
  ansible.builtin.assert:
    that:
      - openbao_postgres_dynamic_credential.json.data.username | default('') | length > 0
      - openbao_postgres_dynamic_credential.json.data.password | default('') | length > 0
    fail_msg: "OpenBao failed to issue a PostgreSQL dynamic credential."
