---
openbao_version: 2.5.1
openbao_image: "openbao/openbao:{{ openbao_version }}"
openbao_container_name: lv3-openbao
openbao_site_dir: /opt/openbao
openbao_config_dir: "{{ openbao_site_dir }}/config"
openbao_data_dir: "{{ openbao_site_dir }}/data"
openbao_log_dir: "{{ openbao_site_dir }}/logs"
openbao_policy_dir: "{{ openbao_site_dir }}/policies"
openbao_tls_dir: "{{ openbao_site_dir }}/tls"
openbao_compose_file: "{{ openbao_site_dir }}/docker-compose.yml"
openbao_config_file: "{{ openbao_config_dir }}/openbao.hcl"
openbao_tls_enabled: false
openbao_http_bind_address: 127.0.0.1
openbao_http_port: 8200
openbao_tls_bind_address: 0.0.0.0
openbao_tls_port: 8200
openbao_cluster_port: 8201
openbao_local_cluster_port: 8202
openbao_runtime_uid: "100"
openbao_runtime_gid: "1000"
openbao_api_addr: >-
  {{
    openbao_controller_url
    if openbao_tls_enabled
    else 'http://127.0.0.1:' ~ (openbao_http_port | string)
  }}
openbao_cluster_addr: "http://127.0.0.1:{{ openbao_cluster_port }}"
openbao_raft_path: /openbao/data
openbao_raft_node_id: "{{ inventory_hostname }}"
openbao_audit_path: "sys/audit/file-main"
openbao_audit_file_path: /openbao/logs/audit.log
openbao_tls_server_cert_file: "{{ openbao_tls_dir }}/server.crt"
openbao_tls_server_key_file: "{{ openbao_tls_dir }}/server.key"
openbao_tls_client_ca_file: "{{ openbao_tls_dir }}/root_ca.crt"
openbao_tls_server_sans:
  - "{{ hostvars['docker-runtime-lv3'].ansible_host }}"
  - "{{ hostvars['proxmox_florin'].management_tailscale_ipv4 }}"
openbao_tls_cert_renew_before_seconds: 86400
openbao_local_artifact_dir: /Users/live/Documents/GITHUB_PROJECTS/proxmox_florin_server/.local/openbao
openbao_init_local_file: "{{ openbao_local_artifact_dir }}/init.json"
openbao_ops_password_local_file: "{{ openbao_local_artifact_dir }}/ops-password.txt"
openbao_breakglass_password_local_file: "{{ openbao_local_artifact_dir }}/breakglass-password.txt"
openbao_postgres_rotator_password_local_file: "{{ openbao_local_artifact_dir }}/postgres-rotator-password.txt"
openbao_controller_approle_local_file: "{{ openbao_local_artifact_dir }}/controller-automation-approle.json"
openbao_mail_platform_approle_local_file: "{{ openbao_local_artifact_dir }}/mail-platform-approle.json"
openbao_init_key_shares: 3
openbao_init_key_threshold: 2
openbao_userpass_users:
  - username: ops
    password_local_file: "{{ openbao_ops_password_local_file }}"
    policies:
      - lv3-human-ops
    token_ttl: 8h
    token_max_ttl: 24h
  - username: breakglass
    password_local_file: "{{ openbao_breakglass_password_local_file }}"
    policies:
      - lv3-breakglass
    token_ttl: 15m
    token_max_ttl: 1h
openbao_policies:
  - name: lv3-human-ops
    src: policy-lv3-human-ops.hcl.j2
  - name: lv3-breakglass
    src: policy-lv3-breakglass.hcl.j2
  - name: lv3-agent-controller
    src: policy-lv3-agent-controller.hcl.j2
  - name: lv3-service-mail-platform
    src: policy-lv3-service-mail-platform.hcl.j2
openbao_approles:
  - name: controller-automation
    policies:
      - lv3-agent-controller
    token_ttl: 15m
    token_max_ttl: 1h
    token_num_uses: 0
    secret_id_ttl: 15m
    secret_id_num_uses: 1
    local_file: "{{ openbao_controller_approle_local_file }}"
  - name: mail-platform
    policies:
      - lv3-service-mail-platform
    token_ttl: 15m
    token_max_ttl: 1h
    token_num_uses: 0
    secret_id_ttl: 15m
    secret_id_num_uses: 1
    local_file: "{{ openbao_mail_platform_approle_local_file }}"
openbao_transit_keys:
  - controller-automation
  - mail-platform
openbao_database_mount_path: database
openbao_database_name: lv3-postgres
openbao_database_allowed_roles:
  - postgres-readonly
openbao_database_connection_url: >-
  postgresql://{{ "{{username}}" }}:{{ "{{password}}" }}@{{ openbao_postgres_host }}:5432/postgres?sslmode=disable
openbao_database_plugin_name: postgresql-database-plugin
openbao_database_password_authentication: scram-sha-256
openbao_database_roles:
  - name: postgres-readonly
    db_name: "{{ openbao_database_name }}"
    creation_statements: |-
      CREATE ROLE "{{ "{{name}}" }}" WITH LOGIN PASSWORD '{{ "{{password}}" }}' VALID UNTIL '{{ "{{expiration}}" }}';
      GRANT pg_read_all_data TO "{{ "{{name}}" }}";
    revocation_statements: |-
      DROP ROLE IF EXISTS "{{ "{{name}}" }}";
    default_ttl: 1h
    max_ttl: 24h
openbao_seeded_secret_paths:
  controller_proxmox_api: agents/controller/proxmox-api-primary
  controller_monitoring: agents/controller/monitoring
  mail_platform_runtime: services/mail-platform/runtime
