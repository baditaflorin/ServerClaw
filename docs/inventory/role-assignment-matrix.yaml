      - role: control
        count: 0
        note: "Combined with workload in docker-runtime-staging-lv3"
      - role: state
        count: 1
        node_names: [postgres-staging-lv3]
      - role: edge
        count: 1
        node_names: [nginx-staging-lv3]
      - role: workload
        count: 1
        node_names: [docker-runtime-staging-lv3]
        note: "also hosts control + observability"
      - role: observability
        count: 0
        note: "Combined with workload in docker-runtime-staging-lv3"
      - role: recovery
        count: 1
        node_names: [backup-staging-lv3]
      - role: build
        count: 1
        node_names: [docker-build-staging-lv3]

---

## ==============================================================================
## IDENTIFIED TECHNICAL DEBT
## ==============================================================================

technical_debt:
  production:
    high_priority:
      - id: DEBT-PROD-001
        title: "Single point of ingress (edge role)"
        affected_nodes: [nginx-lv3]
        impact: "Platform unavailable if single Nginx node fails"
        mitigation: "Deploy secondary nginx-lv3-secondary with keepalived VRRP"
        target_date: "2026-06-30"
        adr_reference: "ADR 0350 (Nginx fragments)"

      - id: DEBT-PROD-002
        title: "Backup storage not geographically redundant"
        affected_nodes: [backup-lv3]
        impact: "Total data loss if Proxmox hypervisor storage fails"
        mitigation: "Add off-site replication to S3 or secondary site"
        target_date: "2026-09-30"
        adr_reference: "ADR 0216-0219 (Data replication)"

    medium_priority:
      - id: DEBT-PROD-003
        title: "postgres-apps-lv3 has no read replica"
        affected_nodes: [postgres-apps-lv3]
        impact: "RTO=restore-from-backup if node fails; no read scaling"
        mitigation: "Deploy postgres-apps-replica-lv3 with streaming replication"
        target_date: "2026-06-30"

      - id: DEBT-PROD-004
        title: "Single build node bottleneck"
        affected_nodes: [docker-build-lv3]
        impact: "Parallel builds queue; CI/CD latency increases with load"
        mitigation: "Add docker-build-lv3-secondary for workload sharing"
        target_date: "2026-08-31"

      - id: DEBT-PROD-005
        title: "Single observability node; HA not deployed"
        affected_nodes: [monitoring-lv3]
        impact: "Loss of observability if node fails; alert suppression"
        mitigation: "Deploy monitoring-lv3-secondary with Prometheus federation"
        target_date: "2026-06-30"

  staging:
    high_priority:
      - id: DEBT-STG-001
        title: "Role collapse: workload + control + observability"
        affected_nodes: [docker-runtime-staging-lv3]
        impact: "Difficult to isolate failure domains; capacity planning unclear"
        mitigation: "Separate roles per node once staging scaling increases"
        target_date: "2026-12-31"
        justification: "Acceptable for non-production cost optimization"

---

## ==============================================================================
## CROSSCUTTING ASSIGNMENTS
## ==============================================================================

## The following nodes/services span multiple role boundaries and are tracked
## separately from primary role assignment.

cross_cutting:
  shared_services:
    - service: artifact-cache-lv3
      reason: "Serves multiple roles (build, workload, edge)"
      allocation_model: "Shared cache pool; not assigned to any single role"

  multi_role_waivers:
    - id: WAIVER-STG-001
      environment: staging
      roles: [control, observability, workload]
      node: docker-runtime-staging-lv3
      issued_date: "2026-01-15"
      target_date: "2026-12-31"
      justification: "Non-critical staging environment; cost optimization"

