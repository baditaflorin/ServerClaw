---
# Data-Class Replication Policies
# Implements ADR 0219: Data-Class Replication Policies For Queues, Object Stores,
# Search, Cache, Secrets, And Time-Series
# Date: 2026-04-07
# Version: 1.0.0

schema_version: "1.0.0"
description: |
  This document defines replication policies by data class rather than by product name.
  Not every stateful system behaves like a relational database. The platform has multiple
  state classes, each with different replication guarantees and operational characteristics.

data_classes:
  relational_databases:
    title: "Relational Databases (PostgreSQL)"
    description: |
      Transactional systems with ACID guarantees and relational schemas. The platform
      standard is PostgreSQL. Data is authoritative and must be carefully replicated.
    characteristics:
      - transactional: true
      - ordered_writes: true
      - consistency_model: "ACID"
      - schema_versioning: true
      - point_in_time_recovery: true
      - replication_checkpoint: "WAL position"

    intra_environment_ha:
      model: "Single-writer with read replicas or consensus-based leader election"
      description: |
        Inside one environment, PostgreSQL uses physical streaming replication for
        standby nodes, or for future distributed setups, consensus-managed leader
        election with quorum.
      writer_rule: "Exactly one writer per relational domain per environment"
      standby_rule: "Replicas are read-only and do not participate in quorum"
      failover_rule: "Failover is automatic within the environment; promotes a single standby"
      examples:
        - "production: 1 primary (10.10.10.60), 1 standby (hot-standby or replica)"
        - "staging: 1 primary (staging cell), 1 standby"

    cross_environment_replication: "Forbidden (except via allowed export patterns)"
    cross_environment_allowed_patterns:
      - sanitized_snapshot: |
          Snapshot exported from production with PII scrubbed, sensitive data removed.
          Frequency: daily or on-demand after approval. Not continuous.

      - logical_subset: |
          Logical export of approved tables/rows (e.g., only public configuration,
          no user data). Subset rules are explicit and reviewed.

      - event_replay: |
          Replay of database change events bounded to a time window and event types,
          with sensitive values scrubbed. Useful for testing event-driven workflows.

    endpoint_contract:
      rw_endpoint: "Production write traffic; staging must not connect"
      ro_endpoint: "Read-only replicas; available for reports and analytics if needed"
      admin_endpoint: "Operator and migration access; restricted access path"

    data_loss_acceptance:
      production: "RPO = minutes (within synchronous replication window)"
      staging: "RPO = unlimited (recreate from snapshot/seed if lost)"

    current_platform_state:
      postgres_primary:
        environment: "production"
        vm: "postgres-vm"
        vmid: 60
        ip: "10.10.10.60"
        role: "Single writer for all relational domains"
        ha_status: "Standby node not yet deployed (planned enhancement)"
        adr: "0098"

      staging_postgres:
        environment: "staging"
        vm: "Not yet deployed"
        role: "Will be separate single-writer cluster in staging"
        expected_bootstrap: "From sanitized_snapshot of production schema"
        adr: "0218"

  queue_and_stream_systems:
    title: "Queues and Event Streams (NATS, Redpanda)"
    description: |
      Event distribution and task queuing systems. Support ordered message delivery,
      consumer groups, and offset management. Different replication rules than
      relational databases because they are append-only and consumers must be isolated.
    characteristics:
      - ordered_within_partition: true
      - consumer_groups: true
      - offset_tracking: true
      - retention_policy: "time-based and size-based"
      - schema_evolution: "schemas optional but recommended"
      - replication_checkpoint: "consumer offset"

    intra_environment_ha:
      model: "Cluster-based replication with quorum-based leader election"
      description: |
        NATS JetStream and Redpanda both use consensus-based clustering within one
        environment. All nodes can read; writes coordinate through the leader.
      reader_rule: "Any node can consume; offsets are tracked per consumer group"
      writer_rule: "Leader coordinates writes; all replicas have full data"
      failover_rule: "Cluster automatically elects new leader if current leader fails"
      examples:
        - "NATS cluster: 3 nodes in same environment, coordinated replication"
        - "Redpanda: broker cluster with raft leadership"

    cross_environment_replication: "Forbidden for quorum and consumer groups"
    cross_environment_consumer_rule: |
      Staging consumers must NEVER participate in production consumer groups.
      Staging must never commit offsets back into production brokers.
      If staging needs production event data, use bounded replay.

    cross_environment_allowed_patterns:
      - bounded_event_replay: |
          Replay events from production to staging with explicit time bounds and
          event type filters. Scrubbed of credentials and PII. Staging creates its
          own consumer group for the replayed events.

      - synthetic_messages: |
          Staging can generate synthetic events matching production schema for
          testing consumer logic without accessing production data.

    endpoint_contract:
      producer_endpoint: "Production producers only; staging has no write access"
      consumer_endpoint_production: "Production consumers; staging uses separate brokers"
      consumer_endpoint_staging: "Staging-local brokers only"

    data_loss_acceptance:
      production: "RPO = 0 (if synchronous replication is configured)"
      staging: "RPO = unlimited (replay from production log if available)"

    current_platform_state:
      nats_jetstream:
        environment: "production"
        vm: "docker-runtime"
        service_id: "nats_jetstream"
        adr: "0155"
        ha_status: "Cluster mode deployed"
        staging_status: "Separate staging cluster planned"

      redpanda:
        environment: "production"
        vm: "docker-runtime"
        service_id: "redpanda"
        adr: "not yet assigned"
        ha_status: "Single-broker; cluster expansion planned"
        staging_status: "Separate staging cluster planned"

  object_and_blob_stores:
    title: "Object and Blob Stores (MinIO, Cloud Storage)"
    description: |
      Unstructured data storage optimized for large files, immutable objects, and
      versioning. Not the primary authority for structured data, but critical for
      backup preservation and audit trails.
    characteristics:
      - immutable_or_versioned: true
      - replication_model: "bucket-based, prefix-based"
      - versioning_support: true
      - access_control: "per-bucket and per-object ACL"
      - replication_checkpoint: "object version and etag"

    intra_environment_ha:
      model: "MinIO erasure coding or cross-site replication within environment"
      description: |
        MinIO uses erasure coding (like RAID) to survive disk failures. High
        availability is achieved through replica disks, not separate clusters.
      redundancy: "Configurable (e.g., 4+4 with 8 disks can lose 4 disks)"
      failover_rule: "Automatic; MinIO continues on degraded but operational"

    cross_environment_replication: "Versioned replication of approved prefixes only"
    cross_environment_allowed_patterns:
      - versioned_prefix_replication: |
          Production can replicate approved object prefixes to staging storage
          with versioning enabled. Staging gets read-only access to versioned objects.
          Example: production:/backups/daily-* → staging:/backups/prod-daily-*

      - logical_subset_of_buckets: |
          Only selected buckets or prefixes are replicated. Sensitive data buckets
          (user uploads, secrets) are not replicated. Only public artifacts.

    cross_environment_write_rule: |
      Staging must write to staging-owned buckets only. Cross-environment object
      uploads are forbidden. Each environment maintains separate namespace.

    endpoint_contract:
      production_bucket_endpoint: "Production applications write to production buckets"
      staging_bucket_endpoint: "Staging applications write to staging buckets"
      read_only_replica_endpoint: "Staging can read replicated production prefixes but not modify"

    data_loss_acceptance:
      production: "RTO = minutes (erasure-coded, automatic rebuild)"
      staging: "RPO = on-demand (replicated after approval)"

    current_platform_state:
      minio:
        environment: "production"
        vm: "docker-runtime"
        service_id: "minio"
        ha_status: "Single instance; erasure coding not yet configured"
        staging_status: "Separate MinIO instance planned in staging"
        critical_buckets:
          - "backups: daily VM snapshots"
          - "docker-build-cache: builder artifacts"
          - "archive: exported data"

  search_and_vector_indexes:
    title: "Search and Vector Indexes (Qdrant, Typesense, OpenSearch)"
    description: |
      Derived state built from canonical upstream data. Search and vector indexes
      should be treated as caches and rebuilt from source rather than replicated.
    characteristics:
      - derived_state: true
      - source_of_truth: false
      - rebuild_from_source: true
      - approximate_search: true
      - replication_model: "optional; rebuild preferred"

    rebuild_philosophy: |
      Search indexes are not primary authorities. If lost, they are rebuilt by
      reindexing canonical data. Cross-environment replication adds operational
      burden with little benefit; rebuild is safer and more isolated.

    intra_environment_ha:
      model: "Single-writer coordinator with replica shards"
      description: |
        Qdrant and similar use distributed indexes with replica shards. A coordinator
        accepts writes; replica shards stay in sync. Loss of a replica shard triggers
        rebuild from upstream collection.
      rebuild_trigger: "Replica failure, staleness, or operator request"
      rebuild_source: "Original data source (PostgreSQL, file corpus, etc.)"

    cross_environment_replication: "Forbidden; use rebuild instead"
    cross_environment_allowed_patterns:
      - reindex_from_seed_data: |
          Staging receives seed documents or a subset of canonical data, then
          reindexes locally. No cross-environment sync. Example: index documentation
          or public product catalog in staging.

      - optional_synthetic_index: |
          Staging can build indexes from synthetic test data for testing search logic
          without production data.

    endpoint_contract:
      search_endpoint: "Read from the primary coordinator index"
      write_endpoint: "Index writes go to primary; replicas follow"
      rebuild_endpoint: "Operator-triggered reindex from upstream source"

    data_loss_acceptance:
      production: "RTI = minutes (rebuild from source on loss)"
      staging: "RTI = on-demand (rebuild triggers new indexing)"

    current_platform_state:
      qdrant:
        environment: "production"
        vm: "docker-runtime"
        service_id: "qdrant"
        adr: "0198"
        ha_status: "Single instance; cluster not yet deployed"
        index_sources:
          - "documentation corpus for semantic search"
          - "product embeddings for recommendation"
        staging_status: "Separate Qdrant instance in staging; reindex from staging seed"

      typesense:
        environment: "production"
        vm: "docker-runtime"
        service_id: "typesense"
        ha_status: "Single instance"
        index_sources:
          - "product catalog for fast search"
        staging_status: "Reindex from staging catalog snapshot"

  cache_and_session_stores:
    title: "Cache and Session Stores (Redis, Memcached)"
    description: |
      Ephemeral state for performance and session management. Caches are rebuilt
      on demand; loss is acceptable. Sessions expire; retention is temporary.
    characteristics:
      - ephemeral: true
      - loss_acceptable: true
      - TTL_based: true
      - rebuild_trigger: "automatic on miss"
      - replication_model: "not recommended"

    design_principle: |
      Caches and sessions are environment-local ONLY. No cross-environment replication.
      Each environment maintains its own cache and session store with its own data.
      Loss of a cache tier degrades performance temporarily but does not affect
      data integrity or availability.

    intra_environment_ha:
      model: "Cluster or partitioned cache with local resilience"
      description: |
        Cache clusters (e.g., Redis Cluster) provide resilience within one environment.
        Loss of a cache node triggers rebuild from upstream sources or acceptance
        of temporary cache misses.
      failover_rule: "Automatic; requests are re-executed to refill cache on miss"

    cross_environment_replication: "Forbidden"
    reason_no_cross_env: |
      Cache data is environment-specific (depends on local configuration, credentials,
      timestamps). Exporting cache from one environment to another creates stale data
      and defeats the purpose of the cache. Each environment rebuilds its own cache.

    endpoint_contract:
      production_cache_endpoint: "Production applications only"
      staging_cache_endpoint: "Staging applications only"
      # No read-only or cross-env endpoints

    data_loss_acceptance:
      production: "Loss is acceptable; rebuilt on demand"
      staging: "Loss is acceptable; rebuilt on demand"

    current_platform_state:
      redis:
        environment: "both"
        production_vm: "docker-runtime"
        staging_vm: "separate staging cache"
        service_id: "redis (implicit in service deployments)"
        usage:
          - "session storage"
          - "cache layer for APIs"
          - "temporary coordination"
        ha_status: "Single instance; cluster not yet deployed"

  secrets_and_key_value_authorities:
    title: "Secrets and Key-Value Authorities (OpenBao, Sealed Secrets)"
    description: |
      Sealing boundaries and secret authorities are environment-local. Each environment
      has its own trust anchor and secrets encryption boundary. Only narrow bootstrap
      anchors are exported across environments.
    characteristics:
      - authority_per_environment: true
      - encryption_boundary_per_environment: true
      - trust_anchor_export: "rare and approved"
      - replication_model: "not applicable; each env has own authority"

    principle_environment_isolation: |
      Secrets must not cross environment boundaries. Production secrets are sealed
      with production authority and cannot be unsealed in staging. Staging secrets
      are sealed with staging authority.

      This prevents accidental exposure and ensures that a staging breach does not
      compromise production credentials.

    intra_environment_ha:
      model: "Shared authority with offline key splitting or distributed unseal"
      description: |
        OpenBao can be configured with multiple unseal keys distributed among operators.
        High availability is achieved through clustered OpenBao with replicated state.
      unseal_rule: "Distributed key sharing (Shamir secret sharing)"
      failover_rule: "Cluster failover to replica; same authority"

    cross_environment_secret_export: "Only bootstrap trust anchors, with approval"
    allowed_export_patterns:
      - bootstrap_trust_anchor: |
          Narrow set of certificates or keys needed to bootstrap cross-environment
          trust (e.g., root CA certificates for mTLS). All other secrets stay local.

      - audit_identity_only: |
          Operator identity used for cross-environment audit logging. Narrow scope;
          no application secrets.

    endpoint_contract:
      unseal_endpoint: "Environment-local only"
      secret_endpoint: "Environment-local only"
      bootstrap_endpoint: "Rare; requires explicit operator action and logging"

    data_loss_acceptance:
      production: "Critical: sealed data is lost if keys are lost; offline recovery required"
      staging: "Loss acceptable; reseal with new staging key; recreate from backups"

    current_platform_state:
      openbao:
        environment: "both"
        production_vm: "docker-runtime"
        production_service_id: "openbao"
        adr: "0263"
        sealed_authorities:
          - "TLS certificates (long-lived and short-lived)"
          - "API tokens and credentials"
          - "Database passwords"
          - "Operator SSH keys"
        ha_status: "Single instance (HA planned)"
        staging_deployment: "Separate OpenBao instance with separate sealing authority"

      step_ca:
        environment: "both"
        production_vm: "runtime-control"
        production_service_id: "step_ca"
        adr: "0101"
        sealed_authorities:
          - "Root CA certificate"
          - "Intermediate CA certificates"
          - "Operator SSH key signing authority"
        ha_status: "Single instance (HA planned)"
        bootstrap_export: "Root CA public cert is shared for verification; private key never exported"

  time_series_and_observability_stores:
    title: "Time-Series Stores (Prometheus, Grafana, ELK, Tempo)"
    description: |
      Observability systems accumulate metrics, logs, traces, and events over time.
      Production observability data can be downsampled and forwarded to shared
      analysis surfaces for cross-environment visibility.
    characteristics:
      - append_only: true
      - time_windowed: true
      - retention_based_on_age: true
      - replication_model: "forwarding, downsampling, aggregation"
      - analytics_tier: "optional centralized or staging-visible"

    forwarding_philosophy: |
      Production telemetry is valuable for understanding production behavior.
      Selected metrics and logs can be forwarded and downsampled to a staging-visible
      or centralized analysis surface without exposing raw production state.

    intra_environment_ha:
      model: "Time-series database clustering with retention policies"
      description: |
        Prometheus, VictoriaMetrics, or similar maintain their own HA through
        scrape redundancy and replication. Data older than retention age is pruned.
      retention_rule: "Configurable per metric type (7 days, 30 days, etc.)"
      failover_rule: "Restart on new disk; historical data before restart is lost"

    cross_environment_replication: "Allowed for downsampled telemetry only"
    cross_environment_allowed_patterns:
      - downsampled_metrics_forwarding: |
          Production Prometheus scrapes are downsampled (aggregate every 5 minutes
          instead of 30 seconds) and forwarded to staging-visible analysis.
          Raw production detail is not exposed.

      - filtered_log_forwarding: |
          Production application logs are filtered to remove sensitive information
          (credentials, PII, user data) and forwarded to centralized or staging-visible
          log aggregation (ELK, Loki).

      - aggregated_trace_sampling: |
          Production traces are sampled (e.g., every 10th trace) and aggregated traces
          are sent to staging-visible Tempo or similar. Raw production traces stay local.

      - synthetic_telemetry_in_staging: |
          Staging generates its own synthetic metrics and logs for testing alert logic
          and dashboard behavior without production data.

    endpoint_contract:
      scrape_endpoint: "Prometheus scrapes metrics from services"
      ingest_endpoint: "Applications push logs, traces, and custom metrics"
      query_endpoint: "Grafana and operators query historical data"
      export_endpoint: "Downsampled data exported to central or staging-visible store"

    data_loss_acceptance:
      production: "RTI = storage limit (after retention window, data is pruned)"
      staging: "RTI = on-demand (receive downsampled sample from production)"

    current_platform_state:
      prometheus:
        environment: "production"
        vm: "monitoring"
        service_id: "prometheus (implicit in monitoring stack)"
        scrape_interval: 30 seconds
        retention: 30 days
        ha_status: "Single instance; federation not yet deployed"
        telemetry_forwarding: "Planned: downsampled metrics to staging"

      grafana:
        environment: "both"
        production_vm: "monitoring"
        production_service_id: "grafana"
        staging_vm: "separate monitoring instance"
        data_sources:
          - production_prometheus
          - staging_prometheus
          - downsampled_shared_prometheus
        ha_status: "Single instance per environment"

      loki_or_elk:
        environment: "production (planned: staging-visible log aggregation)"
        vm: "monitoring or separate log stack"
        retention: "45 days"
        ha_status: "Single instance (HA planned)"
        log_forwarding: "Planned: filtered logs to central aggregation"

      tempo:
        environment: "production (planned: staging-visible trace aggregation)"
        service_id: "tempo (optional; tracing infrastructure)"
        sampling_rate: "10% (planned)"
        retention: "7 days"

enforcement_and_tooling:
  title: "Implementation Tooling and Validation"
  tooling:
    - tool: "Backup and snapshot export automation"
      responsible_for:
        - "sanitized_snapshot pattern implementation"
        - "logical_subset export with PII removal"
      implementation_status: "pending"
      placeholder_location: "docs/runbooks/backup-and-export-procedures.md"

    - tool: "Event replay system"
      responsible_for:
        - "bounded_event_replay for queues and databases"
        - "event filtering and scrubbing"
      implementation_status: "pending"
      placeholder_location: "docs/runbooks/event-replay-procedures.md"

    - tool: "Index rebuild automation"
      responsible_for:
        - "reindex from upstream source for search indexes"
        - "trigger rebuild on command or schedule"
      implementation_status: "pending"
      placeholder_location: "docs/runbooks/search-index-rebuild.md"

    - tool: "Audit logging for replication"
      responsible_for:
        - "logging all environment-to-environment data flows"
        - "capture export type, data classification, approver"
      implementation_status: "pending"
      placeholder_location: "config/audit-logging-schema.json"

    - tool: "Network isolation validation"
      responsible_for:
        - "confirming staging cannot initiate to production"
        - "validating one-way only connection patterns"
      implementation_status: "pending"
      placeholder_location: "docs/runbooks/network-isolation-validation.md"

validation_checklist:
  - id: "database_endpoints_declared"
    title: "All relational services declare rw/ro/admin endpoints"
    responsible_adr: "0218"
    status: "pending"

  - id: "queue_consumer_isolation"
    title: "NATS and Redpanda consumers are environment-scoped"
    responsible_adr: "0219"
    status: "pending"

  - id: "object_store_namespace_separation"
    title: "Production and staging buckets/prefixes are isolated"
    responsible_adr: "0219"
    status: "pending"

  - id: "cache_local_only"
    title: "Redis and cache clusters are environment-local"
    responsible_adr: "0219"
    status: "pending"

  - id: "secrets_authority_local"
    title: "OpenBao and step-ca authorities are environment-specific"
    responsible_adr: "0219"
    status: "pending"

  - id: "observability_downsampling"
    title: "Metrics and logs are downsampled before cross-env forwarding"
    responsible_adr: "0219"
    status: "pending"

notes: |
  This policy is the operational manifestation of ADR 0219. It should be reviewed
  quarterly and updated when new services or data classes require different replication
  strategies.

  Key insight: Not all state should be replicated. Some types (cache, ephemeral) should
  be environment-local and rebuilt on demand. Others (relational) should be carefully
  exported only via approved patterns. Understanding the data class enables the right
  replication choice.
