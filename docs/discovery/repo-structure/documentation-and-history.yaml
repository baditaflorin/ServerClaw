schema_version: 1
section:
  id: documentation-and-history
  title: Documentation And Operational History
  summary: Narrative ADRs, runbooks, workstreams, release notes, discovery sources, and audit evidence.
  when_to_read: Use this section when you need design rationale, operator procedures, or historical receipts.
entries:
  directories:
    docs/adr:
      purpose: Architecture Decision Records - every major design decision
      contains: ADR markdown files, compact .index.yaml root manifest, and shard metadata under index/
      concern: governance, architecture
      keywords:
      - decisions
      - architecture
      - history
      - rationale
      - consequences
      - adr
      for_agents: 'Read .index.yaml to find relevant ADRs by keyword, concern, or reservation context. Load one shard under docs/adr/index/ when you need focused browsing instead of the full corpus.

        '
      key_files:
        .index.yaml: Root ADR discovery manifest with shard pointers and reservation summary
        index/reservations.yaml: ADR number and window reservation ledger for parallel authoring
    docs/runbooks:
      purpose: Operational runbooks and procedures for routine tasks
      contains: Step-by-step guides for deployment, troubleshooting, recovery
      concern: operations
      keywords:
      - procedures
      - operational
      - how-to
      - runbook
      - recovery
      - deployment
      for_agents: Find specific operational procedures and recovery steps
    docs/reference-deployments:
      purpose: Public-safe reference deployment samples and fork-first onboarding maps
      contains: Example inventory, publication-profile, and overlay guidance for fresh forks
      concern: documentation, onboarding
      keywords:
      - reference
      - examples
      - fork
      - onboarding
      - samples
      for_agents: Start here when translating the repo into a new environment without reusing the integrated live topology verbatim.
    docs/workstreams:
      purpose: ADR-style documentation for active workstreams
      contains: adr-XXXX-workstream-name.md files for each active branch
      concern: project-management, branch-work
      keywords:
      - workstreams
      - parallel
      - branch
      - in-progress
      - tasks
      for_agents: Understand what work is in progress and planned; create one here
    docs/release-notes:
      purpose: Versioned release notes and generated release-history indexes
      contains: X.Y.Z.md files for each platform release plus index/*.md archive ledgers
      concern: release, versioning
      keywords:
      - release
      - notes
      - version
      - changelog
      for_agents: Check before writing release notes; create here on new release
    docs/status/history:
      purpose: Generated history ledgers for bounded root summaries
      contains: Full live-apply evidence and merged-workstream history once the root README rolls older rows away
      concern: documentation, generated, history
      keywords:
      - history
      - status
      - generated
      - rollover
      - readme
      for_agents: Generated by status-doc tooling; refresh through make generate-status-docs
    docs/site-generated:
      purpose: Auto-generated documentation artefacts (do not edit)
      contains: architecture diagrams, dependency graphs, status documents
      concern: documentation, generated
      keywords:
      - generated
      - diagram
      - architecture
      - auto
      for_agents: READ ONLY - regenerated by 'make generate-docs'; do not edit
    docs/discovery:
      purpose: Canonical sectional discovery registries and onboarding-pack definitions
      contains: repo-structure/, config-locations/, onboarding-packs.yaml
      concern: documentation, agent-discovery
      keywords:
      - discovery
      - onboarding
      - registries
      - packs
      - generated
      for_agents: Edit these section files, then regenerate the root onboarding entrypoints and build/onboarding packs.
    receipts:
      purpose: Operational receipts and audit trail
      contains: live-applies/, gate-bypasses/, deployment receipts
      concern: audit, operational-history
      keywords:
      - receipts
      - audit
      - history
      - deployment
      - live-apply
      for_agents: 'Create a receipt here for every live-apply or deployment. gate-bypasses/ records --no-verify overrides with justification.

        '
    versions:
      purpose: Canonical deployed state and version snapshots
      contains: stack.yaml (canonical services), version metadata
      concern: state-tracking, versioning
      keywords:
      - versions
      - state
      - stack
      - canonical
      - deployed
      - services
      for_agents: 'versions/stack.yaml is the source of truth for deployed service versions. Update ONLY after a successful deployment.

        '
    build:
      purpose: Generated build artefacts (do not commit manually)
      contains: platform-manifest.json, changelog-portal/, onboarding/
      concern: build, generated
      keywords:
      - build
      - generated
      - manifest
      - artefacts
      for_agents: READ ONLY - generated by build and discovery generators; do not edit generated outputs by hand.
